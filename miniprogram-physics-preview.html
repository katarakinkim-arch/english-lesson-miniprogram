<title>物理教案小程序 · 预览</title>
<style>
  :root{ --brand:#1a365d; --brand2:#2a4a7d; --bg:#f3f5f9; --txt:#1f2430; --sub:#6b7280; --line:#e6e9f0; --chip:#eef2f8; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; background:#dfe3ea; color:var(--txt); }
  .phone{ max-width:390px; margin:24px auto; background:var(--bg); border-radius:38px; overflow:hidden; box-shadow:0 20px 60px rgba(20,30,60,.25); position:relative; min-height:844px; display:flex; flex-direction:column; }
  .statusbar{ height:44px; background:var(--brand); display:flex; align-items:center; justify-content:space-between; padding:0 22px; color:#fff; font-size:14px; font-weight:600; }
  .statusbar .icons{ letter-spacing:2px; }
  .navbar{ height:46px; background:var(--brand); color:#fff; display:flex; align-items:center; justify-content:center; position:relative; font-size:17px; font-weight:600; }
  .navbar .back{ position:absolute; left:14px; font-size:22px; line-height:1; cursor:pointer; pointer-events:auto; }
  .content{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px; }
  .content::-webkit-scrollbar{ width:0; }
  .tabbar{ height:60px; background:#fff; border-top:1px solid var(--line); display:flex; flex-shrink:0; position:relative; z-index:20; }
  .tab{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#9aa1ad; font-size:11px; gap:3px; cursor:pointer; -webkit-user-select:none; user-select:none; }
  .tab .ico{ font-size:21px; }
  .tab.on{ color:var(--brand); }
  .search{ background:#fff; border-radius:14px; padding:11px 14px; display:flex; align-items:center; gap:8px; color:var(--sub); font-size:14px; box-shadow:0 2px 10px rgba(20,40,80,.05); }
  .search .sin{ flex:1; border:none; background:transparent; outline:none; font-size:14px; color:var(--txt); min-width:0; }
  .search .searchx{ color:#aab; font-size:16px; cursor:pointer; padding:0 2px; }
  .chips{ display:flex; gap:8px; margin:12px 0; flex-wrap:wrap; }
  .chip{ background:var(--chip); color:var(--sub); font-size:13px; padding:7px 14px; border-radius:20px; cursor:pointer; white-space:nowrap; }
  .chip.on{ background:var(--brand); color:#fff; }
  .card{ background:#fff; border-radius:16px; padding:16px; margin-bottom:10px; box-shadow:0 2px 10px rgba(20,40,80,.05); cursor:pointer; transition:transform .15s; display:flex; align-items:center; }
  .card:active{ transform:scale(.98); }
  .card .row1{ display:flex; gap:12px; align-items:center; width:100%; }
  .card .docico{ width:44px; height:44px; border-radius:12px; background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .card .ttl{ font-size:14.5px; font-weight:600; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card .sub{ font-size:12px; color:#8a90a0; margin-top:4px; line-height:1.3; }
  .card-arrow{ font-size:24px; color:#d0d4dc; flex-shrink:0; }
  .empty{ text-align:center; color:var(--sub); padding:60px 20px; }
  .empty .e{ font-size:54px; }
  .empty .t{ margin-top:12px; font-size:15px; }
  .empty .p{ margin-top:6px; font-size:12px; color:#b3b8c4; }
  .unit-group{ margin-top:12px; }
  .unit-head{ display:flex; align-items:baseline; gap:8px; padding:12px 2px 8px; position:sticky; top:0; background:var(--bg); z-index:5; }
  .unit-no{ font-size:12px; font-weight:700; color:#fff; background:var(--brand); padding:3px 9px; border-radius:6px; flex-shrink:0; }
  .unit-name{ font-size:15px; font-weight:600; color:var(--txt); }
  .hero{ margin:-14px -14px 14px; padding:26px 18px 20px; background:linear-gradient(160deg,var(--brand),var(--brand2)); color:#fff; border-radius:0 0 22px 22px; }
  .hero .badges2{ display:flex; gap:8px; margin-bottom:14px; }
  .hero .badge2{ font-size:12px; padding:4px 11px; border-radius:9px; background:rgba(255,255,255,.18); }
  .hero h1{ font-size:20px; margin:0 0 8px; line-height:1.35; }
  .hero .hsub{ font-size:13px; opacity:.85; }
  .hero .hstat{ font-size:12px; opacity:.8; margin-top:12px; }
  .sec{ background:#fff; border-radius:16px; padding:16px; margin-bottom:12px; box-shadow:0 2px 10px rgba(20,40,80,.05); }
  .sec h3{ margin:0 0 12px; font-size:15px; display:flex; align-items:center; gap:8px; color:var(--brand); }
  .sec .scopy{ margin-left:auto; font-size:11px; color:var(--brand); background:var(--chip); border-radius:8px; padding:3px 9px; cursor:pointer; flex-shrink:0; }
  .sno{ flex-shrink:0; width:24px; height:24px; line-height:24px; text-align:center; background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; border-radius:50%; font-size:13px; font-weight:700; }
  .sno.sm{ width:20px; height:20px; line-height:20px; font-size:12px; }
  .sec p{ margin:0; font-size:13px; line-height:1.7; color:#3a4150; white-space:pre-wrap; word-break:break-word; }
  .sec ul{ margin:0; padding-left:18px; }
  .sec li{ font-size:13px; line-height:1.7; color:#3a4150; margin-bottom:4px; }
  .step{ background:#f7f9fc; border-left:4px solid var(--brand2); border-radius:12px; padding:10px 12px; margin-bottom:12px; }
  .step .sn{ font-size:13px; font-weight:600; color:var(--brand); display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
  .step .st{ font-size:11px; color:#fff; background:var(--brand2); border-radius:7px; padding:1px 8px; margin-left:4px; }
  .step p{ margin:6px 0 0; font-size:12.5px; line-height:1.6; color:#444; white-space:pre-wrap; word-break:break-word; }
  .dlbar{ position:sticky; bottom:0; background:#fff; border-top:1px solid var(--line); padding:10px 12px; display:flex; align-items:center; gap:8px; z-index:5; }
  .dlbar .fmts{ display:flex; gap:5px; }
  .dlbar .fmt{ font-size:12px; padding:7px 9px; border-radius:10px; background:var(--chip); color:var(--sub); cursor:pointer; }
  .dlbar .fmt.on{ background:var(--brand); color:#fff; }
  .dlbar .btn{ flex:1; background:var(--brand); color:#fff; text-align:center; padding:13px 0; border-radius:13px; font-size:15px; font-weight:600; cursor:pointer; }
  .dlbar .fav{ font-size:24px; color:var(--brand); cursor:pointer; padding:0 6px; }
  .phead{ background:linear-gradient(160deg,var(--brand),var(--brand2)); border-radius:18px; padding:24px 18px; color:#fff; display:flex; align-items:center; gap:16px; margin-bottom:14px; }
  .pavatar{ width:62px; height:62px; border-radius:50%; background:rgba(255,255,255,.25); display:flex; align-items:center; justify-content:center; font-size:30px; overflow:hidden; border:2px solid rgba(255,255,255,.5); flex-shrink:0; }
  .pavatar img{ width:100%; height:100%; object-fit:cover; }
  .pname{ font-size:18px; font-weight:600; }
  .psub{ font-size:12px; opacity:.8; margin-top:4px; }
  .stats3{ display:flex; gap:10px; margin-bottom:14px; }
  .stat{ flex:1; background:#fff; border-radius:14px; padding:14px; text-align:center; box-shadow:0 2px 10px rgba(20,40,80,.05); }
  .stat .num{ font-size:22px; font-weight:700; color:var(--brand); }
  .stat .lbl{ font-size:12px; color:var(--sub); margin-top:4px; }
  .block{ background:#fff; border-radius:16px; padding:16px; margin-bottom:12px; box-shadow:0 2px 10px rgba(20,40,80,.05); }
  .block h3{ margin:0 0 12px; font-size:15px; display:flex; justify-content:space-between; align-items:center; }
  .block .clear{ font-size:12px; color:#c0392b; cursor:pointer; }
  .favitem{ display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line); cursor:pointer; }
  .favitem:last-child{ border-bottom:none; }
  .favitem .fi{ width:34px; height:34px; border-radius:9px; background:var(--chip); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .favitem .ft{ font-size:13px; }
  .glabel{ font-size:12px; color:#888; padding:16px 4px 8px; display:flex; justify-content:space-between; }
  .glabel .clr{ color:#c0392b; cursor:pointer; }
  .toast{ position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,.78); color:#fff; padding:12px 22px; border-radius:12px; font-size:14px; z-index:999; opacity:0; transition:opacity .25s; pointer-events:none; }
  .toast.show{ opacity:1; }
  .hint{ text-align:center; font-size:11px; color:#aab; padding:10px 0 4px; }
  .block p.rp{ margin:8px 0 0; font-size:13px; line-height:1.7; color:#3a4150; }
  .tip{ font-size:11px; color:#aab; text-align:center; margin-top:14px; line-height:1.6; }
</style>

<script>

const LESSONS = [{"id":"l-phy-b1-u1-1","lessonId":"l-phy-b1-u1-1","title":"质点 参考系","book":"必修第一册","unitNumber":1,"unitTitle":"运动的描述","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["质点","参考系","理想模型","人教版必修一Ch1","第一课时"],"textbookAnalysis":"从生活中的运动引入质点这一理想化模型：当物体的形状和大小对研究问题影响可忽略时，可把物体看成有质量的点。参考系是描述物体运动时选作标准的物体或系统，选择不同参考系结论可能不同。重点是建立理想模型的思想和参考系的选择。","overview":"【学情分析】A班：能理解理想化模型的抽象意义，可辨析何时可视为质点；B班：常把质点误解为「很小的点」，忽略条件；参考系的「相对性」易混。共同问题：质点不是真实存在的点，而是忽略次要因素的研究方法；同一物体在不同问题中是否质点结论不同。","objectives":["物理观念：理解质点的概念，知道把物体看成质点的条件。","科学思维：体会理想化模型这一科学抽象方法，能在具体情境中判断能否视为质点。","科学探究：通过生活实例体会选择不同参考系对运动描述的影响。","科学态度与责任：认识模型建构在物理学中的价值，养成抓住主要矛盾的思维习惯。"],"keyPoints":"① 质点：忽略形状大小、具有质量的点（理想模型）。\n② 条件：物体的形状大小对研究问题影响可忽略。\n③ 参考系：描述运动时选作标准的物体或系统。\n④ 同一运动对不同参考系描述可能不同。","difficulties":"① 质点条件。原因：学生易认为「小物体才是质点」，需强调「视问题而定」并用反例辨析。\n② 参考系相对性。原因：惯性思维总以地面为系，需多举运动车厢、流水等例。\n③ 模型思想。原因：抽象，需说明这是为研究方便的简化。","teachingMethods":"① 生活实例引入法。\n② 反例辨析法（地球能否为质点）。\n③ 多参考系对比演示。\n④ 理想模型归纳法。","preparation":"【PPT课件】P1 生活运动实例；P2 质点定义与条件；P3 能否视为质点的判断；P4 参考系概念；P5 不同参考系对比；P6 练习。\n【实验器材】玩具小车、课本。\n【音频】无。","process":[{"step":"Step 1 导入——研究运动先简化","time":"5分钟","content":"【PPT P1 运动实例】教师：「研究地球公转、火车从北京到上海，我们并不关心它转了几圈或车头形状，抓住『位置随时间变化』就够了。这种抓主要因素的简化就是物理建模。」 预设回答：「研究问题不同，关注的重点也不同！」 板书时机：黑板写课题「质点 参考系」。差异化提示：B班举身边运动例；A班需思考「为何要简化」。易错点提醒：质点不是真实存在的点，是忽略次要因素的理想模型。"},{"step":"Step 2 质点概念","time":"10分钟","content":"【PPT P2 质点定义】教师：「当物体的形状和大小对研究问题的影响可忽略时，可把物体看作一个有质量的点，叫质点。」 预设回答：「质点是一个有质量的点，用来代替整个物体。」 板书时机：黑板写质点定义与条件。差异化提示：B班记定义；A班需说「条件」二字。易错点提醒：能否当质点取决于研究问题，不取决于物体大小——原子研究自旋时不能当质点，地球研究公转时可当质点。"},{"step":"Step 3 判断训练","time":"10分钟","content":"【PPT P3 判断】教师：「判断：研究雄鹰飞行轨迹时能否当质点？研究雄鹰翅膀扇动时呢？研究车轮转动时车轮能当质点吗？」 预设回答：「看研究问题——轨迹可，扇动和转动不可。」 板书时机：黑板列三个判断结论。差异化提示：B班做前两个；A班四个全做并说理。易错点提醒：同一物体在不同问题中结论可能相反，务必先看「研究什么」。"},{"step":"Step 4 参考系","time":"8分钟","content":"【PPT P4 参考系】教师：「描述运动必须选参照物作标准，这个标准叫参考系。平时默认地面为参考系。」 预设回答：「参考系就是看运动以谁为参照。」 板书时机：黑板写参考系概念。差异化提示：B班记；A班需举地面之外的参考系。易错点提醒：不选参考系就无法描述运动；参考系可任意选，通常以地面为简便。"},{"step":"Step 5 不同参考系对比","time":"8分钟","content":"【PPT P5 对比】教师：「坐在行驶火车里的人看窗外树在向后退，看同伴却静止——同一运动，参考系不同结论不同。」 预设回答：「选的参考系不同，看到的运动情况就不同。」 板书时机：黑板写「参考系不同→描述不同」。差异化提示：B班听例；A班需再举一案（如流水中的树叶）。易错点提醒：比较两物体运动是否相同，必须在同一参考系下。"},{"step":"Step 6 练习+小结","time":"4分钟","content":"【PPT P6 练习】教师：「研究地球自转时地球能当质点吗？你骑车时以什么为参考系觉得自己静止？」 预设回答：「自转不能当质点；以车为参考系自己静止。」 板书时机：板书要点框架。差异化提示：B班答基础；A班补「以太阳为参考系时地球运动」。易错点提醒：下节课学时间与位移。"}],"blackboard":"┌── 质点 参考系 ──┐\n│ 质点=有质量的点 │\n│ (理想模型)      │\n│ 条件:形状大小   │\n│  影响可忽略    │\n│ 看研究问题!    │\n│ 参考系=标准    │\n│ 默认地面       │\n│ 系不同→描述异  │\n└────────────────┘","exercises":"【基础作业】1. 判断：研究地球公转时地球可视为质点（ ）；研究地球自转时（ ）。2. 描述运动为何必须选参考系？\n【提高作业】甲、乙两车同向行驶，甲看乙静止，可能吗？说明理由。\n【参考答案——教师用】基础1：√、×。基础2：运动描述需要标准，无参考系则位置变化无意义。提高：可能——当两车同速同向时，以甲（或乙）为参考系对方静止。","reflection":"✅ 亮点：用「地球公转可、自转不可」的同一物体反例让质点条件落地；参考系相对性用火车车窗例直观。\n⚠️ 需改进：B班仍会说「小的就是质点」，后续需用反例反复强化「看研究问题」。\n📌 下节课衔接：时间是过程量、位移是位置变化量，需先有参考系才能描述。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b1-u1-2","lessonId":"l-phy-b1-u1-2","title":"时间 位移","book":"必修第一册","unitNumber":1,"unitTitle":"运动的描述","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["时刻","时间间隔","位移","矢量","路程","人教版必修一Ch1","第二课时"],"textbookAnalysis":"区分时刻（时间轴上的点）与时间间隔（时间轴上的一段）。位移是从初位置指向末位置的有向线段，是矢量，只与始末位置有关；路程是物体运动轨迹的长度，是标量。坐标法中位移可用位置坐标差表示。","overview":"【学情分析】A班：能理解矢量的方向性，可用坐标差算位移；B班：时刻与时间间隔混淆（第3秒、3秒内）；位移与路程分不清，常把路程当位移大小。共同问题：位移是矢量有方向，路程是路径长度；单向直线运动中位移大小才等于路程。","objectives":["物理观念：区分时刻与时间间隔，理解位移是矢量、路程是标量。","科学思维：用坐标法表示位置和位移，建立矢量初步观念。","科学探究：通过打点计时器或视频分析体会时间与位移的测量。","科学态度与责任：养成用坐标系精确描述运动的习惯。"],"keyPoints":"① 时刻：时间轴上的点（如第3s末）；时间间隔：一段（如3s内）。\n② 位移：初位置→末位置的有向线段，矢量，只与始末有关。\n③ 路程：轨迹长度，标量。\n④ 坐标法：Δx = x₂ - x₁（末减初）。","difficulties":"① 时刻vs间隔。原因：语言易混（第3秒、前3秒），需画时间轴辨析。\n② 位移vs路程。原因：常等同，需强调位移有方向、只关始末。\n③ 矢量方向。原因：初涉矢量，Δx正负表方向易错，需说明。","teachingMethods":"① 时间轴图示法。\n② 坐标法。\n③ 轨迹对比演示。\n④ 错例辨析法。","preparation":"【PPT课件】P1 时刻与间隔；P2 时间轴辨析；P3 位移与路程；P4 坐标法Δx；P5 矢量正方向；P6 练习。\n【实验器材】刻度尺、打点计时器（演示）。\n【音频】无。","process":[{"step":"Step 1 导入——「第3秒」与「3秒内」","time":"5分钟","content":"【PPT P1 时刻间隔】教师：「课表上8:00是时刻，一节课45分钟是时间间隔。时间轴上一点是时刻，一段是间隔。」 预设回答：「时刻像照片，间隔像一段视频。」 板书时机：黑板画时间轴标出点与段。差异化提示：B班说两点；A班需区分「第3秒」与「3秒内」。易错点提醒：「第3秒」是1秒的间隔，「3秒内」是前3秒，别混。"},{"step":"Step 2 时间轴辨析","time":"9分钟","content":"【PPT P2 辨析】教师：「请在时间轴上标出：第2s末、前2s内、第2s内。注意第2s内是从t=1到t=2。」 预设回答：「第2s内是1秒长，位置在1到2之间。」 板书时机：黑板重画并标注三段。差异化提示：B班做前两个；A班全做并说清端点。易错点提醒：「第n秒内」都是1秒，从t=n-1到t=n；「前n秒」是0到n。"},{"step":"Step 3 位移与路程","time":"10分钟","content":"【PPT P3 位移路程】教师：「从A沿曲线到B，位移是从A指向B的箭头（只看始末），路程是实际走过的长度。绕一圈回到A，位移为0但路程不为0。」 预设回答：「位移看始末，路程看走过的路。」 板书时机：黑板画A→B曲线并标位移箭头。差异化提示：B班记定义；A班需举「位移0路程非0」例。易错点提醒：位移大小≤路程，仅单向直线运动时相等；位移是矢量有方向。"},{"step":"Step 4 坐标法","time":"9分钟","content":"【PPT P4 坐标】教师：「设立直线坐标，位移Δx = x₂ - x₁（末减初）。从x=2到x=5，Δx=+3；返回x=0，Δx=-2。」 预设回答：「位移等于末位置减初位置，正负表示方向。」 板书时机：黑板写Δx = x₂ - x₁。差异化提示：B班算两题；A班需说正负含义。易错点提醒：Δx正负表示方向，不是大小；大小是绝对值。"},{"step":"Step 5 矢量正方向","time":"7分钟","content":"【PPT P5 正方向】教师：「事先规定正方向，与正方向相同的位移为正。选不同正方向，Δx符号可能相反，但位移本身不变。」 预设回答：「正方向是人为规定的，符号随规定变。」 板书时机：黑板标注正方向箭头。差异化提示：B班记；A班需说明「矢量的绝对性」。易错点提醒：矢量的方向是客观的，符号只是相对正方向的人为表示。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「物体从x=1m走到x=4m再回到x=1m，位移和路程各多少？」 预设回答：「位移0，路程6m！」 板书时机：板书。差异化提示：B班算；A班加「改从x=-2到x=3」。易错点提醒：下节课学速度。"}],"blackboard":"┌── 时间 位移 ──┐\n│ 时刻=点 间隔=段│\n│ 第n秒内:1s    │\n│ 位移Δx=x2-x1  │\n│ (矢量,有方向) │\n│ 路程=轨迹长   │\n│ |Δx|≤路程    │\n│ 单向直线才相等│\n└──────────────┘","exercises":"【基础作业】1. 填空：第3s是（ ）（填时刻/间隔）；前3s是（ ）。2. 从x=2m到x=5m，Δx=____。\n【提高作业】物体绕400m跑道一圈回到起点，位移、路程各多少？\n【参考答案——教师用】基础1：间隔、间隔。基础2：+3m。提高：位移0，路程400m。","reflection":"✅ 亮点：时间轴把「第3秒/前3秒」讲清；绕圈回起点例让位移与路程彻底分清。\n⚠️ 需改进：B班对Δx正负仍纠结，需强调「符号=方向」反复练。\n📌 下节课衔接：用位移和时间可定义速度。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b1-u1-3","lessonId":"l-phy-b1-u1-3","title":"位置变化快慢的描述——速度","book":"必修第一册","unitNumber":1,"unitTitle":"运动的描述","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["速度","平均速度","瞬时速度","速率","人教版必修一Ch1","第三课时"],"textbookAnalysis":"用位移与时间的比值定义速度v=Δx/Δt，描述位置变化快慢与方向，是矢量。平均速度对应一段时间，瞬时速度对应某一时刻（极限思想）。速率是瞬时速度的大小，是标量。","overview":"【学情分析】A班：能理解极限思想下的瞬时速度，区分速度与速率；B班：把平均速度当速度、把速率当速度；v=Δx/Δt中Δx方向易错。共同问题：速度是矢量，速率是标量；平均速度是位移/时间不是路程/时间。","objectives":["物理观念：理解速度定义v=Δx/Δt，知道速度是矢量、速率是标量。","科学思维：体会用比值定义物理量，理解平均速度与瞬时速度的区别。","科学探究：通过光电门或打点计时器测量瞬时速度。","科学态度与责任：认识极限思想在物理定义中的价值。"],"keyPoints":"① 速度：v = Δx/Δt，描述位置变化快慢与方向（矢量）。\n② 平均速度：对应一段时间（位移/时间）。\n③ 瞬时速度：对应某一时刻（Δt→0的极限）。\n④ 速率：瞬时速度的大小（标量）。","difficulties":"① 平均速度vs瞬时。原因：学生混用，需强调「对应哪段」。\n② 速度方向。原因：即位移方向，易忘，需点明。\n③ 速率。原因：是标量大小，易与速度等同，需区分。","teachingMethods":"① 比值定义法。\n② 极限思想演示（测速卡）。\n③ 光电门实验。\n④ 矢量对比。","preparation":"【PPT课件】P1 谁快谁慢；P2 速度定义；P3 平均速度；P4 瞬时速度（极限）；P5 速率；P6 练习。\n【实验器材】光电门、小车、刻度尺。\n【音频】无。","process":[{"step":"Step 1 导入——怎样比快慢","time":"5分钟","content":"【PPT P1 快慢】教师：「两同学跑100m和200m，谁快？不能只看位移或时间，要看「位移/时间」。这就是速度的思想。」 预设回答：「要同时看走了多远和用了多久。」 板书时机：黑板写课题「速度」。差异化提示：B班举跑步例；A班需抽象出比值。易错点提醒：比较快慢必须同时考虑位移和时间，单看一个会错。"},{"step":"Step 2 速度定义","time":"9分钟","content":"【PPT P2 定义】教师：「速度v = Δx/Δt，是位移与发生这段位移所用时间的比值，单位m/s。速度是矢量，方向与Δx相同。」 预设回答：「速度=位移除以时间，有方向。」 板书时机：黑板写v=Δx/Δt及单位。差异化提示：B班记式；A班需说方向。易错点提醒：速度用位移不是路程；方向即位移方向。"},{"step":"Step 3 平均速度","time":"9分钟","content":"【PPT P3 平均】教师：「平均速度对应一段位移和一段时间，v=Δx/Δt。它粗略描述这段内的平均快慢，与路径无关只与始末有关。」 预设回答：「平均速度看始末，是粗略的。」 板书时机：黑板写「平均：一段」。差异化提示：B班做一例；A班需说「与路径无关」。易错点提醒：平均速度是位移/时间，不是路程/时间；绕回起点则平均速度0。"},{"step":"Step 4 瞬时速度","time":"10分钟","content":"【PPT P4 瞬时】教师：「瞬时速度是某一时刻的速度。让Δt越来越小取极限，平均速度就趋近瞬时速度。光电门测的就是很短Δt内的近似瞬时速度。」 预设回答：「把时间间隔取得极短，平均速度就接近那一刻的速度。」 板书时机：黑板写「瞬时：Δt→0的极限」。差异化提示：B班听思想；A班需说极限。易错点提醒：瞬时速度方向是那一时刻的运动方向；实验中用极短Δt近似。"},{"step":"Step 5 速率","time":"7分钟","content":"【PPT P5 速率】教师：「速率是瞬时速度的大小，是标量，没有方向。汽车仪表盘显示的是速率。平均速度大小不等于平均速率。」 预设回答：「速率就是速度的大小，没方向。」 板书时机：黑板写「速率=|v|标量」。差异化提示：B班记；A班需说「平均速率≠平均速度大小」。易错点提醒：平均速率=路程/时间，一般≠|平均速度|；只有单向直线才相等。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「绕400m跑道一圈用80s，平均速率和平均速度大小各多少？」 预设回答：「平均速率5m/s，平均速度大小0！」 板书时机：板书。差异化提示：B班算；A班补单位换算。易错点提醒：下节课学加速度（速度变化的快慢）。"}],"blackboard":"┌── 速度 ──┐\n│ v=Δx/Δt     │\n│ 矢量,方向=Δx│\n│ 平均:一段Δx │\n│ 瞬时:Δt→0   │\n│ 速率=|v|    │\n│ (标量)      │\n│ 平均速率≠   │\n│ |平均速度|  │\n└────────────┘","exercises":"【基础作业】1. 速度定义式____；速度是（ ）量。2. 速率与速度大小的关系是____。\n【提高作业】一人绕400m跑道一圈用80s，求平均速率和平均速度大小。\n【参考答案——教师用】基础1：v=Δx/Δt、矢。基础2：速率是瞬时速度大小。提高：平均速率5m/s，平均速度大小0。","reflection":"✅ 亮点：用「跑圈」同时算平均速率与平均速度大小，差异一目了然；极限思想用光电门铺垫。\n⚠️ 需改进：B班易把速率当速度，需在习题中反复对比。\n📌 下节课衔接：加速度描述速度变化的快慢。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b1-u1-4","lessonId":"l-phy-b1-u1-4","title":"速度变化快慢的描述——加速度","book":"必修第一册","unitNumber":1,"unitTitle":"运动的描述","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["加速度","矢量","速度变化量","人教版必修一Ch1","第四课时"],"textbookAnalysis":"用速度变化量与时间的比值定义加速度a=Δv/Δt，描述速度变化快慢，是矢量，方向与速度变化量Δv相同（即合外力方向）。区分加速度大小与速度大小无关，加速度减小时速度仍可能增大。","overview":"【学情分析】A班：能理解a与v无关、a方向含义；B班：认为「加速度大就是速度快」「加速度减小速度就减小」；a=Δv/Δt中Δv方向常错。共同问题：加速度描述v变化的快慢，不是v的大小；a与v同向加速、反向减速。","objectives":["物理观念：理解加速度定义a=Δv/Δt，知道其矢量性与单位。","科学思维：区分速度与加速度，判断加速或减速取决于a与v方向关系。","科学探究：通过v-t图像斜率认识加速度。","科学态度与责任：破除「加速度大=速度快」的直觉误区。"],"keyPoints":"① 加速度：a = Δv/Δt，描述速度变化快慢（矢量）。\n② 方向：与Δv同向（即与合外力同向）。\n③ 加速/减速：a与v同向加速，反向减速。\n④ a与v大小无关：高速匀速a=0，低速启动a可能很大。","difficulties":"① a与v无关。原因：直觉认为快就大，需反例（高速巡航a=0）。\n② 加速减速判据。原因：看a与v方向而非a大小，需示范。\n③ Δv方向。原因：末减初带符号，易错，需练。","teachingMethods":"① 比值定义法。\n② 反例辨析（高铁巡航）。\n③ v-t图像斜率。\n④ 方向关系演示。","preparation":"【PPT课件】P1 谁提速快；P2 加速度定义；P3 Δv方向；P4 加速减速判据；P5 v-t斜率；P6 练习。\n【实验器材】小车、斜面。\n【音频】无。","process":[{"step":"Step 1 导入——提速快慢不同","time":"5分钟","content":"【PPT P1 提速】教师：「高铁从0到100km/h要几分钟，鞭炮车瞬间窜出——谁速度变化快？看「Δv/Δt」，这就是加速度。」 预设回答：「不是看速度多大，是看变快得有多急。」 板书时机：黑板写课题「加速度」。差异化提示：B班举例；A班需抽象比值。易错点提醒：加速度看速度「变化快慢」，不是速度本身大小。"},{"step":"Step 2 加速度定义","time":"9分钟","content":"【PPT P2 定义】教师：「加速度a = Δv/Δt = (vₜ - v₀)/Δt，单位m/s²。它是矢量，方向与Δv相同。」 预设回答：「加速度是速度变化量除以时间，有方向。」 板书时机：黑板写a=Δv/Δt及单位。差异化提示：B班记式；A班需说方向来历。易错点提醒：Δv = vₜ - v₀（末减初），带符号；a方向即Δv方向。"},{"step":"Step 3 Δv方向","time":"9分钟","content":"【PPT P3 Δv】教师：「向东初速3m/s、末速5m/s，Δv=+2（向东）；若末速1m/s，Δv=-2（向西）。Δv方向由末减初的符号决定。」 预设回答：「Δv要末减初，正负代表方向。」 板书时机：黑板写两例Δv。差异化提示：B班算第一例；A班两例都做。易错点提醒：务必末减初；符号随正方向规定，代表真实方向。"},{"step":"Step 4 加速减速判据","time":"10分钟","content":"【PPT P4 判据】教师：「物体加速还是减速，看a与v方向：同向加速，反向减速。与a大小无关——a减小也可能在加速（只是加得慢了）。」 预设回答：「看a和v是否同向，不是看a变大变小。」 板书时机：黑板写「a∥v加速，a反v减速」。差异化提示：B班记判据；A班需举「a减小仍加速」例。易错点提醒：a减小仅表示速度变化变慢，只要a与v同向速度仍在增大。"},{"step":"Step 5 v-t图像斜率","time":"7分钟","content":"【PPT P5 斜率】教师：「v-t图线的倾斜程度（斜率）就是加速度。越陡a越大；水平线a=0（匀速）；向下斜a为负（减速）。」 预设回答：「图线越陡加速度越大，平的就是0。」 板书时机：黑板画三条v-t线。差异化提示：B班看图；A班需说斜率计算。易错点提醒：斜率是a不是v；图线向下走是减速不是反向（除非过零）。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「汽车以10m/s向东行驶，刹车2s后停，求a并说运动性质。」 预设回答：「a=-5m/s²，向西，在减速！」 板书时机：板书。差异化提示：B班算；A班补「若反向加速」。易错点提醒：第1章结束，下章学匀变速直线运动规律。"}],"blackboard":"┌── 加速度 ──┐\n│ a=Δv/Δt     │\n│ 矢量,方向=Δv│\n│ 加速:a∥v    │\n│ 减速:a反v   │\n│ a小≠速度小  │\n│ v-t斜率=a   │\n└────────────┘","exercises":"【基础作业】1. 加速度定义式____；单位是____。2. a与v反向时物体做____运动。\n【提高作业】物体以8m/s向东运动，4s后变为4m/s向东，求a并判断运动性质。\n【参考答案——教师用】基础1：a=Δv/Δt、m/s²。基础2：减速。提高：Δv=4-8=-4，a=-1m/s²，向西，减速运动。","reflection":"✅ 亮点：用「高铁巡航a=0」破除a大=速度快误区；a与v方向判据用符号直观。\n⚠️ 需改进：B班对「a减小仍加速」仍难接受，需多画v-t图。\n📌 下节课衔接：匀变速直线运动——a恒定的运动规律。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b1-u2-1","lessonId":"l-phy-b1-u2-1","title":"匀变速直线运动的速度与时间的关系","book":"必修第一册","unitNumber":2,"unitTitle":"匀变速直线运动","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["匀变速","速度公式","v-t图像","人教版必修一Ch2","第一课时"],"textbookAnalysis":"匀变速直线运动是加速度恒定的直线运动。由a=(v-v₀)/t导出速度公式v=v₀+at。v-t图像是一条倾斜直线，斜率即a，纵截距即v₀。","overview":"【学情分析】A班：能从a定义推导公式并用图像解释；B班：背公式v=v₀+at但不会推导，符号（尤其减速a取负）易错。共同问题：a恒定才叫匀变速；减速时a取负代入公式即可，不必另记。","objectives":["物理观念：知道匀变速直线运动的特点（a恒定），掌握速度公式v=v₀+at。","科学思维：从加速度定义推导速度公式，用v-t图像理解斜率与截距。","科学探究：通过纸带或传感器获取v-t数据验证线性关系。","科学态度与责任：体会从定义出发推导规律的严谨性。"],"keyPoints":"① 匀变速：加速度a恒定的直线运动。\n② 速度公式：v = v₀ + at。\n③ v-t图：倾斜直线，斜率=a，截距=v₀。\n④ 减速：a取负代入公式，不必另记。","difficulties":"① 公式推导。原因：从a定义式变形，学生易跳步，需板书推导。\n② 符号。原因：减速时a为负易漏，需强调统一正方向。\n③ 图像意义。原因：斜率即a，截距即v₀，需对应。","teachingMethods":"① 定义推导法。\n② v-t图像法。\n③ 传感器实验验证。\n④ 符号规范训练。","preparation":"【PPT课件】P1 匀变速特点；P2 公式推导；P3 减速情形；P4 v-t图像；P5 斜率截距；P6 练习。\n【实验器材】气垫导轨、光电门（或手机传感器）。\n【音频】无。","process":[{"step":"Step 1 导入——加速度不变的运动","time":"5分钟","content":"【PPT P1 匀变速】教师：「若加速度始终不变（大小和方向都不变），速度就均匀变化，这叫匀变速直线运动。自由落体、刹车都近似这类。」 预设回答：「加速度恒定的直线运动，速度均匀变。」 板书时机：黑板写「匀变速：a恒定」。差异化提示：B班举刹车例；A班需说「a不变」关键。易错点提醒：必须a恒定才是匀变速；变加速不算。"},{"step":"Step 2 公式推导","time":"10分钟","content":"【PPT P2 推导】教师：「由a=(v-v₀)/t，两边乘t得v-v₀=at，即v=v₀+at。这就是速度公式。」 预设回答：「从加速度定义变形就得到v=v₀+at。」 板书时机：黑板完整推导过程。差异化提示：B班记结果；A班需复述推导。易错点提醒：推导前提是a恒定；t是从初态起算的时间。"},{"step":"Step 3 减速情形","time":"9分钟","content":"【PPT P3 减速】教师：「规定初速方向为正。刹车时a与v反向，a为负，直接代入v=v₀+at即可，会得到v逐渐减小甚至变负（反向）。」 预设回答：「减速就把a取负号代进去，不用背新公式。」 板书时机：黑板写减速示例（v₀=10,a=-2）。差异化提示：B班做一例；A班需说「变负含义」。易错点提醒：先规定正方向再赋符号，a正负由方向定，不是由大小定。"},{"step":"Step 4 v-t图像","time":"8分钟","content":"【PPT P4 图像】教师：「把v=v₀+at画出来是一条倾斜直线：起点(v₀,0)，斜率就是a。」 预设回答：「公式就是一次函数，图线是斜直线。」 板书时机：黑板画v-t斜线。差异化提示：B班看图；A班需指斜率。易错点提醒：图线斜率=a；向下斜表示a\x3c0（减速），不一定是反向。"},{"step":"Step 5 斜率与截距","time":"8分钟","content":"【PPT P5 斜率截距】教师：「纵截距是初速度v₀，斜率是加速度a。已知图线可读出两者，再代入任意t求v。」 预设回答：「看图线起点得v₀，看陡缓得a。」 板书时机：黑板标注截距、斜率。差异化提示：B班读图；A班需由两点算a。易错点提醒：截距是t=0时的v；斜率用Δv/Δt算，注意单位。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「v₀=2m/s，a=1m/s²，求5s末速度；若a=-1，结果呢？」 预设回答：「7m/s；反向-3m/s，已掉头！」 板书时机：板书。差异化提示：B班算第一问；A班两问。易错点提醒：下节课学位移公式。"}],"blackboard":"┌── v=v₀+at ──┐\n│ 匀变速:a恒定 │\n│ v=v₀+at     │\n│ 减速:a取负   │\n│ v-t:斜直线  │\n│ 斜率=a      │\n│ 截距=v₀     │\n└────────────┘","exercises":"【基础作业】1. 匀变速直线运动的特点是____。2. 速度公式____。\n【提高作业】v₀=5m/s，a=-2m/s²，求4s末速度并判断运动性质。\n【参考答案——教师用】基础1：加速度恒定。基础2：v=v₀+at。提高：v=5-8=-3m/s，已反向，减速后反向加速。","reflection":"✅ 亮点：从定义推导公式让B班也懂来源；v-t图斜率=截距对应直观。\n⚠️ 需改进：B班减速时a取负仍漏，需强化「先定正方向」。\n📌 下节课衔接：位移与时间关系x=v₀t+½at²。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b1-u2-2","lessonId":"l-phy-b1-u2-2","title":"匀变速直线运动的位移与时间的关系","book":"必修第一册","unitNumber":2,"unitTitle":"匀变速直线运动","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["位移公式","v-t面积","人教版必修一Ch2","第二课时"],"textbookAnalysis":"用v-t图像下面积等于位移的思想，推导位移公式x=v₀t+½at²。通过分割成小矩形再取极限（微元法）得到面积即位移。平均速度为(x/t)=(v₀+v)/2。","overview":"【学情分析】A班：能理解微元法（面积=位移）并推导；B班：背x=v₀t+½at²但不知来历，常与x=vt混淆（匀速才成立）。共同问题：匀变速位移不能用「速度×时间」算，要用v-t面积或公式；平均速度=(v₀+v)/2。","objectives":["物理观念：掌握位移公式x=v₀t+½at²，理解其适用条件。","科学思维：用v-t图像面积（微元法）推导位移公式，体会极限思想。","科学探究：通过纸带点迹测算位移验证公式。","科学态度与责任：体会「以恒代变、分割求和」的微积分萌芽思想。"],"keyPoints":"① 位移公式：x = v₀t + ½at²。\n② v-t面积=位移（微元法推导）。\n③ 平均速度：v平 = (v₀+v)/2 = x/t。\n④ 仅匀变速适用；匀速时a=0退化为x=v₀t。","difficulties":"① 公式来历。原因：易与x=vt混，需面积法讲清。\n② 微元法。原因：极限思想抽象，需图示分割。\n③ 平均速度。原因：(v₀+v)/2仅匀变速成立，需点明。","teachingMethods":"① 图像面积法。\n② 微元分割演示。\n③ 纸带验证。\n④ 与匀速对比。","preparation":"【PPT课件】P1 位移怎么求；P2 面积=位移；P3 微元分割；P4 公式推导；P5 平均速度；P6 练习。\n【实验器材】打点计时器、纸带。\n【音频】无。","process":[{"step":"Step 1 导入——位移不能简单乘","time":"5分钟","content":"【PPT P1 位移】教师：「匀速时位移=速度×时间。但匀变速速度在变，不能用「某刻速度×时间」。正确办法是看v-t图下的面积。」 预设回答：「速度一直在变，得用面积来算总位移。」 板书时机：黑板写课题「位移与时间」。差异化提示：B班想匀速；A班需说「变则不可直乘」。易错点提醒：x=vt只对匀速成立；匀变速必须用面积或公式。"},{"step":"Step 2 面积=位移","time":"9分钟","content":"【PPT P2 面积】教师：「把运动分成很多小段，每段近似匀速，小矩形面积和≈位移；段数无限多时面积和=真实位移，即v-t图线下面积。」 预设回答：「图线下面的面积就是走过的位移。」 板书时机：黑板画v-t图并涂面积。差异化提示：B班记结论；A班需说「为何是面积」。易错点提醒：面积纵轴是v、横轴是t，量纲m/s×s=m，正是位移。"},{"step":"Step 3 微元分割","time":"9分钟","content":"【PPT P3 微元】教师：「梯形面积=½(v₀+v)·t，又v=v₀+at代入得x=v₀t+½at²。这就是位移公式。」 预设回答：「梯形面积公式代入速度公式，就得到x=v₀t+½at²。」 板书时机：黑板写梯形面积推导。差异化提示：B班记式；A班需复述代入。易错点提醒：用梯形面积最简便；本质是微元求和取极限。"},{"step":"Step 4 公式与适用","time":"9分钟","content":"【PPT P4 公式】教师：「x=v₀t+½at²适用匀变速；a=0时退化为x=v₀t（匀速）。自由落体x=½gt²。」 预设回答：「公式要a恒定，匀速是特例。」 板书时机：黑板写公式及特例。差异化提示：B班做基础；A班需说自由落体式。易错点提醒：t从计时起点算；位移可负（反向运动）。"},{"step":"Step 5 平均速度","time":"8分钟","content":"【PPT P5 平均】教师：「匀变速平均速度v平=(v₀+v)/2，于是x=v平·t。注意这只在匀变速成立，匀速也碰巧成立。」 预设回答：「平均速度取首尾速度的平均，再乘时间。」 板书时机：黑板写v平=(v₀+v)/2。差异化提示：B班记；A班需说适用条件。易错点提醒：v平=(v₀+v)/2不是任意运动都成立，只匀变速（及匀速）。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「v₀=0,a=2m/s²，求3s内位移。」 预设回答：「x=0+½×2×9=9m！」 板书时机：板书。差异化提示：B班算；A班加「用平均速度法再算」。易错点提醒：下节课学v²-v₀²=2ax（不含t）。"}],"blackboard":"┌── x=v₀t+½at² ──┐\n│ v-t面积=位移  │\n│ 梯形→公式    │\n│ x=v₀t+½at²  │\n│ a=0→x=v₀t   │\n│ v平=(v₀+v)/2 │\n│ 仅匀变速     │\n└──────────────┘","exercises":"【基础作业】1. 匀变速位移公式____；其v-t图线下____等于位移。2. 平均速度v平=____（匀变速）。\n【提高作业】v₀=4m/s,a=1m/s²，求5s内位移。\n【参考答案——教师用】基础1：x=v₀t+½at²、面积。基础2：(v₀+v)/2。提高：x=4×5+0.5×1×25=20+12.5=32.5m。","reflection":"✅ 亮点：面积=位移从匀速近似自然引出；梯形推导比直接给公式更可信。\n⚠️ 需改进：B班仍用x=vt算匀变速，需反复对比「变与不变」。\n📌 下节课衔接：消去t得速度-位移关系。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b1-u2-3","lessonId":"l-phy-b1-u2-3","title":"匀变速直线运动的速度与位移的关系","book":"必修第一册","unitNumber":2,"unitTitle":"匀变速直线运动","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["速度位移公式","v²-v₀²=2ax","人教版必修一Ch2","第三课时"],"textbookAnalysis":"联立v=v₀+at与x=v₀t+½at²消去t，得到不含时间的速度-位移公式v²-v₀²=2ax。适用于不涉及时间的匀变速问题，如刹车距离、子弹穿木。","overview":"【学情分析】A班：能灵活选公式（缺t用v²式）；B班：见题就套v=v₀+at，不知何时用v²式；刹车「停住后不倒退」易错。共同问题：三公式本质等价，按已知未知选；刹车问题先求停车时间。","objectives":["物理观念：掌握速度-位移公式v²-v₀²=2ax及其适用情形。","科学思维：通过联立消去t推导公式，学会按已知量选择公式。","科学探究：用光电门测不同位移处速度验证v²关系。","科学态度与责任：养成「先分析已知再选公式」的解题规范。"],"keyPoints":"① 推导：由v=v₀+at与x式消去t得v²-v₀²=2ax。\n② 适用：不涉及时间t的问题。\n③ 三公式等价，按已知未知选用。\n④ 刹车：先算停车时间，停后静止不倒退。","difficulties":"① 公式选择。原因：不知何时用v²式，需按「缺t」判断。\n② 刹车陷阱。原因：代入大t得负位移，需先求停车时间。\n③ 联立消元。原因：代数操作易错，需板书。","teachingMethods":"① 联立消元演示。\n② 公式选择策略。\n③ 刹车专题。\n④ 光电门验证。","preparation":"【PPT课件】P1 缺时间怎么办；P2 公式推导；P3 三公式对比；P4 刹车陷阱；P5 选择策略；P6 练习。\n【实验器材】光电门、斜面小车。\n【音频】无。","process":[{"step":"Step 1 导入——有时未知时间","time":"5分钟","content":"【PPT P1 缺t】教师：「已知初速、加速度和位移求末速，却不知时间——用v=v₀+at要先求t很绕。能否直接连起v和x？可以，消掉t。」 预设回答：「把t消掉，直接建立v和x的关系。」 板书时机：黑板写课题。差异化提示：B班听；A班需说「为何消t」。易错点提醒：不是死记三公式，是看题目给了什么、求什么。"},{"step":"Step 2 推导","time":"10分钟","content":"【PPT P2 推导】教师：「由t=(v-v₀)/a代入x=v₀t+½at²，整理得v²-v₀²=2ax。这就是速度-位移公式。」 预设回答：「消元后得到v²-v₀²=2ax。」 板书时机：黑板完整代数推导。差异化提示：B班记结果；A班需复述消元。易错点提醒：推导用a恒定；结果中无t，正是其方便之处。"},{"step":"Step 3 三公式对比","time":"8分钟","content":"【PPT P3 对比】教师：「三公式：v=v₀+at（含t）、x=v₀t+½at²（含t）、v²-v₀²=2ax（不含t）。缺哪个量就避开哪个。」 预设回答：「缺时间用v²式，缺末速用位移式。」 板书时机：黑板列三式及「缺啥避啥」。差异化提示：B班记；A班需给选题策略。易错点提醒：三式等价，选最省步骤的；别同时用导致循环。"},{"step":"Step 4 刹车陷阱","time":"10分钟","content":"【PPT P4 刹车】教师：「刹车题若直接把大t代入，会算到负位移（倒车）——错！应先求停车时间t₀=v₀/|a|，若给定t>t₀则位移取x₀=v₀²/(2|a|)，之后静止。」 预设回答：「先算几秒停下，超过就按停下算，不会倒退。」 板书时机：黑板写停车时间、最大位移。差异化提示：B班重点练停车；A班需完整说理。易错点提醒：实际刹车停住不倒退；代入大t得负是模型外推，不适用。"},{"step":"Step 5 选择策略","time":"7分钟","content":"【PPT P5 策略】教师：「解题三步：①定正方向②列已知未知③选公式（缺t用v²式）。画过程草图帮助分析。」 预设回答：「先定向、再列量、最后选式。」 板书时机：黑板写三步策略。差异化提示：B班背三步；A班需现场示范一题。易错点提醒：方向符号贯穿始终，不定向必乱。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「v₀=20m/s,a=-5m/s²，求刹停距离；若路面长30m够吗？」 预设回答：「x=400/10=40m，30m不够！」 板书时机：板书。差异化提示：B班算；A班补「求停车时间」。易错点提醒：下节课学自由落体（a=g的特例）。"}],"blackboard":"┌── v²-v₀²=2ax ──┐\n│ 消t得到      │\n│ 缺t用它      │\n│ 刹车先求t₀   │\n│ t₀=v₀/|a|    │\n│ x₀=v₀²/2|a| │\n│ 停后不倒退   │\n└──────────────┘","exercises":"【基础作业】1. 速度-位移公式____。2. 刹车问题应先用____求停车时间。\n【提高作业】汽车以15m/s行驶，刹车间加速度-3m/s²，求刹停距离。\n【参考答案——教师用】基础1：v²-v₀²=2ax。基础2：v₀/|a|。提高：x=v₀²/(2|a|)=225/6=37.5m。","reflection":"✅ 亮点：刹车陷阱单独成节，B班不再算出「倒车」；三公式「缺啥避啥」策略清晰。\n⚠️ 需改进：B班仍爱全用v=v₀+at绕路，需限时练选式。\n📌 下节课衔接：自由落体是a=g的匀变速特例。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b1-u2-4","lessonId":"l-phy-b1-u2-4","title":"自由落体运动","book":"必修第一册","unitNumber":2,"unitTitle":"匀变速直线运动","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学探究"],"tags":["自由落体","重力加速度","伽利略","人教版必修一Ch2","第四课时"],"textbookAnalysis":"自由落体是初速为0、加速度为g的匀变速直线运动。通过逻辑推理（亚里士多德之争）与实验（频闪照片、打点）确认轻重物体下落快慢相同（忽略空气阻力）。g≈9.8m/s²，方向竖直向下。公式v=gt、h=½gt²、v²=2gh。","overview":"【学情分析】A班：能理解空气阻力是「轻重不同快慢不同」的原因，会用g公式；B班：受生活直觉影响认为「重的快」，需实验纠正；g取值与方向易错。共同问题：自由落体条件（只受重力、初速0）；真空中快慢相同。","objectives":["物理观念：知道自由落体是初速为零、加速度为g的匀变速运动。","科学思维：用逻辑推理反驳「重快轻慢」，理解空气阻力的影响。","科学探究：通过实验（纸片vs纸团、频闪）验证轻重同落。","科学态度与责任：体会伽利略质疑权威、实验求真的科学精神。"],"keyPoints":"① 条件：初速0、只受重力（忽略空气阻力）。\n② 加速度：g≈9.8m/s²（方向竖直向下）。\n③ 公式：v=gt，h=½gt²，v²=2gh。\n④ 轻重同落：真空中快慢相同，空气阻力造成差异。","difficulties":"① 重快轻慢误区。原因：生活直觉强，需实验+逻辑推理破。\n② g的方向。原因：易忘向下，需强调。\n③ 条件。原因：忽略空气阻力是理想，需说明实际有阻力。","teachingMethods":"① 逻辑辩论（伽利略vs亚里士多德）。\n② 对比实验（纸片/纸团）。\n③ 频闪照片分析。\n④ 公式应用。","preparation":"【PPT课件】P1 亚里士多德之争；P2 逻辑推理；P3 纸片纸团实验；P4 频闪证实；P5 g与公式；P6 练习。\n【实验器材】纸片、纸团、硬币、牛顿管（演示）。\n【音频】无。","process":[{"step":"Step 1 导入——重快还是轻快","time":"5分钟","content":"【PPT P1 之争】教师：「亚里士多德说重的落得快。可一张纸团成球就和硬币差不多快——直觉未必对。今天我们像伽利略一样用逻辑和实验检验。」 预设回答：「可能重的快是错觉，得做实验。」 板书时机：黑板写课题「自由落体」。差异化提示：B班说直觉；A班需提伽利略。易错点提醒：生活所见「重快」是因空气阻力，不是重力本身。"},{"step":"Step 2 逻辑推理","time":"9分钟","content":"【PPT P2 逻辑】教师：「若重快轻慢，把轻重绑一起：重物被慢的拖慢、轻的被快的带动——应介于两者之间；但合并更重应更快。矛盾！故「重快轻慢」不成立。」 预设回答：「绑一起推导出矛盾，说明原说法错。」 板书时机：黑板写归谬推理。差异化提示：B班听故事；A班需复述矛盾。易错点提醒：这是逻辑反证，说明快慢与质量无关（无空气阻力时）。"},{"step":"Step 3 实验验证","time":"10分钟","content":"【PPT P3 实验】教师：「平纸下落慢，团成纸团就快——同一张纸，形状变、质量没变，说明阻力是元凶。牛顿管抽真空后羽毛硬币同落。」 预设回答：「快慢不同是因为空气阻力，不是重量。」 板书时机：黑板写「阻力导致差异」。差异化提示：B班做纸片纸团；A班需联牛顿管。易错点提醒：真空中才严格同落；有空气时形状影响阻力。"},{"step":"Step 4 频闪证实","time":"8分钟","content":"【PPT P4 频闪】教师：「频闪照片显示相邻时间间隔相等时下落位移差恒定，正是a恒定的匀加速，且初速为0——确为自由落体。」 预设回答：「等时间位移差不变，说明匀加速且从静止开始。」 板书时机：黑板写Δh恒定。差异化提示：B班看图；A班需说Δh。易错点提醒：Δh=aT²，频闪可直接估a≈g。"},{"step":"Step 5 g与公式","time":"8分钟","content":"【PPT P5 g】教师：「自由落体a=g≈9.8m/s²（通常取10），方向竖直向下。公式：v=gt，h=½gt²，v²=2gh。」 预设回答：「把前面公式的a换成g，初速取0。」 板书时机：黑板写三公式。差异化提示：B班记；A班需说方向。易错点提醒：g方向向下；计算时取g=9.8或10看题目。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「苹果从5m高自由落下，落地速度与时间？（g=10）」 预设回答：「t=√(2×5/10)=1s，v=10m/s！」 板书时机：板书。差异化提示：B班算；A班用v²式核对。易错点提醒：第2章结束，下章学相互作用——力。"}],"blackboard":"┌── 自由落体 ──┐\n│ 初速0,只受G │\n│ a=g≈9.8↓   │\n│ v=gt       │\n│ h=½gt²     │\n│ v²=2gh     │\n│ 真空同落   │\n└────────────┘","exercises":"【基础作业】1. 自由落体加速度____（取9.8），方向____。2. 自由落体是初速为__的匀加速运动。\n【提高作业】物体从20m高自由下落，求落地速度（g=10）。\n【参考答案——教师用】基础1：g、竖直向下。基础2：0。提高：v=√(2gh)=√400=20m/s。","reflection":"✅ 亮点：伽利略归谬让「重快轻慢」逻辑破产；纸片纸团实验B班当场信服。\n⚠️ 需改进：B班仍直觉「重快」，需多放牛顿管视频。\n📌 下节课衔接：力是改变运动状态的原因（牛顿定律前先学力）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b1-u3-1","lessonId":"l-phy-b1-u3-1","title":"重力 弹力","book":"必修第一册","unitNumber":3,"unitTitle":"相互作用——力","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学探究"],"tags":["重力","重心","弹力","胡克定律","人教版必修一Ch3","第一课时"],"textbookAnalysis":"力是物体间的相互作用，三要素大小方向作用点。重力G=mg，方向竖直向下，作用点在重心（规则均匀物体在几何中心）。弹力产生于形变，方向与形变恢复方向相同；弹簧弹力F=kx（胡克定律，k为劲度系数）。","overview":"【学情分析】A班：能求重心、用胡克定律并辨弹力有无；B班：重力方向说成「向下」而非「竖直向下」；弹力有无判断难（接触≠有弹力）；k单位易错。共同问题：重力方向竖直向下（不是垂直地面）；弹力需接触且形变。","objectives":["物理观念：理解力的概念与三要素，掌握重力G=mg与方向。","科学思维：会用悬挂法确定重心，理解重心的意义。","科学探究：通过实验探究弹力与形变量的关系（胡克定律）。","科学态度与责任：养成用实验归纳规律的实证习惯。"],"keyPoints":"① 力：物体间相互作用，三要素大小方向作用点。\n② 重力：G=mg，方向竖直向下，作用于重心。\n③ 重心：规则均匀物体在几何中心（可用悬挂法找）。\n④ 弹力：F=kx（弹簧），方向与恢复形变方向相同。","difficulties":"① 重力方向。原因：易说「向下」，需强调「竖直向下」（垂直于水平面）。\n② 弹力有无。原因：接触且有形变才有，易把支持力想当然，需「撤物法」。\n③ 胡克定律。原因：x是形变量非原长，k单位N/m，需点。","teachingMethods":"① 三要素图示法。\n② 悬挂法实验。\n③ 弹簧测力计探究。\n④ 撤物法判弹力。","preparation":"【PPT课件】P1 力与三要素；P2 重力方向；P3 重心悬挂法；P4 弹力产生；P5 胡克定律；P6 练习。\n【实验器材】弹簧测力计、钩码、不规则板、细线。\n【音频】无。","process":[{"step":"Step 1 导入——什么是力","time":"5分钟","content":"【PPT P1 力】教师：「推门、拉绳、地球吸引苹果——都是物体对物体的作用，叫力。力有三要素：大小、方向、作用点。」 预设回答：「力是物体间的相互作用，有大小方向作用点。」 板书时机：黑板写「力：物体间相互作用」。差异化提示：B班举推力拉力；A班需说「相互」。易错点提醒：力不能脱离物体存在；画力要标作用点。"},{"step":"Step 2 重力方向","time":"9分钟","content":"【PPT P2 重力】教师：「重力G=mg，方向总是竖直向下（即垂直于水平面指向地心附近），不是「垂直地面」（斜面上垂直地面是错的）。」 预设回答：「重力方向竖直向下，用铅垂线验证。」 板书时机：黑板写G=mg与「竖直向下」。差异化提示：B班记方向；A班需区分竖直与垂直。易错点提醒：竖直向下≠垂直接触面；斜坡上重力仍竖直向下。"},{"step":"Step 3 重心","time":"9分钟","content":"【PPT P3 重心】教师：「重心是重力的等效作用点。规则均匀物体在几何中心；不规则板用两次悬挂法，悬线交点即重心。」 预设回答：「重心是重力集中作用的点，可用悬挂法找。」 板书时机：黑板画悬挂法。差异化提示：B班记规则体；A班需说悬挂法原理。易错点提醒：重心可在物体外（如圆环、弯杆）；质量分布影响重心位置。"},{"step":"Step 4 弹力产生","time":"9分钟","content":"【PPT P4 弹力】教师：「物体接触并发生弹性形变时产生弹力，方向与恢复形变方向相同（支持力垂直面向上、绳子拉力沿绳）。用『撤物法』判断：撤去支撑物若运动趋势消失则原接触无弹力。」 预设回答：「有弹力必须接触且形变，方向指向恢复。」 板书时机：黑板写「接触+形变」。差异化提示：B班记条件；A班需演示撤物法。易错点提醒：接触不一定有弹力（如挨着静止的墙）；要看是否挤压形变。"},{"step":"Step 5 胡克定律","time":"8分钟","content":"【PPT P5 胡克】教师：「弹簧弹力F=kx，x是形变量（伸长或压缩量，非原长），k是劲度系数，单位N/m。在弹性限度内F与x成正比。」 预设回答：「弹力与形变量成正比，F=kx。」 板书时机：黑板写F=kx及k。差异化提示：B班记式；A班需说x含义与限度。易错点提醒：x是形变量不是长度；超过弹性限度不再成正比。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「k=200N/m的弹簧拉长0.05m，弹力多大？质量2kg物体重力多大（g=10）？」 预设回答：「F=10N；G=20N！」 板书时机：板书。差异化提示：B班算；A班补「压缩情形」。易错点提醒：下节课学摩擦力。"}],"blackboard":"┌── 重力 弹力 ──┐\n│ 力:相互作用   │\n│ G=mg 竖直向下│\n│ 重心=等效点  │\n│ 弹力:接触形变│\n│ F=kx (x形变) │\n│ k:N/m       │\n└──────────────┘","exercises":"【基础作业】1. 重力方向____；G=____。2. 胡克定律____，x表示____。\n【提高作业】弹簧k=100N/m，原长10cm，挂物后长15cm，求弹力。\n【参考答案——教师用】基础1：竖直向下、mg。基础2：F=kx、形变量。提高：x=0.05m，F=100×0.05=5N。","reflection":"✅ 亮点：竖直向下vs垂直地面用斜面反例讲清；撤物法给B班判弹力的硬招。\n⚠️ 需改进：B班常把x当弹簧长度，需红字「形变量=现长-原长」。\n📌 下节课衔接：摩擦力是另一种接触力。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b1-u3-2","lessonId":"l-phy-b1-u3-2","title":"摩擦力","book":"必修第一册","unitNumber":3,"unitTitle":"相互作用——力","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学探究"],"tags":["摩擦力","静摩擦","滑动摩擦","人教版必修一Ch3","第二课时"],"textbookAnalysis":"摩擦力分静摩擦与滑动摩擦。滑动摩擦力f=μN，方向与相对运动方向相反。静摩擦力随外力在0~f_max间变化，方向与相对运动趋势相反，最大静摩擦略大于滑动摩擦。产生条件：接触、挤压、粗糙、有相对运动（滑动）或趋势（静）。","overview":"【学情分析】A班：能判断静摩擦方向与趋势、用f=μN；B班：把摩擦力一律当阻力、方向说成「与运动相反」；静摩擦大小易误认为f=μN。共同问题：摩擦方向与「相对运动/趋势」相反，可与运动同向（如走路、传送带）。","objectives":["物理观念：区分静摩擦与滑动摩擦，理解其方向与相对运动（趋势）相反。","科学思维：会判断摩擦力的有无与方向，明确静摩擦大小由平衡决定。","科学探究：通过实验探究滑动摩擦与压力、粗糙程度的关系。","科学态度与责任：认识摩擦力的两面性（有益与有害）。"],"keyPoints":"① 滑动摩擦：f=μN，方向与相对运动方向相反。\n② 静摩擦：0\x3cf≤f_max，方向与相对运动趋势相反。\n③ 产生条件：接触、挤压（N>0）、粗糙、相对运动/趋势。\n④ 摩擦可与运动同向（走路、传送带）。","difficulties":"① 方向判断。原因：混淆「运动方向」与「相对运动方向」，需强调「相对」。\n② 静摩擦大小。原因：误用f=μN，需说明由平衡/牛顿定律定。\n③ 摩擦可助力。原因：直觉只有阻力，需举走路例。","teachingMethods":"① 条件分析法。\n② 相对运动演示（传送带）。\n③ 弹簧测力计测滑动摩擦。\n④ 趋势判断训练。","preparation":"【PPT课件】P1 摩擦分类；P2 产生条件；P3 滑动摩擦f=μN；P4 静摩擦与趋势；P5 摩擦助力；P6 练习。\n【实验器材】木块、木板、弹簧测力计、毛巾。\n【音频】无。","process":[{"step":"Step 1 导入——摩擦无处不在","time":"5分钟","content":"【PPT P1 摩擦】教师：「手压桌面推不动、鞋底防滑、刹车片——都有摩擦。摩擦分静摩擦（未滑）和滑动摩擦（已滑）两类。」 预设回答：「摩擦让我们能走能停，分静和动两种。」 板书时机：黑板写「摩擦力：静/滑动」。差异化提示：B班举生活例；A班需分类。易错点提醒：静摩擦发生在「有趋势未滑动」，滑动摩擦在「已滑动」。"},{"step":"Step 2 产生条件","time":"9分钟","content":"【PPT P2 条件】教师：「摩擦产生四条件：接触、挤压（有正压力N）、接触面粗糙、有相对运动（滑动）或相对运动趋势（静）。缺一则无摩擦。」 预设回答：「接触挤压粗糙还要有相对运动或趋势。」 板书时机：黑板列四条件。差异化提示：B班记四条件；A班需逐条举例。易错点提醒：光滑接触面（理想）无摩擦；无挤压（N=0）也无摩擦。"},{"step":"Step 3 滑动摩擦","time":"10分钟","content":"【PPT P3 滑动】教师：「滑动摩擦力f=μN，μ是动摩擦因数（由接触面材料粗糙决定），N是正压力。方向与相对运动方向相反（注意是相对接触面，不是对地）。」 预设回答：「f=μN，方向和它相对滑动的方面相反。」 板书时机：黑板写f=μN。差异化提示：B班算基础；A班需说「相对」。易错点提醒：N是正压力不是重力（斜面上N=mgcosθ）；方向是「相对运动反向」非「运动反向」。"},{"step":"Step 4 静摩擦与趋势","time":"9分钟","content":"【PPT P4 静摩擦】教师：「静摩擦随外力在0到f_max间变化，由平衡或牛顿定律决定，不是f=μN！方向与相对运动趋势相反。用『假设光滑』判断趋势方向。」 预设回答：「静摩擦大小看平衡，方向反趋势。」 板书时机：黑板写「静摩擦：由平衡定」。差异化提示：B班做一例；A班需说假设光滑法。易错点提醒：静摩擦不能用f=μN算大小（只有最大静摩擦≈μN）；方向反趋势可助力。"},{"step":"Step 5 摩擦助力","time":"7分钟","content":"【PPT P5 助力】教师：「人走路：脚向后蹬，地给脚向前的静摩擦——是动力！传送带靠静摩擦运货。摩擦不总是阻力。」 预设回答：「走路靠地面给的向前摩擦力，摩擦也能推着我们走。」 板书时机：黑板写「摩擦可为动力」。差异化提示：B班听例；A班需分析传送带。易错点提醒：判定动力/阻力看摩擦方向与物体运动方向是否相同，而非直觉。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「木箱重100N，μ=0.3，水平匀速推，推力多大？若用50N推未动，静摩擦多大？」 预设回答：「匀速f=30N推力30N；未动静摩擦=50N！」 板书时机：板书。差异化提示：B班算；A班补趋势判断。易错点提醒：下节课学力的合成与分解。"}],"blackboard":"┌── 摩擦力 ──┐\n│ 静/滑动      │\n│ 条件:接挤糙动│\n│ 滑:f=μN      │\n│ 方向:相对反  │\n│ 静:0~f_max  │\n│ (平衡决定)   │\n│ 可当动力    │\n└────────────┘","exercises":"【基础作业】1. 滑动摩擦力公式____，方向与____相反。2. 静摩擦力大小由____决定（填平衡/公式）。\n【提高作业】重200N物体μ=0.2，水平匀速拉，拉力多大？\n【参考答案——教师用】基础1：f=μN、相对运动方向。基础2：平衡。提高：f=0.2×200=40N，匀速拉力=40N。","reflection":"✅ 亮点：走路/传送带例打破「摩擦=阻力」；假设光滑法给判断趋势的硬招。\n⚠️ 需改进：B班静摩擦仍套f=μN，需反复强调「由平衡定」。\n📌 下节课衔接：多个力可用合成与分解处理。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b1-u3-3","lessonId":"l-phy-b1-u3-3","title":"力的合成与分解","book":"必修第一册","unitNumber":3,"unitTitle":"相互作用——力","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["力的合成","平行四边形定则","力的分解","正交分解","人教版必修一Ch3","第三课时"],"textbookAnalysis":"力是矢量，合成遵循平行四边形定则（或三角形定则）：F合为对角线。互成角度两力合成用余弦定理或作图。力的分解是合成的逆运算，通常按实际作用效果分解，常用正交分解（建立x、y轴分别求分量再合成）。","overview":"【学情分析】A班：能熟练正交分解、用定则算合力；B班：误把力当标量直接加减（同一直力也错方向）；分解不知按「效果」定方向。共同问题：力是矢量必须按平行四边形定则；分解方向要依实际作用效果（如斜面重力的下滑分力）。","objectives":["物理观念：理解力是矢量，合成与分解遵循平行四边形定则。","科学思维：会用平行四边形定则求合力，能按实际效果分解力。","科学探究：通过实验（橡皮筋）验证力的平行四边形定则。","科学态度与责任：体会等效替代思想在力学中的核心地位。"],"keyPoints":"① 合成：平行四边形定则，F合为对角线。\n② 同一直线：同向相加、反向相减（带符号）。\n③ 分解：合成逆运算，按实际效果定方向。\n④ 正交分解：建x/y轴，Fx=Fcosθ，Fy=Fsinθ，再合成分量。","difficulties":"① 矢量性。原因：易标量加减，需强调定则与方向。\n② 分解方向。原因：不知按效果，需举斜面、三角支架例。\n③ 正交分解。原因：建轴与投影易错，需示范步骤。","teachingMethods":"① 等效替代实验（橡皮筋）。\n② 平行四边形作图。\n③ 效果分解演示。\n④ 正交分解训练。","preparation":"【PPT课件】P1 等效替代；P2 平行四边形定则；P3 作图法；P4 效果分解；P5 正交分解；P6 练习。\n【实验器材】橡皮筋、弹簧测力计（两只）、图钉、白纸。\n【音频】无。","process":[{"step":"Step 1 导入——一个力能否替两个","time":"5分钟","content":"【PPT P1 等效】教师：「两人各拉橡皮筋一端和一人拉同效果，单个力可等效替代两个力——这力叫合力，求合力用平行四边形定则（力是矢量）。」 预设回答：「一个力能顶两个力，要按矢量法则合成。」 板书时机：黑板写「合成：等效替代」。差异化提示：B班想两人拉；A班需说矢量。易错点提醒：力是矢量，不能像数一样直接加，必须按定则。"},{"step":"Step 2 平行四边形定则","time":"10分钟","content":"【PPT P2 定则】教师：「以两力为邻边作平行四边形，对角线即合力F合。同一直线时同向加、反向减（带符号）。互成角度要用定则或余弦定理。」 预设回答：「两力为邻边，对角线是合力。」 板书时机：黑板画平行四边形。差异化提示：B班记特例；A班需说一般情形。易错点提醒：合力大小范围|F₁-F₂|≤F合≤F₁+F₂；不一定比任一分力大。"},{"step":"Step 3 作图法","time":"8分钟","content":"【PPT P3 作图】教师：「严格按比例尺作图量对角线，可得合力大小方向。实验用两只测力计拉橡皮筋与一只拉同点，验证定则。」 预设回答：「按比例尺画平行四边形，量对角线得合力。」 板书时机：黑板标注比例尺。差异化提示：B班动手画；A班需说误差来源。易错点提醒：作图要同一标度；实验存在读数误差属正常。"},{"step":"Step 4 效果分解","time":"9分钟","content":"【PPT P4 分解】教师：「分解是合成逆运算，方向要按实际作用效果。斜面物体重力分解为沿斜面向下G₁=Gsinθ和垂直斜面向下G₂=Gcosθ。」 预设回答：「按效果分，斜面上重力分出下滑力和压斜面的力。」 板书时机：黑板画斜面分解。差异化提示：B班记两式；A班需说「为何这样分」。易错点提醒：分解方向由效果定，不是任意；G₁使下滑，G₂决定压力N。"},{"step":"Step 5 正交分解","time":"8分钟","content":"【PPT P5 正交】教师：「建互相垂直x/y轴，Fₓ=Fcosθ、Fᵧ=Fsinθ。多个力分别投影后，F合ₓ=ΣFₓ、F合ᵧ=ΣFᵧ，再合成。这是解多力问题的万能法。」 预设回答：「每个力投到x、y轴，分别相加再合。」 板书时机：黑板写正交分解步骤。差异化提示：B班练两力；A班加三力以上。易错点提醒：建轴方向任意但要方便；投影带符号（与轴反向为负）。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「互成90°的F₁=3N、F₂=4N，合力多大方向？」 预设回答：「5N，与F₁夹角arctan(4/3)！」 板书时机：板书。差异化提示：B班算；A班补正交分解步骤。易错点提醒：第3章结束，下章进牛顿运动定律。"}],"blackboard":"┌── 合成与分解 ──┐\n│ 矢量:平行四边形│\n│ 合力=对角线   │\n│ 分解按效果   │\n│ 斜面:G₁=Gsinθ│\n│ G₂=Gcosθ    │\n│ 正交:Fx=Fcos │\n│ Fy=Fsin     │\n└──────────────┘","exercises":"【基础作业】1. 力的合成遵循____定则。2. 斜面重力下滑分力____，垂直分力____。\n【提高作业】质量m=2kg物体放θ=30°斜面（g=10），求两分力。\n【参考答案——教师用】基础1：平行四边形。基础2：Gsinθ、Gcosθ。提高：G=20N，G₁=10N，G₂=10√3≈17.3N。","reflection":"✅ 亮点：橡皮筋等效实验让矢量性直观；斜面效果分解直击高考高频。\n⚠️ 需改进：B班建正交轴常投错符号，需逐步板书示范。\n📌 下节课衔接：牛顿定律用合力求加速度。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b1-u4-1","lessonId":"l-phy-b1-u4-1","title":"牛顿第一定律","book":"必修第一册","unitNumber":4,"unitTitle":"牛顿运动定律","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学态度与责任"],"tags":["牛顿第一定律","惯性","伽利略","人教版必修一Ch4","第一课时"],"textbookAnalysis":"牛顿第一定律（惯性定律）：一切物体总保持匀速直线运动或静止状态，直到外力迫使它改变。揭示惯性是物体固有属性，质量量度惯性大小。驳斥「力是维持运动的原因」的亚里士多德观点。","overview":"【学情分析】A班：能理解惯性大小由质量决定、与速度无关；B班：直觉认为「力维持运动」「速度大惯性大」；惯性与质量关系混淆。共同问题：运动不需要力维持，力是改变运动状态的原因；惯性只与质量有关。","objectives":["物理观念：理解牛顿第一定律，知道运动不需要力维持，力是改变运动状态的原因。","科学思维：通过伽利略理想实验体会科学推理，理解惯性与质量的关系。","科学探究：通过冰面、气垫等低摩擦情境观察「撤力后近似匀速」。","科学态度与责任：学习伽利略敢于质疑权威、理想实验的科学方法。"],"keyPoints":"① 第一定律：物体总保持匀速或静止，直到外力改变。\n② 力是改变运动状态的原因（不是维持）。\n③ 惯性：物体保持原状态的属性，只由质量决定。\n④ 质量大→惯性大，与速度无关。","difficulties":"① 力非维持。原因：生活直觉强（推才动），需理想实验破。\n② 惯性≠速度。原因：以为快则难停是「惯性大」，需强调质量决定。\n③ 理想实验。原因：抽象，需斜面推理铺垫。","teachingMethods":"① 伽利略理想实验（斜面推理）。\n② 冰面/气垫演示。\n③ 惯性现象举例（急刹）。\n④ 反例辨析。","preparation":"【PPT课件】P1 亚里士多德vs伽利略；P2 理想实验；P3 第一定律表述；P4 惯性；P5 质量决定惯性；P6 练习。\n【实验器材】气垫导轨（或光滑冰面视频）、小球。\n【音频】无。","process":[{"step":"Step 1 导入——运动需要力维持吗","time":"5分钟","content":"【PPT P1 之争】教师：「亚里士多德认为「力是维持运动的原因」——推桌球它才动，不推就停。但这是摩擦在作怪。伽利略指出：若无阻力，运动将永远继续。」 预设回答：「可能是阻力让它停，不是没力维持不了。」 板书时机：黑板写课题「牛顿第一定律」。差异化提示：B班说直觉；A班需提伽利略。易错点提醒：日常「不推就停」是阻力所致，非运动需力维持。"},{"step":"Step 2 理想实验","time":"10分钟","content":"【PPT P2 理想】教师：「斜面实验：小球从左侧滚下，右坡越缓滚得越远；若右坡水平无摩擦，将永远匀速。这是推理（理想实验），无法实测但逻辑严密。」 预设回答：「阻力越小滑越远，没阻力就一直匀速。」 板书时机：黑板画斜面推理链。差异化提示：B班看图；A班需说「推理非实测」。易错点提醒：理想实验是逻辑推理+事实基础，是科学方法而非纯假想。"},{"step":"Step 3 第一定律","time":"8分钟","content":"【PPT P3 表述】教师：「牛顿第一定律：一切物体总保持匀速直线运动或静止状态，直到外力迫使它改变。即力是改变运动状态（速度）的原因。」 预设回答：「物体不受力就保持原运动状态，力用来改变运动。」 板书时机：黑板写定律原文要点。差异化提示：B班背要点；A班需说「改变速度」。易错点提醒：改变运动状态=改变速度（大小或方向）；匀速圆周也需力（方向在变）。"},{"step":"Step 4 惯性","time":"8分钟","content":"【PPT P4 惯性】教师：「惯性是一切物体保持原运动状态的固有属性，任何物体、任何状态都有。它是物体「懒得变」的本性。」 预设回答：「惯性是物体保持原来状态的本性，天生就有。」 板书时机：黑板写「惯性：固有属性」。差异化提示：B班记；A班需说「任何物体」。易错点提醒：惯性不是力，不能说「受到惯性力」；是属性不是作用。"},{"step":"Step 5 质量决定惯性","time":"8分钟","content":"【PPT P5 质量】教师：「惯性大小只由质量决定：质量大更难改变运动状态（大卡车比自行车难停）。与速度无关——快的车不是惯性大，是动能大、停下需更长距离。」 预设回答：「惯性看质量，不看得快慢。」 板书时机：黑板写「惯性∝质量」。差异化提示：B班记结论；A班需驳「速度快惯性大」。易错点提醒：惯性与速度无关；难停是因动量大/动能大，非惯性大。"},{"step":"Step 6 练习+作业","time":"6分钟","content":"【PPT P6 练习】教师：「急刹车人向前倾为何？太空舱中宇航员松手物体为何漂浮不动？」 预设回答：「上半身惯性保持前冲；太空近似不受力保持原状！」 板书时机：板书。差异化提示：B班答惯性；A班补太空例。易错点提醒：下节课学牛顿第二定律（力与加速度的定量关系）。"}],"blackboard":"┌── 第一定律 ──┐\n│ 不受力:保原态│\n│ 力=改运动原因│\n│ 惯性:固有属性│\n│ 只由质量定   │\n│ 非力!非速度!│\n└────────────┘","exercises":"【基础作业】1. 牛顿第一定律说明力是____的原因。2. 惯性大小由____决定。\n【提高作业】解释：为什么货车比轿车更难急停（从惯性角度）？\n【参考答案——教师用】基础1：改变运动状态。基础2：质量。提高：货车质量大、惯性大，相同制动力下速度变化更慢、刹车距离更长。","reflection":"✅ 亮点：伽利略理想实验链让「力非维持」被接受；质量决定惯性用卡车轿车对比直观。\n⚠️ 需改进：B班仍说「受到惯性力」，需反复纠正「惯性是属性不是力」。\n📌 下节课衔接：力与加速度的定量关系——第二定律。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b1-u4-2","lessonId":"l-phy-b1-u4-2","title":"牛顿第二定律","book":"必修第一册","unitNumber":4,"unitTitle":"牛顿运动定律","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学探究"],"tags":["牛顿第二定律","F=ma","控制变量","人教版必修一Ch4","第二课时"],"textbookAnalysis":"牛顿第二定律：物体加速度大小与合力成正比、与质量成反比，方向与合力方向相同，即F合=ma。通过控制变量实验（a∝F、a∝1/m）得出。强调瞬时性（a与F同时产生）、矢量性（a∥F合）。","overview":"【学情分析】A班：能熟练用F合=ma解题、理解矢量瞬时性；B班：背F=ma但忽略「合」字与方向，单位易错（a用m/s²、F用N）；控制变量思想弱。共同问题：F是合力；a方向与F合同向；单位必须国际制。","objectives":["物理观念：掌握牛顿第二定律F合=ma，理解a与合力成正比、与质量成反比。","科学思维：理解定律的矢量性（a与F合同向）与瞬时性。","科学探究：通过控制变量实验探究a与F、m的关系。","科学态度与责任：体会控制变量法与国际单位制在定量规律中的意义。"],"keyPoints":"① 定律：F合 = ma（a∝F合，a∝1/m）。\n② 矢量性：a方向与F合方向相同。\n③ 瞬时性：a与F合同时产生、同时变化。\n④ 单位：F用N、m用kg、a用m/s²（国际制）。","difficulties":"① F是合力。原因：易用单个力，需强调「合」。\n② 矢量方向。原因：忽略a∥F合，需示范建轴。\n③ 控制变量。原因：实验思想弱，需说明先保m变F再保F变m。","teachingMethods":"① 控制变量实验。\n② 公式推导（比例→等式）。\n③ 矢量建轴示范。\n④ 典型例题。","preparation":"【PPT课件】P1 定量关系；P2 控制变量实验；P3 a∝F、a∝1/m；P4 F合=ma；P5 矢量瞬时；P6 练习。\n【实验器材】小车、砝码、滑轮、打点计时器（或传感器）。\n【音频】无。","process":[{"step":"Step 1 导入——a由什么决定","time":"5分钟","content":"【PPT P1 关系】教师：「同一力推空车比满载加速快（质量小a大）；同车用力越大加速越快。a由力和质量共同决定。今天找定量关系。」 预设回答：「a跟力成正比、跟质量成反比。」 板书时机：黑板写课题「牛顿第二定律」。差异化提示：B班举推车；A班需说两因素。易错点提醒：a由合力与质量决定，二者缺一不可。"},{"step":"Step 2 控制变量","time":"9分钟","content":"【PPT P2 控制】教师：「控制变量法：质量不变，改变力测a→得a∝F；力不变，改变质量测a→得a∝1/m。两次实验分开变量。」 预设回答：「一次保质量变力，一次保力变质量。」 板书时机：黑板写「控制变量」。差异化提示：B班记方法；A班需说为何要控制。易错点提醒：必须控制一个量不变才能单独看另一个的影响。"},{"step":"Step 3 比例关系","time":"9分钟","content":"【PPT P3 比例】教师：「实验得a∝F（m定）、a∝1/m（F定），合并a∝F/m，引入比例系数k得F=kma。选国际制使k=1，即F=ma。」 预设回答：「合起来a∝F/m，定单位后F=ma。」 板书时机：黑板写a∝F/m→F=ma。差异化提示：B班记结果；A班需说k=1来历。易错点提醒：k=1依赖国际单位制；若用其他单位k≠1。"},{"step":"Step 4 F合=ma","time":"8分钟","content":"【PPT P4 定律】教师：「牛顿第二定律：F合=ma。注意F合是合力，a由合力产生，不是某个分力。」 预设回答：「加速度由合力决定，F要写合力。」 板书时机：黑板写F合=ma并圈「合」。差异化提示：B班记；A班需举「多力中只算合」例。易错点提醒：必须先用合成求F合再代入；常见错把某个力当F。"},{"step":"Step 5 矢量瞬时","time":"9分钟","content":"【PPT P5 矢量】教师：「矢量性：a方向与F合同向，建轴后Fx=max、Fy=may分别成立。瞬时性：力变加速度立即变，撤力a立即为0（速度不立即为0）。」 预设回答：「a跟着合力走，方向一样，力撤a立刻没但速度还在。」 板书时机：黑板写分量式。差异化提示：B班记方向；A班需说瞬时性。易错点提醒：撤力后a=0但v不变（匀速），别误以为同时停。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「m=2kg受F合=10N，a多大？若力反向a如何？」 预设回答：「a=5m/s²；反向则a=-5m/s²（反方向加速）！」 板书时机：板书。差异化提示：B班算；A班补反向。易错点提醒：下节课学牛顿第三定律（作用力反作用力）。"}],"blackboard":"┌── F合=ma ──┐\n│ a∝F合      │\n│ a∝1/m      │\n│ F合=ma     │\n│ a∥F合(矢量)│\n│ 瞬时:力变a变│\n│ 国际制k=1  │\n└────────────┘","exercises":"【基础作业】1. 牛顿第二定律表达式____，F表示____。2. a的方向与____相同。\n【提高作业】质量4kg物体受合力12N，求加速度；若合力减为6N方向不变，a变多少？\n【参考答案——教师用】基础1：F合=ma、合力。基础2：合力方向。提高：a=12/4=3m/s²；a=6/4=1.5m/s²。","reflection":"✅ 亮点：控制变量实验铺垫让F=ma可信；矢量分量式Fx=max降低建轴难度。\n⚠️ 需改进：B班仍把单个力当F，需红字「合力」反复强调。\n📌 下节课衔接：作用力与反作用力的关系。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b1-u4-3","lessonId":"l-phy-b1-u4-3","title":"牛顿第三定律","book":"必修第一册","unitNumber":4,"unitTitle":"牛顿运动定律","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["牛顿第三定律","作用力","反作用力","人教版必修一Ch4","第三课时"],"textbookAnalysis":"牛顿第三定律：两物体间的作用力与反作用力总是大小相等、方向相反、作用在同一直线上。它们同时产生同时消失、同种性质、作用在不同物体上。区别于一对平衡力（作用在同一物体、可不同性质、未必同时消失）。","overview":"【学情分析】A班：能区分作用力反作用力与平衡力；B班：常把「等大反向」误判为平衡力，忽略「作用在不同物体」；拔河谁赢的误区。共同问题：作用反作用作用在不同物体不能抵消；拔河胜负看地面摩擦。","objectives":["物理观念：理解牛顿第三定律，知道作用力与反作用力等大反向共线。","科学思维：区分作用力反作用力与一对平衡力（是否同体）。","科学探究：通过弹簧测力计对拉实验验证F与F′同时等大。","科学态度与责任：用定律破除「大力胜小力」等直觉误区。"],"keyPoints":"① 第三定律：F = -F′（等大、反向、共线）。\n② 特点：同时产生消失、同种性质、作用在不同物体。\n③ 与平衡力区别：平衡力作用在同一物体。\n④ 不能相互抵消（因不同体）。","difficulties":"① 不同物体。原因：易与平衡力混，需强调「作用在两物体」。\n② 拔河误区。原因：以为赢家力大，实际双方互推等大、胜负看摩擦，需破。\n③ 同时性。原因：易认为有先后，需实验显示同时。","teachingMethods":"① 弹簧测力计对拉实验。\n② 对比表（作用反作用vs平衡力）。\n③ 拔河辨析。\n④ 反例演示。","preparation":"【PPT课件】P1 相互力；P2 对拉实验；P3 第三定律；P4 与平衡力对比；P5 拔河辨析；P6 练习。\n【实验器材】两只弹簧测力计（对拉）、小车。\n【音频】无。","process":[{"step":"Step 1 导入——你推墙墙推你","time":"5分钟","content":"【PPT P1 相互】教师：「手压墙，墙也压手（压红）；人推船自己后退。力总是成对的——甲对乙施力，乙也对甲施力。」 预设回答：「力是相互的，有作用就有反作用。」 板书时机：黑板写课题「牛顿第三定律」。差异化提示：B班举压墙；A班需说成对。易错点提醒：单个力不存在，力必成对出现于两物体间。"},{"step":"Step 2 对拉实验","time":"9分钟","content":"【PPT P2 实验】教师：「两只弹簧测力计互拉，读数总相等；无论谁主动、快慢如何，两示数始终一样且同时变化。说明作用力反作用力等大。」 预设回答：「对拉时两表读数一样大，同时变。」 板书时机：黑板写「F = -F′」。差异化提示：B班读表；A班需说「同时」。易错点提醒：等大不因谁主动而改变；无先后之分。"},{"step":"Step 3 第三定律","time":"8分钟","content":"【PPT P3 定律】教师：「牛顿第三定律：两物体间的作用力与反作用力总是大小相等、方向相反、作用在同一直线。它们同时产生消失、同种性质、作用在不同物体。」 预设回答：「等大反向共线，同时同种性，作用两物体。」 板书时机：黑板写定律三要点。差异化提示：B班背；A班需逐条。易错点提醒：性质相同（弹对弹、引对引）；作用不同物体故不能合成抵消。"},{"step":"Step 4 与平衡力对比","time":"10分钟","content":"【PPT P4 对比】教师：「平衡力：等大反向共线但作用在同一物体，可不同性质、可单独存在。作用反作用：作用在不同物体，必同种、必同时。桌子上的书，重力与支持力是平衡力（同体）；书对桌压力与桌对书支持力是作用反作用（异体）。」 预设回答：「同体是平衡力，异体是作用反作用。」 板书时机：黑板画对比表。差异化提示：B班记判据；A班需举书本例。易错点提醒：判据核心是「是否作用在同一物体」；别把书重力和书压力当作用反作用（它们不同体且不同性质大小也未必等）。"},{"step":"Step 5 拔河辨析","time":"8分钟","content":"【PPT P5 拔河】教师：「拔河双方互拉，力等大。谁赢看谁受地面最大静摩擦大——赢家被拉动是因为对方先被拉动，不是因为「力更大」。」 预设回答：「两人拉力一样大，胜负看脚底摩擦谁大。」 板书时机：黑板写「胜负在摩擦」。差异化提示：B班听；A班需分析受力。易错点提醒：不要误以为赢家施力更大；双方相互作用力必等大。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「鸡蛋碰石头，鸡蛋碎是因为石头力更大吗？书静止时重力与压力是作用反作用吗？」 预设回答：「力等大，碎因鸡蛋承受弱；不是，书重与支持力才是平衡力！」 板书时机：板书。差异化提示：B班答；A班补完整说理。易错点提醒：必修一全部四章结束，进入必修二曲线运动。"}],"blackboard":"┌── 第三定律 ──┐\n│ F=-F′      │\n│ 等大反向共线│\n│ 异体!同时  │\n│ 同种性质   │\n│ vs平衡力:  │\n│ 平衡力同体 │\n│ 拔河看摩擦 │\n└────────────┘","exercises":"【基础作业】1. 牛顿第三定律：作用力与反作用力____、____、____。2. 与平衡力最本质区别是____。\n【提高作业】人用10N推墙，墙对人的力多大？这二力是平衡力吗？\n【参考答案——教师用】基础1：大小相等、方向相反、作用在同一直线。基础2：是否作用在同一物体（作用反作用异体）。提高：墙对人10N（等大）；不是平衡力（作用在不同物体）。","reflection":"✅ 亮点：对拉实验两表同数破除「主动者力大」；书本例把平衡力与作用反作用区分彻底。\n⚠️ 需改进：B班仍易把书重力和书压力当作用反作用，需反复用「同体判据」。\n📌 下节课衔接：必修二将用合力分析曲线运动。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b2-u1-1","lessonId":"l-phy-b2-u1-1","title":"曲线运动","book":"必修第二册","unitNumber":1,"unitTitle":"曲线运动","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["曲线运动","速度方向","运动条件","人教版必修二Ch1","第一课时"],"textbookAnalysis":"曲线运动中速度方向沿轨迹切线方向（由砂轮火星、旋转雨伞水滴证实）。物体做曲线运动的条件：合力（加速度）与速度方向不在同一直线。曲线运动中速度方向时刻改变，必有加速度。","overview":"【学情分析】A班：能由条件判断做直线还是曲线运动、分析合力方向；B班：误以为曲线运动合力必指向曲线内侧凹侧不懂、速度方向说成「沿轨迹」；条件判断弱。共同问题：速度方向沿切线；做曲线运动条件是合力与速度不共线。","objectives":["物理观念：知道曲线运动速度方向沿轨迹切线，必有加速度。","科学思维：由合力与速度是否共线判断做直线或曲线运动。","科学探究：通过砂轮火星、旋转雨伞实验观察速度方向。","科学态度与责任：养成用实验事实支撑运动学判断的习惯。"],"keyPoints":"① 速度方向：沿轨迹切线方向（时刻改变）。\n② 曲线运动必有加速度（速度方向变）。\n③ 条件：合力（加速度）与速度不共线。\n④ 合力指向曲线凹侧。","difficulties":"① 速度方向。原因：易说「沿轨迹」，需强调「切线」。\n② 条件判断。原因：与共线的直线运动混淆，需建轴分析。\n③ 合力指向。原因：不懂指向凹侧，需演示。","teachingMethods":"① 砂轮/雨伞实验。\n② 切线作图。\n③ 条件判定训练。\n④ 受力分析演示。","preparation":"【PPT课件】P1 曲线运动实例；P2 速度方向切线；P3 实验证实；P4 曲线条件；P5 合力指向凹侧；P6 练习。\n【实验器材】旋转雨伞（或砂轮视频）、红笔轨迹。\n【音频】无。","process":[{"step":"Step 1 导入——轨迹是弯的","time":"5分钟","content":"【PPT P1 实例】教师：「抛出的球、转弯的汽车、圆周运动，轨迹都是曲线。曲线运动和直线有何不同？关键在速度方向。」 预设回答：「曲线运动的路线是弯的，方向一直在变。」 板书时机：黑板写课题「曲线运动」。差异化提示：B班举抛球；A班需说方向变。易错点提醒：曲线运动速度大小可不变（匀速圆周）但方向必变。"},{"step":"Step 2 速度方向","time":"9分钟","content":"【PPT P2 切线】教师：「某点速度方向就是轨迹在该点的切线方向。有限位移趋近零时，平均速度方向趋近切线方向。」 预设回答：「速度沿着轨迹的切线指向前方。」 板书时机：黑板画曲线并标切线。差异化提示：B班记结论；A班需说极限思想。易错点提醒：是「切线」不是「轨迹线」；指向运动前方。"},{"step":"Step 3 实验证实","time":"9分钟","content":"【PPT P3 实验】教师：「旋转雨伞水滴沿切线飞出；砂轮火花沿切线射出——都证明速度方向沿切线。这是实验事实。」 预设回答：「水滴和火花都沿切线飞，证明速度沿切线。」 板书时机：黑板写「实验：切线飞出」。差异化提示：B班看视频；A班需联理论。易错点提醒：实验观察的是瞬时脱离后的方向，即该点切线。"},{"step":"Step 4 曲线条件","time":"10分钟","content":"【PPT P4 条件】教师：「做曲线运动的条件：合力（加速度）与速度方向不在同一直线。若共线则直线（同向加速、反向减速）。」 预设回答：「力和速度不在一条线才走曲线。」 板书时机：黑板写「条件：F与v不共线」。差异化提示：B班记条件；A班需分同向反向。易错点提醒：判断看「是否共线」，不是看力大小；垂直时弯得最厉害。"},{"step":"Step 5 合力指向","time":"7分钟","content":"【PPT P5 凹侧】教师：「曲线运动合力总指向轨迹凹侧（内侧），将速度拉向该侧。平抛中合力（重力）竖直向下，轨迹向下弯。」 预设回答：「力指向弯的那一边，把运动拉过去。」 板书时机：黑板画凹侧箭头。差异化提示：B班看图；A班需说平抛例。易错点提醒：合力指向凹侧而非速度方向；这正是加速度方向。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「水平抛出的小球受重力，其运动轨迹向哪弯？速度方向如何？」 预设回答：「向下弯，速度沿切线且逐渐下倾！」 板书时机：板书。差异化提示：B班答；A班补「为何加速」。易错点提醒：下节课学运动的合成与分解（处理曲线的方法）。"}],"blackboard":"┌── 曲线运动 ──┐\n│ v沿切线方向  │\n│ 方向时刻变   │\n│ 必有加速度   │\n│ 条件:F与v不共│\n│ 线          │\n│ F指向凹侧   │\n└────────────┘","exercises":"【基础作业】1. 曲线运动速度方向沿____。2. 做曲线运动的条件____。\n【提高作业】物体受恒力F且与初速垂直，运动轨迹大致如何？\n【参考答案——教师用】基础1：轨迹切线。基础2：合力与速度不共线。提高：轨迹向F方向弯曲（抛物线一侧），因力恒指向一侧使速度持续偏转。","reflection":"✅ 亮点：雨伞/砂轮实验让速度沿切线成为「眼见为实」；条件判断用共线/不共线清晰。\n⚠️ 需改进：B班对「合力指向凹侧」仍抽象，需多画不同曲线。\n📌 下节课衔接：把曲线运动分解为两个直线运动处理。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b2-u1-2","lessonId":"l-phy-b2-u1-2","title":"运动的合成与分解","book":"必修第二册","unitNumber":1,"unitTitle":"曲线运动","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["运动合成","运动分解","独立性","人教版必修二Ch1","第二课时"],"textbookAnalysis":"复杂运动可看作几个简单分运动的合运动。位移、速度、加速度都是矢量，遵循平行四边形定则。各分运动具有独立性（互不干扰）与等时性（同时发生）。用红蜡块实验说明。","overview":"【学情分析】A班：能熟练将运动正交分解为x、y独立处理；B班：不懂独立性、混淆合速度与分速度；红蜡块实验原理不清。共同问题：分运动独立且等时；合运动是各分运动的矢量和。","objectives":["物理观念：理解运动的合成与分解遵循平行四边形定则（矢量）。","科学思维：能将复杂曲线运动分解为两个独立直线分运动。","科学探究：通过红蜡块实验（玻璃管）观察合运动与分运动关系。","科学态度与责任：体会化繁为简（分解）的物理学方法。"],"keyPoints":"① 合运动=各分运动的矢量和（平行四边形）。\n② 独立性：各分运动互不影响。\n③ 等时性：合与分同时发生。\n④ 常用：正交分解（x、y独立）。","difficulties":"① 矢量合成。原因：位移速度都矢量，易标量加，需强调定则。\n② 独立性。原因：不懂y方向不受x影响，需实验。\n③ 等时性。原因：易分别计时，需点明同时。","teachingMethods":"① 红蜡块实验（玻璃管）。\n② 平行四边形合成。\n③ 正交分解示范。\n④ 独立性讨论。","preparation":"【PPT课件】P1 复杂运动；P2 红蜡块实验；P3 矢量合成；P4 独立性等时性；P5 正交分解；P6 练习。\n【实验器材】红蜡块、玻璃管、水。\n【音频】无。","process":[{"step":"Step 1 导入——一个运动像两个叠加","time":"5分钟","content":"【PPT P1 复杂】教师：「渡河时船既向前又随水漂——实际运动是「对水前进」与「随水漂流」两个运动的合。复杂运动可分解为简单分运动。」 预设回答：「实际运动是几个分运动叠起来的。」 板书时机：黑板写「合成与分解」。差异化提示：B班举渡河；A班需说叠加。易错点提醒：合运动是真实发生的；分运动是为研究虚构的。"},{"step":"Step 2 红蜡块实验","time":"9分钟","content":"【PPT P2 实验】教师：「玻璃管中红蜡块匀速上升（y向），管同时匀速右移（x向），蜡块实际走斜线。斜线即合运动，两方向为分运动。」 预设回答：「蜡块又升又移，实际走斜线，是两个分运动合成。」 板书时机：黑板画玻璃管两视角。差异化提示：B班看动画；A班需说「合轨迹」。易错点提醒：合运动轨迹是蜡块实际路径（斜直线），非两分运动轨迹拼。"},{"step":"Step 3 矢量合成","time":"9分钟","content":"【PPT P3 合成】教师：「位移、速度、加速度都是矢量，合运动由各分运动矢量合成（平行四边形）。v合=√(vx²+vy²)，方向与x轴夹角tanθ=vy/vx。」 预设回答：「合速度用平行四边形算，大小和方向都定。」 板书时机：黑板写矢量合成式。差异化提示：B班算大小；A班需说方向。易错点提醒：矢量和不是简单相加；方向由两分量比值定。"},{"step":"Step 4 独立等时","time":"9分钟","content":"【PPT P4 性质】教师：「各分运动互不干扰（独立性：x方向如何不影响y）；合与分同时开始同时结束（等时性）。这是分解求解的根据。」 预设回答：「两个方向各管各的，但用同一段时间。」 板书时机：黑板写「独立+等时」。差异化提示：B班记；A班需举例。易错点提醒：独立性指动力学互不影响；时间一定相同，可分别列方程再联立。"},{"step":"Step 5 正交分解","time":"8分钟","content":"【PPT P5 正交】教师：「把运动分解为互相垂直x、y两方向，各自按直线运动规律独立计算，再合成得实际运动。这是处理曲线运动的标准法。」 预设回答：「建x、y轴分别算，再合起来。」 板书时机：黑板写分解步骤。差异化提示：B班练一例；A班加斜抛预演。易错点提醒：建轴要方便；两方向时间相等是联立桥梁。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「蜡块vy=2cm/s、管vx=3cm/s，求合速度大小方向。」 预设回答：「v=√13≈3.6cm/s，θ=arctan(2/3)！」 板书时机：板书。差异化提示：B班算；A班补角度。易错点提醒：下节课用此法研究平抛运动。"}],"blackboard":"┌── 合成分解 ──┐\n│ 矢量:平行四边│\n│ v合=√(vx²+vy²)│\n│ 独立:互不影响│\n│ 等时:同时发生│\n│ 正交:x/y分算│\n└────────────┘","exercises":"【基础作业】1. 运动的合成遵循____定则。2. 分运动的____性和____性是分解依据。\n【提高作业】红蜡块上升2cm/s、管右移4cm/s，合速度大小？\n【参考答案——教师用】基础1：平行四边形。基础2：独立性、等时性。提高：v=√(4+16)=√20≈4.47cm/s。","reflection":"✅ 亮点：红蜡块实验把「合与分」可视化；独立+等时作为解题依据讲清。\n⚠️ 需改进：B班常把两个分速度标量相加，需反复矢量化。\n📌 下节课衔接：平抛=水平匀速+竖直自由落体的合成。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b2-u1-3","lessonId":"l-phy-b2-u1-3","title":"平抛运动","book":"必修第二册","unitNumber":1,"unitTitle":"曲线运动","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["平抛运动","正交分解","轨迹","人教版必修二Ch1","第三课时"],"textbookAnalysis":"平抛运动：初速度水平、只受重力的匀变速曲线运动。分解为水平匀速（x=v₀t）与竖直自由落体（y=½gt²）。轨迹为抛物线；落地时间由高度定t=√(2h/g)，水平射程x=v₀t。","overview":"【学情分析】A班：能独立推导轨迹方程、射程、落地时间并灵活应用；B班：能套公式但分不清水平/竖直；落地时间误与v₀有关；轨迹形状不清。共同问题：水平与竖直独立；t由高度定与v₀无关；轨迹是抛物线。","objectives":["物理观念：掌握平抛运动规律（水平匀速+竖直自由落体）。","科学思维：用正交分解推导轨迹、落地时间、水平射程。","科学探究：通过描迹实验（频闪/数码）验证平抛两分运动。","科学态度与责任：体会「化曲为直」的分解策略价值。"],"keyPoints":"① 分解：水平x=v₀t（匀速），竖直y=½gt²（自由落体）。\n② 落地时间：t=√(2h/g)，只由高度定。\n③ 水平射程：x=v₀√(2h/g)。\n④ 轨迹：y=gx²/(2v₀²)，抛物线。","difficulties":"① 时间由高度定。原因：直觉以为v₀大落得慢，需强调竖直独立。\n② 轨迹方程。原因：消t得抛物线，代数易错，需示范。\n③ 两方向独立。原因：易混速度分量，需分解图。","teachingMethods":"① 正交分解推导。\n② 频闪描迹实验。\n③ 轨迹方程推导。\n④ 射程讨论。","preparation":"【PPT课件】P1 平抛特点；P2 两分运动；P3 落地时间；P4 轨迹方程；P5 射程；P6 练习。\n【实验器材】平抛演示仪、频闪照片。\n【音频】无。","process":[{"step":"Step 1 导入——水平抛出只受重力","time":"5分钟","content":"【PPT P1 平抛】教师：「把物体水平抛出，初速水平、之后只受重力——这叫平抛运动。它是匀变速曲线运动（a=g向下）。」 预设回答：「水平扔出、只受重力，加速度竖直向下。」 板书时机：黑板写「平抛：v₀水平、只受G」。差异化提示：B班记特点；A班需说匀变速。易错点提醒：平抛加速度恒为g，是匀变速（但速度方向变故为曲线）。"},{"step":"Step 2 两分运动","time":"10分钟","content":"【PPT P2 分解】教师：「分解：水平方向不受力→匀速x=v₀t；竖直方向初速0、受g→自由落体y=½gt²。两方向独立等时。」 预设回答：「水平匀速、竖直自由落体，时间相同。」 板书时机：黑板写两式。差异化提示：B班记两式；A班需说独立等时。易错点提醒：水平速度始终v₀不变（不受力）；竖直按自由落体。"},{"step":"Step 3 落地时间","time":"8分钟","content":"【PPT P3 时间】教师：「落地由竖直高度决定：y=h=½gt²→t=√(2h/g)。高度相同，无论v₀多大，落地时间一样（如两球同高同落）。」 预设回答：「落地时间只看高度，和初速无关！」 板书时机：黑板写t=√(2h/g)。差异化提示：B班记式；A班需举等时例。易错点提醒：v₀只影响水平距离不影响落地时间；别被「扔得猛」误导。"},{"step":"Step 4 轨迹方程","time":"9分钟","content":"【PPT P4 轨迹】教师：「消去t：t=x/v₀代入y=½gt²得y=gx²/(2v₀²)，是开口向下的抛物线。频闪照片点迹正落在此抛物线上。」 预设回答：「消去时间得到抛物线，实验点迹吻合。」 板书时机：黑板写轨迹方程。差异化提示：B班记结论；A班需演示消元。易错点提醒：轨迹是抛物线；频闪相邻点水平等距、竖直间距递增。"},{"step":"Step 5 水平射程","time":"8分钟","content":"【PPT P5 射程】教师：「水平射程x=v₀·t=v₀√(2h/g)。要提高射程：增大v₀或提高抛出高度h。射击/投弹都基于此。」 预设回答：「射程=初速乘落地时间，调v₀或高度。」 板书时机：黑板写射程式。差异化提示：B班记；A班需说「飞机投弹提前量」。易错点提醒：射程由v₀和高度共同定；投弹要在目标前方水平距离处释放。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「h=5m（g=10）、v₀=10m/s，求落地时间与射程。」 预设回答：「t=1s，射程10m！」 板书时机：板书。差异化提示：B班算；A班补轨迹方程。易错点提醒：下节课学圆周运动（另一类曲线）。"}],"blackboard":"┌── 平抛 ──┐\n│ x=v₀t      │\n│ y=½gt²     │\n│ t=√(2h/g)  │\n│ 射程=v₀t   │\n│ 轨迹:抛物线│\n└────────────┘","exercises":"【基础作业】1. 平抛的水平分运动____，竖直分运动____。2. 落地时间由____决定。\n【提高作业】从20m高以15m/s水平抛出，求落地时间、水平射程（g=10）。\n【参考答案——教师用】基础1：匀速直线运动、自由落体运动。基础2：抛出高度。提高：t=√(40/10)=2s，射程=15×2=30m。","reflection":"✅ 亮点：落地时间只由高度定用「同高同落」破除直觉；轨迹方程与频闪吻合增强信服。\n⚠️ 需改进：B班投弹提前量仍难，需画飞机水平位移图。\n📌 下节课衔接：圆周运动——速度方向变、合力指向圆心。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b2-u1-4","lessonId":"l-phy-b2-u1-4","title":"匀速圆周运动","book":"必修第二册","unitNumber":1,"unitTitle":"曲线运动","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["匀速圆周运动","角速度","向心力","向心加速度","人教版必修二Ch1","第四课时"],"textbookAnalysis":"匀速圆周运动：速率不变、速度方向变，是变加速曲线运动。描述量：线速度v=2πr/T、角速度ω=2π/T、周期T、频率f，且v=ωr。向心加速度a=v²/r=ω²r指向圆心。向心力F=mv²/r= mω²r，由合力提供，只改变速度方向。","overview":"【学情分析】A班：能熟练换算v/ω/T、用向心力公式分析临界；B班：混淆周期频率、向心加速度方向说成「切线」、以为向心力是额外力。共同问题：匀速圆周是变速运动（方向变）；向心力是效果力由合力提供、指向圆心；a与v垂直。","objectives":["物理观念：理解匀速圆周运动的描述量及关系v=ωr，知道其为变速曲线运动。","科学思维：掌握向心加速度与向心力公式，理解其方向指向圆心。","科学探究：通过圆周运动实验测量v、ω、T的关系。","科学态度与责任：正确认识「向心力是合力效果」而非独立新力。"],"keyPoints":"① 描述：v=2πr/T，ω=2π/T，v=ωr，T=1/f。\n② 向心加速度：a=v²/r=ω²r，指向圆心。\n③ 向心力：F=mv²/r=mω²r，由合力提供。\n④ 匀速圆周是变速运动（方向变），a与v垂直。","difficulties":"① v与ω混淆。原因：概念多，需列表对比v/ω/T/f。\n② 向心加速度方向。原因：易说切线，需强调指向圆心、只改方向。\n③ 向心力来源。原因：误以为新力，需说明由合力（重力/弹力/摩擦等）提供。","teachingMethods":"① 描述量对比表。\n② 圆周实验（转台/传感器）。\n③ 向心力来源分析。\n④ 公式推导。","preparation":"【PPT课件】P1 圆周描述量；P2 v/ω/T关系；P3 向心加速度；P4 向心力；P5 向心力来源；P6 练习。\n【实验器材】圆周运动演示器、手机角速度传感器。\n【音频】无。","process":[{"step":"Step 1 导入——快慢怎么描述","time":"5分钟","content":"【PPT P1 描述】教师：「匀速圆周运动速率不变但方向在变（仍是变速运动）。描述它用线速度v、角速度ω、周期T、频率f。」 预设回答：「用v、ω、T等描述，虽然叫匀速但其实方向在变。」 板书时机：黑板写「匀速圆周：变速曲线」。差异化提示：B班举转盘；A班需说变速。易错点提醒：「匀速」指速率不变；速度方向变故是变速、有加速度。"},{"step":"Step 2 描述量关系","time":"9分钟","content":"【PPT P2 关系】教师：「v=2πr/T（弧长/时间），ω=2π/T（角度/时间），且v=ωr。T是转一圈时间，f=1/T是每秒圈数。」 预设回答：「v=ωr把线速度和角速度连起来，T和f互为倒数。」 板书时机：黑板列四式。差异化提示：B班记式；A班需推v=ωr。易错点提醒：统一单位（ω用rad/s）；r是到圆心距离。"},{"step":"Step 3 向心加速度","time":"9分钟","content":"【PPT P3 向心a】教师：「速度方向在变，必有加速度，叫向心加速度a=v²/r=ω²r，方向时刻指向圆心，只改变速度方向不改变大小。」 预设回答：「向心加速度指向圆心，让方向转弯、速率不变。」 板书时机：黑板写a=v²/r。差异化提示：B班记式；A班需说方向意义。易错点提醒：a指向圆心不是切线；a越大转弯越急（r越小或v越大）。"},{"step":"Step 4 向心力","time":"9分钟","content":"【PPT P4 向心力】教师：「向心力F=ma=mv²/r=mω²r，方向指向圆心。它是效果力——由实际受到的合力（重力、弹力、摩擦力等）提供，不是额外的新力。」 预设回答：「向心力就是合力指向圆心的那份，不是又一个力。」 板书时机：黑板写F=mv²/r并圈「合力提供」。差异化提示：B班记式；A班需说「来源」。易错点提醒：受力分析时不画「向心力」；它由某几个真实力的合力充当。"},{"step":"Step 5 来源分析","time":"8分钟","content":"【PPT P5 来源】教师：「例：绳系小球在水平面匀速圆周——向心力由拉力（水平分量）提供；圆锥摆由重力和拉力合力提供。先受力分析再找指向圆心的合力。」 预设回答：「先分析真实受力，指向圆心的合力就是向心力。」 板书时机：黑板画受力图。差异化提示：B班做绳模型；A班做圆锥摆。易错点提醒：必须建指向圆心的径向；切向合力为0才是「匀速」圆周。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「r=0.5m、ω=2rad/s、m=1kg，求v与向心力。」 预设回答：「v=1m/s，F=1×1/0.5=2N！」 板书时机：板书。差异化提示：B班算；A班补单位换算。易错点提醒：下节课学生活中的圆周运动临界问题。"}],"blackboard":"┌── 圆周运动 ──┐\n│ v=ωr       │\n│ T=1/f      │\n│ a=v²/r(向心)│\n│ F=mv²/r    │\n│ 合力提供!  │\n│ a指向圆心  │\n└────────────┘","exercises":"【基础作业】1. 匀速圆周运动的向心加速度方向____，它____（填改变/不改变）速度大小。2. 向心力由____提供。\n【提高作业】质量0.5kg小球系绳长1m，在水平面以ω=3rad/s匀速转，求向心力。\n【参考答案——教师用】基础1：指向圆心、不改变。基础2：物体所受合力。提高：v=ωr=3，F=mv²/r=0.5×9/1=4.5N。","reflection":"✅ 亮点：明确「匀速=速率不变但变速」消除概念矛盾；向心力「由合力提供非新力」用受力图说清。\n⚠️ 需改进：B班易在受力图里多画一个向心力，需强调「只画真实力」。\n📌 下节课衔接：生活圆周（汽车转弯、竖直面临界）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b2-u2-1","lessonId":"l-phy-b2-u2-1","title":"行星的运动","book":"必修第二册","unitNumber":2,"unitTitle":"万有引力与航天","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学态度与责任"],"tags":["开普勒定律","椭圆轨道","人教版必修二Ch2","第一课时"],"textbookAnalysis":"开普勒三定律：①轨道定律——行星绕日沿椭圆，太阳在焦点；②面积定律——相等时间扫过相等面积（近日快远日慢）；③周期定律——a³/T²=k（半长轴三次方比周期平方为常数，k与中心天体有关）。","overview":"【学情分析】A班：能理解三定律并用周期定律比较行星；B班：混淆面积定律（以为速率不变）、椭圆焦点位置不清；k的含义不懂。共同问题：面积定律说明速率可变；k取决于中心天体不是行星。","objectives":["物理观念：掌握开普勒三定律，理解行星椭圆轨道运动。","科学思维：用面积定律判断行星速率变化，用周期定律比较轨道。","科学探究：通过分析第谷观测数据体会「数据→规律」的归纳。","科学态度与责任：学习开普勒继承第谷观测、不畏权威的科学精神。"],"keyPoints":"① 轨道：椭圆，太阳在焦点。\n② 面积：等时扫等面积（近日快远日慢）。\n③ 周期：a³/T²=k（k由中心天体定）。\n④ 近似：轨道近圆时a≈r，T²∝r³。","difficulties":"① 面积定律。原因：易以为匀速，需强调「等面积→速率变」。\n② k的含义。原因：误与行星有关，需说「只由中心天体定」。\n③ 椭圆焦点。原因：位置不清，需画图。","teachingMethods":"① 椭圆作图演示。\n② 面积扫过动画。\n③ 周期定律对比。\n④ 历史脉络讲述。","preparation":"【PPT课件】P1 地心说日心说；P2 椭圆轨道；P3 面积定律；P4 周期定律；P5 k的含义；P6 练习。\n【实验器材】细绳画椭圆演示。\n【音频】无。","process":[{"step":"Step 1 导入——谁绕谁转","time":"5分钟","content":"【PPT P1 学说】教师：「从托勒密地心说到哥白尼日心说，到第谷精确观测、开普勒据此发现行星运动三定律。观测数据是定律之母。」 预设回答：「先有观测数据，再总结出规律。」 板书时机：黑板写课题「行星的运动」。差异化提示：B班听故事；A班需联第谷数据。易错点提醒：定律来自对观测数据的归纳，不是纯思辨。"},{"step":"Step 2 椭圆轨道","time":"9分钟","content":"【PPT P2 椭圆】教师：「开普勒第一定律：行星轨道是椭圆，太阳位于其中一个焦点。地球轨道近圆（离心率小），但严格是椭圆。」 预设回答：「轨道是椭圆，太阳在焦点不在中心。」 板书时机：黑板画椭圆标焦点。差异化提示：B班记；A班需说离心率。易错点提醒：太阳在焦点；近地点/远地点到日距离不同。"},{"step":"Step 3 面积定律","time":"10分钟","content":"【PPT P3 面积】教师：「开普勒第二定律：行星与太阳连线在相等时间内扫过相等面积。近日点速率大、远日点速率小——并非匀速。」 预设回答：「靠近太阳时走得快，远离时慢，面积一样。」 板书时机：黑板画扫面扇形。差异化提示：B班记结论；A班需说速率变化。易错点提醒：面积相等≠速率相等；近日点最快。"},{"step":"Step 4 周期定律","time":"9分钟","content":"【PPT P4 周期】教师：「开普勒第三定律：a³/T²=k。a是半长轴，T是周期。k只由中心天体（太阳）决定，与行星无关。对圆轨道近似a≈r得r³/T²=k。」 预设回答：「半长轴三次方比周期平方是常数，由太阳决定。」 板书时机：黑板写a³/T²=k。差异化提示：B班记式；A班需说k含义。易错点提醒：k取决于中心天体；绕地球卫星的k与绕日行星的k不同。"},{"step":"Step 5 k的含义","time":"7分钟","content":"【PPT P5 k含义】教师：「同一中心天体下的所有行星（或卫星）共享同一个k。所以比较绕同一恒星的行星，a越大T越长。换中心天体k就变。」 预设回答：「同一个中心天体k相同，所以能横向比较。」 板书时机：黑板写「k∝中心天体质量」。差异化提示：B班记；A班需说「换中心天体」。易错点提醒：不能把绕日k用于绕地卫星；k与中心天体质量有关。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「两行星绕同恒星，a₁=1、a₂=8，T₁=1年，求T₂。」 预设回答：「T₂=T₁·(a₂/a₁)^1.5=1×8^1.5=22.6年！」 板书时机：板书。差异化提示：B班算；A班补推导。易错点提醒：下节课学万有引力定律（解释这些规律的根源）。"}],"blackboard":"┌── 开普勒 ──┐\n│ 轨道:椭圆   │\n│ 日居焦点    │\n│ 面积:等时等│\n│ 近日快远日慢│\n│ a³/T²=k    │\n│ k由中心天体定│\n└────────────┘","exercises":"【基础作业】1. 开普勒第一定律：行星轨道是____，太阳在____。2. 第三定律表达式____。\n【提高作业】行星A半长轴是B的2倍（同绕太阳），A周期是B的几倍？\n【参考答案——教师用】基础1：椭圆、焦点。基础2：a³/T²=k。提高：T_A/T_B=(a_A/a_B)^1.5=2^1.5≈2.83倍。","reflection":"✅ 亮点：面积定律用「近日快远日慢」破除匀速错觉；k取决于中心天体单独强调。\n⚠️ 需改进：B班对半长轴仍模糊，需多画椭圆标注a。\n📌 下节课衔接：万有引力定律定量解释开普勒定律。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b2-u2-2","lessonId":"l-phy-b2-u2-2","title":"万有引力定律","book":"必修第二册","unitNumber":2,"unitTitle":"万有引力与航天","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["万有引力定律","卡文迪许","引力常量","人教版必修二Ch2","第二课时"],"textbookAnalysis":"牛顿提出万有引力定律：任意两质点间引力F=Gm₁m₂/r²，G为引力常量。万有引力是支配天体与地面上物体运动的同一规律（月球、苹果同理）。卡文迪许扭秤测出G，使万有引力可定量计算。","overview":"【学情分析】A班：能理解定律的普适性、用G计算，理解平方反比；B班：混淆r的含义（质心距）、认为天上地上引力不同；G单位与数量级不清。共同问题：F=Gm₁m₂/r²适用质点或球对称；r是两质心距离；天上地上同一规律。","objectives":["物理观念：掌握万有引力定律F=Gm₁m₂/r²及其普适性。","科学思维：理解平方反比关系与r的物理意义（质心距）。","科学探究：了解卡文迪许扭秤实验测G的思想。","科学态度与责任：体会「天上地上统一规律」的科学统一美。"],"keyPoints":"① 定律：F = G m₁m₂ / r²。\n② G≈6.67×10⁻¹¹ N·m²/kg²（卡文迪许测）。\n③ r：两质点（或球心）间距离。\n④ 普适：天体与地面物体同一引力规律。","difficulties":"① r的含义。原因：易用表面距离，需强调「质心/球心距」。\n② 普适性。原因：以为天上地上不同，需说同一公式。\n③ 平方反比。原因：r变大F剧减，需举例。","teachingMethods":"① 月地检验讲述。\n② 扭秤实验介绍。\n③ 公式应用。\n④ 平方反比演示。","preparation":"【PPT课件】P1 牛顿的猜想；P2 月地检验；P3 定律公式；P4 G与扭秤；P5 r的含义；P6 练习。\n【实验器材】扭秤原理图（或视频）。\n【音频】无。","process":[{"step":"Step 1 导入——苹果与月亮同因","time":"5分钟","content":"【PPT P1 猜想】教师：「苹果落地、月亮绕地，牛顿猜想是同一种力——万有引力。天上地上是否同一规律？要用「月地检验」验证。」 预设回答：「可能苹果和月亮受同一种引力。」 板书时机：黑板写课题「万有引力定律」。差异化提示：B班听猜想；A班需说检验思路。易错点提醒：核心是把地面重力外推到天体，需验证。"},{"step":"Step 2 月地检验","time":"9分钟","content":"【PPT P2 检验】教师：「若地面重力遵从平方反比外推到月球轨道，则月球向心加速度a=GM/r²应等于观测值。计算吻合——证实同一引力规律。」 预设回答：「算出来和观测的月球加速度一致，说明是同一种力。」 板书时机：黑板写a∝1/r²。差异化提示：B班听结论；A班需说比例。易错点提醒：检验关键是「平方反比」对得上观测。"},{"step":"Step 3 定律公式","time":"9分钟","content":"【PPT P3 公式】教师：「万有引力定律：F=G m₁m₂/r²。任意两质点间都存在，G是引力常量。对均匀球体r取两球心距。」 预设回答：「两物体间引力与质量乘积成正比、与距离平方成反比。」 板书时机：黑板写F=Gm₁m₂/r²。差异化提示：B班记式；A班需说适用条件。易错点提醒：仅严格适用于质点/球对称；r是质心距非表面距。"},{"step":"Step 4 G与扭秤","time":"9分钟","content":"【PPT P4 扭秤】教师：「卡文迪许用扭秤测出G≈6.67×10⁻¹¹ N·m²/kg²。G极小说明日常物体间引力微弱，但天体质量巨大故引力显著。」 预设回答：「G很小，所以只有大质量天体间引力才明显。」 板书时机：黑板写G数量级。差异化提示：B班记值；A班需说「为何小」。易错点提醒：G极小→人际引力可忽略；天体尺度不可忽略。"},{"step":"Step 5 r的含义","time":"8分钟","content":"【PPT P5 r】教师：「公式中的r是两质点（或均匀球心）间距离。地表附近r≈地球半径R；两球相距d时r=d+两半径。务必用质心距。」 预设回答：「r是两物体中心的距离，不是表面挨着的距离。」 板书时机：黑板画r标注。差异化提示：B班记；A班需画球体。易错点提醒：地球表面物体受引力r≈R；高空r=R+h。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「两质量各1000kg、相距1m，引力多大（G=6.67×10⁻¹¹）？」 预设回答：「F=6.67×10⁻¹¹×10⁶=6.67×10⁻⁵N，极小！」 板书时机：板书。差异化提示：B班算；A班补「地表重力对比」。易错点提醒：下节课学万有引力理论的成就（测天体质量）。"}],"blackboard":"┌── 万有引力 ──┐\n│ F=Gm₁m₂/r²  │\n│ G≈6.67e-11  │\n│ r=质心距    │\n│ 天上地上统一│\n│ 平方反比    │\n└────────────┘","exercises":"【基础作业】1. 万有引力定律表达式____，G叫____。2. 公式中的r指____。\n【提高作业】地球质量约6×10²⁴kg、半径6.4×10⁶m，估算地表g（G=6.7×10⁻¹¹）。\n【参考答案——教师用】基础1：F=Gm₁m₂/r²、引力常量。基础2：两质心距离。提高：g=GM/R²≈6.7e-11×6e24/(6.4e6)²≈9.8m/s²。","reflection":"✅ 亮点：月地检验把「苹果=月亮」从猜想到证实；G极小解释日常为何无感引力。\n⚠️ 需改进：B班对r用错（表面距），需红字「质心距」。\n📌 下节课衔接：用万有引力做向心力→算天体质量。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b2-u2-3","lessonId":"l-phy-b2-u2-3","title":"万有引力理论的成就","book":"必修第二册","unitNumber":2,"unitTitle":"万有引力与航天","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["天体质量","密度","海王星","人教版必修二Ch2","第三课时"],"textbookAnalysis":"将万有引力提供向心力：GMm/r²=mv²/r=mω²r=m(4π²/T²)r，可求中心天体质量M（已知卫星r、T等）。由此算地球质量、太阳质量；预测并发现海王星。也可由地表重力GMm/R²=mg求M。","overview":"【学情分析】A班：能灵活列方程求M、密度ρ；B班：不会「引力=向心力」列等式、混淆求中心体还是环绕体质量；R与r混。共同问题：只能求中心天体质量；用T或g两种途径；ρ=M/V。","objectives":["物理观念：会用「万有引力提供向心力」求中心天体质量，理解其应用。","科学思维：掌握由卫星周期或地表重力两种途径计算天体质量与密度。","科学探究：了解用万有引力理论预测海王星的过程。","科学态度与责任：体会理论预言并被观测证实的科学威力。"],"keyPoints":"① 引力=向心力：GMm/r²=m(4π²/T²)r→M=4π²r³/(GT²)。\n② 地表重力：GM/R²=g→M=gR²/G。\n③ 只能求中心天体质量（环绕体质量消去）。\n④ 密度ρ=M/(4πR³/3)。","difficulties":"① 等式建立。原因：不知「引力充当向心力」，需示范。\n② 谁的质量。原因：易求成卫星质量，需强调m约掉得中心体M。\n③ 两途径。原因：T途径与g途径混淆，需对比。","teachingMethods":"① 万有引力=向心力建模。\n② 两途径对比。\n③ 海王星史料。\n④ 密度计算。","preparation":"【PPT课件】P1 引力即向心力；P2 由T求M；P3 由g求M；P4 密度；P5 海王星；P6 练习。\n【实验器材】无（推导为主）。\n【音频】无。","process":[{"step":"Step 1 导入——能称太阳的质量吗","time":"5分钟","content":"【PPT P1 称量】教师：「没法把太阳放秤上，但卫星绕它转——由轨道就能反推太阳质量。这就是万有引力理论的成就。」 预设回答：「看卫星怎么转，就能算出中心天体质量。」 板书时机：黑板写课题。差异化提示：B班听；A班需说「反推」。易错点提醒：靠运动反推质量，是理论的力量。"},{"step":"Step 2 引力=向心力","time":"9分钟","content":"【PPT P2 等式】教师：「卫星绕中心体：万有引力提供向心力，GMm/r²=m(4π²/T²)r。两边m约掉，得M=4π²r³/(GT²)。可见只能求中心体M。」 预设回答：「引力当向心力，约掉卫星质量得到中心体质量。」 板书时机：黑板写M=4π²r³/(GT²)。差异化提示：B班记式；A班需说m约掉。易错点提醒：求的是中心天体质量；卫星质量m被约掉求不出。"},{"step":"Step 3 由g求M","time":"9分钟","content":"【PPT P3 由g】教师：「地表附近GMm/R²=mg，得M=gR²/G。这是测地球质量的「称量地球」法（卡文迪许后实现）。」 预设回答：「用地表重力也能算出地球质量。」 板书时机：黑板写M=gR²/G。差异化提示：B班记；A班需联上节G。易错点提醒：此处R是天体半径、g是表面重力加速度。"},{"step":"Step 4 密度","time":"9分钟","content":"【PPT P4 密度】教师：「已知M再求密度ρ=M/V，球体V=4πR³/3。若卫星近地（r≈R），ρ=3π/(GT²)（仅由周期定）。」 预设回答：「质量除以体积得密度，近地卫星只看周期。」 板书时机：黑板写ρ式。差异化提示：B班做计算；A班需推近地式。易错点提醒：近地时r≈R才得简洁式；否则用真实r。"},{"step":"Step 5 海王星","time":"8分钟","content":"【PPT P5 海王星】教师：「天王星轨道偏离理论，勒维耶预言外侧有未知行星（海王星）并算出处位置，伽勒观测证实——理论预言的胜利。」 预设回答：「先算出来再找到，万有引力太厉害了。」 板书时机：黑板写「预言→观测」。差异化提示：B班听史；A班需说方法。易错点提醒：这是「由偏差反推未知天体」的经典案例。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「近地卫星周期85min，估算地球平均密度（G=6.7×10⁻¹¹）。」 预设回答：「ρ=3π/(GT²)≈5500kg/m³，像岩石！」 板书时机：板书。差异化提示：B班代式；A班补单位。易错点提醒：下节课学宇宙航行（卫星速度）。"}],"blackboard":"┌── 引力成就 ──┐\n│ 引力=向心力│\n│ M=4π²r³/GT²│\n│ M=gR²/G    │\n│ ρ=M/V      │\n│ 预言海王星 │\n└────────────┘","exercises":"【基础作业】1. 由卫星周期求中心天体质量公式____。2. 由地表重力求M公式____。\n【提高作业】近地卫星周期T=5400s，求地球平均密度（G=6.7×10⁻¹¹）。\n【参考答案——教师用】基础1：M=4π²r³/(GT²)。基础2：M=gR²/G。提高：ρ=3π/(GT²)=3π/(6.7e-11×5400²)≈5500kg/m³。","reflection":"✅ 亮点：两途径（T与g）对比清晰；海王星史例让理论威力具象。\n⚠️ 需改进：B班常把r与R混、求成卫星质量，需红字「中心体、m约掉」。\n📌 下节课衔接：宇宙航行——第一宇宙速度与卫星。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b2-u2-4","lessonId":"l-phy-b2-u2-4","title":"宇宙航行","book":"必修第二册","unitNumber":2,"unitTitle":"万有引力与航天","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["第一宇宙速度","宇宙速度","卫星","同步卫星","人教版必修二Ch2","第四课时"],"textbookAnalysis":"第一宇宙速度v₁=√(gR)=√(GM/R)≈7.9km/s是环绕速度也是最小发射速度。第二宇宙速度11.2km/s（脱离地球）、第三宇宙速度16.7km/s（脱离太阳）。卫星越高轨道v越小、T越大。同步卫星周期24h、定轨赤道上空。","overview":"【学情分析】A班：能推导v₁、分析高轨低速大周期、理解同步卫星；B班：混淆三个宇宙速度含义、以为越高越快；v₁是「最小发射速度」不懂。共同问题：v₁既是环绕最大速也是发射最小速；高轨v小T大；同步卫星定点赤道。","objectives":["物理观念：理解三个宇宙速度的含义，掌握第一宇宙速度推导。","科学思维：分析卫星轨道高度与v、T的关系（高轨低速大周期）。","科学探究：了解同步卫星的特点与应用。","科学态度与责任：体会航天工程对人类探索的意义。"],"keyPoints":"① v₁=√(gR)=√(GM/R)≈7.9km/s（环绕最大、发射最小）。\n② v₂=11.2km/s（逃地），v₃=16.7km/s（逃日）。\n③ 高轨：v小、T大（v=√(GM/r)）。\n④ 同步卫星：T=24h，定轨赤道上空，h≈36000km。","difficulties":"① v₁双重含义。原因：环绕最大vs发射最小易混，需讲清。\n② 高轨低速。原因：直觉越高越快，需v=√(GM/r)说明。\n③ 同步定点。原因：须在赤道且T=24h，需强调。","teachingMethods":"① 速度推导。\n② 轨道对比图。\n③ 同步卫星讲解。\n④ 航天视频。","preparation":"【PPT课件】P1 梦想飞天；P2 v₁推导；P3 三个宇宙速度；P4 高轨低速；P5 同步卫星；P6 练习。\n【实验器材】无（动画为主）。\n【音频】无。","process":[{"step":"Step 1 导入——怎样不落地","time":"5分钟","content":"【PPT P1 飞天】教师：「牛顿设想：平抛初速足够大，轨迹弯曲跟上地球曲率就绕地飞行——成为卫星。这个临界速度就是第一宇宙速度。」 预设回答：「速度够快轨迹就弯成绕地球转，不掉下来。」 板书时机：黑板写课题「宇宙航行」。差异化提示：B班听设想；A班需说曲率。易错点提醒：卫星是「一直掉却永远够不着地面」。"},{"step":"Step 2 v₁推导","time":"10分钟","content":"【PPT P2 v₁】教师：「近地卫星引力提供向心力：GMm/R²=mv₁²/R，又GM=gR²，得v₁=√(gR)≈7.9km/s。它既是最大环绕速度，也是最小发射速度。」 预设回答：「v₁=√(gR)≈7.9km/s，绕地最低速也是发射最低速。」 板书时机：黑板写v₁=√(gR)。差异化提示：B班记式；A班需双推导。易错点提醒：发射速度\x3cv₁落回；=v₁圆轨道；越大轨道越高（直到v₂逃离）。"},{"step":"Step 3 三个速度","time":"8分钟","content":"【PPT P3 三速度】教师：「v₂=11.2km/s可脱离地球引力（绕日）；v₃=16.7km/s可脱离太阳系。三速度是递进的逃生门槛。」 预设回答：「7.9绕地、11.2逃地、16.7逃日。」 板书时机：黑板列三速度。差异化提示：B班记数值；A班需说含义。易错点提醒：v₂/v₃是「脱离」速度；介于v₁~v₂是椭圆地心轨道。"},{"step":"Step 4 高轨低速","time":"9分钟","content":"【PPT P4 高轨】教师：「对任意圆轨道v=√(GM/r)：轨道越高r越大，v越小、周期T=2πr/v越大。所以同步卫星虽高却慢。」 预设回答：「越高越慢、周期越长，不是越高越快。」 板书时机：黑板写v=√(GM/r)。差异化提示：B班记结论；A班需推T。易错点提醒：直觉「高=快」错；能量上高轨发射更难（势能大）。"},{"step":"Step 5 同步卫星","time":"8分钟","content":"【PPT P5 同步】教师：「同步卫星T=24h与地球自转同步，必在赤道上空（否则轨道面不共轴）、高度约36000km，相对地面静止，用于通信广播。」 预设回答：「同步卫星在赤道上空、周期一天，看着不动。」 板书时机：黑板写同步条件。差异化提示：B班记；A班需说「为何赤道」。易错点提醒：不在赤道则轨道面倾斜，不能相对地面静止。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「近地卫星与同步卫星比，谁v大、谁T大？」 预设回答：「近地v大、T小；同步v小、T大！」 板书时机：板书。差异化提示：B班答；A班补数值。易错点提醒：第2章结束，下章学机械能。"}],"blackboard":"┌── 宇宙航行 ──┐\n│ v₁=√(gR)   │\n│ ≈7.9km/s   │\n│ v₂=11.2逃地│\n│ v₃=16.7逃日│\n│ 高轨:v小T大│\n│ 同步:赤道上空│\n└────────────┘","exercises":"【基础作业】1. 第一宇宙速度____（数值），它既是____速度也是____速度。2. 轨道越高，线速度越____、周期越____。\n【提高作业】估算近地卫星周期（R=6400km，g=10）。\n【参考答案——教师用】基础1：7.9km/s、环绕最大、发射最小。基础2：小、大。提高：v₁≈√(gR)=√(10×6.4e6)≈8000m/s，T=2πR/v₁≈2π×6.4e6/8000≈5024s≈84min。","reflection":"✅ 亮点：牛顿大炮设想把「卫星」讲活；高轨低速用v=√(GM/r)破直觉。\n⚠️ 需改进：B班对v₁「最小发射速度」仍绕，需对比圆/椭圆/逃逸。\n📌 下节课衔接：机械能——做功与能量。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b2-u3-1","lessonId":"l-phy-b2-u3-1","title":"功和功率","book":"必修第二册","unitNumber":3,"unitTitle":"机械能守恒定律","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["功","功率","额定功率","人教版必修二Ch3","第一课时"],"textbookAnalysis":"功W=Flcosθ（力与位移夹角θ），是标量，可正可负（θ\x3c90°正功、>90°负功、=90°不做功）。功率P=W/t=Fvcosθ描述做功快慢，机车以额定功率行驶时P=Fv，速度增大牵引力减小。","overview":"【学情分析】A班：能判断正负功、用P=Fv分析机车启动；B班：忘cosθ、以为「用力就有功」、功率与速度关系乱。共同问题：做功需力与位移同方向分量；cosθ决定正负；P=Fv中v是瞬时速度。","objectives":["物理观念：掌握功W=Flcosθ与功率P=W/t=Fv，理解正负功含义。","科学思维：会判断力是否做功及做功正负，能用P=Fv分析机车。","科学探究：通过实验测量功与功率。","科学态度与责任：认识功与能在技术应用（如汽车功率）中的意义。"],"keyPoints":"① 功：W=Flcosθ（θ为F与l夹角）。\n② 正负：θ\x3c90°正功（动力），>90°负功（阻力），=90°零功。\n③ 功率：P=W/t=Fvcosθ。\n④ 机车：P额=Fv，恒功率时v↑则F↓。","difficulties":"① cosθ。原因：忘夹角、易漏，需强调「沿位移分量」。\n② 正负功。原因：误以为负功是「不做功」，需说「阻碍运动」。\n③ P=Fv。原因：机车变力情形，需说明瞬时与额定。","teachingMethods":"① 公式推导（力分解）。\n② 正负功判断训练。\n③ 机车启动分析。\n④ 实验测量。","preparation":"【PPT课件】P1 功的定义；P2 cosθ；P3 正负功；P4 功率；P5 机车P=Fv；P6 练习。\n【实验器材】弹簧测力计、小车、刻度尺。\n【音频】无。","process":[{"step":"Step 1 导入——用力推却没做功？","time":"5分钟","content":"【PPT P1 功】教师：「提着水桶水平走，手用力却「不做功」——因为力与位移垂直。做功要看力在位移方向的分量。」 预设回答：「只有沿运动方向的分力才做功。」 板书时机：黑板写课题「功和功率」。差异化提示：B班举提桶；A班需说分量。易错点提醒：做功=力×位移×夹角的余弦；垂直力不做功。"},{"step":"Step 2 cosθ","time":"9分钟","content":"【PPT P2 cosθ】教师：「把力分解为沿位移Fcosθ与垂直位移Fsinθ，只有前者做功：W=Flcosθ。θ是力与位移夹角。」 预设回答：「W=Flcosθ，用沿位移的分力乘位移。」 板书时机：黑板写W=Flcosθ。差异化提示：B班记式；A班需说分解。易错点提醒：θ是F与l夹角；位移用力的作用点位移。"},{"step":"Step 3 正负功","time":"9分钟","content":"【PPT P3 正负】教师：「θ\x3c90° cosθ>0 正功（力促运动，动力）；θ>90° 负功（力阻运动，阻力，如摩擦）；θ=90° 零功。负功不是「没做功」而是「做负功」。」 预设回答：「力和运动同向做正功，反向做负功（阻力）。」 板书时机：黑板写正负判据。差异化提示：B班记三区间；A班需举负功例。易错点提醒：负功表示能量被转移/耗散，不是功为负值无大小。"},{"step":"Step 4 功率","time":"8分钟","content":"【PPT P4 功率】教师：「功率P=W/t描述做功快慢，单位瓦W。瞬时功率P=Fvcosθ（v为瞬时速度）。」 预设回答：「功率是单位时间做的功，P=W/t，瞬时用Fv。」 板书时机：黑板写P=W/t=Fvcosθ。差异化提示：B班记；A班需说瞬时。易错点提醒：P=W/t是平均，P=Fv是瞬时（v瞬时）；v是沿力方向分量。"},{"step":"Step 5 机车P=Fv","time":"9分钟","content":"【PPT P5 机车】教师：「机车以额定功率P额行驶：P额=Fv。提速时v增大则牵引力F减小，直到F=f时速度最大vₘ=P额/f。这就是「恒功率启动」。」 预设回答：「功率一定，越快牵引力越小，阻力平衡时最快。」 板书时机：黑板写P额=Fv、vₘ=P额/f。差异化提示：B班记vₘ；A班需分析加速过程。易错点提醒：额定功率下不能一直加速；F=f时达最大速度。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「水平推力50N使物以2m/s匀速，功率？若速度4m/s功率变？」 预设回答：「100W；200W（P=Fv，F=50N）！」 板书时机：板书。差异化提示：B班算；A班补「牵引力不变时」。易错点提醒：下节课学动能和动能定理。"}],"blackboard":"┌── 功和功率 ──┐\n│ W=Flcosθ   │\n│ \x3c90正 >90负│\n│ =90零功    │\n│ P=W/t=Fv   │\n│ 机车P额=Fv │\n│ vm=P额/f   │\n└────────────┘","exercises":"【基础作业】1. 功的公式____，力与位移垂直时做功为____。2. 功率定义式____，机车恒功率时P额=____。\n【提高作业】汽车额定功率60kW，阻力2000N，求最大速度。\n【参考答案——教师用】基础1：W=Flcosθ、0。基础2：P=W/t、Fv。提高：vₘ=P/f=60000/2000=30m/s。","reflection":"✅ 亮点：提水桶水平走例让「垂直不做功」秒懂；机车P=Fv用vₘ=P/f收口清晰。\n⚠️ 需改进：B班仍忘cosθ直接写W=Fl，需红字「夹角余弦」。\n📌 下节课衔接：动能定理——合外力做功等于动能变化。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b2-u3-2","lessonId":"l-phy-b2-u3-2","title":"动能和动能定理","book":"必修第二册","unitNumber":3,"unitTitle":"机械能守恒定律","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["动能","动能定理","人教版必修二Ch3","第二课时"],"textbookAnalysis":"动能Eₖ=½mv²。动能定理：合外力对物体做的功等于物体动能变化，W合=ΔEₖ=½mv₂²-½mv₁²。适用于直线运动与曲线运动，无需分段（直接看初末状态），是解决力学问题的利器。","overview":"【学情分析】A班：能直接用动能定理解多过程、曲线问题；B班：仍逐段用牛顿定律、不敢用定理；W合忘记含所有力（含重力）；符号易错。共同问题：W合是各力做功代数和；定理只关初末态与路径无关；重力做功已含在W合中。","objectives":["物理观念：理解动能Eₖ=½mv²与动能定理W合=ΔEₖ。","科学思维：会用动能定理处理直线、曲线、多过程问题，关注初末态。","科学探究：通过实验（打点/传感器）验证动能定理。","科学态度与责任：体会「状态量变化由总功决定」的简洁思想。"],"keyPoints":"① 动能：Eₖ=½mv²（标量，状态量）。\n② 定理：W合=ΔEₖ=½mv₂²-½mv₁²。\n③ W合：所有力做功代数和（含重力）。\n④ 优点：只看初末态，路径无关，适用曲直。","difficulties":"① W合包含重力。原因：易只算推力漏重力，需强调「所有力」。\n② 初末态。原因：爱分段，需引导直接看状态。\n③ 符号。原因：ΔEₖ末减初，易反，需规范。","teachingMethods":"① 定理推导（匀加速特例推广）。\n② 实验验证。\n③ 多过程例题。\n④ 与牛顿法对比。","preparation":"【PPT课件】P1 动能；P2 定理表述；P3 推导（匀加速）；P4 W合含义；P5 应用举例；P6 练习。\n【实验器材】打点计时器、小车、砝码。\n【音频】无。","process":[{"step":"Step 1 导入——运动物体有「做功本领」","time":"5分钟","content":"【PPT P1 动能】教师：「运动的物体能撞倒东西、能做工，说明有能量——动能。它应由质量和速度决定：Eₖ=½mv²。」 预设回答：「动能和速度、质量有关，½mv²。」 板书时机：黑板写「动能 Eₖ=½mv²」。差异化提示：B班举撞球；A班需说v²。易错点提醒：动能是标量、状态量；与速度平方成正比。"},{"step":"Step 2 定理表述","time":"8分钟","content":"【PPT P2 定理】教师：「动能定理：合外力对物体做的功等于动能变化，W合=ΔEₖ=Eₖ末-Eₖ初。这是力学核心规律。」 预设回答：「总功等于动能变化量，末减初。」 板书时机：黑板写W合=ΔEₖ。差异化提示：B班记；A班需说「末减初」。易错点提醒：ΔEₖ是末减初；动能增加则W合正。"},{"step":"Step 3 推导","time":"9分钟","content":"【PPT P3 推导】教师：「匀加速中W合=F合l=mal，又v₂²-v₁²=2al，代入W合=½mv₂²-½mv₁²。虽由匀加速推出，但对任意运动（含曲变）都成立。」 预设回答：「用运动学公式推出总功等于动能差。」 板书时机：黑板写推导链。差异化提示：B班记结果；A班需复述。易错点提醒：特例推出但普适；无需运动细节，只需初末速度。"},{"step":"Step 4 W合含义","time":"9分钟","content":"【PPT P4 W合】教师：「W合是各力做功的代数和，包括重力、弹力、摩擦等全部力。重力做功直接算mgh（不另用势能），不要重复又用F合又用势能。」 预设回答：「把所有力做的功加起来，重力也在内。」 板书时机：黑板写「W合=ΣW（含重力）」。差异化提示：B班重点；A班需说易混点。易错点提醒：用动能定理时重力做功已计入W合，勿再单独列势能项重复。"},{"step":"Step 5 应用","time":"9分钟","content":"【PPT P5 应用】教师：「例：子弹穿木受阻f，求穿透厚度d。用W合=-fd=½mv₂²-½mv₁²直接解，不必分段。多过程、曲线同样好用。」 预设回答：「直接列总功等于动能差，一步到位。」 板书时机：黑板写例题列式。差异化提示：B班做基础；A班做含曲线例。易错点提醒：定理优越性在「跨过程、路径无关」；列W合带符号。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「质量2kg物体受合外力10N沿运动方向做功20J，动能增加多少？若初速0末速？」 预设回答：「增20J；½×2×v²=20→v=√20≈4.47m/s！」 板书时机：板书。差异化提示：B班算；A班补末速。易错点提醒：下节课学重力势能，为机械能守恒铺垫。"}],"blackboard":"┌── 动能定理 ──┐\n│ Ek=½mv²    │\n│ W合=ΔEk    │\n│ =Ek末-Ek初 │\n│ W合含重力! │\n│ 看初末态   │\n│ 路径无关   │\n└────────────┘","exercises":"【基础作业】1. 动能表达式____，它是____（填标/矢）量。2. 动能定理：____等于动能变化。\n【提高作业】质量1kg物体初速2m/s，受合外力做功9J，求末速。\n【参考答案——教师用】基础1：Eₖ=½mv²、标。基础2：合外力做功（W合）。提高：ΔEₖ=9=½×1×v²-½×1×4→v²=22→v≈4.69m/s。","reflection":"✅ 亮点：W合含重力单独红字，避免B班重复计算；定理「跨过程」优势用子弹例体现。\n⚠️ 需改进：B班仍习惯分段牛顿法，需多练「一步动能定理」。\n📌 下节课衔接：重力势能与其做功特点。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b2-u3-3","lessonId":"l-phy-b2-u3-3","title":"重力势能","book":"必修第二册","unitNumber":3,"unitTitle":"机械能守恒定律","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["重力势能","做功特点","弹性势能","人教版必修二Ch3","第三课时"],"textbookAnalysis":"重力势能Eₚ=mgh，是物体与地球共有的系统能量，具有相对性（参考平面任选，h为相对高度）。重力做功与路径无关，只与初末高度差：W_G=mgh₁-mgh₂=-ΔEₚ。弹性势能Eₚ=½kx²，与形变量有关。","overview":"【学情分析】A班：理解势能相对性、重力做功与路径无关、W_G=-ΔEₚ；B班：把h当绝对高度、混淆重力做功正负与势能增减；弹性势能陌生。共同问题：势能是系统共有；参考面任选；重力做正功势能减。","objectives":["物理观念：掌握重力势能Eₚ=mgh，理解其相对性与系统性。","科学思维：理解重力做功与路径无关、W_G=-ΔEₚ的关系。","科学探究：通过实验探究弹性势能与形变量的关系。","科学态度与责任：认识势能的相对性与参考系选择的合理性。"],"keyPoints":"① 重力势能：Eₚ=mgh（相对量，参考面任选）。\n② 系统性：属于物体与地球共有。\n③ 重力做功：与路径无关，W_G=mgΔh=-ΔEₚ。\n④ 弹性势能：Eₚ=½kx²。","difficulties":"① 相对性。原因：以为h绝对，需强调参考面任选、差才绝对。\n② W_G与ΔEₚ。原因：正负关系易反，需「做正功势减」。\n③ 系统性。原因：易说「物体势能」，需说与地球共有。","teachingMethods":"① 参考面选择演示。\n② 重力做功路径无关推导。\n③ 弹性势能实验。\n④ 正负关系训练。","preparation":"【PPT课件】P1 重力势能；P2 相对性参考面；P3 重力做功路径无关；P4 W_G=-ΔEₚ；P5 弹性势能；P6 练习。\n【实验器材】弹簧、小球、刻度尺。\n【音频】无。","process":[{"step":"Step 1 导入——被举高的物体有能量","time":"5分钟","content":"【PPT P1 势能】教师：「打桩机重锤举高后能砸入地面，说明高处物体具有能量——重力势能。它由质量和高度决定：Eₚ=mgh。」 预设回答：「举得越高、越重，势能越大，mgh。」 板书时机：黑板写「重力势能 Eₚ=mgh」。差异化提示：B班举重锤；A班需说h。易错点提醒：势能属于物体与地球系统，常说「物体势能」是简略。"},{"step":"Step 2 相对性","time":"9分钟","content":"【PPT P2 相对】教师：「h是相对参考平面的高度，参考面任选（通常地面）。选不同面，Eₚ数值不同，但高度差Δh不变——物理结论不变。」 预设回答：「势能大小看选哪当零面，但高度差是绝对的。」 板书时机：黑板写「参考面任选」。差异化提示：B班记；A班需说「差绝对」。易错点提醒：比较势能变化看Δh，不依赖参考面；参考面只为方便。"},{"step":"Step 3 路径无关","time":"9分钟","content":"【PPT P3 路径】教师：「重力做功W_G=mgh₁-mgh₂=mgΔh，只与初末高度差有关，与路径（直落或沿斜面）无关。这是重力的重要特性。」 预设回答：「重力做功只看高度差，走哪条路都一样。」 板书时机：黑板写W_G=mgΔh。差异化提示：B班记结论；A班需推导斜面上。易错点提醒：仅重力（及弹力）有此性质；摩擦力做功与路径有关。"},{"step":"Step 4 W_G与ΔEₚ","time":"9分钟","content":"【PPT P4 关系】教师：「W_G=mgh₁-mgh₂=-(mgh₂-mgh₁)=-ΔEₚ。即重力做正功势能减少，做负功（上抛）势能增加。」 预设回答：「重力做正功，势能就减少；上抛时重力做负功势能增。」 板书时机：黑板写W_G=-ΔEₚ。差异化提示：B班记关系；A班需举上抛例。易错点提醒：符号易反——记住「下落势减、上升势增」最直观。"},{"step":"Step 5 弹性势能","time":"8分钟","content":"【PPT P5 弹性】教师：「发生弹性形变的物体（弹簧、弓）具有弹性势能Eₚ=½kx²，与形变量平方成正比。拉满弓箭储能更多。」 预设回答：「弹簧形变越大弹性势能越大，½kx²。」 板书时机：黑板写Eₚ=½kx²。差异化提示：B班记；A班需联胡克。易错点提醒：弹性势能也是系统能量；超过限度则不恢复且公式失效。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「质量2kg物体从h=5m落到地面（g=10），重力做功与势能变化？」 预设回答：「W_G=100J，势能减100J！」 板书时机：板书。差异化提示：B班算；A班补参考面讨论。易错点提醒：下节课学机械能守恒定律（动势之和不变）。"}],"blackboard":"┌── 重力势能 ──┐\n│ Ep=mgh     │\n│ 相对量(参考面)│\n│ WG=mgΔh    │\n│ WG=-ΔEp    │\n│ 下落:势减  │\n│ E弹=½kx²   │\n└────────────┘","exercises":"【基础作业】1. 重力势能公式____，具有____性（参考面任选）。2. 重力做正功时重
