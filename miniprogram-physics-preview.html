力势能____（填增大/减小）。\n【提高作业】质量1kg物体从3m高落到1m高（g=10），重力做功与势能变化各多少？\n【参考答案——教师用】基础1：Eₚ=mgh、相对。基础2：减小。提高：Δh=2m，W_G=20J，势能减少20J。","reflection":"✅ 亮点：相对性用「参考面任选、差绝对」讲清；W_G=-ΔEₚ用「下落势减」助记。\n⚠️ 需改进：B班对「势能是系统共有」仍说「物体势能」，需轻点。\n📌 下节课衔接：机械能守恒——动能与势能相互转化总量不变。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-b2-u3-4","lessonId":"l-phy-b2-u3-4","title":"机械能守恒定律","book":"必修第二册","unitNumber":3,"unitTitle":"机械能守恒定律","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高一","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["机械能守恒","机械能","验证实验","人教版必修二Ch3","第四课时"],"textbookAnalysis":"机械能=动能+势能（重力势能+弹性势能）。只有重力或弹力做功时，动能与势能相互转化，机械能总量不变：Eₖ₁+Eₚ₁=Eₖ₂+Eₚ₂。条件是「只有重力和弹力做功」（其他力不做功或做功代数和为0）。可用自由落体、摆等验证。","overview":"【学情分析】A班：能判定守恒条件、列方程解多情景；B班：把「只受重力」等同于「只有重力做功」、漏看弹力；条件判断弱。共同问题：条件是「只有重/弹力做功」非「只受重/弹力」；机械能可动能势相互转化；验证实验原理。","objectives":["物理观念：理解机械能守恒条件与表达式Eₖ₁+Eₚ₁=Eₖ₂+Eₚ₂。","科学思维：能判断系统机械能是否守恒，并选用守恒或动能定理解题。","科学探究：通过实验（摆/落体/纸带）验证机械能守恒。","科学态度与责任：体会能量守恒这一自然界普适规律。"],"keyPoints":"① 机械能：E=Ek+Ep（重力+弹性势能）。\n② 条件：只有重力或弹力做功（其他力不做功或代数和为0）。\n③ 守恒式：Ek1+Ep1=Ek2+Ep2。\n④ 注意：是「只有重/弹力做功」≠「只受重/弹力」。","difficulties":"① 条件。原因：混淆「只受」与「只做功」，需强调做功条件。\n② 选零面。原因：Ep依赖参考面，需统一。\n③ 守恒vs定理。原因：何时用守恒何时用动能定理，需策略。","teachingMethods":"① 守恒条件辨析。\n② 单摆/落体验证实验。\n③ 列式训练（统一零面）。\n④ 与动能定理对比。","preparation":"【PPT课件】P1 机械能；P2 守恒条件；P3 表达式；P4 验证实验；P5 条件辨析；P6 练习。\n【实验器材】打点计时器、纸带、重物（验证机械能守恒）。\n【音频】无。","process":[{"step":"Step 1 导入——动能势能会此消彼长","time":"5分钟","content":"【PPT P1 机械能】教师：「上抛时动能减、重力势能增；下落反之。若没有摩擦耗散，二者之和似乎不变——这就是机械能守恒的直觉。」 预设回答：「动能和势能互相变，但总和可能不变。」 板书时机：黑板写「机械能=动能+势能」。差异化提示：B班举上抛；A班需说总和。易错点提醒：机械能是动能+重力势能+弹性势能的总和。"},{"step":"Step 2 守恒条件","time":"10分钟","content":"【PPT P2 条件】教师：「守恒条件：只有重力或弹力做功。注意是「只有这两种力做功」，不是「只受这两种力」——若有拉力但拉力不做功（如沿绳垂直位移）仍守恒。」 预设回答：「关键看其他力做不做功，不是看受不受其他力。」 板书时机：黑板写「条件：只有重/弹力做功」。差异化提示：B班重点；A班需举反例。易错点提醒：受拉力≠不守恒；拉力做功才破坏守恒。"},{"step":"Step 3 表达式","time":"8分钟","content":"【PPT P3 式子】教师：「守恒时Ek1+Ep1=Ek2+Ep2，即½mv₁²+mgh₁=½mv₂²+mgh₂。选同一参考面算h。也可写ΔEk=-ΔEp。」 预设回答：「初态机械能等于末态机械能，列等式解。」 板书时机：黑板写守恒式。差异化提示：B班记式；A班需说ΔEk=-ΔEp。易错点提醒：两边势能不能用不同参考面；ΔEk=-ΔEp是等价简便式。"},{"step":"Step 4 验证实验","time":"9分钟","content":"【PPT P4 验证】教师：「打点计时器测自由落体：比较mgh（势能减）与½mv²（动能增）是否相等（在误差内），验证守恒。纸带点迹越往下间距越大。」 预设回答：「看点迹间距增、算mgh和½mv²是否相等。」 板书时机：黑板画纸带。差异化提示：B班看操作；A班需说误差源。易错点提醒：实验需先选起点清晰纸带；空气阻力使实测略小于理论。"},{"step":"Step 5 条件辨析","time":"8分钟","content":"【PPT P5 辨析】教师：「判断训练：①自由落体（守恒）②沿光滑斜面下滑（守恒）③匀速上升（不守恒，拉力做正功）④粗糙斜面下滑（不守恒，摩擦耗散）。」 预设回答：「光滑无耗散就守恒，有摩擦或外力做功就不守恒。」 板书时机：黑板列四情形。差异化提示：B班做前两个；A班全做。易错点提醒：粗糙面摩擦做负功→机械能减少；匀速上升外力做功→增加。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「m=1kg从h=5m光滑静止滑下（g=10），落地速度？（用守恒）」 预设回答：「mgh=½mv²→v=√100=10m/s！」 板书时机：板书。差异化提示：B班算；A班补「用动能定理对照」。易错点提醒：必修二结束，进入选择性必修一（动量、振动、波）。"}],"blackboard":"┌── 机械能守恒 ──┐\n│ E=Ek+Ep    │\n│ 条件:只有   │\n│ 重/弹力做功│\n│ Ek1+Ep1=   │\n│ Ek2+Ep2    │\n│ ≠只受重/弹│\n└────────────┘","exercises":"【基础作业】1. 机械能=____+____+弹性势能。2. 守恒条件____。\n【提高作业】质量2kg物体从3m高光滑静止下落（g=10），求落地速度。\n【参考答案——教师用】基础1：动能、重力势能。基础2：只有重力或弹力做功。提高：mgh=½mv²→v=√(2gh)=√60≈7.75m/s。","reflection":"✅ 亮点：守恒条件区分「只受」与「只做功」是全班难点，用四情形辨析突破；验证实验衔接必修二实验传统。\n⚠️ 需改进：B班列方程常势能与动能用不同零面，需强调统一参考面。\n📌 下节课衔接：选必一动量——另一种守恒量。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx1-u1-1","lessonId":"l-phy-sx1-u1-1","title":"动量 动量定理","book":"选择性必修第一册","unitNumber":1,"unitTitle":"动量","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["动量","动量定理","冲量","人教版选必一Ch1","第一课时"],"textbookAnalysis":"动量p=mv（矢量，与速度同向）。冲量I=Ft（力在时间上的积累）。动量定理：合外力冲量等于动量变化，F合t=Δp=mv₂-mv₁。用于解释缓冲（延长作用时间减小力）与打击（短时间大力）。","overview":"【学情分析】A班：能熟练用动量定理分析缓冲、变质量问题；B班：忘动量矢量方向、把冲量当标量、单位混乱；缓冲原理不清。共同问题：动量是矢量（带方向）；F合t=Δp中Δp末减初带符号；延长t减小F。","objectives":["物理观念：理解动量p=mv与冲量I=Ft，掌握动量定理。","科学思维：会用动量定理分析矢量方向与缓冲问题。","科学探究：通过鸡蛋落海绵/水泥实验体会冲量作用时间的影响。","科学态度与责任：认识动量定理在安全（安全带、缓冲）中的价值。"],"keyPoints":"① 动量：p=mv，矢量，方向与v相同。\n② 冲量：I=Ft，力的时间积累。\n③ 动量定理：F合t=Δp=mv₂-mv₁。\n④ 缓冲：Δp一定时t越长F越小。","difficulties":"① 矢量方向。原因：易丢方向，需强调p与v同向、Δp末减初。\n② 缓冲原理。原因：不懂延长t减小F，需实验。\n③ 合外力。原因：漏重力等，需强调F合。","teachingMethods":"① 鸡蛋缓冲实验。\n② 矢量方向训练。\n③ 动量定理推导。\n④ 安全实例。","preparation":"【PPT课件】P1 动量概念；P2 冲量；P3 动量定理；P4 矢量方向；P5 缓冲应用；P6 练习。\n【实验器材】鸡蛋、海绵、水泥地（演示）。\n【音频】无。","process":[{"step":"Step 1 导入——运动快慢用动量描述","time":"5分钟","content":"【PPT P1 动量】教师：「大卡车慢速也比乒乓球快速难停——既要看速度又要看质量。定义动量p=mv描述运动的「运动量」。」 预设回答：「动量把质量和速度合在一起，p=mv。」 板书时机：黑板写「动量 p=mv」。差异化提示：B班举卡车；A班需说矢量。易错点提醒：动量是矢量，方向与速度相同；单位kg·m/s。"},{"step":"Step 2 冲量","time":"8分钟","content":"【PPT P2 冲量】教师：「力在时间上的积累叫冲量I=Ft。要使动量改变，需要力的作用并持续一段时间——冲量就是动量变化的「原因」。」 预设回答：「力作用一段时间产生冲量，改变动量。」 板书时机：黑板写I=Ft。差异化提示：B班记；A班需说积累。易错点提醒：冲量I=Ft是矢量（与F同向）；变力用平均力或积分。"},{"step":"Step 3 动量定理","time":"10分钟","content":"【PPT P3 定理】教师：「由牛顿第二定律推导：F合=ma=mΔv/Δt，乘以Δt得F合t=mv₂-mv₁=Δp。即合外力冲量等于动量变化。」 预设回答：「合外力的冲量等于动量变化量，F合t=Δp。」 板书时机：黑板写F合t=Δp并推导。差异化提示：B班记式；A班需复述推导。易错点提醒：必须是合外力冲量；Δp=mv₂-mv₁末减初，带方向符号。"},{"step":"Step 4 矢量方向","time":"9分钟","content":"【PPT P4 方向】教师：「动量定理是矢量式。规定正方向后，反向动量取负。如拳头原速向右、反弹向左，Δp含方向翻转，冲量更大。」 预设回答：「要先定正方向，动量带符号算变化。」 板书时机：黑板写方向示例。差异化提示：B班做同向；A班做反弹例。易错点提醒：反弹问题Δp不是2倍速度差那么简单，要看方向；符号决定一切。"},{"step":"Step 5 缓冲应用","time":"8分钟","content":"【PPT P5 缓冲】教师：「Δp一定时，作用时间t越长，平均力F越小。鸡蛋落海绵不碎、安全带、跳远沙坑都是延长t减小致命冲击力。」 预设回答：「要减小受力就延长时间，靠缓冲材料。」 板书时机：黑板写「t↑→F↓」。差异化提示：B班听例；A班需算对比。易错点提醒：缓冲不改变Δp（动量变化相同），只改变受力大小；这是安全设计核心。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「m=0.5kg球以10m/s撞墙以8m/s反弹，作用0.01s，墙的平均力？」 预设回答：「Δp=0.5×(-8-10)=-9，F=-9/0.01=-900N，很大！」 板书时机：板书。差异化提示：B班算；A班补方向。易错点提醒：下节课学动量守恒定律（系统总动量不变）。"}],"blackboard":"┌── 动量定理 ──┐\n│ p=mv(矢量)  │\n│ I=Ft       │\n│ F合t=Δp    │\n│ =mv₂-mv₁   │\n│ 缓冲:t↑F↓  │\n└────────────┘","exercises":"【基础作业】1. 动量定义式____，是____量。2. 动量定理表达式____。\n【提高作业】0.2kg球以5m/s向右撞墙以3m/s向左反弹，作用0.02s，求平均力。\n【参考答案——教师用】基础1：p=mv、矢。基础2：F合t=Δp。提高：取右为正，Δp=0.2×(-3-5)=-1.6，F=-1.6/0.02=-80N（向左）。","reflection":"✅ 亮点：鸡蛋落海绵实验让缓冲原理具象；反弹题用符号训练矢量方向。\n⚠️ 需改进：B班对Δp末减初方向仍错，需每题先定正方向。\n📌 下节课衔接：系统不受外力时总动量守恒。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx1-u1-2","lessonId":"l-phy-sx1-u1-2","title":"动量守恒定律","book":"选择性必修第一册","unitNumber":1,"unitTitle":"动量","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["动量守恒","系统","人教版选必一Ch1","第二课时"],"textbookAnalysis":"系统所受合外力为零时，系统总动量保持不变：p₁+p₂=p₁′+p₂′，即m₁v₁+m₂v₂=m₁v₁′+m₂v₂′。由牛顿第三定律与动量定理导出。条件：系统合外力为零（或某方向为零则该方向分量守恒）。","overview":"【学情分析】A班：能判定守恒条件、处理一维碰撞与分方向守恒；B班：忘「系统」概念、把单个物体当系统、忽略条件；方向分量不清。共同问题：守恒指系统总动量；条件是合外力为零；某方向合外力为零则该方向动量守恒。","objectives":["物理观念：掌握动量守恒定律及其条件（系统合外力为零）。","科学思维：会判断系统动量是否守恒，能用分量形式处理二维情形。","科学探究：通过气垫导轨碰撞实验验证动量守恒。","科学态度与责任：认识动量守恒是与能量守恒并列的普适规律。"],"keyPoints":"① 定律：系统合外力为零时总动量不变。\n② 式：m₁v₁+m₂v₂=m₁v₁′+m₂v₂′。\n③ 条件：ΣF外=0（近似：内力≫外力）。\n④ 分方向：某方向合外力为零则该方向分量守恒。","difficulties":"① 系统概念。原因：易对单个物体用守恒，需强调「系统总动量」。\n② 条件。原因：忽略合外力为零，需严格判定。\n③ 分量守恒。原因：二维情形难，需说明分方向。","teachingMethods":"① 推导（第三定律+定理）。\n② 气垫导轨碰撞实验。\n③ 条件判定训练。\n④ 分量法。","preparation":"【PPT课件】P1 系统概念；P2 定律推导；P3 守恒条件；P4 实验验证；P5 分量守恒；P6 练习。\n【实验器材】气垫导轨、两滑块、光电门。\n【音频】无。","process":[{"step":"Step 1 导入——碰撞前后动量去哪了","time":"5分钟","content":"【PPT P1 系统】教师：「两球碰撞，各自动量变，但「总动量」似乎不变。把两球作为系统看，内力（相互作用）不改变总动量，只有外力能改变它。」 预设回答：「看成一个系统，总动量可能不变。」 板书时机：黑板写「系统总动量」。差异化提示：B班举碰球；A班需说内力。易错点提醒：守恒谈的是系统总动量，不是单个物体。"},{"step":"Step 2 推导","time":"9分钟","content":"【PPT P2 推导】教师：「两物体相互作用，由牛顿第三定律F₁₂=-F₂₁，各自受冲量大小相等反向，故Δp₁=-Δp₂，总动量Δp总=0，即p总不变。」 预设回答：「相互作用力等大反向，动量变化抵消，总动量守恒。」 板书时机：黑板写推导。差异化提示：B班记结论；A班需复述。易错点提醒：推导基于作用力反作用力同时存在等大反向。"},{"step":"Step 3 守恒条件","time":"9分钟","content":"【PPT P3 条件】教师：「严格条件：系统所受合外力为零。近似条件：内力远大于外力（如爆炸、碰撞瞬间，外力冲击可忽略）。地面光滑水平碰撞近似守恒。」 预设回答：「合外力为零才守恒；碰撞瞬间内力大也可近似。」 板书时机：黑板写「ΣF外=0」。差异化提示：B班记；A班需说近似。易错点提醒：竖直方向有重力时整体不守恒，但水平方向若合外力为零则水平分量守恒。"},{"step":"Step 4 实验验证","time":"9分钟","content":"【PPT P4 实验】教师：「气垫导轨上两滑块弹性碰撞，测碰前碰后速度，验证m₁v₁+m₂v₂=m₁v₁′+m₂v₂′（在误差内）。这是实验定律。」 预设回答：「测速度代入两边，数值相等就验证了。」 板书时机：黑板写验证式。差异化提示：B班看操作；A班需说误差。易错点提醒：实验中摩擦力要小；用挡光片测速。"},{"step":"Step 5 分量守恒","time":"8分钟","content":"【PPT P5 分量】教师：「若合外力仅某一方向为零，则总动量在该方向分量守恒，另一方向不守恒。如斜碰可分解x、y分别处理。」 预设回答：「哪个方向合外力为零，那个方向动量就守恒。」 板书时机：黑板写分量式。差异化提示：B班做一维；A班做斜碰。易错点提醒：二维用分量；别把不守恒方向硬套公式。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「m₁=2、v₁=3，m₂=1静止，正碰后m₂=2，求m₁末速（守恒）。」 预设回答：「6+0=2×2+2v₁′→v₁′=1！」 板书时机：板书。差异化提示：B班算；A班补动量方向。易错点提醒：下节课学动量守恒的应用（碰撞、反冲）。"}],"blackboard":"┌── 动量守恒 ──┐\n│ ΣF外=0     │\n│ m1v1+m2v2= │\n│ m1v1'+m2v2'│\n│ 看系统总动量│\n│ 分量可分别 │\n└────────────┘","exercises":"【基础作业】1. 动量守恒条件____。2. 守恒式（一维）____。\n【提高作业】质量3kg以4m/s碰静止2kg，碰后3kg以1m/s同向，求2kg速度。\n【参考答案——教师用】基础1：系统合外力为零。基础2：m₁v₁+m₂v₂=m₁v₁′+m₂v₂′。提高：12+0=3×1+2v₂′→v₂′=4.5m/s。","reflection":"✅ 亮点：从第三定律导出守恒让B班信服；分量守恒单独强调解出斜碰。\n⚠️ 需改进：B班常对单个物体列守恒，需红字「系统总动量」。\n📌 下节课衔接：用守恒分析碰撞、反冲、火箭。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx1-u1-3","lessonId":"l-phy-sx1-u1-3","title":"动量守恒定律的应用","book":"选择性必修第一册","unitNumber":1,"unitTitle":"动量","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["碰撞","反冲","火箭","人教版选必一Ch1","第三课时"],"textbookAnalysis":"应用动量守恒分析碰撞（弹性碰撞动能守恒、非弹性碰撞有动能损失、完全非弹性碰后共速）、反冲（炮车后退、火箭喷气）与爆炸。反冲中系统内力远大于外力，总动量近似守恒，燃料向后喷、箭体向前。","overview":"【学情分析】A班：能区分弹碰类型、算共速与动能损失、分析火箭反冲；B班：混淆弹性与非弹性、共速条件不清；反冲方向错。共同问题：完全非弹性碰后共速动能损失最大；弹性碰同时满足动量守恒与动能守恒；反冲动量反向分配。","objectives":["物理观念：能用动量守恒分析碰撞（弹性/非弹性）、反冲与爆炸。","科学思维：区分碰撞类型，会用共速条件与动能关系。","科学探究：通过实验（碰撞球、反冲小车）验证规律。","科学态度与责任：认识反冲原理在火箭航天中的重大应用。"],"keyPoints":"① 弹性碰撞：动量、动能均守恒。\n② 完全非弹性：碰后共速，动能损失最大。\n③ 一般非弹性：有动能损失，末速不同。\n④ 反冲：内力喷气，系统总动量守恒，反向分配。","difficulties":"① 类型区分。原因：弹性/非弹性条件混，需对比表。\n② 共速。原因：完全非弹性特征，易漏，需强调。\n③ 反冲方向。原因：方向错，需说「反向分配」。","teachingMethods":"① 类型对比表。\n② 反冲小车实验。\n③ 共速问题训练。\n④ 火箭原理。","preparation":"【PPT课件】P1 碰撞分类；P2 弹性碰撞；P3 完全非弹性；P4 反冲小车；P5 火箭；P6 练习。\n【实验器材】反冲小车（气球/水）、碰撞球。\n【音频】无。","process":[{"step":"Step 1 导入——碰撞千差万别","time":"5分钟","content":"【PPT P1 分类】教师：「台球弹性碰撞几乎不损失动能；橡皮泥撞墙粘住是完全非弹性。分类看碰后动能是否守恒、是否共速。」 预设回答：「有的弹开、有的粘一起，动能损失不同。」 板书时机：黑板写「碰撞三类」。差异化提示：B班举台球；A班需说动能。易错点提醒：所有碰撞动量都守恒（合外力零），但动能未必守恒。"},{"step":"Step 2 弹性碰撞","time":"9分钟","content":"【PPT P2 弹性】教师：「弹性碰撞同时满足动量守恒与动能守恒。等质量一维弹性正碰会交换速度（v₁′=v₂，v₂′=v₁）。」 预设回答：「弹性碰动能也守恒，等质量会交换速度。」 板书时机：黑板写两守恒式。差异化提示：B班记条件；A班需推交换速度。易错点提醒：弹性碰撞动能守恒是额外条件；推导联立两式。"},{"step":"Step 3 完全非弹性","time":"9分钟","content":"【PPT P3 非弹性】教师：「完全非弹性碰撞后两物共速（粘合），动能损失最大。用动量守恒m₁v₁+m₂v₂=(m₁+m₂)v共求共速。」 预设回答：「粘一起共速，用总质量算共速，动能损失最大。」 板书时机：黑板写共速式。差异化提示：B班记共速；A班需算动能损失。易错点提醒：共速是完全非弹性标志；此时动能不守恒但动量守恒。"},{"step":"Step 4 反冲小车","time":"9分钟","content":"【PPT P4 反冲】教师：「气球向后喷气，小车前冲——系统（车+气）原来静止总动量为0，喷气后气向后、车向前，动量仍和为0。这是反冲。」 预设回答：「向后喷气，车就向前反冲，总动量还是零。」 板书时机：黑板写「0=m气v气+m车v车」。差异化提示：B班看实验；A班需列式。易错点提醒：反冲中内力远大于外力（摩擦小）才近似守恒；方向必相反。"},{"step":"Step 5 火箭原理","time":"8分钟","content":"【PPT P5 火箭】教师：「火箭不断向后高速喷气，箭体持续向前加速。多级火箭逐级抛壳提高终速。这是反冲在航天中的应用。」 预设回答：「火箭靠不断喷气反冲加速，多级提高速度。」 板书时机：黑板写火箭反冲。差异化提示：B班听；A班需说多级。易错点提醒：火箭在太空无外力更严格守恒；喷气质量速度决定加速。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「m₁=1、v=4碰静止m₂=3，完全非弹性共速多少？损失动能？」 预设回答：「v共=1m/s；损ΔEk=½×1×16-½×4×1=6J！」 板书时机：板书。差异化提示：B班算；A班补损失。易错点提醒：第1章结束，下章学机械振动。"}],"blackboard":"┌── 动量应用 ──┐\n│ 弹性:动+能守│\n│ 全等非弹性: │\n│ 共速,损最大 │\n│ 反冲:0=     │\n│ m气v气+车v车│\n└────────────┘","exercises":"【基础作业】1. 完全非弹性碰撞后两物体____，动能损失____。2. 火箭升空利用____原理。\n【提高作业】质量2kg以6m/s碰静止4kg，完全非弹性，求共速与损失动能。\n【参考答案——教师用】基础1：共速、最大。基础2：反冲（动量守恒）。提高：v共=12/6=2m/s；ΔEk=½×2×36-½×6×4=36-12=24J。","reflection":"✅ 亮点：三类碰撞对比表+反冲小车实验，B班也能区分；等质量交换速度成记忆点。\n⚠️ 需改进：B班共速后常忘记算动能损失，需强调「完全非弹性损失最大」。\n📌 下节课衔接：机械振动——另一种周期运动。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx1-u1-4","lessonId":"l-phy-sx1-u1-4","title":"实验：验证动量守恒定律","book":"选择性必修第一册","unitNumber":1,"unitTitle":"动量","lessonType":"experiment","lessonTypeName":"实验课","periodNumber":4,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["科学探究","科学态度与责任"],"tags":["验证实验","气垫导轨","碰撞","人教版选必一Ch1","第四课时"],"textbookAnalysis":"用气垫导轨（或斜槽、纸带）让两滑块碰撞，用光电门测碰前碰后速度，验证m₁v₁+m₂v₂=m₁v₁′+m₂v₂′。要点：调平导轨、测质量、记录挡光时间、多次测量取平均、分析误差（摩擦、读数）。","overview":"【学情分析】A班：能独立设计步骤、处理数据、分析误差；B班：不会用挡光片算速度、实验步骤乱、不知验证什么等式。共同问题：v=d/Δt（挡光片宽/时间）；要验证的是总动量碰前=碰后；需调平减小外力。","objectives":["物理观念：明确实验目的——验证系统总动量守恒。","科学探究：会用光电门测速，规范完成碰撞实验并采集数据。","科学思维：处理数据、计算碰前碰后总动量并比较。","科学态度与责任：养成多次测量、分析误差的科学严谨态度。"],"keyPoints":"① 原理：m₁v₁+m₂v₂=m₁v₁′+m₂v₂′。\n② 测速：v=d/Δt（挡光片宽d除挡光时间）。\n③ 操作：调平导轨、测质量、记录碰前碰后挡光时间。\n④ 误差：摩擦、读数、气垫不均。","difficulties":"① 测速原理。原因：不懂v=d/Δt，需讲挡光片。\n② 调平。原因：未调平引入外力破坏守恒，需强调。\n③ 数据处理。原因：列两总动量比较，易算错，需示范。","teachingMethods":"① 实验演示（教师先做）。\n② 分组操作。\n③ 数据记录表。\n④ 误差分析讨论。","preparation":"【PPT课件】P1 实验目的原理；P2 器材与装置；P3 测速v=d/Δt；P4 操作步骤；P5 数据记录；P6 误差分析。\n【实验器材】气垫导轨、两滑块（含挡光片）、光电门、天平、砝码。\n【音频】无。","process":[{"step":"Step 1 导入——怎么用实验证明","time":"5分钟","content":"【PPT P1 目的】教师：「上节我们由理论得出动量守恒，今天用实验验证：让两滑块在接近无摩擦的导轨上碰撞，测速度、算总动量，看碰前是否等于碰后。」 预设回答：「要实测速度，验证总动量碰前碰后相等。」 板书时机：黑板写实验目的与原理式。差异化提示：B班听目的；A班需说「为何要验证」。易错点提醒：实验是验证理论，不是重复；要得到可比较的数据。"},{"step":"Step 2 装置器材","time":"8分钟","content":"【PPT P2 装置】教师：「器材：气垫导轨、带挡光片滑块、光电门、天平。先调节导轨水平（滑块能静止或匀速），否则重力分力成外力破坏守恒。」 预设回答：「先调平导轨，再测两滑块质量。」 板书时机：黑板列器材与「先调平」。差异化提示：B班记器材；A班需说调平理由。易错点提醒：未调平→有外力→不守恒；这是实验成败关键。"},{"step":"Step 3 测速原理","time":"9分钟","content":"【PPT P3 测速】教师：「挡光片宽d，通过光电门时间Δt，则滑块速度v=d/Δt。碰前用滑块原速、碰后测各自挡光时间，逐一算v。」 预设回答：「速度=挡光片宽除以挡光时间。」 板书时机：黑板写v=d/Δt。差异化提示：B班记式；A班需说精度。易错点提醒：d是挡光片有效宽度；Δt越小v越大；单位统一。"},{"step":"Step 4 操作步骤","time":"10分钟","content":"【PPT P4 操作】教师：「步骤：①天平测m₁m₂②一滑块静止、一滑块给初速③记碰前两光电门时间④碰后记两时间⑤算碰前总动量p前、碰后p后⑥多次重复取平均。」 预设回答：「测质量、给初速、记时间、算总动量、重复。」 板书时机：黑板写步骤序号。差异化提示：B班跟做；A班需设计记录表。易错点提醒：初速滑块和被撞滑块都要测；重复3次以上减随机误差。"},{"step":"Step 5 数据处理","time":"8分钟","content":"【PPT P5 数据】教师：「例：m₁=0.2,m₂=0.2；碰前v₁=0.5,v₂=0→p前=0.1；碰后v₁′=0.24,v₂′=0.26→p后=0.2×0.24+0.2×0.26=0.1。相等，验证成立。」 预设回答：「算出碰前碰后总动量，在误差内相等就验证了。」 板书时机：黑板写算例。差异化提示：B班算例；A班需自行算一组。易错点提醒：比较看相对误差（百分之几），非绝对相等；合理误差来自摩擦。"},{"step":"Step 6 误差分析","time":"5分钟","content":"【PPT P6 误差】教师：「主要误差：导轨未完全水平、气垫阻力、挡光片宽度与计时误差、质量读数。改进：更精细调平、用更窄挡光片。」 预设回答：「误差来自摩擦和读数，调平、重复可减小。」 板书时机：板书误差源。差异化提示：B班记；A班需提改进。易错点提醒：第1章全部结束，进入机械振动。"}],"blackboard":"┌── 验动量守恒 ──┐\n│ 原理:       │\n│ m1v1+m2v2=  │\n│ m1v1'+m2v2' │\n│ v=d/Δt     │\n│ 先调平导轨  │\n│ 重复取平均  │\n└────────────┘","exercises":"【基础作业】1. 本实验验证的关系式____。2. 滑块速度用什么公式算____。\n【提高作业】m₁=m₂=0.3kg，碰前v₁=0.4m/s、v₂=0；碰后v₁′=0.18、v₂′=0.22，验证守恒（算p前、p后）。\n【参考答案——教师用】基础1：m₁v₁+m₂v₂=m₁v₁′+m₂v₂′。基础2：v=d/Δt。提高：p前=0.3×0.4=0.12；p后=0.3×0.18+0.3×0.22=0.12，相等验证成立。","reflection":"✅ 亮点：调平作为成败关键单独强调；算例让B班看到「数值相等」的验证闭环。\n⚠️ 需改进：B班挡光片测速原理仍生疏，需课前预习d/Δt。\n📌 下节课衔接：机械振动——弹簧振子的周期运动。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx1-u2-1","lessonId":"l-phy-sx1-u2-1","title":"简谐运动","book":"选择性必修第一册","unitNumber":2,"unitTitle":"机械振动","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["简谐运动","弹簧振子","回复力","人教版选必一Ch2","第一课时"],"textbookAnalysis":"机械振动是物体在平衡位置附近的往复运动。弹簧振子是最简单模型：回复力F=-kx（与位移成正比、指向平衡位置），加速度a=-kx/m。位移x从平衡位置算起。简谐运动是最基本的振动。","overview":"【学情分析】A班：能理解F=-kx的动力学特征、分析各位置力与加速度；B班：位移起点错（从端点算）、回复力方向混淆、把x当路程。共同问题：位移x从平衡位置指向当前位置；回复力总指向平衡位置；a与x反向。","objectives":["物理观念：理解机械振动与弹簧振子模型，掌握简谐运动回复力F=-kx。","科学思维：能分析振动中各位置的位移、回复力、加速度方向。","科学探究：通过弹簧振子实验观察振动特征。","科学态度与责任：体会理想模型（振子）在研究周期运动中的作用。"],"keyPoints":"① 机械振动：平衡位置附近往复运动。\n② 弹簧振子：F=-kx（回复力，指向平衡位置）。\n③ 加速度：a=-kx/m，与位移反向。\n④ 位移x：从平衡位置算起（平衡位置x=0）。","difficulties":"① 位移起点。原因：易从端点算，需强调「从平衡位置」。\n② 回复力方向。原因：总指向平衡位置，易错，需画图。\n③ a与x反向。原因：由F=-kx来，需说明。","teachingMethods":"① 弹簧振子演示。\n② 位移定义强调。\n③ 力与加速度分析图。\n④ 平衡位置讨论。","preparation":"【PPT课件】P1 振动实例；P2 弹簧振子；P3 位移定义；P4 回复力F=-kx；P5 力加速度分析；P6 练习。\n【实验器材】弹簧振子、气垫导轨（演示）。\n【音频】无。","process":[{"step":"Step 1 导入——往复运动是振动","time":"5分钟","content":"【PPT P1 实例】教师：「钟摆、弹簧下挂重物、琴弦——都在平衡位置附近来回运动，叫机械振动。今天研究最简单的弹簧振子。」 预设回答：「物体在平衡位置附近往复运动就是振动。」 板书时机：黑板写「机械振动」。差异化提示：B班举摆；A班需说共同点。易错点提醒：振动是「往复」+「围绕平衡位置」；不限于弹簧。"},{"step":"Step 2 弹簧振子","time":"8分钟","content":"【PPT P2 振子】教师：「弹簧一端固定、一端连物块（光滑水平面），忽略摩擦与弹簧质量，就是弹簧振子——理想模型。物块在平衡位置两侧往复。」 预设回答：「弹簧振子是理想化的水平振动模型。」 板书时机：黑板画振子。差异化提示：B班记模型；A班需说理想化。易错点提醒：振子是理想模型；实际有摩擦会衰减。"},{"step":"Step 3 位移定义","time":"9分钟","content":"【PPT P3 位移】教师：「简谐运动的位移x从平衡位置指向物体当前位置。平衡位置x=0；在右侧x为正、左侧为负。注意不是从端点算！」 预设回答：「x从平衡位置算起，右正左负。」 板书时机：黑板写「x：平衡位置→物体」。差异化提示：B班重点；A班需说符号。易错点提醒：这是振动特有的位移定义，与前面直线运动从初位置算不同。"},{"step":"Step 4 回复力","time":"9分钟","content":"【PPT P4 回复力】教师：「弹簧振子受力F=-kx：大小与位移成正比、方向总指向平衡位置（负号表示与x反向）。这叫回复力，是简谐运动的动力学特征。」 预设回答：「回复力F=-kx，把物体拉回平衡位置。」 板书时机：黑板写F=-kx。差异化提示：B班记式；A班需说「负号含义」。易错点提醒：负号表示方向与位移相反（指向平衡）；k是劲度系数。"},{"step":"Step 5 力与加速度","time":"9分钟","content":"【PPT P5 分析】教师：「由F=-kx得a=-kx/m。平衡位置x=0时a=0但速度最大；端点x最大时a最大但速度为0。a总与x反向。」 预设回答：「端点加速度最大速度0，平衡位置速度最大加速度0。」 板书时机：黑板画各位置表。差异化提示：B班做一位置；A班全做。易错点提醒：平衡位置加速度为0但速度最大（非静止）；端点速度0加速度最大。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「振子在右端x=A，回复力与加速度方向？在平衡位置右侧小位移处呢？」 预设回答：「都向左（指向平衡）；仍向左！」 板书时机：板书。差异化提示：B班答；A班补大小。易错点提醒：下节课学简谐运动的描述（振幅周期相位）。"}],"blackboard":"┌── 简谐运动 ──┐\n│ F=-kx      │\n│ a=-kx/m    │\n│ x:平衡→物  │\n│ 端点:a大v0 │\n│ 平衡:a0v大 │\n└────────────┘","exercises":"【基础作业】1. 简谐运动回复力公式____，负号表示____。2. 振动位移x从____算起。\n【提高作业】k=50N/m的振子移至x=0.02m处释放，回复力与加速度（m=0.1kg）？\n【参考答案——教师用】基础1：F=-kx、方向与位移相反（指向平衡）。基础2：平衡位置。提高：F=-50×0.02=-1N（向左）；a=-1/0.1=-10m/s²（向左）。","reflection":"✅ 亮点：位移「从平衡位置算」反复红字，B班不再从端点算；各位置力加速对照表清晰。\n⚠️ 需改进：B班仍把平衡位置当「静止点」，需强调速度最大。\n📌 下节课衔接：用振幅、周期、相位定量描述简谐运动。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx1-u2-2","lessonId":"l-phy-sx1-u2-2","title":"简谐运动的描述","book":"选择性必修第一册","unitNumber":2,"unitTitle":"机械振动","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["振幅","周期","频率","相位","人教版选必一Ch2","第二课时"],"textbookAnalysis":"用x=Acos(ωt+φ)（或Asin）描述简谐运动。A为振幅（最大位移大小），T为周期、f=1/T为频率、ω=2π/T为圆频率。相位ωt+φ决定状态，φ为初相。周期由系统本身（m、k）决定，与振幅无关。","overview":"【学情分析】A班：能由表达式求任意时刻位移、速度，理解相位；B班：混淆振幅与位移、周期频率倒数关系、相位含义；表达式不会用。共同问题：A是最大位移（标量）；T与f互为倒数；相位描述「走到哪一步」；ω=2π/T。","objectives":["物理观念：掌握简谐运动表达式x=Acos(ωt+φ)及各量（A、T、f、ω、φ）意义。","科学思维：能由表达式求某时刻位移、判断相位与运动状态。","科学探究：通过传感器绘制x-t图像理解周期与相位。","科学态度与责任：体会用数学函数描述物理运动的简洁力量。"],"keyPoints":"① 表达式：x=Acos(ωt+φ)（或Asin）。\n② A：振幅（最大位移大小，标量）。\n③ T周期、f频率、ω圆频率，T=1/f，ω=2π/T。\n④ 相位ωt+φ决定状态，φ为初相。","difficulties":"① 振幅vs位移。原因：A是最大位移大小，易混，需区分。\n② T与f。原因：倒数关系乱，需强调。\n③ 相位。原因：抽象，需说「运动状态标识」。","teachingMethods":"① x-t图像法。\n② 表达式推导。\n③ 相位旋转演示。\n④ 量纲训练。","preparation":"【PPT课件】P1 描述量；P2 振幅；P3 周期频率；P4 表达式；P5 相位；P6 练习。\n【实验器材】振动传感器、电脑绘图。\n【音频】无。","process":[{"step":"Step 1 导入——怎么写振动的方程","time":"5分钟","content":"【PPT P1 描述】教师：「平衡位置附近x随时间像余弦曲线变化。用x=Acos(ωt+φ)就能完整描述任意时刻的位置。今天弄清每个字母。」 预设回答：「振动位置随时间按余弦变化，可以写公式。」 板书时机：黑板写x=Acos(ωt+φ)。差异化提示：B班听；A班需说余弦。易错点提醒：也可用sin，只是初相不同；形式等价。"},{"step":"Step 2 振幅","time":"8分钟","content":"【PPT P2 振幅】教师：「A是振幅，即振动的最大位移大小（标量，恒正）。它反映振动强弱。注意A≠某时刻位移x，x在-A到+A间变化。」 预设回答：「振幅是最大偏离，不随时间变。」 板书时机：黑板写「A：最大位移」。差异化提示：B班记；A班需说强弱。易错点提醒：振幅是最大位移的「大小」，不是瞬时位移；两倍振幅是振动范围。"},{"step":"Step 3 周期频率","time":"9分钟","content":"【PPT P3 Tf】教师：「完成一次全振动的时间叫周期T；单位时间振动次数叫频率f=1/T；圆频率ω=2π/T=2πf。T由系统本身（m、k）定，与A无关。」 预设回答：「T是周期、f是频率互为倒数，ω=2π/T。」 板书时机：黑板写关系。差异化提示：B班记；A班需说「与A无关」。易错点提醒：周期与振幅无关（单摆/弹簧均如此）；大振幅只是幅度大不是更慢。"},{"step":"Step 4 表达式应用","time":"9分钟","content":"【PPT P4 应用】教师：「已知x=Acos(ωt+φ)，代入t即可求位移；求导得v=-Aωsin(ωt+φ)求速度。如A=0.1,T=2,φ=0，t=0.5时x=0.1cos(π/2)=0。」 预设回答：「代时间进式子就算出位置和速度。」 板书时机：黑板写算例。差异化提示：B班代t；A班需求导速度。易错点提醒：x-t图是位置不是轨迹；速度由导数或图线斜率得。"},{"step":"Step 5 相位","time":"8分钟","content":"【PPT P5 相位】教师：「相位ωt+φ决定振动「进行到哪一步」（位置与方向）。初相φ是t=0时的相位，决定初始状态。两振动相位差描述步调关系。」 预设回答：「相位告诉现在处于周期的哪一点，初相是起点状态。」 板书时机：黑板写「相位=状态」。差异化提示：B班记；A班需说相位差。易错点提醒：相同相位同步、反相（差π）反向；相位比初相更本质。"},{"step":"Step 6 练习+作业","time":"6分钟","content":"【PPT P6 练习】教师：「A=0.2m,T=4s,φ=0，求t=1s时位移与速度方向。」 预设回答：「x=0.2cos(π/2)=0，过平衡位置向负向（由sin符号）！」 板书时机：板书。差异化提示：B班算x；A班补方向。易错点提醒：下节课学单摆（周期与摆长关系）。"}],"blackboard":"┌── 描述 ──┐\n│ x=Acos(ωt+φ)│\n│ A:振幅(最大)│\n│ T=1/f      │\n│ ω=2π/T     │\n│ 相位=状态   │\n└────────────┘","exercises":"【基础作业】1. 简谐运动表达式____。2. 周期T与频率f关系____，圆频率ω=____。\n【提高作业】弹簧振子A=0.1m,T=2s,φ=0，求t=0.5s位移及此时运动方向。\n【参考答案——教师用】基础1：x=Acos(ωt+φ)。基础2：T=1/f、2π/T。提高：ω=π，x=0.1cos(π/2)=0（过平衡位置）；v=-Aωsin(π/2)=-0.1π\x3c0，向负方向。","reflection":"✅ 亮点：相位用「进行到哪一步」通俗化；A与瞬时位移区分用「最大位移大小」点透。\n⚠️ 需改进：B班对初相φ仍抽象，需多给t=0初始状态反推φ。\n📌 下节课衔接：单摆周期公式T=2π√(L/g)。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx1-u2-3","lessonId":"l-phy-sx1-u2-3","title":"单摆","book":"选择性必修第一册","unitNumber":2,"unitTitle":"机械振动","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["单摆","周期公式","等效摆长","人教版选必一Ch2","第三课时"],"textbookAnalysis":"单摆是理想模型（不可伸长轻绳+可视为质点的摆球）。小角度（θ\x3c5°）下回复力F≈-mgx/L，作简谐运动，周期T=2π√(L/g)（与振幅、质量无关，只由摆长L和g决定）。用单摆可测重力加速度g=4π²L/T²。","overview":"【学情分析】A班：能推导周期公式、用单摆测g、处理等效摆长；B班：忘小角度条件、误以为周期与质量/振幅有关、g计算错。共同问题：T=2π√(L/g)仅小角度成立；与m、A无关；L是悬点到球心距离；可测g。","objectives":["物理观念：理解单摆模型与小角度下简谐运动，掌握周期T=2π√(L/g)。","科学思维：能用单摆测量重力加速度，理解等效摆长。","科学探究：通过实验探究单摆周期与摆长的关系。","科学态度与责任：体会理想模型与实验测量结合的物理方法。"],"keyPoints":"① 模型：轻绳+质点摆球（小角度）。\n② 周期：T=2π√(L/g)（与m、A无关）。\n③ 条件：偏角\x3c5°才近似简谐。\n④ 测g：g=4π²L/T²。","difficulties":"① 小角度条件。原因：易忽略，需强调「否则非简谐」。\n② 无关量。原因：以为与m/A有关，需由式说明。\n③ 等效摆长。原因：复合摆L难定，需分析。","teachingMethods":"① 模型讲解。\n② 周期公式推导（小角度）。\n③ 单摆测g实验。\n④ 摆长讨论。","preparation":"【PPT课件】P1 单摆模型；P2 回复力与小角度；P3 周期公式；P4 与m/A无关；P5 测g；P6 练习。\n【实验器材】单摆、秒表、刻度尺、铁架台。\n【音频】无。","process":[{"step":"Step 1 导入——钟摆为何准时","time":"5分钟","content":"【PPT P1 模型】教师：「秋千、钟摆都是单摆：细长轻绳下端挂小球。忽略绳重与空气阻力，小角度摆动近似简谐。它的周期很规律。」 预设回答：「单摆是绳下挂小球，小角度摆动。」 板书时机：黑板写「单摆模型」。差异化提示：B班举秋千；A班需说理想化。易错点提醒：摆球要小（质点）、绳要轻且不可伸长；大角度不简谐。"},{"step":"Step 2 回复力","time":"9分钟","content":"【PPT P2 回复力】教师：「偏角θ时，切向回复力F=-mgsinθ。小角度θ\x3c5°时sinθ≈θ≈x/L，故F≈-(mg/L)x，即简谐（k=mg/L）。」 预设回答：「小角度下sinθ≈θ，回复力与位移成正比反向。」 板书时机：黑板写F≈-(mg/L)x。差异化提示：B班记结论；A班需推近似。易错点提醒：必须小角度sinθ≈θ才简谐；大角度周期略变长。"},{"step":"Step 3 周期公式","time":"9分钟","content":"【PPT P3 周期】教师：「由简谐周期T=2π√(m/k)，代入k=mg/L得T=2π√(L/g)。可见周期只由摆长L和g决定，与质量、振幅无关。」 预设回答：「T=2π√(L/g)，只跟摆长和g有关！」 板书时机：黑板写T=2π√(L/g)。差异化提示：B班记式；A班需推。易错点提醒：与摆球质量、振幅无关；L是悬点到球心距离。"},{"step":"Step 4 无关量","time":"8分钟","content":"【PPT P4 无关】教师：「换重球周期不变（m消掉）；加大振幅（仍小角）周期不变——这是单摆「等时性」。伽利略由此想到用摆计时。」 预设回答：「质量、振幅都不影响周期，摆有等时性。」 板书时机：黑板写「等时性」。差异化提示：B班记；A班需联历史。易错点提醒：等时性仅在小角度近似内成立；大幅摆动周期会变。"},{"step":"Step 5 测重力加速度","time":"9分钟","content":"【PPT P5 测g】教师：「测摆长L与周期T（测n次全振动取平均减误差），由T=2π√(L/g)得g=4π²L/T²。这是实验室测g的常用法。」 预设回答：「量L和T，用g=4π²L/T²算重力加速。」 板书时机：黑板写g=4π²L/T²。差异化提示：B班记式；A班需说测T技巧。易错点提醒：T要测多次全振动求平均（如30次/30）；L含球半径。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「L=1m（g=9.8）单摆周期？L减半周期变？」 预设回答：「T=2π√(1/9.8)≈2.0s；减半T变1/√2倍！」 板书时机：板书。差异化提示：B班算；A班补比例。易错点提醒：下节课学受迫振动与共振。"}],"blackboard":"┌── 单摆 ──┐\n│ 小角度简谐  │\n│ T=2π√(L/g) │\n│ 与m,A无关   │\n│ g=4π²L/T²  │\n│ L=悬点→球心│\n└────────────┘","exercises":"【基础作业】1. 单摆周期公式____，成立条件____。2. 用单摆测g的公式____。\n【提高作业】摆长0.994m，30次全振动用60s，求g（π²≈10）。\n【参考答案——教师用】基础1：T=2π√(L/g)、偏角很小（\x3c5°）。基础2：g=4π²L/T²。提高：T=2s，g=4×10×0.994/4≈9.94m/s²。","reflection":"✅ 亮点：小角度sinθ≈θ推导让公式可信；等时性用伽利略故事记忆。\n⚠️ 需改进：B班测g时L漏加球半径，需红字「含球心」。\n📌 下节课衔接：受迫振动与共振现象。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx1-u2-4","lessonId":"l-phy-sx1-u2-4","title":"受迫振动 共振","book":"选择性必修第一册","unitNumber":2,"unitTitle":"机械振动","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学态度与责任"],"tags":["受迫振动","共振","固有频率","人教版选必一Ch2","第四课时"],"textbookAnalysis":"物体在周期性外力（驱动力）作用下的振动叫受迫振动，稳定后频率等于驱动力频率，与固有频率无关。当驱动力频率接近固有频率时振幅最大，称共振。共振有利（乐器、测量）有害（桥梁坍塌），需利用或防止。","overview":"【学情分析】A班：能理解受迫振动频率等于驱动力频率、共振条件与利弊；B班：误以为受迫振动频率等于固有频率、共振曲线不清。共同问题：稳定受迫振动频率=驱动力频率；共振发生在驱频≈固有频率；振幅曲线峰值。","objectives":["物理观念：理解受迫振动与共振，知道稳定频率等于驱动力频率。","科学思维：能解释共振条件，用共振曲线说明振幅随驱频变化。","科学探究：通过实验（振子受周期驱动）观察共振现象。","科学态度与责任：辩证看待共振的利与害，树立技术安全意识。"],"keyPoints":"① 受迫振动：外力周期驱动，稳定频率=驱动力频率。\n② 共振：驱动力频率≈固有频率时振幅最大。\n③ 共振曲线：振幅随驱频在固有频率处出现峰值。\n④ 利弊：利用（乐器）与防止（减振）。","difficulties":"① 稳定频率。原因：易等于固有频率，需强调「等于驱动力频率」。\n② 共振条件。原因：驱频≈固有频率，需实验。\n③ 利弊。原因：需辩证，避免绝对化。","teachingMethods":"① 驱动力演示。\n② 共振实验（多个摆/频率扫描）。\n③ 共振曲线。\n④ 实例辨析（塔科马大桥）。","preparation":"【PPT课件】P1 受迫振动；P2 稳定频率；P3 共振实验；P4 共振曲线；P5 利弊；P6 练习。\n【实验器材】共振摆（同长摆一列）、电机驱动装置。\n【音频】无。","process":[{"step":"Step 1 导入——外力推着振","time":"5分钟","content":"【PPT P1 受迫】教师：「秋千没人推会停，有人周期性推就持续摆——这是受迫振动：物体在周期性外力（驱动力）作用下振动。」 预设回答：「有外力周期性推，物体就持续振动。」 板书时机：黑板写「受迫振动」。差异化提示：B班举秋千；A班需说驱动力。易错点提醒：受迫振动靠外界持续供能维持，否则阻尼使振幅衰减。"},{"step":"Step 2 稳定频率","time":"9分钟","content":"【PPT P2 频率】教师：「受迫振动稳定后，振动频率等于驱动力频率，与物体固有频率无关。无论你固有频率多少，被推多快就振多快。」 预设回答：「稳定后频率跟着驱动力走，不是自己的固有频率。」 板书时机：黑板写「f稳=f驱」。差异化提示：B班记；A班需强调。易错点提醒：这是关键易错点——稳定频率≠固有频率。"},{"step":"Step 3 共振实验","time":"10分钟","content":"【PPT P3 共振】教师：「一列摆长不同的摆，用电机以某频率驱动端摆，当驱动力频率接近某摆固有频率时，该摆振幅骤增——共振。固有频率相同的摆响应最强。」 预设回答：「驱动频率和谁固有频率接近，谁的振幅就最大。」 板书时机：黑板画共振摆。差异化提示：B班看现象；A班需说原理。易错点提醒：共振发生在f驱≈f固；不是所有摆都大振，只有匹配的。"},{"step":"Step 4 共振曲线","time":"8分钟","content":"【PPT P4 曲线】教师：「画振幅A随驱动力频率f的曲线：在f=f固处出现尖锐峰值（阻尼小更尖）。这就是共振曲线。」 预设回答：「频率接近固有频率时振幅最大，曲线有个峰。」 板书时机：黑板画共振曲线。差异化提示：B班看图；A班需说阻尼影响。易错点提醒：阻尼越小峰越尖、共振越剧烈；阻尼大峰变缓。"},{"step":"Step 5 利弊","time":"8分钟","content":"【PPT P5 利弊】教师：「利：共振筛、乐器共鸣、微波炉（分子共振）。害：部队过桥走便步、机器加装减振、塔科马大桥因风共振坍塌。要利用或防止。」 预设回答：「共振能用来做事也能毁东西，要看情况利用或避开。」 板书时机：黑板写「利/害」。差异化提示：B班听例；A班需分析大桥。易错点提醒：防止共振——使驱动力频率远离固有频率或増阻尼。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「机器转速使其驱动频率接近底座固有频率引发剧烈振动，怎么办？」 预设回答：「改变转速避开固有频率，或加阻尼/减振垫！」 板书时机：板书。差异化提示：B班答；A班补原理。易错点提醒：第2章结束，下章学机械波。"}],"blackboard":"┌── 受迫共振 ──┐\n│ f稳=f驱    │\n│ 共振:f驱≈f固│\n│ 振幅最大   │\n│ 阻尼小峰尖 │\n│ 利:乐器    │\n│ 害:桥塌    │\n└────────────┘","exercises":"【基础作业】1. 受迫振动稳定后频率等于____频率。2. 共振发生在驱动力频率____固有频率时。\n【提高作业】如何防止机器底座共振？说出两种办法。\n【参考答案——教师用】基础1：驱动力。基础2：接近（≈）。提高：①改变驱动频率使其远离固有频率（调转速）；②增大阻尼/加减振装置；③改变结构固有频率。","reflection":"✅ 亮点：共振摆实验让「频率匹配才大振」直观；塔科马大桥案例震撼且有教育意义。\n⚠️ 需改进：B班仍把稳定频率当固有频率，需红字「f稳=f驱」。\n📌 下节课衔接：机械波——振动在介质中传播。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx1-u3-1","lessonId":"l-phy-sx1-u3-1","title":"波的形成和传播","book":"选择性必修第一册","unitNumber":3,"unitTitle":"机械波","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["机械波","横波","纵波","人教版选必一Ch3","第一课时"],"textbookAnalysis":"机械振动在介质中传播形成机械波。质点的振动方向与波传播方向垂直的叫横波（凸起波峰、凹下波谷），平行的叫纵波（疏部密部）。各质点只在平衡位置附近振动，并不随波迁移；传播的是振动形式和能量。","overview":"【学情分析】A班：能区分横波纵波、理解质点不随波迁移；B班：误以为质点随波走、波峰波谷与疏密部混；横纵波判别弱。共同问题：波传播的是振动形式与能量，质点只在原地振动；横波有峰谷、纵波有疏密。","objectives":["物理观念：理解机械波的形成，区分横波与纵波。","科学思维：认识介质中质点只在平衡位置振动、不随波迁移。","科学探究：通过绳波、弹簧波实验观察波的传播。","科学态度与责任：体会「传播的是运动形式与能量」的辩证认识。"],"keyPoints":"① 波：机械振动在介质中传播形成。\n② 横波：振动⊥传播（有波峰波谷），如绳波。\n③ 纵波：振动∥传播（有疏部密部），如声波。\n④ 质点不随波迁移，传播的是振动形式与能量。","difficulties":"① 质点不迁移。原因：直觉以为随波走，需实验纠正。\n② 横纵判别。原因：峰谷与疏密混，需对比。\n③ 传播本质。原因：传形式与能量非物质，需点明。","teachingMethods":"① 绳波演示。\n② 弹簧纵波演示。\n③ 质点振动动画。\n④ 横纵对比。","preparation":"【PPT课件】P1 波的形成；P2 绳波（横波）；P3 弹簧波（纵波）；P4 质点不迁移；P5 传播本质；P6 练习。\n【实验器材】长绳、螺旋弹簧。\n【音频】无。","process":[{"step":"Step 1 导入——振动怎样传开","time":"5分钟","content":"【PPT P1 形成】教师：「抖动绳一端，波形沿绳传向另一端——这是振动在介质中传播形成机械波。没有介质（如真空）机械波不能传。」 预设回答：「振动在绳子这种介质里传开形成波。」 板书时机：黑板写「机械波=振动传播」。差异化提示：B班举绳波；A班需说介质。易错点提醒：机械波必须靠介质；真空中不传（光波例外，那是电磁波）。"},{"step":"Step 2 横波","time":"9分钟","content":"【PPT P2 横波】教师：「绳波中质点上下振、波向右传，振动方向与传播垂直——横波。有凸起的波峰和凹下的波谷。水滴表面波也是横波。」 预设回答：「上下振、横向传的是横波，有峰有谷。」 板书时机：黑板画横波标峰谷。差异化提示：B班记；A班需说垂直。易错点提醒：横波特征——振动⊥传播，有峰谷；固体液体气体中绳是典型。"},{"step":"Step 3 纵波","time":"9分钟","content":"【PPT P3 纵波】教师：「弹簧一端推拉，疏密相间向右传——质点振动与传播同向，是纵波。有疏部和密部。声波是纵波（空气疏密）。」 预设回答：「前后振、同向传的是纵波，有疏密部。」 板书时机：黑板画纵波标疏密。差异化提示：B班记；A班需说同向。易错点提醒：纵波特征——振动∥传播，有疏密；声波是纵波可传于气液固。"},{"step":"Step 4 质点不迁移","time":"9分钟","content":"【PPT P4 不迁移】教师：「波传过时，每个质点只在自己平衡位置附近振动，并不随波漂走。漂走的只是「振动状态」。可放小叶在绳上看它只上下跳。」 预设回答：「质点原地振动，不跟着波跑，跑的是波形。」 板书时机：黑板写「质点不随波迁移」。差异化提示：B班看演示；A班需说能量。易错点提醒：这是高频错点——波传播能量但介质不整体迁移。"},{"step":"Step 5 传播本质","time":"8分钟","content":"【PPT P5 本质】教师：「波传播的是振动形式和能量，不是物质本身。后一个质点重复前一个的振动（滞后），形成「牵一动百」的连锁。」 预设回答：「传过去的是振动的样子和能量，不是物质。」 板书时机：黑板写「传形式与能量」。差异化提示：B班记；A班需说滞后。易错点提醒：各质点起振时刻依次滞后；频率都相同（由波源定）。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「声波是横波还是纵波？绳波中质点随波向右走吗？」 预设回答：「声波纵波；质点不随波走，只上下振动！」 板书时机：板书。差异化提示：B班答；A班补解释。易错点提醒：下节课学波长、频率、波速关系。"}],"blackboard":"┌── 波的形成 ──┐\n│ 振动在介质传│\n│ 横波:⊥(峰谷)│\n│ 纵波:∥(疏密)│\n│ 质点不迁移  │\n│ 传形式与能量│\n└────────────┘","exercises":"【基础作业】1. 质点振动方向与波传播垂直的波叫____，有____和____。2. 波传播的是____和____，质点____（填随/不随）波迁移。\n【提高作业】举一个纵波实例并说明其疏密部含义。\n【参考答案——教师用】基础1：横波、波峰、波谷。基础2：振动形式、能量、不随。提高：声波是纵波，空气分子疏密相间传播，密部分子密集、疏部稀疏。","reflection":"✅ 亮点：绳波+弹簧波双演示让横纵一目了然；「质点不迁移」用放小叶观察破直觉。\n⚠️ 需改进：B班仍说「波把质点带走」，需反复强调传能量不传物质。\n📌 下节课衔接：波长、频率、波速v=λf。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx1-u3-2","lessonId":"l-phy-sx1-u3-2","title":"波的描述","book":"选择性必修第一册","unitNumber":3,"unitTitle":"机械波","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["波长","频率","波速","v=λf","人教版选必一Ch3","第二课时"],"textbookAnalysis":"波长λ是相邻同相质点间的距离（波峰到相邻波峰）。波的频率f等于波源振动频率（各质点同频）。波速v由介质决定，v=λf。同一列波在不同介质中f不变、v变故λ变。","overview":"【学情分析】A班：能熟练用v=λf、理解频率由波源定、波速由介质定；B班：波长定义错（当成波峰到波谷）、以为频率由介质定；v=λf单位乱。共同问题：λ是相邻同相点距离；f由波源决定不变；v由介质决定；三者关系v=λf。","objectives":["物理观念：理解波长、频率、波速及关系v=λf。","科学思维：能判断λ的定义，分析波在不同介质中λ的变化。","科学探究：通过波形图测量λ、读周期求v。","科学态度与责任：建立「波源定频、介质定速」的清晰图像。"],"keyPoints":"① λ：相邻同相质点距离（峰到邻峰）。\n② f：等于波源频率，各质点同频。\n③ v：由介质决定，v=λf。\n④ 换介质：f不变，v变→λ变。","difficulties":"① λ定义。原因：易取峰到谷（半波长），需强调「相邻同相」。\n② 谁定频/速。原因：混淆，需「源定频、介质定速」。\n③ 换介质。原因：以为λ不变，需由v=λf推。","teachingMethods":"① 波形图标注λ。\n② 频率来源说明。\n③ v=λf推导。\n④ 换介质讨论。","preparation":"【PPT课件】P1 波长；P2 频率来源；P3 波速；P4 v=λf；P5 换介质；P6 练习。\n【实验器材】波形图挂图、波动演示软件。\n【音频】无。","process":[{"step":"Step 1 导入——波也有「尺寸」","time":"5分钟","content":"【PPT P1 波长】教师：「波形上相邻两个波峰间的距离叫波长λ。更准确：相邻振动状态完全相同（同相）的两质点间距为一个波长。」 预设回答：「一个波长就是相邻波峰（或同相点）之间的距离。」 板书时机：黑板写「λ：相邻同相点距」。差异化提示：B班看峰谷；A班需说同相。易错点提醒：λ是峰到「相邻」峰，不是峰到谷（那是λ/2）。"},{"step":"Step 2 频率","time":"8分钟","content":"【PPT P2 频率】教师：「波的频率f等于波源（及每个质点）的振动频率。各质点起振滞后但频率相同，都由波源决定，与介质无关。」 预设回答：「波的频率就是波源的频率，换介质也不变。」 板书时机：黑板写「f=f源」。差异化提示：B班记；A班需说不变。易错点提醒：频率由波源决定，这是易错点——介质改变频率不变。"},{"step":"Step 3 波速","time":"8分钟","content":"【PPT P3 波速】教师：「波速v是波形传播快慢，由介质决定（固体>液体>气体对机械波）。同一介质中同种波v一定。」 预设回答：「波速由介质决定，不同介质快慢不同。」 板书时机：黑板写「v由介质定」。差异化提示：B班记；A班需排介质快慢。易错点提醒：波速≠质点振动速度；v是波形推进速度。"},{"step":"Step 4 v=λf","time":"9分钟","content":"【PPT P4 关系】教师：「一周期T内波形推进一个波长λ，故v=λ/T=λf。这是波的基本关系，单位m/s。」 预设回答：「v=λf，波速等于波长乘频率。」 板书时机：黑板写v=λf。差异化提示：B班记式；A班需推v=λ/T。易错点提醒：三个量中f、v往往已知其一，求另一；注意单位统一。"},{"step":"Step 5 换介质","time":"9分钟","content":"【PPT P5 换介质】教师：「同一波从空气入水：f不变，v变（介质变），由v=λf知λ也变。如声波进水速度变快、波长变长。」 预设回答：「换介质频率不变，速度变所以波长跟着变。」 板书时机：黑板写「f不变、vλ变」。差异化提示：B班做一例；A班需推导。易错点提醒：别误以为λ不变；f恒定是锚点。"},{"step":"Step 6 练习+作业","time":"6分钟","content":"【PPT P6 练习】教师：「声波f=500Hz、空气中v=340m/s，波长？入水v=1500，波长变？」 预设回答：「λ=0.68m；入水λ=3m，变长！」 板书时机：板书。差异化提示：B班算；A班补换介质。易错点提醒：下节课学波的反射、折射、衍射、干涉。"}],"blackboard":"┌── 波的描述 ──┐\n│ λ:相邻同相距│\n│ f=f源(不变) │\n│ v=介质定    │\n│ v=λf       │\n│ 换介质:λ变 │\n└────────────┘","exercises":"【基础作业】1. 波长定义____。2. 波速、波长、频率关系____；波的频率由____决定。\n【提高作业】波源f=200Hz，介质中v=80m/s，求λ；若换介质v=160，λ变多少？\n【参考答案——教师用】基础1：相邻同相质点间距（或峰到邻峰）。基础2：v=λf、波源。提高：λ=80/200=0.4m；换介质f不变，λ=160/200=0.8m（变长）。","reflection":"✅ 亮点：λ「相邻同相」纠正峰到谷的常见误；「源定频、介质定速」成口诀。\n⚠️ 需改进：B班常把质点速度当波速，需两速度区分。\n📌 下节课衔接：波的反射折射衍射干涉与多普勒。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx1-u3-3","lessonId":"l-phy-sx1-u3-3","title":"波的反射、折射、衍射和干涉","book":"选择性必修第一册","unitNumber":3,"unitTitle":"机械波","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["反射","折射","衍射","干涉","人教版选必一Ch3","第三课时"],"textbookAnalysis":"波遇障碍或界面会反射（回原介质）、折射（入另一介质改向，因v变）。衍射是波绕过障碍物的现象，明显衍射条件：障碍物尺寸≈波长。干涉是两列相干波叠加形成稳定强弱分布，要求频率相同、振动方向一致、相位差恒定（加强/减弱条件）。","overview":"【学情分析】A班：能分析干涉加强减弱条件、衍射明显条件；B班：衍射与折射混、干涉条件不清、加强减弱判据弱。共同问题：衍射是「绕障」，明显条件尺寸≈λ；干涉需相干波；加强Δr=nλ、减弱Δr=(n+½)λ。","objectives":["物理观念：理解波的反射、折射、衍射与干涉现象及条件。","科学思维：能用路程差判断干涉加强/减弱，分析明显衍射条件。","科学探究：通过双缝/水波实验观察干涉图样。","科学态度与责任：体会波的叠加原理与普遍规律。"],"keyPoints":"① 反射：波回原介质；折射：入他介质改向（v变）。\n② 衍射：绕过障碍，明显条件：障碍尺寸≈波长。\n③ 干涉：相干波叠加，稳定强弱图样。\n④ 加强Δr=nλ，减弱Δr=(n+½)λ。","difficulties":"① 衍射条件。原因：误以为任何障碍都明显衍射，需尺寸≈λ。\n② 干涉条件。原因：相干三条件忘，需强调同频同方向恒相差。\n③ 加强减弱。原因：路程差判据乱，需示范。","teachingMethods":"① 水波演示（反射折射）。\n② 单缝衍射演示。\n③ 双缝干涉实验。\n④ 路程差判据训练。","preparation":"【PPT课件】P1 反射折射；P2 衍射；P3 干涉条件；P4 加强减弱；P5 实验图样；P6 练习。\n【实验器材】水波槽、双缝、障碍物。\n【音频】无。","process":[{"step":"Step 1 导入——波遇界会怎样","time":"5分钟","content":"【PPT P1 反射折射】教师：「波撞墙返回是反射；从空气入水改方向是折射（因两介质波速不同）。声波、水波都如此，和光类似。」 预设回答：「撞回是反射，斜着进另一种介质拐弯是折射。」 板书时机：黑板写「反射/折射」。差异化提示：B班举回声；A班需说v变。易错点提醒：折射因v变导致λ变、方向偏；频率仍不变。"},{"step":"Step 2 衍射","time":"9分钟","content":"【PPT P2 衍射】教师：「波能绕过障碍物继续传播叫衍射。明显衍射条件：障碍物或孔的尺寸与波长相近（≤波长更明显）。门缝传声、声波绕墙都因衍射。」 预设回答：「尺寸和波长差不多时才能明显绕过去。」 板书时机：黑板写「衍射：尺寸≈λ」。差异化提示：B班记条件；A班需举声波例。易错点提醒：衍射始终存在，只是「明显」需尺寸≈λ；光波长短故日常难见。"},{"step":"Step 3 干涉条件","time":"9分钟","content":"【PPT P3 条件】教师：「两列波叠加成稳定图样需相干：频率相同、振动方向一致、相位差恒定。同频同源分成两束最易满足。满足才有稳定加强减弱区。」 预设回答：「两波要同频同方向、相差恒定才能稳定干涉。」 板书时机：黑板写「相干三条件」。差异化提示：B班记三条件；A班需说来源。易错点提醒：不相干则图样乱变；稳定图样是干涉标志。"},{"step":"Step 4 加强减弱","time":"10分钟","content":"【PPT P4 判据】教师：「到两波源路程差Δr：Δr=nλ处始终加强（振幅叠加最大）；Δr=(n+½)λ处始终减弱（最小，可近似为0）。n为整数。」 预设回答：「路差为整数波长加强，半整数波长减弱。」 板书时机：黑板写加强/减弱式。差异化提示：B班记两式；A班需算某点。易错点提醒：加强是振幅最大非位移始终最大；减弱点仍在振动（除非两振幅恰等）。"},{"step":"Step 5 实验图样","time":"7分钟","content":"【PPT P5 图样】教师：「水波槽双缝实验显示明暗相间条纹（加强减弱区交替）。声波、光波干涉同理，是波特有的证据。」 预设回答：「看到一条条强弱相间的条纹就是干涉图样。」 板书时机：黑板画干涉条纹。差异化提示：B班看图；A班需说意义。易错点提醒：干涉是「波」的重要特征，可用于测波长。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「两同相波源λ=2m，某点Δr=3m，加强还是减弱？Δr=3m=(1.5)λ→？」 预设回答：「3m=1.5λ是半整数，减弱！」 板书时机：板书。差异化提示：B班判；A班补另点。易错点提醒：下节课学多普勒效应。"}],"blackboard":"┌── 波的现象 ──┐\n│ 反射:回原质 │\n│ 折射:改向   │\n│ 衍射:尺寸≈λ│\n│ 干涉:相干   │\n│ 加强:Δr=nλ │\n│ 减弱:Δr=(n+½)λ│\n└────────────┘","exercises":"【基础作业】1. 明显衍射条件____。2. 干涉加强条件____，减弱条件____。\n【提高作业】两同相波源λ=1m，P点距两源分别为5m和5.5m，P加强还是减弱？\n【参考答案——教师用】基础1：障碍物尺寸与波长相近。基础2：Δr=nλ、Δr=(n+½)λ。提高：Δr=0.5m=0.5λ=(n+½)λ（n=0），减弱。","reflection":"✅ 亮点：衍射「明显条件尺寸≈λ」纠正「任何障碍都衍射」；加强减弱用路差判据成套路。\n⚠️ 需改进：B班把折射与衍射混，需对比「改向vs绕障」。\n📌 下节课衔接：多普勒效应——频率因相对运动变化。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx1-u3-4","lessonId":"l-phy-sx1-u3-4","title":"多普勒效应","book":"选择性必修第一册","unitNumber":3,"unitTitle":"机械波","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["多普勒效应","频率变化","人教版选必一Ch3","第四课时"],"textbookAnalysis":"多普勒效应：波源与观察者相对接近时，观察者接收频率变高；远离时变低。本质是相对运动改变了单位时间到达的波数。应用于测速（雷达、彩超）、天文红移（星体远离）。","overview":"【学情分析】A班：能解释多普勒成因、举应用；B班：把「频率变」误解为波源本身频率变、混淆接近与远离；红移含义不清。共同问题：观察者接收频率变，波源频率不变；接近→高频（音调高）、远离→低频；红移示远离。","objectives":["物理观念：理解多普勒效应及成因（相对运动改变接收频率）。","科学思维：能判断接近/远离时接收频率高低，解释生活现象。","科学探究：通过实验（声源运动/旋转扬声器）观察音调变化。","科学态度与责任：认识多普勒效应在测速、天文观测中的价值。"],"keyPoints":"① 现象：接近→接收频率高（音调高）；远离→频率低。\n② 本质：相对运动改变单位时间到达的波数。\n③ 波源频率本身不变。\n④ 应用：测速、医用彩超、宇宙红移（远离）。","difficulties":"① 频率谁变。原因：误以为波源频率变，需强调「观察者接收频率变」。\n② 接近远离。原因：高低频易反，需演示。\n③ 红移。原因：天文含义不清，需说明示远离。","teachingMethods":"① 鸣笛车演示（视频）。\n② 旋转扬声器实验。\n③ 波前疏密画图。\n④ 应用讲解。","preparation":"【PPT课件】P1 现象；P2 接近高频；P3 波前画图；P4 本质；P5 应用红移；P6 练习。\n【实验器材】旋转扬声器（或鸣笛车视频）。\n【音频】无。","process":[{"step":"Step 1 导入——救护车由远及近","time":"5分钟","content":"【PPT P1 现象】教师：「救护车驶近时警笛尖（音调高），驶离后变沉（音调低）——这是多普勒效应。注意：是「听到的」频率变，不是笛本身变。」 预设回答：「靠近时声音尖、离开时沉，是多普勒效应。」 板书时机：黑板写「多普勒效应」。差异化提示：B班举救护车；A班需说「听到」。易错点提醒：波源自身频率不变，变的是观察者接收的频率。"},{"step":"Step 2 接近高频","time":"9分钟","content":"【PPT P2 接近】教师：「波源向观察者运动时，波前被压缩，单位时间到达更多波峰→接收频率升高（音调高）。远离时波前拉长→频率降低。」 预设回答：「靠近波被压缩听到更密更高，远离更疏更低。」 板书时机：黑板写「接近↑频率」。差异化提示：B班记；A班需说波前。易错点提醒：接近高频、远离低频，方向别反；这是最易错点。"},{"step":"Step 3 波前图","time":"9分钟","content":"【PPT P3 画图】教师：「画波源运动：前方波前间距变小（波长变短→高频），后方间距变大（波长变长→低频）。观察者在前方收高频、后方收低频。」 预设回答：「运动前方波长被压短、后方被拉长。」 板书时机：黑板画波前疏密。差异化提示：B班看图；A班需联v=λf。易错点提醒：此处λ是观察者参考系中的有效波长；波源系频率不变。"},{"step":"Step 4 本质","time":"8分钟","content":"【PPT P4 本质】教师：「本质是相对运动改变了单位时间内到达观察者的波数。若二者相对静止，无多普勒效应。公式f′=f·v/(v∓v_s)（取决于接近/远离）。」 预设回答：「相对运动让单位时间收到的波数变了，所以频率变。」 板书时机：黑板写本质。差异化提示：B班记定性；A班需看公式。易错点提醒：核心是「相对运动」；静止无效应；光也适用（相对论修正）。"},{"step":"Step 5 应用红移","time":"8分钟","content":"【PPT P5 应用】教师：「应用：交通测速雷达、医院彩超看血流、天文观测星系光谱红移（频率降低=星体远离），据此知宇宙在膨胀。」 预设回答：「测速、彩超都用多普勒，红移说明星系在远离。」 板书时机：黑板写「应用+红移」。差异化提示：B班听；A班需说红移。易错点提醒：红移=频率降低=远离；蓝移=接近；宇宙观测多为红移。"},{"step":"Step 6 练习+作业","time":"6分钟","content":"【PPT P6 练习】教师：「火车站哨声频率固定，列车驶近站台乘客听到音调如何？驶离呢？」 预设回答：「驶近更高、驶离更低！」 板书时机：板书。差异化提示：B班答；A班补红移。易错点提醒：选必一全部结束，进入选择性必修二（电磁）。"}],"blackboard":"┌── 多普勒 ──┐\n│ 接近:频率↑ │\n│ 远离:频率↓ │\n│ 源频不变!  │\n│ 本质:相对动│\n│ 红移=远离  │\n└────────────┘","exercises":"【基础作业】1. 多普勒效应中，观察者接收到的频率在波源____时升高、____时降低。2. 宇宙星系光谱红移说明星系在____（填接近/远离）地球。\n【提高作业】简述多普勒效应在交通测速中的原理。\n【参考答案——教师用】基础1：接近、远离。基础2：远离。提高：测速雷达发射已知频率波，接收反射波因车辆运动产生频率差，由多普勒公式反推车速。","reflection":"✅ 亮点：波前疏密图让「接近高频」从现象到本质；红移联系宇宙膨胀拓展视野。\n⚠️ 需改进：B班仍说「波源频率变」，需每遍强调「接收频率变、源频不变」。\n📌 下节课衔接：选必二电磁感应——磁场中的电动势。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx2-u1-1","lessonId":"l-phy-sx2-u1-1","title":"磁通量 电磁感应现象","book":"选择性必修第二册","unitNumber":1,"unitTitle":"电磁感应","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["磁通量","电磁感应","法拉第","人教版选必二Ch1","第一课时"],"textbookAnalysis":"磁通量Φ=BS⊥（磁感应强度垂直穿过面积的分量），单位韦伯Wb。产生感应电流的条件：闭合回路、磁通量发生变化。奥斯特发现电生磁，法拉第历经十年发现磁生电（电磁感应）。","overview":"【学情分析】A班：能计算磁通量及变化、判断感应电流有无；B班：磁通量定义不清（忽略B与面夹角）、把「有磁场」当「磁通量变」；条件漏「闭合」。共同问题：Φ=BS⊥，S⊥是垂直磁场的投影面积；条件是闭合回路磁通量变化。","objectives":["物理观念：理解磁通量Φ=BS⊥，掌握电磁感应产生条件。","科学思维：会计算磁通量及其变化，判断有无感应电流。","科学探究：通过实验（磁铁插入线圈）观察感应电流产生。","科学态度与责任：体会法拉第十年坚持、逆向思考的科学精神。"],"keyPoints":"① 磁通量：Φ=BS⊥（B垂直面积分量），单位Wb。\n② 条件：闭合回路 + 磁通量发生变化。\n③ 磁通量变化：B变、S变或夹角变均可。\n④ 电生磁（奥斯特）→磁生电（法拉第）。","difficulties":"① Φ定义。原因：忽略B与面夹角，需强调S⊥（投影）。\n② 条件。原因：漏「闭合」或误「有磁场就有电流」，需实验。\n③ 变化来源。原因：不知B/S/夹角皆可变，需列举。","teachingMethods":"① 磁通量类比（磁感线根数）。\n② 磁铁插线圈实验。\n③ 条件归纳。\n④ 历史引入。","preparation":"【PPT课件】P1 电生磁到磁生电；P2 磁通量；P3 磁通量变化；P4 感应条件实验；P5 条件归纳；P6 练习。\n【实验器材】线圈、灵敏电流计、条形磁铁。\n【音频】无。","process":[{"step":"Step 1 导入——磁能否生电","time":"5分钟","content":"【PPT P1 历史】教师：「奥斯特发现电流生磁，法拉第逆向想：磁能否生电？历经十年，用磁铁与线圈找到条件。这就是电磁感应的开端。」 预设回答：「磁能生电，但要满足一定条件。」 板书时机：黑板写课题「电磁感应」。差异化提示：B班听故事；A班需说逆向思维。易错点提醒：磁生电需要「变化」的磁场，静磁场不行。"},{"step":"Step 2 磁通量","time":"9分钟","content":"【PPT P2 磁通】教师：「磁通量Φ=BS⊥，即垂直穿过面的磁感线「根数」。若B与面法线夹角θ，则Φ=BScosθ。单位韦伯Wb（1Wb=1T·m²）。」 预设回答：「磁通量是垂直穿过的磁感线条数，Φ=BScosθ。」 板书时机：黑板写Φ=BScosθ。差异化提示：B班记式；A班需说夹角。易错点提醒：用垂直分量S⊥或Bcosθ；θ是B与法线夹角不是与面夹角。"},{"step":"Step 3 磁通量变化","time":"9分钟","content":"【PPT P3 变化】教师：「磁通量变化ΔΦ可由三种途径：磁感应强度B变、回路面积S变、或B与面夹角变。只要Φ变就可能产生感应电流。」 预设回答：「B、S、夹角任何一个变，磁通量就变。」 板书时机：黑板写三途径。差异化提示：B班记三条；A班需举例。易错点提醒：Φ不变（如匀强场中平移线圈）无感应电流；要「变」才触发。"},{"step":"Step 4 实验观察","time":"9分钟","content":"【PPT P4 实验】教师：「磁铁插入/拔出线圈时电流计偏转（有电流），静止不动时不偏。快速插比慢速插偏转大——说明与变化快慢有关。」 预设回答：「插和拔有电流，停着没有，快插更大。」 板书时机：黑板写「动才有电流」。差异化提示：B班看现象；A班需说快慢。易错点提醒：必须磁通量变化；变化率影响电动势大小（下节学）。"},{"step":"Step 5 条件归纳","time":"8分钟","content":"【PPT P5 条件】教师：「产生感应电流条件：①电路闭合②穿过回路的磁通量发生变化。二者缺一不可。开路则只有电动势无电流。」 预设回答：「闭合且磁通量变，才有感应电流。」 板书时机：黑板写两条件。差异化提示：B班记；A班需说开路情形。易错点提醒：开路时磁通量变也只产生感应电动势，无电流。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「匀强磁场中矩形线圈平移（B、S、夹角均不变），有感应电流吗？磁铁停在线圈中有吗？」 预设回答：「都没有，磁通量没变！」 板书时机：板书。差异化提示：B班答；A班补磁通量计算。易错点提醒：下节课学感应电动势大小（法拉第定律）。"}],"blackboard":"┌── 电磁感应 ──┐\n│ Φ=BScosθ   │\n│ 单位:Wb    │\n│ 条件:      │\n│ ①闭合回路  │\n│ ②Φ发生变化 │\n│ 静磁不发电 │\n└────────────┘","exercises":"【基础作业】1. 磁通量公式____，单位____。2. 产生感应电流的两个条件____、____。\n【提高作业】B=0.5T垂直穿过S=0.2m²的线圈，磁通量？若转90°使面平行B，磁通量变多少？\n【参考答案——教师用】基础1：Φ=BScosθ、Wb。基础2：电路闭合、磁通量变化。提高：Φ=0.5×0.2=0.1Wb；转后cos90°=0，ΔΦ=0.1Wb。","reflection":"✅ 亮点：磁通量用「磁感线根数」类比直观；磁铁插拔实验让条件「动才有电流」落地。\n⚠️ 需改进：B班常把「有磁场」当「磁通量变」，需强调Φ变三途径。\n📌 下节课衔接：法拉第定律定量算感应电动势。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx2-u1-2","lessonId":"l-phy-sx2-u1-2","title":"法拉第电磁感应定律","book":"选择性必修第二册","unitNumber":1,"unitTitle":"电磁感应","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["法拉第定律","感应电动势","人教版选必二Ch1","第二课时"],"textbookAnalysis":"法拉第电磁感应定律：感应电动势大小与磁通量变化率成正比，E=nΔΦ/Δt（n为匝数）。电动势取决于变化快慢（ΔΦ/Δt）而非变化量大小。若回路闭合才有感应电流I=E/R。","overview":"【学情分析】A班：能用E=nΔΦ/Δt算平均电动势、理解变化率；B班：混淆ΔΦ与ΔΦ/Δt、漏匝数n、单位乱。共同问题：电动势正比于变化率不是变化量；多匝线圈乘n；单位V。","objectives":["物理观念：掌握法拉第定律E=nΔΦ/Δt，理解变化率含义。","科学思维：会计算平均感应电动势，区分ΔΦ与ΔΦ/Δt。","科学探究：通过实验定性观察变化率对电动势的影响。","科学态度与责任：体会「率」这一微分思想在物理定律中的体现。"],"keyPoints":"① 定律：E = n ΔΦ/Δt（n匝数）。\n② 正比于变化率（ΔΦ/Δt）而非变化量。\n③ 平均电动势对应一段时间。\n④ 闭合时I=E/R。","difficulties":"① 变化率。原因：易用ΔΦ代替ΔΦ/Δt，需强调「快慢」。\n② 匝数n。原因：漏乘匝数，需点明。\n③ 平均vs瞬时。原因：该式给平均，需说明。","teachingMethods":"① 定律表述。\n② 变化率演示（快插慢插）。\n③ 匝数影响。\n④ 计算训练。","preparation":"【PPT课件】P1 定律表述；P2 变化率；P3 匝数n；P4 平均电动势；P5 计算；P6 练习。\n【实验器材】多匝线圈、电流计、磁铁。\n【音频】无。","process":[{"step":"Step 1 导入——电动势多大","time":"5分钟","content":"【PPT P1 定律】教师：「上节知磁通量变化产生电动势，今天定量：电动势大小与磁通量变化快慢成正比——法拉第电磁感应定律。」 预设回答：「电动势和磁通量变化快慢成正比。」 板书时机：黑板写课题与E=nΔΦ/Δt。差异化提示：B班听；A班需说「率」。易错点提醒：是变化率不是变化量；快慢决定大小。"},{"step":"Step 2 变化率","time":"9分钟","content":"【PPT P2 率】教师：「E=nΔΦ/Δt。ΔΦ很大但很慢（如地磁缓慢变）电动势小；ΔΦ小但极快（如闪电）电动势大。关键是ΔΦ/Δt。」 预设回答：「看变化快慢，不是变化多少。」 板书时机：黑板写「正比于ΔΦ/Δt」。差异化提示：B班记；A班需举反例。易错点提醒：变化率=斜率；匀速变化时为常数，给平均电动势。"},{"step":"Step 3 匝数n","time":"8分钟","content":"【PPT P3 匝数】教师：「线圈有n匝，每匝都产生电动势且串联叠加，总电动势E=nΔΦ/Δt。单匝用n=1。」 预设回答：「几匝就乘几，电动势叠加。」 板书时机：黑板写「n匝串联」。差异化提示：B班重点；A班需说叠加。易错点提醒：n是总匝数；Φ是单匝磁通量（各匝相同）。"},{"step":"Step 4 平均电动势","time":"8分钟","content":"【PPT P4 平均】教师：「该式计算的是一段时间内的平均电动势。若要求某时刻瞬时值，需取Δt→0的极限（用导数）。」 预设回答：「公式给的是平均电动势，瞬时要取极限。」 板书时机：黑板写「平均/瞬时」。差异化提示：B班记；A班需说极限。易错点提醒：用整段Δt算得平均；瞬时值看曲线斜率。"},{"step":"Step 5 计算","time":"9分钟","content":"【PPT P5 计算】教师：「例：100匝线圈磁通量0.01s内从0增至0.02Wb，E=100×0.02/0.01=200V。若闭合R=20Ω则I=10A。」 预设回答：「E=nΔΦ/Δt=200V，电流10A。」 板书时机：黑板写算例。差异化提示：B班算；A班补电流。易错点提醒：单位统一（Wb、s→V）；先算E再算I。"},{"step":"Step 6 练习+作业","time":"6分钟","content":"【PPT P6 练习】教师：「50匝线圈0.02s内Φ从0.04变0，平均电动势？」 预设回答：「E=50×0.04/0.02=100V！」 板书时机：板书。差异化提示：B班算；A班补单位。易错点提醒：下节课学楞次定律（判断方向）。"}],"blackboard":"┌── 法拉第定律 ──┐\n│ E=nΔΦ/Δt  │\n│ 正比变化率 │\n│ n:匝数     │\n│ 平均电动势 │\n│ I=E/R      │\n└────────────┘","exercises":"【基础作业】1. 法拉第定律表达式____。2. 感应电动势正比于磁通量的____（填变化量/变化率）。\n【提高作业】200匝线圈在0.1s内磁通量由0.05Wb均匀减到0，求平均电动势。\n【参考答案——教师用】基础1：E=nΔΦ/Δt。基础2：变化率。提高：E=200×0.05/0.1=100V。","reflection":"✅ 亮点：变化率用「快插慢插」与闪电反例讲透；匝数串联叠加直观。\n⚠️ 需改进：B班习惯算ΔΦ当电动势，需红字「除以Δt、看率」。\n📌 下节课衔接：楞次定律定感应电流方向。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx2-u1-3","lessonId":"l-phy-sx2-u1-3","title":"楞次定律","book":"选择性必修第二册","unitNumber":1,"unitTitle":"电磁感应","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["楞次定律","阻碍变化","人教版选必二Ch1","第三课时"],"textbookAnalysis":"楞次定律：感应电流的方向总是使它产生的磁场阻碍引起感应电流的磁通量变化。概括为「增反减同」（原磁通增则感应磁场反、减则同）。也可从「阻碍相对运动」（来拒去留）判断。本质是能量守恒。","overview":"【学情分析】A班：能熟练用「增反减同」与「来拒去留」判方向；B班：四指法则与楞次混淆、不知阻碍的是「变化」不是「磁通本身」；原磁场与感应磁场分不清。共同问题：阻碍的是磁通量的变化；先判原磁场方向与变化再定感应磁场；右手螺旋定则求电流方向。","objectives":["物理观念：掌握楞次定律，理解感应电流阻碍磁通量变化。","科学思维：会用「增反减同」「来拒去留」判断感应电流方向。","科学探究：通过实验归纳感应电流方向与磁通变化的关系。","科学态度与责任：认识楞次定律背后的能量守恒本质。"],"keyPoints":"① 楞次定律：感应电流阻碍引起它的磁通量变化。\n② 增反减同：原Φ增→感应磁场反向；原Φ减→同向。\n③ 来拒去留：阻碍相对运动。\n④ 本质：能量守恒（外力克服阻碍做功）。","difficulties":"① 阻碍变化。原因：易以为阻碍磁通本身，需强调「变化」。\n② 增反减同。原因：原磁场与感应磁场易混，需步骤化。\n③ 与右手定则。原因：切割时用右手定则更简便，需对比。","teachingMethods":"① 实验归纳（四种情况）。\n② 增反减同口诀。\n③ 来拒去留演示。\n④ 能量守恒点明。","preparation":"【PPT课件】P1 定律表述；P2 增反减同；P3 四情形归纳；P4 来拒去留；P5 本质；P6 练习。\n【实验器材】线圈、磁铁、电流计。\n【音频】无。","process":[{"step":"Step 1 导入——方向谁定","time":"5分钟","content":"【PPT P1 定律】教师：「法拉第定律给了电动势大小，方向由楞次定律定：感应电流总要阻碍引起它的磁通量变化。这是能量守恒的要求。」 预设回答：「感应电流的方向要阻碍磁通量的变化。」 板书时机：黑板写「楞次定律：阻碍变化」。差异化提示：B班听；A班需说能量。易错点提醒：阻碍的是「变化」不是磁通本身；不能完全阻止只能阻碍。"},{"step":"Step 2 增反减同","time":"10分钟","content":"【PPT P2 增反减】教师：「判方向步骤：①看原磁场B方向②看Φ增还是减③感应磁场B′与B「增反减同」④右手螺旋定则得电流方向。」 预设回答：「原磁场增强，感应磁场就反向来抵消趋势。」 板书时机：黑板写四步法。差异化提示：B班背步骤；A班需演示一例。易错点提醒：先定原B与变化，再定B′，最后电流；顺序不能乱。"},{"step":"Step 3 四情形","time":"9分钟","content":"【PPT P3 四情形】教师：「磁铁N极插入（Φ增）→感应磁场N极朝上抗拒；拔出（Φ减）→感应磁场N极朝下挽留。S极情形相反。归纳得增反减同。」 预设回答：「插和拔感应磁场方向相反，都为了阻碍运动。」 板书时机：黑板画四情形表。差异化提示：B班看表；A班需自填。易错点提醒：四种组合（N插/S插/N拔/S拔）逐一练；规律统一为增反减同。"},{"step":"Step 4 来拒去留","time":"8分钟","content":"【PPT P4 来拒】教师：「从「阻碍相对运动」看：磁铁靠近线圈，线圈近端成同性磁极排斥（来拒）；远离则成异性吸引（去留）。与增反减同一致。」 预设回答：「靠近被推开、离开被拉住，都是阻碍相对运动。」 板书时机：黑板写「来拒去留」。差异化提示：B班记；A班需联定律。易错点提醒：两种表述等价；运动问题用来拒去留更快。"},{"step":"Step 5 本质","time":"8分钟","content":"【PPT P5 本质】教师：「若感应电流不阻碍反而促进变化，则会自发放大——违背能量守恒。阻碍使外力必须做功才能维持变化，能量得以守恒。」 预设回答：「阻碍变化是为了不凭空产生能量，守恒。」 板书时机：黑板写「能量守恒」。差异化提示：B班听；A班需说做功。易错点提醒：楞次定律是能量守恒在电磁感应的体现。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「磁体N极向下插入线圈，感应电流俯视是顺还是逆？（用增反减同）」 预设回答：「Φ向下增，感应磁场向上，右手螺旋→俯视逆时针！」 板书时机：板书。差异化提示：B班判；A班补完整。易错点提醒：下节课学切割磁感线（右手定则）。"}],"blackboard":"┌── 楞次定律 ──┐\n│ 阻碍Φ变化   │\n│ 增反减同    │\n│ 来拒去留    │\n│ 四步:原B→变│\n│ →B′→电流   │\n│ 本质:能量守 │\n└────────────┘","exercises":"【基础作业】1. 楞次定律：感应电流总要____引起它的磁通量变化。2. 判断口诀____、____。\n【提高作业】磁体S极向下插入线圈，俯视感应电流方向？说明理由。\n【参考答案——教师用】基础1：阻碍。基础2：增反减同、来拒去留。提高：S极向下插入，Φ向下增，感应磁场应向上（增反），右手螺旋得俯视逆时针（同向电流产生向上磁场）。","reflection":"✅ 亮点：四步法把方向判断流程化，B班也能操作；来拒去留与增反减同双表述互证。\n⚠️ 需改进：B班易把原磁场与感应磁场搞反，需每步标清。\n📌 下节课衔接：导体切割磁感线用右手定则更直接。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx2-u1-4","lessonId":"l-phy-sx2-u1-4","title":"导体切割磁感线","book":"选择性必修第二册","unitNumber":1,"unitTitle":"电磁感应","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["动生电动势","右手定则","E=BLv","人教版选必二Ch1","第四课时"],"textbookAnalysis":"导体棒垂直切割磁感线产生动生电动势E=BLv（B⊥L⊥v，L为切割有效长度）。方向用右手定则判断（磁感线穿掌心、拇指指向运动、四指为电流方向）。可由法拉第定律导出（ΔΦ=BLΔx）。","overview":"【学情分析】A班：能熟练用右手定则与E=BLv（含有效长度、夹角）；B班：左右手定则混淆（电动机左手、发电机右手）、有效长度错、v与B夹角漏。共同问题：切割属动生电动势，用右手定则；E=BLv要求三者垂直，有效长度L是垂直B和v的投影；不垂直时乘sinθ。","objectives":["物理观念：掌握切割磁感线电动势E=BLv（动生）与右手定则。","科学思维：会判断有效长度与夹角，区分右手（发电）与左手（电动）定则。","科学探究：通过导体棒切割实验验证E=BLv与方向。","科学态度与责任：体会从一般定律导出特殊情形的严谨。"],"keyPoints":"① 动生电动势：E=BLv（B⊥L⊥v）。\n② 不垂直：E=BLv sinθ（θ为v与B夹角）。\n③ 右手定则：掌迎磁感线、拇指导运动、四指电流。\n④ 右手发电、左手电动（勿混）。","difficulties":"① 有效长度。原因：L是垂直切割长度，斜放时取投影，需强调。\n② 左右手。原因：发电机右手、电动机左手易反，需对比。\n③ 夹角。原因：v与B不垂直要乘sinθ，需点。","teachingMethods":"① 右手定则演示。\n② 从法拉第定律导出E=BLv。\n③ 有效长度讨论。\n④ 左右手对比。","preparation":"【PPT课件】P1 切割电动势；P2 右手定则；P3 E=BLv推导；P4 有效长度；P5 左右手对比；P6 练习。\n【实验器材】导体棒、U形磁体、电流计、导轨。\n【音频】无。","process":[{"step":"Step 1 导入——棒在磁场中滑","time":"5分钟","content":"【PPT P1 切割】教师：「导体棒在磁场中滑动切割磁感线，棒两端出现电势差——动生电动势。这是发电机的原理。用E=BLv算大小、右手定则判方向。」 预设回答：「切割磁感线产生电动势，是发电机原理。」 板书时机：黑板写「动生电动势」。差异化提示：B班举发电机；A班需说动生。易错点提醒：切割产生的是电动势；闭合才成电流；属电磁感应特例。"},{"step":"Step 2 右手定则","time":"9分钟","content":"【PPT P2 右手】教师：「右手定则：磁感线垂直穿掌心，拇指指向导体运动方向，四指指向感应电流（高电势端）。记住：发电用右手。」 预设回答：「掌心迎磁感线、拇指导运动、四指电流，发电机右手。」 板书时机：黑板画右手定则。差异化提示：B班练手型；A班需说电势。易错点提醒：四指指电流方向即高电势到低电势外电路；棒内电势从低到高。"},{"step":"Step 3 推导E=BLv","time":"9分钟","content":"【PPT P3 推导】教师：「由法拉第定律：ΔΦ=B·ΔS=BLΔx，E=ΔΦ/Δt=BLΔx/Δt=BLv。所以切割公式由一般定律推出。」 预设回答：「用ΔΦ=BLΔx代入法拉第定律就得到BLv。」 板书时机：黑板写推导。差异化提示：B班记结论；A班需推。易错点提醒：要求B、L、v两两垂直；否则用投影或sinθ。"},{"step":"Step 4 有效长度","time":"9分钟","content":"【PPT P4 有效】教师：「L是垂直磁场与运动方向的有效切割长度。弯折棒只算垂直投影段；平行磁感线部分不切割。公式E=BLv sinθ（θ为v与B夹角）。」 预设回答：「只算真正垂直切割的那段长度，斜的要投影。」 板书时机：黑板画有效长度。差异化提示：B班做直棒；A班做弯棒。易错点提醒：不垂直时乘sinθ；先分解v或B到垂直分量。"},{"step":"Step 5 左右手对比","time":"8分钟","content":"【PPT P5 对比】教师：「左手定则判通电导体受力（电动机）；右手定则判感应电流（发电机）。「左力右电」——力与电分清。」 预设回答：「左手受力电动机，右手发电发电机，左力右电。」 板书时机：黑板写「左力右电」。差异化提示：B班记口诀；A班需举例。易错点提醒：这是高频混淆点；先判是「受力运动」还是「产生电流」再选手。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「棒长0.5m垂直B=0.4T，以v=2m/s垂直切割，E？用右手定则指方向（B入纸、向右运动）。」 预设回答：「E=0.4×0.5×2=0.4V，电流向上！」 板书时机：板书。差异化提示：B班算；A班补方向。易错点提醒：第1章还有互感自感，下节课学。"}],"blackboard":"┌── 切割磁感线 ──┐\n│ E=BLv      │\n│ (B⊥L⊥v)    │\n│ 右手定则发电│\n│ 左力右电   │\n│ L=有效长度 │\n└────────────┘","exercises":"【基础作业】1. 导体切割磁感线电动势公式____（三者垂直时）。2. 判断方向用____定则；通电导体受力用____定则。\n【提高作业】棒长1m在B=0.5T中垂直切割，v=4m/s，求E；若B与v成30°，E变？\n【参考答案——教师用】基础1：E=BLv。基础2：右手、左手。提高：E=0.5×1×4=2V；成30°则E=BLv sin30°=1V。","reflection":"✅ 亮点：右手定则从法拉第定律导出，B班信；「左力右电」口诀破左右手混淆。\n⚠️ 需改进：B班有效长度常取全长不投影，需画垂直分量。\n📌 下节课衔接：互感与自感（线圈的电磁惯性）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx2-u1-5","lessonId":"l-phy-sx2-u1-5","title":"互感和自感","book":"选择性必修第二册","unitNumber":1,"unitTitle":"电磁感应","lessonType":"new","lessonTypeName":"新授课","periodNumber":5,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["互感","自感","日光灯","人教版选必二Ch1","第五课时"],"textbookAnalysis":"互感：两个线圈靠近，一个线圈电流变化在另一线圈激发感应电动势（变压器、感应圈原理）。自感：线圈自身电流变化在体内产生自感电动势E=LΔI/Δt，阻碍电流变化，L为自感系数。断电时自感产生瞬时高压（日光灯启动器、双线绕法减自感）。","overview":"【学情分析】A班：能区分互感自感、理解自感阻碍电流变化、分析断电闪亮；B班：自感方向错、以为自感「阻止」电流、日光灯原理不清。共同问题：自感电动势阻碍电流变化（增时反抗原增、减时维持）；断电时线圈与灯构成回路放电可能闪亮；L由线圈本身决定。","objectives":["物理观念：理解互感与自感现象，掌握自感电动势E=LΔI/Δt。","科学思维：能分析通电/断电时自感对电流变化的影响。","科学探究：通过实验观察通电慢亮、断电闪亮现象。","科学态度与责任：认识自感在电器（日光灯、扼流圈）中的利弊。"],"keyPoints":"① 互感：一线圈电流变在邻线圈生电动势（变压器原理）。\n② 自感：自身电流变产生自感电动势，E=LΔI/Δt。\n③ 自感阻碍电流变化（增时延缓、减时维持）。\n④ 断电闪亮：线圈与灯回路放电；L由线圈本身定。","difficulties":"① 自感方向。原因：阻碍变化非阻止，需「增反减同于电流变化」。\n② 断电闪亮。原因：回路与条件不清，需实验。\n③ 互感vs自感。原因：对象不同（他圈/自身），需区分。","teachingMethods":"① 互感演示（两线圈）。\n② 通电慢亮/断电闪亮实验。\n③ 日光灯原理。\n④ 双线绕法减自感。","preparation":"【PPT课件】P1 互感；P2 自感现象；P3 通电慢亮；P4 断电闪亮；P5 日光灯；P6 练习。\n【实验器材】带铁芯线圈、灯泡、开关、电源。\n【音频】无。","process":[{"step":"Step 1 导入——线圈的电磁惯性","time":"5分钟","content":"【PPT P1 互感】教师：「两线圈靠近，原线圈电流变化在副线圈激起感应电动势——互感，是变压器的基础。今天还看线圈「自己感自己」的自感。」 预设回答：「一个线圈的电流变化能影响旁边线圈，也能影响自己。」 板书时机：黑板写「互感/自感」。差异化提示：B班举变压器；A班需说自身。易错点提醒：互感发生在两线圈间；自感是同一线圈。"},{"step":"Step 2 自感现象","time":"9分钟","content":"【PPT P2 自感】教师：「线圈自身电流变化时，变化的磁场在自身激起自感电动势E=LΔI/Δt，总是阻碍电流的变化。L叫自感系数，由线圈匝数、铁芯等决定。」 预设回答：「自己电流变，自己产生电动势阻碍这个变化。」 板书时机：黑板写E=LΔI/Δt。差异化提示：B班记式；A班需说L。易错点提醒：自感电动势阻碍「变化」不是阻碍电流本身；L由线圈结构定。"},{"step":"Step 3 通电慢亮","time":"9分钟","content":"【PPT P3 慢亮】教师：「合开关瞬间，线圈自感电动势阻碍电流增大，灯泡逐渐变亮（比直接接稍慢）。电流稳定后自感消失（直流电感似短路）。」 预设回答：「通电时自感拖延电流增大，灯慢慢亮。」 板书时机：黑板写「通电：延缓增大」。差异化提示：B班看实验；A班需说稳态。易错点提醒：稳定直流下自感不再作用；阻碍是暂态过程。"},{"step":"Step 4 断电闪亮","time":"9分钟","content":"【PPT P4 闪亮】教师：「断开开关，电流减小，线圈自感电动势维持电流，与灯泡构成回路放电，若线圈电感大可能使灯短暂更亮（闪亮）后灭。」 预设回答：「断电时线圈放电，灯可能闪一下再灭。」 板书时机：黑板写「断电：维持放电」。差异化提示：B班看实验；A班需分析条件。易错点提醒：闪亮需线圈与灯构成闭合回路；电感足够大才明显。"},{"step":"Step 5 日光灯","time":"8分钟","content":"【PPT P5 日光灯】教师：「日光灯启动器利用双金属片通断，镇流器（带铁芯线圈）在断开瞬间产生高压点燃灯管；正常工作时镇流器起限流作用。这是自感的应用。」 预设回答：「镇流器断电自感产生高压点亮灯管。」 板书时机：黑板写日光灯原理。差异化提示：B班听；A班需说限流。易错点提醒：启动靠瞬时高压；正常工作靠限流（感抗）。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「线圈与灯串联，断开开关时灯为何可能闪亮？如何减小自感干扰（如精密电路）？」 预设回答：「自感放电维持电流；用双线绕法抵消磁通减小L！」 板书时机：板书。差异化提示：B班答；A班补双线。易错点提醒：第1章结束，下章学交变电流。"}],"blackboard":"┌── 互感自感 ──┐\n│ 互感:邻圈   │\n│ 自感:E=LΔI/Δt│\n│ 阻碍电流变化│\n│ 通电:慢亮   │\n│ 断电:闪亮   │\n│ 应用:日光灯 │\n└────────────┘","exercises":"【基础作业】1. 自感电动势公式____，L叫____。2. 自感总是____（填阻碍/阻止）电流的变化。\n【提高作业】为何断电时与线圈并联的灯泡可能闪亮？说明能量来源。\n【参考答案——教师用】基础1：E=LΔI/Δt、自感系数。基础2：阻碍。提高：断电时线圈储存的磁场能转化为电能，经灯泡放电使其短暂更亮；能量来自线圈原磁场能。","reflection":"✅ 亮点：通电慢亮/断电闪亮双实验让自感「阻碍变化」可视化；日光灯把抽象自感落到生活。\n⚠️ 需改进：B班以为自感「阻止」电流，需红字「阻碍变化非阻止」。\n📌 下节课衔接：交变电流——大小和方向都变。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx2-u2-1","lessonId":"l-phy-sx2-u2-1","title":"交变电流的产生和描述","book":"选择性必修第二册","unitNumber":2,"unitTitle":"交变电流","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["交变电流","正弦式","中性面","人教版选必二Ch2","第一课时"],"textbookAnalysis":"矩形线圈在匀强磁场中绕垂直磁场的轴匀速转动，产生正弦式交变电流。e=Eₘsinωt（从中性面起），Eₘ=NBSω为最大值。中性面：线圈平面与磁感线垂直时磁通量最大、感应电动势为0。周期T、频率f=1/T。","overview":"【学情分析】A班：能推导e=Eₘsinωt、理解中性面、换算T/f/ω；B班：中性面位置与e=0对应不清、Eₘ与ω关系乱、以为线圈在中性面时e最大。共同问题：中性面磁通最大e=0；垂直中性面时e最大；Eₘ=NBSω；ω=2π/T。","objectives":["物理观念：理解正弦交变电流的产生，掌握e=Eₘsinωt与Eₘ=NBSω。","科学思维：理解中性面含义，能换算T、f、ω。","科学探究：通过线圈转动模型与示波器观察交变波形。","科学态度与责任：体会从运动学（转动）到电动势函数的建模。"],"keyPoints":"① 产生：线圈匀转于磁场→正弦交流电。\n② e=Eₘsinωt，Eₘ=NBSω。\n③ 中性面：线圈⊥磁感线，Φ最大、e=0。\n④ ω=2π/T=2πf。","difficulties":"① 中性面。原因：易以为e最大，需强调Φ最大e=0。\n② Eₘ来源。原因：Eₘ=NBSω易漏N或ω，需推。\n③ 相位起点。原因：从中性面起才是sin，需说明。","teachingMethods":"① 转动模型演示。\n② 中性面讲解。\n③ 电动势推导。\n④ 波形观察。","preparation":"【PPT课件】P1 交变产生；P2 中性面；P3 e=Eₘsinωt；P4 Eₘ=NBSω；P5 T/f/ω；P6 练习。\n【实验器材】交流发电机模型、示波器。\n【音频】无。","process":[{"step":"Step 1 导入——电流也会变方向","time":"5分钟","content":"【PPT P1 产生】教师：「电池电流方向不变叫直流；发电机发出的是大小和方向都随时间变的交变电流（AC）。它由线圈在磁场中转动产生。」 预设回答：「交流是方向大小都变的电流，发电机转出来。」 板书时机：黑板写「交变电流 AC」。差异化提示：B班举插座；A班需说转动。易错点提醒：交流方向周期性变；家用是正弦交流。"},{"step":"Step 2 中性面","time":"9分钟","content":"【PPT P2 中性面】教师：「线圈平面与磁感线垂直的位置叫中性面。此时磁通量最大，但两边切割速度与磁场平行——不切割，故感应电动势为0。」 预设回答：「中性面磁通最大却电动势为0，因为不切割磁感线。」 板书时机：黑板画中性面。差异化提示：B班记；A班需说切割。易错点提醒：中性面Φ最大e=0；转过90°垂直中性面时e最大。"},{"step":"Step 3 表达式","time":"9分钟","content":"【PPT P3 式子】教师：「从中性面开始计时，电动势e=Eₘsinωt。线圈每转半周电流换向一次，故叫交变。i=Iₘsinωt、u=Uₘsinωt同理。」 预设回答：「从中性面起e=Eₘsinωt，每半周换向。」 板书时机：黑板写e=Eₘsinωt。差异化提示：B班记；A班需说起点。易错点提醒：从中性面起才是sin；从垂直中性面起是cos。"},{"step":"Step 4 Eₘ来源","time":"8分钟","content":"【PPT P4 Em】教师：「最大电动势Eₘ=NBSω：N匝、磁感应强度B、面积S、角速度ω。转速越快Eₘ越大。这是峰值。」 预设回答：「峰值Eₘ=NBSω，转快则峰值大。」 板书时机：黑板写Eₘ=NBSω。差异化提示：B班记；A班需推。易错点提醒：Eₘ是峰值非有效值；ω=2πn（n为转速）。"},{"step":"Step 5 周期频率","time":"8分钟","content":"【PPT P5 Tf】教师：「转一圈为一个周期T，f=1/T是频率，ω=2π/T=2πf。我国市电f=50Hz、T=0.02s。」 预设回答：「T是周期、f频率互为倒数，ω=2πf。」 板书时机：黑板写关系。差异化提示：B班记；A班需联市电。易错点提醒：我国工频50Hz；角频率ω≠频率f。"},{"step":"Step 6 练习+作业","time":"6分钟","content":"【PPT P6 练习】教师：「N=100,S=0.01m²,B=0.5T,n=50r/s，求Eₘ与f。」 预设回答：「ω=2π×50，Eₘ=100×0.5×0.01×100π≈157V；f=50Hz！」 板书时机：板书。差异化提示：B班算；A班补单位。易错点提醒：下节课学有效值（电表读数）。"}],"blackboard":"┌── 交变电流 ──┐\n│ e=Eₘsinωt │\n│ Eₘ=NBSω   │\n│ 中性面:Φ大│\n│ e=0       │\n│ ω=2πf     │\n│ f=50Hz(国)│\n└────────────┘","exercises":"【基础作业】1. 正弦交变电动势表达式____，最大值____。2. 中性面时磁通量____，感应电动势____。\n【提高作业】线圈N=50,S=0.02m²,B=0.2T,转速30r/s，求Eₘ与T。\n【参考答案——教师用】基础1：e=Eₘsinωt、Eₘ=NBSω。基础2：最大、为0。提高：ω=60π，Eₘ=50×0.2×0.02×60π≈37.7V；T=1/30≈0.033s。","reflection":"✅ 亮点：中性面「Φ大e=0」反直觉点用切割平行讲清；Eₘ=NBSω由转动导出可信。\n⚠️ 需改进：B班常把中性面当e最大，需反复对照切割速度。\n📌 下节课衔接：有效值——交流和直流的「等效」比较。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx2-u2-2","lessonId":"l-phy-sx2-u2-2","title":"交变电流的有效值","book":"选择性必修第二册","unitNumber":2,"unitTitle":"交变电流","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["有效值","热效应","人教版选必二Ch2","第二课时"],"textbookAnalysis":"有效值：让交流与直流通过相同电阻，在相同时间内产生相等热量，则直流的值就是该交流的有效值。正弦交流I=Im/√2、U=Um/√2、E=Em/√2。电表读数、用电器额定电压均为有效值。","overview":"【学情分析】A班：能由热效应定义理解有效值、做非正弦有效值积分；B班：混淆峰值与有效值、以为220V是峰值、电表读峰值；√2关系乱。共同问题：有效值是热效应等效的直流值；正弦关系Im/√2；日常220V、电器标称都是有效值。","objectives":["物理观念：理解有效值的热效应定义，掌握正弦交流I=Im/√2。","科学思维：能区分峰值与有效值，明确电表读数用有效值。","科学探究：通过电热等效实验体会有效值含义。","科学态度与责任：认识工程标称采用有效值的实用意义。"],"keyPoints":"① 定义：相同电阻相同时间发热相等时的等效直流值。\n② 正弦：I=Im/√2，U=Um/√2，E=Em/√2。\n③ 电表读数、电器额定电压=有效值。\n④ 峰值用于考虑绝缘耐压。","difficulties":"① 定义理解。原因：抽象，需热效应等效讲。\n② 峰值vs有效。原因：混淆，需强调220V是有效值。\n③ √2关系。原因：来历不清，需由积分说明（或记）。","teachingMethods":"① 热效应等效实验。\n② 定义讲解。\n③ 峰值有效对比。\n④ 市电实例。","preparation":"【PPT课件】P1 为何要有效值；P2 热效应定义；P3 正弦关系；P4 峰值vs有效；P5 市电应用；P6 练习。\n【实验器材】交流直流加热对比装置（或演示）。\n【音频】无。","process":[{"step":"Step 1 导入——交流多大算数","time":"5分钟","content":"【PPT P1 问题】教师：「交流时刻在变，说「电压多少」指哪个值？需要一种能代表其「做功能力」的值——有效值，按热效应等效来定。」 预设回答：「交流的大小用等效的直流有效值来表示。」 板书时机：黑板写「有效值」。差异化提示：B班听；A班需说热效应。易错点提醒：交流瞬时值在变，谈大小指有效值（除非说峰值）。"},{"step":"Step 2 热效应定义","time":"9分钟","content":"【PPT P2 定义】教师：「让交流和某直流分别通过相同电阻，相同时间产生热量相等，则该直流的数值就是交流的有效值。有效值反映发热/做功能力。」 预设回答：「和直流发热一样多的那个直流值就是有效值。」 板书时机：黑板写定义。差异化提示：B班记；A班需说「相同电阻时间」。易错点提醒：定义基于热效应（I²Rt）；是等效比较值。"},{"step":"Step 3 正弦关系","time":"9分钟","content":"【PPT P3 关系】教师：「对正弦交流，由积分得有效值与峰值关系：I=Im/√2、U=Um/√2、E=Em/√2（约0.707倍峰值）。」 预设回答：「有效值是峰值的1/√2，约0.707倍。」 板书时机：黑板写I=Im/√2。差异化提示：B班记式；A班需知来源。易错点提醒：只对正弦（或对称）交流成立；非正弦需按定义积分。"},{"step":"Step 4 峰值vs有效","time":"8分钟","content":"【PPT P4 对比】教师：「峰值（最大值）用于选绝缘材料耐压、二极管反向耐压；有效值用于电表读数与功率计算。二者不同用途。」 预设回答：「峰值看绝缘耐压，有效值看发热和读数。」 板书时机：黑板写用途对比。差异化提示：B班记；A班需举例。易错点提醒：说「220V」指有效值，峰值约311V；勿混用。"},{"step":"Step 5 市电应用","time":"8分钟","content":"【PPT P5 市电】教师：「我国家庭电路有效值220V、峰值约311V、频率50Hz。电器标称（如「220V 100W」）都是有效值。功率用有效值算P=UI。」 预设回答：「220V是有效值，电器标称也用有效值。」 板书时机：黑板写市电数值。差异化提示：B班记；A班需算峰值。易错点提醒：灯泡耐压要看峰值311V；功率P=U有效·I有效。"},{"step":"Step 6 练习+作业","time":"6分钟","content":"【PPT P6 练习】教师：「交流u=311sin100πt V，有效值与频率？」 预设回答：「Um=311→U=220V；ω=100π→f=50Hz！」 板书时机：板书。差异化提示：B班算；A班补峰值意义。易错点提醒：下节课学电感电容对交流的影响。"}],"blackboard":"┌── 有效值 ──┐\n│ 热效应等效  │\n│ I=Im/√2    │\n│ U=Um/√2    │\n│ 读数为有效 │\n│ 220V有效   │\n│ 峰值311V   │\n└────────────┘","exercises":"【基础作业】1. 有效值按____效应等效定义。2. 正弦交流有效值与峰值关系____。\n【提高作业】某交流电压峰值311V，有效值多少？我国家庭电路有效值是多少？\n【参考答案——教师用】基础1：热。基础2：I=Im/√2（或U=Um/√2）。提高：U=311/√2≈220V；我国家庭电路有效值220V。","reflection":"✅ 亮点：有效值用「发热等效」通俗定义；220V与311V对比纠正常见误解。\n⚠️ 需改进：B班仍把220V当峰值、电表读峰值，需红字「有效值」。\n📌 下节课衔接：电感电容对交流的阻碍（感抗容抗）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx2-u2-3","lessonId":"l-phy-sx2-u2-3","title":"电感、电容对交变电流的影响","book":"选择性必修第二册","unitNumber":2,"unitTitle":"交变电流","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["感抗","容抗","人教版选必二Ch2","第三课时"],"textbookAnalysis":"电感线圈对交流有阻碍（感抗），因自感阻碍电流变化，通直流阻交流、高频受阻更大（X_L=ωL）。电容器「通交流隔直流」，因反复充放电，容抗X_C=1/(ωC)，高频易通过、低频受阻大。二者对电流相位也有影响。","overview":"【学情分析】A班：能理解感抗容抗成因与频率关系、相位；B班：混淆通直阻交/通交隔直、频率影响方向反；以为电容「导电」。共同问题：电感通直阻交、ω大感抗大；电容通交隔直、ω大容抗小；电容靠充放电「通过」而非导电。","objectives":["物理观念：理解电感（感抗）与电容（容抗）对交流的影响及频率关系。","科学思维：能判断「通直阻交」「通交隔直」及高频/低频的影响。","科学探究：通过实验观察感抗容抗现象。","科学态度与责任：认识电抗在滤波、耦合电路中的工程价值。"],"keyPoints":"① 电感：通直流、阻交流；感抗X_L=ωL，ω大阻碍大。\n② 电容：通交流、隔直流；容抗X_C=1/(ωC)，ω大阻碍小。\n③ 电容靠充放电「通过」交流，不导电。\n④ 应用：滤波、耦合、高频旁路。","difficulties":"① 通阻方向。原因：电感与电容相反，易混，需对比口诀。\n② 频率影响。原因：感抗随ω增、容抗随ω减，方向相反，需强调。\n③ 电容不导电。原因：误以为导电，需说充放电。","teachingMethods":"① 感抗演示。\n② 容抗演示（充放电）。\n③ 对比口诀。\n④ 频率影响实验。","preparation":"【PPT课件】P1 电感阻碍；P2 感抗；P3 电容通交；P4 容抗；P5 频率影响；P6 练习。\n【实验器材】电感、电容、交流源、灯泡、示波器。\n【音频】无。","process":[{"step":"Step 1 导入——交流遇元件变样","time":"5分钟","content":"【PPT P1 现象】教师：「同样灯泡串电感后接交流变暗、接直流正常；串电容后接直流不亮、接交流亮——线圈和电容对交流和直流态度不同。」 预设回答：「电感和电容对交流有阻碍，对直流不一样。」 板书时机：黑板写「电感/电容对交流」。差异化提示：B班看现象；A班需说不同。易错点提醒：元件对交流的阻碍叫电抗，与电阻不同（不耗能、储能）。"},{"step":"Step 2 电感感抗","time":"9分钟","content":"【PPT P2 感抗】教师：「线圈因自感阻碍电流变化，对交流有感抗X_L=ωL。特性：通直流、阻交流；频率越高阻碍越大（ω大）。」 预设回答：「电感通直流阻交流，频率越高越阻。」 板书时机：黑板写X_L=ωL、通直阻交。差异化提示：B班记；A班需说自感。易错点提醒：直流稳态下电感似短路（无感抗）；交流才显感抗。"},{"step":"Step 3 电容通交","time":"9分钟","content":"【PPT P3 容通】教师：「电容「通交流隔直流」：直流下充电完成后断路；交流下不断充放电，表现为「通过」。实质不导电，是充放电的等效。」 预设回答：「电容靠反复充放电让交流「过」，直流则断开。」 板书时机：黑板写「通交隔直」。差异化提示：B班记；A班需说充放电。易错点提醒：电容极板间绝缘不导电；交流的「通过」是充放电等效。"},{"step":"Step 4 容抗","time":"9分钟","content":"【PPT P4 容抗】教师：「容抗X_C=1/(ωC)。频率越高，充放电越快，阻碍越小——与电感相反。特性：通高频、阻低频。」 预设回答：「电容通交流隔直流，频率越高越容易过。」 板书时机：黑板写X_C=1/(ωC)、通高频阻低频。差异化提示：B班记；A班需说反比。易错点提醒：容抗随ω增大而减小；与感抗趋势相反，是易错对比点。"},{"step":"Step 5 频率影响","time":"8分钟","content":"【PPT P5 频率】教师：「总结：电感——ω大→阻碍大（通低阻高）；电容——ω大→阻碍小（通高阻低）。利用此可做滤波：电感扼高频、电容旁高频。」 预设回答：「电感阻高频、电容通高频，用来滤波。」 板书时机：黑板写对比表。差异化提示：B班记表；A班需说滤波。易错点提醒：滤波电路依此设计；方向记反会出错。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「想滤掉高频噪声，应在信号线串联电感还是并联电容？」 预设回答：「串联电感阻高频、并联电容旁路高频，都用！」 板书时机：板书。差异化提示：B班答；A班补原理。易错点提醒：下节课学变压器（互感的工程应用）。"}],"blackboard":"┌── 电感电容 ──┐\n│ 电感:通直阻交│\n│ XL=ωL(ω大) │\n│ 电容:通交隔直│\n│ XC=1/ωC    │\n│ (ω大易过)  │\n│ 滤波用相反 │\n└────────────┘","exercises":"【基础作业】1. 电感对交流的作用____，特性____。2. 电容对交流的作用____，容抗X_C=____。\n【提高作业】为使高频信号容易通过而低频受阻，应串联电感还是电容？\n【参考答案——教师用】基础1：感抗（阻碍）、通直流阻交流。基础2：通交流隔直流、1/(ωC)。提高：应串联电容（容抗随频率降低而增大，低频受阻大、高频易过）。","reflection":"✅ 亮点：感抗容抗频率趋势相反用对比表锁定；「电容靠充放电通过不导电」破误区。\n⚠️ 需改进：B班把「通高阻低/通低阻高」记反，需口诀强化。\n📌 下节课衔接：变压器——改变交流电压。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx2-u2-4","lessonId":"l-phy-sx2-u2-4","title":"变压器","book":"选择性必修第二册","unitNumber":2,"unitTitle":"交变电流","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["变压器","互感","电压比","人教版选必二Ch2","第四课时"],"textbookAnalysis":"变压器由铁芯与两个线圈构成，利用互感改变交流电压。理想变压器：U₁/U₂=n₁/n₂（匝数比），I₁/I₂=n₂/n₁，输入功率=输出功率（P入=P出）。原线圈接交流，直流不能变压（磁通不变无感应）。","overview":"【学情分析】A班：能熟练用匝数比算电压电流、分析多绕组；B班：漏理想条件、以为直流也能变压、I比与U比颠倒；P入=P出混淆。共同问题：变压靠互感需交流；U比=匝数比；I比反比；理想P入=P出；铁芯增强耦合。","objectives":["物理观念：理解变压器原理（互感），掌握U₁/U₂=n₁/n₂与功率关系。","科学思维：能进行电压、电流、匝数换算，分析升压/降压。","科学探究：通过实验测量原副线圈电压与匝数关系。","科学态度与责任：认识变压器在电能输送中的关键作用。"],"keyPoints":"① 原理：互感（需交流，直流不变压）。\n② 电压比：U₁/U₂=n₁/n₂。\n③ 电流比：I₁/I₂=n₂/n₁（理想）。\n④ 功率：P入=P出（理想无损耗）。","difficulties":"① 需交流。原因：直流磁通不变不感应，需强调。\n② 匝数比。原因：U比=匝数比、I比反比，易颠倒，需练。\n③ 功率。原因：P入=P出用于求I，需说明理想。","teachingMethods":"① 互感原理。\n② 实验测U-n关系。\n③ 匝数比推导。\n④ 升压降压分析。","preparation":"【PPT课件】P1 变压器结构；P2 互感原理；P3 电压比；P4 电流比；P5 功率；P6 练习。\n【实验器材】可拆变压器、交流电源、电压表。\n【音频】无。","process":[{"step":"Step 1 导入——电压如何变","time":"5分钟","content":"【PPT P1 结构】教师：「变压器由铁芯加原、副线圈构成，能把交流电压升高或降低。手机充电器、变电站都靠它。原理是互感。」 预设回答：「变压器用两个线圈通过铁芯互感来改变电压。」 板书时机：黑板写「变压器=互感」。差异化提示：B班举充电器；A班需说铁芯。易错点提醒：变压必须交流；直流不变压（磁通不变无感应）。"},{"step":"Step 2 互感原理","time":"9分钟","content":"【PPT P2 原理】教师：「原线圈交流生变化磁通，经铁芯几乎全部耦入副线圈，副线圈感应出电动势。铁芯作用是导磁增强耦合。」 预设回答：「原线圈变磁通经铁芯进副线圈感应出电压。」 板书时机：黑板画磁通耦合。差异化提示：B班记；A班需说耦合。易错点提醒：铁芯闭合使漏磁小；若断开铁芯耦合大减。"},{"step":"Step 3 电压比","time":"9分钟","content":"【PPT P3 电压比】教师：「理想变压器每匝电压相同，故U₁/U₂=n₁/n₂。匝数多的线圈电压高。升压n₂>n₁，降压n₂\x3cn₁。」 预设回答：「电压比等于匝数比，匝多压高。」 板书时机：黑板写U₁/U₂=n₁/n₂。差异化提示：B班记式；A班需推。易错点提醒：是匝数比不是其他；副边开路时仍可有电压（无电流）。"},{"step":"Step 4 电流比","time":"8分钟","content":"【PPT P4 电流比】教师：「由P入=P出（U₁I₁=U₂I₂）得I₁/I₂=U₂/U₁=n₂/n₁。即匝多的高压线圈电流小。降压变压器副边电流大。」 预设回答：「电流比反比于匝数比，高压侧电流小。」 板书时机：黑板写I₁/I₂=n₂/n₁。差异化提示：B班记；A班需由功率推。易错点提醒：I比与U比相反；别与电压比记混。"},{"step":"Step 5 功率","time":"8分钟","content":"【PPT P5 功率】教师：「理想变压器无损耗，P入=P出。实际有铜损铁损，效率略低于100%。据此可由副边负载求原边电流。」 预设回答：「理想变压器输入输出功率相等，可求电流。」 板书时机：黑板写P入=P出。差异化提示：B班记；A班需算实例。易错点提醒：实际变压器有损耗；求原边电流用功率守恒。"},{"step":"Step 6 练习+作业","time":"6分钟","content":"【PPT P6 练习】教师：「n₁=100,n₂=200接U₁=220V，U₂？若副边接44Ω，原边电流？」 预设回答：「U₂=440V升压；P=440²/44=4400W，I₁=20A！」 板书时机：板书。差异化提示：B班算电压；A班补电流。易错点提醒：下节课学远距离输电（为何要高压）。"}],"blackboard":"┌── 变压器 ──┐\n│ 互感(需交流)│\n│ U1/U2=n1/n2 │\n│ I1/I2=n2/n1 │\n│ P入=P出    │\n│ 升压:匝多  │\n└────────────┘","exercises":"【基础作业】1. 变压器改变的是____电（填交流/直流）电压。2. 理想变压器电压比____，电流比____。\n【提高作业】n₁=1100、n₂=55，原边220V，副边电压？若副边负载10Ω求原边电流。\n【参考答案——教师用】基础1：交流。基础2：U₁/U₂=n₁/n₂、I₁/I₂=n₂/n₁。提高：U₂=220×55/1100=11V；P=121/10=12.1W，I₁=12.1/220≈0.055A。","reflection":"✅ 亮点：互感原理配铁芯耦合图清晰；电压比与电流比「一正一反」对比防颠倒。\n⚠️ 需改进：B班常给直流也套变压器，需红字「需交流」。\n📌 下节课衔接：远距离输电用高压减小损耗。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx2-u2-5","lessonId":"l-phy-sx2-u2-5","title":"远距离输电","book":"选择性必修第二册","unitNumber":2,"unitTitle":"交变电流","lessonType":"new","lessonTypeName":"新授课","periodNumber":5,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["远距离输电","线损","高压输电","人教版选必二Ch2","第五课时"],"textbookAnalysis":"输电线上功率损耗P损=I²R线。为减小损耗，在输送功率P一定时提高输电电压U，使电流I=P/U减小，从而P损=(P/U)²R线大幅下降。流程：发电→升压变压器→高压线→降压变压器→用户。","overview":"【学情分析】A班：能完整分析三级电压电流、算线损与变压器参数；B班：不知为何高压、误以为高压增大损耗、P损公式用错（用U²/R而非I²R）。共同问题：损耗在导线P损=I²R线；P一定时U↑→I↓→损耗骤减；不能用线电压U直接U²/R。","objectives":["物理观念：理解远距离输电采用高压减小线损的原理。","科学思维：能分析输电系统各点电压、电流与功率关系。","科学探究：通过模型计算比较不同输电电压下的损耗。","科学态度与责任：认识高压输电对节能与电网的意义。"],"keyPoints":"① 线损：P损=I²R线（I为输电电流）。\n② 减小：P一定时U↑→I=P/U↓→P损↓。\n③ 流程：发电→升压→线→降压→用户。\n④ 不能用线电压U²/R算损（U非全线压降）。","difficulties":"① 为何高压。原因：以为高压更损，需用P损=I²R与I=P/U说明。\n② 公式选用。原因：误用U²/R（U非线压降），需强调I²R。\n③ 系统分析。原因：多变压器各级量易乱，需画框图。","teachingMethods":"① 损耗演示。\n② 高压必要性推导。\n③ 输电框图。\n④ 数值对比。","preparation":"【PPT课件】P1 输电问题；P2 线损P损=I²R；P3 高压原理；P4 输电框图；P5 数值对比；P6 练习。\n【实验器材】无（算例为主）。\n【音频】无。","process":[{"step":"Step 1 导入——电从远方来","time":"5分钟","content":"【PPT P1 问题】教师：「发电站在远处，电能经电线送来。导线有电阻会发热损耗。如何少损耗？关键在输电电压的选择。」 预设回答：「电线有电阻会发热损失，要提高效率。」 板书时机：黑板写「远距离输电」。差异化提示：B班听；A班需说损耗。易错点提醒：损耗发生在输电线电阻上，不是负载上；目标是减小线损。"},{"step":"Step 2 线损公式","time":"9分钟","content":"【PPT P2 损耗】教师：「输电线损耗P损=I²R线，I是输电电流、R线是导线电阻。损耗与电流平方成正比——降电流最有效。」 预设回答：「损耗等于输电电流平方乘线电阻。」 板书时机：黑板写P损=I²R线。差异化提示：B班记；A班需说平方。易错点提醒：用I²R线；不是U²/R（那个U是全线压降非给定电压）。"},{"step":"Step 3 高压原理","time":"9分钟","content":"【PPT P3 高压】教师：「输送功率P=UI一定。提高输电电压U，则电流I=P/U减小，P损=I²R线=(P/U)²R线随U平方下降。所以高压输电大幅节能。」 预设回答：「电压翻倍电流减半，损耗降到四分之一！」 板书时机：黑板写I=P/U→P损=(P/U)²R。差异化提示：B班记；A班需推平方。易错点提醒：高压降损是平方关系，效益巨大；这是电网核心。"},{"step":"Step 4 输电框图","time":"9分钟","content":"【PPT P4 框图】教师：「流程：发电机→升压变压器（提U降I）→高压输电线→降压变压器（降U升I）→用户。两级变压器配合实现高压远送、低压配用。」 预设回答：「先升压减小电流远送，到地方再降压给用户。」 板书时机：黑板画框图。差异化提示：B班记流程；A班需标各级量。易错点提醒：升压为远送降损；降压为安全配用；两级缺一不可。"},{"step":"Step 5 数值对比","time":"8分钟","content":"【PPT P5 对比】教师：「例：送10MW，线阻10Ω。若U=10kV，I=1000A，P损=10MW（全耗！）；若U=500kV，I=20A，P损=4kW，几乎无损。」 预设回答：「电压提50倍，损耗降到万分之四！」 板书时机：黑板写两情形。差异化提示：B班算一例；A班算对比。易错点提醒：低电压输电损耗可超总功率（不现实）；高压才可行。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「送P=200kW，线阻R=5Ω，用U=20kV输电，线损与占比？」 预设回答：「I=10A，P损=500W，占0.25%！」 板书时机：板书。差异化提示：B班算；A班补占比。易错点提醒：第2章结束，下章学电磁场与电磁波。"}],"blackboard":"┌── 远距离输电 ──┐\n│ P损=I²R线  │\n│ P=UI一定   │\n│ U↑→I↓→损↓│\n│ 升压实降   │\n│ 降压配用   │\n└────────────┘","exercises":"【基础作业】1. 输电线损耗公式____。2. 输送功率一定时，提高输电电压可____（填增大/减小）线损。\n【提高作业】输送功率100kW，线阻8Ω，分别用10kV和100kV输电，求线损功率并比较。\n【参考答案——教师用】基础1：P损=I²R线。基础2：减小。提高：10kV时I=10A，P损=800W；100kV时I=1A，P损=8W；后者仅为前者1%。","reflection":"✅ 亮点：线损P损=I²R与I=P/U联立导出「高压平方降损」；数值对比震撼显示高压必要性。\n⚠️ 需改进：B班爱用U²/R算损（U误用线电压），需红字「用I²R线」。\n📌 下节课衔接：电磁场与电磁波初步。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx2-u3-1","lessonId":"l-phy-sx2-u3-1","title":"电磁振荡","book":"选择性必修第二册","unitNumber":3,"unitTitle":"电磁场与电磁波初步","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["电磁振荡","LC电路","人教版选必二Ch3","第一课时"],"textbookAnalysis":"LC振荡电路（电感L与电容C）中，电荷、电流、电场能、磁场能周期性相互转化，形成电磁振荡。周期T=2π√(LC（与充电量无关）。与机械振动类比：电容电荷↔位移、电流↔速度、电场能↔势能、磁场能↔动能。","overview":"【学情分析】A班：能类比机械振动理解电磁振荡、用T=2π√(LC)、分析能量转化；B班：振荡过程混乱、能量转化不清、忘√LC、与充电量关系错。共同问题：振荡是电场能与磁场能相互转化；周期只由L、C定与振幅（电量）无关；充放电交替。","objectives":["物理观念：理解LC电路电磁振荡过程与能量转化，掌握T=2π√(LC)。","科学思维：能用机械振动类比理解电磁振荡各量变化。","科学探究：通过示波器观察LC振荡波形。","科学态度与责任：体会不同运动形式间的类比与统一。"],"keyPoints":"① 振荡：电场能↔磁场能周期转化。\n② 类比：q↔x，i↔v，电场能↔势能，磁场能↔动能。\n③ 周期：T=2π√(LC)（与充电量无关）。\n④ 电荷最大时电流为0、磁场能最小。","difficulties":"① 过程。原因：q、i、能同步变化关系乱，需画时序图。\n② 能量转化。原因：电场磁场能交替，需类比弹簧。\n③ 周期。原因：忘√、误与电量有关，需强调。","teachingMethods":"① 机械振动类比。\n② 振荡时序图。\n③ 能量转化演示。\n④ 周期公式。","preparation":"【PPT课件】P1 电磁振荡；P2 振荡过程；P3 能量转化；P4 机械类比；P5 周期公式；P6 练习。\n【实验器材】LC振荡演示板、示波器。\n【音频】无。","process":[{"step":"Step 1 导入——电路也会「振动」","time":"5分钟","content":"【PPT P1 振荡】教师：「电容充好电后与线圈相连，电荷来回流动、电压电流周期性变——电磁振荡，如同电路里的「弹簧振子」。」 预设回答：「电荷在电容和线圈间来回变，是电磁的振动。」 板书时机：黑板写「电磁振荡 LC」。差异化提示：B班听；A班需说类比。易错点提醒：振荡是电场能与磁场能交替；需无电阻（理想）才等幅。"},{"step":"Step 2 振荡过程","time":"9分钟","content":"【PPT P2 过程】教师：「放电：q减、i增、电场能转动能；反向充电：q反向增、i减、磁场转动能。如此往复。画时序图看q与i反相。」 预设回答：「放电时电荷减电流增，再反向充电，来回交替。」 板书时机：黑板画q-i时序。差异化提示：B班记阶段；A班需画时序。易错点提醒：q最大时i=0，i最大时q=0；二者反相（如简谐的x与v）。"},{"step":"Step 3 能量转化","time":"9分钟","content":"【PPT P3 能量】教师：「总电磁能守恒：电容电场能+线圈磁场能=常量。电场能最大（q最大）时磁场能最小（i=0），反之亦然，相互转化。」 预设回答：「电场能和磁场能互相转，总和不变。」 板书时机：黑板写能量守恒。差异化提示：B班记；A班需说最大点。易错点提醒：类比弹簧振子势能动能；有电阻则能量损耗衰减。"},{"step":"Step 4 机械类比","time":"8分钟","content":"【PPT P4 类比】教师：「类比：电荷q↔位移x，电流i↔速度v，电容电场能↔弹簧势能，线圈磁场能↔动能。LC振荡就是电磁版的简谐运动。」 预设回答：「电荷像位移、电流像速度，电场能像势能。」 板书时机：黑板写类比表。差异化提示：B班记表；A班需说对应。易错点提醒：类比帮助理解但本质不同（电磁vs机械）。"},{"step":"Step 5 周期公式","time":"8分钟","content":"【PPT P5 周期】教师：「振荡周期T=2π√(LC，仅由电感L和电容C决定，与初始充电量（振幅）无关——等时性。L或C越大周期越长。」 预设回答：「周期由L和C决定，T=2π√(LC，和电量无关。」 板书时机：黑板写T=2π√(LC。差异化提示：B班记式；A班需说无关量。易错点提醒：与充电量无关（等时性）；增大L或C都使周期变长。"},{"step":"Step 6 练习+作业","time":"6分钟","content":"【PPT P6 练习】教师：「L=1mH,C=1μF，振荡周期？若C加倍周期变？」 预设回答：「T=2π√(1e-3×1e-6)≈6.28e-5s；C加倍T变√2倍！」 板书时机：板书。差异化提示：B班算；A班补比例。易错点提醒：下节课学电磁场与电磁波（振荡产生波）。"}],"blackboard":"┌── 电磁振荡 ──┐\n│ q↔x i↔v    │\n│ 电场能↔磁场│\n│ 能总和守恒 │\n│ T=2π√(LC) │\n│ 与电量无关 │\n└────────────┘","exercises":"【基础作业】1. LC振荡周期公式____，与____无关。2. 电荷最大时电流____，电场能____（填最大/最小）。\n【提高作业】L=4mH、C=1μF，求振荡频率。\n【参考答案——教师用】基础1：T=2π√(LC、充电量（振幅）。基础2：为0、最大。提高：T=2π√(4e-3×1e-6)=2π×2e-4≈1.26e-3s，f≈794Hz。","reflection":"✅ 亮点：机械振动类比让电磁振荡「有迹可循」；q-i反相关系用时序图讲清。\n⚠️ 需改进：B班以为周期与充电量有关，需红字「等时性」。\n📌 下节课衔接：变化的电磁场产生电磁波。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx2-u3-2","lessonId":"l-phy-sx2-u3-2","title":"电磁场与电磁波","book":"选择性必修第二册","unitNumber":3,"unitTitle":"电磁场与电磁波初步","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["电磁场","麦克斯韦","电磁波","人教版选必二Ch3","第二课时"],"textbookAnalysis":"麦克斯韦理论：变化的电场产生磁场，变化的磁场产生电场；非均匀变化则产生变化的场，相互激发在空间中由近及远传播形成电磁波。电磁波是横波，电场与磁场垂直且都垂直传播方向；真空中c=3×10⁸m/s，v=λf，电磁波能携带能量与信息。","overview":"【学情分析】A班：能理解麦克斯韦两个假设、电磁波横波性与c；B班：两个「变化生场」混、以为静电场产生磁场、电磁波传播需介质（错，可在真空）；c数值与v=λf乱。共同问题：变化电场→磁场、变化磁场→电场；电磁波是横波、真空中c恒定、无需介质；v=λf。","objectives":["物理观念：理解麦克斯韦电磁场理论，认识电磁波是横波且可在真空传播。","科学思维：能说明电磁波的产生与横波结构（E⊥B⊥传播方向）。","科学探究：通过演示（赫兹实验）认识电磁波的存在。","科学态度与责任：体会麦克斯韦理论统一电、磁、光的伟大意义。"],"keyPoints":"① 麦克斯韦：变化电场→磁场，变化磁场→电场。\n② 相互激发→由近及远传播成电磁波。\n③ 电磁波是横波：E⊥B⊥传播方向。\n④ 真空中c=3×10⁸m/s，v=λf，无需介质。","difficulties":"① 两假设。原因：易混「谁生谁」、忽略「变化」，需强调变化。\n② 无需介质。原因：直觉以为要介质，需说电磁场自身传播。\n③ 横波结构。原因：E、B、传播三者两两垂直，需画图。","teachingMethods":"① 麦克斯韦假设讲述。\n② 赫兹实验介绍。\n③ 横波结构图。\n④ 与机械波对比。","preparation":"【PPT课件】P1 麦克斯韦；P2 变化生场；P3 电磁波产生；P4 横波结构；P5 c与v=λf；P6 练习。\n【实验器材】赫兹实验视频/演示。\n【音频】无。","process":[{"step":"Step 1 导入——光也是电磁波？","time":"5分钟","content":"【PPT P1 麦克斯韦】教师：「麦克斯韦预言：电与磁的变化能相互催生，并在空间传播成电磁波，光也是一种电磁波。二十年后赫兹实验证实。」 预设回答：「变化的电磁场能传播成波，光也是电磁波。」 板书时机：黑板写「电磁场理论」。差异化提示：B班听；A班需说赫兹。易错点提醒：这是理论预言→实验证实的典范；统一了电、磁、光。"},{"step":"Step 2 变化生场","time":"9分钟","content":"【PPT P2 假设】教师：「两个核心假设：①变化的磁场产生电场②变化的电场产生磁场。均匀变化产生稳定场，非均匀变化产生变化的场（才能持续传播）。」 预设回答：「磁场变生电场、电场变生磁场，互相催生。」 板书时机：黑板写两假设。差异化提示：B班记；A班需说非均匀。易错点提醒：必须「变化」的场；静电场不产生磁场，稳恒磁场不产生电场。"},{"step":"Step 3 产生传播","time":"9分钟","content":"【PPT P3 产生】教师：「变化的电场激发变化磁场，后者又激发变化电场……如此由近及远传播，形成电磁波。振荡电路（LC）是电磁波源。」 预设回答：「场互相催生，一圈圈传开成为电磁波。」 板书时机：黑板画传播圈。差异化提示：B班记；A班需联LC。易错点提醒：传播靠场自身相互激发，不需介质；这是与机械波根本区别。"},{"step":"Step 4 横波结构","time":"9分钟","content":"【PPT P4 横波】教师：「电磁波是横波：电场E、磁场B互相垂直，且都垂直于传播方向（三者右手系）。E与B同相变化、振幅成比例。」 预设回答：「电场磁场都垂直传播方向，三者两两垂直。」 板书时机：黑板画E、B、传播方向。差异化提示：B班看图；A班需说同相。易错点提醒：电磁波中E与B垂直且同相；注意是横波（与声波纵波不同）。"},{"step":"Step 5 c与v=λf","time":"8分钟","content":"【PPT P5 速度】教师：「真空中电磁波速c=3×10⁸m/s（等于光速）；在介质中变慢。仍满足v=λf，频率由波源定、介质变则λ变。」 预设回答：「真空中光速就是电磁波速，v=λf仍成立。」 板书时机：黑板写c=3×10⁸、v=λf。差异化提示：B班记；A班需联光。易错点提醒：c是真空极限速度；介质中v\x3cc且频率不变波长变。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「家用Wi-Fi频率2.4GHz，真空中波长？」 预设回答：「λ=c/f=3e8/2.4e9=0.125m！」 板书时机：板书。差异化提示：B班算；A班补单位。易错点提醒：下节课学电磁波的发射与接收。"}],"blackboard":"┌── 电磁场波 ──┐\n│ 变磁→电场  │\n│ 变电→磁场  │\n│ E⊥B⊥传播  │\n│ c=3e8m/s  │\n│ v=λf      │\n│ 不需介质  │\n└────────────┘","exercises":"【基础作业】1. 麦克斯韦两个假设：变化的____产生电场，变化的____产生磁场。2. 真空中电磁波速____，电磁波是____波（填横/纵）。\n【提高作业】某电磁波频率100MHz，真空中波长多少？\n【参考答案——教师用】基础1：磁场、电场。基础2：3×10⁸m/s、横。提高：λ=c/f=3e8/1e8=3m。","reflection":"✅ 亮点：两假设用「变磁生电、变电生磁」对称记；横波E⊥B⊥传播方向画图直观。\n⚠️ 需改进：B班以为电磁波需介质，需红字「不需介质、真空中最快」。\n📌 下节课衔接：电磁波的发射、传播与接收。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx2-u3-3","lessonId":"l-phy-sx2-u3-3","title":"电磁波的发射、传播和接收","book":"选择性必修第二册","unitNumber":3,"unitTitle":"电磁场与电磁波初步","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["调制","调谐","检波","人教版选必二Ch3","第三课时"],"textbookAnalysis":"发射：用开放电路与高频振荡，把信号「加载」到载波上叫调制（调幅AM调频FM）。传播方式：地波（长波沿地）、天波（短波经电离层反射）、空间波（直线视距）。接收：天线接收→调谐（选台，使接收回路谐振）→检波（解调取出信号）→放大。","overview":"【学情分析】A班：能理解调制/调谐/检波全过程、三种传播方式；B班：调制与检波混淆、调谐即选台不清、三种传播混。共同问题：调制=加载信号（发端），检波=取出信号（收端）；调谐=调接收回路频率选台；地波/天波/空间波适用波段不同。","objectives":["物理观念：理解电磁波发射（调制）、传播方式与接收（调谐、检波）过程。","科学思维：能区分调制与检波、说明调谐选台原理。","科学探究：通过收音机选台实验体会调谐与检波。","科学态度与责任：认识无线电技术在信息传播中的价值。"],"keyPoints":"① 调制：把信号加到载波（AM调幅、FM调频）。\n② 传播：地波（长波）、天波（短波反射）、空间波（视距）。\n③ 调谐：调接收回路谐振选台。\n④ 检波：从已调波取出原信号（解调）。","difficulties":"① 调制vs检波。原因：一加一取易混，需分收发端。\n② 调谐。原因：选台原理（谐振）不清，需说回路频率匹配。\n③ 传播方式。原因：三种波段适用乱，需对比。","teachingMethods":"① 发射框图。\n② 调制演示。\n③ 收音机选台实验。\n④ 传播方式对比。","preparation":"【PPT课件】P1 发射调制；P2 传播方式；P3 接收调谐；P4 检波；P5 整机流程；P6 练习。\n【实验器材】收音机（演示选台）。\n【音频】无。","process":[{"step":"Step 1 导入——声音如何飞空中","time":"5分钟","content":"【PPT P1 发射】教师：「人声频率低不能直接有效辐射，需「搭载」到高频载波上发射。把信号加载到载波叫调制。收音机再把它取出来。」 预设回答：「声音要搭在高频载波上才能发射和接收。」 板书时机：黑板写「调制/解调」。差异化提示：B班听；A班需说载波。易错点提醒：低频信号辐射差，必须用高频载波；调制在发射端。"},{"step":"Step 2 调制","time":"9分钟","content":"【PPT P2 调制】教师：「调制：用信号控制载波的某一参数。调幅AM改变振幅、调频FM改变频率。广播多用AM/FM。调制后便于发射与抗干扰。」 预设回答：「调幅改振幅、调频改频率，把信号加进去。」 板书时机：黑板写AM/FM。差异化提示：B班记；A班需说区别。易错点提醒：调制是「加载」；AM易干扰、FM音质好但带宽大。"},{"step":"Step 3 传播方式","time":"9分钟","content":"【PPT P3 传播】教师：「三种传播：地波（长波/中波沿地面绕射）、天波（短波经电离层反射可远距离）、空间波（超短波/微波直线视距，需中继或卫星）。」 预设回答：「长波贴地、短波靠天反射、微波直线走。」 板书时机：黑板写三方式。差异化提示：B班记；A班需说波段。易错点提醒：不同频率适合不同方式；微波需中继/卫星因直线传播。"},{"step":"Step 4 调谐","time":"9分钟","content":"【PPT P4 调谐】教师：「接收：天线收到众多频率，转动调谐旋钮改变接收回路固有频率，使其与某台载波谐振，该台信号最强被选出——这就是选台。」 预设回答：「调接收回路频率去和想听的台共振，选出它。」 板书时机：黑板写「调谐=选台（谐振）」。差异化提示：B班记；A班需说谐振。易错点提醒：调谐是选台（频率匹配谐振）；不等同于解调。"},{"step":"Step 5 检波","time":"8分钟","content":"【PPT P5 检波】教师：「检出：从已调波中「取出」原信号叫检波（解调），再放大推动扬声器。它是调制的逆过程，在接收端。」 预设回答：「检波把搭载的信号取出来还原成声音。」 板书时机：黑板写「检波=解调」。差异化提示：B班记；A班需联调制。易错点提醒：检波是调制逆操作、在接收端；与调制分处收发两端勿混。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「收音机选台调的是哪个环节？把声音还原是哪一环节？」 预设回答：「选台是调谐，还原声音是检波（解调）！」 板书时机：板书。差异化提示：B班答；A班补流程。易错点提醒：下节课学电磁波谱（各波段特点与应用）。"}],"blackboard":"┌── 发射接收 ──┐\n│ 调制:加载信号│\n│ AM/FM      │\n│ 调谐:选台   │\n│ 检波:取出   │\n│ 地/天/空间波│\n└────────────┘","exercises":"【基础作业】1. 把信号加载到载波上叫____，在____（填发/收）端。2. 收音机选台是____环节，还原声音是____环节。\n【提高作业】简述调幅AM与调频FM的区别。\n【参考答案——教师用】基础1：调制、发。基础2：调谐、检波。提高：AM调制载波振幅、抗干扰较差；FM调制载波频率、音质好带宽大。","reflection":"✅ 亮点：调制/检波分处收发两端用「加载/取出」对称记；调谐=谐振选台破「选台即解调」误区。\n⚠️ 需改进：B班三种传播方式适用波段易混，需对比表。\n📌 下节课衔接：电磁波谱——从无线电到γ射线。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx2-u3-4","lessonId":"l-phy-sx2-u3-4","title":"电磁波谱","book":"选择性必修第二册","unitNumber":3,"unitTitle":"电磁场与电磁波初步","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学态度与责任"],"tags":["电磁波谱","红外","紫外","人教版选必二Ch3","第四课时"],"textbookAnalysis":"按频率（或波长）排列：无线电波、红外线、可见光、紫外线、X射线、γ射线。频率递增则波长递减、能量递增。各波段特性与应用不同：无线电通信用、红外热成像、可见照明、紫外杀菌、X射线透视、γ射线探伤治疗。","overview":"【学情分析】A班：能排列波谱、说明各波段能量与应用、理解频率决定特性；B班：顺序与波长频率关系反、能量随频率变化错、应用混淆。共同问题：频率从低到高=波长从高到低=能量从低到高；本质都是电磁波只是频率不同；特性由频率决定。","objectives":["物理观念：掌握电磁波谱顺序及频率、波长、能量关系。","科学思维：能解释各波段特性差异源于频率（能量）不同。","科学探究：通过实例了解各波段的应用。","科学态度与责任：辩证看待电磁波的利用与防护（如紫外、X射线）。"],"keyPoints":"① 顺序（频增）：无线电\x3c红外\x3c可见\x3c紫外\x3cX\x3cγ。\n② 关系：f增→λ减→能量增（E=hf）。\n③ 应用：通信、热成像、照明、杀菌、透视、探伤。\n④ 本质：同是电磁波，仅频率不同。","difficulties":"① 顺序。原因：波长频率反向，易排反，需记「频增序」。\n② 能量。原因：能量随频率增，易与波长混，需E=hf。\n③ 应用对应。原因：各波段用途乱，需联特性。","teachingMethods":"① 波谱排列表。\n② 频率能量关系。\n③ 各波段应用实例。\n④ 防护讨论。","preparation":"【PPT课件】P1 波谱全貌；P2 频率波长能量；P3 无线电红外；P4 可见光紫外；P5 X与γ；P6 练习。\n【实验器材】无（图文为主）。\n【音频】无。","process":[{"step":"Step 1 导入——一家人不同脾性","time":"5分钟","content":"【PPT P1 全貌】教师：「所有电磁波本质相同，只因频率不同而性格迥异，按频率排成电磁波谱。从无线电到γ射线，频率跨越几十个数量级。」 预设回答：「电磁波一家，频率不同用途不同，排成谱。」 板书时机：黑板写「电磁波谱」。差异化提示：B班听；A班需说本质。易错点提醒：都是电磁波，区别仅在频率（能量）；不要当成不同物质。"},{"step":"Step 2 关系","time":"9分钟","content":"【PPT P2 关系】教师：「频率f增大→波长λ减小（λ=c/f）→光子能量E=hf增大。所以高频波（紫外、X、γ）能量高、穿透/电离能力强。」 预设回答：「频率越高波长越短能量越大，越「厉害」。」 板书时机：黑板写f↑λ↓E↑。差异化提示：B班记；A班需说E=hf。易错点提醒：能量随频率增（不是波长）；高频具电离性需防护。"},{"step":"Step 3 无线电红外","time":"9分钟","content":"【PPT P3 低段】教师：「无线电波：通信、广播、Wi-Fi（波长长绕射好）。红外线：热辐射，用于夜视仪、遥控、加热（波长比红光长，肉眼不见）。」 预设回答：「无线电用来通信，红外用来热成像和遥控。」 板书时机：黑板写低段应用。差异化提示：B班记；A班需说特性。易错点提醒：红外具热效应；一切物体都辐射红外。"},{"step":"Step 4 可见紫外","time":"8分钟","content":"【PPT P4 中段】教师：「可见光：能引起视觉（红橙黄绿蓝靛紫，紫端频率高）。紫外线：频率高于紫光，杀菌消毒、使荧光、促维生素D，但过量伤皮肤眼睛。」 预设回答：「可见光让我们看见，紫外线杀菌但别晒太多。」 板书时机：黑板写中段。差异化提示：B班记；A班需说频率。易错点提醒：紫外能量较高有杀菌也需防护；可见光谱紫端频率高。"},{"step":"Step 5 X与γ","time":"9分钟","content":"【PPT P5 高段】教师：「X射线：穿透软组织、用于医学透视与安检（频率很高）。γ射线：核反应产生，能量最高，用于探伤、肿瘤放疗，也需严格防护。」 预设回答：「X射线拍片、γ射线治疗肿瘤，都很强要防护。」 板书时机：黑板写高段。差异化提示：B班记；A班需说来源。易错点提醒：高频高能具穿透力；医疗用但需控剂量防伤害。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「按频率从低到高排：紫外、无线电、γ、可见、红外、X。哪个能量最高？」 预设回答：「无线电\x3c红外\x3c可见\x3c紫外\x3cX\x3cγ；γ能量最高！」 板书时机：板书。差异化提示：B班排；A班补能量。易错点提醒：选必二全部结束，进入选必三（热学、光学、原子）。"}],"blackboard":"┌── 电磁波谱 ──┐\n│ 频增:无线电 │\n│ \x3c红外\x3c可见  │\n│ \x3c紫外\x3cX\x3cγ  │\n│ f↑λ↓E↑    │\n│ 应用各异   │\n│ 高频需防护 │\n└────────────┘","exercises":"【基础作业】1. 按频率从低到高，电磁波谱顺序____、____、可见光、____、____、____。2. 频率越高，波长越____、能量越____。\n【提高作业】为什么紫外线能杀菌而无线电波不能？\n【参考答案——教师用】基础1：无线电波、红外线、紫外线、X射线、γ射线。基础2：短（小）、大。提高：紫外频率远高于无线电，光子能量E=hf大，足以破坏微生物DNA；无线电能量低无此效应。","reflection":"✅ 亮点：波谱用「一家人不同脾性」串联；f↑λ↓E↑一句统揽关系。\n⚠️ 需改进：B班常把波长频率顺序排反，需反复「频增序」训练。\n📌 下节课衔接：选必三分子动理论与热学。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx3-u1-1","lessonId":"l-phy-sx3-u1-1","title":"物体是由大量分子组成的（油膜法测分子直径）","book":"选择性必修第三册","unitNumber":1,"unitTitle":"分子动理论","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["油膜法","分子直径","阿伏伽德罗常数","人教版选必三Ch1","第一课时"],"textbookAnalysis":"物质由大量分子组成，分子直径数量级约10⁻¹⁰m。油膜法测分子直径：使油酸在水面形成单分子层油膜，d=V/S（V为油酸体积，S为油膜面积）。阿伏伽德罗常数N_A=6.02×10²³mol⁻¹，可估算分子质量、体积。","overview":"【学情分析】A班：能独立完成油膜法估算、理解N_A的桥梁作用；B班：对「单分子层」想象困难、单位换算乱（cm²→m²、mL→m³）。共同问题：d=V/S中V与S单位须统一到m³、m²；油酸酒精溶液浓度换算；N_A是宏观量与微观量的桥梁。","objectives":["物理观念：建立物质由大量分子组成的观念，知道分子大小数量级。","科学思维：掌握油膜法原理d=V/S，会进行宏观微观量换算。","科学探究：经历油膜法测分子直径的实验设计与数据处理。","科学态度与责任：体会估算法在微观世界研究中的价值，严谨处理数据。"],"keyPoints":"① 分子直径数量级约10⁻¹⁰m。\n② 油膜法：d = V/S（单分子层）。\n③ 单位换算：cm²→m²（×10⁻⁴）、mL→m³（×10⁻⁶）。\n④ N_A=6.02×10²³mol⁻¹ 是宏微观桥梁。","difficulties":"① 单分子层想象。原因：肉眼不可见，需动画演示油酸铺展。\n② 浓度换算。原因：用酒精溶液，纯油酸体积V=溶液体积×浓度，易忘乘浓度。\n③ 单位。原因：cm²、mL与m混用，需统一。","teachingMethods":"① 数量级引入（1亿与10²³对比）。\n② 油膜法动画。\n③ 实验演示（撒痱子粉）。\n④ 计算训练。","preparation":"【PPT课件】P1 宏观到微观；P2 分子数量级；P3 油膜法原理；P4 实验步骤；P5 浓度换算；P6 计算练习。\n【实验器材】油酸酒精溶液、量筒、浅盘、痱子粉、玻璃板、坐标纸。\n【音频】无。","process":[{"step":"Step 1 导入——一杯水有多少分子","time":"5分钟","content":"【PPT P1 数量】教师：「一滴水约含10²¹个分子。即便每秒数10亿个，也要数3000年。物质由极其巨大数量的分子组成。」 预设回答：「分子数量多到数不清，得用估算法。」 板书时机：黑板写课题「物体由大量分子组成」。差异化提示：B班感受数量；A班需说10²³量级。易错点提醒：别把「分子小、数量多」混为一谈，二者都重要。"},{"step":"Step 2 分子大小数量级","time":"8分钟","content":"【PPT P2 数量级】教师：「分子直径数量级约10⁻¹⁰m。如水分子约3×10⁻¹⁰m。人头发丝粗约5×10⁻⁵m，比分子粗上百万倍。」 预设回答：「分子直径大约10⁻¹⁰米，非常非常小。」 板书时机：黑板写「d≈10⁻¹⁰m」。差异化提示：B班记数量级；A班需对比。易错点提醒：是「数量级」估算，不是精确值；不同分子略有差异。"},{"step":"Step 3 油膜法原理","time":"9分钟","content":"【PPT P3 原理】教师：「把一滴油酸滴在水面，酒精挥发后油酸在水面铺成单分子层薄膜。膜厚即分子直径：d=V/S（V油酸体积，S膜面积）。」 预设回答：「单分子层的厚度就是分子直径，d=V/S。」 板书时机：黑板写「d=V/S」。差异化提示：B班记式；A班需说「单分子层」。易错点提醒：必须是单分子层；若铺成多层则d被低估。"},{"step":"Step 4 实验演示","time":"9分钟","content":"【PPT P4 步骤】教师：「水盘撒痱子粉，滴一滴油酸酒精溶液，待酒精挥发、油膜稳定，盖玻璃板描轮廓，数坐标纸格数求S。纯油酸体积V=溶液体积×体积浓度。」 预设回答：「撒粉显轮廓，描格算面积，V要乘浓度。」 板书时机：黑板写「V=溶液体积×浓度」。差异化提示：B班看步骤；A班需说浓度意义。易错点提醒：V是纯油酸体积，不是溶液体积，必须乘浓度；痱子粉太厚会阻碍铺展。"},{"step":"Step 5 浓度与单位换算","time":"8分钟","content":"【PPT P5 换算】教师：「例：1mL溶液含纯油酸1/500，取1滴（1/100mL），则V=(1/100)×(1/500)mL=2×10⁻⁶mL=2×10⁻¹²m³。S若200cm²=2×10⁻²m²，则d=10⁻¹⁰m。」 预设回答：「依次乘浓度、换单位，得d约10⁻¹⁰米。」 板书时机：黑板写算例。差异化提示：B班练换算；A班补有效数字。易错点提醒：cm²→m²乘10⁻⁴、mL→m³乘10⁻⁶；先统一单位再除。"},{"step":"Step 6 练习+作业","time":"6分钟","content":"【PPT P6 练习】教师：「若1mL溶液含纯油酸浓度1/200，滴1/50mL于S=3×10⁻²m²水面，求d。」 预设回答：「V=(1/50)(1/200)mL=1×10⁻⁴mL=1×10⁻¹⁰m³，d=3.3×10⁻⁹m。」 板书时机：板书。差异化提示：B班算；A班查数量级。易错点提醒：结果与10⁻¹⁰m数量级不符要复核单位——本题膜偏厚说明浓度偏大，注意审题。"}],"blackboard":"┌── 分子动理论① ──┐\n│ d≈10⁻¹⁰m    │\n│ 油膜法:     │\n│ d=V/S       │\n│ V=液×浓度   │\n│ 单位统一    │\n│ N_A桥梁     │\n└─────────────┘","exercises":"【基础作业】1. 油膜法测分子直径公式____。2. 1mL=____m³，1cm²=____m²。\n【提高作业】浓度1/1000的油酸酒精溶液，取1/200mL滴于水面形成S=5×10⁻³m²单分子膜，估算分子直径。\n【参考答案——教师用】基础1：d=V/S。基础2：10⁻⁶、10⁻⁴。提高：V=(1/200)(1/1000)mL=5×10⁻⁶mL=5×10⁻¹²m³，d=V/S=1×10⁻⁹m。","reflection":"✅ 亮点：10²³数量级对比直观震撼；油膜法动画让「单分子层」可视。\n⚠️ 需改进：B班频繁漏乘浓度、单位不统一，需专项换算训练。\n📌 下节课衔接：分子在永不停息地做无规则运动（扩散与布朗运动）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx3-u1-2","lessonId":"l-phy-sx3-u1-2","title":"分子热运动（扩散现象与布朗运动）","book":"选择性必修第三册","unitNumber":1,"unitTitle":"分子动理论","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学探究"],"tags":["扩散","布朗运动","热运动","人教版选必三Ch1","第二课时"],"textbookAnalysis":"扩散：不同物质相互接触时彼此进入对方，温度越高扩散越快，说明分子在运动。布朗运动：悬浮微粒（如花粉）受液体分子无规则撞击做无规则运动，不是分子运动本身，但反映液体分子的无规则热运动；温度越高、颗粒越小越明显。分子永不停息的无规则运动叫热运动。","overview":"【学情分析】A班：能区分扩散与布朗运动、理解布朗运动反映分子热运动；B班：误以为布朗运动是分子运动、把颗粒大小影响说反。共同问题：布朗运动是「悬浮颗粒」的运动，是液体分子碰撞不平衡的宏观表现；温度越高越剧烈；颗粒越小越明显（撞击不平衡更显著）。","objectives":["物理观念：认识扩散与布朗运动，建立分子永不停息热运动的观念。","科学思维：会分析布朗运动成因，区分粒子运动与分子运动。","科学探究：观察布朗运动实验，归纳温度、颗粒大小的影响。","科学态度与责任：体会从宏观现象推断微观运动的科学推理方法。"],"keyPoints":"① 扩散：物质彼此进入，温度越高越快。\n② 布朗运动：悬浮颗粒的无规则运动（非分子运动）。\n③ 成因：液体分子无规则撞击不平衡。\n④ 反映分子热运动；温度↑、颗粒↓更明显。","difficulties":"① 布朗≠分子运动。原因：颗粒用显微镜可见，分子不可见，需强调「间接反映」。\n② 颗粒大小影响。原因：易说反，越小越明显，需讲清撞击不平衡。\n③ 与扩散区别。原因：扩散是分子直接运动，布朗是颗粒被撞。","teachingMethods":"① 扩散实验（墨水入水）。\n② 布朗运动显微视频。\n③ 成因模拟（乒乓球被乱撞）。\n④ 对比归纳。","preparation":"【P
