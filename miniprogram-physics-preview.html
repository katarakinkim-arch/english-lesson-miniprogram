PT课件】P1 扩散现象；P2 温度影响；P3 布朗运动；P4 成因；P5 颗粒大小；P6 对比总结。\n【实验器材】显微镜、花粉悬浊液、墨水、烧杯。\n【音频】无。","process":[{"step":"Step 1 导入——墨入清水","time":"5分钟","content":"【PPT P1 扩散】教师：「滴一滴墨水入清水，静置片刻整杯水变淡。这是扩散——分子彼此进入对方。说明分子在运动。」 预设回答：「墨水分子扩散到水里，分子在动。」 板书时机：黑板写「扩散：分子彼此进入」。差异化提示：B班看现象；A班需说「无规则」。易错点提醒：扩散是分子直接运动结果，非外力搅拌所致。"},{"step":"Step 2 温度的影响","time":"8分钟","content":"【PPT P2 温度】教师：「分别把糖放入冷水和热水，热水更甜更快——温度越高扩散越快，分子运动越剧烈。这种与温度有关的运动叫热运动。」 预设回答：「温度越高，分子运动越剧烈，扩散越快。」 板书时机：黑板写「温度↑ 运动↑」。差异化提示：B班记结论；A班需说热运动定义。易错点提醒：热运动永不停息，只是温度低时缓慢。"},{"step":"Step 3 布朗运动现象","time":"9分钟","content":"【PPT P3 布朗】教师：「显微镜下花粉颗粒在水里做曲折无规则运动——布朗运动。注意：运动的是花粉颗粒，不是水分子。」 预设回答：「看到花粉颗粒乱走，这是布朗运动。」 板书时机：黑板写「布朗运动：颗粒的运动」。差异化提示：B班看视频；A班需说颗粒尺度。易错点提醒：布朗运动是悬浮颗粒的运动，肉眼和分子都不可见，勿混淆。"},{"step":"Step 4 成因分析","time":"9分钟","content":"【PPT P4 成因】教师：「液体分子从四面八方无规则撞击颗粒。颗粒小，来自各方向的撞击难以完全平衡，合力使它运动且不断改变——这就是布朗运动的成因。」 预设回答：「分子撞击不平衡，合力推着颗粒乱动。」 板书时机：黑板写「撞击不平衡→合力」。差异化提示：B班记；A班需说「间接反映分子运动」。易错点提醒：布朗运动间接反映液体分子热运动，本身不是分子运动。"},{"step":"Step 5 颗粒大小与温度","time":"8分钟","content":"【PPT P5 因素】教师：「颗粒越小，相对撞击的不平衡越明显，布朗运动越显著；温度越高也越剧烈。所以观察布朗运动要用微小颗粒。」 预设回答：「颗粒越小、温度越高，布朗运动越明显。」 板书时机：黑板写「小、热→明显」。差异化提示：B班记；A班需说原因。易错点提醒：颗粒越小越明显（非越大），因撞击更易失衡。"},{"step":"Step 6 对比总结+作业","time":"6分钟","content":"【PPT P6 对比】教师：「扩散是分子直接运动，布朗是颗粒被撞间接反映分子热运动，二者都随温度加剧。试比较两者。」 预设回答：「扩散=分子运动；布朗=颗粒被撞，都证明热运动。」 板书时机：板书对比表。差异化提示：B班填表；A班补成因。易错点提醒：下节课学分子间作用力。"}],"blackboard":"┌── 热运动 ──┐\n│ 扩散:分子直接│\n│ 布朗:颗粒被撞│\n│ 成因:撞击失衡│\n│ 温度↑更剧烈  │\n│ 颗粒↓更明显  │\n│ 证明热运动   │\n└────────────┘","exercises":"【基础作业】1. 布朗运动是____（填分子/悬浮颗粒）的运动，它____（填直接/间接）反映分子热运动。2. 温度越高，分子热运动越____。\n【提高作业】为什么观察布朗运动要用很小的颗粒？颗粒很大时为何看不到明显布朗运动？\n【参考答案——教师用】基础1：悬浮颗粒、间接。基础2：剧烈。提高：颗粒越小，来自各方向分子撞击越不易平衡，合力越显著，布朗运动越明显；颗粒很大时撞击近乎平衡，合力趋于零，运动不明显。","reflection":"✅ 亮点：乒乓球被乱撞模拟撞击不平衡，让抽象成因具象化。\n⚠️ 需改进：B班常把布朗运动当分子运动，需用「颗粒可见、分子不可见」反复澄清。\n📌 下节课衔接：分子间存在作用力（引力和斥力）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx3-u1-3","lessonId":"l-phy-sx3-u1-3","title":"分子间的作用力与物体的内能","book":"选择性必修第三册","unitNumber":1,"unitTitle":"分子动理论","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["分子间作用力","分子势能","内能","人教版选必三Ch1","第三课时"],"textbookAnalysis":"分子间同时存在引力和斥力，统称分子力。r=r₀（约10⁻¹⁰m）时引斥平衡；r\x3cr₀时斥力主导；r>r₀时引力主导；r>10r₀时力可忽略。分子势能与r有关。物体内能=所有分子动能（与温度有关）+分子势能（与体积、物态有关）总和。","overview":"【学情分析】A班：能画分子力-距离曲线、区分分子动能与势能对内能的贡献；B班：误以为r₀处分子力为零即无作用力、把内能与温度画等号忽略势能。共同问题：r₀处引力和斥力都大但平衡；内能含动能和势能两部分；理想气体分子间作用力忽略，内能仅与温度、物质的量有关。","objectives":["物理观念：理解分子间同时存在引力和斥力，建立内能由分子动能和势能组成的观念。","科学思维：会用图像分析分子力随距离的变化，辨析r₀处平衡。","科学探究：通过铅柱粘合等实验感受分子间引力。","科学态度与责任：体会平衡与变化的辩证关系，严谨对待内能概念。"],"keyPoints":"① 同时存在引力与斥力。\n② r₀处平衡；r\x3cr₀斥主导；r>r₀引主导。\n③ 分子势能随r变化。\n④ 内能=分子总动能（温）+总势能（体积/态）。","difficulties":"① r₀处平衡。原因：误以为「力为零=无作用力」，需强调引斥等大。\n② 内能与温度。原因：把内能等同于温度，忽略势能项，需举例相变。\n③ 势能变化。原因：r₀两侧势能都增大，易误单调。","teachingMethods":"① 铅柱粘合实验。\n② 分子力图像。\n③ 内能与温度体积关系。\n④ 相变反例（冰化水）。","preparation":"【PPT课件】P1 铅柱实验；P2 分子力曲线；P3 r₀平衡；P4 分子势能；P5 内能组成；P6 辨析。\n【实验器材】两截铅柱、刮刀。\n【音频】无。","process":[{"step":"Step 1 导入——铅柱吊物","time":"5分钟","content":"【PPT P1 铅柱】教师：「两截铅柱断面刮净压紧后能吊起重物，说明分子间有引力。分子靠很近时也存在排斥（难压缩）。」 预设回答：「压紧后分子引力把铅柱拉住，压不进是斥力。」 板书时机：黑板写课题「分子间作用力」。差异化提示：B班看实验；A班需说引斥共存。易错点提醒：引力和斥力同时存在，不是非此即彼。"},{"step":"Step 2 分子力随距离变化","time":"9分钟","content":"【PPT P2 曲线】教师：「引力和斥力都随距离增大而减小。平衡距离r₀≈10⁻¹⁰m：此处两力等大反向，合力为零。」 预设回答：「r₀处引力和斥力相等，分子力为零。」 板书时机：黑板写「r₀≈10⁻¹⁰m 平衡」。差异化提示：B班记r₀；A班需说两力都减。易错点提醒：力为零是「平衡」不是「没有力」；偏离r₀任一侧合力都增大。"},{"step":"Step 3 r₀两侧行为","time":"9分钟","content":"【PPT P3 两侧】教师：「r\x3cr₀时斥力减小得慢、占主导→表现为斥力；r>r₀时引力占主导→表现为引力；r>10r₀时力可忽略。」 预设回答：「太近相斥、略远相引，很远就没了。」 板书时机：黑板写「\x3cr₀斥、>r₀引」。差异化提示：B班记；A班需说变化率不同。易错点提醒：是「主导」不是「只有」；斥力永远存在只是被引力掩盖。"},{"step":"Step 4 分子势能","time":"8分钟","content":"【PPT P4 势能】教师：「分子势能Ep随r变化，r₀处Ep最小（平衡位置能量最低）。拉远或压近势能都增大，如弹簧。」 预设回答：「r₀最近势能最小，偏离都变大。」 板书时机：黑板写「Ep在r₀最小」。差异化提示：B班记；A班需联系势能曲线。易错点提醒：势能以r₀为极小；与宏观弹簧类比但非真弹簧力。"},{"step":"Step 5 内能组成","time":"8分钟","content":"【PPT P5 内能】教师：「物体内能=所有分子动能总和（与温度有关）+所有分子势能总和（与体积、物态有关）。温度升动能增；体积变态变势能变。」 预设回答：「内能=分子动能（看温度）+分子势能（看体积状态）。」 板书时机：黑板写「E内=Ek总+Ep总」。差异化提示：B班记两项；A班需说物态。易错点提醒：内能不是「热量」；与温度、体积、质量、物态都有关，不只温度。"},{"step":"Step 6 辨析+作业","time":"6分钟","content":"【PPT P6 辨析】教师：「0℃冰化成0℃水，温度不变但内能增——为什么？（分子势能因状态变而增）。理想气体忽略势能，内能与体积无关。」 预设回答：「冰化水势能增，所以内能增；理想气体只看温度。」 板书时机：板书。差异化提示：B班答；A班补理想气体。易错点提醒：下章学固体液体气体状态。"}],"blackboard":"┌── 分子力与内能 ──┐\n│ r₀≈10⁻¹⁰m   │\n│ \x3cr₀斥主导    │\n│ >r₀引主导    │\n│ Ep@r₀最小    │\n│ E内=Ek+Ep    │\n│ 温↑Ek↑态↑Ep↑│\n└──────────────┘","exercises":"【基础作业】1. 平衡距离r₀处分子间引力与斥力____，合力为____。2. 物体内能包括分子____总和与分子____总和。\n【提高作业】0℃的冰熔成0℃的水，内能如何变化？说明原因。\n【参考答案——教师用】基础1：相等、零。基础2：动能、势能。提高：温度升高为零故动能不变；融化过程分子势能增大（固态变为液态，分子排列更自由），所以内能增加，能量来自吸热。","reflection":"✅ 亮点：铅柱吊物实验直观有力；「平衡≠无力」用图像澄清。\n⚠️ 需改进：B班把内能与温度画等号，需用相变反例强化势能项。\n📌 下节课衔接：固体、液体和气体的宏观性质与微观结构。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx3-u2-1","lessonId":"l-phy-sx3-u2-1","title":"固体与液体（晶体、非晶体与表面张力）","book":"选择性必修第三册","unitNumber":2,"unitTitle":"固体液体和气体","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["晶体","非晶体","表面张力","人教版选必三Ch2","第一课时"],"textbookAnalysis":"固体分晶体（有确定熔点、各向异性/等向）和非晶体（无确定熔点、各向同性）。单晶体各向异性，多晶体各向同性。液体表面张力使液面收缩到最小，源于表面层分子引力大于斥力。毛细现象由表面张力与附着层共同作用。","overview":"【学情分析】A班：能区分单晶/多晶/非晶体、解释表面张力微观成因；B班：混淆多晶（各向同性）与单晶、把表面张力错归因「薄膜弹性」。共同问题：晶体有固定熔点；单晶各向异性、多晶因随机取向整体各向同性；表面张力是表面层分子引力净效应，使表面积最小。","objectives":["物理观念：区分晶体与非晶体，理解液体表面张力源于分子引力。","科学思维：会判断单晶/多晶/非晶体及各向同异性，分析表面张力。","科学探究：观察熔化曲线、水滴球形等表面张力现象。","科学态度与责任：体会微观结构决定宏观性质的物理思想。"],"keyPoints":"① 晶体（固定熔点）vs非晶体（无固定熔点）。\n② 单晶各向异性，多晶各向同性。\n③ 表面张力使液面收缩至最小。\n④ 成因：表面层分子引力净效应。","difficulties":"① 多晶vs单晶。原因：多晶由小单晶杂乱组成，整体各向同性，易与非晶体混，需强调「有熔点」。\n② 表面张力成因。原因：误当弹性膜，需讲表面层分子间距大引力主导。\n③ 各向异性。原因：沿不同方向性质不同，抽象，需举导热/透光例子。","teachingMethods":"① 熔化曲线对比。\n② 单晶多晶结构图。\n③ 表面张力实验（硬币浮水、毛细）。\n④ 微观解释。","preparation":"【PPT课件】P1 熔化曲线；P2 晶体非晶体；P3 单晶多晶；P4 表面张力；P5 毛细；P6 小结。\n【实验器材】云母片、玻璃、硬币、水杯、细管。\n【音频】无。","process":[{"step":"Step 1 导入——熔化曲线","time":"5分钟","content":"【PPT P1 曲线】教师：「加热海波温度升到熔点停顿再升（有平台），加热玻璃温度持续升（无平台）。有无固定熔点是晶体与非晶体的分水岭。」 预设回答：「有平台的是晶体，一直升的是非晶体。」 板书时机：黑板写「晶体有熔点」。差异化提示：B班看图；A班需说平台意义。易错点提醒：熔点平台段吸热用于相变，温度不变。"},{"step":"Step 2 晶体与非晶体","time":"9分钟","content":"【PPT P2 分类】教师：「晶体：原子规则排列，有固定熔点和规则几何外形（单晶）。非晶体：排列无序，无固定熔点（如玻璃、石蜡）。」 预设回答：「规则排列=晶体有熔点；无序=非晶体无熔点。」 板书时机：黑板写分类。差异化提示：B班记；A班需说微观。易错点提醒：外形规则不一定是单晶（多晶也近似），关键看熔点与各向性。"},{"step":"Step 3 单晶与多晶","time":"8分钟","content":"【PPT P3 单多晶】教师：「单晶体各方向性质不同（各向异性，如云母导热各向不同）。多晶体由大量小单晶杂乱拼成，整体上各向同性，但有固定熔点。」 预设回答：「单晶各向异性，多晶各向同性但有熔点。」 板书时机：黑板写「单晶异/多晶同」。差异化提示：B班记；A班需说杂乱取向。易错点提醒：多晶体有熔点（是晶体），只是各向同性，别当非晶体。"},{"step":"Step 4 表面张力","time":"9分钟","content":"【PPT P4 表面】教师：「硬币能浮在水面、水滴成球形——液体表面有收缩趋势，叫表面张力。它使液体表面积趋于最小。」 预设回答：「水面像有层皮把面积缩到最小，硬币才浮得住。」 板书时机：黑板写「表面张力→面积最小」。差异化提示：B班看实验；A班需说球形。易错点提醒：不是弹性薄膜，是表面层分子受内部分子引力净向内拉。"},{"step":"Step 5 微观成因","time":"8分钟","content":"【PPT P5 微观】教师：「液体表面层分子比内部分子稀疏，间距略大于r₀，引力主导，把表面分子往内拉，使表面积收缩。毛细现象中附着层与表面张力共同使液柱上升或下降。」 预设回答：「表面层分子稀、引力拉，液面收缩；毛细看浸润与否。」 板书时机：黑板写「表面层引力主导」。差异化提示：B班记；A班需说浸润。易错点提醒：表面层分子间距大于r₀（不是小于），故引力主导；浸润与不浸润决定毛细升降。"},{"step":"Step 6 小结+作业","time":"6分钟","content":"【PPT P6 小结】教师：「晶体有熔点、单晶各向异性；表面张力源于表面层分子引力使面积最小。举例生活中表面张力现象。」 预设回答：「露珠球形、毛细吸水都是表面张力。」 板书时机：板书。差异化提示：B班举；A班补成因。易错点提醒：下节课学气体实验定律。"}],"blackboard":"┌── 固体与液体 ──┐\n│ 晶体:有熔点  │\n│ 单晶:各向异  │\n│ 多晶:各向同  │\n│ 非晶:无熔点  │\n│ 表面张力→    │\n│ 面积最小     │\n└─────────────┘","exercises":"【基础作业】1. 区分晶体与非晶体的关键是是否有____。2. 单晶体____（填各向异性/各向同性），多晶体____（填各向异性/各向同性）。3. 表面张力使液体表面积趋于____。\n【提高作业】为什么表面层分子表现为引力主导？毛细现象中浸润和不浸润分别使液柱如何变化？\n【参考答案——教师用】基础1：固定熔点。基础2：各向异性、各向同性。基础3：最小。提高：表面层分子比内部稀疏，间距略大于r₀，斥力减小更快，引力主导。浸润时附着层扩张使液柱上升，不浸润时收缩使液柱下降。","reflection":"✅ 亮点：熔化曲线平台对比一目了然；硬币浮水让表面张力可触。\n⚠️ 需改进：B班把多晶体当非晶体，需强调「有熔点」这一判据。\n📌 下节课衔接：气体的实验定律与理想气体状态方程。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx3-u2-2","lessonId":"l-phy-sx3-u2-2","title":"气体实验定律与理想气体状态方程","book":"选择性必修第三册","unitNumber":2,"unitTitle":"固体液体和气体","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["玻意耳定律","查理定律","盖吕萨克定律","理想气体","人教版选必三Ch2","第二课时"],"textbookAnalysis":"玻意耳定律（等温）：pV=C。查理定律（等容）：p/T=C（T热力学温度）。盖吕萨克定律（等压）：V/T=C。理想气体状态方程：pV/T=C（或pV=nRT）。气体压强是大量分子频繁碰撞器壁的宏观表现。","overview":"【学情分析】A班：能选用合适定律列式、注意T用开尔文、掌握pV/T=C统一式；B班：T用摄氏度、混淆哪量不变、单位不统一、压强大写小写出错。共同问题：三条定律各对应一个不变的量；T必须用热力学温度K=℃+273；统一式pV/T=C最稳妥；pV=nRT中R为常数。","objectives":["物理观念：掌握三条气体实验定律及理想气体状态方程，理解压强微观本质。","科学思维：能根据题意判断等温/等容/等压，正确列式求解。","科学探究：通过实验（注射器、气体定律演示仪）验证定律。","科学态度与责任：体会控制变量法，严谨处理温度单位。"],"keyPoints":"① 玻意耳：等温 pV=C。\n② 查理：等容 p/T=C。\n③ 盖吕萨克：等压 V/T=C。\n④ 统一：pV/T=C（T用开尔文K）。","difficulties":"① 温度单位。原因：习惯用℃，必须用K=℃+273，否则查理/盖吕萨克全错，需红字强调。\n② 判不变量。原因：分不清等温/容/压，需读题抓「缓慢」「固定体积」等词。\n③ 统一式。原因：三条分不清时直接用pV/T=C最稳，需会推导。","teachingMethods":"① 控制变量法回顾。\n② 三条定律实验。\n③ 统一式推导。\n④ 计算训练。","preparation":"【PPT课件】P1 压强微观；P2 玻意耳；P3 查理；P4 盖吕萨克；P5 统一式；P6 计算。\n【实验器材】注射器、气体定律演示仪（或传感器）。\n【音频】无。","process":[{"step":"Step 1 导入——气体压强","time":"5分钟","content":"【PPT P1 压强】教师：「气体压强是大量分子频繁碰撞器壁的平均作用力。它与分子数密度和分子平均动能（温度）有关。今天学气体状态如何变化。」 预设回答：「压强来自分子撞壁，和密度、温度有关。」 板书时机：黑板写课题「气体实验定律」。差异化提示：B班听；A班需说微观。易错点提醒：是大量分子统计平均效果，不是单个分子。"},{"step":"Step 2 玻意耳定律","time":"9分钟","content":"【PPT P2 玻意耳】教师：「温度不变时，一定质量气体压强与体积成反比：pV=C（如用注射器推活塞，体积减半压强加倍）。」 预设回答：「等温下pV乘积不变，V小p大。」 板书时机：黑板写「pV=C（等温）」。差异化提示：B班记；A班需说质量一定。易错点提醒：前提是「质量一定、温度不变」；pV=C不是p=CV形式反了。"},{"step":"Step 3 查理定律","time":"8分钟","content":"【PPT P3 查理】教师：「体积不变时，压强与热力学温度成正比：p/T=C。注意T用开尔文K，不能代入摄氏度！」 预设回答：「等容下p/T不变，且T要用K。」 板书时机：黑板写「p/T=C（等容）T=℃+273」。差异化提示：B班重点单位；A班需说零度意义。易错点提醒：绝对不能用℃；T→0时p→0，故必须开尔文温标。"},{"step":"Step 4 盖吕萨克定律","time":"8分钟","content":"【PPT P4 盖吕萨克】教师：「压强不变时，体积与热力学温度成正比：V/T=C。温度升高气体膨胀（如热气球）。」 预设回答：「等压下V/T不变，升温体积胀。」 板书时机：黑板写「V/T=C（等压）」。差异化提示：B班记；A班需说应用。易错点提醒：同样T用K；与查理别混——一个体积定一个压强定。"},{"step":"Step 5 统一式","time":"9分钟","content":"【PPT P5 统一】教师：「三条可统一为pV/T=C（同一气体质量不变）。换成物质的量：pV=nRT（R为普适气体常量）。任两状态：p₁V₁/T₁=p₂V₂/T₂。」 预设回答：「pV/T处处相等，或pV=nRT通用。」 板书时机：黑板写「p₁V₁/T₁=p₂V₂/T₂」。差异化提示：B班用统一式；A班需说R。易错点提醒：统一式最保险；T必须K；两状态直接用比值式避免求C。"},{"step":"Step 6 计算+作业","time":"6分钟","content":"【PPT P6 计算】教师：「质量一定气体27℃、2atm、体积V，等压升到127℃，体积变？用V/T=C：V₂=V×(400/300)=1.33V。」 预设回答：「T换成300K和400K，V₂=1.33V。」 板书时机：板书。差异化提示：B班算；A班核单位。易错点提醒：下章学热力学定律（功热内能）。"}],"blackboard":"┌── 气体定律 ──┐\n│ 玻意耳 pV=C │\n│ 查理 p/T=C  │\n│ 盖吕 V/T=C  │\n│ T用开尔文  │\n│ pV/T=C统一  │\n│ pV=nRT     │\n└────────────┘","exercises":"【基础作业】1. 玻意耳定律表达式____（条件____）。2. 查理定律中温度必须用____温标。3. 理想气体状态方程____。\n【提高作业】某气体在0℃、1atm时体积2L，保持压强不变升温到100℃，求体积。\n【参考答案——教师用】基础1：pV=C、等温质量一定。基础2：热力学（开尔文）。基础3：pV/T=C或pV=nRT。提高：T₁=273K，T₂=373K，等压V/T=C，V₂=2×373/273≈2.73L。","reflection":"✅ 亮点：三条定律配控制变量实验，统一式pV/T=C降维记忆。\n⚠️ 需改进：B班顽固用℃，需每次红字「T=℃+273」。\n📌 下节课衔接：热力学第一定律（功、热与内能变化）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx3-u3-1","lessonId":"l-phy-sx3-u3-1","title":"功、热与内能 热力学第一定律","book":"选择性必修第三册","unitNumber":3,"unitTitle":"热力学定律","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["热力学第一定律","内能变化","做功","热传递","人教版选必三Ch3","第一课时"],"textbookAnalysis":"改变内能两种方式：做功（能量转化）和热传递（能量转移）。热力学第一定律：ΔU=Q+W（规定外界对系统做功W>0，系统吸热Q>0，内能增加ΔU>0）。是能量守恒定律在热学中的体现。","overview":"【学情分析】A班：能正确代入ΔU=Q+W符号、解释绝热/等容特例；B班：符号规定混乱（W、Q正负）、把「做功」与「热传递」效果混淆。共同问题：先统一符号约定（外界对系统做功W>0、吸热Q>0、内能增ΔU>0）；绝热Q=0，等容W=0；做功和传热对改变内能等效但本质不同。","objectives":["物理观念：理解做功与热传递都能改变内能，掌握热力学第一定律。","科学思维：能按统一符号约定用ΔU=Q+W分析具体过程。","科学探究：通过压缩空气升温、摩擦生热等事例体会做功改内能。","科学态度与责任：认识能量守恒的普适性，树立守恒观念。"],"keyPoints":"① 改内能两方式：做功、热传递（等效但本质异）。\n② 定律：ΔU=Q+W。\n③ 符号约定：外界对系统做功W>0，吸热Q>0，内能增ΔU>0。\n④ 绝热Q=0；等容W=0。","difficulties":"① 符号约定。原因：教材/习惯不同易乱，须全班统一一套约定，需反复练。\n② 做功本质。原因：做功是能量转化（机械→内），传热是转移，需区分。\n③ 特例。原因：绝热、等容易漏，需列举W=0或Q=0情形。","teachingMethods":"① 压缩空气实验。\n② 符号约定板演。\n③ 特例分析（绝热/等容）。\n④ 计算训练。","preparation":"【PPT课件】P1 两方式；P2 符号约定；P3 定律；P4 绝热；P5 等容；P6 计算。\n【实验器材】注射器（快速压）、橡皮塞。\n【音频】无。","process":[{"step":"Step 1 导入——两方式","time":"5分钟","content":"【PPT P1 两方式】教师：「冷水可烧旺火加热升温（热传递），也可手摩擦升温（做功）。二者都能改变内能，效果等效但本质不同。」 预设回答：「加热和摩擦都能升温，一个传热一个做功。」 板书时机：黑板写「做功/热传递改内能」。差异化提示：B班看例子；A班需说本质异。易错点提醒：等效是「对内能效果」等效，能量来路不同（转化vs转移）。"},{"step":"Step 2 符号约定","time":"9分钟","content":"【PPT P2 约定】教师：「统一约定：外界对系统做功W为正，系统从外界吸热Q为正，系统内能增加ΔU为正。即ΔU=Q+W。」 预设回答：「外界对系统做功、系统吸热都使内能增，记正。」 板书时机：黑板写「ΔU=Q+W 约定」。差异化提示：B班重点背约定；A班需说反向为负。易错点提醒：约定必须全班一致；若系统对外做功则W\x3c0，放热则Q\x3c0。"},{"step":"Step 3 定律表述","time":"8分钟","content":"【PPT P3 定律】教师：「热力学第一定律：系统内能增量=吸收热量+外界对系统做功，ΔU=Q+W。这是能量守恒在热学中的形式。」 预设回答：「ΔU=Q+W，能量既不会凭空生也不灭。」 板书时机：黑板写定律。差异化提示：B班记；A班需说守恒。易错点提醒：是能量守恒的具体化，不是新定律；W与Q符号依约定。"},{"step":"Step 4 绝热过程","time":"8分钟","content":"【PPT P4 绝热】教师：「绝热过程不与外界换热，Q=0，则ΔU=W。快速压缩气体做功使其升温就是近似绝热（如打火机气体压缩）。」 预设回答：「绝热时Q=0，内能变全靠做功。」 板书时机：黑板写「绝热:ΔU=W」。差异化提示：B班记；A班需说快压。易错点提醒：绝热≠不做功；是Q=0，W仍可非零。"},{"step":"Step 5 等容过程","time":"8分钟","content":"【PPT P5 等容】教师：「体积不变时气体不对外做功（W=0），则ΔU=Q。等容升温全靠吸热增加内能。」 预设回答：「等容W=0，内能变全靠吸热放热。」 板书时机：黑板写「等容:ΔU=Q」。差异化提示：B班记；A班需说体积定。易错点提醒：等容W=0因体积不变、边界不动；与绝热不同（Q=0）。"},{"step":"Step 6 计算+作业","time":"7分钟","content":"【PPT P6 计算】教师：「系统吸热200J、外界对它做功100J，ΔU=？答：ΔU=200+100=300J（内能增）。若对外做功则W取负。」 预设回答：「ΔU=300J，内能增加。」 板书时机：板书。差异化提示：B班算；A班补负值例。易错点提醒：下节课学热力学第二定律（方向性）。"}],"blackboard":"┌── 热力学第一定律 ──┐\n│ ΔU=Q+W       │\n│ 约定:        │\n│ 外界做功W>0  │\n│ 吸热Q>0     │\n│ 绝热ΔU=W    │\n│ 等容ΔU=Q    │\n└──────────────┘","exercises":"【基础作业】1. 改变内能的两种方式____和____。2. 热力学第一定律表达式____，其中外界对系统做功W取____（正/负）。\n【提高作业】系统放热50J，同时对外做功80J，内能变化多少？\n【参考答案——教师用】基础1：做功、热传递。基础2：ΔU=Q+W、正。提高：Q=-50J（放热），W=-80J（对外做功），ΔU=(-50)+(-80)=-130J，内能减少130J。","reflection":"✅ 亮点：压缩空气升温让「做功改内能」看得见；符号约定全班统一消除混乱。\n⚠️ 需改进：B班常把「对外做功」仍代正，需强化约定口诀。\n📌 下节课衔接：热力学第二定律与能量转化的方向性。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx3-u3-2","lessonId":"l-phy-sx3-u3-2","title":"热力学第二定律与能量耗散","book":"选择性必修第三册","unitNumber":3,"unitTitle":"热力学定律","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学态度与责任"],"tags":["热力学第二定律","方向性","熵","能量耗散","人教版选必三Ch3","第二课时"],"textbookAnalysis":"热力学第二定律表述：克劳修斯表述（热量不能自发地从低温物体传到高温物体）；开尔文表述（不可能从单一热源吸热使之完全变成功而不引起其他变化）。它指出宏观过程有方向性，能量品质下降（耗散），熵增原理。","overview":"【学情分析】A班：能说出两种表述并理解等价性、联系熵增与方向性；B班：误以为第二定律否定第一定律、把「不能自发」说成「绝对不能」。共同问题：第二定律说的是自发过程的方向性，不违反能量守恒；制冷机耗电把热从低温搬高温是「非自发」需外界做功；能量守恒但可用能减少（品质降级）。","objectives":["物理观念：理解热力学第二定律的两种表述，认识宏观过程的方向性。","科学思维：能辨析自发与非自发过程，理解两种表述的等价。","科学探究：通过实例（墨散、热传导不可逆）体会方向性。","科学态度与责任：树立能量品质与节约能源、可持续发展的责任意识。"],"keyPoints":"① 克劳修斯：热不能自发从低温传到高温。\n② 开尔文：不可能从单一热源吸热全变功而不生他变。\n③ 宏观过程有方向性（不可逆）。\n④ 能量耗散：可用能减少，品质降级。","difficulties":"① 自发 vs 非自发。原因：制冷机把热搬向高温需耗电，是「非自发」，易误以为违反定律，需澄清。\n② 与第一定律关系。原因：第二律不否定守恒，只定方向，需说明。\n③ 耗散含义。原因：能量守恒但变「不可用」，需举散热水。","teachingMethods":"① 墨滴散开不可逆。\n② 两表述对比。\n③ 制冷机电功例子。\n④ 节能责任。","preparation":"【PPT课件】P1 方向性；P2 克劳修斯；P3 开尔文；P4 等价；P5 制冷机；P6 耗散与节能。\n【实验器材】无（生活实例）。\n【音频】无。","process":[{"step":"Step 1 导入——不可逆","time":"5分钟","content":"【PPT P1 方向】教师：「墨滴入水扩散开，却从不会自动重新聚成一滴；热水凉了不会自动变热。宏观过程有方向性——这是第二定律的核心。」 预设回答：「扩散、散热都单向进行，不能自动倒回。」 板书时机：黑板写课题「热力学第二定律」。差异化提示：B班看现象；A班需说方向性。易错点提醒：方向性是「自发」倾向，非绝对不可逆转（需外界干预）。"},{"step":"Step 2 克劳修斯表述","time":"9分钟","content":"【PPT P2 克劳修斯】教师：「克劳修斯表述：热量不能自发地从低温物体传到高温物体。冰箱能把热从冷处搬到热处，但必须耗电做功（非自发）。」 预设回答：「热不会自己从冷跑到热，冰箱靠电才行。」 板书时机：黑板写「克：热不自发低温→高温」。差异化提示：B班记；A班需说耗电。易错点提醒：「不能自发」不等于「不能」；制冷是非自发需外界做功。"},{"step":"Step 3 开尔文表述","time":"9分钟","content":"【PPT P3 开尔文】教师：「开尔文表述：不可能从单一热源吸热使之完全变成功而不引起其他变化。热机必须向低温热源排热，效率不能达100%。」 预设回答：「热机没法把所有热变功，必排废热。」 板书时机：黑板写「开：单热源全变功不可」。差异化提示：B班记；A班需说排热。易错点提醒：是「不引起其他变化」时不可；允许排热（有他变）则可部分变功。"},{"step":"Step 4 两表述等价","time":"8分钟","content":"【PPT P4 等价】教师：「两表述等价：若违反克氏（热自低温到高温不耗能），就能造出违反开氏的永动机。故方向性本质一致。」 预设回答：「违背一个必违背另一个，方向性同源。」 板书时机：黑板写「等价」。差异化提示：B班记；A班需说永动机。易错点提醒：等价说明是同一规律的两面，不是两条独立定律。"},{"step":"Step 5 能量耗散","time":"8分钟","content":"【PPT P5 耗散】教师：「能量总量守恒（第一定律），但散失到环境的内能品质低、难以再利用——能量耗散。可用能不断减少，品质降级。」 预设回答：「能量没少，但变成低品质热难再用。」 板书时机：黑板写「耗散：可用能↓」。差异化提示：B班记；A班需说品质。易错点提醒：耗散不违反守恒，是「可用程度」下降，强调节能意义。"},{"step":"Step 6 节能责任+作业","time":"6分钟","content":"【PPT P6 责任】教师：「第二定律告诉我们能量有方向、可用能有限。提高能效、节约能源、减少废热，是每个人的责任。举例身边节能。」 预设回答：「随手关灯、余热利用都是节能。」 板书时机：板书。差异化提示：B班举；A班补原理。易错点提醒：下章转入光学（折射与全反射）。"}],"blackboard":"┌── 热力学第二定律 ──┐\n│ 克:热不自发     │\n│ 低温→高温      │\n│ 开:单热源全变功 │\n│ 不可(无他变)    │\n│ 方向性/不可逆   │\n│ 耗散:可用能↓    │\n└────────────────┘","exercises":"【基础作业】1. 克劳修斯表述：热量不能自发地从____物体传到____物体。2. 开尔文表述说明热机效率____（能/不能）达到100%。3. 能量耗散指____能减少。\n【提高作业】冰箱把热量从冷藏室搬到外界，是否违反热力学第二定律？为什么？\n【参考答案——教师用】基础1：低温、高温。基础2：不能。基础3：可用。提高：不违反。第二定律禁止的是「自发」从低温到高温的传热；冰箱耗电做功，属非自发过程，需要外界做功并引起其他变化，符合定律。","reflection":"✅ 亮点：墨散、散热不可逆让方向性具象；冰箱例子破解「违反定律」误解。\n⚠️ 需改进：B班易把第二定律当否定第一定律，需强调「守恒仍成立，只定方向」。\n📌 下节课衔接：几何光学——光的折射定律。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx3-u4-1","lessonId":"l-phy-sx3-u4-1","title":"光的折射 折射定律","book":"选择性必修第三册","unitNumber":4,"unitTitle":"光","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["折射","折射率","斯涅尔定律","人教版选必三Ch4","第一课时"],"textbookAnalysis":"折射定律（斯涅尔）：入射角i与折射角r满足 n₁sin i = n₂sin r。光从真空射入介质折射率n=c/v，是介质对光偏折能力的量度。折射率n>1，越大偏折越厉害。","overview":"【学情分析】A班：能由折射定律求折射率/角度、理解n=c/v；B班：把入射角折射角画错（与法线而非界面夹角）、漏sin、记反n₁n₂。共同问题：角度均对法线；n₁sin i=n₂sin r（两侧对称）；相对折射率与绝对折射率；光密/光疏由n大小定。","objectives":["物理观念：掌握折射定律，理解折射率是介质光学性质的量度。","科学思维：会应用n₁sin i=n₂sin r求解折射角和折射率。","科学探究：通过激光过玻璃砖实验测量折射角，计算折射率。","科学态度与责任：体会几何关系与实验测量结合的科学方法。"],"keyPoints":"① 折射定律：n₁sin i=n₂sin r（角对法线）。\n② 折射率n=c/v（真空为1）。\n③ n越大偏折越厉害。\n④ 光密/光疏由n相对大小定。","difficulties":"① 角度对法线。原因：易与界面夹角混，需反复强调画虚线法线。\n② 公式记忆。原因：漏sin或记反，需练n₁sin i=n₂sin r对称式。\n③ 相对折射率。原因：真空n=1，介质间为相对值，易混。","teachingMethods":"① 激光过玻璃实验。\n② 法线作图强调。\n③ 公式推导。\n④ 计算训练。","preparation":"【PPT课件】P1 折射现象；P2 法线与角；P3 折射定律；P4 折射率；P5 偏折；P6 计算。\n【实验器材】激光笔、半圆形玻璃砖、白纸、量角器。\n【音频】无。","process":[{"step":"Step 1 导入——筷子弯折","time":"5分钟","content":"【PPT P1 现象】教师：「插水杯的筷子看起来弯折，是光从水进入空气发生折射。今天定量研究折射规律。」 预设回答：「光斜穿界面偏了，所以筷子看着弯。」 板书时机：黑板写课题「光的折射」。差异化提示：B班看现象；A班需说界面。易错点提醒：是光「传播方向」改变，非筷子真弯；垂直入射不偏。"},{"step":"Step 2 法线与角","time":"9分钟","content":"【PPT P2 法线】教师：「法线是过入射点垂直界面的虚线。入射角i、折射角r都是与法线的夹角，不是与界面！画错角全错。」 预设回答：「i和r都对法线量，不是对界面。」 板书时机：黑板写「角对法线」。差异化提示：B班重点；A班需说虚线。易错点提醒：务必先画法线；角度对界面是常见致命错。"},{"step":"Step 3 折射定律","time":"9分钟","content":"【PPT P3 定律】教师：「斯涅尔定律：n₁sin i=n₂sin r。空气n₁≈1，介质n₂=n，则sin i=n sin r。两侧形式对称。」 预设回答：「n₁sin i=n₂sin r，空气里sin i=n sin r。」 板书时机：黑板写「n₁sin i=n₂sin r」。差异化提示：B班记式；A班需说对称。易错点提醒：不是sin i/sin r=n₁/n₂乱记；用对称式不易错；i、r对应两侧介质。"},{"step":"Step 4 折射率","time":"8分钟","content":"【PPT P4 折射率】教师：「折射率n=c/v（真空c、介质中速v）。真空n=1，水约1.33，玻璃约1.5。n越大光越慢、偏折越厉害。」 预设回答：「n=c/v，玻璃n大偏折大。」 板书时机：黑板写「n=c/v」。差异化提示：B班记值；A班需说速度。易错点提醒：n是介质属性与角无关；相对折射率=两绝对折射率之比。"},{"step":"Step 5 偏折方向","time":"8分钟","content":"【PPT P5 偏折】教师：「光从光疏（n小）入光密（n大），折射角小于入射角，向法线偏；反之远离法线。光密/光疏由n相对大小决定。」 预设回答：「进光密靠法线，进光疏离法线。」 板书时机：黑板写「疏→密 靠法线」。差异化提示：B班记；A班需说n比较。易错点提醒：光密≠密度大（如水比酒精密但n小）；看n不看密度。"},{"step":"Step 6 计算+作业","time":"6分钟","content":"【PPT P6 计算】教师：「光从空气(1)入玻璃(n=1.5)，i=30°，求r。sin r=sin30/1.5=0.333，r≈19.5°。」 预设回答：「r≈19.5°，向法线偏。」 板书时机：板书。差异化提示：B班算；A班核。易错点提醒：下节课学全反射（临界角）。"}],"blackboard":"┌── 光的折射 ──┐\n│ 角对法线    │\n│ n₁sin i=    │\n│ n₂sin r     │\n│ n=c/v       │\n│ 疏→密靠法线 │\n│ 密→疏离法线 │\n└────────────┘","exercises":"【基础作业】1. 折射定律表达式____。2. 折射率n=____（用c、v表示）。3. 光从空气进入玻璃，折射角____入射角（填大于/小于）。\n【提高作业】光从水（n=1.33）射入空气，入射角30°，求折射角。\n【参考答案——教师用】基础1：n₁sin i=n₂sin r。基础2：c/v。基础3：小于。提高：1.33 sin30°=1·sin r，sin r=0.665，r≈41.7°。","reflection":"✅ 亮点：筷子弯折生活导入；「角对法线」反复强调杜绝作图硬伤。\n⚠️ 需改进：B班常把角量成与界面夹角，需每次先画法线。\n📌 下节课衔接：全反射与光导纤维（临界角）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx3-u4-2","lessonId":"l-phy-sx3-u4-2","title":"全反射 光导纤维","book":"选择性必修第三册","unitNumber":4,"unitTitle":"光","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["全反射","临界角","光导纤维","人教版选必三Ch4","第二课时"],"textbookAnalysis":"全反射条件：光从光密介质射向光疏介质，且入射角≥临界角C。临界角 sin C=1/n（光疏为真空/空气）。应用：光导纤维（全反射传光）、全反射棱镜。光纤由芯（n大）和包层（n小）组成，光在芯内全反射传输。","overview":"【学情分析】A班：能判断何时发生全反射、计算临界角、解释光纤原理；B班：忘「光密→光疏」前提、把临界角公式写成sin C=n、不画光路。共同问题：全反射两条件缺一不可（密到疏+角≥C）；sin C=1/n（仅当光疏为空气）；光纤靠芯包层折射率差实现全反射。","objectives":["物理观念：理解全反射条件与临界角，认识光导纤维原理。","科学思维：会判断全反射发生条件并计算临界角。","科学探究：通过实验（激光入水/玻璃观察全反射）验证临界角。","科学态度与责任：体会全反射在现代通信中的应用价值。"],"keyPoints":"① 条件：光密→光疏 且 入射角≥临界角C。\n② 临界角：sin C = 1/n（光疏为空气）。\n③ 光纤：芯n大、包层n小，全反射传光。\n④ 应用：棱镜、光纤通信。","difficulties":"① 两条件。原因：漏「密到疏」前提，需强调缺一不可。\n② 临界角公式。原因：易写sin C=n（反），需记「1/n」并理解来自sin C·n=1。\n③ 光纤结构。原因：芯包层n大小搞反，需画图。","teachingMethods":"① 激光入水全反射实验。\n② 临界角推导。\n③ 光纤结构动画。\n④ 计算训练。","preparation":"【PPT课件】P1 全反射现象；P2 两条件；P3 临界角；P4 公式；P5 光纤；P6 应用。\n【实验器材】激光笔、半圆玻璃砖（或水棱镜）。\n【音频】无。","process":[{"step":"Step 1 导入——水面反光","time":"5分钟","content":"【PPT P1 现象】教师：「水中看水面，从下往上看水面如镜能反光——这是全反射。当光从水（密）射向空气（疏）且角够大，全部反射回水。」 预设回答：「光从水里大角度射向空气被全反射回来。」 板书时机：黑板写课题「全反射」。差异化提示：B班看现象；A班需说密到疏。易错点提醒：全反射只在「密到疏」且角大时发生；疏到密不会全反射。"},{"step":"Step 2 两条件","time":"9分钟","content":"【PPT P2 条件】教师：「全反射发生须同时满足：①光从光密介质射向光疏介质；②入射角≥临界角。少任一条都只是部分反射。」 预设回答：「密到疏、角够大，两条都要。」 板书时机：黑板写「条件①密→疏 ②≥C」。差异化提示：B班重点；A班需说缺一条。易错点提醒：空气→水（疏→密）怎加大角也不会全反射；条件①必查。"},{"step":"Step 3 临界角","time":"9分钟","content":"【PPT P3 临界角】教师：「临界角C是折射角恰为90°时的入射角。由n sin C=1·sin90°=1，得sin C=1/n。水n=1.33，C≈48.8°。」 预设回答：「折射角90°时对应临界角，sin C=1/n。」 板书时机：黑板写「sin C=1/n」。差异化提示：B班记式；A班需说推导。易错点提醒：公式是1/n不是n；仅当光疏为空气（n=1）成立；其他光疏介质用n密sin C=n疏。"},{"step":"Step 4 计算临界角","time":"8分钟","content":"【PPT P4 计算】教师：「玻璃n=1.5，sin C=1/1.5=0.667，C≈41.8°。入射角>41.8°在水-玻璃界面就全反射。」 预设回答：「玻璃临界角约41.8°。」 板书时机：黑板写算例。差异化提示：B班算；A班核。易错点提醒：n越大C越小，越易全反射（钻石n大故璀璨）。"},{"step":"Step 5 光导纤维","time":"8分钟","content":"【PPT P5 光纤】教师：「光纤：中间纤芯n₁大，外包层n₂小（n₁>n₂）。光在芯内以大于临界角入射到侧壁，发生全反射，沿纤维弯弯传输不泄漏。」 预设回答：「芯比包层折射率大，光在侧壁全反射前进。」 板书时机：黑板写「芯n₁>包层n₂」。差异化提示：B班记结构；A班需说全反射。易错点提醒：必须芯n大于包层n；若反了光会折射泄漏无法传远。"},{"step":"Step 6 应用+作业","time":"6分钟","content":"【PPT P6 应用】教师：「光纤用于通信（低损耗大带宽）、内窥镜（传像）。全反射棱镜替代镀银反射镜。举例你还知哪些应用。」 预设回答：「光纤上网、胃镜，棱镜反光都用全反射。」 板书时机：板书。差异化提示：B班举；A班补。易错点提醒：下节课学光的干涉衍射偏振。"}],"blackboard":"┌── 全反射 ──┐\n│ 条件:      │\n│ ①密→疏    │\n│ ②≥临界角C │\n│ sinC=1/n   │\n│ 光纤:芯>包 │\n│ 全反射传光 │\n└────────────┘","exercises":"【基础作业】1. 全反射发生的两个条件____、____。2. 临界角公式（光疏为空气）____。3. 光纤中纤芯折射率应____（大于/小于）包层。\n【提高作业】某玻璃n=1.6，求其临界角；若光从玻璃射向水（n=1.33），临界角变为多少？\n【参考答案——教师用】基础1：光密→光疏、入射角≥临界角。基础2：sin C=1/n。基础3：大于。提高：空气界sin C=1/1.6=0.625，C≈38.7°；玻璃→水：1.6 sin C=1.33·1，sin C=0.831，C≈56.2°。","reflection":"✅ 亮点：水中镜面反光导入全反射；光纤芯包层结构动画破解n大小误区。\n⚠️ 需改进：B班把临界角公式写成sin C=n，需从n sin C=1推导强化。\n📌 下节课衔接：光的波动性——干涉、衍射与偏振。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx3-u4-3","lessonId":"l-phy-sx3-u4-3","title":"光的干涉 衍射与偏振","book":"选择性必修第三册","unitNumber":4,"unitTitle":"光","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学探究"],"tags":["干涉","衍射","偏振","光的波动性","人教版选必三Ch4","第三课时"],"textbookAnalysis":"干涉：两列相干光叠加出现明暗相间条纹（杨氏双缝Δx=Lλ/d）。衍射：光绕过障碍物偏离直线传播（单缝、圆孔衍射）。偏振：横波特有，光通过偏振片后振动方向受限，证明光是横波。三者共同证明光的波动性。","overview":"【学情分析】A班：能说清干涉条件（相干光源、Δx公式）、衍射与干涉条纹区别、偏振证明横波；B班：混淆衍射与干涉、不知相干条件、以为偏振所有波都有。共同问题：干涉需频率相同相位差恒定（同光源分束）；Δx=Lλ/d，波长越长条纹越宽；衍射是单束光绕障；偏振只有横波有，光是横波。","objectives":["物理观念：理解干涉、衍射、偏振现象，认识光的波动性。","科学思维：会分析双缝干涉条纹间距Δx=Lλ/d，区分衍射与干涉。","科学探究：通过双缝、单缝实验观察光的波动现象。","科学态度与责任：体会光具有波粒二象性，建立辩证物质观。"],"keyPoints":"① 干涉：相干光叠加，Δx=Lλ/d。\n② 衍射：光绕障，单缝圆孔出条纹。\n③ 偏振：横波特有，证光为横波。\n④ 三者证光的波动性。","difficulties":"① 相干条件。原因：需同频恒定相位差，普通两灯不干涉，需分束，易忽略。\n② 衍射vs干涉。原因：都出条纹易混，需说单束绕障vs两束叠加。\n③ 偏振意义。原因：误以为纵波也有，需强调横波特有证光横波。","teachingMethods":"① 杨氏双缝实验。\n② 单缝衍射演示。\n③ 偏振片实验（两片转）。\n④ 波动综合。","preparation":"【PPT课件】P1 干涉；P2 双缝公式；P3 衍射；P4 条纹区别；P5 偏振；P6 总结。\n【实验器材】激光、双缝、单缝、偏振片。\n【音频】无。","process":[{"step":"Step 1 导入——双缝条纹","time":"5分钟","content":"【PPT P1 干涉】教师：「激光过双缝在屏上出明暗相间条纹——光的干涉，证明光有波动性。要干涉需两束相干光（同频、相位差恒定）。」 预设回答：「双缝出条纹是干涉，光像波一样叠加。」 板书时机：黑板写课题「干涉衍射偏振」。差异化提示：B班看现象；A班需说相干。易错点提醒：普通两光源频率虽同但相位乱，不干涉；须同一光源分两束。"},{"step":"Step 2 双缝公式","time":"9分钟","content":"【PPT P2 公式】教师：「条纹间距Δx=Lλ/d（L缝屏距、d双缝距、λ波长）。波长越长、缝距越小，条纹越宽越疏。」 预设回答：「Δx=Lλ/d，红光λ大故条纹更宽。」 板书时机：黑板写「Δx=Lλ/d」。差异化提示：B班记式；A班需说比例。易错点提醒：d是双缝间距不是缝宽；λ大则Δx大，红条纹比蓝宽。"},{"step":"Step 3 衍射","time":"9分钟","content":"【PPT P3 衍射】教师：「光过单缝或圆孔会绕到几何阴影区，出中央亮纹宽、两侧渐暗的条纹——衍射。障碍物尺寸接近波长时明显。」 预设回答：「光绕开缝边出条纹，是衍射不是直线走。」 板书时机：黑板写「衍射:光绕障」。差异化提示：B班看；A班需说条件。易错点提醒：衍射是「单束光」绕障；与干涉（两束叠加）本质不同；孔越小衍射越显著。"},{"step":"Step 4 条纹区别","time":"8分钟","content":"【PPT P4 区别】教师：「干涉条纹等间距、亮度均匀；衍射条纹中央最亮最宽、向两侧递减。双缝其实也含衍射包络，但中学重点记区别。」 预设回答：「干涉等宽等亮，衍射中央宽亮两侧暗。」 板书时机：黑板写对比。差异化提示：B班记；A班需说包络。易错点提醒：双缝图样其实是「衍射调制下的干涉」，中学简化区分即可。"},{"step":"Step 5 偏振","time":"8分钟","content":"【PPT P5 偏振】教师：「两偏振片重叠旋转，透光强度随角度变（马吕斯定律）。只有横波能偏振——证明光是横波，振动方向垂直于传播方向。」 预设回答：「转偏振片光变暗，说明光是横波！」 板书时机：黑板写「偏振→横波」。差异化提示：B班看实验；A班需说横波。易错点提醒：纵波（如声波）不能偏振；偏振是横波独有的「身份证」。"},{"step":"Step 6 总结+作业","time":"6分钟","content":"【PPT P6 总结】教师：「干涉、衍射、偏振都证明光具有波动性。但光又能光电效应（粒子性）——下章学波粒二象性。三者各证明什么？」 预设回答：「干涉衍射证波动，偏振证横波。」 板书时机：板书。差异化提示：B班答；A班补粒子性。易错点提醒：转入第5章原子核与第6章波粒二象性。"}],"blackboard":"┌── 光的波动性 ──┐\n│ 干涉Δx=Lλ/d │\n│ 需相干光源  │\n│ 衍射:光绕障 │\n│ 中央宽亮    │\n│ 偏振→横波   │\n│ 证波动性    │\n└─────────────┘","exercises":"【基础作业】1. 双缝干涉条纹间距公式____。2. 光发生明显衍射的条件是障碍物尺寸与____相近。3. 偏振现象证明光是____（横波/纵波）。\n【提高作业】双缝间距d=0.2mm，屏距L=1m，用λ=500nm光，条纹间距多少？\n【参考答案——教师用】基础1：Δx=Lλ/d。基础2：波长。基础3：横波。提高：Δx=1×500×10⁻⁹/(0.2×10⁻³)=2.5×10⁻³m=2.5mm。","reflection":"✅ 亮点：双缝/单缝/偏振三实验一气呵成，统一指向波动性。\n⚠️ 需改进：B班把衍射与干涉混为一谈，需用「单束绕障vs两束叠加」区分。\n📌 下节课衔接：原子的核式结构与放射性衰变。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx3-u5-1","lessonId":"l-phy-sx3-u5-1","title":"原子核的组成 放射性 衰变","book":"选择性必修第三册","unitNumber":5,"unitTitle":"原子核","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["原子核","质子中子","α衰变","β衰变","人教版选必三Ch5","第一课时"],"textbookAnalysis":"原子核由质子（⁺, Z）和中子（⁰, N）组成，质量数A=Z+N。符号ᴬZX。放射性元素自发衰变：α衰变（放⁴₂He，Z-2 A-4）、β衰变（放⁰₋₁e，Z+1 A不变）。半衰期是统计规律，与物理化学环境无关。","overview":"【学情分析】A班：能写衰变方程、用质量数电荷数守恒、理解半衰期统计意义；B班：衰变后Z/A变化搞反、漏守恒、把半衰期当「单个原子核寿命」。共同问题：衰变方程两守恒（质量数A、电荷数Z）；α降Z2降A4，β升Z1保A；半衰期是大量原子核的统计规律，对单个无意义。","objectives":["物理观念：了解原子核组成，掌握α、β衰变规律与半衰期。","科学思维：会用质量数与电荷数守恒书写衰变方程。","科学探究：通过云室或盖革计数器观察衰变随机性。","科学态度与责任：认识放射性应用的利与害，树立安全防护意识。"],"keyPoints":"① 核=质子(Z)+中子(N)，A=Z+N，符号ᴬZX。\n② α衰变：⁴₂He，Z-2、A-4。\n③ β衰变：⁰₋₁e，Z+1、A不变。\n④ 半衰期：统计规律，与环境无关。","difficulties":"① Z/A变化。原因：α降2降4、β升1保A，易记反，需练方程。\n② 两守恒。原因：漏质量数或电荷数守恒，需每式核两路。\n③ 半衰期意义。原因：误当单核寿命，需强调统计、对大量才有意义。","teachingMethods":"① 核组成比喻。\n② 衰变方程板演。\n③ 守恒训练。\n④ 半衰期演示（模拟）。","preparation":"【PPT课件】P1 核组成；P2 符号；P3 α衰变；P4 β衰变；P5 守恒；P6 半衰期。\n【实验器材】无（动画/模拟）。\n【音频】无。","process":[{"step":"Step 1 导入——核式结构","time":"5分钟","content":"【PPT P1 组成】教师：「卢瑟福α散射发现原子中心有微小致密的核。核由质子（带正电）和中子（中性）组成，几乎集中全部质量。」 预设回答：「原子核里有质子和中子，质量大多在核里。」 板书时机：黑板写课题「原子核组成」。差异化提示：B班听；A班需说散射。易错点提醒：电子在核外；核体积极小但质量极大。"},{"step":"Step 2 符号与数","time":"9分钟","content":"【PPT P2 符号】教师：「符号ᴬZX：Z质子数=电荷数，A质量数=Z+N中子数。如²³⁸₉₂U：92质子、146中子、238质量数。」 预设回答：「左上A是质量数，左下Z是质子数。」 板书时机：黑板写「ᴬZX，A=Z+N」。差异化提示：B班记位置；A班需说中子。易错点提醒：左上质量数、左下电荷数，别写反；中子数=A-Z。"},{"step":"Step 3 α衰变","time":"9分钟","content":"【PPT P3 α衰变】教师：「α衰变放出⁴₂He核：ᴬZX→ᴬ⁻⁴Z₋₂Y+⁴₂He。Z减2、A减4。如²³⁸₉₂U→²³⁴₉₀Th+⁴₂He。」 预设回答：「α衰变冒氦核，质子减2质量减4。」 板书时机：黑板写α方程。差异化提示：B班记变化；A班需写方程。易错点提醒：α是⁴₂He（氦核）不是He原子；Z-2、A-4。"},{"step":"Step 4 β衰变","time":"8分钟","content":"【PPT P4 β衰变】教师：「β衰变放出电子⁰₋₁e（中子变质子）：ᴬZX→ᴬZ₊₁Y+⁰₋₁e。Z加1、A不变。如²³⁴₉₀Th→²³⁴₉₁Pa+⁰₋₁e。」 预设回答：「β衰变质子+1质量不变，中子变了。」 板书时机：黑板写β方程。差异化提示：B班记；A班需说来源。易错点提醒：β电子来自中子→质子+电子，非核外电子；A不变、Z+1。"},{"step":"Step 5 守恒训练","time":"8分钟","content":"【PPT P5 守恒】教师：「写衰变方程必验两守恒：质量数A左=右、电荷数Z左=右。先算子核Z、A再写符号。例：²¹⁰₈₄Poα衰变产物？」 预设回答：「²¹⁰₈₄Po→²⁰⁶₈₂Pb+⁴₂He，Pb的Z=82、A=206。」 板书时机：黑板写验算。差异化提示：B班算；A班补元素。易错点提醒：每式必核两路守恒；子核元素由Z定。"},{"step":"Step 6 半衰期","time":"6分钟","content":"【PPT P6 半衰期】教师：「半衰期：半数原子核衰变所需时间，是大量核的统计规律，与温度压强化学态无关。单个核何时衰变纯随机。」 预设回答：「半衰期是统计平均，对单个没意义。」 板书时机：黑板写「半衰期:统计」。差异化提示：B班记；A班需说随机。易错点提醒：半衰期不随环境变（非越快越衰）；下节课学结合能与核能。"}],"blackboard":"┌── 原子核与衰变 ──┐\n│ ᴬZX A=Z+N   │\n│ α:Z-2 A-4   │\n│ β:Z+1 A不变 │\n│ 两守恒:A,Z  │\n│ 半衰期:统计 │\n└──────────────┘","exercises":"【基础作业】1. 原子核符号ᴬZX中，A表示____，Z表示____。2. α衰变后电荷数____，质量数____。3. β衰变后质量数____，电荷数____。\n【提高作业】写出²²²₈₆Rn发生α衰变的方程，并注明子核元素（氡Rn，钋Po）。\n【参考答案——教师用】基础1：质量数、质子数（电荷数）。基础2：减2、减4。基础3：不变、加1。提高：²²²₈₆Rn→²¹⁸₈₄Po+⁴₂He。","reflection":"✅ 亮点：符号ᴬZX位置口诀防写反；衰变方程逐式核两守恒规范。\n⚠️ 需改进：B班把β衰变记成A变，需强调「中子转质子A不变」。\n📌 下节课衔接：核力、结合能与核反应（裂变聚变）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx3-u5-2","lessonId":"l-phy-sx3-u5-2","title":"核力 结合能 核裂变与核聚变","book":"选择性必修第三册","unitNumber":5,"unitTitle":"原子核","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学态度与责任"],"tags":["核力","结合能","质量亏损","裂变","聚变","人教版选必三Ch5","第二课时"],"textbookAnalysis":"核力：短程强相互作用，使核子结合。质量亏损Δm，结合能ΔE=Δmc²（质能方程）。重核裂变（如²³⁵U+n→碎片+中子+能）、轻核聚变（如D+T→⁴He+n+能）均释放核能。聚变清洁但需极高温（热核反应）。","overview":"【学情分析】A班：能由质能方程算释放能量、比较裂聚变特点；B班：误以为质量亏损「质量消失」、混淆E=mc²与ΔE=Δmc²、把裂变聚变方向搞反。共同问题：结合能来自质量亏损ΔE=Δmc²；亏损不是消失而是转成能量；重核裂、轻核聚放能；聚变单位质量放能更多但难点燃。","objectives":["物理观念：理解核力与结合能，掌握质能方程ΔE=Δmc²。","科学思维：能计算质量亏损对应的释放能量，比较裂变聚变。","科学探究：通过核反应方程体会能量释放的来源。","科学态度与责任：理性认识核能的机遇与安全风险，树立责任意识。"],"keyPoints":"① 核力：短程强作用， Binding。\n② 质量亏损Δm，结合能ΔE=Δmc²。\n③ 重核裂变、轻核聚变释放核能。\n④ 聚变单位质量放能更多，需高温。","difficulties":"① 质量亏损。原因：误当质量消失，需说转成能量、总质能守恒。\n② 公式。原因：混E=mc²（总能量）与ΔE=Δmc²（释放），需分清。\n③ 裂聚方向。原因：重裂轻聚易反，需记「重裂轻聚放能」。","teachingMethods":"① 结合能曲线。\n② 质能方程推导。\n③ 裂聚对比。\n④ 安全讨论。","preparation":"【PPT课件】P1 核力；P2 质量亏损；P3 质能方程；P4 裂变；P5 聚变；P6 对比与安全。\n【实验器材】无。\n【音频】无。","process":[{"step":"Step 1 导入——核力","time":"5分钟","content":"【PPT P1 核力】教师：「质子都带正电应互相排斥，核却稳固——靠核力（强相互作用）。核力极短程（约10⁻¹⁵m），只作用于相邻核子。」 预设回答：「核力把核子绑在一起，很短程很强。」 板书时机：黑板写课题「核力与核能」。差异化提示：B班听；A班需说短程。易错点提醒：核力非电磁力，是强相互作用；超出核尺度迅速消失。"},{"step":"Step 2 质量亏损","time":"9分钟","content":"【PPT P2 亏损】教师：「核的质量小于其自由核子质量和，差值Δm叫质量亏损。它不是「消失」，而是以结合能形式束缚在核里。」 预设回答：「核比散核子轻一点，差就是结合能对应的质量。」 板书时机：黑板写「Δm=Σm核子-m核」。差异化提示：B班记；A班需说束缚。易错点提醒：质量亏损≠质量消灭，是转化为束缚能；总质能守恒。"},{"step":"Step 3 质能方程","time":"9分钟","content":"【PPT P3 质能】教师：「爱因斯坦质能方程：E=mc²。释放能量ΔE=Δmc²（c=3×10⁸m/s）。1u质量对应约931.5MeV。」 预设回答：「ΔE=Δmc²，质量差乘c²就是放出的能。」 板书时机：黑板写「ΔE=Δmc²」。差异化提示：B班记式；A班需说c²。易错点提醒：E=mc²是总静能，核能释放用ΔE=Δmc²；c²极大故小质量差放巨能。"},{"step":"Step 4 裂变","time":"8分钟","content":"【PPT P4 裂变】教师：「重核分裂成中等核释放能量：²³⁵₉₂U+ⁿ→¹⁴¹₅₆Ba+⁹²₃₆Kr+3ⁿ+能。链式反应需临界体积。核电站即用此。」 预设回答：「铀235被中子轰击裂开，放能还出中子链式反应。」 板书时机：黑板写裂变方程。差异化提示：B班记；A班需说链式。易错点提醒：需中子引发且达临界质量才持续；控制棒吸收中子调速。"},{"step":"Step 5 聚变","time":"8分钟","content":"【PPT P5 聚变】教师：「轻核结合成较重核放能：²₁H+³₁H→⁴₂He+ⁿ+17.6MeV。单位质量放能比裂变更多，但需上亿度高温（热核反应），太阳即聚变。」 预设回答：「氘氚聚变成氦放能，温度极高，太阳那样。」 板书时机：黑板写聚变方程。差异化提示：B班记；A班需说温度。易错点提醒：聚变燃料（氘）丰富清洁，但点火难；目前主要用裂变发电。"},{"step":"Step 6 对比与安全+作业","time":"6分钟","content":"【PPT P6 对比】教师：「重裂轻聚都放能；聚变单位质量能量更高、废料少但难控。核能须严格安全防护（如三里岛、福岛教训）。」 预设回答：「裂变现用，聚变未来；安全至上。」 板书时机：板书对比。差异化提示：B班记；A班补安全。易错点提醒：下章波粒二象性（光电效应）。"}],"blackboard":"┌── 核力与核能 ──┐\n│ 核力:短程强 │\n│ Δm=Σm-m核   │\n│ ΔE=Δmc²     │\n│ 重裂轻聚放能 │\n│ 裂变:铀链式  │\n│ 聚变:氘氚高温│\n└──────────────┘","exercises":"【基础作业】1. 质能方程表达式____，释放能量用____。2. 释放核能的方向：重核____、轻核____。3. 1u质量约对应____MeV能量。\n【提高作业】某反应质量亏损Δm=0.003u，释放能量多少MeV？（1u≈931.5MeV）\n【参考答案——教师用】基础1：E=mc²、ΔE=Δmc²。基础2：裂变、聚变。基础3：931.5。提高：ΔE=0.003×931.5≈2.79MeV。","reflection":"✅ 亮点：质量亏损用「束缚能」解释避免「质量消失」误解；裂聚对比清晰。\n⚠️ 需改进：B班混E=mc²与ΔE=Δmc²，需红字区分总能与释放能。\n📌 下节课衔接：波粒二象性——光电效应与光子。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx3-u6-1","lessonId":"l-phy-sx3-u6-1","title":"光电效应 光子","book":"选择性必修第三册","unitNumber":6,"unitTitle":"波粒二象性","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["光电效应","光子","爱因斯坦","截止频率","人教版选必三Ch6","第一课时"],"textbookAnalysis":"光电效应：光照射金属逸出电子。实验规律：存在截止频率ν₀（低于不生电子）；光电子最大初动能与光强无关只随频率增大；瞬时性。爱因斯坦光子说：光能量E=hν，逸出功W₀，最大初动能Eₖ=hν-W₀（光电效应方程）。","overview":"【学情分析】A班：能写光电效应方程、用图像（Eₖ-ν直线）分析、理解光子说；B班：以为光强越大越易出电子（错，看频率）、漏截止频率、混初动能与光强关系。共同问题：能否出电子看频率是否≥ν₀；初动能只随频率增、与光强无关（光强只增光电子数目）；Eₖ=hν-W₀。","objectives":["物理观念：理解光电效应规律，掌握光子说与光电效应方程。","科学思维：会应用Eₖ=hν-W₀分析截止频率与初动能。","科学探究：通过光电管实验观察截止频率与光强的影响。","科学态度与责任：体会爱因斯坦突破波动说框架的创新精神。"],"keyPoints":"① 规律：有截止频率ν₀；Eₖ只随ν增；瞬时。\n② 光子说：E=hν（h普朗克常量）。\n③ 方程：Eₖ=hν-W₀。\n④ ν\x3cν₀不出电子（与光强无关）。","difficulties":"① 频率决定出否。原因：B班以为光强够就出，需强调看ν₀。\n② 初动能vs光强。原因：初动能只随频率，光强只改数目，需辨析。\n③ 方程含义。原因：hν是光子能量，W₀是逸出功，需分项。","teachingMethods":"① 光电管实验。\n② 规律归纳。\n③ 光子说引入。\n④ 方程与图像。","preparation":"【PPT课件】P1 光电效应；P2 实验规律；P3 截止频率；P4 光子说；P5 方程；P6 图像。\n【实验器材】光电管演示装置（或动画）。\n【音频】无。","process":[{"step":"Step 1 导入——光电效应","time":"5分钟","content":"【PPT P1 现象】教师：「紫外光照射锌板连验电器，电子逸出带正电——光电效应。光竟能把电子「打」出来， challenging 经典波动说。」 预设回答：「光照射金属跑出电子，是光电效应。」 板书时机：黑板写课题「光电效应」。差异化提示：B班看现象；A班需说挑战。易错点提醒：是「光照射金属逸出电子」，跑出的是电子（光电子）。"},{"step":"Step 2 实验规律","time":"9分钟","content":"【PPT P2 规律】教师：「三规律：①存在截止频率ν₀，低于它再强光也不出电子；②光电子最大初动能只随频率增大，与光强无关；③照射即出，瞬时响应。」 预设回答：「看频率不看光强；初动能随频率增；瞬间发生。」 板书时机：黑板写三条。差异化提示：B班记；A班需说矛盾点。易错点提醒：经典波动说预言「光强够就出」被实验否，这是关键。"},{"step":"Step 3 截止频率","time":"9分钟","content":"【PPT P3 截止】教师：「每种金属有截止频率ν₀（红限）。ν\x3cν₀时，单个光子能量hν\x3c逸出功W₀，电子吸不够能量出不来——与光强无关！」 预设回答：「频率不够，一个光子能量太小，光再强也不行。」 板书时机：黑板写「ν₀=W₀/h」。差异化提示：B班重点；A班需说单光子。易错点提醒：光强只增光子数，不增单个光子能量；出否只由ν定。"},{"step":"Step 4 光子说","time":"8分钟","content":"【PPT P4 光子】教师：「爱因斯坦：光能量不连续，一份叫光子，E=hν（h=6.63×10⁻³⁴J·s）。光强=光子数×每份能量。这解释了频率决定一切。」 预设回答：「光是一份份光子，能量hν，频率定每份大小。」 板书时机：黑板写「E=hν」。差异化提示：B班记式；A班需说不连续。易错点提醒：h是普朗克常量极小；光子能量由频率定，与光强无关。"},{"step":"Step 5 光电方程","time":"8分钟","content":"【PPT P5 方程】教师：「光子能量hν一部分克服逸出功W₀，余下为最大初动能：Eₖ=hν-W₀。ν=ν₀时Eₖ=0。这是能量守恒。」 预设回答：「Eₖ=hν-W₀，刚好截止时动能为零。」 板书时机：黑板写方程。差异化提示：B班记；A班需说守恒。易错点提醒：Eₖ是「最大」初动能；W₀是金属属性；方程即能量守恒。"},{"step":"Step 6 图像+作业","time":"6分钟","content":"【PPT P6 图像】教师：「Eₖ-ν图是直线，斜率=h，横截距=ν₀。频率越高动能越大；光强只改图上的点密度（电子数）。」 预设回答：「直线斜率h，截距是红限ν₀。」 板书时机：板书。差异化提示：B班画；A班补意义。易错点提醒：下节课学物质的波粒二象性（德布罗意波）。"}],"blackboard":"┌── 光电效应 ──┐\n│ 有截止ν₀    │\n│ Eₖ随ν增     │\n│ 与光强无关  │\n│ E=hν       │\n│ Eₖ=hν-W₀   │\n│ ν₀=W₀/h    │\n└────────────┘","exercises":"【基础作业】1. 光电效应中决定能否逸出电子的是光的____（频率/强度）。2. 光子能量公式____。3. 光电效应方程____。\n【提高作业】某金属逸出功W₀=2.0eV，用λ=300nm光照射能否出电子？（h c/λ，hc≈1240eV·nm）\n【参考答案——教师用】基础1：频率。基础2：E=hν。基础3：Eₖ=hν-W₀。提高：光子能量E=hc/λ=1240/300≈4.13eV>W₀=2.0eV，故能逸出，Eₖ≈2.13eV。","reflection":"✅ 亮点：经典波动说预言与实验矛盾的冲突点，凸显光子说必要性。\n⚠️ 需改进：B班顽固认为「光强够就出电子」，需用ν₀红限反复正误。\n📌 下节课衔接：物质波（德布罗意波）与波粒二象性。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-phy-sx3-u6-2","lessonId":"l-phy-sx3-u6-2","title":"物质的波粒二象性（德布罗意波）","book":"选择性必修第三册","unitNumber":6,"unitTitle":"波粒二象性","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"物理","coreLiteracy":["物理观念","科学思维"],"tags":["德布罗意波","物质波","波粒二象性","电子衍射","人教版选必三Ch6","第二课时"],"textbookAnalysis":"德布罗意假设：实物粒子也具有波动性，波长λ=h/p（p动量）。光有波粒二象性，实物粒子（电子等）同样有。电子衍射实验证实了物质波。宏观物体波长极短，波动性不显；微观粒子波长显著，呈现波动性。","overview":"【学情分析】A班：能由λ=h/p计算物质波波长、理解电子衍射证实物质波、统揽光与实物的波粒二象性；B班：以为只有光才有波粒二象性、算波长时p用错（p=mv或相对论）、不理会对宏观为何不可见。共同问题：一切物质都有波粒二象性；λ=h/p，p为动量；质量越大速度越高波长越短越难观测；电子衍射是铁证。","objectives":["物理观念：理解德布罗意物质波假设，认识一切物质具波粒二象性。","科学思维：会用λ=h/p计算物质波波长，分析宏观不可见原因。","科学探究：通过电子衍射实验（或晶体衍射图）验证物质波。","科学态度与责任：体会对称性思想（光有、物质也该有）的科学美学。"],"keyPoints":"① 德布罗意：实物粒子也有波动性。\n② λ=h/p（p动量）。\n③ 电子衍射证实物质波。\n④ 宏观λ极小，波动不显；微观显著。","difficulties":"① 普适性。原因：以为仅光有二象性，需强调「一切物质」。\n② 波长计算。原因：p用错（应mv，高速用相对论），单位乱，需练。\n③ 宏观不可见。原因：不明λ=h/p随m、v减小，需数量级估算。","teachingMethods":"① 对称性引入。\n② 物质波公式。\n③ 电子衍射视频。\n④ 数量级估算。","preparation":"【PPT课件】P1 对称性；P2 德布罗意；P3 公式；P4 电子衍射；P5 数量级；P6 总结。\n【实验器材】无（电子衍射动画/图）。\n【音频】无。","process":[{"step":"Step 1 导入——对称性","time":"5分钟","content":"【PPT P1 对称】教师：「光既有波动性又有粒子性。德布罗意大胆猜想：既然光有二象性，实物粒子（电子、质子甚至你）也该有波动性——对称之美。」 预设回答：「光有波粒二象性，物质可能也有。」 板书时机：黑板写课题「物质波」。差异化提示：B班听；A班需说对称。易错点提醒：不是「光特殊」，而是普遍规律；实物粒子同样二象性。"},{"step":"Step 2 德布罗意假设","time":"9分钟","content":"【PPT P2 假设】教师：「德布罗意关系：实物粒子波长λ=h/p，频率ν=E/h（E能量、p动量）。与光子形式一致，把波和粒子用h连起来。」 预设回答：「物质波长λ=h/p，和光子公式一样对称。」 板书时机：黑板写「λ=h/p」。差异化提示：B班记式；A班需说E=hν。易错点提醒：λ=h/p中p是动量；与光子E=hν、p=h/λ同源，统一由h联系。"},{"step":"Step 3 波长计算","time":"9分钟","content":"【PPT P3 计算】教师：「例：电子经100V加速，p=√(2mE)≈5.4×10⁻²⁴kg·m/s，λ=h/p≈1.2×10⁻¹⁰m——与原子间距同量级，故能衍射！」 预设回答：「电子波长约10⁻¹⁰m，和晶格相当能衍射。」 板书时机：黑板写算例。差异化提示：B班算；A班补相对论否。易错点提醒：非相对论p=√(2mK)；高速才用相对论；单位统一SI。"},{"step":"Step 4 电子衍射","time":"8分钟","content":"【PPT P4 衍射】教师：「电子束打晶体出衍射图样（戴维逊-革末实验），与X射线衍射相似——直接证实电子波动性。电子显微镜即利用短波长高分辨。」 预设回答：「电子过晶体出衍射环，证明它是波！」 板书时机：黑板写「电子衍射证实」。差异化提示：B班看；A班需说应用。易错点提醒：是「衍射图样」作证波动性，非单个电子轨迹；电子显微镜靠短波长看更小。"},{"step":"Step 5 宏观不可见","time":"8分钟","content":"【PPT P5 数量级】教师：「估算你走路λ=h/(mv)≈10⁻³⁶m，远小于任何尺度，故宏观物体波动完全不可见，表现为纯粒子性。质量速度越大波长越短。」 预设回答：「人波长小到没有，所以看不到波动，像粒子。」 板书时机：黑板写「m大v大→λ小」。差异化提示：B班算；A班补因果。易错点提醒：波粒二象性对宏观仍成立，只是波动性可忽略；不是「没有」是「测不出」。"},{"step":"Step 6 总结+作业","time":"6分钟","content":"【PPT P6 总结】教师：「光和实物都具波粒二象性：λ=h/p、E=hν。这是量子论基石。回顾全套物理：从运动学到原子，我们看到了世界的层次。」 预设回答：「一切物质波粒二象，h是桥梁。」 板书时机：板书。差异化提示：B班答；A班补全册。易错点提醒：全套物理教案至此完结，进入复习与综合。"}],"blackboard":"┌── 波粒二象性 ──┐\n│ 一切物质都有│\n│ λ=h/p      │\n│ ν=E/h      │\n│ 电子衍射证  │\n│ m大v大λ小  │\n│ 波动不可见  │\n└─────────────┘","exercises":"【基础作业】1. 德布罗意波长公式____。2. 证实电子波动性的实验是____。3. 宏观物体波动性不可见是因为其物质波波长____（填极长/极短）。\n【提高作业】质量m=0.01kg的子弹以v=300m/s飞行，求其物质波波长（h=6.63×10⁻³⁴J·s）。\n【参考答案——教师用】基础1：λ=h/p。基础2：电子衍射（戴维逊-革末实验）。基础3：极短。提高：p=mv=3kg·m/s，λ=h/p=6.63×10⁻³⁴/3≈2.2×10⁻³⁴m，远小于任何尺度，完全不可观测。","reflection":"✅ 亮点：对称性引入自然；电子衍射视频把抽象物质波坐实；数量级估算解「宏观为何不可见」。\n⚠️ 需改进：B班以为仅光有二象性，需用「一切物质」反复强调。\n📌 下节课衔接：全套物理复习与综合练习（选必三完结，进入总复习）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"}];

  document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('on', t.dataset.tab === tab); });
  setNav(SUBJECT + '教案库', false);
  const bar = document.querySelector('.dlbar');
  if (bar) bar.remove();
  render();
}

function goBack() {
  if (state.detailId) state.detailId = null;
  else if (state.privacy) state.privacy = false;
  render();
}

function openDetail(id) {
  state.detailId = id;
  if (state.recents.indexOf(id) < 0) {
    state.recents.unshift(id);
    if (state.recents.length > 50) state.recents.pop();
  }
  render();
}

function toggleFav(id) {
  const i = state.favorites.indexOf(id);
  if (i >= 0) {
    state.favorites.splice(i, 1);
    toast('已取消收藏');
  } else {
    state.favorites.unshift(id);
    toast('★ 已收藏');
  }
  render();
}

// ===== 渲染入口 =====
function render() {
  const tab = state.tab;
  if (state.detailId) { renderDetail(); return; }
  if (state.privacy) { renderPrivacy(); return; }
  if (tab === 'index') renderIndex();
  else if (tab === 'favorites') renderFavorites();
  else if (tab === 'profile') renderProfile();
}

// ===== 教案库页面（册 → 单元 → 板块，按书本顺序）=====
function renderIndex() {
  setNav(SUBJECT + '教案库', false);
  let list = LESSONS.slice();
  if (state.filterBook) list = list.filter(function(l){ return l.book === state.filterBook; });
  if (state.keyword.trim()) {
    const kw = state.keyword.trim().toLowerCase();
    list = list.filter(function(l) {
      const hay = (l.title + ' ' + l.unitTitle + ' ' + (l.tags || []).join(' ') + ' ' + (l.overview || '') + ' ' +
        (l.keyPoints || '') + ' ' + (l.difficulties || '') + ' ' + (l.preparation || '') + ' ' +
        (l.objectives || []).join(' ') + ' ' + (l.process || []).map(function(s){ return s.step + ' ' + s.content; }).join(' ') + ' ' +
        (l.exercises || '') + ' ' + (l.reflection || '') + ' ' + (l.blackboard || '')).toLowerCase();
      return hay.indexOf(kw) !== -1;
    });
  }

  list = list.slice().sort(function(a, b) {
    return ((BOOK_ORDER[a.book] || 0) - (BOOK_ORDER[b.book] || 0)) ||
      (a.unitNumber - b.unitNumber) ||
      ((a.periodNumber || 0) - (b.periodNumber || 0));
  });

  // 按 册+单元 分组（"全部"时 unitNumber 跨册重复，必须用册区分）
  const map = {};
  list.forEach(function(l) {
    const key = l.book + '|' + l.unitNumber;
    if (!map[key]) map[key] = { key: key, book: l.book, bookShort: BOOK_SHORT[l.book] || l.book, unitNumber: l.unitNumber, unitTitle: l.unitTitle, lessons: [] };
    map[key].lessons.push(l);
  });
  const groups = Object.keys(map).map(function(k){ return map[k]; }).sort(function(a, b) {
    return ((BOOK_ORDER[a.book] || 0) - (BOOK_ORDER[b.book] || 0)) || (a.unitNumber - b.unitNumber);
  });

  const TYPE_ICON = { jingdu:'📖', qunwen:'🔗', xiezuo:'✍️', huodong:'🎯', fangfa:'🛠', new:'🆕', exercise:'✏️', review:'🔁', comprehensive:'🌟', reading:'📖', grammar:'✏️', listening:'🎧', speaking:'💬', writing:'✍️', project:'🎯' };
  const TYPE_BG = { jingdu:'#1a365d', qunwen:'#6b46c1', xiezuo:'#7b341e', huodong:'#2c5282', fangfa:'#1a6840', new:'#b7791f', exercise:'#2a4a7d', review:'#553c9a', comprehensive:'#0f766e', reading:'#1a365d', grammar:'#1a6840', listening:'#6b46c1', speaking:'#b7791f', writing:'#7b341e', project:'#2c5282' };

  const bookChips = '<div class="chip ' + (state.filterBook ? '' : 'on') + '" onclick="setBook(&quot;&quot;)">全部</div>' +
    BOOKS.map(function(b) {
      return '<div class="chip ' + (state.filterBook === b ? 'on' : '') + '" onclick="setBook(&quot;' + escAttr(b) + '&quot;)">' + escAttr(b) + '</div>';
    }).join('');

  const groupHtml = groups.map(function(g) {
    const cards = g.lessons.map(function(l) {
      const fav = state.favorites.indexOf(l.id) >= 0;
      const ico = TYPE_ICON[l.lessonType] || '📄';
      const bg = TYPE_BG[l.lessonType] || '#555';
      const star = fav ? '<div style="color:#e6a23c;font-size:20px">★</div>' : '';
      return '<div class="card" onclick="openDetail(&quot;' + escAttr(l.id) + '&quot;)">' +
        '<div class="row1">' +
          '<div class="docico" style="background:linear-gradient(135deg,' + bg + ',' + bg + 'dd)">' + ico + '</div>' +
          '<div style="flex:1">' +
            '<div class="ttl">' + escAttr(l.title) + '</div>' +
            '<div class="sub">' + escAttr(l.lessonTypeName) + ' · ' + l.duration + '分钟</div>' +
          '</div>' +
          star +
          '<div class="card-arrow">›</div>' +
        '</div>' +
      '</div>';
    }).join('');

    return '<div class="unit-group">' +
      '<div class="unit-head"><span class="unit-no">' + escAttr(g.bookShort) + ' · Unit ' + g.unitNumber + '</span><span class="unit-name">' + escAttr(g.unitTitle) + '</span></div>' +
      cards +
    '</div>';
  }).join('');

  const histHtml = (!state.keyword.trim() && state.history.length)
    ? '<div class="chips">' + state.history.map(function(h){ return '<div class="chip" onclick="onPrevHistory(&quot;' + escAttr(h) + '&quot;)">' + escAttr(h) + '</div>'; }).join('') + '</div>'
    : '';
  const searchVal = escAttr(state.keyword);
  $('content').innerHTML =
    '<div class="search">🔍 <input class="sin" placeholder="搜索教案/单元/关键词" value="' + searchVal + '" onchange="onPrevSearch(this.value)"> ' + (state.keyword ? '<span class="searchx" onclick="onPrevClear()">✕</span>' : '') + '</div>' +
    histHtml +
    '<div class="chips">' + bookChips + '</div>' +
    (groupHtml || '<div class="empty"><div class="e">📭</div><div class="t">没有匹配的教案</div><div class="p">换个关键词或筛选条件试试</div></div>');
}

function setBook(b) { state.filterBook = b; renderIndex(); }
function onPrevSearch(kw) {
  state.keyword = kw;
  const t = kw.trim();
  if (t && state.history[0] !== t) {
    state.history = [t].concat(state.history.filter(function(x){ return x !== t; })).slice(0, 10);
  }
  renderIndex();
}
function onPrevHistory(h) { state.keyword = h; renderIndex(); }
function onPrevClear() { state.keyword = ''; renderIndex(); }

// ===== 收藏页面 =====
function renderFavorites() {
  setNav('我的收藏', false);
  let cards = '';
  state.favorites.forEach(function(id) {
    const l = getLesson(id);
    if (!l) return;
    cards += '<div class="card" onclick="openDetail(&quot;' + escAttr(l.id) + '&quot;)">' +
      '<div class="row1"><div class="docico">📄</div>' +
      '<div style="flex:1"><div class="ttl">' + escAttr(l.title) + '</div><div class="sub">' + escAttr(l.book) + ' · ' + escAttr(l.unitTitle) + ' · ' + escAttr(l.lessonTypeName) + '</div></div>' +
      '<div style="color:#c0392b;font-size:22px;cursor:pointer" onclick="event.stopPropagation();toggleFav(&quot;' + escAttr(l.id) + '&quot;)">✕</div>' +
      '</div></div>';
  });
  $('content').innerHTML =
    '<div class="glabel"><span>已收藏 ' + state.favorites.length + ' 篇</span>' + (state.favorites.length ? '<span class="clr" onclick="clearAll(&quot;fav&quot;)">清空</span>' : '') + '</div>' +
    (cards || '<div class="empty"><div class="e">★</div><div class="t">还没有收藏</div><div class="p">在教案详情页点 ☆ 即可收藏</div></div>');
}

// ===== 我的页面 =====
function renderProfile() {
  setNav('我的', false);
  const p = state.profile;
  let dl = '';
  state.downloads.forEach(function(id) {
    const l = getLesson(id); if (!l) return;
    dl += '<div class="favitem" onclick="openDetail(&quot;' + escAttr(l.id) + '&quot;)"><div class="fi">📄</div><div class="ft">' + escAttr(l.title) + '</div></div>';
  });
  let rl = '';
  state.recents.forEach(function(id) {
    const l = getLesson(id); if (!l) return;
    rl += '<div class="favitem" onclick="openDetail(&quot;' + escAttr(l.id) + '&quot;)"><div class="fi">📄</div><div class="ft">' + escAttr(l.title) + '</div></div>';
  });
  let html = '';
  html += '<div class="phead"><div class="pavatar">' + (p.avatarUrl ? '<img src="' + escAttr(p.avatarUrl) + '">' : '👤') + '</div><div><div class="pname">' + escAttr(p.nickName) + '</div><div class="psub">微信用户 · 云端已同步</div></div></div>';
  html += '<div class="stats3"><div class="stat"><div class="num">' + state.favorites.length + '</div><div class="lbl">收藏</div></div><div class="stat"><div class="num">' + state.downloads.length + '</div><div class="lbl">下载</div></div><div class="stat"><div class="num">' + state.recents.length + '</div><div class="lbl">最近</div></div></div>';
  html += '<div class="block"><h3>📥 下载记录 <span class="clear" onclick="clearAll(&quot;dl&quot;)">清空</span></h3>' + (dl || '<div class="hint">暂无下载记录</div>') + '</div>';
  html += '<div class="block"><h3>🕑 浏览历史 <span class="clear" onclick="clearAll(&quot;rc&quot;)">清空</span></h3>' + (rl || '<div class="hint">暂无浏览历史</div>') + '</div>';
  html += '<div class="block"><h3>⚙ 设置</h3><div class="favitem" onclick="showPrivacy()"><div class="fi">🔒</div><div class="ft">隐私保护说明</div></div><div class="favitem" onclick="clearAll(&quot;all&quot;)"><div class="fi">🗑</div><div class="ft">清空全部本地数据</div></div></div>';
  html += '<div class="hint">此预览版数据仅存于当前页面，刷新即丢失。真机数据存储于微信云开发。</div>';
  $('content').innerHTML = html;
}

// ===== 隐私说明页 =====
function showPrivacy() { state.privacy = true; render(); }

function renderPrivacy() {
  setNav('隐私保护说明', true);
  const blocks = [
    { h: '我们收集哪些信息', p: [ '· 昵称、头像：你主动设置，用于「我的」页身份展示。', '· 收藏 / 下载记录 / 浏览历史：使用教案库时产生的操作记录，用于多设备同步与个性化展示。', '· 错误日志：应用崩溃时的堆栈摘要，仅用于修复问题，不含任何教学内容。' ] },
    { h: '信息存储在哪里', p: [ '所有数据默认存储于微信云开发（腾讯云）或本机缓存。我们不自建服务器，不向任何第三方出售或共享你的个人信息。' ] },
    { h: '你有哪些权利', p: [ '· 可随时在「我的」页清空下载记录、浏览历史或收藏。', '· 可一键清空全部个人数据。', '· 可在微信「设置 › 隐私 › 授权管理」中撤回本小程序的信息授权。' ] },
    { h: '联系方式', p: [ '如对本说明有疑问，可通过小程序内反馈渠道联系开发者。' ] }
  ];
  let html = '<div class="hint" style="text-align:left;padding:4px 2px 10px">最后更新：2026-07</div>';
  blocks.forEach(function(b) {
    html += '<div class="block"><h3>' + b.h + '</h3>' + b.p.map(function(x){ return '<p class="rp">' + escAttr(x) + '</p>'; }).join('') + '</div>';
  });
  html += '<div class="tip">本说明依据《中华人民共和国个人信息保护法》及微信平台隐私规范编写。</div>';
  $('content').innerHTML = html;
}

// ===== 详情页 =====
function renderDetail() {
  const l = getLesson(state.detailId);
  if (!l) { state.detailId = null; render(); return; }
  setNav((l.lessonTypeName || '教案详情'), true);

  const CN = ['一', '二', '三', '四', '五', '六', '七', '八', '九', '十', '十一', '十二'];
  const secs = [];
  let si = 0;
  const add = function(name, payload) { if (payload) { si++; secs.push(Object.assign({ no: CN[si - 1], name: name, key: name }, payload)); } };
  add('教材分析', l.textbookAnalysis && { body: l.textbookAnalysis });
  add('学情分析', l.overview && { body: l.overview });
  add('教学目标', l.objectives && l.objectives.length && { list: l.objectives });
  add('教学重点', l.keyPoints && { body: l.keyPoints });
  add('教学难点', l.difficulties && { body: l.difficulties });
  add('教学方法', l.teachingMethods && { body: l.teachingMethods });
  add('课前准备', l.preparation && { body: l.preparation });
  add('教学过程', l.process && l.process.length && { steps: l.process.map(function(s, i){ return { n: i + 1, name: s.step || s.name || ('步骤' + (i + 1)), time: s.time || '', content: s.content || '' }; }) });
  add('板书设计', l.blackboard && { body: l.blackboard });
  add('课后练习', l.exercises && { body: l.exercises });
  add('教学反思', l.reflection && { body: l.reflection });

  let secHtml = '';
  secs.forEach(function(sec) {
    if (sec.list) {
      secHtml += '<div class="sec"><h3><span class="sno">' + sec.no + '</span>' + sec.name + '<span class="scopy" onclick="copySection(&quot;' + escAttr(sec.key) + '&quot;)">复制</span></h3><ul>' + sec.list.map(function(x){ return '<li>' + escAttr(x) + '</li>'; }).join('') + '</ul></div>';
    } else if (sec.steps) {
      let stepsHtml = '';
      sec.steps.forEach(function(s) {
        stepsHtml += '<div class="step"><div class="sn"><span class="sno sm">' + s.n + '</span>' + escAttr(s.name) + '<span class="st">' + escAttr(s.time) + '</span></div><p>' + escAttr(s.content) + '</p></div>';
      });
      secHtml += '<div class="sec"><h3><span class="sno">' + sec.no + '</span>' + sec.name + '<span class="scopy" onclick="copySection(&quot;' + escAttr(sec.key) + '&quot;)">复制</span></h3>' + stepsHtml + '</div>';
    } else {
      secHtml += '<div class="sec"><h3><span class="sno">' + sec.no + '</span>' + sec.name + '<span class="scopy" onclick="copySection(&quot;' + escAttr(sec.key) + '&quot;)">复制</span></h3><p>' + escAttr(sec.body) + '</p></div>';
    }
  });

  const fav = state.favorites.indexOf(l.id) >= 0;
  const fid = escAttr(l.id);

  let html = '';
  html += '<div class="hero">';
  html += '  <div class="badges2"><span class="badge2">' + escAttr(l.book) + '</span><span class="badge2">' + escAttr(l.lessonTypeName) + '</span><span class="badge2">' + l.duration + '分钟</span></div>';
  html += '  <h1>' + escAttr(l.title) + '</h1>';
  html += '  <div class="hsub">' + escAttr(l.unitTitle) + '</div>';
  html += '  <div class="hstat">浏览 ' + (l.viewCount || 0) + ' · 下载 ' + (l.downloadCount || 0) + '</div>';
  html += '</div>';
  html += secHtml;
  html += '<div class="hint" style="margin-top:8px">— 以下为小程序下载栏，预览中点击会提示效果 —</div><div style="height:70px"></div>';

  $('content').innerHTML = html;

  let bar = document.querySelector('.dlbar');
  if (bar) bar.remove();
  bar = document.createElement('div');
  bar.className = 'dlbar';
  bar.innerHTML =
    '<span class="fav" onclick="toggleFav(&quot;' + fid + '&quot;)">' + (fav ? '★' : '☆') + '</span>' +
    '<div class="fmts">' +
      '<span class="fmt ' + (state.favFmt === 'word' ? 'on' : '') + '" onclick="setFmt(&quot;word&quot;)">Word</span>' +
      '<span class="fmt ' + (state.favFmt === 'pdf' ? 'on' : '') + '" onclick="setFmt(&quot;pdf&quot;)">PDF</span>' +
      '<span class="fmt ' + (state.favFmt === 'ppt' ? 'on' : '') + '" onclick="setFmt(&quot;ppt&quot;)">PPT</span>' +
    '</div>' +
    '<div class="btn" onclick="doDownload(&quot;' + fid + '&quot;)">⬇ 下载 ' + state.favFmt.toUpperCase() + '</div>';
  $('content').appendChild(bar);
}

function setFmt(f) { state.favFmt = f; renderDetail(); }
function copySection(key) { toast('已复制本节（预览版）'); }

function doDownload(id) {
  const l = getLesson(id);
  if (l && state.downloads.indexOf(id) < 0) state.downloads.unshift(id);
  toast('已生成 ' + state.favFmt.toUpperCase() + '（预览：实际会在微信中打开文件）');
  renderDetail();
}

// ===== 清空操作 =====
function clearAll(kind) {
  if (kind === 'fav') { state.favorites = []; toast('已清空收藏'); }
  else if (kind === 'dl') { state.downloads = []; toast('已清空下载'); }
  else if (kind === 'rc') { state.recents = []; toast('已清空浏览'); }
  else if (kind === 'all') { state.favorites = []; state.downloads = []; state.recents = []; toast('已清空全部'); }
  render();
}

// ===== 初始化演示数据 & 首次渲染 =====
$('backBtn').addEventListener('click', goBack);
state.downloads = LESSONS.slice(0, 2).map(function(l){ return l.id; });
state.recents = LESSONS.slice(0, 3).map(function(l){ return l.id; });
state.favorites = LESSONS.slice(0, 1).map(function(l){ return l.id; });
render();
</script>
</body>
</html>
