向量夹角不一定是二面角本身。」 板书时机：黑板写关系。差异化提示：B班看模型；A班说原理。易错点提醒：二面角范围[0,π]，可能钝角，不能直接取绝对值。"},{"step":"Step 2 公式","time":"9分钟","content":"【PPT P2 公式】教师：「cosθ=(n⃗·m⃗)/(|n⃗||m⃗|)，算得的是法向量夹角余弦。」 预设回答：「先算法向量夹角。」 板书时机：黑板写公式。差异化提示：B班套；A班说步骤。易错点提醒：公式给出法向量夹角，需再判断与二面角关系。"},{"step":"Step 3 同侧异侧","time":"9分钟","content":"【PPT P3 同异侧】教师：「两法向量都指向二面角内部（或都外部）⇒相等；一内一外⇒互补。」 预设回答：「看指向同侧还是异侧。」 板书时机：黑板画两种。差异化提示：B班看图；A班说判断。易错点提醒：指向判断靠画图观察，不能想当然。"},{"step":"Step 4 判断方法","time":"8分钟","content":"【PPT P4 判断】教师：「也可在棱上取点，分别在两半平面取向量，看它们与法向量的关系辅助判断。」 预设回答：「多一种判断更稳。」 板书时机：黑板写备选。差异化提示：B班记；A班加验证。易错点提醒：两种方法互相印证，避免符号错。"},{"step":"Step 5 例题","time":"9分钟","content":"【PPT P5 例题】教师：「在几何体建系，求一个钝二面角，重点演示如何判定取补角。」 预设回答：「算完还要看图形定符号。」 板书时机：黑板完整解。差异化提示：B班跟；A班加变式。易错点提醒：算得锐角但图显示钝角时取补角π-θ。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「求给定二面角大小并说明取原角还是补角。」 预设回答：「建系、求法向、判断。」 板书时机：板书。差异化提示：B班练；A班加证明。易错点提醒：下节课学空间距离。"}],"blackboard":"┌── 二面角向量法 ──┐\n│ cosθ=(n⃗·m⃗)/  │\n│  (|n⃗||m⃗|)   │\n│ =法向量夹角   │\n│ 或补角       │\n│ 同侧⇒相等    │\n│ 异侧⇒互补    │\n│ 范围[0,π]    │\n└────────────────┘","exercises":"【基础作业】1. 二面角范围____。2. 两法向量异侧时二面角取____。\n【提高作业】求正方体中相邻两面所成二面角的大小（用法向量）。\n【参考答案——教师用】基础1：[0,π]。基础2：补角。提高：两邻面法向量互相垂直，法向量夹角90°，二面角即90°。","reflection":"✅ 亮点：同侧/异侧指向判断法直观，破解补角难题。\n⚠️ 需改进：B班习惯直接取锐角，需强调看图形定钝锐。\n📌 下节课衔接：空间距离的向量求法。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx1-u1-10","lessonId":"l-math-sx1-u1-10","title":"空间距离的向量求法","book":"选择性必修第一册","unitNumber":1,"unitTitle":"空间向量与立体几何","lessonType":"new","lessonTypeName":"新授课","periodNumber":10,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","直观想象"],"tags":["点面距","线面距","向量法","投影","人教A选必一Ch1","第十课时"],"textbookAnalysis":"点面距：点P到平面α距离d=|AP⃗·n⃗0|，其中A为面内一点、n⃗0为单位法向量。线面距、面面距可转化为点面距。重点是点面距公式与投影法。本章复习与综合应用。","overview":"【学情分析】A班：能推导点面距并推广到线面、面面距；B班：单位法向量易忘归一化，直接代未单位化的n⃗导致错。共同问题：距离公式需单位法向量或除以|n⃗|，学生常漏除模。","objectives":["数学运算：用向量法求点面距离。","直观想象：理解距离是向量在单位法向上的投影长度。","数学运算：把线面距、面面距转化为点面距。","逻辑推理：归纳空间距离的统一向量算法。"],"keyPoints":"① 点面距：d=|AP⃗·n⃗0|，A∈面，n⃗0为单位法向量。\n② 等价式：d=|AP⃗·n⃗|/|n⃗|。\n③ 线面距=线上任一点到面距。\n④ 面面距=一面上任一点到另一面距。\n⑤ 本质是投影长度。","difficulties":"① 单位法向量。原因：必须除以|n⃗|归一化，易漏，需强调。\n② 取面内点。原因：A必须是平面内点，取错则错。\n③ 距离非负。原因：结果取绝对值，易忘。","teachingMethods":"① 投影几何演示。\n② 公式推导。\n③ 距离转化训练。\n④ 错例辨析。","preparation":"【PPT课件】P1 点面距；P2 公式；P3 归一化；P4 线面/面面距；P5 综合；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——距离是投影","time":"5分钟","content":"【PPT P1 点面距】教师：「点到平面的距离，就是连线向量在平面单位法向量上的投影长度。」 预设回答：「投影长度就是距离！」 板书时机：黑板写思路。差异化提示：B班看模型；A班说投影。易错点提醒：距离是投影的绝对值，非负。"},{"step":"Step 2 公式","time":"9分钟","content":"【PPT P2 公式】教师：「d=|AP⃗·n⃗0|（A在面内，n⃗0单位法向）；等价d=|AP⃗·n⃗|/|n⃗|。」 预设回答：「点积除以法向量模。」 板书时机：黑板写两式。差异化提示：B班套；A班推导。易错点提醒：法向量必须单位化或除以其模，否则量纲错。"},{"step":"Step 3 归一化","time":"8分钟","content":"【PPT P3 归一化】教师：「若n⃗未单位化，先算n⃗0=n⃗/|n⃗|，再代公式；或直接用d=|AP⃗·n⃗|/|n⃗|。」 预设回答：「先除模再点积。」 板书时机：黑板算例。差异化提示：B班练；A班说两种。易错点提醒：忘记除以|n⃗|是最常见的错误。"},{"step":"Step 4 线面/面面距","time":"9分钟","content":"【PPT P4 转化】教师：「线面距=线上任一点到面距；面面距=一面上任一点到另一面距，统一归为点面距。」 预设回答：「都转成点面距来算。」 板书时机：黑板写转化。差异化提示：B班记；A班加证明。易错点提醒：取点要在对应图形上（线上/面上）。"},{"step":"Step 5 综合","time":"9分钟","content":"【PPT P5 综合】教师：「在几何体建系，求点面距、线面距各一例，串起本章向量法。」 预设回答：「建系→法向→投影。」 板书时机：黑板完整解。差异化提示：B班跟；A班综合提速。易错点提醒：本章向量法：建系、求向、套公式。"},{"step":"Step 6 小结+作业","time":"5分钟","content":"【PPT P6 小结】教师：「空间向量法全章：平行垂直→角→距离，统一为建系求向量。本章结束。」 预设回答：「建系求向量一套通吃！」 板书时机：板书知识树。差异化提示：B班背流程；A班说思想。易错点提醒：下一册进入直线与圆方程。"}],"blackboard":"┌── 空间距离向量法 ──┐\n│ 点面距:       │\n│ d=|AP⃗·n⃗0|   │\n│ 或=|AP⃗·n⃗|/  │\n│  |n⃗|        │\n│ 线面/面面距=  │\n│  转化点面距   │\n│ 别忘除模!     │\n└────────────────┘","exercises":"【基础作业】1. 点面距公式d=____。2. 法向量需____（单位化/任意）。\n【提高作业】点P(1,1,1)到平面x+y+z=0的距离。\n【参考答案——教师用】基础1：|AP⃗·n⃗|/|n⃗|。基础2：单位化（或除以模）。提高：取法n⃗=(1,1,1)，A取原点，AP⃗=(1,1,1)，d=|3|/√3=√3。","reflection":"✅ 亮点：投影视角统一所有距离，学生形成整体框架。\n⚠️ 需改进：B班漏除|n⃗|仍高频，需红字「别忘除模」。\n📌 下节课衔接：进入选择性必修第二册直线与圆方程。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx2-u1-1","lessonId":"l-math-sx2-u1-1","title":"倾斜角与斜率","book":"选择性必修第二册","unitNumber":1,"unitTitle":"直线和圆的方程","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["直观想象","数学运算"],"tags":["倾斜角","斜率","斜率公式","人教A选必二Ch2","第一课时"],"textbookAnalysis":"直线的倾斜角α∈[0,π)，斜率k=tanα（α≠π/2）。已知两点P1、P2，斜率k=(y2-y1)/(x2-x1)（x1≠x2）。重点是斜率公式与倾斜角、斜率的对应关系。","overview":"【学情分析】A班：能由两点求斜率并讨论倾斜角；B班：α=π/2时斜率不存在易漏；k与α单调性（π/2两侧）易混。共同问题：认为每条直线都有斜率（垂直直线无斜率）。","objectives":["直观想象：理解倾斜角的定义与范围[0,π)。","数学运算：由两点坐标计算直线斜率。","逻辑推理：说明斜率不存在的情形（直线垂直x轴）。","数学抽象：建立倾斜角与斜率的对应关系。"],"keyPoints":"① 倾斜角：x轴正向到直线向上方向的角，α∈[0,π)。\n② 斜率：k=tanα（α≠π/2）；α=π/2时斜率不存在。\n③ 两点斜率：k=(y2-y1)/(x2-x1)（x1≠x2）。\n④ k>0⇔α锐角；k\x3c0⇔α钝角；k=0⇔水平。","difficulties":"① 斜率不存在。原因：垂直x轴的直线α=π/2，tan无定义，需强调。\n② k与α对应。原因：α∈(π/2,π)时k\x3c0且随α增大k增大（负得少），易混。\n③ 两点公式分母。原因：x1=x2时斜率不存在，需先判断。","teachingMethods":"① 几何直观演示。\n② 斜率公式推导。\n③ 倾斜角-斜率对应表。\n④ 错例辨析。","preparation":"【PPT课件】P1 倾斜角；P2 斜率定义；P3 两点公式；P4 不存在情形；P5 对应表；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——怎么描述直线方向","time":"5分钟","content":"【PPT P1 倾斜角】教师：「用倾斜角α（x轴正向到直线的角，范围[0,π)）刻画直线方向。」 预设回答：「一条直线的倾斜角是确定的。」 板书时机：黑板写定义与范围。差异化提示：B班看图；A班说唯一性。易错点提醒：倾斜角范围[0,π)，不含π。"},{"step":"Step 2 斜率定义","time":"9分钟","content":"【PPT P2 斜率】教师：「k=tanα（α≠π/2）；α=90°时直线垂直x轴，斜率不存在。」 预设回答：「垂直的直线没有斜率。」 板书时机：黑板写k=tanα。差异化提示：B班记；A班联三角。易错点提醒：α=π/2斜率不存在，不能说k=∞。"},{"step":"Step 3 两点公式","time":"10分钟","content":"【PPT P3 公式】教师：「已知P1(x1,y1)、P2(x2,y2)，k=(y2-y1)/(x2-x1)（x1≠x2）。」 预设回答：「纵坐标差比横坐标差。」 板书时机：黑板写公式。差异化提示：B班练；A班说推导。易错点提醒：x1=x2时分母为零，斜率不存在（直线垂直）。"},{"step":"Step 4 不存在情形","time":"8分钟","content":"【PPT P4 不存在】教师：「当x1=x2，直线垂直x轴，倾斜90°，斜率不存在；其余都有斜率。」 预设回答：「竖直线没有斜率。」 板书时机：黑板标红。差异化提示：B班记；A班举坐标。易错点提醒：先判断x1是否等于x2再套公式。"},{"step":"Step 5 对应表","time":"8分钟","content":"【PPT P5 对应】教师：「k>0⇔α锐角；k\x3c0⇔α钝角；k=0⇔水平；k不存在⇔垂直。」 预设回答：「符号和角范围一一对应。」 板书时机：黑板列表。差异化提示：B班背；A班说单调。易错点提醒：α在(π/2,π)时k为负且随α增大而增大。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「求过(1,2)、(3,6)的直线斜率与倾斜角。」 预设回答：「k=2，α=arctan2！」 板书时机：板书。差异化提示：B班练；A班加不存在情形。易错点提醒：下节课学直线方程。"}],"blackboard":"┌── 倾斜角与斜率 ──┐\n│ α∈[0,π)    │\n│ k=tanα     │\n│ (α≠π/2)    │\n│ k=(y2-y1)/  │\n│  (x2-x1)   │\n│ x1=x2⇒无斜率│\n│ k>0锐,k\x3c0钝│\n└────────────────┘","exercises":"【基础作业】1. 倾斜角范围____。2. 过(1,1)(1,4)的直线斜率____。\n【提高作业】斜率k=-1时倾斜角是多少？\n【参考答案——教师用】基础1：[0,π)。基础2：不存在（x相等）。提高：α=135°（3π/4）。","reflection":"✅ 亮点：倾斜角-斜率对应表清晰；不存在情形单独强调。\n⚠️ 需改进：B班常把k不存在写成∞，需纠「无斜率」。\n📌 下节课衔接：直线方程的几种形式。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx2-u1-2","lessonId":"l-math-sx2-u1-2","title":"直线方程的几种形式","book":"选择性必修第二册","unitNumber":1,"unitTitle":"直线和圆的方程","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","直观想象"],"tags":["点斜式","斜截式","两点式","截距式","人教A选必二Ch2","第二课时"],"textbookAnalysis":"点斜式y-y0=k(x-x0)；斜截式y=kx+b；两点式由两点确定；截距式x/a+y/b=1（a、b为截距且非零）。掌握各形式的适用条件，重点是点斜式与斜截式。","overview":"【学情分析】A班：能据条件选合适形式并互化；B班：垂直直线无斜率，点斜式写不出，易卡；截距式忽略截距可负、可为零。共同问题：混淆「截距」与「距离」，截距可正可负可零。","objectives":["数学运算：写出点斜式、斜截式、两点式直线方程。","直观想象：理解截距的几何意义（可正可负可零）。","逻辑推理：说明各形式适用条件（尤其斜率不存在时）。","数学抽象：在不同形式间互化。"],"keyPoints":"① 点斜式：y-y0=k(x-x0)（需斜率存在）。\n② 斜截式：y=kx+b（b为y轴截距）。\n③ 两点式：由两点确定直线。\n④ 截距式：x/a+y/b=1（a、b为两轴截距，非零）。\n⑤ 截距≠距离，可正可负。","difficulties":"① 斜率不存在。原因：垂直x轴直线无点斜式，需写x=x0，易漏。\n② 截距含义。原因：截距是坐标值可负，非距离，易混。\n③ 形式选择。原因：给两点用两点式，给斜率点用点斜式，需判。","teachingMethods":"① 形式对比。\n② 适用条件讨论。\n③ 互化训练。\n④ 错例辨析。","preparation":"【PPT课件】P1 点斜式；P2 斜截式；P3 两点式；P4 截距式；P5 适用条件；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——把直线写成方程","time":"5分钟","content":"【PPT P1 点斜式】教师：「已知直线上一点和斜率，可写y-y0=k(x-x0)，这是点斜式。」 预设回答：「代入点和斜率就行。」 板书时机：黑板写点斜式。差异化提示：B班背；A班说推导。易错点提醒：点斜式要求斜率存在，垂直直线不适用。"},{"step":"Step 2 斜截式","time":"9分钟","content":"【PPT P2 斜截式】教师：「令点为y轴截距b处(0,b)，得y=kx+b，b即纵截距。」 预设回答：「b就是直线与y轴交点的纵坐标。」 板书时机：黑板写。差异化提示：B班记；A班联斜率。易错点提醒：b是坐标值可负，不是距离。"},{"step":"Step 3 两点式","time":"9分钟","content":"【PPT P3 两点式】教师：「已知两点可先求斜率再点斜式；或直接由两点式确定直线。」 预设回答：「先算k再代入点。」 板书时机：黑板写。差异化提示：B班练；A班说统一。易错点提醒：两点x坐标相同时用x=x0表达。"},{"step":"Step 4 截距式","time":"8分钟","content":"【PPT P4 截距式】教师：「直线过(a,0)、(0,b)且a,b≠0时，x/a+y/b=1；截距可正可负。」 预设回答：「截距是交点坐标，不是长度。」 板书时机：黑板写。差异化提示：B班记；A班说限制。易错点提醒：截距式要求两截距均非零，过原点不能用。"},{"step":"Step 5 适用条件","time":"9分钟","content":"【PPT P5 条件】教师：「斜率不存在用x=x0；过原点不能用截距式；据已知选最简形式。」 预设回答：「先看清给了什么再选式。」 板书时机：黑板对比表。差异化提示：B班背；A班说理。易错点提醒：切勿对垂直直线硬套点斜式。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「过(2,3)、斜率-1的直线方程？过(0,0)(2,0)呢？」 预设回答：「y-3=-(x-2)；x轴y=0。」 板书时机：板书。差异化提示：B班练；A班加截距式。易错点提醒：下节课学直线一般式与位置关系。"}],"blackboard":"┌── 直线方程形式 ──┐\n│ 点斜式:y-y0=  │\n│  k(x-x0)     │\n│ 斜截:y=kx+b  │\n│ 两点式       │\n│ 截距:x/a+y/b=│\n│  1(a,b≠0)   │\n│ 截距≠距离    │\n└────────────────┘","exercises":"【基础作业】1. 过点(0,2)斜率3的直线____。2. 截距可____（正/负/零均可）。\n【提高作业】直线过(1,0)和(0,2)，写出截距式与一般式。\n【参考答案——教师用】基础1：y=3x+2。基础2：正、负、零均可。提高：截距式x/1+y/2=1，一般式2x+y-2=0。","reflection":"✅ 亮点：适用条件对比表防误用；截距≠距离讲清。\n⚠️ 需改进：B班截距式忘a,b≠0限制，需红字。\n📌 下节课衔接：直线一般式与位置关系。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx2-u1-3","lessonId":"l-math-sx2-u1-3","title":"直线的一般式与平行垂直","book":"选择性必修第二册","unitNumber":1,"unitTitle":"直线和圆的方程","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","逻辑推理"],"tags":["一般式","平行","垂直","系数关系","人教A选必二Ch2","第三课时"],"textbookAnalysis":"直线一般式Ax+By+C=0（A、B不同时为0）。两直线平行：A1/B1=A2/B2≠C1/C2（斜率存在时）；垂直：A1A2+B1B2=0。重点是一般式下的平行垂直判定。","overview":"【学情分析】A班：能用系数关系判平行垂直并求未知参数；B班：平行漏「不重合」条件（仅比例相等会重合）；垂直系数关系符号易错。共同问题：平行需比例相等且常数项不等，垂直用A1A2+B1B2=0。","objectives":["数学运算：把各种形式化为一般式Ax+By+C=0。","逻辑推理：用系数关系判定两直线平行。","数学运算：用A1A2+B1B2=0判定两直线垂直。","直观想象：理解一般式系数的几何意义。"],"keyPoints":"① 一般式：Ax+By+C=0（A、B不同时为0）。\n② 平行：A1/B1=A2/B2且A1/B1≠C1/C2（即不成比例重合）；或A1B2-A2B1=0且A1C2-A2C1≠0。\n③ 垂直：A1A2+B1B2=0。\n④ 斜率：k=-A/B（B≠0）。","difficulties":"① 平行不重合。原因：比例相等可能重合，需常数项不等，易漏。\n② 垂直系数。原因：A1A2+B1B2=0含符号，易写反。\n③ B=0情形。原因：直线垂直x轴时无斜率，需单独处理。","teachingMethods":"① 一般式化归。\n② 系数判定训练。\n③ 平行/垂直对比。\n④ 错例辨析。","preparation":"【PPT课件】P1 一般式；P2 化归；P3 平行；P4 垂直；P5 综合；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——统一成一般式","time":"5分钟","content":"【PPT P1 一般式】教师：「所有直线都能写成Ax+By+C=0（A、B不同时为0），便于统一研究。」 预设回答：「一般式最通用。」 板书时机：黑板写形式。差异化提示：B班记；A班说B=0意义。易错点提醒：A、B不同时为0，否则不是直线。"},{"step":"Step 2 化归","time":"9分钟","content":"【PPT P2 化归】教师：「点斜、斜截、两点式都可整理为Ax+By+C=0；从一般式得k=-A/B（B≠0）。」 预设回答：「整理成等号右边0。」 板书时机：黑板示范。差异化提示：B班练；A班加斜率。易错点提醒：B=0时直线垂直x轴，无斜率。"},{"step":"Step 3 平行判定","time":"10分钟","content":"【PPT P3 平行】教师：「两线平行⇔A1B2-A2B1=0且A1C2-A2C1≠0（不重合）；即系数成比例但常数不成比例。」 预设回答：「比例相等但不重合。」 板书时机：黑板写条件。差异化提示：B班练；A班加证明。易错点提醒：只写比例相等会包含重合，必须排除重合。"},{"step":"Step 4 垂直判定","time":"9分钟","content":"【PPT P4 垂直】教师：「两线垂直⇔A1A2+B1B2=0（任意一般式都成立，含斜率不存在情形）。」 预设回答：「系数交叉相乘相加为0。」 板书时机：黑板写。差异化提示：B班套；A班验证。易错点提醒：垂直条件A1A2+B1B2=0，不带分母，最稳妥。"},{"step":"Step 5 综合","time":"7分钟","content":"【PPT P5 综合】教师：「已知一直线和平行/垂直要求，求另一条的系数或参数。」 预设回答：「套条件列方程。」 板书时机：黑板解例。差异化提示：B班跟；A班加参数。易错点提醒：求参数后验证是否重合/是否真垂直。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「l1:2x+3y-1=0与l2:4x+6y+m=0平行且相距，求m范围。」 预设回答：「比例相等常数项不等。」 板书时机：板书。差异化提示：B班练；A班加距离。易错点提醒：下节课学交点坐标与距离公式。"}],"blackboard":"┌── 一般式与平行垂直 ──┐\n│ Ax+By+C=0   │\n│ (A,B不全0)  │\n│ 平行:A1B2-   │\n│  A2B1=0且不重│\n│ 垂直:A1A2+   │\n│  B1B2=0     │\n└────────────────┘","exercises":"【基础作业】1. 两直线垂直⇔____。2. 平行需排除____。\n【提高作业】求过(1,2)且垂直于3x-4y+1=0的直线方程。\n【参考答案——教师用】基础1：A1A2+B1B2=0。基础2：重合。提高：垂线法向量(3,-4)⇒斜率-3/4的垂线斜率4/3，y-2=(4/3)(x-1)，即4x-3y+2=0。","reflection":"✅ 亮点：垂直条件A1A2+B1B2=0统一含斜率不存在情形，省心。\n⚠️ 需改进：B班平行忘排重合，需红字「不重合」。\n📌 下节课衔接：直线交点坐标与距离公式。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx2-u1-4","lessonId":"l-math-sx2-u1-4","title":"直线的交点坐标与距离公式","book":"选择性必修第二册","unitNumber":1,"unitTitle":"直线和圆的方程","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","直观想象"],"tags":["交点","两点距","点到线距","平行线距","人教A选必二Ch2","第四课时"],"textbookAnalysis":"交点：联立两直线方程求解。两点距离d=√((x2-x1)²+(y2-y1)²)。点到直线距离d=|Ax0+By0+C|/√(A²+B²)。平行线间距离用一点到另一线距离。重点是点到直线距离公式。","overview":"【学情分析】A班：能推导点到直线距离并灵活用；B班：公式绝对值与分母易错；平行线距忘用「一点到另一线」。共同问题：点到线距分子带绝对值，分母为√(A²+B²)。","objectives":["数学运算：联立方程求两直线交点。","数学运算：用距离公式求两点距离、点到直线距离。","数学运算：求两条平行线间的距离。","直观想象：理解距离公式的几何来源。"],"keyPoints":"① 交点：联立两直线方程求解（无解⇔平行，无穷⇔重合）。\n② 两点距：d=√((Δx)²+(Δy)²)。\n③ 点到线距：d=|Ax0+By0+C|/√(A²+B²)。\n④ 平行线距：在一条上取点，求到另一条距离。","difficulties":"① 点到线公式。原因：分子绝对值、分母√(A²+B²)易错，需强化。\n② 平行线距。原因：需取点代另一线，易代同一条，需示范。\n③ 交点无解。原因：平行时无解，需先判断关系。","teachingMethods":"① 公式推导（面积法）。\n② 距离训练。\n③ 平行线距转化。\n④ 错例辨析。","preparation":"【PPT课件】P1 交点；P2 两点距；P3 点到线距；P4 推导；P5 平行线距；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——交点即联立解","time":"5分钟","content":"【PPT P1 交点】教师：「两直线交点坐标就是联立方程的公共解；无解则平行、无穷解则重合。」 预设回答：「解联立方程得交点。」 板书时机：黑板写联立。差异化提示：B班练；A班说关系。易错点提醒：先判断两线关系再联立，避免无效计算。"},{"step":"Step 2 两点距","time":"8分钟","content":"【PPT P2 两点距】教师：「平面上两点距离d=√((x2-x1)²+(y2-y1)²)，即勾股定理。」 预设回答：「横纵差的平方和开方。」 板书时机：黑板写。差异化提示：B班套；A班说来源。易错点提醒：平方差再开方，别漏根号。"},{"step":"Step 3 点到线距","time":"10分钟","content":"【PPT P3 点到线】教师：「点(x0,y0)到Ax+By+C=0距离d=|Ax0+By0+C|/√(A²+B²)。」 预设回答：「分子绝对值，分母根号A²+B²。」 板书时机：黑板写公式。差异化提示：B班背；A班说推导。易错点提醒：分子带绝对值，分母√(A²+B²)别漏平方。"},{"step":"Step 4 推导","time":"8分钟","content":"【PPT P4 推导】教师：「用面积法：构造直角三角形，距离d=|Ax0+By0+C|/√(A²+B²)。」 预设回答：「面积两种算法相等推出公式。」 板书时机：黑板推导。差异化提示：B班看；A班推导。易错点提醒：推导中C的处理（直线过原点与否）。"},{"step":"Step 5 平行线距","time":"9分钟","content":"【PPT P5 平行线距】教师：「两平行线间距离=在一条上任取一点，求该点到另一条直线的距离。」 预设回答：「取点代入另一线公式。」 板书时机：黑板示范。差异化提示：B班练；A班加公式。易错点提醒：点要代「另一条」线，勿代同一条（得0）。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「点(1,2)到直线3x+4y-5=0的距离？」 预设回答：「|3+8-5|/5=6/5！」 板书时机：板书。差异化提示：B班练；A班加平行线距。易错点提醒：下节课学圆的方程。"}],"blackboard":"┌── 交点与距离 ──┐\n│ 交点:联立求解│\n│ 两点距:√Δx²+│\n│  Δy²        │\n│ 点线距:|Ax0+│\n│  By0+C|/√A²│\n│  +B²       │\n│ 平行距:取点│\n│  代另一线   │\n└────────────────┘","exercises":"【基础作业】1. 点到直线距离d=____。2. 平行线距=一点到____的距离。\n【提高作业】两平行线3x+4y-5=0与3x+4y+5=0的距离。\n【参考答案——教师用】基础1：|Ax0+By0+C|/√(A²+B²)。基础2：另一条直线。提高：取(0,5/4)代第二条得|0+5+5|/5=2；或|−5−5|/5=2。","reflection":"✅ 亮点：面积法推导点到线距，学生知其然更知其所以然。\n⚠️ 需改进：B班平行线距常代同一条线得0，需红字「另一线」。\n📌 下节课衔接：圆的方程。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx2-u1-5","lessonId":"l-math-sx2-u1-5","title":"圆的方程（标准式与一般式）","book":"选择性必修第二册","unitNumber":1,"unitTitle":"直线和圆的方程","lessonType":"new","lessonTypeName":"新授课","periodNumber":5,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","直观想象"],"tags":["圆的标准式","圆的一般式","圆心半径","人教A选必二Ch2","第五课时"],"textbookAnalysis":"标准式：(x-a)²+(y-b)²=r²，圆心(a,b)、半径r。一般式：x²+y²+Dx+Ey+F=0（D²+E²-4F>0），配方得圆心(-D/2,-E/2)、半径√(D²+E²-4F)/2。重点是两种形式互化。","overview":"【学情分析】A班：能配方互化并讨论参数；B班：一般式配方易错符号，半径忘除以2或漏根号；D²+E²-4F>0条件忘。共同问题：一般式需满足D²+E²-4F>0才表示圆。","objectives":["直观想象：由圆的标准方程说出圆心与半径。","数学运算：将一般式配方化为标准式。","逻辑推理：说明一般式表示圆的条件D²+E²-4F>0。","数学运算：在已知条件下求圆方程。"],"keyPoints":"① 标准式：(x-a)²+(y-b)²=r²，圆心(a,b)、半径r。\n② 一般式：x²+y²+Dx+Ey+F=0，需D²+E²-4F>0。\n③ 配方：圆心(-D/2,-E/2)，半径r=√(D²+E²-4F)/2。\n④ 求圆：已知圆心半径用标准式；已知三点用一般式待定系数。","difficulties":"① 配方符号。原因：圆心横纵坐标为-D/2、-E/2，易错号，需强调。\n② 半径公式。原因：r=√(D²+E²-4F)/2，易忘/2或漏根号。\n③ 表示圆条件。原因：D²+E²-4F>0才可能，否则点或空集。","teachingMethods":"① 标准式几何意义。\n② 配方训练。\n③ 条件讨论。\n④ 错例辨析。","preparation":"【PPT课件】P1 标准式；P2 几何意义；P3 一般式；P4 配方；P5 条件；P6 练习。\n【实物教具】圆规。\n【音频】无。","process":[{"step":"Step 1 导入——圆的代数表达","time":"5分钟","content":"【PPT P1 标准式】教师：「到定点距离定长的点的轨迹是圆，方程(x-a)²+(y-b)²=r²，圆心(a,b)、半径r。」 预设回答：「平方和是半径平方。」 板书时机：黑板写标准式。差异化提示：B班记；A班说来源。易错点提醒：右边是r²不是r。"},{"step":"Step 2 几何意义","time":"8分钟","content":"【PPT P2 几何】教师：「标准式直接读出圆心和半径，画圆只需圆心+半径。」 预设回答：「一看就知道圆心在哪。」 板书时机：黑板举例。差异化提示：B班练；A班说画法。易错点提醒：圆心坐标是(a,b)，注意符号。"},{"step":"Step 3 一般式","time":"9分钟","content":"【PPT P3 一般式】教师：「展开标准式得x²+y²+Dx+Ey+F=0，这是圆的一般式（缺xy项、x²y²系数相等）。」 预设回答：「一般式没有平方项系数差。」 板书时机：黑板写。差异化提示：B班记；A班说特征。易错点提醒：一般式要求x²、y²系数相同且无xy项。"},{"step":"Step 4 配方","time":"10分钟","content":"【PPT P4 配方】教师：「一般式配方：圆心(-D/2,-E/2)，半径r=√(D²+E²-4F)/2。」 预设回答：「配方后读出圆心半径。」 板书时机：黑板完整配方。差异化提示：B班跟；A班加快。易错点提醒：圆心横纵带负号；半径除以2且开方。"},{"step":"Step 5 条件","time":"8分钟","content":"【PPT P5 条件】教师：「一般式表示圆⇔D²+E²-4F>0；等于0是点；小于0不表示任何图形。」 预设回答：「判别式必须大于0。」 板书时机：黑板写条件。差异化提示：B班记；A班说理。易错点提醒：先判D²+E²-4F符号再求圆心半径。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「化x²+y²-4x+2y-4=0为标准式并说圆心半径。」 预设回答：「(x-2)²+(y+1)²=9，圆心(2,-1)半径3！」 板书时机：板书。差异化提示：B班练；A班加求圆。易错点提醒：下节课学直线与圆的位置关系。"}],"blackboard":"┌── 圆的方程 ──┐\n│ 标准:(x-a)²+│\n│  (y-b)²=r²  │\n│ 一般:x²+y²+ │\n│  Dx+Ey+F=0  │\n│ 圆心(-D/2,  │\n│  -E/2)      │\n│ r=√(D²+E²-  │\n│  4F)/2      │\n│ 需D²+E²-4F>0│\n└────────────────┘","exercises":"【基础作业】1. (x-1)²+(y+2)²=4的圆心____、半径____。2. 一般式表圆条件____。\n【提高作业】求过(0,0)(2,0)(0,2)三点的圆方程。\n【参考答案——教师用】基础1：(1,-2)、2。基础2：D²+E²-4F>0。提高：设一般式代入得F=0,D=-2,E=-2⇒x²+y²-2x-2y=0，即(x-1)²+(y-1)²=2。","reflection":"✅ 亮点：标准式几何意义让学生一眼读圆心半径；配方步骤细化。\n⚠️ 需改进：B班圆心符号与半径/2仍错，需红字。\n📌 下节课衔接：直线与圆的位置关系。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx2-u1-6","lessonId":"l-math-sx2-u1-6","title":"直线与圆的位置关系","book":"选择性必修第二册","unitNumber":1,"unitTitle":"直线和圆的方程","lessonType":"new","lessonTypeName":"新授课","periodNumber":6,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","直观想象"],"tags":["直线与圆","距离比较","判别式","弦长","人教A选必二Ch2","第六课时"],"textbookAnalysis":"判定：法一圆心到直线距离d与半径r比较（d\x3cr相交、d=r相切、d>r相离）；法二联立方程组判别式Δ。弦长=2√(r²-d²)。重点是几何法（距离比较）更简捷。","overview":"【学情分析】A班：能据情境选几何法或代数法并求弦长；B班：几何法与代数法混淆，d与r比较方向错；弦长公式忘乘2。共同问题：相交时弦长用垂径定理2√(r²-d²)。","objectives":["数学运算：用圆心到直线距离d与半径r判定位置关系。","数学运算：用联立判别式Δ判定位置关系。","数学运算：相交时用垂径定理求弦长。","直观想象：理解d与r的几何比较。"],"keyPoints":"① 几何法：d\x3cr相交、d=r相切、d>r相离。\n② 代数法：联立得一元二次方程，Δ>0相交、=0相切、\x3c0相离。\n③ 弦长：l=2√(r²-d²)。\n④ 切线：d=r，或联立Δ=0求斜率。","difficulties":"① 方法选择。原因：几何法快但需算d；代数法通用但繁，需据题选。\n② 弦长公式。原因：l=2√(r²-d²)易漏2或错用d，需推导。\n③ d计算。原因：点到线距公式易错，连锁出错。","teachingMethods":"① 几何法演示。\n② 代数法对比。\n③ 弦长推导（垂径）。\n④ 错例辨析。","preparation":"【PPT课件】P1 几何法；P2 代数法；P3 比较；P4 弦长；P5 切线；P6 练习。\n【实物教具】圆与线模型。\n【音频】无。","process":[{"step":"Step 1 导入——两种判定思路","time":"5分钟","content":"【PPT P1 几何法】教师：「圆心到直线距离d与半径r比：d\x3cr相交、d=r相切、d>r相离，最直观。」 预设回答：「比距离最快。」 板书时机：黑板写关系。差异化提示：B班看图；A班说原理。易错点提醒：d是圆心到直线距离，不是随便一点。"},{"step":"Step 2 代数法","time":"9分钟","content":"【PPT P2 代数法】教师：「联立直线与圆得一元二次，Δ>0相交、=0相切、\x3c0相离，通用但计算多。」 预设回答：「看判别式符号。」 板书时机：黑板写。差异化提示：B班记；A班说等价。易错点提醒：代数法一定能用，但几何法更快捷。"},{"step":"Step 3 比较选择","time":"8分钟","content":"【PPT P3 比较】教师：「求位置/切线优先几何法；求交点坐标用代数法。两法结论一致。」 预设回答：「位置用几何，坐标用代数。」 板书时机：黑板对比。差异化提示：B班背；A班说理。易错点提醒：别在只需判位置时硬算Δ。"},{"step":"Step 4 弦长","time":"10分钟","content":"【PPT P4 弦长】教师：「相交时弦长l=2√(r²-d²)（垂径定理：半弦、弦心距、半径成直角）。」 预设回答：「半弦平方加d平方等于r平方。」 板书时机：黑板画直角三角形。差异化提示：B班练；A班推导。易错点提醒：弦长是2倍√(r²-d²)，别漏乘2。"},{"step":"Step 5 切线","time":"8分钟","content":"【PPT P5 切线】教师：「过圆外一点作切线：设斜率用d=r求；或联立Δ=0。注意斜率不存在情形。」 预设回答：「让距离等于半径。」 板书时机：黑板示范。差异化提示：B班跟；A班加两解。易错点提醒：过圆外一点有两条切线，别漏一条（含垂直）。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「圆心(0,0)r=5，直线3x+4y-25=0位置关系？弦长？」 预设回答：「d=5=r相切，弦长0！」 板书时机：板书。差异化提示：B班练；A班加相交弦长。易错点提醒：下节课学圆与圆的位置关系。"}],"blackboard":"┌── 直线与圆位置 ──┐\n│ 几何:d与r比  │\n│ d\x3cr交,d=r切,│\n│  d>r离      │\n│ 代数:Δ符号  │\n│ 弦长l=2√(r²-│\n│  d²)        │\n│ 切线:d=r     │\n└────────────────┘","exercises":"【基础作业】1. d=r时直线与圆____。2. 弦长公式l=____。\n【提高作业】圆x²+y²=25与直线y=x+1相交，求弦长。\n【参考答案——教师用】基础1：相切。基础2：2√(r²-d²)。提高：d=|0-0+1|/√2=√2/2，l=2√(25-1/2)=2√(49/2)=7√2。","reflection":"✅ 亮点：几何法与代数法对比明确分工；垂径定理推导弦长。\n⚠️ 需改进：B班弦长漏乘2、切线漏一条，需红字。\n📌 下节课衔接：圆与圆的位置关系。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx2-u1-7","lessonId":"l-math-sx2-u1-7","title":"圆与圆的位置关系","book":"选择性必修第二册","unitNumber":1,"unitTitle":"直线和圆的方程","lessonType":"new","lessonTypeName":"新授课","periodNumber":7,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","直观想象"],"tags":["圆与圆","圆心距","公切线","人教A选必二Ch2","第七课时"],"textbookAnalysis":"设两圆圆心距d、半径r1、r2（r1≤r2）。d>r1+r2外离；d=r1+r2外切；|r2-r1|\x3cd\x3cr1+r2相交；d=|r2-r1|内切；d\x3c|r2-r1|内含。重点是用圆心距与半径和差比较。","overview":"【学情分析】A班：能据d与r1±r2判五种关系并求公切线数；B班：内外切与内含临界易混；半径大小顺序影响|r2-r1|。共同问题：相交条件是|r1-r2|\x3cd\x3cr1+r2（严格不等式）。","objectives":["数学运算：求两圆圆心距d。","逻辑推理：用d与r1+r2、|r1-r2|比较判定五种位置关系。","直观想象：对应每种关系的公切线条数。","数学运算：由相切条件求未知参数。"],"keyPoints":"① 外离：d>r1+r2（4条公切线）。\n② 外切：d=r1+r2（3条）。\n③ 相交：|r1-r2|\x3cd\x3cr1+r2（2条）。\n④ 内切：d=|r1-r2|（1条）。\n⑤ 内含：d\x3c|r1-r2|（0条）。","difficulties":"① 严格不等式。原因：相交用严格小于，等于即切，易错边界。\n② 半径差绝对值。原因：需|r1-r2|且r1≤r2处理，易漏绝对值。\n③ 公切线数。原因：五种对应0~4条，易记混。","teachingMethods":"① 圆心距比较法。\n② 几何演示（动画感）。\n③ 公切线条数对应。\n④ 错例辨析。","preparation":"【PPT课件】P1 五种关系；P2 比较式；P3 公切线；P4 含参；P5 例题；P6 练习。\n【实物教具】两圆片。\n【音频】无。","process":[{"step":"Step 1 导入——两圆的距离游戏","time":"5分钟","content":"【PPT P1 五种】教师：「两圆位置由圆心距d与半径和r1+r2、半径差|r1-r2|决定，共五种。」 预设回答：「看d落在哪个区间。」 板书时机：黑板写五种。差异化提示：B班看模型；A班说区间。易错点提醒：先算d，再比较和、差。"},{"step":"Step 2 比较式","time":"10分钟","content":"【PPT P2 比较】教师：「d>和⇒外离；d=和⇒外切；差\x3cd\x3c和⇒相交；d=差⇒内切；d\x3c差⇒内含。」 预设回答：「和、差把数轴分成五段。」 板书时机：黑板写数轴。差异化提示：B班背；A班说严格。易错点提醒：相交是严格不等式，等号落入相切。"},{"step":"Step 3 公切线","time":"8分钟","content":"【PPT P3 公切线】教师：「外离4条、外切3条、相交2条、内切1条、内含0条公切线。」 预设回答：「越分开公切线越多。」 板书时机：黑板对应。差异化提示：B班记；A班联关系。易错点提醒：公切线条数与位置关系一一对应。"},{"step":"Step 4 含参","time":"9分钟","content":"【PPT P4 含参】教师：「已知相切求参数：令d=r1+r2（外切）或d=|r1-r2|（内切）列方程。」 预设回答：「用相切条件列方程。」 板书时机：黑板示范。差异化提示：B班跟；A班加双解。易错点提醒：相切分内外两种，别只取一种。"},{"step":"Step 5 例题","time":"8分钟","content":"【PPT P5 例题】教师：「给定两圆方程，配方求圆心半径，判位置关系与公切线数。」 预设回答：「配方→d→比较。」 板书时机：黑板完整解。差异化提示：B班跟；A班提速。易错点提醒：先配方得圆心半径再算d。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「圆C1:(x-1)²+y²=1与C2:(x-4)²+y²=4的位置关系？」 预设回答：「d=3=r1+r2=3，外切！」 板书时机：板书。差异化提示：B班练；A班加公切线。易错点提醒：进入圆锥曲线章节。"}],"blackboard":"┌── 圆与圆位置 ──┐\n│ d=圆心距     │\n│ d>r1+r2 外离│\n│ d=r1+r2 外切│\n│ |r1-r2|\x3cd\x3c │\n│  r1+r2 相交 │\n│ d=|r1-r2|内│\n│ 切;d\x3c差 内含│\n└────────────────┘","exercises":"【基础作业】1. 两圆相交⇔____\x3cd\x3c____。2. 外切有____条公切线。\n【提高作业】圆x²+y²=1与(x-3)²+y²=r²外切，求r。\n【参考答案——教师用】基础1：|r1-r2|、r1+r2。基础2：3。提高：d=3，外切⇒3=1+r⇒r=2。","reflection":"✅ 亮点：数轴分段让五种关系一目了然；公切线条数对应好记。\n⚠️ 需改进：B班相交边界等号易错，需红字「严格」。\n📌 下节课衔接：圆锥曲线——椭圆。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx2-u2-1","lessonId":"l-math-sx2-u2-1","title":"椭圆及其标准方程","book":"选择性必修第二册","unitNumber":2,"unitTitle":"圆锥曲线","lessonType":"new","lessonTypeName":"新授课","periodNumber":8,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["直观想象","数学抽象"],"tags":["椭圆","定义","标准方程","焦点","人教A选必二Ch3","第八课时"],"textbookAnalysis":"椭圆：平面内到两定点F1、F2距离之和为常数2a（>|F1F2|）的点的轨迹。焦点在x轴：(x²/a²)+(y²/b²)=1（a>b>0，c²=a²-b²）；焦点在y轴则x、y互换。重点是定义与标准方程。","overview":"【学情分析】A班：能由定义推导标准方程并据焦点位置写式；B班：a、b、c关系c²=a²-b²易写成b²=a²+c²；焦点在x/y轴判断错。共同问题：椭圆中a最大，c²=a²-b²。","objectives":["数学抽象：复述椭圆定义（到两定点距离和为常数）。","直观想象：理解a、b、c的几何意义与关系。","数学运算：写出焦点在x轴、y轴的标准方程。","逻辑推理：由已知条件确定椭圆方程。"],"keyPoints":"① 定义：|PF1|+|PF2|=2a（2a>|F1F2|）。\n② 标准式：x轴焦点 x²/a²+y²/b²=1；y轴焦点 y²/a²+x²/b²=1。\n③ 关系：a>b>0，c²=a²-b²（a最大）。\n④ 焦点：(±c,0)或(0,±c)。","difficulties":"① a最大。原因：椭圆a>b，c²=a²-b²，易与双曲线记反，需强调。\n② 焦点位置。原因：看分母大小，x分母大则焦点在x轴，易错。\n③ 定义常数。原因：须2a>|F1F2|，否则退化，需说明。","teachingMethods":"① 绳演示法（画图）。\n② 定义推导。\n③ 标准式对比。\n④ 错例辨析。","preparation":"【PPT课件】P1 定义；P2 绳画椭圆；P3 标准式；P4 a,b,c关系；P5 焦点位置；P6 练习。\n【实物教具】细绳与图钉。\n【音频】无。","process":[{"step":"Step 1 导入——用绳画椭圆","time":"5分钟","content":"【PPT P1 定义】教师：「固定两焦点，绳长不变，笔尖画的轨迹就是椭圆：到两焦点距离和=常数2a。」 预设回答：「距离和恒定！」 板书时机：黑板写定义。差异化提示：B班看演示；A班说条件。易错点提醒：常数须大于两焦点距离，否则画不出椭圆。"},{"step":"Step 2 绳演示","time":"9分钟","content":"【PPT P2 绳画】教师：「绳长2a，焦距2c，须2a>2c；当2a=2c退化为线段。」 预设回答：「a必须大于c。」 板书时机：黑板画图。差异化提示：B班看；A班说退化。易错点提醒：2a>2c是椭圆存在的必要条件。"},{"step":"Step 3 标准式","time":"10分钟","content":"【PPT P3 标准式】教师：「建系使焦点在x轴：x²/a²+y²/b²=1（a>b>0）；焦点在y轴则x、y分母互换，a²仍在下。」 预设回答：「大分母对应a²，决定长轴方向。」 板书时机：黑板写两式。差异化提示：B班记；A班推导。易错点提醒：焦点在分母大的那个变量轴上。"},{"step":"Step 4 a,b,c关系","time":"8分钟","content":"【PPT P4 关系】教师：「椭圆中a最大，c²=a²-b²（b²=a²-c²）。」 预设回答：「a²=b²+c²，像直角三角形。」 板书时机：黑板写。差异化提示：B班背；A班说图。易错点提醒：椭圆c²=a²-b²，别与双曲线c²=a²+b²记反。"},{"step":"Step 5 焦点位置","time":"8分钟","content":"【PPT P5 判断】教师：「比较x²、y²分母：大的那个轴是长轴、焦点在其上；已知焦点坐标也可直接写。」 预设回答：「看哪个分母大。」 板书时机：黑板对比。差异化提示：B班练；A班加应用。易错点提醒：先判定焦点轴再写对应标准式。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「a=5,b=3，焦点在x轴，写椭圆方程。」 预设回答：「x²/25+y²/9=1，c=4！」 板书时机：板书。差异化提示：B班练；A班加求焦点。易错点提醒：下节课学椭圆几何性质。"}],"blackboard":"┌── 椭圆标准方程 ──┐\n│ 定义:|PF1|+    │\n│  |PF2|=2a    │\n│ x轴:x²/a²+   │\n│  y²/b²=1    │\n│ y轴:y²/a²+   │\n│  x²/b²=1    │\n│ c²=a²-b²(a大)│\n└────────────────┘","exercises":"【基础作业】1. 椭圆中a、b、c关系____。2. 焦点在____分母大的轴上。\n【提高作业】椭圆过点(3,0)(0,2)，焦点在x轴，写方程。\n【参考答案——教师用】基础1：c²=a²-b²（a最大）。基础2：x²（长轴）。提高：a=3,b=2⇒x²/9+y²/4=1。","reflection":"✅ 亮点：绳演示让定义可见；a,b,c关系配图好记。\n⚠️ 需改进：B班椭圆双曲线c关系常混，需对比红字。\n📌 下节课衔接：椭圆的简单几何性质。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx2-u2-2","lessonId":"l-math-sx2-u2-2","title":"椭圆的简单几何性质","book":"选择性必修第二册","unitNumber":2,"unitTitle":"圆锥曲线","lessonType":"new","lessonTypeName":"新授课","periodNumber":9,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["直观想象","数学运算"],"tags":["椭圆性质","离心率","长轴短轴","人教A选必二Ch3","第九课时"],"textbookAnalysis":"由x²/a²+y²/b²=1得：范围|x|≤a、|y|≤b；对称性（关于轴、原点）；顶点(±a,0)(0,±b)；长轴2a、短轴2b；离心率e=c/a∈(0,1)，e越大越扁。重点是离心率e的几何意义。","overview":"【学情分析】A班：能由e大小判断扁圆程度并综合解题；B班：e=c/a与a,b混淆；顶点、长短轴端点易错。共同问题：e∈(0,1)，e越大椭圆越扁。","objectives":["直观想象：由标准方程说出范围、对称性、顶点。","数学运算：写出长轴、短轴长与焦点、离心率。","数学抽象：理解离心率e=c/a刻画扁圆程度。","逻辑推理：由e与a、b、c关系解题。"],"keyPoints":"① 范围：|x|≤a，|y|≤b。\n② 对称：关于x轴、y轴、原点对称。\n③ 顶点：(±a,0)、(0,±b)；长轴2a、短轴2b。\n④ 离心率：e=c/a∈(0,1)，e越大越扁。","difficulties":"① e的几何意义。原因：e=c/a衡量扁平度，非形状大小，需结合图。\n② e范围。原因：椭圆e\x3c1（双曲线e>1），易混。\n③ 顶点区分。原因：长轴端点(±a,0)与短轴端点(0,±b)易反。","teachingMethods":"① 标准式读图。\n② 离心率演示（变a,c）。\n③ 性质归纳表。\n④ 错例辨析。","preparation":"【PPT课件】P1 范围对称；P2 顶点轴；P3 离心率；P4 e与扁；P5 例题；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——从方程读形状","time":"5分钟","content":"【PPT P1 范围对称】教师：「由x²/a²+y²/b²=1知|x|≤a、|y|≤b，且关于两轴和原点对称。」 预设回答：「方程本身告诉了范围。」 板书时机：黑板写范围对称。差异化提示：B班记；A班说依据。易错点提醒：对称性由方程奇偶性直接得出。"},{"step":"Step 2 顶点与轴","time":"9分钟","content":"【PPT P2 顶点】教师：「令y=0得顶点(±a,0)（长轴端点），x=0得(0,±b)（短轴端点）；长轴2a、短轴2b。」 预设回答：「长轴在分母大的轴上。」 板书时机：黑板标轴。差异化提示：B班练；A班说长短。易错点提醒：长轴端点对应a，短轴对应b，别反。"},{"step":"Step 3 离心率","time":"10分钟","content":"【PPT P3 离心率】教师：「e=c/a，由c²=a²-b²，e∈(0,1)；e越大，c越接近a，椭圆越扁。」 预设回答：「e大就更扁。」 板书时机：黑板写e=c/a。差异化提示：B班记；A班联图。易错点提醒：e是比值非长度，椭圆e\x3c1。"},{"step":"Step 4 e与扁","time":"8分钟","content":"【PPT P4 e扁】教师：「e→0近圆（c→0,b→a）；e→1很扁（c→a,b→0）。」 预设回答：「离心率描述扁的程度。」 板书时机：黑板画系列。差异化提示：B班看；A班说趋势。易错点提醒：e衡量扁平度，不衡量大小。"},{"step":"Step 5 例题","time":"8分钟","content":"【PPT P5 例题】教师：「已知椭圆方程，求a,b,c,e,焦点,顶点,长短轴。」 预设回答：「逐项读出来。」 板书时机：黑板完整解。差异化提示：B班跟；A班加综合。易错点提醒：先判焦点轴再写顶点顺序。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「x²/25+y²/9=1的离心率与长轴？」 预设回答：「c=4,e=4/5,长轴10！」 板书时机：板书。差异化提示：B班练；A班加扁度。易错点提醒：下节课学双曲线。"}],"blackboard":"┌── 椭圆几何性质 ──┐\n│ |x|≤a,|y|≤b │\n│ 对称:轴/原点│\n│ 顶点(±a,0)  │\n│  (0,±b)    │\n│ 长轴2a短轴2b│\n│ e=c/a∈(0,1)│\n│ e大⇒越扁   │\n└────────────────┘","exercises":"【基础作业】1. 椭圆离心率范围____。2. e越大椭圆越____。\n【提高作业】已知e=3/5且长轴10，求椭圆标准方程（焦点x轴）。\n【参考答案——教师用】基础1：(0,1)。基础2：扁。提高：a=5,c=3,b=4⇒x²/25+y²/16=1。","reflection":"✅ 亮点：离心率用「扁度」直观解释；性质归纳表系统。\n⚠️ 需改进：B班e与a,b混淆，需多练互求。\n📌 下节课衔接：双曲线及其标准方程。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx2-u2-3","lessonId":"l-math-sx2-u2-3","title":"双曲线及其标准方程","book":"选择性必修第二册","unitNumber":2,"unitTitle":"圆锥曲线","lessonType":"new","lessonTypeName":"新授课","periodNumber":10,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学抽象","直观想象"],"tags":["双曲线","定义","标准方程","焦点","人教A选必二Ch3","第十课时"],"textbookAnalysis":"双曲线：平面内到两定点距离之差的绝对值为常数2a（0\x3c2a\x3c|F1F2|）的点的轨迹。焦点x轴：x²/a²-y²/b²=1（c²=a²+b²）；y轴：y²/a²-x²/b²=1。重点是定义与标准方程，注意与椭圆c关系的区别。","overview":"【学情分析】A班：能区分双曲线与椭圆定义、c关系并写方程；B班：常把双曲线c²=a²+b²错写成c²=a²-b²（套椭圆）；「差的绝对值」漏绝对值。共同问题：双曲线c最大，c²=a²+b²。","objectives":["数学抽象：复述双曲线定义（距离差绝对值为常数）。","直观想象：对比椭圆与双曲线的定义与c关系。","数学运算：写出焦点在x轴、y轴的标准方程。","逻辑推理：由已知确定双曲线方程。"],"keyPoints":"① 定义：||PF1|-|PF2||=2a（0\x3c2a\x3c|F1F2|）。\n② 标准式：x轴 x²/a²-y²/b²=1；y轴 y²/a²-x²/b²=1。\n③ 关系：c²=a²+b²（c最大）。\n④ 焦点：(±c,0)或(0,±c)。","difficulties":"① c关系反向。原因：双曲线c²=a²+b²（椭圆c²=a²-b²），极易套错，需对比。\n② 绝对值。原因：差是绝对值，两支都满足，易漏。\n③ 焦点判断。原因：x²系数正则在x轴，需看符号。","teachingMethods":"① 定义对比（椭圆vs双曲线）。\n② 拉链演示。\n③ 标准式对比。\n④ 错例辨析。","preparation":"【PPT课件】P1 定义；P2 拉链演示；P3 标准式；P4 c关系对比；P5 焦点判断；P6 练习。\n【实物教具】拉链模型。\n【音频】无。","process":[{"step":"Step 1 导入——距离差的绝对值","time":"5分钟","content":"【PPT P1 定义】教师：「到两定点距离之差的绝对值为常数2a（小于焦距）的点的轨迹是双曲线，有两支。」 预设回答：「差的绝对值，所以两支。」 板书时机：黑板写定义。差异化提示：B班看；A班说条件。易错点提醒：是「差的绝对值」，常数须小于焦距。"},{"step":"Step 2 拉链演示","time":"9分钟","content":"【PPT P2 拉链】教师：「拉开拉链两端固定，笔尖轨迹即双曲线；直观看到两支。」 预设回答：「拉链演示很形象。」 板书时机：黑板画图。差异化提示：B班看；A班联定义。易错点提醒：两支分别对应差的正负号。"},{"step":"Step 3 标准式","time":"10分钟","content":"【PPT P3 标准式】教师：「焦点x轴：x²/a²-y²/b²=1；焦点y轴：y²/a²-x²/b²=1；正项决定焦点轴。」 预设回答：「正项在哪个变量，焦点就在那轴。」 板书时机：黑板写两式。差异化提示：B班记；A班推导。易错点提醒：双曲线是「减号」连接，正项定焦点轴。"},{"step":"Step 4 c关系对比","time":"9分钟","content":"【PPT P4 c关系】教师：「双曲线c²=a²+b²（c最大）；椭圆c²=a²-b²（a最大）。一字之差，务必分清！」 预设回答：「双曲是加，椭圆是减！」 板书时机：黑板对比红字。差异化提示：B班背；A班说图。易错点提醒：最易错点，双曲线c²=a²+b²。"},{"step":"Step 5 焦点判断","time":"7分钟","content":"【PPT P5 判断】教师：「看标准式正项：x²正⇒焦点x轴；y²正⇒焦点y轴；由此定c与焦点坐标。」 预设回答：「正项定轴。」 板书时机：黑板示范。差异化提示：B班练；A班加应用。易错点提醒：先定正项轴再写焦点。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「a=3,b=4，焦点x轴，写方程并求c。」 预设回答：「x²/9-y²/16=1，c=5！」 板书时机：板书。差异化提示：B班练；A班加焦点。易错点提醒：下节课学双曲线几何性质。"}],"blackboard":"┌── 双曲线标准方程 ──┐\n│ 定义:||PF1|-  │\n│  |PF2||=2a   │\n│ x轴:x²/a²-   │\n│  y²/b²=1    │\n│ y轴:y²/a²-   │\n│  x²/b²=1    │\n│ c²=a²+b²(c大)│\n└────────────────┘","exercises":"【基础作业】1. 双曲线c关系到____（加/减）。2. 正项决定____。\n【提高作业】双曲线过(3,0)，焦点(5,0)，写方程。\n【参考答案——教师用】基础1：加（c²=a²+b²）。基础2：焦点轴。提高：a=3,c=5⇒b=4⇒x²/9-y²/16=1。","reflection":"✅ 亮点：与椭圆c关系正反对比（红字）直击易错点。\n⚠️ 需改进：B班仍套椭圆c²=a²-b²，需反复练。\n📌 下节课衔接：双曲线的简单几何性质。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx2-u2-4","lessonId":"l-math-sx2-u2-4","title":"双曲线的简单几何性质","book":"选择性必修第二册","unitNumber":2,"unitTitle":"圆锥曲线","lessonType":"new","lessonTypeName":"新授课","periodNumber":11,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["直观想象","数学运算"],"tags":["双曲线性质","渐近线","离心率","人教A选必二Ch3","第十一课时"],"textbookAnalysis":"由x²/a²-y²/b²=1：范围|x|≥a；关于轴、原点对称；顶点(±a,0)；实轴2a、虚轴2b；渐近线y=±(b/a)x；离心率e=c/a>1，e越大开口越大。重点是渐近线与离心率。","overview":"【学情分析】A班：能由渐近线、离心率综合解题；B班：渐近线方程y=±(b/a)x常写反斜率；e>1与椭圆混淆。共同问题：渐近线是双曲线特有的，椭圆没有；e>1。","objectives":["直观想象：由方程说出范围、对称性、顶点。","数学运算：写出实轴、虚轴与渐近线方程。","数学抽象：理解离心率e=c/a>1及e越大开口越大。","逻辑推理：由渐近线求a、b关系。"],"keyPoints":"① 范围：|x|≥a（两支向外）。\n② 顶点：(±a,0)；实轴2a、虚轴2b。\n③ 渐近线：y=±(b/a)x（焦点x轴）；双曲线无限靠近但不相交。\n④ 离心率：e=c/a>1，e越大开口越阔。","difficulties":"① 渐近线斜率。原因：y=±(b/a)x，b/a易与a/b写反，需强调。\n② 渐近线与开口。原因：e越大b/a越大，开口越阔，方向相反易混。\n③ 无y界。原因：双曲线无上界下界，与椭圆不同。","teachingMethods":"① 渐近线程演示。\n② 离心率与开口。\n③ 性质对比（椭圆）。\n④ 错例辨析。","preparation":"【PPT课件】P1 范围顶点；P2 渐近线；P3 推导；P4 离心率；P5 例题；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——双曲线的形状密码","time":"5分钟","content":"【PPT P1 范围顶点】教师：「x²/a²-y²/b²=1中|x|≥a，顶点(±a,0)，实轴2a、虚轴2b；与椭圆不同无界。」 预设回答：「双曲线两支向外无限延伸。」 板书时机：黑板写范围顶点。差异化提示：B班记；A班说无界。易错点提醒：双曲线无上/下界，只有左右界|x|≥a。"},{"step":"Step 2 渐近线","time":"10分钟","content":"【PPT P2 渐近线】教师：「令等号右边为0：x²/a²-y²/b²=0⇒y=±(b/a)x，即渐近线；双曲线无限逼近它。」 预设回答：「把1换成0就得到渐近线。」 板书时机：黑板画渐近线与曲线。差异化提示：B班记；A班说推导。易错点提醒：渐近线斜率是±b/a（焦点x轴时），别写反。"},{"step":"Step 3 推导","time":"8分钟","content":"【PPT P3 推导】教师：「令标准式右端=0因式分解得两直线方程，即渐近线；这是通用求法。」 预设回答：「右端置0因式分解。」 板书时机：黑板推导。差异化提示：B班跟；A班推广。易错点提醒：通用法适用于任何双曲线求渐近线。"},{"step":"Step 4 离心率","time":"9分钟","content":"【PPT P4 离心率】教师：「e=c/a>1；e越大⇒b/a越大⇒渐近线越陡⇒开口越阔。」 预设回答：「e大开口大。」 板书时机：黑板写e>1。差异化提示：B班记；A班联图。易错点提醒：双曲线e>1（椭圆e\x3c1），方向相反。"},{"step":"Step 5 例题","time":"8分钟","content":"【PPT P5 例题】教师：「已知渐近线y=±(3/4)x，求a:b及可能离心率。」 预设回答：「b/a=3/4或a/b=3/4，分焦点轴。」 板书时机：黑板解。差异化提示：B班跟；A班加分类。易错点提醒：渐近线给的是比值，需分焦点在x或y轴两种情况。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「x²/16-y²/9=1的渐近线与离心率？」 预设回答：「y=±3/4 x，e=5/4！」 板书时机：板书。差异化提示：B班练；A班加开口。易错点提醒：下节课学抛物线。"}],"blackboard":"┌── 双曲线几何性质 ──┐\n│ |x|≥a(两支)  │\n│ 顶点(±a,0)  │\n│ 实轴2a虚轴2b│\n│ 渐近线y=±   │\n│  (b/a)x     │\n│ e=c/a>1     │\n│ e大⇒开口阔  │\n└────────────────┘","exercises":"【基础作业】1. 双曲线渐近线求法：右端置____。2. 离心率范围____。\n【提高作业】双曲线渐近线y=±(2/3)x且过(3,√3)，求方程（焦点x轴）。\n【参考答案——教师用】基础1：0（因式分解）。基础2：e>1。提高：b/a=2/3，设a=3k,b=2k，代入(3,√3)：9/(9k²)-3/(4k²)=1⇒1/k²-3/(4k²)=1⇒1/(4k²)=1⇒k=1/2⇒a=3/2,b=1⇒4x²/9-y²=1。","reflection":"✅ 亮点：渐近线「右端置0」通用法好记；e与开口关系讲清。\n⚠️ 需改进：B班渐近线斜率b/a常写反，需红字。\n📌 下节课衔接：抛物线及其标准方程。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx2-u2-5","lessonId":"l-math-sx2-u2-5","title":"抛物线及其标准方程","book":"选择性必修第二册","unitNumber":2,"unitTitle":"圆锥曲线","lessonType":"new","lessonTypeName":"新授课","periodNumber":12,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学抽象","直观想象"],"tags":["抛物线","定义","焦点","准线","人教A选必二Ch3","第十二课时"],"textbookAnalysis":"抛物线：平面内到定点F（焦点）与定直线l（准线）距离相等的点的轨迹。标准形式四种：y²=2px（p>0，焦点(p/2,0)，准线x=-p/2）；y²=-2px；x²=2py；x²=-2py。重点是四种形式与焦点、准线。","overview":"【学情分析】A班：能据开口方向写四种标准式并说焦点准线；B班：四种形式易混，p的几何意义（焦准距）不清，焦点坐标符号错。共同问题：焦点在开口方向，p>0，准线在反方向。","objectives":["数学抽象：复述抛物线定义（到焦点与准线等距）。","直观想象：区分四种标准方程及开口方向。","数学运算：由标准式写出焦点坐标与准线方程。","逻辑推理：由已知条件确定抛物线形式与p。"],"keyPoints":"① 定义：|PF|=d(P,l)（到焦点与准线等距）。\n② 四种：y²=2px（右）、y²=-2px（左）、x²=2py（上）、x²=-2py（下），p>0。\n③ 焦点：y²=2px⇒(p/2,0)，准线x=-p/2。\n④ p的几何意义：焦准距（焦点到准线距离=p），p>0。","difficulties":"① 四种形式。原因：开口方向决定形式，易混，需图示。\n② 焦点坐标。原因：焦点在开口方向、坐标含p/2，符号易错。\n③ p>0约定。原因：p恒正，方向由方程符号体现，易乱。","teachingMethods":"① 定义演示（到焦点准线等距）。\n② 四种形式图。\n③ 焦点准线对照。\n④ 错例辨析。","preparation":"【PPT课件】P1 定义；P2 四种形式；P3 焦点准线；P4 p意义；P5 例题；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——到一点与一直线等距","time":"5分钟","content":"【PPT P1 定义】教师：「到定点F（焦点）与定直线l（准线）距离相等的轨迹是抛物线，开口朝向远离准线一侧。」 预设回答：「等距轨迹！」 板书时机：黑板写定义。差异化提示：B班看；A班说方向。易错点提醒：焦点与准线在顶点两侧，距离相等。"},{"step":"Step 2 四种形式","time":"10分钟","content":"【PPT P2 四种】教师：「y²=2px开口右、y²=-2px左、x²=2py上、x²=-2py下，p>0。一次项是谁，轴就是谁。」 预设回答：「y²对应x轴开口，x²对应y轴开口。」 板书时机：黑板画四图。差异化提示：B班背；A班说规律。易错点提醒：p恒正，开口方向由方程符号决定。"},{"step":"Step 3 焦点准线","time":"9分钟","content":"【PPT P3 焦点准线】教师：「y²=2px：焦点(p/2,0)、准线x=-p/2；其余依开口方向类推，焦点在开口侧。」 预设回答：「焦点和准线分列顶点两侧。」 板书时机：黑板列四种。差异化提示：B班练；A班加推导。易错点提醒：焦点在开口方向，准线在反方向，坐标含p/2。"},{"step":"Step 4 p意义","time":"8分钟","content":"【PPT P4 p意义】教师：「p是焦点到准线的距离（焦准距），恒正；|2p|前的系数即2p。」 预设回答：「p就是焦点到准线的距离。」 板书时机：黑板写。差异化提示：B班记；A班说关系。易错点提醒：方程写2p不是p，焦点用p/2。"},{"step":"Step 5 例题","time":"8分钟","content":"【PPT P5 例题】教师：「已知焦点(2,0)求抛物线标准方程与准线。」 预设回答：「开口右，p/2=2⇒p=4，y²=8x。」 板书时机：黑板解。差异化提示：B班跟；A班加变式。易错点提醒：先定开口方向再写对应形式。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「y²=6x的焦点与准线？」 预设回答：「2p=6,p=3,焦点(3/2,0),准线x=-3/2！」 板书时机：板书。差异化提示：B班练；A班加应用。易错点提醒：进入圆锥曲线综合与导数章节前复习。"}],"blackboard":"┌── 抛物线标准方程 ──┐\n│ 定义:|PF|=d   │\n│ y²=2px 开口右│\n│ y²=-2px 左  │\n│ x²=2py 上   │\n│ x²=-2py 下  │\n│ 焦点(p/2,0) │\n│ 准线x=-p/2  │\n│ p>0焦准距   │\n└────────────────┘","exercises":"【基础作业】1. y²=2px的焦点____、准线____。2. p表示____。\n【提高作业】焦点(-1,0)的抛物线标准方程。\n【参考答案——教师用】基础1：(p/2,0)、x=-p/2。基础2：焦点到准线距离（焦准距）。提高：开口左，p/2=1⇒p=2⇒y²=-4x。","reflection":"✅ 亮点：四种形式配图「一次项是谁轴就是谁」好记；p意义讲清。\n⚠️ 需改进：B班焦点坐标符号随开口错，需红字「开口侧」。\n📌 下节课衔接：进入选择性必修第三册（数列/导数）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx3-u1-1","lessonId":"l-math-sx3-u1-1","title":"数列的概念","book":"选择性必修第三册","unitNumber":1,"unitTitle":"数列","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学抽象","逻辑推理"],"tags":["数列","通项公式","递推","前n项和","人教A选必三Ch4","第一课时"],"textbookAnalysis":"数列是按一定次序排列的一列数，可看作定义域为正整数集（或子集）的函数。通项公式an=f(n)；前n项和Sn=a1+a2+…+an，且an=Sn-Sn-1（n≥2），a1=S1。重点是通项与前n项和的关系。","overview":"【学情分析】A班：能把数列视为函数并据Sn求an；B班：an=Sn-Sn-1漏n≥2条件、忘a1=S1单独算；通项与项混淆。共同问题：an与Sn互化时n=1要单独检验。","objectives":["数学抽象：理解数列是特殊函数（自变量为正整数）。","数学运算：由通项公式求指定项。","数学运算：由前n项和Sn求通项an（注意n=1）。","逻辑推理：说明an与Sn的关系及n=1的特殊性。"],"keyPoints":"① 数列：按次序排列的一列数，可视为函数an=f(n)。\n② 通项：an关于n的表达式。\n③ 前n项和：Sn=a1+…+an。\n④ 互化：an=S1（n=1）；an=Sn-Sn-1（n≥2）。","difficulties":"① n=1特殊。原因：an=Sn-Sn-1仅对n≥2成立，n=1须用a1=S1，易漏。\n② Sn求an。原因：分段写出，易把n=1错套公式。\n③ 数列即函数。原因：理解定义域为正整数是关键。","teachingMethods":"① 函数观点引入。\n② 通项求项训练。\n③ an与Sn互化。\n④ 错例辨析。","preparation":"【PPT课件】P1 数列概念；P2 函数观点；P3 通项；P4 前n项和；P5 an与Sn；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——有次序的一列数","time":"5分钟","content":"【PPT P1 概念】教师：「数列是按一定次序排列的一列数，次序不同就是不同数列。」 预设回答：「顺序很重要。」 板书时机：黑板写定义。差异化提示：B班举例；A班说函数观。易错点提醒：数列强调次序，{1,2}与{2,1}不同。"},{"step":"Step 2 函数观点","time":"9分钟","content":"【PPT P2 函数】教师：「数列可看作定义域N*（或子集）的函数an=f(n)，各项是函数值。」 预设回答：「第n项就是f(n)。」 板书时机：黑板写。差异化提示：B班记；A班联函数。易错点提醒：自变量n只能取正整数。"},{"step":"Step 3 通项","time":"9分钟","content":"【PPT P3 通项】教师：「若an可表为n的式子f(n)，叫通项公式；代入n得第n项。」 预设回答：「代入n就能算项。」 板书时机：黑板写。差异化提示：B班练；A班加分段。易错点提醒：并非所有数列都有通项公式。"},{"step":"Step 4 前n项和","time":"8分钟","content":"【PPT P4 Sn】教师：「Sn=a1+a2+…+an，是前n项的和；常记为求和符号。」 预设回答：「Sn就是把前n项加起来。」 板书时机：黑板写。差异化提示：B班记；A班说性质。易错点提醒：Sn是「前n项的和」不是第n项。"},{"step":"Step 5 an与Sn","time":"9分钟","content":"【PPT P5 互化】教师：「an=S1（n=1）；n≥2时an=Sn-Sn-1。务必先算a1=S1再分段。」 预设回答：「n≥2才用差，n=1单独算！」 板书时机：黑板写关系。差异化提示：B班练；A班加证明。易错点提醒：最易错——漏n=1单独算导致通项错。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「Sn=n²，求an。」 预设回答：「a1=1；n≥2时an=2n-1，验证n=1也成立⇒an=2n-1。」 板书时机：板书。差异化提示：B班练；A班加不符情形。易错点提醒：下节课学等差数列。"}],"blackboard":"┌── 数列概念 ──┐\n│ 数列=有序数列│\n│ 函数an=f(n) │\n│ 通项:f(n)   │\n│ Sn=前n项和  │\n│ an=S1(n=1)  │\n│ an=Sn-Sn-1  │\n│  (n≥2)     │\n└────────────────┘","exercises":"【基础作业】1. 数列可看作____的函数。2. an=Sn-Sn-1对____成立。\n【提高作业】Sn=2n²-n，求通项an。\n【参考答案——教师用】基础1：定义域N*。基础2：n≥2。提高：a1=S1=1；n≥2时an=(2n²-n)-(2(n-1)²-(n-1))=4n-3；n=1时4-3=1成立⇒an=4n-3。","reflection":"✅ 亮点：函数观点统一数列认知；an与Sn关系强调n=1特殊。\n⚠️ 需改进：B班Sn求an常忘n=1检验，需红字。\n📌 下节课衔接：等差数列的概念与通项。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx3-u1-2","lessonId":"l-math-sx3-u1-2","title":"等差数列（概念与通项）","book":"选择性必修第三册","unitNumber":1,"unitTitle":"数列","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","逻辑推理"],"tags":["等差数列","公差","通项公式","人教A选必三Ch4","第二课时"],"textbookAnalysis":"等差数列：从第二项起，每一项与前一项的差等于同一常数d（公差）。通项an=a1+(n-1)d；中项2b=a+c。重点是通项公式的推导与应用。","overview":"【学情分析】A班：能据条件求通项并证等差；B班：公差d符号易错（递减d\x3c0）；通项an=a1+(n-1)d下标n-1常写成n。共同问题：判定等差须「从第二项起差为常数」。","objectives":["数学抽象：复述等差数列定义与公差d。","数学运算：推导并应用通项公式an=a1+(n-1)d。","逻辑推理：用定义判定一个数列是否为等差数列。","数学运算：求等差中项。"],"keyPoints":"① 定义：an-an-1=d（常数），n≥2。\n② 通项：an=a1+(n-1)d。\n③ 中项：a,b,c成等差⇔2b=a+c。\n④ d>0递增、d\x3c0递减、d=0常数列。","difficulties":"① 下标n-1。原因：通项易错写为a1+nd，需强调「第n项差了n-1个d」。\n② d符号。原因：递减列d\x3c0，学生易当正，需看图。\n③ 定义判定。原因：须「从第二项起」差恒等，不能用首尾。","teachingMethods":"① 定义引入。\n② 通项累加推导。\n③ 中项训练。\n④ 错例辨析。","preparation":"【PPT课件】P1 定义；P2 累加推导；P3 通项；P4 公差符号；P5 中项；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——差相等的数列","time":"5分钟","content":"【PPT P1 定义】教师：「若从第二项起，每项减前项都等于同一常数d（公差），叫等差数列。」 预设回答：「差不变就是等差。」 板书时机：黑板写定义。差异化提示：B班举例；A班说严格。易错点提醒：须从第二项起差恒定，不能只看个别项。"},{"step":"Step 2 累加推导","time":"10分钟","content":"【PPT P2 推导】教师：「a2=a1+d,a3=a1+2d,…累加得an=a1+(n-1)d。」 预设回答：「差了n-1个d。」 板书时机：黑板推导。差异化提示：B班跟；A班说累加。易错点提醒：第n项距首项有n-1个公差，不是n个。"},{"step":"Step 3 通项应用","time":"9分钟","content":"【PPT P3 通项】教师：「已知a1、d可求任意项；已知两项可先求d再写通项。」 预设回答：「代a1、d进公式。」 板书时机：黑板写。差异化提示：B班练；A班加反向。易错点提醒：已知两项求d时除以项数差（n差）。"},{"step":"Step 4 公差符号","time":"8分钟","content":"【PPT P4 d符号】教师：「d>0递增、d\x3c0递减、d=0常数列；符号决定增减。」 预设回答：「d负就递减。」 板书时机：黑板写。差异化提示：B班记；A班说图。易错点提醒：d可正可负可零，别默认正。"},{"step":"Step 5 中项","time":"8分钟","content":"【PPT P5 中项】教师：「a,b,c成等差⇔2b=a+c，b叫a,c的等差中项。」 预设回答：「中间项等于两边平均。」 板书时机：黑板写。差异化提示：B班练；A班加应用。易错点提醒：中项条件是2b=a+c，不是b=(a+c)。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「等差数列3,7,11,…的第10项？」 预设回答：「a1=3,d=4,a10=3+9×4=39！」 板书时机：板书。差异化提示：B班练；A班加中项。易错点提醒：下节课学前n项和。"}],"blackboard":"┌── 等差数列 ──┐\n│ 定义:an-a(n-1)│\n│  =d(常数)    │\n│ 通项:an=     │\n│  a1+(n-1)d  │\n│ 中项:2b=a+c │\n│ d>0增,d\x3c0减│\n└────────────────┘","exercises":"【基础作业】1. 等差通项an=____。2. a,b,c成等差⇔____。\n【提高作业】等差数列中a3=7,a7=19，求a1与d。\n【参考答案——教师用】基础1：a1+(n-1)d。基础2：2b=a+c。提高：a7-a3=4d=12⇒d=3；a1=a3-2d=7-6=1。","reflection":"✅ 亮点：累加推导让通项自然生成；公差符号决定增减讲清。\n⚠️ 需改进：B班通项仍写a1+nd，需红字n-1。\n📌 下节课衔接：等差数列前n项和。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx3-u1-3","lessonId":"l-math-sx3-u1-3","title":"等差数列的前n项和","book":"选择性必修第三册","unitNumber":1,"unitTitle":"数列","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","数学抽象"],"tags":["等差数列","前n项和","倒序相加","人教A选必三Ch4","第三课时"],"textbookAnalysis":"高斯法（倒序相加）得Sn=n(a1+an)/2=n[2a1+(n-1)d]/2。重点是两公式及据条件选用；Sn是关于n的缺常数项二次函数（d≠0）。","overview":"【学情分析】A班：能据已知选公式并讨论Sn最值；B班：两公式混淆，不知何时用a1+an式；Sn最值用「末项≥0」法易错。共同问题：Sn=n(a1+an)/2与Sn=na1+n(n-1)d/2择一而用。","objectives":["数学运算：掌握等差数列前n项和两公式。","数学抽象：理解倒序相加的推导思想。","数学运算：据已知（a1,an或a1,d）选用合适公式。","逻辑推理：求Sn的最值（项正负转折处）。"],"keyPoints":"① Sn=n(a1+an)/2。\n② Sn=na1+n(n-1)d/2。\n③ 选用：知a1,an用①；知a1,d用②。\n④ Sn最值：d\x3c0时前若干正项后转负，最值在an≥0>an+1处。","difficulties":"① 公式选择。原因：两式等价，需按已知选，易硬套。\n② 最值。原因：d\x3c0时Sn先增后减，转折看an符号，易错。\n③ 二次函数观。原因：d≠0时Sn是n的二次（无常数项），易忽略n∈N*。","teachingMethods":"① 高斯故事引入。\n② 倒序相加推导。\n③ 公式应用。\n④ 最值讨论。","preparation":"【PPT课件】P1 高斯法；P2 倒序相加；P3 两公式；P4 选用；P5 最值；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——高斯求和","time":"5分钟","content":"【PPT P1 高斯】教师：「1+2+…+100用首尾配对得50×101=5050，这就是倒序相加思想。」 预设回答：「首尾配对真快！」 板书时机：黑板写思路。差异化提示：B班听；A班联思想。易错点提醒：配对数是n/2，n奇时也成立（中间项自配）。"},{"step":"Step 2 倒序相加","time":"10分钟","content":"【PPT P2 推导】教师：「Sn=a1+…+an，倒写Sn=an+…+a1，相加得2Sn=n(a1+an)，故Sn=n(a1+an)/2。」 预设回答：「两式相加每对和相等。」 板书时机：黑板推导。差异化提示：B班跟；A班说本质。易错点提醒：每对和=a1+an，共n对。"},{"step":"Step 3 两公式","time":"8分钟","content":"【PPT P3 两式】教师：「代入an=a1+(n-1)d得Sn=na1+n(n-1)d/2；两式等价。」 预设回答：「用哪个看已知。」 板书时机：黑板写两式。差异化提示：B班记；A班推导。易错点提醒：知末项用第一式，知公差用第二式。"},{"step":"Step 4 选用","time":"8分钟","content":"【PPT P4 选用】教师：「已知a1、an优先Sn=n(a1+an)/2；已知a1、d用na1+n(n-1)d/2。」 预设回答：「缺哪个量先用哪个式。」 板书时机：黑板对比。差异化提示：B班练；A班加灵活。易错点提醒：两式结果一致，别重复算。"},{"step":"Step 5 最值","time":"9分钟","content":"【PPT P5 最值】教师：「d\x3c0时数列递减，Sn在an≥0>an+1处取最大；也可用Sn二次函数顶点（n∈N*）。」 预设回答：「看哪一项开始变负。」 板书时机：黑板写。差异化提示：B班跟；A班加函数。易错点提醒：最值在项由正转负处，需验证相邻两项。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「等差数列1,3,5,…前20项和？」 预设回答：「S20=20×(1+39)/2=400！」 板书时机：板书。差异化提示：B班练；A班加最值。易错点提醒：下节课学等比数列。"}],"blackboard":"┌── 等差前n项和 ──┐\n│ 倒序相加:    │\n│ 2Sn=n(a1+an)│\n│ Sn=n(a1+an) │\n│  /2         │\n│ Sn=na1+     │\n│  n(n-1)d/2  │\n│ 最值:an转负处│\n└────────────────┘","exercises":"【基础作业】1. 等差求和两公式____、____。2. d\x3c0时Sn最值在____处。\n【提高作业】等差数列a1=20,d=-2，求Sn最大时的n。\n【参考答案——教师用】基础1：n(a1+an)/2、na1+n(n-1)d/2。基础2：an≥0>an+1。提高：an=20-2(n-1)≥0⇒n≤11，a11=0，故n=10或11时S最大。","reflection":"✅ 亮点：倒序相加思想讲透；最值「项转负」法直观。\n⚠️ 需改进：B班两公式混用且最值忘n∈N*，需强调。\n📌 下节课衔接：等比数列的概念与通项。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx3-u1-4","lessonId":"l-math-sx3-u1-4","title":"等比数列（概念与通项）","book":"选择性必修第三册","unitNumber":1,"unitTitle":"数列","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","逻辑推理"],"tags":["等比数列","公比","通项公式","人教A选必三Ch4","第四课时"],"textbookAnalysis":"等比数列：从第二项起，每一项与前一项的比等于同一非零常数q（公比）。通项an=a1·q^(n-1)；中项b²=ac（ac>0）。重点是通项公式与公比q≠0。","overview":"【学情分析】A班：能据条件求通项并证等比；B班：公比q可负可分数易错；通项an=a1·q^(n-1)指数n-1常错；q=0不允许。共同问题：判定等比须「比值为常数且非零」。","objectives":["数学抽象：复述等比数列定义与公比q（q≠0）。","数学运算：推导并应用通项an=a1·q^(n-1)。","逻辑推理：用定义判定等比数列。","数学运算：求等比中项。"],"keyPoints":"① 定义：an/an-1=q（非零常数），n≥2，各项非零。\n② 通项：an=a1·q^(n-1)。\n③ 中项：a,b,c成等比⇔b²=ac（需ac>0）。\n④ q可正可负可分数，q=1为常数列。","difficulties":"① 指数n-1。原因：通项易错写a1·q^n，需强调「第n项乘了n-1次q」。\n② q≠0。原因：公比与各项均非零，b²=ac要求ac>0，易漏。\n③ q符号。原因：q\x3c0时正负交错，学生易乱。","teachingMethods":"① 定义引入（与等差对比）。\n② 通项累乘推导。\n③ 中项训练。\n④ 错例辨析。","preparation":"【PPT课件】P1 定义；P2 累乘推导；P3 通项；P4 公比；P5 中项；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——比相等的数列","time":"5分钟","content":"【PPT P1 定义】教师：「从第二项起，每项与前项的比为同一非零常数q（公比），叫等比数列。」 预设回答：「比不变就是等比。」 板书时机：黑板写定义。差异化提示：B班举例；A班说严格。易错点提醒：公比q≠0，各项均不为0。"},{"step":"Step 2 累乘推导","time":"10分钟","content":"【PPT P2 推导】教师：「a2=a1q,a3=a1q²,…累乘得an=a1·q^(n-1)。」 预设回答：「乘了n-1次q。」 板书时机：黑板推导。差异化提示：B班跟；A班说累乘。易错点提醒：第n项是a1乘q的n-1次方，不是n次方。"},{"step":"Step 3 通项应用","time":"9分钟","content":"【PPT P3 通项】教师：「已知a1、q求项；已知两项先求q（注意q可能两值或负）。」 预设回答：「代a1、q进公式。」 板书时机：黑板写。差异化提示：B班练；A班加开方。易错点提醒：由an/a1=q^(n-1)求q可能多解，需讨论。"},{"step":"Step 4 公比","time":"8分钟","content":"【PPT P4 公比】教师：「q>0同号、q\x3c0交错；q=1常数列；q可分数。注意q≠0。」 预设回答：「q负就正负交替。」 板书时机：黑板写。差异化提示：B班记；A班说图。易错点提醒：q可正可负，别默认正；q≠0。"},{"step":"Step 5 中项","time":"8分钟","content":"【PPT P5 中项】教师：「a,b,c成等比⇔b²=ac，要求ac>0；b=±√(ac)。」 预设回答：「中项平方等于两边乘积。」 板书时机：黑板写。差异化提示：B班练；A班加限制。易错点提醒：等比中项可正可负（b=±√ac），且需ac>0。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「等比数列2,6,18,…的第6项？」 预设回答：「a1=2,q=3,a6=2×3^5=486！」 板书时机：板书。差异化提示：B班练；A班加中项。易错点提醒：下节课学等比数列前n项和。"}],"blackboard":"┌── 等比数列 ──┐\n│ 定义:an/a(n-1)│\n│  =q(≠0)     │\n│ 通项:an=     │\n│  a1·q^(n-1) │\n│ 中项:b²=ac   │\n│ (ac>0)      │\n│ q≠0可正负   │\n└────────────────┘","exercises":"【基础作业】1. 等比通项an=____。2. a,b,c成等比⇔____。\n【提高作业】等比数列a2=6,a4=54，求a1与q。\n【参考答案——教师用】基础1：a1·q^(n-1)。基础2：b²=ac。提高：a4/a2=q²=9⇒q=±3；a1=a2/q=±2。两组解：(a1,q)=(2,3)或(-2,-3)。","reflection":"✅ 亮点：与等差对比（差vs比、累加vs累乘）降低混淆；q≠0强调。\n⚠️ 需改进：B班通项指数写n、中项忘±，需红字。\n📌 下节课衔接：等比数列前n项和。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx3-u1-5","lessonId":"l-math-sx3-u1-5","title":"等比数列的前n项和","book":"选择性必修第三册","unitNumber":1,"unitTitle":"数列","lessonType":"new","lessonTypeName":"新授课","periodNumber":5,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","数学抽象"],"tags":["等比数列","前n项和","错位相减","人教A选必三Ch4","第五课时"],"textbookAnalysis":"错位相减法推导：Sn=a1(1-q^n)/(1-q)= (a1-an·q)/(1-q)（q≠1）；q=1时Sn=na1。重点是错位相减思想与q=1分类。","overview":"【学情分析】A班：能错位相减并讨论q=1；B班：常忘q=1分类直接用分式公式（分母0）；错位时项数错。共同问题：q=1必须单独讨论，公式仅q≠1适用。","objectives":["数学运算：用错位相减法推导等比前n项和。","数学运算：应用Sn=a1(1-q^n)/(1-q)（q≠1）。","逻辑推理：说明q=1须单独讨论。","数学运算：据已知求Sn。"],"keyPoints":"① q≠1：Sn=a1(1-q^n)/(1-q)=(a1-an·q)/(1-q)。\n② q=1：Sn=na1。\n③ 推导：qSn错位相减得(1-q)Sn。\n④ 必须先判q是否等于1。","difficulties":"① q=1分类。原因：公式分母1-q，q=1无意义，必单独算，易漏。\n② 错位相减。原因：qSn与Sn对齐相减，项数、首项末项易错。\n③ 公式形式。原因：两等价式，易混用错。","teachingMethods":"① 错位相减演示。\n② q=1分类强调。\n③ 公式应用。\n④ 错例辨析。","preparation":"【PPT课件】P1 错位相减；P2 推导；P3 公式；P4 q=1；P5 应用；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——等比求和的特殊性","time":"5分钟","content":"【PPT P1 错位】教师：「等比求和不能倒序（和不等），要用错位相减：把Sn乘q后错位相减。」 预设回答：「乘q错位再减。」 板书时机：黑板写思路。差异化提示：B班看；A班说因。易错点提醒：等比用错位相减，不是倒序相加。"},{"step":"Step 2 推导","time":"10分钟","content":"【PPT P2 推导】教师：「Sn=a1+a1q+…+a1q^(n-1)，qSn=a1q+…+a1q^n，相减得(1-q)Sn=a1-a1q^n。」 预设回答：「错位后中间项抵消。」 板书时机：黑板推导。差异化提示：B班跟；A班说细节。易错点提醒：相减时首项、末项保留，中间n-1项抵消。"},{"step":"Step 3 公式","time":"8分钟","content":"【PPT P3 公式】教师：「q≠1时Sn=a1(1-q^n)/(1-q)=(a1-an q)/(1-q)；q=1时Sn=na1。」 预设回答：「两式等价，分母别为0。」 板书时机：黑板写。差异化提示：B班记；A班推导。易错点提醒：公式仅q≠1；q=1另算。"},{"step":"Step 4 q=1分类","time":"8分钟","content":"【PPT P4 q=1】教师：「用公式前必判q=1否：q=1则常数列Sn=na1；否则代入分式。」 预设回答：「先分类再代公式。」 板书时机：黑板红字。差异化提示：B班背；A班说必要。易错点提醒：漏q=1分类是最高频错误。"},{"step":"Step 5 应用","time":"9分钟","content":"【PPT P5 应用】教师：「已知a1、q、n求Sn；或已知三项求Sn，先判q。」 预设回答：「判q再选公式。」 板书时机：黑板解例。差异化提示：B班练；A班加变式。易错点提醒：先判断q是否等于1再动手。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「等比数列2,6,18,…前5项和？」 预设回答：「S5=2(1-3^5)/(1-3)=2(1-243)/(-2)=242！」 板书时机：板书。差异化提示：B班练；A班加q=1。易错点提醒：下节课学数列求和（错位、裂项）。"}],"blackboard":"┌── 等比前n项和 ──┐\n│ 错位相减:    │\n│ (1-q)Sn=    │\n│  a1-a1q^n   │\n│ q≠1:Sn=     │\n│  a1(1-q^n)/ │\n│  (1-q)      │\n│ q=1:Sn=na1  │\n└────────────────┘","exercises":"【基础作业】1. 等比求和公式（q≠1）____。2. q=1时Sn=____。\n【提高作业】等比数列a1=1,q=2，求S10。\n【参考答案——教师用】基础1：a1(1-q^n)/(1-q)。基础2：na1。提高：S10=(1-2^10)/(1-2)=1023。","reflection":"✅ 亮点：错位相减逐行演示抵消清晰；q=1分类红字强调。\n⚠️ 需改进：B班仍忘q=1分类直接套分式，需反复练。\n📌 下节课衔接：数列求和（错位相减、裂项相消）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx3-u1-6","lessonId":"l-math-sx3-u1-6","title":"数列求和（错位相减与裂项相消）","book":"选择性必修第三册","unitNumber":1,"unitTitle":"数列","lessonType":"new","lessonTypeName":"新授课","periodNumber":6,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","逻辑推理"],"tags":["数列求和","错位相减","裂项相消","人教A选必三Ch4","第六课时"],"textbookAnalysis":"非特殊数列求和的两大通法：①错位相减（等差×等比型）；②裂项相消（如1/(n(n+1))=1/n-1/(n+1)、1/(√n+√(n+1))=√(n+1)-√n）。重点是识别类型并套法。","overview":"【学情分析】A班：能识别等差×等比与裂项型并求和非等差等比；B班：裂项后系数错（如1/(n(n+1))裂成1/n-1/(n+1)易漏系数）、抵消后首尾项漏。共同问题：裂项须配平系数，抵消留首尾。","objectives":["数学运算：对等差×等比型用错位相减法求和。","数学运算：对可裂项型用裂项相消求和。","逻辑推理：识别数列求和的类型并选方法。","数学抽象：归纳裂项的通式与配平。"],"keyPoints":"① 错位相减：{an·bn}，an等差、bn等比。\n② 裂项：1/(n(n+1))=1/n-1/(n+1)。\n③ 根式裂项：1/(√n+√(n+1))=√(n+1)-√n。\n④ 关键：裂项配平系数，相消留首尾项。","difficulties":"① 裂项系数。原因：如1/((2n-1)(2n+1))=1/2(1/(2n-1)-1/(2n+1))，易漏1/2，需配平。\n② 抵消残留。原因：中间全消，留首几项与末几项，易数错。\n③ 类型识别。原因：等差×等比用错位，分式可拆用裂项。","teachingMethods":"① 类型识别。\n② 错位相减复习。\n③ 裂项配平训练。\n④ 错例辨析。","preparation":"【PPT课件】P1 两大通法；P2 错位型；P3 裂项型；P4 配平；P5 残留；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——两大通法","time":"5分钟","content":"【PPT P1 通法】教师：「非等差等比的求和靠两招：等差×等比用错位相减；分式可拆用裂项相消。」 预设回答：「先看型再选招。」 板书时机：黑板写两法。差异化提示：B班听；A班说识别。易错点提醒：先判断属于哪一类再动手。"},{"step":"Step 2 错位型","time":"9分钟","content":"【PPT P2 错位】教师：「形如an·bn（an等差、bn等比）的通项是错位相减对象，步骤同等比求和推广。」 预设回答：「乘公比错位再减。」 板书时机：黑板示范。差异化提示：B班跟；A班加细节。易错点提醒：乘的是等比部分的公比。"},{"step":"Step 3 裂项型","time":"9分钟","content":"【PPT P3 裂项】教师：「1/(n(n+1))=1/n-1/(n+1)；根式1/(√n+√(n+1))=√(n+1)-√n。先验证再拆。」 预设回答：「拆开能前后抵消。」 板书时机：黑板写。差异化提示：B班记；A班加证明。易错点提醒：拆前先通分验证相等。"},{"step":"Step 4 配平","time":"10分钟","content":"【PPT P4 配平】教师：「裂项要配系数：1/((2n-1)(2n+1))=1/2(1/(2n-1)-1/(2n+1))，系数不可漏。」 预设回答：「提系数让拆项精确相等。」 板书时机：黑板算。差异化提示：B班练；A班加推广。易错点提醒：最易错——漏配平系数导致整体差倍数。"},{"step":"Step 5 残留","time":"8分钟","content":"【PPT P5 残留】教师：「裂项相消后中间尽消，留首项与末若干项，数清残留再求和。」 预设回答：「只剩头尾几项。」 板书时机：黑板写残留。差异化提示：B班跟；A班说规律。易错点提醒：残留项数与裂项跨度有关，别数错。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「求1/(1×2)+1/(2×3)+…+1/(n(n+1))的和。」 预设回答：「=1-1/(n+1)=n/(n+1)！」 板书时机：板书。差异化提示：B班练；A班加错位题。易错点提醒：数列章结束，进入导数。"}],"blackboard":"┌── 数列求和 ──┐\n│ 错位:等差×等比│\n│ 裂项:1/[n(n+1)]│\n│  =1/n-1/(n+1)│\n│ 根式:1/(√n+  │\n│  √(n+1))=   │\n│  √(n+1)-√n  │\n│ 配平系数!   │\n│ 消后留首尾   │\n└────────────────┘","exercises":"【基础作业】1. 1/(n(n+1))=____。2. 裂项关键是____。\n【提高作业】求∑1/((2k-1)(2k+1))（k=1到n）。\n【参考答案——教师用】基础1：1/n-1/(n+1)。基础2：配平系数、相消留首尾。提高：=1/2(1-1/3+1/3-1/5+…+1/(2n-1)-1/(2n+1))=1/2(1-1/(2n+1))=n/(2n+1)。","reflection":"✅ 亮点：两大通法对照，裂项配平与残留单独强调。\n⚠️ 需改进：B班裂项漏配平系数、残留数错，需红字。\n📌 下节课衔接：进入一元函数导数及其应用。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx3-u2-1","lessonId":"l-math-sx3-u2-1","title":"变化率与导数的概念","book":"选择性必修第三册","unitNumber":2,"unitTitle":"一元函数导数及其应用","lessonType":"new","lessonTypeName":"新授课","periodNumber":7,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学抽象","直观想象"],"tags":["导数","平均变化率","瞬时变化率","极限","人教A选必三Ch5","第七课时"],"textbookAnalysis":"平均变化率Δy/Δx刻画区间变化快慢；令Δx→0，极限f′(x0)=lim(Δx→0)Δy/Δx为瞬时变化率，即导数。几何意义是切线斜率。重点是导数定义与几何意义。","overview":"【学情分析】A班：能写导数定义极限式并说切线意义；B班：Δx→0极限思想难懂，常把平均变化率当导数；几何意义（切线斜率）混淆。共同问题：导数是「瞬时」变化率（极限），非平均。","objectives":["数学抽象：理解平均变化率与瞬时变化率。","数学运算：写出导数定义式f′(x0)=lim(Δx→0)Δy/Δx。","直观想象：说明导数的几何意义是切线斜率。","逻辑推理：区分平均变化率与导数。"],"keyPoints":"① 平均变化率：Δy/Δx=(f(x0+Δx)-f(x0))/Δx。\n② 导数：f′(x0)=lim(Δx→0)Δy/Δx（瞬时变化率）。\n③ 几何意义：曲线在点(x0,f(x0))处切线斜率。\n④ 物理意义：如速度是位移对时间的导数。","difficulties":"① 极限思想。原因：Δx→0是过程极限，学生易当Δx=0导致0/0，需说清。\n② 平均vs瞬时。原因：导数是极限非平均，易混，需对比。\n③ 切线斜率。原因：割线逼近切线，斜率极限即导数。","teachingMethods":"① 气球膨胀/降温实例。\n② 割线逼近切线动画感。\n③ 定义推导。\n④ 错例辨析。","preparation":"【PPT课件】P1 平均变化率；P2 瞬时；P3 定义式；P4 切线；P5 意义；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——变化有快慢","time":"5分钟","content":"【PPT P1 平均】教师：「区间上函数值变化Δy与自变量变化Δx之比Δy/Δx叫平均变化率，描述整体快慢。」 预设回答：「比值就是平均快慢。」 板书时机：黑板写。差异化提示：B班举例；A班说意义。易错点提醒：平均变化率是「区间」量，非某点。"},{"step":"Step 2 瞬时","time":"9分钟","content":"【PPT P2 瞬时】教师：「让Δx越来越小，平均变化率的极限就是某点的瞬时变化率。」 预设回答：「Δx趋近0的极限。」 板书时机：黑板写极限。差异化提示：B班看；A班说极限。易错点提醒：瞬时变化率是极限，不能用Δx=0直接代。"},{"step":"Step 3 定义式","time":"10分钟","content":"【PPT P3 定义】教师：「f′(x0)=lim(Δx→0)[f(x0+Δx)-f(x0)]/Δx，这就是导数定义。」 预设回答：「代入极限式就算导数。」 板书时机：黑板写定义。差异化提示：B班记；A班说结构。易错点提醒：分子是函数增量，分母是自变量增量，二者一致。"},{"step":"Step 4 切线","time":"9分钟","content":"【PPT P4 切线】教师：「过(x0,f(x0))的割线斜率是Δy/Δx，Δx→0时割线逼近切线，其斜率极限即f′(x0)。」 预设回答：「导数就是切线斜率！」 板书时机：黑板画逼近。差异化提示：B班看；A班说几何。易错点提醒：导数的几何意义是切线斜率，联系紧密。"},{"step":"Step 5 物理意义","time":"7分钟","content":"【PPT P5 物理】教师：「位移s(t)对t的导数v(t)是速度；速度是加速度的导数，体现「导数即变化率」。」 预设回答：「导数处处是变化率。」 板书时机：黑板写。差异化提示：B班记；A班加例。易错点提醒：导数本质是瞬时变化率。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「f(x)=x²，用定义求f′(1)。」 预设回答：「lim[(1+Δx)²-1]/Δx=lim(2Δx+Δx²)/Δx=2！」 板书时机：板书。差异化提示：B班练；A班加一般点。易错点提醒：下节课学导数的运算。"}],"blackboard":"┌── 导数概念 ──┐\n│ 平均变化率:  │\n│  Δy/Δx      │\n│ 导数:lim(Δx→│\n│  0)Δy/Δx    │\n│ =f′(x0)    │\n│ 几何:切线斜率│\n│ 物理:瞬时速度│\n└────────────────┘","exercises":"【基础作业】1. 导数定义式____。2. 导数的几何意义是____。\n【提高作业】用定义求f(x)=x²在x0处的导数f′(x0)。\n【参考答案——教师用】基础1：f′(x0)=lim(Δx→0)[f(x0+Δx)-f(x0)]/Δx。基础2：切线斜率。提高：lim[(x0+Δx)²-x0²]/Δx=lim(2x0Δx+Δx²)/Δx=2x0。","reflection":"✅ 亮点：割线逼近切线动画感强，极限思想落地；物理意义助理解。\n⚠️ 需改进：B班常把平均变化率当导数，需对比红字。\n📌 下节课衔接：导数的运算。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx3-u2-2","lessonId":"l-math-sx3-u2-2","title":"导数的运算","book":"选择性必修第三册","unitNumber":2,"unitTitle":"一元函数导数及其应用","lessonType":"new","lessonTypeName":"新授课","periodNumber":8,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","逻辑推理"],"tags":["导公式","四则运算","复合函数","链式法则","人教A选必三Ch5","第八课时"],"textbookAnalysis":"基本公式：(x^n)′=nx^(n-1)、(sinx)′=cosx、(cosx)′=-sinx、(e^x)′=e^x、(lnx)′=1/x。四则：(u±v)′=u′±v′、(uv)′=u′v+uv′、(u/v)′=(u′v-uv′)/v²。复合：(f(g(x)))′=f′(g(x))·g′(x)。重点是公式与复合函数求导。","overview":"【学情分析】A班：能熟练套公式并求复合函数（链式法则）；B班：复合函数忘乘内导g′(x)；商法则分子顺序错。共同问题：复合函数必须「外导乘内导」，最易漏内导。","objectives":["数学运算：用基本公式求常见函数导数。","数学运算：用四则运算法则求导。","数学运算：用链式法则求复合函数导数。","逻辑推理：说明复合求导「外导乘内导」。"],"keyPoints":"① 幂：(x^n)′=nx^(n-1)；三角：(sinx)′=cosx、(cosx)′=-sinx。\n② 指数/对数：(e^x)′=e^x、(a^x)′=a^x lna、(lnx)′=1/x。\n③ 四则：(uv)′=u′v+uv′；(u/v)′=(u′v-uv′)/v²。\n④ 复合：(f∘g)′=f′(g(x))·g′(x)（乘内导）。","difficulties":"① 复合内导。原因：链式法则须乘g′(x)，学生常只求外导，易漏。\n② 商法则。原因：(u/v)′分子是u′v-uv′，顺序错则符号反。\n③ 多层复合。原因：逐层外导连乘，易少一层。","teachingMethods":"① 公式表记忆。\n② 四则训练。\n③ 复合分层演示。\n④ 错例辨析。","preparation":"【PPT课件】P1 基本公式；P2 四则；P3 复合；P4 分层；P5 例题；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——求导有公式","time":"5分钟","content":"【PPT P1 公式】教师：「像乘法表一样，基本函数导数有现成公式：(x^n)′=nx^(n-1)、(e^x)′=e^x等。」 预设回答：「背公式就能求导。」 板书时机：黑板列公式。差异化提示：B班背；A班说来源。易错点提醒：公式是求导基石，先记牢。"},{"step":"Step 2 四则","time":"9分钟","content":"【PPT P2 四则】教师：「和差直接导；(uv)′=u′v+uv′；商(u/v)′=(u′v-uv′)/v²。」 预设回答：「乘积法则是两项和。」 板书时机：黑板写。差异化提示：B班练；A班说推导。易错点提醒：商法则分子顺序u′v-uv′，别写反。"},{"step":"Step 3 复合","time":"10分钟","content":"【PPT P3 复合】教师：「y=f(g(x))则y′=f′(g(x))·g′(x)，即外导乘内导。」 预设回答：「要乘里面那个导数！」 板书时机：黑板写链式法则。差异化提示：B班跟；A班说本质。易错点提醒：复合求导最易漏乘内导g′(x)。"},{"step":"Step 4 分层","time":"9分钟","content":"【PPT P4 分层】教师：「多层复合从外到内逐层求导连乘，如sin(x²)′=cos(x²)·2x。」 预设回答：「一层层剥开乘起来。」 板书时机：黑板示范。差异化提示：B班练；A班加三层。易错点提醒：每层都要求导并连乘，别少层。"},{"step":"Step 5 例题","time":"8分钟","content":"【PPT P5 例题】教师：「求y=(2x+1)³、y=e^(3x)的导数，演示复合步骤。」 预设回答：「3(2x+1)²·2=6(2x+1)²；e^(3x)·3。」 板书时机：黑板解。差异化提示：B班跟；A班加商复合。易错点提醒：每一步都检查是否漏内导。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「求y=ln(2x+1)的导数。」 预设回答：「1/(2x+1)·2=2/(2x+1)！」 板书时机：板书。差异化提示：B班练；A班加变式。易错点提醒：下节课学导数与单调性。"}],"blackboard":"┌── 导数运算 ──┐\n│ (x^n)′=nx^(n-1)│\n│ (e^x)′=e^x   │\n│ (uv)′=u′v+uv′│\n│ (u/v)′=(u′v-│\n│  uv′)/v²    │\n│ 复合:y′=f′(g)│\n│  ·g′(x)    │\n│ 别漏内导!   │\n└────────────────┘","exercises":"【基础作业】1. (x³)′=____。2. 复合函数求导要____。\n【提高作业】求y=sin(2x)的导数。\n【参考答案——教师用】基础1：3x²。基础2：外导乘内导（乘g′(x)）。提高：y′=cos(2x)·2=2cos(2x)。","reflection":"✅ 亮点：公式表+链式法则分层演示，复合「剥洋葱」比喻好懂。\n⚠️ 需改进：B班复合忘乘内导高频，需红字「别漏内导」。\n📌 下节课衔接：导数与函数单调性。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx3-u2-3","lessonId":"l-math-sx3-u2-3","title":"导数与函数单调性","book":"选择性必修第三册","unitNumber":2,"unitTitle":"一元函数导数及其应用","lessonType":"new","lessonTypeName":"新授课","periodNumber":9,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","逻辑推理"],"tags":["单调性","导数符号","单调区间","人教A选必三Ch5","第九课时"],"textbookAnalysis":"在区间上f′(x)>0⇒f递增；f′(x)\x3c0⇒f递减。求单调区间步骤：求导→解f′(x)符号（因式化）→列表得区间。重点是「导数符号决定单调性」。","overview":"【学情分析】A班：能求导后解不等式得单调区间并讨论参数；B班：f′(x)>0与递增因果关系搞反；解f′(x)符号忘记先因式分解。共同问题：单调区间是f′(x)符号不变的区间，须结合定义域。","objectives":["逻辑推理：说明f′(x)符号与单调性的关系。","数学运算：求函数的单调区间（求导、解不等式）。","数学运算：由单调性反求参数范围。","直观想象：结合图像理解导数与升降。"],"keyPoints":"① f′(x)>0⇒递增；f′(x)\x3c0⇒递减（区间内）。\n② 步骤：求导→令f′(x)=0求根→因式化→列表判符号→得区间。\n③ 定义域优先：单调区间须在定义域内。\n④ 参数：由单调性得f′(x)符号约束，求参范围。","difficulties":"① 因果方向。原因：是f′符号决定增减，非增减推符号，易反述。\n② 因式化。原因：解f′(x)符号先因式分解定根，易直接乱判。\n③ 区间写法。原因：用「,」分隔区间不能用∪（不连续单调），易错。","teachingMethods":"① 图像演示（升降与切线斜率）。\n② 步骤化训练。\n③ 列表法。\n④ 错例辨析。","preparation":"【PPT课件】P1 关系；P2 图像；P3 步骤；P4 列表；P5 参数；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——导数正负看升降","time":"5分钟","content":"【PPT P1 关系】教师：「某区间f′(x)>0⇒函数上升（增）；f′(x)\x3c0⇒下降（减）。导数符号即升降。」 预设回答：「导数为正就增。」 板书时机：黑板写关系。差异化提示：B班看图；A班说因果。易错点提醒：是导数符号决定增减，注意因果方向。"},{"step":"Step 2 图像","time":"8分钟","content":"【PPT P2 图像】教师：「切线斜率为正处曲线上升，斜率为负处下降，与导数一致。」 预设回答：「斜率正负就是导数正负。」 板书时机：黑板画。差异化提示：B班看；A班联几何。易错点提醒：几何直观是判断依据。"},{"step":"Step 3 步骤","time":"10分钟","content":"【PPT P3 步骤】教师：「①求导②令f′=0求根③因式化④列表判各区间符号⑤写单调区间。」 预设回答：「先求根再分段判号。」 板书时机：黑板写步骤。差异化提示：B班跟；A班加速。易错点提醒：必须先求根再分段，不能凭感觉。"},{"step":"Step 4 列表","time":"9分钟","content":"【PPT P4 列表】教师：「把根标在数轴上，分段代入f′判号，得增/减区间，区间用逗号分隔不用并。」 预设回答：「列表最清楚。」 板书时机：黑板列表。差异化提示：B班练；A班加细节。易错点提醒：单调区间间用逗号，不能用∪（断开不连续单调）。"},{"step":"Step 5 参数","time":"8分钟","content":"【PPT P5 参数】教师：「已知单调区间可反推f′(x)符号约束，从而求参数范围（如f′≥0恒成立）。」 预设回答：「用符号约束解参数。」 板书时机：黑板示范。差异化提示：B班跟；A班加等号。易错点提醒：端点处f′=0不影响单调性，参数可取等号需讨论。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「求f(x)=x³-3x的单调区间。」 预设回答：「f′=3x²-3=3(x-1)(x+1)，增(-∞,-1)(1,∞)，减(-1,1)！」 板书时机：板书。差异化提示：B班练；A班加参数。易错点提醒：下节课学极值与最值。"}],"blackboard":"┌── 导数与单调性 ──┐\n│ f′>0⇒增     │\n│ f′\x3c0⇒减     │\n│ 步骤:求导→根│\n│ →因式化→列表│\n│ →判号→区间 │\n│ 区间用逗号  │\n│ 不用∪      │\n└────────────────┘","exercises":"【基础作业】1. f′(x)>0⇒函数____。2. 单调区间间用____连接。\n【提高作业】f(x)=x²-2lnx（x>0）的单调区间。\n【参考答案——教师用】基础1：递增。基础2：逗号。提高：f′=2x-2/x=2(x²-1)/x，x>0时根x=1；0\x3cx\x3c1减，x>1增。","reflection":"✅ 亮点：步骤化+列表法让求单调区间成流水线；区间分隔讲清。\n⚠️ 需改进：B班用∪连单调区间、因果反述，需红字纠正。\n📌 下节课衔接：导数与极值、最值。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx3-u2-4","lessonId":"l-math-sx3-u2-4","title":"导数与极值、最值","book":"选择性必修第三册","unitNumber":2,"unitTitle":"一元函数导数及其应用","lessonType":"new","lessonTypeName":"新授课","periodNumber":10,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","逻辑推理"],"tags":["极值","最值","驻点","导数应用","人教A选必三Ch5","第十课时"],"textbookAnalysis":"极值点处f′(x)=0且两侧导数变号；f′(x)=0的点叫驻点（未必极值）。闭区间最值：比较驻点与端点函数值。重点是极值判定（导数变号）与最值求法。","overview":"【学情分析】A班：能判极值并用最值步骤解题；B班：误以为f′=0即极值（忽略变号）；最值忘比端点。共同问题：极值须导数「左正右负极大、左负右正极小」，驻点≠极值点。","objectives":["数学运算：求驻点并据导数变号判定极值。","逻辑推理：说明f′(x)=0是极值的必要非充分条件。","数学运算：求闭区间上函数的最大值与最小值。","直观想象：结合图像区分极值与最值。"],"keyPoints":"① 极值：f′(x0)=0且两侧f′变号；左正右负⇒极大，左负右正⇒极小。\n② 驻点：f′(x)=0的点，未必是极值（如y=x³的x=0）。\n③ 最值：闭区间上比较所有驻点与端点函数值。\n④ 开区间无最值保证，需结合趋势。","difficulties":"① 变号条件。原因：f′=0不够，须两侧变号才是极值，易漏。\n② 驻点≠极值。原因：y=x³在0处f′=0但非极值，需反例。\n③ 最值端点。原因：闭区间最值在驻点或端点，易忘端点。","teachingMethods":"① 图像演示（峰谷）。\n② 变号判定。\n③ 最值步骤。\n④ 错例辨析（x³）。","preparation":"【PPT课件】P1 极值；P2 变号；P3 驻点反例；P4 最值；P5 步骤；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——峰与谷","time":"5分钟","content":"【PPT P1 极值】教师：「函数图像的山峰（极大）、山谷（极小）是极值点；极值只与邻域比较，非全局。」 预设回答：「峰顶谷底就是极值。」 板书时机：黑板写概念。差异化提示：B班看图；A班说局部。易错点提醒：极值是局部概念，与最值不同。"},{"step":"Step 2 变号判定","time":"10分钟","content":"【PPT P2 变号】教师：「极值点处f′=0且两侧导数变号：左正右负为极大、左负右正为极小。」 预设回答：「变号才极，不变号不是。」 板书时机：黑板写准则。差异化提示：B班跟；A班说机理。易错点提醒：必须两侧导数变号，单f′=0不够。"},{"step":"Step 3 驻点反例","time":"8分钟","content":"【PPT P3 反例】教师：「y=x³在x=0处f′=0，但两侧同为正，非极值——说明f′=0只是必要非充分。」 预设回答：「驻点不一定是极值！」 板书时机：黑板画图。差异化提示：B班记；A班说关键。易错点提醒：f′(x0)=0不能推出极值，要验变号。"},{"step":"Step 4 最值","time":"9分钟","content":"【PPT P4 最值】教师：「闭区间[a,b]上，最大值=max{驻点值,端点值}，最小值同理。」 预设回答：「驻点和端点都要比。」 板书时机：黑板写。差异化提示：B班记；A班说理由。易错点提醒：最值必须比较端点，极值不用。"},{"step":"Step 5 步骤","time":"8分钟","content":"【PPT P5 步骤】教师：「①求导②驻点③列表判极值④算驻点+端点值⑤取最大最小。」 预设回答：「一套流程出最值。」 板书时机：黑板列。差异化提示：B班跟；A班加速。易错点提醒：闭区间才保证有最值。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「f(x)=x³-3x在[-2,2]的最值？」 预设回答：「驻点±1，比端点得最大2、最小-2！」 板书时机：板书。差异化提示：B班练；A班加开区间。易错点提醒：下节课学导数实际应用。"}],"blackboard":"┌── 极值与最值 ──┐\n│ 极值:f′=0且变│\n│  号(左正右负大│\n│  左负右正小) │\n│ 驻点:f′=0   │\n│  (未必极值) │\n│ 最值:比驻点+│\n│  端点       │\n└────────────────┘","exercises":"【基础作业】1. 极值的必要条件____。2. 闭区间最值需比较____。\n【提高作业】f(x)=x³-3x²在[0,3]的最值。\n【参考答案——教师用】基础1：f′(x0)=0（必要非充分）。基础2：驻点与端点函数值。提高：f′=3x²-6x=3x(x-2)，驻点0,2；f(0)=0,f(2)=-4,f(3)=0⇒最小-4、最大0。","reflection":"✅ 亮点：x³反例直击「驻点≠极值」；峰谷图像助理解。\n⚠️ 需改进：B班误认f′=0即极值、最值忘端点，需红字。\n📌 下节课衔接：导数在实际优化中的应用。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx3-u2-5","lessonId":"l-math-sx3-u2-5","title":"导数在实际优化中的应用","book":"选择性必修第三册","unitNumber":2,"unitTitle":"一元函数导数及其应用","lessonType":"new","lessonTypeName":"新授课","periodNumber":11,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学建模","数学运算"],"tags":["优化","应用题","实际情境","导数","人教A选必三Ch5","第十一课时"],"textbookAnalysis":"用导数解决最值应用题：①建模（设变量、列目标函数、定定义域）；②求导找极值点；③比较得最值并作答。重点是建模与定义域。典型：面积最大、容积最大、成本最低。","overview":"【学情分析】A班：能独立建模求最值；B班：设元列函数易错、忘定义域约束、最值不回扣问题。共同问题：应用题必须结合实际定义域，极值点须在定义域内才有意义。","objectives":["数学建模：把实际问题抽象为目标函数。","数学运算：确定变量定义域并求导找极值。","逻辑推理：结合实际意义取舍最值。","数学运算：规范书写应用题解答。"],"keyPoints":"① 建模：设自变量x，列目标函数f(x)，明确定义域（实际约束）。\n② 求解：f′(x)=0得候选，结合单调性判最值。\n③ 作答：把x代回原问题，说明实际含义。\n④ 检验：极值点须在定义域内。","difficulties":"① 建模列函数。原因：从文字提取变量与关系列函数，是最大难点，需训练。\n② 定义域。原因：实际长度、非负等约束，易忽略导致极值无效。\n③ 回扣问题。原因：求出x后要代回算面积/容积等，易停在x。","teachingMethods":"① 情境建模。\n② 定义域强调。\n③ 最值求解。\n④ 规范作答示范。","preparation":"【PPT课件】P1 建模；P2 定义域；P3 求解；P4 作答；P5 例题；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——用数学找最优","time":"5分钟","content":"【PPT P1 建模】教师：「实际中的最大面积、最低成本，都可建成函数最值问题，用导数求解。」 预设回答：「先列函数再求导。」 板书时机：黑板写思路。差异化提示：B班听；A班说价值。易错点提醒：应用题型先建模，别急着算。"},{"step":"Step 2 定义域","time":"9分钟","content":"【PPT P2 定义域】教师：「设变量必须结合实际给定义域（长度>0、和固定等），极值点落定义域外则无效。」 预设回答：「定义域是实际约束。」 板书时机：黑板写。差异化提示：B班记；A班加不等式。易错点提醒：最值必须在定义域内取，先界定范围。"},{"step":"Step 3 求解","time":"10分钟","content":"【PPT P3 求解】教师：「对目标函数求导，令f′=0得候选点，结合单调性（或端点）确定最值。」 预设回答：「导数找候选再比较。」 板书时机：黑板示范。差异化提示：B班跟；A班加速。易错点提醒：候选点须落在定义域内才有效。"},{"step":"Step 4 作答","time":"8分钟","content":"【PPT P4 作答】教师：「求出x后，代回算面积/容积/成本，用完整句子回答原问题。」 预设回答：「最后要回答问题本身。」 板书时机：黑板写规范。差异化提示：B班跟；A班加单位。易错点提醒：应用题答案要回扣原问题并写单位。"},{"step":"Step 5 例题","time":"8分钟","content":"【PPT P5 例题】教师：「用长L的篱笆围矩形菜地，怎样面积最大？演示建模到作答全流程。」 预设回答：「正方形时最大！」 板书时机：黑板完整解。差异化提示：B班跟；A班加变式。易错点提醒：流程化：设元→函数→定义域→导数→作答。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「无盖长方体盒由边长a正方形四角截去小正方得，怎样容积最大？」 预设回答：「列容积函数求导。」 板书时机：板书。差异化提示：B班练；A班加推导。易错点提醒：导数章复习，进入计数原理。"}],"blackboard":"┌── 导数优化应用 ──┐\n│ 建模:设x→f(x)│\n│ 定义域:实际约束│\n│ 求解:f′=0→候选│\n│ 比较定最值   │\n│ 作答:代回原问│\n│ 题+单位     │\n└────────────────┘","exercises":"【基础作业】1. 应用题第一步是____。2. 极值点须落在____内。\n【提高作业】周长20的矩形，何时面积最大？最大多少？\n【参考答案——教师用】基础1：建模（设变量列函数）。基础2：定义域。提高：设边长x，S=x(10-x)=-x²+10x，x=5时最大S=25（正方形）。","reflection":"✅ 亮点：全流程建模示范，定义域红字强调；回扣问题规范。\n⚠️ 需改进：B班常停在求x不代回作答，需强调完整回答。\n📌 下节课衔接：进入计数原理。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx3-u2-6","lessonId":"l-math-sx3-u2-6","title":"导数的综合应用","book":"选择性必修第三册","unitNumber":2,"unitTitle":"一元函数导数及其应用","lessonType":"new","lessonTypeName":"习题课","periodNumber":12,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","逻辑推理"],"tags":["综合","切线","不等式","参数范围","人教A选必三Ch5","第十二课时"],"textbookAnalysis":"综合应用：①切线方程（过点求斜率f′(x0)）；②由单调性/极值求参数；③用导数证明不等式（构造函数求最值）。重点是综合调用导数工具。","overview":"【学情分析】A班：能综合切线、单调、极值、不等式证明；B班：过某点切线易误当切点、不等式证明不知构造函数。共同问题：切线「过点」不一定「在点上」，需设切点。","objectives":["数学运算：求曲线过已知点的切线方程（设切点）。","数学运算：由单调/极值条件求参数范围。","逻辑推理：用导数构造函数证明不等式。","直观想象：综合理解导数各工具的联系。"],"keyPoints":"① 切线：过点P可设切点(x0,f(x0))，斜率f′(x0)，方程y-f(x0)=f′(x0)(x-x0)且过P。\n② 参数：由f′符号/极值条件列不等式求参。\n③ 不等式：移项得g(x)≥0，证g最小值≥0。\n④ 综合：先分析再分问求解。","difficulties":"① 过点非切点。原因：已知点在曲线上才是切点，否则需设切点解，易错。\n② 不等式构造。原因：移项构造g(x)，证其最值非负，方向易反。\n③ 参数讨论。原因：含参导数需分类，易漏情况。","teachingMethods":"① 切线设切点。\n② 参数条件转化。\n③ 不等式构造。\n④ 综合例题。","preparation":"【PPT课件】P1 切线；P2 过点切线；P3 参数；P4 不等式；P5 综合；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——导数工具箱","time":"5分钟","content":"【PPT P1 工具箱】教师：「导数能求切线、判单调、找极值、证不等式、解优化，本章综合就是灵活调用。」 预设回答：「一个导数解决一串问题。」 板书时机：黑板写框架。差异化提示：B班回顾；A班说联系。易错点提醒：看清每问要哪个工具。"},{"step":"Step 2 过点切线","time":"10分钟","content":"【PPT P2 切线】教师：「过曲线外一点P作切线，须设切点(x0,f(x0))，用斜率f′(x0)与过P列方程解x0。」 预设回答：「点不在曲线上要设切点。」 板书时机：黑板示范。差异化提示：B班跟；A班加双解。易错点提醒：过点≠切点，勿直接代P为切点。"},{"step":"Step 3 参数","time":"9分钟","content":"【PPT P3 参数】教师：「由「单调递增」得f′(x)≥0恒成立，转化为含参不等式求参范围。」 预设回答：「把单调性翻成导数符号约束。」 板书时机：黑板写。差异化提示：B班练；A班加等号。易错点提醒：单调增对应f′≥0（可个别点为0）。"},{"step":"Step 4 不等式","time":"9分钟","content":"【PPT P4 不等式】教师：「证f(x)≥g(x)：构造h=f-g，证h最小值≥0（或h′判单调+h端点）。」 预设回答：「移项构造函数看最值。」 板书时机：黑板示范。差异化提示：B班跟；A班加严格。易错点提醒：构造后看最值而非随便比较。"},{"step":"Step 5 综合","time":"7分钟","content":"【PPT P5 综合】教师：「一道题常含切线+单调+极值多问，按步分解逐一击破。」 预设回答：「分问逐个解决。」 板书时机：黑板解综合题。差异化提示：B班跟；A班提速。易错点提醒：综合题先整体分析再分问。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「证明x>0时lnx≤x-1（构造h=x-1-lnx）。」 预设回答：「h′=1-1/x，最小h(1)=0成立！」 板书时机：板书。差异化提示：B班练；A班加等号。易错点提醒：导数章结束，进入计数原理。"}],"blackboard":"┌── 导数综合 ──┐\n│ 切线:设切点  │\n│  (过点≠切点) │\n│ 参数:f′≥0恒 │\n│  成立求范围  │\n│ 不等式:构造h │\n│  证h最小≥0  │\n└────────────────┘","exercises":"【基础作业】1. 过曲线外一点作切线须____。2. 证f≥g可构造____。\n【提高作业】证明x>0时e^x>x+1。\n【参考答案——教师用】基础1：设切点列方程。基础2：h=f-g证最值≥0。提高：h=e^x-x-1，h′=e^x-1，x>0时h′>0增，h(0)=0⇒x>0时h>0即e^x>x+1。","reflection":"✅ 亮点：导数工具箱框架+过点切线设切点专项突破。\n⚠️ 需改进：B班不等式证明不知构造、过点当切点，需红字。\n📌 下节课衔接：进入计数原理（分类与分步）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx3-u3-1","lessonId":"l-math-sx3-u3-1","title":"分类加法与分步乘法计数原理","book":"选择性必修第三册","unitNumber":3,"unitTitle":"计数原理","lessonType":"new","lessonTypeName":"新授课","periodNumber":13,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["逻辑推理","数学抽象"],"tags":["分类加法","分步乘法","计数原理","人教A选必三Ch6","第十三课时"],"textbookAnalysis":"分类加法计数原理：完成一件事有n类办法，各类方法数相加。分步乘法计数原理：需n个步骤依次完成，各步方法数相乘。重点是区分「分类」（或）与「分步」（且）。","overview":"【学情分析】A班：能准确判断用加还是乘并综合；B班：分类与分步混淆（该乘却加、该加却乘）；「每类独立完成」与「依次完成」辨析难。共同问题：类间互斥用加，步间相继用乘。","objectives":["数学抽象：复述分类加法与分步乘法计数原理。","逻辑推理：区分「分类」（或关系）与「分步」（且关系）。","数学运算：正确计算简单计数问题。","逻辑推理：综合问题中分情况与分步嵌套。"],"keyPoints":"① 分类加法：n类办法，各类独立完成⇒总数=m1+m2+…+mn。\n② 分步乘法：n个步骤，依次完成⇒总数=m1×m2×…×mn。\n③ 判据：每类能独立成事⇒加；必须各步都做⇒乘。\n④ 综合：先分类、每类内分步，或先分步、每步内分类。","difficulties":"① 加乘混淆。原因：关键是「或」用加、「且」用乘，学生常凭感觉，需辨析。\n② 独立完成。原因：分类中每类须能单独完成任务，否则不能加。\n③ 嵌套。原因：综合题分类中含分步，易乱套。","teachingMethods":"① 生活实例引入。\n② 加乘对比。\n③ 判据训练。\n④ 错例辨析。","preparation":"【PPT课件】P1 分类；P2 分步；P3 对比；P4 判据；P5 综合；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——数出有多少种可能","time":"5分钟","content":"【PPT P1 分类】教师：「从A地到B地，火车3班、汽车2班，任选一种共3+2=5种——这是分类加法。」 预设回答：「两类能单独去，直接加。」 板书时机：黑板写加法。差异化提示：B班举例；A班说本质。易错点提醒：每类办法都能独立完成全程，才用加。"},{"step":"Step 2 分步","time":"9分钟","content":"【PPT P2 分步】教师：「从A到B再选座位，路线3种、座位4种，共3×4=12种——这是分步乘法。」 预设回答：「两步都要做，用乘。」 板书时机：黑板写乘法。差异化提示：B班记；A班说本质。易错点提醒：必须各步依次完成才用乘。"},{"step":"Step 3 对比","time":"9分钟","content":"【PPT P3 对比】教师：「分类是『或』（任一类即可），分步是『且』（步步都需）；一个加一个乘。」 预设回答：「或加且乘。」 板书时机：黑板对比。差异化提示：B班背；A班说理。易错点提醒：最常错就是把该乘的加成该加的乘。"},{"step":"Step 4 判据","time":"9分钟","content":"【PPT P4 判据】教师：「问自己：每类能否独立完成？能⇒加；必须各步都做⇒乘。先判再加乘。」 预设回答：「先判断关系再算。」 板书时机：黑板写判据。差异化提示：B班练；A班加分类。易错点提醒：动笔前先判「或/且」。"},{"step":"Step 5 综合","time":"8分钟","content":"【PPT P5 综合】教师：「复杂问题：先分类，每类内再分步；或先分步，每步内再分类，嵌套计算。」 预设回答：「分层加乘组合。」 板书时机：黑板示范。差异化提示：B班跟；A班加多步。易错点提醒：嵌套时每层单独判加乘。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「衬衫2色、裤子3色、鞋2款，一套搭配几种？」 预设回答：「2×3×2=12种！」 板书时机：板书。差异化提示：B班练；A班加分类。易错点提醒：下节课学排列与组合。"}],"blackboard":"┌── 计数原理 ──┐\n│ 分类加法:    │\n│ 各类独立⇒相加│\n│ (或关系)    │\n│ 分步乘法:    │\n│ 依次完成⇒相乘│\n│ (且关系)    │\n│ 先判或/且   │\n└────────────────┘","exercises":"【基础作业】1. 分类用____法，分步用____法。2. 「或」对应____。\n【提高作业】从甲到乙2条路、乙到丙3条路，甲经乙到丙几种走法？若甲直达丙还有4条，共几种？\n【参考答案——教师用】基础1：加、乘。基础2：加。提高：经乙2×3=6；加直达4⇒共6+4=10种。","reflection":"✅ 亮点：「或加且乘」口诀直击核心；判据训练降低混淆。\n⚠️ 需改进：B班加乘仍常凭感觉，需先判关系再算。\n📌 下节课衔接：排列与组合的概念。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx3-u3-2","lessonId":"l-math-sx3-u3-2","title":"排列与组合（概念）","book":"选择性必修第三册","unitNumber":3,"unitTitle":"计数原理","lessonType":"new","lessonTypeName":"新授课","periodNumber":14,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学抽象","逻辑推理"],"tags":["排列","组合","阶乘","人教A选必三Ch6","第十四课时"],"textbookAnalysis":"排列：从n个不同元素取m个（m≤n）按次序排成一列，数A(n,m)=n!/(n-m)!。组合：取出m个成一组（不计序），数C(n,m)=A(n,m)/m!=n!/(m!(n-m)!)。重点是排列「有序」、组合「无序」。","overview":"【学情分析】A班：能据「是否计序」选排列或组合并算；B班：排列组合误判（有序无序混淆）；阶乘与公式C(n,m)=C(n,n-m)易错。共同问题：核心区别是「次序是否重要」。","objectives":["数学抽象：复述排列与组合的定义及区别。","数学运算：用A(n,m)、C(n,m)公式计算。","逻辑推理：依据「是否计次序」选择排列或组合。","数学运算：掌握C(n,m)=C(n,n-m)等性质。"],"keyPoints":"① 排列：取m个并排序，A(n,m)=n!/(n-m)!。\n② 组合：取m个不排序，C(n,m)=n!/[m!(n-m)!]。\n③ 区别：排列计次序，组合不计次序。\n④ 性质：C(n,m)=C(n,n-m)；C(n,0)=1。","difficulties":"① 次序判断。原因：是否「有序」是选排列/组合的唯一标准，易误判。\n② 公式关系。原因：C=A/m!，易漏除m!，需强调。\n③ 阶乘计算。原因：0!=1、n!定义易错，需说明。","teachingMethods":"① 有序无序对比。\n② 公式推导（A到C除序）。\n③ 计算训练。\n④ 错例辨析。","preparation":"【PPT课件】P1 排列；P2 组合；P3 区别；P4 公式；P5 性质；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——有序与无序","time":"5分钟","content":"【PPT P1 排列】教师：「从n个取m个排成一列（次序重要）是排列；只取成组（次序不重要）是组合。」 预设回答：「排队伍是排列，组队是组合。」 板书时机：黑板写定义。差异化提示：B班举例；A班说核心。易错点提醒：唯一区别是「次序是否重要」。"},{"step":"Step 2 组合","time":"8分钟","content":"【PPT P2 组合】教师：「组合只看取到哪m个，不计顺序，如选委员、抽签。」 预设回答：「组合不排次序。」 板书时机：黑板写。差异化提示：B班记；A班说例。易错点提醒：选人的组合问题不计顺序。"},{"step":"Step 3 区别","time":"9分钟","content":"【PPT P3 区别】教师：「同一组元素不同排列算多个排列、但只是一个组合；排列数=组合数×m!。」 预设回答：「排列比组合多乘个m!。」 板书时机：黑板对比。差异化提示：B班练；A班说关系。易错点提醒：判断次序是选型的唯一标准。"},{"step":"Step 4 公式","time":"10分钟","content":"【PPT P4 公式】教师：「A(n,m)=n!/(n-m)!；C(n,m)=A(n,m)/m!=n!/[m!(n-m)!]；0!=1。」 预设回答：「组合=排列除以m!消序。」 板书时机：黑板写。差异化提示：B班记；A班推导。易错点提醒：组合公式分母有m!和(n-m)!两项。"},{"step":"Step 5 性质","time":"8分钟","content":"【PPT P5 性质】教师：「C(n,m)=C(n,n-m)（取m个等价于留n-m个）；C(n,0)=C(n,n)=1。」 预设回答：「对称性质好用。」 板书时机：黑板写。差异化提示：B班练；A班加应用。易错点提醒：m>n/2时用C(n,n-m)简化计算。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「从5人选3人排队 vs 选3人一组，各几种？」 预设回答：「A(5,3)=60；C(5,3)=10！」 板书时机：板书。差异化提示：B班练；A班加性质。易错点提醒：下节课学排列组合应用。"}],"blackboard":"┌── 排列与组合 ──┐\n│ 排列:有序    │\n│ A(n,m)=n!/   │\n│  (n-m)!     │\n│ 组合:无序    │\n│ C(n,m)=n!/   │\n│  [m!(n-m)!] │\n│ C(n,m)=C(n,  │\n│  n-m)       │\n└────────────────┘","exercises":"【基础作业】1. 排列与组合的区别____。2. C(5,2)=____。\n【提高作业】C(10,7)用性质化简并计算。\n【参考答案——教师用】基础1：是否计次序（排列有序、组合无序）。基础2：10。提高：C(10,7)=C(10,3)=120。","reflection":"✅ 亮点：有序/无序对比+排列=组合×m!关系清晰。\n⚠️ 需改进：B班组合公式分母漏m!、忘0!=1，需红字。\n📌 下节课衔接：排列组合应用。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx3-u3-3","lessonId":"l-math-sx3-u3-3","title":"排列组合应用","book":"选择性必修第三册","unitNumber":3,"unitTitle":"计数原理","lessonType":"new","lessonTypeName":"新授课","periodNumber":15,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["逻辑推理","数学运算"],"tags":["排列应用","组合应用","捆绑法","插空法","人教A选必三Ch6","第十五课时"],"textbookAnalysis":"综合运用：①直接法（分类/分步）；②间接法（总减不合）；③特殊元素/位置优先；④捆绑法（相邻）、插空法（不相邻）。重点是识别模型并选用方法。","overview":"【学情分析】A班：能识别相邻/不相邻/指定位置等模型并选用捆绑/插空；B班：相邻用插空、不相邻用捆绑反了；间接法忘减。共同问题：相邻⇔捆绑、不相邻⇔插空，方向相反易混。","objectives":["数学运算：用直接法/间接法解计数问题。","逻辑推理：识别相邻用捆绑、不相邻用插空。","数学运算：处理特殊元素与特殊位置优先。","逻辑推理：综合分类分步列式。"],"keyPoints":"① 捆绑法：k个相邻元素绑成一体与其余排列，内部再排（乘k!）。\n② 插空法：先排无限制元素，再将不相邻元素插入空位。\n③ 间接法：总数减不符合条件的数。\n④ 特殊优先：受限元素/位置先安排。","difficulties":"① 捆绑vs插空。原因：相邻绑、不相邻插，方向相反最易反用，需强化。\n② 内部排列。原因：捆绑后内部还要排（乘k!），易漏。\n③ 间接法。原因：正面分类多时用总数减反面，易忘加回。","teachingMethods":"① 模型识别。\n② 捆绑演示。\n③ 插空演示。\n④ 错例辨析。","preparation":"【PPT课件】P1 模型识别；P2 捆绑；P3 插空；P4 间接；P5 综合；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——几类典型模型","time":"5分钟","content":"【PPT P1 模型】教师：「排列组合常考相邻、不相邻、指定位置等模型，各有套路：捆绑、插空、优先法。」 预设回答：「先看是什么模型。」 板书时机：黑板写模型。差异化提示：B班听；A班说识别。易错点提醒：先识别模型再选方法。"},{"step":"Step 2 捆绑","time":"10分钟","content":"【PPT P2 捆绑】教师：「要求k个元素相邻：把它们捆绑成一个整体与其余排列，再内部排k!，结果相乘。」 预设回答：「绑一起再内部排。」 板书时机：黑板示范。差异化提示：B班跟；A班加速。易错点提醒：捆绑后内部还要乘k!，易漏。"},{"step":"Step 3 插空","time":"9分钟","content":"【PPT P3 插空】教师：「要求某些元素不相邻：先排其余元素，再把不相邻的插入形成的空位中。」 预设回答：「先排别的再插空。」 板书时机：黑板示范。差异化提示：B班跟；A班说空位数。易错点提醒：插空法恰与捆绑相反，别用反。"},{"step":"Step 4 间接","time":"9分钟","content":"【PPT P4 间接】教师：「正面分类繁琐时，用总数减不符合条件数；注意多减要加回（容斥）。」 预设回答：「总数减反面更快。」 板书时机：黑板写。差异化提示：B班练；A班加容斥。易错点提醒：间接法注意容斥，别少加回。"},{"step":"Step 5 综合","time":"7分钟","content":"【PPT P5 综合】教师：「特殊位置/元素优先安排，再结合捆绑/插空/分类分步完成。」 预设回答：「优先受限的再套模型。」 板书时机：黑板解综合。差异化提示：B班跟；A班提速。易错点提醒：综合题分层处理。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「5人排，甲乙必须相邻，几种？」 预设回答：「绑甲乙成一体：4!×2=48！」 板书时机：板书。差异化提示：B班练；A班加不相邻。易错点提醒：下节课学二项式定理。"}],"blackboard":"┌── 排列组合应用 ──┐\n│ 相邻⇒捆绑   │\n│  (内部×k!)  │\n│ 不相邻⇒插空 │\n│ 间接:总-不合│\n│ 特殊优先安排│\n│ 捆绑插空别反│\n└────────────────┘","exercises":"【基础作业】1. 元素相邻用____法。2. 元素不相邻用____法。\n【提高作业】5人排队，甲、乙不相邻有几种？\n【参考答案——教师用】基础1：捆绑。基础2：插空。提高：先排其余3人(3!)，产生4空位插甲、乙A(4,2)，共6×12=72；或总120-相邻48=72。","reflection":"✅ 亮点：相邻/不相邻对比强、捆绑插空「别反」红字；间接法提容斥。\n⚠️ 需改进：B班捆绑漏内部k!、两法用反，需反复练。\n📌 下节课衔接：二项式定理。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx3-u3-4","lessonId":"l-math-sx3-u3-4","title":"二项式定理","book":"选择性必修第三册","unitNumber":3,"unitTitle":"计数原理","lessonType":"new","lessonTypeName":"新授课","periodNumber":16,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","数学抽象"],"tags":["二项式定理","通项","二项式系数","人教A选必三Ch6","第十六课时"],"textbookAnalysis":"(a+b)^n=ΣC(n,k)a^(n-k)b^k（k=0..n）。第k+1项通项T(k+1)=C(n,k)a^(n-k)b^k。二项式系数C(n,k)，性质：对称C(n,k)=C(n,n-k)、最值在中部、各项系数和=2^n（令a=b=1）、奇偶数项和相等（令a=1,b=-1）。","overview":"【学情分析】A班：能写通项并求特定项、系数和；B班：通项下标k+1与指数对应错（a^(n-k)b^k易反）；系数和与二项式系数混淆。共同问题：通项是第k+1项，a降b升。","objectives":["数学抽象：复述二项式定理展开式。","数学运算：写出第k+1项通项并求特定项。","数学运算：求二项式系数和与各项系数和。","逻辑推理：说明二项式系数的对称性及最值。"],"keyPoints":"① 定理：(a+b)^n=ΣC(n,k)a^(n-k)b^k。\n② 通项：T(k+1)=C(n,k)a^(n-k)b^k（a降b升）。\n③ 系数和：令a=b=1得ΣC(n,k)=2^n。\n④ 奇偶和：令a=1,b=-1得奇数项系数和=偶数项系数和=2^(n-1)。","difficulties":"① 通项指数。原因：T(k+1)中a^(n-k)b^k，a降b升，k易代错，需强调。\n② 系数和赋值。原因：用a=b=1求系数和、a=1,b=-1求差，易忘赋值法。\n③ 二项式系数vs系数。原因：前者纯C(n,k)，后者含a,b具体值，易混。","teachingMethods":"① 定理展开演示。\n② 通项定位。\n③ 赋值法求系数和。\n④ 错例辨析。","preparation":"【PPT课件】P1 定理；P2 通项；P3 指数规律；P4 系数和；P5 赋值；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——展开的规律","time":"5分钟","content":"【PPT P1 定理】教师：「(a+b)^n各项为C(n,k)a^(n-k)b^k，系数正是组合数——这就是二项式定理。」 预设回答：「系数是组合数！」 板书时机：黑板写定理。差异化提示：B班看；A班说来源。易错点提醒：系数C(n,k)对应组合数。"},{"step":"Step 2 通项","time":"9分钟","content":"【PPT P2 通项】教师：「第k+1项T(k+1)=C(n,k)a^(n-k)b^k，a指数降、b指数升，二者和为n。」 预设回答：「a降b升，和为n。」 板书时机：黑板写。差异化提示：B班记；A班说定位。易错点提醒：通项下标是k+1不是k，a指数n-k。"},{"step":"Step 3 指数规律","time":"9分钟","content":"【PPT P3 指数】教师：「求特定项（如x³项）就令a、b中x的指数和等于目标，解k。」 预设回答：「按指数和列方程求k。」 板书时机：黑板示范。差异化提示：B班练；A班加速。易错点提醒：先确定a、b各自含x的指数再列等式。"},{"step":"Step 4 系数和","time":"9分钟","content":"【PPT P4 系数和】教师：「令a=b=1，得所有二项式系数和ΣC(n,k)=2^n。」 预设回答：「代入1就求和。」 板书时机：黑板写。差异化提示：B班记；A班说理。易错点提醒：这是二项式系数和，非各项系数和（若a,b有值则不同）。"},{"step":"Step 5 赋值","time":"8分钟","content":"【PPT P5 赋值】教师：「令a=1,b=-1得奇项系数和=偶项系数和=2^(n-1)；赋值法是求系数和利器。」 预设回答：「正负代入看奇偶。」 板书时机：黑板写。差异化提示：B班跟；A班加应用。易错点提醒：系数和用赋值（a=b=1），差用(a=1,b=-1）。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「(x+2)^5展开式中x³项系数？」 预设回答：「C(5,2)x³·2²=10×4=40！」 板书时机：板书。差异化提示：B班练；A班加系数和。易错点提醒：进入随机变量章节。"}],"blackboard":"┌── 二项式定理 ──┐\n│ (a+b)^n=Σ   │\n│  C(n,k)a^(n-k│\n│  )b^k       │\n│ T(k+1)=C(n,k│\n│  )a^(n-k)b^k│\n│ 系数和:2^n  │\n│ 奇=偶=2^(n-1│\n└────────────────┘","exercises":"【基础作业】1. 通项第k+1项____。2. 二项式系数和____。\n【提高作业】(1-2x)^6中常数项与x²项系数。\n【参考答案——教师用】基础1：C(n,k)a^(n-k)b^k。基础2：2^n。提高：常数项k=0为1；x²项k=2，C(6,2)(-2x)²=15×4x²=60x²，系数60。","reflection":"✅ 亮点：通项「a降b升和为n」规律好定位；赋值法求系数和统一。\n⚠️ 需改进：B班通项下标k+1与指数代错，需红字。\n📌 下节课衔接：随机变量及其分布——条件概率与全概率。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx3-u4-1","lessonId":"l-math-sx3-u4-1","title":"条件概率与全概率","book":"选择性必修第三册","unitNumber":4,"unitTitle":"随机变量及其分布","lessonType":"new","lessonTypeName":"新授课","periodNumber":17,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["逻辑推理","数学运算"],"tags":["条件概率","全概率","乘法公式","人教A选必三Ch7","第十七课时"],"textbookAnalysis":"条件概率P(B|A)=P(AB)/P(A)（P(A)>0），含义是在A发生前提下B的概率（样本空间缩为A）。乘法公式P(AB)=P(A)P(B|A)。全概率：由互斥完备组A_i分解P(B)=ΣP(A_i)P(B|A_i)。","overview":"【学情分析】A班：能套全概率分解并理解缩减空间；B班：条件概率「缩减样本空间」难懂，P(B|A)与P(A|B)混淆；全概率分划条件不清。共同问题：条件概率是「在A发生前提下」，全概率用互斥完备事件组。","objectives":["数学抽象：复述条件概率定义与含义。","数学运算：计算P(B|A)与P(AB)。","逻辑推理：用全概率公式分解复杂事件。","直观想象：理解「缩减样本空间」。"],"keyPoints":"① 条件概率：P(B|A)=P(AB)/P(A)（P(A)>0）。\n② 含义：在A发生前提下B的概率（空间缩为A）。\n③ 乘法：P(AB)=P(A)P(B|A)。\n④ 全概率：P(B)=ΣP(A_i)P(B|A_i)（A_i互斥完备）。","difficulties":"① 缩减空间。原因：条件概率把样本空间限制到A，直觉难，需图。\n② 分子P(AB)。原因：非P(B)，易错，需强调。\n③ 全概率分划。原因：A_i须互斥且并为全集，选不好则错。","teachingMethods":"① 缩减空间图。\n② 公式推导。\n③ 全概率分解。\n④ 错例辨析。","preparation":"【PPT课件】P1 条件概率；P2 缩减空间；P3 乘法；P4 全概率；P5 应用；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——已知一部分信息","time":"5分钟","content":"【PPT P1 条件】教师：「已知抽到男生，再求其爱好体育的概率——这是在男生前提下算，是条件概率。」 预设回答：「前提是已经发生的事件。」 板书时机：黑板写P(B|A)。差异化提示：B班听；A班说前提。易错点提醒：条件概率是已知A发生后算B，空间变了。"},{"step":"Step 2 缩减空间","time":"9分钟","content":"【PPT P2 缩减】教师：「P(B|A)=P(AB)/P(A)：分母把样本空间缩到A，分子是A∩B，可看作A中属B的比例。」 预设回答：「空间缩小到A里看。」 板书时机：黑板画缩减。差异化提示：B班看图；A班推导。易错点提醒：分母是P(A)非1；分子是交P(AB)。"},{"step":"Step 3 乘法","time":"8分钟","content":"【PPT P3 乘法】教师：「由定义得P(AB)=P(A)P(B|A)=P(B)P(A|B)——乘法公式求交概率。」 预设回答：「交概率=边乘条件概率。」 板书时机：黑板写。差异化提示：B班记；A班联。易错点提醒：乘法公式不要求独立；独立时退化为旧式。"},{"step":"Step 4 全概率","time":"10分钟","content":"【PPT P4 全概率】教师：「把样本空间分为互斥完备组A_i，则P(B)=ΣP(A_i)P(B|A_i)——分段加权求和。」 预设回答：「按原因加权求和。」 板书时机：黑板写式+树。差异化提示：B班练；A班加三分支。易错点提醒：A_i须互斥且覆盖全集（完备）；权重是P(A_i)。"},{"step":"Step 5 应用","time":"8分钟","content":"【PPT P5 应用】教师：「两厂合格率不同，随机取一件合格概率用全概率：按厂分划再加权。」 预设回答：「分厂计算再加权。」 板书时机：黑板算例。差异化提示：B班练；A班加贝叶斯。易错点提醒：全概率是「由因求果」。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「甲厂60%乙厂40%，合格率0.98/0.95，随机取一件合格概率？」 预设回答：「0.6×0.98+0.4×0.95=0.968！」 板书时机：板书。差异化提示：B班练；A班加逆概率。易错点提醒：下节课学分布列。"}],"blackboard":"┌── 条件/全概率 ──┐\n│ P(B|A)=P(AB)/│\n│  P(A)       │\n│ 缩空间到A   │\n│ 乘法:P(AB)= │\n│  P(A)P(B|A) │\n│ 全概率:Σw_i·│\n│  P(B|A_i)   │\n└────────────────┘","exercises":"【基础作业】1. 条件概率分母一般是____。2. 全概率要求A_i____且____。\n【提高作业】甲厂0.6(合格0.98)、乙厂0.4(0.95)，随机取一件合格概率？\n【参考答案——教师用】基础1：P(A)。基础2：互斥、完备（并为全集）。提高：0.6×0.98+0.4×0.95=0.588+0.38=0.968。","reflection":"✅ 亮点：缩减空间图让条件概率直观；全概率「由因求果」框架清晰。\n⚠️ 需改进：B班常把P(B|A)分子写成P(B)，需红字P(AB)。\n📌 下节课衔接：离散型随机变量及其分布列。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx3-u4-2","lessonId":"l-math-sx3-u4-2","title":"离散型随机变量及其分布列","book":"选择性必修第三册","unitNumber":4,"unitTitle":"随机变量及其分布","lessonType":"new","lessonTypeName":"新授课","periodNumber":18,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学抽象","数学运算"],"tags":["随机变量","分布列","两点分布","人教A选必三Ch7","第十八课时"],"textbookAnalysis":"随机变量X将样本点映射为实数。离散型随机变量取有限或可列值。分布列：P(X=xi)=pi，列成表；满足pi≥0且Σpi=1。两点分布（0-1分布）是基本模型。重点是分布列性质。","overview":"【学情分析】A班：能建立随机变量并写分布列、验Σpi=1；B班：随机变量概念抽象难懂；分布列概率和不为1常算错。共同问题：分布列两性质pi≥0、Σpi=1必须同时满足。","objectives":["数学抽象：理解随机变量与离散型随机变量的概念。","数学运算：列出离散型随机变量的分布列。","逻辑推理：用Σpi=1检验分布列正确性。","数学抽象：识别两点分布（0-1分布）。"],"keyPoints":"① 随机变量：把随机结果数量化的变量X。\n② 分布列：X取值xi与概率pi的对应表。\n③ 性质：pi≥0，Σpi=1（检验依据）。\n④ 两点分布：X只取0、1，如一次试验成功与否。","difficulties":"① 随机变抽象。原因：X是「函数式」映射，学生难建立，需实例。\n② 概率和为1。原因：列完须Σpi=1检验，易漏算错。\n③ 取值与概率对应。原因：xi与pi一一对应，易错位。","teachingMethods":"① 实例引入（掷骰、投篮）。\n② 分布列表格化。\n③ 性质检验。\n④ 错例辨析。","preparation":"【PPT课件】P1 随机变量；P2 离散型；P3 分布列；P4 性质；P5 两点分布；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——给结果编号","time":"5分钟","content":"【PPT P1 随机变量】教师：「把随机结果用实数表示，如掷骰点数X∈{1..6}，这就是随机变量。」 预设回答：「结果变成数好算。」 板书时机：黑板写概念。差异化提示：B班举例；A班说映射。易错点提醒：随机变量是样本空间到实数的映射。"},{"step":"Step 2 离散型","time":"8分钟","content":"【PPT P2 离散】教师：「取值能一一列出（有限或可列）的叫离散型随机变量，最常用。」 预设回答：「值能数出来就是离散。」 板书时机：黑板写。差异化提示：B班记；A班说例。易错点提醒：离散型取值可列，连续型不行。"},{"step":"Step 3 分布列","time":"10分钟","content":"【PPT P3 分布列】教师：「列出X所有可能取值xi及其概率pi=P(X=xi)，成表即分布列。」 预设回答：「取值和概率一一对应。」 板书时机：黑板列表。差异化提示：B班练；A班加求法。易错点提醒：先穷举所有可能取值再算各自概率。"},{"step":"Step 4 性质","time":"9分钟","content":"【PPT P4 性质】教师：「分布列必满足pi≥0且Σpi=1；列完用Σpi=1检验，不等则错。」 预设回答：「概率和必须等于1。」 板书时机：黑板红字。差异化提示：B班记；A班说依据。易错点提醒：Σpi=1是必检条件，常用来求未知概率。"},{"step":"Step 5 两点分布","time":"8分钟","content":"【PPT P5 两点】教师：「X只取0、1（如一次试验成功记1失败记0），叫两点分布（0-1分布）。」 预设回答：「一次伯努利就是两点分布。」 板书时机：黑板写。差异化提示：B班记；A班加推广。易错点提醒：两点分布是离散型基础模型。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「掷公平骰，X=点数，写分布列并验和。」 预设回答：「各1/6，和=1，对！」 板书时机：板书。差异化提示：B班练；A班加未知p。易错点提醒：下节课学期望与方差。"}],"blackboard":"┌── 分布列 ──┐\n│ X:xi→pi    │\n│ 离散型可列  │\n│ 性质:pi≥0  │\n│  Σpi=1     │\n│ 两点:取0,1 │\n│ (0-1分布)  │\n└────────────────┘","exercises":"【基础作业】1. 分布列满足____和____。2. 两点分布取值____。\n【提高作业】X分布列P(X=1)=0.2,P(X=2)=0.5，求P(X=3)（仅取1,2,3）。\n
