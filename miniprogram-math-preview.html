,"difficulties":"① 不共线条件。原因：共线则无法表示所有方向，需强调，可用反例。\n② 系数唯一。原因：抽象，需几何说明平行四边形唯一。\n③ 基底选择。原因：基底不唯一，系数随之变，需点。","teachingMethods":"① 几何拼合法。\n② 反例法(共线不行)。\n③ 与坐标类比。\n④ 唯一性证明(简)。","preparation":"【PPT课件】P1 定理陈述；P2 不共线必要性；P3 唯一性几何；P4 基底示例；P5 线性表示；P6 练习。\n【实物教具】两方向可拼矢量板。\n【音频】无。","process":[{"step":"Step 1 导入——用两个方向拼出任意向量","time":"5分钟","content":"【PPT P1 陈述】教师：「平面内任一向量，都能用两个\"不共线\"的方向拼出来——这就是平面向量基本定理。」 板书时机：黑板写定理。差异化提示：B班记；A班需想\"为何不共线\"。易错点提醒：基底必须不共线，否则塌成一条线。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 不共线必要性","time":"10分钟","content":"【PPT P2 反例】教师：「若两基底共线(同一直线)，只能表示这条直线上的向量，无法表示其他方向。」 板书时机：黑板画共线反例。差异化提示：B班看图；A班需说\"哪些向量表示不了\"。易错点提醒：共线基底退化，丧失二维表达能力。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 3 唯一性","time":"9分钟","content":"【PPT P3 唯一】教师：「给定不共线基底，系数\\(\\lambda_1,\\lambda_2\\)唯一——几何上平行四边形只一种拼法。」 板书时机：黑板作唯一平行四边形。差异化提示：B班记结论；A班需几何说明。易错点提醒：唯一性依赖基底固定；换基底系数变。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 4 基底示例","time":"6分钟","content":"【PPT P4 基底】教师：「\\(\\vec{i}=(1,0),\\vec{j}=(0,1)\\)是标准基底；也可用任意不共线两向量。基底不唯一。」 板书时机：黑板列标准基底。差异化提示：B班记；A班举其他基底。易错点提醒：标准基底最方便，但非唯一选择。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 5 线性表示","time":"10分钟","content":"【PPT P5 表示】教师：「已知基底\\(\\vec{e_1},\\vec{e_2}\\)，求\\(\\vec{a}=x\\vec{e_1}+y\\vec{e_2}\\)的系数——用共线定理列方程。」 板书时机：黑板示范求解。差异化提示：B班练1题；A班加含参。易错点提醒：系数由基底唯一决定；可用坐标法辅助。 预设回答：「学生板演或口答，说明列式（或证明）依据与典型易错点，师生共评。」"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「以\\(\\vec{i},\\vec{j}\\)为基底，写\\((3,-2)\\)的表示。」 板书时机：板书。差异化提示：B班练；A班加非标准基底。易错点提醒：下节课学向量坐标表示。 预设回答：「学生自主归纳本课核心要点，同伴补充遗漏，教师用一句话收口并预告下节。」"}],"blackboard":"┌── 基本定理 ──┐\n│ \\vec{a}=λ1\\vec{e1}+│\n│        λ2\\vec{e2} │\n│ 基底:不共线   │\n│ 唯一系数     │\n│ 标准基底:    │\n│ \\vec{i},\\vec{j}  │\n│ 换基底→系数变│\n└────────────┘","exercises":"【基础作业】1. 以\\(\\vec{i},\\vec{j}\\)为基底，表示\\((2,3)\\)。2. 两基底共线能否表示所有向量？\n【提高作业】若\\(\\vec{a}=2\\vec{e_1}+3\\vec{e_2}\\)，\\(\\vec{b}=\\vec{e_1}-2\\vec{e_2}\\)，求\\(\\vec{a}+\\vec{b}\\)的表示。\n【参考答案——教师用】基础1：\\(2\\vec{i}+3\\vec{j}\\)。基础2：不能(只能表示共线方向)。提高：\\(3\\vec{e_1}+\\vec{e_2}\\)。","reflection":"✅ 亮点：共线反例让\"不共线\"条件深入人心；与坐标类比降低抽象。\n⚠️ 需改进：唯一性的几何证明B班吃力，需更慢。\n📌 下节课衔接：平面向量坐标表示。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u1-5","lessonId":"l-math-b2-u1-5","title":"平面向量的坐标表示与运算","book":"必修第二册","unitNumber":1,"unitTitle":"平面向量及其应用","lessonType":"new","lessonTypeName":"新授课","periodNumber":5,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["数学运算","直观想象"],"tags":["向量坐标","坐标运算","人教A必修二Ch6","第五课时"],"textbookAnalysis":"在直角坐标系下，向量用终点坐标减起点坐标表示；\\(\\vec{a}=(x,y)\\)。坐标运算：加减法对应分量加减，数乘分量乘标量。重点是从几何到坐标的转化。","overview":"【学情分析】A班：能熟练坐标运算并逆向求参数；B班：向量坐标=终点-起点易错(勿用起点+终点)；运算分量混淆。共同问题：位置向量与自由向量；起点非原点时的坐标求法。","objectives":["数学运算：求向量坐标并做加减、数乘。","直观想象：理解向量坐标的几何意义。","逻辑推理：由坐标关系判定共线。","数学抽象：区分位置向量与自由向量。"],"keyPoints":"① 坐标：\\(\\vec{a}=(x,y)\\)，自由向量只看分量。\n② 加减：\\((x_1,y_1)±(x_2,y_2)=(x_1±x_2,y_1±y_2)\\)。\n③ 数乘：\\(\\lambda(x,y)=(\\lambda x,\\lambda y)\\)。\n④ 共线：\\((x_1,y_1)//(x_2,y_2)\\)⇔\\(x_1y_2-x_2y_1=0\\)。","difficulties":"① 坐标求法。原因：\\(\\vec{AB}=(x_B-x_A,y_B-y_A)\\)非两坐标相加，易错，需强调差。\n② 共线坐标式。原因：\\(x_1y_2-x_2y_1=0\\)易与斜率混，需推导。\n③ 自由向量。原因：起点任意不影响坐标，需点。","teachingMethods":"① 坐标代入法。\n② 分量操作演示。\n③ 共线判别式推导。\n④ 错例法。","preparation":"【PPT课件】P1 坐标定义；P2 终点减起点；P3 加减法；P4 数乘；P5 共线判别；P6 练习。\n【实物教具】坐标网格板。\n【音频】无。","process":[{"step":"Step 1 导入——向量也能写坐标","time":"5分钟","content":"【PPT P1 定义】教师：「以原点为起点的向量\\(\\vec{OA}=(x,y)\\)。自由向量只看分量，与起点无关。」 板书时机：黑板写\\(\\vec{a}=(x,y)\\)。差异化提示：B班记；A班需想\"自由\"含义。易错点提醒：向量坐标不是起点+终点，是分量对。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 终点减起点","time":"10分钟","content":"【PPT P2 差】教师：「\\(\\vec{AB}=(x_B-x_A,\\,y_B-y_A)\\)——终点减起点，顺序不能反。」 板书时机：黑板示范计算。差异化提示：B班练2题；A班加含参点。易错点提醒：\\(\\vec{AB}\\)与\\(\\vec{BA}\\)互为相反数；顺序反则符号反。 预设回答：「学生板演或口答，说明列式（或证明）依据与典型易错点，师生共评。」"},{"step":"Step 3 加减与数乘","time":"10分钟","content":"【PPT P3/4 运算】教师：「分量分别对位加减；数乘各分量乘\\(\\lambda\\)。如\\((1,2)+(3,4)=(4,6)\\)。」 板书时机：黑板列运算。差异化提示：B班练；A班加证明。易错点提醒：运算在\"分量\"上进行，勿整体当数。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 4 共线判别","time":"10分钟","content":"【PPT P5 共线】教师：「\\((x_1,y_1)//(x_2,y_2)\\)⇔\\(x_1y_2-x_2y_1=0\\)(由\\(\\vec{b}=\\lambda\\vec{a}\\)消去\\(\\lambda\\)得)。」 板书时机：黑板推导。差异化提示：B班记式；A班需推导。易错点提醒：区别于斜率相等(需x₂≠0)；此式无分母更安全。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 5 综合","time":"5分钟","content":"【PPT P6 练习】教师：「已知\\(\\vec{a}=(1,2),\\vec{b}=(2,-1)\\)，求\\(2\\vec{a}-3\\vec{b}\\)并判与\\(\\vec{a}\\)是否共线。」 板书时机：板书。差异化提示：B班练；A班加参数。易错点提醒：下节课学数量积。 预设回答：「学生先独立完成后同桌互评，口述思路与结果，教师点错纠偏。」"}],"blackboard":"┌── 向量坐标 ──┐\n│ \\vec{a}=(x,y)  │\n│ \\vec{AB}=(xB-xA,│\n│   yB-yA)      │\n│ 加减:分量对位 │\n│ 数乘:各×λ    │\n│ 共线:x1y2-    │\n│   x2y1=0     │\n└────────────┘","exercises":"【基础作业】1. A(1,2),B(4,6)，求\\(\\vec{AB}\\)。2. \\((1,2)+(3,-1)=\\)____。\n【提高作业】\\(\\vec{a}=(2,m)\\)与\\(\\vec{b}=(4,6)\\)共线，求m。\n【参考答案——教师用】基础1：\\((3,4)\\)。基础2：\\((4,1)\\)。提高：\\(2×6-4m=0\\)⇒m=3。","reflection":"✅ 亮点：终点减起点用红字强调顺序，B班错率降；共线判别无分母更稳。\n⚠️ 需改进：自由向量概念B班仍混，需多说\"平移不变\"。\n📌 下节课衔接：平面向量数量积。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u1-6","lessonId":"l-math-b2-u1-6","title":"平面向量数量积","book":"必修第二册","unitNumber":1,"unitTitle":"平面向量及其应用","lessonType":"new","lessonTypeName":"新授课","periodNumber":6,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["数学运算","逻辑推理"],"tags":["数量积","点积","投影","夹角","人教A必修二Ch6","第六课时"],"textbookAnalysis":"定义数量积\\(\\vec{a}\\cdot\\vec{b}=|\\vec{a}||\\vec{b}|\\cos\\theta\\)，几何意义是一个向量在另一个上投影的乘积。导出坐标公式\\(x_1x_2+y_1y_2\\)、模长与夹角公式。重点是投影理解与坐标化。","overview":"【学情分析】A班：能推导坐标公式并求夹角；B班：数量积是\"数\"不是\"向量\"易混；投影几何模糊；\\(\\cos\\theta\\)符号随夹角变。共同问题：\\(\\vec{a}\\cdot\\vec{b}=0\\)⇔垂直(但含零向量)。","objectives":["数学运算：计算数量积(定义式与坐标式)。","直观想象：理解投影的几何意义。","逻辑推理：由数量积判垂直、求夹角与模。","数学抽象：区分数量积(数)与线性运算(向量)。"],"keyPoints":"① 定义：\\(\\vec{a}\\cdot\\vec{b}=|\\vec{a}||\\vec{b}|\\cos\\theta\\)。\n② 坐标：\\(x_1x_2+y_1y_2\\)。\n③ 模：\\(|\\vec{a}|=\\sqrt{x^2+y^2}=\\sqrt{\\vec{a}\\cdot\\vec{a}}\\)。\n④ 垂直：\\(\\vec{a}\\cdot\\vec{b}=0\\)⇔\\(\\vec{a}\\perp\\vec{b}\\)(a,b非零)。","difficulties":"① 结果是数。原因：学生误以为向量，需强调\"点积得标量\"。\n② 投影符号。原因：\\(\\cos\\theta\x3c0\\)时投影为负，易漏，需图。\n③ 垂直判定。原因：\\(\\vec{a}\\cdot\\vec{b}=0\\)含零向量情形，需点\"非零\"。","teachingMethods":"① 投影演示法。\n② 坐标推导法。\n③ 几何意义法。\n④ 错例法(垂直)。","preparation":"【PPT课件】P1 定义；P2 投影几何；P3 坐标公式；P4 模与夹角；P5 垂直判定；P6 练习。\n【实物教具】投影阴影板。\n【音频】无。","process":[{"step":"Step 1 导入——向量相乘得什么","time":"5分钟","content":"【PPT P1 定义】教师：「两向量\"点乘\"得到一个实数：\\(\\vec{a}\\cdot\\vec{b}=|\\vec{a}||\\vec{b}|\\cos\\theta\\)，不是向量！」 板书时机：黑板写定义。差异化提示：B班记\"结果是数\"；A班需联功。易错点提醒：数量积是标量，别写箭头；\\(\\vec{a}^2\\)表示\\(\\vec{a}\\cdot\\vec{a}\\)。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 投影","time":"10分钟","content":"【PPT P2 投影】教师：「\\(\\vec{a}\\cdot\\vec{b}\\)=|\\vec{a}|×(b在a上投影)。钝角时投影为负。」 板书时机：黑板画投影阴影。差异化提示：B班看图；A班需说符号。易错点提醒：投影可负(夹角>90°)；投影是\"有向长度\"。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 3 坐标公式","time":"9分钟","content":"【PPT P3 坐标】教师：「由基底正交性推出\\(\\vec{a}\\cdot\\vec{b}=x_1x_2+y_1y_2\\)。」 板书时机：黑板推导。差异化提示：B班记式；A班需推导。易错点提醒：坐标法最实用；单位向量点积=夹角余弦。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 4 模与夹角","time":"9分钟","content":"【PPT P4 模/角】教师：「\\(|\\vec{a}|=\\sqrt{x^2+y^2}\\)；\\(\\cos\\theta=(\\vec{a}\\cdot\\vec{b})/(|\\vec{a}||\\vec{b}|)\\)。」 板书时机：黑板列公式。差异化提示：B班练；A班加参数。易错点提醒：夹角公式分母非零；结果须归一查证范围。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 5 垂直判定","time":"7分钟","content":"【PPT P5 垂直】教师：「\\(\\vec{a}\\cdot\\vec{b}=0\\)且两向量非零⇒垂直。反之垂直⇒点积0。」 板书时机：黑板写⇔。差异化提示：B班记；A班需说零向量例外。易错点提醒：含零向量时点积0但不算\"垂直方向\"，判定时假定非零。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「\\(\\vec{a}=(1,0),\\vec{b}=(0,1)\\)，求\\(\\vec{a}\\cdot\\vec{b}\\)与夹角。」 板书时机：板书。差异化提示：B班练；A班加一般角。易错点提醒：下节课学向量应用。 预设回答：「学生自主归纳本课核心要点，同伴补充遗漏，教师用一句话收口并预告下节。」"}],"blackboard":"┌── 数量积 ──┐\n│ \\vec{a}·\\vec{b}=   │\n│ |a||b|cosθ    │\n│ =x1x2+y1y2    │\n│ |a|=√(a·a)   │\n│ cosθ=(a·b)/  │\n│  (|a||b|)    │\n│ 垂直⇔a·b=0   │\n└────────────┘","exercises":"【基础作业】1. \\((1,2)·(3,4)=\\)____。2. \\(\\vec{a}\\perp\\vec{b}\\)则\\(\\vec{a}\\cdot\\vec{b}=\\)____。\n【提高作业】\\(\\vec{a}=(1,2),\\vec{b}=(2,m)\\)，夹角90°求m。\n【参考答案——教师用】基础1：11。基础2：0。提高：\\(1×2+2m=0\\)⇒m=-1。","reflection":"✅ 亮点：投影几何用阴影板直观；\"结果是数\"三令五申降低混淆。\n⚠️ 需改进：夹角公式分母非零B班易忘，需提醒。\n📌 下节课衔接：向量应用(物理/几何)。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u1-7","lessonId":"l-math-b2-u1-7","title":"平面向量应用举例","book":"必修第二册","unitNumber":1,"unitTitle":"平面向量及其应用","lessonType":"comprehensive","lessonTypeName":"应用课","periodNumber":7,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["数学建模","数学运算"],"tags":["向量应用","物理","几何证明","人教A必修二Ch6","第七课时"],"textbookAnalysis":"用向量工具解决物理中的受力平衡、几何中的线段长度与角度证明。体现\"向量是沟通几何与代数的桥梁\"。重点是建模：把问题翻译为向量运算。","overview":"【学情分析】A班：能独立建模复杂受力/几何问题；B班：不知\"何时用向量\"，建模翻译卡壳；受力分解方向乱。共同问题：把几何条件(中点、平行)转成向量关系。","objectives":["数学建模：将物理受力、几何问题翻译为向量运算。","数学运算：用向量法求合力、长度、角度。","直观想象：用向量图辅助理解。","逻辑推理：用向量证明几何关系(平行、垂直)。"],"keyPoints":"① 物理：合力=向量和；平衡⇔各力向量和为\\(\\vec{0}\\)。\n② 几何：中点\\(\\vec{M}=\\frac{1}{2}(\\vec{A}+\\vec{B})\\)；平行⇔共线；垂直⇔点积0。\n③ 长度：\\(|\\vec{AB}|\\)用坐标或模公式。\n④ 角度：用点积余弦。","difficulties":"① 建模翻译。原因：从文字到向量关系需训练，易卡，需示范套路。\n② 受力分解。原因：方向选取影响计算，需讲\"正交分解\"。\n③ 几何证法。原因：向量法证平行/垂直比综合法直接但学生不熟，需练。","teachingMethods":"① 物理建模法。\n② 几何向量化。\n③ 正交分解演示。\n④ 综合对比。","preparation":"【PPT课件】P1 受力平衡；P2 正交分解求合力；P3 几何中点；P4 向量证垂直；P5 综合；P6 练习。\n【实物教具】受力图卡片。\n【音频】无。","process":[{"step":"Step 1 导入——向量是万能翻译机","time":"5分钟","content":"【PPT P1 平衡】教师：「物体受三力平衡⇔三力向量和为零。用向量可避开复杂几何推理。」 板书时机：黑板写平衡式。差异化提示：B班记结论；A班需联牛顿。易错点提醒：平衡是\"向量和\"为零，非标量和为零。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 正交分解","time":"11分钟","content":"【PPT P2 分解】教师：「把力沿坐标轴分解，分量代数相加，再用勾股求合力大小与方向。」 板书时机：黑板作正交分解图。差异化提示：B班练1题；A班加倾斜力。易错点提醒：分解后分量带符号；合力方向用反正切。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 3 几何中点","time":"8分钟","content":"【PPT P3 中点】教师：「用位置向量，中点\\(\\vec{M}=(\\vec{A}+\\vec{B})/2\\)；可证中位线平行且半长。」 板书时机：黑板推导。差异化提示：B班记；A班需证中位线。易错点提醒：位置向量以任一点为原点均可，结果不变。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例 数定义；P3 实部虚部；P4 分类；P5 相等；P6 练习。\n【实物教具】数系扩充图。\n【音频】无。","process":[{"step":"Step 1 导入——给负数开方","time":"5分钟","content":"【PPT P1 引入】教师：「实数范围x²=-1无解。像当年引入负数、无理数一样，我们引入i使i²=-1，数系再次扩充。」 板书时机：黑板写i²=-1。差异化提示：B班听故事；A班需联数系。易错点提醒：i是\"新数\"，不是实数；i²=-1是规定。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 复数定义","time":"9分钟","content":"【PPT P2 定义】教师：「复数z=a+bi(a,b∈R)。全体复数构成复数集C，R⊂C。」 板书时机：黑板写定义+包含。差异化提示：B班记；A班需说包含。易错点提醒：a,b都是实数；复数包含实数与虚数。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 3 实部虚部","time":"8分钟","content":"【PPT P3 实部虚部】教师：「a叫实部Re(z)，b叫虚部Im(z)——注意是b不是bi！」 板书时机：黑板标a,b。差异化提示：B班练识别；A班加符号。易错点提醒：虚部是系数b；写\"虚部为bi\"是错的。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 4 分类","time":"8分钟","content":"【PPT P4 分类】教师：「b=0→实数；a=0且b≠0→纯虚数；b≠0→虚数。」 板书时机：黑板画分类树。差异化提示：B班记；A班需举例。易错点提醒：纯虚数要\"a=0且b≠0\"双条件；实数虚部必为0。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 5 相等","time":"7分钟","content":"【PPT P5 相等】教师：「两复数相等⇔实部相等且虚部相等(同在实数范围比较)。」 板书时机：黑板写⇔。差异化提示：B班练；A班加含参。易错点提醒：复数不能比大小，只能判相等；分别比较实部虚部。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「z=3-2i的实部、虚部？是纯虚数吗？」 板书时机：板书。差异化提示：B班练；A班加分类。易错点提醒：下节课学复数运算。 预设回答：「学生自主归纳本课核心要点，同伴补充遗漏，教师用一句话收口并预告下节。」"}],"blackboard":"┌── 复数概念 ──┐\n│ i²=-1       │\n│ z=a+bi(a,b∈R)│\n│ 实部a 虚部b │\n│ 实数:b=0    │\n│ 纯虚:a=0,b≠0│\n│ 相等:实部=  │\n│   虚部=     │\n└────────────┘","exercises":"【基础作业】1. z=2+3i实部__虚部__。2. 何时z是纯虚数？\n【提高作业】若(2a-1)+(a+3)i=5-2i，求a。\n【参考答案——教师用】基础1：2、3。基础2：实部为0且虚部非0。提高：2a-1=5⇒a=3；但a+3=-2⇒a=-5矛盾⇒无解(说明两复数不等)。","reflection":"✅ 亮点：数系扩充史让i²=-1不再\"违和\"；分类树清晰。\n⚠️ 需改进：虚部是b非bi，B班仍错，需红字。\n📌 下节课衔接：复数四则运算。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u2-2","lessonId":"l-math-b2-u2-2","title":"复数的四则运算","book":"必修第二册","unitNumber":2,"unitTitle":"复数","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["数学运算","逻辑推理"],"tags":["复数加减乘","除法","共轭复数","人教A必修二Ch7","第二课时"],"textbookAnalysis":"复数加减乘按多项式展开并代入i²=-1；除法用共轭复数有理化分母。重点是与多项式运算的类比及i²=-1的代入。","overview":"【学情分析】A班：能熟练运算并逆向求参；B班：乘除法易忘i²=-1代入；除法有理化步骤乱。共同问题：除法须乘共轭；结果写成a+bi标准形式。","objectives":["数学运算：进行复数加减乘除法。","逻辑推理：用共轭复数做除法有理化。","数学抽象：将结果化为a+bi标准形。","直观想象：理解共轭复数的对称。"],"keyPoints":"① 加减：(a+bi)±(c+di)=(a±c)+(b±d)i。\n② 乘法：展开后i²=-1。\n③ 共轭：\\(\\bar{z}=a-bi\\)；\\(z\\bar{z}=a^2+b^2\\)。\n④ 除法：\\(\\frac{z_1}{z_2}=\\frac{z_1\\bar{z_2}}{|z_2|^2}\\)。","difficulties":"① i²=-1代入。原因：乘法展开后易忘替换，需强调\"见到i²换-1\"。\n② 除法有理化。原因：分子分母同乘分母共轭，步骤多易错，需示范。\n③ 标准形。原因：结果须a+bi，需整理实部虚部。","teachingMethods":"① 多项式类比。\n② 共轭演示。\n③ 除法步骤拆解。\n④ 错例法。","preparation":"【PPT课件】P1 加减；P2 乘法与i²；P3 共轭；P4 除法有理化；P5 综合；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——像多项式一样算","time":"5分钟","content":"【PPT P1 加减】教师：「复数加减像合并同类项：实部加实部、虚部加虚部。」 板书时机：黑板写加减。差异化提示：B班记；A班需联向量。易错点提醒：是\"对应分量\"相加，非模相加。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 乘法与i²","time":"10分钟","content":"【PPT P2 乘法】教师：「(a+bi)(c+di)=ac+(ad+bc)i+bdi²，再令i²=-1得(ac-bd)+(ad+bc)i。」 板书时机：黑板展开。差异化提示：B班练1题；A班加含参。易错点提醒：关键一步i²=-1；bd前变负号。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 3 共轭","time":"7分钟","content":"【PPT P3 共轭】教师：「\\(\\bar{z}=a-bi\\)与z关于实轴对称；\\(z\\bar{z}=a^2+b^2\\)(实数)，用于除法。」 板书时机：黑板写性质。差异化提示：B班记；A班需证。易错点提醒：共轭虚部反号实部不变；乘积为非负实数。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 4 除法有理化","time":"10分钟","content":"【PPT P4 除法】教师：「\\(\\frac{a+bi}{c+di}\\)分子分母同乘(c-di)，分母变c²+d²，再整理。」 板书时机：黑板分步。差异化提示：B班练；A班加复杂。易错点提醒：同乘\"分母的共轭\"；分母成实数才能分实部虚部。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 5 综合","time":"5分钟","content":"【PPT P5 综合】教师：「混合运算：先乘除后加减，最后化为a+bi。」 板书时机：板书。差异化提示：B班练；A班加幂。易错点提醒：下节课学几何意义。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 6 练习+作业","time":"8分钟","content":"【PPT P6 练习】教师：「计算(1+2i)(3-i)与(1+i)/(1-i)。」 板书时机：板书。差异化提示：B班练；A班加逆求。易错点提醒：除法熟后方学几何。 预设回答：「学生自主归纳本课核心要点，同伴补充遗漏，教师用一句话收口并预告下节。」"}],"blackboard":"┌── 复数运算 ──┐\n│ 加减:分量    │\n│ 乘:展开i²=-1│\n│ 共轭a-bi    │\n│ z·z̄=a²+b²   │\n│ 除法:同乘共轭│\n│ 结果→a+bi   │\n└────────────┘","exercises":"【基础作业】1. (2+i)+(1-3i)=__。2. (1+i)/(1-i)=__。\n【提高作业】(1+i)²+(1-i)²=？并用共轭验证。\n【参考答案——教师用】基础1：3-2i。基础2：i(分子(1+i)²=2i，分母2，得i)。提高：各=2i、-2i，和0；(1+i)(1-i)=2验证。","reflection":"✅ 亮点：多项式类比让乘法自然；除法分步拆解B班跟得住。\n⚠️ 需改进：i²=-1代入常漏，需\"见i²即换\"口诀。\n📌 下节课衔接：复数几何意义与三角表示。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u2-3","lessonId":"l-math-b2-u2-3","title":"复数的几何意义与三角表示","book":"必修第二册","unitNumber":2,"unitTitle":"复数","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["直观想象","数学运算"],"tags":["复平面","模","辐角","三角形式","人教A必修二Ch7","第三课时"],"textbookAnalysis":"复数z=a+bi对应复平面点(a,b)或向量。模|z|=√(a²+b²)，辐角θ满足cosθ=a/r,sinθ=b/r。三角形式z=r(cosθ+isinθ)。重点是从代数到几何的对应。","overview":"【学情分析】A班：能熟练互化代数/三角形式并运算；B班：复平面横实纵虚易反；模与向量长混；辐角多值困惑。共同问题：三角形式的\"模×单位复数\"结构。","objectives":["直观想象：在复平面表示复数。","数学运算：求复数的模与辐角。","数学抽象：写出三角形式。","逻辑推理：理解模的几何意义。"],"keyPoints":"① 复平面：横轴实、纵轴虚；z=a+bi↔点(a,b)。\n② 模：\\(|z|=\\sqrt{a^2+b^2}\\)(到原点距离)。\n③ 辐角：\\(\\tan\\theta=b/a\\)，多值(加2kπ)。\n④ 三角形式：\\(z=r(\\cos\\theta+i\\sin\\theta)\\)。","difficulties":"① 轴对应。原因：横实纵虚易记反，需强调。\n② 辐角多值。原因：θ加2kπ都相同，主值范围易漏，需点[-π,π]。\n③ 三角形式。原因：须\"模×单位复数\"且括号为标准，易写错，需示范。","teachingMethods":"① 坐标对应法。\n② 向量模演示。\n③ 辐角范围。\n④ 形式互化。","preparation":"【PPT课件】P1 复平面；P2 模；P3 辐角；P4 三角形式；P5 互化；P6 练习。\n【实物教具】复平面网格。\n【音频】无。","process":[{"step":"Step 1 导入——复数也能画图","time":"5分钟","content":"【PPT P1 复平面】教师：「复数a+bi对应平面点(a,b)：横轴实部、纵轴虚部。也叫向量\\(\\overrightarrow{OZ}\\)。」 板书时机：黑板画复平面。差异化提示：B班记轴；A班需联向量。易错点提醒：横实纵虚，别和直角坐标混为一谈(本质一样但含义不同)。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 模","time":"8分钟","content":"【PPT P2 模】教师：「\\(|z|=\\sqrt{a^2+b^2}\\)即点(a,b)到原点距离，也是向量长。」 板书时机：黑板写公式。差异化提示：B班练；A班加性质|z₁z₂|=|z₁||z₂|。易错点提醒：模恒非负；|z|²=z·\\bar{z}。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 3 辐角","time":"9分钟","content":"【PPT P3 辐角】教师：「辐角θ满足cosθ=a/r,sinθ=b/r；主值取(-π,π]。与实轴夹角。」 板书时机：黑板画角。差异化提示：B班记主值；A班需分象限。易错点提醒：辐角多值(±2kπ)；按点所在象限定θ。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 4 三角形式","time":"9分钟","content":"【PPT P4 三角】教师：「z=r(cosθ+isinθ)，r为模、括号内是单位复数。乘除法转为模乘除、辐角加减。」 板书时机：黑板写形式。差异化提示：B班记；A班需证乘法规律。易错点提醒：三角形式须\"r(cosθ+i sinθ)\"且r≥0；否则非标准。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 5 互化","time":"9分钟","content":"【PPT P5 互化】教师：「代数↔三角：由a,b求r,θ；由r,θ求a=rcosθ,b=rsinθ。」 板书时机：黑板示范。差异化提示：B班练1题；A班加负角。易错点提醒：互化先算模再定辐角，核对象限。 预设回答：「学生板演或口答，说明列式（或证明）依据与典型易错点，师生共评。」"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「z=1+i的模与辐角主值？写出三角形式。」 板书时机：板书。差异化提示：B班练；A班加乘除。易错点提醒：本章结束，下章立体几何。 预设回答：「学生自主归纳本课核心要点，同伴补充遗漏，教师用一句话收口并预告下节。」"}],"blackboard":"┌── 复数几何 ──┐\n│ 复平面:横实纵虚│\n│ |z|=√(a²+b²) │\n│ 辐角θ∈(-π,π]│\n│ 三角:r(cosθ+ │\n│   i sinθ)    │\n│ 乘除:模×/÷  │\n│  辐角+/-    │\n└────────────┘","exercises":"【基础作业】1. z=3+4i的模__。2. z=1+i的辐角主值__。\n【提高作业】将2(cosπ/3+isinπ/3)化为代数形。\n【参考答案——教师用】基础1：5。基础2：π/4。提高：2(1/2+i√3/2)=1+i√3。","reflection":"✅ 亮点：复平面与向量打通，模即距离直观；乘除转辐角加减很妙。\n⚠️ 需改进：辐角主值范围B班易忘，需强调(-π,π]。\n📌 下节课衔接：第8章 立体几何初步。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u3-1","lessonId":"l-math-b2-u3-1","title":"基本立体图形(柱、锥、台、球)","book":"必修第二册","unitNumber":3,"unitTitle":"立体几何初步","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["直观想象","数学抽象"],"tags":["棱柱","棱锥","棱台","圆柱","圆锥","球","人教A必修二Ch8","第一课时"],"textbookAnalysis":"认识多面体(棱柱、棱锥、棱台)与旋转体(圆柱、圆锥、圆台、球)的结构特征。重点是通过实物/模型归纳定义与元素关系。","overview":"【学情分析】A班：能归纳各类图形结构特征并辨析；B班：柱/锥/台易混(底面数、侧棱关系)；球与圆的区别不清。共同问题：棱柱两底平行全等、侧棱平行；棱锥一顶点。","objectives":["直观想象：识别柱、锥、台、球的结构。","数学抽象：说出棱柱、棱锥、棱台的定义特征。","逻辑推理：辨析相近图形(柱vs台)。","数学运算：指认图形元素(底面、侧棱、高)。"],"keyPoints":"① 棱柱：两底面平行且全等，侧棱平行。\n② 棱锥：一底面+公共顶点，侧棱交于顶点。\n③ 棱台：棱锥截得，两底平行不全等。\n④ 旋转体：圆柱/锥/台(直角梯形、直角三角形旋转)、球(半圆)。","difficulties":"① 柱锥台区分。原因：底面数与侧棱关系不同，易混，需用模型对比。\n② 棱台来源。原因：由棱锥平行截面截得，理解难，需演示。\n③ 球定义。原因：半圆绕直径转，非\"圆\"，需澄清。","teachingMethods":"① 实物模型观察。\n② 结构特征归纳。\n③ 旋转演示。\n④ 对比表。","preparation":"【PPT课件】P1 多面体引入；P2 棱柱；P3 棱锥；P4 棱台；P5 旋转体(柱锥台球)；P6 练习。\n【实物教具】柱锥台球模型。\n【音频】无。","process":[{"step":"Step 1 导入——身边的立体","time":"5分钟","content":"【PPT P1 引入】教师：「铅笔盒(棱柱)、金字塔(棱锥)、篮球(球)——今天系统认识这些立体图形。」 板书时机：黑板列四类。差异化提示：B班举例；A班需分类。易错点提醒：多面体由平面围成；旋转体由面旋转生成。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 棱柱","time":"9分钟","content":"【PPT P2 棱柱】教师：「棱柱：两底面平行且全等，侧棱互相平行。按底面边数分三棱柱、四棱柱……」 板书时机：黑板画棱柱+标元素。差异化提示：B班认底面；A班需说侧棱关系。易错点提醒：底面平行全等、侧棱平行是棱柱核心；斜棱柱也满足。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 3 棱锥","time":"8分钟","content":"【PPT P3 棱锥】教师：「棱锥：一个底面+公共顶点，所有侧棱交于顶点。正棱锥底面正多边形、顶点在中心正上方。」 板书时机：黑板画棱锥。差异化提示：B班认顶点；A班需说正棱锥。易错点提醒：棱锥只有一个底面；侧棱交于一点(顶点)。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 4 棱台","time":"8分钟","content":"【PPT P4 棱台】教师：「棱台由棱锥被平行底面的平面截得：两底平行但不全等，侧棱延长交于原顶点。」 板书时机：黑板演示截得。差异化提示：B班看图；A班需说来源。易错点提醒：棱台两底平行不全等；侧棱延长必交于一点。 预设回答：「学生板演或口答，说明列式（或证明）依据与典型易错点，师生共评。」"},{"step":"Step 5 旋转体","time":"10分钟","content":"【PPT P5 旋转】教师：「矩形绕边转→圆柱；直角三角形绕直角边→圆锥；直角梯形绕腰→圆台；半圆绕直径→球。」 板书时机：黑板画旋转生成。差异化提示：B班记；A班需说母线。易错点提醒：球由半圆(非圆)旋转；圆台由直角梯形旋转。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：有两个平行全等底面的一定是棱柱吗？(不一定，需侧棱平行)」 板书时机：板书。差异化提示：B班练；A班加反例。易错点提醒：下节课学直观图。 预设回答：「学生自主归纳本课核心要点，同伴补充遗漏，教师用一句话收口并预告下节。」"}],"blackboard":"┌── 基本立体 ──┐\n│ 棱柱:两底∥全等│\n│  侧棱∥      │\n│ 棱锥:一底+顶点│\n│ 棱台:两底∥不全│\n│  侧棱延长交  │\n│ 旋转体:柱锥台│\n│  球:半圆绕径 │\n└────────────┘","exercises":"【基础作业】1. 棱柱的两底面关系__。2. 球由什么旋转得到？\n【提高作业】举例说明\"两底平行全等\"却不是棱柱的图形(如平行六面体截歪)。\n【参考答案——教师用】基础1：平行且全等。基础2：半圆绕直径。提高：两底平行全等的台体(棱台)不是棱柱(侧棱不平行)；或斜截情形。","reflection":"✅ 亮点：实物模型+旋转演示让抽象图形可感；柱锥台对比表好用。\n⚠️ 需改进：棱台来源B班难懂，需多演示\"截棱锥\"。\n📌 下节课衔接：直观图(斜二测)。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u3-2","lessonId":"l-math-b2-u3-2","title":"空间几何体的直观图(斜二测画法)","book":"必修第二册","unitNumber":3,"unitTitle":"立体几何初步","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["直观想象","数学运算"],"tags":["直观图","斜二测","人教A必修二Ch8","第二课时"],"textbookAnalysis":"用斜二测画法画空间图形直观图：x轴水平、y轴与x轴45°、z轴竖直；平行于x/z的线段长度不变，平行于y的减半。重点是画法规则与保真度。","overview":"【学情分析】A班：能正确画较复杂图形直观图；B班：y轴方向长度减半常忘；45°倾角画不准；前后遮挡乱。共同问题：斜二测\"横不变、纵减半、45°\"。","objectives":["直观想象：用斜二测画平面/简单立体的直观图。","数学运算：按规则处理各方向线段长度。","逻辑推理：理解平行性保持不变。","数学抽象：归纳斜二测三条规则。"],"keyPoints":"① 建系：x水平、z竖直、y与x成45°(或135°)。\n② 长度：平行于x、z的线段原长；平行于y的减半。\n③ 平行：平行性不变。\n④ 画法：先底面再竖高。","difficulties":"① y方向减半。原因：最易忘，需强调\"纵向压缩一半\"。\n② 角度。原因：y与x成45°非90°，习惯难改，需示范。\n③ 遮挡。原因：看不见的线画虚线，易乱，需讲。","teachingMethods":"① 规则口诀法。\n② 分步示范。\n③ 平行性保持。\n④ 错例对比。","preparation":"【PPT课件】P1 斜二测规则；P2 平面图形直观图；P3 长方体；P4 圆柱/锥；P5 错例；P6 练习。\n【实物教具】方格本+45°模板。\n【音频】无。","process":[{"step":"Step 1 导入——把立体画到纸上","time":"5分钟","content":"【PPT P1 规则】教师：「斜二测：x水平、z竖直、y与x成45°；平行于x/z的线段不变长，平行于y的减半。」 板书时机：黑板写三规则。差异化提示：B班记口诀；A班需想\"为何减半\"。易错点提醒：y方向一定减半，这是斜二测核心。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 平面图形","time":"10分钟","content":"【PPT P2 平面】教师：「先画正方形：x边原长、y边减半且45°，得平行四边形直观图。」 板书时机：黑板分步画。差异化提示：B班练正方形；A班加圆(椭圆)。易错点提醒：正方形直观图是平行四边形非正方形；圆变椭圆。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 3 长方体","time":"9分钟","content":"【PPT P3 长方体】教师：「先画底面平行四边形，再竖直向上画高(z不变)，连顶面对应点。」 板书时机：黑板作长方体。差异化提示：B班练；A班加棱台。易错点提醒：竖直线段(z)长度不变；顶面与底面全等且平行。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 4 旋转体直观图","time":"8分钟","content":"【PPT P4 柱锥】教师：「圆柱：底面画椭圆、竖高、顶椭圆；圆锥加顶点连线。」 板书时机：黑板画。差异化提示：B班看图；A班需说母线。易错点提醒：底面椭圆用斜二测近似；看不见的轮廓画虚线。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 5 错例","time":"6分钟","content":"【PPT P5 错例】教师：「展示y未减半、角度错的反例，对比正确图。」 板书时机：黑板对比。差异化提示：B班找错；A班需说原因。易错点提醒：常见错就是y不减半或角度非45°。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 6 练习+作业","time":"7分钟","content":"【PPT P6 练习】教师：「用斜二测画一个正四棱锥的直观图。」 板书时机：板书。差异化提示：B班练；A班加组合体。易错点提醒：下节课学表面积体积。 预设回答：「学生自主归纳本课核心要点，同伴补充遗漏，教师用一句话收口并预告下节。」"}],"blackboard":"┌── 斜二测 ──┐\n│ x水平 z竖直 │\n│ y与x成45°  │\n│ 平行x,z:不变│\n│ 平行y:减半  │\n│ 平行性不变  │\n│ 隐线画虚   │\n└────────────┘","exercises":"【基础作业】1. 斜二测中平行于y轴的线段长度如何变化？2. 正方形的直观图是__。\n【提高作业】用斜二测画棱长为2的正方体直观图(标关键尺寸)。\n【参考答案——教师用】基础1：减半。基础2：平行四边形。提高：底面平行四边形(边长2与1、45°)，竖高2，顶面同位。","reflection":"✅ 亮点：口诀\"横不变纵减半45°\"好记；错例对比纠错有效。\n⚠️ 需改进：圆变椭圆B班画不像，需给椭圆模板。\n📌 下节课衔接：表面积与体积。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u3-3","lessonId":"l-math-b2-u3-3","title":"简单几何体的表面积与体积","book":"必修第二册","unitNumber":3,"unitTitle":"立体几何初步","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["数学运算","直观想象"],"tags":["表面积","体积","柱锥台","人教A必修二Ch8","第三课时"],"textbookAnalysis":"推导柱、锥、台、球的表面积与体积公式。柱V=Sh、锥V=1/3Sh、台V=1/3(S+√SS'+S')h、球V=4/3πR³。重点是公式应用与等积变换。","overview":"【学情分析】A班：能灵活用公式与割补法；B班：锥体积1/3易漏、台公式记不住；表面积与体积混淆。共同问题：锥是柱的1/3；球体积系数4/3π。","objectives":["数学运算：计算柱锥台球的表面积与体积。","直观想象：理解公式的几何来源。","逻辑推理：用割补、等积变换解题。","数学抽象：归纳体积公式体系。"],"keyPoints":"① 柱：S侧=ch(直柱)、V=Sh。\n② 锥：V=1/3 Sh。\n③ 台：V=1/3 h(S+√(SS')+S')。\n④ 球：S=4πR²、V=4/3 πR³。","difficulties":"① 1/3系数。原因：锥体积是柱的1/3，易漏，需演示(倒水)。\n② 台公式。原因：复杂难记，可记为\"柱锥之间\"，需点来源。\n③ 表面积。原因：侧面积非全面积，需加底，易混，需提醒。","teachingMethods":"① 公式体系归纳。\n② 割补演示。\n③ 等积变换。\n④ 错例法。","preparation":"【PPT课件】P1 柱锥体积；P2 台体积；P3 球；P4 表面积；P5 割补；P6 练习。\n【实物教具】柱锥容器。\n【音频】无。","process":[{"step":"Step 1 导入——能装多少","time":"5分钟","content":"【PPT P1 柱锥】教师：「同底同高的锥体积是柱的1/3——可倒水验证。V柱=Sh，V锥=1/3 Sh。」 板书时机：黑板写两式。差异化提示：B班记1/3；A班需想来源。易错点提醒：锥的1/3最关键，套公式别漏。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 台体积","time":"9分钟","content":"【PPT P2 台】教师：「棱台(圆台)体积V=1/3 h(S+√(SS\\\")+S\\\")，是柱锥的过渡。」 板书时机：黑板写式。差异化提示：B班记；A班需说极限(S\\\"→0得锥)。易错点提醒：√(SS\\\")是几何平均非算术；S\\\",S为上下底面积。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 3 球","time":"8分钟","content":"【PPT P3 球】教师：「球S=4πR²、V=4/3 πR³。注意R是半径。」 板书时机：黑板写。差异化提示：B班记系数；A班加推导方向。易错点提醒：用半径R非直径；4/3别写错。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 4 表面积","time":"8分钟","content":"【PPT P4 表面积】教师：「表面积是全面积=侧面积+底面积；柱侧=底面周长×高。」 板书时机：黑板列。差异化提示：B班练；A班加组合。易错点提醒：题问\"表面积\"要加底；\"侧面积\"不加。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 5 割补","time":"9分钟","content":"【PPT P5 割补】 定\"线在面内\"。」 板书时机：黑板写公理1。差异化提示：B班记；A班需说用途。易错点提醒：只需两点即可定整条线在面内。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 3 公理2","time":"8分钟","content":"【PPT P3 公理2】教师：「两平面有一公共点⇒交于过该点的一条直线(交线)。」 板书时机：黑板画两平面交线。差异化提示：B班记；A班需说交线。易错点提醒：两平面交的是\"直线\"不是点；公共点必在交线上。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 4 公理3","time":"8分钟","content":"【PPT P4 公理3】教师：「不共线的三点确定唯一平面——这是\"确定平面\"的依据。」 板书时机：黑板写(强调不共线)。差异化提示：B班记；A班需说\"为何不共线\"。易错点提醒：三点必须\"不共线\"，共线则有无穷多平面。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 5 位置关系","time":"9分钟","content":"【PPT P5 位置】教师：「线线：平行/相交/异面；线面：在面内/平行/相交；点面：在内/外。用∈/⊂/∥规范写。」 板书时机：黑板列关系树。差异化提示：B班练；A班需说异面。易错点提醒：异面直线既不平行也不相交；符号∈用于点、⊂用于线面。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 6 练习+作业","time":"7分钟","content":"【PPT P6 练习】教师：「已知A,B,C不共线，它们确定几个平面？两平面交于一点对吗？」 板书时机：板书。差异化提示：B班练；A班加推理。易错点提醒：下节课学平行判定。 预设回答：「学生自主归纳本课核心要点，同伴补充遗漏，教师用一句话收口并预告下节。」"}],"blackboard":"┌── 点线面位置 ──┐\n│ 公理1:两点在│\n│  面⇒线在面 │\n│ 公理2:两面共│\n│  点⇒交线   │\n│ 公理3:不共线│\n│  三点定一面 │\n│ 线线:平/交/│\n│  异面      │\n└────────────┘","exercises":"【基础作业】1. 不共线三点确定__个平面。2. 两平面有一个公共点，则交于__。\n【提高作业】用符号表示\"直线l在平面α内\"。\n【参考答案——教师用】基础1：1。基础2：一条过该点的直线。提高：l⊂α(或A∈l,B∈l且A,B∈α⇒l⊂α)。","reflection":"✅ 亮点：三条公理对比表防混；玻璃板演示交线直观。\n⚠️ 需改进：异面直线B班难想，需多实物。\n📌 下节课衔接：平行关系判定与性质。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u3-5","lessonId":"l-math-b2-u3-5","title":"直线与平面平行的判定与性质","book":"必修第二册","unitNumber":3,"unitTitle":"立体几何初步","lessonType":"new","lessonTypeName":"新授课","periodNumber":5,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["逻辑推理","直观想象"],"tags":["线面平行","判定定理","性质定理","人教A必修二Ch8","第五课时"],"textbookAnalysis":"线面平行判定：平面外一条直线与平面内一条直线平行，则该线与平面平行。性质：线面平行则过该线的平面与已知面的交线与之平行。重点是两个定理的应用。","overview":"【学情分析】A班：能灵活用两定理证平行；B班：判定与性质易混(谁推谁)；\"平面外\"条件易漏；辅助线不会作。共同问题：判定用\"线线平行推线面平行\"，性质反推。","objectives":["逻辑推理：复述线面平行判定与性质定理。","直观想象：理解定理的几何情境。","数学运算：用定理证明线面平行。","数学抽象：区分判定(充分条件)与性质(必要条件)。"],"keyPoints":"① 判定：a⊄α,b⊂α,a∥b⇒a∥α。\n② 性质：a∥α,a⊂β,α∩β=l⇒a∥l。\n③ "}],"blackboard":"┌── 面面平行 ──┐\n│ 判定:α内两相│\n│ 交线∥β⇒α∥β│\n│ 性质:α∥β,  │\n│ γ截⇒交线∥ │\n│ 链:线线→线面│\n│  →面面    │\n└────────────┘","exercises":"【基础作业】1. 面面平行判定中两线必须__。2. α∥β，γ截得a⊂α,b⊂β则a__b。\n【提高作业】正方体中证平面AB'C'D∥平面A'BCD'。\n【参考答案——教师用】基础1：相交。基础2：∥。提高：在平面内找两条相交线分别平行于另一平面(如AB'∥A'B等)，用判定。","reflection":"✅ 亮点：转化链(线线→线面→面面)让证明有章法；相交反例深刻。\n⚠️ 需改进：B班常忘\"相交\"，需每题提醒。\n📌 下节课衔接：直线与平面垂直。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u3-7","lessonId":"l-math-b2-u3-7","title":"直线与平面垂直的判定与性质","book":"必修第二册","unitNumber":3,"unitTitle":"立体几何初步","lessonType":"new","lessonTypeName":"新授课","periodNumber":7,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["逻辑推理","直观想象"],"tags":["线面垂直","判定","性质","人教A必修二Ch8","第七课时"],"textbookAnalysis":"线面垂直定义：直线与平面内任意直线垂直。判定：与平面内两条相交直线垂直则垂直。性质：垂直于同一平面的直线互相平行。重点是两个定理。","overview":"【学情分析】A班：能灵活用判定(两条相交垂线)与性质；B班：判定中\"两条相交\"易漏(与平行类比混淆)；垂线唯一性不清。共同问题：判定须两条相交直线；性质得平行线。","objectives":["逻辑推理：复述线面垂直判定与性质。","直观想象：理解垂直定义(对任意线)。","数学运算：证明线面垂直。","数学抽象：区分\"垂直\"与\"平行\"判定条件。"],"keyPoints":"① 定义：l⊥α⇔l垂直α内任意直线。\n② 判定：l⊥α内两相交直线⇒l⊥α。\n③ 性质：a⊥α,b⊥α⇒a∥b。\n④ 应用：常先证线线垂直(勾股定理逆/等腰)。","difficulties":"① 相交条件。原因：判定须两相交直线垂直，易漏，需强调(同平行类比)。\n② 定义任意性。原因：\"垂直平面内任意直线\"难操作，实际用判定，需点。\n③ 性质得平行。原因：同垂直一面的两直线平行，反直觉，需演示。","teachingMethods":"① 判定对比(平行)。\n② 折纸演示(相交垂线)。\n③ 性质模型。\n④ 错例法。","preparation":"【PPT课件】P1 定义；P2 判定；P3 相交条件；P4 性质；P5 综合；P6 练习。\n【实物教具】三角板+平面。\n【音频】无。","process":[{"step":"Step 1 导入——线垂直于面","time":"5分钟","content":"【PPT P1 定义】教师：「旗杆垂直于地面，即它垂直于地面上任意一条直线——这就是线面垂直。」 板书时机：黑板写定义。差异化提示：B班听实例；A班需说\"任意\"。易错点提醒：垂直的是\"平面内任意直线\"，但验证用判定而非逐条验。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 判定","time":"9分钟","content":"【PPT P2 判定】教师：「只需证直线垂直于平面内两条相交直线，即得线面垂直。」 板书时机：黑板写判定。差异化提示：B班记；A班需想来源。易错点提醒：比平行更强——垂直只需两相交线。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 3 相交条件","time":"8分钟","content":"【PPT P3 相交】教师：「两线必须相交！若只垂直于两条平行线，线未必垂直平面。」 板书时机：黑板反例。差异化提示：B班记；A班需说反例。易错点提醒：与平行判定同要求\"相交\"；漏则错。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 4 性质","time":"9分钟","content":"【PPT P4 性质】教师：「垂直于同一平面的两条直线互相平行(a⊥α,b⊥α⇒a∥b)。」 板书时机：黑板写。差异化提示：B班记；A班需想\"为何平行\"。易错点提醒：这条性质常用来证线线平行(替代中位线)。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 5 综合","time":"9分钟","content":"【PPT P5 综合】教师：「证线面垂直：先证两条相交垂线(用勾股定理逆或已知垂直)。」 板书时机：黑板示范。差异化提示：B班练；A班加复杂。易错点提醒：找相交两垂线是关键步骤。 预设回答：「学生板演或口答，说明列式（或证明）依据与典型易错点，师生共评。」"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「三棱锥中，证侧棱垂直底面(用两条相交底棱)。」 板书时机：板书。差异化提示：B班练；A班加变式。易错点提醒：下节课学面面垂直。 预设回答：「学生自主归纳本课核心要点，同伴补充遗漏，教师用一句话收口并预告下节。」"}],"blackboard":"┌── 线面垂直 ──┐\n│ 定义:垂直面内│\n│  任意线     │\n│ 判定:⊥两相交│\n│  线⇒⊥面    │\n│ 性质:⊥同面 │\n│  两直线∥   │\n└────────────┘","exercises":"【基础作业】1. 线面垂直判定需垂直平面内__条直线且__。2. a⊥α,b⊥α则a__b。\n【提高作业】证明：过一点有且只有一条直线与已知平面垂直。\n【参考答案——教师用】基础1：两、相交。基础2：∥。提高：用性质(两垂线平行)反证唯一；若两条都过该点垂直α则它们平行又共点⇒重合。","reflection":"✅ 亮点：与平行判定类比(都要相交)降低混淆；旗杆实例好懂。\n⚠️ 需改进：B班仍会漏相交，需每题红字。\n📌 下节课衔接：平面与平面垂直。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u3-8","lessonId":"l-math-b2-u3-8","title":"平面与平面垂直的判定与性质","book":"必修第二册","unitNumber":3,"unitTitle":"立体几何初步","lessonType":"new","lessonTypeName":"新授课","periodNumber":8,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["逻辑推理","直观想象"],"tags":["面面垂直","二面角","判定","性质","人教A必修二Ch8","第八课时"],"textbookAnalysis":"二面角及其平面角；面面垂直判定：一个平面过另一个平面的垂线，则两平面垂直。性质：两平面垂直，则一个平面内垂直于交线的直线垂直于另一平面。重点是两个定理。","overview":"【学情分析】A班：能灵活证面面垂直与用性质作垂线；B班：二面角平面角画法乱；判定\"过垂线\"条件不清；性质中\"垂直交线\"易漏。共同问题：判定用线面垂直推面面垂直；性质反推线面垂直。","objectives":["直观想象：理解二面角及其平面角。","逻辑推理：复述面面垂直判定与性质。","数学运算：证明面面垂直。","数学抽象：建立\"线面垂直→面面垂直\"转化。"],"keyPoints":"① 二面角：棱+两半平面；平面角在棱上垂面内作。\n② 判定：α过β的垂线l(l⊥β,l⊂α)⇒α⊥β。\n③ 性质：α⊥β,α∩β=l,a⊂α,a⊥l⇒a⊥β。\n④ 转化：证面面垂直常先证线面垂直。","difficulties":"① 平面角画法。原因：在棱上取点作两垂线，易画错面，需示范。\n② 判定条件。原因：须\"一个面过另一面的垂线\"，易漏\"过\"，需强调。\n③ 性质垂直交线。原因：性质中要\"a⊥交线l\"才得a⊥β，易漏，需点。","teachingMethods":"① 二面角演示。\n② 判定转化。\n③ 性质作图。\n④ 错例法。","preparation":"【PPT课件】P1 二面角；P2 平面角；P3 判定；P4 性质；P5 综合；P6 练习。\n【实物教具】可张合二面角模型。\n【音频】无。","process":[{"step":"Step 1 导入——两面的夹角","time":"5分钟","content":"【PPT P1 二面角】教师：「二面角由棱和两半平面组成，像打开的书。它的\"大小\"用平面角衡量。」 板书时机：黑板画二面角。差异化提示：B班记；A班需想棱。易错点提醒：二面角不是角而是\"面夹角\"，衡量靠平面角。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 平面角","time":"9分钟","content":"【PPT P2 平面角】教师：「在棱上取点，分别在两半平面内作棱的垂线，夹角即平面角。」 板书时机：黑板示范作法。差异化提示：B班练；A班需说\"为何垂棱\"。易错点提醒：两条垂线都必须在各自半平面内且垂直于棱。 预设回答：「学生板演或口答，说明列式（或证明）依据与典型易错点，师生共评。」"},{"step":"Step 3 判定","time":"9分钟","content":"【PPT P3 判定】教师：「若一个平面经过另一个平面的垂线，则两平面垂直(α⊥β)。」 板书时机：黑板写判定。差异化提示：B班记；A班需想转化。易错点提醒：把\"证面面垂直\"转为\"证线面垂直\"(找垂线)。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 4 性质","time":"9分钟","content":"【PPT P4 性质】教师：「α⊥β，交线l，若α内直线a⊥l，则a⊥β。性质常用来\"在一个面内作另一面的垂线\"。」 板书时机：黑板作垂线。差异化提示：B班记；A班需说用途。易错点提醒：性质中必须\"a⊥交线l\"这一前提，漏则不能用。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 5 综合","time":"8分钟","content":"【PPT P5 综合】教师：「证面面垂直：先证一个面内有另一面的垂线(线面垂直⇒面面垂直)。」 板书时机：黑板示范。差异化提示：B班练；A班加复杂。易错点提醒：这是本章证明的常用归宿。 预设回答：「学生板演或口答，说明列式（或证明）依据与典型易错点，师生共评。」"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「正方体中，证相邻两面垂直(用棱垂直于面)。」 板书时机：板书。差异化提示：B班练；A班加一般。易错点提醒：立体几何初步章复习。 预设回答：「学生自主归纳本课核心要点，同伴补充遗漏，教师用一句话收口并预告下节。」"}],"blackboard":"┌── 面面垂直 ──┐\n│ 二面角:棱+两面│\n│ 平面角:垂棱 │\n│ 判定:α过β垂线│\n│  ⇒α⊥β     │\n│ 性质:α⊥β,  │\n│ a⊂α,a⊥l⇒  │\n│  a⊥β      │\n└────────────┘","exercises":"【基础作业】1. 面面垂直判定：一个平面经过另一个平面的__。2. α⊥β交线l，a⊂α且a⊥l，则a__β。\n【提高作业】正方体中证明平面ABB'A'⊥平面BCC'B'。\n【参考答案——教师用】基础1：垂线。基础2：⊥。提高：BB'⊥平面BCC'B'且BB'⊂平面ABB'A'⇒两平面垂直。","reflection":"✅ 亮点：可张合模型让二面角可感；\"过垂线\"判定转化清晰。\n⚠️ 需改进：性质中\"垂直交线\"前提B班易漏，需红字。\n📌 下节课衔接：第9章 统计。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u4-1","lessonId":"l-math-b2-u4-1","title":"随机抽样","book":"必修第二册","unitNumber":4,"unitTitle":"统计","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["数据分析","数学抽象"],"tags":["随机抽样","简单随机","分层抽样","人教A必修二Ch9","第一课时"],"textbookAnalysis":"总体、样本、抽样概念。简单随机抽样(抽签、随机数)、分层抽样(按比例从各层抽取)。重点是从实际问题选择抽样方法。","overview":"【学情分析】A班：能设计分层抽样方案；B班：简单随机与分层混淆；\"按比例\"计算错；样本代表性不清。共同问题：分层按各层比例抽取；随机保证公平。","objectives":["数据分析：说出抽样基本思想。","数学运算：按层比例计算各层样本量。","逻辑推理：选择恰当抽样方法。","数学抽象：区分总体、样本、样本量。"],"keyPoints":"① 总体/样本/样本量。\n② 简单随机：每个个体等可能入样(抽签、随机数表)。\n③ 分层：按差异明显层划分，各层按比例抽。\n④ 原则：样本应有代表性、随机性。","difficulties":"① 分层抽样比例。原因：各层样本量=层占比×总样本量，易算错，需示范。\n② 方法选择。原因：差异明显用分层、否则简单随机，易混，需对比。\n③ 代表性。原因：抽样为推断总体，非描述，需点。","teachingMethods":"① 实例引入。\n② 方法对比。\n③ 比例计算。\n④ 错例法。","preparation":"【PPT课件】P1 总体样本；P2 简单随机；P3 分层；P4 比例计算；P5 选择；P6 练习。\n【实物教具】抽签盒。\n【音频】无。","process":[{"step":"Step 1 导入——抽查一部分知全体","time":"5分钟","content":"【PPT P1 总体】教师：「要知全校身高，不必量所有人——抽一部分(样本)推断总体，这就是抽样思想。」 板书时机：黑板写概念。差异化提示：B班举例；A班需说推断。易错点提醒：抽样为\"推断\"非\"描述\"；样本要代表总体。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 简单随机","time":"9分钟","content":"【PPT P2 简单】教师：「简单随机抽样：每个个体等可能入样。方法：抽签法、随机数表法。」 板书时机：黑板写。差异化提示：B班记；A班需说公平。易错点提醒：适用于总体均匀、无显著差异时。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 3 分层","time":"9分钟","content":"【PPT P3 分层】教师：「总体差异明显(如男女生)时分层，各层内差异小，按比例抽取，精度更高。」 板书时机：黑板写思路。差异化提示：B班记；A班需说\"为何分层\"。易错点提醒：分层前提是\"层间差异大、层内差异小\"。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 4 比例计算","time":"9分钟","content":"【PPT P4 比例】教师：「各层样本量=该层个体数/总体数×总样本量。如男600女400抽100，则男60女40。」 板书时机：黑板算例。差异化提示：B班练；A班加多層。易错点提醒：各层样本量之和=总样本量；按真实比例。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 5 选择","time":"6分钟","content":"【PPT P5 选择】教师：「差异小→简单随机；差异大且已知结构→分层。目标都是代表性。」 板书时机：黑板对比。差异化提示：B班记；A班需判。易错点提醒：选错方法会损代表性。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 6 练习+作业","time":"6分钟","content":"【PPT P6 练习】教师：「某班男生30女生20，抽10人，分层抽样各抽几？」 板书时机：板书。差异化提示：B班练；A班加设计。易错点提醒：下节课学用图表示数据。 预设回答：「学生自主归纳本课核心要点，同伴补充遗漏，教师用一句话收口并预告下节。」"}],"blackboard":"┌── 随机抽样 ──┐\n│ 总体/样本/量│\n│ 简单随机:等可│\n│  能(抽签/随机)│\n│ 分层:按比例 │\n│  n_i=N_i/N·n │\n│ 选:差异大→分层│\n└────────────┘","exercises":"【基础作业】1. 分层抽样各层样本量如何定？2. 男30女20抽10，各抽__。\n【提高作业】设计调查本校学生每周运动时间的抽样方案。\n【参考答案——教师用】基础1：层占比×总样本量。基础2：男6女4。提高：按年级/性别分层，各层内简单随机抽样，按比例分配样本量。","reflection":"✅ 亮点：抽签盒实物让随机可感；比例公式配算例好用。\n⚠️ 需改进：B班分层比例计算仍错，需多练。\n📌 下节课衔接：用图表表示数据。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u4-2","lessonId":"l-math-b2-u4-2","title":"用统计图表示数据(频率分布直方图)","book":"必修第二册","unitNumber":4,"unitTitle":"统计","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["数据分析","直观想象"],"tags":["频率分布","直方图","百分位","人教A必修二Ch9","第二课时"],"textbookAnalysis":"数据分组、求频率/组距，画频率分布直方图；用折线图、扇形图等。重点是直方图的小矩形面积=频率、纵轴为频率/组距。","overview":"【学情分析】A班：能正确分组画直方图并读数；B班：纵轴是\"频率/组距\"非频率易错；面积=频率不清；组距选择乱。共同问题：直方图面积和为1；读数为面积非高。","objectives":["数据分析：绘制频率分布直方图。","直观想象：理解直方图面积表示频率。","数学运算：由数据分组求频数频率。","数学抽象：区分条形图与直方图。"],"keyPoints":"① 分组：定组距、组数，列频数分布表。\n② 纵轴：频率/组距；矩形高=频率/组距。\n③ 面积：每组矩形面积=该组频率，总面积=1。\n④ 读图：求区间频率用面积(高×组距)。","difficulties":"① 纵轴含义。原因：是频率/组距非频率，易错，需强调。\n② 面积=频率。原因：读某区间频率要看面积非高，需示范。\n③ 组距选择。原因：组数过多或过少都失真，需讲经验。","teachingMethods":"① 分组示范。\n② 面积解读。\n③ 与条形图对比。\n④ 错例法。","preparation":"【PPT课件】P1 分组；P2 频数表；P3 直方图；P4 面积=频率；P5 读图；P6 练习。\n【实物教具】数据卡片。\n【音频】无。","process":[{"step":"Step 1 导入——把数据画出来","time":"5分钟","content":"【PPT P1 分组】教师：「一堆数据先分组(如0-10,10-20…)，数每组的频数，再画图。」 板书时机：黑板列分组。差异化提示：B班记；A班需说组距。易错点提醒：分组要不重不漏；组距一致。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 频数表","time":"9分钟","content":"【PPT P2 表】教师：「列频数分布表：每组频数、频率=频数/总数、频率/组距。」 板书时机：黑板列表。差异化提示：B班练；A班加累计。易错点提醒：频率之和=1；频率/组距用于纵轴。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 3 直方图","time":"9分钟","content":"【PPT P3 图】教师：「横轴数据、纵轴频率/组距，画矩形。高=频率/组距。」 板书时机：黑板作图。差异化提示：B班练；A班需说纵轴。易错点提醒：纵轴是\"频率/组距\"，不是频率！ 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 4 面积=频率","time":"9分钟","content":"【PPT P4 面积】教师：「每个矩形面积=组距×(频率/组距)=频率；所有面积和=1。」 板书时机：黑板算。差异化提示：B班记；A班需推导。易错点提醒：读某区间频率算\"面积\"(高×组距)非只看高。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 5 读图","time":"6分钟","content":"【PPT P5 读】教师：「求\"数据\x3c某值\"的频率，累加左边面积；估众数看最高矩形中点。」 板书时机：黑板示范。差异化提示：B班练；A班加估计。易错点提醒：与条形图不同，条形图高为频数、矩形分开。 预设回答：「学生板演或口答，说明列式（或证明）依据与典型易错点，师生共评。」"},{"step":"Step 6 练习+作业","time":"6分钟","content":"【PPT P6 练习】教师：「给一组身高数据，分组画直方图并读[160,170)频率。」 板书时机：板书。差异化提示：B班练；A班加分析。易错点提醒：下节课学用数字描述。 预设回答：「学生自主归纳本课核心要点，同伴补充遗漏，教师用一句话收口并预告下节。」"}],"blackboard":"┌── 直方图 ──┐\n│ 分组:组距一致│\n│ 纵轴:频率/组距│\n│ 面积=频率  │\n│ 总面=1     │\n│ 读数:面积非高│\n└────────────┘","exercises":"【基础作业】1. 直方图的纵轴是__。2. 各组面积之和=__。\n【提高作业】已知组距2、某组频率0.2，求该组矩形高。\n【参考答案——教师用】基础1：频率/组距。基础2：1。提高：高=频率/组距=0.2/2=0.1。","reflection":"✅ 亮点：面积=频率用\"高×组距\"推导，B班恍然；与条形图对比防混。\n⚠️ 需改进：纵轴含义B班仍错，需红字+每图标注。\n📌 下节课衔接：用数字描述数据(均值方差)。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u4-3","lessonId":"l-math-b2-u4-3","title":"用数字特征描述数据(平均数、方差)","book":"必修第二册","unitNumber":4,"unitTitle":"统计","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["数据分析","数学运算"],"tags":["平均数","方差","标准差","人教A必修二Ch9","第三课时"],"textbookAnalysis":"集中趋势：平均数、中位数、众数。离散程度：方差s²、标准差s。重点是方差反映波动，以及用样本估计总体的思想。","overview":"【学情分析】A班：能对方差做代数变形与比较；B班：方差公式易错(除以n还是n-1、平方)；标准差单位理解弱；极端值影响均值不清。共同问题：方差越大越波动；标准差与数据同单位。","objectives":["数据分析：计算平均数、方差、标准差。","数学运算：用公式与简便算法。","逻辑推理：由方差比较稳定性。","数学抽象：区分集中趋势与离散程度。"],"keyPoints":"① 均值：\\(\\bar{x}=\\frac{1}{n}\\sum x_i\\)。\n② 方差：\\(s^2=\\frac{1}{n}\\sum(x_i-\\bar{x})^2\\)，越大越波动。\n③ 标准差：\\(s=\\sqrt{s^2}\\)，与数据同单位。\n④ 性质：\\(x_i+a\\)均值变a、方差不变；\\(kx_i\\)方差乘k²。","difficulties":"① 方差公式。原因：平方、平均易错，需分步；n与n-1在高中用n，需点。\n② 标准差单位。原因：s与x同单位便于比较，易忘开方，需强调。\n③ 极端值。原因：均值受极端值影响大，中位数更稳，需举。","teachingMethods":"① 公式推导。\n② 简便算法。\n③ 波动演示。\n④ 错例法。","preparation":"【PPT课件】P1 均值；P2 中位数众数；P3 方差；P4 标准差；P5 性质；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——一个数为何不够","time":"5分钟","content":"【PPT P1 均值】教师：「两组数据均值都是70，但一组全70、一组50~90，稳定性不同——还需离散指标。」 板书时机：黑板写均值。差异化提示：B班听；A班需想波动。易错点提醒：均值只说\"中心\"，不说\"散不散\"。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 中位数众数","time":"8分钟","content":"【PPT P2 中众】教师：「中位数(排序取中)抗极端值；众数是最常出现值。三者互补。」 板书时机：黑板列。差异化提示：B班记；A班需说抗极端。易错点提醒：有极端值时中位数比均值稳。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 3 方差","time":"10分钟","content":"【PPT P3 方差】教师：「\\(s^2=\\frac{1}{n}\\sum(x_i-\\bar{x})^2\\)，衡量偏离均值的平均平方，越大越波动。」 板书时机：黑板算例。差异化提示：B班练；A班加变形。易错点提醒：先减均值再平方再平均；高中除数用n。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 4 标准差","time":"7分钟","content":"【PPT P4 标准差】教师：「\\(s=\\sqrt{s^2}\\)与原始数据同单位，便于解释。如身高标准差cm。」 板书时机：黑板写。差异化提示：B班记；A班需说单位。易错点提醒：比较波动看方差或标准差皆可；报告用标准差(同单位)。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 5 性质","time":"7分钟","content":"【PPT P5 性质】教师：「数据加a：均值加a、方差不变；乘k：方差乘k²。利用可简化计算。」 板书时机：黑板列。差异化提示：B班记；A班需证。易错点提醒：平移不变方差；缩放按k²变方差。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 6 练习+作业","time":"7分钟","content":"【PPT P6 练习】教师：「两组数据，算均值与方差，判断哪组更稳定。」 板书时机：板书。差异化提示：B班练；A班加标准化。易错点提醒：下节课学百分位数与样本估计。 预设回答：「学生自主归纳本课核心要点，同伴补充遗漏，教师用一句话收口并预告下节。」"}],"blackboard":"┌── 数字特征 ──┐\n│ 均值x̄=Σx/n │\n│ 中位:抗极端 │\n│ 方差s²=Σ(x-│\n│  x̄)²/n    │\n│ 标准差s=√s²│\n│ 越大越波动 │\n└────────────┘","exercises":"【基础作业】1. 方差越大说明数据越__。2. 数据都加5，方差__。\n【提高作业】x:2,4,6与y:1,4,7，比较哪组方差大。\n【参考答案——教师用】基础1：波动大。基础2：不变。提高：x̄=4,s²=8/3≈2.67；ȳ=4,s²=18/3=6⇒y波动更大。","reflection":"✅ 亮点：\"均值同但波动异\"导入有力；方差性质(平移不变)简化计算。\n⚠️ 需改进：除数n还是n-1B班混，需明确高中用n。\n📌 下节课衔接：百分位数与样本估计总体。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u4-4","lessonId":"l-math-b2-u4-4","title":"百分位数与样本估计总体","book":"必修第二册","unitNumber":4,"unitTitle":"统计","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["数据分析","逻辑推理"],"tags":["百分位数","样本估计","人教A必修二Ch9","第四课时"],"textbookAnalysis":"百分位数定义与计算(排序、定位)；用样本的频率分布、均值方差估计总体的相应特征。重点是估计思想与百分位数的计算。","overview":"【学情分析】A班：能准确计算百分位数并解释；B班：百分位数定位公式(i=np%)易错(取整/插值)；\"样本估计总体\"含义模糊。共同问题：第p百分位是\"至少p%数据≤它\"；估计有误差。","objectives":["数据分析：计算百分位数。","逻辑推理：理解样本估计总体的思想。","数学运算：用样本特征估计总体特征。","数学抽象：区分参数与统计量。"],"keyPoints":"① 百分位数：排序后，第p百分位是使至少p%数据≤它、至少(100-p)%≥它的值。\n② 计算：位置i=n×p%，插值或取相邻。\n③ 估计：样本均值≈总体均值；样本频率分步≈总体分布。\n④ 思想：用样本推断总体，存在随机误差。","difficulties":"① 定位公式。原因：i=np%取整/插值规则易错，需分步示范。\n② 估计误差。原因：样本不同结果略异，需说明\"估计非精确\"。\n③ 含义。原因：百分位是\"分界\"非\"平均值\"，需澄清。","teachingMethods":"① 排序定位。\n② 插值示范。\n③ 估计思想。\n④ 错例法。","preparation":"【PPT课件】P1 百分位数定义；P2 计算；P3 插值；P4 样本估计；P5 误差；P6 练习。\n【实物教具】排序卡片。\n【音频】无。","process":[{"step":"Step 1 导入——第80百分位是什么","time":"5分钟","content":"【PPT P1 定义】教师：「第80百分位是这样一个值：至少80%的数据≤它。如考试成绩的P80表示\"比80%人好\"。」 板书时机：黑板写定义。差异化提示：B班记；A班需说\"至少\"。易错点提醒：百分位是分界点，不是平均值。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 计算","time":"10分钟","content":"【PPT P2 计算】教师：「数据从小到大排，位置i=n×p%。若i非整数取上整对应值；若整数取第i与i+1平均。」 板书时机：黑板算例。差异化提示：B班练；A班加多。易错点提醒：先排序再定位；取整规则要一致。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 3 插值","time":"8分钟","content":"【PPT P3 插值】教师：「i非整数时，用相邻两值插值(按比例)更精确。常见教材取上整即可，按教材办。」 板书时机：黑板对比。差异化提示：B班记教材法；A班需懂插值。易错点提醒：不同教材取整略有差异，按所学版本。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 4 样本估计","time":"9分钟","content":"【PPT P4 估计】教师：「用样本均值估计总体均值、样本频率分布估计总体分布——抽样的目的。」 板书时机：黑板写。差异化提示：B班记；A班需说误差。易错点提醒：估计值接近真值但有随机误差，非精确相等。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 5 误差","time":"5分钟","content":"【PPT P5 误差】教师：「样本不同，估计略异；样本量越大通常越准。这是统计的固有特性。」 板书时机：板书。差异化提示：B班听；A班需想样本容量。易错点提醒：不能因一次估计偏差否定方法。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 6 练习+作业","time":"7分钟","content":"【PPT P6 练习】教师：「10个数据求P25、P75。」 板书时机：板书。差异化提示：B班练；A班加解释。易错点提醒：下节课学相关与回归。 预设回答：「学生自主归纳本课核心要点，同伴补充遗漏，教师用一句话收口并预告下节。」"}],"blackboard":"┌── 百分位/估计 ──┐\n│ P_p:≥p%≤它 │\n│ i=n×p%     │\n│ 非整→上整   │\n│ 整→i与i+1均│\n│ 样本估总体  │\n│ 有随机误差  │\n└────────────┘","exercises":"【基础作业】1. 第p百分位使至少__%数据≤它。2. 样本均值是总体均值的__。\n【提高作业】数据1,2,3,4,5,6,7,8求P25与P75。\n【参考答案——教师用】基础1：p。基础2：估计值。提高：n=8,i=2⇒P25=第2与3平均=2.5；i=6⇒P75=第6与7平均=6.5。","reflection":"✅ 亮点：考试成绩P80例子亲切；定位公式分步示范降错。\n⚠️ 需改进：取整规则B班易乱，需固定\"教材法\"。\n📌 下节课衔接：相关关系与回归。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u4-5","lessonId":"l-math-b2-u4-5","title":"相关关系与一元线性回归","book":"必修第二册","unitNumber":4,"unitTitle":"统计","lessonType":"new","lessonTypeName":"新授课","periodNumber":5,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["数据分析","数学建模"],"tags":["相关","散点图","回归直线","人教A必修二Ch9","第五课时"],"textbookAnalysis":"变量间相关关系；散点图判断线性相关；最小二乘法求回归直线ŷ=bx+a。重点是回归方程的计算与预测应用。","overview":"【学情分析】A班：能算回归系数并解释；B班：相关≠因果混淆；b,a公式易错；散点图方向判反。共同问题：正相关b>0、负相关b\x3c0；回归用于预测。","objectives":["数据分析：画散点图判断相关性。","数学运算：用最小二乘法求回归直线。","数学建模：用回归方程预测。","逻辑推理：区分相关与函数、因果。"],"keyPoints":"① 相关：变量间非确定关系(不同于函数)。\n② 散点图：正相关右上、负相关右下。\n③ 回归：\\(\\hat{y}=bx+a\\)，b=协方差/方差x。\n④ 应用：代入x预测ŷ，非精确。","difficulties":"① 相关≠因果。原因：两变量同受第三因素影响的错觉，需举例。\n② 公式。原因：b含x均值、y均值、平方和，易错，需分步。\n③ 预测解释。原因：回归是\"估计\"非确定，需点。","teachingMethods":"① 散点图观察。\n② 最小二乘思想。\n③ 计算示范。\n④ 错例(因果)。","preparation":"【PPT课件】P1 相关关系；P2 散点图；P3 最小二乘；P4 回归方程；P5 预测；P6 练习。\n【实物教具】散点图板。\n【音频】无。","process":[{"step":"Step 1 导入——不是函数却有关","time":"5分钟","content":"【PPT P1 相关】教师：「身高与体重有关但并非函数(同身高体重不同)——这是相关关系，区别于确定函数。」 板书时机：黑板写区别。差异化提示：B班听；A班需说非确定。易错点提醒：相关不等于因果(如冰淇淋销量与溺水相关，因夏天)。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 散点图","time":"9分钟","content":"【PPT P2 散点】教师：「画散点图：点总体右上走向→正相关；右下→负相关；散乱→无关。」 板书时机：黑板画两类。差异化提示：B班练判；A班需说强度。易错点提醒：先看趋势方向再看疏密(强度)。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 3 最小二乘","time":"10分钟","content":"【PPT P3 二乘】教师：「回归直线使残差平方和最小。系数b=Σ(x-x̄)(y-ȳ)/Σ(x-x̄)²，a=ȳ-bx̄。」 板书时机：黑板写公式。差异化提示：B班记；A班需推导。易错点提醒：分子是协方差和、分母是x的平方和；b符号决定正负相关。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 4 回归方程","time":"8分钟","content":"【PPT P4 方程】教师：「算出b,a得ŷ=bx+a，直线过样本中心点(x̄,ȳ)。」 板书时机：黑板算例。差异化提示：B班练；A班加验证。易错点提醒：回归线必过(x̄,ȳ)，可作检验。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 5 预测","time":"6分钟","content":"【PPT P5 预测】教师：「代入x得ŷ是预测值(估计)，实际值在其附近波动。」 板书时机：板书。差异化提示：B班练；A班加区间。易错点提醒：预测是\"估计\"，且不宜外推过远。 预设回答：「学生将新知迁移到真实情境，说出建模（或转化）步骤与结论。」"},{"step":"Step 6 练习+作业","time":"7分钟","content":"【PPT P6 练习】教师：「给5组数据，求回归方程并预测x=10的ŷ。」 板书时机：板书。差异化提示：B班练；A班加分析。易错点提醒：统计章结束，下章概率。 预设回答：「学生自主归纳本课核心要点，同伴补充遗漏，教师用一句话收口并预告下节。」"}],"blackboard":"┌── 回归 ──┐\n│ 相关≠函数  │\n│ 散点:右上正│\n│  右下负    │\n│ b=Σ(x-x̄)·│\n│  (y-ȳ)/Σ(x│\n│  -x̄)²     │\n│ a=ȳ-bx̄    │\n│ 过(x̄,ȳ)   │\n└────────────┘","exercises":"【基础作业】1. 正相关时b__0。2. 回归直线必过样本__。\n【提高作业】x:1,2,3,y:2,4,5，求回归方程(ȳ=11/3,x̄=2)。\n【参考答案——教师用】基础1：>。基础2：中心点(x̄,ȳ)。提高：Σ(x-x̄)(y-ȳ)=(-1)(-5/3)+0+(1)(4/3)=3；Σ(x-x̄)²=2⇒b=1.5,a=11/3-3=2/3⇒ŷ=1.5x+0.667。","reflection":"✅ 亮点：相关≠因果用冰淇淋例生动；回归线过中心点可作检验。\n⚠️ 需改进：b公式分子分母B班易反，需红字。\n📌 下节课衔接：第10章 概率。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u5-1","lessonId":"l-math-b2-u5-1","title":"随机事件与概率","book":"必修第二册","unitNumber":5,"unitTitle":"概率","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["数据分析","逻辑推理"],"tags":["随机事件","概率","频率","人教A必修二Ch10","第一课时"],"textbookAnalysis":"必然事件、不可能事件、随机事件；事件的关系(包含、并、交)；概率定义(频率稳定值)与性质(0≤P≤1，P(Ω)=1)。重点是概率的直观理解与基本性质。","overview":"【学情分析】A班：能用语算事件关系与概率性质；B班：必然事件/随机事件混淆；P(A∪B)与P(A)+P(B)关系不清(未排交集)；概率意义模糊。共同问题：互斥时P(A∪B)=P(A)+P(B)；一般加P(交)。","objectives":["数学抽象：区分必然、不可能、随机事件。","逻辑推理：用集合语言描述事件关系。","数据分析：理解概率的频率定义。","数学运算：应用概率基本性质。"],"keyPoints":"① 事件：必然(一定发生)、不可能(不发生)、随机(可能发生)。\n② 关系：包含A⊂B、并A∪B、交A∩B、互斥A∩B=∅。\n③ 概率：频率稳定值；0≤P(A)≤1；P(Ω)=1,P(∅)=0。\n④ 加法：互斥时P(A∪B)=P(A)+P(B)。","difficulties":"① 事件关系。原因：并/交/包含用集合语言，易混，需维恩图。\n② 加法公式。原因：非互斥不能直接加(重复算交)，需强调互斥前提。\n③ 概率意义。原因：概率是\"长期频率稳定值\"非单次结果，需澄清。","teachingMethods":"① 实例分类。\n② 维恩图。\n③ 频率稳定演示。\n④ 错例法。","preparation":"【PPT课件】P1 事件分类；P2 事件关系；P3 维恩；P4 概率性质；P5 加法；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——结果不确定","time":"5分钟","content":"【PPT P1 分类】教师：「掷骰\"出6\"可能可能不——随机事件；\"出1~6\"必然；\"出7\"不可能。」 板书时机：黑板列三类。差异化提示：B班举例；A班需说随机。易错点提醒：判断前先明确\"试验与样本空间\"。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 事件关系","time":"9分钟","content":"【PPT P2 关系】教师：「A发生必致B发生⇒A⊂B；A或B发生⇒A∪B；A且B⇒A∩B。」 板书时机：黑板写。差异化提示：B班记；A班需联集合。易错点提醒：事件即样本点的集合，用集合语言最准。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 3 维恩图","time":"8分钟","content":"【PPT P3 维恩】教师：「用圆表示事件，包含=内圈，并=两圈并，交=重叠。互斥=不重叠。」 板书时机：黑板画。差异化提示：B班看图；A班需自画。易错点提醒：互斥即\"无公共样本点\"(交集空)。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 4 概率性质","time":"8分钟","content":"【PPT P4 性质】教师：「概率是频率稳定值；0≤P(A)≤1；P(Ω)=1(必然)、P(∅)=0(不可能)。」 板书时机：黑板列。差异化提示：B班记；A班需说稳定。易错点提醒：概率是长期稳定值，不是某次频率。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 5 加法公式","time":"9分钟","content":"【PPT P5 加法】教师：「互斥时P(A∪B)=P(A)+P(B)；一般P(A∪B)=P(A)+P(B)-P(A∩B)。」 板书时机：黑板写两式。差异化提示：B班记互斥式；A班需一般式。易错点提醒：非互斥直接加会\"重复算交\"，必须减P(交)。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 6 练习+作业","time":"6分钟","content":"【PPT P6 练习】教师：「互斥事件A,B，P(A)=0.3,P(B)=0.4，求P(A∪B)。」 板书时机：板书。差异化提示：B班练；A班加非互斥。易错点提醒：下节课学古典概型。 预设回答：「学生自主归纳本课核心要点，同伴补充遗漏，教师用一句话收口并预告下节。」"}],"blackboard":"┌── 事件与概率 ──┐\n│ 必然/不可能/│\n│  随机     │\n│ A⊂B,∪,∩   │\n│ 0≤P≤1     │\n│ P(Ω)=1    │\n│ 互斥:P(A∪B)│\n│ =P(A)+P(B)│\n└────────────┘","exercises":"【基础作业】1. 不可能事件概率=__。2. 互斥A,B，P(A∪B)=__。\n【提高作业】P(A)=0.5,P(B)=0.3,P(A∩B)=0.1，求P(A∪B)。\n【参考答案——教师用】基础1：0。基础2：P(A)+P(B)。提高：0.5+0.3-0.1=0.7。","reflection":"✅ 亮点：维恩图让事件关系可见；加法公式分互斥/一般两式清晰。\n⚠️ 需改进：非互斥直接加的错B班常犯，需红字\"减交\"。\n📌 下节课衔接：古典概型。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u5-2","lessonId":"l-math-b2-u5-2","title":"古典概型","book":"必修第二册","unitNumber":5,"unitTitle":"概率","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["数学运算","逻辑推理"],"tags":["古典概型","等可能","人教A必修二Ch10","第二课时"],"textbookAnalysis":"古典概型两特征：有限样本点、等可能。概率P(A)=A包含样本点数/总样本点数。重点是计数(列举、树状图、排列组合)与模型识别。","overview":"【学情分析】A班：能处理较复杂计数(分步、分类)；B班：样本点列举易漏(尤其有序无序混淆)；等可能前提忽略；\"放回/不放回\"混。共同问题：先判是否古典(有限+等可能)；P=n(A)/n(Ω)。","objectives":["数学抽象：复述古典概型两特征。","数学运算：数样本点求概率。","逻辑推理：用树状图/列举不重不漏。","直观想象：区分有序与无序样本点。"],"keyPoints":"① 特征：样本点有限、等可能。\n② 公式：\\(P(A)=n(A)/n(\\Omega)\\)。\n③ 计数：列举、树状图、分步乘法。\n④ 前提：必须先确认等可能，否则不能直接除。","difficulties":"① 等可能前提。原因：非等可能(如\"和\")不能直接用，需点；先判模型。\n② 不重不漏。原因：列举样本点易漏或重复，需树状图。\n③ 有序无序。原因：(1,2)与(2,1)是否同一点，依\"是否区分顺序\"，需澄清。","teachingMethods":"① 两特征强调。\n② 树状图。\n③ 分步计数。\n④ 错例(非等可能)。","preparation":"【PPT课件】P1 两特征；P2 公式；P3 列举；P4 树状图；P5 错例；P6 练习。\n【实物教具】骰子/球。\n【音频】无。","process":[{"step":"Step 1 导入——公平的概率","time":"5分钟","content":"【PPT P1 特征】教师：「掷骰出各面概率相等、且只有6种结果——有限+等可能，这就是古典概型。」 板书时机：黑板写两特征。差异化提示：B班记；A班需说\"为何等可能\"。易错点提醒：两特征缺一不可；非等可能不能用除法。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 公式","time":"8分钟","content":"【PPT P2 公式】教师：「\\(P(A)=n(A)/n(\\Omega)\\)——A的样本点数除以总样本点数。」 板书时机：黑板写。差异化提示：B班记；A班需联。易错点提醒：分子分母必须\"同一套样本点\"计数。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 3 列举","time":"9分钟","content":"【PPT P3 列举】教师：「样本点少时直接列：如抛两币{HH,HT,TH,TT}共4个。」 板书时机：黑板列。差异化提示：B班练；A班加三币。易错点提醒：HT与TH是不同点(有序)；别合并。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 4 树状图","time":"9分钟","content":"【PPT P4 树状】教师：「分步试验用树状图：第一层分支×第二层，逐层展开不漏。」 板书时机：黑板画树。差异化提示：B班练；A班加三步走。易错点提醒：树状图保证\"不重不漏\"；数末端枝即n(Ω)。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 5 错例","time":"7分钟","content":"【PPT P5 错例】教师：「两骰\"和为7\"有6种，但\"和\"本身不等可能(和为2只有1种)——不能对\"和\"直接用古典！」 板书时机：黑板对比。差异化提示：B班找错；A班需说原因。易错点提醒：要对\"基本结果(有序对)\"计数，不对\"和\"计数。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 6 练习+作业","time":"7分钟","content":"【PPT P6 练习】教师：「袋有3红2白，摸1球得红球概率？摸2球(不放回)均红？」 板书时机：板书。差异化提示：B班练；A班加放回。易错点提醒：下节课学频率与概率关系。 预设回答：「学生自主归纳本课核心要点，同伴补充遗漏，教师用一句话收口并预告下节。」"}],"blackboard":"┌── 古典概型 ──┐\n│ 有限+等可能 │\n│ P(A)=n(A)/ │\n│  n(Ω)     │\n│ 树状图:不重│\n│  不漏     │\n│ 对基本结果│\n│ 计数     │\n└────────────┘","exercises":"【基础作业】1. 古典概型两特征__。2. 抛两币，恰一正概率__。\n【提高作业】从1~10取一数，是3的倍数概率？\n【参考答案——教师用】基础1：有限样本点、等可能。基础2：2/4=1/2。提高：3的倍数有3,6,9共3个⇒3/10。","reflection":"✅ 亮点：\"和对和计数\"错例深刻；树状图解决不重不漏。\n⚠️ 需改进：有序无序B班仍混，需每题声明。\n📌 下节课衔接：频率与概率(统计观点)。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u5-3","lessonId":"l-math-b2-u5-3","title":"频率与概率(随机模拟)","book":"必修第二册","unitNumber":5,"unitTitle":"概率","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["数据分析","数学运算"],"tags":["频率","概率","随机模拟","人教A必修二Ch10","第三课时"],"textbookAnalysis":"通过大量重复试验，事件频率稳定在概率附近(大数律直观)。用随机模拟(计算器/计算机产生随机数)估计概率。重点是频率稳定思想与模拟方法。","overview":"【学情分析】A班：能设计随机模拟估计概率；B班：频率与概率关系模糊(频率≠概率)；模拟步骤乱；随机数使用错。共同问题：频率随试验次数趋近概率；模拟是\"估计\"。","objectives":["数据分析：说明频率稳定于概率。","数学运算：用随机模拟估计概率。","逻辑推理：区分频率(试验值)与概率(理论值)。","数学抽象：理解大数律直观。"],"keyPoints":"① 关系：重复试验，频率→概率(稳定)。\n② 频率：m/n(发生次数/总次数)，随n波动。\n③ 模拟：用随机数替代真实试验估计概率。\n④ 思想：概率是理论值，频率是它的经验近似。","difficulties":"① 频率≠概率。原因：频率是某次试验比值、波动；概率是极限稳定值，需澄清。\n② 模拟设计。原因：如何映射随机数到事件，需示范。\n③ 波动理解。原因：n小频率波动大、n大趋稳，需图。","teachingMethods":"① 抛币实验数据。\n② 稳定曲线图。\n③ 模拟示范。\n④ 错例法。","preparation":"【PPT课件】P1 频率定义；P2 稳定曲线；P3 频率≠概率；P4 随机模拟；P5 设计；P6 练习。\n【实物教具】抛币记录表。\n【音频】无。","process":[{"step":"Step 1 导入——多抛几次看","time":"5分钟","content":"【PPT P1 频率】教师：「抛100次币，正面频率约0.5但不恰是；抛1万次更接近0.5——频率随次数趋近概率。」 板书时机：黑板写频率=m/n。差异化提示：B班听；A班需想极限。易错点提醒：频率是试验比值会波动；概率是稳定中心。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 稳定曲线","time":"9分钟","content":"【PPT P2 曲线】教师：「画频率-n曲线：n小波动大，n大收敛到p。这就是大数律的直观。」 板书时机：黑板画收敛。差异化提示：B班看图；A班需说收敛。易错点提醒：收敛是\"趋势\"非\"必到\"；n有限仍有偏差。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 3 频率≠概率","time":"8分钟","content":"【PPT P3 区别】教师：「概率是理论值(如0.5)；频率是某次实验算出的(如0.52)。频率估计概率。」 板书时机：黑板对比。差异化提示：B班记；A班需说估计。易错点提醒：不能说\"频率等于概率\"；只能\"稳定于\"。 预设回答：「学生分组探究或操作，汇报发现，教师追问关键节点。」"},{"step":"Step 4 随机模拟","time":"9分钟","content":"【PPT P4 模拟】教师：「用计算器/计算机产生随机数模拟试验，统计频率估计概率(如用0/1模拟正反面)。」 板书时机：黑板示范。差异化提示：B班记；A班需设计。易错点提醒：模拟次数要足够大才准；映射要合理。 预设回答：「学生板演或口答，说明列式（或证明）依据与典型易错点，师生共评。」"},{"step":"Step 5 设计","time":"7分钟","content":"【PPT P5 设计】教师：「估计\"三人中至少两同生日\"：用1~365随机数三人一组，统计符合比例。」 板书时机：黑板设计。差异化提示：B班听；A班需实现。易错点提醒：模拟是估计，非精确概率；可用程序批处理。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「设计模拟估计\"掷两骰和为7\"的概率。」 板书时机：板书。差异化提示：B班练；A班加代码。易错点提醒：下节课学事件的独立性。 预设回答：「学生自主归纳本课核心要点，同伴补充遗漏，教师用一句话收口并预告下节。」"}],"blackboard":"┌── 频率与概率 ──┐\n│ 频率=m/n    │\n│ n大→稳于p  │\n│ 概率:理论值 │\n│ 频率:试验值│\n│ 模拟:随机替代│\n│ 估计p      │\n└────────────┘","exercises":"【基础作业】1. 概率是__值，频率是__值。2. 频率随试验次数增加趋于__。\n【提高作业】设计随机模拟估计\"抛三币至少两正\"的概率思路。\n【参考答案——教师用】基础1：理论、试验。基础2：概率。提高：用0/1随机数每次取3个，统计\"至少两个1\"的比例，大量重复取频率。","reflection":"✅ 亮点：收敛曲线图让\"稳定\"可见；模拟设计实用。\n⚠️ 需改进：B班仍说\"频率=概率\"，需反复纠正表述。\n📌 下节课衔接：事件的独立性。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u5-4","lessonId":"l-math-b2-u5-4","title":"事件的独立性","book":"必修第二册","unitNumber":5,"unitTitle":"概率","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["逻辑推理","数学运算"],"tags":["独立事件","乘法公式","人教A必修二Ch10","第四课时"],"textbookAnalysis":"两事件独立：P(AB)=P(A)P(B)。推广到多个独立事件。重点是独立性的判断(凭实际意义或验证等式)与乘法公式应用。","overview":"【学情分析】A班：能判别并用于多步概率；B班：独立与互斥混淆(独立≠互斥)；验证用P(AB)=P(A)P(B)；条件概率前置不清。共同问题：独立是\"发生互不影响\"；互斥是不能同发生，二者不同。","objectives":["数学抽象：复述事件独立的定义。","逻辑推理：区分独立与互斥。","数学运算：用乘法公式求交事件概率。","直观想象：理解\"互不影响\"含义。"],"keyPoints":"① 独立：A发生不影响B⇔P(AB)=P(A)P(B)。\n② 推广：多个两两独立则交的概率=各概率乘积。\n③ 与互斥：独立≠互斥；互斥时P(AB)=0≠P(A)P(B)(一般)。\n④ 判断：凭实际\"互不影响\"或验证等式。","difficulties":"① 独立≠互斥。原因：概念相反易混，需对比(独立可同发生、互斥不能)。\n② 验证等式。原因：用P(AB)=P(A)P(B)判独立，需先求P(AB)，易错。\n③ 乘法前提。原因：只有独立才能拆成乘积，否则用条件概率，需点。","teachingMethods":"① 定义对比(互斥)。\n② 实际意义判断。\n③ 乘法示范。\n④ 错例法。","preparation":"【PPT课件】P1 独立定义；P2 与互斥对比；P3 验证；P4 乘法；P5 多事件；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——互不影响","time":"5分钟","content":"【PPT P1 定义】教师：「先后抛两币，第一次结果不影响第二次——两事件独立。P(AB)=P(A)P(B)。」 板书时机：黑板写定义。差异化提示：B班记；A班需说\"不影响\"。易错点提醒：独立是\"概率上互不影响\"，不是说事件无关。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 与互斥对比","time":"9分钟","content":"【PPT P2 对比】教师：「独立≠互斥！独立事件可同时发生(如两次都正)；互斥则不能同发生。二者通常不同。」 板书时机：黑板对比表。差异化提示：B班记区别；A班需举例。易错点提醒：把独立当互斥会算错P(AB)；互斥时P(AB)=0。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 3 验证","time":"9分钟","content":"【PPT P3 验证】教师：「判独立：算P(A),P(B),P(AB)，看是否满足P(AB)=P(A)P(B)。」 板书时机：黑板算例。差异化提示：B班练；A班加非独立。易错点提醒：验证必须三方都算；仅\"感觉\"不够。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 4 乘法公式","time":"9分钟","content":"【PPT P4 乘法】教师：「若A,B独立，P(AB)=P(A)P(B)；多步独立试验概率=各步概率乘积。」 板书时机：黑板写。差异化提示：B班练；A班加三步。易错点提醒：乘法前提必须是\"独立\"；否则用P(AB)=P(A)P(B|A)。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 5 多事件","time":"6分钟","content":"【PPT P5 多事件】教师：「A,B,C两两独立且总体独立时，P(ABC)=P(A)P(B)P(C)。用于串联系统可靠度。」 板书时机：黑板。差异化提示：B班听；A班需说系统。易错点提醒：两两独立未必总体独立，严谨时需验证。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 6 练习+作业","time":"6分钟","content":"【PPT P6 练习】教师：「抛两骰，求\"第一颗6且第二颗偶\"的概率(用独立)。」 板书时机：板书。差异化提示：B班练；A班加非独立例。易错点提醒：下节课学条件概率。 预设回答：「学生自主归纳本课核心要点，同伴补充遗漏，教师用一句话收口并预告下节。」"}],"blackboard":"┌── 独立性 ──┐\n│ 独立:P(AB)= │\n│  P(A)P(B)  │\n│ 独立≠互斥  │\n│ 互斥:P(AB)=0│\n│ 乘法:独立才│\n│  能拆乘积  │\n└────────────┘","exercises":"【基础作业】1. 独立事件P(AB)=__。2. 独立与互斥__(相同/不同)。\n【提高作业】P(A)=0.6,P(B)=0.5且独立，求P(A∪B)。\n【参考答案——教师用】基础1：P(A)P(B)。基础2：不同。提高：P(A∪B)=0.6+0.5-0.3=0.8(用P(AB)=0.3)。","reflection":"✅ 亮点：独立≠互斥对比表直击高频错；乘法前提强调\"独立才拆\"。\n⚠️ 需改进：B班常把独立当互斥，需反复对比。\n📌 下节课衔接：条件概率。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-b2-u5-5","lessonId":"l-math-b2-u5-5","title":"条件概率与全概率","book":"必修第二册","unitNumber":5,"unitTitle":"概率","lessonType":"new","lessonTypeName":"新授课","periodNumber":5,"duration":45,"grade":"高一","subject":"数学","coreLiteracy":["逻辑推理","数学运算"],"tags":["条件概率","全概率","贝叶斯","人教A必修二Ch10","第五课时"],"textbookAnalysis":"条件概率P(B|A)=P(AB)/P(A)(P(A)>0)。全概率公式：由条件概率分解复杂事件概率。重点是条件概率计算与全概率思想。","overview":"【学情分析】A班：能套全概率公式分解；B班：条件概率\"缩减样本空间\"难懂；P(B|A)与P(A|B)混淆；全概率的分划条件不清。共同问题：条件概率是\"在A发生前提下\"；全概率用互斥完备事件组分解。","objectives":["数学抽象：复述条件概率定义。","数学运算：计算P(B|A)与P(AB)。","逻辑推理：用全概率公式分解复杂事件。","直观想象：理解\"缩减样本空间\"。"],"keyPoints":"① 条件概率：\\(P(B|A)=P(AB)/P(A)\\)(P(A)>0)。\n② 含义：在A发生前提下B发生的概率(样本空间缩为A)。\n③ 乘法：\\(P(AB)=P(A)P(B|A)\\)。\n④ 全概率：\\(P(B)=\\sum P(A_i)P(B|A_i)\\)(A_i互斥完备)。","difficulties":"① 缩减空间。原因：条件概率把样本空间限制到A，直觉难，需图。\n② 分子是P(AB)。原因：非P(B)，易错，需强调。\n③ 全概率分划。原因：A_i须互斥且并成全集，选不好则错，需示范。","teachingMethods":"① 缩减空间图。\n② 公式推导。\n③ 全概率分解。\n④ 错例法。","preparation":"【PPT课件】P1 条件概率；P2 缩减空间；P3 乘法；P4 全概率；P5 应用；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——已知一部分信息","time":"5分钟","content":"【PPT P1 条件】教师：「已知\"抽到男生\"，求\"爱好体育\"的概率——这就是在\"男生\"前提下算，是条件概率。」 板书时机：黑板写P(B|A)。差异化提示：B班听；A班需说前提。易错点提醒：条件概率是\"已知A发生\"再算B，空间变了。 预设回答：「学生联系生活或已有知识举例、类比，说出直觉理解，教师顺势引出本课主题。」"},{"step":"Step 2 缩减空间","time":"9分钟","content":"【PPT P2 缩减】教师：「P(B|A)=P(AB)/P(A)：分母把样本空间缩到A，分子是A∩B。可看作\"A中属于B的比例\"。」 板书时机：黑板画缩减。差异化提示：B班看图；A班需推导。易错点提醒：分母是P(A)非1；分子是交P(AB)。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 3 乘法","time":"8分钟","content":"【PPT P3 乘法】教师：「由定义得P(AB)=P(A)P(B|A)=P(B)P(A|B)——乘法公式，求交概率。」 板书时机：黑板写。差异化提示：B班记；A班需联。易错点提醒：乘法公式不要求独立；独立时P(B|A)=P(B)退化回旧式。 预设回答：「学生复述本课关键概念（或公式）并指认前提条件，教师用反例辨析澄清。」"},{"step":"Step 4 全概率","time":"10分钟","content":"【PPT P4 全概率】教师：「把样本空间分为互斥完备组A_i，则P(B)=ΣP(A_i)P(B|A_i)——分段加权求和。」 板书时机：黑板写式+树。差异化提示：B班练；A班加三分支。易错点提醒：A_i须互斥且覆盖全集(完备)；权重是P(A_i)。 预设回答：「学生按本环节要求作答或展示，师生共同点评，必要时教师示范。」"},{"step":"Step 5 应用","time":"7分钟","content":"【PPT P5 应用】教师：「如\"两厂产品合格率不同，随机取一件合格概率\"用全概率：按厂分划再加权。」 板书时机：黑板算例。差异化提示：B班练；A班加贝叶斯逆。易错点提醒：全概率是\"由因求果\"；下节贝叶斯\"由果溯因\"。 预设回答：「学生将新知迁移到真实情境，说出建模（或转化）步骤与结论。」"},{"step":"Step 6 练习+作业","time":"6分钟","content":"【PPT P6 练习】教师：「甲厂60%乙厂40%，合格率各0.98/0.95，求总合格率。」 板书时机：板书。差异化提示：B班练；A班加逆概率。易错点提醒：必修二概率章结束。 预设回答：「学生自主归纳本课核心要点，同伴补充遗漏，教师用一句话收口并预告下节。」"}],"blackboard":"┌── 条件/全概率 ──┐\n│ P(B|A)=P(AB)/│\n│  P(A)      │\n│ 缩空间到A  │\n│ 乘法:P(AB)= │\n│  P(A)P(B|A)│\n│ 全概率:Σw_i·│\n│  P(B|A_i)  │\n└────────────┘","exercises":"【基础作业】1. 条件概率分母一般是__。2. 全概率公式要求A_i__且__。\n【提高作业】甲厂0.6(合格0.98)、乙厂0.4(0.95)，随机取一件合格概率？\n【参考答案——教师用】基础1：P(A)。基础2：互斥、完备(并为全集)。提高：0.6×0.98+0.4×0.95=0.588+0.38=0.968。","reflection":"✅ 亮点：缩减空间图让条件概率直观；全概率\"由因求果\"框架清晰。\n⚠️ 需改进：B班常把P(B|A)分子写成P(B)，需红字P(AB)。\n📌 下节课衔接：数学必修二复习→进入选择性必修。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T16:10:00Z"},{"id":"l-math-sx1-u1-1","lessonId":"l-math-sx1-u1-1","title":"空间向量及其线性运算","book":"选择性必修第一册","unitNumber":1,"unitTitle":"空间向量与立体几何","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["直观想象","数学运算"],"tags":["空间向量","线性运算","共线向量","共面向量","人教A选必一Ch1","第一课时"],"textbookAnalysis":"把平面向量推广到空间：空间向量仍有大小与方向，线性运算（加减、数乘）法则与平面一致，但多了共面向量定理。重点是空间向量线性运算的几何意义与共线、共面向量定理。","overview":"【学情分析】A班：已掌握平面向量运算，能类比迁移到空间，可深入共面定理。B班：空间想象弱，对向量可自由平移在三维中仍模糊；加减法几何易错。共同问题：把空间向量仍当作只能在二维平面画，忽略可在空间中平移。","objectives":["直观想象：理解空间向量的概念，能在空间图形中表示向量并平移。","数学运算：掌握空间向量的加减法与数乘运算及其几何意义。","逻辑推理：理解共线向量定理与共面向量定理并会判定。","数学抽象：归纳空间向量线性运算律与平面向量的一致性。"],"keyPoints":"① 空间向量：既有大小又有方向的量，可自由平移。\n② 加减法：三角形法则、平行四边形法则在空间中同样适用。\n③ 数乘：λa⃗ 模为|λ||a⃗|，λ\x3c0时反向。\n④ 共线定理：b⃗=λa⃗（a⃗≠0）⇔共线。\n⑤ 共面定理：p⃗=xa⃗+yb⃗（a⃗、b⃗不共线）⇔共面。","difficulties":"① 空间想象。原因：二维画三维易错，需借助长方体模型。\n② 共面判定。原因：需两个不共线向量张成平面，易漏「不共线」条件。\n③ 向量平移。原因：空间向量可自由平移，学生易固定起点。","teachingMethods":"① 长方体模型演示。\n② 平面到空间的类比。\n③ 几何作图法。\n④ 定理辨析。","preparation":"【PPT课件】P1 空间向量实例；P2 加减法；P3 数乘；P4 共线定理；P5 共面定理；P6 练习。\n【实物教具】长方体框架与矢量箭头。\n【音频】无。","process":[{"step":"Step 1 导入——从平面到空间","time":"5分钟","content":"【PPT P1 空间向量】教师：「位移、力在空间中同样有大小与方向，这就是空间向量，仍可在空间中自由平移。」 预设回答：「空间向量和平面向量一样有方向！」 板书时机：黑板写「空间向量：大小+方向，可平移」。差异化提示：B班看模型；A班联想平面向量。易错点提醒：空间向量与平面向量本质相同，只是所在空间维度不同。"},{"step":"Step 2 加减法","time":"10分钟","content":"【PPT P2 加减法】教师：「三角形法则、平行四边形法则在空间中照常使用：首尾相接得和，共起点得平行四边形对角线。」 预设回答：「和仍是起点到终点的向量。」 板书时机：黑板作空间折线求和图。差异化提示：B班练两向量和；A班练三向量折线。易错点提醒：多个向量相加依次首尾相接成折线，和从首起点指向末终点。"},{"step":"Step 3 数乘","time":"8分钟","content":"【PPT P3 数乘】教师：「λa⃗ 的模为|λ||a⃗|；λ>0同向，λ\x3c0反向，λ=0得零向量。」 预设回答：「负数倍会把方向反过来。」 板书时机：黑板列数乘规律。差异化提示：B班记规律；A班说明λ\x3c0。易错点提醒：数乘只改变长度与可能方向，不改变「向量」本质。"},{"step":"Step 4 共线向量定理","time":"9分钟","content":"【PPT P4 共线】教师：「a⃗≠0时，b⃗与a⃗共线⇔存在唯一λ使b⃗=λa⃗。这是判定共线的代数工具。」 预设回答：「共线就是能写成倍数关系。」 板书时机：黑板写定理并强调a⃗≠0。差异化提示：B班记结论；A班说唯一性。易错点提醒：必须a⃗≠0，否则任意λ都成立，定理失效。"},{"step":"Step 5 共面向量定理","time":"9分钟","content":"【PPT P5 共面】教师：「若a⃗、b⃗不共线，则向量p⃗与a⃗、b⃗共面⇔存在x、y使p⃗=xa⃗+yb⃗。」 预设回答：「共面就是能由两个不共线向量线性表示。」 板书时机：黑板写共面定理。差异化提示：B班记；A班需举共面反例。易错点提醒：a⃗、b⃗必须「不共线」，否则张不成平面。"},{"step":"Step 6 练习+作业","time":"4分钟","content":"【PPT P6 练习】教师：「已知a⃗、b⃗不共线，p⃗=2a⃗-3b⃗，判断p⃗是否与共面？」 预设回答：「能表示，所以共面！」 板书时机：板书小结。差异化提示：B班做基础；A班加证明题。易错点提醒：下节课学空间向量的数量积。"}],"blackboard":"┌── 空间向量线性运算 ──┐\n│ 空间向量=大小+方向│\n│ 可自由平移      │\n│ 加减:三角/平行四│\n│   边形法则      │\n│ 数乘:λa⃗ 模|λ||a⃗│\n│ 共线:a⃗≠0,b⃗=λa⃗│\n│ 共面:p⃗=xa⃗+yb⃗ │\n│  (a⃗,b⃗不共线)   │\n└────────────────┘","exercises":"【基础作业】1. 判断：空间向量可自由平移（ ）。2. 若b⃗=2a⃗（a⃗≠0），则a⃗、b⃗___。\n【提高作业】证明：已知a⃗、b⃗不共线，若p⃗=3a⃗-2b⃗，则p⃗、a⃗、b⃗共面。\n【参考答案——教师用】基础1：√。基础2：共线。提高：由共面定理p⃗=xa⃗+yb⃗可直接得共面（x=3,y=-2）。","reflection":"✅ 亮点：长方体模型让空间向量看得见，平面到空间类比顺畅。\n⚠️ 需改进：共面定理的「不共线」条件B班易漏，需红字强调。\n📌 下节课衔接：空间向量的数量积。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx1-u1-2","lessonId":"l-math-sx1-u1-2","title":"空间向量的数量积","book":"选择性必修第一册","unitNumber":1,"unitTitle":"空间向量与立体几何","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","直观想象"],"tags":["数量积","夹角","投影","运算律","人教A选必一Ch1","第二课时"],"textbookAnalysis":"定义空间向量数量积a⃗·b⃗=|a⃗||b⃗|cosθ，导出夹角公式cosθ=(a⃗·b⃗)/(|a⃗||b⃗|)与模长公式|a⃗|²=a⃗·a⃗。重点是数量积的几何意义与夹角计算，难点是垂直判定a⃗·b⃗=0。","overview":"【学情分析】A班：能推导夹角公式并用于判定垂直；B班：常把数量积当普通乘法（忽略夹角）；cosθ符号与夹角范围易混。共同问题：认为a⃗·b⃗是向量（实际是数量）；忘记夹角为[0,π]。","objectives":["数学运算：理解空间向量数量积的定义并会计算。","直观想象：用数量积几何意义理解投影与夹角。","逻辑推理：会用a⃗·b⃗=0判定两向量垂直。","数学抽象：归纳数量积的运算律（交换、分配，不结合）。"],"keyPoints":"① 数量积：a⃗·b⃗=|a⃗||b⃗|cosθ，结果是数量。\n② 夹角：cosθ=(a⃗·b⃗)/(|a⃗||b⃗|)，θ∈[0,π]。\n③ 垂直：a⃗·b⃗=0⇔a⃗⊥b⃗（含零向量）。\n④ 模：|a⃗|²=a⃗·a⃗，|a⃗|=√(a⃗·a⃗)。\n⑤ 运算律：交换、分配成立；无结合律(a⃗·b⃗)c⃗≠a⃗(b⃗·c⃗)。","difficulties":"① 结果为数量。原因：学生易误以为数量积是向量，需强调。\n② 夹角范围。原因：θ∈[0,π]，cosθ为负表示钝角，易漏。\n③ 无结合律。原因：类比实数误推结合，需反例。","teachingMethods":"① 投影几何演示。\n② 公式推导。\n③ 垂直判定训练。\n④ 反例辨析。","preparation":"【PPT课件】P1 数量积定义；P2 投影；P3 夹角公式；P4 垂直判定；P5 模与运算律；P6 练习。\n【实物教具】两矢量夹角演示器。\n【音频】无。","process":[{"step":"Step 1 导入——向量也能相乘？","time":"5分钟","content":"【PPT P1 定义】教师：「两向量相乘得到一个数：a⃗·b⃗=|a⃗||b⃗|cosθ，叫数量积（点积）。」 预设回答：「结果是数不是向量！」 板书时机：黑板写定义。差异化提示：B班记定义；A班联想功W=Fs cosθ。易错点提醒：数量积结果是实数，不是向量。"},{"step":"Step 2 投影意义","time":"9分钟","content":"【PPT P2 投影】教师：「a⃗·b⃗=|a⃗|乘b⃗在a⃗方向上的投影，也可=|b⃗|乘a⃗投影。投影可正可负。」 预设回答：「投影带符号，钝角时为负。」 板书时机：黑板画投影。差异化提示：B班看图；A班说符号。易错点提醒：投影是数量；夹角钝角时投影为负。"},{"step":"Step 3 夹角公式","time":"9分钟","content":"【PPT P3 夹角】教师：「由定义得cosθ=(a⃗·b⃗)/(|a⃗||b⃗|)，θ∈[0,π]。点积负⇒钝角。」 预设回答：「先算模再算cosθ。」 板书时机：黑板写公式。差异化提示：B班套公式；A班说范围。易错点提醒：θ范围是[0,π]，cosθ\x3c0对应钝角而非负角。"},{"step":"Step 4 垂直判定","time":"8分钟","content":"【PPT P4 垂直】教师：「a⃗·b⃗=0⇔a⃗⊥b⃗（零向量与任意向量垂直）。」 预设回答：「点积为零就垂直。」 板书时机：黑板写判定。差异化提示：B班记；A班加证明。易错点提醒：零向量与任何向量数量积为0，也算垂直（约定）。"},{"step":"Step 5 模与运算律","time":"9分钟","content":"【PPT P5 模/律】教师：「|a⃗|²=a⃗·a⃗；运算满足交换、分配，但(a⃗·b⃗)c⃗≠a⃗(b⃗·c⃗)（无结合律）。」 预设回答：「没有结合律！」 板书时机：黑板列律。差异化提示：B班记；A班需反例。易错点提醒：数量积无结合律，不能随意加括号。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「若|a⃗|=2、|b⃗|=3、a⃗·b⃗=-3，求夹角。」 预设回答：「cosθ=-1/2，θ=120°！」 板书时机：板书。差异化提示：B班练；A班加证明垂直。易错点提醒：下节课学空间向量基本定理。"}],"blackboard":"┌── 空间向量数量积 ──┐\n│ a⃗·b⃗=|a⃗||b⃗|cosθ│\n│ 结果为数量     │\n│ cosθ=(a⃗·b⃗)/  │\n│  (|a⃗||b⃗|)    │\n│ 垂直:a⃗·b⃗=0  │\n│ |a⃗|=√(a⃗·a⃗) │\n│ 无结合律!     │\n└────────────────┘","exercises":"【基础作业】1. 数量积结果是____（向量/数量）。2. a⃗·b⃗=0⇔____。\n【提高作业】已知|a⃗|=2、|b⃗|=3、a⃗·b⃗=-3，求夹角并判断是否垂直。\n【参考答案——教师用】基础1：数量。基础2：a⃗⊥b⃗。提高：cosθ=-3/(2×3)=-1/2，θ=120°，不垂直。","reflection":"✅ 亮点：用功W=Fs cosθ类比让数量积直观；夹角公式推导清楚。\n⚠️ 需改进：B班常误以为数量积是向量，需反复强调「结果是数」。\n📌 下节课衔接：空间向量基本定理。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx1-u1-3","lessonId":"l-math-sx1-u1-3","title":"空间向量基本定理","book":"选择性必修第一册","unitNumber":1,"unitTitle":"空间向量与立体几何","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学抽象","逻辑推理"],"tags":["空间向量基本定理","基底","线性表示","人教A选必一Ch1","第三课时"],"textbookAnalysis":"空间向量基本定理：若e⃗1、e⃗2、e⃗3不共面，则任意空间向量p⃗可唯一表示为p⃗=xe⃗1+ye⃗2+ze⃗3。e⃗1、e⃗2、e⃗3称为空间的一个基底。重点是基底唯一性与线性表示。","overview":"【学情分析】A班：能理解基底唯一性并求系数；B班：对「不共面」三向量张成空间难想象；系数求解易错。共同问题：把平面基底（两个）误用到空间（需三个不共面）。","objectives":["数学抽象：复述空间向量基本定理，理解基底的含义。","逻辑推理：判断三个向量能否作为空间基底（是否共面）。","数学运算：将已知向量用基底唯一线性表示并求系数。","直观想象：在长方体中用共顶点三棱建立基底。"],"keyPoints":"① 基本定理：e⃗1、e⃗2、e⃗3不共面⇒任意p⃗=xe⃗1+ye⃗2+ze⃗3且表示唯一。\n② 基底：不共面的三个向量叫空间的一个基底。\n③ 零向量不可作基底。\n④ 共面向量不能作基底（缺一个维度）。","difficulties":"① 不共面条件。原因：平面基底是两向量，空间需三不共面，易混，需模型。\n② 系数唯一性。原因：由定理保证，学生需会用方程求x、y、z。\n③ 基底选择。原因：常选正交单位基底{i⃗,j⃗,k⃗}简化。","teachingMethods":"① 长方体基底演示。\n② 定理对比（平面vs空间）。\n③ 系数求解训练。\n④ 基底判定辨析。","preparation":"【PPT课件】P1 定理；P2 基底；P3 长方体基底；P4 不共面判定；P5 系数求法；P6 练习。\n【实物教具】长方体三棱箭头。\n【音频】无。","process":[{"step":"Step 1 导入——空间需要几个方向","time":"5分钟","content":"【PPT P1 定理】教师：「平面内两个不共线向量就能表示一切；空间中需要三个不共面的向量作基底。」 预设回答：「空间比平面多一个方向！」 板书时机：黑板写定理。差异化提示：B班看模型；A班对比平面。易错点提醒：空间基底是三个不共面向量，不是两个。"},{"step":"Step 2 基底概念","time":"9分钟","content":"【PPT P2 基底】教师：「不共面的三个向量e⃗1、e⃗2、e⃗3构成空间一个基底；零向量不能作基底。」 预设回答：「基底里的向量不能共面。」 板书时机：黑板写基底定义。差异化提示：B班记；A班说为何零向量不行。易错点提醒：基底三向量必须两两不共面（整体不共面）。"},{"step":"Step 3 长方体基底","time":"8分钟","content":"【PPT P3 长方体】教师：「取长方体共顶点三棱方向的单位向量i⃗、j⃗、k⃗，任意向量可写为xi⃗+yj⃗+zk⃗。」 预设回答：「这就是空间直角坐标系的雏形。」 板书时机：黑板标三轴。差异化提示：B班看图；A班联坐标系。易错点提醒：正交单位基底最常用，对应xyz轴。"},{"step":"Step 4 不共面判定","time":"9分钟","content":"【PPT P4 判定】教师：「三个向量能否作基底，看是否共面：若其中一个可被另两个线性表示则不能作基底。」 预设回答：「能线性表示就共面，不能作基底。」 板书时机：黑板写判定。差异化提示：B班做判断；A班加证明。易错点提醒：共面⇔可表为两向量线性组合，此时缺维度。"},{"step":"Step 5 系数求法","time":"9分钟","content":"【PPT P5 系数】教师：「已知p⃗=xe⃗1+ye⃗2+ze⃗3，用向量等式分量列方程解x、y、z，由唯一性保证有唯一解。」 预设回答：「列方程解三个未知数。」 板书时机：黑板示范求解。差异化提示：B班练数字；A班用字母基底。易错点提醒：系数由定理唯一确定，不能随意改。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「以长方体棱为基底，表示体对角线向量。」 预设回答：「体对角线=三棱向量之和！」 板书时机：板书。差异化提示：B班练；A班加一般表示。易错点提醒：下节课学空间向量坐标表示。"}],"blackboard":"┌── 空间向量基本定理 ──┐\n│ e⃗1,e⃗2,e⃗3不共面│\n│ ⇒p⃗=xe⃗1+ye⃗2+  │\n│   ze⃗3(唯一)   │\n│ 基底:三不共面 │\n│ 零向量不可作  │\n│ 常用:         │\n│  i⃗,j⃗,k⃗正交基 │\n└────────────────┘","exercises":"【基础作业】1. 空间基底含____个不共面向量。2. 零向量____（能/不能）作基底。\n【提高作业】在长方体ABCD-A1B1C1D1中，以AB、AD、AA1为基底，表示AC1⃗。\n【参考答案——教师用】基础1：3。基础2：不能。提高：AC1⃗=AB⃗+AD⃗+AA1⃗。","reflection":"✅ 亮点：长方体三棱作基底直观，自然引出空间坐标系。\n⚠️ 需改进：B班对「不共面」仍靠背，需用模型多感知。\n📌 下节课衔接：空间向量坐标表示。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx1-u1-4","lessonId":"l-math-sx1-u1-4","title":"空间向量的坐标表示","book":"选择性必修第一册","unitNumber":1,"unitTitle":"空间向量与立体几何","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","直观想象"],"tags":["空间坐标","坐标运算","模长公式","夹角公式","人教A选必一Ch1","第四课时"],"textbookAnalysis":"建立空间直角坐标系后，向量a⃗=(x,y,z)。坐标运算：加减、数乘按分量；模|a⃗|=√(x²+y²+z²)；数量积a⃗·b⃗=x1x2+y1y2+z1z2；夹角cosθ=(a⃗·b⃗)/(|a⃗||b⃗|)。重点是坐标法运算与夹角公式。","overview":"【学情分析】A班：能熟练用坐标算模、夹角、垂直；B班：建系选点易错，坐标写反；数量积坐标公式漏项。共同问题：空间两点距离公式与模公式混淆；夹角公式分母算错。","objectives":["数学运算：写出空间向量的坐标并做加减、数乘、数量积。","直观想象：建立空间直角坐标系，用坐标表示点与向量。","数学运算：用坐标计算向量模长与两点距离。","逻辑推理：用坐标判定两向量平行、垂直与夹角。"],"keyPoints":"① 坐标：a⃗=(x,y,z)，加减数乘按分量。\n② 数量积：a⃗·b⃗=x1x2+y1y2+z1z2。\n③ 模：|a⃗|=√(x²+y²+z²)，距离d=√((x2-x1)²+(y2-y1)²+(z2-z1)²)。\n④ 夹角：cosθ=(x1x2+y1y2+z1z2)/(|a⃗||b⃗|)。\n⑤ 垂直：x1x2+y1y2+z1z2=0。","difficulties":"① 建系。原因：需两两垂直的三轴，选点错则全错，需规范。\n② 数量积公式。原因：三项和易漏z项，需强调。\n③ 夹角分母。原因：两模相乘易漏一个，需分步。","teachingMethods":"① 坐标系建模。\n② 坐标运算训练。\n③ 公式推导。\n④ 错例辨析。","preparation":"【PPT课件】P1 空间坐标系；P2 向量坐标；P3 坐标运算；P4 模与距离；P5 夹角与垂直；P6 练习。\n【实物教具】空间坐标模型。\n【音频】无。","process":[{"step":"Step 1 导入——给空间向量编号","time":"5分钟","content":"【PPT P1 坐标系】教师：「建空间直角坐标系，点与向量都用三元坐标(x,y,z)表示，运算转为代数。」 预设回答：「向量也能像数一样算了！」 板书时机：黑板写a⃗=(x,y,z)。差异化提示：B班看模型；A班联基底。易错点提醒：坐标顺序固定为(x,y,z)，别写反。"},{"step":"Step 2 向量坐标","time":"9分钟","content":"【PPT P2 坐标】教师：「向量AB⃗=终点坐标-起点坐标；a⃗=(x,y,z)对应xi⃗+yj⃗+zk⃗。」 预设回答：「用终点减起点得向量坐标。」 板书时机：黑板写公式。差异化提示：B班练；A班说基底对应。易错点提醒：向量坐标=终点-起点，不是直接读终点。"},{"step":"Step 3 坐标运算","time":"9分钟","content":"【PPT P3 运算】教师：「加减、数乘按分量；数量积a⃗·b⃗=x1x2+y1y2+z1z2（三项之和）。」 预设回答：「点积是三个分量乘积相加。」 板书时机：黑板列运算。差异化提示：B班练；A班加证明。易错点提醒：数量积三项都不能漏，尤其z分量。"},{"step":"Step 4 模与距离","time":"8分钟","content":"【PPT P4 模/距】教师：「|a⃗|=√(x²+y²+z²)；两点距离d=√((Δx)²+(Δy)²+(Δz)²)。」 预设回答：「距离就是向量模。」 板书时机：黑板写两式。差异化提示：B班套；A班说联系。易错点提醒：模是平方根，先平方和再开方，别忘根号。"},{"step":"Step 5 夹角与垂直","time":"9分钟","content":"【PPT P5 夹角】教师：「cosθ=(x1x2+y1y2+z1z2)/(|a⃗||b⃗|)；垂直⇔点积=0。」 预设回答：「代坐标算cosθ即可。」 板书时机：黑板写判定。差异化提示：B班练；A班加角度。易错点提醒：分母是两个模相乘，先分别算模。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「a⃗=(1,2,2)、b⃗=(2,-2,1)，求a⃗·b⃗与|a⃗|。」 预设回答：「点积=2-4+2=0，垂直！」 板书时机：板书。差异化提示：B班练；A班加夹角。易错点提醒：下节课用坐标解平行垂直。"}],"blackboard":"┌── 空间向量坐标 ──┐\n│ a⃗=(x,y,z)    │\n│ 加减:分量算  │\n│ 点积:x1x2+    │\n│  y1y2+z1z2  │\n│ |a⃗|=√(x²+y²+│\n│  z²)         │\n│ 垂直:点积=0  │\n└────────────────┘","exercises":"【基础作业】1. a⃗=(1,0,0)、b⃗=(0,1,0)，则a⃗·b⃗=____。2. 两点距离公式=____。\n【提高作业】a⃗=(1,2,2)、b⃗=(2,-2,1)，判断位置关系并求|a⃗|。\n【参考答案——教师用】基础1：0。基础2：√((Δx)²+(Δy)²+(Δz)²)。提高：点积=0⇒垂直；|a⃗|=3。","reflection":"✅ 亮点：坐标化后向量运算变代数，学生上手快。\n⚠️ 需改进：B班数量积常漏z项，需红字「三项」。\n📌 下节课衔接：坐标法判定平行与垂直。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx1-u1-5","lessonId":"l-math-sx1-u1-5","title":"空间向量运算的坐标应用","book":"选择性必修第一册","unitNumber":1,"unitTitle":"空间向量与立体几何","lessonType":"new","lessonTypeName":"新授课","periodNumber":5,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","逻辑推理"],"tags":["坐标法","平行判定","垂直判定","人教A选必一Ch1","第五课时"],"textbookAnalysis":"用坐标表示向量后，平行与垂直转为坐标关系：a⃗∥b⃗⇔对应分量成比例（b⃗≠0）；a⃗⊥b⃗⇔点积为0。结合立体几何图形建系，用向量法判定线线、线面关系。重点是坐标法判定平行垂直。","overview":"【学情分析】A班：能建系后用坐标法证明平行垂直；B班：比例式写错（分母为零）；建系选轴不垂直。共同问题：平行用比例、垂直用点积，两种方法易混用。","objectives":["数学运算：用坐标比例判定两向量平行。","数学运算：用坐标点积判定两向量垂直。","逻辑推理：在立体几何图形中建立适当坐标系。","直观想象：用坐标法将几何关系转化为代数计算。"],"keyPoints":"① 平行：a⃗∥b⃗（b⃗≠0）⇔x1/x2=y1/y2=z1/z2（对应分量成比例）。\n② 垂直：a⃗⊥b⃗⇔x1x2+y1y2+z1z2=0。\n③ 建系：选两两垂直的三条棱为轴，标原点。\n④ 向量法：把线线、线面关系转为向量平行/垂直。","difficulties":"① 比例分母为零。原因：某分量为0时不能直接除，需分类，易错。\n② 建系不当。原因：轴不垂直则坐标失效，需规范。\n③ 平行vs垂直混淆。原因：方法不同，需按目标选。","teachingMethods":"① 建系规范训练。\n② 平行比例法。\n③ 垂直点积法。\n④ 综合例题。","preparation":"【PPT课件】P1 建系；P2 平行坐标；P3 垂直坐标；P4 综合例题；P5 易错；P6 练习。\n【实物教具】坐标模型。\n【音频】无。","process":[{"step":"Step 1 导入——几何问题代数化","time":"5分钟","content":"【PPT P1 建系】教师：「把立体图形放进坐标系，平行垂直都能用坐标算，省去繁琐几何推理。」 预设回答：「代数比几何好算！」 板书时机：黑板写思路。差异化提示：B班看模型；A班说优势。易错点提醒：建系必须三轴两两垂直，否则坐标错误。"},{"step":"Step 2 平行坐标法","time":"10分钟","content":"【PPT P2 平行】教师：「a⃗∥b⃗（b⃗≠0）⇔对应分量成比例。注意某分量为0时的写法。」 预设回答：「分量成比例就平行。」 板书时机：黑板写比例式。差异化提示：B班练；A班处理零分量。易错点提醒：分母为0不能直接除，应写对应坐标相等或向量等式。"},{"step":"Step 3 垂直坐标法","time":"9分钟","content":"【PPT P3 垂直】教师：「a⃗⊥b⃗⇔x1x2+y1y2+z1z2=0，代坐标直接算。」 预设回答：「点积为零即垂直。」 板书时机：黑板写判定。差异化提示：B班套；A班加证明。易错点提醒：垂直用点积（和为0），别误用比例。"},{"step":"Step 4 综合例题","time":"10分钟","content":"【PPT P4 例题】教师：「在立方体中建系，判定两条异面棱方向向量的关系（平行/垂直/夹角）。」 预设回答：「算坐标分量即可判定。」 板书时机：黑板完整解一题。差异化提示：B班跟算；A班加变式。易错点提醒：方向向量要取自直线，不是任意两点。"},{"step":"Step 5 易错辨析","time":"6分钟","content":"【PPT P5 易错】教师：「平行用比例、垂直用点积；零分量特殊处理；建系先确认三轴垂直。」 预设回答：「方法选对就不乱。」 板书时机：黑板列对比。差异化提示：B班背；A班说法理。易错点提醒：两种方法别混，看清目标。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「已知两向量坐标，判定平行或垂直并求可能夹角。」 预设回答：「先算点积再看比例。」 板书时机：板书。差异化提示：B班练；A班加证明。易错点提醒：下节课学方向向量与法向量。"}],"blackboard":"┌── 坐标判定平行垂直 ──┐\n│ 建系:三轴垂直 │\n│ 平行:a⃗∥b⃗    │\n│  分量成比例   │\n│ 垂直:a⃗⊥b⃗    │\n│  点积=0      │\n│ 零分量特殊处 │\n│ 理           │\n└────────────────┘","exercises":"【基础作业】1. a⃗=(1,2,3)与b⃗=(2,4,6)的关系____。2. 垂直的坐标条件是____。\n【提高作业】在棱长为1的正方体中建系，判定AB与CC1方向向量的关系。\n【参考答案——教师用】基础1：平行（成比例k=2）。基础2：x1x2+y1y2+z1z2=0。提高：AB⃗=(1,0,0)，CC1⃗=(0,0,1)，点积=0⇒垂直。","reflection":"✅ 亮点：坐标法把几何证明变计算，学生信心大增。\n⚠️ 需改进：B班零分量比例易错，需专门训练等价写法。\n📌 下节课衔接：直线方向向量与平面法向量。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx1-u1-6","lessonId":"l-math-sx1-u1-6","title":"直线的方向向量与平面的法向量","book":"选择性必修第一册","unitNumber":1,"unitTitle":"空间向量与立体几何","lessonType":"new","lessonTypeName":"新授课","periodNumber":6,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["直观想象","数学运算"],"tags":["方向向量","法向量","人教A选必一Ch1","第六课时"],"textbookAnalysis":"直线的方向向量是与直线平行的非零向量；平面的法向量是垂直于平面的非零向量。掌握求法：方向向量取直线上两点的差；法向量通过设n⃗=(x,y,z)并令其与面内两不共线向量点积为0求解。重点是法向量的求法。","overview":"【学情分析】A班：能设未知量解方法向量；B班：方向向量取错（非直线上两点）；法向量方程组解不唯一易慌。共同问题：法向量只要求「垂直平面」，不唯一，学生纠结取哪个。","objectives":["直观想象：理解直线方向向量与平面法向量的几何意义。","数学运算：求已知直线的方向向量。","数学运算：用方程组求平面的一个法向量。","逻辑推理：说明法向量不唯一但方向平行。"],"keyPoints":"① 方向向量：与直线平行的非零向量v⃗，取直线上两点之差。\n② 法向量：垂直平面的非零向量n⃗，n⃗⊥面内任意向量。\n③ 求法向量：设n⃗=(x,y,z)，令n⃗·a⃗=0、n⃗·b⃗=0（a⃗、b⃗不共线于面内），解方程组。\n④ 法向量不唯一，彼此平行。","difficulties":"① 方向向量取法。原因：须取直线上的两点之差，易取错点。\n② 法向量方程组。原因：三个未知两方程，需给一变量赋值，易卡。\n③ 不唯一性。原因：学生以为有唯一解，需说明平行即可。","teachingMethods":"① 几何直观演示。\n② 方程组求解训练。\n③ 赋值法示范。\n④ 不唯一性讨论。","preparation":"【PPT课件】P1 方向向量；P2 法向量；P3 求方向向量；P4 求法向量；P5 赋值；P6 练习。\n【实物教具】法向量演示棒。\n【音频】无。","process":[{"step":"Step 1 导入——给直线和平面定方向","time":"5分钟","content":"【PPT P1 方向向量】教师：「直线用一个平行向量（方向向量）刻画；平面用一个垂直向量（法向量）刻画。」 预设回答：「方向向量管方向，法向量管朝向！」 板书时机：黑板写两概念。差异化提示：B班看模型；A班说意义。易错点提醒：方向向量、法向量都取非零向量。"},{"step":"Step 2 方向向量求法","time":"9分钟","content":"【PPT P2 方向】教师：「取直线上两点A、B，方向向量v⃗=AB⃗=B-A（坐标差）。」 预设回答：「终点减起点。」 板书时机：黑板写公式。差异化提示：B班练；A班说任意性。易错点提醒：必须取直线上的两点，不能取面外点。"},{"step":"Step 3 法向量概念","time":"8分钟","content":"【PPT P3 法向量】教师：「n⃗垂直平面⇔n⃗与平面内任意向量垂直；法向量不唯一，彼此平行。」 预设回答：「法向量都互相平行。」 板书时机：黑板写定义。差异化提示：B班记；A班说不唯一。易错点提醒：法向量不唯一，取任一即可。"},{"step":"Step 4 求法向量","time":"10分钟","content":"【PPT P4 求法】教师：「设n⃗=(x,y,z)，取面内两不共线向量a⃗、b⃗，令n⃗·a⃗=0、n⃗·b⃗=0，得两个方程。」 预设回答：「列两个点积为0的方程。」 板书时机：黑板列方程组。差异化提示：B班跟；A班说选择。易错点提醒：a⃗、b⃗必须不共线，否则方程退化。"},{"step":"Step 5 赋值求解","time":"8分钟","content":"【PPT P5 赋值】教师：「三个未知两方程，令某一变量为1（或简单值）解出其余，即得一个法向量。」 预设回答：「给z=1就能解x、y。」 板书时机：黑板算例。差异化提示：B班练；A班加多解。易错点提醒：赋值任意，结果只差倍数，都是正确的法向量。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「已知平面两点与一向量，求该平面一个法向量。」 预设回答：「列方程赋值求解。」 板书时机：板书。差异化提示：B班练；A班加验证。易错点提醒：下节课用向量法证平行垂直。"}],"blackboard":"┌── 方向向量与法向量 ──┐\n│ 方向向量v⃗=   │\n│  AB⃗(直线上)  │\n│ 法向量n⃗⊥平面 │\n│ 求:n⃗·a⃗=0   │\n│  n⃗·b⃗=0     │\n│ 赋值解(不唯一)│\n└────────────────┘","exercises":"【基础作业】1. 直线方向向量可取____。2. 平面法向量满足____。\n【提高作业】平面过点A(0,0,0)、B(1,0,0)、C(0,1,0)，求该平面一个法向量。\n【参考答案——教师用】基础1：直线上两点坐标差。基础2：与平面内任意向量点积为0。提高：面内AB⃗=(1,0,0)、AC⃗=(0,1,0)，设法n⃗=(x,y,z)，由x=0、y=0取n⃗=(0,0,1)。","reflection":"✅ 亮点：法向量「赋值法」破解不唯一焦虑，学生敢下手。\n⚠️ 需改进：B班易取共线向量列方程组，需强调不共线。\n📌 下节课衔接：向量法证明平行与垂直。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx1-u1-7","lessonId":"l-math-sx1-u1-7","title":"用向量法证明平行与垂直","book":"选择性必修第一册","unitNumber":1,"unitTitle":"空间向量与立体几何","lessonType":"new","lessonTypeName":"新授课","periodNumber":7,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["逻辑推理","数学运算"],"tags":["向量法","线面平行","线面垂直","面面垂直","人教A选必一Ch1","第七课时"],"textbookAnalysis":"用方向向量与法向量将位置关系代数化：线线平行⇔方向向量平行；线面平行⇔方向向量⊥法向量；线面垂直⇔方向向量∥法向量；面面垂直⇔法向量垂直。重点是建系后用向量法证明。","overview":"【学情分析】A班：能建系完整证明线面平行垂直；B班：判定条件记混（平行用垂直、垂直用平行）；法向量算错连锁出错。共同问题：把「线面平行」误用方向向量平行，正确应为方向向量⊥法向量。","objectives":["逻辑推理：说出线线、线面、面面平行垂直的向量判定条件。","数学运算：求直线方向向量与平面法向量。","直观想象：把几何位置关系转化为向量关系。","逻辑推理：用向量法规范书写证明过程。"],"keyPoints":"① 线线平行：方向向量平行。\n② 线面平行：直线方向向量⊥平面法向量（且线不在面内）。\n③ 线面垂直：直线方向向量∥平面法向量。\n④ 面面垂直：两平面法向量垂直（点积为0）。\n⑤ 面面平行：法向量平行。","difficulties":"① 线面平行条件。原因：应为方向向量⊥法向量，易误用平行，需辨析。\n② 条件组合。原因：六种关系易混，需对比表。\n③ 建系与算错。原因：任一步错全错，需规范。","teachingMethods":"① 判定条件对比表。\n② 建系规范。\n③ 完整证明示范。\n④ 错例辨析。","preparation":"【PPT课件】P1 判定表；P2 线面平行；P3 线面垂直；P4 面面关系；P5 综合；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——位置关系的向量语言","time":"5分钟","content":"【PPT P1 判定表】教师：「位置关系都能翻译成向量关系：平行用垂直（方向⊥法向）、垂直用平行（方向∥法向）。」 预设回答：「原来平行和垂直是反着的！」 板书时机：黑板写判定表。差异化提示：B班背表；A班说机理。易错点提醒：线面平行⇔方向向量⊥法向量，不是平行。"},{"step":"Step 2 线面平行","time":"10分钟","content":"【PPT P2 线面平】教师：「证直线方向向量v⃗与平面法向量n⃗点积为0，且直线有一点不在平面内，则线面平行。」 预设回答：「v⃗·n⃗=0就平行（还要点不在面内）。」 板书时机：黑板完整证一题。差异化提示：B班跟；A班加严谨。易错点提醒：必须补「直线上一点不在平面内」，否则可能线在面内。"},{"step":"Step 3 线面垂直","time":"9分钟","content":"【PPT P3 线面垂】教师：「v⃗∥n⃗（成比例）⇒直线垂直平面。」 预设回答：「方向向量平行法向量就垂直平面。」 板书时机：黑板写。差异化提示：B班套；A班加证明。易错点提醒：线面垂直⇔方向向量∥法向量，与平行相反。"},{"step":"Step 4 面面关系","time":"10分钟","content":"【PPT P4 面面】教师：「面面垂直⇔法向量点积为0；面面平行⇔法向量平行。」 预设回答：「两个法向量的关系决定两平面关系。」 板书时机：黑板写。差异化提示：B班练；A班加综合。易错点提醒：用各自法向量，别混用同一条。"},{"step":"Step 5 综合例题","time":"6分钟","content":"【PPT P5 综合】教师：「在几何体建系，综合判定线面、面面关系各一例。」 预设回答：「建系→求向量→套条件。」 板书时机：黑板小结流程。差异化提示：B班跟；A班提速。易错点提醒：流程化：建系、求向、判定。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「给定一个几何体，证明某棱垂直某面。」 预设回答：「算方向向量和法向量再比。」 板书时机：板书。差异化提示：B班练；A班加平行题。易错点提醒：下节课学空间角求法。"}],"blackboard":"┌── 向量法证平行垂直 ──┐\n│ 线线平行:v⃗∥u⃗ │\n│ 线面平行:v⃗⊥n⃗ │\n│  (点不在面内)  │\n│ 线面垂直:v⃗∥n⃗ │\n│ 面面垂直:n⃗⊥m⃗ │\n│ 面面平行:n⃗∥m⃗ │\n└────────────────┘","exercises":"【基础作业】1. 线面平行⇔方向向量与法向量____。2. 面面垂直⇔法向量____。\n【提高作业】正方体中证明：体对角线垂直于一对角面。\n【参考答案——教师用】基础1：垂直（点积0）。基础2：垂直（点积0）。提高：建系取法向量，验证体对角线方向向量与对角面法向量点积为0。","reflection":"✅ 亮点：判定对比表让六种关系不再混乱，证明流程化。\n⚠️ 需改进：B班「线面平行却用方向平行」仍犯，需反复辨析。\n📌 下节课衔接：空间角的向量求法。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx1-u1-8","lessonId":"l-math-sx1-u1-8","title":"空间角（线线角、线面角）的向量求法","book":"选择性必修第一册","unitNumber":1,"unitTitle":"空间向量与立体几何","lessonType":"new","lessonTypeName":"新授课","periodNumber":8,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","直观想象"],"tags":["线线角","线面角","向量法","人教A选必一Ch1","第八课时"],"textbookAnalysis":"线线角：取两直线方向向量，cosθ=|v⃗·u⃗|/(|v⃗||u⃗|)（取锐角）。线面角：直线方向向量v⃗与平面法向量n⃗，sinθ=|v⃗·n⃗|/(|v⃗||n⃗|)。重点是两类角的向量公式与取绝对值。","overview":"【学情分析】A班：能区分线线角取锐角、线面角用sin；B班：常把线面角误用cos（应为sin）；绝对值漏掉得钝角。共同问题：线线角范围是[0,π/2]故取绝对值；线面角是直线与它在面内投影的夹角。","objectives":["数学运算：用方向向量求两直线夹角（取锐角）。","数学运算：用方向向量与法向量求线面角（用sin）。","直观想象：理解线面角是直线与投影的夹角。","逻辑推理：说明线线角、线面角公式的绝对值与三角函数选择。"],"keyPoints":"① 线线角：cosθ=|v⃗·u⃗|/(|v⃗||u⃗|)，θ∈[0,π/2]。\n② 线面角：sinθ=|v⃗·n⃗|/(|v⃗||n⃗|)，θ∈[0,π/2]。\n③ 关键：线线角取绝对值（锐角）；线面角用正弦。\n④ 步骤：建系→方向向量/法向量→代入公式。","difficulties":"① 线面角用sin。原因：角是v⃗与投影夹角，等于v⃗与n⃗余角的余角，需推导。\n② 取绝对值。原因：夹角取锐角，cos/sin结果为负要取绝对值。\n③ 公式混淆。原因：线线cos、线面sin不同，需对比。","teachingMethods":"① 公式推导。\n② 几何意义演示。\n③ 对比训练。\n④ 错例辨析。","preparation":"【PPT课件】P1 线线角；P2 线面角；P3 公式推导；P4 对比；P5 例题；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——把角交给向量","time":"5分钟","content":"【PPT P1 线线角】教师：「两直线夹角就是它们方向向量的夹角（取锐角）。」 预设回答：「用方向向量点积算。」 板书时机：黑板写线线角公式。差异化提示：B班背；A班说范围。易错点提醒：线线角范围[0,π/2]，公式取绝对值。"},{"step":"Step 2 线面角概念","time":"9分钟","content":"【PPT P2 线面角】教师：「线面角是直线与它在平面内投影的夹角，等于直线方向向量与平面法向量夹角的余角。」 预设回答：「所以要用sin而不是cos。」 板书时机：黑板画图。差异化提示：B班看图；A班说推导。易错点提醒：线面角用sinθ=|v⃗·n⃗|/(|v⃗||n⃗|)，不是cos。"},{"step":"Step 3 公式推导","time":"9分钟","content":"【PPT P3 推导】教师：「设v⃗与n⃗夹角φ，则线面角θ=π/2-φ，故sinθ=cosφ=|v⃗·n⃗|/(|v⃗||n⃗|)。」 预设回答：「余角关系推出sin。」 板书时机：黑板推导。差异化提示：B班记；A班推导。易错点提醒：核心是θ与φ互余，所以sinθ=cosφ。"},{"step":"Step 4 公式对比","time":"8分钟","content":"【PPT P4 对比】教师：「线线角：cos+绝对值；线面角：sin+绝对值。记住『线面对sin』。」 预设回答：「线线cos、线面sin。」 板书时机：黑板列对比表。差异化提示：B班背；A班说理。易错点提醒：两者都用绝对值，且三角函数不同。"},{"step":"Step 5 例题","time":"9分钟","content":"【PPT P5 例题】教师：「在正方体内建系，分别求一条棱与一面的线面角、两条棱的线线角。」 预设回答：「建系代入两个公式。」 板书时机：黑板完整解。差异化提示：B班跟；A班加变式。易错点提醒：线面角别误代cos公式。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「求指定直线与平面的夹角（给出坐标）。」 预设回答：「先求方向向量和法向量。」 板书时机：板书。差异化提示：B班练；A班加二面角预告。易错点提醒：下节课学二面角。"}],"blackboard":"┌── 空间角(线线/线面) ──┐\n│ 线线角:       │\n│ cosθ=|v⃗·u⃗|/  │\n│  (|v⃗||u⃗|)   │\n│ 线面角:       │\n│ sinθ=|v⃗·n⃗|/  │\n│  (|v⃗||n⃗|)   │\n│ 都取绝对值    │\n└────────────────┘","exercises":"【基础作业】1. 线线角用____（sin/cos），取____。2. 线面角用____。\n【提高作业】正方体中求棱AA1与底面ABCD的线面角，及AA1与AB的线线角。\n【参考答案——教师用】基础1：cos、绝对值。基础2：sin。提高：AA1⊥底面⇒线面角90°；AA1⊥AB⇒线线角90°。","reflection":"✅ 亮点：「线线cos、线面sin」口诀好记；余角推导讲清原理。\n⚠️ 需改进：B班线面角仍套cos，需红字强调sin。\n📌 下节课衔接：二面角的向量求法。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-math-sx1-u1-9","lessonId":"l-math-sx1-u1-9","title":"二面角的向量求法","book":"选择性必修第一册","unitNumber":1,"unitTitle":"空间向量与立体几何","lessonType":"new","lessonTypeName":"新授课","periodNumber":9,"duration":45,"grade":"高二","subject":"数学","coreLiteracy":["数学运算","直观想象"],"tags":["二面角","法向量","向量法","人教A选必一Ch1","第九课时"],"textbookAnalysis":"二面角的大小等于其两个半平面法向量的夹角或其补角，cosθ=±(n⃗·m⃗)/(|n⃗||m⃗|)。通过观察法向量指向（同侧/异侧）或结合实际图形判断取原角还是补角。重点是法向量夹角与二面角的关系。","overview":"【学情分析】A班：能据图形判断取原角或补角；B班：常直接取绝对值得到锐角，忽略二面角可为钝；法向量方向判断难。共同问题：二面角范围[0,π]，不一定取锐角，需结合图形。","objectives":["数学运算：用法向量夹角余弦求二面角。","直观想象：判断法向量夹角与二面角是相等还是互补。","逻辑推理：说明二面角范围为[0,π]，不一定锐角。","数学运算：规范建系求两半平面法向量。"],"keyPoints":"① 公式：cosθ=(n⃗·m⃗)/(|n⃗||m⃗|)，θ为法向量夹角。\n② 关系：二面角等于法向量夹角或其补角。\n③ 判断：两法向量指向二面角同侧⇒相等；异侧⇒互补。也可观察棱上一点两半平面内向量。\n④ 范围：[0,π]，可钝。","difficulties":"① 取原角或补角。原因：取决于法向量指向，需看图，易错。\n② 范围非锐角。原因：二面角可钝，直接取绝对值会错，需判断。\n③ 法向量方向。原因：不同取法结果差符号，需统一。","teachingMethods":"① 法向量指向演示。\n② 原角/补角判断。\n③ 综合例题。\n④ 错例辨析。","preparation":"【PPT课件】P1 二面角与法向量；P2 公式；P3 同侧异侧；P4 判断方法；P5 例题；P6 练习。\n【实物教具】二面角模型。\n【音频】无。","process":[{"step":"Step 1 导入——用法向量夹二面","time":"5分钟","content":"【PPT P1 二面角】教师：「二面角的大小等于两半平面法向量的夹角或其补角，关键看指向。」 预设回答：「法
