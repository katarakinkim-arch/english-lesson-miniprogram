<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>地理教案小程序 · 预览</title>
<style>
  :root{ --brand:#1a365d; --brand2:#2a4a7d; --bg:#f3f5f9; --txt:#1f2430; --sub:#6b7280; --line:#e6e9f0; --chip:#eef2f8; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; background:#dfe3ea; color:var(--txt); }
  .phone{ max-width:390px; margin:24px auto; background:var(--bg); border-radius:38px; overflow:hidden; box-shadow:0 20px 60px rgba(20,30,60,.25); position:relative; min-height:844px; display:flex; flex-direction:column; }
  .statusbar{ height:44px; background:var(--brand); display:flex; align-items:center; justify-content:space-between; padding:0 22px; color:#fff; font-size:14px; font-weight:600; }
  .statusbar .icons{ letter-spacing:2px; }
  .navbar{ height:46px; background:var(--brand); color:#fff; display:flex; align-items:center; justify-content:center; position:relative; font-size:17px; font-weight:600; }
  .navbar .back{ position:absolute; left:14px; font-size:22px; line-height:1; cursor:pointer; pointer-events:auto; }
  .content{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px; }
  .content::-webkit-scrollbar{ width:0; }
  .tabbar{ height:60px; background:#fff; border-top:1px solid var(--line); display:flex; flex-shrink:0; position:relative; z-index:20; }
  .tab{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#9aa1ad; font-size:11px; gap:3px; cursor:pointer; -webkit-user-select:none; user-select:none; }
  .tab .ico{ font-size:21px; }
  .tab.on{ color:var(--brand); }
  .search{ background:#fff; border-radius:14px; padding:11px 14px; display:flex; align-items:center; gap:8px; color:var(--sub); font-size:14px; box-shadow:0 2px 10px rgba(20,40,80,.05); }
  .search .sin{ flex:1; border:none; background:transparent; outline:none; font-size:14px; color:var(--txt); min-width:0; }
  .search .searchx{ color:#aab; font-size:16px; cursor:pointer; padding:0 2px; }
  .chips{ display:flex; gap:8px; margin:12px 0; flex-wrap:wrap; }
  .chip{ background:var(--chip); color:var(--sub); font-size:13px; padding:7px 14px; border-radius:20px; cursor:pointer; white-space:nowrap; }
  .chip.on{ background:var(--brand); color:#fff; }
  .card{ background:#fff; border-radius:16px; padding:16px; margin-bottom:10px; box-shadow:0 2px 10px rgba(20,40,80,.05); cursor:pointer; transition:transform .15s; display:flex; align-items:center; }
  .card:active{ transform:scale(.98); }
  .card .row1{ display:flex; gap:12px; align-items:center; width:100%; }
  .card .docico{ width:44px; height:44px; border-radius:12px; background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .card .ttl{ font-size:14.5px; font-weight:600; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card .sub{ font-size:12px; color:#8a90a0; margin-top:4px; line-height:1.3; }
  .card-arrow{ font-size:24px; color:#d0d4dc; flex-shrink:0; }
  .empty{ text-align:center; color:var(--sub); padding:60px 20px; }
  .empty .e{ font-size:54px; }
  .empty .t{ margin-top:12px; font-size:15px; }
  .empty .p{ margin-top:6px; font-size:12px; color:#b3b8c4; }
  .unit-group{ margin-top:12px; }
  .unit-head{ display:flex; align-items:baseline; gap:8px; padding:12px 2px 8px; position:sticky; top:0; background:var(--bg); z-index:5; }
  .unit-no{ font-size:12px; font-weight:700; color:#fff; background:var(--brand); padding:3px 9px; border-radius:6px; flex-shrink:0; }
  .unit-name{ font-size:15px; font-weight:600; color:var(--txt); }
  .hero{ margin:-14px -14px 14px; padding:26px 18px 20px; background:linear-gradient(160deg,var(--brand),var(--brand2)); color:#fff; border-radius:0 0 22px 22px; }
  .hero .badges2{ display:flex; gap:8px; margin-bottom:14px; }
  .hero .badge2{ font-size:12px; padding:4px 11px; border-radius:9px; background:rgba(255,255,255,.18); }
  .hero h1{ font-size:20px; margin:0 0 8px; line-height:1.35; }
  .hero .hsub{ font-size:13px; opacity:.85; }
  .hero .hstat{ font-size:12px; opacity:.8; margin-top:12px; }
  .sec{ background:#fff; border-radius:16px; padding:16px; margin-bottom:12px; box-shadow:0 2px 10px rgba(20,40,80,.05); }
  .sec h3{ margin:0 0 12px; font-size:15px; display:flex; align-items:center; gap:8px; color:var(--brand); }
  .sec .scopy{ margin-left:auto; font-size:11px; color:var(--brand); background:var(--chip); border-radius:8px; padding:3px 9px; cursor:pointer; flex-shrink:0; }
  .sno{ flex-shrink:0; width:24px; height:24px; line-height:24px; text-align:center; background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; border-radius:50%; font-size:13px; font-weight:700; }
  .sno.sm{ width:20px; height:20px; line-height:20px; font-size:12px; }
  .sec p{ margin:0; font-size:13px; line-height:1.7; color:#3a4150; white-space:pre-wrap; word-break:break-word; }
  .sec ul{ margin:0; padding-left:18px; }
  .sec li{ font-size:13px; line-height:1.7; color:#3a4150; margin-bottom:4px; }
  .step{ background:#f7f9fc; border-left:4px solid var(--brand2); border-radius:12px; padding:10px 12px; margin-bottom:12px; }
  .step .sn{ font-size:13px; font-weight:600; color:var(--brand); display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
  .step .st{ font-size:11px; color:#fff; background:var(--brand2); border-radius:7px; padding:1px 8px; margin-left:4px; }
  .step p{ margin:6px 0 0; font-size:12.5px; line-height:1.6; color:#444; white-space:pre-wrap; word-break:break-word; }
  .sc-text{ font-size:12.5px; line-height:1.7; color:#374151; margin:5px 0; white-space:pre-wrap; word-break:break-word; }
  .sc-block{ margin:7px 0; border-radius:10px; padding:8px 10px; font-size:12.5px; line-height:1.65; }
  .sc-tag{ display:inline-block; font-weight:700; font-size:11.5px; margin-bottom:3px; }
  .sc-bd{ white-space:pre-wrap; word-break:break-word; }
  .sc-ppt{ background:#eff6ff; border-left:3px solid #2563eb; }
  .sc-ppt .sc-tag{ color:#1e40af; }
  .sc-audio{ background:#ecfeff; border-left:3px solid #0891b2; }
  .sc-audio .sc-tag{ color:#0e7490; }
  .sc-teacher{ background:#fef2f2; border-left:3px solid #dc2626; }
  .sc-teacher .sc-tag{ color:#991b1b; }
  .sc-ans{ background:#f0fdf4; border-left:3px solid #16a34a; }
  .sc-ans .sc-tag{ color:#166534; }
  .sc-board{ background:#fefce8; border-left:3px solid #ca8a04; }
  .sc-board .sc-tag{ color:#854d0e; }
  .sc-diff{ background:#f5f3ff; border-left:3px solid #7c3aed; }
  .sc-diff .sc-tag{ color:#5b21b6; }
  .sc-warn{ background:#fff7ed; border-left:3px solid #ea580c; }
  .sc-warn .sc-tag{ color:#9a3412; }
  .ex-block{ margin:10px 0; border-radius:12px; overflow:hidden; border:1px solid #eef2f7; }
  .ex-h{ font-size:13px; font-weight:700; padding:8px 12px; color:#fff; }
  .ex-bd{ padding:10px 12px; font-size:13px; line-height:1.8; white-space:pre-wrap; word-break:break-word; color:#334155; }
  .ex-basic .ex-h{ background:#3b82f6; }
  .ex-basic .ex-bd{ background:#eff6ff; }
  .ex-adv .ex-h{ background:#8b5cf6; }
  .ex-adv .ex-bd{ background:#f5f3ff; }
  .ex-key .ex-h{ background:#22c55e; }
  .ex-key .ex-bd{ background:#f0fdf4; }

  .dlbar{ position:sticky; bottom:0; background:#fff; border-top:1px solid var(--line); padding:10px 12px; display:flex; align-items:center; gap:8px; z-index:5; }
  .dlbar .fmts{ display:flex; gap:5px; }
  .dlbar .fmt{ font-size:12px; padding:7px 9px; border-radius:10px; background:var(--chip); color:var(--sub); cursor:pointer; }
  .dlbar .fmt.on{ background:var(--brand); color:#fff; }
  .dlbar .btn{ flex:1; background:var(--brand); color:#fff; text-align:center; padding:13px 0; border-radius:13px; font-size:15px; font-weight:600; cursor:pointer; }
  .dlbar .fav{ font-size:24px; color:var(--brand); cursor:pointer; padding:0 6px; }
  .phead{ background:linear-gradient(160deg,var(--brand),var(--brand2)); border-radius:18px; padding:24px 18px; color:#fff; display:flex; align-items:center; gap:16px; margin-bottom:14px; }
  .pavatar{ width:62px; height:62px; border-radius:50%; background:rgba(255,255,255,.25); display:flex; align-items:center; justify-content:center; font-size:30px; overflow:hidden; border:2px solid rgba(255,255,255,.5); flex-shrink:0; }
  .pavatar img{ width:100%; height:100%; object-fit:cover; }
  .pname{ font-size:18px; font-weight:600; }
  .psub{ font-size:12px; opacity:.8; margin-top:4px; }
  .stats3{ display:flex; gap:10px; margin-bottom:14px; }
  .stat{ flex:1; background:#fff; border-radius:14px; padding:14px; text-align:center; box-shadow:0 2px 10px rgba(20,40,80,.05); }
  .stat .num{ font-size:22px; font-weight:700; color:var(--brand); }
  .stat .lbl{ font-size:12px; color:var(--sub); margin-top:4px; }
  .block{ background:#fff; border-radius:16px; padding:16px; margin-bottom:12px; box-shadow:0 2px 10px rgba(20,40,80,.05); }
  .block h3{ margin:0 0 12px; font-size:15px; display:flex; justify-content:space-between; align-items:center; }
  .block .clear{ font-size:12px; color:#c0392b; cursor:pointer; }
  .favitem{ display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line); cursor:pointer; }
  .favitem:last-child{ border-bottom:none; }
  .favitem .fi{ width:34px; height:34px; border-radius:9px; background:var(--chip); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .favitem .ft{ font-size:13px; }
  .glabel{ font-size:12px; color:#888; padding:16px 4px 8px; display:flex; justify-content:space-between; }
  .glabel .clr{ color:#c0392b; cursor:pointer; }
  .toast{ position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,.78); color:#fff; padding:12px 22px; border-radius:12px; font-size:14px; z-index:999; opacity:0; transition:opacity .25s; pointer-events:none; }
  .toast.show{ opacity:1; }
  .hint{ text-align:center; font-size:11px; color:#aab; padding:10px 0 4px; }
  .block p.rp{ margin:8px 0 0; font-size:13px; line-height:1.7; color:#3a4150; }
  .tip{ font-size:11px; color:#aab; text-align:center; margin-top:14px; line-height:1.6; }
</style>
</head>

<script>

const LESSONS = [{"id":"l-geo-b1-u1-1","lessonId":"l-geo-b1-u1-1","title":"地球在宇宙中的位置","book":"必修第一册","unitNumber":1,"unitTitle":"宇宙中的地球","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["天体","天体系统","可观测宇宙","银河系","人教版必修一Ch1","第一课时"],"textbookAnalysis":"从肉眼可见的星空引入，认识恒星、行星、卫星、星云、彗星、流星体等基本天体；理解天体系统层级（地月系—太阳系—银河系—可观测宇宙）；明确地球是太阳系中一颗普通又特殊的行星。","overview":"【学情分析】A班：能理解天体系统层级并说出地球普通性；B班：易把流星与流星体混淆，对\"可观测宇宙\"尺度无概念。共同问题：分不清天体类型；误以为天体系统只到银河系。","objectives":["人地协调观：认识地球在宇宙中的平凡位置，树立敬畏自然的态度。","综合思维：从物质性、运动性综合理解天体系统的层级结构。","区域认知：在可观测宇宙尺度上定位太阳系与地球。","地理实践力：能借助星图或软件辨认常见天体并描述其特征。"],"keyPoints":"① 天体：恒星、行星、卫星、星云、彗星、流星体、星际物质。\n② 天体系统：因万有引力相互吸引、绕转形成，层级为地月系→太阳系→银河系→可观测宇宙。\n③ 太阳系：八大行星绕日公转，地球是其中一颗。\n④ 总星系=可观测宇宙，是目前人类认识的极限。","difficulties":"① 天体vs天体系统。原因：学生常把单个天体与系统混谈，需举例。\n② 可观测宇宙。原因：尺度超经验，需类比（如地球:宇宙≈沙粒:海滩）。\n③ 流星体vs流星。原因：流星体是天体，流星是现象，易错，需点明。","teachingMethods":"① 星空视频导入法。\n② 层级递进图解法。\n③ 类比尺度法。\n④ 星图软件实践。","preparation":"【PPT课件】P1 星空实景；P2 各类天体图片；P3 天体系统层级图；P4 太阳系示意图；P5 可观测宇宙;P6 练习。【地图/图表素材】银河系结构图、太阳系八行星轨道图。","process":[{"step":"Step 1 导入——仰望星空","time":"5分钟","content":"【PPT P1 星空】教师：「夜空中的光点是什么？它们和地球是什么关系？」 预设回答：「学生说星星、月亮，教师顺势引出\"天体\"概念。」 板书时机：黑板写\"天体\"。差异化提示：B班看图认天体；A班需举两类以上例子。易错点提醒：注意区分\"天体\"（宇宙物质）与\"天体系统\"（有绕转关系的集合）。"},{"step":"Step 2 认识常见天体","time":"8分钟","content":"【PPT P2 天体】教师：「恒星自己发光（太阳）、行星绕恒星转（地球）、卫星绕行星转（月球）、星云气体尘埃、彗星拖尾、流星体微小固体。」 预设回答：「学生指认太阳属于恒星、月球属于卫星。」 板书时机：黑板列天体类型表。差异化提示：B班记类型；A班需说判定依据。易错点提醒：流星体是天体，划过大气的\"流星\"是现象不是天体。"},{"step":"Step 3 天体系统层级","time":"10分钟","content":"【PPT P3 层级】教师：「天体因引力相互绕转形成系统：地月系→太阳系→银河系→可观测宇宙，一级套一级。」 预设回答：「学生复述层级并画箭头。」 板书时机：黑板画层级树。差异化提示：B班记四级；A班需补\"河外星系\"同级。易错点提醒：银河系与河外星系并列同属可观测宇宙，不是包含。"},{"step":"Step 4 太阳系与地球","time":"9分钟","content":"【PPT P4 太阳系】教师：「八大行星按距日远近：水金地火木土天海；地球是其中普通一员，又有液态水等特殊性。」 预设回答：「学生背出八大行星顺序并说地球普通之处。」 板书时机：黑板写八大行星。差异化提示：B班记顺序；A班需说类地/巨行星区别。易错点提醒：小行星带在火木之间；冥王星已归矮行星。"},{"step":"Step 5 可观测宇宙尺度","time":"8分钟","content":"【PPT P5 尺度】教师：「可观测宇宙半径约465亿光年，地球只是其中一粒微尘，但正因适宜环境诞生了生命。」 预设回答：「学生用类比表达对尺度的震撼。」 板书时机：黑板写\"可观测宇宙=总星系\"。差异化提示：B班感受尺度；A班需记光年定义。易错点提醒：光年是距离单位不是时间。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：流星是天体( );银河系包含河外星系( )。」 预设回答：「学生辨析并订正错误。」 板书时机：板书答案。差异化提示：B班做基础；A班加\"画天体系统树\"。易错点提醒：下节课学太阳对地球的影响。"}],"blackboard":"┌── 地球在宇宙中的位置 ──┐\n│ 天体:恒星/行星/卫星 │\n│  星云/彗星/流星体  │\n│ 天体系统层级:      │\n│  地月系→太阳系     │\n│  →银河系→可观测宇宙│\n│ 八大行星:水金地火 │\n│  木土天海        │\n│ 光年=距离单位     │\n└──────────────────┘","exercises":"【基础作业】1. 列举3种天体并各举一例。2. 判断：流星体是天体( )，流星是天体( )。\n【提高作业】画出天体系统的四级层级结构图，并注明地球所在位置。\n【参考答案——教师用】基础1：恒星—太阳、行星—地球、卫星—月球（任三）。基础2：√、×。提高：地月系⊂太阳系⊂银河系⊂可观测宇宙，地球在地月系。","reflection":"✅ 亮点：星空视频+层级树让抽象尺度可感；流星体vs流星辨析到位。\n⚠️ 需改进：B班对可观测宇宙仍无实感，需更多生活类比。\n📌 下节课衔接：太阳对地球的影响（太阳辐射与太阳活动）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b1-u1-2","lessonId":"l-geo-b1-u1-2","title":"太阳对地球的影响","book":"必修第一册","unitNumber":1,"unitTitle":"宇宙中的地球","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["太阳辐射","太阳活动","黑子","耀斑","人教版必修一Ch1","第二课时"],"textbookAnalysis":"太阳辐射是地球能量根本来源，维系地表温度、驱动水循环与大气运动、为光合作用供能；太阳活动（黑子、耀斑、太阳风）扰动电离层与磁场，影响无线电、导航与航天。","overview":"【学情分析】A班：能解释太阳辐射对地理环境的意义；B班：常把太阳活动当太阳辐射，分不清黑子与耀斑。共同问题：太阳活动影响机制（扰动电离层、磁暴）难理解。","objectives":["人地协调观：理解太阳是地球生命的能量之源，珍惜太阳能等清洁能源。","综合思维：综合分析太阳辐射对大气、水、生物圈的整体驱动。","区域认知：从纬度、地形理解太阳辐射分布差异。","地理实践力：会读太阳辐射量分布图并解释区域差异。"],"keyPoints":"① 太阳辐射：电磁波，占太阳总能量极小部分到达地球。\n② 意义：维持温度、驱动水循环与大气运动、光合供能、煤石油是地质时期太阳能。\n③ 太阳活动：黑子（光球）、耀斑（色球）、太阳风；周期约11年。\n④ 影响：耀斑扰动电离层→无线电短波中断；太阳风→磁暴、极光。","difficulties":"① 太阳活动≠太阳辐射。原因：前者是释放的不稳定性，后者是稳定电磁波，易混，需对比。\n② 耀斑中断通信机制。原因：电离层被扰动致短波反射异常，抽象，需图解。\n③ 太阳辐射分布。原因：受纬度、天气、海拔影响，需读图。","teachingMethods":"① 能量来源追溯法。\n② 对比表法（辐射vs活动）。\n③ 太阳活动动画。\n④ 分布图读图。","preparation":"【PPT课件】P1 太阳辐射意义；P2 能量链条；P3 太阳活动类型；P4 影响机制；P5 我国辐射分布；P6 练习。【地图/图表素材】中国年太阳辐射总量分布图、太阳大气层结构图。","process":[{"step":"Step 1 导入——万物生长靠太阳","time":"5分钟","content":"【PPT P1 意义】教师：「为什么阴天凉、晴天热？煤和石油的\"老祖宗\"是谁？」 预设回答：「学生答太阳，教师引出太阳辐射是根本能量源。」 板书时机：黑板写\"太阳辐射\"。差异化提示：B班举例；A班需联食物链。易错点提醒：太阳辐射是稳定电磁波，不是太阳活动。"},{"step":"Step 2 太阳辐射的地理意义","time":"10分钟","content":"【PPT P2 链条】教师：「太阳→光热维持地表温度→驱动大气与水循环→植物光合→煤石油是古代太阳能储存。」 预设回答：「学生复述能量传递链条。」 板书时机：黑板画能量链。差异化提示：B班记四点；A班需说水循环驱动。易错点提醒：地热、核能非太阳辐射来源。"},{"step":"Step 3 太阳大气层与活动","time":"9分钟","content":"【PPT P3 类型】教师：「光球层黑子（温度低暗斑）、色球层耀斑（剧烈爆发）、日冕层太阳风；黑子耀斑周期约11年。」 预设回答：「学生指认各活动所在层。」 板书时机：黑板列三层及对应活动。差异化提示：B班记类型；A班需说周期。易错点提醒：黑子\"黑\"因温度比周围低，并非不发光。"},{"step":"Step 4 太阳活动的影响","time":"9分钟","content":"【PPT P4 机制】教师：「耀斑爆发→电离层扰动→无线电短波中断；太阳风→地磁暴、高纬极光、干扰卫星。」 预设回答：「学生解释\"手机信号突然中断\"的可能原因。」 板书时机：黑板写影响链。差异化提示：B班记现象；A班需说机制。易错点提醒：耀斑影响短波通信，不是长波；极光出现在高纬夜空。"},{"step":"Step 5 太阳辐射分布","time":"7分钟","content":"【PPT P5 分布】教师：「我国青藏、西北辐射强（海拔高、晴日多），四川盆地弱（多雾多雨）。」 预设回答：「学生读图指出最强最弱区并说原因。」 板书时机：黑板写分布规律。差异化提示：B班看图；A班需析成因。易错点提醒：纬度不是唯一因素，天气、地形同样重要。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：太阳活动使煤形成( );耀斑导致短波中断( )。」 预设回答：「学生辨析并订正。」 板书时机：板书。差异化提示：B班基础；A班加\"解释盆地辐射少\"。易错点提醒：下节课学地球的历史。"}],"blackboard":"┌── 太阳对地球的影响 ──┐\n│ 太阳辐射=稳定电磁波│\n│ 意义:温度/水气循环/│\n│  光合/化石能源    │\n│ 太阳活动:        │\n│  黑子(光球)11年 │\n│  耀斑(色球)     │\n│  太阳风(日冕)   │\n│ 影响:短波中断/磁暴│\n│  /极光         │\n└────────────────┘","exercises":"【基础作业】1. 太阳活动周期约__年。2. 判断：耀斑爆发会扰动电离层使无线电长波中断( )。\n【提高作业】解释我国青藏高原太阳辐射总量高于四川盆地的原因。\n【参考答案——教师用】基础1：11。基础2：×（短波）。提高：青藏海拔高、空气稀薄、晴天多，削弱少；盆地多云雾阴雨，削弱多。","reflection":"✅ 亮点：能量链+影响链双图清晰；黑子\"黑\"的误解被点明。\n⚠️ 需改进：太阳活动机制B班仍抽象，需动画演示电离层。\n📌 下节课衔接：地球的历史（化石与地层）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b1-u1-3","lessonId":"l-geo-b1-u1-3","title":"地球的历史","book":"必修第一册","unitNumber":1,"unitTitle":"宇宙中的地球","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["地层","化石","地质年代","宙代纪","人教版必修一Ch1","第三课时"],"textbookAnalysis":"地层和化石是记录地球历史的\"书页\"：下层老上层新，含相同化石的地层时代相当；地质年代划分为冥古宙—太古—元古—显生宙，显生宙又分古生代、中生代、新生代，生物演化从海洋到陆地到人类。","overview":"【学情分析】A班：能用地层化石还原古环境；B班：常把\"下层新上层老\"记反。共同问题：地质年代顺序（代纪）与生物演化阶段记混。","objectives":["人地协调观：认识地球漫长演化，理解人地关系是演化的结果。","综合思维：综合地层、化石、同位素综合判定地质年代。","区域认知：通过地层分布认识区域地质变迁。","地理实践力：能据化石推断地层年代与古环境。"],"keyPoints":"① 地层：沉积岩层序\"下层老、上层新\"（地层倒置除外）。\n② 化石：相同时代化石相似，可定年与还原环境。\n③ 地质年代：冥古/太古/元古宙→显生宙（古生/中生/新生）。\n④ 生物：海洋无脊椎→鱼类→两栖爬行→哺乳→人类。","difficulties":"① 层序律方向。原因：学生易记反新老，需强调沉积顺序。\n② 代纪顺序。原因：名称多易混，需编口诀。\n③ 化石定年原理。原因：需理解\"标准化石\"，抽象，需例。","teachingMethods":"① 地层剖面图法。\n② 化石推理法。\n③ 年代歌诀法。\n④ 演化时间轴。","preparation":"【PPT课件】P1 地层剖面；P2 化石定年；P3 地质年代表；P4 生物演化；P5 环境变迁；P6 练习。【地图/图表素材】地质年代表（带生物图像）、地层剖面示意图。","process":[{"step":"Step 1 导入——地球的日记","time":"5分钟","content":"【PPT P1 剖面】教师：「岩石一层层像书页，记录地球46亿年故事，这叫地层。」 预设回答：「学生联想\"千层蛋糕\"理解层序。」 板书时机：黑板写\"地层=地球日记\"。差异化提示：B班看图；A班需问\"为何分层\"。易错点提醒：地层一般指沉积岩层，火山岩不分层。"},{"step":"Step 2 地层与化石定年","time":"10分钟","content":"【PPT P2 化石】教师：「正常地层下层老上层新；不同地点含同种化石则年代相当，用化石可还原当时气候环境。」 预设回答：「学生据三叶虫化石判断为古生代海洋环境。」 板书时机：黑板写层序律。差异化提示：B班记规律；A班需说化石环境指示。易错点提醒：地层倒转（褶皱）会破下层老，需结合构造。"},{"step":"Step 3 地质年代表","time":"9分钟","content":"【PPT P3 年代表】教师：「冥古→太古→元古→显生宙；显生分古生、中生、新生三代，代下分纪（如侏罗纪）。」 预设回答：「学生背诵三代顺序。」 板书时机：黑板写年表主干。差异化提示：B班记三代；A班需记主要纪。易错点提醒：元古宙有生命但少；显生宙生物大量出现。"},{"step":"Step 4 生物演化主线","time":"9分钟","content":"【PPT P4 演化】教师：「海洋无脊椎动物→鱼类→两栖→爬行（恐龙）->哺乳->人类；海陆空依次征服。」 预设回答：「学生排演化简图顺序。」 板书时机：黑板写演化链。差异化提示：B班记阶段；A班需联年代。易错点提醒：恐龙灭绝在中生代末，新生代才出现人类。"},{"step":"Step 5 环境变迁","time":"7分钟","content":"【PPT P5 环境】教师：「联合古陆分裂、气候冷暖交替，环境巨变驱动生物演替与灭绝。」 预设回答：「学生说\"环境变则生物变\"。」 板书时机：黑板写环境—生物关系。差异化提示：B班感受；A班需举冰期例。易错点提醒：演化是渐变+突变，非匀速。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：含恐龙化石地层属新生代( );下层新上层老( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"画时间轴\"。易错点提醒：下节课学地球圈层结构。"}],"blackboard":"┌── 地球的历史 ──┐\n│ 地层:下老上新  │\n│ 化石:定年+环境 │\n│ 年代表:       │\n│ 冥古→太古→元古│\n│ →显生(古/中/新)│\n│ 生物:海无脊→鱼│\n│ →两栖→爬行→人│\n└──────────────┘","exercises":"【基础作业】1. 正常地层__老__新（填上下）。2. 含恐龙化石的地层属__代。\n【提高作业】若甲地三叶虫化石层与乙地的某层相当，说明什么？\n【参考答案——教师用】基础1：下、上。基础2：中生。提高：两地该层地质年代相同，可对比还原古环境。","reflection":"✅ 亮点：地层剖面+时间轴让抽象年代可视化；化石推理调动兴趣。\n⚠️ 需改进：代纪名称B班易混，需反复歌诀。\n📌 下节课衔接：地球的内部与外部圈层结构。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b1-u1-4","lessonId":"l-geo-b1-u1-4","title":"地球的圈层结构","book":"必修第一册","unitNumber":1,"unitTitle":"宇宙中的地球","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["内部圈层","地壳","地幔","地核","外部圈层","人教版必修一Ch1","第四课时"],"textbookAnalysis":"地震波（纵波P快、横波S慢且仅固）揭示内部圈层：地壳、地幔（含软流层）、地核（外核液态）；外部圈层包括大气圈、水圈、生物圈，彼此相互联系。","overview":"【学情分析】A班：能据地震波划分圈层并说软流层意义；B班：常把横波能过液态记错（以为横波过地核）。共同问题：内部三圈层界线（莫霍、古登堡）与状态。","objectives":["人地协调观：认识各圈层是人类生存环境，应保护生物圈。","综合思维：用地震波综合推断内部物质状态。","区域认知：认识圈层在空间上的立体分布。","地理实践力：能读地震波曲线图划分圈层界面。"],"keyPoints":"① 地震波：纵波P（固液气、快）、横波S（仅固、慢）。\n② 界面：莫霍面（壳幔界）、古登堡面（幔核界）。\n③ 内部：地壳（薄、岩）、地幔（含软流层—岩浆源）、地核（外核液、内核固）。\n④ 外部：大气、水、生物圈（最活跃，跨圈层）。","difficulties":"① 横波不过液态。原因：横波需固体介质，过外核消失，关键判据，需强调。\n② 软流层位置。原因：在上地幔顶部、岩石圈之下，易错层，需定位。\n③ 岩石圈≠地壳。原因：岩石圈=地壳+上地幔顶部，范围更大，需澄清。","teachingMethods":"① 地震波曲线法。\n② 界面定位法。\n③ 圈层模型法。\n④ 对比表法。","preparation":"【PPT课件】P1 地震波；P2 波速变化；P3 内部圈层；P4 软流层；P5 外部圈层；P6 练习。【地图/图表素材】地震波传播速度随深度变化图、地球圈层剖面图。","process":[{"step":"Step 1 导入——如何看见地球内部","time":"5分钟","content":"【PPT P1 波】教师：「钻头打不透地球，科学家靠地震波\"CT\"地球内部。」 预设回答：「学生联想医院CT理解波探测。」 板书时机：黑板写\"地震波=地球CT\"。差异化提示：B班听；A班需问原理。易错点提醒：地震波是探测内部的主要手段，非直接观察。"},{"step":"Step 2 纵波与横波","time":"9分钟","content":"【PPT P2 波速】教师：「纵波P快、固液气都能过；横波S慢、只能过固体，过液态会消失。」 预设回答：「学生说\"横波到外核消失说明外核液态\"。」 板书时机：黑板列两波。差异化提示：B班记区别；A班需说应用。易错点提醒：横波不能过液体，这是判液态圈层的关键。"},{"step":"Step 3 内部三圈层","time":"10分钟","content":"【PPT P3 内部】教师：「莫霍面之上地壳（平均17km），之下地幔，古登堡面之下地核；外核液态、内核固态。」 预设回答：「学生据波速突变指出两界面。」 板书时机：黑板画圈层。差异化提示：B班记分层；A班需说状态。易错点提醒：地壳最薄（洋壳约6km），地核并非全液态。"},{"step":"Step 4 软流层与岩石圈","time":"8分钟","content":"【PPT P4 软流】教师：「上地幔顶部的软流层是岩浆主要发源地；岩石圈=地壳+软流层之上上地幔，是板块载体。」 预设回答：「学生区分岩石圈与地壳范围。」 板书时机：黑板写关系。差异化提示：B班记；A班需定位。易错点提醒：岩石圈包含上地幔顶部，比地壳大；软流层在岩石圈之下。"},{"step":"Step 5 外部圈层","time":"8分钟","content":"【PPT P5 外部】教师：「大气圈供气、水圈供水、生物圈最活跃且跨其它圈层，三者相互联系构成人类环境。」 预设回答：「学生说生物圈\"串起\"其它圈层。」 板书时机：黑板列外部三圈层。差异化提示：B班记；A班需说联系。易错点提醒：生物圈不独立，渗透于大气水岩石圈。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：横波能过外核( );岩石圈=地壳( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"画剖面\"。易错点提醒：本章结束，进入大气。"}],"blackboard":"┌── 地球圈层 ──┐\n│ 波:P快固液气  │\n│   S慢仅固    │\n│ 壳(莫霍上)   │\n│ 幔(含软流层) │\n│ 核:外液内固  │\n│ 岩石圈=壳+顶│\n│ 外部:气/水/生│\n└────────────┘","exercises":"【基础作业】1. 划分壳幔的界面叫__面。2. 判断：横波可以穿过地核外核( )。\n【提高作业】简述岩石圈与地壳的区别。\n【参考答案——教师用】基础1：莫霍。基础2：×（外核液态横波不过）。提高：岩石圈=地壳+上地幔顶部（软流层以上），范围大于地壳。","reflection":"✅ 亮点：用CT类比降低地震波抽象；软流层定位讲清。\n⚠️ 需改进：B班仍混淆岩石圈与地壳，需图解对照。\n📌 下节课衔接：第二章 地球上的大气。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b1-u2-1","lessonId":"l-geo-b1-u2-1","title":"大气的组成和垂直分层","book":"必修第一册","unitNumber":2,"unitTitle":"地球上的大气","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["干洁空气","对流层","平流层","电离层","人教版必修一Ch2","第一课时"],"textbookAnalysis":"低层大气由干洁空气（氮78%、氧21%）、水汽、杂质组成；按温度垂直变化分对流层（下热上冷、对流旺）、平流层（臭氧吸热、上热下冷、平流）、高层大气（电离层反射无线电）。","overview":"【学情分析】A班：能解释各层与人类活动关系；B班：常把平流层温度随高度升高而升记反（以为都降）。共同问题：三层温度变化原因及对人类影响。","objectives":["人地协调观：认识大气污染危害，树立保护大气意识。","综合思维：综合成分与垂直结构理解大气整体。","区域认知：认识大气圈层垂直空间差异。","地理实践力：会读气温垂直变化图判断大气层。"],"keyPoints":"① 组成：干洁空气（氮、氧为主）、水汽、杂质（成云致雨）。\n② 对流层：随高降温、对流强、天气多、厚度低纬大。\n③ 平流层：臭氧吸紫外、随高升温、平流、利于飞行。\n④ 高层大气：电离层反射短波、有极光。","difficulties":"① 平流层升温。原因：靠臭氧吸紫外而非地面辐射，与对流层相反，易错，需对比。\n② 对流层厚度差异。原因：低纬受热强对流旺故厚，需读图。\n③ 电离层作用。原因：反射无线电短波，抽象，需联通信。","teachingMethods":"① 成分饼图法。\n② 气温曲线法。\n③ 分层对比表。\n④ 飞行情境法。","preparation":"【PPT课件】P1 大气组成；P2 气温垂直变化；P3 对流层；P4 平流层；P5 高层大气；P6 练习。【地图/图表素材】大气垂直分层气温变化图、大气成分比例图。","process":[{"step":"Step 1 导入——我们呼吸的空气","time":"5分钟","content":"【PPT P1 组成】教师：「空气里主要是氮和氧，还有看不见的水汽和尘埃，它们缺一不可。」 预设回答：「学生说缺臭氧会怎样。」 板书时机：黑板写\"大气组成\"。差异化提示：B班记成分；A班需说各作用。易错点提醒：二氧化碳虽少但保温重要；杂质是凝结核。"},{"step":"Step 2 气温垂直变化","time":"9分钟","content":"【PPT P2 曲线】教师：「气温随高度并非一直降：对流层降、平流层升、中间层又降、高层再升。」 预设回答：「学生描曲线并指转折点。」 板书时机：黑板画折线。差异化提示：B班记大致；A班需说原因。易错点提醒：不是越高越冷，平流层反而升温。"},{"step":"Step 3 对流层","time":"9分钟","content":"【PPT P3 对流】教师：「对流层下热上冷、空气对流、云雨雷电全在这；低纬厚（17-18km）、高纬薄（8-9km）。」 预设回答：「学生解释\"为何低纬更厚\"。」 板书时机：黑板写对流层特征。差异化提示：B班记；A班需析厚度。易错点提醒：天气现象几乎都在对流层。"},{"step":"Step 4 平流层","time":"8分钟","content":"【PPT P4 平流】教师：「平流层有臭氧层吸紫外线而升温，气流平稳、水汽少，飞机在此飞行省力又安全。」 预设回答：「学生说为何飞机喜平流层。」 板书时机：黑板写平流层。差异化提示：B班记；A班需说臭氧作用。易错点提醒：臭氧吸紫外线≠臭氧层破坏无关，需保护。"},{"step":"Step 5 高层大气","time":"7分钟","content":"【PPT P5 高层】教师：「80-500km有电离层，反射无线电短波；太阳风激发极光。」 预设回答：「学生联\"短波通信靠电离层\"。」 板书时机：黑板写高层。差异化提示：B班了解；A班需说功能。易错点提醒：电离层在高层大气，不是平流层。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：平流层气温随高度降低( );飞机多在平流层飞( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"画分层\"。易错点提醒：下节课学大气受热过程。"}],"blackboard":"┌── 大气组成与分层 ──┐\n│ 组成:氮78氧21 │\n│  +水汽杂质    │\n│ 对流层:降/对流│\n│ 平流层:升/平流│\n│ 高层:电离层反│\n│  射短波/极光 │\n└──────────────┘","exercises":"【基础作业】1. 低层大气含量最多的成分是__。2. 判断：平流层气温随高度升高而降低( )。\n【提高作业】为什么民航客机一般在平流层底部飞行？\n【参考答案——教师用】基础1：氮（或氮气）。基础2：×。提高：平流层气流平稳、少云雨、能见度好、利于安全省油。","reflection":"✅ 亮点：气温曲线图直观揭示\"非越高越冷\"；飞行情境好记。\n⚠️ 需改进：B班对平流层升温原因难接受，需强调臭氧吸紫外。\n📌 下节课衔接：大气的受热过程。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b1-u2-2","lessonId":"l-geo-b1-u2-2","title":"大气的受热过程","book":"必修第一册","unitNumber":2,"unitTitle":"地球上的大气","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["削弱作用","地面辐射","大气逆辐射","保温效应","人教版必修一Ch2","第二课时"],"textbookAnalysis":"太阳辐射穿过大气被削弱（吸收、反射、散射）后到达地面，地面吸收增温并以长波辐射把热量传大气；大气逆辐射把热量还给地面，形成保温效应。","overview":"【学情分析】A班：能完整说受热链条并解释温室效应；B班：常把\"大气直接热源\"误当太阳辐射（实为地面辐射）。共同问题：削弱三种方式区别、保温机制。","objectives":["人地协调观：理解温室效应原理，理性看待全球变暖。","综合思维：综合削弱、地面辐射、逆辐射分析热量过程。","区域认知：结合下垫面理解区域受热差异。","地理实践力：能用地温变化解释霜冻与昼夜温差现象。"],"keyPoints":"① 削弱：吸收（臭氧吸紫外、CO2吸水汽红外）、反射（云尘）、散射（蓝天空）。\n② 地面是大气主要直接热源（地面长波辐射）。\n③ 大气逆辐射：把热量返还地面。\n④ 保温：削弱+逆辐射使昼夜温差小于无大气。","difficulties":"① 大气直接热源。原因：学生误认太阳，实为地面辐射，需强调。\n② 三种削弱区别。原因：吸收有选择性、反射无选择性，易混，需对比。\n③ 逆辐射作用。原因：抽象，需用\"被子\"类比。","teachingMethods":"① 受热链条图。\n② 被子类比法。\n③ 实验演示（玻璃罩）。\n④ 现象解释法。","preparation":"【PPT课件】P1 受热链条；P2 削弱作用；P3 地面辐射；P4 大气逆辐射；P5 保温应用；P6 练习。【地图/图表素材】大气受热过程示意图、玻璃温室原理图。","process":[{"step":"Step 1 导入——为什么晴天昼夜温差大","time":"5分钟","content":"【PPT P1 链条】教师：「同样阳光，多云夜暖、晴夜凉，这背后是大气受热过程。」 预设回答：「学生凭生活经验猜想云的作用。」 板书时机：黑板写\"大气受热\"。差异化提示：B班举例；A班需问机制。易错点提醒：先有地面受热再有大气受热，顺序不能乱。"},{"step":"Step 2 削弱作用","time":"9分钟","content":"【PPT P2 削弱】教师：「太阳辐射经大气被吸收（臭氧、CO2）、反射（云尘埃）、散射（天空蓝），减弱后到地面。」 预设回答：「学生解释\"天空为何蓝\"（散射）。」 板书时机：黑板列三种削弱。差异化提示：B班记三种；A班需说选择性。易错点提醒：吸收有选择性，反射无选择性。"},{"step":"Step 3 地面是大气直接热源","time":"9分钟","content":"【PPT P3 地面辐射】教师：「地面吸收太阳短波增温，再以长波辐射把热量传大气——大气主要靠地面辐射增温。」 预设回答：「学生复述\"太阳暖地面、地面暖大气\"。」 板书时机：黑板写受热序。差异化提示：B班记；A班需说波长短长。易错点提醒：大气直接热源是地面辐射不是太阳辐射。"},{"step":"Step 4 大气逆辐射与保温","time":"10分钟","content":"【PPT P4 逆辐射】教师：「大气吸收地面辐射后以大气逆辐射返还热量，像被子盖地，使夜不骤冷——即保温效应。」 预设回答：「学生用\"被子\"类比保温。」 板书时机：黑板写逆辐射。差异化提示：B班记；A班需联温室。易错点提醒：逆辐射补偿地面热量损失，不是\"制造\"热量。"},{"step":"Step 5 应用解释","time":"7分钟","content":"【PPT P5 应用】教师：「多云夜暖（逆辐射强）、霜冻夜晴（逆辐射弱）、温室大棚均同理。」 预设回答：「学生解释\"为何秋冬晴朗夜易结霜\"。」 板书时机：黑板写应用。差异化提示：B班记现象；A班需析因果。易错点提醒：CO2增多增强保温→全球变暖。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：大气直接热源是太阳辐射( );多云夜比晴夜暖因逆辐射强( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"解释保温\"。易错点提醒：下节课学大气的运动。"}],"blackboard":"┌── 大气受热过程 ──┐\n│ 太阳→削弱→地面│\n│ 地面辐射(长波)│\n│  =大气直接热源│\n│ 大气逆辐射→还│\n│  地(保温)    │\n│ 多云夜暖/晴霜│\n└──────────────┘","exercises":"【基础作业】1. 大气的\"直接热源\"是__辐射。2. 判断：天空呈蓝色是大气反射作用( )。\n【提高作业】用受热过程解释\"秋夜晴朗无风易形成霜冻\"。\n【参考答案——教师用】基础1：地面。基础2：×（散射）。提高：晴朗夜少云，大气逆辐射弱，地面热量散失快，近地温降至0℃以下结霜。","reflection":"✅ 亮点：\"被子\"类比让保温效应秒懂；削弱三方式对比清楚。\n⚠️ 需改进：B班仍把太阳当直接热源，需反复强调地面辐射。\n📌 下节课衔接：大气的运动（热力环流与风）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b1-u2-3","lessonId":"l-geo-b1-u2-3","title":"大气的运动","book":"必修第一册","unitNumber":2,"unitTitle":"地球上的大气","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["热力环流","气压","风","水平气压梯度力","人教版必修一Ch2","第三课时"],"textbookAnalysis":"地面冷热不均→空气垂直升降→同一水平面气压差→水平气压梯度力→空气水平运动（风），形成热力环流（如海陆风、城市风）；风受水平气压梯度力、地转偏向力、摩擦力共同影响。","overview":"【学情分析】A班：能推导热力环流并画三种局地环流；B班：常把\"高压处空气下沉\"与\"高压处风向外\"混淆（垂直与水平方向）。共同问题：风受力与风向（近地/高空）。","objectives":["人地协调观：认识风与环流对生活（通风、污染）的影响。","综合思维：综合冷热、气压、受力分析风与环流。","区域认知：在区域尺度理解海陆风、城市风。","地理实践力：能绘制简单热力环流图并解释生活现象。"],"keyPoints":"① 环流成因：冷热不均→垂直运动→水平气压差→水平运动。\n② 气压：同一高度受热处近地低压、高空高压；遇冷相反。\n③ 受力：梯度力（主因，垂直等压线）、地转偏向力（改向）、摩擦（减速）。\n④ 风向：高空平行于等压线；近地斜穿。","difficulties":"① 垂直vs水平气压。原因：近地热低压但高空高压，学生常只记低压，需立体。\n② 地转偏向力。原因：只改方向不改大小，北半球右偏，易错，需示范。\n③ 风向判定。原因：三力平衡后方向难画，需分步。","teachingMethods":"① 环流动画。\n② 立体剖面图。\n③ 受力分步法。\n④ 生活实例（海风/城市风）。","preparation":"【PPT课件】P1 冷热不均；P2 垂直运动；P3 水平气压差；P4 风受力；P5 局地环流；P6 练习。【地图/图表素材】热力环流示意图、风向受力图、海陆风昼夜图。","process":[{"step":"Step 1 导入——海边白天吹海风","time":"5分钟","content":"【PPT P1 海风】教师：「夏日海边白天风从海吹向陆，夜里相反，这是热力环流。」 预设回答：「学生说\"海陆温差导致\"。」 板书时机：黑板写\"热力环流\"。差异化提示：B班举例；A班需问成因。易错点提醒：风由高压吹向低压，先有气压差。"},{"step":"Step 2 垂直运动","time":"9分钟","content":"【PPT P2 垂直】教师：「A地受热空气膨胀上升，B地遇冷空气收缩下沉，造成上空与近地气压差异。」 预设回答：「学生指受热处上升、遇冷处下沉。」 板书时机：黑板画升降。差异化提示：B班记；A班需说气压。易错点提醒：受热→上升→近地低压、高空高压。"},{"step":"Step 3 水平气压差与风","time":"9分钟","content":"【PPT P3 气压差】教师：「同一高度高压流向低压形成风；水平气压梯度力是风的直接原因。」 预设回答：「学生说\"风从高压到低压\"。」 板书时机：黑板写梯度力。差异化提示：B班记；A班需联等压线。易错点提醒：梯度力垂直等压线、由高压指向低压。"},{"step":"Step 4 风的受力","time":"9分钟","content":"【PPT P4 受力】教师：「高空：梯度力+地转偏向力→平行等压线；近地再加摩擦→斜穿等压线，北右南左偏。」 预设回答：「学生画高空与近地风向区别。」 板书时机：黑板写受力。差异化提示：B班记结论；A班需分步画。易错点提醒：地转偏向力只改方向不加速；北右南左。"},{"step":"Step 5 局地环流","time":"8分钟","content":"【PPT P5 局地】教师：「海陆风、山谷风、城市风都是热力环流；城市风使污染物在郊区下沉回流，工厂应布下风向。」 预设回答：「学生说城市风对城市规划的意义。」 板书时机：黑板写应用。差异化提示：B班记三类；A班需析城市风。易错点提醒：城市热岛使风由郊吹城，污染在郊区堆积。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：近地风向平行等压线( );受热处近地高压( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"画海陆风\"。易错点提醒：本章结束，进入水。"}],"blackboard":"┌── 大气的运动 ──┐\n│ 冷热不均→升降│\n│ 水平压差→风  │\n│ 梯度力:主因  │\n│ 偏向力:改向  │\n│ 高空:平行等压│\n│ 近地:斜穿    │\n└────────────┘","exercises":"【基础作业】1. 风的直接成因是__力。2. 判断：北半球近地风向右偏( )。\n【提高作业】简述城市风的形成及对环境规划的意义。\n【参考答案——教师用】基础1：水平气压梯度。基础2：√。提高：城市热岛效应使郊区冷空气吹向城市，污染物在城郊下沉回流，应将污染企业布局在最小风频上风向或郊区。","reflection":"✅ 亮点：海风实例切入生动；立体剖面解决\"高压也高压\"困惑。\n⚠️ 需改进：B班风受力分步仍吃力，需慢画。\n📌 下节课衔接：第三章 地球上的水。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b1-u3-1","lessonId":"l-geo-b1-u3-1","title":"水循环","book":"必修第一册","unitNumber":3,"unitTitle":"地球上的水","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["水循环","海陆间循环","蒸发","下渗","人教版必修一Ch3","第一课时"],"textbookAnalysis":"水循环包括蒸发、水汽输送、降水、下渗、径流（地表+地下）等环节；按空间分海陆间（大循环）、海上内、陆地内循环；人类活动主要影响地表径流和下渗。","overview":"【学情分析】A班：能完整画三类循环并说人类影响；B班：常把\"海陆间循环\"与\"海上内循环\"混，以为水都回海洋。共同问题：各环节名称与能量来源。","objectives":["人地协调观：认识水资源可再生但有限，树立节水意识。","综合思维：综合各环节理解水循环整体联系。","区域认知：区分不同区域的水循环类型。","地理实践力：能绘制水循环示意图并标注环节。"],"keyPoints":"① 环节：蒸发、水汽输送、降水、下渗、地表/地下径流。\n② 类型：海陆间（海→陆→海，最重要）、海上内、陆地内。\n③ 能量：太阳辐射（动力）+重力（径流）。\n④ 人类影响：修库、引水、城市化改变径流与下渗。","difficulties":"① 海陆间vs海上内。原因：前者使陆地水更新，后者只在海洋，易混，需对比。\n② 人类影响环节。原因：主要改地表径流而非蒸发，易错，需点。\n③ 下渗因素。原因：受植被、坡度、土壤影响，需联土地利用。","teachingMethods":"① 动画演示法。\n② 绘图法。\n③ 对比表。\n④ 实例法（南水北调）。","preparation":"【PPT课件】P1 水圈；P2 循环环节；P3 三类循环；P4 能量；P5 人类影响；P6 练习。【地图/图表素材】水循环示意图、三类循环对比图。","process":[{"step":"Step 1 导入——水从哪来又到哪去","time":"5分钟","content":"【PPT P1 水圈】教师：「江河奔海、海水变云再落山，水在地球上不停旅行，这就是水循环。」 预设回答：「学生说\"雨水来自海洋蒸发\"。」 板书时机：黑板写\"水循环\"。差异化提示：B班举例；A班需问动力。易错点提醒：水循环使水体不断更新，但总量基本不变。"},{"step":"Step 2 主要环节","time":"9分钟","content":"【PPT P2 环节】教师：「蒸发（海湖）→水汽输送（风带）→降水→下渗→地表/地下径流回海。」 预设回答：「学生指认各环节位置。」 板书时机：黑板列环节。差异化提示：B班记；A班需说能量。易错点提醒：径流是返回海洋的主要环节；下渗补给地下水。"},{"step":"Step 3 三类循环","time":"9分钟","content":"【PPT P3 三类】教师：「海陆间循环（海—陆—海，更新陆地水）、海上内（只在海）、陆地内（内流区）。海陆间最重要。」 预设回答：「学生判断长江流域属哪类。」 板书时机：黑板写三类。差异化提示：B班记；A班需析意义。易错点提醒：内流区参与陆地内循环，不注入海洋。"},{"step":"Step 4 能量来源","time":"7分钟","content":"【PPT P4 能量】教师：「太阳辐射提供蒸发动力，重力使水往低处径流，二者驱动全循环。」 预设回答：「学生说\"太阳和重力是引擎\"。」 板书时机：黑板写能量。差异化提示：B班记；A班需联环节。易错点提醒：人类不能直接改变蒸发动力，只能影响局部环节。"},{"step":"Step 5 人类活动影响","time":"8分钟","content":"【PPT P5 影响】教师：「修水库调节径流、跨流域调水、城市化硬化地面减少下渗增大洪峰——主要影响地表径流和下渗。」 预设回答：「学生举本地\"水泥地多了积水\"例。」 板书时机：黑板写影响。差异化提示：B班记；A班需析利弊。易错点提醒：人类主要改造地表径流，非蒸发环节。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：人类主要影响蒸发环节( );海陆间循环更新陆地水( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"画循环图\"。易错点提醒：下节课学海水的性质。"}],"blackboard":"┌── 水循环 ──┐\n│ 蒸→输→降→渗│\n│ →地表/地下径流│\n│ 类型:海陆间(重)│\n│ 海上内/陆地内│\n│ 动力:太阳+重力│\n│ 人改:径流下渗│\n└────────────┘","exercises":"【基础作业】1. 使陆地水得到更新最主要的是__循环。2. 判断：人类活动主要影响水循环的蒸发环节( )。\n【提高作业】城市化如何影响本地水循环？提出一项缓解内涝的措施。\n【参考答案——教师用】基础1：海陆间。基础2：×。提高：硬化地面使下渗减少、地表径流增大、洪峰提前；措施如增绿地、透水砖、蓄水池。","reflection":"✅ 亮点：动画+绘图双管齐下；人类影响落到本地内涝很实用。\n⚠️ 需改进：B班三类循环仍混，需彩色对比图。\n📌 下节课衔接：海水的性质（温度、盐度、密度）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b1-u3-2","lessonId":"l-geo-b1-u3-2","title":"海水的性质","book":"必修第一册","unitNumber":3,"unitTitle":"地球上的水","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["海水温度","盐度","密度","赤道","人教版必修一Ch3","第二课时"],"textbookAnalysis":"海水温度由低纬向高纬递减、夏季高于冬季；盐度大致由副热带最高向两侧降低（长江口等径流注入降低）；密度随温度降低、盐度升高而增大，低纬小高纬大。","overview":"【学情分析】A班：能读温度盐度密度曲线并解释；B班：常把盐度\"赤道最高\"误记（实际副热带最高）。共同问题：三者的纬度分布规律与影响因素。","objectives":["人地协调观：认识海洋资源价值，树立海洋保护意识。","综合思维：综合纬度、洋流、径流分析海水性质。","区域认知：从纬度地带认识海水性质空间差异。","地理实践力：能读海水温度/盐度垂直与水平分布图。"],"keyPoints":"① 温度：低纬高、高纬低；垂直上暖下冷（主跃层）。\n② 盐度：副热带最高（蒸发>降水），赤道较低（多雨）、高纬较低（蒸发弱）；河口低。\n③ 密度：温度低/盐度高则大，低纬小高纬大。\n④ 影响：温度影响气候、盐度影响密度与航运。","difficulties":"① 盐度峰值在副热带。原因：学生误以为赤道最高，需讲蒸发收支。\n② 三者关系。原因：温度盐度共同决定密度，易单因子，需综合。\n③ 垂直变化。原因：温跃层导致温度骤降，需读图。","teachingMethods":"① 曲线读图法。\n② 收支解释法（蒸发vs降水）。\n③ 纬度对比。\n④ 实例（红海高盐）。","preparation":"【PPT课件】P1 温度分布；P2 盐度分布；P3 盐度成因；P4 密度分布；P5 垂直变化；P6 练习。【地图/图表素材】世界大洋年平均温度/盐度分布图、盐度纬度变化曲线。","process":[{"step":"Step 1 导入——海里冬夏温差","time":"5分钟","content":"【PPT P1 温度】教师：「同一片海，夏天暖冬天凉，赤道热两极冷，海水温度有规律。」 预设回答：「学生凭游泳经验说温差。」 板书时机：黑板写\"海水温度\"。差异化提示：B班举例；A班需问规律。易错点提醒：温度随深度增加而降低，有温跃层。"},{"step":"Step 2 温度分布规律","time":"9分钟","content":"【PPT P1 温度】教师：「水平：低纬高、高纬低，夏季>冬季；垂直：上层暖下层冷，温跃层处骤降。」 预设回答：「学生读图指高低纬温度。」 板书时机：黑板写规律。差异化提示：B班记；A班需说洋流影响。易错点提醒：暖流增温、寒流降温，同纬可不同。"},{"step":"Step 3 盐度分布","time":"10分钟","content":"【PPT P2 盐度】教师：「盐度总体副热带最高、向赤道和高纬降低；红海最高、波罗的海最低；大河入海口盐度低。」 预设回答：「学生解释\"副热带为何最高\"（蒸发>降水）。」 板书时机：黑板写盐度曲线。差异化提示：B班记规律；A班需析收支。易错点提醒：赤道多雨盐度并非最高；径流注入稀释盐度。"},{"step":"Step 4 盐度成因","time":"8分钟","content":"【PPT P3 成因】教师：「蒸发使盐升、降水/径流使盐降；副热带蒸发强降水少→最高；高纬蒸发弱→低。」 预设回答：「学生用收支说红海高盐（少雨+蒸发强+封闭）。」 板书时机：黑板写收支。差异化提示：B班记；A班需举红海。易错点提醒：盐度是收支平衡结果，非单一因素。"},{"step":"Step 5 密度分布","time":"8分钟","content":"【PPT P4 密度】教师：「密度随温度降低、盐度升高而增大；低纬暖而小、高纬冷而大，垂直上随深度增大。」 预设回答：「学生说\"冷水比热水密度大\"。」 板书时机：黑板写密度。差异化提示：B班记；A班需综温度盐度。易错点提醒：密度受温度盐度共同影响，不能只看温度。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：海水盐度赤道最高( );密度低纬大于高纬( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"读曲线\"。易错点提醒：下节课学海水的运动。"}],"blackboard":"┌── 海水性质 ──┐\n│ 温度:低纬高   │\n│ 垂直:暖下冷  │\n│ 盐度:副热带最│\n│  高向两侧降  │\n│ 密度:冷/咸则大│\n│ 低纬小高纬大 │\n└────────────┘","exercises":"【基础作业】1. 世界大洋盐度最高的海域多在__纬度。2. 判断：赤道海域盐度全球最高( )。\n【提高作业】比较红海与波罗的海盐度差异并说明原因。\n【参考答案——教师用】基础1：副热带（约20°-30°）。基础2：×。提高：红海盐度最高（炎热少雨、蒸发强、海域封闭、少径流）；波罗的海最低（纬度高蒸发弱、多径流注入、降水较多）。","reflection":"✅ 亮点：收支法讲清盐度峰值位置；红海案例强化。\n⚠️ 需改进：B班易记成\"赤道盐度最高\"，需反复纠错。\n📌 下节课衔接：海水的运动（波浪、潮汐、洋流）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b1-u3-3","lessonId":"l-geo-b1-u3-3","title":"海水的运动","book":"必修第一册","unitNumber":3,"unitTitle":"地球上的水","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["波浪","潮汐","洋流","风向","人教版必修一Ch3","第三课时"],"textbookAnalysis":"海水运动主要形式：波浪（风浪、海啸）、潮汐（日月引潮力，半日潮/全日潮）、洋流（暖流寒流，按成因分风海流、密度流、补偿流）；洋流影响沿岸气候、渔场、航行与污染。","overview":"【学情分析】A班：能说洋流对气候渔场的影响；B班：常把潮汐成因误当\"风\"（实为引潮力），把寒暖流降温减湿记反。共同问题：洋流分布与地理意义。","objectives":["人地协调观：认识海洋动力资源，合理开发保护海洋。","综合思维：综合成因分析海水运动及影响。","区域认知：在世界大洋中定位主要洋流。","地理实践力：能读洋流图判断寒暖流并解释渔场成因。"],"keyPoints":"① 波浪：风浪（风）、海啸（地震/火山）。\n② 潮汐：日月引潮力，周期性涨落，影响港口航运。\n③ 洋流：暖流（低纬→高纬，增温增湿）、寒流相反。\n④ 意义：影响气候、寒暖流交汇成渔场、影响航行与污染扩散。","difficulties":"① 潮汐成因。原因：引潮力非风，学生易混，需强调天体引力。\n② 寒暖流影响。原因：暖流增温增湿、寒流降温减湿易记反，需对比。\n③ 渔场成因。原因：寒暖交汇/上升流带营养，抽象，需图解。","teachingMethods":"① 视频演示（潮汐/海啸）。\n② 洋流图读法。\n③ 寒暖对比表。\n④ 渔场案例（纽芬兰）。","preparation":"【PPT课件】P1 波浪；P2 潮汐；P3 洋流成因；P4 寒暖流；P5 渔场与意义；P6 练习。【地图/图表素材】世界洋流分布图、钱塘潮示意图、纽芬兰渔场图。","process":[{"step":"Step 1 导入——钱塘潮与海啸","time":"5分钟","content":"【PPT P1 波浪】教师：「钱塘江大潮壮观，海啸破坏惊人，它们都是海水运动。」 预设回答：「学生说见过的潮或浪。」 板书时机：黑板写\"海水运动\"。差异化提示：B班看视频；A班需分类型。易错点提醒：海啸由海底地震引发，非风成浪。"},{"step":"Step 2 潮汐","time":"9分钟","content":"【PPT P2 潮汐】教师：「潮汐是日月引潮力造成的海水周期性涨落；有半日潮与全日潮，农历初一十五大潮。」 预设回答：「学生说\"初一十五潮最大\"。」 板书时机：黑板写引潮力。差异化提示：B班记现象；A班需说成因。易错点提醒：潮汐主因是天体引潮力，不是风。"},{"step":"Step 3 洋流及成因","time":"9分钟","content":"【PPT P3 成因】教师：「洋流按成因：风海流（盛行风）、密度流（密度差）、补偿流（补充空缺）；按性质分寒暖流。」 预设回答：「学生指盛行风驱动的风海流。」 板书时机：黑板写三类。差异化提示：B班记；A班需析成因。易错点提醒：洋流是大规模定向流动，非波浪。"},{"step":"Step 4 寒流与暖流","time":"9分钟","content":"【PPT P4 寒暖】教师：「暖流从低纬流向高纬，增温增湿（如北大西洋暖流）；寒流相反，降温减湿（如秘鲁寒流）。」 预设回答：「学生说\"暖流流经处更湿润\"。」 板书时机：黑板写性质。差异化提示：B班记；A班需联气候。易错点提醒：暖流增温增湿、寒流降温减湿，方向相反勿记反。"},{"step":"Step 5 洋流的地理意义","time":"8分钟","content":"【PPT P5 意义】教师：「寒暖流交汇（纽芬兰）或上升流（秘鲁）带来营养盐形成大渔场；顺流省油、寒暖流相遇多雾。」 预设回答：「学生解释纽芬兰渔场成因。」 板书时机：黑板写意义。差异化提示：B班记；A班需析渔场。易错点提醒：渔场多因营养盐上泛，非仅寒暖交汇。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：潮汐由风力引起( );暖流对沿岸降温减湿( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"标洋流\"。易错点提醒：本章结束，进入地貌。"}],"blackboard":"┌── 海水运动 ──┐\n│ 波浪:风浪/海啸│\n│ 潮汐:引潮力  │\n│ 洋流:风/密度/│\n│  补偿流     │\n│ 暖流:增温湿 │\n│ 寒流:降温湿 │\n│ 渔场:交汇上升│\n└────────────┘","exercises":"【基础作业】1. 潮汐的主要成因是__力。2. 判断：寒流对沿岸气候有增温增湿作用( )。\n【提高作业】说明寒暖流交汇处易形成大渔场的原因。\n【参考答案——教师用】基础1：引潮（日月引力）。基础2：×。提高：寒暖流交汇使海水扰动，下层营养盐上泛，浮游生物繁盛，鱼类饵料丰富形成渔场（如纽芬兰）。","reflection":"✅ 亮点：潮汐天体成因纠正了\"风成\"误解；寒暖对比表防记反。\n⚠️ 需改进：B班洋流分布图读图弱，需多指图。\n📌 下节课衔接：第四章 地貌。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b1-u4-1","lessonId":"l-geo-b1-u4-1","title":"常见地貌类型(一)——流水地貌与海岸地貌","book":"必修第一册","unitNumber":4,"unitTitle":"地貌","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["流水地貌","河谷","冲积扇","海岸地貌","人教版必修一Ch4","第一课时"],"textbookAnalysis":"流水侵蚀形成V形谷、峡谷，堆积形成冲积扇、河漫滩、三角洲；海岸受海浪侵蚀成海蚀崖、海蚀柱，堆积成沙滩、沙坝。","overview":"【学情分析】A班：能区分侵蚀与堆积地貌及对应河段；B班：常把上游堆积、下游侵蚀记反（实为上游侵蚀下游堆积）。共同问题：各河段地貌类型与成因。","objectives":["人地协调观：认识地貌与人类聚落、农业的关系，合理利用地形。","综合思维：综合流水侵蚀与堆积分析地貌发育。","区域认知：在流域尺度识别不同河段地貌。","地理实践力：能据照片判断流水/海岸地貌类型及成因。"],"keyPoints":"① 上游：流水侵蚀→V形谷、峡谷。\n② 出山口：堆积→冲积扇；中下游：河漫滩；河口：三角洲。\n③ 海岸侵蚀：海蚀崖、海蚀柱、海蚀洞。\n④ 海岸堆积：沙滩、沙坝、潟湖。","difficulties":"① 上侵下堆。原因：学生易记反上下段作用，需按流速讲。\n② 冲积扇vs三角洲。原因：都在出山口/河口易混，需定位。\n③ 海蚀vs海积。原因：靠波浪能量正负，需分。","teachingMethods":"① 流域剖面图。\n② 实景照片辨识。\n③ 成因动画。\n④ 对比表。","preparation":"【PPT课件】P1 流水作用；P2 河谷发育；P3 冲积扇三角洲；P4 海岸侵蚀；P5 海岸堆积；P6 练习。【地图/图表素材】长江上游峡谷与三角洲图、冲积扇剖面图、海蚀崖照片。","process":[{"step":"Step 1 导入——长江三峡与三角洲","time":"5分钟","content":"【PPT P1 流水】教师：「上游三峡峭壁、入海口辽阔三角洲，都是流水雕刻的。」 预设回答：「学生说\"水冲出来\"。」 板书时机：黑板写\"流水地貌\"。差异化提示：B班看图；A班需问作用。易错点提醒：同一河流上下游作用不同，勿一概而论。"},{"step":"Step 2 侵蚀地貌","time":"9分钟","content":"【PPT P2 河谷】教师：「上游落差大流速快，下切侵蚀成V形谷、峡谷；中游侧蚀使河谷展宽。」 预设回答：「学生指三峡为下切侵蚀。」 板书时机：黑板写上游侵蚀。差异化提示：B班记；A班需说下切侧蚀。易错点提醒：上游以下蚀为主，非堆积。"},{"step":"Step 3 堆积地貌","time":"9分钟","content":"【PPT P3 堆积】教师：「出山口流速骤降堆冲积扇，中下游堆河漫滩，河口堆三角洲，土肥宜农。」 预设回答：「学生说\"为何三角洲是粮仓\"。」 板书时机：黑板写堆积。差异化提示：B班记三类；A班需定位。易错点提醒：冲积扇在山口、三角洲在河口，位置不同。"},{"step":"Step 4 海岸侵蚀","time":"8分钟","content":"【PPT P4 海蚀】教师：「海浪冲击岩石形成海蚀崖、海蚀柱、海蚀洞，海岸线后退。」 预设回答：「学生联想\"礁石像柱子\"。」 板书时机：黑板写海蚀。差异化提示：B班记；A班需说成因。易错点提醒：海蚀使海岸后退，是破坏力表现。"},{"step":"Step 5 海岸堆积","time":"7分钟","content":"【PPT P5 海积】教师：「海浪携带泥沙在湾内或平缓岸堆积成沙滩、沙坝，封闭成潟湖。」 预设回答：「学生说\"沙滩怎么来\"。」 板书时机：黑板写海积。差异化提示：B班记；A班需联潟湖。易错点提醒：海积塑造宜港宜游岸线。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：三角洲在河流出山口( );海蚀崖由堆积形成( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"画剖面\"。易错点提醒：下节课学风成等地貌。"}],"blackboard":"┌── 流水与海岸地貌 ──┐\n│ 上:下蚀→V谷  │\n│ 山口:冲积扇   │\n│ 河口:三角洲   │\n│ 海岸蚀:崖/柱 │\n│ 海岸积:滩/坝 │\n└────────────────┘","exercises":"【基础作业】1. 河流中下游侧蚀易形成__（地貌）。2. 判断：三角洲多发育在河流出山口( )。\n【提高作业】比较冲积扇与三角洲的形成部位与特征。\n【参考答案——教师用】基础1：河漫滩（或河谷展宽）。基础2：×。提高：冲积扇在河流出山口，扇形、颗粒粗；三角洲在河口，三角形、土层厚、土壤肥沃。","reflection":"✅ 亮点：上下游作用对比清晰；实照片辨识效果好。\n⚠️ 需改进：B班冲积扇与三角洲位置仍混，需强化定位。\n📌 下节课衔接：风成、喀斯特、冰川地貌。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b1-u4-2","lessonId":"l-geo-b1-u4-2","title":"常见地貌类型(二)——风成、喀斯特与冰川地貌","book":"必修第一册","unitNumber":4,"unitTitle":"地貌","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["风成地貌","雅丹","喀斯特","冰川地貌","人教版必修一Ch4","第二课时"],"textbookAnalysis":"干旱区风力侵蚀成风蚀蘑菇、雅丹，堆积成沙丘；喀斯特（岩溶）由流水溶蚀石灰岩成峰林、溶洞；高纬高山冰川侵蚀成U谷、冰斗，堆积成冰碛垄。","overview":"【学情分析】A班：能说三类地貌分布区与成因；B班：常把风蚀蘑菇与喀斯特峰林混（一风一水）。共同问题：三类作用（风蚀/溶蚀/冰蚀）与典型形态。","objectives":["人地协调观：认识干旱/岩溶区生态脆弱，重视生态保护。","综合思维：综合气候与岩石性质分析地貌成因。","区域认知：在干旱、湿热、高纬区定位对应地貌。","地理实践力：能据景观照片判断地貌类型。"],"keyPoints":"① 风成：风蚀蘑菇、雅丹（干旱）；沙丘（堆积，迎风缓背风陡）。\n② 喀斯特：石灰岩+流水溶蚀→峰林、溶洞、地下河（桂黔滇）。\n③ 冰川：侵蚀U谷、冰斗、角峰；堆积冰碛垄。\n④ 分布：干旱区、湿热岩溶区、高纬高山。","difficulties":"① 风蚀vs溶蚀。原因：作用营力不同（风/水），易混，需对比。\n② 沙丘坡度。原因：迎风坡缓、背风坡陡，易记反，需图。\n③ 喀斯特条件。原因：需可溶性岩+高温多雨，缺一不发育，需点。","teachingMethods":"① 照片辨识。\n② 营力对比表。\n③ 区域定位。\n④ 成因动画。","preparation":"【PPT课件】P1 风成；P2 雅丹沙丘；P3 喀斯特；P4 溶洞；P5 冰川；P6 练习。【地图/图表素材】风蚀蘑菇/雅丹照片、桂林峰林图、U形谷与角峰图。","process":[{"step":"Step 1 导入——魔鬼城的蘑菇","time":"5分钟","content":"【PPT P1 风成】教师：「西北\"魔鬼城\"的蘑菇状岩柱、桂林的石林，是不同营力雕刻的。」 预设回答：「学生说\"一个风一个水\"。」 板书时机：黑板写\"风成/喀斯特/冰川\"。差异化提示：B班看图；A班需分营力。易错点提醒：同类地貌营力一致，先判营力再判形态。"},{"step":"Step 2 风成地貌","time":"9分钟","content":"【PPT P2 风成】教师：「干旱区风蚀成蘑菇、雅丹（垄槽相间的\"魔鬼城\"）；堆积成沙丘，迎风坡缓、背风坡陡。」 预设回答：「学生说沙丘哪坡陡。」 板书时机：黑板写风成。差异化提示：B班记；A班需说坡度。易错点提醒：沙丘背风坡陡、迎风坡缓，勿记反。"},{"step":"Step 3 喀斯特地貌","time":"9分钟","content":"【PPT P3 喀斯特】教师：「石灰岩在温暖多雨区被流水溶蚀，地表成峰林、孤峰，地下成溶洞、地下河（桂黔滇）。」 预设回答：「学生说\"为何广西多\"（高温多雨+石灰岩）。」 板书时机：黑板写喀斯特。差异化提示：B班记；A班需析条件。易错点提醒：喀斯特需可溶性岩+水溶蚀，缺一不可。"},{"step":"Step 4 地下喀斯特","time":"7分钟","content":"【PPT P4 溶洞】教师：「溶洞内碳酸钙沉积成石钟乳、石笋、石柱；地下水溶蚀成地下河。」 预设回答：「学生区分钟乳与石笋（顶/地）。」 板书时机：黑板写地下。差异化提示：B班记；A班需说沉积。易错点提醒：钟乳自上而下、石笋自下而上。"},{"step":"Step 5 冰川地貌","time":"9分钟","content":"【PPT P5 冰川】教师：「高纬高山冰川侵蚀成U形谷、冰斗、角峰；融化后堆积冰碛垄、冰碛湖。」 预设回答：「学生对比V谷（河流）与U谷（冰川）。」 板书时机：黑板写冰川。差异化提示：B班记；A班需析差异。易错点提醒：U谷宽平由冰川侵蚀，V谷深窄由河流下切。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：桂林峰林由风力侵蚀形成( );沙丘背风坡陡( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"分类\"。易错点提醒：下节课学地貌的观察。"}],"blackboard":"┌── 风成/喀斯特/冰川 ──┐\n│ 风成:蘑菇/雅丹 │\n│  沙丘:背风陡  │\n│ 喀斯特:峰林溶│\n│  洞(石灰岩)  │\n│ 冰川:U谷/冰斗│\n│  /角峰/冰碛  │\n└──────────────────┘","exercises":"【基础作业】1. 石灰岩地区经流水溶蚀形成的地貌称__地貌。2. 判断：沙丘迎风坡比背风坡陡( )。\n【提高作业】简述喀斯特地貌发育的两个基本条件。\n【参考答案——教师用】基础1：喀斯特（岩溶）。基础2：×。提高：①有大面积可溶性岩石（如石灰岩）；②气候温暖湿润、流水溶蚀作用强。","reflection":"✅ 亮点：三营力对比防止混淆；沙丘坡度强调到位。\n⚠️ 需改进：B班对\"喀斯特需两条件\"漏记，需红字。\n📌 下节课衔接：地貌的观察。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b1-u4-3","lessonId":"l-geo-b1-u4-3","title":"地貌的观察","book":"必修第一册","unitNumber":4,"unitTitle":"地貌","lessonType":"exercise","lessonTypeName":"习题课","periodNumber":3,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["地貌观察","绝对高度","相对高度","坡度","人教版必修一Ch4","第三课时"],"textbookAnalysis":"观察地貌一般从宏观（类型、分布）到微观（形态、物质）；高度分绝对高度（海拔）和相对高度，坡度=垂直距/水平距，影响交通与建设；通过等高线读图判断地貌。","overview":"【学情分析】A班：能据等高线判地貌与坡度并选址；B班：常把相对高度当海拔，等高线疏密与坡度关系记反。共同问题：高度概念、坡度计算、等高线读图。","objectives":["人地协调观：认识因地制宜利用地貌，规避灾害。","综合思维：综合高度、坡度分析地貌对人类活动影响。","区域认知：在等高线图上定位地貌类型。","地理实践力：能读等高线图计算高度坡度、进行选址。"],"keyPoints":"① 高度：绝对（海拔，起算海平面）、相对（两点的高差）。\n② 坡度：tanα=高差/水平距，等高线密则坡陡。\n③ 观察顺序：宏观类型→微观形态。\n④ 应用：坡陡不宜修路建房，河谷宜聚落。","difficulties":"① 海拔vs相对。原因：概念易混，需反复举例。\n② 等高线疏密。原因：密=陡、疏=缓，易记反，需读图。\n③ 坡度计算。原因：用水平距非斜距，易错，需练。","teachingMethods":"① 等高线读图法。\n② 高度计算练习。\n③ 选址探究。\n④ 野外观察视频。","preparation":"【PPT课件】P1 观察顺序；P2 高度概念；P3 等高线；P4 坡度；P5 选址；P6 练习。【地图/图表素材】等高线地形图、坡度示意图、地貌观察流程图。","process":[{"step":"Step 1 导入——怎么\"看\"一座山","time":"5分钟","content":"【PPT P1 顺序】教师：「观察地貌先宏观看类型分布，再微观看形态坡度，像医生先全身再局部。」 预设回答：「学生说\"先大后小\"。」 板书时机：黑板写\"宏观→微观\"。差异化提示：B班听；A班需联实践。易错点提醒：观察有顺序，避免只见树木不见林。"},{"step":"Step 2 绝对与相对高度","time":"9分钟","content":"【PPT P2 高度】教师：「绝对高度是海拔（相对海平面），相对高度是两点高差；山峰标注一般为海拔。」 预设回答：「学生算两峰相对高度。」 板书时机：黑板写两高度。差异化提示：B班记；A班需计算。易错点提醒：图上标高多为海拔而非相对高度。"},{"step":"Step 3 等高线读图","time":"9分钟","content":"【PPT P3 等高线】教师：「闭合圈为山/盆，等高线密坡陡、疏坡缓；凸向低为山脊、凸向高为山谷。」 预设回答：「学生指图判山脊山谷。」 板书时机：黑板写规律。差异化提示：B班记；A班需判地形。易错点提醒：等高线密≠高，是坡度大；凸向低=脊。"},{"step":"Step 4 坡度计算","time":"9分钟","content":"【PPT P4 坡度】教师：「坡度=高差/水平距（非斜距）；修路选缓坡，等高线稀疏处。」 预设回答：「学生用图算两地坡度。」 板书时机：黑板写公式。差异化提示：B班记；A班需算。易错点提醒：分母是水平距，若给斜距要先化水平。"},{"step":"Step 5 选址应用","time":"7分钟","content":"【PPT P5 选址】教师：「聚落选河谷平缓、避开陡坡滑坡；水库选\"口袋形\"洼地；公路绕陡崖缓坡。」 预设回答：「学生在图上选坝址。」 板书时机：黑板写选址。差异化提示：B班记；A班需析理由。易错点提醒：坝址看河谷狭窄处，非最宽处。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：等高线越密坡度越缓( );相对高度是两海拔差( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"读图题\"。易错点提醒：本章结束，进入植被土壤。"}],"blackboard":"┌── 地貌的观察 ──┐\n│ 顺序:宏观→微观│\n│ 海拔vs相对高  │\n│ 等高线:密陡疏│\n│  缓,凸低为脊 │\n│ 坡度=高差/水平│\n│ 选址:避陡就缓│\n└──────────────┘","exercises":"【基础作业】1. 地图上山峰标高一般指__高度。2. 判断：等高线越密集坡度越缓( )。\n【提高作业】在等高线图上，如何判断山脊与山谷？水库坝址宜选何处？\n【参考答案——教师用】基础1：海拔（绝对）。基础2：×。提高：等高线向低处凸为山脊、向高处凸为山谷；坝址选河谷狭窄的\"口袋形\"洼地出口处，工程量小库容大。","reflection":"✅ 亮点：等高线规律+选址把观察落到实用；高度概念对比清。\n⚠️ 需改进：B班坡度计算分母仍用斜距，需强调。\n📌 下节课衔接：第五章 植被与土壤。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b1-u5-1","lessonId":"l-geo-b1-u5-1","title":"植被","book":"必修第一册","unitNumber":5,"unitTitle":"植被与土壤","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["植被","森林","草原","荒漠","人教版必修一Ch5","第一课时"],"textbookAnalysis":"植被分天然（森林、草原、荒漠）与人工；森林含热带雨林、常绿阔叶林、落叶阔叶林、亚寒带针叶林，随热量纬度更替；草原、荒漠分布在干旱区；植被是自然环境一面\"镜子\"。","overview":"【学情分析】A班：能按气候带排列森林类型并说明适应性；B班：常把常绿阔叶林与落叶阔叶林混（一南一北）。共同问题：植被类型与气候的对应关系。","objectives":["人地协调观：认识植被涵养水源、保护生态的价值。","综合思维：综合气候分析植被类型与特征。","区域认知：从纬度/干湿区定位植被类型。","地理实践力：能据叶片形态判断植被类型。"],"keyPoints":"① 森林：热带雨林（终年高温多雨）、常绿阔叶林（亚热带湿润）、落叶阔叶林（温带）、针叶林（亚寒带）。\n② 草原：热带草原（干湿季）、温带草原（半干）。\n③ 荒漠：极端干旱区。\n④ 植被反映环境，叶形示水分（针叶耐旱）。","difficulties":"① 常绿vs落叶。原因：亚热带常绿、温带落叶易混区，需联气候。\n② 森林纬度更替。原因：随热量变化，需排序列。\n③ 叶形指示。原因：旱生叶小革质，需联环境。","teachingMethods":"① 景观照片。\n② 气候—植被对应表。\n③ 叶形观察。\n④ 纬度排序。","preparation":"【PPT课件】P1 植被概念；P2 森林类型；P3 常绿落叶；P4 草原荒漠；P5 植被与环境；P6 练习。【地图/图表素材】世界陆地自然带分布图、各类森林景观照片、叶片形态对比图。","process":[{"step":"Step 1 导入——森林是地球的衣服","time":"5分钟","content":"【PPT P1 概念】教师：「覆盖地表的植物群落叫植被，它像镜子反映当地气候。」 预设回答：「学生说\"南方绿北方黄\"。」 板书时机：黑板写\"植被\"。差异化提示：B班看图；A班需问关系。易错点提醒：植被是群体概念，非单株植物。"},{"step":"Step 2 森林类型","time":"9分钟","content":"【PPT P2 森林】教师：「自赤道向高纬：热带雨林→常绿阔叶林→落叶阔叶林→亚寒带针叶林，随热量递减更替。」 预设回答：「学生排序列出四种森林。」 板书时机：黑板写序列。差异化提示：B班记；A班需联热量。易错点提醒：更替主因是热量（纬度），非水分。"},{"step":"Step 3 常绿与落叶","time":"9分钟","content":"【PPT P3 常绿落叶】教师：「亚热带湿润区常绿阔叶林（四季常青），温带落叶阔叶林（冬季落叶越冬），别混区。」 预设回答：「学生指\"南京vs广州各哪种\"。」 板书时机：黑板写对比。差异化提示：B班记；A班需说适应。易错点提醒：常绿阔叶在南方、落叶阔叶在北方。"},{"step":"Step 4 草原与荒漠","time":"8分钟","content":"【PPT P4 草荒】教师：「半干旱区草原（热带草原干湿季、温带草原），极端干旱区荒漠，植被稀疏。」 预设回答：「学生说\"西北荒、内蒙草\"。」 板书时机：黑板写草荒。差异化提示：B班记；A班需联降水。易错点提醒：草原荒漠主因是水分不足。"},{"step":"Step 5 植被反映环境","time":"7分钟","content":"【PPT P5 镜子】教师：「叶片小革质、多刺是旱生适应；宽大叶是湿润标志——植被是环境镜子。」 预设回答：「学生据叶形判干湿。」 板书时机：黑板写\"镜子\"。差异化提示：B班记；A班需析特征。易错点提醒：从植被可反推气候，是地理环境整体性体现。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：温带对应常绿阔叶林( );荒漠分布在湿润区( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"排序列\"。易错点提醒：下节课学土壤。"}],"blackboard":"┌── 植被 ──┐\n│ 雨林→常绿→落叶│\n│ →针叶(热量减)│\n│ 常绿:亚热带  │\n│ 落叶:温带    │\n│ 草原:半干旱  │\n│ 荒漠:极干旱  │\n│ 植被=环境镜子│\n└────────────┘","exercises":"【基础作业】1. 亚热带季风气候区的地带性植被是__林。2. 判断：热带雨林地区全年高温多雨( )。\n【提高作业】为什么亚寒带针叶林叶片呈针状？说明其与环境的适应关系。\n【参考答案——教师用】基础1：常绿阔叶。基础2：√。提高：针状叶表面积小、蒸腾弱、耐寒旱，适应亚寒带低温少雨环境。","reflection":"✅ 亮点：纬度序列+叶形\"镜子\"把植被讲活；常绿落叶区隔清。\n⚠️ 需改进：B班仍混常绿落叶，需多给南北实例。\n📌 下节课衔接：土壤的形成与养护。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b1-u5-2","lessonId":"l-geo-b1-u5-2","title":"土壤","book":"必修第一册","unitNumber":5,"unitTitle":"植被与土壤","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["土壤剖面","有机质","成土因素","人教版必修一Ch5","第二课时"],"textbookAnalysis":"土壤由矿物质、有机质、水分、空气组成；剖面分枯枝落叶层、腐殖质层、淋溶层、淀积层、母质层；成土受气候、生物、地形、母质、时间共同作用，人类活动可改良也可破坏。","overview":"【学情分析】A班：能说成土因素相互作用及黑土成因；B班：常把有机质层（腐殖质）当\"垃圾\"，忽视生物的主导作用。共同问题：剖面分层与成土因素。","objectives":["人地协调观：认识土壤是珍贵资源，反对水土流失与污染。","综合思维：综合分析多因素共同成土。","区域认知：从区域环境理解土壤差异（黑土/红壤）。","地理实践力：能观察土壤剖面并识别层次。"],"keyPoints":"① 组成：矿物质、有机质、水、气。\n② 剖面：枯落层→腐殖质层（色深、肥）→淋溶层→淀积层→母质层。\n③ 成土因素：气候（物质基础）、生物（有机质源，主导）、地形、母质、时间。\n④ 养护：秸秆还田、休耕、有机肥。","difficulties":"① 生物主导。原因：学生易以为气候主因，需点生物供有机质。\n② 剖面层次。原因：腐殖/淋溶/淀积易混，需图。\n③ 黑土肥因。原因：冷湿草类多、分解慢有机质积累，需析。","teachingMethods":"① 剖面图。\n② 因素合力图。\n③ 区域案例（黑土/红壤）。\n④ 野外采样视频。","preparation":"【PPT课件】P1 土壤组成；P2 剖面；P3 成土因素；P4 生物主导；P5 区域土壤；P6 练习。【地图/图表素材】土壤剖面结构图、成土因素关系图、黑土与红壤景观图。","process":[{"step":"Step 1 导入——脚下的\"皮肤\"","time":"5分钟","content":"【PPT P1 组成】教师：「土壤是地球陆地\"皮肤\"，由矿物资、有机质、水、空气组成，养育万物。」 预设回答：「学生说\"土里有养分\"。」 板书时机：黑板写\"土壤组成\"。差异化提示：B班看图；A班需问来源。易错点提醒：土壤≠岩石碎屑，含生命有机质。"},{"step":"Step 2 土壤剖面","time":"9分钟","content":"【PPT P2 剖面】教师：「自上而下：枯落层、腐殖质层（黑、肥）、淋溶层（色浅）、淀积层（物质沉淀）、母质层（风化物）。」 预设回答：「学生指各层位置。」 板书时机：黑板写剖面。差异化提示：B班记；A班需说肥力。易错点提醒：腐殖质层最肥，母质层非土壤。"},{"step":"Step 3 成土因素","time":"9分钟","content":"【PPT P3 因素】教师：「气候提供水热、母质供矿物、地形影响物质迁移、时间积累，五因素合力成土。」 预设回答：「学生说各因素作用。」 板书时机：黑板写因素。差异化提示：B班记；A班需析合力。易错点提醒：单一因素不足以成肥土，需组合。"},{"step":"Step 4 生物主导","time":"8分钟","content":"【PPT P4 生物】教师：「植物枯落、动物和微生物活动提供有机质，生物是土壤有机质来源，起主导。」 预设回答：「学生解释\"无生物则无肥土\"。」 板书时机：黑板写生物主导。差异化提示：B班记；A班需说过程。易错点提醒：生物主导有机质而非母质，母质供矿质。"},{"step":"Step 5 区域土壤差异","time":"8分钟","content":"【PPT P5 区域】教师：「东北黑土（冷湿、草多、分解慢、有机质厚）；南方红壤（湿热、淋溶强、酸瘦需改良）。」 预设回答：「学生说\"为何东北土黑\"。」 板书时机：黑板写差异。差异化提示：B班记；A班需析成因。易错点提醒：黑土肥因冷湿慢分解，红壤瘦因强淋溶。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：成土主导因素是气候( );腐殖质层最肥沃( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"析黑土\"。易错点提醒：本章结束，进入自然灾害。"}],"blackboard":"┌── 土壤 ──┐\n│ 组成:矿/有机/水/气│\n│ 剖面:枯落→腐殖→│\n│  淋溶→淀积→母质│\n│ 因素:气候母质地│\n│  形时间+生物主│\n│ 黑土冷湿草多 │\n│ 红壤湿热淋溶 │\n└──────────────┘","exercises":"【基础作业】1. 土壤有机质的主要来源是__活动。2. 判断：气候是成土的主导因素( )。\n【提高作业】比较东北黑土与南方红壤肥力差异的自然原因。\n【参考答案——教师用】基础1：生物（植物枯落/微生物）。基础2：×。提高：黑土区冷湿、草类茂盛、有机质分解慢而积累厚，肥力高；红壤区湿热、淋溶强、有机质分解快且流失，肥力低酸瘦。","reflection":"✅ 亮点：剖面图+黑土红壤对比具体；生物主导强调到位。\n⚠️ 需改进：B班把气候当主导，需红字强调生物。\n📌 下节课衔接：第六章 自然灾害。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b1-u6-1","lessonId":"l-geo-b1-u6-1","title":"气象灾害","book":"必修第一册","unitNumber":6,"unitTitle":"自然灾害","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["洪涝","干旱","台风","寒潮","人教版必修一Ch6","第一课时"],"textbookAnalysis":"气象灾害包括洪涝（降水集中、排水不畅）、干旱（长时无雨）、台风（热带气旋，强风暴雨风暴潮）、寒潮（强冷空气，剧烈降温）；我国季风区旱涝频发，沿海受台风影响。","overview":"【学情分析】A班：能分析旱涝成因与防灾措施；B班：常把台风\"中心\"当狂风区（实为风平浪静的台风眼）。共同问题：四类灾害的成因与分布。","objectives":["人地协调观：认识灾害威胁，增强防灾减灾意识。","综合思维：综合气候与下垫面分析灾害成因。","区域认知：在我国地图上定位旱涝台风寒潮多发区。","地理实践力：能识别灾害预警并采取避险行动。"],"keyPoints":"① 洪涝：暴雨/持续性降水+地势低平排水不畅。\n② 干旱：长时期少雨，供需失衡。\n③ 台风：热带洋面气旋，眼外狂风暴雨，影响东南沿海。\n④ 寒潮：强冷空气南下，剧烈降温、大风、霜冻。","difficulties":"① 台风眼。原因：眼区风平浪静，学生误以为中心最狂，需点。\n② 旱涝同因。原因：都关降水，旱因少、涝因多，需对比。\n③ 寒潮利弊。原因：除害（冻虫）也有利有弊，需辨证。","teachingMethods":"① 灾害新闻视频。\n② 成因对比表。\n③ 分布图定位。\n④ 避险演练。","preparation":"【PPT课件】P1 灾害分类；P2 洪涝干旱；P3 台风；P4 寒潮；P5 分布；P6 练习。【地图/图表素材】我国旱涝分布图、台风路径图、寒潮入侵路线示意图。","process":[{"step":"Step 1 导入——新闻里的灾害","time":"5分钟","content":"【PPT P1 分类】教师：「暴雨成涝、久晴成旱、海上台风、北来寒潮，都是气象灾害。」 预设回答：「学生说家乡经历过的灾害。」 板书时机：黑板写\"气象灾害\"。差异化提示：B班列举；A班需分类。易错点提醒：气象灾害源自大气异常，非地质作用。"},{"step":"Step 2 洪涝与干旱","time":"9分钟","content":"【PPT P2 旱涝】教师：「降水集中+低平排水不畅成洪涝；长期无雨、蒸发强成干旱，二者相反可转化。」 预设回答：「学生说\"为何同地旱涝交替\"（季风不稳）。」 板书时机：黑板写旱涝。差异化提示：B班记；A班需联季风。易错点提醒：旱涝都因降水异常，旱少涝多。"},{"step":"Step 3 台风","time":"9分钟","content":"【PPT P3 台风】教师：「台风是热带洋面强气旋，旋臂狂风暴雨，中心台风眼反而平静；主要影响东南沿海夏秋。」 预设回答：「学生说\"眼周最猛、眼内静\"。」 板书时机：黑板写台风。差异化提示：B班记；A班需说结构。易错点提醒：台风眼内风平浪静，不是最危险处。"},{"step":"Step 4 寒潮","time":"8分钟","content":"【PPT P4 寒潮】教师：「强冷空气自北南下，剧烈降温、大风、雨雪霜冻，春秋危害大；也冻死害虫。」 预设回答：「学生说\"寒潮来前农事准备\"。」 板书时机：黑板写寒潮。差异化提示：B班记；A班需辨证。易错点提醒：寒潮并非全害，可冻虫但伤作物。"},{"step":"Step 5 分布与防御","time":"8分钟","content":"【PPT P5 分布】教师：「洪涝在季风区平原、台风在东南沿海、寒潮自北南侵、干旱在华北西北；防御靠工程+预警+应急。」 预设回答：「学生在图上标多发区。」 板书时机：黑板写防御。差异化提示：B班记；A班需说措施。易错点提醒：工程（堤坝）与非工程（预警）并重。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：台风眼风力最强( );干旱仅发生在西北地区( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"措施\"。易错点提醒：下节课学地质灾害。"}],"blackboard":"┌── 气象灾害 ──┐\n│ 洪涝:集中降水│\n│ 干旱:长期少雨│\n│ 台风:气旋眼静│\n│ 寒潮:强冷降温│\n│ 防御:工程+预警│\n└────────────┘","exercises":"【基础作业】1. 影响我国东南沿海的强热带气旋是__。2. 判断：台风中心（台风眼）风力最强( )。\n【提高作业】简述我国季风区旱涝灾害频发的主要原因。\n【参考答案——教师用】基础1：台风。基础2：×。提高：季风环流不稳定，降水季节和年际变率大，易旱易涝；加平原地势低平排水不畅加剧洪涝。","reflection":"✅ 亮点：台风眼\"反直觉\"点明；旱涝同源对比清晰。\n⚠️ 需改进：B班防御措施空泛，需落到具体行动。\n📌 下节课衔接：地质灾害（地震、滑坡、泥石流）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b1-u6-2","lessonId":"l-geo-b1-u6-2","title":"地质灾害","book":"必修第一册","unitNumber":6,"unitTitle":"自然灾害","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["地震","滑坡","泥石流","板块","人教版必修一Ch6","第二课时"],"textbookAnalysis":"地质灾害有地震（板块交界、断层活动，震级与烈度）、滑坡（斜坡岩土体下滑）、泥石流（暴雨挟带泥沙石块）；我国位于板块交界带，西南、西北多发，需工程与监测预警。","overview":"【学情分析】A班：能区分震级与烈度并说防御；B班：常把滑坡与泥石流混（一为土体滑动、一为泥水混杂流）。共同问题：三类灾害成因与避防。","objectives":["人地协调观：认识地质活动不可免，但可科学防灾避险。","综合思维：综合地质构造与降水分析灾害成因。","区域认知：在我国板块边界定位地震带。","地理实践力：掌握地震避险与泥石流逃生方法。"],"keyPoints":"① 地震：板块交界/断层活动释放能量；震级（能量）一次固定，烈度（破坏）随地而异。\n② 滑坡：斜坡岩土体受重力下滑，多暴雨后。\n③ 泥石流：沟谷暴雨挟泥沙石块，来势猛。\n④ 防御：抗震设防、监测、避让。","difficulties":"① 震级vs烈度。原因：前者一次固定、后者多因素变，易混，需对比。\n② 滑坡vs泥石流。原因：物质与形态不同，易混，需分。\n③ 避防。原因：地震躲坚物下、泥石流向侧高处逃，方向相反，需强调。","teachingMethods":"① 板块图定位。\n② 震级烈度对比。\n③ 灾害视频。\n④ 避险演练。","preparation":"【PPT课件】P1 板块与地震；P2 震级烈度；P3 滑坡；P4 泥石流；P5 防御；P6 练习。【地图/图表素材】世界地震带分布图、滑坡与泥石流示意图、避难路线图。","process":[{"step":"Step 1 导入——大地的震动","time":"5分钟","content":"【PPT P1 板块】教师：「地震多发生在板块交界，我国恰处交界带，西南西北多发。」 预设回答：「学生说\"汶川在板块边\"。」 板书时机：黑板写\"地质灾害\"。差异化提示：B班看图；A班需联板块。易错点提醒：地质灾害源于地球内力，非气象。"},{"step":"Step 2 地震与震级烈度","time":"9分钟","content":"【PPT P2 震级】教师：「震级表示一次地震释放能量，固定；烈度表示破坏程度，受震源深浅、距震中、地质影响而变。」 预设回答：「学生说\"同震级不同破坏\"原因。」 板书时机：黑板写震级/烈度。差异化提示：B班记；A班需对比。易错点提醒：震级一次一个值，烈度随地点变。"},{"step":"Step 3 滑坡","time":"9分钟","content":"【PPT P3 滑坡】教师：「斜坡岩土体在重力、暴雨、开挖下失稳整体下滑，多见于山区陡坡。」 预设回答：「学生说\"为何雨后易滑坡\"。」 板书时机：黑板写滑坡。差异化提示：B班记；A班需说诱因。易错点提醒：滑坡是土体滑动，非水流。"},{"step":"Step 4 泥石流","time":"8分钟","content":"【PPT P4 泥石】教师：「沟谷在暴雨或冰雪融水驱动下，挟带大量泥沙石块奔腾而下，来势猛、破坏大。」 预设回答：「学生区分泥石流与滑坡（含水泥沙流）。」 板书时机：黑板写泥石流。差异化提示：B班记；A班需分形态。易错点提醒：泥石流含大量水，沿沟谷流动。"},{"step":"Step 5 防御与避险","time":"8分钟","content":"【PPT P5 防御】教师：「工程：抗震设防、护坡；非工程：监测预警、科普演练。地震躲桌下、泥石流向两侧高地逃。」 预设回答：「学生演练\"泥石流往哪跑\"（侧上）。」 板书时机：黑板写避险。差异化提示：B班记；A班需说理由。易错点提醒：泥石流切忌顺沟跑，要向两侧高处。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：一次地震只有一个烈度( );泥石流应向沟谷下游跑( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"措施\"。易错点提醒：下节课学防灾减灾与GIS应用。"}],"blackboard":"┌── 地质灾害 ──┐\n│ 地震:板块交界 │\n│ 震级固定/烈度变│\n│ 滑坡:坡体下滑│\n│ 泥石:泥水奔流│\n│ 避:震躲桌下  │\n│  泥石向侧高  │\n└────────────┘","exercises":"【基础作业】1. 表示一次地震能量大小的指标是__。2. 判断：遭遇泥石流应沿沟谷向下游快速奔跑( )。\n【提高作业】简述地震震级与烈度的区别。\n【参考答案——教师用】基础1：震级。基础2：×。提高：震级是地震释放能量大小，一次地震只有一个；烈度是地表破坏程度，受震源深度、距震中、地质等影响，多地不同。","reflection":"✅ 亮点：震级烈度对比防混；泥石流逃生方向演练实用。\n⚠️ 需改进：B班滑坡泥石流仍混，需再给图。\n📌 下节课衔接：防灾减灾与地理信息技术。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b1-u6-3","lessonId":"l-geo-b1-u6-3","title":"防灾减灾与地理信息技术","book":"必修第一册","unitNumber":6,"unitTitle":"自然灾害","lessonType":"review","lessonTypeName":"复习课","periodNumber":3,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["防灾减灾","RS","GPS","GIS","人教版必修一Ch6","第三课时"],"textbookAnalysis":"防灾减灾包括灾害监测（RS遥感）、预报（GIS分析）、救援定位（GPS）；灾害救援有应急预案、物资储备、避难场所；通过\"3S\"技术提升防灾能力。","overview":"【学情分析】A班：能区分RS/GPS/GIS各自功能并组合应用；B班：常把三者功能张冠李戴（如把导航当GIS）。共同问题：3S技术区分与防灾链条。","objectives":["人地协调观：认识科技防灾意义，树立安全责任意识。","综合思维：综合监测—预报—救援理解防灾体系。","区域认知：在灾害多发区布局监测与避难。","地理实践力：能说出3S在防灾中的具体用途。"],"keyPoints":"① RS：遥感，获取灾害影像，监测范围大、动态快。\n② GPS：定位导航，救援精确定位。\n③ GIS：分析处理数据，预报灾情、规划路径。\n④ 体系：监测→预报→应急（预案/物资/避难所）。","difficulties":"① 3S区分。原因：三者功能易混，需口诀（RS看、GPS位、GIS析）。\n② 组合应用。原因：实际常三者配合，需例。\n③ 防灾体系。原因：监测到救援链条长，需梳理。","teachingMethods":"① 3S口诀法。\n② 案例（地震应急）。\n③ 链条梳理。\n④ 小组演练。","preparation":"【PPT课件】P1 防灾体系；P2 RS；P3 GPS；P4 GIS；P5 组合应用；P6 练习。【地图/图表素材】3S技术对比表、灾害应急流程图、遥感影像图。","process":[{"step":"Step 1 导入——科技如何防灾","time":"5分钟","content":"【PPT P1 体系】教师：「从卫星监测到手机预警，科技让防灾更高效，这就是防灾减灾体系。」 预设回答：「学生说\"收到过地震预警\"。」 板书时机：黑板写\"防灾体系\"。差异化提示：B班听；A班需问技术。易错点提醒：防灾是全链条，非单一技术。"},{"step":"Step 2 RS遥感","time":"9分钟","content":"【PPT P2 RS】教师：「遥感从空中拍灾害影像，范围大、速度快，用于监测洪水、滑坡、作物旱情。」 预设回答：「学生说\"卫星云图就是RS\"。」 板书时机：黑板写RS（看）。差异化提示：B班记；A班需举应用。易错点提醒：RS是\"获取\"信息，非分析。"},{"step":"Step 3 GPS定位","time":"8分钟","content":"【PPT P3 GPS】教师：「全球定位系统精确定位，救援车辆、受困人员靠它导航与搜救。」 预设回答：「学生说\"手机导航靠GPS\"。」 板书时机：黑板写GPS（位）。差异化提示：B班记；A班需说精度。易错点提醒：GPS提供位置，不做分析。"},{"step":"Step 4 GIS分析","time":"9分钟","content":"【PPT P4 GIS】教师：「地理信息系统存储分析空间数据，叠加图层预报灾情、规划撤离路径、评估损失。」 预设回答：「学生说\"预警路径是GIS算的\"。」 板书时机：黑板写GIS（析）。差异化提示：B班记；A班需说图层。易错点提醒：GIS是\"大脑\"分析，不获取数据。"},{"step":"Step 5 组合与应急","time":"8分钟","content":"【PPT P5 组合】教师：「RS监测+GIS分析+GPS定位，三位一体；配合预案、物资、避难所构成救援网。」 预设回答：「学生串起\"监测—预报—救援\"。」 板书时机：黑板写组合。差异化提示：B班记；A班需析链。易错点提醒：三者互补，少一不可。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：GIS用于获取卫星影像( );GPS用于精确导航定位( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"组合题\"。易错点提醒：必修一全册结束。"}],"blackboard":"┌── 防灾与3S ──┐\n│ RS:看(遥感)  │\n│ GPS:位(定位) │\n│ GIS:析(分析) │\n│ 体系:监测→预报│\n│ →应急(案/物/所)│\n└─────────────┘","exercises":"【基础作业】1. 用于精确导航定位的是__系统。2. 判断：遥感（RS）主要负责分析处理空间数据( )。\n【提高作业】在一次地震救援中，3S技术分别发挥什么作用？\n【参考答案——教师用】基础1：GPS（全球定位）。基础2：×。提高：RS快速获取灾区影像监测灾情；GPS精确定位救援队伍与受困点；GIS叠加分析评估损失、规划撤离与救援路线。","reflection":"✅ 亮点：3S口诀（看/位/析）好记；防灾链条梳理清楚。\n⚠️ 需改进：B班组合应用仍弱，需更多实例。\n📌 下节课衔接：必修第二册 人口与聚落。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b2-u1-1","lessonId":"l-geo-b2-u1-1","title":"人口分布","book":"必修第二册","unitNumber":1,"unitTitle":"人口","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["人口分布","胡焕庸线","人口密度","人教版必修二Ch1","第一课时"],"textbookAnalysis":"世界人口集中于中低纬沿海平原，稠密区有东亚、南亚、西欧、北美东部；我国人口东多西少，胡焕庸线（黑河—腾冲）为界；受自然（地形气候）、经济、历史因素影响。","overview":"【学情分析】A班：能分析影响人口分布的因素并读密度图；B班：常把胡焕庸线方向记反（应为东北—西南）。共同问题：分布规律与成因。","objectives":["人地协调观：认识人地关系影响人口分布，理解协调承载。","综合思维：综合自然与社会经济因素分析分布。","区域认知：在地图上定位世界与我国人口稠密区。","地理实践力：能读人口密度图归纳分布特征。"],"keyPoints":"① 世界：中低纬、沿海、平原稠密；四大稠密区（东亚南亚西欧北美东）。\n② 我国：东多西少，胡焕庸线（黑河—腾冲）东南密西北疏。\n③ 因素：自然（地形气候水土）、经济（产业）、历史交通。\n④ 趋向：随经济向城镇工矿集中。","difficulties":"① 胡焕庸线。原因：方向易记反、意义大，需强调。\n② 因素主次。原因：自然基础、经济主导，需分层，易混。\n③ 稠密区记忆。原因：四区名易漏，需定位。","teachingMethods":"① 密度图读图法。\n② 胡焕庸线案例。\n③ 因素分层法。\n④ 世界定位。","preparation":"【PPT课件】P1 世界密度；P2 四大稠密区；P3 中国分布；P4 胡焕庸线；P5 因素；P6 练习。【地图/图表素材】世界人口密度图、中国人口分布图、胡焕庸线示意图。","process":[{"step":"Step 1 导入——人在哪里","time":"5分钟","content":"【PPT P1 密度】教师：「看世界夜光图，亮处人密、暗处人稀，人口分布极不均。」 预设回答：「学生说\"沿海平原亮\"。」 板书时机：黑板写\"人口分布\"。差异化提示：B班看图；A班需问规律。易错点提醒：分布不均是常态，非均匀。"},{"step":"Step 2 世界稠密区","time":"9分钟","content":"【PPT P2 四区】教师：「中低纬沿海平原四大稠密区：东亚、南亚、西欧、北美东部。」 预设回答：「学生在图指出四区。」 板书时机：黑板写四区。差异化提示：B班记；A班需说共性。易错点提醒：四区共性为温暖湿润、平原、经济发达。"},{"step":"Step 3 我国分布与胡线","time":"9分钟","content":"【PPT P3 中国】教师：「我国人口东多西少，胡焕庸线（黑河—腾冲）东南约占国土43%却聚96%人口。」 预设回答：「学生说线的走向（东北—西南）。」 板书时机：黑板写胡线。差异化提示：B班记线；A班需说比例。易错点提醒：胡线为东北—西南走向，非东西。"},{"step":"Step 4 影响因素","time":"9分钟","content":"【PPT P4 因素】教师：「自然是基础（地形气候水土），经济产业是主导，历史交通叠加，共决分布。」 预设回答：「学生析\"为何沿海密\"（气候+经济）。」 板书时机：黑板写因素。差异化提示：B班记；A班需分层。易错点提醒：自然打基础、经济定集聚，勿颠倒。"},{"step":"Step 5 变化趋向","time":"7分钟","content":"【PPT P5 趋向】教师：「随工业化城镇化，人口向城镇、工矿区、交通沿线集中，胡线格局总体稳定。」 预设回答：「学生说\"进城务工\"趋势。」 板书时机：黑板写趋向。差异化提示：B班记；A班需析稳因。易错点提醒：胡线长期稳定反映地理基础约束强。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：胡焕庸线是东西走向( );世界人口多在高原( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"读图\"。易错点提醒：下节课学人口迁移。"}],"blackboard":"┌── 人口分布 ──┐\n│ 世界:中低纬沿海│\n│ 四稠密:东亚南│\n│ 亚西欧北美东 │\n│ 中国:东多西少│\n│ 胡焕庸:黑河─│\n│ 腾冲(东北西南)│\n│ 因素:自然+经济│\n└────────────┘","exercises":"【基础作业】1. 我国人口地理界线是__线（黑河—腾冲）。2. 判断：世界人口主要分布在高纬度地区( )。\n【提高作业】从自然和经济两方面简析我国人口东多西少的原因。\n【参考答案——教师用】基础1：胡焕庸。基础2：×。提高：自然—东部平原广阔、气候温暖湿润、水土条件好；经济—东部开发早、工农业与城镇发达，吸引集聚。","reflection":"✅ 亮点：夜光图直观；胡线比例震撼。\n⚠️ 需改进：B班胡线走向仍错，需红字。\n📌 下节课衔接：人口迁移。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b2-u1-2","lessonId":"l-geo-b2-u1-2","title":"人口迁移","book":"必修第二册","unitNumber":1,"unitTitle":"人口","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["人口迁移","推力","拉力","民工潮","人教版必修二Ch1","第二课时"],"textbookAnalysis":"人口迁移指一定范围内永久或长期变更居住地；原因有推力（原居地劣势）与拉力（迁入地优势），经济因素是主导；我国有乡—城、中西部—东部迁移，国际有难民、劳务输出。","overview":"【学情分析】A班：能用推拉理论分析迁移并评价影响；B班：常把旅游、出差当迁移（未变更常住地）。共同问题：迁移定义、推拉因素、影响。","objectives":["人地协调观：理解迁移对人地关系的影响，关注留守与城市压力。","综合思维：综合经济、社会、自然因素分析迁移。","区域认知：在区域间定位我国主要迁移流向。","地理实践力：能调查本地迁移现象并用推拉解释。"],"keyPoints":"① 定义：变更常住地、跨行政区、长期（通常>1年）。\n② 推拉：原居地推力（失业、灾害）、迁入地拉力（就业、教育）。\n③ 主导：经济因素（收入、机会）。\n④ 影响：迁入地增劳力也增压，迁出地减人但汇款回流。","difficulties":"① 迁移定义。原因：旅游出差非迁移，需强调\"变更常住地\"。\n② 推拉辨析。原因：同一因素对甲乙可推可拉，需具体。\n③ 双向影响。原因：迁入迁出利弊并存，易单面，需辩证。","teachingMethods":"① 推拉图式法。\n② 案例（春运/民工）。\n③ 影响辨析。\n④ 调查实践。","preparation":"【PPT课件】P1 迁移定义；P2 推拉理论；P3 我国流向；P4 国际迁移；P5 影响；P6 练习。【地图/图表素材】我国人口迁移流向箭头图、推拉因素示意图。","process":[{"step":"Step 1 导入——春运大军去哪","time":"5分钟","content":"【PPT P1 定义】教师：「春节返乡的是迁移人口吗？未必——迁移要\"变更常住地\"且长期。」 预设回答：「学生说\"进城定居才算\"。」 板书时机：黑板写\"迁移定义\"。差异化提示：B班举例；A班需抠定义。易错点提醒：短期流动（旅游务工返乡）非迁移。"},{"step":"Step 2 推拉理论","time":"9分钟","content":"【PPT P2 推拉】教师：「原居地有失业、贫困、灾害等推力，城市有就业、教育、医疗等拉力，人往高处走。」 预设回答：「学生列\"老家推力\"与\"城市拉力\"。」 板书时机：黑板写推拉。差异化提示：B班记；A班需析因素。易错点提醒：同一因素对不同人角色不同。"},{"step":"Step 3 我国迁移流向","time":"9分钟","content":"【PPT P3 流向】教师：「改革开放后乡—城、中西部—东部沿海为主，伴随\"民工潮\"，近年部分回流。」 预设回答：「学生说\"西部人到东部打工\"。」 板书时机：黑板写流向。差异化提示：B班记；A班需说变化。易错点提醒：流向随产业转移变化，非固定。"},{"step":"Step 4 国际迁移","time":"7分钟","content":"【PPT P4 国际】教师：「国际迁移有劳务输出、难民、技术移民，受战争、发展差距驱动。」 预设回答：「学生举难民例子。」 板书时机：黑板写国际。差异化提示：B班了解；A班需析因。易错点提醒：难民迁移多被迫，非经济拉力。"},{"step":"Step 5 迁移影响","time":"8分钟","content":"【PPT P5 影响】教师：「迁入地获劳力促发展但也拥堵；迁出地缓解压力、汇款回流但流失人才——利弊并存。」 预设回答：「学生辨证说\"农民工对城市的利与弊\"。」 板书时机：黑板写影响。差异化提示：B班记；A班需辩证。易错点提醒：影响双向，避免只讲一面。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：外出旅游属人口迁移( );经济因素是迁移主导( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"调查\"。易错点提醒：下节课学人口容量。"}],"blackboard":"┌── 人口迁移 ──┐\n│ 定义:变更常住│\n│ 地+长期     │\n│ 推拉:原推/迁拉│\n│ 主导:经济    │\n│ 我国:乡城/中西│\n│ →东        │\n│ 影响:利弊并存│\n└────────────┘","exercises":"【基础作业】1. 人口迁移的主导因素是__因素。2. 判断：短期旅游度假属于人口迁移( )。\n【提高作业】用推拉理论分析我国中西部农民向东部沿海迁移的原因。\n【参考答案——教师用】基础1：经济。基础2：×。提高：推力—中西部就业机会少、收入低、农业收益有限；拉力—东部沿海工业发达、岗位多、收入高、教育医疗好，故大量迁入。","reflection":"✅ 亮点：用\"春运是否迁移\"破定义误区；推拉图好用。\n⚠️ 需改进：B班迁移影响易单面，需强化辩证。\n📌 下节课衔接：人口容量与环境承载力。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b2-u1-3","lessonId":"l-geo-b2-u1-3","title":"人口容量","book":"必修第二册","unitNumber":1,"unitTitle":"人口","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["环境承载力","人口合理容量","资源","人教版必修二Ch1","第三课时"],"textbookAnalysis":"环境承载力是某区域能持续供养的最大人口；人口合理容量是既养得活又过得好的适宜人口；受资源（尤其耕地、水）、科技、消费水平制约；资源越丰、科技越高、消费越节俭，容量越大。","overview":"【学情分析】A班：能区分环境人口容量与合理容量并讨论对策；B班：常把二者混为同一概念。共同问题：两概念差异与制约因素。","objectives":["人地协调观：树立适度人口与可持续发展观念。","综合思维：综合资源、科技、消费分析容量。","区域认知：比较区域间人口容量差异。","地理实践力：能估算本地承载并提对策。"],"keyPoints":"① 环境承载力：最大可供养人口（警戒线）。\n② 人口合理容量：适宜、高质量的人口规模（理想值）。\n③ 制约：资源（首要，短板效应）、科技（提高利用）、消费水平（反向）。\n④ 对策：控制消费、提科技、区际合作。","difficulties":"① 两容量区别。原因：一为上限一为适宜，易混，需对比。\n② 消费反向。原因：消费越高容量越小，反直觉，需点。\n③ 短板效应。原因：最缺资源决定容量，需例。","teachingMethods":"① 概念对比表。\n② 木桶短板类比。\n③ 因素分析。\n④ 讨论对策。","preparation":"【PPT课件】P1 承载力；P2 合理容量；P3 对比；P4 制约因素；P5 对策；P6 练习。【地图/图表素材】木桶短板示意图、世界资源与人口容量对比图。","process":[{"step":"Step 1 导入——地球能养多少人","time":"5分钟","content":"【PPT P1 承载力】教师：「地球资源有限，能养的人口有上限，这叫环境承载力。」 预设回答：「学生说\"资源会用完\"。」 板书时机：黑板写\"承载力\"。差异化提示：B班听；A班需问上限。易错点提醒：承载力是最大上限，非舒适值。"},{"step":"Step 2 合理容量","time":"9分钟","content":"【PPT P2 合理】教师：「人口合理容量是既活得下又活得好的适宜规模，小于承载力上限。」 预设回答：「学生说\"不能只求多\"。」 板书时机：黑板写合理容量。差异化提示：B班记；A班需对比。易错点提醒：合理容量\x3c环境容量，是理想目标。"},{"step":"Step 3 两概念对比","time":"8分钟","content":"【PPT P3 对比】教师：「承载力是\"最多能养多少\"（警戒），合理容量是\"养得舒服多少\"（目标），数值上合理\x3c最大。」 预设回答：「学生填对比表。」 板书时机：黑板写对比。差异化提示：B班记；A班需辨析。易错点提醒：二者单位都是人口数但意义不同。"},{"step":"Step 4 制约因素","time":"9分钟","content":"【PPT P4 因素】教师：「资源是首要（短板效应，最缺的资源定容量）；科技提高利用率；消费水平越高容量越小。」 预设回答：「学生用木桶说\"为何看最少资源\"。」 板书时机：黑板写因素。差异化提示：B班记；A班需析反向。易错点提醒：消费水平与容量反相关，易错。"},{"step":"Step 5 对策","time":"7分钟","content":"【PPT P5 对策】教师：「控制人口与消费、发展科技提效、区际合作调剂资源，提升合理容量。」 预设回答：「学生提\"节约+技术\"对策。」 板书时机：黑板写对策。差异化提示：B班记；A班需联全球。易错点提醒：单靠扩张不可持续，需节流提效。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：合理容量大于环境容量( );消费越高容量越大( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"讨论\"。易错点提醒：本章结束，进入城镇乡村。"}],"blackboard":"┌── 人口容量 ──┐\n│ 承载力=上限  │\n│ 合理=适宜(\x3c上)│\n│ 因素:资源(首)│\n│ 科技(提)    │\n│ 消费(反)    │\n│ 对策:节流提效│\n└────────────┘","exercises":"【基础作业】1. 制约人口容量的首要因素是__。2. 判断：消费水平越高，人口容量越大( )。\n【提高作业】为什么资源短缺的国家（如日本）人口容量仍可较高？\n【参考答案——教师用】基础1：资源（或资源环境）。基础2：×。提高：科技发达可提高资源利用率、发展海外贸易获取资源，弥补本土资源短板，故容量较高。","reflection":"✅ 亮点：木桶短板类比讲清制约；两容量对比防混。\n⚠️ 需改进：B班消费反向难接受，需举例。\n📌 下节课衔接：乡村和城镇空间结构。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b2-u2-1","lessonId":"l-geo-b2-u2-1","title":"乡村和城镇空间结构","book":"必修第二册","unitNumber":2,"unitTitle":"城镇和乡村","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["城市功能区","商业区","工业区","人教版必修二Ch2","第一课时"],"textbookAnalysis":"城镇内部按土地利用分功能区：住宅区（最大）、商业区（市中心、交通便捷）、工业区（外围、沿交通）；城市地域结构有同心圆、扇形、多核心等模式，受地租（距市中心远近）驱动。","overview":"【学情分析】A班：能用地租曲线解释功能区布局；B班：常把工业区放市中心（实际在外围）。共同问题：三大功能区特征与地租关系。","objectives":["人地协调观：认识合理布局对宜居与环境意义。","综合思维：综合地租、交通、环境分析空间结构。","区域认知：在城区图上识别功能区分布。","地理实践力：能读城市地图判读功能区。"],"keyPoints":"① 住宅区：面积最大，分高级与低级住宅。\n② 商业区：市中心、交通口，付租最高、地价最贵。\n③ 工业区：外围、沿铁路公路河港，保护环境。\n④ 地租：距市中心越近地价越高，决定功能分布。","difficulties":"① 商业区位置。原因：市中心付租能力最强，需联地租。\n② 工业区在外。原因：环境+低价，易错放中心，需强调。\n③ 地租曲线。原因：三类付租能力不同致分区，需图。","teachingMethods":"① 功能区读图。\n② 地租曲线法。\n③ 模式对比。\n④ 本地城区探究。","preparation":"【PPT课件】P1 功能区；P2 住宅商业；P3 工业区；P4 地租曲线；P5 地域模式；P6 练习。【地图/图表素材】城市功能区分布图、地租随距离变化曲线图。","process":[{"step":"Step 1 导入——城市里的分区","time":"5分钟","content":"【PPT P1 功能区】教师：「进城可见住宅片、商场群、工厂区，这就是城市空间结构。」 预设回答：「学生说\"家、商场、工厂分开\"。」 板书时机：黑板写\"功能区\"。差异化提示：B班举例；A班需问规律。易错点提醒：功能区是土地利用类型区，非绝对隔离。"},{"step":"Step 2 住宅与商业","time":"9分钟","content":"【PPT P2 住商】教师：「住宅区面积最大；商业区在市中心与交通口，付租能力最强、地价最高。」 预设回答：「学生说\"为何商场在闹市\"（人流量地价）。」 板书时机：黑板写住商。差异化提示：B班记；A班需联地租。易错点提醒：商业区小而贵，非最大。"},{"step":"Step 3 工业区","time":"8分钟","content":"【PPT P3 工业】教师：「工业区布局在外围、沿交通线，既地价低又减少对城区的污染。」 预设回答：「学生说\"工厂为何不在市中心\"。」 板书时机：黑板写工业区。差异化提示：B班记；A班需说环境。易错点提醒：工业区在外围，非市中心。"},{"step":"Step 4 地租曲线","time":"9分钟","content":"【PPT P4 地租】教师：「地租随距市中心变远而降；商业降最快、工业最缓，三线交叉决定功能分区。」 预设回答：「学生描曲线说分区原因。」 板书时机：黑板画曲线。差异化提示：B班记；A班需析交叉。易错点提醒：是付租能力差异导致分区，非随意。"},{"step":"Step 5 地域模式","time":"7分钟","content":"【PPT P5 模式】教师：「城市结构有同心圆、扇形、多核心等模式，受历史、交通、地形影响。」 预设回答：「学生看图辨模式。」 板书时机：黑板写模式。差异化提示：B班了解；A班需析因。易错点提醒：模式是理想化，现实更复杂。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：工业区多位于市中心( );商业区付租能力最强( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"读图\"。易错点提醒：下节课学城镇化。"}],"blackboard":"┌── 城镇空间结构 ──┐\n│ 住宅区:最大  │\n│ 商业区:市中心│\n│  付租最强   │\n│ 工业区:外围  │\n│ 地租:近高远低│\n│ 模式:同心/扇/│\n│  多核       │\n└────────────────┘","exercises":"【基础作业】1. 城市中占地面积最大的功能区通常是__区。2. 判断：工业区一般布局在城镇中心（地租最高处）( )。\n【提高作业】用\"地租曲线\"说明商业区、住宅区、工业区由市中心向外的分布顺序。\n【参考答案——教师用】基础1：住宅。基础2：×。提高：商业付租能力最高占市中心，向外依次为住宅区、工业区；地租随距离下降，三类付租曲线交叉点定界。","reflection":"✅ 亮点：地租曲线把布局讲透；工业区位置强调到位。\n⚠️ 需改进：B班地租曲线读图弱，需慢画。\n📌 下节课衔接：城镇化进程与特点。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b2-u2-2","lessonId":"l-geo-b2-u2-2","title":"城镇化进程与特点","book":"必修第二册","unitNumber":2,"unitTitle":"城镇和乡村","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["城镇化","城市化率","诺瑟姆曲线","人教版必修二Ch2","第二课时"],"textbookAnalysis":"城镇化是人口向城镇集聚、城镇用地扩展的过程，标志为城镇人口比重上升；诺瑟姆曲线呈S形（初期慢、中期快、后期缓）；发达国家起步早水平高，发展中国家起步晚速度快。","overview":"【学情分析】A班：能读诺瑟姆曲线并比较两类国家；B班：常把\"城镇化率\"当\"城市数量\"。共同问题：标志、S曲线阶段、国家差异。","objectives":["人地协调观：认识城镇化的双刃剑，关注城乡协调。","综合思维：综合人口、用地、经济分析城镇化。","区域认知：比较发达国家与发展中国家城镇化差异。","地理实践力：能读城镇化率曲线并判断阶段。"],"keyPoints":"① 标志：城镇人口占总人口比重上升（核心指标）。\n② 表现：人口集聚、用地扩大、二三产业比重升。\n③ S曲线：初期缓慢、中期加速、后期趋缓。\n④ 差异：发达早高慢，发展中晚快低。","difficulties":"① 核心指标。原因：是人口比重非城市数，易错，需强调。\n② S曲线阶段。原因：三段速度不同，需读图定位。\n③ 国家差异。原因：发达与发展中反向（一慢一快），需对比。","teachingMethods":"① 曲线读图法。\n② 指标辨析。\n③ 国家对比。\n④ 数据探究。","preparation":"【PPT课件】P1 城镇化概念；P2 标志；P3 S曲线；P4 阶段特征；P5 国家差异；P6 练习。【地图/图表素材】诺瑟姆S形曲线图、世界城镇化率对比图。","process":[{"step":"Step 1 导入——从乡到城","time":"5分钟","content":"【PPT P1 概念】教师：「越来越多人住进城、农田变楼群，这就是城镇化。」 预设回答：「学生说\"老家变城市\"。」 板书时机：黑板写\"城镇化\"。差异化提示：B班举例；A班需问内涵。易错点提醒：城镇化含人口、土地、产业多重变化。"},{"step":"Step 2 核心标志","time":"9分钟","content":"【PPT P2 标志】教师：「城镇化水平用城镇人口占总人口比重衡量，不是城市个数。」 预设回答：「学生说\"比率才对\"。」 板书时机：黑板写标志。差异化提示：B班记；A班需辨析。易错点提醒：核心指标是人口比重，非城市数量。"},{"step":"Step 3 诺瑟姆S曲线","time":"9分钟","content":"【PPT P3 S曲线】教师：「城镇化率随时间呈S形：初期慢、中期快、后期缓并饱和。」 预设回答：「学生描S形并指三阶段。」 板书时机：黑板画S曲线。差异化提示：B班记形；A班需说阶段。易错点提醒：后期增速放缓而非下降为零。"},{"step":"Step 4 阶段特征","time":"8分钟","content":"【PPT P4 阶段】教师：「中期是城镇化最快期（人口大量进城）；后期趋于稳定，出现郊区化。」 预设回答：「学生说\"我国现在哪个阶段\"（中期）。」 板书时机：黑板写阶段。差异化提示：B班记；A班需定位。易错点提醒：我国处于中期加速阶段。"},{"step":"Step 5 国家差异","time":"7分钟","content":"【PPT P5 差异】教师：「发达国家起步早、水平高、速度缓；发展中国家起步晚、水平较低、速度快。」 预设回答：「学生对比两国曲线。」 板书时机：黑板写差异。差异化提示：B班记；A班需析因。易错点提醒：两类国家速度相反，勿混。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：城镇化水平看城市数量( );发展中国家速度快( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"读曲线\"。易错点提醒：下节课学城镇化问题。"}],"blackboard":"┌── 城镇化 ──┐\n│ 指标:城镇人口│\n│ 比重(非城市数)│\n│ S曲线:慢快缓 │\n│ 我国:中期加速│\n│ 发达:早高缓  │\n│ 发展中:晚快低│\n└────────────┘","exercises":"【基础作业】1. 衡量城镇化水平的核心指标是__人口占总人口的比重。2. 判断：城镇化水平高低主要看城市数量的多少( )。\n【提高作业】比较发达国家与发展中国家城镇化进程的主要差异。\n【参考答案——教师用】基础1：城镇。基础2：×。提高：发达国家起步早、水平高、速度趋缓；发展中国家起步晚、目前水平较低但速度快，处于中期加速阶段。","reflection":"✅ 亮点：S曲线+比重指标破误区；国家对比清晰。\n⚠️ 需改进：B班仍把城市数量当指标，需红字。\n📌 下节课衔接：城镇化的问题与治理。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b2-u2-3","lessonId":"l-geo-b2-u2-3","title":"城镇化的问题与治理","book":"必修第二册","unitNumber":2,"unitTitle":"城镇和乡村","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["城市病","交通拥堵","智慧城市","人教版必修二Ch2","第三课时"],"textbookAnalysis":"过快城镇化带来城市病：交通拥堵、住房紧张、环境污染、就业困难、社会分异；治理靠合理规划、公共交通、生态建设、智慧城市与城乡融合。","overview":"【学情分析】A班：能提出针对性治理措施并评价；B班：常只罗列问题提不出对策。共同问题：问题成因与对策对应。","objectives":["人地协调观：认识城市病危害，树立宜居城市理念。","综合思维：综合经济、社会、生态分析城市问题。","区域认知：在城区定位问题空间分布。","地理实践力：能就本地城市病提治理建议。"],"keyPoints":"① 问题：交通堵、住房紧、污染重、就业难、热岛效应、社会分异。\n② 成因：人口产业过度集中、规划滞后。\n③ 治理：多中心、公交优先、绿道、智慧城市。\n④ 方向：生态宜居、城乡融合。","difficulties":"① 问题对应。原因：措施须对症，易空泛，需因果配对。\n② 热岛效应。原因：下垫面改变致城区更热，需解释。\n③ 智慧城市。原因：概念新，需落地例子。","teachingMethods":"① 问题罗列图。\n② 因果配对。\n③ 案例（雄安/海绵城）。\n④ 献策活动。","preparation":"【PPT课件】P1 城市病；P2 表现；P3 成因；P4 治理；P5 生态城市；P6 练习。【地图/图表素材】城市热岛效应图、交通拥堵示意图、生态城市案例图。","process":[{"step":"Step 1 导入——大城市的烦恼","time":"5分钟","content":"【PPT P1 城市病】教师：「城市大了，堵车、雾霾、买房难接踵而至，统称城市病。」 预设回答：「学生吐槽\"上学堵车\"。」 板书时机：黑板写\"城市病\"。差异化提示：B班举例；A班需归类。易错点提醒：城市病是过快集聚的副作用。"},{"step":"Step 2 主要表现","time":"9分钟","content":"【PPT P2 表现】教师：「交通拥堵、住房紧张、环境污染、就业难、热岛效应（城区比郊热）、贫富分异。」 预设回答：「学生说\"为何城里比乡下热\"（热岛）。」 板书时机：黑板写表现。差异化提示：B班记；A班需解释。易错点提醒：热岛因水泥下垫面吸热、人为热排放。"},{"step":"Step 3 成因","time":"8分钟","content":"【PPT P3 成因】教师：「人口产业过度向中心集中、规划用地滞后、基础设施跟不上，矛盾激化。」 预设回答：「学生说\"人多规划旧\"。」 板书时机：黑板写成因。差异化提示：B班记；A班需析链。易错点提醒：根子在集聚失衡与规划滞后。"},{"step":"Step 4 治理措施","time":"9分钟","content":"【PPT P4 治理】教师：「建多中心疏解中心压力、公交优先减车、留绿道降热岛、智慧城市提效。」 预设回答：「学生配对\"拥堵→公交/多中心\"。」 板书时机：黑板写对策。差异化提示：B班记；A班需对症。易错点提醒：措施要对问题，避免空话。"},{"step":"Step 5 生态宜居","time":"7分钟","content":"【PPT P5 生态】教师：「建设生态城、海绵城，推动城乡融合，让城市宜业宜居。」 预设回答：「学生举\"海绵城市吸水\"例。」 板书时机：黑板写方向。差异化提示：B班记；A班需联案例。易错点提醒：治本在规划先行与城乡协调。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：城市病仅出现在发展中国家( );缓解拥堵可发展公交( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"献策\"。易错点提醒：下节课学地域文化与城乡景观。"}],"blackboard":"┌── 城市病与治理 ──┐\n│ 病:堵/房/污/业│\n│ 热岛/分异   │\n│ 因:集聚失衡 │\n│ 治:多中心   │\n│ 公交优先/绿道│\n│ 智慧/生态城 │\n└────────────────┘","exercises":"【基础作业】1. 城区气温高于郊区的现象称__效应。2. 判断：缓解城市交通拥堵应鼓励私人汽车不限购( )。\n【提高作业】针对城市住房紧张，提出两项可行的治理措施。\n【参考答案——教师用】基础1：热岛。基础2：×。提高：①合理规划、增加保障房与租赁房供给；②发展卫星城与多中心疏解中心人口；③完善公交减少通勤压力。","reflection":"✅ 亮点：热岛效应生动；措施对症配对实用。\n⚠️ 需改进：B班对策仍空泛，需强调查因下药。\n📌 下节课衔接：地域文化与城乡景观。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b2-u2-4","lessonId":"l-geo-b2-u2-4","title":"地域文化与城乡景观","book":"必修第二册","unitNumber":2,"unitTitle":"城镇和乡村","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["地域文化","城乡景观","传统村落","人教版必修二Ch2","第四课时"],"textbookAnalysis":"地域文化是一定地域长期形成的价值观与生活方式；它塑造城乡景观：如南方粉墙黛瓦、北方四合院、黄土高原窑洞、水乡骑楼，景观是文化的物质载体。","overview":"【学情分析】A班：能分析某景观背后的文化与自然原因；B班：常把\"景观\"当纯自然（忽略人文）。共同问题：文化如何塑造景观、案例解读。","objectives":["人地协调观：尊重地域文化，保护传统村落与文脉。","综合思维：综合自然与人文分析景观成因。","区域认知：在区域中识别特色城乡景观。","地理实践力：能解读本地景观的文化内涵。"],"keyPoints":"① 地域文化：价值观、习俗、艺术长期沉淀。\n② 景观载体：建筑、街区、农田是文化的外显。\n③ 案例：四合院（北）、窑洞（黄土）、骑楼（岭南多雨）、水乡（河网）。\n④ 保护：活化利用传统村落。","difficulties":"① 文化塑造。原因：学生易只看形式不见文化，需深读。\n② 自然+人文。原因：景观受二者共决，易单因，需综合。\n③ 案例归因。原因：需联气候地形，易错。","teachingMethods":"① 景观照片。\n② 案例解读。\n③ 自然人文综合。\n④ 本土调查。","preparation":"【PPT课件】P1 地域文化；P2 景观载体；P3 北方案例；P4 南方水乡；P5 保护；P6 练习。【地图/图表素材】四合院/窑洞/骑楼/水乡照片、文化景观分布图。","process":[{"step":"Step 1 导入——房子里的文化","time":"5分钟","content":"【PPT P1 文化】教师：「为何北方四合院、南方骑楼、黄土窑洞各不相同？背后是地域文化。」 预设回答：「学生说\"气候不同\"。」 板书时机：黑板写\"地域文化\"。差异化提示：B班看图；A班需问文化。易错点提醒：景观非纯自然，含人文选择。"},{"step":"Step 2 景观即载体","time":"9分钟","content":"【PPT P2 载体】教师：「城乡建筑、街巷、农田是地域文化的物质外显，读景观可识文化。」 预设回答：「学生说\"看屋顶知南方多雨\"。」 板书时机：黑板写载体。差异化提示：B班记；A班需联读。易错点提醒：景观是文化镜子，需解读。"},{"step":"Step 3 北方案例","time":"9分钟","content":"【PPT P3 北方】教师：「四合院坐北朝南、封闭院落（御寒尊礼）；黄土高原窑洞依山挖穴（冬暖夏凉省材）。」 预设回答：「学生说\"窑洞为何省\"（就地取材）。」 板书时机：黑板写北方。差异化提示：B班记；A班需析因。易错点提醒：形式适应气候也体现礼制。"},{"step":"Step 4 南方水乡","time":"8分钟","content":"【PPT P4 南方】教师：「岭南骑楼下层架空避雨通商（多雨炎热），江南水乡枕河而居（河网密）。」 预设回答：「学生说\"骑楼好处\"（遮阳避雨）。」 板书时机：黑板写南方。差异化提示：B班记；A班需联气候。易错点提醒：南方景观多因湿热多雨。"},{"step":"Step 5 保护传承","time":"7分钟","content":"【PPT P5 保护】教师：「传统村落与历史街区是文脉，应保护修缮、活化利用，避免千城一面。」 预设回答：「学生说\"老街拆了可惜\"。」 板书时机：黑板写保护。差异化提示：B班记；A班需提措。易错点提醒：保护不等于冻结，需活态传承。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：城乡景观只反映自然不讲文化( );窑洞多见于黄土高原( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"解读\"。易错点提醒：本章结束，进入产业区位。"}],"blackboard":"┌── 文化与景观 ──┐\n│ 文化→景观载体│\n│ 北方:四合院  │\n│ 黄土:窑洞   │\n│ 岭南:骑楼   │\n│ 江南:水乡   │\n│ 保护:活态传 │\n└────────────┘","exercises":"【基础作业】1. 黄土高原上依山挖掘的民居是__。2. 判断：城乡景观只受自然环境影响，与地域文化无关( )。\n【提高作业】说明岭南骑楼建筑与当地自然环境的适应关系。\n【参考答案——教师用】基础1：窑洞。基础2：×。提高：岭南高温多雨，骑楼下层架空、廊道连通，可遮阳避雨、便于通商，是对湿热气候的适应，也体现开放商贸文化。","reflection":"✅ 亮点：四合院/骑楼案例学生熟悉；自然+人文综合到位。\n⚠️ 需改进：B班易把景观当纯自然，需多问\"为什么这样建\"。\n📌 下节课衔接：农业区位因素。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b2-u3-1","lessonId":"l-geo-b2-u3-1","title":"农业区位因素","book":"必修第二册","unitNumber":3,"unitTitle":"产业区位因素","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["农业区位","气候","地形","市场","人教版必修二Ch3","第一课时"],"textbookAnalysis":"农业区位受自然（气候、地形、土壤、水源）与社会经济（市场、交通、劳动力、政策、科技）共同影响；市场决定类型与规模，自然是基础。","overview":"【学情分析】A班：能综合自然+社会经济分析某农业布局；B班：常把\"市场\"与\"气候\"主次颠倒。共同问题：自然与社会经济因素区分、主导因素判断。","objectives":["人地协调观：认识因地制宜发展农业，保护耕地生态。","综合思维：综合分析自然与社会经济区位。","区域认知：在区域中定位农业类型与条件。","地理实践力：能评价某地农业区位并提建议。"],"keyPoints":"① 自然：气候（光热水）、地形、土壤、水源——基础。\n② 社会经济：市场（主导类型规模）、交通、劳动力、政策、科技。\n③ 主导：不同农业主导因素不同（城郊菜→市场，绿洲→水源）。\n④ 案例：季风水田、美商品谷。","difficulties":"① 自然vs经济。原因：基础与主导易混，需分层。\n② 主导因素。原因：同一作物在不同地主导不同，需具体。\n③ 市场主导。原因：决定\"种什么种多少\"，易忽略，需强调。","teachingMethods":"① 因素图式。\n② 案例分析（季风水田）。\n③ 主导判定。\n④ 本地农业探究。","preparation":"【PPT课件】P1 农业概念；P2 自然因素；P3 社会经济；P4 主导判定；P5 案例；P6 练习。【地图/图表素材】世界农业地域类型图、某区域农业区位图。","process":[{"step":"Step 1 导入——橘生淮南","time":"5分钟","content":"【PPT P1 概念】教师：「橘过淮北成枳，说明农业受地域条件制约，这就是农业区位。」 预设回答：「学生说\"气候变了\"。」 板书时机：黑板写\"农业区位\"。差异化提示：B班举例；A班需问因素。易错点提醒：农业对自然依赖大，区位敏感。"},{"step":"Step 2 自然因素","time":"9分钟","content":"【PPT P2 自然】教师：「气候（光热水）定能否种、地形定耕作方式、土壤定肥力、水源定灌溉——是自然基础。」 预设回答：「学生说\"为何山地梯田\"（地形）。」 板书时机：黑板写自然。差异化提示：B班记；A班需析主。易错点提醒：气候常是首要自然限制。"},{"step":"Step 3 社会经济","time":"9分钟","content":"【PPT P3 经济】教师：「市场决定种什么与规模，交通影响外运，劳动力政策科技调节，现代市场与科技权重上升。」 预设回答：「学生说\"城郊种菜因近市场\"。」 板书时机：黑板写经济。差异化提示：B班记；A班需说主导。易错点提醒：市场主导类型规模，非自然。"},{"step":"Step 4 主导判定","time":"8分钟","content":"【PPT P4 主导】教师：「同一作物主导因地而异：城郊菜地主市场、干旱区绿洲主水源、橡胶主热量。」 预设回答：「学生判\"新疆棉主导\"（光照/水源）。」 板书时机：黑板写主导。差异化提示：B班记；A班需练判。易错点提醒：先找\"最缺\"的制约因素即主导。"},{"step":"Step 5 案例","time":"7分钟","content":"【PPT P5 案例】教师：「季风水田（湿热、人多、小农）与商品谷物（平原、机械、地广）体现因素组合差异。」 预设回答：「学生对比二者主导因素。」 板书时机：黑板写案例。差异化提示：B班记；A班需对比。易错点提醒：区位组合不同致农业类型不同。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：决定农业类型规模的是气候( );城郊乳畜主导市场( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"评价\"。易错点提醒：下节课学农业区位的变化。"}],"blackboard":"┌── 农业区位 ──┐\n│ 自然:气地水土│\n│ 经济:市交劳政│\n│ 技          │\n│ 市场主导类型│\n│ 主导因地而异│\n│ 案例:水田/谷│\n└────────────┘","exercises":"【基础作业】1. 决定农业生产的类型和规模的主导因素是__。2. 判断：干旱绿洲农业的主导区位因素是热量( )。\n【提高作业】比较季风水田农业与商品谷物农业的主要区位差异。\n【参考答案——教师用】基础1：市场。基础2：×。提高：水田—季风气候湿热、人口稠密、小农经营、劳动力丰富；商品谷物—平原广阔、地广人稀、机械科技高、商品率高。","reflection":"✅ 亮点：橘逾淮北典故切入；主导判定讲清。\n⚠️ 需改进：B班自然/经济主次仍混，需红字。\n📌 下节课衔接：农业区位因素的变化。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b2-u3-2","lessonId":"l-geo-b2-u3-2","title":"农业区位因素的变化","book":"必修第二册","unitNumber":3,"unitTitle":"产业区位因素","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["农业变化","保鲜技术","城市化","人教版必修二Ch3","第二课时"],"textbookAnalysis":"随经济发展，自然因素相对减弱、社会经济与科技作用增强；交通改善与保鲜技术使鲜活农产品远销；城市化使城郊农业转向园艺乳畜；政策与市场动态引导结构调整。","overview":"【学情分析】A班：能说明科技交通如何改变农业布局；B班：常以为\"自然永远第一\"。共同问题：因素作用力消长、案例（鲜花南菜北运）。","objectives":["人地协调观：认识科技兴农，走可持续农业道路。","综合思维：动态综合看待区位因素变化。","区域认知：在时空上理解农业布局变迁。","地理实践力：能解释本地农产品来源变化。"],"keyPoints":"① 趋势：自然作用减弱，市场科技交通增强。\n② 交通保鲜：使园艺、乳畜可远销（南菜北运、鲜花外销）。\n③ 城市化：城郊粮田变菜篮子、果园。\n④ 政策科技：温室、育种、电商拓宽市场。","difficulties":"① 作用力消长。原因：自然非绝对第一，需动态观。\n② 保鲜作用。原因：延长半径改变区位，抽象，需例。\n③ 城郊转变。原因：地价升致粮退菜进，需析。","teachingMethods":"① 时空对比。\n② 案例（南菜北运）。\n③ 趋势图。\n④ 市场链分析。","preparation":"【PPT课件】P1 变化总趋势；P2 自然减弱；P3 交通保鲜；P4 城市化影响；P5 科技政策；P6 练习。【地图/图表素材】农产品流向变化图、城郊农业结构变化图。","process":[{"step":"Step 1 导入——冬天也能吃西瓜","time":"5分钟","content":"【PPT P1 趋势】教师：「反季果蔬、南方菜上北方桌，说明农业区位在变，自然不再是绝对门槛。」 预设回答：「学生说\"大棚和物流\"。」 板书时机：黑板写\"因素变化\"。差异化提示：B班举例；A班需问趋势。易错点提醒：变化是相对作用消长，非自然消失。"},{"step":"Step 2 自然减弱","time":"9分钟","content":"【PPT P2 减弱】教师：「温室、灌溉、育种削弱了热量水分限制，自然因素相对影响下降。」 预设回答：「学生说\"大棚种热带果\"。」 板书时机：黑板写自然减弱。差异化提示：B班记；A班需析。易错点提醒：自然仍基础，但可被技术部分克服。"},{"step":"Step 3 交通与保鲜","time":"9分钟","content":"【PPT P3 保鲜】教师：「高速冷链让云南花、海南菜北上，鲜活农产品销售半径大幅扩展。」 预设回答：「学生说\"为何异地鲜菜便宜\"（物流）。」 板书时机：黑板写保鲜。差异化提示：B班记；A班需联链。易错点提醒：保鲜技术扩展市场半径，改变区位。"},{"step":"Step 4 城市化影响","time":"8分钟","content":"【PPT P4 城市化】教师：「城区扩大、地价上升，城郊粮田转向蔬菜、花卉、乳畜等高效近市场农业。」 预设回答：「学生说\"老家菜地变小区旁花棚\"。」 板书时机：黑板写城郊。差异化提示：B班记；A班需析因。易错点提醒：城郊结构随市场地价而变。"},{"step":"Step 5 科技政策","time":"7分钟","content":"【PPT P5 科技】教师：「电商拓宽销路、政策引导结构调整、育种提产，科技政策成新引擎。」 预设回答：「学生举\"直播卖农货\"。」 板书时机：黑板写科技。差异化提示：B班记；A班需联。易错点提醒：现代区位中科技政策权重上升。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：自然因素对农业影响越来越绝对( );保鲜技术扩大了农产品市场( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"分析\"。易错点提醒：下节课学工业区位。
