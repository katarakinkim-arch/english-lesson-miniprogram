,"地理实践力：能为某资源城提转型方案。"],"keyPoints":"① 困境：资源枯、经济衰、失业高、环境差。\n② 延伸：拉长产业链、深加工提值（如煤→电→化）。\n③ 替代：培育接续产业（装备、旅游、新能源）。\n④ 保障：治环境、建社保、引人才。","difficulties":"① 转型内涵。原因：延伸与替代并行，易偏，需全。\n② 接续产业。原因：要依本地条件选，易空，需例。\n③ 困境链。原因：资源枯引发系列问题，需析。","teachingMethods":"① 困境链图。\n② 转型路径图。\n③ 案例（焦作/阜新）。\n④ 方案设计。","preparation":"【PPT课件】P1 困境；P2 成因；P3 延伸产业链；P4 替代产业；P5 保障；P6 练习。【地图/图表素材】资源型城市分布图、产业转型路径图。","process":[{"step":"Step 1 导入——煤城怎么办","time":"5分钟","content":"【PPT P1 困境】教师：「煤矿采完了，城市也\"病\"了：经济衰、人失业、地塌陷，这就是资源枯竭型城市困境。」 预设回答：「学生说\"老家煤矿衰了\"。」 板书时机：黑板写\"枯竭型\"。差异化提示：B班听；A班需问困。易错点提醒：困境是资源依赖的代价。"},{"step":"Step 2 困境与成因","time":"9分钟","content":"【PPT P2 成因】教师：「单一资源产业、结构畸重，资源减采后产业链断裂，引发衰退、失业、环境欠账。」 预设回答：「学生说\"结构太单一\"。」 板书时机：黑板写成因。差异化提示：B班记；A班需链。易错点提醒：病根是结构单一、依赖资源。"},{"step":"Step 3 延伸产业链","time":"9分钟","content":"【PPT P3 延伸】教师：「不卖原料卖产品：煤→电→铝/化，资源深加工延长寿命、提附加值。」 预设回答：「学生说\"煤变油\"。」 板书时机：黑板写延伸。差异化提示：B班记；A班需析。易错点提醒：延伸是节流提值，非根本替代。"},{"step":"Step 4 培育替代","time":"8分钟","content":"【PPT P4 替代】教师：「依条件培育接续产业：装备制造、文旅、新能源、现代农业，形成多元支撑。」 预设回答：「学生说\"焦作搞旅游\"。」 板书时机：黑板写替代。差异化提示：B班记；A班需例。易错点提醒：替代要因地制宜，非盲目。"},{"step":"Step 5 保障与生态","time":"7分钟","content":"【PPT P5 保障】教师：「治理塌陷与污染、复垦绿化、完善社保、引才引资，为转型托底。」 预设回答：「学生说\"环境要修复\"。」 板书时机：黑板写保障。差异化提示：B班记；A班需联。易错点提醒：转型须生态社保同步。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：资源型城市转型就是彻底放弃资源产业( );培育接续产业有利于多元化( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"方案\"。易错点提醒：下节课学转型案例探究。"}],"blackboard":"┌── 枯竭型转型 ──┐\n│ 困:枯衰失业污│\n│ 延伸:深加长链│\n│ 替代:装备旅新│\n│ 保障:治污社保│\n└────────────┘","exercises":"【基础作业】1. 资源枯竭型城市转型常采取延长__链、培育接续产业两条路径。2. 判断：资源枯竭型城市应完全放弃原有资源产业，另起炉灶( )。\n【提高作业】为某煤炭资源枯竭城市设计一条可行的产业转型思路。\n【参考答案——教师用】基础1：产业（或产业链）。基础2：×。提高：①延伸—煤电化深加工；②替代—依条件发展装备制造/文旅/新能源；③治理环境复垦；④完善社保引才。多元支撑防再衰退。","reflection":"✅ 亮点：困境链清晰；延伸+替代双路径防偏。\n⚠️ 需改进：B班转型仍当放弃资源，需强调延伸。\n📌 下节课衔接：资源枯竭型城市转型案例探究。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx2-u2-4","lessonId":"l-geo-sx2-u2-4","title":"资源枯竭型城市转型案例探究","book":"选择性必修2 区域发展","unitNumber":2,"unitTitle":"资源枯竭型城市的转型","lessonType":"comprehensive","lessonTypeName":"综合课","periodNumber":4,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["焦作","鲁尔区","案例探究","人教版选必二Ch2","第四课时"],"textbookAnalysis":"以河南焦作（煤城转旅游+装备）与德国鲁尔区（煤钢转高新+文化）为例，探究资源型城市转型的共性路径：延伸产业链、发展替代、环境治理、制度创新。","overview":"【学情分析】A班：能对比两案例提炼共性经验；B班：常只记案例表面，不提炼规律。共同问题：案例分析→规律归纳。","objectives":["人地协调观：从案例中体会可持续转型的价值。","综合思维：综合两案例归纳转型规律。","区域认知：在区域中定位案例与条件。","地理实践力：能迁移案例经验分析新区域。"],"keyPoints":"① 焦作：依托云台山旅游+装备制造成功替代煤城。\n② 鲁尔：煤钢基地转高新技术、文化创意、生态修复。\n③ 共性：延伸+替代+治污+制度。\n④ 启示：因地制宜、超前谋划。","difficulties":"① 案例条件。原因：两地禀赋不同路径异，需析。\n② 规律提炼。原因：从个例到一般，易停留在表面，需引导。\n③ 可迁移。原因：经验要能用于新案例，需练。","teachingMethods":"① 双案例对照。\n② 路径提炼。\n③ 比较表。\n④ 迁移练习。","preparation":"【PPT课件】P1 焦作；P2 鲁尔；P3 对比；P4 共性；P5 启示；P6 练习。【地图/图表素材】焦作与鲁尔区位置图、转型产业对比表。","process":[{"step":"Step 1 导入——两座煤城的新生","time":"5分钟","content":"【PPT P1 焦作】教师：「焦作和鲁尔都曾靠煤钢，如今焕新，今天探究它们怎么转。」 预设回答：「学生说\"听过焦作旅游\"。」 板书时机：黑板写\"案例探究\"。差异化提示：B班听；A班需问比。易错点提醒：案例是为提炼规律，非死记。"},{"step":"Step 2 焦作路径","time":"9分钟","content":"【PPT P2 焦作】教师：「焦作借云台山发展旅游、壮大装备制造与新材料，替代煤炭，修复环境。」 预设回答：「学生说\"旅游救了煤城\"。」 板书时机：黑板写焦作。差异化提示：B班记；A班需析。易错点提醒：焦作靠山水文旅+制造双轮。"},{"step":"Step 3 鲁尔路径","time":"9分钟","content":"【PPT P3 鲁尔】教师：「鲁尔淘汰落后煤钢，发展信息技术、生物医药、文化创意，工业遗产变景区，严治污。」 预设回答：「学生说\"旧厂改博物馆\"。」 板书时机：黑板写鲁尔。差异化提示：B班记；A班需析。易错点提醒：鲁尔以高新技术+文化+生态重塑。"},{"step":"Step 4 对比提炼","time":"8分钟","content":"【PPT P4 对比】教师：「两地条件不同但路径共通：延伸、替代、治污、制度，印证上节规律。」 预设回答：「学生填对比表找共性。」 板书时机：黑板写共性。差异化提示：B班记；A班需提。易错点提醒：从个案提炼共性才是目的。"},{"step":"Step 5 启示","time":"7分钟","content":"【PPT P5 启示】教师：「启示：因地制宜选替代、超前谋划、生态优先、产教结合引人才。」 预设回答：「学生说\"要早打算\"。」 板书时机：黑板写启示。差异化提示：B班记；A班需联。易错点提醒：经验可迁移但须本地化。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：焦作与鲁尔转型路径完全相同( );两案都重视环境治理( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"迁移\"。易错点提醒：本章结束，进入城市产业区域发展。"}],"blackboard":"┌── 案例探究 ──┐\n│ 焦作:旅+装备 │\n│ 鲁尔:高技+文 │\n│ 共性:延伸替代│\n│ 治污制度    │\n│ 启示:因地宜 │\n└────────────┘","exercises":"【基础作业】1. 河南焦作依托__山发展旅游业实现产业替代。2. 判断：鲁尔区转型完全抛弃了原有工业基础( )。\n【提高作业】从焦作与鲁尔案例中，归纳资源型城市转型的共性经验。\n【参考答案——教师用】基础1：云台。基础2：×。提高：共性：①延伸资源产业链深加工；②培育接续替代产业（制造/文旅/高新）；③治理环境修复生态；④制度创新与人才引入；⑤因地制宜、超前谋划。","reflection":"✅ 亮点：双案例对照提炼规律；工业遗产案例新。\n⚠️ 需改进：B班易停在个案，需强规律提炼。\n📌 下节课衔接：第三章 城市的辐射功能。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx2-u3-1","lessonId":"l-geo-sx2-u3-1","title":"城市的辐射功能","book":"选择性必修2 区域发展","unitNumber":3,"unitTitle":"城市、产业与区域发展","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["城市辐射","中心城市","城市群","人教版选必二Ch3","第一课时"],"textbookAnalysis":"中心城市通过产业、交通、金融、科技、信息向周边辐射，带动区域；辐射强度随距离衰减；城市群（如长三角）是辐射的高级形态，核心城市与腹地互动共生。","overview":"【学情分析】A班：能说明辐射机制与城市群；B班：常把\"辐射\"当单向\"吸血\"（实为带动）。共同问题：辐射内容、距离衰减、城市群。","objectives":["人地协调观：认识城市带动区域协调发展的价值。","综合思维：综合多要素分析城市辐射。","区域认知：在区域中定位中心城市与腹地。","地理实践力：能分析某城市的辐射带动作用。"],"keyPoints":"① 辐射内容：产业、交通、金融、科技、信息、人口。\n② 距离衰减：距核心越远强度越弱。\n③ 腹地：被核心服务影响的区域，互为依托。\n④ 城市群：多核心网络化（长三角、珠三角）。","difficulties":"① 辐射本质。原因：是带动非掠夺，易误解，需澄清。\n② 距离衰减。原因：强度随距离降，需图。\n③ 城市群。原因：多核网络非单核，需点。","teachingMethods":"① 辐射机制图。\n② 距离衰减曲线。\n③ 城市群案例。\n④ 讨论。","preparation":"【PPT课件】P1 辐射概念；P2 辐射内容；P3 距离衰减；P4 腹地；P5 城市群；P6 练习。【地图/图表素材】中心城市辐射示意图、长三角城市群图。","process":[{"step":"Step 1 导入——上海带长三角","time":"5分钟","content":"【PPT P1 概念】教师：「上海不仅自己强，还带动江浙皖，这就是城市的辐射功能。」 预设回答：「学生说\"上海影响老家\"。」 板书时机：黑板写\"城市辐射\"。差异化提示：B班听；A班需问机。易错点提醒：辐射是带动，非单纯索取。"},{"step":"Step 2 辐射内容","time":"9分钟","content":"【PPT P2 内容】教师：「核心城市向外输送产业、技术、资金、交通、信息、人口，提升周边能级。」 预设回答：「学生说\"总部在沪工厂在外\"。」 板书时机：黑板写内容。差异化提示：B班记；A班需析。易错点提醒：辐射是多要素外流带动。"},{"step":"Step 3 距离衰减","time":"9分钟","content":"【PPT P3 衰减】教师：「辐射强度随距核心越远而减弱，近核强、远郊弱，呈圈层递减。」 预设回答：「学生说\"离上海越近越富\"。」 板书时机：黑板写衰减。差异化提示：B班记；A班需图。易错点提醒：强度随距离衰减，非均匀。"},{"step":"Step 4 腹地互动","time":"8分钟","content":"【PPT P4 腹地】教师：「腹地是核心服务影响的区域，为核心提供资源市场，二者依托共生。」 预设回答：「学生说\"老家是上海腹地\"。」 板书时机：黑板写腹地。差异化提示：B班记；A班需联。易错点提醒：核心与腹地相互依存。"},{"step":"Step 5 城市群","time":"7分钟","content":"【PPT P5 群】教师：「多个中心城市联网成城市群（长三角、珠三角），辐射更高效、分工协作。」 预设回答：「学生说\"长三角多核\"。」 板书时机：黑板写群。差异化提示：B班记；A班需析。易错点提醒：城市群是多核网络，非单中心。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：城市辐射强度随距离增大而增强( );腹地为核心提供资源与市场( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"分析\"。易错点提醒：下节课学地区产业结构变化。"}],"blackboard":"┌── 城市辐射 ──┐\n│ 内容:产技资 │\n│ 交通信息人  │\n│ 强度:距远弱 │\n│ 腹地:互依托 │\n│ 城市群:多核│\n└────────────┘","exercises":"【基础作业】1. 城市辐射功能强度一般随距离核心城市越远而__（增强/减弱）。2. 判断：城市群是由单一核心城市独立带动周边( )。\n【提高作业】说明中心城市与腹地之间的相互关系。\n【参考答案——教师用】基础1：减弱。基础2：×。提高：核心城市向腹地辐射产业技术资金信息，提升其能级；腹地为核心提供资源、劳动力与市场，二者相互依托、共生发展。","reflection":"✅ 亮点：辐射非掠夺澄清；距离衰减图直观。\n⚠️ 需改进：B班腹地关系仍单向，需强调互依。\n📌 下节课衔接：地区产业结构变化。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx2-u3-2","lessonId":"l-geo-sx2-u3-2","title":"地区产业结构变化","book":"选择性必修2 区域发展","unitNumber":3,"unitTitle":"城市、产业与区域发展","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["产业结构","产业升级","第三产业","人教版选必二Ch3","第二课时"],"textbookAnalysis":"产业结构指一二三产业比重；随经济发展，一产比重降、二三产升，二产先升后稳、三产最终主导；优化方向为高效、协调、可持续，与区域发展阶段匹配。","overview":"【学情分析】A班：能读三角坐标说产业结构演进；B班：常把\"二产下降\"当衰退（实为三产升的升级）。共同问题：结构演进规律、优化方向。","objectives":["人地协调观：认识产业结构优化对高质量发展的意义。","综合思维：综合阶段与结构分析产业。","区域认知：在区域中识别产业结构特征。","地理实践力：能读产业图判断所处阶段。"],"keyPoints":"① 结构：一、二、三产比重及关系。\n② 演进：一降、二先升后稳、三升并最终主导。\n③ 优化：高效、协调、可持续、就业好。\n④ 匹配：结构须与阶段和资源禀赋相符。","difficulties":"① 演进顺序。原因：三产此消彼长，易乱，需三角图。\n② 二产波动。原因：先升后稳非一直升，需点。\n③ 优化标准。原因：非单纯三产高，需协调，易误。","teachingMethods":"① 三角坐标图。\n② 演进曲线。\n③ 区域对比。\n④ 判读。","preparation":"【PPT课件】P1 结构概念；P2 演进；P3 三角图；P4 优化；P5 区域对比；P6 练习。【地图/图表素材】三次产业比重变化图、三角坐标图。","process":[{"step":"Step 1 导入——产业结构的体检","time":"5分钟","content":"【PPT P1 概念】教师：「一个地区一二三产各占多少，是它的产业结构，像体检指标反映健康。」 预设回答：「学生说\"农业县一产高\"。」 板书时机：黑板写\"产业结构\"。差异化提示：B班听；A班需问比。易错点提醒：结构是比重关系，非绝对量。"},{"step":"Step 2 演进规律","time":"9分钟","content":"【PPT P2 演进】教师：「随发展：一产比重降，二产先升后稳，三产持续升并最终主导，是普遍规律。」 预设回答：「学生说\"发达区三产高\"。」 板书时机：黑板写演进。差异化提示：B班记；A班需图。易错点提醒：一降二稳三升是主趋势。"},{"step":"Step 3 三角图","time":"9分钟","content":"【PPT P3 三角】教师：「三角坐标读三产比重：从农业国（一产角大）到服务国（三产角大），一眼看阶段。」 预设回答：「学生读图判某区阶段。」 板书时机：黑板写三角。差异化提示：B班记；A班需读。易错点提醒：三角图三数和为100%，读点要准。"},{"step":"Step 4 优化方向","time":"8分钟","content":"【PPT P4 优化】教师：「优化非一味追三产高，而要高效、协调、就业好、可持续，与禀赋阶段匹配。」 预设回答：「学生说\"不能脱实向虚\"。」 板书时机：黑板写优化。差异化提示：B班记；A班需析。易错点提醒：高级≠健康，须协调可持续。"},{"step":"Step 5 区域对比","time":"7分钟","content":"【PPT P5 对比】教师：「同阶段区域结构相近；资源型区域二产畸重待优化，须培育三产与高新。」 预设回答：「学生对比两类区域。」 板书时机：黑板写对比。差异化提示：B班记；A班需联。易错点提醒：结构须因地制宜优化。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：经济发展中第一产业比重持续上升( );产业结构优化只追求三产比重最高( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"读图\"。易错点提醒：下节课学产业升级案例。"}],"blackboard":"┌── 产业结构 ──┐\n│ 一降二稳三升│\n│ 三产最终主导│\n│ 优化:高效协 │\n│ 调可持续    │\n│ 匹配阶段禀赋│\n└────────────┘","exercises":"【基础作业】1. 区域发展到较高阶段，通常__产业（第一/第二/第三）比重最大。2. 判断：产业结构优化就是让第三产业比重越高越好( )。\n【提高作业】说明区域发展过程中三次产业比重的一般变化规律。\n【参考答案——教师用】基础1：第三。基础2：×。提高：随经济发展，第一产业比重持续下降，第二产业先上升后趋稳，第三产业比重持续上升并在较高阶段成为主导，体现结构高度化。","reflection":"✅ 亮点：三角坐标读阶段直观；优化非唯三产强调。\n⚠️ 需改进：B班二产波动仍当一直升，需点。\n📌 下节课衔接：产业结构升级与优化案例。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx2-u3-3","lessonId":"l-geo-sx2-u3-3","title":"产业结构升级与优化案例","book":"选择性必修2 区域发展","unitNumber":3,"unitTitle":"城市、产业与区域发展","lessonType":"comprehensive","lessonTypeName":"综合课","periodNumber":3,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["产业升级","珠江三角洲","高新区","人教版选必二Ch3","第三课时"],"textbookAnalysis":"以珠江三角洲（从劳动密集制造到智能制造与高新）为例，说明产业升级靠技术引进与创新、产业链完善、营商环境与人才；政府引导+市场驱动共同作用。","overview":"【学情分析】A班：能分析珠三角升级的驱动力；B班：常把\"升级\"当\"换行业\"（实为提质延链）。共同问题：升级路径与驱动。","objectives":["人地协调观：认识创新驱动高质量发展的意义。","综合思维：综合技术市场政策分析升级。","区域认知：在区域中定位产业升级条件。","地理实践力：能为一区域提升级建议。"],"keyPoints":"① 路径：劳动密集→技术密集，制造→智造与高新。\n② 驱动：技术创新、人才、完善产业链、营商环境。\n③ 角色：市场主导+政府引导（园区政策）。\n④ 风险：避免低端锁定，需品牌与研发。","difficulties":"① 升级内涵。原因：提质延链非换道，易误，需析。\n② 驱动力。原因：技术市场政策多因，需综合，易单。\n③ 政府角色。原因：引导非包办，需点。","teachingMethods":"① 升级路径图。\n② 驱动力分析。\n③ 案例（深圳/东莞）。\n④ 讨论。","preparation":"【PPT课件】P1 案例背景；P2 升级路径；P3 驱动；P4 政府市场；P5 风险；P6 练习。【地图/图表素材】珠三角产业演变图、高新区分布图。","process":[{"step":"Step 1 导入——世界工厂的蜕变","time":"5分钟","content":"【PPT P1 背景】教师：「珠三角曾靠\"三来一补\"起家，如今造无人机造芯片，完成升级。」 预设回答：「学生说\"深圳变高科技\"。」 板书时机：黑板写\"升级\"。差异化提示：B班听；A班需问径。易错点提醒：升级是提质非盲目换业。"},{"step":"Step 2 升级路径","time":"9分钟","content":"【PPT P2 路径】教师：「从劳动密集制造转向技术密集与高新技术，延伸研发设计品牌，向价值链高端走。」 预设回答：「学生说\"从代工到自研\"。」 板书时机：黑板写路径。差异化提示：B班记；A班需析。易错点提醒：核心是向研发品牌服务端攀升。"},{"step":"Step 3 驱动力","time":"9分钟","content":"【PPT P3 驱动】教师：「升级靠技术创新、人才集聚、产业链配套、优良营商环境与开放市场。」 预设回答：「学生说\"为何聚深圳\"（人才链）。」 板书时机：黑板写驱动。差异化提示：B班记；A班需析。易错点提醒：创新与人才是关键引擎。"},{"step":"Step 4 政府与市场","time":"8分钟","content":"【PPT P4 角色】教师：「市场主导资源配置，政府通过高新区、政策、基建引导，二者协同发力。」 预设回答：「学生说\"政府建园区\"。」 板书时机：黑板写角色。差异化提示：B班记；A班需分。易错点提醒：政府引导不包办，市场是主体。"},{"step":"Step 5 风险","time":"7分钟","content":"【PPT P5 风险】教师：「若只代工不研发，会低端锁定；须创品牌、抓核心，防被替代。」 预设回答：「学生说\"要有自己的技术\"。」 板书时机：黑板写风险。差异化提示：B班记；A班需联。易错点提醒：避免价值链低端锁定。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：产业升级就是完全放弃制造业( );技术创新是升级的重要驱动力( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"建议\"。易错点提醒：本章结束，进入区际联系。"}],"blackboard":"┌── 产业升级 ──┐\n│ 路径:制造→智造│\n│ 驱动:技术人才│\n│ 链/营商     │\n│ 角色:市场主 │\n│ 政府导     │\n│ 防低端锁定 │\n└────────────┘","exercises":"【基础作业】1. 区域产业升级的重要驱动力是技术创新和__集聚。2. 判断：产业升级意味着彻底退出制造业( )。\n【提高作业】以珠江三角洲为例，说明产业结构升级的主要驱动力。\n【参考答案——教师用】基础1：人才（或劳动力素质）。基础2：×。提高：驱动力包括技术创新与研发投入、高素质人才集聚、完善产业链配套、优良营商环境与开放市场，以及政府通过园区与政策引导，市场与政府协同推动向高端攀升。","reflection":"✅ 亮点：低端锁定风险提醒到位；政府市场角色分清。\n⚠️ 需改进：B班升级当换行业，需强调提质延链。\n📌 下节课衔接：第四章 区际联系与区域协调发展。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx2-u4-1","lessonId":"l-geo-sx2-u4-1","title":"流域内部的协调发展","book":"选择性必修2 区域发展","unitNumber":4,"unitTitle":"区际联系与区域协调发展","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["流域协调","长江","上中下游","人教版选必二Ch4","第一课时"],"textbookAnalysis":"流域是完整自然社会系统，上中下游利益相关；需统一规划：上游护水源、中游防洪蓄洪、下游防污护河，通过生态补偿与协作机制实现协调发展。","overview":"【学情分析】A班：能说上中下游各自职责与协作；B班：常把流域当\"各管一段\"（忽略整体）。共同问题：整体协作、分区职责。","objectives":["人地协调观：认识流域生命共同体，协同守护。","综合思维：综合上中下游分析流域系统。","区域认知：在流域中定位上下游功能。","地理实践力：能针对某流域提协调方案。"],"keyPoints":"① 整体：流域是完整系统，上下游利益相关。\n② 上游：涵养水源、保持水土、建库调蓄。\n③ 中游：退田还湖、防洪蓄洪。\n④ 下游：防治污染、护河口生态；机制：生态补偿协作。","difficulties":"① 整体协作。原因：各段须统筹，易分割，需强调。\n② 分区职责。原因：上下游任务不同，需明。\n③ 生态补偿。原因：受益付费机制，需点。","teachingMethods":"① 流域系统图。\n② 上中下游分工。\n③ 长江案例。\n④ 协作机制。","preparation":"【PPT课件】P1 流域系统；P2 上游；P3 中游；P4 下游；P5 机制；P6 练习。【地图/图表素材】长江流域示意图、上中下游治理分工图。","process":[{"step":"Step 1 导入——一条河一家人","time":"5分钟","content":"【PPT P1 系统】教师：「长江从源头到入海是一家人，上游的事下游管不着但也受影响，须整体协调。」 预设回答：「学生说\"上游脏下游遭殃\"。」 板书时机：黑板写\"流域协调\"。差异化提示：B班听；A班需问体。易错点提醒：流域是完整系统，非分段独立。"},{"step":"Step 2 上游职责","time":"9分钟","content":"【PPT P2 上游】教师：「上游山高坡陡，任务是涵养水源、保持水土、建水库调蓄洪枯，是\"水塔\"。」 预设回答：「学生说\"上游种树保水\"。」 板书时机：黑板写上游。差异化提示：B班记；A班需析。易错点提醒：上游失守则全流域受害。"},{"step":"Step 3 中游职责","time":"9分钟","content":"【PPT P3 中游】教师：「中游河道展宽、湖泊多，任务退田还湖、加固堤防、蓄滞洪区调洪。」 预设回答：「学生说\"洞庭湖调蓄\"。」 板书时机：黑板写中游。差异化提示：B班记；A班需联。易错点提醒：中游是蓄洪关键，围湖造田削弱。"},{"step":"Step 4 下游职责","time":"8分钟","content":"【PPT P4 下游】教师：「下游人口产业密，任务防污治污、护河口湿地与生态，保清水入海。」 预设回答：「学生说\"入海口生态重要\"。」 板书时机：黑板写下游。差异化提示：B班记；A班需联。易错点提醒：下游污染会毁河口生态。"},{"step":"Step 5 协作机制","time":"7分钟","content":"【PPT P5 机制】教师：「建立全流域管理机构、生态补偿（受益方付费）、统一标准，实现共抓大保护。」 预设回答：「学生说\"下游补偿上游\"。」 板书时机：黑板写机制。差异化提示：B班记；A班需析。易错点提醒：生态补偿使保护者有动力。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：流域各段可独立治理互不影响( );生态补偿利于上游保护( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"方案\"。易错点提醒：下节课学资源跨区域调配。"}],"blackboard":"┌── 流域协调 ──┐\n│ 整体:上下游联│\n│ 上游:涵养水土│\n│ 中游:蓄洪   │\n│ 下游:防污护口│\n│ 机制:补偿协 │\n└────────────┘","exercises":"【基础作业】1. 流域治理应坚持__（局部/整体）协调的原则。2. 判断：中游围湖造田有利于增强防洪调蓄能力( )。\n【提高作业】说明长江上游水源涵养对中下游的意义。\n【参考答案——教师用】基础1：整体。基础2：×。提高：上游涵养水源、保持水土，可稳定中下游水量、削减洪峰、减少泥沙淤积，降低中下游洪涝与淤积风险，是全流域安全的基石。","reflection":"✅ 亮点：生命共同体理念；分区职责清晰。\n⚠️ 需改进：B班仍分段看，需强调整体。\n📌 下节课衔接：资源跨区域调配。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx2-u4-2","lessonId":"l-geo-sx2-u4-2","title":"资源跨区域调配","book":"选择性必修2 区域发展","unitNumber":4,"unitTitle":"区际联系与区域协调发展","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["西气东输","南水北调","区域协调","人教版选必二Ch4","第二课时"],"textbookAnalysis":"资源分布不均与需求错配催生跨区域调配：南水北调（水南多北少）、西气东输/西电东送（能源西丰东缺）；调配优化资源配置、促区域协调，也需关注输区生态与受区环境。","overview":"【学情分析】A班：能分析调配的区际影响与利弊；B班：常只知\"调过去\"不知\"为什么调\"。共同问题：调配原因、工程、影响。","objectives":["人地协调观：认识资源调配对区际公平的促进与生态责任。","综合思维：综合资源分布与需求分析调配。","区域认知：在国土尺度定位调配工程。","地理实践力：能评价某调配工程的区际影响。"],"keyPoints":"① 原因：资源分布不均+供需错配（南水北少、西能东缺）。\n② 工程：南水北调、西气东输、西电东送、北煤南运。\n③ 影响：输出区获资金产业、输入区缓短缺、全国优化。\n④ 注意：输区生态、受区环境。","difficulties":"① 调配原因。原因：分布与需求错配，需讲清，易漏。\n② 区际影响。原因：输受双方利弊，需双向，易单。\n③ 工程定位。原因：具体线路方向，需记。","teachingMethods":"① 不均分布图。\n② 工程路线图。\n③. 双向影响分析。\n④ 案例（西气东输）。","preparation":"【PPT课件】P1 不均；P2 南水北调；P3 西气东输；P4 西电北煤；P5 影响；P6 练习。【地图/图表素材】资源跨区域调配工程路线图、资源分布与需求对比图。","process":[{"step":"Step 1 导入——南水北调的缘由","time":"5分钟","content":"【PPT P1 不均】教师：「我国水南多北少、能源西丰东缺，只好把资源调去缺的地方。」 预设回答：「学生说\"北方缺水\"。」 板书时机：黑板写\"调配\"。差异化提示：B班听；A班需问因。易错点提醒：调配根源是分布与需求的空间错配。"},{"step":"Step 2 南水北调","time":"9分钟","content":"【PPT P2 南水】教师：「南水北调分东中两线，把长江水引向华北，缓解京津缺水、回补地下水。」 预设回答：「学生说\"北京用上长江水\"。」 板书时机：黑板写南水。差异化提示：B班记；A班需线。易错点提醒：三线均从长江调向华北。"},{"step":"Step 3 西气东输","time":"9分钟","content":"【PPT P3 西气】教师：「西气东输将新疆等天然气送长三角，改善东部能源结构、减煤污，带西部开发。」 预设回答：「学生说\"上海用新疆气\"。」 板书时机：黑板写西气。差异化提示：B班记；A班需析。易错点提醒：西气东输惠民也利西部。"},{"step":"Step 4 西电北煤","time":"8分钟","content":"【PPT P4 西电】教师：「西电东送（水电火电）、北煤南运，将西部能源送东部负荷中心，优化全国配置。」 预设回答：「学生说\"西电东送\"。」 板书时机：黑板写西电。差异化提示：B班记；A班需联。易错点提醒：多种能源互补调配。"},{"step":"Step 5 双向影响","time":"7分钟","content":"【PPT P5 影响】教师：「输出区获资金产业、输入区缓短缺保发展，全国优化；但须护输区生态、防受区污染。」 预设回答：「学生辨证说利弊。」 板书时机：黑板写影响。差异化提示：B班记；A班需双向。易错点提醒：影响双向，须兼顾生态。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：西气东输是将东部天然气输往西部( );调配利于区域协调发展( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"评价\"。易错点提醒：下节课学产业转移。"}],"blackboard":"┌── 跨区域调配 ──┐\n│ 因:分布不均 │\n│ 南水北调    │\n│ 西气东输    │\n│ 西电北煤    │\n│ 影响:双向优 │\n│ 护生态     │\n└────────────────┘","exercises":"【基础作业】1. 将西部天然气输送到东部地区的重大工程是__。2. 判断：资源跨区域调配只会给输入区带来好处( )。\n【提高作业】说明西气东输对东部输入区和西部输出区的不同意义。\n【参考答案——教师用】基础1：西气东输。基础2：×。提高：西部—将资源优势转经济优势，获资金带动相关产业；东部—缓解能源短缺、优化能源结构、减轻燃煤污染、改善环境。","reflection":"✅ 亮点：分布错配讲清根因；双向影响防单面。\n⚠️ 需改进：B班只知调不知因，需强化根因。\n📌 下节课衔接：产业转移。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx2-u4-3","lessonId":"l-geo-sx2-u4-3","title":"产业转移","book":"选择性必修2 区域发展","unitNumber":4,"unitTitle":"区际联系与区域协调发展","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["产业转移","梯度转移","影响","人教版选必二Ch4","第三课时"],"textbookAnalysis":"产业转移因转出区成本上升、转入区区位改善（政策、劳动力、市场）而发生，由高梯度向低梯度推进；对转出区腾笼换鸟、对转入区促就业也带来污染风险，需绿色承接。","overview":"【学情分析】A班：能分析转移动因与区际影响；B班：常只记\"工厂搬家\"忽略动因与后果。共同问题：动因、方向、双向影响。","objectives":["人地协调观：认识产业转移中的生态责任与绿色承接。","综合思维：综合成本市场政策分析转移。","区域认知：在区际识别转移方向。","地理实践力：能评价某产业转移的利弊。"],"keyPoints":"① 动因：转出区成本升（地租劳力）、环境紧；转入区政策优、成本低、市场大。\n② 方向：由高梯度（发达）向低梯度（发展中）。\n③ 影响：转出腾笼换鸟、转入促就业产业但防污染。\n④ 原则：绿色承接、择优引入。","difficulties":"① 动因。原因：推力拉力并存，需双析，易单。\n② 方向。原因：高梯度向低梯度，易记反，需析。\n③ 双向影响。原因：利弊并存，易偏，需辩证。","teachingMethods":"① 推拉分析。\n② 方向示意。\n③ 双向影响表。\n④ 案例（富士康内迁）。","preparation":"【PPT课件】P1 动因；P2 转出推力；P3 转入拉力；P4 方向；P5 影响；P6 练习。【地图/图表素材】产业转移方向箭头图、区际影响对比表。","process":[{"step":"Step 1 导入——工厂向西走","time":"5分钟","content":"【PPT P1 动因】教师：「沿海工厂往内陆、往东南亚搬，是产业转移，背后是成本与市场的再选择。」 预设回答：「学生说\"人工贵了\"。」 板书时机：黑板写\"产业转移\"。差异化提示：B班听；A班需问因。易错点提醒：转移是要素重组结果。"},{"step":"Step 2 转出推力","time":"9分钟","content":"【PPT P2 推力】教师：「转出区地租工资涨、资源紧、环境门槛高、产业升级倒逼，劳动密集外迁。」 预设回答：「学生说\"沿海留不下工厂\"。」 板书时机：黑板写推力。差异化提示：B班记；A班需析。易错点提醒：推力来自成本与环境约束。"},{"step":"Step 3 转入拉力","time":"9分钟","content":"【PPT P3 拉力】教师：「转入区政策优惠、劳力土地成本低、市场广阔、基建改善，吸引产业落户。」 预设回答：「学生说\"老家给优惠\"。」 板书时机：黑板写拉力。差异化提示：B班记；A班需析。易错点提醒：拉力是更低成本与更大市场。"},{"step":"Step 4 方向","time":"8分钟","content":"【PPT P4 方向】教师：「产业沿梯度由高（发达）向低（发展中）转移，如沿海→内陆→东南亚。」 预设回答：「学生说\"梯度往下走\"。」 板书时机：黑板写方向。差异化提示：B班记；A班需析。易错点提醒：方向是高梯度向低梯度，非相反。"},{"step":"Step 5 双向影响","time":"7分钟","content":"【PPT P5 影响】教师：「转出区腾笼换鸟、转入区增就业产业，但也伴污染转移，须绿色承接、择优引入。」 预设回答：「学生辨证说利弊。」 板书时机：黑板写影响。差异化提示：B班记；A班需双向。易错点提醒：承接须防污染转嫁。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：产业转移总是由落后区转向发达区( );转入区应拒绝一切产业( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"评价\"。易错点提醒：下节课学一带一路。"}],"blackboard":"┌── 产业转移 ──┐\n│ 推:成本环境升│\n│ 拉:政策成本低│\n│ 方向:高→低梯│\n│ 影响:双刃   │\n│ 绿色承接   │\n└────────────┘","exercises":"【基础作业】1. 产业转移一般由高梯度地区向__梯度地区推进。2. 判断：产业转入区应当无条件承接所有转出产业( )。\n【提高作业】从转出区和转入区两方面，说明产业转移的主要影响。\n【参考答案——教师用】基础1：低。基础2：×。提高：转出区—腾出空间发展高端产业（腾笼换鸟），但短期有失业；转入区—增加就业、带动产业与城镇化，但若把关不严会承接污染，须绿色择优承接。","reflection":"✅ 亮点：推拉双析动因；绿色承接强调。\n⚠️ 需改进：B班方向仍可能反，需强化梯度。\n📌 下节课衔接：一带一路与国际合作。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx2-u4-4","lessonId":"l-geo-sx2-u4-4","title":"\"一带一路\"与国际合作","book":"选择性必修2 区域发展","unitNumber":4,"unitTitle":"区际联系与区域协调发展","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["一带一路","国际合作","互联互通","人教版选必二Ch4","第四课时"],"textbookAnalysis":"一带一路通过陆海联通促进国际区域合作：设施联通、贸易畅通、资金融通、民心相通；我国内陆沿边由末梢变前沿，拓展发展空间，推动包容性全球化。","overview":"【学情分析】A班：能说一带一路的地理格局与意义；B班：常把\"一带一路\"当单纯援外（实为互利合作）。共同问题：内容支柱、空间影响、意义。","objectives":["人地协调观：树立人类命运共同体的开放合作观。","综合思维：综合设施贸易资金分析合作。","区域认知：在亚欧非尺度识一带一路走向。","地理实践力：能读图说明一带一路的地理格局。"],"keyPoints":"① 两线：丝绸之路经济带（陆）、21世纪海上丝路（海）。\n② 支柱：设施联通、贸易畅通、资金融通、民心相通。\n③ 空间：我国内陆沿边变开放前沿，联通亚欧非。\n④ 意义：互利共赢、包容性全球化。","difficulties":"① 两线走向。原因：陆海双线过不同区，需图。\n② 支柱内容。原因：四通易漏，需记。\n③ 意义。原因：互利共赢非单向，需澄清。","teachingMethods":"① 路线图。\n② 四通支柱。\n③ 前沿变位。\n④ 讨论。","preparation":"【PPT课件】P1 两线；P2 路线图；P3 四通；P4 空间影响；P5 意义；P6 练习。【地图/图表素材】一带一路路线图、中欧班列示意图。","process":[{"step":"Step 1 导入——从末梢到前沿","time":"5分钟","content":"【PPT P1 两线】教师：「一带一路让我国西部从开放末梢变前沿，陆海双线联通世界。」 预设回答：「学生说\"中欧班列\"。」 板书时机：黑板写\"一带一路\"。差异化提示：B班听；A班需问线。易错点提醒：是合作倡议，非单向援助。"},{"step":"Step 2 路线图","time":"9分钟","content":"【PPT P2 路线】教师：「陆上经济带经中亚欧洲，海上丝路经东南亚南亚非洲，节点为港口枢纽。」 预设回答：「学生指\"海上过哪\"。」 板书时机：黑板写路线。差异化提示：B班记；A班需图。易错点提醒：两线均经区域枢纽联通。"},{"step":"Step 3 四通支柱","time":"9分钟","content":"【PPT P3 四通】教师：「设施联通（路港）、贸易畅通（自贸）、资金融通（亚投行）、民心相通（文教），四位一体。」 预设回答：「学生记四通名。」 板书时机：黑板写四通。差异化提示：B班记；A班需析。易错点提醒：四通协同，缺一不可。"},{"step":"Step 4 空间影响","time":"8分钟","content":"【PPT P4 空间】教师：「内陆沿边借枢纽成开放前沿，沿海港强化枢纽，全国双向开放格局形成。」 预设回答：「学生说\"新疆变前沿\"。」 板书时机：黑板写空间。差异化提示：B班记；A班需联。易错点提醒：改变我国开放空间结构。"},{"step":"Step 5 意义","time":"7分钟","content":"【PPT P5 意义】教师：「拓展市场、产能合作、稳通道，推动互利共赢的包容性全球化、人类命运共同体。」 预设回答：「学生说\"对双方都好\"。」 板书时机：黑板写意义。差异化提示：B班记；A班需析。易错点提醒：互利共赢，非单方面受益。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：一带一路只包含陆上丝绸之路( );它强调互利共赢( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"读图\"。易错点提醒：选必二全册结束。"}],"blackboard":"┌── 一带一路 ──┐\n│ 陆经济带/海丝│\n│ 四通:设施贸 │\n│ 资金融民心通│\n│ 沿边变前沿  │\n│ 互利共赢    │\n└────────────┘","exercises":"【基础作业】1. \"一带一路\"包括丝绸之路经济带和21世纪__丝绸之路。2. 判断：一带一路合作仅惠及我国，对沿线国无益( )。\n【提高作业】说明\"一带一路\"对我国内陆沿边地区开放格局的影响。\n【参考答案——教师用】基础1：海上。基础2：×。提高：内陆沿边（如新疆、云南）由开放末梢变为联通中亚东南亚欧洲的前沿，口岸枢纽地位提升，形成陆海统筹、双向开放的新格局，拓展发展空间。","reflection":"✅ 亮点：两线+四通结构清晰；互利共赢澄清误解。\n⚠️ 需改进：B班仍当单向援外，需强调互利。\n📌 下节课衔接：进入选择性必修三 资源环境与国家安全。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx3-u1-1","lessonId":"l-geo-sx3-u1-1","title":"自然环境的服务功能","book":"选择性必修3 资源环境与国家安全","unitNumber":1,"unitTitle":"自然环境与人类社会","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["供给服务","调节服务","文化服务","支撑服务","人教版选必三Ch1","第一课时"],"textbookAnalysis":"自然环境为人类提供四类服务：供给服务（食物、水、矿产）、调节服务（气候、水文、净化）、文化服务（游憩、美学、精神）、支撑服务（土壤形成、生物多样性维持），支撑服务是其他服务的基础。","overview":"【学情分析】A班：能区分四类服务并举例；B班：常把供给与支撑混淆（如把土壤形成当供给）。共同问题：四类服务的界定与关系。","objectives":["人地协调观：认识自然环境服务是人类生存根基，须珍惜。","综合思维：综合四类服务系统理解自然环境价值。","区域认知：在不同区域识别主导的自然服务。","地理实践力：能就身边案例归类自然环境服务。"],"keyPoints":"① 供给：提供食物、淡水、矿产、木材等物质。\n② 调节：调节气候、涵养水源、净化空气水体。\n③ 文化：提供游憩、美学、科研、精神价值。\n④ 支撑：土壤形成、生物多样性维持，是前三者的基础。","difficulties":"① 分类界定。原因：四概念易混，需对比举例，易错配。\n② 支撑地位。原因：支撑服务间接却最根本，易被忽略，需强调。\n③ 实例归属。原因：同一事物可兼具多类，需析情境。","teachingMethods":"① 概念四维图。\n② 生活举例归类。\n③ 区域对比。\n④ 讨论。","preparation":"【PPT课件】P1 四类服务；P2 供给；P3 调节；P4 文化；P5 支撑；P6 练习。【地图/图表素材】自然环境服务功能示意图、森林多功能服务图。","process":[{"step":"Step 1 导入——大自然免费养活我们","time":"5分钟","content":"【PPT P1 概念】教师：「我们吃的米、喝的水、呼吸的空气，都是自然环境免费提供的服务。」 预设回答：「学生说\"没大自然活不了\"。」 板书时机：黑板写\"自然服务\"。差异化提示：B班听；A班需问类。易错点提醒：自然环境服务分为四类，缺一不可。"},{"step":"Step 2 供给服务","time":"9分钟","content":"【PPT P2 供给】教师：「供给服务指自然直接提供物质：粮食、淡水、木材、矿产、渔获，是人类衣食之源。」 预设回答：「学生说\"地里长粮食\"。」 板书时机：黑板写供给。差异化提示：B班记；A班需析。易错点提醒：供给是可直接获取的物质产品。"},{"step":"Step 3 调节服务","time":"9分钟","content":"【PPT P3 调节】教师：「调节服务是自然的「免费空调与净水器」：森林调气候、湿地净水、植被固土防沙。」 预设回答：「学生说\"树多天凉\"。」 板书时机：黑板写调节。差异化提示：B班记；A班需析。易错点提醒：调节是无形但关键的公益功能。"},{"step":"Step 4 文化服务","time":"8分钟","content":"【PPT P4 文化】教师：「文化服务指游憩、美学、科研、精神寄托，如九寨沟美景、名山大川的灵感。」 预设回答：「学生说\"旅游看风景\"。」 板书时机：黑板写文化。差异化提示：B班记；A班需联。易错点提醒：文化是非物质的愉悦与价值。"},{"step":"Step 5 支撑服务","time":"7分钟","content":"【PPT P5 支撑】教师：「支撑服务最底层：土壤形成、光合作用、生物多样性维持，没有它前三类都不存在。」 预设回答：「学生说\"土壤哪来的\"（风化+生物）。」 板书时机：黑板写支撑。差异化提示：B班记；A班需析。易错点提醒：支撑是根基，常间接却被依赖。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：森林净化空气属于供给服务( );支撑服务是其他服务的基础( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"归类\"。易错点提醒：下节课学自然资源及其属性。"}],"blackboard":"┌── 自然服务 ──┐\n│ 供给:食物水矿│\n│ 调节:气候净水│\n│ 文化:游憩美 │\n│ 支撑:土生多 │\n│ (根基)      │\n└────────────┘","exercises":"【基础作业】1. 自然环境为人类提供供给、调节、文化和__四类服务。2. 判断：森林净化空气属于供给服务( )。\n【提高作业】举例说明一项自然环境服务如何同时具有调节和文化双重价值。\n【参考答案——教师用】基础1：支撑。基础2：×。提高：如城市湿地公园，既通过水体植被调节局部气候、净化水质（调节服务），又为人们提供休闲观光与美学体验（文化服务），体现多功能叠加。","reflection":"✅ 亮点：四维图+免费空调比喻，分类直观；支撑根基强调到位。\n⚠️ 需改进：B班仍把土壤形成误归供给，需反复对比。\n📌 下节课衔接：自然资源及其属性。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx3-u1-2","lessonId":"l-geo-sx3-u1-2","title":"自然资源及其属性","book":"选择性必修3 资源环境与国家安全","unitNumber":1,"unitTitle":"自然环境与人类社会","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["自然资源","可再生","非可再生","有限性","人教版选必三Ch1","第二课时"],"textbookAnalysis":"自然资源是自然界中能被人类利用的物质和能量（如土地、水、矿产、森林、气候）；按再生性分可再生与非可再生；具有限性、整体性、地域性、多用性，开发须节约与永续。","overview":"【学情分析】A班：能辨析可再生与非可再生并说属性；B班：常把\"可再生\"当\"无限\"（如以为森林砍了总有）。共同问题：可再生内涵、四大属性。","objectives":["人地协调观：树立节约与永续利用资源的意识。","综合思维：综合属性分析资源开发利用。","区域认知：在区域中识别资源禀赋差异。","地理实践力：能判别某资源是否可再生并提保护。"],"keyPoints":"① 定义：自然界中可利用的物质与能量。\n② 分类：可再生（水光风林）与非可再生（煤石油金属矿）。\n③ 属性：有限性、整体性、地域性、多用性。\n④ 原则：节约、综合利用、永续。","difficulties":"① 可再生内涵。原因：可再生≠无限，需强调更新速度与阈值，易误。\n② 属性理解。原因：四属性抽象，需例，易混。\n③ 分类边界。原因：可再生受破坏可变不可再生，需点。","teachingMethods":"① 概念图。\n② 分类对比。\n③ 属性举例。\n④ 讨论。","preparation":"【PPT课件】P1 定义；P2 分类；P3 可再生；P4 非可再生；P5 属性；P6 练习。【地图/图表素材】自然资源分类图、世界矿产分布图。","process":[{"step":"Step 1 导入——什么是资源","time":"5分钟","content":"【PPT P1 定义】教师：「阳光、水、煤、森林，凡是自然里能为人所用的物质和能量，都叫自然资源。」 预设回答：「学生说\"空气算吗\"（是，但须可利用）。」 板书时机：黑板写\"自然资源\"。差异化提示：B班听；A班需问界。易错点提醒：资源须同时满足「自然」与「可利用」。"},{"step":"Step 2 可再生资源","time":"9分钟","content":"【PPT P3 再生】教师：「可再生资源靠自然更新补充：水、太阳能、风能、森林、鱼类，用度不超过更新速度即可持续。」 预设回答：「学生说\"种树能再长\"。」 板书时机：黑板写可再生。差异化提示：B班记；A班需析。易错点提醒：可再生≠无限，超采会枯竭。"},{"step":"Step 3 非可再生","time":"9分钟","content":"【PPT P4 非再】教师：「非可再生资源形成以亿年计：煤、石油、天然气、金属矿产，用一点少一点。」 预设回答：「学生说\"石油挖完没了\"。」 板书时机：黑板写非再。差异化提示：B班记；A班需析。易错点提醒：非可再生须节约与替代。"},{"step":"Step 4 四大属性","time":"8分钟","content":"【PPT P5 属性】教师：「有限性（总量有限）、整体性（一损俱损）、地域性（分布不均）、多用性（一物多用），决定开发要统筹。」 预设回答：「学生说\"煤又能发电又能化工\"（多用）。」 板书时机：黑板写属性。差异化提示：B班记；A班需联。易错点提醒：四属性共同约束利用方式。"},{"step":"Step 5 永续利用","time":"7分钟","content":"【PPT P5 原则】教师：「原则：节约优先、综合利用、开发替代、保护再生，走永续之路。」 预设回答：「学生说\"别浪费\"。」 板书时机：黑板写原则。差异化提示：B班记；A班需联。易错点提醒：违背属性必致资源危机。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：可再生能源是取之不尽用之不竭的( );矿产资源属于非可再生资源( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"判别\"。易错点提醒：下节课学环境问题及其成因。"}],"blackboard":"┌── 自然资源 ──┐\n│ 可再生:水光林│\n│ 非再:煤油气矿│\n│ 属性:有限整 │\n│ 地域多用   │\n│ 原则:节约续│\n└────────────┘","exercises":"【基础作业】1. 煤炭、石油属于__（可再生/非可再生）资源。2. 判断：只要叫可再生资源，就可以无限制开采利用( )。\n【提高作业】说明自然资源的「有限性」与「多用性」对开发利用的启示。\n【参考答案——教师用】基础1：非可再生。基础2：×。提高：有限性提醒总量约束须节约、找替代；多用性提醒同一资源多种用途，应综合规划（如河流兼顾供水、发电、航运），避免单一开发浪费。","reflection":"✅ 亮点：可再生≠无限澄清及时；四属性配例好记。\n⚠️ 需改进：B班仍把可再生当天赐无限，需强化更新阈值。\n📌 下节课衔接：环境问题及其成因。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx3-u1-3","lessonId":"l-geo-sx3-u1-3","title":"环境问题及其成因","book":"选择性必修3 资源环境与国家安全","unitNumber":1,"unitTitle":"自然环境与人类社会","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["环境问题","生态破坏","环境污染","资源短缺","人教版选必三Ch1","第三课时"],"textbookAnalysis":"环境问题分三类：生态破坏（水土流失、荒漠化、生物减少）、环境污染（大气水土壤污染）、资源短缺（水土地矿紧张）；根源是人口压力、资源不合理利用、片面追求增长的发展观。","overview":"【学情分析】A班：能剖析三类问题的成因链；B班：常把环境污染与生态破坏混为一谈。共同问题：三类区分、成因分析。","objectives":["人地协调观：认识环境问题的危害，树立正确发展观。","综合思维：综合人口经济观念分析成因。","区域认知：识别区域主导的环境问题类型。","地理实践力：能就本地问题归类型提对策。"],"keyPoints":"① 三类：生态破坏、环境污染、资源短缺。\n② 生态：水土流失、荒漠化、生物减少（自然结构损）。\n③ 污染：大气、水、土壤污染（有害物质超界）。\n④ 成因：人口压力+不合理利用+片面发展观。","difficulties":"① 类型区分。原因：生态与污染机理不同，易混，需对比。\n② 成因链。原因：多因叠加，需综合，易单面。\n③ 发展观。原因：根子在观念，需点透，易浅。","teachingMethods":"① 三类对比表。\n② 成因链图。\n③ 区域案例。\n④ 讨论。","preparation":"【PPT课件】P1 三类；P2 生态破坏；P3 环境污染；P4 资源短缺；P5 成因；P6 练习。【地图/图表素材】全球环境问题分布图、污染类型图。","process":[{"step":"Step 1 导入——环境在报警","time":"5分钟","content":"【PPT P1 三类】教师：「雾霾、沙化、缺水，都是环境问题的表现，主要分生态破坏、污染、资源短缺三类。」 预设回答：「学生说\"见过雾霾\"。」 板书时机：黑板写\"环境问题\"。差异化提示：B班听；A班需问类。易错点提醒：三类机理不同，治法不同。"},{"step":"Step 2 生态破坏","time":"9分钟","content":"【PPT P2 生态】教师：「生态破坏指自然结构受损：滥垦致水土流失、过牧致荒漠化、滥捕致物种减少。」 预设回答：「学生说\"草原退化\"。」 板书时机：黑板写生态。差异化提示：B班记；A班需析。易错点提醒：生态破坏是「结构坏」，非单纯脏。"},{"step":"Step 3 环境污染","time":"9分钟","content":"【PPT P3 污染】教师：「环境污染指有害物质超界：工厂废气、废水、废渣污染大气、水体、土壤，危害健康。」 预设回答：「学生说\"臭水沟\"。」 板书时机：黑板写污染。差异化提示：B班记；A班需析。易错点提醒：污染是「毒物超界」，与生态破坏不同。"},{"step":"Step 4 资源短缺","time":"8分钟","content":"【PPT P4 短缺】教师：「资源短缺指需求超供给：水、土地、矿产紧张，常由浪费与人口增长叠加。」 预设回答：「学生说\"淡水不够\"。」 板书时机：黑板写短缺。差异化提示：B班记；A班需联。易错点提醒：短缺是「量不够」，与前两类并列。"},{"step":"Step 5 成因","time":"7分钟","content":"【PPT P5 成因】教师：「根子在：人口膨胀增大压力、资源利用粗放浪费、片面追求GDP的发展观，需转变。」 预设回答：「学生说\"不能只求增长\"。」 板书时机：黑板写成因。差异化提示：B班记；A班需链。易错点提醒：发展观偏差是深层根源。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：水土流失属于环境污染( );环境问题的深层原因是片面发展观( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"分析\"。易错点提醒：本章结束，进入资源安全与国家安全。"}],"blackboard":"┌── 环境问题 ──┐\n│ 生态:水土流失 │\n│ 荒漠化物种少│\n│ 污染:气水土壤│\n│ 短缺:水地矿 │\n│ 因:人压+滥+观│\n└──────────────┘","exercises":"【基础作业】1. 环境问题主要包括生态破坏、环境污染和__短缺三大类。2. 判断：水土流失属于环境污染问题( )。\n【提高作业】从发展观的角度，分析环境问题的深层成因。\n【参考答案——教师用】基础1：资源。基础2：×。提高：深层成因是片面追求经济增长、忽视生态价值的发展观，叠加人口压力与资源利用粗放，导致开发与承载力失衡，须转向人与自然和谐的发展观。","reflection":"✅ 亮点：三类机理对比防混；成因链落到发展观。\n⚠️ 需改进：B班生态破坏与污染仍混，需反复区别。\n📌 下节课衔接：第二章 资源安全与国家安全。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx3-u2-1","lessonId":"l-geo-sx3-u2-1","title":"资源安全对国家安全的影响","book":"选择性必修3 资源环境与国家安全","unitNumber":2,"unitTitle":"资源安全与国家安全","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["资源安全","战略资源","供给风险","国家安全","人教版选必三Ch2","第一课时"],"textbookAnalysis":"资源安全指资源数量与质量能稳定满足国家生存发展需求；战略资源（石油、稀土等）一旦断供将威胁经济与国防；风险来自禀赋不足、供给渠道单一、消费失控，需多元化与储备。","overview":"【学情分析】A班：能说资源安全→国家安全的传导；B班：常把资源安全当\"够不够吃\"（忽视战略与国防）。共同问题：安全内涵、战略资源、风险传导。","objectives":["人地协调观：认识资源安全是国家安定之本。","综合思维：综合供给消费储备分析安全。","区域认知：在国土尺度看资源对外依赖。","地理实践力：能就某资源评安全风险。"],"keyPoints":"① 内涵：数量质量稳定满足需求。\n② 战略资源：石油、稀土等，断供危及经济国防。\n③ 风险源：禀赋弱、渠道单、消费涨。\n④ 对策：来源多元、战略储备、节约替代。","difficulties":"① 安全内涵。原因：不仅是量足，还含稳定与质量，需全，易窄。\n② 战略意义。原因：资源连国防，需拔高，易浅。\n③ 风险传导。原因：断供→产业→安全链，需析。","teachingMethods":"① 概念图。\n② 战略资源例。\n③ 风险链。\n④ 案例。","preparation":"【PPT课件】P1 内涵；P2 战略资源；P3 风险源；P4 传导；P5 对策；P6 练习。【地图/图表素材】战略资源对外依存度图、全球资源贸易流向图。","process":[{"step":"Step 1 导入——断油会怎样","time":"5分钟","content":"【PPT P1 内涵】教师：「若石油断供，工厂停摆、军队难动，这就是资源安全关乎国家安全。」 预设回答：「学生说\"没油开不了车\"。」 板书时机：黑板写\"资源安全\"。差异化提示：B班听；A班需问义。易错点提醒：资源安全是稳定满足需求，非单纯库存。"},{"step":"Step 2 战略资源","time":"9分钟","content":"【PPT P2 战略】教师：「战略资源（石油、稀土、粮食）具命脉性，一旦受制于人，经济与国防均受威胁。」 预设回答：「学生说\"稀土很重要\"。」 板书时机：黑板写战略。差异化提示：B班记；A班需析。易错点提醒：战略资源安全是国家安全核心。"},{"step":"Step 3 风险来源","time":"9分钟","content":"【PPT P3 风险】教师：「风险来自：本国禀赋不足、进口渠道单一、消费增长失控、地缘动荡，任一环节裂即危。」 预设回答：「学生说\"太依赖进口危险\"。」 板书时机：黑板写风险。差异化提示：B班记；A班需析。易错点提醒：多渠道单一化是最大隐患。"},{"step":"Step 4 传导链","time":"8分钟","content":"【PPT P4 传导】教师：「资源断供→产业停工→经济下滑→社会不稳→国防削弱，环环传导至国家安全。」 预设回答：「学生说\"连锁反应\"。」 板书时机：黑板写传导。差异化提示：B班记；A班需链。易错点提醒：资源风险会放大为安全危机。"},{"step":"Step 5 对策","time":"7分钟","content":"【PPT P5 对策】教师：「对策：进口来源多元化、建战略储备、节能降耗、开发替代，筑牢安全网。」 预设回答：「学生说\"多找卖家\"。」 板书时机：黑板写对策。差异化提示：B班记；A班需联。易错点提醒：多元+储备+节约三管齐下。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：资源安全只要求资源总量足够即可( );战略资源断供会危及国家安全( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"评价\"。易错点提醒：下节课学中国的能源安全。"}],"blackboard":"┌── 资源安全 ──┐\n│ 内涵:稳满足 │\n│ 战略:油稀土 │\n│ 风险:弱单涨 │\n│ 传导:断→危 │\n│ 对策:多元储│\n└────────────┘","exercises":"【基础作业】1. 石油、稀土等关系国计民生的__资源，其安全直接影响国家安全。2. 判断：只要资源总量足够，就不存在资源安全问题( )。\n【提高作业】说明资源供给中断可能如何层层传导威胁国家安全。\n【参考答案——教师用】基础1：战略。基础2：×。提高：进口中断→相关产业停工→经济增速下滑→就业与社会不稳→战略物资短缺削弱国防能力，最终从经济风险演变为国家安全危机，故须来源多元与战略储备。","reflection":"✅ 亮点：断油导入直击要害；传导链讲清安全关联。\n⚠️ 需改进：B班仍把安全当\"够吃\"，需强化战略与国防。\n📌 下节课衔接：中国的能源安全。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx3-u2-2","lessonId":"l-geo-sx3-u2-2","title":"中国的能源安全","book":"选择性必修3 资源环境与国家安全","unitNumber":2,"unitTitle":"资源安全与国家安全","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["能源安全","煤炭","石油对外依存","新能源","人教版选必三Ch2","第二课时"],"textbookAnalysis":"我国能源\"富煤、缺油、少气\"，煤炭为主但污染重；石油对外依存度高、进口通道集中（马六甲）；保障路径：多元进口、增强储备、发展新能源与核电、节能提效。","overview":"【学情分析】A班：能分析能源结构矛盾与对策；B班：常忽视石油高对外依存的风险。共同问题：结构特征、风险点、保障路径。","objectives":["人地协调观：认识能源转型对安全与生态的双重意义。","综合思维：综合结构风险对策分析能源。","区域认知：在国土与全球看能源流。","地理实践力：能为能源安全提可行建议。"],"keyPoints":"① 国情：富煤、缺油、少气，煤为主。\n② 风险：石油对外依存高、进口通道集中（马六甲）。\n③ 煤炭困：占比高但污染大、碳排多。\n④ 路径：多元进口、储备、新能源、节能。","difficulties":"① 结构矛盾。原因：煤多油少与清洁诉求冲突，需析，易简。\n② 依存风险。原因：石油通道集中受制，需点，易忽。\n③ 转型路径。原因：多措并举，需系统，易漏。","teachingMethods":"① 结构饼图。\n② 进口通道图。\n③ 风险分析。\n④ 案例（新能源）。","preparation":"【PPT课件】P1 国情；P2 结构；P3 石油风险；P4 煤炭困；P5 路径；P6 练习。【地图/图表素材】我国能源消费结构图、石油进口通道示意图。","process":[{"step":"Step 1 导入——我国的能源家底","time":"5分钟","content":"【PPT P1 国情】教师：「我国能源家底：富煤、缺油、少气，煤炭挑大梁，但油和气很依赖进口。」 预设回答：「学生说\"煤多油少\"。」 板书时机：黑板写\"能源安全\"。差异化提示：B班听；A班需问构。易错点提醒：结构是安全分析起点。"},{"step":"Step 2 消费结构","time":"9分钟","content":"【PPT P2 结构】教师：「煤炭占一次能源六成以上，清洁低碳转型压力大；油氣靠进口补缺口。」 预设回答：「学生说\"煤烧得多\"。」 板书时机：黑板写结构。差异化提示：B班记；A班需析。易错点提醒：煤为主既是优势也是减排负担。"},{"step":"Step 3 石油风险","time":"9分钟","content":"【PPT P3 风险】教师：「石油对外依存度超70%，进口多经马六甲海峡，通道集中、地缘风险高。」 预设回答：「学生说\"海峡被卡就麻烦\"。」 板书时机：黑板写风险。差异化提示：B班记；A班需析。易错点提醒：通道单一化是能源安全软肋。"},{"step":"Step 4 煤炭困境","time":"8分钟","content":"【PPT P4 困】教师：「煤炭虽自主，但污染重、碳排高，与蓝天保卫战和双碳目标矛盾，须逐步降占比。」 预设回答：「学生说\"烧煤脏\"。」 板书时机：黑板写困。差异化提示：B班记；A班需联。易错点提醒：自主≠无代价，须清洁化。"},{"step":"Step 5 保障路径","time":"7分钟","content":"【PPT P5 路径】教师：「路径：进口多元化、建石油储备、大力发展风光核新能、全社会节能提效。」 预设回答：「学生说\"多装光伏\"。」 板书时机：黑板写路径。差异化提示：B班记；A班需联。易错点提醒：开源（新能）+节流（节能）并重。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：我国能源资源的特点是富煤缺油少气( );石油进口通道高度集中存在安全风险( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"建议\"。易错点提醒：下节课学耕地资源与粮食安全。"}],"blackboard":"┌── 能源安全 ──┐\n│ 富煤缺油少气│\n│ 油依存>70% │\n│ 通道:马六甲│\n│ 困:煤污碳高│\n│ 路径:多元新│\n│ 节能      │\n└────────────┘","exercises":"【基础作业】1. 我国能源资源的基本特征是\"富煤、缺油、__气\"。2. 判断：我国石油对外依存度高、进口通道集中，存在能源安全风险( )。\n【提高作业】从\"开源\"与\"节流\"两方面说明保障我国能源安全的措施。\n【参考答案——教师用】基础1：少。基础2：√。提高：开源—进口来源多元化、建战略储备、发展风光电核等新能源替代化石；节流—提高能效、产业结构优化、全民节能，降低单位GDP能耗。","reflection":"✅ 亮点：富煤缺油少气口诀好记；马六甲风险点透。\n⚠️ 需改进：B班忽视石油依存风险，需强化数据。\n📌 下节课衔接：中国的耕地资源与粮食安全。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx3-u2-3","lessonId":"l-geo-sx3-u2-3","title":"中国的耕地资源与粮食安全","book":"选择性必修3 资源环境与国家安全","unitNumber":2,"unitTitle":"资源安全与国家安全","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["耕地资源","18亿亩红线","粮食安全","基本农田","人教版选必三Ch2","第三课时"],"textbookAnalysis":"我国耕地人均少、质量参差、南少北多且占补平衡压力大；\"18亿亩红线\"是底线；粮食安全靠\"谷物基本自给、口粮绝对安全\"，措施：保耕地、建高标准农田、提单产、节粮减损。","overview":"【学情分析】A班：能分析耕地压力与粮食安全保障体系；B班：常把\"粮食够吃\"当无虞（忽视耕地流失）。共同问题：耕地国情、红线意义、保障措施。","objectives":["人地协调观：认识耕地是粮食安全的命根子。","综合思维：综合数量质量布局分析耕地。","区域认知：在国土看耕地南缺北多。","地理实践力：能为护耕地提具体行动。"],"keyPoints":"① 国情：人均耕地少、质量不均、南少北多。\n② 红线：18亿亩耕地红线、永久基本农田。\n③ 方针：谷物基本自给、口粮绝对安全。\n④ 措施：保数量、提质量、建高标准农田、减损。","difficulties":"① 国情认知。原因：总量大但人均少，易误判，需点人均。\n② 红线意义。原因：红线是安全底线，需拔高，易浅。\n③ 保障体系。原因：多措并举，需系统，易漏。","teachingMethods":"① 人均耕地对比。\n② 红线示意。\n③ 措施网图。\n④ 案例（高标准农田）。","preparation":"【PPT课件】P1 国情；P2 布局；P3 红线；P4 方针；P5 措施；P6 练习。【地图/图表素材】我国耕地分布图、18亿亩红线示意图。","process":[{"step":"Step 1 导入——饭碗要端自己手","time":"5分钟","content":"【PPT P1 国情】教师：「我国耕地总量世界前列，但人均耕地不到世界一半，饭碗必须端自己手里。」 预设回答：「学生说\"人多地少\"。」 板书时机：黑板写\"耕地粮食\"。差异化提示：B班听；A班需问均。易错点提醒：看耕地要看人均，非只看总量。"},{"step":"Step 2 空间布局","time":"9分钟","content":"【PPT P2 布局】教师：「耕地南少北多、东部集中，优质好地渐被建设与污染挤占，占补平衡压力大。」 预设回答：「学生说\"城郊田变房\"。」 板书时机：黑板写布局。差异化提示：B班记；A班需析。易错点提醒：好地流失比总量减少更危险。"},{"step":"Step 3 红线","time":"9分钟","content":"【PPT P3 红线】教师：「18亿亩耕地红线、永久基本农田是决不能突破的安全底线，违法占用必追责。」 预设回答：「学生说\"红线不能碰\"。」 板书时机：黑板写红线。差异化提示：B班记；A班需析。易错点提醒：红线是粮食安全命根，不可交易。"},{"step":"Step 4 安全方针","time":"8分钟","content":"【PPT P4 方针】教师：「方针：谷物基本自给、口粮绝对安全，以我为主、立足国内，适度进口调剂。」 预设回答：「学生说\"主粮自己种\"。」 板书时机：黑板写方针。差异化提示：B班记；A班需联。易错点提醒：立足国内是根本，进口仅调剂。"},{"step":"Step 5 保障措施","time":"7分钟","content":"【PPT P5 措施】教师：「措施：严保耕地数量、建高标准农田提单产、藏粮于技、节粮减损、休耕轮作养地。」 预设回答：「学生说\"别浪费饭\"（减损）。」 板书时机：黑板写措施。差异化提示：B班记；A班需联。易错点提醒：保数量与提质量并重。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：我国耕地红线是18亿亩( );粮食安全问题可以完全靠进口解决( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"行动\"。易错点提醒：下节课学水资源与国家安全。"}],"blackboard":"┌── 耕地粮食 ──┐\n│ 人少质不均 │\n│ 南少北多   │\n│ 红线:18亿亩│\n│ 方针:自给安│\n│ 措施:保提减│\n└────────────┘","exercises":"【基础作业】1. 我国坚守的耕地保护红线是__亿亩。2. 判断：保障粮食安全可以完全依赖粮食进口( )。\n【提高作业】说明\"18亿亩耕地红线\"对粮食安全的意义。\n【参考答案——教师用】基础1：18。基础2：×。提高：18亿亩红线确保谷物基本自给、口粮绝对安全的耕地底线，防止建设占用导致耕地不可逆减少，是端稳\"中国饭碗\"的空间保障，突破则粮食对外依赖失控。","reflection":"✅ 亮点：人均视角纠偏；红线安全底线拔高。\n⚠️ 需改进：B班只记总量忽视人均，需强化对比。\n📌 下节课衔接：水资源与国家安全。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx3-u2-4","lessonId":"l-geo-sx3-u2-4","title":"水资源与国家安全","book":"选择性必修3 资源环境与国家安全","unitNumber":2,"unitTitle":"资源安全与国家安全","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["水资源安全","南水北调","节水","水污染","人教版选必三Ch2","第四课时"],"textbookAnalysis":"我国水资源总量丰但人均少、时空不均（南多北少、夏秋多）；缺水由自然与污染叠加；保障：南水北调等跨流域调配、节水型社会、水污染防治、海绵城市。","overview":"【学情分析】A班：能分析缺水双重成因与调配工程；B班：常把缺水归结为\"老天少雨\"（忽视污染型缺水）。共同问题：时空分布、缺水类型、保障路径。","objectives":["人地协调观：认识节水护水是每个人的安全责任。","综合思维：综合自然与污染分析水安全。","区域认知：在国土看南丰北缺格局。","地理实践力：能提本地节水护水行动。"],"keyPoints":"① 特征：总量丰、人均少、南多北少、夏秋集中。\n② 缺水型：资源型（天然少）与水质型（污染致不能用）。\n③ 工程：南水北调、引黄济青等跨流域调配。\n④ 路径：节水社会、治污、海绵城市、水权管理。","difficulties":"① 时空不均。原因：南丰北缺+季节集中，需图，易泛。\n② 缺水类型。原因：资源型与水质型易混，需分，易漏污染型。\n③ 工程方向。原因：具体线路，需记，易淆。","teachingMethods":"① 分布图。\n② 缺水类型对比。\n③ 调配工程图。\n④ 行动讨论。","preparation":"【PPT课件】P1 特征；P2 不均；P3 缺水类型；P4 南水北调；P5 路径；P6 练习。【地图/图表素材】我国水资源分布图、南水北调线路图。","process":[{"step":"Step 1 导入——北方面临水荒","time":"5分钟","content":"【PPT P1 特征】教师：「我国水总量世界第六，但人均仅世界1/4，且南多北少，北方频频喊渴。」 预设回答：「学生说\"北方缺水\"。」 板书时机：黑板写\"水安全\"。差异化提示：B班听；A班需问均。易错点提醒：总量丰不代表安全，看人均与分布。"},{"step":"Step 2 时空分布","time":"9分钟","content":"【PPT P2 不均】教师：「空间南多北少、东多西少；时间夏秋多冬春少、年际变率大，旱涝都因它。」 预设回答：「学生说\"雨季集中\"。」 板书时机：黑板写不均。差异化提示：B班记；A班需图。易错点提醒：不均是工程调配的根本原因。"},{"step":"Step 3 缺水类型","time":"9分钟","content":"【PPT P3 类型】教师：「缺水分两类：资源型（本就少，如华北）、水质型（被污染不能用，如某些河段），后者常被忽视。」 预设回答：「学生说\"污水不能喝\"。」 板书时机：黑板写类型。差异化提示：B班记；A班需析。易错点提醒：水质型缺水靠治污而非调水。"},{"step":"Step 4 跨流域调","time":"8分钟","content":"【PPT P4 调】教师：「南水北调三线引长江水补华北，配合引黄济青等，缓解资源型缺水。」 预设回答：「学生说\"南水进京\"。」 板书时机：黑板写调。差异化提示：B班记；A班需线。易错点提醒：调水治标，须与节水治污配合。"},{"step":"Step 5 保障路径","time":"7分钟","content":"【PPT P5 路径】教师：「根本路径：建节水型社会、严治水污染、海绵城市蓄滞、水权与价格杠杆。」 预设回答：「学生说\"一水多用\"。」 板书时机：黑板写路径。差异化提示：B班记；A班需联。易错点提醒：节流优先于开源。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：我国水资源空间分布是南多北少( );因污染导致无水可用的缺水属水质型缺水( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"行动\"。易错点提醒：本章结束，进入环境与国家安全。"}],"blackboard":"┌── 水安全 ──┐\n│ 人均少南丰北│\n│ 缺:资源/水质│\n│ 调:南水北调│\n│ 路径:节水治│\n│ 污海绵    │\n└────────────┘","exercises":"【基础作业】1. 我国水资源空间分布的总体格局是南多__少。2. 判断：因河流污染而缺水的类型属于资源型缺水( )。\n【提高作业】说明缓解华北资源型缺水的主要工程与根本措施。\n【参考答案——教师用】基础1：北。基础2：×。提高：工程—南水北调等跨流域调水，缓解空间不均；根本—建设节水型社会、治理水污染、提高重复利用率，节流优先于开源。","reflection":"✅ 亮点：水质型缺水纠偏；节流优先强调。\n⚠️ 需改进：B班仍只怪老天，需强化污染型缺水。\n📌 下节课衔接：第三章 环境与国家安全。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx3-u3-1","lessonId":"l-geo-sx3-u3-1","title":"环境安全对国家安全的影响","book":"选择性必修3 资源环境与国家安全","unitNumber":3,"unitTitle":"环境与国家安全","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["环境安全","临界值","环境风险","环境危机","人教版选必三Ch3","第一课时"],"textbookAnalysis":"环境安全指人类赖以生存的环境处于不受或少受破坏的状态；环境承载力有临界值，超过则触发环境风险，累积成环境危机，进而引发经济、社会乃至政治层面的国家安全问题。","overview":"【学情分析】A班：能说临界值→风险→危机→安全的传导；B班：常把环境安全当\"干净与否\"（忽视临界值与突发危机）。共同问题：临界值、风险与危机区别、安全传导。","objectives":["人地协调观：认识环境安全是国家安全的基础屏障。","综合思维：综合承载力与阈值分析安全。","区域认知：在区域识别环境风险等级。","地理实践力：能就某环境风险提防控。"],"keyPoints":"① 内涵：环境少受破坏、能支撑生存发展。\n② 临界值：环境自净/承载有上限，超则失衡。\n③ 风险→危机：偶发超界为风险，普遍超界成危机。\n④ 传导：环境危机→经济社政安全受冲击。","difficulties":"① 临界值。原因：抽象阈值概念，需喻，易虚。\n② 风险vs危机。原因：二者程度不同，易混，需分。\n③ 安全传导。原因：环境→国家安全的跨层链，需析。","teachingMethods":"① 临界值比喻（水杯）。\n② 风险危机对比。\n③ 传导链。\n④ 案例。","preparation":"【PPT课件】P1 内涵；P2 临界值；P3 风险；P4 危机；P5 传导；P6 练习。【地图/图表素材】环境承载力临界值示意图、环境风险传导图。","process":[{"step":"Step 1 导入——水杯满了会溢","time":"5分钟","content":"【PPT P1 内涵】教师：「环境像水杯有容量，污染超过它就溢——环境安全就是杯不溢、人宜居。」 预设回答：「学生说\"杯子满就脏\"。」 板书时机：黑板写\"环境安全\"。差异化提示：B班听；A班需问值。易错点提醒：环境安全有临界，非越脏越危险而是超界才危。"},{"step":"Step 2 临界值","time":"9分钟","content":"【PPT P2 临界】教师：「环境自净与承载有上限（临界值），在界内可恢复，超界则失衡且难逆转。」 预设回答：「学生说\"超过就救不回\"。」 板书时机：黑板写临界。差异化提示：B班记；A班需析。易错点提醒：临界值是能否恢复的分水岭。"},{"step":"Step 3 环境风险","time":"9分钟","content":"【PPT P3 风险】教师：「偶发、局部超界形成环境风险（如一次漏油），可控但须预警防范。」 预设回答：「学生说\"小事故\"。」 板书时机：黑板写风险。差异化提示：B班记；A班需析。易错点提醒：风险是潜在、偶发的危险。"},{"step":"Step 4 环境危机","time":"8分钟","content":"【PPT P4 危机】教师：「若普遍、长期超界则成环境危机（如大范围雾霾、水体黑臭），威胁生存发展。」 预设回答：「学生说\"常年脏\"。」 板书时机：黑板写危机。差异化提示：B班记；A班需析。易错点提醒：危机是风险失控、大面积的结果。"},{"step":"Step 5 安全传导","time":"7分钟","content":"【PPT P5 传导】教师：「环境危机→健康受损、农业减产、移民冲突→经济社政安全受冲击，上升为国家安全。」 预设回答：「学生说\"环境乱社会乱\"。」 板书时机：黑板写传导。差异化提示：B班记；A班需链。易错点提醒：环境安全是国家安全底层屏障。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：环境超过临界值后仍可完全恢复( );环境危机比环境风险危害范围更大( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"分析\"。易错点提醒：下节课学环境污染与国家安全。"}],"blackboard":"┌── 环境安全 ──┐\n│ 内涵:杯不溢 │\n│ 临界:超界难 │\n│ 风险:偶发   │\n│ 危机:普遍   │\n│ 传:环→国安 │\n└────────────┘","exercises":"【基础作业】1. 环境系统能承受污染的__（临界）值，超过则失衡难恢复。2. 判断：环境风险和环境危机的危害程度相同( )。\n【提高作业】说明环境危机可能如何传导影响国家安全。\n【参考答案——教师用】基础1：临界。基础2：×。提高：环境危机导致健康损害、农产下降、生态难民与资源冲突，进而冲击经济稳定、社会安定乃至政治安全，成为国家安全问题。","reflection":"✅ 亮点：水杯比喻讲清临界值；风险危机程度区分明。\n⚠️ 需改进：B班临界值仍抽象，需更多喻例。\n📌 下节课衔接：环境污染与国家安全。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx3-u3-2","lessonId":"l-geo-sx3-u3-2","title":"环境污染与国家安全","book":"选择性必修3 资源环境与国家安全","unitNumber":3,"unitTitle":"环境与国家安全","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["突发环境事件","累积污染","跨境转移","洋垃圾","人教版选必三Ch3","第二课时"],"textbookAnalysis":"环境污染威胁国家安全有三种：突发环境事件（泄漏、爆炸）、累积性污染（长期低剂量致广域损害）、跨境转移（将污染物/洋垃圾转嫁他国）；应对须预警、追责、履约禁转。","overview":"【学情分析】A班：能区分三类污染威胁并评对策；B班：常只知\"排污水\"（忽视突发与跨境转移）。共同问题：三类区分、跨境转移危害、应对。","objectives":["人地协调观：反对污染转移，树立全球环境正义。","综合思维：综合突发累积跨境分析污染。","区域认知：识别跨境污染的空间路径。","地理实践力：能就污染事件提防控建议。"],"keyPoints":"① 突发：泄漏爆炸，骤发、局部、烈度高（如油罐漏）。\n② 累积：长期低剂量，广域慢损（如重金属土壤）。\n③ 跨境：污染物/洋垃圾转嫁他国，转嫁风险。\n④ 应对：预警应急、溯源追责、履约禁转。","difficulties":"① 三类区分。原因：突发/累积/跨境机理异，易混，需对比。\n② 跨境危害。原因：转嫁他国损人利己，需拔高，易浅。\n③ 应对。原因：三类对策不同，需分，易漏。","teachingMethods":"① 三类对比。\n② 案例（漏油/镉米/洋垃圾）。\n③ 跨境路径图。\n④ 讨论。","preparation":"【PPT课件】P1 三类；P2 突发；P3 累积；P4 跨境；P5 应对；P6 练习。【地图/图表素材】跨境污染转移路径图、突发环境事件示意图。","process":[{"step":"Step 1 导入——污染也会\"闯国门\"","time":"5分钟","content":"【PPT P1 三类】教师：「污染威胁国家安全有三种：突发、累积、跨境转移，最后一类似\"闯国门\"最隐蔽。」 预设回答：「学生说\"洋垃圾\"。」 板书时机：黑板写\"污染安全\"。差异化提示：B班听；A班需问类。易错点提醒：三类都危及安全，但形式不同。"},{"step":"Step 2 突发污染","time":"9分钟","content":"【PPT P2 突发】教师：「突发环境事件：化工厂爆炸、油轮泄漏，骤发、局部、烈度高，须应急阻断。」 预设回答：「学生说\"漏油死鱼\"。」 板书时机：黑板写突发。差异化提示：B班记；A班需析。易错点提醒：突发靠应急预案与快速响应。"},{"step":"Step 3 累积污染","time":"9分钟","content":"【PPT P3 累积】教师：「累积性污染：长期低剂量排放，重金属在土壤水体富集，广域慢损、难察觉难治。」 预设回答：「学生说\"镉大米\"。」 板书时机：黑板写累积。差异化提示：B班记；A班需析。易错点提醒：累积危害广而隐蔽，防胜于治。"},{"step":"Step 4 跨境转移","time":"8分钟","content":"【PPT P4 跨境】教师：「跨境转移：发达国家把危险废物、洋垃圾转嫁发展中国家，转嫁环境风险、损人利己。」 预设回答：「学生说\"垃圾运到别国\"。」 板书时机：黑板写跨境。差异化提示：B班记；A班需析。易错点提醒：污染转移是环境不公，须禁止。"},{"step":"Step 5 应对","time":"7分钟","content":"【PPT P5 应对】教师：「应对：建预警应急体系、溯源追责赔偿、履约（巴塞尔公约）禁止洋垃圾入境、源头减排。」 预设回答：「学生说\"签公约\"。」 板书时机：黑板写应对。差异化提示：B班记；A班需联。易错点提醒：国内防控+国际履约双线。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：将危险废物转移到他国属于跨境污染转移( );累积性污染通常危害范围小易治理( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"建议\"。易错点提醒：下节课学生态保护与国家安全。"}],"blackboard":"┌── 污染安全 ──┐\n│ 突发:漏爆炸 │\n│ 累积:重金土 │\n│ 跨境:洋垃圾│\n│ 应对:应急约│\n│ 禁转      │\n└────────────┘","exercises":"【基础作业】1. 将本国危险废物转移到其他国家，属于__污染转移。2. 判断：累积性污染由于浓度低，因此危害范围小、容易治理( )。\n【提高作业】说明跨境污染转移对转入国的危害及国际应对方式。\n【参考答案——教师用】基础1：跨境。基础2：×。提高：危害—转入国承担处置成本与环境健康风险，生态长期受损；应对—依据巴塞尔公约等禁止危险废物越境转移，加强口岸查验与国内源头减排，维护环境正义。","reflection":"✅ 亮点：三类对比防混；洋垃圾案例戳中痛点。\n⚠️ 需改进：B班忽视累积隐蔽性，需强化。\n📌 下节课衔接：生态保护与国家安全。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx3-u3-3","lessonId":"l-geo-sx3-u3-3","title":"生态保护与国家安全","book":"选择性必修3 资源环境与国家安全","unitNumber":3,"unitTitle":"环境与国家安全","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["自然保护区","重要生态功能区","生态修复","生物多样性","人教版选必三Ch3","第三课时"],"textbookAnalysis":"生态保护保障国家安全：建立自然保护区与重要生态功能区（如水源涵养、防风固沙）维护生态屏障；实施生态修复（退耕还林还草、湿地恢复、矿山复绿）恢复功能；生物多样性是生态安全基石。","overview":"【学情分析】A班：能说生态屏障功能与修复工程；B班：常把\"保护\"当\"圈地不动\"（忽视修复与功能）。共同问题：生态功能区类型、修复措施、生物多样性意义。","objectives":["人地协调观：认识生态屏障是国家安全生态防线。","综合思维：综合保护修复生物多样性分析。","区域认知：在区域定位生态功能区。","地理实践力：能为本地生态保护提行动。"],"keyPoints":"① 载体：自然保护区、重要生态功能区（涵养/固沙/生物）。\n② 功能：水源涵养、防风固沙、水土保持、生物多样性庇护。\n③ 修复：退耕还林还草、湿地恢复、矿山复绿。\n④ 基石：生物多样性维持生态稳定。","difficulties":"① 功能区类型。原因：各类功能不同，需例，易混。\n② 修复措施。原因：多项工程，需对应，易漏。\n③ 生物意义。原因：多样性是稳定根基，需拔高，易浅。","teachingMethods":"① 功能区地图。\n② 修复工程对照。\n③ 案例（三江源/塞罕坝）。\n④. 讨论。","preparation":"【PPT课件】P1 载体；P2 功能区；P3 功能；P4 修复；P5 生物；P6 练习。【地图/图表素材】我国自然保护区与生态功能区分布图、退耕还林示意图。","process":[{"step":"Step 1 导入——生态也是国防","time":"5分钟","content":"【PPT P1 载体】教师：「森林湿地保护区像生态长城，护住水土生物，是国家安全的一道防线。」 预设回答：「学生说\"保护区重要\"。」 板书时机：黑板写\"生态保护\"。差异化提示：B班听；A班需问载。易错点提醒：生态保护具国家安全属性。"},{"step":"Step 2 生态功能区","time":"9分钟","content":"【PPT P2 功能】教师：「重要生态功能区：水源涵养（三江源）、防风固沙（京津风沙源）、水土保持、生物多样性维护。」 预设回答：「学生说\"三江源养水\"。」 板书时机：黑板写功能。差异化提示：B班记；A班需例。易错点提醒：每类区功能不同，须分类保护。"},{"step":"Step 3 生态功能","time":"9分钟","content":"【PPT P3 功能】教师：「这些区提供涵养、固沙、保土、庇护物种等公益，失守则下游沙化、水枯、灾频。」 预设回答：「学生说\"上游坏下游遭\"。」 板书时机：黑板写公益。差异化提示：B班记；A班需析。易错点提醒：生态功能惠及大区域，具外部性。"},{"step":"Step 4 生态修复","time":"8分钟","content":"【PPT P4 修复】教师：「对已退化地修复：退耕还林还草、湿地恢复、矿山复绿、封育保护，恢复功能。」 预设回答：「学生说\"塞罕坝造林\"。」 板书时机：黑板写修复。差异化提示：B班记；A班需联。易错点提醒：修复是补救，保护优先于修复。"},{"step":"Step 5 生物多样性","time":"7分钟","content":"【PPT P5 生物】教师：「生物多样性是生态稳定基石，物种消失会塌链，须建保护区网络守护基因库。」 预设回答：「学生说\"少一种就乱\"。」 板书时机：黑板写生物。差异化提示：B班记；A班需析。易错点提醒：多样性丧失不可逆，是深层安全。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：退耕还林还草属于生态保护修复措施( );生物多样性丧失后可轻易恢复( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"行动\"。易错点提醒：下节课学全球气候变化与国家安全。"}],"blackboard":"┌── 生态保护 ──┐\n│ 区:自然/功能│\n│ 功:涵养固沙 │\n│ 保土生物   │\n│ 修复:退耕湿│\n│ 矿复绿    │\n│ 基石:多样性│\n└──────────────┘","exercises":"【基础作业】1. 三江源地区主要承担__（水源涵养/防风固沙）的生态功能。2. 判断：生物多样性一旦丧失，可以很快自然恢复( )。\n【提高作业】说明建立重要生态功能区对维护国家安全的意义。\n【参考答案——教师用】基础1：水源涵养。基础2：×。提高：生态功能区提供涵养水源、固沙保土、庇护物种等公益，失守会引发下游沙化、水枯、灾害频发，威胁生存与发展，是国家安全生态屏障，具跨区域外部性。","reflection":"✅ 亮点：生态长城比喻；三江源/塞罕坝案例实。\n⚠️ 需改进：B班把保护当圈地，需强功能价值。\n📌 下节课衔接：全球气候变化与国家安全。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx3-u3-4","lessonId":"l-geo-sx3-u3-4","title":"全球气候变化与国家安全","book":"选择性必修3 资源环境与国家安全","unitNumber":3,"unitTitle":"环境与国家安全","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["全球变暖","海平面上升","小岛屿国家","碳减排","人教版选必三Ch3","第四课时"],"textbookAnalysis":"温室气体增多致全球变暖：冰川消融、海平面上升淹没沿海与小岛国、极端天气频发、农业带北移与粮食安全风险；小岛屿国家面临生存危机；应对需减排（碳达峰碳中和）与适应。","overview":"【学情分析】A班：能分析变暖的链式影响与国家安全风险；B班：常只知\"天热了\"（忽视海平面与粮食链）。共同问题：影响链、小岛国危机、减排与适应。","objectives":["人地协调观：认识气候变化是人类共同安全挑战。","综合思维：综合海面粮食灾害分析影响。","区域认知：识别最脆弱区域（小岛/沿海）。","地理实践力：能为减碳提日常行动。"],"keyPoints":"① 机理：温室气增→升温→冰川融、海面升。\n② 影响：淹没沿海小岛、极端天候频、农带北移粮不安。\n③ 危机：小岛屿国家生存受胁、气候难民。\n④ 应对：减排（双碳）、适应、国际合作。","difficulties":"① 影响链。原因：升温引发多域连锁，需系统，易散。\n② 小岛危机。原因：生存级威胁，需拔高，易忽。\n③ 双碳。原因：碳达峰碳中和概念，需点，易混。","teachingMethods":"① 升温链图。\n② 海平面示意。\n③ 小岛案例（图瓦卢）。\n④ 行动讨论。","preparation":"【PPT课件】P1 机理；P2 海面；P3 极端；P4 粮食；P5 应对；P6 练习。【地图/图表素材】全球变暖影响链图、海平面上升淹没示意图。","process":[{"step":"Step 1 导入——小岛正在消失","time":"5分钟","content":"【PPT P1 机理】教师：「温室气增多使地球升温，图瓦卢等小岛国面临被海水吞没，这就是气候安全。」 预设回答：「学生说\"岛国要沉了\"。」 板书时机：黑板写\"气候安全\"。差异化提示：B班听；A班需问机。易错点提醒：变暖是安全议题，非仅天气。"},{"step":"Step 2 海平面","time":"9分钟","content":"【PPT P2 海面】教师：「升温致冰川消融、海水热胀，海平面上升，淹没低洼岛国与沿海城市、盐水入侵农田。」 预设回答：「学生说\"海水倒灌\"。」 板书时机：黑板写海面。差异化提示：B班记；A班需析。易错点提醒：上升威胁沿海与岛国生存空间。"},{"step":"Step 3 极端与粮食","time":"9分钟","content":"【PPT P3 极端】教师：「极端天气（热浪旱涝）频发，农业带北移、病虫害北扩，粮食产量波动、安全风险升。」 预设回答：「学生说\"旱涝坏庄稼\"。」 板书时机：黑板写粮食。差异化提示：B班记；A班需析。易错点提醒：气候直接撬动粮食安全。"},{"step":"Step 4 小岛危机","time":"8分钟","content":"【PPT P4 危机】教师：「小岛屿国家国土低平、减排无力却首当其冲，面临整体消亡与气候难民，是最大不公。」 预设回答：「学生说\"他们最冤\"。」 板书时机：黑板写危机。差异化提示：B班记；A班需析。易错点提醒：气候正义：排放少者受害重。"},{"step":"Step 5 应对","time":"7分钟","content":"【PPT P5 应对】教师：「应对：减排（碳达峰碳中和）、发展清洁能源、提升适应力、全球合作资金技术支持。」 预设回答：「学生说\"少开空调\"（节能）。」 板书时机：黑板写应对。差异化提示：B班记；A班需联。易错点提醒：减排是根本，适应是补充。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：全球变暖会导致海平面上升( );应对气候变化只需适应无需减排( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"行动\"。易错点提醒：本章结束，进入战略与行动。"}],"blackboard":"┌── 气候安全 ──┐\n│ 机理:温气体升│\n│ 海面:淹岛岸 │\n│ 极端:粮不安 │\n│ 小岛:生存危 │\n│ 应对:双碳适│\n└────────────┘","exercises":"【基础作业】1. 全球变暖导致冰川消融、海平面__，威胁沿海与小岛国。2. 判断：应对气候变化只需提高适应能力，不必减排( )。\n【提高作业】说明全球气候变化如何通过粮食安全问题威胁国家安全。\n【参考答案——教师用】基础1：上升。基础2：×。提高：变暖使极端天气与农业带北移，作物减产波动、病虫害北扩，粮食自给率下降，进口依赖与价格风险上升，进而触发民生与社会稳定等安全问题，故须减排与适应并举。","reflection":"✅ 亮点：图瓦卢案例直击生存危机；双碳点明。\n⚠️ 需改进：B班仍只感\"天热\"，需强链式影响。\n📌 下节课衔接：第四章 保障国家安全的战略与行动。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx3-u4-1","lessonId":"l-geo-sx3-u4-1","title":"走向生态文明","book":"选择性必修3 资源环境与国家安全","unitNumber":4,"unitTitle":"保障国家安全的资源、环境战略与行动","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["生态文明","两山论","绿色发展","循环经济","人教版选必三Ch4","第一课时"],"textbookAnalysis":"工业文明带来物质繁荣但透支环境；生态文明强调人与自然和谐，核心理念\"绿水青山就是金山银山\"；路径：绿色发展、循环经济、低碳生活，把生态优势转经济优势。","overview":"【学情分析】A班：能阐释\"两山论\"与绿色发展内涵；B班：常把生态文明当\"少发展\"（误读为保护牺牲经济）。共同问题：两山论、工业文明反思、绿色路径。","objectives":["人地协调观：树立绿水青山就是金山银山的理念。","综合思维：综合生态与经济看文明转型。","区域认知：识别生态优势转化经济的案例。","地理实践力：能践行低碳绿色生活。"],"keyPoints":"① 反思：工业文明透支环境、不可持续。\n② 核心理念：绿水青山就是金山银山（两山论）。\n③ 路径：绿色发展、循环低碳、产业生态化。\n④ 转化：生态优势→旅游康养等经济优势。","difficulties":"① 两山内涵。原因：生态与经济统一，易误读为对立，需透。\n② 文明转型。原因：从工业到生态范式变，需拔高，易浅。\n③ 转化机制。原因：如何变现，需例，易空。","teachingMethods":"① 文明对比。\n② 两山论阐释。\n③ 转化案例（浙江余村）。\n④ 行动讨论。","preparation":"【PPT课件】P1 反思；P2 两山；P3 路径；P4 循环；P5 案例；P6 练习。【地图/图表素材】工业文明与生态文明对比图、绿水青山转化案例图。","process":[{"step":"Step 1 导入——从砍树到看树","time":"5分钟","content":"【PPT P1 反思】教师：「过去砍树卖钱，如今护树致富，这转变就是走向生态文明。」 预设回答：「学生说\"不砍了反而富\"。」 板书时机：黑板写\"生态文明\"。差异化提示：B班听；A班需问转。易错点提醒：生态文明不是不发展，是换个法发展。"},{"step":"Step 2 两山论","time":"9分钟","content":"【PPT P2 两山】教师：「核心理念：绿水青山就是金山银山——好生态本身即财富，保护就是发展。」 预设回答：「学生说\"风景能赚钱\"。」 板书时机：黑板写两山。差异化提示：B班记；A班需析。易错点提醒：生态与经济是统一而非对立。"},{"step":"Step 3 绿色路径","time":"9分钟","content":"【PPT P3 路径】教师：「路径：绿色发展（低耗高效）、产业生态化、能源清洁化，从末端治理转向源头预防。」 预设回答：「学生说\"清洁生产\"。」 板书时机：黑板写路径。差异化提示：B班记；A班需析。易错点提醒：绿色是发展方式根本转变。"},{"step":"Step 4 循环经济","time":"8分钟","content":"【PPT P4 循环】教师：「循环经济：减量化、再利用、资源化，如余热发电、废渣制建材，物尽其用少排放。」 预设回答：「学生说\"垃圾变资源\"。」 板书时机：黑板写循环。差异化提示：B班记；A班需联。易错点提醒：循环把废物变原料，降本减污。"},{"step":"Step 5 转化案例","time":"7分钟","content":"【PPT P5 案例】教师：「如浙江余村关停矿山搞文旅，生态优势转经济优势，印证两山可兼得。」 预设回答：「学生说\"余村变网红\"。」 板书时机：黑板写案例。差异化提示：B班记；A班需析。易错点提醒：转化靠业态创新而非坐等。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：绿水青山就是金山银山强调保护生态与发展经济对立( );循环经济有利于减污增效( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"践行\"。易错点提醒：下节课学国家战略与政策。"}],"blackboard":"┌── 生态文明 ──┐\n│ 反思:工业透支│\n│ 两山:绿=金   │\n│ 路径:绿色低 │\n│ 循环:减量再用│\n│ 转化:余村   │\n└────────────┘","exercises":"【基础作业】1. 生态文明建设的重要理念是\"绿水青山就是__山\"。2. 判断：生态文明主张为了保护环境必须停止一切经济发展( )。\n【提高作业】用\"两山论\"说明生态保护与经济发展的关系。\n【参考答案——教师用】基础1：金山。基础2：×。提高：两山论指出良好生态本身即经济财富，保护生态可转化为旅游、康养等绿色产业优势，二者统一而非对立；保护是可持续的发展，发展须以生态为底线。","reflection":"✅ 亮点：砍树到看树切入自然；余村案例证转化。\n⚠️ 需改进：B班仍误读生态=不发展，需强统一论。\n📌 下节课衔接：国家战略与政策。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx3-u4-2","lessonId":"l-geo-sx3-u4-2","title":"国家战略与政策","book":"选择性必修3 资源环境与国家安全","unitNumber":4,"unitTitle":"保障国家安全的资源、环境战略与行动","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["主体功能区","生态保护红线","国土空间规划","政策手段","人教版选必三Ch4","第二课时"],"textbookAnalysis":"国家以主体功能区战略优化国土空间：划分为优化开发、重点开发、限制开发、禁止开发四类；划定生态保护红线、环境质量底线、资源利用上线\"三红线\"；手段含法律、规划、经济（生态补偿、环境税）。","overview":"【学情分析】A班：能说主体功能区分类与三红线；B班：常把四类主体功能区记混或漏红线。共同问题：四 function escAttr(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderStepContent(raw) {
  const s = (raw || '').trim();
  if (!s) return '';
  const MARK = /(【PPT[^】]*】|【音频[^】]*】|【教师[^】]*】|教师[:：]|【预设回答[^】]*】|预设回答[:：]|【板书时机[^】]*】|板书时机[:：]|【差异化提示[^】]*】|差异化提示[:：]|【易错点提醒[^】]*】|易错点提醒[:：])/g;
  const parts = s.split(MARK);
  let out = '';
  if (parts[0] && parts[0].trim()) out += '<div class="sc-text">' + escAttr(parts[0].trim()) + '</div>';
  for (let i = 1; i < parts.length; i += 2) {
    const marker = parts[i];
    const text = (parts[i + 1] || '').trim();
    if (!marker) continue;
    out += stepBlock(marker, text);
  }
  return out || ('<div class="sc-text">' + escAttr(s) + '</div>');
}
function stepBlock(marker, text) {
  const t = marker.replace(/^【|】$/g, '');
  if (/^PPT/.test(t)) return '<div class="sc-block sc-ppt"><span class="sc-tag">' + escAttr(marker) + '</span>' + (text ? '<div class="sc-bd">' + escAttr(text) + '</div>' : '') + '</div>';
  if (/^音频/.test(t)) return '<div class="sc-block sc-audio"><span class="sc-tag">' + escAttr(marker) + '</span>' + (text ? '<div class="sc-bd">' + escAttr(text) + '</div>' : '') + '</div>';
  if (/^教师/.test(t)) return '<div class="sc-block sc-teacher"><span class="sc-tag">' + escAttr(marker) + '</span><div class="sc-bd">' + escAttr(text) + '</div></div>';
  if (/^预设回答/.test(t)) return '<div class="sc-block sc-ans"><span class="sc-tag">' + escAttr(marker) + '</span><div class="sc-bd">' + escAttr(text) + '</div></div>';
  if (/^板书时机/.test(t)) return '<div class="sc-block sc-board"><span class="sc-tag">' + escAttr(marker) + '</span><div class="sc-bd">' + escAttr(text) + '</div></div>';
  if (/^差异化提示/.test(t)) return '<div class="sc-block sc-diff"><span class="sc-tag">' + escAttr(marker) + '</span><div class="sc-bd">' + escAttr(text) + '</div></div>';
  if (/^易错点提醒/.test(t)) return '<div class="sc-block sc-warn"><span class="sc-tag">' + escAttr(marker) + '</span><div class="sc-bd">' + escAttr(text) + '</div></div>';
  return '<div class="sc-text">' + escAttr(marker + text) + '</div>';
}
function renderExercises(raw) {
  const s = (raw || '').trim();
  if (!s) return '';
  const basic = s.match(/【基础作业】([^]*?)(?=【提高作业】|【参考答案|$)/);
  const adv = s.match(/【提高作业】([^]*?)(?=【参考答案】|$)/);
  const ans = s.match(/【参考答案[^】]*】([^]*?)$/);
  let out = '';
  if (basic) out += '<div class="ex-block ex-basic"><div class="ex-h">📝 基础作业</div><div class="ex-bd">' + escAttr(basic[1].trim()) + '</div></div>';
  if (adv) out += '<div class="ex-block ex-adv"><div class="ex-h">🚀 提高作业</div><div class="ex-bd">' + escAttr(adv[1].trim()) + '</div></div>';
  if (ans) out += '<div class="ex-block ex-key"><div class="ex-h">🔑 参考答案（教师用）</div><div class="ex-bd">' + escAttr(ans[1].trim()) + '</div></div>';
  return out || ('<div class="sc-text">' + escAttr(s) + '</div>');
}

function setNav(title, showBack) {
  $('navTitle').textContent = title;
  $('backBtn').style.display = showBack ? 'block' : 'none';
}

// ===== 导航 =====
function switchTab(tab) {
  state.tab = tab;
  state.detailId = null;
  state.privacy = false;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('on', t.dataset.tab === tab); });
  setNav(SUBJECT + '教案库', false);
  const bar = document.querySelector('.dlbar');
  if (bar) bar.remove();
  render();
}

function goBack() {
  if (state.detailId) state.detailId = null;
  else if (state.privacy) state.privacy = false;
  render();
}

function openDetail(id) {
  state.detailId = id;
  if (state.recents.indexOf(id) < 0) {
    state.recents.unshift(id);
    if (state.recents.length > 50) state.recents.pop();
  }
  render();
}

function toggleFav(id) {
  const i = state.favorites.indexOf(id);
  if (i >= 0) {
    state.favorites.splice(i, 1);
    toast('已取消收藏');
  } else {
    state.favorites.unshift(id);
    toast('★ 已收藏');
  }
  render();
}

// ===== 渲染入口 =====
function render() {
  const tab = state.tab;
  if (state.detailId) { renderDetail(); return; }
  if (state.privacy) { renderPrivacy(); return; }
  if (tab === 'index') renderIndex();
  else if (tab === 'favorites') renderFavorites();
  else if (tab === 'profile') renderProfile();
}

// ===== 教案库页面（册 → 单元 → 板块，按书本顺序）=====
function renderIndex() {
  setNav(SUBJECT + '教案库', false);
  let list = LESSONS.slice();
  if (state.filterBook) list = list.filter(function(l){ return l.book === state.filterBook; });
  if (state.keyword.trim()) {
    const kw = state.keyword.trim().toLowerCase();
    list = list.filter(function(l) {
      const hay = (l.title + ' ' + l.unitTitle + ' ' + (l.tags || []).join(' ') + ' ' + (l.overview || '') + ' ' +
        (l.keyPoints || '') + ' ' + (l.difficulties || '') + ' ' + (l.preparation || '') + ' ' +
        (l.objectives || []).join(' ') + ' ' + (l.process || []).map(function(s){ return s.step + ' ' + s.content; }).join(' ') + ' ' +
        (l.exercises || '') + ' ' + (l.reflection || '') + ' ' + (l.blackboard || '')).toLowerCase();
      return hay.indexOf(kw) !== -1;
    });
  }

  list = list.slice().sort(function(a, b) {
    return ((BOOK_ORDER[a.book] || 0) - (BOOK_ORDER[b.book] || 0)) ||
      (a.unitNumber - b.unitNumber) ||
      ((a.periodNumber || 0) - (b.periodNumber || 0));
  });

  // 按 册+单元 分组（"全部"时 unitNumber 跨册重复，必须用册区分）
  const map = {};
  list.forEach(function(l) {
    const key = l.book + '|' + l.unitNumber;
    if (!map[key]) map[key] = { key: key, book: l.book, bookShort: BOOK_SHORT[l.book] || l.book, unitNumber: l.unitNumber, unitTitle: l.unitTitle, lessons: [] };
    map[key].lessons.push(l);
  });
  const groups = Object.keys(map).map(function(k){ return map[k]; }).sort(function(a, b) {
    return ((BOOK_ORDER[a.book] || 0) - (BOOK_ORDER[b.book] || 0)) || (a.unitNumber - b.unitNumber);
  });

  const TYPE_ICON = { jingdu:'📖', qunwen:'🔗', xiezuo:'✍️', huodong:'🎯', fangfa:'🛠', new:'🆕', exercise:'✏️', review:'🔁', comprehensive:'🌟', reading:'📖', grammar:'✏️', listening:'🎧', speaking:'💬', writing:'✍️', project:'🎯' };
  const TYPE_BG = { jingdu:'#1a365d', qunwen:'#6b46c1', xiezuo:'#7b341e', huodong:'#2c5282', fangfa:'#1a6840', new:'#b7791f', exercise:'#2a4a7d', review:'#553c9a', comprehensive:'#0f766e', reading:'#1a365d', grammar:'#1a6840', listening:'#6b46c1', speaking:'#b7791f', writing:'#7b341e', project:'#2c5282' };

  const bookChips = '<div class="chip ' + (state.filterBook ? '' : 'on') + '" data-book="">全部</div>' +
    BOOKS.map(function(b) {
      return '<div class="chip ' + (state.filterBook === b ? 'on' : '') + '" data-book="' + escAttr(b) + '">' + escAttr(b) + '</div>';
    }).join('');

  const groupHtml = groups.map(function(g) {
    const cards = g.lessons.map(function(l) {
      const fav = state.favorites.indexOf(l.id) >= 0;
      const ico = TYPE_ICON[l.lessonType] || '📄';
      const bg = TYPE_BG[l.lessonType] || '#555';
      const star = fav ? '<div style="color:#e6a23c;font-size:20px">★</div>' : '';
      return '<div class="card" data-id="' + escAttr(l.id) + '">' +
        '<div class="row1">' +
          '<div class="docico" style="background:linear-gradient(135deg,' + bg + ',' + bg + 'dd)">' + ico + '</div>' +
          '<div style="flex:1">' +
            '<div class="ttl">' + escAttr(l.title) + '</div>' +
            '<div class="sub">' + escAttr(l.lessonTypeName) + ' · ' + l.duration + '分钟</div>' +
          '</div>' +
          star +
          '<div class="card-arrow">›</div>' +
        '</div>' +
      '</div>';
    }).join('');

    return '<div class="unit-group">' +
      '<div class="unit-head"><span class="unit-no">' + escAttr(g.bookShort) + ' · Unit ' + g.unitNumber + '</span><span class="unit-name">' + escAttr(g.unitTitle) + '</span></div>' +
      cards +
    '</div>';
  }).join('');

  const histHtml = (!state.keyword.trim() && state.history.length)
    ? '<div class="chips">' + state.history.map(function(h){ return '<div class="chip" data-hist="' + escAttr(h) + '">' + escAttr(h) + '</div>'; }).join('') + '</div>'
    : '';
  const searchVal = escAttr(state.keyword);
  $('content').innerHTML =
    '<div class="search">🔍 <input class="sin" placeholder="搜索教案/单元/关键词" value="' + searchVal + '"> ' + (state.keyword ? '<span class="searchx" data-clear="search">✕</span>' : '') + '</div>' +
    histHtml +
    '<div class="chips">' + bookChips + '</div>' +
    (groupHtml || '<div class="empty"><div class="e">📭</div><div class="t">没有匹配的教案</div><div class="p">换个关键词或筛选条件试试</div></div>');
}

function setBook(b) { state.filterBook = b; renderIndex(); }
function onPrevSearch(kw) {
  state.keyword = kw;
  const t = kw.trim();
  if (t && state.history[0] !== t) {
    state.history = [t].concat(state.history.filter(function(x){ return x !== t; })).slice(0, 10);
  }
  renderIndex();
}
function onPrevHistory(h) { state.keyword = h; renderIndex(); }
function onPrevClear() { state.keyword = ''; renderIndex(); }

// ===== 收藏页面 =====
function renderFavorites() {
  setNav('我的收藏', false);
  let cards = '';
  state.favorites.forEach(function(id) {
    const l = getLesson(id);
    if (!l) return;
    cards += '<div class="card" data-id="' + escAttr(l.id) + '">' +
      '<div class="row1"><div class="docico">📄</div>' +
      '<div style="flex:1"><div class="ttl">' + escAttr(l.title) + '</div><div class="sub">' + escAttr(l.book) + ' · ' + escAttr(l.unitTitle) + ' · ' + escAttr(l.lessonTypeName) + '</div></div>' +
      '<div style="color:#c0392b;font-size:22px;cursor:pointer" data-fav-id="' + escAttr(l.id) + '">✕</div>' +
      '</div></div>';
  });
  $('content').innerHTML =
    '<div class="glabel"><span>已收藏 ' + state.favorites.length + ' 篇</span>' + (state.favorites.length ? '<span class="clr" onclick="clearAll(&quot;fav&quot;)">清空</span>' : '') + '</div>' +
    (cards || '<div class="empty"><div class="e">★</div><div class="t">还没有收藏</div><div class="p">在教案详情页点 ☆ 即可收藏</div></div>');
}

// ===== 我的页面 =====
function renderProfile() {
  setNav('我的', false);
  const p = state.profile;
  let dl = '';
  state.downloads.forEach(function(id) {
    const l = getLesson(id); if (!l) return;
    dl += '<div class="favitem" data-id="' + escAttr(l.id) + '"><div class="fi">📄</div><div class="ft">' + escAttr(l.title) + '</div></div>';
  });
  let rl = '';
  state.recents.forEach(function(id) {
    const l = getLesson(id); if (!l) return;
    rl += '<div class="favitem" data-id="' + escAttr(l.id) + '"><div class="fi">📄</div><div class="ft">' + escAttr(l.title) + '</div></div>';
  });
  let html = '';
  html += '<div class="phead"><div class="pavatar">' + (p.avatarUrl ? '<img src="' + escAttr(p.avatarUrl) + '">' : '👤') + '</div><div><div class="pname">' + escAttr(p.nickName) + '</div><div class="psub">微信用户 · 云端已同步</div></div></div>';
  html += '<div class="stats3"><div class="stat"><div class="num">' + state.favorites.length + '</div><div class="lbl">收藏</div></div><div class="stat"><div class="num">' + state.downloads.length + '</div><div class="lbl">下载</div></div><div class="stat"><div class="num">' + state.recents.length + '</div><div class="lbl">最近</div></div></div>';
  html += '<div class="block"><h3>📥 下载记录 <span class="clear" onclick="clearAll(&quot;dl&quot;)">清空</span></h3>' + (dl || '<div class="hint">暂无下载记录</div>') + '</div>';
  html += '<div class="block"><h3>🕑 浏览历史 <span class="clear" onclick="clearAll(&quot;rc&quot;)">清空</span></h3>' + (rl || '<div class="hint">暂无浏览历史</div>') + '</div>';
  html += '<div class="block"><h3>⚙ 设置</h3><div class="favitem" onclick="showPrivacy()"><div class="fi">🔒</div><div class="ft">隐私保护说明</div></div><div class="favitem" onclick="clearAll(&quot;all&quot;)"><div class="fi">🗑</div><div class="ft">清空全部本地数据</div></div></div>';
  html += '<div class="hint">此预览版数据仅存于当前页面，刷新即丢失。真机数据存储于微信云开发。</div>';
  $('content').innerHTML = html;
}

// ===== 隐私说明页 =====
function showPrivacy() { state.privacy = true; render(); }

function renderPrivacy() {
  setNav('隐私保护说明', true);
  const blocks = [
    { h: '我们收集哪些信息', p: [ '· 昵称、头像：你主动设置，用于「我的」页身份展示。', '· 收藏 / 下载记录 / 浏览历史：使用教案库时产生的操作记录，用于多设备同步与个性化展示。', '· 错误日志：应用崩溃时的堆栈摘要，仅用于修复问题，不含任何教学内容。' ] },
    { h: '信息存储在哪里', p: [ '所有数据默认存储于微信云开发（腾讯云）或本机缓存。我们不自建服务器，不向任何第三方出售或共享你的个人信息。' ] },
    { h: '你有哪些权利', p: [ '· 可随时在「我的」页清空下载记录、浏览历史或收藏。', '· 可一键清空全部个人数据。', '· 可在微信「设置 › 隐私 › 授权管理」中撤回本小程序的信息授权。' ] },
    { h: '联系方式', p: [ '如对本说明有疑问，可通过小程序内反馈渠道联系开发者。' ] }
  ];
  let html = '<div class="hint" style="text-align:left;padding:4px 2px 10px">最后更新：2026-07</div>';
  blocks.forEach(function(b) {
    html += '<div class="block"><h3>' + b.h + '</h3>' + b.p.map(function(x){ return '<p class="rp">' + escAttr(x) + '</p>'; }).join('') + '</div>';
  });
  html += '<div class="tip">本说明依据《中华人民共和国个人信息保护法》及微信平台隐私规范编写。</div>';
  $('content').innerHTML = html;
}

// ===== 详情页 =====
function renderDetail() {
  const l = getLesson(state.detailId);
  if (!l) { state.detailId = null; render(); return; }
  setNav((l.lessonTypeName || '教案详情'), true);

  const CN = ['一', '二', '三', '四', '五', '六', '七', '八', '九', '十', '十一', '十二'];
  const secs = [];
  let si = 0;
  const add = function(name, payload) { if (payload) { si++; secs.push(Object.assign({ no: CN[si - 1], name: name, key: name }, payload)); } };
  add('教材分析', l.textbookAnalysis && { body: l.textbookAnalysis });
  add('学情分析', l.overview && { body: l.overview });
  add('教学目标', l.objectives && l.objectives.length && { list: l.objectives });
  add('教学重点', l.keyPoints && { body: l.keyPoints });
  add('教学难点', l.difficulties && { body: l.difficulties });
  add('教学方法', l.teachingMethods && { body: l.teachingMethods });
  add('课前准备', l.preparation && { body: l.preparation });
  add('教学过程', l.process && l.process.length && { steps: l.process.map(function(s, i){ return { n: i + 1, name: s.step || s.name || ('步骤' + (i + 1)), time: s.time || '', content: s.content || '' }; }) });
  add('板书设计', l.blackboard && { body: l.blackboard });
  add('课后练习', l.exercises && { html: renderExercises(l.exercises) });
  add('教学反思', l.reflection && { body: l.reflection });

  let secHtml = '';
  secs.forEach(function(sec) {
    if (sec.list) {
      secHtml += '<div class="sec"><h3><span class="sno">' + sec.no + '</span>' + sec.name + '<span class="scopy" data-copy-key="' + escAttr(sec.key) + '">复制</span></h3><ul>' + sec.list.map(function(x){ return '<li>' + escAttr(x) + '</li>'; }).join('') + '</ul></div>';
    } else if (sec.steps) {
      let stepsHtml = '';
      sec.steps.forEach(function(s) {
        stepsHtml += '<div class="step"><div class="sn"><span class="sno sm">' + s.n + '</span>' + escAttr(s.name) + '<span class="st">' + escAttr(s.time) + '</span></div>' + renderStepContent(s.content) + '</div>';
      });
      secHtml += '<div class="sec"><h3><span class="sno">' + sec.no + '</span>' + sec.name + '<span class="scopy" data-copy-key="' + escAttr(sec.key) + '">复制</span></h3>' + stepsHtml + '</div>';
    } else if (sec.html) {
      secHtml += '<div class="sec"><h3><span class="sno">' + sec.no + '</span>' + sec.name + '<span class="scopy" data-copy-key="' + escAttr(sec.key) + '">复制</span></h3>' + sec.html + '</div>';
    } else {
      secHtml += '<div class="sec"><h3><span class="sno">' + sec.no + '</span>' + sec.name + '<span class="scopy" data-copy-key="' + escAttr(sec.key) + '">复制</span></h3><p>' + escAttr(sec.body) + '</p></div>';
    }
  });

  const fav = state.favorites.indexOf(l.id) >= 0;
  const fid = escAttr(l.id);

  let html = '';
  html += '<div class="hero">';
  html += '  <div class="badges2"><span class="badge2">' + escAttr(l.book) + '</span><span class="badge2">' + escAttr(l.lessonTypeName) + '</span><span class="badge2">' + l.duration + '分钟</span></div>';
  html += '  <h1>' + escAttr(l.title) + '</h1>';
  html += '  <div class="hsub">' + escAttr(l.unitTitle) + '</div>';
  html += '  <div class="hstat">浏览 ' + (l.viewCount || 0) + ' · 下载 ' + (l.downloadCount || 0) + '</div>';
  html += '</div>';
  html += secHtml;
  html += '<div class="hint" style="margin-top:8px">— 以下为小程序下载栏，预览中点击会提示效果 —</div><div style="height:70px"></div>';

  $('content').innerHTML = html;

  let bar = document.querySelector('.dlbar');
  if (bar) bar.remove();
  bar = document.createElement('div');
  bar.className = 'dlbar';
  bar.innerHTML =
    '<span class="fav" data-fav-id="' + fid + '">' + (fav ? '★' : '☆') + '</span>' +
    '<div class="fmts">' +
      '<span class="fmt ' + (state.favFmt === 'word' ? 'on' : '') + '" data-fmt="word">Word</span>' +
      '<span class="fmt ' + (state.favFmt === 'pdf' ? 'on' : '') + '" data-fmt="pdf">PDF</span>' +
      '<span class="fmt ' + (state.favFmt === 'ppt' ? 'on' : '') + '" data-fmt="ppt">PPT</span>' +
    '</div>' +
    '<div class="btn" data-dl-id="' + fid + '">⬇ 下载 ' + state.favFmt.toUpperCase() + '</div>';
  $('content').appendChild(bar);
}

function setFmt(f) { state.favFmt = f; renderDetail(); }
function copySection(key) { toast('已复制本节（预览版）'); }

function doDownload(id) {
  const l = getLesson(id);
  if (l && state.downloads.indexOf(id) < 0) state.downloads.unshift(id);
  toast('已生成 ' + state.favFmt.toUpperCase() + '（预览：实际会在微信中打开文件）');
  renderDetail();
}

// ===== 清空操作 =====
function clearAll(kind) {
  if (kind === 'fav') { state.favorites = []; toast('已清空收藏'); }
  else if (kind === 'dl') { state.downloads = []; toast('已清空下载'); }
  else if (kind === 'rc') { state.recents = []; toast('已清空浏览'); }
  else if (kind === 'all') { state.favorites = []; state.downloads = []; state.recents = []; toast('已清空全部'); }
  render();
}

// ===== 初始化演示数据 & 首次渲染 =====
$('backBtn').addEventListener('click', goBack);
$('content').addEventListener('click', function(e) {
  var t = e.target.closest('[data-id]'); if (t) { openDetail(t.getAttribute('data-id')); return; }
  var f = e.target.closest('[data-fav-id]'); if (f) { toggleFav(f.getAttribute('data-fav-id')); return; }
  var c = e.target.closest('[data-copy-key]'); if (c) { copySection(c.getAttribute('data-copy-key')); return; }
  var b = e.target.closest('[data-book]'); if (b) { setBook(b.getAttribute('data-book')); return; }
  var h = e.target.closest('[data-hist]'); if (h) { onPrevHistory(h.getAttribute('data-hist')); return; }
  var x = e.target.closest('[data-clear]'); if (x) { onPrevClear(); return; }
  var m = e.target.closest('[data-fmt]'); if (m) { setFmt(m.getAttribute('data-fmt')); return; }
  var d = e.target.closest('[data-dl-id]'); if (d) { doDownload(d.getAttribute('data-dl-id')); return; }
});
$('content').addEventListener('change', function(e) {
  if (e.target.classList.contains('sin')) { onPrevSearch(e.target.value); }
});

state.downloads = LESSONS.slice(0, 2).map(function(l){ return l.id; });
state.recents = LESSONS.slice(0, 3).map(function(l){ return l.id; });
state.favorites = LESSONS.slice(0, 1).map(function(l){ return l.id; });
render();
</script>
