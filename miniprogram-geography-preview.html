"}],"blackboard":"┌── 农业区位变化 ──┐\n│ 自然作用减弱 │\n│ 市场科技增强 │\n│ 保鲜:扩半径  │\n│ 城郊:粮→菜花│\n│ 科技政策新引擎│\n└────────────────┘","exercises":"【基础作业】1. 使南方蔬菜能大量运往北方销售的关键条件是__技术和交通改善。2. 判断：随社会发展，自然因素对农业区位的制约越来越强( )。\n【提高作业】说明冷链物流的发展如何改变我国农业生产的区位格局。\n【参考答案——教师用】基础1：保鲜（冷藏）。基础2：×。提高：冷链延长保鲜期与运输半径，使鲜活农产品可远距离销售，产地更集中专业化，销地更依赖外地供给，市场导向增强。","reflection":"✅ 亮点：反季果蔬案例亲切；作用力消长讲清。\n⚠️ 需改进：B班仍认自然绝对，需多动态例。\n📌 下节课衔接：工业区位因素。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b2-u3-3","lessonId":"l-geo-b2-u3-3","title":"工业区位因素","book":"必修第二册","unitNumber":3,"unitTitle":"产业区位因素","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["工业区位","原料","市场","劳动力","人教版必修二Ch3","第三课时"],"textbookAnalysis":"工业区位受原料、能源、市场、交通、劳动力、技术、政策、环境等影响；不同导向型工业主导不同：原料导向（制糖）、市场导向（啤酒）、动力导向（电解）、劳动力导向（纺织）、技术导向（芯片）。","overview":"【学情分析】A班：能判定工业导向类型并布局；B班：常把\"啤酒厂\"当原料导向（实为市场）。共同问题：五大导向型判断。","objectives":["人地协调观：认识工业与环境协调，防治污染。","综合思维：综合多因素分析工业布局。","区域认知：在区域中定位工业区与导向。","地理实践力：能判定工厂导向并提出选址。"],"keyPoints":"① 原料导向：原料重/易腐（制糖、水产）。\n② 市场导向：产品重/不便运（啤酒、家具）。\n③ 动力导向：耗电大（电解铝）。\n④ 劳动力导向：需大量廉价劳力（服装）；技术导向：高精（芯片）。","difficulties":"① 导向判定。原因：看\"最重制约\"，易错，需练。\n② 啤酒市场。原因：易误原料，需强调产品重。\n③ 劳力vs技术。原因：一廉价一高素，易混，需分。","teachingMethods":"① 导向分类表。\n② 案例判定。\n③ 布局演练。\n④ 环境因素。","preparation":"【PPT课件】P1 工业因素；P2 五大导向；P3 原料市场；P4 劳力技术；P5 环境；P6 练习。【地图/图表素材】工业导向类型图、某区域工业分布图。","process":[{"step":"Step 1 导入——工厂开在哪","time":"5分钟","content":"【PPT P1 因素】教师：「建厂要选原料近、市场近、劳力足、污染少的地方，这就是工业区位。」 预设回答：「学生说\"离家近好招工\"。」 板书时机：黑板写\"工业区位\"。差异化提示：B班举例；A班需问因素。易错点提醒：工业受自然约束小于农业，但因素更多。"},{"step":"Step 2 五大导向","time":"9分钟","content":"【PPT P2 导向】教师：「原料、市场、动力、劳动力、技术五类导向，看哪个因素最制约成本。」 预设回答：「学生记五类名称。」 板书时机：黑板写五导向。差异化提示：B班记；A班需析。易错点提醒：每个工厂主导因素唯一，看最重。"},{"step":"Step 3 原料与市场","time":"9分钟","content":"【PPT P3 原料市场】教师：「制糖厂原料重、失重大→近原料；啤酒产品重不便运→近市场（非原料）。」 预设回答：「学生判\"啤酒为何近市场\"。」 板书时机：黑板写两类。差异化提示：B班记；A班需辨。易错点提醒：啤酒是市场导向，别误当原料。"},{"step":"Step 4 劳力与技术","time":"8分钟","content":"【PPT P4 劳力技术】教师：「服装玩具需大量廉价劳力→劳动力导向；芯片软件需高素质人才→技术导向，近高教区。」 预设回答：「学生区分\"服装vs芯片\"。」 板书时机：黑板写两类。差异化提示：B班记；A班需分。易错点提醒：劳力导向要\"廉价\"，技术导向要\"高素质\"。"},{"step":"Step 5 环境与其他","time":"7分钟","content":"【PPT P5 环境】教师：「污染厂应远离城区与上游，主导风向的下风向、河流下游布局，兼顾政策与基础设施。」 预设回答：「学生说\"化工厂放下游\"。」 板书时机：黑板写环境。差异化提示：B班记；A班需说位。易错点提醒：盛行风下风向、最小风频上风向均可。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：啤酒厂属原料导向型( );芯片厂属技术导向( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"选址\"。易错点提醒：下节课学工业区位变化。"}],"blackboard":"┌── 工业区位 ──┐\n│ 原料导向:制糖│\n│ 市场导向:啤酒│\n│ 动力:电解铝 │\n│ 劳力:服装   │\n│ 技术:芯片   │\n│ 污染:下风向│\n└────────────┘","exercises":"【基础作业】1. 制糖工业应接近__产地（导向类型）。2. 判断：啤酒厂属于原料导向型工业( )。\n【提高作业】为什么说集成电路（芯片）制造属于技术导向型工业？布局时应靠近什么条件？\n【参考答案——教师用】基础1：原料。基础2：×。提高：芯片制造需高精尖人才、研发与洁净环境，属技术导向；应布局在人才密集、高校科研院所集中、基础设施完善处。","reflection":"✅ 亮点：五大导向分类清楚；啤酒反例防错。\n⚠️ 需改进：B班导向判定弱，需多练案例。\n📌 下节课衔接：工业区位因素的变化。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b2-u3-4","lessonId":"l-geo-b2-u3-4","title":"工业区位因素的变化","book":"必修第二册","unitNumber":3,"unitTitle":"产业区位因素","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["工业转移","集聚","科技","人教版必修二Ch3","第四课时"],"textbookAnalysis":"现代工业中原料、劳动力数量影响减弱，市场、交通、科技、信息、环境质量作用增强；表现为工业集聚（共享基础设施）与分散（寻找最优区位），以及产业转移（由发达向发展中）。","overview":"【学情分析】A班：能解释集聚与分散、产业转移原因；B班：常把\"劳动力数量\"当仍重要（实为素质）。共同问题：因素变化、集聚分散、转移。","objectives":["人地协调观：认识产业转移对区域发展与生态的影响。","综合思维：动态综合看待工业区位演变。","区域认知：在区际理解工业转移方向。","地理实践力：能解释本地工厂搬迁或引资现象。"],"keyPoints":"① 变化：原料、劳力数量作用降；市场、交通、科技、信息、环境升。\n② 集聚：共享设施、降本、协作（高新区）。\n③ 分散：为近市场/降成本全球布局。\n④ 转移：由高成本区向低成本区（发展中）。","difficulties":"① 劳力素质。原因：数量弱、素质强，易混，需点。\n② 集聚vs分散。原因：看似矛盾，需说清条件。\n③ 转移方向。原因：由发达向发展中，易记反，需析。","teachingMethods":"① 因素消长图。\n② 集聚案例（高新区）。\n③ 转移链分析。\n④ 讨论。","preparation":"【PPT课件】P1 变化总趋；P2 因素消长；P3 集聚；P4 分散；P5 产业转移；P6 练习。【地图/图表素材】产业转移箭头图、高新区集聚示意图。","process":[{"step":"Step 1 导入——工厂在搬家","time":"5分钟","content":"【PPT P1 趋势】教师：「不少工厂从沿海迁内陆、从中国转东南亚，工业区位在变。」 预设回答：「学生说\"人工贵了\"。」 板书时机：黑板写\"工业变化\"。差异化提示：B班举例；A班需问趋。易错点提醒：变的是因素权重，非全部。"},{"step":"Step 2 因素消长","time":"9分钟","content":"【PPT P2 消长】教师：「原料、劳动力数量影响减弱；市场、交通、科技、信息、环境质量作用增强。」 预设回答：「学生说\"机器人替代普工\"。」 板书时机：黑板写消长。差异化提示：B班记；A班需析。易错点提醒：劳力看素质非数量。"},{"step":"Step 3 工业集聚","time":"9分钟","content":"【PPT P3 集聚】教师：「相关企业集中可共享基建、降运费、促协作创新，如高新区、产业园。」 预设回答：「学生说\"为何同类厂扎堆\"。」 板书时机：黑板写集聚。差异化提示：B班记；A班需说益。易错点提醒：集聚为降本增效，也带来竞争。"},{"step":"Step 4 分散与转移","time":"8分钟","content":"【PPT P4 分散】教师：「为近市场或降成本，跨国公司全球分散布局；整体由高成本发达区转向低成本发展中区。」 预设回答：「学生说\"鞋厂迁越南\"原因。」 板书时机：黑板写转移。差异化提示：B班记；A班需析向。易错点提醒：转移由发达向发展中，非相反。"},{"step":"Step 5 影响与对策","time":"7分钟","content":"【PPT P5 影响】教师：「转入地获就业产业、转出地腾笼换鸟；也带来污染转移，需绿色承接。」 预设回答：「学生辨证说产业转移利弊。」 板书时机：黑板写影响。差异化提示：B班记；A班需辩证。易错点提醒：承接产业须防污染转嫁。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：劳动力数量对工业影响越来越强( );产业多由发达区转向发展中区( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"分析\"。易错点提醒：下节课学服务业区位。"}],"blackboard":"┌── 工业区位变化 ──┐\n│ 原料劳力数降 │\n│ 市场科技信息升│\n│ 集聚:共享降本│\n│ 分散:近市场  │\n│ 转移:发→发展│\n│ 绿色承接    │\n└────────────────┘","exercises":"【基础作业】1. 现代工业布局中，作用日益增强的因素包括市场、交通、科技和__。2. 判断：产业转移一般是由发展中国家转向发达国家( )。\n【提高作业】说明劳动密集型产业由我国沿海向中西部或东南亚转移的主要原因。\n【参考答案——教师用】基础1：信息（或环境质量）。基础2：×。提高：沿海地价与工资上升、成本提高，中西部与东南亚劳力土地成本低，交通改善使转移可行，企业追逐更低成本。","reflection":"✅ 亮点：机器人替代讲清劳力素质；转移方向强调。\n⚠️ 需改进：B班集聚与分散看似矛盾，需多情境。\n📌 下节课衔接：服务业区位因素。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b2-u3-5","lessonId":"l-geo-b2-u3-5","title":"服务业区位因素及其变化","book":"必修第二册","unitNumber":3,"unitTitle":"产业区位因素","lessonType":"new","lessonTypeName":"新授课","periodNumber":5,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["服务业","中心地","电商","人教版必修二Ch3","第五课时"],"textbookAnalysis":"服务业分商业性（零售、金融）与非商业性（教育、医疗）；区位受市场、交通、劳动力、集聚、政策影响；现代信息技术与电商使服务业突破时空限制，出现无人零售、远程服务。","overview":"【学情分析】A班：能分析电商如何改变服务业区位；B班：常把服务业当\"只在市中心\"。共同问题：服务业类型、区位因素、信息技术影响。","objectives":["人地协调观：认识便利服务的民生与公平价值。","综合思维：综合市场交通信息分析服务业。","区域认知：在城区识别服务中心等级。","地理实践力：能解释本地商圈与电商变化。"],"keyPoints":"① 类型：商业性（零售金融物流）、非商业性（教科文卫）。\n② 因素：市场（人口消费）、交通、劳动力、集聚、政策。\n③ 等级：高等级中心地服务范围广、数量少。\n④ 变化：信息技术与电商突破时空，远程服务兴起。","difficulties":"① 类型区分。原因：商业/非商业易混，需举。\n② 中心地等级。原因：等级与服务范围反比数量，需图。\n③ 电商影响。原因：弱化区位、强网络，易错，需点。","teachingMethods":"① 类型举例。\n② 中心地理论。\n③ 电商案例。\n④ 商圈调查。","preparation":"【PPT课件】P1 服务业类型；P2 区位因素；P3 中心地；P4 电商；P5 变化；P6 练习。【地图/图表素材】中心地等级示意图、城市商圈分布图。","process":[{"step":"Step 1 导入——身边的服务","time":"5分钟","content":"【PPT P1 类型】教师：「逛街、网购、上学、看病都算服务业，它渗透日常生活。」 预设回答：「学生举身边服务。」 板书时机：黑板写\"服务业\"。差异化提示：B班举例；A班需分类。易错点提醒：服务业含商业与非商业两大类。"},{"step":"Step 2 区位因素","time":"9分钟","content":"【PPT P2 因素】教师：「服务业看重市场（人口与消费力）、交通便捷、劳力素质、集聚效应与政策。」 预设回答：「学生说\"商场为何选路口\"（人流交通）。」 板书时机：黑板写因素。差异化提示：B班记；A班需析。易错点提醒：市场是首要，客流即商机。"},{"step":"Step 3 中心地等级","time":"9分钟","content":"【PPT P3 中心地】教师：「高级中心地（如市级商圈）服务种类多、范围广、数量少；低级（社区店）相反，嵌套分布。」 预设回答：「学生说\"为何大商场少而远\"。」 板书时机：黑板写等级。差异化提示：B班记；A班需联图。易错点提醒：等级高→范围大、数量少，反比。"},{"step":"Step 4 电商冲击","time":"8分钟","content":"【PPT P4 电商】教师：「电商弱化实体区位，顾客全球可达，仓储物流成新关键节点。」 预设回答：「学生说\"网购不用去商场\"。」 板书时机：黑板写电商。差异化提示：B班记；A班需析变。易错点提醒：电商使\"地段\"不再绝对重要。"},{"step":"Step 5 新变化","time":"7分钟","content":"【PPT P5 变化】教师：「信息技术催生无人店、远程医疗、外卖平台，服务业突破时空，也更依赖数据与物流。」 预设回答：「学生举\"手机点外卖\"。」 板书时机：黑板写新变。差异化提示：B班记；A班需联。易错点提醒：变化核心是信息网络取代部分地理约束。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：高级中心地数量多于低级( );电商弱化了实体地段作用( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"分析\"。易错点提醒：本章结束，进入交通。"}],"blackboard":"┌── 服务业区位 ──┐\n│ 商业/非商业 │\n│ 因素:市场交通│\n│ 劳力集聚政策│\n│ 高级:范围广少│\n│ 电商:弱地段 │\n│ 新:无人/远程│\n└────────────┘","exercises":"【基础作业】1. 服务业布局首要考虑的因素是__（人口与消费）。2. 判断：高级中心地提供的服务种类少、数量多( )。\n【提高作业】说明信息技术和电子商务对服务业区位选择的主要影响。\n【参考答案——教师用】基础1：市场。基础2：×。提高：电商与信息网络弱化了对实体黄金地段的依赖，服务可达范围扩大至全国全球，仓储物流节点重要性上升，出现无人零售、远程服务等新业态。","reflection":"✅ 亮点：中心地等级用反比讲清；电商案例贴近生活。\n⚠️ 需改进：B班中心地等级仍晕，需多示意。\n📌 下节课衔接：交通运输布局与区域发展。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b2-u4-1","lessonId":"l-geo-b2-u4-1","title":"区域发展对交通运输布局的影响","book":"必修第二册","unitNumber":4,"unitTitle":"交通运输布局与区域发展","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["交通布局","经济带","需求","人教版必修二Ch4","第一课时"],"textbookAnalysis":"区域发展产生交通需求并提供资金技术，决定线路走向、等级与枢纽位置；经济发达、人口密集区线路密、标准高；交通建设也受地形地质造价制约。","overview":"【学情分析】A班：能分析经济如何引导交通布局；B班：常把因果弄反（以为先有交通再有区域）。共同问题：区域对交通的决定作用与限制因素。","objectives":["人地协调观：认识交通建设与环境协调、节约用地。","综合思维：综合需求、资金、地形分析布局。","区域认知：在区域中理解线路走向差异。","地理实践力：能解释本地线路布局原因。"],"keyPoints":"① 需求引导：经济活跃、人口密处线路多等级高。\n② 资金技术：发达地区有能力建高铁大桥。\n③ 限制：地形地质、造价、征地制约选线。\n④ 枢纽：多线交汇成综合枢纽。","difficulties":"① 因果方向。原因：区域需求决定交通，非反之，易倒，需强调。\n② 限制因素。原因：山区造价高致线稀，需联地形。\n③ 枢纽形成。原因：多条线交汇，需图。","teachingMethods":"① 因果图。\n② 东西部对比。\n③ 选线案例（山区桥隧）。\n④ 读图。","preparation":"【PPT课件】P1 需求引导；P2 资金技术；P3 限制因素；P4 枢纽；P5 案例；P6 练习。【地图/图表素材】我国铁路密度分布图、山区交通选线图。","process":[{"step":"Step 1 导入——路随人走","time":"5分钟","content":"【PPT P1 需求】教师：「东部路网密、西部稀，因为哪里人多钱多，路就修哪里——区域决定交通。」 预设回答：「学生说\"西部人少路少\"。」 板书时机：黑板写\"区域→交通\"。差异化提示：B班举例；A班需问因。易错点提醒：是区域需求引导交通，非交通凭空定。"},{"step":"Step 2 需求与等级","time":"9分钟","content":"【PPT P2 需求】教师：「经济活跃、人口密集区运输需求大，线路密、标准高（高铁高速）；偏远区反之。」 预设回答：「学生说\"为何东部高铁多\"。」 板书时机：黑板写需求。差异化提示：B班记；A班需析。易错点提醒：需求大小决定线路密度等级。"},{"step":"Step 3 资金技术","time":"8分钟","content":"【PPT P3 资金】教师：「发达地区有资金技术建跨海桥、长隧，落后地区心有余力不足。」 预设回答：「学生举\"港珠澳大桥\"。」 板书时机：黑板写资金。差异化提示：B班记；A班需联。易错点提醒：技术实现需求，资金保障建设。"},{"step":"Step 4 限制因素","time":"9分钟","content":"【PPT P4 限制】教师：「山区地形陡、地质险、桥隧比高造价贵，选线绕避不良地质，故线稀。」 预设回答：「学生说\"山里为何多隧道\"（降坡避险）。」 板书时机：黑板写限制。差异化提示：B班记；A班需析。易错点提醒：地形地质是硬约束，增造价。"},{"step":"Step 5 枢纽形成","time":"7分钟","content":"【PPT P5 枢纽】教师：「多条线路交汇处形成综合交通枢纽（如郑州、武汉），辐射强。」 预设回答：「学生说\"家乡枢纽城市\"。」 板书时机：黑板写枢纽。差异化提示：B班记；A班需定位。易错点提醒：枢纽因交汇而生，非单线。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：交通布局完全由地形决定与区域无关( );发达地区路网更密( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"分析\"。易错点提醒：下节课学交通对区域的影响。"}],"blackboard":"┌── 区域→交通 ──┐\n│ 需求:密/高等级│\n│ 资金技术保障 │\n│ 限制:地形地质│\n│ 造价高线稀  │\n│ 枢纽:多线汇 │\n└────────────┘","exercises":"【基础作业】1. 交通运输线路的密度和等级主要由区域的__大小决定。2. 判断：山区修路造价低因而线路密集( )。\n【提高作业】为什么我国东部平原地区铁路网密度远高于西部山区？\n【参考答案——教师用】基础1：运输需求（经济/人口）。基础2：×。提高：东部平原人口稠密、经济发达、需求大、地形平坦造价低，故路网密；西部山区地形险、地质复杂、造价高、需求较小，故线稀。","reflection":"✅ 亮点：因果方向强调（区域决定交通）防倒；东西对比直观。\n⚠️ 需改进：B班限制因素只记地形，需补地质造价。\n📌 下节课衔接：交通布局对区域发展的影响。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b2-u4-2","lessonId":"l-geo-b2-u4-2","title":"交通运输布局对区域发展的影响","book":"必修第二册","unitNumber":4,"unitTitle":"交通运输布局与区域发展","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["交通效应","经济带","城镇化","人教版必修二Ch4","第二课时"],"textbookAnalysis":"交通线（如高铁、港口）带动沿线资源开发、聚落与城市成长、产业集聚，形成经济带（如沿海、沿江、京广轴）；也会引发生态影响，需统筹。","overview":"【学情分析】A班：能说明交通线如何塑造经济带与城市；B班：常只看到\"方便出行\"忽视经济拉动。共同问题：交通对产业、城市、区域一体化的作用。","objectives":["人地协调观：认识交通带动发展也需防范生态破坏。","综合思维：综合产业、城市、生态看交通效应。","区域认知：在轴带尺度识别交通经济带。","地理实践力：能解释一条高铁对本地的改变。"],"keyPoints":"① 拉动经济：降低运费、促资源开发与产业布局。\n② 催生产业带：沿线集聚（如高铁新城、港口经济区）。\n③ 促进城镇：站点带起新城、强化城市群联系。\n④ 注意：占地、分割生态，需环评统筹。","difficulties":"① 效应链条。原因：交通→可达→产业→城镇，需串，易断。\n② 经济带。原因：轴带概念抽象，需例（京广/沿江）。\n③ 双刃。原因：有利也有生态代价，需辩证。","teachingMethods":"① 效应链图。\n② 经济带案例。\n③ 城市群联系。\n④ 辩证讨论。","preparation":"【PPT课件】P1 效应总览；P2 产业拉动；P3 城镇成长；P4 经济带；P5 生态代价；P6 练习。【地图/图表素材】交通经济带分布图、高铁新城示意图。","process":[{"step":"Step 1 导入——高铁改变城市","time":"5分钟","content":"【PPT P1 总览】教师：「一条高铁通了，沿线招商、房价、客流全变，交通反塑区域。」 预设回答：「学生说\"家乡通高铁后变化\"。」 板书时机：黑板写\"交通→区域\"。差异化提示：B班举例；A班需问链。易错点提醒：交通是发展的先导与杠杆。"},{"step":"Step 2 产业拉动","time":"9分钟","content":"【PPT P2 产业】教师：「交通降运费、提可达，促资源开发、工厂商贸沿线和港口集聚。」 预设回答：「学生说\"物流园为何靠站\"。」 板书时机：黑板写产业。差异化提示：B班记；A班需析。易错点提醒：可达性是产业落点的关键。"},{"step":"Step 3 城镇成长","time":"9分钟","content":"【PPT P3 城镇】教师：「站点带起高铁新城、强化城市群 daily通勤，小城镇借枢纽复兴。」 预设回答：「学生说\"站点周边起高楼\"。」 板书时机：黑板写城镇。差异化提示：B班记；A班需联群。易错点提醒：枢纽改变城市空间结构。"},{"step":"Step 4 交通经济带","time":"8分钟","content":"【PPT P4 经济带】教师：「沿重要轴线形成经济带：沿海、沿江（长江）、京广、陇海等，串起城市产业。」 预设回答：「学生指\"长江经济带\"。」 板书时机：黑板写轴带。差异化提示：B班记；A班需举。易错点提醒：轴带是线状集聚，非点状。"},{"step":"Step 5 生态代价","time":"7分钟","content":"【PPT P5 生态】教师：「占地、切割栖息地、噪声，需环评、以桥代路、绿色通道统筹。」 预设回答：「学生说\"修路也毁林\"。」 板书时机：黑板写代价。差异化提示：B班记；A班需提措。易错点提醒：发展同时须护生态，不可偏废。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：交通仅方便出行不影响经济( );高铁可促进沿线城镇发展( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"分析\"。易错点提醒：本章结束，进入环境与发展。"}],"blackboard":"┌── 交通→区域 ──┐\n│ 降运费促产业│\n│ 站点起新城  │\n│ 轴带:沿江京广│\n│ 代价:占地生态│\n│ 统筹:绿通道 │\n└────────────┘","exercises":"【基础作业】1. 沿重要交通轴线集聚形成的带状经济区称为交通__。2. 判断：交通运输布局对区域经济发展没有影响( )。\n【提高作业】以某条高铁或干线为例，说明交通建设对沿线区域发展的积极影响。\n【参考答案——教师用】基础1：经济带（或产业带）。基础2：×。提高：如京广高铁，缩短时空、降低物流成本，促进沿线产业集聚与站点新城崛起，强化城市群联系，带动旅游与商贸，缩小区域差距。","reflection":"✅ 亮点：效应链把\"方便\"升到经济拉动；经济带案例具体。\n⚠️ 需改进：B班易忽视生态代价，需辩证。\n📌 下节课衔接：人类面临的主要环境问题。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b2-u5-1","lessonId":"l-geo-b2-u5-1","title":"人类面临的主要环境问题","book":"必修第二册","unitNumber":5,"unitTitle":"环境与发展","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["环境问题","环境污染","生态破坏","人教版必修二Ch5","第一课时"],"textbookAnalysis":"环境问题分环境污染（大气、水、土壤）和生态破坏（森林退化、荒漠化、生物多样性减少）；根源在人口压力、资源不合理利用、片面追求经济增长。","overview":"【学情分析】A班：能区分污染与破坏并溯源；B班：常把\"雾霾\"与\"荒漠化\"混类。共同问题：两类问题区分、成因、案例。","objectives":["人地协调观：正视环境危机，树立保护环境责任。","综合思维：综合人口、经济、技术溯源问题。","区域认知：在区域中识别主要环境问题。","地理实践力：能识别身边环境问题并提出行动。"],"keyPoints":"① 污染：大气（雾霾）、水（河湖富营养）、土壤（重金属）。\n② 破坏：森林减少、草原退化、荒漠化、生物减少。\n③ 根源：人口多、资源浪费、片面增长、技术落后。\n④ 全球：气候变暖、臭氧、跨界污染。","difficulties":"① 污染vs破坏。原因：一为\"排入\"一为\"耗损\"，易混，需对比。\n② 根源。原因：多因交织，需综合，易单面。\n③ 案例归类。原因：需对应到类，易错。","teachingMethods":"① 二类对比。\n② 案例归类。\n③ 成因链。\n④ 本地调查。","preparation":"【PPT课件】P1 问题总览；P2 环境污染；P3 生态破坏；P4 成因；P5 全球问题；P6 练习。【地图/图表素材】世界环境问题分布图、雾霾与荒漠化照片。","process":[{"step":"Step 1 导入——地球在报警","time":"5分钟","content":"【PPT P1 总览】教师：「雾霾、赤潮、沙尘暴、物种消失，都是环境问题在报警。」 预设回答：「学生说身边环境问题。」 板书时机：黑板写\"环境问题\"。差异化提示：B班举例；A班需分类。易错点提醒：环境问题是人地矛盾产物。"},{"step":"Step 2 环境污染","time":"9分钟","content":"【PPT P2 污染】教师：「污染是废弃物超自净排入环境：大气（雾霾PM2.5）、水体（富营养赤潮）、土壤（重金属）。」 预设回答：「学生说\"雾霾属哪类\"（污染）。」 板书时机：黑板写污染。差异化提示：B班记；A班需析。易错点提醒：污染=排放超容量，非资源减少。"},{"step":"Step 3 生态破坏","time":"9分钟","content":"【PPT P3 破坏】教师：「破坏是生态组分被耗损：森林减少、草原退化、荒漠化、生物多样性下降。」 预设回答：「学生说\"沙尘暴对应哪类\"（破坏/荒漠化）。」 板书时机：黑板写破坏。差异化提示：B班记；A班需联。易错点提醒：破坏是\"少了\"，污染是\"脏了\"。"},{"step":"Step 4 成因溯源","time":"8分钟","content":"【PPT P4 成因】教师：「根在人口压力、资源不合理利用、片面追求GDP、技术落后排放高。」 预设回答：「学生说\"为何越富越污染（阶段）\"。」 板书时机：黑板写成因。差异化提示：B班记；A班需链。易错点提醒：主因是人类不合理活动，非自然。"},{"step":"Step 5 全球问题","time":"7分钟","content":"【PPT P5 全球】教师：「气候变暖、臭氧层损耗、跨境酸雨是全球性，需国际合作。」 预设回答：「学生举\"气候大会\"。」 板书时机：黑板写全球。差异化提示：B班记；A班需联。易错点提醒：部分问题无国界，须协作。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：荒漠化属环境污染( );生物多样性减少属生态破坏( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"归类\"。易错点提醒：下节课学可持续发展。"}],"blackboard":"┌── 主要环境问题 ──┐\n│ 污染:排超容量 │\n│ 大气/水/土壤 │\n│ 破坏:组分耗损│\n│ 林草/荒漠/物种│\n│ 根:人口+不合 │\n│ 理利用      │\n└────────────────┘","exercises":"【基础作业】1. 雾霾、赤潮等问题属于__污染类环境问题。2. 判断：土地荒漠化属于环境污染问题( )。\n【提高作业】简述环境问题产生的三大人为原因。\n【参考答案——教师用】基础1：环境（或污染）。基础2：×。提高：①人口持续增长压力大；②自然资源不合理开发利用（滥垦滥伐过度放牧）；③片面追求经济增长、技术落后导致高排放高消耗。","reflection":"✅ 亮点：污染\"脏了\"vs破坏\"少了\"对比好记；成因链清晰。\n⚠️ 需改进：B班案例归类弱，需多练。\n📌 下节课衔接：可持续发展。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b2-u5-2","lessonId":"l-geo-b2-u5-2","title":"走向人地协调——可持续发展","book":"必修第二册","unitNumber":5,"unitTitle":"环境与发展","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["可持续发展","公平性","持续性","人教版必修二Ch5","第二课时"],"textbookAnalysis":"可持续发展是既满足当代又不损后代的发展，三大原则：公平性（代内代际）、持续性（不超承载力）、共同性（全球协作）；内涵含生态、经济、社会可持续发展，生态是基础。","overview":"【学情分析】A班：能区分三原则并举例；B班：常把三原则张冠李戴（如把全球减排当公平）。共同问题：三原则区分、内涵关系。","objectives":["人地协调观：树立可持续发展核心的人地协调观。","综合思维：综合生态经济社会三维理解可持续。","区域认知：在区域发展中落实三原则。","地理实践力：能在生活中践行可持续行动。"],"keyPoints":"① 定义：满足当代不损后代。\n② 三原则：公平（代内代际）、持续（不超环境承载力）、共同（全球协作）。\n③ 内涵：生态可持续（基础）、经济可持续（条件）、社会可持续（目的）。\n④ 行动：循环经济、低碳生活。","difficulties":"① 三原则辨。原因：公平/持续/共同易混，需例配。\n② 内涵关系。原因：生态是基础易漏，需强调。\n③ 定义理解。原因：\"不损后代\"是核心，需点。","teachingMethods":"① 原则对比表。\n② 内涵三角。\n③ 案例配对。\n④ 行动倡议。","preparation":"【PPT课件】P1 定义；P2 三原则；P3 原则案例；P4 内涵；P5 行动；P6 练习。【地图/图表素材】可持续发展三维内涵图、三原则示意图。","process":[{"step":"Step 1 导入——留给子孙什么","time":"5分钟","content":"【PPT P1 定义】教师：「发展不能透支未来，既顾现在又不坑后代，这就是可持续发展。」 预设回答：「学生说\"节约资源给后代\"。」 板书时机：黑板写\"可持续\"。差异化提示：B班听；A班需抠定义。易错点提醒：核心是代际公平、不损后代。"},{"step":"Step 2 三原则","time":"9分钟","content":"【PPT P2 原则】教师：「公平（同代与代际共享）、持续（不超环境承载力）、共同（全球一起行动）。」 预设回答：「学生记三原则名。」 板书时机：黑板写原则。差异化提示：B班记；A班需析。易错点提醒：三原则各有侧重，勿串。"},{"step":"Step 3 原则案例","time":"9分钟","content":"【PPT P3 案例】教师：「代际公平如保护资源；持续性如限捕休渔；共同性如巴黎协定全球减排。」 预设回答：「学生配对\"减排属共同\"。」 板书时机：黑板写案例。差异化提示：B班记；A班需配对。易错点提醒：全球协定对应共同性，非公平。"},{"step":"Step 4 三维内涵","time":"8分钟","content":"【PPT P4 内涵】教师：「生态可持续是基础、经济可持续是条件、社会可持续是目的，三者统一。」 预设回答：「学生说\"为何生态是基础\"。」 板书时机：黑板写内涵。差异化提示：B班记；A班需联。易错点提醒：生态崩溃则经济社会的可持续无从谈起。"},{"step":"Step 5 行动","time":"7分钟","content":"【PPT P5 行动】教师：「推行循环经济、清洁生产、低碳出行与消费，从国家到个人落实。」 预设回答：「学生说\"自己能做的环保事\"。」 板书时机：黑板写行动。差异化提示：B班记；A班需倡。易错点提醒：可持续需人人行动，非空口号。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：公平性原则指全球共同行动( );生态可持续是基础( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"举例\"。易错点提醒：下节课学国家战略。"}],"blackboard":"┌── 可持续 ──┐\n│ 定义:不损后代│\n│ 公平:代内代际│\n│ 持续:不超承载│\n│ 共同:全球协 │\n│ 内涵:生态基 │\n│ 经济条/社会目│\n└────────────┘","exercises":"【基础作业】1. 可持续发展三大原则：公平性、持续性和__性。2. 判断：全球气候协定体现的是公平性原则( )。\n【提高作业】说明可持续发展三维内涵之间的关系。\n【参考答案——教师用】基础1：共同。基础2：×。提高：生态可持续是基础（环境支撑）、经济可持续是条件（物质基础）、社会可持续是目的（人的福祉），三者相互联系缺一不可。","reflection":"✅ 亮点：三原则配案例防串；三维三角直观。\n⚠️ 需改进：B班三原则仍混，需反复配对练习。\n📌 下节课衔接：主体功能区与生态文明战略。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b2-u5-3","lessonId":"l-geo-b2-u5-3","title":"主体功能区与生态文明战略","book":"必修第二册","unitNumber":5,"unitTitle":"环境与发展","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["主体功能区","优化开发","禁止开发","人教版必修二Ch5","第三课时"],"textbookAnalysis":"我国按资源环境承载力与开发密度划分主体功能区：优化开发、重点开发、限制开发（农产品/生态）、禁止开发（自然保护区），因地制宜分类施策，建设生态文明。","overview":"【学情分析】A班：能说四类主体功能区并举例；B班：常把\"限制开发\"误解为\"不许发展\"。共同问题：四类区分、定位。","objectives":["人地协调观：认识分类施策，树立生态文明理念。","综合思维：综合承载力与现有开发定位功能。","区域认知：在国土尺度识别四类功能区。","地理实践力：能判断本地所属主体功能并提建议。"],"keyPoints":"① 优化开发：经济密、资源紧，提质量。\n② 重点开发：有潜力，集聚产业人口。\n③ 限制开发：农产品主产/生态脆弱，护本底。\n④ 禁止开发：自然保护核心，严格保护。","difficulties":"① 四类区分。原因：名称近易混，需对比定位。\n② 限制≠不许。原因：限制开发指限制大规模工业化，非不发展，需澄清。\n③ 禁止区。原因：即自然保护核心，需点。","teachingMethods":"① 四类对比表。\n② 地图定位。\n③ 案例（三江源/长三角）。\n④ 讨论。","preparation":"【PPT课件】P1 划分依据；P2 四类；P3 优化重点；P4 限制禁止；P5 生态文明；P6 练习。【地图/图表素材】我国主体功能区规划图、三江源保护区图。","process":[{"step":"Step 1 导入——国土分块管","time":"5分钟","content":"【PPT P1 依据】教师：「国土不是到处都搞工厂，按承载力与已有开发分四类区，分类管。」 预设回答：「学生说\"老家是粮区\"。」 板书时机：黑板写\"主体功能区\"。差异化提示：B班听；A班需问据。易错点提醒：划分依据为承载力+开发密度+发展潜力。"},{"step":"Step 2 四类总览","time":"9分钟","content":"【PPT P2 四类】教师：「优化、重点、限制、禁止四类，对应不同开发与保护强度。」 预设回答：「学生记四类名。」 板书时机：黑板写四类。差异化提示：B班记；A班需析。易错点提醒：四类强度递减，保护递增。"},{"step":"Step 3 优化与重点","time":"9分钟","content":"【PPT P3 优重】教师：「优化开发区（长三角等）经济密资源紧，提质量优结构；重点开发区潜力大，集聚产业人口。」 预设回答：「学生说\"为何老家被列重点\"。」 板书时机：黑板写优重。差异化提示：B班记；A班需定位。易错点提醒：优化是\"提质\"非\"扩张\"。"},{"step":"Step 4 限制与禁止","time":"8分钟","content":"【PPT P4 限禁】教师：「限制开发指限制大规模工业化城镇化（如农产品区、生态脆弱区）；禁止开发是自然保护区核心，严格保护。」 预设回答：「学生说\"三江源属哪类\"（禁止/限制）。」 板书时机：黑板写限禁。差异化提示：B班记；A班需析。易错点提醒：限制开发≠不发展，是限制不当开发。"},{"step":"Step 5 生态文明","time":"7分钟","content":"【PPT P5 生态】教师：「分类施策是生态文明体现：守住生态底线，实现绿色发展。」 预设回答：「学生说\"绿色生活\"。」 板书时机：黑板写生态。差异化提示：B班记；A班需联。易错点提醒：目标是人与自然和谐。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：限制开发区就是完全不许任何发展( );禁止开发区多为自然保护核心( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"判断\"。易错点提醒：下节课学海洋权益与一带一路。"}],"blackboard":"┌── 主体功能区 ──┐\n│ 优化:提质   │\n│ 重点:集聚   │\n│ 限制:限不当开│\n│ 禁止:严格保 │\n│ 生态文明导向│\n└────────────┘","exercises":"【基础作业】1. 长江三角洲地区多属于__开发区域（主体功能区类型）。2. 判断：限制开发区意味着完全禁止一切人类活动( )。\n【提高作业】说明主体功能区划分对生态文明建设的重要意义。\n【参考答案——教师用】基础1：优化。基础2：×。提高：按承载力分类施策，优化区提质、重点区集聚、限制区护本底、禁止区严保，守住生态底线，实现因地制宜的绿色发展。","reflection":"✅ 亮点：\"限制≠不许\"正误澄清；四类强度梯度好记。\n⚠️ 需改进：B班四类定位弱，需多图。\n📌 下节课衔接：海洋权益与一带一路战略。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-b2-u5-4","lessonId":"l-geo-b2-u5-4","title":"海洋权益与一带一路战略","book":"必修第二册","unitNumber":5,"unitTitle":"环境与发展","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高一","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["海洋权益","一带一路","东盟","人教版必修二Ch5","第四课时"],"textbookAnalysis":"我国主张领海、毗连区、专属经济区、大陆架等海洋权益；\"一带一路\"通过陆海联通促进国际合作与区域发展，建设海陆统筹的开放格局。","overview":"【学情分析】A班：能说海洋权益层级与一带一路意义；B班：常把\"专属经济区\"当\"领海\"（宽度误）。共同问题：权益范围、战略内涵。","objectives":["人地协调观：树立海洋强国意识与和平合作理念。","综合思维：综合海洋权益与开放发展看战略。","区域认知：在地图上识海洋权益范围与一带一路走向。","地理实践力：能读图说明一带一路的地理格局。"],"keyPoints":"① 权益：领海12海里、毗连区24、专属经济区200海里、大陆架。\n② 一带一路：丝绸之路经济带+21世纪海上丝路，联通亚欧非。\n③ 意义：促贸易、产能合作、基础设施互联互通。\n④ 原则：共商共建共享。","difficulties":"① 权益宽度。原因：各带海里数易混，需记。\n② 专属vs领海。原因：主权程度不同，易错，需分。\n③ 战略意义。原因：多维（经济政治），易空，需具体。","teachingMethods":"① 权益层级图。\n② 一带一路地图。\n③ 案例（中欧班列）。\n④ 讨论。","preparation":"【PPT课件】P1 海洋权益；P2 权益范围；P3 一带一路；P4 走向；P5 意义；P6 练习。【地图/图表素材】我国海洋权益示意图、一带一路路线图。","process":[{"step":"Step 1 导入——向海图强","time":"5分钟","content":"【PPT P1 权益】教师：「我国是海洋大国，依法享有领海、专属经济区等权益，向海图强。」 预设回答：「学生说\"海边是我国的吗\"。」 板书时机：黑板写\"海洋权益\"。差异化提示：B班听；A班需问范围。易错点提醒：不同海域权利不同，非都主权。"},{"step":"Step 2 权益范围","time":"9分钟","content":"【PPT P2 范围】教师：「领海12海里（主权）、毗连区24、专属经济区200海里（资源权）、大陆架可外扩。」 预设回答：「学生记各宽度。」 板书时机：黑板写范围。差异化提示：B班记；A班需分权。易错点提醒：专属经济区非领海，资源主权非全面主权。"},{"step":"Step 3 一带一路","time":"9分钟","content":"【PPT P3 一带】教师：「一带一路=丝绸之路经济带+21世纪海上丝路，陆海联动联通亚欧非，促互联互通。」 预设回答：「学生说\"中欧班列\"。」 板书时机：黑板写一带。差异化提示：B班记；A班需联图。易错点提醒：是合作倡议非援助，共商共建。"},{"step":"Step 4 走向与节点","time":"8分钟","content":"【PPT P4 走向】教师：「陆上经中亚欧洲，海上经东南亚南亚非洲，节点为港口与枢纽城市。」 预设回答：「学生指\"海上丝路过哪\"（东南亚）。」 板书时机：黑板写走向。差异化提示：B班记；A班需定位。易错点提醒：海陆两线均过区域枢纽。"},{"step":"Step 5 战略意义","time":"7分钟","content":"【PPT P5 意义】教师：「拓展市场、产能合作、基建联通、稳能源通道，构建人类命运共同体。」 预设回答：「学生说\"对我国好处\"。」 板书时机：黑板写意义。差异化提示：B班记；A班需析。易错点提醒：互利共赢，非单方面受益。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：我国领海宽度为200海里( );一带一路只包含海上丝路( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"读图\"。易错点提醒：必修二全册结束。"}],"blackboard":"┌── 海洋与一带一路 ──┐\n│ 领海12/毗连24 │\n│ 专属200海里  │\n│ 一带:陆+海丝 │\n│ 节点:港枢纽  │\n│ 意义:互联互通│\n│ 共赢       │\n└──────────────────┘","exercises":"【基础作业】1. 我国主张的领海宽度是__海里。2. 判断：\"一带一路\"仅指21世纪海上丝绸之路( )。\n【提高作业】简述\"一带一路\"倡议对我国区域发展的地理意义。\n【参考答案——教师用】基础1：12。基础2：×。提高：陆海联动拓展国际市场、推动产能与基建合作、稳定资源能源通道、促进内陆沿边开放与东西双向开放格局。","reflection":"✅ 亮点：权益宽度逐条记清；一带一路陆海双线明确。\n⚠️ 需改进：B班专属经济区与领海权混，需强调主权差异。\n📌 下节课衔接：进入选择性必修一 自然地理基础。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx1-u1-1","lessonId":"l-geo-sx1-u1-1","title":"地球的自转和公转","book":"选择性必修1 自然地理基础","unitNumber":1,"unitTitle":"地球的运动","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["自转","公转","黄赤交角","人教版选必一Ch1","第一课时"],"textbookAnalysis":"地球自转方向自西向东、周期1日、速度南/北极点为零；公转方向同向、轨道近圆、周期1年、速度近日快远日慢；黄赤交角约23°26′，导致太阳直射点回归运动。","overview":"【学情分析】A班：能说速度规律与黄赤交角意义；B班：常把自转方向记反（侧视北极应逆时针）。共同问题：方向、速度、黄赤交角。","objectives":["人地协调观：认识地球运动规律，理解四季更替的自然基础。","综合思维：综合自转公转特征分析其地理意义。","区域认知：从极地视角判读自转方向。","地理实践力：能用地球仪演示自转公转并测方向。"],"keyPoints":"① 自转：自西向东，北极俯视逆时针；1日；角速度除极点外15°/h。\n② 公转：同向；椭圆轨道；1年；近日点（1月）快、远日点（7月）慢。\n③ 黄赤交角：赤道面与黄道面夹角约23°26′。\n④ 意义：黄赤交角→太阳直射点回归运动→四季五带。","difficulties":"① 自转方向。原因：侧视与俯视不同，易反，需演示。\n② 速度变化。原因：公转快慢随日地距，易错，需图。\n③ 黄赤交角。原因：是四季根源，抽象，需强调。","teachingMethods":"① 地球仪演示。\n② 极视判向。\n③ 轨道动画。\n④ 交角图解。","preparation":"【PPT课件】P1 自转特征；P2 俯视方向；P3 公转特征；P4 速度变化；P5 黄赤交角；P6 练习。【地图/图表素材】地球自转方向图、公转轨道与速度图、黄赤交角示意图。","process":[{"step":"Step 1 导入——日月星辰东升西落","time":"5分钟","content":"【PPT P1 自转】教师：「东升西落是地球自西向东自转的错觉，像坐车看树后退。」 预设回答：「学生说\"地球在转\"。」 板书时机：黑板写\"自转\"。差异化提示：B班听；A班需问方向。易错点提醒：天体东升西落因地球自转，非天体绕地。"},{"step":"Step 2 自转方向与速度","time":"9分钟","content":"【PPT P2 方向】教师：「自转自西向东，北极俯视逆时针、南极顺时针；角速度除两极点外均15°/h，线速度赤道最大向两极减。」 预设回答：「学生用地球仪演示俯视方向。」 板书时机：黑板写速度。差异化提示：B班记；A班需说极点。易错点提醒：极点角线速度均为0；俯视方向别反。"},{"step":"Step 3 公转特征","time":"9分钟","content":"【PPT P3 公转】教师：「公转同向、轨道近椭圆、周期1年；近日点（1月初）速度快、远日点（7月初）慢。」 预设回答：「学生说\"为何1月最冷非最近日\"（看半球）。」 板书时机：黑板写公转。差异化提示：B班记；A班需析。易错点提醒：速度近日快远日慢，与季节冷热非直接对应。"},{"step":"Step 4 黄赤交角","time":"9分钟","content":"【PPT P4 交角】教师：「赤道面与黄道面夹角约23°26′，使地轴倾斜，是太阳直射点移动与四季的根因。」 预设回答：「学生说\"若无交角会怎样\"（无四季）。」 板书时机：黑板写交角。差异化提示：B班记；A班需联。易错点提醒：黄赤交角大小决定回归线纬度。"},{"step":"Step 5 直射点移动","time":"7分钟","content":"【PPT P5 直射】教师：「因黄赤交角，太阳直射点在南北回归线间来回，周期1年，称回归运动。」 预设回答：「学生描直射点轨迹。」 板书时机：黑板写移动。差异化提示：B班记；A班需说范围。易错点提醒：直射点最北23°26′N（夏至）、最南23°26′S（冬至）。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：北极俯视自转顺时针( );黄赤交角约23°26′( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"演示\"。易错点提醒：下节课学昼夜交替与地方时。"}],"blackboard":"┌── 自转与公转 ──┐\n│ 自转:自西向东│\n│ 北极:逆时针  │\n│ 角速15°/h(极0)│\n│ 公转:近圆1年│\n│ 近日快远日慢│\n│ 黄赤交角23°26│\n└────────────┘","exercises":"【基础作业】1. 地球自转的角速度除__点外均为约15°/小时。2. 判断：地球公转速度在远日点（7月）最快( )。\n【提高作业】若黄赤交角变为0°，地球上还有四季更替吗？为什么？\n【参考答案——教师用】基础1：两极（南北极点）。基础2：×。提高：无。黄赤交角为0时地轴垂直公转面，太阳终年直射赤道，各地正午太阳高度与昼夜长短不变，无四季。","reflection":"✅ 亮点：地球仪演示破解方向误区；黄赤交角与四季因果清楚。\n⚠️ 需改进：B班俯视方向仍反，需多演示。\n📌 下节课衔接：昼夜交替与地方时、地转偏向力。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx1-u1-2","lessonId":"l-geo-sx1-u1-2","title":"昼夜交替与地方时、地转偏向力","book":"选择性必修1 自然地理基础","unitNumber":1,"unitTitle":"地球的运动","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["昼夜交替","地方时","区时","地转偏向力","人教版选必一Ch1","第二课时"],"textbookAnalysis":"地球自转产生昼夜交替（周期24h）；不同经度地方时不同，东早西晚，15°/h；全球分24区，相邻区时差1h；沿地表水平运动物体受地转偏向力，北半球右偏、南半球左偏。","overview":"【学情分析】A班：能计算地方时与区时、判断偏向；B班：常把\"东早西晚\"记反，偏向左右弄错。共同问题：时差计算、偏向规律。","objectives":["人地协调观：认识时间秩序对生活与国际协作的意义。","综合思维：综合经度与自转分析时差与偏向。","区域认知：在经度上定位时间差异。","地理实践力：会算地方时区时、判水流偏向。"],"keyPoints":"① 昼夜交替：自转致晨昏线移动，周期24h。\n② 地方时：经度每差15°差1h，东早西晚。\n③ 区时：24时区，各取中央经线时间，邻区差1h。\n④ 偏向：北右南左，赤道不偏，影响风河流。","difficulties":"① 东早西晚。原因：易记反，需强调\"东边先见日出\"。\n② 区时计算。原因：跨时区需加减，易错，需练。\n③ 偏向左右。原因：北右南左，易反，需口诀。","teachingMethods":"① 晨昏线动画。\n② 时差计算练习。\n③ 偏向实验（水池漏）。\n④ 口诀法。","preparation":"【PPT课件】P1 昼夜交替；P2 地方时；P3 区时；P4 计算；P5 地转偏向；P6 练习。【地图/图表素材】世界时区图、晨昏线图、地转偏向示意图。","process":[{"step":"Step 1 导入——为什么新疆天黑晚","time":"5分钟","content":"【PPT P1 昼夜】教师：「同是晚8点，东部天黑新疆还亮，这是经度不同致地方时不同。」 预设回答：「学生说\"新疆在西边\"。」 板书时机：黑板写\"时差\"。差异化提示：B班举例；A班需问因。易错点提醒：昼夜交替由自转，时差由经度差。"},{"step":"Step 2 地方时","time":"9分钟","content":"【PPT P2 地方时】教师：「经度每差15°地方时差1小时，东边先日出故东早西晚。」 预设回答：「学生算\"北京比乌鲁木齐早约2h\"。」 板书时机：黑板写规律。差异化提示：B班记；A班需算。易错点提醒：东早西晚，别记反。"},{"step":"Step 3 区时","time":"9分钟","content":"【PPT P3 区时】教师：「全球24时区，每区跨15°，取中央经线地方时为区时，相邻区差1h，东加西减。」 预设回答：「学生查北京（东8）与伦敦（中时）差8h。」 板书时机：黑板写时区。差异化提示：B班记；A班需算。易错点提醒：过日界线日期要变（东减西加）。"},{"step":"Step 4 时差计算","time":"8分钟","content":"【PPT P4 计算】教师：「求B地时间=已知地±时差（东加西减），先定时区再算。」 预设回答：「学生做\"纽约此刻几点\"题。」 板书时机：黑板写步骤。差异化提示：B班记；A班需练。易错点提醒：先判东西再加减，方向错全错。"},{"step":"Step 5 地转偏向力","time":"8分钟","content":"【PPT P5 偏向】教师：「水平运动物体受地转偏向力：北半球右偏、南半球左偏、赤道不偏，使河流侵蚀岸偏移。」 预设回答：「学生用\"北右南左\"判河岸。」 板书时机：黑板写偏向。差异化提示：B班记；A班需用。易错点提醒：是运动方向右/左偏，非指向。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：西边地方时比东边早( );北半球水平运动右偏( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"计算\"。易错点提醒：下节课学昼夜长短变化。"}],"blackboard":"┌── 时差与偏向 ──┐\n│ 地方时:东早西晚│\n│ 15°=1h      │\n│ 区时:24区邻1│\n│ 计算:东加西减│\n│ 偏向:北右南左│\n│ 赤道不偏    │\n└────────────┘","exercises":"【基础作业】1. 经度相差15°，地方时相差__小时。2. 判断：受地转偏向力，南半球水平运动物体向左偏( )。\n【提高作业】当北京（东8区）为12点时，伦敦（中时区）是几点？并说明计算思路。\n【参考答案——教师用】基础1：1。基础2：√。提高：伦敦在西8个时区，12-8=4点（东加西减），故伦敦为4点。","reflection":"✅ 亮点：新疆案例亲切；偏向口诀防反。\n⚠️ 需改进：B班区时计算仍弱，需多步练习。\n📌 下节课衔接：昼夜长短的变化。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx1-u1-3","lessonId":"l-geo-sx1-u1-3","title":"昼夜长短的变化","book":"选择性必修1 自然地理基础","unitNumber":1,"unitTitle":"地球的运动","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["昼夜长短","夏至","冬至","极昼","人教版选必一Ch1","第三课时"],"textbookAnalysis":"太阳直射点移动使昼夜长短随纬度季节变化：夏半年北半球昼长夜短、纬度越高昼越长，夏至昼最长；冬半年相反；赤道全年平分，极圈有极昼极夜。","overview":"【学情分析】A班：能画图说昼夜长短纬度季节变化；B班：常把\"夏至北半球昼最长\"记成南半球。共同问题：长短规律与极值、极昼极夜范围。","objectives":["人地协调观：认识光照节律对生物与农业的影响。","综合思维：综合直射点移动分析昼夜长短。","区域认知：在纬度上比较昼夜长短差异。","地理实践力：能读光照图判昼夜长短。"],"keyPoints":"① 夏半年（直射北半球）：北昼长夜短，纬度越高昼越长，北极圈极昼。\n② 冬半年：相反，北极圈极夜。\n③ 二分日：全球昼夜平分。\n④ 极值：夏至北昼最长、冬至南昼最长。","difficulties":"① 半球对应。原因：夏半年北昼长，易记反，需联直射点。\n② 纬度递变。原因：越高昼越长（夏），易错，需图。\n③ 极昼范围。原因：随直射点纬度变，需点。","teachingMethods":"① 光照图演示。\n② 直射点联律。\n③ 极值表。\n④ 读图训练。","preparation":"【PPT课件】P1 夏半年；P2 冬半年；P3 二分日；P4 极值；P5 极昼极夜；P6 练习。【地图/图表素材】不同节气光照图、昼夜长短纬度变化曲线图。","process":[{"step":"Step 1 导入——夏天为何天长","time":"5分钟","content":"【PPT P1 夏半】教师：「夏天早起晚落、冬天短，因太阳直射点南北移导致昼夜长短变。」 预设回答：「学生说\"夏天白天长\"。」 板书时机：黑板写\"昼长\"。差异化提示：B班举例；A班需问因。易错点提醒：长短源于直射点所在半球。"},{"step":"Step 2 夏半年规律","time":"9分钟","content":"【PPT P2 夏半】教师：「直射北半球时，北半球昼长夜短，且纬度越高昼越长，北极圈内极昼。」 预设回答：「学生说\"哈尔滨夏天比广州昼长\"。」 板书时机：黑板写夏半。差异化提示：B班记；A班需联纬。易错点提醒：夏半年北半球越高昼越长，非越低。"},{"step":"Step 3 冬半年与二分","time":"9分钟","content":"【PPT P3 冬分】教师：「直射南半球时北半球昼短夜长、越高越短；春分秋分全球昼夜平分。」 预设回答：「学生说\"赤道全年平分\"。」 板书时机：黑板写冬分。差异化提示：B班记；A班需对。易错点提醒：二分日晨昏线过两极，全球均分。"},{"step":"Step 4 极值","time":"8分钟","content":"【PPT P4 极值】教师：「夏至（6.22）北半球昼最长夜最短、南半球相反；冬至相反；南半球与北相反。」 预设回答：「学生填极值表。」 板书时机：黑板写极值。差异化提示：B班记；A班需表。易错点提醒：北夏至最长，南冬至最长，勿串半球。"},{"step":"Step 5 极昼极夜","time":"7分钟","content":"【PPT P5 极昼】教师：「极昼极夜出现在极圈内，范围随直射点纬度增大而扩大，夏至到北极圈。」 预设回答：「学生说\"极昼在哪\"（夏北极）。」 板书时机：黑板写范围。差异化提示：B班记；A班需联。易错点提醒：极圈是极昼极夜边界，非极点独有。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：夏至日南极圈内为极昼( );纬度越高夏半年昼越长( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"画图\"。易错点提醒：下节课学正午太阳高度。"}],"blackboard":"┌── 昼夜长短 ──┐\n│ 夏半:北昼长  │\n│ 越高昼越长  │\n│ 冬半:北昼短  │\n│ 二分:全球平 │\n│ 夏至北最长  │\n│ 极昼:夏北极 │\n└────────────┘","exercises":"【基础作业】1. 北半球昼最长、夜最短的节气是__。2. 判断：春分日全球昼夜长短相等( )。\n【提高作业】说明北半球纬度越高，夏半年白昼越长的成因。\n【参考答案——教师用】基础1：夏至（或夏至日）。基础2：√。提高：夏半年太阳直射北半球，晨昏线倾斜使北半球纬线圈被昼弧覆盖比例随纬度升高而增大，故越高昼越长。","reflection":"✅ 亮点：光照图直观；极值表防串半球。\n⚠️ 需改进：B班极昼范围随直射点变仍晕，需动画。\n📌 下节课衔接：正午太阳高度与四季五带。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx1-u1-4","lessonId":"l-geo-sx1-u1-4","title":"正午太阳高度与四季五带","book":"选择性必修1 自然地理基础","unitNumber":1,"unitTitle":"地球的运动","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["正午太阳高度","四季","五带","人教版选必一Ch1","第四课时"],"textbookAnalysis":"正午太阳高度从直射点向南北递减，公式H=90°-纬度差；夏至北回归线以北最大、冬至最小；据此划分五带（热、温、寒），四季因直射点移动与高度/昼长变化形成。","overview":"【学情分析】A班：能计算正午太阳高度并解释楼距；B班：常把\"纬度差\"算错（同半球相减异半球相加）。共同问题：高度计算、五带界线。","objectives":["人地协调观：认识太阳能利用与建筑朝向的地理依据。","综合思维：综合纬度与直射点分析太阳高度。","区域认知：在纬度上认识五带分布。","地理实践力：会算正午太阳高度并用于楼距设计。"],"keyPoints":"① 分布：从直射点向南北递减。\n② 公式：H=90°-|φ-δ|（φ当地纬，δ直射纬）。\n③ 季节：北回归线以北夏至最大冬至最小。\n④ 五带：热带（回归线间）、温带、寒带（极圈内）。","difficulties":"① 纬度差。原因：同减异加易错，需练。\n② 公式符号。原因：绝对值别漏，需强调。\n③ 五带界。原因：回归线与极圈位置，需记。","teachingMethods":"① 公式推导。\n② 计算练习。\n③ 五带图。\n④ 楼距应用。","preparation":"【PPT课件】P1 高度分布；P2 公式；P3 季节变化；P4 计算；P5 五带；P6 练习。【地图/图表素材】正午太阳高度纬度分布图、五带划分图、楼距示意图。","process":[{"step":"Step 1 导入——影子长短的秘密","time":"5分钟","content":"【PPT P1 分布】教师：「正午影子夏短冬长，因正午太阳高度随季节变，从直射点向南北递减。」 预设回答：「学生说\"夏天影子短\"。」 板书时机：黑板写\"太阳高度\"。差异化提示：B班举例；A班需问律。易错点提醒：高度大则影子短、受热强。"},{"step":"Step 2 公式","time":"9分钟","content":"【PPT P2 公式】教师：「H=90°-|当地纬-直射纬|，纬度差同半球相减、异半球相加，取绝对。」 预设回答：「学生算\"北京夏至高度\"。」 板书时机：黑板写公式。差异化提示：B班记；A班需算。易错点提醒：纬度差是绝对值，符号别漏。"},{"step":"Step 3 季节变化","time":"9分钟","content":"【PPT P3 季节】教师：「北回归线以北地区夏至高度最大、冬至最小；回归线间有两次直射。」 预设回答：「学生说\"广州有直射而北京无\"。」 板书时机：黑板写季节。差异化提示：B班记；A班需析。易错点提醒：回归线间一年两直射，高度可超90°取90。"},{"step":"Step 4 楼距应用","time":"8分钟","content":"【PPT P4 楼距】教师：「前楼不挡后楼底窗，楼距应依冬至日最小太阳高度设计，高度越小楼距越大。」 预设回答：「学生说\"北方楼距更大\"。」 板书时机：黑板写应用。差异化提示：B班记；A班需算。易错点提醒：用最小高度（冬至）定最大楼距。"},{"step":"Step 5 五带划分","time":"7分钟","content":"【PPT P5 五带】教师：「回归线间为热带、回归线至极圈为温带、极圈内为寒带；界线由黄赤交角定。」 预设回答：「学生指五带位置。」 板书时机：黑板写五带。差异化提示：B班记；A班需联。易错点提醒：温带无直射无极昼，寒带有极昼。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：热带在南北回归线之间( );北京夏至正午高度最小( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"计算\"。易错点提醒：本章结束，进入地表形态。"}],"blackboard":"┌── 太阳高度五带 ──┐\n│ H=90°-|φ-δ| │\n│ 同减异加    │\n│ 夏至北最大  │\n│ 楼距:用冬至 │\n│ 五带:热温带寒│\n└────────────────┘","exercises":"【基础作业】1. 正午太阳高度从太阳__点向南北两侧递减。2. 判断：北回归线以北地区冬至日正午太阳高度最大( )。\n【提高作业】计算北京（40°N）夏至日（δ=23°26′N）的正午太阳高度，并说明对楼距的意义。\n【参考答案——教师用】基础1：直射。基础2：×。提高：H=90°-|40-23°26′|=73°26′；该日为北京全年高度较大（夏至最大），实际楼距应以冬至最小高度（26°34′）为设计依据，保证底层采光。","reflection":"✅ 亮点：公式+楼距应用落到生活；五带界线清楚。\n⚠️ 需改进：B班纬度差同减异加仍错，需多练。\n📌 下节课衔接：第二章 地表形态的塑造。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx1-u2-1","lessonId":"l-geo-sx1-u2-1","title":"塑造地表形态的内外力作用","book":"选择性必修1 自然地理基础","unitNumber":2,"unitTitle":"地表形态的塑造","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["内力作用","外力作用","地壳运动","人教版选必一Ch2","第一课时"],"textbookAnalysis":"内力作用（地壳运动、岩浆活动、变质）使地表高低起伏；外力作用（风化、侵蚀、搬运、堆积）削高填低；二者共同作用塑造地表，内力为主导、外力为修饰。","overview":"【学情分析】A班：能区分内外力并举例；B班：常把\"流水\"当内力（实为外力）。共同问题：内外力类型与关系。","objectives":["人地协调观：认识地表是内外力长期作用的产物。","综合思维：综合内外力分析地貌发育。","区域认知：在区域中识别内外力主导地貌。","地理实践力：能据景观判断内外力作用。"],"keyPoints":"① 内力：地壳运动（水平/垂直）、岩浆、变质——造山造盆，使起伏。\n② 外力：风化、侵蚀、搬运、堆积——削高填低。\n③ 关系：内力为主导奠定格局，外力修饰。\n④ 案例：喜马拉雅（内力抬升）、华北平原因堆积。","difficulties":"① 内外区分。原因：能量来源不同（地球内/外），易混，需讲。\n② 谁主导。原因：内力定格局、外力雕塑，需分层。\n③ 外力四环节。原因：风化在前、堆积在后，顺序易乱，需链。","teachingMethods":"① 能量来源对比。\n② 作用链图。\n③ 案例。\n④ 景观判读。","preparation":"【PPT课件】P1 内力；P2 外力；P3 作用链；P4 关系；P5 案例；P6 练习。【地图/图表素材】内力地貌（山脉）与外力地貌（平原）对比图、外力作用环节图。","process":[{"step":"Step 1 导入——高山与平原的来历","time":"5分钟","content":"【PPT P1 内力】教师：「高山因地下能量顶起，平原因外力搬运堆积，地表是内外力合塑。」 预设回答：「学生说\"山从地里起\"。」 板书时机：黑板写\"内外力\"。差异化提示：B班举例；A班需问源。易错点提醒：内力来自地球内部，外力来自太阳能等。"},{"step":"Step 2 内力作用","time":"9分钟","content":"【PPT P2 内力】教师：「地壳运动（褶皱断层）、岩浆喷发、变质作用，使地表隆起或凹陷，奠定大势。」 预设回答：「学生说\"火山是内力\"。」 板书时机：黑板写内力。差异化提示：B班记；A班需分。易错点提醒：内力使地表高低起伏，是格局主导。"},{"step":"Step 3 外力环节","time":"9分钟","content":"【PPT P3 外力】教师：「风化破碎→侵蚀带走→搬运→堆积，四环节连续，削高填低、雕塑细节。」 预设回答：「学生排外力四环节。」 板书时机：黑板写环节。差异化提示：B班记；A班需链。易错点提醒：风化是前提，堆积是终点。"},{"step":"Step 4 内外关系","time":"8分钟","content":"【PPT P4 关系】教师：「内力主导造大格局，外力持续修饰，二者对立统一共塑地表。」 预设回答：「学生说\"山抬升、风削平\"。」 板书时机：黑板写关系。差异化提示：B班记；A班需析。易错点提醒：内力为主、外力为辅，缺一不可。"},{"step":"Step 5 案例","time":"7分钟","content":"【PPT P5 案例】教师：「喜马拉雅由板块挤压抬升（内力），华北平原因黄河等堆积（外力），体现合力。」 预设回答：「学生辨两例内外力。」 板书时机：黑板写案例。差异化提示：B班记；A班需联。易错点提醒：同一地貌常是内外力先后作用结果。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：流水侵蚀属内力作用( );内力使地表趋于平坦( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"判读\"。易错点提醒：下节课学构造地貌。"}],"blackboard":"┌── 内外力作用 ──┐\n│ 内力:壳运岩浆│\n│ 变质→造起伏 │\n│ 外力:风化蚀 │\n│ 搬运堆积→平 │\n│ 内主外辅   │\n└────────────┘","exercises":"【基础作业】1. 使地表变得高低起伏、奠定地貌格局的作用主要是__力作用。2. 判断：风化、侵蚀、搬运、堆积属于内力作用( )。\n【提高作业】说明内力作用与外力作用在地表形态塑造中的关系。\n【参考答案——教师用】基础1：内。基础2：×。提高：内力作用（地壳运动等）使地表隆起或凹陷，主导大格局；外力作用削高填低、雕塑细节；二者对立统一，共同塑造现今地表。","reflection":"✅ 亮点：能量来源对比破内混外；关系分层清晰。\n⚠️ 需改进：B班仍把流水当内力，需反复强调。\n📌 下节课衔接：构造地貌的形成。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx1-u2-2","lessonId":"l-geo-sx1-u2-2","title":"构造地貌的形成","book":"选择性必修1 自然地理基础","unitNumber":2,"unitTitle":"地表形态的塑造","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["褶皱","背斜","断层","人教版选必一Ch2","第二课时"],"textbookAnalysis":"岩层受挤压弯曲成褶皱：背斜拱起（岩层中心老两翼新，常成山亦可成谷）、向斜凹陷（中心新，常成谷亦可成山）；断层是岩层断裂错动，上升成断块山、下降成谷地或盆地。","overview":"【学情分析】A班：能据岩层新老判背斜向斜并说\"背斜成谷\"原因；B班：常把\"背斜=山\"绝对化（忽略侵蚀反转）。共同问题：背斜向斜判据、断层地貌。","objectives":["人地协调观：认识地质构造对工程选址的意义。","综合思维：综合岩层新老与受力分析构造。","区域认知：在区域中识别褶皱断层地貌。","地理实践力：能读地质图判背斜向斜与断层。"],"keyPoints":"① 背斜：岩层上拱，中心老两翼新。\n② 向斜：岩层下弯，中心新两翼老。\n③ 地形倒置：背斜易侵蚀成谷、向斜槽部坚硬成山。\n④ 断层：上升断块山、下降盆地/谷地；大型工程避断层。","difficulties":"① 新老判据。原因：背斜中心老、向斜中心新，易反，需强调。\n② 地形倒置。原因：背斜可成谷（侵蚀），非必山，易错，需图。\n③ 断层地貌。原因：相对升降致不同形态，需析。","teachingMethods":"① 岩层示意。\n② 新老判据法。\n③ 倒置案例（华山/渭河）。\n④ 工程选址。","preparation":"【PPT课件】P1 褶皱；P2 背斜向斜；P3 新老判据；P4 地形倒置；P5 断层；P6 练习。【地图/图表素材】背斜向斜剖面图、断层构造图、华山断块山图。","process":[{"step":"Step 1 导入——岩层会弯腰","time":"5分钟","content":"【PPT P1 褶皱】教师：「地层受挤压像书页弯起，形成褶皱，是造山的构造基础。」 预设回答：「学生说\"岩层弯了\"。」 板书时机：黑板写\"褶皱\"。差异化提示：B班看图；A班需问因。易错点提醒：褶皱由水平挤压，非垂直力。"},{"step":"Step 2 背斜与向斜","time":"9分钟","content":"【PPT P2 背向】教师：「背斜岩层上拱，向斜下凹；背斜顶部易被侵蚀。」 预设回答：「学生描两种形态。」 板书时机：黑板写两类。差异化提示：B班记；A班需形。易错点提醒：形态上背斜拱、向斜凹。"},{"step":"Step 3 新老判据","time":"9分钟","content":"【PPT P3 新老】教师：「判背斜向斜看岩层新老：中心老、两翼新为背斜；中心新、两翼老为向斜（比形态可靠）。」 预设回答：「学生据新老填\"背/向\"。」 板书时机：黑板写判据。差异化提示：B班记；A班需判。易错点提醒：新老是根本判据，形态可被侵蚀改。"},{"step":"Step 4 地形倒置","time":"8分钟","content":"【PPT P4 倒置】教师：「背斜顶部张裂易受蚀成谷，向斜槽部受挤坚硬成山——\"背斜成谷、向斜成山\"。」 预设回答：「学生说\"为何背斜变谷\"。」 板书时机：黑板写倒置。差异化提示：B班记；A班需析。易错点提醒：背斜不一定成山，看侵蚀。"},{"step":"Step 5 断层","time":"7分钟","content":"【PPT P5 断层】教师：「岩层断裂错动成断层：上升盘成断块山（华山）、下降盘成盆地谷地（渭河）；隧道水库避开断层。」 预设回答：「学生说\"工程为何怕断层\"。」 板书时机：黑板写断层。差异化提示：B班记；A班需联。易错点提醒：断层带易漏水滑坡，工程应避。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：背斜中心岩层较新( );断层上升盘可成断块山( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"读图\"。易错点提醒：下节课学河流地貌。"}],"blackboard":"┌── 构造地貌 ──┐\n│ 背斜:中心老  │\n│ 向斜:中心新  │\n│ 倒置:背谷向山│\n│ 断层:升山降盆│\n│ 工程避断层  │\n└────────────┘","exercises":"【基础作业】1. 判别背斜和向斜的根本依据是岩层的新__关系。2. 判断：背斜在地表一定形成山脉( )。\n【提高作业】为什么隧道工程应尽量避开断层带？\n【参考答案——教师用】基础1：老。基础2：×。提高：断层带岩层破碎、裂隙发育，易渗水、坍塌、诱发滑坡，工程稳定性差，故隧道水库等应避开。","reflection":"✅ 亮点：新老判据比形态可靠讲清；地形倒置防绝对。\n⚠️ 需改进：B班背斜=山仍顽固，需多倒置图。\n📌 下节课衔接：河流地貌的发育。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx1-u2-3","lessonId":"l-geo-sx1-u2-3","title":"河流地貌的发育","book":"选择性必修1 自然地理基础","unitNumber":2,"unitTitle":"地表形态的塑造","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["河流侵蚀","河曲","牛轭湖","人教版选必一Ch2","第三课时"],"textbookAnalysis":"河流上游以下蚀（V谷）、中游侧蚀使河曲发育（凹岸侵蚀、凸岸堆积）、下游堆积成河漫滩与三角洲；凹岸侵蚀宜建港、凸岸堆积宜建村。","overview":"【学情分析】A班：能据凹岸凸岸判侵蚀堆积与利用；B班：常把\"凹岸\"当堆积岸（实为侵蚀）。共同问题：侵蚀堆积部位与河曲演化。","objectives":["人地协调观：认识河流对聚落与农业的双刃影响。","综合思维：综合流速与河段分析河流作用。","区域认知：沿河流识别不同河段地貌。","地理实践力：能据河曲判凹凸岸及利用。"],"keyPoints":"① 上游：下蚀成V谷、峡谷、瀑布。\n② 中游：侧蚀使河曲，凹岸侵蚀、凸岸堆积。\n③ 河曲演化：截弯取直成牛轭湖。\n④ 下游：堆积成河漫滩、三角洲。","difficulties":"① 凹凸岸。原因：凹岸侵蚀、凸岸堆积易反，需强调。\n② 河曲成因。原因：侧蚀不均致弯曲，需图。\n③ 利用。原因：凹岸深宜港、凸岸平宜村，需联。","teachingMethods":"① 河段剖面。\n② 凹凸岸实验。\n③ 河曲动画。\n④ 利用探究。","preparation":"【PPT课件】P1 上游下蚀；P2 中游侧蚀；P3 凹岸凸岸；P4 河曲牛轭；P5 下游堆积；P6 练习。【地图/图表素材】河谷发育三阶段图、凹岸凸岸示意图、牛轭湖形成图。","process":[{"step":"Step 1 导入——河弯里的秘密","time":"5分钟","content":"【PPT P1 上游】教师：「河流上游下切成谷，中下游弯来弯去还堆出平原，发育有规律。」 预设回答：「学生说\"上游山里河窄\"。」 板书时机：黑板写\"河流地貌\"。差异化提示：B班看图；A班需问律。易错点提醒：上中下游作用不同。"},{"step":"Step 2 上游下蚀","time":"9分钟","content":"【PPT P2 上游】教师：「上游落差大流速快，下蚀强成V形谷、峡谷，遇硬岩成瀑布。」 预设回答：「学生说\"三峡是下切\"。」 板书时机：黑板写上蚀。差异化提示：B班记；A班需析。易错点提醒：上游以下蚀为主，非堆积。"},{"step":"Step 3 凹岸凸岸","time":"9分钟","content":"【PPT P3 凹凸】教师：「中游侧蚀，凹岸（弯内侧受冲）侵蚀深、凸岸（外侧）堆积浅；凹岸宜建港、凸岸宜建村。」 预设回答：「学生指\"哪岸深\"。」 板书时机：黑板写凹凸。差异化提示：B班记；A班需联。易错点提醒：凹岸是侵蚀岸（深），凸岸是堆积岸（浅），勿反。"},{"step":"Step 4 河曲与牛轭湖","time":"8分钟","content":"【PPT P4 牛轭】教师：「河曲不断加强，洪水期截弯取直，旧河道废弃成月牙形牛轭湖。」 预设回答：「学生说\"牛轭湖怎么来\"。」 板书时机：黑板写牛轭。差异化提示：B班记；A班需析。易错点提醒：牛轭湖是废弃旧道，非现河道。"},{"step":"Step 5 下游堆积","time":"7分钟","content":"【PPT P5 下游】教师：「下游流速缓，泥沙堆积成河漫滩、江心洲，河口处成三角洲，土肥宜农。」 预设回答：「学生说\"三角洲是粮仓\"。」 板书时机：黑板写下积。差异化提示：B班记；A班需联。易错点提醒：下游以堆积为主，但洪水期仍有侧蚀。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：河流凹岸以堆积为主( );凸岸适宜建港口( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"读图\"。易错点提醒：本章结束，进入大气的运动。"}],"blackboard":"┌── 河流地貌 ──┐\n│ 上:下蚀V谷  │\n│ 中:侧蚀河曲 │\n│ 凹岸蚀/凸岸积│\n│ 牛轭湖:废道 │\n│ 下:漫滩三角 │\n└────────────┘","exercises":"【基础作业】1. 河流中游弯曲河段，受侵蚀较强的是__岸。2. 判断：港口宜建在河流凸岸（堆积岸）( )。\n【提高作业】说明河流凹岸侵蚀、凸岸堆积的成因及其对人类活动的意义。\n【参考答案——教师用】基础1：凹。基础2：×。提高：弯道离心力使凹岸水流急、侵蚀强、水深宜建港；凸岸水流缓、泥沙堆积、地势平宜建村与农耕。","reflection":"✅ 亮点：凹岸凸岸实验直观；利用探究实用。\n⚠️ 需改进：B班凹岸凸岸仍反，需反复指图。\n📌 下节课衔接：第三章 大气的运动。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx1-u3-1","lessonId":"l-geo-sx1-u3-1","title":"锋面系统与天气","book":"选择性必修1 自然地理基础","unitNumber":3,"unitTitle":"大气的运动","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["冷锋","暖锋","准静止锋","人教版选必一Ch3","第一课时"],"textbookAnalysis":"冷锋（冷气团主动）过境降温、大风、雨雪，过后转晴降温；暖锋（暖气团主动）连续性降水，过后升温；准静止锋（江淮梅雨、昆明准静止锋）长期阴雨。","overview":"【学情分析】A班：能画锋面符号并预报天气；B班：常把冷锋暖锋降雨位置记反（冷锋锋后、暖锋锋前）。共同问题：三类锋特征与雨区。","objectives":["人地协调观：认识天气变化对生活的影响，关注预警。","综合思维：综合气团性质分析锋面天气。","区域认知：在我国识别典型锋面活动。","地理实践力：能读锋面图预报天气变化。"],"keyPoints":"① 冷锋：冷主动，锋后雨，过境大风降温雨雪、过後晴冷。\n② 暖锋：暖主动，锋前连续性雨，过后升温。\n③ 准静止锋：冷暖气团势均，长期阴雨（梅雨、昆明）。\n④ 符号：冷锋三角、暖锋半圆。","difficulties":"① 雨区位置。原因：冷锋后、暖锋前，易反，需强调。\n② 过境前后。原因：气温气压变化方向不同，需对比。\n③ 准静止。原因：久雨成因，需案例。","teachingMethods":"① 锋面动画。\n② 符号记忆。\n③ 天气对比表。\n④ 案例（梅雨）。","preparation":"【PPT课件】P1 气团；P2 冷锋；P3 暖锋；P4 雨区；P5 准静止；P6 练习。【地图/图表素材】冷锋暖锋剖面图、我国锋面活动图、梅雨示意图。","process":[{"step":"Step 1 导入——一场秋雨一场寒","time":"5分钟","content":"【PPT P1 气团】教师：「不同性质气团相遇打架形成锋，带来冷暖变化，这就是锋面天气。」 预设回答：「学生说\"冷风来了\"。」 板书时机：黑板写\"锋面\"。差异化提示：B班听；A班需问界。易错点提醒：锋是冷暖气团交界面，非单一气团。"},{"step":"Step 2 冷锋","time":"9分钟","content":"【PPT P2 冷锋】教师：「冷气团主动推进，前方暖气团被迫抬升，锋后降雨，过境大风降温雨雪、过后晴冷。」 预设回答：「学生说\"秋雨一场寒\"对应冷锋。」 板书时机：黑板写冷锋。差异化提示：B班记；A班需析。易错点提醒：冷锋主动方是冷气团。"},{"step":"Step 3 暖锋","time":"9分钟","content":"【PPT P3 暖锋】教师：「暖气团主动爬升，锋前连续性降水，过后气温升、气压降、天转晴。」 预设回答：「学生说\"一场春雨一场暖\"。」 板书时机：黑板写暖锋。差异化提示：B班记；A班需析。易错点提醒：暖锋主动方是暖气团，雨在锋前。"},{"step":"Step 4 雨区对比","time":"8分钟","content":"【PPT P4 雨区】教师：「冷锋雨在锋后（主动方背后）、暖锋雨在锋前（被动方前）；符号三角表冷、半圆表暖。」 预设回答：「学生填\"冷后/暖前\"。」 板书时机：黑板写雨区。差异化提示：B班记；A班需判。易错点提醒：雨区与主动方相反，易记反。"},{"step":"Step 5 准静止锋","time":"7分钟","content":"【PPT P5 准静】教师：「冷暖气团势均力敌，锋面徘徊，长期阴雨：江淮梅雨、云贵昆明准静止锋（冬贵阳阴冷）。」 预设回答：「学生说\"梅雨为何久\"（静止）。」 板书时机：黑板写准静。差异化提示：B班记；A班需案。易错点提醒：准静止锋致持续性降水。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：冷锋降水主要在锋前( );暖锋过境后气温升高( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"画图\"。易错点提醒：下节课学气压系统。"}],"blackboard":"┌── 锋面系统 ──┐\n│ 冷锋:主动冷 │\n│ 雨在锋后    │\n│ 暖锋:主动暖 │\n│ 雨在锋前    │\n│ 准静:久阴雨 │\n│ 梅雨/昆明   │\n└────────────┘","exercises":"【基础作业】1. 冷锋过境时，降水主要集中在__（锋前/锋后）。2. 判断：暖锋过境后气温降低、气压升高( )。\n【提高作业】比较冷锋与暖锋在降水位置和过境后天气上的差异。\n【参考答案——教师用】基础1：锋后。基础2：×。提高：冷锋雨在锋后，过后降温晴冷；暖锋雨在锋前，过后升温、气压降、转晴。","reflection":"✅ 亮点：农谚联锋生动；雨区前后强调防反。\n⚠️ 需改进：B班过境前后温压变化仍混，需对比表。\n📌 下节课衔接：气压系统（气旋与反气旋）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx1-u3-2","lessonId":"l-geo-sx1-u3-2","title":"气压系统（气旋与反气旋）与天气","book":"选择性必修1 自然地理基础","unitNumber":3,"unitTitle":"大气的运动","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["气旋","反气旋","低压","高压","人教版选必一Ch3","第二课时"],"textbookAnalysis":"低压（气旋）中心气流上升、多阴雨，北半球逆时针辐合；高压（反气旋）中心下沉、晴朗，北半球顺时针辐散；锋面气旋为重要降水系统。","overview":"【学情分析】A班：能据等压线判高低气压与风向、说天气；B班：常把气旋（低压）当晴天（实为阴雨）。共同问题：气旋反气旋气流与天气。","objectives":["人地协调观：认识天气系统影响，做好防灾。","综合思维：综合气压与气流分析天气。","区域认知：在等压线图上识别高低压。","地理实践力：能读气压图判断天气与风向。"],"keyPoints":"① 气旋（低压）：中心升、阴雨；北逆南顺辐合。\n② 反气旋（高压）：中心沉、晴；北顺南逆辐散。\n③ 锋面气旋：低压槽处冷暖锋共存，强降水。\n④ 应用：台风是热带气旋。","difficulties":"① 气流方向。原因：北逆南顺、气旋反气旋相反，易混，需图。\n② 天气对应。原因：气旋雨、反气旋晴，易反，需联升降。\n③ 锋面气旋。原因：槽线有锋，需析。","teachingMethods":"① 等压线读图。\n② 手势法（左右手）。\n③ 天气对比。\n④ 台风案例。","preparation":"【PPT课件】P1 低压气旋；P2 高压反气旋；P3 气流方向；P4 天气对比；P5 锋面气旋；P6 练习。【地图/图表素材】气旋反气旋等压线图、锋面气旋示意图。","process":[{"step":"Step 1 导入——台风是低还是高","time":"5分钟","content":"【PPT P1 低压】教师：「台风中心是低压，带来狂风暴雨，气旋系统多雨。」 预设回答：「学生说\"台风是低压\"。」 板书时机：黑板写\"气压系统\"。差异化提示：B班听；A班需问联。易错点提醒：台风是热带气旋（低压），非高压。"},{"step":"Step 2 气旋","time":"9分钟","content":"【PPT P2 气旋】教师：「气旋即低压，中心气流上升冷却成云致雨，北半球气流逆时针向中心辐合。」 预设回答：「学生用手比\"逆时针向里\"。」 板书时机：黑板写气旋。差异化提示：B班记；A班需向。易错点提醒：气旋=低压=阴雨，别当晴。"},{"step":"Step 3 反气旋","time":"9分钟","content":"【PPT P3 反气旋】教师：「反气旋即高压，中心下沉增温少云，晴朗干燥，北半球顺时针向外辐散。」 预设回答：「学生说\"伏旱是高压控制\"。」 板书时机：黑板写反气旋。差异化提示：B班记；A班需向。易错点提醒：反气旋=高压=晴朗，与气旋相反。"},{"step":"Step 4 气流方向","time":"8分钟","content":"【PPT P4 方向】教师：「北半球气旋逆时针、反气旋顺时针；南半球相反；用左右手定则记。」 预设回答：「学生用右手判气旋（北）。」 板书时机：黑板写方向。差异化提示：B班记；A班需练。易错点提醒：南北半球方向相反，勿套错。"},{"step":"Step 5 锋面气旋","time":"7分钟","content":"【PPT P5 锋气旋】教师：「温带低压槽线处常伴冷暖气团，形成锋面气旋，是我国冬春重要降水系统。」 预设回答：「学生说\"槽线有雨\"。」 板书时机：黑板写锋气旋。差异化提示：B班记；A班需析。易错点提醒：锋面气旋降水在低压槽附近。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：气旋中心多晴朗( );反气旋控制下天气晴好( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"读图\"。易错点提醒：下节课学气压带和风带。"}],"blackboard":"┌── 气压系统 ──┐\n│ 气旋=低压雨 │\n│ 北逆南顺辐合│\n│ 反气旋=高压晴│\n│ 北顺南逆辐散│\n│ 锋面气旋:槽雨│\n└────────────┘","exercises":"【基础作业】1. 中心气流上升、常出现阴雨天气的气压系统是__（气旋/反气旋）。2. 判断：反气旋控制下多阴雨天气( )。\n【提高作业】用左右手定则说明北半球气旋的水平气流运动方向。\n【参考答案——教师用】基础1：气旋。基础2：×。提高：北半球气旋为低压，右手握拳拇指向上（上升），四指弯曲方向即逆时针向中心辐合；南半球用左手相反。","reflection":"✅ 亮点：手法定则防方向错；台风案例亲切。\n⚠️ 需改进：B班气旋阴雨仍误记晴，需联升降。\n📌 下节课衔接：气压带和风带的形成与移动。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx1-u3-3","lessonId":"l-geo-sx1-u3-3","title":"气压带和风带的形成与移动","book":"选择性必修1 自然地理基础","unitNumber":3,"unitTitle":"大气的运动","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["三圈环流","气压带","风带","人教版选必一Ch3","第三课时"],"textbookAnalysis":"赤道受热空气上升成赤道低压，两极下沉成极地高压，加地转偏向力形成三圈环流，全球分7个气压带6个风带；随太阳直射点季节移动而南北移动约10°。","overview":"【学情分析】A班：能画三圈环流并说气压带风带；B班：常把风带风向记反（如信风方向）。共同问题：气压带风带分布与风向、移动。","objectives":["人地协调观：认识大气环流对全球水热输送的意义。","综合思维：综合受热与地转偏向分析环流。","区域认知：在全球尺度定位气压带风带。","地理实践力：能绘制气压带风带并判风向。"],"keyPoints":"① 七压带：赤道低、副高×2、副极地低×2、极地高×2。\n② 六风带：信风、西风、极地东风（各两）。\n③ 风向：北半信风NE、西风SW；南半信风SE、西风NW。\n④ 移动：随直射点夏北冬南移约10°。","difficulties":"① 气压带记忆。原因：七个名称位置易漏，需图。\n② 风向。原因：南北半球、高低纬风向不同，易反，需练。\n③ 移动方向。原因：夏北冬南随直射点，需联。","teachingMethods":"① 三圈环流动画。\n② 气压带风带图。\n③ 风向判定。\n④ 移动演示。","preparation":"【PPT课件】P1 受热不均；P2 三圈环流；P3 气压带；P4 风带；P5 移动；P6 练习。【地图/图表素材】全球气压带风带分布图、三圈环流示意图。","process":[{"step":"Step 1 导入——风为何有常向","time":"5分钟","content":"【PPT P1 受热】教师：「赤道热两极冷，加上地球自转偏转，形成全球有规律的风带，常年同向。」 预设回答：「学生说\"贸易风\"。」 板书时机：黑板写\"气压带风带\"。差异化提示：B班听；A班需问因。易错点提醒：单圈环流被地转偏向力打破成三圈。"},{"step":"Step 2 三圈环流","time":"9分钟","content":"【PPT P2 三圈】教师：「低纬、中纬、高纬三圈环流，在高低纬间输送热量，形成行星风系。」 预设回答：「学生描三圈。」 板书时机：黑板写三圈。差异化提示：B班记；A班需析。易错点提醒：三圈是理想模式，实际受海陆破坏。"},{"step":"Step 3 气压带","time":"9分钟","content":"【PPT P3 气压带】教师：「赤道低压（上升）、副热带高压（下沉）×2、副极地低压×2、极地高压×2，共七带相间。」 预设回答：「学生背七带顺序。」 板书时机：黑板写七带。差异化提示：B班记；A班需序。易错点提醒：高压下沉晴、低压上升雨。"},{"step":"Step 4 风带与风向","time":"8分钟","content":"【PPT P4 风带】教师：「信风（低纬）、西风（中纬）、极地东风（高纬）；北半西风西南、信风东北，南半相反。」 预设回答：「学生说\"西欧西风来自西南\"。」 板书时机：黑板写风带。差异化提示：B班记；A班需向。易错点提醒：风向随半球与纬度变，别反。"},{"step":"Step 5 季节移动","time":"7分钟","content":"【PPT P5 移动】教师：「气压带风带随太阳直射点移动：夏季北移、冬季南移，幅度约10个纬度。」 预设回答：「学生说\"夏季风带北移\"。」 板书时机：黑板写移动。差异化提示：B班记；A班需联。易错点提醒：移动随直射点，夏北冬南。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：全球共有6个气压带( );北半球中纬西风为西南风( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"画图\"。易错点提醒：下节课学气压带风带对气候影响。"}],"blackboard":"┌── 气压带风带 ──┐\n│ 七压:赤低副高│\n│ 副极低极高  │\n│ 六风:信/西/极│\n│ 北:信东北西西南│\n│ 夏北冬南移10°│\n└────────────┘","exercises":"【基础作业】1. 全球共形成__个气压带和6个风带。2. 判断：北半球中纬度西风带的风向是东北风( )。\n【提高作业】说明气压带和风带随季节移动的方向及其原因。\n【参考答案——教师用】基础1：7。基础2：×。提高：随太阳直射点移动——夏季北移、冬季南移；因直射点夏偏北冬偏南，受热上升区随之移动，整个环流带相应位移约10个纬度。","reflection":"✅ 亮点：三圈环流动画化解抽象；风向分南北半讲清。\n⚠️ 需改进：B班风向仍反，需多画。\n📌 下节课衔接：气压带、风带对气候的影响。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx1-u3-4","lessonId":"l-geo-sx1-u3-4","title":"气压带、风带对气候的影响","book":"选择性必修1 自然地理基础","unitNumber":3,"unitTitle":"大气的运动","lessonType":"new","lessonTypeName":"新授课","periodNumber":4,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["气候类型","地中海气候","季风","人教版选必一Ch3","第四课时"],"textbookAnalysis":"单一气压带风带控制形成相应气候：赤道低压→热带雨林、信风→热带草原（干湿季）、副高→热带沙漠、西风→温带海洋性、副高与西风交替→地中海气候；海陆热力差异叠加形成季风。","overview":"【学情分析】A班：能据气压带风带判气候类型与特征；B班：常把地中海气候冬雨记反（实为冬雨夏干）。共同问题：气候与环流的对应、季风成因。","objectives":["人地协调观：认识气候对人类活动的制约与适应。","综合思维：综合环流与下垫面分析气候。","区域认知：在世界定位主要气候类型。","地理实践力：能据环流判读气候特征。"],"keyPoints":"① 单一控制：赤道低压→雨林（多雨）；副高→沙漠（干）；西风→温带海洋（温润）。\n② 交替控制：副高+西风→地中海（冬雨夏干）；信风+赤道低压→草原（干湿季）。\n③ 季风：海陆热力差异，东亚夏东南冬西北。\n④ 应用：气候决定农业与聚落。","difficulties":"① 地中海气候。原因：冬雨夏干，易记反，需强调。\n② 单一vs交替。原因：控制方式不同致特征不同，需分。\n③ 季风成因。原因：海陆热力差异+气压带移动，需析。","teachingMethods":"① 环流—气候对应表。\n② 气候分布图。\n③ 特征对比。\n④ 季风案例。","preparation":"【PPT课件】P1 单一控制；P2 交替控制；P3 地中海；P4 温带海洋；P5 季风；P6 练习。【地图/图表素材】世界气候类型分布图、气候气温降水柱状图。","process":[{"step":"Step 1 导入——同纬度不同命","time":"5分钟","content":"【PPT P1 单一】教师：「同纬度有的雨林有的沙漠，因受不同气压带风带控制。」 预设回答：「学生说\"撒哈拉受副高\"。」 板书时机：黑板写\"环流→气候\"。差异化提示：B班听；A班需问联。易错点提醒：气候特征由控制环流决定。"},{"step":"Step 2 单一控制气候","time":"9分钟","content":"【PPT P2 单一】教师：「赤道低压常雨→热带雨林；副高下沉干→热带沙漠；西风终年吹→温带海洋性（温润）。」 预设回答：「学生配\"雨林=赤道低压\"。」 板书时机：黑板写单一。差异化提示：B班记；A班需联。易错点提醒：高压对应干、低压对应湿。"},{"step":"Step 3 交替控制","time":"9分钟","content":"【PPT P3 交替】教师：「副高与西风交替→地中海气候：夏副高控制干热、冬西风控制温和多雨（冬雨夏干）。」 预设回答：「学生说\"地中海冬雨\"。」 板书时机：黑板写交替。差异化提示：B班记；A班需析。易错点提醒：地中海是冬雨夏干，非夏雨，易反。"},{"step":"Step 4 温带海洋性","time":"7分钟","content":"【PPT P4 海洋】教师：「温带海洋性气候终受西风，全年温和湿润、降水均匀，如西欧。」 预设回答：「学生说\"英国为何总湿\"。」 板书时机：黑板写海洋。差异化提示：B班记；A班需联。易错点提醒：海洋性=均匀湿润，非集中。"},{"step":"Step 5 季风","time":"7分钟","content":"【PPT P5 季风】教师：「东亚因海陆热力差异，夏风从海来（东南）湿润、冬风从陆来（西北）干冷，形成季风。」 预设回答：「学生说\"我国季风\"。」 板书时机：黑板写季风。差异化提示：B班记；A班需析。易错点提醒：季风主因是海陆热力差异。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：地中海气候夏季多雨( );温带海洋性气候全年湿润( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"判读\"。易错点提醒：本章结束，进入水的运动。"}],"blackboard":"┌── 环流与气候 ──┐\n│ 雨林:赤道低压│\n│ 沙漠:副高   │\n│ 海洋:西风   │\n│ 地中海:冬雨 │\n│ 夏干       │\n│ 季风:海陆差 │\n└────────────┘","exercises":"【基础作业】1. 终年受西风带控制形成的气候类型是__性气候。2. 判断：地中海气候的特征是夏季多雨、冬季干燥( )。\n【提高作业】说明地中海气候\"冬雨夏干\"的成因。\n【参考答案——教师用】基础1：温带海洋。基础2：×。提高：夏季副热带高压北移控制，下沉干热；冬季西风带南移控制，来自海洋湿润多雨，故冬雨夏干。","reflection":"✅ 亮点：环流—气候对应表清晰；地中海冬雨强调。\n⚠️ 需改进：B班气候特征记反，需多对比。\n📌 下节课衔接：第四章 水的运动。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx1-u4-1","lessonId":"l-geo-sx1-u4-1","title":"陆地水体及其相互关系","book":"选择性必修1 自然地理基础","unitNumber":4,"unitTitle":"水的运动","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["陆地水体","河流补给","地下水","人教版选必一Ch4","第一课时"],"textbookAnalysis":"陆地水体包括河流、湖泊、冰川、沼泽、地下水，彼此联系；河流补给有雨水、冰雪融水、湖泊地下水，补给决定径流的季节变化；丰水期河补湖、枯水期湖补河。","overview":"【学情分析】A班：能据补给类型分析径流变化；B班：常把\"冰川融水\"当雨水补给（季节相反）。共同问题：补给类型与相互补给关系。","objectives":["人地协调观：认识水资源系统性，统筹保护与利用。","综合思维：综合补给来源分析水体联系。","区域认知：在区域中识别主要补给类型。","地理实践力：能读径流图判断补给类型。"],"keyPoints":"① 水体：河、湖、冰川、沼泽、地下，互为补给。\n② 补给：雨水（季风区夏汛）、冰雪融水（夏汛、温高）、湖泊地下水（调蓄）。\n③ 互补：丰水河补湖/地下，枯水湖/地下补河。\n④ 径流变化反映补给。","difficulties":"① 补给判读。原因：各补给季节不同，需读图，易错。\n② 冰川vs雨水。原因：冰川夏汛但源于融雪非雨，易混，需分。\n③ 互补方向。原因：随水位高低变，需析。","teachingMethods":"① 水体联系图。\n② 补给类型读图。\n③ 互补演示。\n④ 径流曲线。","preparation":"【PPT课件】P1 水体；P2 补给类型；P3 雨水冰雪；P4 湖泊地下；P5 互补；P6 练习。【地图/图表素材】陆地水体联系图、河流补给类型径流图。","process":[{"step":"Step 1 导入——河水从哪里来","time":"5分钟","content":"【PPT P1 水体】教师：「河水不是孤立的，它和湖泊地下水冰川相通，是一个水家族。」 预设回答：「学生说\"地下水冒出来\"。」 板书时机：黑板写\"陆地水体\"。差异化提示：B班听；A班需问联。易错点提醒：水体相互转化，非孤立。"},{"step":"Step 2 补给类型","time":"9分钟","content":"【PPT P2 补给】教师：「河流补给主要有雨水、冰雪融水、湖泊和地下水，不同区主导不同。」 预设回答：「学生说\"南方靠雨水\"。」 板书时机：黑板写补给。差异化提示：B班记；A班需分。易错点提醒：补给类型决定汛期和变化。"},{"step":"Step 3 雨水与冰雪","time":"9分钟","content":"【PPT P3 雨雪】教师：「季风区以雨水补给为主、夏秋汛；干旱高山以冰雪融水为主、夏季温高汛（非降雨）。」 预设回答：「学生说\"冰川河夏天最大\"。」 板书时机：黑板写两类。差异化提示：B班记；A班需析。易错点提醒：冰雪融水夏汛但源于高温非降雨。"},{"step":"Step 4 湖泊地下水","time":"8分钟","content":"【PPT P4 湖地】教师：「湖泊与地下水补给河流并调蓄洪水，使径流更平稳。」 预设回答：「学生说\"湖泊像水库\"。」 板书时机：黑板写湖地。差异化提示：B班记；A班需联。易错点提醒：湖泊具天然调节功能。"},{"step":"Step 5 相互补给","time":"7分钟","content":"【PPT P5 互补】教师：「水位高者补低者：丰水期河水补湖补地下，枯水期湖与地下反补河。」 预设回答：「学生说\"枯水湖救河\"。」 板书时机：黑板写互补。差异化提示：B班记；A班需析。易错点提醒：补给方向由水位高低定，动态变化。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：冰雪融水补给河流的汛期在冬季( );丰水期河水补给湖泊( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"读图\"。易错点提醒：下节课学洋流。"}],"blackboard":"┌── 陆地水体 ──┐\n│ 河湖冰沼地下│\n│ 补给:雨/冰雪│\n│ /湖地下    │\n│ 雨水:夏秋汛 │\n│ 冰雪:夏温汛 │\n│ 互补:高补低 │\n└────────────┘","exercises":"【基础作业】1. 我国东部季风区河流最主要的补给类型是__补给。2. 判断：以冰川融水补给为主的河流，汛期出现在冬季( )。\n【提高作业】说明河流与湖泊之间的相互补给关系及其对径流的意义。\n【参考答案——教师用】基础1：雨水（大气降水）。基础2：×。提高：丰水期河水位高于湖则河补湖，枯水期湖水位高则湖补河；湖泊调蓄使河流径流更平稳。","reflection":"✅ 亮点：水家族比喻好懂；冰雪非雨强调。\n⚠️ 需改进：B班补给读图弱，需多曲线。\n📌 下节课衔接：洋流及其地理意义。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx1-u4-2","lessonId":"l-geo-sx1-u4-2","title":"洋流及其地理意义","book":"选择性必修1 自然地理基础","unitNumber":4,"unitTitle":"水的运动","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["洋流","风海流","渔场","人教版选必一Ch4","第二课时"],"textbookAnalysis":"洋流按性质分寒暖流，按成因分风海流、密度流、补偿流；中低纬大洋环流呈反气旋型（北顺南逆），中高纬北半球呈气旋型；洋流影响沿岸气候、渔场、航行与污染。","overview":"【学情分析】A班：能据环流模式画洋流并说意义；B班：常把中低纬环流方向记反（北顺南逆）。共同问题：环流模式、洋流意义。","objectives":["人地协调观：认识海洋环流对全球气候的调节作用。","综合思维：综合成因与性质分析洋流。","区域认知：在世界大洋定位洋流模式。","地理实践力：能绘洋流模式并解释渔场与气候。"],"keyPoints":"① 中低纬：反气旋型，北太平洋/大西洋顺时针、南半球逆时针。\n② 中高纬：北太平洋/大西洋逆时针（气旋型）。\n③ 性质：暖流增温湿、寒流降温减湿。\n④ 意义：渔场（寒暖汇/上升流）、顺流省油、污染物扩散。","difficulties":"① 环流方向。原因：北顺南逆（中低纬）易反，需图。\n② 寒暖影响。原因：增温湿vs降温湿，易记反，需对比。\n③ 渔场。原因：寒暖交汇或上升流，需析。","teachingMethods":"① 世界洋流图。\n② 模式动画。\n③ 寒暖对比。\n④ 渔场案例。","preparation":"【PPT课件】P1 成因；P2 中低纬模式；P3 中高纬；P4 寒暖；P5 意义；P6 练习。【地图/图表素材】世界洋流分布图、洋流模式图、渔场分布图。","process":[{"step":"Step 1 导入——北大西洋暖流送暖","time":"5分钟","content":"【PPT P1 成因】教师：「北大西洋暖流让西欧比同纬温和，洋流像海洋里的\"传送带\"。」 预设回答：「学生说\"暖流增温\"。」 板书时机：黑板写\"洋流\"。差异化提示：B班听；A班需问成。易错点提醒：洋流是大规模定向流动。"},{"step":"Step 2 中低纬模式","time":"9分钟","content":"【PPT P2 中低】教师：「中低纬大洋环流呈反气旋型：北半球顺时针、南半球逆时针，暖流在西部。」 预设回答：「学生描\"北顺南逆\"。」 板书时机：黑板写模式。差异化提示：B班记；A班需画。易错点提醒：中低纬北顺南逆，勿反。"},{"step":"Step 3 中高纬","time":"8分钟","content":"【PPT P3 中高】教师：「北半球中高纬环流呈气旋型（逆时针），南半球中高纬绕极东流，无大洋环流闭合。」 预设回答：「学生说\"北太平洋中高纬逆时针\"。」 板书时机：黑板写中高。差异化提示：B班记；A班需联。易错点提醒：中高纬北逆，与中低纬相反。"},{"step":"Step 4 寒暖流","time":"8分钟","content":"【PPT P4 寒暖】教师：「暖流从低纬来增温增湿、寒流从高纬来降温减湿；相遇多雾。」 预设回答：「学生说\"寒流沿岸荒漠\"（秘鲁）。」 板书时机：黑板写寒暖。差异化提示：B班记；A班需联。易错点提醒：寒流降温减湿，可致沿岸荒漠。"},{"step":"Step 5 地理意义","time":"7分钟","content":"【PPT P5 意义】教师：「寒暖交汇（纽芬兰）或上升流（秘鲁）成渔场；顺流省油、寒暖遇雾影响航行；加速污染物扩散也扩大污染。」 预设回答：「学生说\"顺流快\"。」 板书时机：黑板写意义。差异化提示：B班记；A班需析。易错点提醒：洋流既利航行也扩污染。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：中低纬大洋环流北半球逆时针( );寒流对沿岸降温减湿( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"画图\"。易错点提醒：下节课学海气相互作用。"}],"blackboard":"┌── 洋流 ──┐\n│ 中低纬:北顺南逆│\n│ 中高纬:北逆  │\n│ 暖流:增温湿 │\n│ 寒流:降温湿 │\n│ 渔场:交汇上升│\n└────────────┘","exercises":"【基础作业】1. 中低纬大洋环流，北半球呈__时针方向。2. 判断：寒流对沿岸气候起增温增湿作用( )。\n【提高作业】说明洋流对全球渔场分布的影响。\n【参考答案——教师用】基础1：顺。基础2：×。提高：寒暖流交汇使海水扰动、营养上泛（如纽芬兰），上升流将深层营养带到表层（如秘鲁），均使浮游生物繁盛形成大渔场。","reflection":"✅ 亮点：北顺南逆模式强调；暖流送暖案例生动。\n⚠️ 需改进：B班中低纬方向仍反，需多画。\n📌 下节课衔接：海—气相互作用与厄尔尼诺。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx1-u4-3","lessonId":"l-geo-sx1-u4-3","title":"海—气相互作用与厄尔尼诺","book":"选择性必修1 自然地理基础","unitNumber":4,"unitTitle":"水的运动","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["海气相互作用","沃克环流","厄尔尼诺","人教版选必一Ch4","第三课时"],"textbookAnalysis":"海洋与大气间通过热量、水量、动量交换相互作用：海洋是大气主要热源和水源，大气运动驱动洋流；正常沃克环流东冷西暖，厄尔尼诺年赤道东太平洋增温、沃克环流减弱，引发全球气候异常。","overview":"【学情分析】A班：能解释厄尔尼诺的环流机制与影响；B班：常把厄尔尼诺当\"全球都热\"（实际是东太平洋暖、西太平洋旱）。共同问题：海气交换、沃克环流、厄尔尼诺。","objectives":["人地协调观：认识海气系统变化对全球的影响，关注气候。","综合思维：综合海洋与大气分析相互作用。","区域认知：在赤道太平洋定位海气异常。","地理实践力：能据海温异常解释气候反常。"],"keyPoints":"① 海气交换：海洋供水供热，大气驱动洋流。\n② 正常：沃克环流西暖东冷，东太上升流带来渔获。\n③ 厄尔尼诺：东太增温、沃克减弱，东太雨西太旱，渔减产。\n④ 影响：全球气候异常、灾害频发。","difficulties":"① 海气互馈。原因：双向交换，易单向看，需强调。\n② 沃克环流。原因：方向随海温，抽象，需图。\n③ 厄尔尼诺影响。原因：东雨西旱，易误全局热，需析。","teachingMethods":"① 海气交换图。\n② 沃克环流动画。\n③ 厄尔尼诺对比。\n④ 案例（秘鲁渔变）。","preparation":"【PPT课件】P1 海气交换；P2 正常沃克；P3 厄尔尼诺；P4 影响；P5 拉尼娜；P6 练习。【地图/图表素材】海气相互作用示意图、沃克环流与厄尔尼诺对比图。","process":[{"step":"Step 1 导入——海洋管着天气","time":"5分钟","content":"【PPT P1 交换】教师：「海洋占地球表面七成，是大气的热库与水塔，海气互相影响。」 预设回答：「学生说\"海水蒸发成云\"。」 板书时机：黑板写\"海气作用\"。差异化提示：B班听；A班需问互。易错点提醒：海气是双向交换，非单向。"},{"step":"Step 2 正常沃克环流","time":"9分钟","content":"【PPT P2 正常】教师：「正常年赤道东太冷、西太暖，信风将暖水吹向西，东太上升流强、渔获丰，沃克环流东升西沉。」 预设回答：「学生描正常环流。」 板书时机：黑板写正常。差异化提示：B班记；A班需析。易错点提醒：正常年东太冷、上升流强。"},{"step":"Step 3 厄尔尼诺","time":"9分钟","content":"【PPT P3 厄尔】教师：「厄尔尼诺年东赤道太平洋异常增温，信风减弱、沃克环流东沉西升被削弱甚至反转，东太多雨、西太（澳洲）干旱。」 预设回答：「学生说\"为何澳洲干旱\"。」 板书时机：黑板写厄尔。差异化提示：B班记；A班需联。易错点提醒：厄尔尼诺是东暖西旱，非全球皆热。"},{"step":"Step 4 影响","time":"8分钟","content":"【PPT P4 影响】教师：「厄尔尼诺致秘鲁渔减产、美洲西岸涝、西太旱台风少、全球气候异常。」 预设回答：「学生说\"鱼少了\"（上升流弱）。」 板书时机：黑板写影响。差异化提示：B班记；A班需析。易错点提醒：东太上升流减弱致营养减少鱼减。"},{"step":"Step 5 拉尼娜","time":"7分钟","content":"【PPT P5 拉尼娜】教师：「拉尼娜为反相：东太更冷、信风更强、沃克增强，西太更涝、东太更旱，与厄尔尼诺相反。」 预设回答：「学生说\"拉尼娜相反\"。」 板书时机：黑板写拉尼娜。差异化提示：B班记；A班需对。易错点提醒：拉尼娜是厄尔尼诺反相，非同一种。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：厄尔尼诺年赤道东太平洋降温( );其年秘鲁渔获常减产( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"分析\"。易错点提醒：本章结束，进入整体性差异性。"}],"blackboard":"┌── 海气与厄尔尼诺 ──┐\n│ 海供热水大气驱│\n│ 流          │\n│ 正常:东冷西暖│\n│ 厄尔:东暖西旱│\n│ 渔减/全球异常│\n└────────────────┘","exercises":"【基础作业】1. 正常年份，赤道东太平洋因__流强而渔业资源丰富。2. 判断：厄尔尼诺现象表现为赤道东太平洋海温异常降低( )。\n【提高作业】简述厄尔尼诺现象对秘鲁渔场和澳大利亚东部气候的影响及原因。\n【参考答案——教师用】基础1：上升。基础2：×。提高：厄尔尼诺年东太增温、沃克环流减弱，上升流减弱使营养盐减少、秘鲁渔减产；西太（澳洲东部）因环流反转少雨干旱。","reflection":"✅ 亮点：沃克环流动画化抽象；东暖西旱纠正全局热误解。\n⚠️ 需改进：B班海气双向交换仍单向看，需强调。\n📌 下节课衔接：第五章 自然环境的整体性与差异性。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx1-u5-1","lessonId":"l-geo-sx1-u5-1","title":"自然环境的整体性","book":"选择性必修1 自然地理基础","unitNumber":5,"unitTitle":"自然环境的整体性与差异性","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["整体性","要素相互作用","连锁反应","人教版选必一Ch5","第一课时"],"textbookAnalysis":"自然环境由气候、地貌、水文、土壤、生物等要素组成，各要素相互联系、相互制约，某一要素变化会引起连锁反应，具有统一演化与整体功能。","overview":"【学情分析】A班：能举连锁反应说明整体性；B班：常孤立看要素（如只说\"树少了\"不顾水土壤）。共同问题：要素联系、连锁反应。","objectives":["人地协调观：认识开发利用须统筹自然整体，避免连锁破坏。","综合思维：综合多要素分析环境整体联系。","区域认知：在区域中识别要素关联。","地理实践力：能就某工程分析连锁环境效应。"],"keyPoints":"① 要素：气候、地貌、水文、土壤、生物相互联系。\n② 整体：一要素变→其他要素乃至整体变（连锁）。\n③ 统一演化：各要素同步变化。\n④ 案例：砍伐森林→水土壤生物全变。","difficulties":"① 要素联系。原因：学生易孤立，需网状图。\n② 连锁反应。原因：一因多果，需举例，易漏环节。\n③ 整体功能。原因：整体大于部分之和，抽象，需点。","teachingMethods":"① 要素网络图。\n② 连锁推演。\n③ 案例（森林砍伐）。\n④ 讨论。","preparation":"【PPT课件】P1 要素；P2 联系；P3 连锁；P4 统一演化；P5 案例；P6 练习。【地图/图表素材】自然环境要素联系图、森林砍伐连锁反应图。","process":[{"step":"Step 1 导入——牵一发动全身","time":"5分钟","content":"【PPT P1 要素】教师：「气候水土生物像一家，一个变了全家跟着变，这就是自然环境整体性。」 预设回答：「学生说\"砍树水土流失\"。」 板书时机：黑板写\"整体性\"。差异化提示：B班听；A班需问网。易错点提醒：要素间是有机联系，非堆砌。"},{"step":"Step 2 要素联系","time":"9分钟","content":"【PPT P2 联系】教师：「气候影响植被土壤、植被涵养水土、地貌改变水文——五要素环环相扣。」 预设回答：「学生连\"气候→植被\"等线。」 板书时机：黑板写联系。差异化提示：B班记；A班需网。易错点提醒：任两要素间多有关联。"},{"step":"Step 3 连锁反应","time":"9分钟","content":"【PPT P3 连锁】教师：「如气候变干→植被退化→防风固沙弱→风蚀强→土壤贫瘠→生物减少，一环扣一环。」 预设回答：「学生补全链条。」 板书时机：黑板写连锁。差异化提示：B班记；A班需推。易错点提醒：一个变化引发系列变化，需追全链。"},{"step":"Step 4 统一演化","time":"8分钟","content":"【PPT P4 演化】教师：「整体各要素在同一过程中统一演化，如黄土高原水土流失是气候地貌土壤生物同步变。」 预设回答：「学生说\"变化是同步的\"。」 板书时机：黑板写演化。差异化提示：B班记；A班需联。易错点提醒：演化是整体协同，非单要素。"},{"step":"Step 5 案例","time":"7分钟","content":"【PPT P5 案例】教师：「大量砍伐森林→蓄水减、径流变、土壤蚀、生物失、气候干，整体退化。」 预设回答：「学生列砍伐后果链。」 板书时机：黑板写案例。差异化提示：B班记；A班需析。易错点提醒：开发须防连锁破坏。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：自然环境各要素相互独立互不影响( );砍伐森林只影响生物( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"分析\"。易错点提醒：下节课学地域分异规律。"}],"blackboard":"┌── 整体性 ──┐\n│ 要素:气地水 │\n│ 土生互联系 │\n│ 一变→连锁  │\n│ 统一演化    │\n│ 案例:砍林全 │\n│ 退化       │\n└────────────┘","exercises":"【基础作业】1. 自然环境的五大要素包括气候、地貌、水文、土壤和__。2. 判断：某一自然要素的变化不会引起其他要素的改变( )。\n【提高作业】以热带雨林被大规模砍伐为例，说明自然环境的整体性。\n【参考答案——教师用】基础1：生物（植被）。基础2：×。提高：砍伐使植被减少→涵养水源能力下降、径流变率增大→土壤侵蚀加剧、肥力下降→生物栖息地丧失、物种减少→局地气候变干，体现一要素变引发整体连锁退化。","reflection":"✅ 亮点：要素网络图直观；连锁推演防孤立。\n⚠️ 需改进：B班仍孤立看要素，需多案例链。\n📌 下节课衔接：地域分异规律（纬度地带与干湿度地带）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx1-u5-2","lessonId":"l-geo-sx1-u5-2","title":"地域分异规律（纬度地带与干湿度地带）","book":"选择性必修1 自然地理基础","unitNumber":5,"unitTitle":"自然环境的整体性与差异性","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["纬度地带性","干湿度地带性","地方性","人教版选必一Ch5","第二课时"],"textbookAnalysis":"地域分异：纬度地带性（热量为主，沿纬线更替，如赤道雨林→极地苔原）、干湿度地带性（水分为主，沿经度更替，如我国东森西草）；二者叠加形成地表地带谱。","overview":"【学情分析】A班：能区分两种地带性及更替方向；B班：常把干湿度地带（经度）当纬度地带（纬度）混。共同问题：两类分异的成因与方向。","objectives":["人地协调观：认识因地制宜利用地域差异。","综合思维：综合热量水分分析分异。","区域认知：在地球表面定位分异方向。","地理实践力：能判读地带性规律与方向。"],"keyPoints":"① 纬度地带性：以热量为主，沿纬度（南北）更替，自然带东西延伸。\n② 干湿度地带性：以水分为主，沿经度（东西）更替，我国东→西森→草→荒。\n③ 表现：自然带呈带。\n④ 叠加：二者共同塑造全球谱。","difficulties":"① 两类方向。原因：纬度南北、干湿度东西，易混，需对比。\n② 主导因子。原因：一热一水，需分明。\n③ 我国实例。原因：东森西草是干湿度，易错归纬度。","teachingMethods":"① 两类对比表。\n② 全球地带图。\n③ 我国东西实例。\n④ 判读训练。","preparation":"【PPT课件】P1 纬度地带；P2 干湿度；P3 对比；P4 我国实例；P5 叠加；P6 练习。【地图/图表素材】世界陆地自然带图、我国东西自然带变化图。","process":[{"step":"Step 1 导入——南北与东西的不同","time":"5分钟","content":"【PPT P1 纬度】教师：「从赤道到两极景观换一遍是热量作怪；从东到西换一遍是水分作怪，这就是两类分异。」 预设回答：「学生说\"南方热北方冷\"。」 板书时机：黑板写\"分异\"。差异化提示：B班听；A班需问因。易错点提醒：分异有规律，方向是关键。"},{"step":"Step 2 纬度地带性","time":"9分钟","content":"【PPT P2 纬度】教师：「纬度地带性以热量为主，沿南北（纬度）更替，自然带东西延伸，如雨林→草原→荒漠→苔原。」 预设回答：「学生说\"沿纬线换\"。」 板书时机：黑板写纬度。差异化提示：B班记；A班需向。易错点提醒：方向是南北，因子是热量。"},{"step":"Step 3 干湿度地带性","time":"9分钟","content":"【PPT P3 干湿】教师：「干湿度地带性以水分为主，沿东西（经度）更替，我国东南森林→内蒙草原→西北荒漠。」 预设回答：「学生说\"西边干所以荒\"。」 板书时机：黑板写干湿。差异化提示：B班记；A班需向。易错点提醒：方向是东西，因子是水分。"},{"step":"Step 4 我国实例","time":"8分钟","content":"【PPT P4 实例】教师：「我国北纬40°附近自东向西：森→草→荒，是典型干湿度地带，非纬度地带。」 预设回答：「学生指\"北京到新疆的变化\"。」 板书时机：黑板写实例。差异化提示：B班记；A班需判。易错点提醒：同一纬度的东西变化属干湿度地带。"},{"step":"Step 5 叠加效应","time":"7分钟","content":"【PPT P5 叠加】教师：「热量水分共同制约，二者叠加形成全球复杂的自然带谱。」 预设回答：「学生说\"两者一起定\"。」 板书时机：黑板写叠加。差异化提示：B班记；A班需联。易错点提醒：现实是二者叠加，非单一。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：我国东森西草属纬度地带性( );干湿度地带性以热量为主导( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"判读\"。易错点提醒：下节课学垂直分异与地方分异。"}],"blackboard":"┌── 地域分异 ──┐\n│ 纬度:热/南北│\n│ 雨林→苔原  │\n│ 干湿度:水/东│\n│ 西(森草荒) │\n│ 叠加定全谱 │\n└────────────┘","exercises":"【基础作业】1. 以热量为基础的地域分异规律是__地带性分异。2. 判断：我国从东南向西北出现森林→草原→荒漠，属于纬度地带性分异( )。\n【提高作业】比较纬度地带性与干湿度地带性分异的主导因子和更替方向。\n【参考答案——教师用】基础1：纬度。基础2：×。提高：纬度地带性以热量为主、沿南北（纬度）更替；干湿度地带性以水分为主、沿东西（经度）更替。","reflection":"✅ 亮点：两类方向对比防混；我国实例具体。\n⚠️ 需改进：B班东森西草仍归纬度，需强调方向。\n📌 下节课衔接：垂直地域分异与地方分异。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx1-u5-3","lessonId":"l-geo-sx1-u5-3","title":"垂直地域分异与地方分异","book":"选择性必修1 自然地理基础","unitNumber":5,"unitTitle":"自然环境的整体性与差异性","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["垂直地带性","雪线","地方性分异","人教版选必一Ch5","第三课时"],"textbookAnalysis":"垂直地带性随海拔升高水热变化，自然带类似纬度变化，基带与当地水平带一致；雪线受温度降水影响；局部因地形、岩性、水文产生地方分异（如绿洲、阳坡阴坡）。","overview":"【学情分析】A班：能据基带判山地位置并说雪线因素；B班：常把\"垂直带谱\"与\"纬度带谱\"等同（忽略基带）。共同问题：垂直规律、雪线、地方分异。","objectives":["人地协调观：认识山地生态脆弱，保护垂直带。","综合思维：综合海拔水热分析垂直分异。","区域认知：在山地识别垂直带谱。","地理实践力：能据基带和雪线判读山地。"],"keyPoints":"① 垂直：海拔↑温度↓、降水先增后减，带谱似纬度，基带=当地水平带。\n② 雪线：低纬高、降水多则低；阳坡高阴坡低（视降水）。\n③ 地方分异：局部地形岩性致偏离地带（绿洲、阳阴坡）。\n④ 应用：登山见遍带。","difficulties":"① 基带。原因：垂直带从基带起、基带定山体位置，易漏，需强调。\n② 雪线。原因：温度降水共同，易单因，需析。\n③ 地方分异。原因：非地带性，易与地带混，需分。","teachingMethods":"① 垂直带谱图。\n② 雪线分析。\n③ 地方分异案例。\n④ 判读。","preparation":"【PPT课件】P1 垂直规律；P2 基带；P3 雪线；P4 阳阴坡；P5 地方分异；P6 练习。【地图/图表素材】山地垂直自然带谱图、雪线示意图。","process":[{"step":"Step 1 导入——一山有四季","time":"5分钟","content":"【PPT P1 垂直】教师：「登山从山脚到山顶像从赤道到极地，景观换一遍，是垂直地带性。」 预设回答：「学生说\"山顶有雪\"。」 板书时机：黑板写\"垂直分异\"。差异化提示：B班听；A班需问因。易错点提醒：垂直变化源于海拔水热变。"},{"step":"Step 2 基带与带谱","time":"9分钟","content":"【PPT P2 基带】教师：「垂直带从山麓基带起，基带=当地水平自然带；山体越高纬低带谱越全。」 预设回答：「学生说\"基带定在哪\"（如热带山基带雨林）。」 板书时机：黑板写基带。差异化提示：B班记；A班需联。易错点提醒：基带反映山体所在水平位置。"},{"step":"Step 3 雪线","time":"9分钟","content":"【PPT P3 雪线】教师：「雪线是常年积雪下界，温度高则升、降水多则降；一般阳坡高（热）、阴坡低，但迎风坡因多雪可更低。」 预设回答：「学生说\"为何某坡雪线低\"（降水）。」 板书时机：黑板写雪线。差异化提示：B班记；A班需析。易错点提醒：雪线受温、水双控，勿单因。"},{"step":"Step 4 阳坡阴坡","time":"8分钟","content":"【PPT P4 坡向】教师：「同一山体阳坡热量高、带谱上限高；阴坡反之；但迎风坡多雨带可更低，需综合。」 预设回答：「学生辨\"哪坡林线高\"。」 板书时机：黑板写坡向。差异化提示：B班记；A班需联。易错点提醒：坡向影响温度与降水，二者叠加。"},{"step":"Step 5 地方分异","time":"7分钟","content":"【PPT P5 地方】教师：「局部因地形（河谷）、岩性、地下水出现非地带现象，如荒漠中的绿洲、阳坡草阴坡林。」 预设回答：「学生说\"绿洲为何在沙漠\"（地下水）。」 板书时机：黑板写地方。差异化提示：B班记；A班需分。易错点提醒：地方分异是非地带性，叠加大背景上。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：垂直带基带与当地水平带无关( );绿洲属地方分异( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"判读\"。易错点提醒：下节课学差异性与因地制宜。"}],"blackboard":"┌── 垂直与地方 ──┐\n│ 垂直:海拔↑变│\n│ 基带=水平带 │\n│ 雪线:温高升水│\n│ 多降       │\n│ 地方:绿洲非 │\n│ 地带       │\n└────────────────┘","exercises":"【基础作业】1. 山地垂直自然带的基带通常与山地所在地区的__自然带一致。2. 判断：荒漠中的绿洲属于纬度地带性分异( )。\n【提高作业】说明影响雪线高度的主要因素。\n【参考答案——教师用】基础1：水平（或水平地带）。基础2：×。提高：雪线受温度与降水共同影响：温度高雪线升、温度低降；降水多（迎风坡）雪线降、降水少升。此外坡向、坡度也有影响。","reflection":"✅ 亮点：基带定位置讲清；绿洲非地带强调。\n⚠️ 需改进：B班雪线单因看，需双控。\n📌 下节课衔接：自然环境的差异性与因地制宜。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx1-u5-4","lessonId":"l-geo-sx1-u5-4","title":"自然环境的差异性与因地制宜","book":"选择性必修1 自然地理基础","unitNumber":5,"unitTitle":"自然环境的整体性与差异性","lessonType":"review","lessonTypeName":"复习课","periodNumber":4,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["因地制宜","自然带","综合复习","人教版选必一Ch5","第四课时"],"textbookAnalysis":"综合全章：自然环境既有整体性又有差异性；地带性（纬度、干湿度、垂直）规律支配大尺度分异，地方分异叠加其上；人类应因地制宜、顺应规律开发利用。","overview":"【学情分析】A班：能综合运用整体性与分异规律分析区域；B班：常混淆三类地带性，整体与差异关系不清。共同问题：规律整合与应用。","objectives":["人地协调观：树立因地制宜、顺应自然规律的开发观。","综合思维：综合整体性与分异分析区域。","区域认知：在区域尺度整合规律。","地理实践力：能对某区域提出因地制宜建议。"],"keyPoints":"① 整体+差异：环境既统一又分异。\n② 三大地带：纬度（热/南北）、干湿度（水/东西）、垂直（海拔）。\n③ 地方分异：局部非地带叠加。\n④ 应用：因地制宜（如丘陵林、平原农）。","difficulties":"① 规律整合。原因：三类地带+地方，易乱，需总图。\n② 整体vs差异。原因：二者关系需辩证，易偏。\n③ 因地制宜。原因：落到具体区域难，需练。","teachingMethods":"① 规律总图。\n② 辩证讨论。\n③ 区域案例。\n④ 综合练习。","preparation":"【PPT课件】P1 整体差异；P2 三类地带；P3 地方叠加；P4 因地制宜；P5 案例；P6 练习。【地图/图表素材】世界自然带总图、区域开发案例图。","process":[{"step":"Step 1 导入——规律总览","time":"5分钟","content":"【PPT P1 总览】教师：「自然既是一家人（整体）又各有不同（差异），分异有规律可循。」 预设回答：「学生说\"整体+差异\"。」 板书时机：黑板写\"整体差异\"。差异化提示：B班听；A班需问系。易错点提醒：整体与差异是同一环境两面。"},{"step":"Step 2 三类地带","time":"9分钟","content":"【PPT P2 三类】教师：「纬度（热/南北）、干湿度（水/东西）、垂直（海拔）三大地带性支配大尺度分异。」 预设回答：「学生复述三类方向与因子。」 板书时机：黑板写三类。差异化提示：B班记；A班需析。易错点提醒：三类各有方向主导因子。"},{"step":"Step 3 地方叠加","time":"9分钟","content":"【PPT P3 叠加】教师：「在地带大背景上，局部地形岩水致地方分异（绿洲、坡向），使真实景观更复杂。」 预设回答：「学生说\"绿洲叠在荒漠上\"。」 板书时机：黑板写叠加。差异化提示：B班记；A班需联。易错点提醒：地方分异是叠加非取代。"},{"step":"Step 4 因地制宜","time":"8分钟","content":"【PPT P4 制宜】教师：「顺应规律：平原种粮、丘陵林果、草原放牧、山地林保、湿地涵养，宜农则农。」 预设回答：「学生按自然带提利用。」 板书时机：黑板写制宜。差异化提示：B班记；A班需析。易错点提醒：违背规律会生态恶化。"},{"step":"Step 5 案例","time":"7分钟","content":"【PPT P5 案例】教师：「如江南丘陵红壤贫瘠宜茶果、平原稻作，顺应地带与地方条件。」 预设回答：「学生说\"老家怎么用\"。」 板书时机：黑板写案例。差异化提示：B班记；A班需评。易错点提醒：以地定制，综合整体差异。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：垂直地带性由纬度差异造成( );因地制宜要顺应自然规律( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"综合\"。易错点提醒：选必一全册结束。"}],"blackboard":"┌── 整体与差异 ──┐\n│ 整体:要素联  │\n│ 差异:三地带 │\n│ 纬度/干湿/垂│\n│ 地方:叠加   │\n│ 制宜:顺规律 │\n└────────────┘","exercises":"【基础作业】1. 人类开发利用自然应遵循__（成语）的原则。2. 判断：垂直地带性分异是由纬度位置差异造成的( )。\n【提高作业】综合运用整体性与差异性原理，说明在江南丘陵发展农业应注意什么。\n【参考答案——教师用】基础1：因地制宜。基础2：×。提高：丘陵红壤贫瘠酸、地形起伏大，应林果（茶、柑橘）为主，保土防蚀；谷地平原种稻；兼顾要素整体联系（植被—水土保持），避免陡坡开垦导致连锁退化。","reflection":"✅ 亮点：规律总图整合三类；因地制宜落到区域。\n⚠️ 需改进：B班整体与差异关系仍偏，需辩证。\n📌 下节课衔接：进入选择性必修二 区域发展。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx2-u1-1","lessonId":"l-geo-sx2-u1-1","title":"多种多样的区域","book":"选择性必修2 区域发展","unitNumber":1,"unitTitle":"区域与区域发展","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["区域","区域特征","行政区划","人教版选必二Ch1","第一课时"],"textbookAnalysis":"区域是地球表面的空间单位，具有一定界线、区位、面积和形状；按自然（气候区、地形区）或人文（行政区、经济区）划分；区域内部相似、区际差异。","overview":"【学情分析】A班：能举例说明区域类型与边界特征；B班：常把区域边界当都明确（其实有的过渡）。共同问题：区域特征、类型、边界。","objectives":["人地协调观：认识区域是人类认知与治理空间的基础。","综合思维：综合自然与人文划分区域。","区域认知：识别不同类型区域的边界与特征。","地理实践力：能就身边案例划定并描述区域。"],"keyPoints":"① 区域：空间单位，有界线、区位、面积形状。\n② 特征：内部相似、区间差异、具整体性。\n③ 类型：自然区（气候地形）、人文区（行政区经济区）。\n④ 边界：有的明确（行政）、有的过渡（自然）。","difficulties":"① 边界明确性。原因：行政区明确、自然区模糊，易混，需对比。\n② 类型区分。原因：自然/人文易错，需举。\n③ 区域特征。原因：内部相似外部差异，需强调。","teachingMethods":"① 概念图。\n② 类型举例。\n③ 边界对比。\n④ 身边案例。","preparation":"【PPT课件】P1 区域概念；P2 区域特征；P3 类型；P4 边界；P5 案例；P6 练习。【地图/图表素材】不同区域类型图、行政区与自然区边界对比图。","process":[{"step":"Step 1 导入——我们生活在区域里","time":"5分钟","content":"【PPT P1 概念】教师：「省、市、气候带、地形区都是区域，是地表空间单位。」 预设回答：「学生说\"自己是某省人\"。」 板书时机：黑板写\"区域\"。差异化提示：B班听；A班需问义。易错点提醒：区域是认知与管理的空间单元。"},{"step":"Step 2 区域特征","time":"9分钟","content":"【PPT P2 特征】教师：「区域内部特征相对一致、区与区间有明显差异，且具整体性。」 预设回答：「学生说\"同省像、邻省异\"。」 板书时机：黑板写特征。差异化提示：B班记；A班需析。易错点提醒：内部相似、外部差异是核心特征。"},{"step":"Step 3 区域类型","time":"9分钟","content":"【PPT P3 类型】教师：「按自然划分如气候区、地形区；按人文如行政区、经济区、文化区。」 预设回答：「学生举两类例子。」 板书时机：黑板写类型。差异化提示：B班记；A班需分。易错点提醒：同地可叠加多种区域（行政+气候）。"},{"step":"Step 4 边界","time":"8分钟","content":"【PPT P4 边界】教师：「行政区边界明确（线），自然区常过渡（如干湿区渐变），并非都清晰。」 预设回答：「学生说\"省界清楚、气候带模糊\"。」 板书时机：黑板写边界。差异化提示：B班记；A班需对比。易错点提醒：自然区边界多为过渡带，非实线。"},{"step":"Step 5 案例","time":"7分钟","content":"【PPT P5 案例】教师：「长江三角洲既是自然地形区也是经济区，多重区域叠加。」 预设回答：「学生说\"长三角是什么区\"。」 板书时机：黑板写案例。差异化提示：B班记；A班需析。易错点提醒：区域可多重叠加。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：所有区域边界都十分明确( );行政区属于人文区域( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"举例\"。易错点提醒：下节课学区域整体性和关联性。"}],"blackboard":"┌── 多种多样区域 ──┐\n│ 特征:内似外异│\n│ 类型:自然/人文│\n│ 边界:行政明  │\n│ 自然过渡    │\n│ 多重叠加   │\n└────────────┘","exercises":"【基础作业】1. 区域内部特征相对__，区域之间有明显差异。2. 判断：自然区（如气候区）的边界都像行政区一样明确( )。\n【提高作业】举例说明一个地区可以同时属于多种类型的区域。\n【参考答案——教师用】基础1：一致（相似）。基础2：×。提高：如长江三角洲，既是自然地形区（长江三角洲），又是经济区（长三角城市群）、行政区的一部分，多重区域叠加于同一空间。","reflection":"✅ 亮点：身边案例亲切；边界明确性对比防误。\n⚠️ 需改进：B班自然区边界仍当实线，需强化过渡。\n📌 下节课衔接：区域整体性和关联性。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx2-u1-2","lessonId":"l-geo-sx2-u1-2","title":"区域整体性和关联性","book":"选择性必修2 区域发展","unitNumber":1,"unitTitle":"区域与区域发展","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["区域整体性","区域关联性","要素流动","人教版选必二Ch1","第二课时"],"textbookAnalysis":"区域整体性指区域内自然与人文要素相互联系构成统一整体；关联性指区域间通过物质、能量、信息流动发生联系，一个区域变化可影响他区。","overview":"【学情分析】A班：能说明区域间关联的通道与影响；B班：常只讲整体不讲关联（或反之）。共同问题：整体性与关联性区分。","objectives":["人地协调观：认识区域联系，树立合作共赢意识。","综合思维：综合要素与区际联系看区域。","区域认知：识别区域内要素与区际关联。","地理实践力：能分析某区域变化对他区的影响。"],"keyPoints":"① 整体性：区域内要素（自然+人文） interdependent，一变俱变。\n② 关联性：区域间经人流物流信息流相联系。\n③ 通道：交通、贸易、流域、网络。\n④ 影响：上游开发影响下游，区际传导。","difficulties":"① 整体vs关联。原因：一为内部、一为区际，易混，需分。\n② 关联通道。原因：具体流动方式，需举。\n③ 传导影响。原因：区际因果链，易漏，需析。","teachingMethods":"① 整体网络图。\n② 关联流图。\n③ 流域案例。\n④ 讨论。","preparation":"【PPT课件】P1 整体性；P2 要素网；P3 关联性；P4 通道；P5 传导；P6 练习。【地图/图表素材】区域要素联系图、流域上下游关联图。","process":[{"step":"Step 1 导入——区域不是孤岛","time":"5分钟","content":"【PPT P1 整体】教师：「一个区域内部各要素像团队，同时区域之间也互相牵连，这就是整体与关联。」 预设回答：「学生说\"省际贸易\"。」 板书时机：黑板写\"整体关联\"。差异化提示：B班听；A班需问别。易错点提醒：整体是内部、关联是区际。"},{"step":"Step 2 区域整体性","time":"9分钟","content":"【PPT P2 整体】教师：「区域内气候水土生物人文相互依赖，某一要素变化会带动其他要素乃至整体变化。」 预设回答：「学生说\"污染一地全城受影响\"。」 板书时机：黑板写整体。差异化提示：B班记；A班需网。易错点提醒：整体性是区域内部统一。"},{"step":"Step 3 区域关联性","time":"9分钟","content":"【PPT P3 关联】教师：「区域间通过人流、物流、信息流、资金流相联系，如贸易、交通、网络。」 预设回答：「学生举\"网购连两地\"。」 板书时机：黑板写关联。差异化提示：B班记；A班需流。易错点提醒：关联是区际的流动联系。"},{"step":"Step 4 通道","time":"8分钟","content":"【PPT P4 通道】教师：「关联靠通道：交通线、河流、电网、通信网，通道越畅联系越强。」 预设回答：「学生说\"高铁联两城\"。」 板书时机：黑板写通道。差异化提示：B班记；A班需联。易错点提醒：通道是关联的物质载体。"},{"step":"Step 5 传导影响","time":"7分钟","content":"【PPT P5 传导】教师：「上游截流或污染会传导至下游，一区变化波及他区，需协同治理。」 预设回答：「学生说\"上游脏下游遭殃\"。」 板书时机：黑板写传导。差异化提示：B班记；A班需析。易错点提醒：区际影响有因果传导。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：区域整体性指区域之间的联系( );流域上游开发会影响下游( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"分析\"。易错点提醒：下节课学区域发展阶段。"}],"blackboard":"┌── 整体与关联 ──┐\n│ 整体:内要素联│\n│ 一变俱变   │\n│ 关联:区际流 │\n│ 人/物/信息  │\n│ 通道:交通网│\n│ 上游→下游  │\n└────────────┘","exercises":"【基础作业】1. 区域内各要素相互联系、相互__，构成统一整体。2. 判断：区域整体性是指不同区域之间的相互关联( )。\n【提高作业】以河流流域为例，说明区域之间的关联性。\n【参考答案——教师用】基础1：依赖（影响）。基础2：×。提高：流域内上下游通过水流联系，上游用水与污染会传导至中游下游，水质水量联动，需全流域协同管理，体现区际关联性。","reflection":"✅ 亮点：整体/关联内外分讲清；流域传导案例具体。\n⚠️ 需改进：B班整体关联仍混，需反复对比。\n📌 下节课衔接：区域发展阶段与区域发展。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx2-u1-3","lessonId":"l-geo-sx2-u1-3","title":"区域发展阶段与区域发展","book":"选择性必修2 区域发展","unitNumber":1,"unitTitle":"区域与区域发展","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["区域发展阶段","以传统农业为主","高效益","人教版选必二Ch1","第三课时"],"textbookAnalysis":"区域发展阶段：以传统农业为主→工业化→高效益综合阶段；随阶段推进，产业结构由一产为主转向二三产、城市化提高、内部差异先扩后缩、对外开放增强。","overview":"【学情分析】A班：能排列阶段并说特征变化；B班：常把\"内部差异\"变化记反（应先扩后缩）。共同问题：阶段演进特征。","objectives":["人地协调观：认识发展阶段规律，追求高质量协调。","综合思维：综合产业城市开放看阶段。","区域认知：识别区域所处发展阶段。","地理实践力：能据指标判断本地阶段。"],"keyPoints":"① 阶段：传统农业→工业化→高效益综合。\n② 产业：一产为主→二三产升→三产主导。\n③ 城市与差异：城市化提高；内部差异先扩大后缩小。\n④ 开放：对外联系由弱到强。","difficulties":"① 阶段顺序。原因：三阶段递进，易乱，需链。\n② 差异变化。原因：先扩后缩，易记单向，需强调。\n③ 高效益特征。原因：三产主导、创新，需点。","teachingMethods":"① 阶段链图。\n② 特征对比表。\n③ 区域案例（发达/欠发达）。\n④ 判读。","preparation":"【PPT课件】P1 阶段链；P2 传统农业；P3 工业化；P4 高效益；P5 差异变化；P6 练习。【地图/图表素材】区域发展阶段示意图、产业结构演变图。","process":[{"step":"Step 1 导入——区域也会长大","time":"5分钟","content":"【PPT P1 阶段】教师：「区域像人一样有成长阶段：农业→工业→高效综合，发展水平递进。」 预设回答：「学生说\"老家在哪一阶段\"。」 板书时机：黑板写\"阶段\"。差异化提示：B班听；A班需问链。易错点提醒：阶段是演进过程，非孤立。"},{"step":"Step 2 传统农业阶段","time":"9分钟","content":"【PPT P2 传统】教师：「以传统农业为主，一产比重大、工业化低、城市少、内部较均衡、开放弱。」 预设回答：「学生说\"落后区特征\"。」 板书时机：黑板写传统。差异化提示：B班记；A班需析。易错点提醒：此阶段人均水平低。"},{"step":"Step 3 工业化阶段","time":"9分钟","content":"【PPT P3 工业】教师：「工业迅速成长，二三产上升，城市扩张，区域差异（中心—外围）扩大，开放增强。」 预设回答：「学生说\"我国曾处此阶段\"。」 板书时机：黑板写工业。差异化提示：B班记；A班需析。易错点提醒：工业化期区域差异往往扩大。"},{"step":"Step 4 高效益综合","time":"8分钟","content":"【PPT P4 高效】教师：「高效益综合阶段三产主导、科技与信息突出、城市化高、差异缩小、对外联系强。」 预设回答：「学生说\"发达区特征\"。」 板书时机：黑板写高效。差异化提示：B班记；A班需析。易错点提醒：此阶段以创新和服务业为驱动。"},{"step":"Step 5 差异变化","time":"7分钟","content":"【PPT P5 差异】教师：「区内差异随阶段先扩大（中心崛起）后缩小（扩散均衡），呈倒U形。」 预设回答：「学生说\"为何后来差距小\"（扩散）。」 板书时机：黑板写差异。差异化提示：B班记；A班需析。易错点提醒：差异先扩后缩，非单调。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：高效益阶段以第一产业为主( );区内差异随发展先扩后缩( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"判读\"。易错点提醒：本章结束，进入资源型城市转型。"}],"blackboard":"┌── 发展阶段 ──┐\n│ 农→工→高效 │\n│ 产业:一→二三│\n│ →三主导    │\n│ 差异:先扩后│\n│ 缩(倒U)   │\n└────────────┘","exercises":"【基础作业】1. 区域发展的最高阶段通常被称为__综合发展阶段。2. 判断：在工业化阶段，区域内部的发展差异一般会缩小( )。\n【提高作业】说明区域从工业化阶段向高效益综合阶段演进时产业结构的变化。\n【参考答案——教师用】基础1：高效益。基础2：×。提高：工业化阶段二三产比重上升但以工业为主、差异扩大；高效益阶段第三产业（服务、科技、信息）成主导，城市化高、区内差异缩小、创新驱动增强。","reflection":"✅ 亮点：阶段链+倒U差异讲清；案例对应阶段。\n⚠️ 需改进：B班差异变化记单向，需强调倒U。\n📌 下节课衔接：第二章 区域发展的自然环境基础。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx2-u2-1","lessonId":"l-geo-sx2-u2-1","title":"区域发展的自然环境基础","book":"选择性必修2 区域发展","unitNumber":2,"unitTitle":"资源枯竭型城市的转型","lessonType":"new","lessonTypeName":"新授课","periodNumber":1,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["自然条件","资源","区域发展基础","人教版选必二Ch2","第一课时"],"textbookAnalysis":"区域发展的自然环境基础包括地形、气候、水文、土壤、植被与自然资源；自然条件影响农业生产类型与产业布局，资源丰歉制约工业与城市发展，人地协调是可持续前提。","overview":"【学情分析】A班：能分析自然如何支撑区域发展；B班：常忽视自然的基础约束（以为产业可随意布局）。共同问题：自然要素对发展的支撑与限制。","objectives":["人地协调观：认识自然是基础，开发须协调。","综合思维：综合自然要素分析发展条件。","区域认知：识别区域自然环境特征。","地理实践力：能评价本地自然基础对发展的影响。"],"keyPoints":"① 要素：地形气候水文土壤植被资源。\n② 支撑：农业受水热地形定，工业受资源交通定。\n③ 限制：生态脆弱区宜保护不宜过度开发。\n④ 协调：禀赋决定路径，人地协调可持续。","difficulties":"① 基础地位。原因：自然是先决条件，易轻，需强调。\n② 要素对应。原因：各要素支持不同产业，需联，易混。\n③ 脆弱区。原因：开发受限，需点。","teachingMethods":"① 要素支撑图。\n② 案例（平原农/矿区工）。\n③ 限制性分析。\n④ 讨论。","preparation":"【PPT课件】P1 自然要素；P2 农业支撑；P3 工业支撑；P4 资源制约；P5 协调；P6 练习。【地图/图表素材】区域发展自然条件图、资源分布与产业布局图。","process":[{"step":"Step 1 导入——靠山吃山","time":"5分钟","content":"【PPT P1 要素】教师：「一个地方能发展什么，先看老天给的：地形水土资源，这就是自然环境基础。」 预设回答：「学生说\"老家靠什么\"。」 板书时机：黑板写\"自然基础\"。差异化提示：B班听；A班需问素。易错点提醒：自然是发展的先决条件。"},{"step":"Step 2 农业支撑","time":"9分钟","content":"【PPT P2 农业】教师：「水热决定作物熟制、地形决定垦殖方式、土壤决定肥力，自然框定农业类型。」 预设回答：「学生说\"南方水田北方旱地\"。」 板书时机：黑板写农业。差异化提示：B班记；A班需联。易错点提醒：农业最直接受自然约束。"},{"step":"Step 3 工业与资源","time":"9分钟","content":"【PPT P3 工业】教师：「矿产、水、能源等资源丰富处易布局相应工业与城市，资源是工业命脉。」 预设回答：「学生说\"煤矿旁建电厂\"。」 板书时机：黑板写工业。差异化提示：B班记；A班需联。易错点提醒：资源型产业依赖禀赋，易随资源枯而衰。"},{"step":"Step 4 限制与脆弱","time":"8分钟","content":"【PPT P4 限制】教师：「生态脆弱区（如荒漠边缘）环境承载力低，过度开发易退化，宜保护为主。」 预设回答：「学生说\"草原过度垦殖沙化\"。」 板书时机：黑板写限制。差异化提示：B班记；A班需析。易错点提醒：脆弱区开发阈值低。"},{"step":"Step 5 人地协调","time":"7分钟","content":"【PPT P5 协调】教师：「禀赋决定路径，开发须量体裁衣、保护环境，走可持续。」 预设回答：「学生说\"不能滥采\"。」 板书时机：黑板写协调。差异化提示：B班记；A班需联。易错点提醒：违背自然基础必受惩罚。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：区域发展可以完全不受自然环境制约( );矿产资源丰富利于布局相关工业( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"评价\"。易错点提醒：下节课学生态脆弱区治理。"}],"blackboard":"┌── 自然环境基础 ──┐\n│ 素:地气水土生资│\n│ 农:水热地形定 │\n│ 工:资源交通定 │\n│ 脆弱区:宜保   │\n│ 协调可持续   │\n└────────────────┘","exercises":"【基础作业】1. 区域工业发展往往依赖于当地的__禀赋（如矿产、能源）。2. 判断：自然条件是区域发展的唯一决定因素，与社会经济无关( )。\n【提高作业】说明自然环境如何从农业、工业两方面影响区域发展。\n【参考答案——教师用】基础1：资源（自然）。基础2：×。提高：农业受水热地形土壤直接约束决定作物与熟制；工业布局受矿产水能交通等自然资源影响，资源富集区易形成资源型产业和城市，但发展还需社会经济的配合。","reflection":"✅ 亮点：靠山吃山切入自然基础；脆弱区阈值强调。\n⚠️ 需改进：B班易以为产业随意，需多约束例。\n📌 下节课衔接：生态脆弱区的综合治理。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx2-u2-2","lessonId":"l-geo-sx2-u2-2","title":"生态脆弱区的综合治理","book":"选择性必修2 区域发展","unitNumber":2,"unitTitle":"资源枯竭型城市的转型","lessonType":"new","lessonTypeName":"新授课","periodNumber":2,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["生态脆弱区","荒漠化","小流域","人教版选必二Ch2","第二课时"],"textbookAnalysis":"生态脆弱区环境承载力低、易退化，如北方农牧交错带土地荒漠化；治理遵循因地制宜、预防为主，措施包括生物（造林种草）、工程（沙障）、农业（退耕还林还草、舍饲）。","overview":"【学情分析】A班：能提出荒漠化综合治理措施并评价；B班：常只说\"种树\"忽略工程与农业措施。共同问题：脆弱区成因、综合措施。","objectives":["人地协调观：树立生态修复与保护优先理念。","综合思维：综合生物工程农业措施治理。","区域认知：在脆弱区定位退化类型。","地理实践力：能针对某脆弱区提治理方案。"],"keyPoints":"① 脆弱区：承载力低、过渡带易退化（如农牧交错带）。\n② 成因：干旱+过度垦殖放牧樵采。\n③ 措施：生物（林草）、工程（沙障网格）、农业（退耕舍饲）。\n④ 原则：预防为主、因地制宜、小流域综合。","difficulties":"① 脆弱成因。原因：自然基础+人为叠加，需综合，易单面。\n② 措施综合。原因：单一措施无效，需三结合，易漏。\n③ 小流域。原因：综合治理单元，需点。","teachingMethods":"① 脆弱区图。\n② 成因链。\n③ 措施三结合。\n④ 案例（陕北/沙尘暴）。","preparation":"【PPT课件】P1 脆弱区；P2 成因；P3 生物措施；P4 工程农业；P5 案例；P6 练习。【地图/图表素材】我国生态脆弱区分布图、荒漠化治理措施图。","process":[{"step":"Step 1 导入——沙进人不退","time":"5分钟","content":"【PPT P1 脆弱】教师：「农牧交错带、干旱半干旱区最易沙化，是生态脆弱区，需重点治理。」 预设回答：「学生说\"沙尘暴来源\"。」 板书时机：黑板写\"脆弱区\"。差异化提示：B班听；A班需问区。易错点提醒：脆弱区是环境过渡带，易退化。"},{"step":"Step 2 成因","time":"9分钟","content":"【PPT P2 成因】教师：「自然：干旱多风、植被稀；人为：过度垦殖放牧樵采，二者叠加致荒漠化。」 预设回答：「学生说\"人为是主因\"。」 板书时机：黑板写成因。差异化提示：B班记；A班需链。易错点提醒：自然是基础，人为是触发。"},{"step":"Step 3 生物措施","time":"9分钟","content":"【PPT P3 生物】教师：「生物措施：造林种草、封育保护，恢复植被这个治本之策。」 预设回答：「学生说\"草方格前先固沙植被\"。」 板书时机：黑板写生物。差异化提示：B班记；A班需析。易错点提醒：植被恢复是根本，但需先固沙。"},{"step":"Step 4 工程与农业","time":"8分钟","content":"【PPT P4 工农】教师：「工程：沙障（草方格）固沙；农业：退耕还林还草、舍饲圈养、调整结构，减人为压力。」 预设回答：「学生说\"草方格怎么用\"。」 板书时机：黑板写工农。差异化提示：B班记；A班需联。易错点提醒：工程治标、生物农业治本，需配合。"},{"step":"Step 5 案例原则","time":"7分钟","content":"【PPT P5 案例】教师：「以小流域为单元综合治，预防为主、因地制宜，如黄土高原淤地坝+林草。」 预设回答：「学生说\"小流域综合治理\"。」 板书时机：黑板写原则。差异化提示：B班记；A班需析。易错点提醒：综合治理单元化、预防优先。"},{"step":"Step 6 练习+作业","time":"5分钟","content":"【PPT P6 练习】教师：「判断：生态脆弱区治理只需种树( );退耕还林还草属农业措施( )。」 预设回答：「学生辨析订正。」 板书时机：板书。差异化提示：B班基础；A班加\"方案\"。易错点提醒：下节课学资源枯竭型城市转型。"}],"blackboard":"┌── 脆弱区治理 ──┐\n│ 因:干旱+过牧 │\n│ 生物:林草固本│\n│ 工程:沙障   │\n│ 农业:退耕舍饲│\n│ 小流域综合 │\n└────────────┘","exercises":"【基础作业】1. 治理土地荒漠化最根本的措施是恢复__。2. 判断：在生态脆弱区，草方格沙障属于生物措施( )。\n【提高作业】说明我国北方农牧交错带土地荒漠化的主要人为原因及综合治理思路。\n【参考答案——教师用】基础1：植被（或林草）。基础2：×。提高：人为原因—过度开垦、过度放牧、过度樵采。治理：生物（造林种草）、工程（草方格固沙）、农业（退耕还林还草、舍饲）三结合，小流域单元综合、预防为主。","reflection":"✅ 亮点：三措施结合防\"只种树\"；小流域单元实用。\n⚠️ 需改进：B班措施仍偏单一，需强化综合。\n📌 下节课衔接：资源枯竭型城市的转型发展。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T12:00:00Z"},{"id":"l-geo-sx2-u2-3","lessonId":"l-geo-sx2-u2-3","title":"资源枯竭型城市的转型发展","book":"选择性必修2 区域发展","unitNumber":2,"unitTitle":"资源枯竭型城市的转型","lessonType":"new","lessonTypeName":"新授课","periodNumber":3,"duration":45,"grade":"高二","subject":"地理","coreLiteracy":["人地协调观","综合思维","区域认知","地理实践力"],"tags":["资源枯竭","产业转型","接续产业","人教版选必二Ch2","第三课时"],"textbookAnalysis":"资源枯竭型城市因资源减采面临经济衰退、失业、环境恶化；转型路径：延长资源产业链、培育接续替代产业（如装备制造、旅游、新能源）、治理环境、完善社保。","overview":"【学情分析】A班：能系统设计转型路径并评价；B班：常把\"转型\"当\"放弃资源\"（实为延伸+替代）。共同问题：问题成因、转型路径。","objectives":["人地协调观：认识可持续发展对资源型城市的生命线意义。","综合思维：综合产业环境社保分析转型。","区域认知：识别资源型城市的困境与方向。"
