得（通讯写作）整合为单元学习成果。"],"keyPoints":"① 劳动者故事分享会：每人/小组讲述自己通讯中的人物，限时2分钟，不念稿。\n② 劳动精神关键词展：每人用一个关键词+一句话概括单元学习感悟。\n③ 单元学习反思单：回顾8课时学习路径，填写「我学会了/我还需要提升/我的疑问」。","difficulties":"① 从「念稿」到「讲故事」的转换。原因：学生习惯读自己写的文字，缺乏口语化讲述训练，需给讲述技巧卡。\n② 反思的深度。原因：学生习惯写「学到了很多」，需用具体提示引导（「我学会的最重要的一个方法是……」）。\n③ 活动节奏控制。原因：分享环节容易超时，需严格计时+灵活裁剪。","teachingMethods":"① 分享会式展示法：营造「劳动者故事会」氛围，学生轮流上台讲述。\n② 关键词展览法：把每个人的「关键词+感悟」写在便签纸上贴成「劳动精神墙」。\n③ 反思单法：结构化反思工具，引导元认知。\n④ 教师总结法：回顾8课时学习路径，点明单元核心能力可迁移之处。","preparation":"【PPT课件】P1 「我身边的劳动者」分享会封面+流程；P2 讲述技巧卡（不念稿·有细节·有精神·2分钟）；P3 劳动精神关键词展说明（一个词+一句话）；P4 单元学习路径回顾（8课时思维导图）；P5 学习反思单模板；P6 下单元预告。\n【实物教具】便签纸每人1张（写关键词+感悟）；A3纸一张（贴便签做「劳动精神墙」）；计时器。\n【音频】轻音乐（分享时背景音可选）。","process":[{"step":"Step 1 单元回顾——8课时路径","time":"5分钟","content":"【PPT P4 学习路径图】教师：「这个单元我们走了8节课的路，一起回顾。」 快速展示8课时路径：①袁隆平通讯（实用文阅读）→②张秉贵·钟扬群文比较→③工匠精神评论精读→④芣苢·收麦古诗→⑤访谈与播报口语训练→⑥学写人物通讯→⑦通讯修改讲评→⑧今天分享会。教师：「核心方法是什么？」 预设回答：「通讯！从读到写到说都是通讯！」 板书时机：黑板画8课时路径简图，终点写「通讯：读→写→说」。差异化提示：B班说核心方法；A班需说「通讯的三步法怎么从阅读迁移到写作和口语」。易错点提醒：回顾不是重新讲课，是帮学生建立「学了什么」的结构化认知——读通讯→说访谈→写通讯，一条能力线贯穿。"},{"step":"Step 2 劳动者故事分享会（上）","time":"15分钟","content":"【PPT P1 分享流程】【PPT P2 讲述技巧卡】教师：「『我身边的劳动者』分享会现在开始。每人上台讲述你通讯中的人物——2分钟，不念稿，讲细节讲精神。」 教师：「讲述前看一眼技巧卡：不念稿（用口语说不是读作文）、有细节（讲1-2个具体画面）、有精神（点一句他身上的劳动精神）、2分钟（超时叫停）。」 学生轮流上台讲述。板书时机：在黑板旁记录每人讲述的人物+一个亮点词。差异化提示：B班可小组讲述（2-3人分工讲一个人物）降低压力；A班单独讲述+自选是否配图。易错点提醒：讲述不是朗诵通讯稿——要抬头看观众，用口语说（「我写的是我们门卫王师傅，有一件事我印象特别深……」），不是背作文。 预设回答：「（各小组依次展示分享，讲述身边劳动者的故事或采访见闻，听众提问交流。）」"},{"step":"Step 3 劳动精神关键词展","time":"8分钟","content":"【PPT P3 关键词展说明】教师：「在便签纸上写两行：第一行写一个关键词（一个词），第二行写一句话——这个关键词概括了你这个单元最大的感悟。」 学生写便签。预设回答（便签示例）：「坚守/张秉贵练了几十年一抓准，坚守就是劳动光荣。」「细节/通讯不写伟大写细节，细节比评价有力。」「14万株/袁隆平让我知道科学也是劳动。」 板书时机：学生依次上台贴便签到A3「劳动精神墙」上，教师拍照存档。差异化提示：B班写关键词+一句话；A班需写关键词+一句话+一个「为什么选这个词」的理由。易错点提醒：关键词不要重复——如果有人写了「坚守」，后面的人尽量换一个；鼓励独特发现，如「14万株」「手抖」「凌晨四点」都可以是关键词。"},{"step":"Step 4 单元学习反思单","time":"10分钟","content":"【PPT P5 反思单模板】教师：「最后10分钟，填学习反思单。三行：①我学会了（最重要的一个方法/知识）；②我还需要提升（具体一项）；③我的疑问（可以没有）。」 学生填写。预设回答（反思示例）：「①我学会了以事写人——不说好而好自现。②我还需要提升选材的典型性。③新闻评论和通讯有什么本质区别？」 板书时机：教师巡视，选2-3份有代表性的反思准备下环节分享。差异化提示：B班填前两行；A班全部填写+在「疑问」行写出有思考价值的问题。易错点提醒：反思不要写「学到了很多」——要写具体的「一个方法」或「一个知识」，越具体越好；比如「我学会了访谈问题要分三层」比「我学会了访谈」好得多。"},{"step":"Step 5 分享反思+教师总结","time":"7分钟","content":"【PPT P6 下单元预告】教师选2-3份反思分享。教师总结：「这个单元我们从袁隆平的稻田走到你身边的门卫师傅，从读通讯走到写通讯走到说通讯。核心只有一个词——以事写人。带着这个能力，下单元我们读古诗词，会发现古诗也『以事写人』——只不过它用意象和典故来写。」 板书时机：板书「读→写→说→用：以事写人可迁移」。差异化提示：B班听总结；A班需在反思单背面写一句「以事写人怎么用到下单元古诗阅读」。易错点提醒：不要让单元结束变成「考试结束」——以事写人是可迁移的能力，提醒学生在课外阅读和写作中也试着用；关注身边的劳动者不只在这个单元，是一种生活态度。 预设回答：「（学生用一句话概括本单元最大的收获，如『劳动的价值在于创造与坚守』。）」"}],"blackboard":"┌── 劳动者分享会·单元收官 ──┐\n│                            │\n│ 【8课时路径】               │\n│ ①袁隆平通讯→②群文比较→    │\n│ ③工匠评论→④古诗劳动→      │\n│ ⑤访谈播报→⑥写通讯→        │\n│ ⑦讲评→⑧分享会              │\n│ 终点:通讯 读→写→说          │\n│                            │\n│ 【劳动精神墙】              │\n│  坚守/张秉贵练了几十年      │\n│  细节/不说伟大写细节        │\n│  14万株/科学也是劳动        │\n│  手抖/勺子替她说话          │\n│  ……(便签贴满)              │\n│                            │\n│ 【反思三问】                │\n│ ①我学会了__               │\n│ ②我需提升__               │\n│ ③我的疑问__               │\n│                            │\n│ 读→写→说→用:以事写人可迁移 │\n└────────────────────────────┘","exercises":"【基础作业】1. 提交单元学习反思单（三行完整填写）。2. 在作文本上誊抄你分享的劳动者故事（通讯终稿）+ 一句分享感受。\n【提高作业】写一段150字「单元学习总结」，要求：①点明本单元最重要的一个方法；②举一个具体例子说明你用了这个方法；③说一个你想在下单元继续提升的方面。\n【参考答案——教师用】反思单评价：三行填写完整+具体=合格；有方法意识+有自我诊断=良好；疑问有思考价值（如「评论和通讯的本质区别」）=优秀。单元总结评价：有点明方法+举例=合格；有方法迁移意识=良好；有个性化学习反思=优秀。","reflection":"✅ 亮点：劳动精神墙效果出乎意料——学生写的「14万株」「手抖」「凌晨四点」证明他们真的内化了「以事写人」意识；分享会氛围好，B班小组讲述降低了压力。\n⚠️ 需改进：分享环节15分钟只够8人，全班没轮完；下次应分两组同时进行或限制每人1.5分钟。\n📌 下单元衔接：第三单元「生命的诗意」转向古诗词阅读，从实用文回到文学，「以事写人」从通讯迁移到诗词——古诗用意象和典故「写人写情」，需在第三单元U1课时做显性衔接。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T22:00:00Z"},{"id":"l-cn-bs-u3-1","lessonId":"l-cn-bs-u3-1","title":"短歌行 / 归园田居（其一）精读——两种人生之思","book":"必修上册","unitNumber":3,"unitTitle":"生命的诗意","taskGroup":"文学阅读与写作","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":1,"duration":45,"grade":"高一","subject":"语文","tags":["精读","古诗词","曹操","陶渊明","人生志趣","人教版必修上U3","第一课时"],"textbookAnalysis":"本课为第三单元第一课时，聚焦曹操《短歌行》与陶渊明《归园田居（其一）》两首东汉末至东晋的诗作。二者一入世一出世，一慷慨一冲淡，构成「人生志趣」的两种典型表达。《短歌行》以「忧思」为脉，用「青青子衿」「呦呦鹿鸣」「周公吐哺」典故表达渴慕贤才、建功立业之志；《归园田居》以「归」为眼，用「误落尘网」「羁鸟恋旧林」「复得返自然」表达挣脱官场、回归田园之愿。对比阅读最能见出诗人生命选择。","overview":"【学情分析】A班：初中背过《观沧海》《饮酒》，对曹操、陶渊明有基本认知，但停留在「曹操是奸雄、陶渊明爱田园」的标签，缺乏文本细读。B班：对古诗用典不熟（青青子衿、周公吐哺），读《短歌行》易半懂不懂；对「尘网」「樊笼」的比喻义理解模糊。共同问题：把两首诗当孤立篇目读，不会做对比；对「志趣」概念抽象，不知如何落到诗句。","objectives":["语言能力：准确朗读并背诵两诗，解释「青青子衿」「周公吐哺」「羁鸟」「樊笼」等词句的语境义。","文化意识：理解曹操「建立功业」与陶渊明「回归自然」两种人生志趣，体会古人生命选择的多样性。","思维品质：通过对比两诗的「志趣取向」，培养在差异中提炼共性的比较思维能力。","学习能力：掌握「抓诗眼→理脉络→品典故/意象→悟志趣」的古诗研读路径。"],"keyPoints":"① 《短歌行》诗眼：「忧」——忧人生苦短、忧贤才未至、忧天下未定，以「周公吐哺」收束明志。\n② 《归园田居》诗眼：「归」——从「误落尘网」到「复得返自然」，以「羁鸟」「池鱼」自比。\n③ 对比维度：志趣（入世/出世）、风格（慷慨/冲淡）、手法（用典/白描）。","difficulties":"① 《短歌行》用典密集。原因：学生不熟悉《诗经》《管子》典故，需逐一搭桥。\n② 「忧」的多层含义。原因：学生易把「忧」理解为悲伤，实为「 urgent concern」，需区分。\n③ 两诗对比的归纳。原因：学生能说差异但难提炼共性——都「主动选择自己的人生」，需引导。","teachingMethods":"① 诵读法：范读→齐读→配乐诵读，体会慷慨与冲淡两种基调。\n② 对比阅读法：双栏对照表（诗眼/志趣/手法/风格）。\n③ 典故搭桥法：逐一讲解《短歌行》三处用典的来源与用意。\n④ 意象联想法：用「羁鸟」「池鱼」唤起学生「被困」的体验。","preparation":"【PPT课件】P1 单元封面「生命的诗意」+学习任务群；P2 两诗全文双栏；P3 《短歌行》典故标注（青青子衿/呦呦鹿鸣/周公吐哺）；P4 《归园田居》意象分析（尘网/羁鸟/樊笼/自然）；P5 对比阅读表；P6 时代背景（东汉末乱世/东晋隐逸）；P7 课堂练习。\n【实物教具】无。\n【音频】两诗名家朗诵各1分钟。","process":[{"step":"Step 1 导入——两种人生","time":"5分钟","content":"【PPT P1 单元封面】教师：「如果让你选，你愿做建功立业的人，还是归隐田园的人？」 预设回答：「我想做有用的人（入世）。」「我想过得自由（出世）。」 板书时机：黑板中央写「人生志趣」，左右分列「入世／出世」。差异化提示：B班选一个词；A班需说自己为什么这么选。易错点提醒：入世与出世没有高下，是古人在不同处境下的生命选择，不要简单褒贬。"},{"step":"Step 2 诵读感知——两种基调","time":"8分钟","content":"【PPT P2 双栏诗】【音频】教师范读两诗并播放朗诵。教师：「两首诗读起来感觉一样吗？」 预设回答：「短歌行——沉重、急切；归园田居——轻松、舒缓。」 板书时机：在「入世」下写「慷慨·急切」；「出世」下写「冲淡·舒缓」。差异化提示：B班说感受词；A班需指出「哪句让你有这种感觉」。易错点提醒：《短歌行》四言为主，二字一顿，节奏短促；《归园田居》五言，节奏舒展，朗读时不能混。"},{"step":"Step 3 短歌行精读——抓「忧」","time":"12分钟","content":"【PPT P3 典故标注】教师：「《短歌行》反复出现一个字，是哪个？」 预设回答：「忧！忧人生、忧贤才。」 教师：「『青青子衿』『呦呦鹿鸣』两句典故出自哪里？表达什么？」 预设回答：「出自《诗经》，表达对贤才的思念和欢迎。」 板书时机：黑板左列「短歌行：忧→志」，逐行写「忧时光(对酒当歌)｜忧贤才(青青子衿)｜忧天下(周公吐哺)」。差异化提示：B班说出三处「忧」；A班需分析「为何以周公自比」——明辅佐之志。易错点提醒：「青青子衿」本写恋人，曹操移用来写贤才，是「借典移情」，不能按原意理解。"},{"step":"Step 4 归园田居精读——抓「归」","time":"12分钟","content":"【PPT P4 意象分析】教师：「陶渊明『归』的是什么？找找比喻词。」 预设回答：「尘网——官场；羁鸟、池鱼——被束缚的自己；樊笼——仕途；自然——田园。」 教师：「『误落尘网中』的『误』字好在哪里？」 预设回答：「说明他本不属于官场，是走错了路。」 板书时机：黑板右列「归园田居：归→自然」，写「尘网(官场)｜羁鸟(我)｜樊笼(仕途)｜自然(本心)」。差异化提示：B班找比喻词；A班需说「误」字的情感分量——自责中见清醒。易错点提醒：「守拙归园田」的「拙」不是笨，是「不阿世、保持本真」，是褒义。"},{"step":"Step 5 对比归纳","time":"6分钟","content":"【PPT P5 对比表】教师：「把两诗放一起比，填这张表。」 预设回答：「志趣——曹操入世建功，陶渊明出世归隐；手法——曹操用典，陶渊明白描；风格——慷慨vs冲淡。」 板书时机：黑板中央画双栏对比表。差异化提示：B班填志趣+风格；A班全部填并补「共性」。易错点提醒：归纳共性——两者都「主动选择自己的人生道路」，只是方向不同，这是「生命的诗意」第一层含义。"},{"step":"Step 6 小结+作业","time":"2分钟","content":"【PPT P7 练习】教师：「今天我们抓了什么读古诗？」 预设回答：「抓诗眼——忧和归！」 板书时机：板书古诗读法「诗眼→脉络→典故/意象→志趣」。差异化提示：B班背两诗；A班写100字「我更共鸣哪一种志趣」。易错点提醒：下节课读李白《梦游天姥吟留别》，从「现实志趣」转向「浪漫想象」，提醒注意题材变化。"}],"blackboard":"┌── 生命的诗意·U1 ──┐\n│ 人生志趣            │\n│ 入世      出世      │\n│ 慷慨      冲淡      │\n│                    │\n│ 【短歌行】忧→志     │\n│ 忧时光(对酒当歌)    │\n│ 忧贤才(青青子衿)    │\n│ 忧天下(周公吐哺)    │\n│                    │\n│ 【归园田居】归→自然 │\n│ 尘网=官场 羁鸟=我   │\n│ 樊笼=仕途 自然=本心 │\n│ 误→自责中见清醒    │\n│                    │\n│ 【对比】            │\n│ 志趣:建功/归隐      │\n│ 手法:用典/白描      │\n│ 共性:主动选择人生   │\n└────────────────────┘","exercises":"【基础作业】1. 背诵默写《短歌行》《归园田居（其一）》。2. 解释：①青青子衿 ②周公吐哺 ③羁鸟 ④樊笼。\n【提高作业】写一段180字比较，题为「两种人生之思」，要求：①引用两诗原句；②点明志趣差异；③说出你更共鸣哪一种及理由。\n【参考答案——教师用】基础2：①青青子衿——借《诗经》代指贤才。②周公吐哺——周公进餐时多次吐食迎客，喻求贤若渴。③羁鸟——被束缚的鸟，自比。④樊笼——喻官场束缚。提高作业评价：引原句+点差异=合格；有个人共鸣理由=良好；能上升到「生命选择的多样性」=优秀。","reflection":"✅ 亮点：双栏对比表让学生同时抓住两诗，B班也能说出差异；「误」字细读触发了对「本心」的讨论，气氛活跃。\n⚠️ 需改进：《短歌行》典故讲解偏长，挤压了对比环节；下次把典故做成课前微课，课上只点拨。\n📌 下节课衔接：下节课李白《梦游天姥吟留别》是浪漫想象而非现实志趣，需提示「诗眼从忧/归转向梦/傲」。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T09:00:00Z"},{"id":"l-cn-bs-u3-2","lessonId":"l-cn-bs-u3-2","title":"梦游天姥吟留别 精读——李白式的浪漫与傲骨","book":"必修上册","unitNumber":3,"unitTitle":"生命的诗意","taskGroup":"文学阅读与写作","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":2,"duration":45,"grade":"高一","subject":"语文","tags":["精读","古诗词","李白","浪漫主义","梦游天姥","人教版必修上U3","第二课时"],"textbookAnalysis":"本课聚焦李白《梦游天姥吟留别》。这是李白被赐金放还后南游吴越所作，借「梦游天姥」的奇幻想象，写仙境的壮丽与梦醒的失落，末以「安能摧眉折腰事权贵，使我不得开心颜」收束，宣告不事权贵的人格傲骨。全诗以梦为线：入梦（瀛洲难求/天姥可睹）→梦游（飞渡镜湖/著屐登山/洞天奇景）→梦醒（忽魂悸/惟枕席），想象雄奇，句式长短错落，是浪漫主义绝唱。","overview":"【学情分析】A班：初中读过《行路难》《将进酒》，熟悉李白豪放风格，但对其浪漫手法（梦境结构、虚实转换）缺乏分析框架。B班：篇幅较长（约300字），朗读易吃力，对「霓为衣兮风为马」「虎鼓瑟兮鸾回车」等奇幻句想象困难。共同问题：把「梦游」当真游，忽略梦境的象征意义；对结尾「傲骨」的宣言脱离合诗的情感脉络。","objectives":["语言能力：有感情朗读全诗，划分「入梦—梦游—梦醒」三部分并概括各段画面。","文化意识：理解李白「不事权贵」的傲骨，体会浪漫主义对自由人格的张扬。","思维品质：通过分析梦境虚实转换，培养「以梦写心」的象征解读能力。","学习能力：掌握「理梦境脉络→赏奇幻意象→悟傲骨宣言」的浪漫诗读法。"],"keyPoints":"① 梦境三阶段：入梦（瀛洲/天姥）→梦游（镜湖/登山/洞天）→梦醒（魂悸/枕席）。\n② 奇幻意象：霓衣风马、虎鼓鸾回、金银台——想象雄奇，色彩瑰丽。\n③ 收束宣言：「安能摧眉折腰事权贵，使我不得开心颜」——梦境壮美反衬现实屈辱，明傲骨之志。","difficulties":"① 梦境的象征义。原因：学生易把梦当真，需点明「天姥」是李白精神世界投影。\n② 虚实转换。原因：入梦用「我欲因之梦吴越」过渡，学生易忽略叙述视角切换。\n③ 结尾宣言的情感分量。原因：需联系「赐金放还」背景，否则「傲骨」成空话。","teachingMethods":"① 诵读法：范读→分段读→齐读，体会长短句节奏与情感起伏。\n② 画面还原法：让学生口述梦游三阶段画面，训练想象与概括。\n③ 背景支架法：补充李白被赐金放还经历，理解「梦醒」的失落感。\n④ 对比法：联系《短歌行》现实志趣，看李白以「梦」写志趣的不同。","preparation":"【PPT课件】P1 李白简介+赐金放还背景；P2 全诗分句（标入梦/梦游/梦醒）；P3 梦游三阶段画面图；P4 奇幻意象标注（霓衣/虎鼓/金银台）；P5 结尾宣言放大+背景；P6 浪漫手法小结；P7 课堂练习。\n【实物教具】天姥山风光图一张。\n【音频】全诗朗诵（2分30秒）。","process":[{"step":"Step 1 导入——李白的傲","time":"4分钟","content":"【PPT P1 背景】教师：「上节课曹操求贤、陶渊明归隐，都是现实选择。李白呢？他有一句名言——」 预设回答：「安能摧眉折腰事权贵！」 教师：「对，这是他的傲骨。今天读《梦游天姥吟留别》，看他怎么用『梦』写这股傲气。」 板书时机：黑板中央写「梦→傲骨」。差异化提示：B班说名言；A班需知此诗写于被排挤出长安后。易错点提醒：「吟留别」是诗体+用途（吟＝歌行体，留别＝留赠告别），不是题目一部分的感叹。"},{"step":"Step 2 诵读——理梦境脉络","time":"10分钟","content":"【PPT P2 分句标注】教师范读全诗。教师：「这首诗写了什么？用三个词概括结构。」 预设回答：「入梦、梦游、梦醒！」 教师：「『我欲因之梦吴越』是哪一段的开始？」 预设回答：「入梦转梦游的过渡句。」 板书时机：黑板画梦境三阶段横向轴。差异化提示：B班分三段+说大意；A班需说出每段的叙述视角（现实/梦境/梦醒回归现实）。易错点提醒：「忽魂悸以魄动，恍惊起而长嗟」是梦醒的转折点，之前皆是梦，朗读时此处要顿挫。"},{"step":"Step 3 梦游——赏奇幻意象","time":"12分钟","content":"【PPT P3 画面图】【PPT P4 意象】教师：「梦游天姥看到了什么？圈出最奇幻的意象。」 预设回答：「霓为衣兮风为马、虎鼓瑟兮鸾回车、仙之人兮列如麻、金银台。」 教师：「这些意象给你什么感觉？」 预设回答：「壮丽！神奇！像仙境！」 板书时机：黑板列奇幻意象表（意象|画面|情感）。差异化提示：B班圈意象+说感受；A班需分析「为何用这么多神仙意象」——以仙境壮美反衬现实污浊。易错点提醒：「熊咆龙吟殷岩泉」是梦游中的险境，与后文仙境形成跌宕，不是恐怖，是奇伟。"},{"step":"Step 4 梦醒——悟傲骨","time":"10分钟","content":"【PPT P5 结尾宣言】教师：「梦那么美，醒来后李白说什么？」 预设回答：「『世间行乐亦如此，古来万事东流水。』然后『安能摧眉折腰事权贵』！」 教师：「梦醒的失落，和结尾的傲骨，什么关系？」 预设回答：「梦里的自由越美，现实的屈辱越受不了，所以更不想低头。」 板书时机：黑板写「梦美 → 现实屈 → 傲骨（不事权贵）」。差异化提示：B班说出结尾句；A班需分析梦与现实的对照逻辑。易错点提醒：「开心颜」的「开」是「舒展、畅快」，不是「开始」，板书正音。"},{"step":"Step 5 浪漫手法小结","time":"6分钟","content":"【PPT P6 小结】教师：「李白和曹操、陶渊明比，写志趣方式有什么不同？」 预设回答：「曹、陶写现实选择，李白写梦——用想象写心。」 板书时机：在对比区补「李白：以梦写心（浪漫）」。差异化提示：B班说不同；A班需举本诗一例说明浪漫手法。易错点提醒：浪漫不是「乱想」——梦境每一处都对应现实心境（天姥雄奇＝李白抱负，梦醒失落＝政治失意）。"},{"step":"Step 6 小结+作业","time":"3分钟","content":"【PPT P7 练习】教师：「浪漫诗怎么读？」 预设回答：「理梦境→赏奇幻→悟傲骨！」 板书时机：板书浪漫诗读法。差异化提示：B班背全诗；A班写100字「我眼中的李白傲骨」。易错点提醒：下节课群文读杜甫《登高》、白居易《琵琶行》，从浪漫转写实，题材跨度大，提示注意「意象」从奇幻变日常。"}],"blackboard":"┌── 梦游天姥吟留别 ──┐\n│ 梦 → 傲骨          │\n│                    │\n│ 【梦境三阶段】      │\n│ 入梦:瀛洲难求      │\n│   天姥可睹         │\n│ 梦游:镜湖→登山     │\n│   →洞天奇景        │\n│ 梦醒:魂悸→枕席     │\n│                    │\n│ 【奇幻意象】        │\n│ 霓衣风马|壮丽      │\n│ 虎鼓鸾回|神奇      │\n│ 金银台 |仙界       │\n│                    │\n│ 【梦→现实→傲骨】   │\n│ 梦美→现实屈→      │\n│ 不事权贵           │\n│ 开心颜(舒展)       │\n│                    │\n│ 浪漫=以梦写心      │\n└────────────────────┘","exercises":"【基础作业】1. 背诵默写全诗。2. 划分「入梦—梦游—梦醒」并各用一句话概括画面。\n【提高作业】写一段180字赏析「安能摧眉折腰事权贵」一句，要求：①联系梦境与现实对照；②说出傲骨的情感来源；③联系李白生平。\n【参考答案——教师用】基础2示例：入梦——由越人传说引发神游天姥之念；梦游——飞渡镜湖、著屐登山、洞天仙境奇景；梦醒——魂悸惊起，唯见枕席。提高作业评价：有对照+情感来源=合格；联系生平（赐金放还）=良好；能分析「梦越美现实越屈」的张力=优秀。","reflection":"✅ 亮点：梦境三阶段轴让长篇结构清晰，B班也能概括；「开心颜」正音避免误读。\n⚠️ 需改进：奇幻意象赏析时间紧，部分A班生未充分展开；下次应聚焦「金银台」一处深挖。\n📌 下节课衔接：下节课杜甫《登高》、白居易《琵琶行》转写实，意象从神仙变「落木」「长江」「琵琶」，提醒学生「意象从奇幻回归日常」。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T09:00:00Z"},{"id":"l-cn-bs-u3-3","lessonId":"l-cn-bs-u3-3","title":"登高 / 琵琶行 群文阅读——杜甫与白居易的人生况味","book":"必修上册","unitNumber":3,"unitTitle":"生命的诗意","taskGroup":"文学阅读与写作","lessonType":"qunwen","lessonTypeName":"群文阅读","periodNumber":3,"duration":45,"grade":"高一","subject":"语文","tags":["群文阅读","古诗词","杜甫","白居易","沉郁","人教版必修上U3","第三课时"],"textbookAnalysis":"本课群文阅读杜甫《登高》与白居易《琵琶行并序》。《登高》写于大历二年（767）夔州，杜甫晚年漂泊，全诗八句四联，前两联写「景」（风急天高/渚清沙白/落木/长江），后两联写「情」（万里悲秋/百年多病/艰难苦恨/潦倒新停），被誉为「古今七律第一」。《琵琶行》写白居易被贬江州，偶遇琵琶女，借「同是天涯沦落人」抒政治失意之悲。两诗一诗一诗（长篇叙事诗），皆写「漂泊失意」，但杜诗凝练沉郁、白诗铺叙婉转，适合作者境遇与抒情方式的群文比较。","overview":"【学情分析】A班：对杜甫「沉郁顿挫」、白居易「新乐府」有概念，但《琵琶行》篇幅长（600余字），细读吃力。B班：对「万里悲秋常作客」的悲从何来缺乏时代感知；《琵琶行》「同是天涯沦落人」易表面理解。共同问题：两诗都写「悲」，但学生说不清「悲的不同」——杜甫是家国之悲、个人之病，白居易是迁谪之怨、知音之叹。","objectives":["语言能力：背诵《登高》，概括《琵琶行》情节（送客→闻琴→听诉→共鸣），说出两诗核心意象。","文化意识：理解杜甫、白居易在漂泊失意中不同的生命姿态，体会古代士大夫的家国与自我之思。","思维品质：比较两诗「悲」的不同内涵与抒情方式，培养 nuanced 的比较思维。","学习能力：掌握「抓核心意象→析情感层次→比抒情方式」的群文读法。"],"keyPoints":"① 《登高》意象：风急/天高/猿啸/渚清/沙白/飞鸟/落木/长江——雄阔悲凉；情感：万里悲秋/百年多病/艰难苦恨。\n② 《琵琶行》意象：浔阳江/枫叶荻花/琵琶/大珠小珠——清冷哀婉；情感：谪居之怨/知音之叹。\n③ 比较：杜诗凝练（八句写尽一生），白诗铺叙（长篇叙事+音乐描写）；悲的内涵（家国之悲/迁谪之怨）。","difficulties":"① 《登高》四联关系。原因：学生易孤立看景句，需点明「景为情设，八句一气」。\n② 《琵琶行》音乐描写。原因：比喻（大珠小珠落玉盘）密集，学生易只赏修辞不见情感。\n③ 「同是天涯沦落人」的深度。原因：需联系白居易贬谪背景与琵琶女身世对照，否则成套话。","teachingMethods":"① 诵读法：范读《登高》（沉郁）、《琵琶行》音乐段（婉转）。\n② 群文比较法：双栏对照（意象/情感/抒情方式）。\n③ 音乐联想法：用「大珠小珠落玉盘」唤起学生对声音的画面感。\n④ 知人论世法：补充杜甫夔州、白居易江州背景。","preparation":"【PPT课件】P1 两诗作者处境（夔州漂泊/江州被贬）；P2 《登高》八句意象标注；P3 《琵琶行》情节脉络+音乐比喻段；P4 核心意象对照（落木长江/浔阳琵琶）；P5 比较表（意象/情感/方式）；P6 朗读指导；P7 练习。\n【实物教具】无。\n【音频】《登高》《琵琶行》名家朗诵各1分钟。","process":[{"step":"Step 1 导入——两种漂泊","time":"4分钟","content":"【PPT P1 处境】教师：「杜甫和白居易都曾被命运抛到远方。一个在夔州，一个在江州。他们的『悲』一样吗？」 预设回答：「杜甫更惨，又老又病又漂泊。」「白居易是被贬，心里委屈。」 板书时机：黑板写「漂泊之悲：杜甫／白居易」。差异化提示：B班说不同感受；A班需联系作者处境。易错点提醒：不要比赛谁更惨——要比较「悲的性质不同」，这是群文阅读的核心。"},{"step":"Step 2 登高精读——八句一气","time":"12分钟","content":"【PPT P2 意象标注】教师：「《登高》八句，前四句写什么？后四句写什么？」 预设回答：「前四句写景——风急天高猿啸哀；后四句写自己——万里悲秋常作客。」 教师：「『无边落木萧萧下，不尽长江滚滚来』好在哪？」 预设回答：「空间大（无边）、时间久（不尽），个人渺小。」 板书时机：黑板左列「登高：景(雄阔)→情(悲苦)」，写意象链。差异化提示：B班背全诗+说景情；A班需分析「八句如何一气」——四联递进无断。易错点提醒：「百年多病独登台」的「百年」指晚年不是一百年；「苦恨」是「极恨」非「苦于恨」。"},{"step":"Step 3 琵琶行——音乐与身世","time":"12分钟","content":"【PPT P3 情节+音乐】教师：「《琵琶行》情节怎么走？」 预设回答：「送客→闻琴→邀弹→听诉身世→同是沦落人。」 教师：「写音乐那几句为什么动人？」 预设回答：「大珠小珠落玉盘——像真的听到声音；间关莺语、幽咽泉流——有高有低。」 板书时机：黑板右列「琵琶行：音乐(比喻)→身世(对话)→共鸣」。差异化提示：B班说情节+一音乐比喻；A班需分析「音乐描写如何服务于情感」。易错点提醒：「同是天涯沦落人，相逢何必曾相识」是诗眼——琵琶女身世（盛转衰）映白居易贬谪（显转隐），双线共鸣。"},{"step":"Step 4 群文比较——悲的不同","time":"10分钟","content":"【PPT P5 比较表】教师：「填表：两诗的悲，内涵和方式有什么不同？」 预设回答：「杜：家国之悲+个人病老，凝练八句；白：迁谪之怨+知音之叹，铺叙长篇。」 板书时机：黑板中央画比较双栏。差异化提示：B班填情感内涵；A班全部填并补「为何杜凝练白铺叙」——诗体（七律/长篇歌行）与个性使然。易错点提醒：比较不是排优劣——杜之凝练见功力，白之铺叙见情切，各有其美。"},{"step":"Step 5 意象对照+小结","time":"5分钟","content":"【PPT P4 意象对照】教师：「两诗核心意象分别是什么？」 预设回答：「杜——落木、长江（宏大悲凉）；白——浔阳江、琵琶（清冷哀婉）。」 板书时机：板书意象对照。差异化提示：B班说意象；A班需说意象如何「承载」各自情感。易错点提醒：下节课读苏轼《念奴娇》，从「悲」转向「旷达」，提醒注意同一题材（赤壁）不同情怀。"},{"step":"Step 6 作业布置","time":"2分钟","content":"【PPT P7 练习】教师：「今天比较了两种漂泊之悲。作业里把你的理解写下来。」 板书时机：板书群文读法。差异化提示：B班背《登高》；A班写比较短文。易错点提醒：下节课苏轼是「突围悲」——在悲中见旷达，注意情感走向变化。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 登高·琵琶行 群文 ──┐\n│ 漂泊之悲            │\n│ 杜甫      白居易     │\n│                    │\n│ 【登高】景→情       │\n│ 风急天高猿啸哀      │\n│ 落木长江(雄阔悲凉)  │\n│ 万里悲秋/百年多病   │\n│ →家国之悲+病老     │\n│                    │\n│ 【琵琶行】音乐→共鸣 │\n│ 浔阳江/琵琶(清冷)   │\n│ 大珠小珠落玉盘      │\n│ 同是沦落人         │\n│ →迁谪之怨+知音之叹 │\n│                    │\n│ 【比较】            │\n│ 杜:凝练(七律)       │\n│ 白:铺叙(歌行)       │\n│ 各有其美            │\n└────────────────────┘","exercises":"【基础作业】1. 背诵《登高》。2. 用一句话概括《琵琶行》情节脉络。\n【提高作业】写一段200字比较「杜甫与白居易的漂泊之悲」，要求：①各引一句原诗；②点明悲的内涵差异；③说抒情方式不同。\n【参考答案——教师用】基础2示例：送客闻琴→邀弹听曲→听诉身世→同是沦落人共鸣。提高作业评价：引原句+内涵差异=合格；抒情方式对比=良好；能联系作者处境深挖=优秀。","reflection":"✅ 亮点：双栏比较让「悲的不同」落地，学生自发区分家国之悲与迁谪之怨；音乐比喻联觉活动生动。\n⚠️ 需改进：《琵琶行》篇幅长，12分钟只能浅读；下次应课前布置通读，课上聚焦音乐段与诗眼。\n📌 下节课衔接：下节课苏轼《念奴娇·赤壁怀古》从「悲」到「旷达」，需提示情感走向的转折。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T09:00:00Z"},{"id":"l-cn-bs-u3-4","lessonId":"l-cn-bs-u3-4","title":"念奴娇·赤壁怀古 精读——苏轼的旷达","book":"必修上册","unitNumber":3,"unitTitle":"生命的诗意","taskGroup":"文学阅读与写作","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":4,"duration":45,"grade":"高一","subject":"语文","tags":["精读","宋词","苏轼","豪放派","旷达","人教版必修上U3","第四课时"],"textbookAnalysis":"本课聚焦苏轼《念奴娇·赤壁怀古》。苏轼因「乌台诗案」被贬黄州，游赤壁时有此作。上阕写赤壁壮景（大江东去/乱石穿空/惊涛拍岸），下阕怀周瑜（雄姿英发/羽扇纶巾/谈笑间樯橹灰飞烟灭），末以「人生如梦，一尊还酹江月」收束。全词以壮阔之景衬英雄之事，又以英雄之成反衬自我之贬，最终以「酹江月」的超然消解悲慨，体现苏轼特有的旷达胸襟，是豪放词代表作。","overview":"【学情分析】A班：初中读过《水调歌头·明月几时有》，知苏轼豁达，但对其「旷达」与「悲慨」并存缺乏细读。B班：对「羽扇纶巾」「樯橹灰飞烟灭」等历史典故不熟，对「人生如梦」易误读为消极。共同问题：把「人生如梦」当消沉，忽略它是「以超然化解失意」的旷达；对上阕写景的壮美与下阕怀古的用意关联不清。","objectives":["语言能力：有感情朗读并背诵全词，解释「大江东去」「羽扇纶巾」「樯橹」「一尊还酹」等词句。","文化意识：理解苏轼在贬谪逆境中以旷达化解悲慨的生命智慧，体会豪放词的精神气象。","思维品质：通过分析「景—人—我」的对照结构，培养辩证解读词人复杂情感的能力。","学习能力：掌握「赏壮景→怀英雄→照自我→悟旷达」的怀古词读法。"],"keyPoints":"① 上阕壮景：大江/乱石/惊涛/千堆雪——时空壮阔，奠定豪放基调。\n② 下阕怀瑜：周瑜「雄姿英发、羽扇纶巾、谈笑灭敌」——年少功成。\n③ 自我反衬＋旷达收束：周瑜功成vs苏轼被贬→「人生如梦，一尊还酹江月」以超然消解。","difficulties":"① 「人生如梦」的情感。原因：学生易读成消极，需点明是「旷达」——承认短暂却不被压垮。\n② 周瑜与苏轼对照。原因：学生看不到「怀古实为伤今」，需显性对照。\n③ 「樯橹灰飞烟灭」的炼字。原因：「灰飞烟灭」是比喻性夸张，需体会力度。","teachingMethods":"① 诵读法：范读（豪迈→苍凉→超然三层次）。\n② 对照法：周瑜（功成年少）vs苏轼（贬谪暮年）双栏。\n③ 知人论世法：补充乌台诗案与黄州贬谪。\n④ 意象品鉴法：聚焦「乱石穿空/惊涛拍岸」的动词力度。","preparation":"【PPT课件】P1 苏轼与乌台诗案/黄州；P2 全词分句（标上阕景/下阕怀古）；P3 赤壁壮景图（乱石惊涛）；P4 周瑜形象分析（雄姿/纶巾/谈笑）；P5 周瑜vs苏轼对照；P6 「人生如梦」解读；P7 练习。\n【实物教具】赤壁图一张。\n【音频】全词朗诵（1分30秒）。","process":[{"step":"Step 1 导入——逆境中的苏轼","time":"4分钟","content":"【PPT P1 背景】教师：「苏轼因写诗被下狱（乌台诗案），贬到黄州。一般人会怎样？」 预设回答：「郁闷、写牢骚。」 教师：「苏轼写了这首词，里面有郁闷，但最后一句很特别。今天看他是怎么化解的。」 板书时机：黑板写「逆境→？」加问号。差异化提示：B班说一般人反应；A班需知乌台诗案。易错点提醒：苏轼不是「没痛苦」，是「痛苦后超然」，读词要看到两层。"},{"step":"Step 2 上阕——赏壮景","time":"10分钟","content":"【PPT P3 壮景图】教师：「上阕写了什么景？圈动词。」 预设回答：「大江东去、乱石穿空、惊涛拍岸、卷起千堆雪。动词：去、穿、拍、卷！」 教师：「这些动词给人什么力量？」 预设回答：「穿——刺破；拍——撞击；卷——翻涌。很有力！」 板书时机：黑板左列「景：大江/乱石/惊涛/雪——壮阔豪放」。差异化提示：B班圈动词+说力度；A班需分析「为何先写大江再写赤壁」——由大时空聚焦到具体战场。易错点提醒：「淘尽」的「淘」是冲刷，暗含「千古英雄被时间冲走」，为怀古铺垫，不能忽略。"},{"step":"Step 3 下阕——怀周瑜","time":"10分钟","content":"【PPT P4 周瑜】教师：「苏轼怀念谁？怎么写的？」 预设回答：「周瑜——雄姿英发、羽扇纶巾、谈笑间樯橹灰飞烟灭。」 教师：「周瑜当时多大？」 预设回答：「三十多岁（小乔初嫁了，雄姿英发）。」 板书时机：黑板右列「周瑜：年少功成」。差异化提示：B班说周瑜形象；A班需注意「小乔初嫁」的衬托——以美满衬功业。易错点提醒：「羽扇纶巾」本写文人儒将，苏轼用来写周瑜，突出其「儒雅中的雄略」，不是粗豪武将。"},{"step":"Step 4 周瑜vs苏轼——照自我","time":"8分钟","content":"【PPT P5 对照】教师：「周瑜功成年少，苏轼自己呢？」 预设回答：「苏轼被贬黄州，头发都白了（早生华发），功业未成。」 教师：「所以怀古其实是——」 预设回答：「伤今！借周瑜反衬自己的失意。」 板书时机：黑板画对照「周瑜(功成年少) vs 苏轼(贬谪华发)」。差异化提示：B班说反衬；A班需分析「为何选周瑜不选诸葛亮」——周瑜年少得志，反差最烈。易错点提醒：怀古伤今是常格，但苏轼不止于伤——他接着拐向超然，这是关键。"},{"step":"Step 5 悟旷达——人生如梦","time":"8分钟","content":"【PPT P6 解读】教师：「结尾『人生如梦，一尊还酹江月』是消极吗？」 预设回答：「不是！他向江月敬酒，把愁洒给大江，放下了。」 教师：「『梦』在这里什么意思？」 预设回答：「人生短暂像梦，但既然是梦，就不必太执着得失。」 板书时机：把「逆境→？」的问号改为「→旷达（超然）」。差异化提示：B班说不是消极；A班需说「梦」的辩证义——承认短暂却不被压垮。易错点提醒：「酹」是「以酒洒地祭奠」，不是「喝」，板书正音义。"},{"step":"Step 6 小结+作业","time":"5分钟","content":"【PPT P7 练习】教师：「怀古词怎么读？」 预设回答：「赏壮景→怀英雄→照自我→悟旷达！」 板书时机：板书怀古词读法四步。差异化提示：B班背全词；A班写100字「我理解的苏轼旷达」。易错点提醒：下节课群文读辛弃疾《永遇乐》、李清照《声声慢》，从「旷达」到「豪放/婉约」对话，注意风格光谱。"}],"blackboard":"┌── 念奴娇·赤壁怀古 ──┐\n│ 逆境 → 旷达(超然)  │\n│                    │\n│ 【上阕壮景】        │\n│ 大江去/乱石穿       │\n│ 惊涛拍/千堆雪       │\n│ 动词:去穿拍卷→力    │\n│                    │\n│ 【下阕怀瑜】        │\n│ 雄姿英发 羽扇纶巾   │\n│ 谈笑灭敌(年少功成)  │\n│                    │\n│ 【周瑜 vs 苏轼】     │\n│ 功成年少 | 贬谪华发 │\n│ 怀古→伤今           │\n│                    │\n│ 【悟旷达】          │\n│ 人生如梦            │\n│ 一尊还酹江月        │\n│ (承认短暂·不被压垮) │\n└────────────────────┘","exercises":"【基础作业】1. 背诵默写全词。2. 解释：①羽扇纶巾 ②樯橹灰飞烟灭 ③一尊还酹江月。\n【提高作业】写一段180字赏析「人生如梦，一尊还酹江月」，要求：①联系周瑜与苏轼对照；②说出旷达的内涵；③联系苏轼贬谪背景。\n【参考答案——教师用】基础2：①羽扇纶巾——写周瑜儒雅从容的将帅风度。②樯橹灰飞烟灭——战船顷刻烧毁，喻周瑜破曹之速。③酹——以酒洒地祭奠；向江月敬酒，喻超然。提高作业评价：有对照+旷达内涵=合格；联系贬谪背景=良好；能辩证「梦」义=优秀。","reflection":"✅ 亮点：周瑜vs苏轼对照让学生秒懂「怀古伤今」，B班也能说出反衬；「人生如梦」辩证解读纠正了消极误读。\n⚠️ 需改进：旷达的哲学意味对B班偏深，部分人仍似懂非懂；下次应补充一则苏轼黄州生活轶事（种地、夜游）具象化。\n📌 下节课衔接：下节课辛弃疾《永遇乐》、李清照《声声慢》群文，从苏轼旷达扩展到豪放与婉约的风格对话。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T09:00:00Z"},{"id":"l-cn-bs-u3-5","lessonId":"l-cn-bs-u3-5","title":"永遇乐·京口北固亭怀古 / 声声慢 群文——豪放与婉约的对话","book":"必修上册","unitNumber":3,"unitTitle":"生命的诗意","taskGroup":"文学阅读与写作","lessonType":"qunwen","lessonTypeName":"群文阅读","periodNumber":5,"duration":45,"grade":"高一","subject":"语文","tags":["群文阅读","宋词","辛弃疾","李清照","豪放婉约","人教版必修上U3","第五课时"],"textbookAnalysis":"本课群文阅读辛弃疾《永遇乐·京口北固亭怀古》与李清照《声声慢》。辛词写于镇江知府任上，借京口历史人物（孙权、刘裕、刘义隆、拓跋焘、廉颇）讽谏南宋草率北伐，慷慨悲凉，属豪放词；李词写于南渡后孤寂晚年，「寻寻觅觅，冷冷清清」起笔，叠字七组写尽凄苦，属婉约词。两词一豪放一婉约，一家国一自我，构成宋词双峰对话，适合作者身份、题材、风格的群文比较。","overview":"【学情分析】A班：对「豪放/婉约」有概念，但说不清具体差异；《永遇乐》用典五处密集，理解门槛高。B班：对南宋偏安、靖康之难背景不熟，《声声慢》叠字能感受到悲但说不清技巧。共同问题：把风格对立绝对化，忽略豪放中有沉郁、婉约中有骨力；用典多的辛词易读成「堆砌」。","objectives":["语言能力：背诵《声声慢》，概括《永遇乐》五处用典所指；说出两词核心情感与手法。","文化意识：理解辛弃疾的家国襟怀与李清照的乱世孤怀，体会宋词双峰的精神气象。","思维品质：通过比较豪放与婉约，培养避免二元对立、看见风格交融的辩证思维。","学习能力：掌握「知人论世+抓典故/叠字→辨风格」的词作读法。"],"keyPoints":"① 《永遇乐》五典：孙权（英雄）、刘裕（北伐功业）、刘义隆（草率败北）、拓跋焘（敌踪）、廉颇（老当益壮）——借古讽今。\n② 《声声慢》叠字：寻寻觅觅/冷冷清清/凄凄惨惨戚戚——七组叠字写愁之递进。\n③ 风格对话：豪放（家国·用典·悲凉）vs婉约（自我·白描·凄婉）；但并非绝对对立。","difficulties":"① 《永遇乐》用典密集。原因：五处典故学生大多不熟，需逐一搭桥并点明讽谏用意。\n② 《声声慢》叠字之妙。原因：学生感受得到悲，说不清「叠字如何层层加深」。\n③ 风格辩证。原因：学生易贴标签，需引导发现豪放中的个人悲与婉约中的骨力。","teachingMethods":"① 知人论世法：补辛弃疾（抗金志士）、李清照（南渡孤老）生平。\n② 典故串讲法：《永遇乐》五典用时间线串讲。\n③ 诵读品鉴法：《声声慢》慢读叠字，体会声情。\n④ 群文比较法：双栏对照（题材/手法/情感/风格）。","preparation":"【PPT课件】P1 作者生平（辛弃疾抗金/李清照南渡）；P2 《永遇乐》五典时间线；P3 《声声慢》叠字分析；P4 两词核心意象对照；P5 豪放vs婉约比较表；P6 朗读指导；P7 练习。\n【实物教具】无。\n【音频】两词朗诵各1分钟。","process":[{"step":"Step 1 导入——宋词双峰","time":"4分钟","content":"【PPT P1 作者】教师：「宋词有两座高峰：一座写家国，一座写自我。今天两位代表——辛弃疾、李清照。」 预设回答：「辛弃疾豪放，李清照婉约。」 板书时机：黑板写「豪放／婉约」。差异化提示：B班说风格标签；A班需知二人时代处境。易错点提醒：标签只是入口，豪放婉约不是楚河汉界，后面要打破。"},{"step":"Step 2 永遇乐——五典串讲","time":"12分钟","content":"【PPT P2 五典】教师：「辛弃疾用了五个典故，时间从三国到南朝到宋，各指什么？」 预设回答：「孙权——据京口抗曹的英雄；刘裕——北伐收复中原；刘义隆——草率北伐惨败（警告南宋）；拓跋焘——敌占瓜步；廉颇——老当益壮（自比）。」 板书时机：黑板左列「永遇乐：五典→借古讽今」。差异化提示：B班说三典（孙权/刘裕/廉颇）；A班全部说并点讽谏用意。易错点提醒：「佛狸祠下」的佛狸是拓跋焘小名，指敌踪已在江南，暗忧偏安；此典最易被忽略。"},{"step":"Step 3 声声慢——叠字品鉴","time":"10分钟","content":"【PPT P3 叠字】教师：「《声声慢》开头怎么写愁？」 预设回答：「寻寻觅觅，冷冷清清，凄凄惨惨戚戚——七组叠字！」 教师：「这七组怎么递进的？」 预设回答：「从动作(寻觅)→环境(冷清)→心理(凄惨)，一层层深。」 板书时机：黑板右列「声声慢：七叠字→愁递进」。差异化提示：B班背叠字+说悲；A班需分析递进层次与声情关系。易错点提醒：「乍暖还寒时候」指秋凉反复，不是春天；「雁过也」引发亡夫之痛与故乡之思，叠字之外另有意象支撑。"},{"step":"Step 4 群文比较——风格对话","time":"10分钟","content":"【PPT P5 比较表】教师：「填表：两词题材、手法、情感、风格有何不同？」 预设回答：「辛——家国/用典/悲凉/豪放；李——自我/白描/凄婉/婉约。」 教师：「但豪放里有没有个人悲？婉约里有没有骨力？」 预设回答：「辛的悲是个人的（廉颇自比）；李的『死亦为鬼雄』（虽非此词）有骨力——本词愁中有倔强。」 板书时机：黑板中央画比较双栏，补「交融」箭头。差异化提示：B班填差异；A班需举「交融」例证。易错点提醒：避免贴标签式比较——要看见辛词沉郁、李词愁中有骨，风格是光谱不是二分。"},{"step":"Step 5 意象对照+小结","time":"6分钟","content":"【PPT P4 意象】教师：「两词核心意象？」 预设回答：「辛——江山/廉颇(英雄气)；李——雁/梧桐/细雨(孤寂感)。」 板书时机：板书意象对照。差异化提示：B班说意象；A班说意象如何承载风格。易错点提醒：下节课进入写作——学写文学短评，把今天的比较整理成文字。"},{"step":"Step 6 作业布置","time":"3分钟","content":"【PPT P7 练习】教师：「今天看到了宋词双峰。作业把你的比较写清楚。」 板书时机：板书词作读法。差异化提示：B班背《声声慢》；A班写风格比较短文。易错点提醒：写作时注意用原句支撑，不要只贴「豪放/婉约」标签。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 永遇乐·声声慢 ──┐\n│ 豪放    婉约       │\n│                    │\n│ 【永遇乐】五典     │\n│ 孙权(英雄)         │\n│ 刘裕(北伐)         │\n│ 刘义隆(草率败)     │\n│ 佛狸祠(敌踪)       │\n│ 廉颇(自比老)       │\n│ →借古讽今          │\n│                    │\n│ 【声声慢】七叠字   │\n│ 寻觅→冷清→凄惨     │\n│ 动作→环境→心理     │\n│ →愁递进            │\n│                    │\n│ 【比较】            │\n│ 题材:家国/自我      │\n│ 手法:用典/白描      │\n│ 风格:豪放/婉约      │\n│ 交融(非二分)        │\n└────────────────────┘","exercises":"【基础作业】1. 背诵《声声慢》。2. 写出《永遇乐》中你理解的三个典故及其用意。\n【提高作业】写一段200字「豪放与婉约的对话」，要求：①各引一句原词；②点明风格差异；③说一处风格交融。\n【参考答案——教师用】基础2示例：孙权——在京口抗曹的英雄，慨叹当世无英雄；刘裕——北伐功业，向往收复；廉颇——老当益壮，自比报国无门。提高作业评价：引原句+差异=合格；指出交融=良好；能辩证风格光谱=优秀。","reflection":"✅ 亮点：五典时间线串讲让密集用典变清晰；叠字递进分析（动作→环境→心理）学生能复述。\n⚠️ 需改进：风格「交融」点对B班偏难，部分人仍二分；下次用「辛词也有愁、李词也有骨」的具体句例铺垫。\n📌 下节课衔接：下节课写作——学写文学短评，把本课比较转化为评点文字。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T09:00:00Z"},{"id":"l-cn-bs-u3-6","lessonId":"l-cn-bs-u3-6","title":"写作指导——学写文学短评：诗词评点法","book":"必修上册","unitNumber":3,"unitTitle":"生命的诗意","taskGroup":"文学阅读与写作","lessonType":"xiezuo","lessonTypeName":"写作指导","periodNumber":6,"duration":45,"grade":"高一","subject":"语文","tags":["写作","文学短评","诗词评点","人教版必修上U3","第六课时"],"textbookAnalysis":"本课为第三单元写作任务「学写文学短评」。本单元读了8首诗词，学生已积累细读经验。文学短评与读后感不同：它聚焦文本某一「点」（一句诗/一个意象/一种手法），做有理有据的分析，不求面面俱到。教材提示可从「诗句理解、意象赏析、手法品鉴、情感体悟」任一角度切入，300字左右。核心方法是「选点—引文—分析—提升」四步。","overview":"【学情分析】A班：阅读时能分析，但写作时易写成「读后感」（大谈自己感受），抓不住文本的「点」；引文不规范（不标出处）。B班：对「短评写什么」茫然，常把全诗内容复述一遍当评论。共同问题：把短评等同于「我喜欢/有道理」，缺文本证据；分析停留在「写得好」不说明「为什么好」。","objectives":["语言能力：能就一首诗词的某一「点」（意象/手法/情感）写300字左右短评，做到引文准确、分析有据。","文化意识：在评点诗词中深化对古典诗歌的审美理解，培养文学批评的初步素养。","思维品质：在「选点—分析—提升」中培养聚焦论证与逻辑表达的能力。","学习能力：掌握「选点→引文→分析→提升」的文学短评四步法。"],"keyPoints":"① 选点：不选「全诗」而选一个聚焦的「点」（如「击」字炼字／七组叠字／人生如梦）。\n② 引文：摘引原句并标明出处，作为论据。\n③ 分析：说明「好在哪里、为什么好」，结合语境不空泛。\n④ 提升：由点及面，点出该点反映的诗人风格或普遍意义。","difficulties":"① 从「感」到「评」的转换。原因：学生习惯读后感，需用例文对比「感」与「评」的差异。\n② 选点聚焦。原因：学生爱写「全诗赏析」，需约束「只写一个词/一句」。\n③ 分析不空泛。原因：需提供「分析句式支架」（如「此处X手法，营造Y效果，传达Z情感」）。","teachingMethods":"① 例文对比法：展示「读后感」与「文学短评」各一篇，辨差异。\n② 支架法：给「分析句式」模板降低起步难度。\n③ 工作坊法：选点→写初稿→互评→修改。\n④ 教师示范法：当场就「击」字写一段短评示范。","preparation":"【PPT课件】P1 写作任务（学写文学短评·300字）；P2 短评四步法（选点/引文/分析/提升）；P3 例文对比（读后感vs短评）；P4 分析句式支架；P5 教师示范（击字短评）；P6 互评量表；P7 展示要求。\n【实物教具】便签纸每人1张。\n【音频】轻音乐（写作背景）。","process":[{"step":"Step 1 导入——感与评的区别","time":"5分钟","content":"【PPT P3 例文对比】教师：「下面两段，哪段是『短评』哪段是『读后感』？」 展示A「读完《登高》我很感动，想到自己考试失利……」B「『不尽长江滚滚来』以奔涌不息的江水喻时间无情，反衬诗人个体生命的短暂与悲凉。」 预设回答：「A是读后感（谈自己），B是短评（析文本）！」 板书时机：黑板分列「读后感(谈我)／短评(析文)」。差异化提示：B班说出区别；A班需概括短评定义。易错点提醒：短评可以含个人感受，但必须以文本证据为核心，不能通篇谈自己。"},{"step":"Step 2 四步法讲解","time":"8分钟","content":"【PPT P2 四步法】教师讲四步：①选点——聚焦一词/一句/一法；②引文——摘原句标出处；③分析——说明为什么好（用支架句式）；④提升——点出风格/普遍意义。示范「选点＝击字；引文＝『鹰击长空』；分析＝击显力度；提升＝炼字见毛诗雄健」。 板书时机：黑板画四步流程图配示范。差异化提示：B班记四步+懂示范；A班需说「为何选点要小」。易错点提醒：选点越小越易写深——写「全诗」必流于复述，写「一个字」能写透。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 选点练习","time":"8分钟","content":"【PPT P4 句式支架】教师：「从本单元选一个点写短评。先用句式支架：『此处运用了X（手法/字词），营造了Y效果，传达了Z情感。』」 学生想选点。预设回答：「我选『寻寻觅觅』七组叠字。」「我选『人生如梦』。」 板书时机：黑板列学生选点（避免重复）。差异化提示：B班选一个明显点（如叠字）；A班选有挑战的点（如「佛狸祠下」用典）。易错点提醒：选点后必须先引原句——没有引文的分析是空中楼阁。"},{"step":"Step 4 写初稿","time":"12分钟","content":"【PPT P5 示范】教师：「用四步法写300字初稿，便签纸起稿。」 学生写作。教师巡视。板书时机：教师选1-2人初稿准备展示。差异化提示：B班写200字+用支架句式；A班写300字+有提升段。易错点提醒：分析段不能只说「写得好」——必须说「好在哪、为何好」，用支架句式强制具体化。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 互评","time":"10分钟","content":"【PPT P6 互评量表】教师：「同桌交换，按量表打：①有聚焦选点？②引文准确？③分析有据？④有提升？」 学生互评。预设回答：「他选了叠字但没引全文七组。」「她分析说『递进』但没有具体说哪层。」 板书时机：黑板展示量表，记典型反馈。差异化提示：B班用「有/无」二分；A班四维打分+建议。易错点提醒：互评要说具体——「引文不全」比「写得不好」有用。"},{"step":"Step 6 小结+作业","time":"2分钟","content":"【PPT P7 展示】教师：「短评四步法？」 预设回答：「选点→引文→分析→提升！」 板书时机：板书四步口诀。差异化提示：B班记四步；A班把初稿改完上交。易错点提醒：下节课写作讲评，提醒据互评改稿。"}],"blackboard":"┌── 学写文学短评 ──┐\n│ 读后感(谈我)      │\n│ 短评  (析文)      │\n│                  │\n│ 【四步法】        │\n│ ①选点(小)        │\n│ ②引文(标出处)    │\n│ ③分析(为何好)    │\n│ ④提升(风格/普遍) │\n│                  │\n│ 示范:            │\n│ 点=击字          │\n│ 引=鹰击长空      │\n│ 析=显力度        │\n│ 升=炼字见雄健    │\n│                  │\n│ 【句式支架】      │\n│ 此处X手法,        │\n│ 营造Y效果,        │\n│ 传达Z情感         │\n└──────────────────┘","exercises":"【基础作业】1. 据互评修改短评终稿（300字左右），引文标出处。2. 在稿下方用一句话写你选的「点」和「为什么选它」。\n【提高作业】换一首本单元诗词，再写一篇不同角度的短评（如第一稿写炼字，第二稿写意象或情感），对比两稿切入点差异。\n【参考答案——教师用】终稿评价：有聚焦选点+引文准确+分析有据=合格；分析深入+有提升=良好；选点巧妙+分析有个人洞见=优秀。基础2评价：能说明选点理由=合格。","reflection":"✅ 亮点：感与评的例文对比最直接——学生瞬间懂「短评不谈自己」；句式支架让B班也能写出像样分析。\n⚠️ 需改进：选点环节部分A班生贪大（想写全诗），需更强约束「只写一个字」；下次给「禁选全诗」红线。\n📌 下节课衔接：下节课写作讲评，精选典型稿公开点评，同时准备单元朗诵会。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T09:00:00Z"},{"id":"l-cn-bs-u3-7","lessonId":"l-cn-bs-u3-7","title":"写作实践与讲评——文学短评修改与提升","book":"必修上册","unitNumber":3,"unitTitle":"生命的诗意","taskGroup":"文学阅读与写作","lessonType":"xiezuo","lessonTypeName":"写作实践","periodNumber":7,"duration":45,"grade":"高一","subject":"语文","tags":["写作","讲评","文学短评","修改","人教版必修上U3","第七课时"],"textbookAnalysis":"本课承接第六课时初稿与互评，进入修改提升与公开讲评。选取三种典型：①选点聚焦但分析空泛型；②引文完整但选点过大型；③选点分析俱佳型。通过对比讲评，让学生在「看别人稿改自己稿」中提升短评写作。同时布置单元朗诵会准备。","overview":"【学情分析】A班：初稿有分析意识但提升段薄弱，不知「由点及面」怎么写。B班：部分稿仍写成读后感或全诗复述，需典型示范纠偏。共同问题：修改只改错别字不改进论证；对「好短评标准」未内化。","objectives":["语言能力：据讲评修改短评终稿，做到选点聚焦、引文准确、分析有据、有提升。","文化意识：在公开讲评中学会以文本证据说话的批评态度。","思维品质：通过三种典型诊断，培养评价与自我修订能力。","学习能力：内化「好短评四标准」（聚焦/引文/分析/提升），能独立评价修改。"],"keyPoints":"① 三种典型：分析空泛型／选点过大型／俱佳型。\n② 修改三方向：缩小选点／补全引文／深化分析+加提升。\n③ 好短评四标准：聚焦·引文·分析·提升。","difficulties":"① 分析空泛的诊断。原因：学生看不出自己「只说写得好」，需用例文让其自见。\n② 提升段写法。原因：不知「由点及面」如何落笔，需给句式。\n③ 讲评接受度。原因：被点评者可能有压力，需先扬后抑。","teachingMethods":"① 典型讲评法：匿名展示三典型，全班诊断。\n② 对比修改法：原稿vs修改稿对比。\n③ 同伴互改法：交换终稿互签评语。\n④ 教师示范法：当场改一稿展示思路。","preparation":"【PPT课件】P1 讲评流程；P2 典型A（分析空泛）+修改；P3 典型B（选点过大）+修改；P4 典型C（俱佳）+赏析；P5 四标准量化表；P6 教师现场改稿；P7 朗诵会预告。\n【实物教具】学生终稿（提前收选3篇典型）。\n【音频】轻音乐。","process":[{"step":"Step 1 回顾四标准","time":"3分钟","content":"【PPT P5 四标准】教师：「好短评四标准？」 预设回答：「聚焦选点！引文准确！分析有据！有提升！」 板书时机：黑板写四标准各配问号。差异化提示：B班背口诀；A班解释每条。易错点提醒：「有提升」不是拔高喊口号，是由这一「点」看见诗人风格或普遍诗法。"},{"step":"Step 2 讲评典型A——分析空泛","time":"8分钟","content":"【PPT P2 典型A】展示匿名稿A（写「人生如梦」：「这句写得好，很有哲理，体现了苏轼的豁达，令人感动。」）。教师：「问题在哪？」 预设回答：「没说为什么好！『写得好』太空了。」 教师：「怎么改？用句式支架。」 预设回答：「应写『梦』喻人生短暂，与周瑜功成对照，显超然——具体分析。」 板书时机：黑板左列「A：分析△→补为何好」。差异化提示：B班说问题；A班提改法。易错点提醒：改分析不是加形容词，是补「机制」——这句怎么让人感到豁达的。"},{"step":"Step 3 讲评典型B——选点过大","time":"8分钟","content":"【PPT P3 典型B】展示匿名稿B（题为《评〈琵琶行〉》，复述全诗情节当评论）。教师：「这是短评吗？」 预设回答：「不是！是内容复述，没选点。」 教师：「怎么改？」 预设回答：「缩小到『大珠小珠落玉盘』一个比喻。」 板书时机：黑板中列「B：选点过大→缩小到一句」。差异化提示：B班说问题；A班提具体缩小方案。易错点提醒：选点过大必然导致复述——改法是「砍掉90%，只留一个词/句深挖」。"},{"step":"Step 4 讲评典型C——俱佳","time":"6分钟","content":"【PPT P4 典型C】展示匿名稿C（评「寻寻觅觅」七叠字，引全七组，分析动作→环境→心理递进，提升至婉约词声情）。教师：「好在哪？」 预设回答：「点小、引全、分析三层、有提升！」 板书时机：黑板右列「C：俱佳→赏析」。差异化提示：B班说好在哪；A班析其提升段写法。易错点提醒：赏析好稿不是夸，是分析「好在哪·为何好」给同学借鉴。"},{"step":"Step 5 教师现场改稿","time":"8分钟","content":"【PPT P6 改稿】教师选稿A当场改：原「写得好有哲理」→「『梦』以虚喻实，将功业未成的失落化为对时间短暂的彻悟，与周瑜『谈笑灭敌』形成反照，恰见苏轼于失意中自解的旷达。」 板书时机：黑板展示前后对比，红笔标改动。差异化提示：B班看结果；A班说每处改动理由。易错点提醒：修改是改「更好」非改「对错」，同一稿可多方向改。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 终稿修改+互签","time":"12分钟","content":"【PPT P6 环节说明】教师：「据讲评改终稿，同桌互签一句评语。」 学生修改+互签。板书时机：教师巡视选优稿备朗诵会展示。差异化提示：B班改1-2处+互签；A班改3处+写自评。易错点提醒：互签写具体评价，如「选点好但提升段可再具体」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 写作讲评 ──┐\n│ 【四标准】  │\n│ 聚焦·引文· │\n│ 分析·提升  │\n│            │\n│ A:分析△    │\n│  →补为何好 │\n│ 写得好→    │\n│ 析机制     │\n│            │\n│ B:选点过大  │\n│  →缩小一句 │\n│ 砍90%留一点│\n│            │\n│ C:俱佳     │\n│ 点小引全析深│\n│ 有提升     │\n│            │\n│ 【改三方向】│\n│ 缩小点/补引文/│\n│ 深分析+提升 │\n└────────────┘","exercises":"【基础作业】1. 提交短评终稿（修改后），附互签评语。2. 写50字自评：我选的点、改了什么、为什么改。\n【提高作业】从本单元另选一首诗词，写一篇与前稿不同角度的短评，要求选点更小、提升段更具体。\n【参考答案——教师用】终稿评价：聚焦+引文+分析=合格；分析深入+提升=良好；选点巧+洞见=优秀。自评评价：说清改了什么=合格；说清为何改=良好。","reflection":"✅ 亮点：三种典型选得准，学生从别人稿看到自己问题；现场改稿最有说服力。\n⚠️ 需改进：讲评B（选点过大）时部分人仍舍不得「全诗」，下次给「禁选全诗」硬约束。\n📌 下节课衔接：下节课单元朗诵会，需把阅读+写作成果整合展示。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T09:00:00Z"},{"id":"l-cn-bs-u3-8","lessonId":"l-cn-bs-u3-8","title":"单元学习任务——「古诗今绎」朗诵会与单元总结","book":"必修上册","unitNumber":3,"unitTitle":"生命的诗意","taskGroup":"文学阅读与写作","lessonType":"huodong","lessonTypeName":"单元活动","periodNumber":8,"duration":45,"grade":"高一","subject":"语文","tags":["单元活动","朗诵会","古诗词","成果展示","人教版必修上U3","第八课时"],"textbookAnalysis":"本课为第三单元收官，执行教材「单元学习任务」：以「古诗今绎」朗诵会整合本单元8首诗词的阅读与写作成果。活动三环节：①诗词朗诵（自选本单元一首，配乐/无配乐皆可）；②「今绎」分享（用现代话重述一首诗的情感或写一个「古诗新说」短句）；③单元反思单（回顾8课时路径：从曹操陶渊明到苏轼辛弃疾李清照，体会「生命的诗意」）。","overview":"【学情分析】A班：朗读与理解俱佳，有展示欲，但反思易空；可与写作结合展示自己的短评。B班：羞于独诵，宜小组；对「今绎」概念模糊。共同问题：单元学了什么缺乏结构化认知，需引导回顾8课时路径。","objectives":["语言能力：有感情朗诵一首本单元诗词，做到节奏、重音、情感到位。","文化意识：在朗诵与「今绎」中感受古典诗词的当代生命力。","思维品质：填单元反思单，梳理从「志趣—浪漫—悲慨—旷达—风格」的学习路径，培养元认知。","学习能力：整合阅读（8诗）与写作（短评）为单元成果。"],"keyPoints":"① 朗诵会：自选一首，限时2分钟，可配乐。\n② 今绎分享：用现代话重述一首诗的情感，或写「古诗新说」短句。\n③ 反思单：回顾路径——志趣(曹陶)→浪漫(李)→悲慨(杜白)→旷达(苏)→风格(辛李)。","difficulties":"① 朗诵情感。原因：部分平淡或煽情，需建议卡。\n② 今绎的度。原因：易写成白话翻译失去诗意，需提示「重述情感不翻译字句」。\n③ 反思深度。原因：习惯空话，需具体提示。","teachingMethods":"① 诗会展示法：营造氛围轮诵。\n② 今绎工作坊：便签写「古诗新说」。\n③ 反思单法：结构化元认知。\n④ 教师总结法：回顾路径点明核心。","preparation":"【PPT课件】P1 「古诗今绎」封面+流程；P2 朗诵建议卡；P3 今绎说明（重述情感/古诗新说）；P4 单元路径图（8诗思维导图）；P5 反思单模板；P6 下单元预告。\n【实物教具】便签每人1张；A3「诗意墙」；计时器。\n【音频】轻音乐可选。","process":[{"step":"Step 1 单元回顾——8诗路径","time":"5分钟","content":"【PPT P4 路径图】教师：「这单元我们读了8首诗词，一起回顾路径。」 展示：曹陶(志趣)→李白(浪漫)→杜白(悲慨)→苏轼(旷达)→辛李(风格)。教师：「核心线索是什么？」 预设回答：「生命的诗意——不同诗人怎样面对生命！」 板书时机：黑板画路径简图，终点写「生命的诗意」。差异化提示：B班说线索；A班说每阶段怎么「面对生命」。易错点提醒：回顾是建结构认知，不是重讲。"},{"step":"Step 2 朗诵会（上）","time":"15分钟","content":"【PPT P1 流程】【PPT P2 建议卡】教师：「古诗今绎朗诵会开始，每人/组朗诵一首，限时2分钟。看建议卡：节奏快慢搭、重音在动形、情感要真不喊。」 学生轮诵。板书时机：旁记每人诗题+亮点词。差异化提示：B班可小组诵；A班独诵+自选配乐。易错点提醒：朗诵非背书——抬头看观众，语速减半，忘词停一下继续。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 今绎分享","time":"10分钟","content":"【PPT P3 今绎说明】教师：「便签写两行：第一行写一首诗名，第二行用现代话写它的『情感核心』（不是翻译字句）。」 预设回答：「《声声慢》——一个人把日子过成了秋雨，却仍不肯认输。」「《念奴娇》——英雄梦碎后，他把酒洒给大江，与自己和解。」 板书时机：贴便签到「诗意墙」拍照。差异化提示：B班写诗名+一句；A班写+说为何这么写。易错点提醒：今绎是「重述情感」不是「白话翻译」——不要逐句翻，要抓住那一口气。"},{"step":"Step 4 反思单","time":"10分钟","content":"【PPT P5 模板】教师：「填反思单三行：①我学会了（一个方法/知识）；②我需提升（一项）；③我的疑问。」 预设回答：「①学会抓诗眼读诗。②提升朗读节奏。③婉约和豪放真能分开吗？」 板书时机：巡选2-3份分享。差异化提示：B班填前两行；A班全填+疑问有思。易错点提醒：反思写具体「一个方法」而非「学到很多」。"},{"step":"Step 5 分享+教师总结","time":"5分钟","content":"【PPT P6 下单元】教师选2-3份反思分享。总结：「从曹操的忧到李清照的愁，诗词是古人面对生命的样子。下单元我们读实用文——劳动与媒介，会发现『生命的诗意』之外还有『生活的实感』。」 板书时机：板书「生命之诗→生活之实」。差异化提示：B班听总结；A班写一句下单元期待。易错点提醒：单元结束不是考试结束——诗词读法可迁移到课外自主阅读。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 古诗今绎·收官 ──┐\n│ 生命的诗意         │\n│ 【8诗路径】         │\n│ 曹陶(志趣)→        │\n│ 李白(浪漫)→        │\n│ 杜白(悲慨)→        │\n│ 苏轼(旷达)→        │\n│ 辛李(风格)         │\n│ 终点:面对生命       │\n│                    │\n│ 【诗意墙】          │\n│ 声声慢:秋雨里不认输 │\n│ 念奴娇:洒酒与己和   │\n│ …(便签贴满)        │\n│                    │\n│ 【反思三问】        │\n│ ①我学会了__       │\n│ ②我需提升__       │\n│ ③我的疑问__       │\n│                    │\n│ 生命之诗→生活之实  │\n└────────────────────┘","exercises":"【基础作业】1. 提交单元反思单（三行完整）。2. 誊抄朗诵的诗+一句朗诵感受。\n【提高作业】写150字「单元总结」，要求：①点明本单元最重要的一个读法；②举一诗例说明；③说一个想在下单元提升的方面。\n【参考答案——教师用】反思单评价：三行具体=合格；有方法意识=良好；疑问有思=优秀。单元总结评价：点明读法+举例=合格；有迁移意识=良好；个性化反思=优秀。","reflection":"✅ 亮点：「古诗新说」便签比预期精彩，学生用现代话抓住了诗魂（如「秋雨里不认输」）；朗诵会氛围好。\n⚠️ 需改进：朗诵15分钟只轮8人，全班未完；下次分两组或限1分钟。\n📌 下单元衔接：第四单元「家乡文化生活」转实用文与调查，需提示「诗意」转向「实感」。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T09:00:00Z"},{"id":"l-cn-bs-u4-1","lessonId":"l-cn-bs-u4-1","title":"单元导入——家乡文化面面观","book":"必修上册","unitNumber":4,"unitTitle":"家乡文化生活","taskGroup":"当代文化参与","lessonType":"daohang","lessonTypeName":"单元导入","periodNumber":1,"duration":45,"grade":"高一","subject":"语文","tags":["当代文化参与","家乡文化","导入","人教版必修上U4","第一课时"],"textbookAnalysis":"本单元为「当代文化参与」学习任务群，是高中语文首个综合实践活动单元。教材以「家乡文化生活」为主题，引导学生关注身边的文化现象，通过调查、访谈、整理、倡议等方式参与家乡文化建设。第一课为单元导入，明确「家乡文化」的内涵（风物、习俗、人物、故事、当下文化生活），建立调查意识。","overview":"【学情分析】A班：对「文化」概念偏抽象，能举例但说不清「家乡文化」包含什么；有初步社会观察力。B班：对「参与文化建设」无概念，以为文化是博物馆里的古董；实践活动畏难。共同问题：把文化等同于「古老的东西」，忽略当下活生生的文化生活（广场舞、村晚、非遗直播等）。","objectives":["语言能力：能用自己的话概括「家乡文化」的构成（风物/习俗/人物/故事/当下生活），并列举本地3例。","文化意识：认识家乡文化是中华文化的具体承载，培养对本土文化的认同感与参与意识。","思维品质：通过「文化现象→文化价值」的追问，培养从现象看本质的思维。","学习能力：了解本单元三类活动（记录风物/参与社团/撰写倡议），建立实践规划意识。"],"keyPoints":"① 家乡文化五要素：风物（建筑/饮食/物产）、习俗（节庆/礼仪）、人物（乡贤/匠人）、故事（传说/史事）、当下生活（文娱/非遗）。\n② 参与方式三路径：记录（风物志）、参与（文化社团）、建设（倡议书）。\n③ 调查意识：用「眼（观察）耳（访谈）手（记录）」走近家乡。","difficulties":"① 文化概念具体化。原因：学生易空谈「文化博大精深」，需落到可触的本地事例。\n② 从「看」到「参与」。原因：学生习惯旁观，需提示「参与」是小行动（一次采访、一份倡议）。\n③ 调查伦理。原因：访谈需尊重对象、保护隐私，需事先提醒。","teachingMethods":"① 头脑风暴法：列举家乡文化现象，教师归类成五要素。\n② 案例法：展示外地学生「家乡风物志」范例。\n③ 任务驱动法：发布本单元三大活动任务。\n④ 地图法：用本地地图标注文化点，可视化。","preparation":"【PPT课件】P1 单元主题「家乡文化生活」+任务群说明；P2 家乡文化五要素图（风物/习俗/人物/故事/当下）；P3 外地范例（风物志/倡议书）；P4 本单元三活动任务单；P5 本地文化点地图示例；P6 调查伦理提示；P7 分组安排。\n【实物教具】本地旅游地图或非遗宣传册一张。\n【音频】无。","process":[{"step":"Step 1 导入——你家乡有什么","time":"5分钟","content":"【PPT P1 主题】教师：「闭上眼想10秒，你的家乡有什么『只有那儿才有』的东西？」 预设回答：「我们那儿过年要舞龙！」「我奶奶会剪窗花。」「镇上有一棵几百年的老树。」 板书时机：黑板中央写「家乡文化」，外围圈学生举例。差异化提示：B班说1个；A班说2个并说「为什么只有那儿有」。易错点提醒：文化不只是古老物——广场舞、村晚、非遗直播也是当下文化生活。"},{"step":"Step 2 文化五要素归类","time":"10分钟","content":"【PPT P2 五要素】教师：「大家举的例子，能归到哪类？」 预设回答：「舞龙是习俗，老树是风物，奶奶剪窗花是人物（匠人）！」 板书时机：黑板画五要素框（风物/习俗/人物/故事/当下），把学生例子填进去。差异化提示：B班填前3类；A班全填并补「当下生活」类例子。易错点提醒：「故事」不是虚构——是本地真实传说或史事（如本地名人典故），要与文学故事区分。"},{"step":"Step 3 范例引路","time":"8分钟","content":"【PPT P3 范例】教师展示外地学生作品：「这是某校同学写的《老街风物志》和《保护古井倡议书》。」 教师：「它们做对了什么？」 预设回答：「有具体观察（老街的石板）、有真实采访（老人的话）、有行动建议。」 板书时机：板书「好作品三要素：观察+采访+行动」。差异化提示：B班看范例说亮点；A班需总结可迁移的方法。易错点提醒：范例是「小而真」不是「大而全」——一份写透一口古井好过泛写全城。"},{"step":"Step 4 三活动任务发布","time":"10分钟","content":"【PPT P4 任务单】教师：「本单元三大活动：①记录家乡风物（写风物志）；②参与家乡文化社团（做一次志愿服务或采访）；③撰写参与家乡文化建设的倡议书。分组选任务。」 学生分组选题。板书时机：黑板列三任务+分组表。差异化提示：B班选1项明确任务；A班可跨两项（记录+倡议）。易错点提醒：任务要「可完成、可验证」——避免选「保护全城非遗」这种空泛目标，选「记录本校旁老街」具体可行。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 调查伦理+分组","time":"7分钟","content":"【PPT P6 伦理】教师：「去采访长辈、拍老建筑，要注意什么？」 预设回答：「要先问人家愿不愿意。」「不能乱拍别人家。」 板书时机：板书「调查伦理：知情同意·保护隐私·真实记录」。差异化提示：B班记三点；A班需设计一句「采访开场白」。易错点提醒：未成年人外出调查须家长/老师知情同意，安全第一，不下水不进危房。"},{"step":"Step 6 小结+作业","time":"5分钟","content":"【PPT P7 分组】教师：「今天建了什么？」 预设回答：「家乡文化五要素+三活动任务！」 板书时机：板书单元路径。差异化提示：B班确定本组任务；A班写200字「我的家乡文化发现计划」。易错点提醒：下节课学调查方法，提醒这周先在家和长辈聊一次，积累素材。"}],"blackboard":"┌── 家乡文化生活·导入 ──┐\n│ 家乡文化             │\n│ 风物 习俗 人物       │\n│ 故事 当下生活        │\n│ (老树)(舞龙)(匠人)   │\n│ (传说)(村晚)         │\n│                      │\n│ 【好作品三要素】      │\n│ 观察+采访+行动       │\n│                      │\n│ 【三活动】            │\n│ ①记风物(风物志)      │\n│ ②参社团(志愿/采访)   │\n│ ③写倡议(建设)        │\n│                      │\n│ 【调查伦理】          │\n│ 知情同意·隐私·真实   │\n└──────────────────────┘","exercises":"【基础作业】1. 用「家乡文化五要素」框架，列举你家乡至少各1例（共5例）。2. 确定本组活动任务并写一句话目标。\n【提高作业】写200字「我的家乡文化发现计划」，说明：①想记录/参与什么；②打算怎么获得素材（访谈谁/观察什么）；③预期成果形式。\n【参考答案——教师用】基础1示例：风物—镇口老槐树；习俗—端午龙舟；人物—扎灯笼的李爷爷；故事—本地抗洪传说；当下—社区书法班。提高作业评价：框架清晰+素材可行=合格；有具体访谈对象+成果形式=良好；计划有独特视角=优秀。","reflection":"✅ 亮点：头脑风暴让「文化」落地到学生身边的具体事物，B班也举出鲜活的本地例子；地图标注法直观。\n⚠️ 需改进：调查伦理讲得偏快，部分学生没当回事；下次应放一则「未经同意拍摄惹纠纷」的真实案例。\n📌 下节课衔接：下节课教具体调查方法（问卷/访谈/观察记录），需把本周家庭访谈素材带来。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T09:30:00Z"},{"id":"l-cn-bs-u4-2","lessonId":"l-cn-bs-u4-2","title":"调查方法指导——怎样做家乡文化调查","book":"必修上册","unitNumber":4,"unitTitle":"家乡文化生活","taskGroup":"当代文化参与","lessonType":"fangfa","lessonTypeName":"方法指导","periodNumber":2,"duration":45,"grade":"高一","subject":"语文","tags":["当代文化参与","调查方法","访谈","人教版必修上U4","第二课时"],"textbookAnalysis":"本课为方法指导课，承接导入，教学生三种基础调查方法：①文献法（查地方志、村史、老照片）；②观察法（定点记录风物与活动）；③访谈法（设计提纲、倾听记录）。教材「调查的技术」一文提供操作框架。重点是访谈提纲设计与记录规范，避免「聊闲天」式无效调查。","overview":"【学情分析】A班：能设计简单问题，但提纲逻辑散、追问能力差；记录爱用脑记不落笔。B班：不知「访谈」与「聊天」区别，易跑题；文献法不知从哪查。共同问题：把调查当「去玩一圈」，缺方法意识；记录不全导致后期写不出。","objectives":["语言能力：能设计一份结构清晰的访谈提纲（开场—主体—收尾），并规范记录。","文化意识：在真实调查中体会「本地文化由具体的人承载」，培养尊重与倾听态度。","思维品质：通过方法选择（文献/观察/访谈）匹配不同调查目标，培养方法适配思维。","学习能力：掌握「定目标→选方法→做记录」的调查三步骤，能独立开展小型调查。"],"keyPoints":"① 三方法：文献法（查资料）、观察法（定点记）、访谈法（对话录）。\n② 访谈提纲三结构：开场（说明目的+征得同意）、主体（主问题+追问）、收尾（致谢+确认）。\n③ 记录规范：当场记关键词、标注时间地点对象、保护隐私（化名）。","difficulties":"① 提纲的逻辑性。原因：学生问题无序，需教「由浅入深、由事实到看法」的排序。\n② 追问能力。原因：学生不敢追问，需示范「为什么」「能举个例子吗」。\n③ 记录习惯。原因：学生依赖记忆，需强制「当场记」。","teachingMethods":"① 讲授+示范法：展示一份优秀提纲并模拟一段访谈。\n② 演练法：同桌互当「受访者」练提问。\n③ 案例纠错法：展示一份糟糕提纲让学生改。\n④ 清单法：给「调查三步骤」检查单。","preparation":"【PPT课件】P1 三方法对比；P2 访谈提纲模板（开场/主体/收尾）；P3 模拟访谈片段（好vs差）；P4 记录规范（时间/地点/对象/化名）；P5 糟糕提纲纠错练习；P6 调查检查单；P7 任务。\n【实物教具】采访本/录音笔（模型）各一。\n【音频】无。","process":[{"step":"Step 1 回顾+引方法","time":"5分钟","content":"【PPT P1 三方法】教师：「上周定了任务，今天学怎么调查。调查有几种基本方法？」 预设回答：「查资料（文献）、去看（观察）、去问（访谈）！」 板书时机：黑板写「文献/观察/访谈」。差异化提示：B班说三方法；A班需说「什么目标用什么方法」。易错点提醒：三方法常组合用——查文献打底、观察取证、访谈补细节，不是三选一。"},{"step":"Step 2 访谈提纲结构","time":"12分钟","content":"【PPT P2 模板】教师：「访谈不是聊天。好提纲有三段：开场说明目的+征得同意；主体由浅入深问；收尾致谢确认。看模板。」 展示模板。预设回答：「原来要先说『我是学生，想了解老街历史，可以录音吗』。」 板书时机：黑板写提纲三段结构。差异化提示：B班背三段；A班需设计本组访谈的1个主问题+1个追问。易错点提醒：主体问题要「由事实到看法」——先问「您在这住了多久」再问「您觉得老街变了什么」，不能直接问抽象看法。"},{"step":"Step 3 模拟访谈","time":"10分钟","content":"【PPT P3 模拟】教师请一生扮「老街居民」，自己示范访谈：「李爷爷您好，我是xx中学学生…可以聊几分钟吗？您记得老街以前什么样吗？」再展示一段「差访谈」（一上来问「您对城市化怎么看」跑题）。教师：「差别在哪？」 预设回答：「好的从具体事问起，差的太宏大跑题。」 板书时机：黑板标「好：具体·递进；差：抽象·跑题」。差异化提示：B班看差异；A班需说出追问示范（「能举个例子吗」）。易错点提醒：受访者跑题时要用「您刚说的xx很有意思，能再讲讲吗」温柔拉回，不要生硬打断。"},{"step":"Step 4 记录规范","time":"8分钟","content":"【PPT P4 记录】教师：「访谈时怎么记？」 预设回答：「当场记！不能全靠脑子。」「要写时间地点谁说的。」 教师：「隐私呢？」 预设回答：「用化名，不写真名。」 板书时机：黑板写「记录四要素：时/地/人(化名)/关键句」。差异化提示：B班记四要素；A班需设计本组记录表头。易错点提醒：录音须先征得同意，且只用于作业不外传；现场记关键词比逐字记更高效。"},{"step":"Step 5 纠错练习","time":"6分钟","content":"【PPT P5 纠错】教师展示一份糟糕提纲（问题无序、有诱导性「您一定觉得老街拆了很可惜吧」）。教师：「改改它。」 预设回答：「顺序乱，要重排；『一定觉得』是诱导，改成『您怎么看拆除』。」 板书时机：板书「忌：无序·诱导·跑题」。差异化提示：B班说1处错；A班改完整版。易错点提醒：诱导性提问会让答案失真，调查要中立客观。"},{"step":"Step 6 任务布置","time":"4分钟","content":"【PPT P6 检查单】教师：「据今天方法，完善本组提纲，本周完成一次真实访谈/观察。」 板书时机：板书调查检查单。差异化提示：B班完成提纲；A班附记录表。易错点提醒：安全第一——未成年人调查须家长知情，不去危险场所。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 调查方法 ──┐\n│ 文献/观察/访谈  │\n│ (常组合用)      │\n│                │\n│ 【访谈提纲】    │\n│ 开场:目的+同意  │\n│ 主体:浅→深     │\n│  事实→看法     │\n│ 收尾:致谢+确认  │\n│                │\n│ 【好vs差】      │\n│ 好:具体·递进    │\n│ 差:抽象·跑题    │\n│                │\n│ 【记录四要素】  │\n│ 时/地/人(化名)/ │\n│ 关键句          │\n│                │\n│ 忌:无序·诱导·   │\n│ 跑题            │\n└────────────────┘","exercises":"【基础作业】1. 设计一份本组访谈提纲（开场/主体3问/收尾），主体问题须「由事实到看法」排序。2. 设计记录表头（含时/地/化名/关键句）。\n【提高作业】就「家乡某种老手艺/老建筑」拟一份调查方案，含：目标、方法组合、访谈对象、预计成果。\n【参考答案——教师用】基础1评价：有三段结构+问题递进=合格；问题具体不诱导=良好。基础2评价：表头含四要素=合格。提高作业评价：方法组合合理+对象明确=良好；方案有独特切入点=优秀。","reflection":"✅ 亮点：模拟访谈（好vs差）对比极直观，学生秒懂「具体vs抽象」；记录四要素清单可操作。\n⚠️ 需改进：纠错练习时间紧，部分B班生未改完；下次把糟糕提纲提前印发。\n📌 下节课衔接：下节课实地调查实践（风物走访），需带本周完成的提纲与记录表。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T09:30:00Z"},{"id":"l-cn-bs-u4-3","lessonId":"l-cn-bs-u4-3","title":"实地调查实践（一）——家乡风物走访","book":"必修上册","unitNumber":4,"unitTitle":"家乡文化生活","taskGroup":"当代文化参与","lessonType":"shijian","lessonTypeName":"实践课","periodNumber":3,"duration":45,"grade":"高一","subject":"语文","tags":["当代文化参与","实地调查","风物","人教版必修上U4","第三课时"],"textbookAnalysis":"本课为实地调查实践第一课，聚焦「家乡风物」走访。风物指本地有文化内涵的物质载体：老建筑、古木、饮食、特产、手工艺等。学生以小组为单位，在校内或家附近开展一次短时风物走访，运用上节课的观察法与访谈法，完成「风物卡片」（名称/位置/年代/特征/故事/现状）。本课重在实践中巩固方法。","overview":"【学情分析】A班：方法已掌握，实践时能主动追问，但易贪多（一次想记10样）；记录规范。B班：外出易兴奋跑题，忘记记录；对「风物」理解窄（只想到古建筑）。共同问题：观察浮于表面（只拍照片不记细节）；把风物当「景点」忽略文化故事。","objectives":["语言能力：能完成1张规范「风物卡片」，用准确语言描述风物的特征与文化信息。","文化意识：在走访中感受风物承载的本土记忆，培养对身边文化的珍视。","思维品质：通过「看特征→问故事→想价值」的路径，培养从物到文化的推导。","学习能力：在实践中巩固观察+访谈方法，能独立产出调查记录。"],"keyPoints":"① 风物卡片六栏：名称/位置/年代/特征/故事/现状。\n② 观察要细：不只拍照，记材质/形制/色彩/使用痕迹。\n③ 故事要问：风物背后的传说、使用者、变迁，靠访谈获得。","difficulties":"① 观察深度。原因：学生走马观花，需给「观察清单」强制细化。\n② 故事获取。原因：风物故事在人口中，需主动访谈，学生不敢开口。\n③ 价值判断。原因：学生记了特征却说不出「为什么值得记」，需引导。","teachingMethods":"① 任务单法：发风物卡片模板，限时完成。\n② 现场指导法：教师随组巡视点拨。\n③ 同伴互评法：回班后小组交换卡片提建议。\n④ 追问示范法：教师示范如何向长辈问故事。","preparation":"【PPT课件】P1 风物卡片模板（六栏）；P2 观察清单（材质/形制/色彩/痕迹）；P3 问故事的话术；P4 优秀卡片范例；P5 安全要求；P6 回班互评表。\n【实物教具】风物卡片打印模板每组1份；笔。\n【音频】无。","process":[{"step":"Step 1 任务发布","time":"5分钟","content":"【PPT P1 卡片】教师：「今天去走访校园或家附近的一处风物，完成这张六栏卡片。限时20分钟。」 展示模板（名称/位置/年代/特征/故事/现状）。板书时机：黑板写「风物卡片六栏」。差异化提示：B班记六栏；A班需想「选什么风物有文化价值」。易错点提醒：风物不限于古建筑——一棵老树、一口古井、一家老字号都算，选「有故事」的。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 方法回顾+出发","time":"5分钟","content":"【PPT P2 观察清单】教师：「观察不只拍照——记材质/形制/色彩/使用痕迹。问故事用这句中『爷爷/阿姨，这xx有多少年了？有什么故事吗？』」 板书时机：黑板写观察四要点+问话术。差异化提示：B班记要点；A班需设计本组专属追问。易错点提醒：出发前确认安全——校内或家长陪同的附近区域，不单独去偏僻危险处。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 实地走访（核心）","time":"20分钟","content":"【PPT P3 环节说明】【实践活动】学生分组走访，填卡片。教师巡视点拨：提醒「记使用痕迹」「问变迁故事」。板书时机：教师巡记各组进度与典型发现。差异化提示：B班完成基础六栏；A班补「现状+价值」两栏（风物今天还在用吗/为什么值得保护）。易错点提醒：现场记关键词，回去立刻补写成文，隔久会忘细节；照片仅辅助，不能代替文字记录。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 回班互评","time":"8分钟","content":"【PPT P6 互评表】教师：「小组交换卡片，按互评表打分：观察细不细/故事有没有/价值说清没。」 预设回答：「他们只写了『老树很老』，没记树围和传说。」「这组问到了爷爷小时候在树下乘凉的故事，好！」 板书时机：黑板列互评典型反馈。差异化提示：B班用「有/无」评；A班四维打分+建议。易错点提醒：互评说具体——「缺故事」比「写得不好」有用。"},{"step":"Step 5 典型分享","time":"5分钟","content":"【PPT P5 环节说明】教师请1-2组分享卡片。预设回答（分享示例）：「校门口老槐树，约120年，三人合抱，奶奶说抗战时村民在树下躲过兵，现在成了大家乘凉的地方。」 板书时机：板书一个「好卡片」范例要点。差异化提示：B班听分享；A班需点评该卡片好在哪。易错点提醒：好卡片=特征具体+故事真实+价值清晰，三者缺一不可。"},{"step":"Step 6 小结+作业","time":"2分钟","content":"【PPT P6 环节说明】教师：「今天的风物卡片，是下周写风物志的素材。把卡片整理好。」 板书时机：板书「卡片→风物志」。差异化提示：B班整理卡片；A班写100字卡片说明。易错点提醒：下节课做第二次实践（口述史采访），提醒找一位长者预约时间。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 风物走访 ──┐\n│ 【卡片六栏】  │\n│ 名称/位置/    │\n│ 年代/特征/    │\n│ 故事/现状     │\n│              │\n│ 【观察四要点】│\n│ 材质·形制·    │\n│ 色彩·痕迹     │\n│              │\n│ 【好卡片】    │\n│ 特征具体+     │\n│ 故事真实+     │\n│ 价值清晰      │\n│              │\n│ 卡片→风物志   │\n└──────────────┘","exercises":"【基础作业】1. 整理完善本组风物卡片（六栏齐全）。2. 附一句「为什么这处风物值得记录」。\n【提高作业】据卡片扩写一段300字「风物小传」，含特征描写与一则真实故事。\n【参考答案——教师用】基础1评价：六栏全+有故事=合格。基础2评价：价值句具体=良好。提高作业评价：描写有画面+故事真实=良好；能勾连当下意义=优秀。","reflection":"✅ 亮点：风物卡片模板让实践有抓手，B班也能产出像样记录；互评环节活跃。\n⚠️ 需改进：20分钟对部分组偏紧，远处的风物来不及走；下次按距离分组或校内定点。\n📌 下节课衔接：下节课口述史采访，需提前预约一位长者，运用访谈提纲。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T09:30:00Z"},{"id":"l-cn-bs-u4-4","lessonId":"l-cn-bs-u4-4","title":"实地调查实践（二）——口述史采访","book":"必修上册","unitNumber":4,"unitTitle":"家乡文化生活","taskGroup":"当代文化参与","lessonType":"shijian","lessonTypeName":"实践课","periodNumber":4,"duration":45,"grade":"高一","subject":"语文","tags":["当代文化参与","口述史","访谈","人教版必修上U4","第四课时"],"textbookAnalysis":"本课为实地调查实践第二课，聚焦「口述史采访」——通过访谈长辈获取本地记忆（习俗变迁、老行当、重大事件亲历）。口述史是家乡文化的重要活态载体。学生运用访谈提纲，完成一次15分钟左右的微型口述史记录，产出「口述卡片」（受访者/时间/核心回忆/文化信息）。","overview":"【学情分析】A班：提纲已备，采访时能追问，但易替受访者「总结」而漏原话。B班：面对长辈不敢开口，或问完记不住；口述与风物混淆。共同问题：把口述史当「写一篇作文」，缺原话记录；忽略受访者情绪与细节。","objectives":["语言能力：能完成1份「口述卡片」，准确记录受访者的核心回忆与原话片段。","文化意识：在倾听长辈讲述中感受代际文化传递，培养敬老与尊重态度。","思维品质：通过「原话→文化信息」的提炼，培养从口述中抽离文化价值的能力。","学习能力：巩固访谈法，能独立产出可信的口述史记录。"],"keyPoints":"① 口述卡片四栏：受访者(化名/年龄)/时间地点/核心回忆/文化信息。\n② 记原话：关键句用引号直引，不替受访者总结。\n③ 抓文化：从回忆中提炼习俗/观念/变迁等文化信息。","difficulties":"① 原话记录。原因：学生爱「概括」丢原话，需强调引号直引。\n② 追问深度。原因：长辈讲述散，需教「那时您多大」「后来呢」推进。\n③ 文化提炼。原因：记了故事不知其文化价值，需引导。","teachingMethods":"① 模板法：口述卡片模板。\n② 示范法：播放/模拟一段口述采访。\n③ 现场实践法：学生完成真实采访（校内员工或家人）。\n④ 互评法：回班交换点评原话真实性。","preparation":"【PPT课件】P1 口述卡片模板；P2 原话直引示范（好vs差）；P3 追问推进话术；P4 文化信息提炼示例；P5 优秀口述卡；P6 伦理回顾。\n【实物教具】口述卡片模板每组1份。\n【音频】无。","process":[{"step":"Step 1 任务+区分","time":"5分钟","content":"【PPT P1 模板】教师：「上次记『物』（风物），今天记『人』（口述史）——听长辈讲过去。卡片四栏：受访者/时间地点/核心回忆/文化信息。」 预设回答：「口述是活的历史！」 板书时机：黑板写「口述卡片四栏」，区分风物卡。差异化提示：B班记四栏；A班需说口述史价值。易错点提醒：口述史记「人说的」，风物卡记「物见的」，二者互补，别混。"},{"step":"Step 2 原话直引","time":"8分钟","content":"【PPT P2 示范】教师展示：差——「爷爷说以前很苦」；好——「爷爷说：『那时候一碗粥要分两顿喝，过年才见点肉腥。』」 教师：「差别？」 预设回答：「好的有原话，像真的听到爷爷说！」 板书时机：黑板写「记原话→用引号」。差异化提示：B班记原则；A班需从本组访谈中找1句值得直引的话。易错点提醒：原话要准确，不篡改不美化；听不清就复述确认「您刚说xx，对吗」。"},{"step":"Step 3 追问推进","time":"7分钟","content":"【PPT P3 话术】教师：「长辈讲得散怎么办？用追问推进：『您那时多大？』『后来怎么样了？』『现在回想什么感受？』」 板书时机：黑板写追问三问。差异化提示：B班记三问；A班需设计本组专属追问。易错点提醒：追问要自然，别像审问——用「然后呢」「能再多讲讲吗」温柔推进。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 实地采访（核心）","time":"15分钟","content":"【PPT P4 环节说明】【实践活动】学生采访（校内员工/家人/社区长者），填口述卡。教师巡视。板书时机：教师巡记典型原话。差异化提示：B班完成四栏+1句原话；A班补「文化信息」栏（从回忆提炼习俗/观念）。易错点提醒：先征得同意再录音；长者语速慢要耐心，不催不替说。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 文化提炼+互评","time":"7分钟","content":"【PPT P4 提炼】教师：「从爷爷的『分两顿喝粥』能提炼什么文化信息？」 预设回答：「过去物质匮乏、节俭观念、家庭互助。」 板书时机：黑板写「原话→文化信息」提炼示例。差异化提示：B班说1条信息；A班需写2条并说明来源。易错点提醒：提炼要基于原话，不凭空拔高；一条原话可提炼多点。"},{"step":"Step 6 分享+作业","time":"3分钟","content":"【PPT P6 环节说明】教师请1组读原话片段。板书时机：板书「口述卡→文化故事」。差异化提示：B班整理卡片；A班写100字提炼说明。易错点提醒：下节课学资料整理与撰写（风物志/调查报告），把两次实践素材归档。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 口述史采访 ──┐\n│ 【卡片四栏】   │\n│ 受访者/时空/   │\n│ 核心回忆/      │\n│ 文化信息       │\n│               │\n│ 记原话→引号    │\n│ 「…」(不篡改)  │\n│               │\n│ 【追问三问】   │\n│ 您多大?后来呢? │\n│ 什么感受?      │\n│               │\n│ 原话→文化信息  │\n│ 粥分两顿→匮乏  │\n│ 节俭·互助      │\n└───────────────┘","exercises":"【基础作业】1. 完善口述卡片（四栏全+至少1句引号原话）。2. 写1条从原话提炼的文化信息。\n【提高作业】将口述整理成300字「口述小记」，含受访者背景、核心回忆原话、你的文化感悟。\n【参考答案——教师用】基础1评价：四栏全+原话=合格。基础2评价：信息基于原话=良好。提高作业评价：原话真实+感悟切实=良好；能勾连代际文化=优秀。","reflection":"✅ 亮点：原话直引示范（好vs差）让学生懂「记原话」的价值；追问三问实用。\n⚠️ 需改进：部分组采访对象难约，临时抓校内员工凑数，质量参差；下次提前一周布置预约。\n📌 下节课衔接：下节课资料整理与撰写，把风物卡+口述卡整合为风物志/调查报告。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T09:30:00Z"},{"id":"l-cn-bs-u4-5","lessonId":"l-cn-bs-u4-5","title":"资料整理与撰写——风物志与调查报告","book":"必修上册","unitNumber":4,"unitTitle":"家乡文化生活","taskGroup":"当代文化参与","lessonType":"xiezuo","lessonTypeName":"写作指导","periodNumber":5,"duration":45,"grade":"高一","subject":"语文","tags":["当代文化参与","撰写","风物志","调查报告","人教版必修上U4","第五课时"],"textbookAnalysis":"本课为写作指导，将前两次实践素材转化为文字成果：①风物志（以风物卡为基础，写成有描写有故事的短文）；②调查报告（以口述+观察为基础，按「问题—方法—发现—建议」结构成文）。教材提供示例。重点是从「记录」到「成文」的加工：增补描写、理顺结构、提炼价值。","overview":"【学情分析】A班：素材足，但易直接抄卡片，缺描写与过渡；调查报告结构意识弱。B班：不知「风物志」与「说明文」区别，写成干巴巴的介绍；怕写调查报告。共同问题：把成文当「把卡片拼起来」，缺加工；价值提炼空泛。","objectives":["语言能力：能据素材写1篇风物志（描写+故事）或1篇调查报告（问题—方法—发现—建议）。","文化意识：在成文中凸显家乡文化的价值，培养表达与传播本土文化的意识。","思维品质：通过「素材→结构→价值」的加工，培养信息整合与逻辑表达。","学习能力：掌握风物志/调查报告的写作框架，能独立产出。"],"keyPoints":"① 风物志结构：引（位置年代）→描（特征）→事（故事）→评（价值）。\n② 调查报告结构：问题—方法—发现—建议，四段式。\n③ 加工三动作：增补描写、理顺过渡、提炼价值（不空喊）。","difficulties":"① 从卡到文。原因：学生直接复制卡片，需教「描写扩充+故事展开」。\n② 报告结构。原因：学生写成记叙文，需强化「问题—建议」框架。\n③ 价值提炼。原因：易写「很有意义」空话，需落到具体。","teachingMethods":"① 框架法：给风物志/报告结构图。\n② 升格示范法：卡片句→成文句对比。\n③ 同伴互改法：交换草稿提结构意见。\n④ 教师点评法：典型稿公开评。","preparation":"【PPT课件】P1 风物志结构（引描事评）；P2 调查报告结构（问题方法发现建议）；P3 卡片→成文升格示例；P4 价值提炼支架；P5 互改量表；P6 范例。\n【实物教具】学生素材卡（风物卡+口述卡）。\n【音频】无。","process":[{"step":"Step 1 两类成果说明","time":"5分钟","content":"【PPT P1/P2 结构】教师：「两次实践产出两类文：风物志（写物，引描事评）和调查报告（写发现，问题方法发现建议）。你选哪类写？」 预设回答：「我写风物志（老槐树）。」「我写调查报告（老街变迁）。」 板书时机：黑板分列两类结构。差异化提示：B班选一类明确结构；A班可两类都试框架。易错点提醒：风物志重「描写+故事」，调查报告重「问题+建议」，别写成同一种。"},{"step":"Step 2 升格示范——卡到文","time":"12分钟","content":"【PPT P3 升格】教师展示：卡片句「老槐树很老，三人合抱」→成文「校门口那棵槐树，粗得要三个孩子才抱得过来，树皮皴裂如老人手掌，据奶奶说已有百二十年的光阴。」 教师：「加了什么？」 预设回答：「加了比喻（老人手掌）、加了奶奶的话、有了画面。」 板书时机：黑板写「加工三动作：描写·过渡·价值」。差异化提示：B班看升格；A班需对自己素材做1处升格。易错点提醒：描写要「基于真实」——不能为了生动编造特征，槐树围度要真。"},{"step":"Step 3 风物志写法","time":"10分钟","content":"【PPT P1 结构】教师讲风物志四段：引（在哪/多久）→描（材质形制）→事（传说/使用者）→评（为什么值得记）。以老槐树为例走一遍。板书时机：黑板写风物志四段+老槐树示例词。差异化提示：B班按四段写；A班需补「评」段（价值具体）。易错点提醒：「评」要具体——「承载村民记忆」比「很有意义」好；可勾连当下保护。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 调查报告写法","time":"10分钟","content":"【PPT P2 结构】教师讲报告四段：问题（发现什么现象）→方法（怎么调查的）→发现（得出什么）→建议（怎么办）。以「老街拆迁记忆」为例。板书时机：黑板写报告四段。差异化提示：B班按四段写；A班需写「建议」具体可行。易错点提醒：建议要「可操作」——「建议立保护牌」比「希望大家保护」好；不写空话。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 互改","time":"6分钟","content":"【PPT P5 量表】教师：「交换草稿，按量表：结构清不清/描写够不够/价值实不实。」 预设回答：「他风物志没『评』段。」「她报告建议太虚。」 板书时机：黑板列互改反馈。差异化提示：B班用「有/无」；A班四维打分+建议。易错点提醒：互改说具体，如「缺评段、价值可补『村民乘凉记忆』」。"},{"step":"Step 6 作业","time":"2分钟","content":"【PPT P6 环节说明】教师：「据互改改终稿，下节课交。」 板书时机：板书「卡→文」。差异化提示：B班改结构；A班改描写+价值。易错点提醒：下节课写倡议书（参与建设），提醒保留素材。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 资料整理与撰写 ──┐\n│ 风物志:引描事评  │\n│  引:位置年代     │\n│  描:材质形制     │\n│  事:传说使用者   │\n│  评:为何值得记   │\n│                │\n│ 调查报告:       │\n│ 问题→方法→      │\n│ 发现→建议       │\n│                │\n│ 【加工三动作】   │\n│ 描写·过渡·价值   │\n│                │\n│ 卡→文(升格)     │\n└────────────────┘","exercises":"【基础作业】1. 据素材写1篇风物志或调查报告（400字左右），结构完整。2. 在文末写1句「价值/建议」要点。\n【提高作业】两类各写1篇提纲（只写四段小标题+每段落核心句），对比两类文的结构差异。\n【参考答案——教师用】基础1评价：结构完整+描写/建议具体=合格；有升格描写+价值实在=良好。基础2评价：价值句不空=良好。提高作业评价：提纲清晰+差异点明=优秀。","reflection":"✅ 亮点：卡片→成文升格示范最有效，学生看到「怎么把干卡片写活」；两类结构对比清楚。\n⚠️ 需改进：调查报告「建议」普遍虚，需更多具体范例；下次给「建议句式库」。\n📌 下节课衔接：下节课学写倡议书（参与家乡文化建设），是前两类成果的「行动延伸」。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T09:30:00Z"},{"id":"l-cn-bs-u4-6","lessonId":"l-cn-bs-u4-6","title":"写作指导——学写倡议书（参与家乡文化建设）","book":"必修上册","unitNumber":4,"unitTitle":"家乡文化生活","taskGroup":"当代文化参与","lessonType":"xiezuo","lessonTypeName":"写作指导","periodNumber":6,"duration":45,"grade":"高一","subject":"语文","tags":["当代文化参与","倡议书","应用文","人教版必修上U4","第六课时"],"textbookAnalysis":"本课学写倡议书——本单元「参与家乡文化建设」的行动落点。倡议书是公开提议大家做某事的实用文体，结构：标题（关于…的倡议）+称呼+正文（背景/问题/具体倡议/号召）+落款。教材提供范例。重点：问题要真（来自调查）、倡议要具体可行、语气要恳切有号召力。","overview":"【学情分析】A班：能写结构完整倡议书，但倡议易空泛（「请大家保护文化」）；语气拿捏不准。B班：对倡议书格式不清（标题/称呼/落款）；把倡议书写成记叙文。共同问题：倡议「假大空」，不基于真实调查；缺乏具体行动项。","objectives":["语言能力：能写1篇格式规范的倡议书，含背景、问题、具体倡议、号召四部分。","文化意识：通过倡议参与家乡文化建设，培养「文化主人翁」意识与行动力。","思维品质：在「调查问题→具体倡议」中培养问题意识与方案思维。","学习能力：掌握倡议书格式与写法，能独立产出可发布的倡议。"],"keyPoints":"① 格式四块：标题（关于xx的倡议）+称呼+正文+落款（倡议者/日期）。\n② 正文四层：背景（为何提）→问题（调查发现的真问题）→倡议（3-5条具体行动）→号召。\n③ 三要领：问题真（来自调查）、倡议实（可操作）、语气恳切有号召力。","difficulties":"① 问题真实。原因：学生编问题，需强调「用前几课调查素材」。\n② 倡议具体。原因：写「保护文化」空话，需拆成行动项（立牌/办展/采访）。\n③ 语气分寸。原因：太强硬像命令，太软没号召力，需示范。","teachingMethods":"① 格式讲授法：倡议书结构图。\n② 范例分析法：拆解一篇好倡议书。\n③ 支架法：给「倡议条目句式」。\n④ 互评法：交换评「实不实」。","preparation":"【PPT课件】P1 倡议书格式图；P2 好倡议书拆解（背景/问题/倡议/号召）；P3 倡议条目句式库；P4 常见问题（假大空）纠错；P5 互评量表；P6 范例。\n【实物教具】教材范例打印。\n【音频】无。","process":[{"step":"Step 1 格式导入","time":"5分钟","content":"【PPT P1 格式】教师：「倡议书是公开请大家一起做某事的文。格式四块：标题（关于xx的倡议）、称呼（xx同胞/居民）、正文、落款。看范例。」 板书时机：黑板写倡议书四块格式。差异化提示：B班记格式；A班需说每块的功用。易错点提醒：标题要具体——「关于保护校门口老槐树的倡议」比「保护文化倡议」好。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 正文四层+范例","time":"12分钟","content":"【PPT P2 拆解】教师拆解范例：「背景——老街正在消失；问题——据调查60%青年不知老街史；倡议——①建文化墙②办老人口述展③设小小讲解员；号召——行动起来。」 教师：「好在哪？」 预设回答：「问题来自调查！倡议三条都具体能做的！」 板书时机：黑板写正文四层+范例要点。差异化提示：B班记四层；A班需分析「为何三条倡议都可行」。易错点提醒：倡议条数3-5条为宜，太多记不住，太少显单薄；每条一个动作。"},{"step":"Step 3 问题要真","time":"8分钟","content":"【PPT P4 纠错】教师展示假倡议：「问题：现在文化不被重视，大家都不关心。」 教师：「假在哪？」 预设回答：「没数据没调查，空话！」 教师：「改成真的？」 预设回答：「据我们采访，校旁老街仅2户老人能讲清历史——记忆正在消失。」 板书时机：黑板写「问题真=有调查支撑」。差异化提示：B班说假处；A班改真版。易错点提醒：用前几课调查素材（风物卡/口述卡）做问题依据，倡议才有根。"},{"step":"Step 4 倡议条目句式","time":"8分钟","content":"【PPT P3 句式】教师给句式库：「我们倡议：①每周/每人做X；②X与X合作办Y；③建立Z机制。」 学生据本组素材写3条。预设回答：「我们倡议：①认领一棵古树做记录；②办『老物件展』；③设学生讲解员岗。」 板书时机：黑板列学生倡议条目（避免重复）。差异化提示：B班写2条；A班写3-5条且互不相同。易错点提醒：每条是「一个动作」不是「一个愿望」——「办展」可行，「大家重视」不可行。"},{"step":"Step 5 语气+互评","time":"8分钟","content":"【PPT P5 量表】教师：「语气怎么拿？」 预设回答：「恳切，像请人一起做，不是命令。」 学生写初稿并交换评「实不实」。板书时机：黑板写「语气：恳切·有号召」。差异化提示：B班评格式对不对；A班评倡议实不实+语气。易错点提醒：互评重点看「倡议可不可做」——打分「能做到/做不到」。"},{"step":"Step 6 作业","time":"4分钟","content":"【PPT P6 环节说明】教师：「据互评改倡议书终稿，下节课可展示。」 板书时机：板书倡议书路径。差异化提示：B班改格式；A班改倡议具体度。易错点提醒：下节课单元活动展示，提醒把倡议书誊清可张贴。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 学写倡议书 ──┐\n│ 【格式四块】   │\n│ 标题(关于xx)   │\n│ 称呼          │\n│ 正文          │\n│ 落款          │\n│              │\n│ 【正文四层】   │\n│ 背景→问题→    │\n│ 倡议→号召      │\n│              │\n│ 问题真=有调查  │\n│ 倡议实=可操作  │\n│ 语气:恳切号召  │\n│              │\n│ 条目:1动作/条  │\n└──────────────┘","exercises":"【基础作业】1. 写1篇倡议书（格式全+正文四层），倡议基于本组调查素材。2. 列出3条具体倡议动作。\n【提高作业】为你写的一条倡议设计「落地步骤」（谁来做/何时做/怎么验证），证明它可行。\n【参考答案——教师用】基础1评价：格式对+四层全=合格；问题有调查支撑=良好。基础2评价：动作具体=良好。提高作业评价：落地步骤清晰=优秀。","reflection":"✅ 亮点：范例拆解让学生懂「问题真、倡议实」；句式库降低起步难度，B班也能写具体条。\n⚠️ 需改进：语气拿捏仍偏生硬，部分像通知；下次加一段「好号召语」仿写。\n📌 下节课衔接：下节课单元活动展示，倡议书可张贴，风物志/报告可宣读。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T09:30:00Z"},{"id":"l-cn-bs-u4-7","lessonId":"l-cn-bs-u4-7","title":"写作实践与讲评——倡议书修改与提升","book":"必修上册","unitNumber":4,"unitTitle":"家乡文化生活","taskGroup":"当代文化参与","lessonType":"xiezuo","lessonTypeName":"写作实践","periodNumber":7,"duration":45,"grade":"高一","subject":"语文","tags":["当代文化参与","讲评","倡议书","人教版必修上U4","第七课时"],"textbookAnalysis":"本课为倡议书写作讲评，选取三典型：①格式错（缺落款/称呼）；②问题假（无调查支撑）；③俱佳（问题真+倡议实+语气好）。通过对比讲评提升。同时优秀倡议书可进入单元活动展示。","overview":"【学情分析】A班：初稿结构好但倡议可操作性仍可提升；反思强。B班：部分仍缺格式块或问题空泛，需典型示范纠偏。共同问题：修改只改错别字不改进「实」；对好倡议标准未内化。","objectives":["语言能力：据讲评修改倡议书终稿，做到格式规范、问题真、倡议实、语气当。","文化意识：在公开讲评中体会「负责任地提议」的公民素养。","思维品质：通过三典型诊断，培养评价与自我修订能力。","学习能力：内化「好倡议四标准」（格式/真问题/实倡议/当语气）。"],"keyPoints":"① 三典型：格式错/问题假/俱佳。\n② 修改三方向：补格式/换真问题/拆实倡议。\n③ 好倡议四标准：格式·真问题·实倡议·当语气。","difficulties":"① 问题假的识别。原因：学生看不出自己编问题，需用例文自见。\n② 倡议拆解。原因：不知把愿望拆动作，需示范。\n③ 语气微调。原因：命令/软弱两极端，需好句仿写。","teachingMethods":"① 典型讲评法：匿名三典型全班诊。\n② 对比修改法：原稿vs改稿。\n③ 同伴互改法：交换终稿互签。\n④ 教师现场改稿。","preparation":"【PPT课件】P1 四标准；P2 典型A(格式错)+改；P3 典型B(问题假)+改；P4 典型C(俱佳)+赏；P5 现场改稿；P6 展示预告。\n【实物教具】学生倡议书（收选3篇典型）。\n【音频】无。","process":[{"step":"Step 1 回顾四标准","time":"3分钟","content":"【PPT P1 四标准】教师：「好倡议四标准？」 预设回答：「格式对！问题真！倡议实！语气当！」 板书时机：黑板写四标准配问号。差异化提示：B班背；A班解释每条。易错点提醒：「语气当」不是喊口号，是恳切有号召。"},{"step":"Step 2 讲评典型A——格式错","time":"8分钟","content":"【PPT P2 典型A】展示缺落款/称呼的稿。教师：「缺什么？」 预设回答：「没称呼、没落款，不像倡议书。」 教师改：补「亲爱的乡亲们」+「xx班文化小组 2026.x.x」。 板书时机：黑板左列「A：补格式」。差异化提示：B班说缺啥；A班补完整版。易错点提醒：落款日期写真实日期，倡议者写清（小组/个人）。"},{"step":"Step 3 讲评典型B——问题假","time":"8分钟","content":"【PPT P3 典型B】展示「问题：大家都不关心文化」。教师：「假在哪？」 预设回答：「没调查，空话！」 教师改：「据我们采访，校旁老街仅2位老人能讲清历史。」 板书时机：黑板中列「B：换真问题（用调查）」。差异化提示：B班说假处；A班改真版。易错点提醒：真问题=有数据/有出处，来自风物卡/口述卡。"},{"step":"Step 4 讲评典型C——俱佳","time":"6分钟","content":"【PPT P4 典型C】展示问题真+3条实倡议+语气恳切的稿。教师：「好在哪？」 预设回答：「问题有调查、倡议三条都能做、语气像请人一起干。」 板书时机：黑板右列「C：俱佳→赏」。差异化提示：B班说好；A班析其语气。易错点提醒：赏好稿是分析「好在哪」给同学借鉴。"},{"step":"Step 5 现场改稿","time":"8分钟","content":"【PPT P5 改稿】教师选稿B当场改问题句，边改边说：「原『大家不关心』→『据采访仅2位老人知老街史，记忆正消失』，这就有了根。」 板书时机：黑板展示前后对比红笔标。差异化提示：B班看结果；A班说每处理由。易错点提醒：改是改更好，同一稿可多方向。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 终稿互签","time":"12分钟","content":"【PPT P6 环节说明】教师：「据讲评改终稿，同桌互签一句评语。」 学生改+互签。板书时机：教师巡选优稿备展示。差异化提示：B班改1-2处+互签；A班改3处+自评。易错点提醒：互签写具体，如「倡议可再拆细一点」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 倡议书讲评 ──┐\n│ 【四标准】     │\n│ 格式·真问题·  │\n│ 实倡议·当语气 │\n│              │\n│ A:补格式      │\n│ 加称呼+落款   │\n│              │\n│ B:换真问题    │\n│ 用调查数据    │\n│ 有根          │\n│              │\n│ C:俱佳→赏    │\n│ 问题真·倡议实 │\n│ 语气恳切      │\n│              │\n│ 改三方向:     │\n│ 补格式/换真/  │\n│ 拆实          │\n└──────────────┘","exercises":"【基础作业】1. 提交倡议书终稿（改后），附互签评语。2. 写50字自评：我改了什么、为什么。\n【提高作业】把你的倡议书「落地步骤」补写完整（谁做/何时/怎么验证），形成可执行的行动方案。\n【参考答案——教师用】终稿评价：格式对+问题真+倡议实=合格；语气当+有号召=良好；方案可操作=优秀。自评评价：说清改了什么=合格。","reflection":"✅ 亮点：三典型精准，学生从别人稿见自己问题；现场改稿最有说服力。\n⚠️ 需改进：B（问题假）讲评时部分人仍无调查素材，因前期实践偷懒；下次强化实践环节督查。\n📌 下节课衔接：下节课单元活动，优秀倡议书张贴、风物志宣读。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T09:30:00Z"},{"id":"l-cn-bs-u4-8","lessonId":"l-cn-bs-u4-8","title":"单元活动——「家乡文化」分享会与成果展示","book":"必修上册","unitNumber":4,"unitTitle":"家乡文化生活","taskGroup":"当代文化参与","lessonType":"huodong","lessonTypeName":"单元活动","periodNumber":8,"duration":45,"grade":"高一","subject":"语文","tags":["当代文化参与","成果展示","分享会","人教版必修上U4","第八课时"],"textbookAnalysis":"本课为第四单元收官，举办「家乡文化」分享会，整合三活动成果：风物志宣读、调查报告分享、倡议书张贴。含三环节：①成果展（卡片墙+倡议书张贴）；②代表分享（每组3分钟）；③单元反思单（回顾「调查—撰写—倡议」路径，体会文化参与）。这是实践单元的总结与元认知课。","overview":"【学情分析】A班：成果质量高，分享有自信，但反思易空；可担任主持。B班：部分羞于上台，宜小组代表；对「参与」意义感受不深。共同问题：单元「学了什么」缺结构认知，需引导回顾三活动路径。","objectives":["语言能力：能清晰分享本组一项成果（风物志/报告/倡议），做到有条理、有重点。","文化意识：在分享中感受家乡文化的丰富与可参与性，强化文化主人翁意识。","思维品质：填单元反思单，梳理「调查—撰写—倡议」路径，培养元认知。","学习能力：整合三类实践成果为单元学习产出。"],"keyPoints":"① 成果展：风物卡/口述卡贴墙，倡议书张贴。\n② 代表分享：每组3分钟，讲清「我们做了什么、发现了什么、倡议什么」。\n③ 反思单：回顾路径——调查(方法)→撰写(成文)→倡议(行动)。","difficulties":"① 分享条理。原因：学生易念稿无重点，需给「三句话框架」。\n② 参与感深化。原因：部分觉得「写完了事」，需点明行动延续。\n③ 反思深度。原因：习惯空话，需具体提示。","teachingMethods":"① 成果展览法：卡片墙+张贴。\n② 分享工作坊：三句话框架。\n③ 反思单法：结构化元认知。\n④ 教师总结法：点明文化参与意义。","preparation":"【PPT课件】P1 分享会流程；P2 三句话框架（做了/发现/倡议）；P3 成果展布置说明；P4 单元路径图；P5 反思单模板。\n【实物教具】学生成果（风物卡/口述卡/倡议书）；A3「家乡文化墙」；便签。\n【音频】无。","process":[{"step":"Step 1 布置成果展","time":"5分钟","content":"【PPT P3 布置】教师：「把风物卡、口述卡贴到文化墙，倡议书张贴在旁。这是我们的『家乡文化展』。」 学生贴成果。板书时机：黑板写「成果展：卡墙+倡议张贴」。差异化提示：B班贴本组成果；A班布展并写导览词。易错点提醒：张贴前核对隐私——口述卡用化名，不暴露受访者真实信息。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 代表分享（上）","time":"15分钟","content":"【PPT P1 流程】【PPT P2 框架】教师：「每组代表3分钟，用三句话：我们做了什么/发现了什么/倡议什么。限时。」 学生轮讲。板书时机：旁记每组核心发现。差异化提示：B班小组代表讲；A班独讲+用PPT辅助。易错点提醒：分享讲「发现」不是念全文——挑最打动人的一点深讲。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 参观互评","time":"8分钟","content":"【PPT P3 环节说明】教师：「自由参观文化墙，给别组写一张便签反馈（一个亮点+一个问题）。」 学生参观写便签。板书时机：收便签备总结。差异化提示：B班写1张；A班写2张且问题具体。易错点提醒：反馈要善意具体——「老槐树描写好」比「写得不错」有用。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 反思单","time":"10分钟","content":"【PPT P5 模板】教师：「填反思单三行：①我学会了（方法/知识）；②我需提升；③我的疑问。」 预设回答：「①学会做访谈和写倡议。②提升调查报告建议的具体度。③怎么让倡议真的被执行？」 板书时机：巡选2-3份分享。差异化提示：B班填前两行；A班全填+疑问有思。易错点提醒：反思写具体「一个方法」非「学到很多」。"},{"step":"Step 5 总结","time":"7分钟","content":"【PPT P4 路径】教师总结：「这单元我们走了『调查→撰写→倡议』的路——从看家乡，到写家乡，到为家乡做点事。文化不是博物馆里的，是活在你们行动里的。」 板书时机：板书「看→写→做：文化在行动」。差异化提示：B班听总结；A班写一句「我能为家乡做的下一件事」。易错点提醒：单元结束不是行动结束——倡议可真的张贴给社区，鼓励延续。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 家乡文化分享会 ──┐\n│ 成果展:卡墙+倡议   │\n│                │\n│ 【三句话框架】   │\n│ 做了/发现了/     │\n│ 倡议了          │\n│                │\n│ 【单元路径】     │\n│ 调查(方法)→     │\n│ 撰写(成文)→     │\n│ 倡议(行动)       │\n│                │\n│ 【反思三问】     │\n│ ①我学会了__    │\n│ ②我需提升__    │\n│ ③我的疑问__    │\n│                │\n│ 看→写→做       │\n│ 文化在行动      │\n└────────────────┘","exercises":"【基础作业】1. 提交单元反思单（三行完整）。2. 把本组最满意的成果（风物志/报告/倡议其一）誊清归档。\n【提高作业】写150字「单元总结」，要求：①点明本单元最重要的一个能力；②举一次实践说明；③说一个想继续做的家乡文化行动。\n【参考答案——教师用】反思单评价：三行具体=合格；有方法意识=良好；疑问有思=优秀。单元总结评价：点明能力+举例=合格；有延续行动设想=良好；个性化反思=优秀。","reflection":"✅ 亮点：文化墙+便签反馈让成果「被看见」，学生有真实成就感；三句话框架让分享不跑题。\n⚠️ 需改进：15分钟只轮8组，全班未完；下次分两批或限2分钟。\n📌 下单元衔接：第五单元「乡土中国」转整本书阅读，从「做调查」到「读学术著作」，方法不同需提示。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T09:30:00Z"},{"id":"l-cn-bs-u6-1","lessonId":"l-cn-bs-u6-1","title":"劝学 精读——学习的意义、方法与积累","book":"必修上册","unitNumber":6,"unitTitle":"学习之道","taskGroup":"思辨性阅读与表达","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":1,"duration":45,"grade":"高一","subject":"语文","tags":["思辨阅读","荀子","劝学","比喻论证","人教版必修上U6","第一课时"],"textbookAnalysis":"《劝学》是荀子代表作，开篇「君子曰：学不可以已」立中心论点，通篇用比喻论证（青出于蓝、冰寒于水、积土成山、积水成渊、驽马十驾、锲而不舍等）从「学习的意义（知明行无过）—学习的作用（善假于物）—学习的方法态度（积累/坚持/专一）」三层展开。是学习文言议论文比喻论证的范本。","overview":"【学情分析】A班：初中背过《论语》学而篇，对「学习」有概念，能跟比喻论证；可深入「比喻如何服务论点」。B班：文言词句障碍多（参省、跂、假舆马），易卡字义；对「比喻论证」概念模糊。共同问题：把比喻当修辞欣赏，不懂它「论证」的功能；背诵难。","objectives":["语言能力：朗读背诵全文，解释「劝、已、假、跂、锲」等关键词，说出文中比喻的论证指向。","文化意识：理解荀子「学不可以已」的终身学习观与「积善成德」的修养论。","思维品质：通过分析比喻如何支撑论点，培养「论证意识」而非仅修辞欣赏。","学习能力：掌握「抓中心句→理比喻层→明论证逻辑」的文言议论文读法。"],"keyPoints":"① 中心论点：学不可以已（贯穿全篇）。\n② 三层比喻：意义（青/冰/木直→知明行无过）、作用（假舆马/舟→善假于物）、方法（积/恒/一）。\n③ 论证特点：全篇比喻，由浅入深，不空发议论。","difficulties":"① 比喻的论证功能。原因：学生赏修辞不论证，需点明「每个比喻在证明哪一点」。\n② 文言实词。原因：词多义僻，需随文释义+语境。\n③ 三层结构。原因：学生看不出「意义/作用/方法」递进，需框示。","teachingMethods":"① 诵读法：范读→齐读→背。\n② 比喻解码法：每喻标「证明什么」。\n③ 结构图示法：三层框架。\n④ 语境释义法：随文解词。","preparation":"【PPT课件】P1 荀子简介+中心论点；P2 全文分句（标三层）；P3 比喻解码表（喻体→论证点）；P4 关键词释义（劝/已/假/跂/锲）；P5 三层结构图；P6 朗读指导；P7 练习。\n【实物教具】无。\n【音频】全文朗诵（1分30秒）。","process":[{"step":"Step 1 导入——为何劝学","time":"5分钟","content":"【PPT P1 中心】教师：「荀子为什么写《劝学》？第一句就说——」 预设回答：「学不可以已！学习不能停！」 教师：「一个『已』字（停止）定调：终身学习。」 板书时机：黑板中央写「学不可以已」。差异化提示：B班说句意；A班需说「已」字分量。易错点提醒：「劝」是「勉励」非「劝说」，标题是「勉励学习」；「已」是停止，不是已经。"},{"step":"Step 2 诵读+关键词","time":"10分钟","content":"【PPT P4 释义】教师范读，逐段解词：「劝=勉；已=停；假=借（善假于物=善用外物）；跂=踮脚；锲=刻。」 板书时机：黑板右列关键词。差异化提示：B班记关键词；A班需造句用「假/锲」。易错点提醒：「假」古义「借」今义「虚假」，语境决定；「金就砺则利」的金是「金属刀剑」非黄金。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 比喻解码（意义层）","time":"10分钟","content":"【PPT P3 解码表】教师：「开头几个比喻证明啥？青出于蓝、冰寒于水、木直中绳——」 预设回答：「说明学习能改变人，让人『知明而行无过』！」 板书时机：黑板列「意义层：青/冰/木→改变提升」。差异化提示：B班说比喻义；A班需说「为何用自然喻人」。易错点提醒：比喻是「论证」——证明「学习有意义（提升自我）」，不是装饰。"},{"step":"Step 4 比喻解码（作用+方法层）","time":"12分钟","content":"【PPT P3 表】教师：「中段『假舆马者致千里』证明什么？后段『积土成山』『驽马十驾』『锲而不舍』证明什么？」 预设回答：「中段=学习的作用（借外力）；后段=方法态度（积累/坚持/专心）。」 板书时机：黑板列「作用层：善假于物｜方法层：积/恒/一」。差异化提示：B班说两层；A班需析三态度关系（积是基础、恒是持续、一是专注）。易错点提醒：「积善成德」是落脚点——方法最终通向「德」，荀子重修养。"},{"step":"Step 5 结构+论证特点","time":"5分钟","content":"【PPT P5 结构】教师：「全篇没空讲道理，全用比喻，由『为何学』到『怎么学』，三层递进。这就是比喻论证。」 板书时机：黑板画三层结构（意义→作用→方法）。差异化提示：B班记三层；A班需说「比喻论证比直说好在哪」。易错点提醒：比喻论证优势=形象好懂，但需「喻体与点吻合」，否则成乱比。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"3分钟","content":"【PPT P7 练习】教师：「《劝学》读法？」 预设回答：「抓中心句→解比喻→明三层！」 板书时机：板书读法。差异化提示：B班背全文；A班写100字「我最共鸣的一喻」。易错点提醒：下节课读《师说》，从「治学内容」到「从师之道」，可比论证方式。"}],"blackboard":"┌── 劝学 荀子 ──┐\n│ 学不可以已     │\n│ (终身·停止)    │\n│              │\n│ 【三层比喻】   │\n│ 意义:青/冰/木 │\n│  →提升自我    │\n│ 作用:假舆马   │\n│  →善假于物    │\n│ 方法:积/恒/一 │\n│  →积善成德    │\n│              │\n│ 关键词:        │\n│ 劝=勉 已=停   │\n│ 假=借 跂=踮   │\n│ 锲=刻         │\n│              │\n│ 比喻论证       │\n│ (形象·吻合)   │\n└──────────────┘","exercises":"【基础作业】1. 背诵全文。2. 解释：①劝 ②已 ③假舆马 ④锲而不舍。\n【提高作业】写180字，选文中一个比喻说明它「论证」了学习的哪一点，要求：①引原句；②说喻体与点；③联自身学习。\n【参考答案——教师用】基础2：①劝=勉励；②已=停止；③假舆马=借助车马（善假于物）；④锲而不舍=坚持刻不停。提高作业评价：引原句+喻体点吻合=合格；联自身=良好；能析比喻论证功能=优秀。","reflection":"✅ 亮点：比喻解码表让学生从「赏修辞」转到「看论证」，B班也能说每个喻证明啥；关键词随文释义破文言障碍。\n⚠️ 需改进：背诵对B班偏难，部分人卡「跂/锲」音形；下次给注音卡+分段背。\n📌 下节课衔接：下节课《师说》同样比喻/对比论证，可比较两文论证风格。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T10:30:00Z"},{"id":"l-cn-bs-u6-2","lessonId":"l-cn-bs-u6-2","title":"师说 精读——从师之道与破立结合","book":"必修上册","unitNumber":6,"unitTitle":"学习之道","taskGroup":"思辨性阅读与表达","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":2,"duration":45,"grade":"高一","subject":"语文","tags":["思辨阅读","韩愈","师说","对比论证","人教版必修上U6","第二课时"],"textbookAnalysis":"《师说》是韩愈抨击当时「耻学于师」风气的论说文。中心「古之学者必有师」，从「师者所以传道受业解惑」定义出发，用「古圣—今众」「其子—其身」「巫医乐师—士大夫」三组对比，批判耻师之风，提出「道之所存，师之所存」「弟子不必不如师」的进步师生观。论证上「立（正面定义）—破（批判时弊）—立（正确师生观）」结构清晰。","overview":"【学情分析】A班：能跟对比论证，可深入「破立结构」；对「道之所存师之所存」有共鸣。B班：文言词（圣人、众人、不齿）懂但论证结构不清；「说」的文体不熟。共同问题：把对比当修辞，不懂它「破」的作用；对「耻学于师」的历史背景无感。","objectives":["语言能力：朗读背诵，解释「说、惑、不齿、不拘于时」等词，说出三组对比的论证指向。","文化意识：理解韩愈倡导的从师之道与「能者为师」的进步师生观。","思维品质：通过分析「立—破—立」结构，培养论证结构意识。","学习能力：掌握「抓定义→析对比→明破立」的论说文读法。"],"keyPoints":"① 正面立论：师者传道受业解惑；道之所存师之所存。\n② 三组对比（破）：古圣从师vs今众耻师；爱其子vs于其身；巫医乐师vs士大夫。\n③ 再立：弟子不必不如师，术业有专攻（进步师生观）。","difficulties":"① 对比的「破」功能。原因：学生赏对比不论证，需点明「用反差显谬」。\n② 破立结构。原因：学生看不出「立—破—立」，需框示。\n③ 历史语境。原因：不知唐「耻学于师」风气，需补背景。","teachingMethods":"① 诵读法：范读→齐读→背。\n② 对比解码法：三组对比标「破什么」。\n③ 结构图示法：立—破—立框。\n④ 背景支架法：补唐代学风。","preparation":"【PPT课件】P1 韩愈与「说」体+中心；P2 三组对比表（古圣/今众等）；P3 正面定义+进步师生观；P4 立破立结构图；P5 关键词（惑/不齿/不拘于时）；P6 朗读；P7 练习。\n【实物教具】无。\n【音频】朗诵1分钟。","process":[{"step":"Step 1 导入——说体+中心","time":"5分钟","content":"【PPT P1】教师：「『说』是论说文，《师说》＝论从师。第一句？」 预设回答：「古之学者必有师！」 教师：「韩愈时代人以从师为耻，他偏写这篇『说』反驳。」 板书时机：黑板写「古之学者必有师」+「耻学于师(背景)」。差异化提示：B班说中心；A班需知唐代风气。易错点提醒：「学者」古指「求学的人」非今「专家」；「说」是文体非「说话」。"},{"step":"Step 2 正面立论","time":"10分钟","content":"【PPT P3 定义】教师：「韩愈先正面立：师者干嘛？传道受业解惑。那谁可为师？道之所存，师之所存——有道者即师。」 板书时机：黑板写「立：师=传道受业解惑；道存即师」。差异化提示：B班记定义；A班需说「道之所存师之所存」的进步性（打破门第）。易错点提醒：「受业」的「受」通「授」（传授），不是接受；注意通假。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 三组对比（破）","time":"12分钟","content":"【PPT P2 对比表】教师：「韩愈用三组反差破『耻师』：①古圣（从师）vs今众（耻师）；②爱其子（择师）vs于其身（耻师）；③巫医乐师（相师）vs士大夫（群聚笑之）。」 板书时机：黑板列三组对比，标「破：耻师之谬」。差异化提示：B班说三组；A班需析「每组破什么」（荒谬/矛盾/虚伪）。易错点提醒：对比是「破」的武器——用反差让人看见耻师的不合理，非仅为文采。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 再立——进步师生观","time":"8分钟","content":"【PPT P3 再立】教师：「破完立什么？弟子不必不如师，师不必贤于弟子，术业有专攻。」 预设回答：「能者为师！谁懂谁就是老师！」 板书时机：黑板写「再立：能者为师·术业专攻」。差异化提示：B班记句；A班需说「这对今天师生关系的启示」。易错点提醒：「不必不如」是「不一定」，留余地，非绝对；体现韩愈辩证。"},{"step":"Step 5 破立结构","time":"6分钟","content":"【PPT P4 结构】教师：「全文结构：先立定义→用对比破时弊→再立正确观。立—破—立。」 板书时机：黑板画立破立框。差异化提示：B班记结构；A班需说「为何先立后破」。易错点提醒：先立「什么是师」才有标准去破「耻师之非」，逻辑顺序不能乱。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"4分钟","content":"【PPT P7 练习】教师：「《师说》读法？」 预设回答：「抓定义→析对比→明破立！」 板书时机：板书读法。差异化提示：B班背；A班写100字「我的师生观」。易错点提醒：下节课群文比《劝学》《师说》的治学观与论证。"}],"blackboard":"┌── 师说 韩愈 ──┐\n│ 古之学者必有师  │\n│ (耻学于师背景)  │\n│              │\n│ 【立】         │\n│ 师=传道受业解  │\n│ 道存即师      │\n│              │\n│ 【破:三组对比】 │\n│ 古圣↔今众      │\n│ 爱子↔其身      │\n│ 巫医↔士大夫    │\n│ →耻师之谬      │\n│              │\n│ 【再立】        │\n│ 能者为师       │\n│ 术业有专攻     │\n│              │\n│ 结构:立-破-立  │\n└──────────────┘","exercises":"【基础作业】1. 背诵全文。2. 解释：①说 ②受业 ③不齿 ④不拘于时。\n【提高作业】写180字比较《劝学》《师说》论证方式异同，要求：①各引一句；②点明比喻vs对比；③说结构差异。\n【参考答案——教师用】基础2：①说=论说文体的一种；②受业=传授学业（受通授）；③不齿=不屑与之同列；④不拘于时=不被时俗束缚。提高作业评价：引句+论证方式明=合格；结构差异点出=良好；能析功能差异=优秀。","reflection":"✅ 亮点：三组对比解码让学生懂「对比即破」，立破立框架清晰；「道之所存师之所存」引发师生观讨论。\n⚠️ 需改进：唐代背景补得短，部分B班生不懂「耻师」何来；下次加一则唐传奇式轶事。\n📌 下节课衔接：下节课群文比《劝学》《师说》，从单篇到比较，提炼治学观。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T10:30:00Z"},{"id":"l-cn-bs-u6-3","lessonId":"l-cn-bs-u6-3","title":"群文阅读——劝学·师说 治学观比较","book":"必修上册","unitNumber":6,"unitTitle":"学习之道","taskGroup":"思辨性阅读与表达","lessonType":"qunwen","lessonTypeName":"群文阅读","periodNumber":3,"duration":45,"grade":"高一","subject":"语文","tags":["思辨阅读","群文","荀子","韩愈","治学观","人教版必修上U6","第三课时"],"textbookAnalysis":"本课群文比较《劝学》与《师说》——两篇同论「学习」，但角度互补：荀子论「学习本身」（意义/方法/态度），韩愈论「从师」（向谁学）。论证上《劝学》纯比喻、《师说》重对比，风格各异。通过双栏比较，提炼古人的「治学观」整体图景，为单元写作（议论段）蓄势。","overview":"【学情分析】A班：两篇已读，能驾驭比较，可深入「治学观整合」；论证风格辨析有见地。B班：单篇懂但比较框架缺，需双栏表才敢说。共同问题：比较易罗列不同缺归纳——发现「都重学」的共性后不会提炼「治学观」内核。","objectives":["语言能力：用双栏表比较两文「论题/论证/核心观点」，说出各自侧重。","文化意识：整合两文形成对古人治学观的整体认识（终身学·善假物·从师问道）。","思维品质：通过比较培养「同中求异、异中求同」的辩证思维。","学习能力：掌握群文双栏比较法，能迁移到其他论说文对读。"],"keyPoints":"① 论题差：劝学=学习本身（积恒一）；师说=从师（向谁学）。\n② 论证异：劝学=比喻；师说=对比（立破立）。\n③ 共性：皆重「学不可以已」「学以成德」，构成古人治学观。","difficulties":"① 论题区分。原因：学生以为两文同题，需点明「学什么vs向谁学」。\n② 论证对比。原因：比喻vs对比功能不同，需说明。\n③ 共性提炼。原因：易停差异，需引导归纳「都劝学」。","teachingMethods":"① 双栏比较法：四维度表。\n② 论证解码法：比喻vs对比功能。\n③ 归纳法：从差异到共性。\n④ 迁移法：提示可迁其他论说文。","preparation":"【PPT课件】P1 两文封面；P2 双栏比较表（论题/论证/结构/核心）；P3 比喻vs对比功能；P4 共性提炼（治学观）；P5 迁移提示；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——同与异","time":"5分钟","content":"【PPT P1】教师：「两篇都论『学』，但韩愈若读《劝学》会点头还是摇头？」 预设回答：「点头——都劝学；但角度不同，一个说怎么学，一个说跟谁学。」 板书时机：黑板写「同：劝学；异：学本身vs从师」。差异化提示：B班说同异；A班需预判角度。易错点提醒：别把两文当「同一题」——论题有交叉更有分工。"},{"step":"Step 2 双栏比较","time":"12分钟","content":"【PPT P2 表】教师：「填双栏：论题/论证/结构/核心。劝学——论学习本身，比喻，三层；师说——论从师，对比，立破立。」 学生填。板书时机：黑板画双栏表填内容。差异化提示：B班填论题+论证；A班全填+补核心。易错点提醒：比较要「同维度」——都在「论题/论证/核心」下比，不能东拉西扯。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 论证解码","time":"8分钟","content":"【PPT P3 功能】教师：「劝学全用比喻，师说重对比——哪种更适合『劝』？」 预设回答：「比喻好懂（劝学用）；对比犀利（破弊用）。」 板书时机：黑板写「比喻=形象劝／对比=犀利破」。差异化提示：B班说区别；A班需说「为何劝学用喻、破弊用比」。易错点提醒：论证方式服务目的——劝人用喻柔和，批谬用比有力。"},{"step":"Step 4 共性提炼","time":"10分钟","content":"【PPT P4 共性】教师：「差异之后，共性是什么？」 预设回答：「都相信学能改变人、学不可停；劝学积善成德，师说道存即师——都重『学以成德』。」 板书时机：黑板写共性「终身学·善假物·从师问道·学以成德」。差异化提示：B班说1点共性；A班需整合为「古人治学观」。易错点提醒：归纳是群文目的——差异是手段，共性是收获，别停在罗列。"},{"step":"Step 5 迁移+小结","time":"6分钟","content":"【PPT P5 迁移】教师：「这比较法可用到《反对党八股》《拿来主义》——都是论说文对读。」 板书时机：板书「比较法可迁移」。差异化提示：B班听；A班需说下两篇可比什么。易错点提醒：下节课读《反对党八股》，它是「破立结合」的批判文风，可与《师说》破弊呼应。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 作业","time":"4分钟","content":"【PPT P6 练习】教师：「据双栏写一段比较短文，下节课用。」 板书时机：板书群文读法。差异化提示：B班背两文核心；A班写比较段。易错点提醒：写作用原句支撑，不贴标签。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 劝学·师说 群文 ──┐\n│ 同:都劝学         │\n│ 异:学本身↔从师    │\n│                │\n│ 【双栏】          │\n│ 论题:学习↔从师    │\n│ 论证:比喻↔对比    │\n│ 结构:三层↔立破立  │\n│ 核心:积恒一↔道存师│\n│                │\n│ 比喻=形象劝       │\n│ 对比=犀利破       │\n│                │\n│ 【共性·治学观】   │\n│ 终身学·善假物·   │\n│ 从师问道·学以成德│\n└────────────────┘","exercises":"【基础作业】1. 完成双栏比较表（论题/论证/结构/核心）。2. 用一句话说两文共性。\n【提高作业】写200字比较短文，要求：①同维度比较；②各引一句；③提炼治学观共性。\n【参考答案——教师用】基础1评价：双栏全+维度对=合格。提高作业评价：同维度+引句+共性=良好；能析论证功能差异=优秀。","reflection":"✅ 亮点：双栏表让比较有抓手，B班也能填；「论证服务目的」点破比喻vs对比的功能差异。\n⚠️ 需改进：共性提炼B班弱，部分只说「都劝学」；下次给共性句式支架。\n📌 下节课衔接：下节课《反对党八股》是破立批判文风，可与《师说》破弊呼应读。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T10:30:00Z"},{"id":"l-cn-bs-u6-4","lessonId":"l-cn-bs-u6-4","title":"反对党八股 精读——破立结合的批判文风","book":"必修上册","unitNumber":6,"unitTitle":"学习之道","taskGroup":"思辨性阅读与表达","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":4,"duration":45,"grade":"高一","subject":"语文","tags":["思辨阅读","毛泽东","反对党八股","破立结合","人教版必修上U6","第四课时"],"textbookAnalysis":"《反对党八股》（节选）是毛泽东1942年整风演讲，批判党内八股文风（空话连篇、言之无物、无的放矢、语言无味等八条罪状）。写法上「先破后立」：破八股之弊，立「马克思主义文风」（内容充实、有的放矢、语言鲜活）。是学习「破立结合」议论文写法的范例，与《师说》破弊一脉相承。","overview":"【学情分析】A班：能跟「破立结合」，可深入八条罪状的归类（内容/态度/语言）；对文风有现实联想。B班：文白夹杂读着累，八条记不住；对「党八股」历史语境陌生。共同问题：把八条当清单背，不懂「破是为了立」；对「文风即作风」无感。","objectives":["语言能力：概括八股八条罪状，解释「有的放矢」「甲乙丙丁」等词语，说出「破立结合」结构。","文化意识：理解「文风反映作风」，体会马克思主义文风对今天写作的启示。","思维品质：通过分析「先破后立」，培养论证结构意识。","学习能力：掌握「抓罪状→析危害→明正面主张」的批判文读法。"],"keyPoints":"① 八条罪状（破）：空话连篇、言之无物、无的放矢、语言无味、甲乙丙丁、不负责任等。\n② 正面主张（立）：内容充实、有的放矢、语言鲜活、为群众喜闻乐见。\n③ 结构：先破八股之弊，后立正确文风（破立结合）。","difficulties":"① 八条归类。原因：学生逐条记易乱，需归为「内容/态度/语言」三类。\n② 破立关系。原因：易重破轻立，需点明「立是目的」。\n③ 现实关联。原因：以为「八股」是历史，需联今天套话。","teachingMethods":"① 归类法：八条归三类。\n② 破立图示法：先破后立框。\n③ 联今法：找今天「新八股」。\n④ 诵读法：读典型段。","preparation":"【PPT课件】P1 背景（1942整风）+中心；P2 八条罪状归类（内容/态度/语言）；P3 正面主张（立）；P4 破立结构图；P5 词语（有的放矢/甲乙丙丁）；P6 联今（新八股）；P7 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——什么是党八股","time":"5分钟","content":"【PPT P1 背景】教师：「『党八股』指党内那种空话连篇、装腔作势的文风。毛泽东列了八条罪状狠批。」 预设回答：「就是写文章说空话、不解决实际问题！」 板书时机：黑板写「党八股=空话文风」。差异化提示：B班说现象；A班需知整风背景。易错点提醒：「八股」本是明清科举死板文体，这里借指「格式化空话」，是比喻性用法。"},{"step":"Step 2 八条归类（破）","time":"12分钟","content":"【PPT P2 归类】教师：「八条可归三类：内容（空话连篇、言之无物、无的放矢）、态度（不负责任、甲乙丙丁罗列）、语言（语言无味、像瘪三、面目可憎）。」 板书时机：黑板列三类八条。差异化提示：B班记三类；A班需举一两条原文。易错点提醒：归类帮记忆——不是死背八条，是看「它坏在哪方面」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 正面主张（立）","time":"10分钟","content":"【PPT P3 立】教师：「破了立什么？马克思主义文风：内容充实（有物）、有的放矢（有靶）、语言鲜活（为人喜见）。」 板书时机：黑板写「立：充实·有的放矢·鲜活」。差异化提示：B班记三主张；A班需说「破立如何对应」（空话↔充实等）。易错点提醒：「有的放矢」的「的」是箭靶——说话要有目标，不脱靶；这是核心主张。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 破立结构","time":"8分钟","content":"【PPT P4 结构】教师：「全文先破八股八条，后立正确文风——先破后立，破是手段立是目的。」 板书时机：黑板画破→立框。差异化提示：B班记结构；A班需说「为何先破」。易错点提醒：批判文「破」要为「立」开路——只破不立是泄愤，破后必有建设性主张。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 联今","time":"6分钟","content":"【PPT P6 新八股】教师：「今天还有『新八股』吗？」 预设回答：「套话总结、PPT堆砌、官样文章。」 板书时机：黑板写「今：新八股」。差异化提示：B班说1例；A班需联自己写作（套话）。易错点提醒：读经典为照今天——自检作文有无「空话连篇」。"},{"step":"Step 6 小结+作业","time":"4分钟","content":"【PPT P7 练习】教师：「《反对党八股》读法？」 预设回答：「抓罪状→析危害→明主张！」 板书时机：板书读法。差异化提示：B班记八条类；A班写100字「我作文的新八股自查」。易错点提醒：下节课读《拿来主义》，它也是先破（闭关/送去）后立（拿来），破立一脉。"}],"blackboard":"┌── 反对党八股 ──┐\n│ 党八股=空话文风  │\n│              │\n│ 【破:八条三类】 │\n│ 内容:空话/无物/ │\n│  无的放矢       │\n│ 态度:不负/甲乙  │\n│ 语言:无味/瘪三  │\n│              │\n│ 【立:文风】     │\n│ 充实·有的放矢· │\n│ 鲜活(人喜见)    │\n│              │\n│ 结构:先破后立   │\n│ 破手段·立目的   │\n│              │\n│ 今:新八股       │\n└──────────────┘","exercises":"【基础作业】1. 将八条罪状归为三类（内容/态度/语言）各举1-2条。2. 解释：①有的放矢 ②甲乙丙丁（文中义）。\n【提高作业】写180字「我作文里的『新八股』自查」，要求：①借八条之一自查；②说危害；③提改进。\n【参考答案——教师用】基础1评价：三类归对=合格。基础2：①有的放矢=说话写文要有目标（的=靶）；②甲乙丙丁=文中指罗列现象无分析。提高作业评价：借条自查+危害+改进=良好；能联写作实际=优秀。","reflection":"✅ 亮点：八条归三类破解「记不住」，B班也能说；联今「新八股」让经典照进自己作文。\n⚠️ 需改进：历史语境补得短，部分B班生不知整风；下次加1分钟背景短片。\n📌 下节课衔接：下节课《拿来主义》同是先破后立，可对比「破什么、立什么」。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T10:30:00Z"},{"id":"l-cn-bs-u6-5","lessonId":"l-cn-bs-u6-5","title":"拿来主义 精读——比喻论证与「拿来」智慧","book":"必修上册","unitNumber":6,"unitTitle":"学习之道","taskGroup":"思辨性阅读与表达","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":5,"duration":45,"grade":"高一","subject":"语文","tags":["思辨阅读","鲁迅","拿来主义","比喻论证","人教版必修上U6","第五课时"],"textbookAnalysis":"《拿来主义》是鲁迅1934年杂文。先破「闭关主义」「送去主义」之谬，再立「拿来主义」：对外来文化要「运用脑髓，放出眼光，自己来拿」——占有、挑选（鱼翅/鸦片/烟枪烟灯/姨太太的喻体对应不同态度：吸收/批判利用/留样毁弃/剔除）。比喻论证精妙，是学习「破立+比喻」的典范，与《劝学》《反对党八股》构成论证方式谱系。","overview":"【学情分析】A班：能跟破立+比喻，可深入「喻体对应态度」的符号解读；对文化态度有现实思考。B班：杂文语言犀利但跳跃，喻体（鱼翅鸦片）易只当字面；破立结构需框示。共同问题：把「拿来」当「全收」，不懂「挑选」的批判态度；喻体对应不清。","objectives":["语言能力：概括「闭关/送去/拿来」三层，说清鱼翅/鸦片/烟枪/姨太太四喻体对应的取舍态度。","文化意识：理解「拿来主义」对今天吸收外来文化的启示——占有且批判挑选。","思维品质：通过分析喻体→态度的对应，培养符号解读与辩证取舍思维。","学习能力：掌握「先破后立+比喻论证」的杂文读法。"],"keyPoints":"① 破：闭关主义（锁国）、送去主义（媚外）皆谬。\n② 立：拿来主义——运用脑髓放出眼光自己来拿，占有后挑选。\n③ 四喻体：鱼翅（吸收精华）/鸦片（批判利用）/烟枪烟灯（留样研究）/姨太太（坚决剔除）。","difficulties":"① 喻体对应。原因：学生只知比喻不知「各喻对应什么态度」，需解码表。\n② 挑选的批判态度。原因：易误读「拿来=全收」，需点明「挑」是关键。\n③ 杂文语言。原因：犀利反语（如「丰富\"\"大度\"\"），需提示。","teachingMethods":"① 破立图示法：三层（闭关/送去/拿来）。\n② 喻体解码表：四喻→态度。\n③ 联今法：今天如何「拿来」。\n④ 诵读法：读关键段。","preparation":"【PPT课件】P1 背景（1934文化境遇）+三层；P2 喻体解码表（鱼翅/鸦片/烟枪/姨太太→态度）；P3 拿来主义定义（脑髓/眼光/自己拿）；P4 破立结构；P5 联今（文化自信下的拿来）；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——闭关与送去","time":"5分钟","content":"【PPT P1 三层】教师：「鲁迅先破两种态度：闭关锁国（什么都不要）、送去主义（什么都送出去媚外）。都错。」 预设回答：「两个极端都不行！」 板书时机：黑板写「破：闭关(锁)／送去(媚)」。差异化提示：B班说两层；A班需说「为何都错」。易错点提醒：鲁迅用反语讽刺「送去」——文中「丰富\"\"大度\"\"是反话，别当真夸。"},{"step":"Step 2 立——拿来主义","time":"10分钟","content":"【PPT P3 定义】教师：「那怎么办？拿来主义：运用脑髓，放出眼光，自己来拿——先占有，再挑选。」 板书时机：黑板写「立：拿来=占有+挑选(脑髓/眼光)」。差异化提示：B班记定义；A班需说「脑髓/眼光」何意（独立思考/判断力）。易错点提醒：「自己来拿」强调主动——不是被动接收，是主体有判断地拿。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 喻体解码","time":"12分钟","content":"【PPT P2 表】教师：「鲁迅用四喻说怎么挑：鱼翅（吃，吸收精华）、鸦片（送药房，批判利用）、烟枪烟灯（留少许研究，余毁）、姨太太（走，坚决剔除）。」 板书时机：黑板列四喻→态度。差异化提示：B班说四喻态度；A班需析「为何鸦片不全毁（药用）」。易错点提醒：比喻精妙在「对应」——每个喻体对应一种文化成分的处理方式，不是随便比。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 破立结构","time":"6分钟","content":"【PPT P4 结构】教师：「先破闭关/送去，再立拿来——先破后立，和《反对党八股》同构。」 板书时机：黑板画破→立框，旁标「同党八股」。差异化提示：B班记结构；A班需联前课。易错点提醒：三篇（师说/党八股/拿来）都用破立，可见这是论说文常用结构。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 联今","time":"8分钟","content":"【PPT P5 联今】教师：「今天面对外来文化/网络信息，怎么『拿来』？」 预设回答：「吸收好的（鱼翅），分辨有害的（鸦片药用不滥用），剔除糟粕（姨太太）。」 板书时机：黑板写「今：占有+批判挑选」。差异化提示：B班说1例；A班需说「信息茧房」也算闭关新形态。易错点提醒：拿来主义 today＝文化自信下主动鉴别，既不一拒了之也不照单全收。"},{"step":"Step 6 小结+作业","time":"4分钟","content":"【PPT P6 练习】教师：「《拿来主义》读法？」 预设回答：「破闭关送去→立拿来→解四喻！」 板书时机：板书读法。差异化提示：B班记四喻；A班写100字「我对拿来主义的理解」。易错点提醒：下节课写作——学写议论段，把今天的比喻论证用上。"}],"blackboard":"┌── 拿来主义 鲁迅 ──┐\n│ 破:闭关(锁)    │\n│   送去(媚)     │\n│              │\n│ 立:拿来=占有   │\n│  +挑选         │\n│ 脑髓·眼光·    │\n│ 自己拿         │\n│              │\n│ 【四喻→态度】  │\n│ 鱼翅:吸收精华  │\n│ 鸦片:批判利用  │\n│ 烟枪:留样研究  │\n│ 姨太:坚决剔除  │\n│              │\n│ 破立+比喻      │\n│ 同党八股结构   │\n└────────────────┘","exercises":"【基础作业】1. 写出「闭关/送去/拿来」三者含义。2. 填表：鱼翅/鸦片/烟枪烟灯/姨太太各自对应什么取舍态度。\n【提高作业】写180字「今天的拿来主义」，要求：①引文中一句；②用四喻之一说明；③联信息/外来文化。\n【参考答案——教师用】基础2：鱼翅=吸收精华；鸦片=批判利用（药用）；烟枪烟灯=留样研究余毁；姨太太=坚决剔除。提高作业评价：引句+喻对应+联今=良好；能析「主动鉴别」=优秀。","reflection":"✅ 亮点：四喻解码表让杂文比喻「可操作」，B班也能说态度；联今「信息茧房=新闭关」有现实锋芒。\n⚠️ 需改进：反语讽刺（丰富大度）部分B班当真，需课前提示「反语」修辞。\n📌 下节课衔接：下节课写作——学写议论段，把比喻/对比/破立论证化为写作能力。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T10:30:00Z"},{"id":"l-cn-bs-u6-6","lessonId":"l-cn-bs-u6-6","title":"写作指导——学写议论段（观点+论据+分析）","book":"必修上册","unitNumber":6,"unitTitle":"学习之道","taskGroup":"思辨性阅读与表达","lessonType":"xiezuo","lessonTypeName":"写作指导","periodNumber":6,"duration":45,"grade":"高一","subject":"语文","tags":["思辨阅读","写作","议论段","论证","人教版必修上U6","第六课时"],"textbookAnalysis":"本课为单元写作任务，学写规范的议论段（300字左右）。标准结构：①观点句（段首亮明分论点）；②阐释句（稍解观点）；③论据句（事实/道理论据，可引本单元课文）；④分析句（论据如何证明观点，关键！）；⑤结论句（回扣升华）。重点是「分析句」——学生常「观点+论据」就停，缺分析衔接，导致论证断裂。","overview":"【学情分析】A班：能写有观点短文，但分析句弱，论据与评价「两张皮」；可深入。B班：不知议论段结构，常写成记叙文或例子堆；观点句不显。共同问题：把议论段当「讲故事+喊口号」；论据不典型或与分析脱节。","objectives":["语言能力：能写1个规范议论段（观点/阐释/论据/分析/结论），做到论据支撑观点、分析衔接。","文化意识：在议论中合理引用本单元经典（劝学/师说/拿来），培养据典立论的习惯。","思维品质：通过「分析句」训练，培养「论据→观点」的逻辑推导能力。","学习能力：掌握议论段五步法，能独立写段并能自评。"],"keyPoints":"① 五步：观点句（首）→阐释句→论据句（引课文/事例）→分析句（关键）→结论句。\n② 分析句作用：说明「论据为何证明观点」，桥接论据与观点。\n③ 论据要求：典型、贴切、可引本单元经典。","difficulties":"① 分析句缺失。原因：学生写完论据就停，需强制「所以…因为…」句式。\n② 观点句不显。原因：观点藏在段中，需段首亮明。\n③ 论据脱节。原因：例子与观点拧着，需选贴切论据。","teachingMethods":"① 结构讲授法：五步法图示。\n② 升格示范法：残段（缺分析）vs完段。\n③ 支架法：分析句式库。\n④ 互评法：交换评「分析连否」。","preparation":"【PPT课件】P1 议论段五步结构；P2 残段vs完段升格（缺分析句）；P3 分析句式库（因为/可见/这说明）；P4 论据选用（本单元经典）；P5 互评量表；P6 范例。\n【实物教具】便签。\n【音频】无。","process":[{"step":"Step 1 五步结构","time":"8分钟","content":"【PPT P1 结构】教师讲五步：①观点句（段首亮分论点）②阐释句（稍解）③论据句（引例/理）④分析句（关键：论据为何证观点）⑤结论句（回扣）。板书时机：黑板画五步阶梯。差异化提示：B班记五步；A班需说「哪步最关键」。易错点提醒：观点句必须段首显——读者第一句就知你要论什么，别埋中段。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 升格示范","time":"12分钟","content":"【PPT P2 升格】教师展示残段：「学贵有恒。荀子说锲而不舍金石可镂。可见坚持重要。」问：「缺什么？」 预设回答：「没说『锲而不舍』怎么证明恒！」 教师补全分析句：「『锲而不舍』以刻刀不停喻持续用力，正说明恒非一日之功而是日日不止——这恰证学贵有恒。」 板书时机：黑板标「分析句=桥接论据与观点」。差异化提示：B班看缺啥；A班需说分析句写法。易错点提醒：分析句用「因为/可见/这说明」引出，解释论据与观点的逻辑，不能省。"},{"step":"Step 3 论据选用","time":"8分钟","content":"【PPT P4 论据】教师：「本单元经典可作论据：劝学（积累/坚持）、师说（从师）、拿来（批判挑选）。选贴切的。」 板书时机：黑板列可用论据。差异化提示：B班记可用典；A班需为观点选最贴的。易错点提醒：论据要「贴切」——论「恒」用锲而不舍，别硬塞不相关的。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 写初稿","time":"12分钟","content":"【PPT P3 句式】教师：「用五步写一段（300字），观点可选『学贵有恒/从师有益/拿来需辨』。用分析句式。」 学生写。板书时机：教师巡选典型。差异化提示：B班写200字+用句式；A班写300字+引本单元典。易错点提醒：分析句不能变成第二论据——它是「解释连接」，不是再举一例。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 互评","time":"8分钟","content":"【PPT P5 量表】教师：「交换评：观点显否？论据贴否？分析连否？」 预设回答：「他观点在段尾没亮。」「她论据好但没分析句。」 板书时机：黑板列反馈。差异化提示：B班用「有/无」；A班三维打分+建议。易错点提醒：互评看「分析连否」——这是议论段灵魂。"},{"step":"Step 6 作业","time":"2分钟","content":"【PPT P6 环节说明】教师：「据互评改终稿，下节课讲评。」 板书时机：板书「段→篇」。差异化提示：B班改分析句；A班改深度。易错点提醒：下节课讲评，提醒据量表自改。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 学写议论段 ──┐\n│ 五步阶梯:       │\n│ ①观点(段首显)  │\n│ ②阐释          │\n│ ③论据(引典)    │\n│ ④分析(关键!)   │\n│ ⑤结论          │\n│              │\n│ 分析句=桥接     │\n│ 论据→观点      │\n│ 句式:因为/可见/│\n│ 这说明          │\n│              │\n│ 论据贴题为要   │\n│ 分析≠二论据    │\n└──────────────┘","exercises":"【基础作业】1. 据互评改议论段终稿（300字），五步齐全，分析句用句式。2. 在段末写一句「我的观点+用的论据」。\n【提高作业】另写一段不同观点（如「从师有益」），要求分析句能解释「师说」论据如何证观点。\n【参考答案——教师用】基础1评价：五步全+分析连=合格；引本单元典+分析深=良好。基础2评价：观点论据对应=良好。提高作业评价：分析精准=优秀。","reflection":"✅ 亮点：残段vs完段升格让「分析句」价值一目了然，B班也懂缺啥；分析句式库降低起步。\n⚠️ 需改进：部分A班生分析句写成第二论据，需更强区分训练；下次给「分析句≠举例」红线。\n📌 下节课衔接：下节课讲评，精选典型段公开点评，准备单元论坛。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T10:30:00Z"},{"id":"l-cn-bs-u6-7","lessonId":"l-cn-bs-u6-7","title":"写作实践与讲评——议论段修改与提升","book":"必修上册","unitNumber":6,"unitTitle":"学习之道","taskGroup":"思辨性阅读与表达","lessonType":"xiezuo","lessonTypeName":"写作实践","periodNumber":7,"duration":45,"grade":"高一","subject":"语文","tags":["思辨阅读","讲评","议论段","人教版必修上U6","第七课时"],"textbookAnalysis":"本课为议论段写作讲评，选取三典型：①观点句不显（埋段中）；②论据脱节（例子拧）；③俱佳（观点显/论据贴/分析连）。通过对比讲评提升。优秀段可进入单元论坛展示。","overview":"【学情分析】A班：初稿结构好但分析句仍可深；反思强。B班：部分仍缺观点句或分析句，需典型纠偏。共同问题：修改只改字不改进论证；好段标准未内化。","objectives":["语言能力：据讲评改议论段终稿，做到观点显、论据贴、分析连。","文化意识：在讲评中体会「有理有据」的表达素养。","思维品质：通过三典型诊断，培养评价与自我修订能力。","学习能力：内化「好段三标准」（观点显/论据贴/分析连）。"],"keyPoints":"① 三典型：观点不显/论据脱节/俱佳。\n② 修改三方向：提观点句/换贴论据/补分析句。\n③ 好段三标准：观点显·论据贴·分析连。","difficulties":"① 观点显化。原因：学生不知段首亮明，需示范移位。\n② 论据替换。原因：例子拧，需教「重选贴切」。\n③ 分析补写。原因：习惯性省略，需句式强制。","teachingMethods":"① 典型讲评法：匿名三典型。\n② 对比修改法：原稿vs改稿。\n③ 同伴互改法：交换互签。\n④ 教师现场改稿。","preparation":"【PPT课件】P1 三标准；P2 典型A(观点不显)+改；P3 典型B(论据脱节)+改；P4 典型C(俱佳)+赏；P5 现场改稿；P6 论坛预告。\n【实物教具】学生议论段（收选3篇）。\n【音频】无。","process":[{"step":"Step 1 回顾三标准","time":"3分钟","content":"【PPT P1 三标准】教师：「好议论段三标准？」 预设回答：「观点显！论据贴！分析连！」 板书时机：黑板写三标准配问号。差异化提示：B班背；A班解释每条。易错点提醒：三标准缺一不可——观点不显读者迷，论据不贴论证断，分析不连是堆例。"},{"step":"Step 2 讲评典型A——观点不显","time":"8分钟","content":"【PPT P2 典型A】展示段首是事例、观点藏段尾的稿。教师：「读者读完才知道你论啥，改？」 预设回答：「把结尾观点句移到段首！」 教师移位示范。板书时机：黑板左列「A：提观点句到段首」。差异化提示：B班说改法；A班需说「为何段首」。易错点提醒：观点句是段的「眼睛」，必须第一句，移位是最小改动最大效果。"},{"step":"Step 3 讲评典型B——论据脱节","time":"8分钟","content":"【PPT P3 典型B】展示论「学贵有恒」却引「拿来主义」四喻的稿。教师：「拧了——四喻说挑选不是恒。换？」 预设回答：「换『锲而不舍』或『驽马十驾』！」 板书时机：黑板中列「B：换贴论据」。差异化提示：B班说错处；A班提替换。易错点提醒：论据须「服务观点」——引典前先问「这例证明我的点吗」。"},{"step":"Step 4 讲评典型C——俱佳","time":"6分钟","content":"【PPT P4 典型C】展示观点段首+锲而不舍论据+分析句的稿。教师：「好在哪？」 预设回答：「观点一眼见、论据贴、分析把喻和点连上了！」 板书时机：黑板右列「C：俱佳→赏」。差异化提示：B班说好；A班析分析句写法。易错点提醒：赏好段是分析「好在哪」给同学借鉴。"},{"step":"Step 5 现场改稿","time":"8分钟","content":"【PPT P5 改稿】教师选稿A当场移位+补分析：「原段尾『可见坚持重要』→移到段首作观点，中间补『锲而不舍以刻刀不停喻
