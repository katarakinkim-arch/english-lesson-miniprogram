-14T14:40:00Z"},{"id":"l-cn-bx-u5-3","lessonId":"l-cn-bx-u5-3","title":"群文阅读——演说的力量：鼓动与哀悼","book":"必修下册","unitNumber":5,"unitTitle":"实用性阅读与交流（演说与书信）","taskGroup":"实用性阅读与交流","lessonType":"qunwen","lessonTypeName":"群文阅读","periodNumber":3,"duration":45,"grade":"高一","subject":"语文","tags":["演说","群文","马克思","恩格斯","人教版必修下U5","第三课时"],"textbookAnalysis":"群文比较《人民报演说》与《墓前讲话》——同出马恩、同具力量，但体裁异：一为政治演说（鼓动预言、短密），一为悼词（哀而评价、情理交融）。比较提炼「实用类言说」的不同表达策略。","overview":"【学情分析】A班：能比两体裁表达策略，可深入「为何这样写」；赏差异。B班：单篇懂但比较框架缺；易混「哪篇鼓动哪篇哀」。共同问题：比较易罗列缺归纳——发现「都有力」后不会提炼体裁范式。","objectives":["语言能力：用双栏比较两文（体裁/目的/结构/语言/力量来源），说出实用言说的表达差异。","文化意识：体会不同场合言说的社会责任与情感重量。","思维品质：通过比较培养同中求异、提炼范式思维。","学习能力：掌握实用类言说群文双栏比较法。"],"keyPoints":"① 人民报：演说/鼓动预言/短密/逻辑燃。\n② 墓前：悼词/哀而评价/三段/情理融。\n③ 共性：皆以真知与信念动人。","difficulties":"① 体裁区分。原因：学生混，需点。\n② 双栏填。原因：维度不清，需框架。\n③ 共性提炼。原因：易停异，需归纳。","teachingMethods":"① 双栏比较法。\n② 范式命名法。\n③ 归纳法。\n④ 迁移法。","preparation":"【PPT课件】P1 两文；P2 双栏（体裁/目的/结构/语言/力量）；P3 范式（鼓动/哀评）；P4 共性（真知信念）；P5 迁移（谏逐客书）；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——同与异","time":"5分钟","content":"【PPT P1】教师：「两文都出自马恩、都震撼，但一篇在会上燃，一篇在墓前沉——怎么个不同？」 预设回答：「一个鼓动，一个哀悼！」 板书时机：黑板写「同：力量；异：场合」。差异化提示：B班说同异；A班需预判。易错点提醒：别只说「都有力」——要比「在什么场合、用什么方式发力」。"},{"step":"Step 2 双栏","time":"13分钟","content":"【PPT P2 表】教师：「填双栏：体裁(演说/悼词)、目的(鼓动/哀评)、结构(由果溯因/三段)、语言(犀利/沉郁)、力量(逻辑燃/情理融)。」 学生填。板书时机：黑板画双栏。差异化提示：B班填体裁+目的；A班全填。易错点提醒：同维度比——都在「体裁/目的/结构/语言/力量」下，不能乱比。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 范式","time":"10分钟","content":"【PPT P3 范式】教师：「人民报=鼓动型(现场燃、预言提振)；墓前=哀评型(沉而评、情理交融)。体裁定写法。」 板书时机：黑板写「鼓动↔哀评」。差异化提示：B班记两词；A班需说「为何」。易错点提醒：范式区别在「场合与目的」——读实用言说先判场合，才懂作者策略。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 共性","time":"8分钟","content":"【PPT P4 共性】教师：「异之后共性？」 预设回答：「都靠真知(两大发现/矛盾论)与信念动人——实用言说以思想重量服人。」 板书时机：黑板写「共性：真知+信念」。差异化提示：B班说1点；A班需整合。易错点提醒：归纳是群文目的——异是手段，共性是收获。"},{"step":"Step 5 迁移","time":"5分钟","content":"【PPT P5 迁移】教师：「下节《谏逐客书》也是实用言说——它是『劝谏』，又一体(说理服君)。」 板书时机：板书「可迁移」。差异化提示：B班听；A班需说下比啥。易错点提醒：下节课读李斯，看「臣对君」的劝谏艺术。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 作业","time":"4分钟","content":"【PPT P6 练习】教师：「据双栏写一段比较，下节课用。」 板书时机：黑板群文读法。差异化提示：B班背双栏；A班写比较段。易错点提醒：写作用原句支撑，不贴标签。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 演说群文 ──┐\n│ 同:力量·异:场合│\n│                │\n│ 【双栏】         │\n│ 体裁:演说↔悼词 │\n│ 目的:鼓动↔哀评 │\n│ 结构:溯因↔三段 │\n│ 语言:犀利↔沉郁 │\n│ 力量:燃↔融     │\n│                │\n│ 范式:           │\n│ 鼓动型↔哀评型   │\n│ 共性:真知+信念  │\n└────────────────┘","exercises":"【基础作业】1. 完成双栏（体裁/目的/结构/语言/力量）。2. 用一句话说两文范式差异。\n【提高作业】写180字比较短文，要求：①同维度；②各引一句；③提炼范式差异。\n【参考答案——教师用】基础1评价：双栏全+维度对=合格。提高作业评价：同维度+引句+范式明=良好；能析功能=优秀。","reflection":"✅ 亮点：双栏让比较有抓手，B班也填；范式命名（鼓动/哀评）抓内核；共性「真知+信念」有高度。\n⚠️ 需改进：B班生常混两体裁，需更多对比例；下次加判定口诀。\n📌 下节课衔接：下节课《谏逐客书》，劝谏体。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T14:40:00Z"},{"id":"l-cn-bx-u5-4","lessonId":"l-cn-bx-u5-4","title":"谏逐客书 精读——说理服君与铺陈艺术","book":"必修下册","unitNumber":5,"unitTitle":"实用性阅读与交流（演说与书信）","taskGroup":"实用性阅读与交流","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":4,"duration":45,"grade":"高一","subject":"语文","tags":["文言","李斯","谏逐客书","说理","人教版必修下U5","第四课时"],"textbookAnalysis":"《谏逐客书》是李斯写给秦王嬴政的奏疏，反对逐客令。先以历史（穆公等用客致富强）与当下（珍宝声色皆外来）铺陈，再以「重物轻人」类比归谬，终落脚「统一天下」之大业。逻辑严密、铺陈有力、层次递进，是古代说理文典范。","overview":"【学情分析】A班：能跟「铺陈—类比—归谬」逻辑，可深入「重物轻人」之刺；赏文势。B班：字词懂但论证链读断；铺陈当堆砌。共同问题：当文言文翻译读，抓不住论证结构；不知「为何先讲历史再讲珍宝」。","objectives":["语言能力：梳理谏书的论证思路（历史铺陈→当下类比→归谬点君），说出其核心论点。","文化意识：理解李斯「利国」之理与战国士人风采。","思维品质：通过分析铺陈与归谬，培养严密论证思维。","学习能力：掌握「抓论点、理层次、品铺陈」的文言文说理读法。"],"keyPoints":"① 论点：逐客过矣（不利统一）。\n② 层次：历史(用客强)→当下(重物轻人)→归谬(此非跨海内之法)。\n③ 艺术：铺陈有力、类比刺君。","difficulties":"① 论证链。原因：学生读断，需层次图。\n② 铺陈。原因：易当堆砌，需解作用。\n③ 归谬。原因：抽象，需点「重物轻人」刺。","teachingMethods":"① 论证层次图法。\n② 铺陈解码法。\n③ 归谬点破法。\n④ 诵读法（文势）。","preparation":"【PPT课件】P1 李斯与秦王；P2 论点（逐客过矣）；P3 层次（历史/当下/归谬）；P4 铺陈与类比；P5 文势诵读；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——一封谏书","time":"5分钟","content":"【PPT P1 李】教师：「秦王下逐客令，李斯也在逐列。他上书：逐客是错！一封谏书，逆转君令。怎么说的？」 预设回答：「臣劝君，得讲策略，不能硬怼！」 板书时机：黑板写「谏逐客：说理服君」。差异化提示：B班说事件；A班需联背景。易错点提醒：谏书是「对君说理」——对象特殊，得服不能冲，读时想「他怎么让君听」。"},{"step":"Step 2 论点","time":"8分钟","content":"【PPT P2 论点】教师：「核心论点：『臣闻吏议逐客，窃以为过矣』——逐客错了，不利统一天下。开门见山。」 板书时机：黑板写「逐客过矣」。差异化提示：B班记论点；A班需说为何「过」。易错点提醒：说理文先亮观点——李斯首句定调，后文全为证此，读时盯住「过矣」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 层次","time":"15分钟","content":"【PPT P3 层次】教师：「三层：①历史(穆公等用客致富强)②当下(珍宝声色皆外来却爱之)③归谬(重物轻人=不能跨海内)。层层递进逼君。」 板书时机：黑板画三层。差异化提示：B班说2层；A班需全+说递进。易错点提醒：论证有「台阶」——历史立信、当下类比、归谬收口，读时跟台阶走，别跳。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 铺陈类比","time":"9分钟","content":"【PPT P4 铺陈】教师：「铺陈：历数珍宝美女『昆山之玉、随和之宝…』——不是堆砌，是以『皆外来却爱』反衬『逐客之谬』。类比刺君：重物轻人。」 板书时机：黑板写「铺陈=反衬·类比刺君」。差异化提示：B班记铺陈；A班需说刺君处。易错点提醒：铺陈有「用」——李斯列一堆是为反差（爱物逐人），读时想「这堆东西服务啥论点」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 文势","time":"5分钟","content":"【PPT P5 文势】教师：「读『今取人则不然…』——感受铺陈后的陡转与气势，谏书之『力』在此。」 板书时机：黑板标诵读点。差异化提示：B班跟读；A班需说势。易错点提醒：文言说理也有「节奏」——铺陈蓄势、归谬爆发，读时体会文势起伏。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"3分钟","content":"【PPT P6 练习】教师：「说理文读法？」 预设回答：「抓论点→理层次→品铺陈！」 板书时机：板书读法。差异化提示：B班背论点；A班写80字「我眼中的李斯」。易错点提醒：下节课读《与妻书》，看「情书」如何说理抒情。"}],"blackboard":"┌── 谏逐客书·李 ──┐\n│ 说理服君        │\n│                │\n│ 论点:逐客过矣   │\n│                │\n│ 三层:           │\n│ 历史(用客强)    │\n│ 当下(重物轻人)  │\n│ 归谬(非跨海内)  │\n│                │\n│ 铺陈=反衬       │\n│ 类比刺君        │\n└────────────────┘","exercises":"【基础作业】1. 写出谏书核心论点。2. 说出论证的两层（历史/当下）大意。\n【提高作业】写150字「我眼中的李斯」，要求：①联论证一处；②说铺陈作用；③不脸谱。\n【参考答案——教师用】基础1：逐客过矣（不利统一）。基础2：历史用客致富强、当下重物轻人。提高作业评价：联文+铺陈作用+不脸谱=良好；有见地=优秀。","reflection":"✅ 亮点：论证层次图（历史/当下/归谬）让文言说理不读断，B班也懂；铺陈解码（反衬·刺君）破「堆砌」误读；文势诵读体会节奏。\n⚠️ 需改进：B班字词仍有碍（如「昆山之玉」），部分卡在翻译；下次给关键词注。\n📌 下节课衔接：下节课《与妻书》，情书体说理。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T14:40:00Z"},{"id":"l-cn-bx-u5-5","lessonId":"l-cn-bx-u5-5","title":"与妻书 精读——儿女情长与家国担当","book":"必修下册","unitNumber":5,"unitTitle":"实用性阅读与交流（演说与书信）","taskGroup":"实用性阅读与交流","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":5,"duration":45,"grade":"高一","subject":"语文","tags":["文言","林觉民","与妻书","抒情","人教版必修下U5","第五课时"],"textbookAnalysis":"《与妻书》是林觉民广州起义前写给妻子的绝笔。以「吾至爱汝，即此爱汝一念，使吾勇于就死」为核，将夫妻深情与家国担当交融：因爱妻更知爱天下人，故赴死。情理交织、催人泪下，是「书信体抒情说理」极品。","overview":"【学情分析】A班：能跟「爱汝→爱天下」的逻辑升华，可深入「情理互文」；赏笔法。B班：感动但「为何赴死」说不清；书信体陌生。共同问题：当催泪文读，抓不住「由情入理」的论证（爱妻故爱众）；只哭不懂理。","objectives":["语言能力：说出「吾至爱汝…使吾勇于就死」的含义，梳理「爱妻—爱众—赴死」的情感逻辑。","文化意识：体会革命志士「为天下人谋永福」的家国情怀。","思维品质：通过分析情理互文，培养由私情入公义的思维。","学习能力：掌握「抓情核、理逻辑、品交融」的书信读法。"],"keyPoints":"① 情核：吾至爱汝，因爱汝而勇于就死。\n② 逻辑：爱妻→推爱众人→赴死谋永福。\n③ 交融：深情怀天下，说理含情。","difficulties":"① 情核解。原因：句式绕，需拆。\n② 逻辑升。原因：易只哭不懂理，需点「推爱」。\n③ 书信体。原因：易当散文，需辨对象(妻)。","teachingMethods":"① 情核拆解法。\n② 逻辑升华法：推爱。\n③ 情理互文品读法。\n④ 诵读法（催泪段）。","preparation":"【PPT课件】P1 林觉民与广州起义；P2 情核句拆解；P3 逻辑（爱妻→爱众→死）；P4 情理交融；P5 诵读点；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——一封绝笔","time":"5分钟","content":"【PPT P1 林】教师：「1911广州起义前夜，林觉民给妻写绝笔：我要死了，但因为我太爱你。为何爱妻反而去死？」 预设回答：「因为爱她，更懂爱天下人！」 板书时机：黑板写「与妻书：爱→死」。差异化提示：B班说事件；A班需联起义。易错点提醒：这是「给妻的信」——对象是妻，满纸私情却为大义，读时想「他在跟谁说、说啥」。"},{"step":"Step 2 情核","time":"13分钟","content":"【PPT P2 情核】教师：「情核句：『吾至爱汝，即此爱汝一念，使吾勇于就死』。拆：极爱妻→这爱推及众人→故敢赴死。不是矛盾，是升华。」 板书时机：黑板写「至爱→勇死」。差异化提示：B班记句；A班需拆逻辑。易错点提醒：情核是全文眼——先读懂这句「爱何以成死因」，后文全展开它，别略过。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 逻辑","time":"12分钟","content":"【PPT P3 逻辑】教师：「逻辑升：爱妻(私)→推爱天下人(公)→愿以死换众永福。由小爱入大义，层层推。」 板书时机：黑板画推爱链。差异化提示：B班说2环；A班需全+说推。易错点提醒：书信妙在「说理于情」——他用爱妻之心证赴死之正，读时跟「推爱」走，别只哭。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 交融","time":"8分钟","content":"【PPT P4 交融】教师：「交融：忆夫妻甜（『初婚三四月』）是情，论『天下不当死而死』是理，情中见理，理中含情。」 板书时机：黑板写「情↔理」。差异化提示：B班听；A班需举一处。易错点提醒：别只当催泪文——它每滴泪都立着理（为何死），读时品情也品理。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 诵读","time":"4分钟","content":"【PPT P5 诵读】教师：「读『汝幸而偶我，又何不幸而生今日之中国』——感受私情与家国的撕扯。」 板书时机：黑板标诵读点。差异化提示：B班跟读；A班需说味。易错点提醒：书信靠「声」传情——读时放慢，想这是诀别，语气自有重。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"3分钟","content":"【PPT P6 练习】教师：「书信读法？」 预设回答：「抓情核→理逻辑→品交融！」 板书时机：板书读法。差异化提示：B班背情核；A班写80字「我眼中的林觉民」。易错点提醒：下节课方法指导，学写演讲稿/说理文。"}],"blackboard":"┌── 与妻书·林 ──┐\n│ 爱→死           │\n│                │\n│ 情核:           │\n│ 至爱汝→勇就死   │\n│                │\n│ 逻辑推爱:       │\n│ 爱妻(私)        │\n│ →爱众(公)       │\n│ →赴死谋永福    │\n│                │\n│ 交融:情↔理      │\n└────────────────┘","exercises":"【基础作业】1. 写出情核句大意。2. 说出「爱妻→赴死」逻辑中的一环（如推爱众人）。\n【提高作业】写150字「我眼中的林觉民」，要求：①联情核；②说推爱逻辑；③不脸谱化。\n【参考答案——教师用】基础1：极爱妻，因这爱推及众人，故敢赴死。基础2：爱妻推爱天下人、愿死换永福（任1）。提高作业评价：联情核+逻辑+不脸谱=良好；有深度=优秀。","reflection":"✅ 亮点：情核拆解（至爱→勇死）破「矛盾感」，B班也懂升华；推爱链（私→公→死）显逻辑；交融（情↔理）纠「只哭不懂理」。\n⚠️ 需改进：B班字词仍碍（如「偶我」），部分卡翻译；下次给关键词注。\n📌 下节课衔接：下节课方法指导，学写演讲稿/说理文。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T14:40:00Z"},{"id":"l-cn-bx-u5-6","lessonId":"l-cn-bx-u5-6","title":"方法指导——学写演讲稿与说理文","book":"必修下册","unitNumber":5,"unitTitle":"实用性阅读与交流（演说与书信）","taskGroup":"实用性阅读与交流","lessonType":"fangfa","lessonTypeName":"方法指导","periodNumber":6,"duration":45,"grade":"高一","subject":"语文","tags":["演说","写作","演讲稿","说理","人教版必修下U5","第六课时"],"textbookAnalysis":"本课为第五单元写作任务，二选一：①写演讲稿（面向听众，有称呼、有鼓动、有层次）；②写说理短文（亮观点、列层次、用论据）。要点：观点鲜明、层次清晰、语言适配场合。学生常写成无对象感的议论文或平淡发言。","overview":"【学情分析】A班：能写有层次演讲稿，但鼓动/称呼弱；可深入。B班：写成无称呼的议论文，或发言无重点；不知「对谁讲」。共同问题：无对象感（不写听众/称呼）；无层次（论点论据乱）；语言不「场合化」。","objectives":["语言能力：写一篇演讲稿或说理文（300字），做到观点鲜明、层次清晰、语言适配场合。","文化意识：在写作中体会「言说要对人负责」的表达伦理。","思维品质：通过格式约束，培养条理与对象意识。","学习能力：掌握演讲稿/说理文「观点+层次+场合语」写法。"],"keyPoints":"① 演讲稿：称呼听众+鼓动+层次。\n② 说理文：亮观点+列层次+用论据。\n③ 共性：对象感、场合语。","difficulties":"① 对象感。原因：无称呼，需给。\n② 层次。原因：乱，需提纲。\n③ 场合语。原因：不分场合，需适配。","teachingMethods":"① 格式模板法：称呼/鼓动。\n② 提纲法：观点+层次。\n③ 升格示范法。\n④ 互评法。","preparation":"【PPT课件】P1 二选一；P2 演讲格式（称呼/鼓动/层次）；P3 说理结构（观点/层次/论据）；P4 场合语；P5 升格；P6 互评量表。\n【实物教具】便签。\n【音频】无。","process":[{"step":"Step 1 二选一","time":"5分钟","content":"【PPT P1】教师：「今天二选一：①演讲稿(对听众讲,有称呼鼓动)②说理文(亮观点用论据)。演讲重『讲给人』，说理重『证给人』。」 板书时机：黑板写「演讲↔说理」。差异化提示：B班听；A班需选。易错点提醒：先定体——演讲有称呼听众，说理有结构论据，别混成无对象议论文。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 演讲格式","time":"12分钟","content":"【PPT P2 格式】教师：「演讲稿：①称呼(同学们)②开场钩子③分层论述(先…再…)④鼓动收束(让我们…)。对象感是魂。」 板书时机：黑板列格式。差异化提示：B班记格式；A班需写一句称呼。易错点提醒：演讲「对人讲」——称呼与鼓动让听众在场，写时想「台下是谁」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 说理结构","time":"12分钟","content":"【PPT P3 结构】教师：「说理文：①亮观点(我认为…)②分层(历史/现实/类比)③论据(例/数据)④收。逻辑清楚。」 板书时机：黑板列结构。差异化提示：B班写观点；A班需列层次。易错点提醒：说理「观点先行」——首句亮明，后文举证，读时盯论点。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 场合语","time":"8分钟","content":"【PPT P4 场合】教师：「语言看场合：班会演讲口语鼓动；书面说理严谨。别在演讲里掉书袋，也别在说理里喊口号。」 板书时机：黑板写「场合适配」。差异化提示：B班听；A班需举一反例。易错点提醒：语言随场合——想清「在哪讲/写给谁」，语体才对。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 升格","time":"5分钟","content":"【PPT P5 升格】展示无对象稿：「阅读很重要。我们要阅读。」问：「改演讲？」 预设回答：「『同学们，你多久没为一本书心动了？阅读，让我们…』加称呼钩子！」 教师改。板书时机：黑板标升格。差异化提示：B班看差；A班提改。易错点提醒：升格加「对象+钩子」——把独白变对话，听众才在。"},{"step":"Step 6 写+互评","time":"3分钟","content":"【PPT P6 量表】教师：「写300字，互评：有对象?有层次?语场合?」 学生写+评。板书时机：教师巡。差异化提示：B班写200字+格式；A班写300字+鼓动/论据。易错点提醒：互评看「像不像该体」——演讲看称呼鼓动，说理看观点论据。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 学写演说说理 ──┐\n│ 二选一:         │\n│ 演讲↔说理       │\n│                │\n│ 演讲格式:       │\n│ 称呼+钩子+分层  │\n│ +鼓动           │\n│                │\n│ 说理结构:       │\n│ 观点+层次+论据  │\n│                │\n│ 场合适配语      │\n└────────────────┘","exercises":"【基础作业】1. 据互评改终稿（300字）：演讲稿(称呼+鼓动+分层)或说理文(观点+层次+论据)。2. 写一句「我用的文体+核心」。\n【提高作业】若写演讲，加一处更强鼓动句；若写说理，加一层类比论据。\n【参考答案——教师用】基础1评价：演讲格式对+鼓动=合格；说理观点明+论据=合格；有层次=良好。基础2评价：说清=合格。提高作业评价：鼓动强/类比巧=优秀。","reflection":"✅ 亮点：格式模板（称呼/钩子/鼓动）破「无对象」，B班也懂；说理结构（观点+层次+论据）清晰；场合语避「掉书袋/喊口号」。\n⚠️ 需改进：部分A班生鼓动仍弱，需给「呼告句式」库；下次加。\n📌 下节课衔接：下节课写作讲评+演讲会。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T14:40:00Z"},{"id":"l-cn-bx-u5-7","lessonId":"l-cn-bx-u5-7","title":"写作实践与讲评——演说/说理文修改与提升","book":"必修下册","unitNumber":5,"unitTitle":"实用性阅读与交流（演说与书信）","taskGroup":"实用性阅读与交流","lessonType":"xiezuo","lessonTypeName":"写作实践","periodNumber":7,"duration":45,"grade":"高一","subject":"语文","tags":["演说","讲评","演讲稿","人教版必修下U5","第七课时"],"textbookAnalysis":"本课为演说/说理文讲评，选取三典型：①无对象（无称呼/无听众）；②无层次（论点论据乱）；③语言错位（演讲掉书袋/说理喊口号）。通过对比讲评提升。","overview":"【学情分析】A班：初稿条理好但鼓动/论据可深；反思强。B班：部分仍无对象或乱，需典型纠偏。共同问题：修改只改字不改进文体；好演说/说理文标准未内化。","objectives":["语言能力：据讲评改终稿，做到有对象感、层次清晰、语言适配场合。","文化意识：在讲评中体会实用言说的表达自觉。","思 ─────────┘","exercises":"【基础作业】1. 提交单元反思单（三行完整）。2. 将最满意演讲稿归档。\n【提高作业】写150字「单元总结」，要求：①点明最重要方法；②举一文说明；③说想提升的方面。\n【参考答案——教师用】反思单评价：三行具体=合格；有方法意识=良好；疑问有思=优秀。总结评价：点法+举例=合格；有个性化=良好。","reflection":"✅ 亮点：演讲让稿「立」起来，B班也参与（助讲/幕后）；互评标准（对象/层次/鼓动）点出实用言说价值，四文贯通。\n⚠️ 需改进：15分钟只轮部分组；下次分两批或限时。\n📌 下单元衔接：第六单元「文学阅读与写作（小说）」，从实用言说转到文学形象。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T14:40:00Z"},{"id":"l-cn-bx-u6-1","lessonId":"l-cn-bx-u6-1","title":"祝福 精读——祥林嫂的悲剧与鲁镇环境","book":"必修下册","unitNumber":6,"unitTitle":"文学阅读与写作（小说）","taskGroup":"文学阅读与写作","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":1,"duration":45,"grade":"高一","subject":"语文","tags":["小说","鲁迅","祝福","祥林嫂","人教版必修下U6","第一课时"],"textbookAnalysis":"《祝福》是鲁迅小说，写祥林嫂两次到鲁镇做工、屡遭不幸（丧夫失子、被厌弃），终在祝福夜凄死。鲁迅以「我」的视角，用白描与环境（祝福的热闹反衬其死）写封建礼教「吃人」。是认识中国现代小说与批判现实的范本。","overview":"【学情分析】A班：能跟「环境反衬」与礼教批判，可深入「看客」；赏白描。B班：情节懂但「环境作用」读不出；鲁镇人当背景。共同问题：当苦情故事读，抓不住「环境（鲁镇/祝福）如何吃人」；不察看客的冷漠。","objectives":["语言能力：梳理祥林嫂命运轨迹，说出鲁镇环境（祝福氛围/众人态度）对人物的作用。","文化意识：理解《祝福》对封建礼教与冷漠世风的批判。","思维品质：通过分析环境与人物关系，培养「典型环境造典型性格」的思维。","学习能力：掌握「抓命运、析环境、明批判」的小说读法。"],"keyPoints":"① 命运：丧夫→出逃做工→被卖改嫁→丧子→被厌弃→凄死。\n② 环境：祝福热闹反衬其死；鲁镇人冷漠(看客)。\n③ 批判：礼教「吃人」+世风麻木。","difficulties":"① 环境作用。原因：易当背景，需点反衬。\n② 看客。原因：易略，需点冷漠。\n③ 批判深。原因：易归个人，需指社会。","teachingMethods":"① 命运轨迹图法。\n② 环境反衬法：祝福vs死。\n③ 看客解码法。\n④ 白描品读法。","preparation":"【PPT课件】P1 鲁迅与祝福；P2 祥林嫂命运轨迹；P3 环境(祝福热闹/鲁镇冷漠)；P4 看客解码；P5 批判(礼教吃人)；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——祝福夜的死","time":"5分钟","content":"【PPT P1 鲁】教师：「鲁镇年底祝福，鞭炮热闹，偏有人在这夜凄死——祥林嫂。鲁迅为何把死放在祝福里？」 预设回答：「用热闹反衬她的惨！」 板书时机：黑板写「祝福：热闹↔死」。差异化提示：B班说事件；A班需联反衬。易错点提醒：小说环境非背景——它参与「吃人」，读时想「环境怎样压人」。"},{"step":"Step 2 命运","time":"13分钟","content":"【PPT P2 轨迹】教师：「轨迹：丧夫出逃→做工→被卖改嫁→丧子→再回鲁镇被厌(嫌晦气)→乞死。一步步被推下。」 学生填。板书时机：黑板画轨迹。差异化提示：B班说3-4步；A班需全连。易错点提醒：读小说抓「命运线」——祥林嫂的每一步都与社会有关，不是单纯倒霉。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 环境","time":"12分钟","content":"【PPT P3 环境】教师：「环境两重：①祝福的烟火热闹，反衬她死时的孤冷；②鲁镇人议论、嫌弃、当谈资。环境是「软刀」。」 板书时机：黑板写「环境=软刀」。差异化提示：B班听；A班需说反衬。易错点提醒： n② 风雪：推动情节(压塌草厅→避庙)、象征逼压。\n③ 主题：官逼民反。","difficulties":"① 转变层次。原因：易当突然，需节点。\n② 风雪作用。原因：易当天气，需点推动/象征。\n③ 主题。原因：易归报仇，需指时代。","teachingMethods":"① 性格曲线法。\n② 环境推动力法：风雪。\n③ 细节品读法（火盆/刀）。\n④ 对比法（与祥林嫂）。","preparation":"【PPT课件】P1 水浒与林冲；P2 性格曲线（忍→疑→反）；P3 风雪作用（推动/象征）；P4 细节（火盆/尖刀）；P5 主题（官逼民反）；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——从教头到囚徒","time":"5分钟","content":"【PPT P1 林】教师：「林冲本是安分教头，遭高俅害得发配。他一忍再忍，为何最终手刃仇人？」 预设回答：「被逼的！再忍就没命了！」 板书时机：黑板写「林冲：忍→反」。差异化提示：B班说事件；A班需联时代。易错点提醒：读小说人物看「变」——林冲之反不是天性，是被逼，读时盯转变节点。"},{"step":"Step 2 性格曲线","time":"13分钟","content":"【PPT P2 曲线】教师：「曲线：①忍(发配认命)②疑(闻害买刀寻仇未果又忍)③反(山神庙听阴谋，火并陆谦)。层层递进。」 学生画。板书时机：黑板画曲线。差异化提示：B班说2节点；A班需全+说递进。易错点提醒：转变有「台阶」——从忍到反经多次退让，读时看「哪一步压垮他」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 风雪","time":"12分钟","content":"【PPT P3 风雪】教师：「风雪两用：①推动情节(压塌草厅→去山神庙→避过火烧)②象征(寒压迫人、逼上绝路)。不是天气，是角色。」 板书时机：黑板写「风雪=推力+象征」。差异化提示：B班说推动；A班需说象征。易错点提醒：环境「做事」——风雪直接改了情节走向，读时想「没风雪会怎样」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 细节","time":"8分钟","content":"【PPT P4 细节】教师：「细节妙：火盆(曾掩火→草厅烧时他不在，伏笔)、尖刀(买而未用→终用)。草蛇灰线。」 板书时机：黑板列细节。差异化提示：B班说1处；A班需说伏笔。易错点提醒：小说重细节——看似闲笔(火盆)却是生死关键，读时别漏。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 主题","time":"4分钟","content":"【PPT P5 主题】教师：「主题：官逼民反。林冲本不想反，是体制(高俅)逼的。与祥林嫂(被吃)同悲不同途。」 板书时机：黑板写「官逼民反」。差异化提示：B班听；A班需比祥。易错点提醒：主题在「时代」——林冲之反指向体制之恶，读时升一层。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"3分钟","content":"【PPT P6 练习】教师：「小说读法？」 预设回答：「抓转变→析环境→明主题！」 板书时机：板书读法。差异化提示：B班背曲线；A班写80字「我眼中的林冲」。易错点提醒：下节课群文比两小说的人物与环境。"}],"blackboard":"┌── 林教头·施 ──┐\n│ 忍→反          │\n│                │\n│ 性格曲线:       │\n│ 忍(发配)        │\n│ 疑(买刀)        │\n│ 反(山神庙)      │\n│                │\n│ 风雪=推力+象征 │\n│ 细节:火盆/尖刀  │\n│ 主题:官逼民反   │\n└────────────────┘","exercises":"【基础作业】1. 写出林冲性格转变的两个节点。2. 说风雪环境对情节的一处作用。\n【提高作业】写150字「我眼中的林冲」，要求：①联转变一处；②说风雪作用；③不脸谱化。\n【参考答案——教师用】基础1：发配认命、山神庙手刃（或买刀寻仇）。基础2：风雪压塌草厅逼他避庙逃过火烧。提高作业评价：转变+风雪+不脸谱=良好；有见地=优秀。","reflection":"✅ 亮点：性格曲线（忍→疑→反）显「被逼」层次，B班也懂；风雪双用（推力+象征）破「天气论」；细节（火盆/尖刀）草蛇灰线有趣。\n⚠️ 需改进：B班对「官逼民反」仍浅，部分只说报仇；下次加高俅体制注。\n📌 下节课衔接：下节课群文比《祝福》与《林教头》的人物与环境。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T15:00:00Z"},{"id":"l-cn-bx-u6-3","lessonId":"l-cn-bx-u6-3","title":"群文阅读——小说的人物塑造与环境作用","book":"必修下册","unitNumber":6,"unitTitle":"文学阅读与写作（小说）","taskGroup":"文学阅读与写作","lessonType":"qunwen","lessonTypeName":"群文阅读","periodNumber":3,"duration":45,"grade":"高一","subject":"语文","tags":["小说","群文","环境","鲁迅","施耐庵","人教版必修下U6","第三课时"],"textbookAnalysis":"群文比较《祝福》与《林教头风雪山神庙》——同写环境与人物，但路径异：祥林嫂被环境「吃」（被动毁灭），林冲被环境「逼」（主动反抗）。比较提炼小说「典型环境造典型性格」的不同写法。","overview":"【学情分析】A班：能比两小说环境功能与人物结局，可深入「被动vs主动」；赏差异。B班：单篇懂但比较框架缺；易混。共同问题：比较易罗列缺归纳——发现「都有环境」后不会提炼范式。","objectives":["语言能力：用双栏比较两文（环境功能/人物结局/主题），说出小说环境与人物的关系差异。","文化意识：体会不同小说对时代与人的不同书写。","思维品质：通过比较培养同中求异、提炼范式思维。","学习能力：掌握小说群文双栏比较法。"],"keyPoints":"① 祝福：环境吃人(被动毁灭)，祥林嫂死。\n② 林教头：环境逼反(主动反抗)，林冲反。\n③ 共性：典型环境造典型性格。","difficulties":"① 功能区分。原因：学生混「悲」，需点被动/主动。\n② 双栏填。原因：维度不清，需框架。\n③ 共性提炼。原因：易停异，需归纳。","teachingMethods":"① 双栏比较法。\n② 范式命名法：吃/逼。\n③ 归纳法。\n④ 迁移法。","preparation":"【PPT课件】P1 两文；P2 双栏（环境功能/人物/主题）；P3 范式（吃/逼）；P4 共性（环境造性格）；P5 迁移（套中人）；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——同与异","time":"5分钟","content":"【PPT P1】教师：「两文都写人被环境压，但祥林嫂死了，林冲反了——怎么个不同？」 预设回答：「一个被吃掉，一个被逼反！」 板书时机：黑板写「同：压；异：吃/逼」。差异化提示：B班说同异；A班需预判。易错点提醒：别只说「都惨」——要比「环境把人推向哪」。"},{"step":"Step 2 双栏","time":"13分钟","content":"【PPT P2 表】教师：「填双栏：环境功能(吃人/逼反)、人物(祥林嫂被动/林冲主动)、主题(礼教吃人/官逼民反)。」 学生填。板书时机：黑板画双栏。差异化提示：B班填环境+结局；A班全填。易错点提醒：同维度比——都在「环境/人物/主题」下，不能乱比。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 范式","time":"10分钟","content":"【PPT P3 范式】教师：「祝福=环境『吃』人(被动毁灭)；林教头=环境『逼』人(主动反抗)。一静一动，结局迥异。」 板书时机：黑板写「吃↔逼」。差异化提示：B班记两词；A班需说「为何」。易错点提醒：范式区别在「人物对环境的态度」——被动受碾or主动破局，读小说先判。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 共性","time":"8分钟","content":"【PPT P4 共性】教师：「异之后共性？」 预设回答：「都印证『典型环境造典型性格』——环境不是布景，是塑人的手。」 板书时机：黑板写「共性：环境造性格」。差异化提示：B班说1点；A班需整合。易错点提醒：归纳是群文目的——异是手段，共性是收获。"},{"step":"Step 5 迁移","time":"5分钟","content":"【PPT P5 迁移】教师：「下节《装在套子里的人》，环境(小城)如何『套』住人？又一体。」 板书时机：板书「可迁移」。差异化提示：B班听；A班需说下比啥。易错点提醒：下节课读契诃夫，看「环境=套子」的讽刺。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 作业","time":"4分钟","content":"【PPT P6 练习】教师：「据双栏写一段比较，下节课用。」 板书时机：黑板群文读法。差异化提示：B班背双栏；A班写比较段。易错点提醒：写作用原句支撑，不贴标签。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 小说群文 ──┐\n│ 同:压·异:吃/逼│\n│                │\n│ 【双栏】         │\n│ 环境:吃人↔逼反  │\n│ 人物:被动↔主动  │\n│ 主题:礼教↔官逼  │\n│                │\n│ 范式:           │\n│ 吃(毁灭)↔逼(反) │\n│ 共性:环境造性格 │\n└────────────────┘","exercises":"【基础作业】1. 完成双栏（环境功能/人物/主题）。2. 用一句话说两文范式差异。\n【提高作业】写180字比较短文，要求：①同维度；②各引一句；③提炼范式差异。\n【参考答案——教师用】基础1评价：双栏全+维度对=合格。提高作业评价：同维度+引句+范式明=良好；能析功能=优秀。","reflection":"✅ 亮点：双栏让比较有抓手，B班也填；范式命名（吃/逼）抓内核；共性「环境造性格」有高度。\n⚠️ 需改进：B班生常混两结局，需更多对比例；下次加判定口诀。\n📌 下节课衔接：下节课《装在套子里的人》，讽刺体。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T15:00:00Z"},{"id":"l-cn-bx-u6-4","lessonId":"l-cn-bx-u6-4","title":"装在套子里的人 精读——别里科夫与讽刺艺术","book":"必修下册","unitNumber":6,"unitTitle":"文学阅读与写作（小说）","taskGroup":"文学阅读与写作","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":4,"duration":45,"grade":"高一","subject":"语文","tags":["小说","契诃夫","套中人","讽刺","人教版必修下U6","第四课时"],"textbookAnalysis":"《装在套子里的人》是契诃夫讽刺小说。别里科夫把一切「套」起来（雨鞋、棉大衣、甚至思想），恐惧新事物、告密卫道，成为沙皇专制下保守势力的符号。小说以夸张与讽刺，写「套子」对人性的窒息与可笑。","overview":"【学情分析】A班：能跟「套子」的象征与专制批判，可深入讽刺手法；赏夸张。B班：情节懂但「套子」象征读不出；当怪人故事。共同问题：当滑稽人物读，抓不住「套子=专制保守」的符号意义；不察讽刺背后的沉重。","objectives":["语言能力：说出「套子」在文中的具体表现与象征含义，解释别里科夫这一形象的典型性。","文化意识：理解小说对专制保守、扼杀个性的社会批判。","思维品质：通过分析夸张与讽刺，培养由形象到本质的思维。","学习能力：掌握「抓形象、解象征、品讽刺」的小说读法。"],"keyPoints":"① 套子：雨鞋/棉大衣/忌讳新事物/告密(行为+思想)。\n② 象征：套子=专制保守对个性的扼杀。\n③ 讽刺：夸张可笑中见沉重。","difficulties":"① 象征解。原因：易当怪癖，需点社会。\n② 典型性。原因：易当个人，需指一类人。\n③ 讽刺。原因：易只笑，需品沉。","teachingMethods":"① 套子枚举法。\n② 象征解码法。\n③ 讽刺品读法（可笑/可悲）。\n④ 对比法（与前两篇）。","preparation":"【PPT课件】P1 契诃夫与沙俄；P2 套子表现（行为/思想）；P3 象征（专制扼个性）；P4 讽刺（夸张/沉重）；P5 对比（祥/林）；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——怪人别里科夫","time":"5分钟","content":"【PPT P1 契】教师：「别里科夫晴天穿雨鞋、带棉大衣、把脸藏在衣领里——怪吗？但全城怕他。为何？」 预设回答：「他代表旧势力，告密卫道！」 板书时机：黑板写「套中人：怪→怕」。差异化提示：B班说怪；A班需联时代。易错点提醒：别里科夫「怪」是表象——读时想「怪背后是谁」，他代言的是专制。"},{"step":"Step 2 套子","time":"13分钟","content":"【PPT P2 套子】教师：「套子两层：①行为(雨鞋/棉大衣/帐子)②思想(怕新事物、逢事禀告、禁这禁那)。他把人「套死」。」 学生枚举。板书时机：黑板列两层。差异化提示：B班说行为；A班需说思想层。易错点提醒：套子重「思想」——行为怪可笑，思想禁才可怕，读时分层看。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 象征","time":"12分钟","content":"【PPT P3 象征】教师：「象征：套子=沙皇专制下保守势力的「规矩」，把鲜活人性套成标本。别里科夫是「一类人」的符号。」 板书时机：黑板写「套子=专制扼个性」。差异化提示：B班记象征；A班需说典型。易错点提醒：读讽刺小说看「符号」——别里科夫不止他一人，是时代群像的浓缩。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 讽刺","time":"8分钟","content":"【PPT P4 讽刺】教师：「讽刺：夸张(晴天雨鞋)显可笑，但可笑下是沉重——一个套子压垮全城，悲大于笑。」 板书时机：黑板写「讽：可笑↔沉重」。差异化提示：B班说可笑；A班需说沉。易错点提醒：讽刺不只为笑——契诃夫笑里藏刀，读时从可笑翻到可悲。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 对比","time":"4分钟","content":"【PPT P5 比】教师：「与前两篇比：祥被吃、林被逼、别被套——三人都被环境塑，只是国别手法异。」 板书时机：黑板写「吃/逼/套」。差异化提示：B班听；A班需说异。易错点提醒：小说跨时空共写「人与环境」——读多国小说也见同一命题。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"3分钟","content":"【PPT P6 练习】教师：「小说读法？」 预设回答：「抓形象→解象征→品讽刺！」 板书时机：板书读法。差异化提示：B班背套子；A班写80字「我眼中的套子」。易错点提醒：下节课读《促织》《变形记》，看荒诞与异化。"}],"blackboard":"┌── 套中人·契 ──┐\n│ 怪→怕          │\n│                │\n│ 套子两层:       │\n│ 行为(雨鞋棉衣)  │\n│ 思想(怕新禁异)  │\n│                │\n│ 象征:           │\n│ 专制扼个性      │\n│ 讽:可笑↔沉重   │\n└────────────────┘","exercises":"【基础作业】1. 写出「套子」在文中的一处表现（行为或思想）。2. 说「套子」象征什么。\n【提高作业】写150字「我眼中的套子」，要求：①联表现一处；②说象征；③不肤浅笑。\n【参考答案——教师用】基础1：如晴天穿雨鞋、怕新事物。基础2：沙皇专制保守对个性的扼杀。提高作业评价：表现+象征+不肤浅=良好；有见地=优秀。","reflection":"✅ 亮点：套子两层（行为/思想）让象征落地，B班也懂；讽刺「可笑↔沉重」破纯搞笑；对比（吃/逼/套）显命题共通。\n⚠️ 需改进：B班对沙俄背景仍薄，部分只当怪人；下次加1分钟背景。\n📌 下节课衔接：下节课《促织》《变形记》，荒诞与异化。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T15:00:00Z"},{"id":"l-cn-bx-u6-5","lessonId":"l-cn-bx-u6-5","title":"促织与变形记 比较精读——荒诞笔法下的异化","book":"必修下册","unitNumber":6,"unitTitle":"文学阅读与写作（小说）","taskGroup":"文学阅读与写作","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":5,"duration":45,"grade":"高一","subject":"语文","tags":["小说","蒲松龄","卡夫卡","异化","人教版必修下U6","第五课时"],"textbookAnalysis":"《促织》（蒲松龄）写成名因供促织（蟋蟀）而家破，子化虫救父，荒诞中见政治压榨；《变形记》（卡夫卡）写格里高尔变甲虫，被家人厌弃而死，荒诞中见现代人的异化孤独。两文同用「变形」荒诞，指向不同苦难。","overview":"【学情分析】A班：能跟两文「变形」的象征与异化主题，可深入中西差异；赏荒诞。B班：情节懂但「异化」读不出；当怪谈。共同问题：当神怪/怪谈读，抓不住「变形」的社会/人性批判；不察荒诞背后的真实痛。","objectives":["语言能力：说出两文「变形」情节及其象征，比较二者异化主题的同与异。","文化意识：体会中西小说以荒诞写真实的批判智慧。","思维品质：通过比较培养由荒诞到本质、跨文化比照思维。","学习能力：掌握「抓变形、解异化、比中西」的比较读法。"],"keyPoints":"① 促织：子化虫(救父)，荒诞显政治压榨(媚上)。\n② 变形记：人格甲虫(被弃)，荒诞显现代性异化孤独。\n③ 同：变形写真实痛；异：政治vs人性。","difficulties":"① 异化解。原因：抽象，需点「失为人」。\n② 中西异。原因：易混，需分政治/人性。\n③ 荒诞。原因：易当怪谈，需品真。","teachingMethods":"① 变形解码法。\n② 异化阐释法。\n③ 中西比照法。\n④ 荒诞品读法。","preparation":"【PPT课件】P1 两文与作者；P2 促织变形（子化虫/政治）；P3 变形记（人格虫/人性）；P4 异化主题；P5 中西异（政治vs人性）；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——人变虫","time":"5分钟","content":"【PPT P1】教师：「两文都「变」：促织里儿子变蟋蟀，变形记里人格甲虫。为何写人变虫？」 预设回答：「用荒诞写真实的苦！」 板书时机：黑板写「变形：荒诞写真」。差异化提示：B班说变；A班需联批判。易错点提醒：荒诞是「外衣」——变虫不是真信，是用怪写痛，读时扒开怪看真。"},{"step":"Step 2 促织","time":"13分钟","content":"【PPT P2 促织】教师：「成名子化蟋蟀，勇斗取胜，救全家于赋税之苦。荒诞下是政治压榨：小虫牵动一家生死，媚上之酷。」 板书时机：黑板写「促织：虫救父·政治压」。差异化提示：B班说情节；A班需说政治。易错点提醒：蒲松龄借怪讽政——虫之重显人命之轻，读时想「谁让虫这么重」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 变形记","time":"12分钟","content":"【PPT P3 变形】教师：「格里高尔变甲虫，失用即被家人厌弃、孤独死。荒诞下是现代异化：人沦为「有用性」，无价值便被弃。」 板书时机：黑板写「变形记：虫被弃·人性异」。差异化提示：B班说情节；A班需说异化。易错点提醒：卡夫卡写「被弃」——变虫是外化，真痛是家人冷漠，读时品孤独。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 异化","time":"8分钟","content":"【PPT P4 异化】教师：「异化=人失去为人之本：成名家被虫奴役(政治异化)，格里高尔被价值抛弃(人性异化)。都「不像人」。」 板书时机：黑板写「异化：失为人」。差异化提示：B班记词；A班需各举一处。易错点提醒：异化是核心词——两文都让人「不像人」，读时想「哪步失了人性」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 中西异","time":"4分钟","content":"【PPT P5 异】教师：「同用变形，异在指向：促织刺政治压榨(中)，变形记写人性孤独(西)。一题两解。」 板书时机：黑板写「政治↔人性」。差异化提示：B班听；A班需说异。易错点提醒：跨文化比看「同手法异关怀」——荒诞是桥，痛处各不同。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"3分钟","content":"【PPT P6 练习】教师：「比较读法？」 预设回答：「抓变形→解异化→比中西！」 板书时机：板书读法。差异化提示：B班背变形；A班写80字「我懂的异化」。易错点提醒：下节课方法指导，学写小说/文学短评。"}],"blackboard":"┌── 促织·变形 ──┐\n│ 变形:荒诞写真   │\n│                │\n│ 促织:虫救父     │\n│ 政治压(媚上)    │\n│                │\n│ 变形记:人格虫   │\n│ 人性异(被弃)    │\n│                │\n│ 异化:失为人     │\n│ 中西:政治↔人性  │\n└────────────────┘","exercises":"【基础作业】1. 写出两文「变形」情节各一处。2. 说「异化」在《变形记》中的一处体现。\n【提高作业】写150字比较，要求：①各引变形；②说异化同异；③点中西关怀。\n【参考答案——教师用】基础1：促织子化蟋蟀、变形记人格甲虫。基础2：格里高尔变虫后被家人厌弃。提高作业评价：变形+异化+中西=良好；有见地=优秀。","reflection":"✅ 亮点：变形解码（荒诞写真）让怪谈见痛，B班也懂；异化阐释（失为人）立核心；中西异（政治/人性）拓视野。\n⚠️ 需改进：B班对「异化」仍抽象，部分只记情节；下次加生活例（如被成绩定义）。\n📌 下节课衔接：下节课方法指导，学写小说/文学短评。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T15:00:00Z"},{"id":"l-cn-bx-u6-6","lessonId":"l-cn-bx-u6-6","title":"方法指导——学写小说短评（人物·环境·主题）","book":"必修下册","unitNumber":6,"unitTitle":"文学阅读与写作（小说）","taskGroup":"文学阅读与写作","lessonType":"fangfa","lessonTypeName":"方法指导","periodNumber":6,"duration":45,"grade":"高一","subject":"语文","tags":["小说","写作","文学短评","人教版必修下U6","第六课时"],"textbookAnalysis":"本课为第六单元写作任务，写小说短评（如评祥林嫂/林冲一人物形象，或评某环境作用，300字）。要点：①定靶（评谁/哪点）；②引文（原句支撑）；③分析（结合人物/环境/主题）；④收束。学生常写成「我喜欢」感言或情节复述。","overview":"【学情分析】A班：能写有分析短评，但「结合主题」弱；可深入。B班：写成「好看/惨」感言或复述情节；无靶无据。共同问题：无靶（不定点）、无据（不引文）、无析（只表态）；把评论当读后感。","objectives":["语言能力：写一篇小说短评（300字），做到定点明确、引文支撑、结合人物/环境/主题分析。","文化意识：在写作中体会「以文本证观点」的文学批评态度。","思维品质：通过格式约束，培养聚焦与论证思维。","学习能力：掌握短评「定靶+引文+分析+收束」写法。"],"keyPoints":"① 定靶：评一形象/一环境/一主题。\n② 引文：原句支撑。\n③ 分析：联人物/环境/主题。\n④ 避坑：不写感言/不复述。","difficulties":"① 定靶。原因：易泛，需缩小。\n② 引文。原因：易空评，需原句。\n③ 分析。原因：易表态，需结合。","teachingMethods":"① 靶心法：缩小。\n② 引文示范法。\n③ 升格法：感言→评论。\n④ 互评法。","preparation":"【PPT课件】P1 四步；P2 定靶（评祥林嫂「看客」）；P3 引文（原句）；P4 分析（联环境主题）；P5 升格（感言→评）；P6 互评量表。\n【实物教具】便签。\n【音频】无。","process":[{"step":"Step 1 四步","time":"5分钟","content":"【PPT P1】教师：「短评四步：①定靶(评啥点)②引文(原句)③分析(联人物环境主题)④收束。四缺一就像『我喜欢』。」 板书时机：黑板写「靶/文/析/束」。差异化提示：B班听；A班需说关系。易错点提醒：评论不是读后感——它要「用文本证观点」，先想「我评哪点」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 定靶","time":"12分钟","content":"【PPT P2 靶】教师：「定靶要小：不评『祥林嫂』整人，评『祥林嫂与看客的冷漠』。靶小才好打。」 学生定靶。板书时机：黑板列靶例。差异化提示：B班选易靶；A班需缩小。易错点提醒：靶越小越深——「评环境作用」太大，「评祝福反衬其死」刚好，写前缩靶。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 引文","time":"10分钟","content":"【PPT P3 引文】教师：「引原句：如『只觉得天地圣众歆享了牲醴和香烟』反衬死之孤。引文是证据 ethods":"① 典型讲评法。\n② 对比修改法。\n③ 同伴互改法。\n④ 教师现场改稿。","preparation":"【PPT课件】P1 三标准；P2 典型A(无靶)+改；P3 典型B(无引文)+改；P4 典型C(无分析)+改；P5 现场改稿；P6 论坛预告。\n【实物教具】学生短评（收选3篇）。\n【音频】无。","process":[{"step":"Step 1 回顾三标准","time":"3分钟","content":"【PPT P1 三标准】教师：「好短评：靶小、有引文、分析深。记牢。」 预设回答：「靶小+引文+分析！」 板书时机：黑板写三标准配问。差异化提示：B班背；A班解释。易错点提醒：三标准缺一不可——无靶=散，无文=空，无析=表。"},{"step":"Step 2 讲评典型A——无靶","time":"8分钟","content":"【PPT P2 典型A】展示泛稿：「祥林嫂是个可怜人。」教师：「缩靶：评『祥林嫂与看客的冷漠』，才好打。」 板书时机：黑板左「A：缩靶」。差异化提示：B班说改；A班需说每处。易错点提醒：缩靶用「加限定」——把整人缩到一点（看客/环境），评论才聚焦。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 讲评典型B——无引文","time":"8分钟","content":"【PPT P3 典型B】展示空评：「环境反衬很妙。」教师：「补原句：『天地圣众歆享…』反衬死之孤。无文不立。」 板书时机：黑板中「B：补引文」。差异化提示：B班说空；A班析改。易错点提醒：补文用原句——评论靠证据，读时看「句在哪」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 讲评典型C——无分析","time":"6分钟","content":"【PPT P4 典型C】展示表态：「显礼教吃人。」教师：「展开：看客当谈资→麻木即帮凶→礼教之恶在无声。别只贴标签。」 板书时机：黑板右「C：加分析」。差异化提示：B班说浅；A班提改。易错点提醒：分析要「展开」——从引文推到主题，一步步说清，不贴标签。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 现场改稿","time":"8分钟","content":"【PPT P5 改稿】教师选稿A当场缩靶+补文。板书时机：黑板前后对比。差异化提示：B班看结果；A班说每处理由。易错点提醒：改是改更好，同一稿可多方向优化。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 终稿互签","time":"12分钟","content":"【PPT P6 环节说明】教师：「据讲评改终稿，同桌互签一句评语。」 学生改+签。板书时机：教师巡选优稿备论坛。差异化提示：B班改1-2处；A班改3处+自评。易错点提醒：互签写具体，如「这句引文撑得好」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 小说评讲评 ──┐\n│ 【三标准】       │\n│ 靶小·引文·析深  │\n│                │\n│ A:缩靶          │\n│ B:补引文        │\n│ C:加分析        │\n│                │\n│ 改三方向:       │\n│ 缩/补/展        │\n└────────────────┘","exercises":"【基础作业】1. 提交终稿（改后）+互签评语。2. 写50字自评：我改了什么、为什么。\n【提高作业】在终稿加一层「主题关联」分析，使评论更有高度。\n【参考答案——教师用】终稿评价：靶小+引文+分析=合格；优者=良好。自评评价：说清改了=合格。","reflection":"✅ 亮点：三典型精准，缩靶改法学生直呼「原来这样」；补引文立证据；加分析破贴标签。\n⚠️ 需改进：B（无靶）讲评时部分仍评整人，需给「限定词库」；下次加。\n📌 下节课衔接：下节课人物论坛。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T15:00:00Z"},{"id":"l-cn-bx-u6-8","lessonId":"l-cn-bx-u6-8","title":"单元活动——小说人物论坛与文学反思","book":"必修下册","unitNumber":6,"unitTitle":"文学阅读与写作（小说）","taskGroup":"文 bx-u7-3","lessonId":"l-cn-bx-u7-3","title":"专题研讨——宝黛钗人物形象比较","book":"必修下册","unitNumber":7,"unitTitle":"整本书阅读与研讨（红楼梦）","taskGroup":"整本书阅读与研讨","lessonType":"yantao","lessonTypeName":"专题研讨","periodNumber":3,"duration":45,"grade":"高一","subject":"语文","tags":["整本书","红楼梦","宝黛钗","人物形象","人教版必修下U7","第三课时"],"textbookAnalysis":"本课研讨宝黛钗三人：宝玉（厌仕途、重情）、黛玉（孤傲、才情、泪尽而亡）、宝钗（端庄、世故、金玉良缘）。比较三人性格与命运，理解「木石前盟vs金玉良缘」的悲剧内核。需结合前80回与人物卡。","overview":"【学情分析】A班：能深比三人性格与悲剧意味，可深入「金玉vs木石」；赏曹笔。B班：三人混（尤其黛钗），命运不清；只记「三角恋」。共同问题：当言情读，抓不住性格背后的文化悲剧；不联判词命运。","objectives":["语言能力：说出宝黛钗各自性格特点与命运结局，比较「木石前盟」与「金玉良缘」的悲剧意味。","文化意识：理解三人命运折射的封建家族与婚恋悲剧。","思维品质：通过比较三人，培养立体看人与因果思维。","学习能力：掌握「人物卡+判词」的整本研讨法。"],"keyPoints":"① 宝玉：厌仕途经济、重情。\n② 黛玉：孤傲才情、泪尽亡(木石)。\n③ 宝钗：端庄世故、金玉良缘(守寡)。\n④ 内核：自由情vs礼教婚。","difficulties":"① 黛钗辨。原因：易混，需对比。\n② 悲剧内核。原因：易当言情，需升文化。\n③ 判词联。原因：易忘伏笔，需对。","teachingMethods":"① 人物卡对照法。\n② 命运解码法（判词）。\n③ 内核提炼法：木石vs金玉。\n④ 研讨发言法。","preparation":"【PPT课件】P1 三人像；P2 宝黛钗性格卡对照；P3 判词解码（黛/钗/玉）；P4 木石vs金玉；P5 悲剧内核；P6 研讨题。\n【实物教具】人物卡（前课建）。\n【音频】无。","process":[{"step":"Step 1 导入——三人一台","time":"5分钟","content":"【PPT P1】教师：「宝玉、黛玉、宝钗，红楼三角。但非通俗言情——是三种人生与一场悲剧。今天用卡比他们。」 预设回答：「黛玉宝钗老混，今天要分清！」 板书时机：黑板写「宝黛钗：三角·非言情」。差异化提示：B班说三人；A班需联悲剧。易错点提醒：红楼「三角」是壳——内里是性格与命运的碰撞，读时想「他们各自代表什么」。"},{"step":"Step 2 性格卡","time":"13分钟","content":"【PPT P2 卡】教师：「对照：宝玉(厌仕途重情)、黛玉(孤傲才情真)、宝钗(端庄世故稳)。三人三态。」 学生补卡。板书时机：黑板列三栏。差异化提示：B班说各1词；A班需各补例。易错点提醒：比性格看「待人处事」——黛玉真而脆、宝钗稳而藏，读时抓细节分。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 判词","time":"12分钟","content":"【PPT P3 判词】教师：「对判词：黛玉『玉带林中挂』(泪尽)、宝钗『金簪雪里埋』(冷守)、宝玉『落了片白茫茫』(出家)。开头已定结局。」 板书时机：黑板列判词。差异化提示：B班记结局；A班需说伏笔。易错点提醒：判词是「结局钥匙」——第五回早埋，读时回头对，命运动人。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 木石vs金玉","time":"8分钟","content":"【PPT P4 两盟】教师：「木石前盟(宝黛自由情)vs金玉良缘(宝钗礼教婚)。悲剧在：真心者散，合规者空。」 板书时机：黑板写「木石↔金玉」。差异化提示：B班记两词；A班需说悲。易错点提醒：两盟是「命题」——自由情与礼教婚的冲突，才是红楼爱情悲的核心。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 内核","time":"5分钟","content":"【PPT P5 内核】教师：「内核：三人命运折射封建家族包办婚恋+女儿悲剧。非谁错，是时代错。」 板书时机：黑板写「时代悲」。差异化提示：B班听；A班需整合。易错点提醒：升一层——别怪某人不嫁，怪的是礼教与家族，读时问「谁之过」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 研讨","time":"2分钟","content":"【PPT P6 题】教师：「分组谈：你更怜谁？为何？下节课进贾府环境。」 板书时机：黑板「研讨」。差异化提示：B班写1句；A班发言。易错点提醒：研讨重「文本支撑」——说怜谁要引细节，别空叹。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 宝黛钗 ──┐\n│ 三角·非言情    │\n│                │\n│ 性格:           │\n│ 玉:厌仕重情    │\n│ 黛:孤傲才情    │\n│ 钗:端庄世故    │\n│                │\n│ 判词定局:       │\n│ 黛泪尽/钗守寡/ │\n│ 玉出家          │\n│ 木石↔金玉      │\n│ 内核:时代悲     │\n└────────────────┘","exercises":"【基础作业】1. 写出宝黛钗各一个性格词。2. 说「木石前盟」与「金玉良缘」分别指什么。\n【提高作业】写150字「我更怜谁」，要求：①定一人；②引一处细节/判词；③说悲剧意味。\n【参考答案——教师用】基础1：宝玉厌仕途、黛玉孤傲、宝钗世故（各1）。基础2：木石=宝黛自由情，金玉=宝钗礼教婚。提高作业评价：定人+引文+悲意=良好；有深度=优秀。","reflection":"✅ 亮点：性格卡对照让黛钗不混，B班也分清；判词解码（开头定局）显匠心；木石vs金玉点出命题，破「言情读」。\n⚠️ 需改进：B班对「金玉良缘」仍糊，部分不知金锁；下次加道具注。\n📌 下节课衔接：下节课贾府环境与文化空间。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T15:20:00Z"},{"id":"l-cn-bx-u7-4","lessonId":"l-cn-bx-u7-4","title":"专题研讨——贾府环境与文化空间","book":"必修下册","unitNumber":7,"unitTitle":"整本书阅读与研讨（红楼梦）","taskGroup":"整本书阅读与研讨","lessonType":"yantao","lessonTypeName":"专题研讨","periodNumber":4,"duration":45,"grade":"高一","subject":"语文","tags":["整本书","红楼梦","环境","大观园","人教版必修下U7","第四课时"],"textbookAnalysis":"本课研讨《红楼梦》的空间书写：贾府（荣宁二府的等级秩序）、大观园（女儿净土/青春囚笼）、环境与人物命运的互文（如潇湘馆衬黛玉、蘅芜苑衬宝钗）。环境是「无声的人物」，承载文化象征。","overview":"【学情分析】A班：能跟空间象征与人物互文，可深入「大观园=囚笼」；赏匠心。B班：环境当布景，不知其意；潇湘馆等不知属谁。共同问题：当地理读，抓不住空间的文化象征；不察「居所即性格」。","objectives":["语言能力：说出贾府/大观园的空间特点，解释「居所映性格」（如潇湘馆衬黛玉）的环境写法。","文化意识：理解空间书写中的封建等级与女儿悲剧。","思维品质：通过分析空间象征，培养「环境即人物」的互文思维。","学习能力：掌握整本书「空间—人物」研讨法。"],"keyPoints":"① 贾府：等级秩序(正偏/尊卑)。\n② 大观园：女儿净土亦是囚笼。\n③ 居所映人：潇湘馆(竹·孤)衬黛、蘅芜苑(雪·冷)衬钗。","difficulties":"① 空间象征。原因：易当布景，需点文化。\n② 居所互文。原因：易不知属谁，需对。\n③ 囚笼解。原因：易当乐园，需点悲。","teachingMethods":"① 空间图解法。\n② 居所互文法（竹/雪）。\n③ 象征解码法。\n④ 研讨法。","preparation":"【PPT课件】P1 贾府平面图（简）；P2 等级秩序；P3 大观园（净土/囚笼）；P4 居所映人（潇湘/蘅芜）；P5 象征；P6 研讨题。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——住哪即是谁","time":"5分钟","content":"【PPT P1】教师：「红楼里人住哪，性子就透出来：黛玉住竹(潇湘馆)，宝钗住雪(蘅芜苑)。环境会『说话』。」 预设回答：「住竹的多清高，住雪的多冷静，绝了！」 板书时机：黑板写「居所=性格」。差异化提示：B班说现象；A班需联象征。易错点提醒：整本读环境看「互文」——曹雪芹以居所写人，读时把住所当人物注脚。"},{"step":"Step 2 贾府","time":"12分钟","content":"【PPT P2 等级】教师：「贾府空间讲等级：正房(贾母/政)尊、偏院(宝玉/众钗)次、后角(仆)卑。空间即礼法。」 学生记。板书时机：黑板画等级。差异化提示：B班记尊卑；A班需说礼法。易错点提醒：空间显秩序——谁住哪暴露地位，读时看「门第如何压人」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 大观园","time":"12分钟","content":"【PPT P3 园】教师：「大观园：表面女儿净土(诗酒青春)，实是贵族囚笼(出园即婚配沉沦)。美景藏悲。」 板书时机：黑板写「净土↔囚笼」。差异化提示：B班说美；A班需说悲。易错点提醒：大观园「美而哀」——是青春最后乐园也是牢，读时想「她们出得去吗」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 居所互文","time":"10分钟","content":"【PPT P4 互文】教师：「潇湘馆(凤尾竹·清泪)衬黛玉孤傲泪尽；蘅芜苑(雪洞无饰·冷)衬宝钗端庄守寡。居所即判词。」 板书时机：黑板列互文。差异化提示：B班记各属谁；A班需说衬。易错点提醒：互文是曹笔妙——居所细节(竹/雪)提前写命，读时回头对性格。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 象征","time":"4分钟","content":"【PPT P5 象征】教师：「空间总象征：贾府盛衰的容器、女儿悲剧的舞台。环境非背景，是『无声人物』。」 板书时机：黑板写「环境=无声人物」。差异化提示：B班听；A班需整合。易错点提醒：升一层——整本书里空间承载文化（等级/女儿命），读时想「空间说什么」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 研讨","time":"2分钟","content":"【PPT P6 题】教师：「选一居所，谈它如何映其人。下节课看语言诗词。」 板书时机：黑板「研讨」。差异化提示：B班写1句；A班发言。易错点提醒：研讨引居所描写支撑，别空说。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 空间书写 ──┐\n│ 居所=性格       │\n│                │\n│ 贾府:等级秩序   │\n│ 正尊/偏次/卑    │\n│                │\n│ 大观园:         │\n│ 净土↔囚笼       │\n│                │\n│ 居所互文:       │\n│ 潇湘(竹)衬黛    │\n│ 蘅芜(雪)衬钗    │\n│ 环境=无声人物   │\n└────────────────┘","exercises":"【基础作业】1. 写出贾府空间体现的秩序（如尊卑）。2. 说潇湘馆（竹）映黛玉什么特点。\n【提高作业】写150字「我选的居所」，要求：①定一居所；②引描写；③说如何映人。\n【参考答案——教师用】基础1：等级（正房尊、偏院次、后角卑）。基础2：竹映孤傲清高、泪尽之悲。提高作业评价：定居+引文+映人=良好；有见地=优秀。","reflection":"✅ 亮点：居所互文（竹/雪）让环境「说话」，B班也懂；大观园「净土↔囚笼」破乐园误读；空间即礼法显文化。\n⚠️ 需改进：B班对大观园布局仍乱，部分不知园在哪；下次给简平面图。\n📌 下节课衔接：下节课语言与诗词。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T15:20:00Z"},{"id":"l-cn-bx-u7-5","lessonId":"l-cn-bx-u7-5","title":"专题研讨——《红楼梦》的语言与诗词","book":"必修下册","unitNumber":7,"unitTitle":"整本书阅读与研讨（红楼梦）","taskGroup":"整本书阅读与研讨","lessonType":"yantao","lessonTypeName":"专题研讨","periodNumber":5,"duration":45,"grade":"高一","subject":"语文","tags":["整本书","红楼梦","语言","诗词","人教版必修下U7","第五课时"],"textbookAnalysis":"本课研讨《红楼梦》的语言与诗词：①人物语言个性化（凤姐泼辣、黛玉尖巧、宝钗周全）；②诗词（黛玉《葬花吟》悲身世、海棠诗显性格）；③文白相间雅俗共赏。语言是红楼又一高峰。","overview":"【学情分析】A班：能跟语言个性化与诗词悲音，可深入「文白雅俗」；赏语言。B班：知道诗美但不知「谁写的显谁性」；人物语言混。共同问题：当美文读，抓不住「语言即性格」；诗词不联人物。","objectives":["语言能力：举出人物语言个性化之例（如凤姐/黛玉），说出《葬花吟》与黛玉命运的关联。","文化意识：体会《红楼梦》「文白雅俗共赏」的语言艺术与诗词抒情传统。","思维品质：通过分析语言与诗词，培养「言为心声」的互文思维。","学习能力：掌握整本「语言—人物」研讨法。"],"keyPoints":"① 语言个性化：凤姐泼/黛尖/钗稳。\n② 诗词抒情：葬花吟(悲身世)、海棠诗(显性)。\n③ 文白雅俗共赏。","difficulties":"① 个性辨。原因：易混，需对。\n② 诗词联。原因：易当美文，需联命。\n③ 文白。原因：易畏，需点俗白处。","teachingMethods":"① 语言对比法（三人口）。\n② 诗词解码法（葬花）。\n③ 文白辨读法。\n④ 诵读法。","preparation":"【PPT课件】P1 三人口吻；P2 凤/黛/钗语言例；P3 葬花吟解码；P4 海棠诗显性；P5 文白雅俗；P6 研讨题。\n【实物教具】无。\n【音频】葬花吟吟唱。","process":[{"step":"Step 1 导入——开口即知人","time":"5分钟","content":"【PPT P1】教师：「红楼里谁说话你一听就知：凤姐爽利带刺、黛玉尖巧带刺、宝钗周全不刺。语言是身份证。」 预设回答：「凤姐那句『我来迟了』太招牌了！」 板书时机：黑板写「语言=身份证」。差异化提示：B班说现象；A班需联性格。易错点提醒：整本读语言看「谁说」——曹雪芹让每人有口吻，读时听声辨人。"},{"step":"Step 2 三口吻","time":"13分钟","content":"【PPT P2 例】教师：「对三口：凤姐『天下真有这样标致人物』(捧中带威)、黛玉『我就知道』(尖中含妒)、宝钗『倒是丢了什么』(稳中化险)。」 学生品。板书时机：黑板列三例。差异化提示：B班说各1；A班需说性格。易错点提醒：比口吻看「潜台词」——同样事三人说法异，正显性格，读时品字里。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 葬花","time":"12分钟","content":"【PPT P3 葬花】教师：「《葬花吟》『一朝春尽红颜老，花落人亡两不知』——非仅伤春，是黛玉预感孤亡的悲音，与判词呼应。」 板书时机：黑板写「葬花=预亡」。差异化提示：B班记悲；A班需联判词。易错点提醒：诗词是「心声」——黛玉诗即命，读时把诗当判词读，悲音早发。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 海棠诗","time":"8分钟","content":"【PPT P4 海棠】教师：「海棠诗社：黛玉『半卷湘帘半掩门』显孤洁，宝钗『胭脂洗出秋阶影』显沉稳。诗显性。」 板书时机：黑板写「诗显性」。差异化提示：B班记各1；A班需说显何性。易错点提醒：诗如其人——谁写何调，正照性格，读时把诗对回人物。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 文白","time":"4分钟","content":"【PPT P5 文白】教师：「语言文白雅俗共赏：对话俗白活（刘姥姥），诗词文雅（众钗），雅俗各得其所。」 板书时机：黑板写「雅俗共赏」。差异化提示：B班听；A班需举一俗例。易错点提醒：别畏文言——红楼俗白处极多（市井对话），读时从俗入雅。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 研讨","time":"3分钟","content":"【PPT P6 题】教师：「选一人，品其语言如何显性格。下节课专题研讨。」 板书时机：黑板「研讨」。差异化提示：B班写1句；A班发言。易错点提醒：研讨引原话支撑，别空评。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 红楼语言诗词 ──┐\n│ 语言=身份证     │\n│                │\n│ 三口吻:         │\n│ 凤:爽利带威     │\n│ 黛:尖巧含妒     │\n│ 钗:周全化险     │\n│                │\n│ 葬花=预亡       │\n│ 海棠诗显性      │\n│ 雅俗共赏        │\n└────────────────┘","exercises":"【基础作业】1. 写出凤姐/黛玉/宝钗语言各一个特点。2. 说《葬花吟》与黛玉命运的关联。\n【提高作业】写150字「我品的语言」，要求：①定一人；②引一句原话；③说如何显性格。\n【参考答案——教师用】基础1：凤爽利带威、黛尖巧、钗周全（各1）。基础2：葬花悲音预感孤亡，与判词呼应。提高作业评价：定人+引话+显性=良好；有见地=优秀。","reflection":"✅ 亮点：三口吻对比（凤/黛/钗）让语言「辨人」，B班也懂；葬花=预亡点出诗词即命；雅俗共赏破文言畏难。\n⚠️ 需改进：B班对《葬花吟》仍只当伤春，部分不联判词；下次强联伏笔。\n📌 下节课衔接：下节课专题研讨（悲剧意蕴/女性观）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T15:20:00Z"},{"id":"l-cn-bx-u7-6","lessonId":"l-cn-bx-u7-6","title":"专题研讨——《红楼梦》的悲剧意蕴与女性观","book":"必修下册","unitNumber":7,"unitTitle":"整本书阅读与研讨（红楼梦）","taskGroup":"整本书阅读与研讨","lessonType":"yantao","lessonTypeName":"专题研讨","periodNumber":6,"duration":45,"grade":"高一","subject":"语文","tags":["整本书","红楼梦","悲剧","女性观","人教版必修下U7","第六课时"],"textbookAnalysis":"本课深化专题：①悲剧意蕴（家族盛衰+女儿群悲剧+「千红一哭」）；②女性观（曹雪芹以悲悯写女儿，肯定才情却写其被毁，含进步与局限）。是整本书研讨的升华。","overview":"【学情分析】A班：能深入悲剧多重意蕴与女性观的进步/局限，可写有小论文；思辩强。B班：知「都死了」但说不清悲剧层次；女性观当「尊重」简单化。共同问题：悲剧读单层（只言情），不析家族/时代；女性观不辨进步与局限。","objectives":["语言能力：说出《红楼梦》悲剧的多重意蕴（家族/女儿/时代），分析其女性观的进步与局限。","文化意识：理解曹雪芹以悲悯写女儿的文化立场与时代局限。","思维品质：通过多层分析，培养辩证与历史眼光。","学习能力：掌握整本专题「升华研讨」法。"],"keyPoints":"① 悲剧三层：家族盛衰/女儿群毁/时代无常。\n② 女性观：悲悯写女儿、肯才情(进步)但终归「千红一哭」(局限)。\n③ 辩证：进步+局限。","difficulties":"① 多层悲。原因：易单层，需框架。\n② 女性观。原因：易简化，需辨进退。\n③ 历史眼。原因：易全否/全肯，需辩证。","teachingMethods":"① 悲剧分层法。\n② 女性观辩证法（进/局）。\n③ 历史眼光法。\n④ 小论文支架法。","preparation":"【PPT课件】P1 悲剧三层；P2 家族/女儿/时代；P3 女性观（悲悯/肯才情）；P4 进步与局限；P5 历史眼光；P6 小论文题。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——不止言情","time":"5分钟","content":"【PPT P1】教师：「红楼悲剧不止宝黛。它是家族盛衰、女儿群毁、时代无常的三重悲。今天升一层。」 预设回答：「原来不止三角恋，是时代的悲！」 板书时机：黑板写「悲剧三重」。差异化提示：B班说知；A班需联层。易错点提醒：整本读悲剧看「层次」——从一人之悲到一家之亡到一代之叹，读时逐级升。"},{"step":"Step 2 三层","time":"13分钟","content":"【PPT P2 层】教师：「三层：①家族(贾府由盛抄衰)②女儿(金陵十二钗皆悲剧)③时代(封建末世无常)。层叠成『千红一哭』。」 学生填。板书时机：黑板画三层。差异化提示：B班说1-2层；A班需全。易错点提醒：三层互文——女儿毁映家族败映时代昏，读时把三层串起。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 女性观","time":"12分钟","content":"【PPT P3 观】教师：「女性观：曹以悲悯写女儿，肯其才情(黛玉诗、探春理家)，在男尊女卑时代极进步。」 板书时机：黑板写「悲悯写女儿」。差异化提示：B班记进步；A班需举才女。易错点提醒：女性观看「肯才情」——曹把女儿写活写贵，是超越时代的目光。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 进退","time":"10分钟","content":"【PPT P4 进退】教师：「但局限：仍逃不出『千红一哭』宿命，女儿终归薄命，未给真正出路。进步中含无奈。」 板书时机：黑板写「进步+局限」。差异化提示：B班听；A班需说局限。易错点提醒：辩证看——不神化曹雪芹，进步是相对时代，局限是时代所囿，读时两看。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 历史眼","time":"3分钟","content":"【PPT P5 眼】教师：「用历史眼光：放在清中期男权语境，曹的悲悯已超前；但『宿命』仍是其时代天花板。」 板书时机：黑板写「历史眼光」。差异化提示：B班听；A班需说。易错点提醒：评价古人「知人论世」——不拿今标苛古，也不盲目捧，读时摆正坐标。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小论文","time":"2分钟","content":"【PPT P6 题】教师：「据三层+女性观，写一篇小论文(下节课交)。」 板书时机：黑板「升华→文」。差异化提示：B班写提纲；A班写全。易错点提醒：小论文重「分层论证」——三层+进退，结构清才有说服力。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 红楼悲剧女性 ──┐\n│ 悲剧三重:       │\n│ 家族/女儿/时代  │\n│                │\n│ 女性观:         │\n│ 悲悯写女儿      │\n│ 肯才情(进步)    │\n│ 千红一哭(局限)  │\n│                │\n│ 辩证:进步+局限  │\n│ 历史眼光        │\n└────────────────┘","exercises":"【基础作业】1. 写出悲剧的三层意蕴（任2）。2. 说曹雪芹女性观的一个进步点。\n【提高作业】写200字小论文提纲，要求：①列三层；②点女性观进退；③有自己观点。\n【参考答案——教师用】基础1：家族盛衰、女儿群毁、时代无常（任2）。基础2：悲悯写女儿、肯定才情。提高作业评价：三层+进退+观点=良好；有辩证=优秀。","reflection":"✅ 亮点：悲剧三层（家族/女儿/时代）让悲不单层，B班也懂框架；女性观辩证（进/局）破简单化；历史眼光立坐标。\n⚠️ 需改进：B班对「时代局限」仍抽象，部分全肯曹；下次给「清中期语境」注。\n📌 下节课衔接：下节课读书报告写作与讲评。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T15:20:00Z"},{"id":"l-cn-bx-u7-7","lessonId":"l-cn-bx-u7-7","title":"写作指导与讲评——红楼读书报告","book":"必修下册","unitNumber":7,"unitTitle":"整本书阅读与研讨（红楼梦）","taskGroup":"整本书阅读与研讨","lessonType":"xiezuo","lessonTypeName":"写作实践","periodNumber":7,"duration":45,"grade":"高一","subject":"语文","tags":["整本书","红楼梦","读书报告","讲评","人教版必修下U7","第七课时"],"textbookAnalysis":"本课为整本书写作：写《红楼梦》读书报告（如「我眼中的XX」「红楼悲剧说」），含：①引（书与聚焦）②述（内容/人物）③析（你的观点，结合文本）④评（价值）。讲评三典型：复述多/无观点/不联文。","overview":"【学情分析】A班：能写有观点报告，但「析」可深；反思强。B班：写成情节复述或空感言；无聚焦无观点。共同问题：读书报告=读后感误区（复述/感叹）；不立观点不联文。","objectives":["语言能力：写一份读书报告（300字+），做到引聚焦、述内容、立观点、联文本分析。","文化意识：在写作中沉淀整本阅读的思想收获。","思维品质：通过报告写作，培养论证与整合思维。","学习能力：掌握「引—述—析—评」报告写法。"],"keyPoints":"① 四段：引(聚焦)/述(内容)/析(观点)/评(价值)。\n② 三典型：复述多/无观点/不联文。\n③ 好标准：有聚焦+有观点+联文本。","difficulties":"① 立观点。原因：易复述，需逼。\n② 联文。原因：易空，需引。\n③ 结构。原因：易散，需四段。","teachingMethods":"① 四段模板法。\n② 观点逼出法。\n③ 典型讲评法。\n④ 互评法。","preparation":"【PPT课件】P1 四段；P2 引/述/析/评例；P3 三典型（复述/无观点/不联文）；P4 升格；P5 互评量表；P6 分享预告。\n【实物教具】学生报告（收选3篇）。\n【音频】无。","process":[{"step":"Step 1 四段","time":"5分钟","content":"【PPT P1】教师：「读书报告四段：①引(我聚焦啥)②述(相关内容)③析(我的观点)④评(价值)。不是读后感。」 板书时机：黑板写「引/述/析/评」。差异化提示：B班听；A班需说异于感。易错点提醒：报告≠感言——它要「立观点+证文本」，先想「我要说啥」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 例","time":"12分钟","content":"【PPT P2 例】教师：「例：引『我看黛玉之悲』；述『葬花/泪尽』；析『悲在孤高难容于礼教家族』；评『曹以女儿悲写时代』。四段清。」 学生仿。板书时机：黑板列例。差异化提示：B班写引述；A班需写析评。易错点提醒：析是核心——述完必须「跳出来」说你的见解，别停在讲故事。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 讲评A复述","time":"10分钟","content":"【PPT P3 典型A】展示复述稿：「黛玉很惨，她死了……」教师：「加观点：悲在何处？引葬花证。别只复述。」 板书时机：黑板左「A：加观点」。差异化提示：B班说改；A班需说每处。易错点提醒：破复述——报告价值在「你的见识」，复述谁都会，分析才见功。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 讲评B无观点/C不联文","time":"10分钟","content":"【PPT P3 典型BC】展示：「红楼很伟大(无观点)」「黛玉真可怜(不联文)」。教师：「立观点+引原句证。如『孤高使其难容于家族(引潇湘竹)』。」 板书时机：黑板中右「B立观点 C联文」。差异化提示：B班说空；A班析改。易错点提醒：观点要「落地」——用原句/居所撑，不空喊伟大可怜。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 写+互评","time":"6分钟","content":"【PPT P5 量表】教师：「写报告，互评：有聚焦?有观点?联文?」 学生写+评。板书时机：教师巡。差异化提示：B班写200字+引述；A班写300字+深析。易错点提醒：互评看「四段齐否」——缺析评即不及格。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 作业","time":"2分钟","content":"【PPT P6 环节说明】教师：「据互评改终稿，下节课分享。」 板书时机：黑板「写→享」。差异化提示：B班改观点；A班改深。易错点提醒：下节课分享会，备汇报。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 读书报告 ──┐\n│ 四段:           │\n│ 引/述/析/评      │\n│                │\n│ 三典型:         │\n│ A复述→加观点    │\n│ B无观点→立观点  │\n│ C不联文→引原句  │\n│                │\n│ 好:聚焦+观点+文 │\n└────────────────┘","exercises":"【基础作业】1. 据互评改终稿（300字）：引/述/析/评四段。2. 写一句「我的观点」。\n【提高作业】在报告加一层「时代关联」分析，使观点更有高度。\n【参考答案——教师用】终稿评价：四段齐+有观点+联文=合格；有时代关联=良好。基础2评价：说清观点=合格。提高作业评价：时代关联深=优秀。","reflection":"✅ 亮点：四段模板（引/述/析/评）破「读后感」误区，B班也懂；三典型（复述/无观点/不联文）精准纠偏；升格立观点。\n⚠️ 需改进：B（复述）讲评时部分仍复 t":"【PPT P3 层次】教师：「两层：①类比立本(求木长必固本→治国必积德)②十思条目(戒傲/纳下/慎始…)。由理到法。」 学生填。板书时机：黑板画两层。差异化提示：B班说2层；A班需说递进。易错点提醒：论证有「台阶」——先讲道理再给清单，读时跟台阶，别跳。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 类比","time":"10分钟","content":"【PPT P4 类比】教师：「类比妙：『求木之长必固根本，欲流之远必浚泉源』——以自然之理喻治国，易懂又权威。」 板书时机：黑板写「木/流类比」。差异化提示：B班记喻；A班需说作用。易错点提醒：类比降难度——把治国变「种树流水」，读时把喻翻回本义（积德义）。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 十思","time":"5分钟","content":"【PPT P5 十思】教师：「十思可归类：戒骄(傲物)、戒奢(奢侈)、戒怠(懈倦)、纳下(听言)等。非散清单，是系统自省。」 板书时机：黑板列类。差异化提示：B班记3类；A班需全归。易错点提醒：十思「成系统」——别逐条背，归成几类，记类记意。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"4分钟","content":"【PPT P6 练习】教师：「说理文读法？」 预设回答：「抓论点→理层次→品类比！」 板书时机：板书读法。差异化提示：B班背论点；A班写80字「我眼中的魏征」。易错点提醒：下节课读《答司马谏议书》，看另一种说理（驳论）。"}],"blackboard":"┌── 十思疏·魏 ──┐\n│ 居安思危        │\n│                │\n│ 论点:积德义为本 │\n│                │\n│ 两层:           │\n│ 类比立本(木/流) │\n│ 十思条目(戒傲/ │\n│ 纳下/慎始)      │\n│                │\n│ 谏艺:委婉恳切   │\n└────────────────┘","exercises":"【基础作业】1. 写出奏疏核心观点。2. 说出论证的两层（类比/十思）。\n【提高作业】写150字「我眼中的魏征」，要求：①联论证一处；②说谏艺；③不脸谱。\n【参考答案——教师用】基础1：居安思危、戒奢以俭（积德义为本）。基础2：类比立本、十思条目。提高作业评价：联文+谏艺+不脸谱=良好；有见地=优秀。","reflection":"✅ 亮点：论证层次图（类比→十思）让文言说理不读断，B班也懂；类比解码（木/流）破「翻译读」；十思归类破清单背。\n⚠️ 需改进：B班字词仍有碍（如「浚」「傲物」），部分卡翻译；下次给关键词注。\n📌 下节课衔接：下节课《答司马谏议书》，驳论体。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T15:40:00Z"},{"id":"l-cn-bx-u8-2","lessonId":"l-cn-bx-u8-2","title":"答司马谏议书 精读——驳论艺术与变法立场","book":"必修下册","unitNumber":8,"unitTitle":"思辨性阅读与表达（古代说理文）","taskGroup":"思辨性阅读与表达","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":2,"duration":45,"grade":"高一","subject":"语文","tags":["思辨","王安石","答司马谏议书","驳论","人教版必修下U8","第二课时"],"textbookAnalysis":"《答司马谏议书》是王安石回司马光指责新法的信。先立「名实相符」原则，再逐条驳「侵官、生事、征利、拒谏、致怨」五罪，简明犀利、理直气壮。是古代驳论文典范，与十思疏「立论」形成对照。","overview":"【学情分析】A班：能跟「名实原则」与逐条批驳逻辑，可深入变法立场；赏犀利。B班：字词懂但驳论结构读不出；当普通信读。共同问题：当文言文读，抓不住「先立原则再破五罪」的驳论结构；不知「驳」与「立」的关系。","objectives":["语言能力：说出信的驳论思路（立名实原则→破五罪），解释「名实相符」在文中的作用。","文化意识：理解王安石「为天下理财」的改革担当与遭遇阻力。","思维品质：通过分析驳论结构，培养「先立后破」的思辨思维。","学习能力：掌握「抓原则、理驳点、品犀利」的驳论读法。"],"keyPoints":"① 原则：名实相符（名与实须合）。\n② 驳五罪：侵官/生事/征利/拒谏/致怨，逐条破。\n③ 立场：为天下理财，非私。","difficulties":"① 原则用。原因：易略，需点「标尺」。\n② 驳结构。原因：易乱，需序。\n③ 立场。原因：易当意气，需升改革。","teachingMethods":"① 原则标尺法（名实）。\n② 逐条破除法。\n③ 立破关系法。\n④ 对比法（与十思）。","preparation":"【PPT课件】P1 王安石与司马；P2 原则（名实相符）；P3 驳五罪序；P4 逐条破（侵官等）；P5 立场（为天下）；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——一场论战","time":"5分钟","content":"【PPT P1 王】教师：「司马光写信骂王安石新法(五罪)，王安石回信：你错。这场北宋大辩论，怎么驳？」 预设回答：「先讲道理再一条条驳回，硬气！」 板书时机：黑板写「答司马：驳五罪」。差异化提示：B班说事件；A班需联变法。易错点提醒：驳论文「先立后破」——先有标尺再驳，读时想「他拿什么当尺」。"},{"step":"Step 2 原则","time":"8分钟","content":"【PPT P2 原则】教师：「核心原则：『名实相符』——名分与事实须合。以此尺量五罪，罪皆不成立。」 板书时机：黑板写「名实=标尺」。差异化提示：B班记原则；A班需说作用。易错点提醒：原则是「尺」——王安石先定名实标准，后文都用它量，读时盯这把尺。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 驳序","time":"13分钟","content":"【PPT P3 序】教师：「驳五罪序：侵官(受命有司非侵)→生事(举先王非生)→征利(为天下理财非征)→拒谏(辟邪说非拒)→致怨(不为怨改)。条条理清。」 学生填。板书时机：黑板列五罪。差异化提示：B班说3罪；A班需全+说破法。易错点提醒：驳论讲「次序」——逐条对应，每条先引罪再破，读时跟序列。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 逐破","time":"12分钟","content":"【PPT P4 破】教师：「破法：以名实尺量。如『侵官』——受命于君、议法度于朝，名实相符，何侵之有？简明犀利。」 板书时机：黑板列破例。差异化提示：B班记1破；A班需说尺用。易错点提醒：破在「用尺」——每条都拿名实套，套不上即破，读时看尺如何量。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 立场","time":"5分钟","content":"【PPT P5 立场】教师：「立场：『为天下理财，不为征利』『不任怨改』。改革担当，非意气。与十思『劝君』异趣。」 板书时机：黑板写「为天下·非私」。差异化提示：B班听；A班需比十思。易错点提醒：驳论背后是「立场」——王安石为改革硬扛，读时升一层看担当。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"2分钟","content":"【PPT P6 练习】教师：「驳论读法？」 预设回答：「抓原则→理驳点→品犀利！」 板书时机：板书读法。差异化提示：B班背原则；A班写80字「我眼中的王安石」。易错点提醒：下节课群文比两篇劝谏/驳论。"}],"blackboard":"┌── 答司马·王 ──┐\n│ 驳五罪          │\n│                │\n│ 原则:名实相符   │\n│ (标尺)          │\n│                │\n│ 驳五罪:         │\n│ 侵官/生事/征利  │\n│ 拒谏/致怨       │\n│ 逐条破(用尺量)  │\n│                │\n│ 立场:为天下     │\n└────────────────┘","exercises":"【基础作业】1. 写出文中的驳论原则。2. 说出被驳的「五罪」中任两个。\n【提高作业】写150字「我眼中的王安石」，要求：①联驳论一处；②说立场；③不脸谱。\n【参考答案——教师用】基础1：名实相符（名分与事实须合）。基础2：侵官、生事、征利、拒谏、致怨（任2）。提高作业评价：联文+立场+不脸谱=良好；有见地=优秀。","reflection":"✅ 亮点：原则标尺（名实）让驳论有「尺」，B班也懂；五罪序清晰；立场「为天下」破意气误读；与十思立论对照拓思辨。\n⚠️ 需改进：B班对「名实」仍抽象，部分只记词；下次给白话注（名分=说法，事实=做法）。\n📌 下节课衔接：下节课群文比两篇说理文。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T15:40:00Z"},{"id":"l-cn-bx-u8-3","lessonId":"l-cn-bx-u8-3","title":"群文阅读——古代说理艺术：立论与驳论","book":"必修下册","unitNumber":8,"unitTitle":"思辨性阅读与表达（古代说理文）","taskGroup":"思辨性阅读与表达","lessonType":"qunwen","lessonTypeName":"群文阅读","periodNumber":3,"duration":45,"grade":"高一","subject":"语文","tags":["思辨","群文","立论","驳论","人教版必修下U8","第三课时"],"textbookAnalysis":"群文比较《谏太宗十思疏》（立论：类比+条目）与《答司马谏议书》（驳论：原则+破罪）。同是古代臣子说理，但路径异：一劝（立论疏导），一辩（驳论破敌）。比较提炼说理文的两种范式。","overview":"【学情分析】A班：能比立论与驳论结构，可深入「劝vs辩」语境；赏差异。B班：单篇懂但比较框架缺；易混。共同问题：比较易罗列缺归纳——发现「都说理」后不会提炼范式。","objectives":["语言能力：用双栏比较两文（目的/结构/方法/风格），说出古代说理的立论与驳论差异。","文化意识：体会古人「以理服君」的不同智慧。","思维品质：通过比较培养同中求异、提炼范式思维。","学习能力：掌握说理文群文双栏比较法。"],"keyPoints":"① 十思：立论/劝君/类比+条目/委婉。\n② 答司马：驳论/辩敌/原则+破罪/犀利。\n③ 共性：皆逻辑严密、以理服人。","difficulties":"① 体例分。原因：学生混，需点。\n② 双栏填。原因：维度不清，需框架。\n③ 共性提。原因：易停异，需归纳。","teachingMethods":"① 双栏比较法。\n② 范式命名法：立/驳。\n③ 归纳法。\n④ 迁移法。","preparation":"【PPT课件】P1 两文；P2 双栏（目的/结构/方法/风格）；P3 范式（立论/驳论）；P4 共性（逻辑服人）；P5 迁移（阿房宫赋）；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——同与异","time":"5分钟","content":"【PPT P1】教师：「两文都臣子说理，但一篇劝君(十思)，一篇辩敌(答司马)——怎么个不同？」 预设回答：「一个立着说，一个破着说！」 板书时机：黑板写「同：说理；异：立/驳」。差异化提示：B班说同异；A班需预判。易错点提醒：别只说「都古文」——要比「说理走哪条路」。"},{"step":"Step 2 双栏","time":"13分钟","content":"【PPT P2 表】教师：「填双栏：目的(劝/辩)、结构(类比+条目/原则+破罪)、方法(立论/驳论)、风格(委婉/犀利)。」 学生填。板书时机：黑板画双栏。差异化提示：B班填目的+结构；A班全填。易错点提醒：同维度比——都在「目的/结构/方法/风格」下，不能乱比。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 范式","time":"10分钟","content":"【PPT P3 范式】教师：「十思=立论型(先立理再给法，疏导)；答司马=驳论型(先定尺再破罪，攻坚)。一体一用。」 板书时机：黑板写「立↔驳」。差异化提示：B班记两词；A班需说「为何」。易错点提醒：范式区别在「对谁说」——劝君用立、辩敌用驳，读时先判语境。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 共性","time":"8分钟","content":"【PPT P4 共性】教师：「异之后共性？」 预设回答：「都逻辑严密、以理服人——古文说理重『说得通』。」 板书时机：黑板写「共性：逻辑服人」。差异化提示：B班说1点；A班需整合。易错点提醒：归纳是群文目的——异是手段，共性是收获。"},{"step":"Step 5 迁移","time":"5分钟","content":"【PP 」 预设回答：「写秦朝，骂唐朝，高明！」 板书时机：黑板写「阿房宫：借古讽今」。差异化提示：B班说事件；A班需联唐。易错点提醒：赋「借古讽今」——字面写秦，矛头指当朝，读时想「他真骂谁」。"},{"step":"Step 2 铺陈","time":"13分钟","content":"【PPT P2 铺陈】教师：「前半铺陈：宫之大(覆压三百余里)、人之众(明星荧荧)、奢之极(鼎铛玉石)。极写秦盛。」 学生品。板书时机：黑板列铺陈。差异化提示：B班记2处；A班需说「写盛为讽」。易错点提醒：铺陈有「用」——把秦奢写足，才显其亡之必然，读时想「盛为衰铺垫」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 陡转","time":"12分钟","content":"【PPT P3 转】教师：「陡转：『戍卒叫，函谷举，楚人一炬，可怜焦土』——前面极盛，此处瞬亡。反差刺心。」 板书时机：黑板写「盛→亡 陡」。差异化提示：B班说转；A班需说反差。易错点提醒：赋妙在「陡」——铺陈蓄满，一句崩塌，读时体会盛衰之急转。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 讽谏","time":"8分钟","content":"【PPT P4 讽】教师：「警策：『秦人不暇自哀，而后人哀之；后人哀之而不鉴之，亦使后人而复哀后人也。』不鉴则复亡，直刺唐廷。」 板书时机：黑板写「不鉴→复亡」。差异化提示：B班记句；A班需说刺唐。易错点提醒：末句是「核」——借秦警唐「若不改必同亡」，读时品这层忧。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 传统","time":"4分钟","content":"【PPT P5 传统】教师：「『以史为鉴』是中国说理传统：借往事论当下。与十思(劝)、答司马(辩)同属说理，只是『以史为论』。」 板书时机：黑板写「以史为鉴」。差异化提示：B班听；A班需比前。易错点提醒：三文三体——立、驳、史，都是「以理服人」，读时看各走哪路。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"3分钟","content":"【PPT P6 练习】教师：「赋体读法？」 预设回答：「抓铺陈→明陡转→品讽谏！」 板书时机：板书读法。差异化提示：B班背铺陈；A班写80字「我眼中的杜牧」。易错点提醒：下节课读《六国论》，看「借古论今」的论点法。"}],"blackboard":"┌── 阿房宫赋·杜 ──┐\n│ 借古讽今        │\n│                │\n│ 铺陈写盛:       │\n│ 宫巨/人众/奢极  │\n│                │\n│ 陡转:盛→亡     │\n│ (一炬焦土)      │\n│                │\n│ 讽谏:不鉴→复亡 │\n│ 以史为鉴        │\n└────────────────┘","exercises":"【基础作业】1. 写出赋中铺陈写的任一方面（宫/人/奢）。2. 解释「后人哀之而不鉴之」大意。\n【提高作业】写150字「我眼中的杜牧」，要求：①联铺陈或讽谏；②说借古讽今；③不肤浅。\n【参考答案——教师用】基础1：宫之大、人之众、奢之极（任1）。基础2：后人哀叹前人不吸取教训，也会重蹈覆辙。提高作业评价：联文+讽今+不肤浅=良好；有见地=优秀。","reflection":"✅ 亮点：铺陈解码（写盛为讽）破「堆砌」误读，B班也懂；陡转（盛→亡）显赋笔张力；讽谏联唐破「叹古」；三体（立/驳/史）收束拓全局。\n⚠️ 需改进：B班对唐敬宗背景仍薄，部分不知讽谁；下次加1分钟背景。\n📌 下节课衔接：下节课《六国论》，论点法。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T15:40:00Z"},{"id":"l-cn-bx-u8-5","lessonId":"l-cn-bx-u8-5","title":"六国论 精读——借古论今与中心论点","book":"必修下册","unitNumber":8,"unitTitle":"思辨性阅读与表达（古代说理文）","taskGroup":"思辨性阅读与表达","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":5,"duration":45,"grade":"高一","subject":"语文","tags":["思辨","苏洵","六国论","论点","人教版必修下U8","第五课时"],"textbookAnalysis":"《六国论》是苏洵史论，中心论点「六国破灭，非兵不利，战不善，弊在赂秦」。后以韩魏楚赂秦、齐燕赵失援分层论证，末借古警宋（勿赂契丹西夏）。开门见山、分层严密，是「论点统领」范本。","overview":"【学情分析】A班：能跟中心论点与分层论证，可深入「借古警宋」；赏严谨。B班：字词懂但论点与论据关系读断；当古文读。共同问题：当文言文读，抓不住「首句即论点、后文全证」的结构；不联北宋赂敌现实。","objectives":["语言能力：说出文章中心论点，梳理「赂秦—不赂者失援」的分层论证。","文化意识：理解苏洵借六国警宋的忧患与「以史论政」传统。","思维品质：通过分析论点统领，培养「观点—论据」的思辨结构。","学习能力：掌握「抓论点、理分层、品警策」的史论读法。"],"keyPoints":"① 论点：弊在赂秦(非兵战)。\n② 分层：赂秦者(韩魏楚)亡、不赂者(齐燕赵)失援亦亡。\n③ 警宋：勿赂契丹西夏。","difficulties":"① 论点统领。原因：易读断，需点首句。\n② 分层。原因：易混，需画图。\n③ 警宋。原因：易当史论，需联宋。","teachingMethods":"① 论点统领法（首句）。\n② 分层图解法。\n③ 警策联今法（宋）。\n④ 对比法（与阿房宫）。","preparation":"【PPT课件】P1 苏洵与宋；P2 中心论点；P3 分层（赂秦/不赂）；P4 论证（对比/假设）；P5 警宋；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——一段历史之问","time":"5分钟","content":"【PPT P1 苏】教师：「六国为何被秦灭？苏洵答：不是打不过，是『赂秦』(割地买安)。他其实警宋别赂契丹。借史论政。」 预设回答：「写六国，劝宋朝，又是借古！」 板书时机：黑板写「六国论：弊在赂秦」。差异化提示：B班说事件；A班需联宋。易错点提醒：史论「借古论今」——论六国是为谏宋，读时想「他真劝谁」。"},{"step":"Step 2 论点","time":"8分钟","content":"【PPT P2 论点】教师：「首句即论点：『六国破灭，非兵不利，战不善，弊在赂秦。』开门见山，全篇证此。」 板书时机：黑板写「弊在赂秦」。差异化提示：B班记论点；A班需说「为何非兵战」。易错点提醒：史论「首句立论」——苏洵起手抛论点，后文全为证，读时盯这句。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 分层","time":"13分钟","content":"【PPT P3 层】教师：「分层：①赂秦者(韩魏楚割地)自弱而亡②不赂者(齐燕赵)失援亦亡。两面证『弊在赂』。」 学生画。板书时机：黑板画两层。差异化提示：B班说1层；A班需全+说证法。易错点提醒：分层是「两面夹击」——赂者直接亡、不赂者间接亡，都归赂秦之祸，读时看逻辑。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 论证","time":"10分钟","content":"【PPT P4 证】教师：「论证法：对比(赂者地日削vs秦兵日强)、假设(『向使三国各爱其地…』)。正反说理有力。」 板书时机：黑板列法。差异化提示：B班记1法；A班需说假设。易错点提醒：史论重「技法」——对比显趋势、假设翻后果，读时品怎么把理说死。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 警宋","time":"5分钟","content":"【PPT P5 警】教师：「末警宋：若也赂契丹西夏，必步六国后尘。与阿房宫『不鉴复亡』同声。」 板书时机：黑板写「警宋=警唐」。差异化提示：B班听；A班需比阿房。易错点提醒：两赋论同旨——以古为镜，读时把「六国」换成「今朝」才懂真意。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"4分钟","content":"【PPT P6 练习】教师：「史论读法？」 预设回答：「抓论点→理分层→品警策！」 板书时机：黑板读法。差异化提示：B班背论点；A班写80字「我眼中的苏洵」。易错点提醒：下节课方法指导，学写议论文。"}],"blackboard":"┌── 六国论·苏 ──┐\n│ 弊在赂秦        │\n│                │\n│ 分层:           │\n│ 赂秦者(韩魏楚)  │\n│ 亡              │\n│ 不赂者(齐燕赵)  │\n│ 失援亦亡        │\n│                │\n│ 论证:对比/假设  │\n│ 警宋:勿赂敌     │\n└────────────────┘","exercises":"【基础作业】1. 写出文章中心论点。2. 说出分层论证的两面（赂秦者/不赂者）。\n【提高作业】写150字「我眼中的苏洵」，要求：①联论点或分层；②说借古警宋；③不肤浅。\n【参考答案——教师用】基础1：六国破灭，弊在赂秦（非兵不利战不善）。基础2：赂秦者割地亡、不赂者失援亡。提高作业评价：联文+警宋+不肤浅=良好；有见地=优秀。","reflection":"✅ 亮点：首句立论（弊在赂秦）让史论结构清，B班也懂；分层（赂/不赂两面）显夹击；警宋联阿房宫「不鉴」收束，三体贯通。\n⚠️ 需改进：B班对北宋赂契丹背景仍薄，部分不知讽谁；下次加1分钟背景。\n📌 下节课衔接：下节课方法指导，学写议论文。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T15:40:00Z"},{"id":"l-cn-bx-u8-6","lessonId":"l-cn-bx-u8-6","title":"方法指导——学写议论文（立论·论据·论证）","book":"必修下册","unitNumber":8,"unitTitle":"思辨性阅读与表达（古代说理文）","taskGroup":"思辨性阅读与表达","lessonType":"fangfa","lessonTypeName":"方法指导","periodNumber":6,"duration":45,"grade":"高一","subject":"语文","tags":["思辨","写作","议论文","人教版必修下U8","第六课时"],"textbookAnalysis":"本课为第八单元写作任务，写议论文（如「谈__」300字）：①立论（鲜明论点）；②论据（事实/道理，典型）；③论证（因果/对比/假设）。要点：观点先行、论据服人、论证有序。学生常论点模糊、论据不典型、论证跳跃。","overview":"【学情分析】A班：能写有层次议论文，但论证法弱；可深入。B班：写成无论点散文或例子堆砌；不知「论」在哪。共同问题：无鲜明论点（不立）；论据不典型（不证）；论证缺法（不讲理）。","objectives":["语言能力：写一篇议论文（300字），做到论点鲜明、论据典型、论证有序。","文化意识：在写作中体会「以理服人」的表达伦理。","思维品质：通过格式约束，培养观点—论据—论证的结构思维。","学习能力：掌握「立论+论据+论证」写法。"],"keyPoints":"① 立论：首句亮观点，鲜明。\n② 论据：事实/道理，典型可信。\n③ 论证：因果/对比/假设，有序讲理。","difficulties":"① 立论。原因：易藏，需首句。\n② 论据。原因：易不典型，需选。\n③ 论证。原因：易跳，需法。","teachingMethods":"① 立论模板法（首句）。\n② 论据选法（典型）。\n③ 论证三法（因果/对比/假设）。\n④ 升格示范法。","preparation":"【PPT课件】P1 三件；P2 立论（首句观点）；P3 论据（事实/道理典型）；P4 论证三法；P5 升格（例堆→论）；P6 互评量表。\n【实物教具】便签。\n【音频】无。","process":[{"step":"Step 1 三件","time":"5分钟","content":"【PPT P1】教师：「议论文三件：①立论(观点)②论据(证据)③论证(讲理)。缺一件就像『我觉得』。」 板书时机：黑板写「论/据/证」。差异化提示：B班听；A班需说关系。易错点提醒：议论文「观点先行」——首句亮明，后文举证，别绕。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 立论","time":"12分钟","content":"【PPT P2 立】教师：「立论：首句亮观点，如『逆境造就人才』。鲜明可议，不模棱。」 学生练。板书时机：黑板列例。差异化提示：B班写1句；A班需可议。易错点提醒：论点要「可争」——太绝对(人都好)或太平(努力重要)都难写，选有锋芒的。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 论据","time":"10分钟","content":"【PPT P3 据】教师：「论据：事实(名人事例)或道理(名言常理)，要典型可信。如证『逆境造才』举司马迁。」 板书时机：黑板写「据=证据」。差异化提示：B班举1据；A班需说典型。易错点提醒：论据「典型」才服人——随手编的例子没人信，用公认的。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 论证","time":"10分钟","content":"【PPT P4 证】教师：「论证三法：因果(因为…所以)、对比(有X则成无X则败)、假设(若无…则)。把理说清。」 板书时机：黑板列三法。差异化提示：B班记1法；A班需各举。易错点提醒：论证「讲理」——别只摆例子，要说明「例子怎么证观点」，用三法之一。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 升格","time":"5分钟","content":"【PPT P5 升格】展示例堆：「司马迁受腐刑写史记，贝多芬聋了作曲，所以逆境造才。」问：「改？」 预设回答：「加因果：正因绝境逼出潜能，故逆境可造才——讲理！」 教师改。板书时机：黑板标升格。差异化提示：B班看差；A班提改。易错点提醒：升格加「分析」——例子后说「为何证」，议论文才立。"},{"step":"Step 6 写+互评","time":"3分钟","content":"【PPT P6 量表】教师：「写300字，互评：有论点?有据?有论证?」 学生写+评。板书时机：教师巡。差异化提示：B班写200字+论点；A班写300字+三法。易错点提醒：互评看「三件齐否」——缺论证即不及格。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 学写议论文 ──┐\n│ 三件:           │\n│ 论/据/证         │\n│                │\n│ 立论:首句亮观点 │\n│                │\n│ 论据:事实/道理  │\n│ 典型可信        │\n│                │\n│ 论证三法:       │\n│ 因果/对比/假设  │\n│ 升格:加分析     │\n└────────────────┘","exercises":"【基础作业】1. 据互评改终稿（300字）：论点+论据+论证。2. 写一句「我的论点」。\n【提高作业】在文加一层「对比/假设」论证，使说理更严密。\n【参考答案——教师用】基础1评价：论点明+据典型+有论证=合格；三法之一=良好。基础2评价：说清论点=合格。提高作业评价：对比/假设用妙=优秀。","reflection":"✅ 亮点：三件（论/据/证）框架清晰，B班也懂；论证三法（因果/对比/假设）给讲理工具；升格（加分析）破例堆。\n⚠️ 需改进：部分A班生论证仍只摆例，需给「分析句式」库；下次加。\n📌 下节课衔接：下节课写作讲评+思辨论坛。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T15:40:00Z"},{"id":"l-cn-bx-u8-7","lessonId":"l-cn-bx-u8-7","title":"写作实践与讲评——议论文修改与提升","book":"必修下册","unitNumber":8,"unitTitle":"思辨性阅读与表达（古代说理文）","taskGroup":"思辨性阅读与表达","lessonType":"xiezuo","lessonTypeName":"写作实践","periodNumber":7,"duration":45,"grade":"高一","subject":"语文","tags":["思辨","讲评","议论文","人教版必修下U8","第七课时"],"textbookAnalysis":"本课为议论文讲评，选取三典型：①无论点（不立/藏观点）；②论据不典型（编例/无关）；③无论证（只摆例不分析）。通过对比讲评提升，优秀文可进思辨论坛。","overview":"【学情分析】A班：初稿有论但论证可深；反思强。B班：部分仍无论点或例堆，需典型纠偏。共同问题：修改只改字不改进论证体；好议论文标准未内化。","objectives":["语言能力：据讲评改终稿，做到论点鲜明、论据典型、论证有序讲理。","文化意识：在讲评中体会「以理服人」的表达自觉。","思维品质：通过三典型诊断，培养评价与自我修订能力。","学习能力：内化「好议论文」标准。"],"keyPoints":"① 三典型：无论点/据不典型/无论证。\n② 修改：亮论点/换典型/加分析。\n③ 好 const BOOK_ORDER = { '必修第一册':1, '必修第二册':2, '必修第三册':3 };

// ===== 工具函数 =====
function $(id) { return document.getElementById(id); }

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 1400);
}

function getLesson(id) { return LESSONS.find(function(l){ return l.id === id; }); }



function escAttr(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderStepContent(raw) {
  const s = (raw || '').trim();
  if (!s) return '';
  const MARK = /(【PPT[^】]*】|【音频[^】]*】|【教师[^】]*】|教师[:：]|【预设回答[^】]*】|预设回答[:：]|【板书时机[^】]*】|板书时机[:：]|【差异化提示[^】]*】|差异化提示[:：]|【易错点提醒[^】]*】|易错点提醒[:：])/g;
  const parts = s.split(MARK);
  let out = '';
  if (parts[0] && parts[0].trim()) out += '<div class="sc-text">' + escAttr(parts[0].trim()) + '</div>';
  for (let i = 1; i < parts.length; i += 2) {
    const marker = parts[i];
    const text = (parts[i + 1] || '').trim();
    if (!marker) continue;
    out += stepBlock(marker, text);
  }
  return out || ('<div class="sc-text">' + escAttr(s) + '</div>');
}
function stepBlock(marker, text) {
  const t = marker.replace(/^【|】$/g, '');
  if (/^PPT/.test(t)) return '<div class="sc-block sc-ppt"><span class="sc-tag">' + escAttr(marker) + '</span>' + (text ? '<div class="sc-bd">' + escAttr(text) + '</div>' : '') + '</div>';
  if (/^音频/.test(t)) return '<div class="sc-block sc-audio"><span class="sc-tag">' + escAttr(marker) + '</span>' + (text ? '<div class="sc-bd">' + escAttr(text) + '</div>' : '') + '</div>';
  if (/^教师/.test(t)) return '<div class="sc-block sc-teacher"><span class="sc-tag">' + escAttr(marker) + '</span><div class="sc-bd">' + escAttr(text) + '</div></div>';
  if (/^预设回答/.test(t)) return '<div class="sc-block sc-ans"><span class="sc-tag">' + escAttr(marker) + '</span><div class="sc-bd">' + escAttr(text) + '</div></div>';
  if (/^板书时机/.test(t)) return '<div class="sc-block sc-board"><span class="sc-tag">' + escAttr(marker) + '</span><div class="sc-bd">' + escAttr(text) + '</div></div>';
  if (/^差异化提示/.test(t)) return '<div class="sc-block sc-diff"><span class="sc-tag">' + escAttr(marker) + '</span><div class="sc-bd">' + escAttr(text) + '</div></div>';
  if (/^易错点提醒/.test(t)) return '<div class="sc-block sc-warn"><span class="sc-tag">' + escAttr(marker) + '</span><div class="sc-bd">' + escAttr(text) + '</div></div>';
  return '<div class="sc-text">' + escAttr(marker + text) + '</div>';
}
function renderExercises(raw) {
  const s = (raw || '').trim();
  if (!s) return '';
  const basic = s.match(/【基础作业】([^]*?)(?=【提高作业】|【参考答案|$)/);
  const adv = s.match(/【提高作业】([^]*?)(?=【参考答案】|$)/);
  const ans = s.match(/【参考答案[^】]*】([^]*?)$/);
  let out = '';
  if (basic) out += '<div class="ex-block ex-basic"><div class="ex-h">📝 基础作业</div><div class="ex-bd">' + escAttr(basic[1].trim()) + '</div></div>';
  if (adv) out += '<div class="ex-block ex-adv"><div class="ex-h">🚀 提高作业</div><div class="ex-bd">' + escAttr(adv[1].trim()) + '</div></div>';
  if (ans) out += '<div class="ex-block ex-key"><div class="ex-h">🔑 参考答案（教师用）</div><div class="ex-bd">' + escAttr(ans[1].trim()) + '</div></div>';
  return out || ('<div class="sc-text">' + escAttr(s) + '</div>');
}

function setNav(title, showBack) {
  $('navTitle').textContent = title;
  $('backBtn').style.display = showBack ? 'block' : 'none';
}

// ===== 导航 =====
function switchTab(tab) {
  state.tab = tab;
  state.detailId = null;
  state.privacy = false;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('on', t.dataset.tab === tab); });
  setNav('语文教案库', false);
  const bar = document.querySelector('.dlbar');
  if (bar) bar.remove();
  render();
}

function goBack() {
  if (state.detailId) state.detailId = null;
  else if (state.privacy) state.privacy = false;
  render();
}

function openDetail(id) {
  state.detailId = id;
  if (state.recents.indexOf(id) < 0) {
    state.recents.unshift(id);
    if (state.recents.length > 50) state.recents.pop();
  }
  render();
}

function toggleFav(id) {
  const i = state.favorites.indexOf(id);
  if (i >= 0) {
    state.favorites.splice(i, 1);
    toast('已取消收藏');
  } else {
    state.favorites.unshift(id);
    toast('★ 已收藏');
  }
  render();
}

// ===== 渲染入口 =====
function render() {
  const tab = state.tab;
  if (state.detailId) { renderDetail(); return; }
  if (state.privacy) { renderPrivacy(); return; }
  if (tab === 'index') renderIndex();
  else if (tab === 'favorites') renderFavorites();
  else if (tab === 'profile') renderProfile();
}

// ===== 教案库页面（册 → 单元 → 板块，按书本顺序）=====
function renderIndex() {
  setNav('英语教案库', false);
  let list = LESSONS.slice();
  if (state.filterBook) list = list.filter(function(l){ return l.book === state.filterBook; });
  if (state.keyword.trim()) {
    const kw = state.keyword.trim().toLowerCase();
    list = list.filter(function(l) {
      const hay = (l.title + ' ' + l.unitTitle + ' ' + (l.tags || []).join(' ') + ' ' + (l.overview || '') + ' ' +
        (l.keyPoints || '') + ' ' + (l.difficulties || '') + ' ' + (l.preparation || '') + ' ' +
        (l.objectives || []).join(' ') + ' ' + (l.process || []).map(function(s){ return s.step + ' ' + s.content; }).join(' ') + ' ' +
        (l.exercises || '') + ' ' + (l.reflection || '') + ' ' + (l.blackboard || '')).toLowerCase();
      return hay.indexOf(kw) !== -1;
    });
  }

  list = list.slice().sort(function(a, b) {
    return ((BOOK_ORDER[a.book] || 0) - (BOOK_ORDER[b.book] || 0)) ||
      (a.unitNumber - b.unitNumber) ||
      ((a.periodNumber || 0) - (b.periodNumber || 0));
  });

  // 按 册+单元 分组（"全部"时 unitNumber 跨册重复，必须用册区分）
  const map = {};
  list.forEach(function(l) {
    const key = l.book + '|' + l.unitNumber;
    if (!map[key]) map[key] = { key: key, book: l.book, bookShort: BOOK_SHORT[l.book] || l.book, unitNumber: l.unitNumber, unitTitle: l.unitTitle, lessons: [] };
    map[key].lessons.push(l);
  });
  const groups = Object.keys(map).map(function(k){ return map[k]; }).sort(function(a, b) {
    return ((BOOK_ORDER[a.book] || 0) - (BOOK_ORDER[b.book] || 0)) || (a.unitNumber - b.unitNumber);
  });

  const TYPE_ICON = { 'listening-speaking':'🎧', 'reading':'📖', 'grammar':'✏️', 'listening-talking':'💬', 'writing':'✍️', 'project':'🎯' };
  const TYPE_BG = { 'listening-speaking':'#6b46c1', 'reading':'#1a365d', 'grammar':'#1a6840', 'listening-talking':'#b7791f', 'writing':'#7b341e', 'project':'#2c5282' };

  const bookChips = '<div class="chip ' + (state.filterBook ? '' : 'on') + '" data-book="">全部</div>' +
    BOOKS.map(function(b) {
      return '<div class="chip ' + (state.filterBook === b ? 'on' : '') + '" data-book="' + escAttr(b) + '">' + escAttr(b) + '</div>';
    }).join('');

  const groupHtml = groups.map(function(g) {
    const cards = g.lessons.map(function(l) {
      const fav = state.favorites.indexOf(l.id) >= 0;
      const ico = TYPE_ICON[l.lessonType] || '📄';
      const bg = TYPE_BG[l.lessonType] || '#555';
      const star = fav ? '<div style="color:#e6a23c;font-size:20px">★</div>' : '';
      return '<div class="card" data-id="' + escAttr(l.id) + '">' +
        '<div class="row1">' +
          '<div class="docico" style="background:linear-gradient(135deg,' + bg + ',' + bg + 'dd)">' + ico + '</div>' +
          '<div style="flex:1">' +
            '<div class="ttl">' + escAttr(l.title) + '</div>' +
            '<div class="sub">' + escAttr(l.lessonTypeName) + ' · ' + l.duration + '分钟</div>' +
          '</div>' +
          star +
          '<div class="card-arrow">›</div>' +
        '</div>' +
      '</div>';
    }).join('');

    return '<div class="unit-group">' +
      '<div class="unit-head"><span class="unit-no">' + escAttr(g.bookShort) + ' · Unit ' + g.unitNumber + '</span><span class="unit-name">' + escAttr(g.unitTitle) + '</span></div>' +
      cards +
    '</div>';
  }).join('');

  const histHtml = (!state.keyword.trim() && state.history.length)
    ? '<div class="chips">' + state.history.map(function(h){ return '<div class="chip" data-hist="' + escAttr(h) + '">' + escAttr(h) + '</div>'; }).join('') + '</div>'
    : '';
  const searchVal = escAttr(state.keyword);
  $('content').innerHTML =
    '<div class="search">🔍 <input class="sin" placeholder="搜索教案/单元/关键词" value="' + searchVal + '"> ' + (state.keyword ? '<span class="searchx" data-clear="search">✕</span>' : '') + '</div>' +
    histHtml +
    '<div class="chips">' + bookChips + '</div>' +
    (groupHtml || '<div class="empty"><div class="e">📭</div><div class="t">没有匹配的教案</div><div class="p">换个关键词或筛选条件试试</div></div>');
}

function setBook(b) { state.filterBook = b; renderIndex(); }
function onPrevSearch(kw) {
  state.keyword = kw;
  const t = kw.trim();
  if (t && state.history[0] !== t) {
    state.history = [t].concat(state.history.filter(function(x){ return x !== t; })).slice(0, 10);
  }
  renderIndex();
}
function onPrevHistory(h) { state.keyword = h; renderIndex(); }
function onPrevClear() { state.keyword = ''; renderIndex(); }

// ===== 收藏页面 =====
function renderFavorites() {
  setNav('我的收藏', false);
  let cards = '';
  state.favorites.forEach(function(id) {
    const l = getLesson(id);
    if (!l) return;
    cards += '<div class="card" data-id="' + escAttr(l.id) + '">' +
      '<div class="row1"><div class="docico">📄</div>' +
      '<div style="flex:1"><div class="ttl">' + escAttr(l.title) + '</div><div class="sub">' + escAttr(l.book) + ' · ' + escAttr(l.unitTitle) + ' · ' + escAttr(l.lessonTypeName) + '</div></div>' +
      '<div style="color:#c0392b;font-size:22px;cursor:pointer" data-fav-id="' + escAttr(l.id) + '">✕</div>' +
      '</div></div>';
  });
  $('content').innerHTML =
    '<div class="glabel"><span>已收藏 ' + state.favorites.length + ' 篇</span>' + (state.favorites.length ? '<span class="clr" onclick="clearAll(&quot;fav&quot;)">清空</span>' : '') + '</div>' +
    (cards || '<div class="empty"><div class="e">★</div><div class="t">还没有收藏</div><div class="p">在教案详情页点 ☆ 即可收藏</div></div>');
}

// ===== 我的页面 =====
function renderProfile() {
  setNav('我的', false);
  const p = state.profile;
  let dl = '';
  state.downloads.forEach(function(id) {
    const l = getLesson(id); if (!l) return;
    dl += '<div class="favitem" data-id="' + escAttr(l.id) + '"><div class="fi">📄</div><div class="ft">' + escAttr(l.title) + '</div></div>';
  });
  let rl = '';
  state.recents.forEach(function(id) {
    const l = getLesson(id); if (!l) return;
    rl += '<div class="favitem" data-id="' + escAttr(l.id) + '"><div class="fi">📄</div><div class="ft">' + escAttr(l.title) + '</div></div>';
  });
  let html = '';
  html += '<div class="phead"><div class="pavatar">' + (p.avatarUrl ? '<img src="' + escAttr(p.avatarUrl) + '">' : '👤') + '</div><div><div class="pname">' + escAttr(p.nickName) + '</div><div class="psub">微信用户 · 云端已同步</div></div></div>';
  html += '<div class="stats3"><div class="stat"><div class="num">' + state.favorites.length + '</div><div class="lbl">收藏</div></div><div class="stat"><div class="num">' + state.downloads.length + '</div><div class="lbl">下载</div></div><div class="stat"><div class="num">' + state.recents.length + '</div><div class="lbl">最近</div></div></div>';
  html += '<div class="block"><h3>📥 下载记录 <span class="clear" onclick="clearAll(&quot;dl&quot;)">清空</span></h3>' + (dl || '<div class="hint">暂无下载记录</div>') + '</div>';
  html += '<div class="block"><h3>🕑 浏览历史 <span class="clear" onclick="clearAll(&quot;rc&quot;)">清空</span></h3>' + (rl || '<div class="hint">暂无浏览历史</div>') + '</div>';
  html += '<div class="block"><h3>⚙ 设置</h3><div class="favitem" onclick="showPrivacy()"><div class="fi">🔒</div><div class="ft">隐私保护说明</div></div><div class="favitem" onclick="clearAll(&quot;all&quot;)"><div class="fi">🗑</div><div class="ft">清空全部本地数据</div></div></div>';
  html += '<div class="hint">此预览版数据仅存于当前页面，刷新即丢失。真机数据存储于微信云开发。</div>';
  $('content').innerHTML = html;
}

// ===== 隐私说明页 =====
function showPrivacy() { state.privacy = true; render(); }

function renderPrivacy() {
  setNav('隐私保护说明', true);
  const blocks = [
    { h: '我们收集哪些信息', p: [ '· 昵称、头像：你主动设置，用于「我的」页身份展示。', '· 收藏 / 下载记录 / 浏览历史：使用教案库时产生的操作记录，用于多设备同步与个性化展示。', '· 错误日志：应用崩溃时的堆栈摘要，仅用于修复问题，不含任何教学内容。' ] },
    { h: '信息存储在哪里', p: [ '所有数据默认存储于微信云开发（腾讯云）或本机缓存。我们不自建服务器，不向任何第三方出售或共享你的个人信息。' ] },
    { h: '你有哪些权利', p: [ '· 可随时在「我的」页清空下载记录、浏览历史或收藏。', '· 可一键清空全部个人数据。', '· 可在微信「设置 › 隐私 › 授权管理」中撤回本小程序的信息授权。' ] },
    { h: '联系方式', p: [ '如对本说明有疑问，可通过小程序内反馈渠道联系开发者。' ] }
  ];
  let html = '<div class="hint" style="text-align:left;padding:4px 2px 10px">最后更新：2026-07</div>';
  blocks.forEach(function(b) {
    html += '<div class="block"><h3>' + b.h + '</h3>' + b.p.map(function(x){ return '<p class="rp">' + escAttr(x) + '</p>'; }).join('') + '</div>';
  });
  html += '<div class="tip">本说明依据《中华人民共和国个人信息保护法》及微信平台隐私规范编写。</div>';
  $('content').innerHTML = html;
}

// ===== 详情页 =====
function renderDetail() {
  const l = getLesson(state.detailId);
  if (!l) { state.detailId = null; render(); return; }
  setNav((l.lessonTypeName || '教案详情'), true);

  const CN = ['一', '二', '三', '四', '五', '六', '七', '八', '九', '十', '十一', '十二'];
  const secs = [];
  let si = 0;
  const add = function(name, payload) { if (payload) { si++; secs.push(Object.assign({ no: CN[si - 1], name: name, key: name }, payload)); } };
  add('教材分析', l.textbookAnalysis && { body: l.textbookAnalysis });
  add('学情分析', l.overview && { body: l.overview });
  add('教学目标', l.objectives && l.objectives.length && { list: l.objectives });
  add('教学重点', l.keyPoints && { body: l.keyPoints });
  add('教学难点', l.difficulties && { body: l.difficulties });
  add('教学方法', l.teachingMethods && { body: l.teachingMethods });
  add('课前准备', l.preparation && { body: l.preparation });
  add('教学过程', l.process && l.process.length && { steps: l.process.map(function(s, i){ return { n: i + 1, name: s.step || s.name || ('步骤' + (i + 1)), time: s.time || '', content: s.content || '' }; }) });
  add('板书设计', l.blackboard && { body: l.blackboard });
  add('课后练习', l.exercises && { html: renderExercises(l.exercises) });
  add('教学反思', l.reflection && { body: l.reflection });

  let secHtml = '';
  secs.forEach(function(sec) {
    if (sec.list) {
      secHtml += '<div class="sec"><h3><span class="sno">' + sec.no + '</span>' + sec.name + '<span class="scopy" data-copy-key="' + escAttr(sec.key) + '">复制</span></h3><ul>' + sec.list.map(function(x){ return '<li>' + escAttr(x) + '</li>'; }).join('') + '</ul></div>';
    } else if (sec.steps) {
      let stepsHtml = '';
      sec.steps.forEach(function(s) {
        stepsHtml += '<div class="step"><div class="sn"><span class="sno sm">' + s.n + '</span>' + escAttr(s.name) + '<span class="st">' + escAttr(s.time) + '</span></div>' + renderStepContent(s.content) + '</div>';
      });
      secHtml += '<div class="sec"><h3><span class="sno">' + sec.no + '</span>' + sec.name + '<span class="scopy" data-copy-key="' + escAttr(sec.key) + '">复制</span></h3>' + stepsHtml + '</div>';
    } else if (sec.html) {
      secHtml += '<div class="sec"><h3><span class="sno">' + sec.no + '</span>' + sec.name + '<span class="scopy" data-copy-key="' + escAttr(sec.key) + '">复制</span></h3>' + sec.html + '</div>';
    } else {
      secHtml += '<div class="sec"><h3><span class="sno">' + sec.no + '</span>' + sec.name + '<span class="scopy" data-copy-key="' + escAttr(sec.key) + '">复制</span></h3><p>' + escAttr(sec.body) + '</p></div>';
    }
  });

  const fav = state.favorites.indexOf(l.id) >= 0;
  const fid = escAttr(l.id);

  let html = '';
  html += '<div class="hero">';
  html += '  <div class="badges2"><span class="badge2">' + escAttr(l.book) + '</span><span class="badge2">' + escAttr(l.lessonTypeName) + '</span><span class="badge2">' + l.duration + '分钟</span></div>';
  html += '  <h1>' + escAttr(l.title) + '</h1>';
  html += '  <div class="hsub">' + escAttr(l.unitTitle) + '</div>';
  html += '  <div class="hstat">浏览 ' + (l.viewCount || 0) + ' · 下载 ' + (l.downloadCount || 0) + '</div>';
  html += '</div>';
  html += secHtml;
  html += '<div class="hint" style="margin-top:8px">— 以下为小程序下载栏，预览中点击会提示效果 —</div><div style="height:70px"></div>';

  $('content').innerHTML = html;

  let bar = document.querySelector('.dlbar');
  if (bar) bar.remove();
  bar = document.createElement('div');
  bar.className = 'dlbar';
  bar.innerHTML =
    '<span class="fav" data-fav-id="' + fid + '">' + (fav ? '★' : '☆') + '</span>' +
    '<div class="fmts">' +
      '<span class="fmt ' + (state.favFmt === 'word' ? 'on' : '') + '" data-fmt="word">Word</span>' +
      '<span class="fmt ' + (state.favFmt === 'pdf' ? 'on' : '') + '" data-fmt="pdf">PDF</span>' +
      '<span class="fmt ' + (state.favFmt === 'ppt' ? 'on' : '') + '" data-fmt="ppt">PPT</span>' +
    '</div>' +
    '<div class="btn" data-dl-id="' + fid + '">⬇ 下载 ' + state.favFmt.toUpperCase() + '</div>';
  $('content').appendChild(bar);
}

function setFmt(f) { state.favFmt = f; renderDetail(); }
function copySection(key) { toast('已复制本节（预览版）'); }

function doDownload(id) {
  const l = getLesson(id);
  if (l && state.downloads.indexOf(id) < 0) state.downloads.unshift(id);
  toast('已生成 ' + state.favFmt.toUpperCase() + '（预览：实际会在微信中打开文件）');
  renderDetail();
}

// ===== 清空操作 =====
function clearAll(kind) {
  if (kind === 'fav') { state.favorites = []; toast('已清空收藏'); }
  else if (kind === 'dl') { state.downloads = []; toast('已清空下载'); }
  else if (kind === 'rc') { state.recents = []; toast('已清空浏览'); }
  else if (kind === 'all') { state.favorites = []; state.downloads = []; state.recents = []; toast('已清空全部'); }
  render();
}

// ===== 初始化演示数据 & 首次渲染 =====
$('backBtn').addEventListener('click', goBack);
$('content').addEventListener('click', function(e) {
  var t = e.target.closest('[data-id]'); if (t) { openDetail(t.getAttribute('data-id')); return; }
  var f = e.target.closest('[data-fav-id]'); if (f) { toggleFav(f.getAttribute('data-fav-id')); return; }
  var c = e.target.closest('[data-copy-key]'); if (c) { copySection(c.getAttribute('data-copy-key')); return; }
  var b = e.target.closest('[data-book]'); if (b) { setBook(b.getAttribute('data-book')); return; }
  var h = e.target.closest('[data-hist]'); if (h) { onPrevHistory(h.getAttribute('data-hist')); return; }
  var x = e.target.closest('[data-clear]'); if (x) { onPrevClear(); return; }
  var m = e.target.closest('[data-fmt]'); if (m) { setFmt(m.getAttribute('data-fmt')); return; }
  var d = e.target.closest('[data-dl-id]'); if (d) { doDownload(d.getAttribute('data-dl-id')); return; }
});
$('content').addEventListener('change', function(e) {
  if (e.target.classList.contains('sin')) { onPrevSearch(e.target.value); }
});

state.downloads = ['l-cn-bs-u1-1', 'l-cn-bs-u1-2'];
state.recents = ['l-cn-bs-u1-1', 'l-cn-bs-u2-1', 'l-cn-bx-u1-1'];
state.favorites = ['l-cn-bs-u1-3'];
render();
</script>
