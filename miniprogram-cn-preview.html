持续，证恒在日日不止』。」 板书时机：黑板展示前后对比红笔。差异化提示：B班看结果；A班说每处理由。易错点提醒：改是改更好，同一段可多方向优化。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 终稿互签","time":"12分钟","content":"【PPT P6 环节说明】教师：「据讲评改终稿，同桌互签一句评语。」 学生改+互签。板书时机：教师巡选优段备论坛。差异化提示：B班改1-2处+互签；A班改3处+自评。易错点提醒：互签写具体，如「分析句还可再连一点」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 议论段讲评 ──┐\n│ 【三标准】     │\n│ 观点显·论据贴·│\n│ 分析连         │\n│              │\n│ A:提观点到段首│\n│ B:换贴论据    │\n│ C:俱佳→赏     │\n│              │\n│ 改三方向:     │\n│ 显观点/贴论据/│\n│ 连分析         │\n└──────────────┘","exercises":"【基础作业】1. 提交议论段终稿（改后），附互签评语。2. 写50字自评：我改了什么、为什么。\n【提高作业】将议论段扩为400字小议论文（加一个分论点段），两段都用五步法。\n【参考答案——教师用】终稿评价：观点显+论据贴+分析连=合格；引典恰+分析深=良好。自评评价：说清改了什么=合格。","reflection":"✅ 亮点：三典型精准，移位改法（观点提段首）学生直呼「原来这么简单」；论据贴切红线及时。\n⚠️ 需改进：B（论据脱节）讲评时部分人仍选拧例，需给「选前自问」习惯。\n📌 下节课衔接：下节课单元论坛，优秀议论段宣读。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T10:30:00Z"},{"id":"l-cn-bs-u6-8","lessonId":"l-cn-bs-u6-8","title":"单元活动——「我的学习观」论坛","book":"必修上册","unitNumber":6,"unitTitle":"学习之道","taskGroup":"思辨性阅读与表达","lessonType":"huodong","lessonTypeName":"单元活动","periodNumber":8,"duration":45,"grade":"高一","subject":"语文","tags":["思辨阅读","论坛","学习观","成果展示","人教版必修上U6","第八课时"],"textbookAnalysis":"本课为第六单元收官，举办「我的学习观」论坛，整合本单元阅读与写作：经典引述展（劝学/师说/党八股/拿来名句）、议论段宣读、学习观分享。含三环节：①名句墙；②议论段宣读（精选）；③单元反思单（回顾「精读—群文—写作」路径）。","overview":"【学情分析】A班：议论段质量高可宣读；反思深。B班：部分羞于宣读宜代表；对单元路径需结构化回顾。共同问题：单元「学了什么」缺整体认知。","objectives":["语言能力：能清晰宣读一段议论段或分享学习观，做到观点显、有条理。","文化意识：在论坛中形成对「学习之道」的个性化理解。","思维品质：填单元反思单，梳理阅读—写作路径，培养元认知。","学习能力：整合经典名句/议论段为单元成果。"],"keyPoints":"① 名句墙：四篇核心句展示。\n② 议论段宣读：精选3-5段，限时3分钟。\n③ 反思单：回顾路径——精读→群文→写作。","difficulties":"① 宣读条理。原因：易念稿无重点，需三框架。\n② 元认知。原因：习惯空话，需具体提示。\n③ 参与面。原因：时间有限，需分组并行。","teachingMethods":"① 展览法：名句墙。\n② 宣读工作坊：三框架。\n③ 反思单法：结构化。\n④ 教师总结法：点明学习之道。","preparation":"【PPT课件】P1 论坛流程；P2 宣读框架（观点/论据/分析）；P3 名句墙布置；P4 单元路径图；P5 反思单。\n【实物教具】学生议论段+名句卡；A3墙；便签。\n【音频】无。","process":[{"step":"Step 1 名句墙","time":"5分钟","content":"【PPT P3 布置】教师：「把四篇核心句贴成『学习之道名句墙』：学不可以已／道之所存师之所存／占有挑选／分析句连接。」 学生贴。板书时机：黑板写「名句墙：四篇眼光」。差异化提示：B班贴本组；A班布展+导览。易错点提醒：名句要标篇名——学术诚信，引述有出处。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 议论段宣读（上）","time":"15分钟","content":"【PPT P1 流程】【PPT P2 框架】教师：「精选段3分钟宣读，用框架：我的观点/我的论据/我的分析。」 学生宣读。板书时机：旁记亮点。差异化提示：B班小组代表；A班独宣+PPT。易错点提醒：宣读亮「分析句」最出彩——别只念例子。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 参观+便签","time":"8分钟","content":"【PPT P3 环节说明】教师：「参观名句墙，给一段写便签：亮点+问题。」 学生写。板书时机：收便签。差异化提示：B班写1张；A班写2张具体。易错点提醒：反馈善意具体——「分析句把喻和点连上了」比「写得好」有用。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 反思单","time":"10分钟","content":"【PPT P5 模板】教师：「填反思单三行：①我学会了（论证/写作）；②我需提升；③我的疑问。」 预设回答：「①学会写分析句。②提升论据贴切度。③怎么让议论不枯燥？」 板书时机：巡选分享。差异化提示：B班填前两行；A班全填+疑问有思。易错点提醒：反思写具体「一个方法」非「学到很多」。"},{"step":"Step 5 总结","time":"7分钟","content":"【PPT P4 路径】教师总结：「这单元从读《劝学》到写议论段——古人劝学，我们学着『有理有据地想、清楚明白地写』。学习之道，也在学怎么表达。」 板书时机：黑板写「读→写：有理有据」。差异化提示：B班听；A班写一句下单元期待。易错点提醒：单元结束是起点——论证能力是一辈子的事。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 我的学习观论坛 ──┐\n│ 名句墙:四篇眼光   │\n│ 学不可以已       │\n│ 道存即师         │\n│ 占有+挑选        │\n│ 分析连接         │\n│                │\n│ 【宣读框架】     │\n│ 观点/论据/分析   │\n│                │\n│ 【单元路径】     │\n│ 精读→群文→     │\n│ 写作            │\n│                │\n│ 【反思三问】     │\n│ ①我学会了__    │\n│ ②我需提升__    │\n│ ③我的疑问__    │\n│                │\n│ 读→写:有理有据  │\n└────────────────┘","exercises":"【基础作业】1. 提交单元反思单（三行完整）。2. 将最满意议论段誊清归档。\n【提高作业】写150字「单元总结」，要求：①点明最重要的方法；②举一篇/一段说明；③说一个想提升的方面。\n【参考答案——教师用】反思单评价：三行具体=合格；有方法意识=良好；疑问有思=优秀。单元总结评价：点明方法+举例=合格；有个性化反思=良好；优秀。","reflection":"✅ 亮点：名句墙让四篇「眼光」可视化；宣读框架（观点/论据/分析）让发言有锋芒，分析句成亮点。\n⚠️ 需改进：15分钟只轮部分人；下次分两批或限2分钟。\n📌 下单元衔接：第七单元「自然情怀」转文学阅读与写作，从「论」到「美」，方法不同需提示。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T10:30:00Z"},{"id":"l-cn-bs-u7-1","lessonId":"l-cn-bs-u7-1","title":"故都的秋 精读——清静悲凉的秋味与形散神聚","book":"必修上册","unitNumber":7,"unitTitle":"自然情怀","taskGroup":"文学阅读与写作","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":1,"duration":45,"grade":"高一","subject":"语文","tags":["文学阅读","郁达夫","故都的秋","情景交融","形散神聚","人教版必修上U7","第一课时"],"textbookAnalysis":"《故都的秋》是郁达夫散文名篇。开篇「北国的秋，却特别地来得清，来得静，来得悲凉」定基调，以「清、静、悲凉」为文眼，选取庭院秋景、槐树落蕊、秋蝉残声、秋雨闲人、秋果胜果五幅画面，于细微处写尽故都秋味。形散（选材散）神聚（悲凉一以贯之），是散文「形散神聚」的范本。","overview":"【学情分析】A班：能赏景物描写，可深入「清静悲凉」的文化心理（悲秋传统）；对「形散神聚」有概念。B班：景物画面能找，但「悲凉」读不出，易只当写景；「形散神聚」陌生。共同问题：把散文当说明文读，抓不住「神」（情感基调）；对「悲凉即美」的审美不习惯。","objectives":["语言能力：找出五幅秋景画面，解释「清、静、悲凉」在文中的具体体现，朗读富于情味。","文化意识：理解中国文人「悲秋」传统与郁达夫在乱世中的生命感怀。","思维品质：通过分析「形散神聚」，培养从散乱选材中把握情感主线的能力。","学习能力：掌握「抓文眼→理画面→明神聚」的散文读法。"],"keyPoints":"① 文眼：清、静、悲凉（全文基调）。\n② 五幅画面：庭院秋景、槐树落蕊、秋蝉残声、秋雨闲人、秋果胜果。\n③ 形散神聚：选材散（五幅）而神聚（悲凉一贯）。","difficulties":"① 悲凉之美。原因：学生喜「热闹美」，难赏寂寥，需引导「悲凉即深沉」。\n② 形散神聚。原因：易只见散不见聚，需点明文眼统摄。\n③ 细微处。原因：落蕊无声等细节易忽略，需细读。","teachingMethods":"① 诵读法：范读→品读。\n② 画面归纳法：五幅图。\n③ 文眼支架法：清静悲凉贯穿。\n④ 比较法：南国秋vs北国秋。","preparation":"【PPT课件】P1 郁达夫与故都+文眼；P2 五幅画面图；P3 清静悲凉解码（每画面对应）；P4 形散神聚结构；P5 南国秋vs北国秋；P6 朗读指导；P7 练习。\n【实物教具】无。\n【音频】配乐朗诵1分40秒。","process":[{"step":"Step 1 导入——文眼","time":"5分钟","content":"【PPT P1 文眼】教师：「郁达夫说北国的秋『特别地来得清，来得静，来得悲凉』。这三个词是全文的——」 预设回答：「文眼！基调！」 教师：「记住这三个字，读全文都围着它转。」 板书时机：黑板中央写「清·静·悲凉（文眼）」。差异化提示：B班说三词；A班需说「为何悲凉也是美」。易错点提醒：文眼=统摄全文的情感词，不是随便一句；「悲凉」是审美不是消极。"},{"step":"Step 2 五幅画面","time":"12分钟","content":"【PPT P2 五图】教师：「作者选了哪几幅秋景？庭院破屋喝茶、槐树落蕊、秋蝉残声、秋雨话凉、秋果胜果。」 学生找。板书时机：黑板列五幅画面。差异化提示：B班说画面名；A班需各摘一句原文。易错点提醒：选材很「散」（破屋/落蕊/蝉声各不相干），但都服务悲凉——这就是形散。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 清静悲凉解码","time":"12分钟","content":"【PPT P3 解码】教师：「每幅怎么体现清静悲凉？落蕊『无声无息』=静；秋蝉『残声』=悲凉；破屋喝茶=清闲。」 板书时机：黑板连线「画面→清/静/悲凉」。差异化提示：B班说1-2处；A班全解五幅。易错点提醒：解码要「贴文本」——说清哪句写出哪种味，不空贴标签。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 形散神聚","time":"8分钟","content":"【PPT P4 结构】教师：「五幅画看似散，神却都聚在『悲凉』。这叫形散神聚。」 板书时机：黑板画「散（五画）→聚（悲凉）」。差异化提示：B班记概念；A班需说「若无文眼会怎样」。易错点提醒：散文之妙在「散中求聚」——读散文先找那个「聚」的眼。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 南北秋比较","time":"5分钟","content":"【PPT P5 比较】教师：「为何不写南国秋？『草木凋得慢』不够味——反衬北国秋浓。」 板书时机：黑板写「南国（淡）↔北国（浓）」。差异化提示：B班听；A班需说反衬作用。易错点提醒：写北国而提南国，是衬托非跑题。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"3分钟","content":"【PPT P7 练习】教师：「《故都的秋》读法？」 预设回答：「抓文眼→理画面→明神聚！」 板书时机：板书读法。差异化提示：B班背五幅；A班写80字「我眼里的清静悲凉」。易错点提醒：下节课《荷塘月色》同是写景抒情，可比情景关系。"}],"blackboard":"┌── 故都的秋 郁达夫 ──┐\n│ 文眼:清·静·悲凉   │\n│                │\n│ 【五幅画面】     │\n│ 庭院破屋喝茶    │\n│ 槐树落蕊(无声)  │\n│ 秋蝉残声        │\n│ 秋雨话凉        │\n│ 秋果胜果        │\n│                │\n│ 解码:          │\n│ 落蕊=静 蝉=悲凉│\n│ 破屋=清闲       │\n│                │\n│ 形散神聚        │\n│ 散(五画)→聚(悲凉)│\n│                │\n│ 南国(淡)↔北国(浓)│\n└────────────────┘","exercises":"【基础作业】1. 列出文中五幅秋景画面。2. 用原文词语说明「清/静/悲凉」各一例。\n【提高作业】写160字「我眼里的清静悲凉」，要求：①仿五幅式选身边一景；②用一情感词统摄；③贴细处描写。\n【参考答案——教师用】基础1评价：五幅全=合格。基础2：清=破屋喝茶的闲；静=落蕊无声；悲凉=秋蝉残声。提高作业评价：有画面+有统摄词+细处=良好；能赏寂寥美=优秀。","reflection":"✅ 亮点：文眼支架让B班也抓住「悲凉」主线；五幅画面归纳把散文读「散」变成读「聚」。\n⚠️ 需改进：部分B班生不赏悲凉，嫌「丧」；下次加「悲凉为何是高级美」的短讨论。\n📌 下节课衔接：下节课《荷塘月色》同写景抒情，比较两文「景与情」的贴合方式。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T11:00:00Z"},{"id":"l-cn-bs-u7-2","lessonId":"l-cn-bs-u7-2","title":"荷塘月色 精读——荷香月色中的淡淡喜悦与哀愁","book":"必修上册","unitNumber":7,"unitTitle":"自然情怀","taskGroup":"文学阅读与写作","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":2,"duration":45,"grade":"高一","subject":"语文","tags":["文学阅读","朱自清","荷塘月色","通感","情景交融","人教版必修上U7","第二课时"],"textbookAnalysis":"《荷塘月色》写朱自清夜游清华荷塘。以「颇不宁静」起，沿途景（小煤屑路、荷塘）渐入佳境，月下荷塘与塘上月色两段用比喻、通感（清香如歌声）、叠词极写素淡朦胧之美，结尾「猛一抬头，不觉已是自己的门前」回到不宁静。景愈美，反衬心中挥不去的淡淡哀愁，情景交融典范。","overview":"【学情分析】A班：能赏比喻通感，可深入「乐景写哀」的反衬；对「不宁静」的时代背景有联想。B班：比喻能找，通感陌生；「不宁静」读不出，以为纯写景。共同问题：把月光荷香当单纯美文，忽略情感起伏；叠词作用说不清。","objectives":["语言能力：赏析月下荷塘的比喻与通感（清香如梵婀玲上奏着的名曲），说出叠词的表达效果。","文化意识：理解朱自清在时代夹缝中「颇不宁静」的生命状态与夜游的自我安顿。","思维品质：通过分析「景美情哀」的反衬，培养情景关系辨析能力。","学习能力：掌握「抓情感线→赏写景句→明情景交融」的散文读法。"],"keyPoints":"① 情感线：颇不宁静→渐静→荷塘陶醉→回到不宁静（圆形结构）。\n② 写景佳句：月下荷塘（比喻/通感）、塘上月色（如流水）。\n③ 情景交融：以极美之景反衬心底不宁静（乐景写哀）。","difficulties":"① 通感。原因：跨感官修辞陌生，需举例（香→声）。\n② 乐景写哀。原因：学生只见美不见哀，需点明反衬。\n③ 圆形结构。原因：首尾「不宁静」回环，需框示。","teachingMethods":"① 诵读法：美读两段。\n② 修辞解码法：比喻/通感/叠词。\n③ 情感曲线法：画不宁静起伏。\n④ 背景支架法：补时代心境。","preparation":"【PPT课件】P1 朱自清+不宁静；P2 情感曲线（不宁静→静→醉→不宁静）；P3 月下荷塘句解码（比喻/通感/叠词）；P4 塘上月色句；P5 情景交融（乐景写哀）；P6 朗读；P7 练习。\n【实物教具】无。\n【音频】配乐朗诵2分钟。","process":[{"step":"Step 1 导入——不宁静","time":"5分钟","content":"【PPT P1 不宁静】教师：「开篇第一句『这几天心里颇不宁静』。全文就围着这『不宁静』。」 预设回答：「所以他夜里去荷塘散心！」 板书时机：黑板写「颇不宁静（情感线头）」。差异化提示：B班说起因；A班需联时代（1927苦闷）。易错点提醒：「不宁静」是全文情脉，不是闲笔；读散文先抓情绪起点。"},{"step":"Step 2 情感曲线","time":"8分钟","content":"【PPT P2 曲线】教师：「沿着小路走，心渐静；到荷塘陶醉；结尾『猛一抬头』又回不宁静——首尾呼应，圆形。」 板书时机：黑板画曲线（起点不宁静→谷底静→峰醉→回不宁静）。差异化提示：B班说首尾；A班需说「为何回到原点」。易错点提醒：圆形结构=情绪没真解决，只是夜游暂歇，更显愁深。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 月下荷塘解码","time":"12分钟","content":"【PPT P3 句】教师：「『清香仿佛远处高楼上渺茫的歌声似的』——香怎么变歌声？这是通感，跨感官。『亭亭的舞女的裙』比喻荷。『曲曲折折』『田田』叠词增韵。」 板书时机：黑板列修辞（比喻/通感/叠词）。差异化提示：B班说比喻；A班需解通感（嗅觉→听觉）。易错点提醒：通感是「感觉互通」，非乱比；叠词除形貌还添音乐美。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 塘上月色","time":"6分钟","content":"【PPT P4 句】教师：「『月光如流水一般，静静地泻在这一片叶子和花上』——泻字写出流动感。」 板书时机：黑板标「泻=流动」。差异化提示：B班赏句；A班需说动词妙。易错点提醒：动词「泻/浮/洗」皆活化静态月色，细品一字。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 情景交融","time":"8分钟","content":"【PPT P5 交融】教师：「景写得越美（荷香月色），回头『不宁静』越刺心——以乐景写哀情，反衬。」 板书时机：黑板写「乐景(荷塘)→反衬→哀(不宁静)」。差异化提示：B班听；A班需说「若只写愁会怎样」。易错点提醒：景美是为情设——美到极致更显现实沉重，这是高级交融。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"6分钟","content":"【PPT P7 练习】教师：「《荷塘月色》读法？」 预设回答：「抓情感线→赏写景句→明交融！」 板书时机：板书读法。差异化提示：B班背佳句；A班写80字「我的一次不宁静与安顿」。易错点提醒：下节课群文比《故都的秋》《荷塘月色》情景交融之法。"}],"blackboard":"┌── 荷塘月色 朱自清 ──┐\n│ 情感线:颇不宁静  │\n│ →静→醉→不宁静   │\n│ (圆形结构)       │\n│                │\n│ 月下荷塘:       │\n│ 比喻:舞女裙     │\n│ 通感:香→歌声    │\n│ 叠词:田田/亭亭  │\n│                │\n│ 塘上月色:       │\n│ 泻/浮/洗(活化)  │\n│                │\n│ 情景交融:       │\n│ 乐景(荷塘)↔哀(不宁静)│\n│ 反衬           │\n└────────────────┘","exercises":"【基础作业】1. 划出文中运用比喻、通感、叠词的句子各一例。2. 解释「通感」并举文中例。\n【提高作业】写160字「我的不宁静与安顿」，要求：①仿情感曲线写自己一次情绪；②用一处比喻或叠词写景；③点明安顿方式。\n【参考答案——教师用】基础2：通感=感觉互通，如「清香仿佛渺茫的歌声」把嗅觉当听觉写。提高作业评价：有曲线+修辞+安顿=良好；景情相生=优秀。","reflection":"✅ 亮点：情感曲线把抽象「不宁静」可视化，B班也懂圆形结构；通感解码（香→声）一讲就通。\n⚠️ 需改进：时代背景补得短，部分B班生不懂为何「不宁静」；下次加1分钟1927情境。\n📌 下节课衔接：下节课群文比两文情景交融，提炼写景散文读法。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T11:00:00Z"},{"id":"l-cn-bs-u7-3","lessonId":"l-cn-bs-u7-3","title":"群文阅读——故都的秋·荷塘月色 情景交融比较","book":"必修上册","unitNumber":7,"unitTitle":"自然情怀","taskGroup":"文学阅读与写作","lessonType":"qunwen","lessonTypeName":"群文阅读","periodNumber":3,"duration":45,"grade":"高一","subject":"语文","tags":["文学阅读","群文","郁达夫","朱自清","情景交融","人教版必修上U7","第三课时"],"textbookAnalysis":"群文比较《故都的秋》与《荷塘月色》——同写自然、同情景交融，但路径不同：郁达夫以「悲凉」统摄五幅散景（以情驭景），朱自清以「不宁静」起伏中写荷塘之美反衬哀（以景衬情）。通过比较提炼写景散文「情景交融」的两种范式，为单元写作蓄势。","overview":"【学情分析】A班：两文已读，能比情景关系，可深入「以情驭景vs以景衬情」的范式差异。B班：单篇懂但比较框架缺，需双栏。共同问题：比较易罗列异缺归纳——发现「都情景交融」后不会提炼范式。","objectives":["语言能力：用双栏比较两文「情感基调/写景方式/情景关系」，说出范式差异。","文化意识：在比较中体会中国文人「借自然安顿心灵」的共同传统。","思维品质：通过比较培养同中求异、提炼范式的思维。","学习能力：掌握散文群文双栏比较法，能迁移他文。"],"keyPoints":"① 故都：以情驭景（悲凉统五画）。\n② 荷塘：以景衬情（美荷塘反衬不宁静）。\n③ 共性：皆情景交融，皆借自然安顿心。","difficulties":"① 范式区分。原因：学生混「情驭景/景衬情」，需点明谁主谁宾。\n② 双栏填。原因：维度不清，需给框架。\n③ 共性提炼。原因：易停差异，需归纳。","teachingMethods":"① 双栏比较法。\n② 范式命名法：情驭景/景衬情。\n③ 归纳法。\n④ 迁移法。","preparation":"【PPT课件】P1 两文封面；P2 双栏（基调/写景/情景）；P3 范式（情驭景vs景衬情）；P4 共性（借自然安顿）；P5 迁移；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——同与异","time":"5分钟","content":"【PPT P1】教师：「两篇都写自然、都情景交融，但郁达夫和朱自清『融』法一样吗？」 预设回答：「不一样——一个悲凉贯到底，一个景美心哀。」 板书时机：黑板写「同：情景交融；异：法不同」。差异化提示：B班说同异；A班需预判。易错点提醒：别只说「都写景」——要比「情怎么和景融」。"},{"step":"Step 2 双栏比较","time":"12分钟","content":"【PPT P2 表】教师：「填双栏：基调（悲凉/不宁静）、写景（五散画/荷塘两段）、情景（情驭景/景衬情）。」 学生填。板书时机：黑板画双栏。差异化提示：B班填基调+写景；A班全填。易错点提醒：同维度比——都在「基调/写景/情景」下，不能乱比。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 范式命名","time":"10分钟","content":"【PPT P3 范式】教师：「故都：悲凉在先，五画服从它=以情驭景。荷塘：荷塘美在先，反衬不宁静=以景衬情。一情主一景主。」 板书时机：黑板写「情驭景↔景衬情」。差异化提示：B班记两词；A班需说「谁主」。易错点提醒：范式区别在「谁带动谁」——情带景 or 景带情，读散文先判。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 共性提炼","time":"8分钟","content":"【PPT P4 共性】教师：「差异之后共性？」 预设回答：「都借自然安顿心——郁达夫赏悲凉，朱自清夜游荷塘，都是和自然对话疗愈。」 板书时机：黑板写「借自然安顿心灵」。差异化提示：B班说1点；A班需整合。易错点提醒：归纳是群文目的——异是手段，共性是收获。"},{"step":"Step 5 迁移","time":"6分钟","content":"【PPT P5 迁移】教师：「这比较法可用到《我与地坛》《赤壁赋》——都是借景安顿。」 板书时机：板书「可迁移」。差异化提示：B班听；A班需说下两篇可比什么。易错点提醒：下节课读《我与地坛》，地坛如何安顿史铁生。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 作业","time":"4分钟","content":"【PPT P6 练习】教师：「据双栏写一段比较，下节课用。」 板书时机：板书群文读法。差异化提示：B班背双栏；A班写比较段。易错点提醒：写作用原句支撑，不贴标签。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 故都·荷塘 群文 ──┐\n│ 同:情景交融      │\n│ 异:法不同        │\n│                │\n│ 【双栏】         │\n│ 基调:悲凉↔不宁静│\n│ 写景:五画↔荷塘  │\n│ 情景:情驭↔景衬  │\n│                │\n│ 范式:           │\n│ 情驭景(情主)    │\n│ 景衬情(景主)    │\n│                │\n│ 共性:           │\n│ 借自然安顿心灵  │\n└────────────────┘","exercises":"【基础作业】1. 完成双栏（基调/写景/情景）。2. 用一句话说两文范式差异。\n【提高作业】写180字比较短文，要求：①同维度；②各引一句；③提炼范式差异。\n【参考答案——教师用】基础1评价：双栏全+维度对=合格。提高作业评价：同维度+引句+范式明=良好；能析谁主=优秀。","reflection":"✅ 亮点：范式命名（情驭景/景衬情）让学生抓住比较内核，B班也能填双栏；共性「借自然安顿」有温度。\n⚠️ 需改进：B班生常混两范式，需更多对比例句；下次加判定口诀。\n📌 下节课衔接：下节课《我与地坛》，看地坛如何安顿史铁生。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T11:00:00Z"},{"id":"l-cn-bs-u7-4","lessonId":"l-cn-bs-u7-4","title":"我与地坛（节选）精读——地坛与生命，母爱的深沉","book":"必修上册","unitNumber":7,"unitTitle":"自然情怀","taskGroup":"文学阅读与写作","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":4,"duration":45,"grade":"高一","subject":"语文","tags":["文学阅读","史铁生","我与地坛","生命哲思","母爱","人教版必修上U7","第四课时"],"textbookAnalysis":"《我与地坛》是史铁生散文。双腿残废后他常去地坛，「荒芜但不衰败」的园子成为他思考生死、安顿精神的所在（第一部分）；母亲默默承受、悄然寻子（第二部分），地坛与母亲共同成全了他的重生。景（地坛）、理（生死）、情（母爱）三层交织，是「自然安顿生命」的深刻范本。","overview":"【学情分析】A班：能深入生死哲思与母爱双重主题，可联自身困境；对「荒芜但不衰败」有共鸣。B班：地坛景能读，哲思（死是必然）难懂；母爱段易感动但缺分析。共同问题：把地坛当普通公园，不懂它「精神家园」意；对「母亲」主题读浅。","objectives":["语言能力：解释「荒芜但不衰败」的含意，摘抄描写地坛与母亲的动人句，朗读含情。","文化意识：理解史铁生借地坛参透生死、借母爱重获力量的生命态度。","思维品质：通过分析「景—理—情」交织，培养多层意蕴解读能力。","学习能力：掌握「抓意象→析哲理→悟深情」的散文读法。"],"keyPoints":"① 地坛意象：荒芜但不衰败=残躯中的生机（精神家园）。\n② 生死哲理：死是必然节日，不必急于求成（参透生死）。\n③ 母爱：母亲默默承受、悄然寻子，成全重生。","difficulties":"① 生死哲理。原因：少年难懂「死是节日」，需慢引。\n② 地坛象征。原因：易当真公园，需点明精神家园。\n③ 母爱深入。原因：易感动缺析，需联「成全」。","teachingMethods":"① 诵读法：读景段/母爱段。\n② 意象解码法：荒芜但不衰败。\n③ 哲理讨论法：生死之问。\n④ 情感体验法：母爱细节。","preparation":"【PPT课件】P1 史铁生与地坛+困境；P2 地坛意象（荒芜但不衰败）解码；P3 生死哲理（死是节日）；P4 母爱细节（悄然寻子）；P5 景理情交织；P6 朗读；P7 练习。\n【实物教具】无。\n【音频】配乐朗诵2分钟。","process":[{"step":"Step 1 导入——地坛为何","time":"5分钟","content":"【PPT P1 困境】教师：「21岁瘫了，史铁生天天去地坛发呆。地坛对他不是公园，是——」 预设回答：「精神家园！想生死的地方！」 板书时机：黑板写「地坛=精神家园」。差异化提示：B班说去处；A班需说「为何是地坛」。易错点提醒：地坛是象征——承载他生死之思的容器，非写景对象。"},{"step":"Step 2 地坛意象","time":"12分钟","content":"【PPT P2 解码】教师：「『园子荒芜但不衰败』——荒芜是他残躯，不衰败是园中虫鸟草木的生机。他在荒芜里看见不衰败。」 板书时机：黑板写「荒芜(残)↔不衰败(生机)」。差异化提示：B班说词义；A班需联自身困境。易错点提醒：解码要「以景写心」——写园即写己，景情互文。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 生死哲理","time":"12分钟","content":"【PPT P3 哲理】教师：「他想通了什么？『死是一件不必急于求成的事，死是一个必然会降临的节日。』所以好好活。」 板书时机：黑板写「死=节日(必至)→好好活」。差异化提示：B班记句；A班需说「这想法怎安顿他」。易错点提醒：哲理不是消极——接受死之必然，反更珍生，是积极安顿。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 母爱","time":"10分钟","content":"【PPT P4 母爱】教师：「母亲怎样？他疯转时母亲『送』又『不去』，悄然到地坛寻他。母爱的深沉在『不说』。」 板书时机：黑板写「母爱：默默承受·悄然寻子」。差异化提示：B班说细节；A班需说「不说之爱更沉」。易错点提醒：母爱段是「理」后的「情」落点——地坛给他理，母亲给他力，二者成全重生。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 景理情交织","time":"4分钟","content":"【PPT P5 交织】教师：「景（地坛）→理（生死）→情（母爱），三层织成一篇。」 板书时机：黑板画「景→理→情」。差异化提示：B班记三层；A班需说关系。易错点提醒：读此文三层都要抓，缺一层就不完整。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"2分钟","content":"【PPT P7 练习】教师：「《我与地坛》读法？」 预设回答：「抓意象→析哲理→悟深情！」 板书时机：板书读法。差异化提示：B班背佳句；A班写80字「我的精神家园」。易错点提醒：下节课读《赤壁赋》，苏轼也在自然中安顿。"}],"blackboard":"┌── 我与地坛 史铁生 ──┐\n│ 地坛=精神家园     │\n│                │\n│ 意象:           │\n│ 荒芜(残)↔不衰败 │\n│  (生机)         │\n│                │\n│ 哲理:           │\n│ 死=节日(必至)   │\n│ →好好活         │\n│                │\n│ 母爱:           │\n│ 默默承受·悄然寻子│\n│                │\n│ 景→理→情        │\n│ (地坛·生死·母)  │\n└────────────────┘","exercises":"【基础作业】1. 解释「荒芜但不衰败」的含意。2. 摘抄一处写母亲细节的句子。\n【提高作业】写160字「我的精神家园」，要求：①写一个安顿你的地方/事物；②仿「荒芜但不衰败」式写出它的双层意；③联自身。\n【参考答案——教师用】基础1：荒芜指园子残破/作者残躯，不衰败指生机/生命力，喻残中见生。基础2评价：摘抄准=合格。提高作业评价：有家园+双层意+联己=良好；能析安顿=优秀。","reflection":"✅ 亮点：景理情三层框架让长文有抓手，B班也懂「地坛=精神家园」；母爱「不说之爱」引发共鸣。\n⚠️ 需改进：生死哲理对B班偏深，部分跳读；下次用「如果只剩一年」小问引。\n📌 下节课衔接：下节课《赤壁赋》，苏轼在被贬中借江山风月安顿。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T11:00:00Z"},{"id":"l-cn-bs-u7-5","lessonId":"l-cn-bs-u7-5","title":"赤壁赋 精读——水月之哲与旷达心胸","book":"必修上册","unitNumber":7,"unitTitle":"自然情怀","taskGroup":"文学阅读与写作","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":5,"duration":45,"grade":"高一","subject":"语文","tags":["文学阅读","苏轼","赤壁赋","旷达","水月之哲","人教版必修上U7","第五课时"],"textbookAnalysis":"《赤壁赋》是苏轼被贬黄州后夜游赤壁之作。主客问答结构：客悲（哀吾生须臾、羡长江无穷），苏子以「水月之喻」解之——逝者如斯而未尝往，盈虚者如彼而卒莫消长（变与不变），且物各有主、共适江上清风明月（知足）。由悲转喜，尽显豁达。景（清风明月）、理（变不变）、情（旷达）交融，是文言写景说理巅峰。","overview":"【学情分析】A班：能跟主客问答与变不变之辩，可深入「旷达」的人生哲学；文言词句可攻。B班：文言障碍大（冯虚御风、须臾），主客结构不清；「变不变」难懂。共同问题：把赋当诗背，不懂主客是「自问自答」的论理；旷达读不出。","objectives":["语言能力：朗读背诵名段，解释「须臾、冯虚、共适」等词，说出主客问答的论理结构。","文化意识：理解苏轼在贬谪中以江山风月安顿、化悲为旷达的生命智慧。","思维品质：通过分析「变与不变」「物各有主」，培养辩证与知足思维。","学习能力：掌握「抓主客→明水月喻→悟旷达」的赋体读法。"],"keyPoints":"① 主客问答：客悲（须臾羡长江）／苏解（变不变、物各有主）。\n② 水月之喻：逝者如斯未尝往，盈虚卒莫消长（变中有不变）。\n③ 旷达：共适清风明月，知足常乐。","difficulties":"① 变不变之辩。原因：辩证抽象，需用例（水逝而存）。\n② 主客结构。原因：易当两人，需点明自问自答。\n③ 文言词。原因：词僻，需随文释义。","teachingMethods":"① 诵读法：范读→背名段。\n② 结构图示法：主客问答框。\n③ 比喻解码法：水月喻变不变。\n④ 语境释义法。","preparation":"【PPT课件】P1 苏轼贬黄州+夜游；P2 主客问答结构（客悲/苏解）；P3 水月之喻（变不变）；P4 旷达（共适风月）；P5 关键词（须臾/冯虚/共适）；P6 朗读；P7 练习。\n【实物教具】无。\n【音频】吟诵1分30秒。","process":[{"step":"Step 1 导入——贬谪夜游","time":"5分钟","content":"【PPT P1】教师：「苏轼被贬黄州，夜游赤壁，写下此赋。开头『清风徐来，水波不兴』多美——但背后是贬谪的苦。」 预设回答：「借着美景他排遣苦闷！」 板书时机：黑板写「贬谪→夜游→赋」。差异化提示：B班说背景；A班需联心境。易错点提醒：赋是「文体」，主客问答是论理手法，非真有两人在船上。"},{"step":"Step 2 主客问答","time":"12分钟","content":"【PPT P2 结构】教师：「客先悲：『哀吾生须臾，羡长江之无穷』。苏子怎么解？用江水明月。」 板书时机：黑板列「客悲：须臾/羡长江｜苏解：水月喻」。差异化提示：B班说客悲；A班需说苏解起手。易错点提醒：主客=苏轼自问自答——客是「困顿的我」，苏是「超脱的我」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 水月之喻","time":"12分钟","content":"【PPT P3 喻】教师：「『逝者如斯而未尝往也，盈虚者如彼而卒莫消长也』——江水去而常在，月圆缺而终不满不空。变中有不变。」 板书时机：黑板写「变(逝/盈虚)↔不变(未尝往/莫消长)」。差异化提示：B班记句；A班需说「这怎么安慰人」。易错点提醒：辩证关键——从「不变」看，物我无尽，何悲之有；这是苏轼的安慰法。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 旷达","time":"10分钟","content":"【PPT P4 旷达】教师：「『且夫天地之间，物各有主……共适江上之清风，与山间之明月』——不争不属于自己的，享眼前风月足矣。」 板书时机：黑板写「物各有主→共适风月(知足)」。差异化提示：B班记句；A班需说「知足为何旷达」。易错点提醒：旷达=接受局限+珍惜当下，非麻木；是积极安顿。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 结构+背诵","time":"4分钟","content":"【PPT P6 背诵】教师：「全文：美景→客悲→苏解→转喜。背水月段。」 板书时机：黑板画结构+标背段。差异化提示：B班背水月句；A班背全段。易错点提醒：背赋先理结构，主客段是脊梁。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"2分钟","content":"【PPT P7 练习】教师：「《赤壁赋》读法？」 预设回答：「抓主客→明水月喻→悟旷达！」 板书时机：板书读法。差异化提示：B班记三词；A班写80字「我的变与不变」。易错点提醒：下节课《登泰山记》，看姚鼐怎样写登山之景。"}],"blackboard":"┌── 赤壁赋 苏轼 ──┐\n│ 贬谪→夜游→赋    │\n│                │\n│ 【主客问答】     │\n│ 客悲:须臾/羡长江│\n│ 苏解:水月喻      │\n│                │\n│ 水月之喻:       │\n│ 变(逝/盈虚)     │\n│ ↔不变(未尝往/   │\n│  莫消长)        │\n│                │\n│ 旷达:           │\n│ 物各有主→共适风月│\n│ (知足)          │\n└────────────────┘","exercises":"【基础作业】1. 背诵「逝者如斯……而吾与子之所共适」段。2. 解释：①须臾 ②冯虚御风 ③共适。\n【提高作业】写160字「我的变与不变」，要求：①借苏轼辩证说一自身困扰；②用「变中有不变」思路；③落到珍惜当下。\n【参考答案——教师用】基础3：①须臾=片刻；②冯虚御风=凌空乘风；③共适=共同享用（风月）。提高作业评价：用辩证+联己+惜当下=良好；能析旷达=优秀。","reflection":"✅ 亮点：主客=自问自答的点破让B班懂结构；水月喻「变中有不变」用例（水逝而存）一讲就通。\n⚠️ 需改进：文言词（冯虚/须臾）B班仍卡，背诵慢；下次给词义卡+分段背。\n📌 下节课衔接：下节课《登泰山记》，姚鼐以简净笔写登山。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T11:00:00Z"},{"id":"l-cn-bs-u7-6","lessonId":"l-cn-bs-u7-6","title":"登泰山记 精读——简净笔法写登山之景","book":"必修上册","unitNumber":7,"unitTitle":"自然情怀","taskGroup":"文学阅读与写作","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":6,"duration":45,"grade":"高一","subject":"语文","tags":["文学阅读","姚鼐","登泰山记","桐城派","简净","人教版必修上U7","第六课时"],"textbookAnalysis":"《登泰山记》是姚鼐（桐城派）游记。记乾隆某冬与友登泰山：交代山势（汶水徂徕如画）、登山路线（中谷→天门）、待日出的艰辛（大风雪）、日出奇观（日正赤如丹、红光动摇承之）、所见（绛皓驳色）。文字简净峭洁，白描取胜，与前面浓墨抒情文形成对照，展现写景另一路数。","overview":"【学情分析】A班：能赏简净白描，可深入桐城派「义法」与前面浓情文对照；登山路线能画。B班：路线易乱，白描「淡」读不出味；与《赤壁赋》繁富比不出。共同问题：嫌文字「干」，不懂简净即美；日出段画面感弱。","objectives":["语言能力：梳理登山路线（中谷→天门→日观亭），解释「苍山负雪、明烛天南」等句，朗读有次第。","文化意识：体会桐城派「雅洁」文风与姚鼐于风雪中登临的文人雅趣。","思维品质：通过比较（与赤壁赋繁富对照）认识写景「繁简」两种路数。","学习能力：掌握「抓路线→赏白描→明简净」的游记读法。"],"keyPoints":"① 路线：泰山南麓→中谷→天门→日观亭（空间次第）。\n② 白描：苍山负雪、明烛天南、日正赤如丹（简净如画）。\n③ 简净风：桐城派雅洁，不铺排。","difficulties":"① 路线空间。原因：文言方位词多，需画线。\n② 白描之妙。原因：学生喜浓墨，淡笔读不出；需点明「少即多」。\n③ 简净对照。原因：难与赤壁赋比，需给维度。","teachingMethods":"① 路线图示法：画登山线。\n② 白描赏读法：逐句解画。\n③ 比较法：与赤壁赋繁简对照。\n④ 诵读法。","preparation":"【PPT课件】P1 姚鼐桐城派+冬登；P2 登山路线图（南麓→中谷→天门→日观亭）；P3 白描句解码（负雪/烛天南/赤如丹）；P4 简净风（雅洁）；P5 与赤壁赋繁简对照；P6 朗读；P7 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——冬登泰山","time":"5分钟","content":"【PPT P1】教师：「姚鼐除夕前登泰山，大风雪。不像苏轼泛舟，他是『硬核』登山。」 预设回答：「写登山过程！风雪中看日出！」 板书时机：黑板写「冬登泰山·风雪」。差异化提示：B班说事件；A班需联桐城派雅洁。易错点提醒：游记两类——抒情（前几篇）与记程（此篇），本文重「记所见次第」。"},{"step":"Step 2 路线","time":"12分钟","content":"【PPT P2 路线】教师：「从南麓出发，循中谷入，越中岭至天门，宿日观亭待日出。空间次第一清二楚。」 板书时机：黑板画路线箭头。差异化提示：B班说关键站；A班需画完整线。易错点提醒：读游记先理「空间线」——作者脚到哪笔到哪，不跳。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 白描解码","time":"12分钟","content":"【PPT P3 句】教师：「『苍山负雪，明烛天南』——山披雪像负着，雪光照亮南天，八字一幅画。日出『日正赤如丹，下有红光动摇承之』，简净如油画。」 板书时机：黑板列白描句+画面。差异化提示：B班说画面；A班需说「负/烛」动词妙。易错点提醒：白描=不加形容直接画——「负/烛」二字抵一堆修饰，少即多。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 简净风","time":"8分钟","content":"【PPT P4 雅洁】教师：「桐城派讲『雅洁』，姚鼐不铺排情绪，只冷静画所见。和《赤壁赋》大段说理抒情相反。」 板书时机：黑板写「简净(雅洁) ↔ 繁富(赋)」。差异化提示：B班听；A班需说两路数。易错点提醒：写景有繁简两路——浓情（前）与白描（此），都是好文章。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 对照","time":"6分钟","content":"【PPT P5 对照】教师：「把《登泰山记》和《赤壁赋》放一起：一简净一繁富，一记程一抒情。」 板书时机：黑板双列对照。差异化提示：B班记二字；A班需说「何时用简何时用繁」。易错点提醒：写法服务目的——记游见闻用简，抒怀说理用繁。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"2分钟","content":"【PPT P7 练习】教师：「《登泰山记》读法？」 预设回答：「抓路线→赏白描→明简净！」 板书时机：板书读法。差异化提示：B班背白描句；A班写80字「我的一次登山/行走」。易错点提醒：下节课写作——学写景物短文，把今天简净与前面情景交融都用上。"}],"blackboard":"┌── 登泰山记 姚鼐 ──┐\n│ 冬登·风雪·雅洁  │\n│                │\n│ 【路线】         │\n│ 南麓→中谷→     │\n│ 天门→日观亭     │\n│ (空间次第)       │\n│                │\n│ 【白描】         │\n│ 苍山负雪        │\n│ 明烛天南        │\n│ 日赤如丹·红光承│\n│                │\n│ 简净↔繁富       │\n│ (记程↔抒情)     │\n└────────────────┘","exercises":"【基础作业】1. 按顺序写出登山路线四站。2. 解释「苍山负雪，明烛天南」的画面意。\n【提高作业】写160字「我的一次行走」，要求：①仿白描写一处所见（少形容多画）；②有空间次第；③简净不铺情。\n【参考答案——教师用】基础2：雪山像背负白雪，雪光映亮南天，八字画出雪后泰山清朗。提高作业评价：白描+次第+简净=良好；动词精准=优秀。","reflection":"✅ 亮点：路线箭头让空间次第一目了然，B班也理清；白描「负/烛」二字赏读破「文字干」的误解。\n⚠️ 需改进：与赤壁赋对照B班弱，部分只记「简净」；下次给对照维度卡。\n📌 下节课衔接：下节课写作——学写景物短文，简净与情景交融并用。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T11:00:00Z"},{"id":"l-cn-bs-u7-7","lessonId":"l-cn-bs-u7-7","title":"写作指导——学写景物短文（情景交融）","book":"必修上册","unitNumber":7,"unitTitle":"自然情怀","taskGroup":"文学阅读与写作","lessonType":"xiezuo","lessonTypeName":"写作指导","periodNumber":7,"duration":45,"grade":"高一","subject":"语文","tags":["文学阅读","写作","景物描写","情景交融","人教版必修上U7","第七课时"],"textbookAnalysis":"本课为第七单元写作任务，学写一篇景物短文（300字左右）。方法：①选一具体自然之景（不泛）；②抓特征细写（形声色味，可学白描）；③融情于景（以情驭景/以景衬情任选一范式）；④用修辞（比喻/通感/叠词）增味。重点是「融情」——学生常「景归景、情归情」两张皮。","overview":"【学情分析】A班：能写有画面短文，但情常贴标签（结尾硬加「我很喜欢」）；可深入范式选择。B班：景能写但空泛（「很美」），情缺席；白描不会。共同问题：景物堆砌无特征；情与景脱节。","objectives":["语言能力：写1篇景物短文（300字），做到景有特征、情融其中、可用修辞。","文化意识：在写作中体会「借自然表情」的文人传统。","思维品质：通过选范式（情驭景/景衬情），培养写景的构思意识。","学习能力：掌握景物短文四步法（选景/特征/融情/修辞）。"],"keyPoints":"① 四步：选具体景→抓特征细写→融情（选范式）→用修辞。\n② 两范式：以情驭景（情在景先）/以景衬情（景美反衬情）。\n③ 避坑：景不空泛（不用「很美」）、情不硬贴。","difficulties":"① 特征具体。原因：学生写「很美」无物，需逼出形声色味。\n② 融情不硬。原因：结尾硬加情，需景中带情。\n③ 范式选。原因：不知用哪种，需提示。","teachingMethods":"① 四步讲授法。\n② 升格示范法：空泛段vs特征段。\n③ 范式卡法：二选一。\n④ 互评法。","preparation":"【PPT课件】P1 四步结构；P2 空泛vs特征升格；P3 两范式（情驭景/景衬情）；P4 修辞库（比喻/通感/叠词）；P5 互评量表；P6 范例。\n【实物教具】便签。\n【音频】无。","process":[{"step":"Step 1 四步结构","time":"8分钟","content":"【PPT P1 四步】教师讲：①选具体一景（一棵树非「公园」）②抓特征细写（形声色味）③融情（选范式）④用修辞。板书时机：黑板画四步阶梯。差异化提示：B班记四步；A班需说「哪步最难」。易错点提醒：选景要「小而具体」——写「窗前那棵老槐」胜过「美丽的春」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 升格示范","time":"12分钟","content":"【PPT P2 升格】教师展示空泛段：「公园的景色真美，花红草绿，我很喜欢。」问：「问题？」 预设回答：「没特征！『美』是空话！」 教师改：「墙角那株腊梅，枝虬如铁，米黄小花攒在褐枝上，冷香钻进领口——天越冷它越精神。」 板书时机：黑板标「特征=形(虬枝)+色(米黄)+味(冷香)」。差异化提示：B班看差；A班需说改法。易错点提醒：把「很美」换成「形声色味」——读者才能看见，不靠你喊美。"},{"step":"Step 3 选范式融情","time":"8分钟","content":"【PPT P3 范式】教师：「融情两种：以情驭景（先有愁，景都带愁）；以景衬情（景越美越显心哀）。你选哪种？」 学生选。板书时机：黑板写两范式。差异化提示：B班选一；A班需说为何选。易错点提醒：情要「化进景里」——不结尾硬喊「我爱」，让景自带情绪。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 写初稿","time":"12分钟","content":"【PPT P4 修辞】教师：「用四步写300字，用一处比喻/通感/叠词，情融景中。」 学生写。板书时机：教师巡选典型。差异化提示：B班写200字+特征；A班写300字+范式+修辞。易错点提醒：修辞服务特征——别为用而用，通感应贴切。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 互评","time":"8分钟","content":"【PPT P5 量表】教师：「交换评：景具体否？情融否（非硬贴）？修辞贴否？」 预设回答：「他写『美』没特征」「她景里带着愁，不喊爱」。 板书时机：黑板列反馈。差异化提示：B班用「有/无」；A班三维打分+建议。易错点提醒：互评看「情是否化进景」——这是景物文灵魂。"},{"step":"Step 6 作业","time":"2分钟","content":"【PPT P6 环节说明】教师：「据互评改终稿，下节课讲评+分享。」 板书时机：板书「景→情」。差异化提示：B班改特征；A班改融情。易错点提醒：下节课讲评，提醒据量表自改。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 学写景物短文 ──┐\n│ 四步阶梯:       │\n│ ①选具体景      │\n│ ②抓特征(形声色味)│\n│ ③融情(选范式)  │\n│ ④用修辞        │\n│                │\n│ 两范式:         │\n│ 情驭景(情先)    │\n│ 景衬情(景美反衬)│\n│                │\n│ 避坑:           │\n│ 不写\"很美\"     │\n│ 情不硬贴        │\n│ 修辞服务特征    │\n└────────────────┘","exercises":"【基础作业】1. 据互评改景物短文终稿（300字）：景具体、情融中、一处修辞。2. 写一句「我用的范式+修辞」。\n【提高作业】另写一段不同范式（如原情驭景改景衬情），要求景美而情隐。\n【参考答案——教师用】基础1评价：特征具体+情融+修辞=合格；白描精准=良好。基础2评价：说清范式=合格。提高作业评价：景美情隐=优秀。","reflection":"✅ 亮点：空泛→特征升格让「不写很美」落地，B班也懂换形声色味；两范式卡降低构思门槛。\n⚠️ 需改进：部分A班生修辞炫而景空，需强「修辞服务特征」红线；下次给反例。\n📌 下节课衔接：下节课讲评+自然之美分享会。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T11:00:00Z"},{"id":"l-cn-bs-u7-8","lessonId":"l-cn-bs-u7-8","title":"写作实践与讲评——景物短文修改、分享与单元总结","book":"必修上册","unitNumber":7,"unitTitle":"自然情怀","taskGroup":"文学阅读与写作","lessonType":"huodong","lessonTypeName":"写作实践","periodNumber":8,"duration":45,"grade":"高一","subject":"语文","tags":["文学阅读","讲评","分享会","自然情怀","人教版必修上U7","第八课时"],"textbookAnalysis":"本课为第七单元收官：讲评景物短文三典型（空泛/特征但情硬/俱佳），修改提升；举办「自然之美」分享会（朗读佳作+点评）；填单元反思单，回顾「精读—群文—写作」路径，体会「借自然安顿心灵」的文人传统。","overview":"【学情分析】A班：短文质量高可朗读；反思深。B班：部分仍空泛或情硬，需典型纠偏；分享宜代表。共同问题：单元「学了什么」缺整体认知。","objectives":["语言能力：据讲评改景物短文终稿，做到景具体、情融入、修辞贴。","文化意识：在分享中形成「借自然安顿/表达」的自觉。","思维品质：填单元反思单，梳理阅读—写作路径，培养元认知。","学习能力：整合五篇自然文本为单元成果。"],"keyPoints":"① 三典型：空泛/特征情硬/俱佳。\n② 修改三方向：补特征/化情入景/修辞贴。\n③ 反思单：路径——精读→群文→写作。","difficulties":"① 化情入景。原因：习惯硬贴，需示范。\n② 参与面。原因：时间有限，需分组。\n③ 元认知。原因： Reflection空话，需具体。","teachingMethods":"① 典型讲评法。\n② 朗读工作坊。\n③ 反思单法。\n④ 教师总结法。","preparation":"【PPT课件】P1 三标准；P2 典型A(空泛)+改；P3 典型B(情硬)+改；P4 典型C(俱佳)+赏；P5 反思单；P6 路径图。\n【实物教具】学生短文（收选3篇）；便签。\n【音频】无。","process":[{"step":"Step 1 回顾三标准","time":"3分钟","content":"【PPT P1 三标准】教师：「好景物短文三标准？」 预设回答：「景具体！情融入！修辞贴！」 板书时机：黑板写三标准。差异化提示：B班背；A班解释每条。易错点提醒：三标准缺一不可——景空读者盲，情硬显假，修辞乱则花哨。"},{"step":"Step 2 讲评典型A——空泛","time":"8分钟","content":"【PPT P2 典型A】展示「景色真美，花红草绿」稿。教师：「改？」 预设回答：「写出形声色味！墙角腊梅虬枝米黄花冷香！」 教师补特征。板书时机：黑板左「A：补特征」。差异化提示：B班说改；A班需说怎么补。易错点提醒：空泛是写景头号病——用感官细节替代评价词。"},{"step":"Step 3 讲评典型B——情硬","time":"8分钟","content":"【PPT P3 典型B】展示景写完硬加「啊我真喜欢这美景」。教师：「情贴得太硬。」 预设回答：「让景自带情绪，不喊爱！」 教师改「冷香钻领口，天冷它越精神」自带喜爱。板书时机：黑板中「B：化情入景」。差异化提示：B班说错；A班提改法。易错点提醒：情要「化」进景的动词里（钻/精神），不是结尾喊。"},{"step":"Step 4 讲评典型C——俱佳","time":"6分钟","content":"【PPT P4 典型C】展示特征+融情+修辞稿。教师：「好在哪？」 预设回答：「形声色味全，愁化进雨里，通感妙！」 板书时机：黑板右「C：俱佳→赏」。差异化提示：B班说好；A班析写法。易错点提醒：赏好段是析「好在哪」给同学借鉴。"},{"step":"Step 5 分享会+反思","time":"12分钟","content":"【PPT P5 反思】【PPT P6 路径】教师：「朗读佳作+填反思单三行：①学会（写景/融情）；②提升；③疑问。」 学生读+填。板书时机：收典型+巡选。差异化提示：B班代表读+填前两行；A班独读+全填。易错点提醒：反思写具体「一个方法」非「学到很多」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 总结","time":"8分钟","content":"【PPT P6 路径】教师总结：「这单元从《故都的秋》到写景物——文人借自然安顿心、表达情。景不只是景，是心的镜子。」 板书时机：黑板写「读景→写心」。差异化提示：B班听；A班写一句下单元期待。易错点提醒：单元结束是起点——用自然之眼读世界，用景物之笔写自己。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 自然之美·收官 ──┐\n│ 【三标准】       │\n│ 景具体·情融入· │\n│ 修辞贴          │\n│                │\n│ A:补特征        │\n│ B:化情入景      │\n│ C:俱佳→赏       │\n│                │\n│ 【修改三方向】   │\n│ 补特征/化情/贴修辞│\n│                │\n│ 【路径】         │\n│ 精读→群文→写作  │\n│                │\n│ 读景→写心       │\n└────────────────┘","exercises":"【基础作业】1. 提交景物短文终稿（改后）+互评语。2. 填单元反思单三行。\n【提高作业】写150字「单元总结」，要求：①点明最重要写法；②举一篇/一段说明；③说想提升的方面。\n【参考答案——教师用】终稿评价：特征+融情+修辞=合格；白描精准=良好。反思单评价：三行具体=合格；有方法意识=良好。单元总结评价：点法+举例=合格；个性化=良好。","reflection":"✅ 亮点：三典型精准，化情入景示范（冷香钻领口）让学生懂「不喊爱」；分享会朗读让成果被看见。\n⚠️ 需改进：12分钟只轮部分人朗读；下次分组并行或限1.5分钟。\n📌 下单元衔接：第八单元「词语积累」转语言积累，从「读景写心」到「炼字用词」，方法大不同需提示。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T11:00:00Z"},{"id":"l-cn-bs-u8-1","lessonId":"l-cn-bs-u8-1","title":"单元导入——为何积累词语与「词语家族」","book":"必修上册","unitNumber":8,"unitTitle":"词语积累与词语解释","taskGroup":"语言积累","lessonType":"daoru","lessonTypeName":"单元导入","periodNumber":1,"duration":45,"grade":"高一","subject":"语文","tags":["语言积累","词语家族","语义场","人教版必修上U8","第一课时"],"textbookAnalysis":"本单元聚焦「词语积累与词语解释」，是语言积累任务群。导入课让学生认识词语不是孤立的，而是以「家族」（语义场）方式存在：同义族（看/望/瞥）、反义族（大/小）、类义族（眉/眼/口）、同源族（明/亮/光）。建立「家族」意识，积累才能成网而非成堆。","overview":"【学情分析】A班：词汇量大，能跟语义场概念，可深入「家族」的系统性；对词语敏感。B班：词语靠背，无网络意识；「语义场」陌生。共同问题：积累=抄词表，死记；不懂词与词的关系，不会迁移运用。","objectives":["语言能力：说出「词语家族」（语义场）的含义，举出同义/反义/类义/同源族各一例。","文化意识：体会汉字词语的系统之美，建立主动积累的意识。","思维品质：通过「家族」归类，培养系统化、网络化的词语思维。","学习能力：掌握用「语义场」网络式积累词语的方法。"],"keyPoints":"① 词语家族=语义场：词按意义聚成网络。\n② 四族：同义（看/望/瞥）、反义（大/小）、类义（眉/眼/口）、同源（明/亮/光）。\n③ 网络化积累＞抄词表。","difficulties":"① 语义场概念。原因：学生无此概念，需举熟例。\n② 同源族。原因：「同源」陌生，需点明音义联系。\n③ 网络意识。原因：习惯死记，需示范成网。","teachingMethods":"① 概念支架法：语义场定义+例。\n② 归类游戏法：分组填家族。\n③ 网络图法：画词网。\n④ 迁移法：建自己的词库。","preparation":"【PPT课件】P1 单元目标+词语家族；P2 语义场定义（词聚成网）；P3 四族图示（同义/反义/类义/同源）；P4 网络图示范（「看」族）；P5 建词库方法；P6 练习。\n【实物教具】词卡（每组一套）。\n【音频】无。","process":[{"step":"Step 1 导入——词不是孤岛","time":"5分钟","content":"【PPT P1 家族】教师：「我们积累词语常抄词表，但词不是孤岛——它们有『家族』。比如『看』的家族？」 预设回答：「望、瞥、盯、瞄、窥！」 板书时机：黑板写「词语家族（语义场）」。差异化提示：B班说2-3个；A班需说「为何是家族」。易错点提醒：家族=意义相近/相关的词聚成网，不是随便凑。"},{"step":"Step 2 四族概念","time":"12分钟","content":"【PPT P3 四族】教师：「家族四类：同义（看/望/瞥，近而微异）、反义（大/小）、类义（眉/眼/口，同属五官）、同源（明/亮/光，音义同出一源）。」 板书时机：黑板列四族+例。差异化提示：B班记四族名；A班需各补一例。易错点提醒：同源族是「音近义通」（如明/亮/光古音近、皆表光亮），是汉语特色。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 网络图","time":"10分钟","content":"【PPT P4 网络】教师：「以『看』为中心画网：看→望(远看)/瞥(匆匆看)/盯(集中看)/窥(偷看)。每个词有细微差别。」 板书时机：黑板画「看」族网。差异化提示：B班填中心；A班全画+标差别。易错点提醒：网络积累要点「微差别」——同族词贵在辨异，不是堆量。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 建词库","time":"10分钟","content":"【PPT P5 方法】教师：「以后积累不抄单字，建『家族本』：遇新词归到族里，标微差。如读到『瞰』归入『看』族（俯视）。」 学生建。板书时机：黑板写「建家族本」。差异化提示：B班建1族；A班建2-3族。易错点提醒：词库要「动态生长」——遇词即归，长期成网，写作时随取随用。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 练习","time":"6分钟","content":"【PPT P6 练习】教师：「把『红/赤/朱』『冷/凉/寒』归类，说关系。」 预设回答：「都是同源/近义族，表色或温度，微差别在语体（朱更书面）。」 板书时机：黑板收答案。差异化提示：B班归1组；A班两组+说语体。易错点提醒：归类后别忘「微差」——红通俗、朱书面、赤中性，写作选词看场合。"},{"step":"Step 6 小结+作业","time":"2分钟","content":"【PPT P6 环节说明】教师：「本单元学积累与解释词语，先有家族网。」 板书时机：板书单元路径。差异化提示：B班建1族本；A班建「看/说/走」三族。易错点提醒：下节课探词义——本义/引申义/比喻义，家族网会更清晰。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 词语家族·导入 ──┐\n│ 语义场=词聚成网  │\n│                │\n│ 【四族】         │\n│ 同义:看/望/瞥   │\n│ 反义:大/小      │\n│ 类义:眉/眼/口   │\n│ 同源:明/亮/光   │\n│                │\n│ 【看族网】       │\n│ 看→望(远)/瞥(匆)│\n│   /盯(集)/窥(偷)│\n│                │\n│ 建家族本:        │\n│ 遇词即归·标微差 │\n└────────────────┘","exercises":"【基础作业】1. 解释「词语家族（语义场）」。2. 各举同义、反义、类义、同源族一例。\n【提高作业】建「看」族词库（至少8词），每词标「看的方式/语体」微差别。\n【参考答案——教师用】基础1：词语家族指意义相近相关的词按语义聚成网络（语义场），如看/望/瞥。基础2评价：四族例对=合格。提高作业评价：8词+微差=良好；语体标注准=优秀。","reflection":"✅ 亮点：家族网让积累从「抄表」变「织网」，B班也懂归族；同源族「音义同出」点出汉语特色。\n⚠️ 需改进：同源族B班仍模糊，部分当同义；下次给「古音近」小注。\n📌 下节课衔接：下节课词义探究，本义/引申/比喻义让家族网更立体。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T11:30:00Z"},{"id":"l-cn-bs-u8-2","lessonId":"l-cn-bs-u8-2","title":"词义探究——本义·引申义·比喻义","book":"必修上册","unitNumber":8,"unitTitle":"词语积累与词语解释","taskGroup":"语言积累","lessonType":"tansuo","lessonTypeName":"词义探究","periodNumber":2,"duration":45,"grade":"高一","subject":"语文","tags":["语言积累","本义","引申义","比喻义","人教版必修上U8","第二课时"],"textbookAnalysis":"本课探词义三层：本义（最初义，如「兵」=兵器）、引申义（由本义延伸，如「兵」→士兵→军事）、比喻义（借甲喻乙固定化，如「包袱」喻负担）。掌握三层能精准解词、避免望文生义，是词语解释的核心能力。","overview":"【学情分析】A班：能跟三层，可深入「引申路径」（如兵：器→人→事）；对比喻义固化有觉知。B班：本义懂，引申/比喻混；望文生义多（如「兵」当「当兵」非「兵器」）。共同问题：解词只给现代义，不知来源；比喻义当本义。","objectives":["语言能力：区分词的本义/引申义/比喻义，举例说明（如兵、包袱），避免望文生义。","文化意识：理解汉语词义「由具体到抽象」的引申规律与文化心理。","思维品质：通过梳理引申路径，培养词义演变的逻辑思维。","学习能力：掌握「溯源本义→理引申→辨比喻」的解词法。"],"keyPoints":"① 本义：最初具体义（兵=兵器）。\n② 引申义：由本义延伸（兵→士兵→军事）。\n③ 比喻义：借喻固化（包袱=负担）。","difficulties":"① 引申路径。原因：学生只见现代义，需还原延伸链。\n② 比喻义固化。原因：易当本义，需点明「借喻成词」。\n③ 望文生义。原因：按字面猜，需警示。","teachingMethods":"① 溯源法：查本义。\n② 路径图法：引申链。\n③ 对比法：本义vs比喻义。\n④ 警示法：望文生义例。","preparation":"【PPT课件】P1 三层定义；P2 「兵」引申链（器→人→事）；P3 「包袱」比喻义（本=包物布→喻负担）；P4 望文生义警示（如「不刊之论」）；P5 解词三步；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——兵之本义","time":"5分钟","content":"【PPT P1 三层】教师：「『兵』什么意思？」 预设回答：「当兵的！军队！」 教师：「本义是『兵器』（兵刃）。『短兵相接』的兵才是本义。」 板书时机：黑板写「兵：本义=兵器」。差异化提示：B班说现代义；A班需说本义。易错点提醒：解词先问「本义」——现代常用义常是引申，本义藏在古语里。"},{"step":"Step 2 引申链","time":"12分钟","content":"【PPT P2 链】教师：「兵：兵器（本）→拿兵器的人=士兵→有关士兵的事=军事。这就是引申：由具体物到相关人到相关事。」 板书时机：黑板画「兵：器→人→事」。差异化提示：B班说两步；A班需说「为何这么延」。易错点提醒：引申有规律——离本义越远越抽象，沿「相关」蔓延，非乱变。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 比喻义","time":"12分钟","content":"【PPT P3 包袱】教师：「『包袱』本义包东西的布，后比喻『负担』（思想包袱）。这是借喻用久了成固定义。」 板书时机：黑板写「包袱：布→负担(比喻义)」。差异化提示：B班说比喻；A班需说「为何固化」。易错点提醒：比喻义≠临时比喻——它已「落户」成词典义（如包袱/桥梁/手足），解词要认得。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 望文生义警示","time":"8分钟","content":"【PPT P4 警示】教师：「『不刊之论』的刊是『删改』，不刊=不能改=至理，不是『不刊登』！望文生义会错。」 板书时机：黑板写「不刊之论≠不登报」。差异化提示：B班记1例；A班需补「首当其冲」等。易错点提醒：成语古语素义≠现代义——刊/走（跑）/兵都需溯源，别按今义猜。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 解词三步","time":"6分钟","content":"【PPT P5 三步】教师：「解词三步：①溯源本义；②理引申；③辨比喻。如『桥梁』本义桥，比喻义『纽带/中介』。」 板书时机：黑板写三步。差异化提示：B班记三步；A班需示例。易错点提醒：写作用词也走这三步——选词前先明它本义比喻，免误用。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"2分钟","content":"【PPT P6 练习】教师：「词义读法？」 预设回答：「溯源本义→理引申→辨比喻！」 板书时机：板书读法。差异化提示：B班记三层；A班写80字「我常望文生义的1词」。易错点提醒：下节课探古今词义联系与区别。"}],"blackboard":"┌── 词义三层 ──┐\n│ 本义:最初具体   │\n│ 兵=兵器         │\n│                │\n│ 引申:相关延伸   │\n│ 兵:器→人→事    │\n│                │\n│ 比喻:借喻固化   │\n│ 包袱=负担       │\n│ 桥梁=中介       │\n│                │\n│ 警示:          │\n│ 不刊之论≠不登报│\n│                │\n│ 解词三步:       │\n│ 本→引→喻       │\n└────────────────┘","exercises":"【基础作业】1. 解释本义/引申义/比喻义。2. 写出「兵」「包袱」的本义与引申/比喻义。\n【提高作业】写150字辨析「望文生义」的一词（如首当其冲/万人空巷），要求：①给本义；②说今误用；③给正解。\n【参考答案——教师用】基础2：兵本=兵器，引申=士兵/军事；包袱本=包物布，比喻=负担。提高作业评价：本义+误用+正解=良好；能析古语素=优秀。","reflection":"✅ 亮点：引申链（兵：器→人→事）让抽象演变可视化，B班也懂；望文生义警示（不刊之论）戳中常见错。\n⚠️ 需改进：比喻义「固化」B班难懂，部分当临时修辞；下次给「已进词典」红线。\n📌 下节课衔接：下节课古今词义，看词义怎么随时代变。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T11:30:00Z"},{"id":"l-cn-bs-u8-3","lessonId":"l-cn-bs-u8-3","title":"古今词义的联系与区别","book":"必修上册","unitNumber":8,"unitTitle":"词语积累与词语解释","taskGroup":"语言积累","lessonType":"tansuo","lessonTypeName":"古今词义","periodNumber":3,"duration":45,"grade":"高一","subject":"语文","tags":["语言积累","古今异义","词义演变","人教版必修上U8","第三课时"],"textbookAnalysis":"本课探古今词义演变：有的词义基本不变（山/水），有的扩大（江/河原专指长江黄河，今泛指）、缩小（臭原指气味今专指难闻）、转移（走原指跑今指步行）、感情色彩变（卑鄙原中性今贬义）。读懂古今异义，方能准确读古文、用今语。","overview":"【学情分析】A班：能跟四类演变，可深入「为何变」（社会变迁）；对古文异义敏感。B班：古文读时按今义猜（如「走」当走），易错；四类分不清。共同问题：读文言文用现代义套，望文生义；不知词义会变。","objectives":["语言能力：说出古今词义演变四类（扩大/缩小/转移/色彩变），举例（江/臭/走/卑鄙），读古文不套今义。","文化意识：理解词义随社会变迁而变，体会语言的时代性。","思维品质：通过归类演变类型，培养词义演变的规律思维。","学习能力：掌握「古文遇熟词先疑」的读古法。"],"keyPoints":"① 扩大：江/河（专→泛）。\n② 缩小：臭（气味→难闻）。\n③ 转移：走（跑→步行）。\n④ 色彩变：卑鄙（中→贬）。","difficulties":"① 四类区分。原因：学生混扩大缩小，需给判据。\n② 古文套今。原因：习惯现代义，需「遇熟词先疑」。\n③ 色彩变。原因：卑鄙等易忽略感情变化，需点明。","teachingMethods":"① 对比法：古义vs今义表。\n② 归类法：四类型。\n③ 古文语境法：用例句。\n④ 警示法：常见坑。","preparation":"【PPT课件】P1 演变总览；P2 扩大（江/河）；P3 缩小（臭/谷）；P4 转移（走/去）；P5 色彩变（卑鄙/爪牙）；P6 读古法（遇熟词先疑）；P7 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——江之变","time":"5分钟","content":"【PPT P1 演变】教师：「『江』古代专指长江，『江河』=长江黄河。今天『江』泛指一切大江。词义——」 预设回答：「扩大了！」 板书时机：黑板写「江：专(长江)→泛(大江)」。差异化提示：B班说变化；A班需说「为何扩大」。易错点提醒：古文「江/河」多特指长江黄河，读《诗经》「河」是黄河非河流。"},{"step":"Step 2 四类对比","time":"14分钟","content":"【PPT P2-5】教师：「四类：①扩大（江/河专→泛）；②缩小（臭=气味→难闻，谷=粮食总称→稻谷）；③转移（走=跑→步行，去=离开→往）；④色彩变（卑鄙原中性『地位低见识浅』→贬义，爪牙原褒『勇猛卫士』→贬义）。」 板书时机：黑板列四类型+例。差异化提示：B班记四类名；A班需各补例。易错点提醒：判据——看范围变宽(扩大)/窄(缩小)/对象换(转移)/感情换(色彩)，别混。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 古文语境","time":"10分钟","content":"【PPT P6 读古法】教师：「『夸父与日逐走』的走是『跑』！『去国怀乡』的去是『离开』。古文遇熟词先疑——别用今义套。」 板书时机：黑板写「遇熟词先疑」。差异化提示：B班说2例古义；A班需说「为何要疑」。易错点提醒：读文言文第一反应要「这词古义可能不同」——先疑后查，不轻信今义。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 色彩变深","time":"6分钟","content":"【PPT P5 色彩】教师：「卑鄙古指『地位低、见识浅』（出师表『先帝不以臣卑鄙』是谦称），今贬。爪牙古褒今贬。感情也变。」 板书时机：黑板写「卑鄙/爪牙：中→贬」。差异化提示：B班记2词；A班需说语境。易错点提醒：色彩变最隐蔽——古褒今贬或反之，读古文要按当时感情，不按今判。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 练习","time":"7分钟","content":"【PPT P7 练习】教师：「判『牺牲（祭品→舍弃）/汤（热水→羹汤）/窃（偷→窃）』属哪类。」 预设回答：「牺牲缩小/转移，汤转移，窃基本不变。」 板书时机：黑板收。差异化提示：B班判1-2；A班全判+说理。易错点提醒：有的词今古义近（如山/水），有的大变，别一刀切。"},{"step":"Step 6 小结+作业","time":"3分钟","content":"【PPT P6 环节说明】教师：「古今词义读法定：遇熟词先疑，分四类，看色彩。」 板书时机：板书读法。差异化提示：B班背四类；A班写80字「我读古文的1个误判」。易错点提醒：下节课近义辨析——同族词微差怎么选。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 古今词义 ──┐\n│ 江:专→泛(扩大) │\n│ 臭:气味→难闻(缩)│\n│ 走:跑→步行(转移)│\n│ 卑鄙:中→贬(色) │\n│                │\n│ 【四类型】       │\n│ 扩大/缩小/转移/ │\n│ 色彩变          │\n│                │\n│ 读古法:         │\n│ 遇熟词先疑      │\n│ 不套今义        │\n└────────────────┘","exercises":"【基础作业】1. 写出古今演变四类各一例。2. 解释古文「走」「去」「卑鄙」的古义。\n【提高作业】写150字「我读古文的一次误判」，要求：①举一词；②说古义今义；③归类型。\n【参考答案——教师用】基础2：走=跑，去=离开，卑鄙=地位低见识浅（古中性）。提高作业评价：词+古今义+类型=良好；能联读古体会=优秀。","reflection":"✅ 亮点：四类对比表让演变有框架，B班也懂「江」扩大；「遇熟词先疑」读古法实用。\n⚠️ 需改进：缩小/转移B班仍混，部分把「臭」当一直难闻；下次给判据口诀。\n📌 下节课衔接：下节课近义辨析，同族词微差怎么在语境中选。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T11:30:00Z"},{"id":"l-cn-bs-u8-4","lessonId":"l-cn-bs-u8-4","title":"近义词语辨析——同族词的微差别与选用","book":"必修上册","unitNumber":8,"unitTitle":"词语积累与词语解释","taskGroup":"语言积累","lessonType":"tansuo","lessonTypeName":"近义辨析","periodNumber":4,"duration":45,"grade":"高一","subject":"语文","tags":["语言积累","近义词","词语辨析","语境","人教版必修上U8","第四课时"],"textbookAnalysis":"本课练近义辨析与选用。同族近义词（如看/望/瞥，希望/期望/渴望）差别在：语义轻重、范围大小、搭配对象、感情色彩、语体（书面/口语）。辨析法是「求同→比异→定境」：先找共同点，再比微差，最后看语境定词。这是写作准确用词的关键。","overview":"【学情分析】A班：能辨微差，可深入「语境决定选词」；写作选词准。B班：近义词混用（希望/期望不分），辨析无方；靠语感。共同问题：辨析只说「意思差不多」；写作乱用近义，不准。","objectives":["语言能力：用「轻重/范围/搭配/色彩/语体」维度辨析近义词（如希望/期望/渴望），在语境中准确选用。","文化意识：体会汉语近义丰富的表达优势与「炼字」传统。","思维品质：通过「求同→比异→定境」，培养细致的词义比较思维。","学习能力：掌握近义辨析五维度法与语境选词法。"],"keyPoints":"① 五维度：轻重/范围/搭配/色彩/语体。\n② 辨析三步：求同→比异→定境。\n③ 例：希望(一般)/期望(对他人)/渴望(迫切)。","difficulties":"① 维度运用。原因：学生无维度，只说「差不多」，需给框架。\n② 定境。原因：辨出异却不会选语境，需练。\n③ 语体。原因：书面口语混用，需点明。","teachingMethods":"① 维度框架法：五维表。\n② 三步法：求同比异定境。\n③ 语境填空法：选词练。\n④ 错例分析法。","preparation":"【PPT课件】P1 五维度；P2 希望/期望/渴望辨析表；P3 三步法（求同→比异→定境）；P4 语境选词练；P5 语体（书面/口语）例；P6 练习。\n【实物教具】词卡（近义三组）。\n【音频】无。","process":[{"step":"Step 1 导入——希望家族","time":"5分钟","content":"【PPT P1 五维】教师：「『希望/期望/渴望』怎么分？不能只说『差不多』。我们从五维度比：轻重、范围、搭配、色彩、语体。」 板书时机：黑板写「五维度」。差异化提示：B班听维度；A班需说为何要维度。易错点提醒：近义辨析忌「意思差不多」五字——必须落到具体维度才有用。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 辨析表","time":"12分钟","content":"【PPT P2 表】教师：「希望(自一般)/期望(对别人、较重)/渴望(内心迫切、最重)。范围：期望限『对他人』；色彩：渴望带强烈情感；语体：皆可。这就是微差。」 板书时机：黑板列三词五维。差异化提示：B班记轻重；A班需全维比对。易错点提醒：维度要「逐维比」——轻重/搭配/色彩各看一遍，差异自然显。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 三步法","time":"10分钟","content":"【PPT P3 三步】教师：「辨析三步：①求同（都表『想达成』）②比异（用五维度）③定境（看句子谁最贴切）。如『祖国__我们成才』填期望（对别人）。」 板书时机：黑板写「求同→比异→定境」。差异化提示：B班跟三步；A班需自定境。易错点提醒：定境是落点——辨析不为炫，是为选对话境的词。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 语境选词","time":"10分钟","content":"【PPT P4 练】教师：「填空：①我__考上大学(希望) ②老师__我进步(期望) ③他__自由(渴望)。」 学生填。板书时机：黑板收答案。差异化提示：B班填1-2；A班全填+说维度。易错点提醒：选词看「主语与对象」——期望必带『对他人的态度』，自说用希望。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 语体","time":"5分钟","content":"【PPT P5 语体】教师：「『爸爸』口语/『父亲』书面；『用』通用/『 utilization』（误）不伦。写作看语体选词。」 板书时机：黑板写「语体：口/书」。差异化提示：B班记1对；A班需说作文怎么选。易错点提醒：语体错最显眼——白话文里塞文言词或反之，皆违和。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"3分钟","content":"【PPT P6 练习】教师：「近义辨析法？」 预设回答：「五维度比异→三步定境！」 板书时机：板书读法。差异化提示：B班背维度；A班写80字「我常混的1组近义」。易错点提醒：下节课成语——近义辨析也适用于成语选用。"}],"blackboard":"┌── 近义辨析 ──┐\n│ 五维度:         │\n│ 轻重/范围/搭配/ │\n│ 色彩/语体       │\n│                │\n│ 希望/期望/渴望  │\n│ 希望:自·一般    │\n│ 期望:对人·较重  │\n│ 渴望:迫切·最强  │\n│                │\n│ 三步:           │\n│ 求同→比异→定境 │\n│                │\n│ 语体:口/书      │\n└────────────────┘","exercises":"【基础作业】1. 写出近义辨析五维度。2. 用五维度辨析「希望/期望/渴望」并各造一句。\n【提高作业】自选一组近义（如爱护/爱戴/爱惜），写150字辨析，要求：①五维度；②三步；③各造一句。\n【参考答案——教师用】基础1：轻重、范围、搭配、色彩、语体。基础2评价：三词维度清+造句对=合格。提高作业评价：五维度+三步+造句=良好；维度精准=优秀。","reflection":"✅ 亮点：五维度框架让「差不多」变「可操作」，B班也能比异；三步法（求同比异定境）落地选词。\n⚠️ 需改进：定境B班弱，辨出异仍选错；下次多给语境填空。\n📌 下节课衔接：下节课成语，近义辨析法可用于成语选用。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T11:30:00Z"},{"id":"l-cn-bs-u8-5","lessonId":"l-cn-bs-u8-5","title":"成语探究——来源、结构与运用","book":"必修上册","unitNumber":8,"unitTitle":"词语积累与词语解释","taskGroup":"语言积累","lessonType":"tansuo","lessonTypeName":"成语探究","periodNumber":5,"duration":45,"grade":"高一","subject":"语文","tags":["语言积累","成语","来源","运用","人教版必修上U8","第五课时"],"textbookAnalysis":"本课探成语：来源（神话/历史/寓言/诗文，如精卫填海/负荆请罪/守株待兔/学而不厌）、结构（四字为主、并列/主谓/动宾等）、运用（看对象/看色彩/不望文生义）。成语是汉语浓缩的文化结晶，用对增色，用错减分。","overview":"【学情分析】A班：成语量大，能跟来源结构，可深入「误用类型」；写作善用。B班：成语靠背，来源不知；望文生义/对象错用多（如「汗牛充栋」形容书多非人多）。共同问题：用成语不查出处与对象；色彩误用。","objectives":["语言能力：说出成语四类来源并举要例，指出常见误用（望文生义/对象错/色彩错），在语境中正确运用。","文化意识：理解成语是中华文化浓缩载体，体会其凝练之美。","思维品质：通过溯源与结构分析，培养成语的系统认知。","学习能力：掌握「查来源→看结构→辨对象色彩」的成语运用法。"],"keyPoints":"① 来源四类：神话/历史/寓言/诗文。\n② 结构：四字为主（并列/主谓/动宾）。\n③ 误用三型：望文生义/对象错/色彩错。","difficulties":"① 来源归类。原因：学生不知出处，需举例。\n② 对象误用。原因：如汗牛充栋限书，需强警示。\n③ 色彩。原因：褒贬混，需点明。","teachingMethods":"① 来源归类法。\n② 结构图法。\n③ 误用例警示法。\n④ 语境运用法。","preparation":"【PPT课件】P1 来源四类；P2 结构（并列/主谓/动宾）；P3 误用三型（望文/对象/色彩）；P4 警示例（汗牛充栋/美轮美奂/倾巢而出）；P5 运用三步；P6 练习。\n【实物教具】成语卡。\n【音频】无。","process":[{"step":"Step 1 导入——成语从哪来","time":"5分钟","content":"【PPT P1 来源】教师：「成语不是凭空来：精卫填海(神话)、负荆请罪(历史)、守株待兔(寓言)、学而不厌(诗文)。四类。」 板书时机：黑板写「来源四：神话/史/寓/诗」。差异化提示：B班说两类；A班需各补例。易错点提醒：知来源才懂本义——如「负荆」懂了才不致误用为「背负荆棘」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 结构","time":"10分钟","content":"【PPT P2 结构】教师：「成语四字为主：并列（悲欢离合）、主谓（草木皆兵）、动宾（墨守成规）。结构帮记义。」 板书时机：黑板列三结构+例。差异化提示：B班记结构名；A班需各补例。易错点提醒：结构是「骨架」——拆开看成分更易记牢，如「草木皆兵」主谓（草木+都成兵）。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 误用三型","time":"12分钟","content":"【PPT P3-4 误用】教师：「三型：①望文生义（不刊之论当不登报）；②对象错（汗牛充栋形容书多，不能形容人多；美轮美奂限建筑）；③色彩错（倾巢而出贬义，不能夸人）。」 板书时机：黑板列三型+例。差异化提示：B班记1型；A班需各补例。易错点提醒：对象错最常见——成语有「专属对象」，用前想「它本来形容啥」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 运用三步","time":"8分钟","content":"【PPT P5 三步】教师：「用成语三步：①查来源本义；②看结构助记；③辨对象色彩防误用。如『莘莘学子』指众多学生，不能加『一位』。」 板书时机：黑板写三步。差异化提示：B班记三步；A班需示例。易错点提醒：写作用成语先「过三关」——不少同学写「一位莘莘学子」闹笑话。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 练习","time":"6分钟","content":"【PPT P6 练习】教师：「判：①__的书籍(汗牛充栋) ②__的建筑(美轮美奂) ③他__地工作(孜孜不倦)。」 学生填。板书时机：黑板收。差异化提示：B班填1-2；A班全填+说类型。易错点提醒：填前确认对象匹配——汗牛充栋只接「书多」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"4分钟","content":"【PPT P6 环节说明】教师：「成语读法？」 预设回答：「查来源→看结构→辨对象色彩！」 板书时机：板书读法。差异化提示：B班背来源；A班写80字「我用错过的1成语」。易错点提醒：下节课文化意蕴，成语里藏着古人的文化观念。"}],"blackboard":"┌── 成语探究 ──┐\n│ 来源四:         │\n│ 神话/史/寓/诗   │\n│                │\n│ 结构:四字为主   │\n│ 并列/主谓/动宾  │\n│                │\n│ 误用三型:       │\n│ 望文(不刊)      │\n│ 对象(汗牛→书)   │\n│ 色彩(倾巢贬)    │\n│                │\n│ 运用三步:       │\n│ 源→构→辨        │\n└────────────────┘","exercises":"【基础作业】1. 写出成语来源四类各一例。2. 解释「汗牛充栋」「美轮美奂」的适用对象。\n【提高作业】写150字「我用错过的成语」，要求：①举一词；②说误用类型；③给正用句。\n【参考答案——教师用】基础2：汗牛充栋形容藏书极多（限书），美轮美奂形容高大华美建筑（限建筑）。提高作业评价：词+类型+正用=良好；能析来源=优秀。","reflection":"✅ 亮点：来源四类+结构让成语「有根」，B班也懂归类；误用三型（尤其对象错）直击高频错。\n⚠️ 需改进：色彩错B班仍混（倾巢当夸），需更多褒贬例；下次给色彩卡。\n📌 下节课衔接：下节课文化意蕴，从成语看古人的文化观念。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T11:30:00Z"},{"id":"l-cn-bs-u8-6","lessonId":"l-cn-bs-u8-6","title":"词语的文化意蕴——成语与熟语中的文化观念","book":"必修上册","unitNumber":8,"unitTitle":"词语积累与词语解释","taskGroup":"语言积累","lessonType":"tansuo","lessonTypeName":"文化意蕴","periodNumber":6,"duration":45,"grade":"高一","subject":"语文","tags":["语言积累","文化意蕴","成语文化","人教版必修上U8","第六课时"],"textbookAnalysis":"本课探词语中的文化意蕴：成语熟语藏着古人的价值与观念——如「温良恭俭让」显儒家修养，「一元复始」显循环时间观，「布衣」「巾帼」显服饰代称文化，「折桂」「及第」显科举文化。透过词语看文化，是语言积累的高阶目标。","overview":"【学情分析】A班：能由词见文化，可深入「观念如何凝结为词」；有文化联想。B班：词能记，文化层读不出；「布衣=平民」只当知识。共同问题：积累停在字面，不挖文化；对「词载文化」无感。","objectives":["语言能力：从成语/熟语中读出文化意蕴（如温良恭俭让、布衣、折桂），举例说明。","文化意识：理解词语是文化的载体，体会汉语承载的中华价值与观念。","思维品质：通过「词→观念」溯源，培养文化解码思维。","学习能力：掌握「由词见文化」的语言积累高阶法。"],"keyPoints":"① 修养观：温良恭俭让（儒家）。\n② 称谓文化：布衣(平民)/巾帼(女)/须眉(男)。\n③ 科举文化：折桂/及第/金榜。\n④ 时间观：一元复始（循环）。","difficulties":"① 观念提炼。原因：学生见词不见观念，需示范「词→念」。\n② 称谓代称。原因：布衣等代称陌生，需解。\n③ 文化联结。原因：积累与文化脱节，需桥接。","teachingMethods":"① 文化解码法：词→念。\n② 归类法：修养/称谓/科举/时间。\n③ 联今法：今语存古念。\n④ 讨论法。","preparation":"【PPT课件】P1 词载文化；P2 修养观（温良恭俭让）；P3 称谓（布衣/巾帼/须眉）；P4 科举（折桂/及第）；P5 时间观（一元复始）；P6 讨论：今语中的古念；P7 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——词里藏着观念","time":"5分钟","content":"【PPT P1 词载文化】教师：「词语不只是工具，它装着古人的观念。『温良恭俭让』五个字就是一套做人标准。」 预设回答：「词是文化的化石！」 板书时机：黑板写「词载文化」。差异化提示：B班听；A班需说「为何词载文化」。易错点提醒：语言是文化的容器——一个词背后常是一整套古人的生活观。"},{"step":"Step 2 修养与称谓","time":"12分钟","content":"【PPT P2-3】教师：「修养观：温良恭俭让=儒家五德。称谓文化：布衣(平民，麻布衣)、巾帼(女，巾帼是女饰)、须眉(男，胡须眉毛代男)。服饰即身份代称。」 板书时机：黑板列两类+例。差异化提示：B班记例；A班需说「为何用服饰代称」。易错点提醒：代称有「以特征代整体」逻辑——布衣代平民因平民穿麻，非随意。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 科举与时间","time":"10分钟","content":"【PPT P4-5】教师：「科举文化：折桂(状元及第，桂喻高第)、金榜(题名)。时间观：一元复始(一年重新开始，循环不息)。都凝在词里。」 板书时机：黑板列两类。差异化提示：B班记2词；A班需说观念。易错点提醒：折桂典出「蟾宫折桂」，懂典才懂喻；时间观「复始」显古人循环而非线性时间。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 联今","time":"8分钟","content":"【PPT P6 联今】教师：「今语也存古念：『主席』『布衣』『折桂』还在用，古观念活在现代汉语。」 板书时机：黑板写「今语存古念」。差异化提示：B班说1例；A班需说现代对应。易错点提醒：积累词语顺带记文化——写作用「布衣」比「普通人」更有文化厚度。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 讨论","time":"6分钟","content":"【PPT P7 讨论】教师：「你还知道哪词载文化？如『四海』『华夏』『礼乐』。」 预设回答：「四海=天下观；华夏=民族自称；礼乐=周制文化。」 板书时机：黑板收。差异化提示：B班说1；A班说2-3+念。易错点提醒：讨论为练「词→念」眼力——养成积累即挖文化习惯。"},{"step":"Step 6 小结+作业","time":"4分钟","content":"【PPT P6 环节说明】教师：「词语读法升级：由词见文化。」 板书时机：板书读法。差异化提示：B班记4类；A班写80字「我挖到的1词文化」。易错点提醒：下节课词语运用，把积累落到写作准确用词。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 词语文化意蕴 ──┐\n│ 词载文化         │\n│                │\n│ 修养观:         │\n│ 温良恭俭让(儒)  │\n│                │\n│ 称谓:           │\n│ 布衣=平民       │\n│ 巾帼=女·须眉=男│\n│                │\n│ 科举:折桂/及第  │\n│ 时间:一元复始   │\n│                │\n│ 今语存古念      │\n└────────────────┘","exercises":"【基础作业】1. 解释「布衣」「巾帼」「折桂」的文化意蕴。2. 写一词载文化例（如四海/华夏）。\n【提高作业】写150字「我挖到的词语文化」，要求：①举一词；②说它载的观念；③联今语。\n【参考答案——教师用】基础1：布衣=平民（麻布衣代称），巾帼=女性（女饰代称），折桂=科举及第（蟾宫折桂喻高第）。提高作业评价：词+观念+联今=良好；解码深=优秀。","reflection":"✅ 亮点：「词是文化化石」立意让积累升维，B班也懂布衣代称；联今语（今语存古念）打通古今。\n⚠️ 需改进：观念提炼B班弱，部分只记代称不解观念；下次给「词→念」句架。\n📌 下节课衔接：下节课词语运用，把积累与文化落到准确用词。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T11:30:00Z"},{"id":"l-cn-bs-u8-7","lessonId":"l-cn-bs-u8-7","title":"词语的运用——在语境中准确、得体用词","book":"必修上册","unitNumber":8,"unitTitle":"词语积累与词语解释","taskGroup":"语言积累","lessonType":"shijian","lessonTypeName":"词语运用","periodNumber":7,"duration":45,"grade":"高一","subject":"语文","tags":["语言积累","词语运用","准确","得体","人教版必修上U8","第七课时"],"textbookAnalysis":"本课为单元写作/实践任务，练在语境中准确得体用词。准确：词义精准（不滥用近义、不望文生义）；得体：看对象/场合/语体（对长辈敬辞、书面正式、口语自然）。结合本单元积累（家族/词义/近义/成语/文化），在一段文字中综合选词。","overview":"【学情分析】A班：写作选词较准，但得体（敬谦辞）偶错；可综合用单元积累。B班：用词不准（近义混），得体盲区大（对老师用「你」）；需实例。共同问题：积累归积累，写作仍乱用；不分对象场合。","objectives":["语言能力：在语境中准确用词（避近义混/望文）并得体（敬谦辞、语体合场合），修改一段用词不当文字。","文化意识：体会汉语「敬谦辞」体现的礼文化，培养得体表达素养。","思维品质：通过修改训练，培养语境敏感与选词权衡思维。","学习能力：综合本单元积累（家族/词义/近义/成语）于实际表达。"],"keyPoints":"① 准确：词义精准，不混近义、不望文。\n② 得体：看对象（敬谦辞）、场合、语体。\n③ 综合：一段文字里家族/词义/近义/成语协同。","difficulties":"① 得体盲区。原因：学生不分对象，需敬谦辞支架。\n② 准确落地。原因：积累难转写作，需修改练。\n③ 综合。原因：多法并用易乱，需示范。","teachingMethods":"① 病例修改法：给错段改。\n② 敬谦辞卡法。\n③ 语境填空法。\n④ 互评法。","preparation":"【PPT课件】P1 准确+得体双标；P2 病例段（近义混/望文/不得体）；P3 修改升格；P4 敬谦辞卡（您/鄙人/惠存）；P5 语体（书/口）；P6 互评表。\n【实物教具】病例卡。\n【音频】无。","process":[{"step":"Step 1 双标导入","time":"5分钟","content":"【PPT P1 双标】教师：「用词两标：准确（词义对）+得体（看人看场合）。本单元积累都为这两标服务。」 板书时机：黑板写「准确+得体」。差异化提示：B班听；A班需说两标关系。易错点提醒：准确是底线，得体是高分——词对但用错对象仍失败。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 病例修改","time":"12分钟","content":"【PPT P2-3 病例】教师展示段：「我__（希望/期望）您能惠顾，您的令尊很__（盼望/期望）您。这__（美轮美奂/琳琅满目）的商品…」问错。 预设回答：「对老师用『您』非『你』；『令尊』是称对方父非自己父；美轮美奂限建筑不能形容商品！」 教师改。板书时机：黑板列错点。差异化提示：B班说1-2错；A班全找+改。易错点提醒：敬谦辞是「地雷」——令尊/惠顾是敬他，鄙人/寒舍是谦己，用反了大错。"},{"step":"Step 3 敬谦辞卡","time":"8分钟","content":"【PPT P4 卡】教师：「敬辞（您/惠存/光临）对对方；谦辞（鄙人/寒舍/拙作）对自己。记住『敬他谦己』。」 板书时机：黑板写「敬他/谦己」。差异化提示：B班记2词；A班需分类各2。易错点提醒：得体核心是「角色定位」——说话前想「我是谁、对谁说」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 写+改","time":"12分钟","content":"【PPT P5 语体】教师：「写一段『邀请老师参加读书会』短信（60字），要求准确+得体+用1成语。」 学生写+互改。板书时机：教师巡选。差异化提示：B班写40字+敬辞；A班写60字+成语+得体。易错点提醒：语体看场合——短信半书面，太文（谨呈）或太白（快来）皆不宜。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 互评","time":"6分钟","content":"【PPT P6 表】教师：「交换评：准确否？得体否（敬谦/语体）？成语对否？」 预设回答：「他写『你老师』不对，应『您』；成语用『拨冗』很得体。」 板书时机：黑板收。差异化提示：B班用「有/无」；A班三维打分。易错点提醒：互评重点「得体」——这是最容易翻车处。"},{"step":"Step 6 作业","time":"2分钟","content":"【PPT P6 环节说明】教师：「据互评改终稿，下节课分享。」 板书时机：板书「积累→运用」。差异化提示：B班改敬辞；A班改深度。易错点提醒：下节课分享会，展示你的词语本与运用。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 词语运用 ──┐\n│ 双标:准确+得体  │\n│                │\n│ 准确:          │\n│ 不混近义·不望文│\n│                │\n│ 得体:          │\n│ 敬他/谦己      │\n│ 看对象·场合·语体│\n│                │\n│ 敬辞:您/惠存   │\n│ 谦辞:鄙人/寒舍 │\n│                │\n│ 语体:半书面(短信)│\n└────────────────┘","exercises":"【基础作业】1. 修改病例段（近义混/望文/不得体各一处）。2. 写「邀请老师」短信终稿（含1敬辞+1成语）。\n【提高作业】另写一段「给同学」的读书邀约（口语自然、用1近义准确），对比两者语体差异。\n【参考答案——教师用】基础1评价：三错各改对=合格。基础2评价：敬辞+成语+得体=良好。提高作业评价：口语自然+近义准+对比明=优秀。","reflection":"✅ 亮点：病例修改（令尊/美轮美奂/你→您）直击高频错，B班也懂敬谦；双标（准确+得体）框架清晰。\n⚠️ 需改进：得体对B班仍难，部分改完还漏敬辞；下次给「角色定位」口诀。\n📌 下节课衔接：下节课分享会，展示词语本与运用成果。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T11:30:00Z"},{"id":"l-cn-bs-u8-8","lessonId":"l-cn-bs-u8-8","title":"单元活动——「我的词语本」积累分享会","book":"必修上册","unitNumber":8,"unitTitle":"词语积累与词语解释","taskGroup":"语言积累","lessonType":"huodong","lessonTypeName":"单元活动","periodNumber":8,"duration":45,"grade":"高一","subject":"语文","tags":["语言积累","分享会","词语本","人教版必修上U8","第八课时"],"textbookAnalysis":"本课为第八单元收官，举办「我的词语本」分享会：展示家族词网、词义三层卡、近义辨析表、成语文化卡；互评「最有料词语本」；填单元反思单，回顾「积累—解释—运用」路径，建立长期网络化积累习惯。","overview":"【学情分析】A班：词语本丰富可展示，反思深；能帮B班。B班：本子单薄，需榜样；分享宜代表。共同问题：单元「学了什么」缺整体认知，积累习惯未固化。","objectives":["语言能力：展示并讲解自己的词语本（家族网/词义卡/辨析表/文化卡），做到准确有条理。","文化意识：在分享中固化「网络化、文化化」积累习惯。","思维品质：填单元反思单，梳理积累—解释—运用路径，培养元认知。","学习能力：整合本单元方法为个人词语本体系。"],"keyPoints":"① 展示四件：家族网/词义卡/辨析表/文化卡。\n② 互评：最有料词语本。\n③ 反思单：路径——积累→解释→运用。","difficulties":"① 展示条理。原因：易念本无重点，需框架。\n② 参与面。原因：时间有限，需分组。\n③ 习惯固化。原因：Reflection空话，需具体承诺。","teachingMethods":"① 展览法：词语本墙。\n② 讲解工作坊：四件框架。\n③ 互评法。\n④ 反思单法。","preparation":"【PPT课件】P1 分享框架（四件）；P2 互评量表；P3 反思单；P4 路径图（积累→解释→运用）；P5 长期习惯。\n【实物教具】学生词语本（家族网/词义卡/辨析表/文化卡）；A3墙；便签。\n【音频】无。","process":[{"step":"Step 1 分享框架","time":"5分钟","content":"【PPT P1 四件】教师：「展示你的词语本四件：①家族网（看族）②词义三层卡（本/引/喻）③近义辨析表（五维度）④文化卡（词载文化）。」 板书时机：黑板写「四件」。差异化提示：B班听；A班需说每件做法。易错点提醒：展示讲「方法」非念词——同学学的是你怎么积累的。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 展示（上）","time":"15分钟","content":"【PPT P1 框架】教师：「分组展示，每组代表讲1件最得意。如『看』族网或『兵』三层卡。」 学生展示。板书时机：旁记亮点。差异化提示：B班小组代表；A班独展+PPT。易错点提醒：讲清「为什么这么归/这么分」——方法比内容值钱。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 参观+便签","time":"8分钟","content":"【PPT P3 环节说明】教师：「参观词语本墙，给一本写便签：最学的一点+一问。」 学生写。板书时机：收便签。差异化提示：B班写1张；A班写2张具体。易错点提醒：反馈善意具体——「你的家族网让我懂归族」比「很好」有用。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 反思单","time":"10分钟","content":"【PPT P3 模板】教师：「填反思单三行：①学会（积累/解释/运用）；②提升；③我的疑问。」 预设回答：「①建家族网；②提升近义辨析；③怎么坚持积累？」 板书时机：巡选分享。差异化提示：B班填前两行；A班全填+疑问。易错点提醒：反思写具体「一个方法」非「学到很多」。"},{"step":"Step 5 总结+习惯","time":"7分钟","content":"【PPT P4 路径】【PPT P5 习惯】教师总结：「这单元从家族网到运用——词语要『成网、溯源、辨异、载文化、得体用』。更重要的是养成长期积累习惯：遇词即归。」 板书时机：黑板写「积累→解释→运用→习惯」。差异化提示：B班听；A班写一句习惯承诺。易错点提醒：单元结束是习惯起点——词语本每周添几词，一学期成网。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 词语本·分享 ──┐\n│ 【四件】         │\n│ 家族网/词义卡   │\n│ 辨析表/文化卡   │\n│                │\n│ 互评:最有料本   │\n│                │\n│ 【反思三问】     │\n│ ①学会__         │\n│ ②提升__         │\n│ ③疑问__         │\n│                │\n│ 路径:           │\n│ 积累→解释→运用 │\n│ →习惯           │\n└────────────────┘","exercises":"【基础作业】1. 提交词语本（四件齐全）+互评语。2. 填单元反思单三行。\n【提高作业】写150字「我的积累习惯计划」，要求：①点明方法；②说每周怎么做；③列想建的2个词族。\n【参考答案——教师用】词语本评价：四件全+有条理=合格；文化卡有解码=良好。反思单评价：三行具体=合格。习惯计划评价：方法+周计划+词族=良好；可操作=优秀。","reflection":"✅ 亮点：四件框架让展示有纲，B班也懂讲方法；词语本墙让积累「被看见」，互评便签具体。\n⚠️ 需改进：15分钟只轮部分人；下次分两批或限2分钟。\n📌 下单元衔接：必修下册转「思辨/实用/整本」等新任务群，词语本方法可迁移各单元。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T11:30:00Z"},{"id":"l-cn-bs-u5-1","lessonId":"l-cn-bs-u5-1","title":"单元导入——走进《乡土中国》与「乡土中国」","book":"必修上册","unitNumber":5,"unitTitle":"乡土中国","taskGroup":"整本书阅读与研讨","lessonType":"daoru","lessonTypeName":"单元导入","periodNumber":1,"duration":45,"grade":"高一","subject":"语文","tags":["整本书阅读","费孝通","乡土中国","社会学","人教版必修上U5","第一课时"],"textbookAnalysis":"《乡土中国》是费孝通1948年出版的社会学经典，基于田野调查，用14篇论文揭示中国基层社会的特质。核心问题：中国传统社会「乡土」在哪？本课为整本书阅读导入，让学生认识作者、成书背景与全书逻辑（从乡土本色到差序格局到礼治到血缘地缘），建立阅读地图。","overview":"【学情分析】A班：对社会学有好奇，能跟「乡土」概念，可深入「为何从乡村看中国」；阅读规划强。B班：学术著作陌生，怕读不进；「乡土」只当「农村」。共同问题：把学术书当文学读，抓不住论点；不知怎么啃一本论著。","objectives":["语言能力：说出《乡土中国》作者、性质与核心问题，概述全书14篇的逻辑脉络。","文化意识：理解「乡土中国」指传统基层社会的特质，体会从本土经验提炼理论的方法。","思维品质：通过绘制阅读地图，培养整体把握学术著作的框架思维。","学习能力：建立整本书阅读规划（篇目/周期/笔记法）。"],"keyPoints":"① 作者费孝通，社会学经典，田野调查为基础。\n② 核心问题：中国基层社会何以「乡土」。\n③ 全书逻辑：乡土本色→差序格局→礼治秩序→血缘地缘→名实/现代。","difficulties":"① 学术书读法。原因：学生习惯文学读，需转「抓论点/概念」。\n② 乡土概念。原因：易等同农村，需点明「社会特质」。\n③ 脉络。原因：14篇易乱，需地图。","teachingMethods":"① 背景支架法：作者与成书。\n② 地图法：14篇逻辑图。\n③ 规划法：阅读日历。\n④ 提问法：核心问题驱动。","preparation":"【PPT课件】P1 费孝通与成书（1948/田野）；P2 核心问题（乡土何在）；P3 全书14篇逻辑地图；P4 读法（抓概念/论点）；P5 阅读规划表；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——谁写的","time":"5分钟","content":"【PPT P1 作者】教师：「《乡土中国》作者费孝通，社会学家，1948年出版，基于在广西农村的实地调查。不是小说，是学术论著。」 预设回答：「用真实调查讲中国社会！」 板书时机：黑板写「费孝通·1948·田野调查」。差异化提示：B班说作者；A班需说「田野调查何意」。易错点提醒：这是学术书——读法是抓论点概念，不是追情节人物。"},{"step":"Step 2 核心问题","time":"8分钟","content":"【PPT P2 问题】教师：「全书回答一个问题：中国基层社会为什么是『乡土』的？乡土=靠土地、不流动、熟人社会。」 板书时机：黑板写「核心问题：乡土何在」。差异化提示：B班说「农村」；A班需说「社会特质」。易错点提醒：「乡土中国」指传统基层社会的结构特质，非仅地理农村；是「文化类型」不是「地方」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 阅读地图","time":"12分钟","content":"【PPT P3 地图】教师：「14篇逻辑：乡土本色（总）→差序格局（人际）→礼治秩序/无讼（治理）→血缘与地缘（结合）→名实/从欲望到需要（变迁）。像一张网。」 板书时机：黑板画14篇逻辑链。差异化提示：B班记前4篇；A班需说全链。易错点提醒：先读总论（乡土本色）再读分论——顺逻辑读才懂概念怎么长出来。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 读法","time":"8分钟","content":"【PPT P4 读法】教师：「学术书读法：①抓每篇核心概念（如差序格局）；②抓论点句；③做概念卡。不死记，要理解。」 板书时机：黑板写「抓概念/论点+概念卡」。差异化提示：B班记三点；A班需说怎么抓。易错点提醒：每篇先找「这一篇提出什么概念、什么论点」，这是读论的钥匙。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 规划","time":"7分钟","content":"【PPT P5 规划】教师：「八周读完14篇，每周2篇+概念卡。定你的阅读日历。」 学生填。板书时机：黑板写「规划：周2篇+卡」。差异化提示：B班填前两周；A班填全程。易错点提醒：整本书阅读贵在「持续」——化整为零，每周两篇不难，拖则废。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"5分钟","content":"【PPT P6 练习】教师：「本单元任务？」 预设回答：「读《乡土中国》+概念卡+研讨会！」 板书时机：板书单元任务。差异化提示：B班定首周计划；A班写100字「我对乡土中国的初猜」。易错点提醒：下节课阅读方法，学怎么抓概念与做札记。"}],"blackboard":"┌── 走进乡土中国 ──┐\n│ 费孝通·1948     │\n│ 田野调查·社会学 │\n│                │\n│ 核心问题:       │\n│ 乡土(基层特质) │\n│ 何在?           │\n│                │\n│ 14篇逻辑:       │\n│ 本色→差序→礼治 │\n│ →血缘地缘→变迁 │\n│                │\n│ 读法:抓概念/论点│\n│ +概念卡         │\n│ 规划:周2篇      │\n└────────────────┘","exercises":"【基础作业】1. 写出《乡土中国》作者、性质、核心问题。2. 列出全书14篇的前4篇篇名。\n【提高作业】写150字「我对乡土中国的初猜」，要求：①说你以为的「乡土」；②提一个想验证的问题；③定首周阅读篇目。\n【参考答案——教师用】基础1：作者费孝通，社会学论著（基于田野调查），核心问题是中国基层社会何以乡土。基础2：乡土本色、文字下乡、再论文字下乡、差序格局。提高作业评价：初猜+问题+篇目=良好；有思辨=优秀。","reflection":"✅ 亮点：阅读地图把14篇变「一张网」，B班也懂先总后分；规划表把整本拆周，恐惧症消退。\n⚠️ 需改进：B班仍把书当小说，首读易求故事；下次强「抓概念」示范。\n📌 下节课衔接：下节课阅读方法，具体学抓概念与做学术札记。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T10:00:00Z"},{"id":"l-cn-bs-u5-2","lessonId":"l-cn-bs-u5-2","title":"阅读方法指导——如何读学术著作与做概念卡","book":"必修上册","unitNumber":5,"unitTitle":"乡土中国","taskGroup":"整本书阅读与研讨","lessonType":"fangfa","lessonTypeName":"方法指导","periodNumber":2,"duration":45,"grade":"高一","subject":"语文","tags":["整本书阅读","阅读方法","概念卡","学术札记","人教版必修上U5","第二课时"],"textbookAnalysis":"本课教读学术著作的方法：①预览（看目录/小标题/首尾段抓框架）；②批注（概念、论点、疑点）；③概念卡（一词一卡：定义+原文+我的理解+例子）；④思维导图（篇间关系）。以「乡土本色」篇为样例走一遍，把方法落到实操。","overview":"【学情分析】A班：能跟方法，可深入「概念vs论点」区分；批注习惯好。B班：不会预览，批注只会画句；概念卡不知写啥。共同问题：读书不留痕，读完无概念；把摘抄当笔记。","objectives":["语言能力：用预览—批注—概念卡—导图四步读学术篇，以「乡土本色」为样例做出一张合格概念卡。","文化意识：体会「把书读薄（概念）再读厚（理解）」的学术阅读智慧。","思维品质：通过概念卡与导图，培养抽象提炼与关系建构思维。","学习能力：掌握学术著作四步读法，能独立迁移全书。"],"keyPoints":"① 四步：预览框架→批注（概念/论点/疑）→概念卡→导图。\n② 概念卡要素：词+定义+原文+我的例。\n③ 样例：乡土本色（土气/不流动/熟人）。","difficulties":"① 预览抓框架。原因：学生直读不预览，需教看目录首尾。\n② 概念卡写法。原因：易抄定义不消化，需「我的例」。\n③ 论点vs概念。原因：混，需区分。","teachingMethods":"① 示范法：以乡土本色走四步。\n② 卡片法：概念卡模板。\n③ 导图法：篇关系图。\n④ 互评法：卡互看。","preparation":"【PPT课件】P1 四步法；P2 预览（目录/首尾）；P3 批注符号（概念△/论点★/疑？）；P4 概念卡模板；P5 样例（乡土本色卡）；P6 导图；P7 练习。\n【实物教具】概念卡模板（每人1张）。\n【音频】无。","process":[{"step":"Step 1 四步导入","time":"5分钟","content":"【PPT P1 四步】教师：「读学术书四步：①预览抓框架②批注（概念△论点★疑？）③概念卡④导图。今天用『乡土本色』走一遍。」 板书时机：黑板写「预览→批注→卡→图」。差异化提示：B班听；A班需说每步用。易错点提醒：跳过预览直接读易迷路——先见林（框架）再见树（细节）。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 预览","time":"8分钟","content":"【PPT P2 预览】教师：「读『乡土本色』前先看：篇名暗示『土』，首尾段说『土气/不流动』。框架有了。」 板书时机：黑板写「乡土本色：土气·不流动·熟人」。差异化提示：B班说篇名；A班需说首尾句。易错点提醒：预览看「题/目录/首段/尾段」——学术篇论点常在首尾，中间是论证。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 批注+概念卡","time":"15分钟","content":"【PPT P3-5 卡】教师：「边读边标：△土气（靠土地）、★『不流动是乡土本色』、？为何不流动。然后做卡：词『土气』+定义（依赖土地、安土重迁）+原文句+我的例（老家种地不离乡）。」 学生做卡。板书时机：黑板展卡模板。差异化提示：B班做1卡（土气）；A班做2-3卡。易错点提醒：概念卡要有「我的例」——只抄定义是搬运，加例子才消化。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 导图","time":"10分钟","content":"【PPT P6 图】教师：「把『乡土本色』概念（土气/不流动/熟人/聚村而居）连成小图，再想它和下篇『差序格局』的关系。」 学生画。板书时机：黑板画概念关系。差异化提示：B班画本篇；A班连下篇。易错点提醒：导图显关系——概念不是孤岛，篇与篇靠概念勾连，读完整本书就是一张大网。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 互评","time":"5分钟","content":"【PPT P7 练】教师：「交换看卡：有定义？有原文？有我的例？」 预设回答：「他卡有例很懂；我这卡只抄了定义要补例。」 板书时机：黑板收反馈。差异化提示：B班用「有/无」；A班三维评。易错点提醒：互评看「我的例」——这是卡的质量分水岭。"},{"step":"Step 6 作业","time":"2分钟","content":"【PPT P6 环节说明】教师：「据法读『差序格局』篇，做2张概念卡，下节课精读。」 板书时机：板书「法→读」。差异化提示：B班做1卡；A班做2卡+导图。易错点提醒：下节课精读差序格局，带了卡来效率翻倍。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 学术阅读四步 ──┐\n│ 预览→批注→卡→图│\n│                │\n│ 批注符号:       │\n│ △概念 ★论点 ?疑│\n│                │\n│ 概念卡模板:     │\n│ 词+定义+原文   │\n│ +我的例         │\n│                │\n│ 样例:土气       │\n│ 定:依赖土地     │\n│ 原:安土重迁     │\n│ 例:老家种地不离 │\n│                │\n│ 导图:显关系     │\n└────────────────┘","exercises":"【基础作业】1. 写出学术阅读四步。2. 就「乡土本色」做1张概念卡（土气：定义+原文+我的例）。\n【提高作业】读「差序格局」篇做2张概念卡（差序格局/团体格局），要求各含定义+原文+我的例。\n【参考答案——教师用】基础1：预览框架、批注概念论点疑点、概念卡、思维导图。基础2评价：三要素全=合格。提高作业评价：两卡+要素全+我的例=良好；能对比差序/团体=优秀。","reflection":"✅ 亮点：四步法+概念卡模板让学术阅读「可操作」，B班也做出土气卡；「我的例」要求逼出真理解。\n⚠️ 需改进：预览B班仍跳，部分直接读细节；下次强「先见林」口诀。\n📌 下节课衔接：下节课精读差序格局，用今天卡片法深挖。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T10:00:00Z"},{"id":"l-cn-bs-u5-3","lessonId":"l-cn-bs-u5-3","title":"精读——差序格局（中国社会的人际关系结构）","book":"必修上册","unitNumber":5,"unitTitle":"乡土中国","taskGroup":"整本书阅读与研讨","lessonType":"jingdu","lessonTypeName":"精读","periodNumber":3,"duration":45,"grade":"高一","subject":"语文","tags":["整本书阅读","差序格局","费孝通","人际关系","人教版必修上U5","第三课时"],"textbookAnalysis":"「差序格局」是全书最核心概念：中国人际关系如水中石子泛起的波纹——以「己」为中心，愈推愈远愈薄（差序）；相对西方「团体格局」（如柴捆，界限分明、平等）。由此解释差序格局下的道德（克己）、公私观（伸缩）。是理解中国社会的钥匙概念。","overview":"【学情分析】A班：能跟波纹比喻，可深入「差序→克己道德」推演；能联现实（熟人优待）。B班：波纹懂但「团体格局」对比难；公私观读不出。共同问题：只记比喻不抓推论；不懂差序为何影响道德与公私。","objectives":["语言能力：解释「差序格局」（波纹/以己为中心）与「团体格局」（柴捆/界限），说出差序格局下的道德与公私特点。","文化意识：理解差序格局是中国传统社会人际结构的根基，体会其对伦理观的影响。","思维品质：通过分析「结构→道德/公私」的推论，培养概念推演思维。","学习能力：用概念卡+推演图深读核心概念。"],"keyPoints":"① 差序格局：波纹式，以己为中心，愈推愈薄（差+序）。\n② 团体格局：柴捆式，界限分明、平等（西方）。\n③ 推论：道德重克己、公私有伸缩（看与己关系）。","difficulties":"① 两格局对比。原因：学生只知差序不知团体，需对照。\n② 推论到道德。原因：结构→道德跳跃，需示范。\n③ 公私伸缩。原因：抽象，需例（徇情vs秉公）。","teachingMethods":"① 比喻解码法：波纹/柴捆。\n② 对比法：差序vs团体。\n③ 推演图法：结构→道德/公私。\n④ 联今法：现实例。","preparation":"【PPT课件】P1 差序格局（波纹）；P2 团体格局（柴捆）对比；P3 推论（道德克己/公私伸缩）；P4 推演图；P5 联今（熟人优待）；P6 概念卡。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——波纹","time":"5分钟","content":"【PPT P1 波纹】教师：「费孝通说中国人际像石子投水泛起的波纹——以『己』为中心，一圈圈推出去，愈远愈薄。这叫差序格局。」 预设回答：「关系亲疏有差等！」 板书时机：黑板写「差序格局=波纹(己中心)」。差异化提示：B班说波纹；A班需说「差+序」意。易错点提醒：差序=有差等+有次序，不是均等的「人人平等」，这是关键。"},{"step":"Step 2 对比团体格局","time":"12分钟","content":"【PPT P2 柴捆】教师：「西方是团体格局，像一捆柴，界限清、成员平等。差序是『水波纹』，团体是『柴捆』，根本不同。」 板书时机：黑板画两图对比。差异化提示：B班记两喻；A班需说「为何不同」。易错点提醒：对比为显差异——差序重关系亲疏，团体重成员资格与平等，别混。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 推论到道德","time":"12分钟","content":"【PPT P3 道德】教师：「差序格局下道德重『克己』（修自身）而非对外『兼爱』；因为关系是差等的，爱有亲疏。团体格局下重『平等爱人』。」 板书时机：黑板写「差序→克己道德」。差异化提示：B班记克己；A班需说推演。易错点提醒：结构决定道德——差序格局解释了中国为何讲「修身齐家」而非抽象博爱。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 公私伸缩","time":"8分钟","content":"【PPT P3 公私】教师：「差序下公私是『伸缩的』：对自己人（圈内）公，对外人（圈外）私。所谓『徇私』是站圈内看。」 板书时机：黑板写「公私：伸缩(看圈内)」。差异化提示：B班听；A班需联例。易错点提醒：公私非绝对——差序格局里「公」的范围是弹性的，随与己关系变，这是深水区。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 联今","time":"5分钟","content":"【PPT P5 联今】教师：「今天还能见差序影子吗？熟人好办事、圈子文化。」 预设回答：「是！关系远近影响对待方式。」 板书时机：黑板写「今：圈子文化」。差异化提示：B班说1例；A班需辩证（利弊）。易错点提醒：读经典为照今——差序非全坏，但需警惕「圈内公圈外私」的任人唯亲。"},{"step":"Step 6 小结+卡","time":"3分钟","content":"【PPT P6 卡】教师：「做『差序格局』卡：定义+原文+我的例（如家族聚宴座次）。」 板书时机：板书读法。差异化提示：B班做1卡；A班做卡+推演图。易错点提醒：下节课读礼治秩序，看差序格局下怎么「治」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 差序格局 ──┐\n│ 波纹(己中心)    │\n│ 差(亲疏)+序(推)│\n│                │\n│ 团体格局:       │\n│ 柴捆(界限·平等)│\n│                │\n│ 推论:           │\n│ 道德→克己       │\n│ 公私→伸缩(圈内)│\n│                │\n│ 今:圈子文化     │\n└────────────────┘","exercises":"【基础作业】1. 解释「差序格局」并对比「团体格局」。2. 写「差序格局」概念卡（定义+原文+我的例）。\n【提高作业】写160字「差序格局下的公私」，要求：①说波纹结构；②推到公私伸缩；③举一个现实例（利或弊）。\n【参考答案——教师用】基础1：差序格局=以己为中心如水波纹愈推愈薄的人际关系结构；团体格局=如柴捆界限分明平等的西方结构。提高作业评价：结构+推演+例=良好；能辩证利弊=优秀。","reflection":"✅ 亮点：波纹/柴捆双喻让抽象结构可见，B班也懂差序；推演图（结构→道德/公私）破「只记比喻」。\n⚠️ 需改进：公私伸缩B班仍抽象，部分当「双重标准」；下次给徇情/秉公对照例。\n📌 下节课衔接：下节课礼治秩序与无讼，看差序格局下怎么「治」。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T10:00:00Z"},{"id":"l-cn-bs-u5-4","lessonId":"l-cn-bs-u5-4","title":"精读——礼治秩序与无讼（乡土的治理逻辑）","book":"必修上册","unitNumber":5,"unitTitle":"乡土中国","taskGroup":"整本书阅读与研讨","lessonType":"jingdu","lessonTypeName":"精读","periodNumber":4,"duration":45,"grade":"高一","subject":"语文","tags":["整本书阅读","礼治秩序","无讼","费孝通","人教版必修上U5","第四课时"],"textbookAnalysis":"「礼治秩序」篇：乡土社会靠「礼」维持秩序而非「法」——礼是经教化形成的主动服膺（非强制），适用于不流动的熟人社会。「无讼」篇：理想是「无讼」（不打官司），因诉讼破坏伦常和谐；调解（评理）优于审判。礼治有效于静止社会，现代变迁则显局限。","overview":"【学情分析】A班：能跟礼治vs法治，可深入「教化权力」「无讼的伦理代价」；能辩证。B班：礼治懂但「无讼」陌生；教化权力难；易全盘否定礼治。共同问题：把礼治当落后；不懂其适用条件（不流动）。","objectives":["语言能力：解释「礼治秩序」（礼vs法、教化服膺）与「无讼」（厌讼/调解），说清礼治的适用条件与局限。","文化意识：理解传统「礼治」作为秩序方式的合理性与现代转型的必要性。","思维品质：通过分析「适用于静止社会」，培养条件化、辩证评价思维。","学习能力：用概念卡+适用条件图读概念。"],"keyPoints":"① 礼治：礼（教化形成的主动服膺）≠法（强制），适不流动熟人社会。\n② 无讼：厌讼、重调解评理，维护伦常和谐。\n③ 局限：静止社会有效，现代流动社会显不足。","difficulties":"① 礼≠法。原因：学生混，需点明「服膺vs强制」。\n② 无讼代价。原因：易美化，需说伦理压抑面。\n③ 适用条件。原因：易绝对化，需「静止社会」前提。","teachingMethods":"① 对比法：礼vs法。\n② 条件法：适用前提。\n③ 辩证法：合理+局限。\n④ 联今法：调解文化。","preparation":"【PPT课件】P1 礼治（礼vs法）；P2 教化权力（主动服膺）；P3 无讼（厌讼/调解）；P4 适用条件（不流动）；P5 局限与今（调解文化）；P6 概念卡。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——礼与法","time":"5分钟","content":"【PPT P1 礼法】教师：「乡土靠『礼』不是『法』。礼是从小教化、主动遵守（如见长辈鞠躬）；法是外力强制。差别在『服膺vs强制』。」 预设回答：「礼是心里认，法是怕罚！」 板书时机：黑板写「礼(服膺)↔法(强制)」。差异化提示：B班说差别；A班需说「教化」。易错点提醒：礼治靠「内化」——从小习礼，不靠警察，这是它与法治根本不同。"},{"step":"Step 2 无讼","time":"12分钟","content":"【PPT P3 无讼】教师：「乡土理想『无讼』——不打官司。打架先请长辈『评理』调解，告官伤和气破伦常。调解优于审判。」 板书时机：黑板写「无讼：厌讼·重调解」。差异化提示：B班说调解；A班需说「为何厌讼」。易错点提醒：无讼非「无纠纷」——是纠纷内部化解，维护关系网，代价是个体委屈。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 适用条件","time":"12分钟","content":"【PPT P4 条件】教师：「礼治有效，前提是『不流动、熟人、静止』。大家都熟、辈分固定，礼才管得住。一旦人流动、关系变，礼就不够。」 板书时机：黑板写「适用：不流动·熟人·静止」。差异化提示：B班记前提；A班需说「流动后咋办」。易错点提醒：概念要带条件读——礼治不是「落后」，是在特定社会有效；离开条件才失灵。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 局限与今","time":"10分钟","content":"【PPT P5 局限】教师：「现代城市人流动、匿名，法治更合适；但『调解』文化仍在（社区调解、和气生财）。礼法各有场。」 板书时机：黑板写「今：法治为主·调解为辅」。差异化提示：B班说1点；A班需辩证。易错点提醒：读经典忌非此即彼——礼治有其合理性，现代以法治为主但调解传统可汲。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 概念卡","time":"4分钟","content":"【PPT P6 卡】教师：「做『礼治秩序』『无讼』两卡：定义+原文+我的例（如邻里吵架找居委会调解）。」 板书时机：板书读法。差异化提示：B班做1卡；A班做2卡。易错点提醒：卡里写「适用条件」——这是概念卡的灵魂，别漏。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"2分钟","content":"【PPT P6 环节说明】教师：「礼治读法定：礼≠法+看适用条件+辩证。」 板书时机：板书读法。差异化提示：B班背三点；A班写80字「我身边的调解」。易错点提醒：下节课血缘与地缘，看差序格局下的结合方式。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 礼治·无讼 ──┐\n│ 礼(服膺)↔法(强制)│\n│                │\n│ 无讼:           │\n│ 厌讼·重调解     │\n│ (护伦常·个体忍)│\n│                │\n│ 适用条件:       │\n│ 不流动·熟人·静止│\n│                │\n│ 今:             │\n│ 法治为主        │\n│ 调解为辅        │\n└────────────────┘","exercises":"【基础作业】1. 解释「礼治秩序」并说礼与法的根本区别。2. 写「无讼」概念卡（定义+原文+我的例）。\n【提高作业】写160字「礼治的适用与局限」，要求：①说适用条件；②说一处局限；③联今（调解文化）。\n【参考答案——教师用】基础1：礼治靠教化内化的礼维持秩序，法是外力强制；根本别在服膺vs强制。提高作业评价：条件+局限+联今=良好；辩证=优秀。","reflection":"✅ 亮点：礼≠法（服膺vs强制）点破根本，B班也懂；「适用条件」框架避免全盘否定礼治。\n⚠️ 需改进：无讼的伦理代价B班易忽略（只看好），需给「个体委屈」面；下次补。\n📌 下节课衔接：下节课血缘与地缘，看差序格局下的结合方式。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T10:00:00Z"},{"id":"l-cn-bs-u5-5","lessonId":"l-cn-bs-u5-5","title":"精读——血缘与地缘（乡土的结合与分离）","book":"必修上册","unitNumber":5,"unitTitle":"乡土中国","taskGroup":"整本书阅读与研讨","lessonType":"jingdu","lessonTypeName":"精读","periodNumber":5,"duration":45,"grade":"高一","subject":"语文","tags":["整本书阅读","血缘","地缘","费孝通","人教版必修上U5","第五课时"],"textbookAnalysis":"「血缘」篇：乡土社会以血缘（亲属）定权利社会地位，稳定但有裂痕（如继承不均）。「地缘」篇：地缘是血缘的「投影」（村即族），但当人脱离血缘流动到陌生地（如街坊、商业），地缘脱离血缘，生出「契约社会」——这是乡土向现代转的关键。概念推进到「社会如何松动」。","overview":"【学情分析】A班：能跟血缘→地缘的分离逻辑，可深入「契约社会」萌芽；联城市化。B班：血缘懂，地缘陌生；「契约」难；易混两概念。共同问题：不懂地缘是血缘投影；看不出分离的社会意义。","objectives":["语言能力：解释「血缘」（亲属定地位）与「地缘」（血缘投影→流动脱离），说明地缘脱离血缘催生契约社会的意义。","文化意识：理解从血缘到地缘的松动是中国社会从乡土走向现代的枢纽。","思维品质：通过分析「投影→脱离」，培养概念演化与社会变迁思维。","学习能力：用概念卡+演化图读概念。"],"keyPoints":"① 血缘：亲属关系定权利地位（稳定但有不均）。\n② 地缘：本是血缘投影（村=族）；人流动后地缘脱离血缘（街坊/商）。\n③ 意义：脱离催生契约社会（现代）。","difficulties":"① 地缘=投影。原因：学生不懂「村即族」，需点明。\n② 脱离意义。原因：抽象，需联流动/契约。\n③ 契约。原因：陌生，需解。","teachingMethods":"① 投影比喻法：村=族。\n② 演化图法：血缘→地缘脱离。\n③ 联今法：城市化/契约。\n④ 对比法：礼治→契约。","preparation":"【PPT课件】P1 血缘（亲属定地位）；P2 地缘=血缘投影（村=族）；P3 脱离（流动→街坊/商）；P4 契约社会（现代）；P5 演化图；P6 概念卡。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——血缘定地位","time":"5分钟","content":"【PPT P1 血缘】教师：「乡土里你的地位靠『谁生的』——长子继承、亲疏定权利，这叫血缘决定。稳定但有裂痕（如分家不均）。」 预设回答：「出身定一切！」 板书时机：黑板写「血缘：亲属定地位」。差异化提示：B班说血缘；A班需说「裂痕」。易错点提醒：血缘社会「稳定」但也「固化」——地位先定，个人努力空间小，这是代价。"},{"step":"Step 2 地缘是投影","time":"12分钟","content":"【PPT P2 投影】教师：「地缘本是血缘的投影：一个村往往一族，地名即姓（李庄=李家）。住哪=你属哪族。」 板书时机：黑板写「地缘=血缘投影(村=族)」。差异化提示：B班说村族；A班需说「投影」。易错点提醒：投影比喻关键——地缘（住）最初只是血缘（亲）的空间化，二者不分。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 脱离与契约","time":"12分钟","content":"【PPT P3-4 脱离】教师：「当人离开族去外地（闯关东、进城），地缘脱了血缘——邻居是陌生人（街坊），交易讲规矩（商）。这时靠『契约』而非亲情，契约社会萌芽。」 板书时机：黑板写「流动→地缘脱离→契约」。差异化提示：B班说脱离；A班需说契约。易错点提醒：脱离是枢纽——乡土松动始于「人离开血缘网」，现代城市全是契约关系。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 联今","time":"8分钟","content":"【PPT P5 今】教师：「我们今天签合同、租房、上班——全是契约，不是亲情。这就是地缘脱离血缘的结果。」 板书时机：黑板写「今：契约社会」。差异化提示：B班说1例；A班需联城市化。易错点提醒：读懂这一篇就懂「为何城市人讲规则不讲人情」——社会基础变了。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 概念卡","time":"5分钟","content":"【PPT P6 卡】教师：「做『血缘』『地缘』两卡：定义+原文+我的例（如老家同村同姓）。」 板书时机：板书读法。差异化提示：B班做1卡；A班做2卡+演化图。易错点提醒：卡里写「演化」——血缘到地缘脱离是动态过程，非两静止词。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"3分钟","content":"【PPT P6 环节说明】教师：「血缘地缘读法定：投影→脱离→契约。」 板书时机：板书读法。差异化提示：B班背三点；A班写80字「我家的地缘血缘」。易错点提醒：下节课研讨乡土的现代命运，把前五篇概念用上。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 血缘与地缘 ──┐\n│ 血缘:亲属定地位 │\n│ (稳定·有裂痕)   │\n│                │\n│ 地缘=血缘投影   │\n│ 村=族(住=亲)    │\n│                │\n│ 脱离:           │\n│ 流动→地缘脱血缘 │\n│ →街坊/商        │\n│                │\n│ 意义:契约社会   │\n│ (今:合同/租房)  │\n└────────────────┘","exercises":"【基础作业】1. 解释「血缘」与「地缘」，说为何地缘是血缘的投影。2. 写「地缘」概念卡（定义+原文+我的例）。\n【提高作业】写160字「从血缘到契约」，要求：①说投影；②说脱离触发；③联今（合同/城市）。\n【参考答案——教师用】基础1：血缘=亲属关系决定地位；地缘原本是血缘的空间投影（村即族）。提高作业评价：投影+脱离+联今=良好；能析社会转型=优秀。","reflection":"✅ 亮点：投影比喻（村=族）让地缘可感，B班也懂；「脱离→契约」点出乡土松动枢纽，联今（合同）通透。\n⚠️ 需改进：契约概念B班仍虚，部分当「合同」窄解；下次扩到「规则关系」。\n📌 下节课衔接：下节课研讨乡土现代命运，整合前五篇概念。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T10:00:00Z"},{"id":"l-cn-bs-u5-6","lessonId":"l-cn-bs-u5-6","title":"研讨——乡土的现代命运（概念整合与批判思考）","book":"必修上册","unitNumber":5,"unitTitle":"乡土中国","taskGroup":"整本书阅读与研讨","lessonType":"yantao","lessonTypeName":"研讨","periodNumber":6,"duration":45,"grade":"高一","subject":"语文","tags":["整本书阅读","研讨","乡土现代命运","城市化","人教版必修上U5","第六课时"],"textbookAnalysis":"本课整合前五篇核心概念（乡土本色/差序格局/礼治无讼/血缘地缘），研讨「乡土中国在现代化（城市化、流动、法治、数字）中的命运」：哪些特质留存（熟人信任、家庭本位）、哪些松动（差序、礼治）、如何转化。培养批判性整合与现实意义思考。","overview":"【学情分析】A班：能整合多概念做批判，可深入「留存/松动/转化」三维；现实感强。B班：概念孤立，整合难；易二元（全留/全弃）。共同问题：研讨易散，缺概念支撑；对「命运」无框架。","objectives":["语言能力：整合前五篇概念研讨乡土现代命运，按「留存/松动/转化」三维组织发言。","文化意识：辩证看待乡土特质在现代的存续与转化，建立文化认同与批判意识。","思维品质：通过三维框架整合多概念，培养系统整合与批判思维。","学习能力：掌握「概念整合→三维研讨」的整本书研讨法。"],"keyPoints":"① 整合：乡土本色/差序/礼治/血缘四概念。\n② 三维：留存（熟人信任/家庭本位）、松动（差序/礼治）、转化（礼→法·血缘→契约）。\n③ 立场：辩证，非全留全弃。","difficulties":"① 概念整合。原因：学生孤立记，需框架勾连。\n② 三维组织。原因：研讨易散，需维度。\n③ 辩证。原因：易极端，需示范。","teachingMethods":"① 整合图法：四概念网。\n② 三维支架法：留存/松动/转化。\n③ 研讨工作坊：分组辩。\n④ 教师总结法。","preparation":"【PPT课件】P1 四概念整合网；P2 三维（留存/松动/转化）；P3 例（留存：家庭本位；松动：差序；转化：礼→法）；P4 研讨流程；P5 辩证立场。\n【实物教具】概念卡（前5课）。\n【音频】无。","process":[{"step":"Step 1 整合网","time":"8分钟","content":"【PPT P1 网】教师：「把前5篇概念连起来：乡土本色(土/不流动)→差序格局(人际)→礼治无讼(治理)→血缘地缘(结合)→现代松动。一张网。」 板书时机：黑板画整合网。差异化提示：B班说2概念；A班需说全链。易错点提醒：整合是研讨地基——没概念网，发言就是感想，不是学术研讨。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 三维框架","time":"8分钟","content":"【PPT P2 三维】教师：「命运分三维看：①留存（哪些还在？家庭本位、熟人信任）②松动（哪些弱了？差序、礼治）③转化（怎么变？礼→法、血缘→契约）。」 板书时机：黑板写三维。差异化提示：B班记三维；A班需各补例。易错点提醒：三维防极端——别只说「全没了」或「全留着」，分维度才准。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 分组研讨","time":"15分钟","content":"【PPT P3 例】【PPT P4 流程】教师：「三组各攻一维，举现实例：留存组（春节返乡/孝道）、松动组（陌生人社会/法治）、转化组（调解+法庭并存）。」 学生研讨。板书时机：巡记各组。差异化提示：B班跟一维；A班跨组补。易错点提醒：举例要「贴概念」——说现象先点它对应哪个概念（如返乡=乡土本色留存）。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 汇报","time":"8分钟","content":"【PPT P4 环节说明】教师：「各组汇报一维结论。」 预设回答：「留存：家庭本位仍强（春运）；松动：差序在公域弱；转化：农村也用合同。」 板书时机：黑板收三维结论。差异化提示：B班说1维；A班说三维连贯。易错点提醒：汇报用「概念+现象+判断」三件套，别只讲故事。"},{"step":"Step 5 辩证总结","time":"6分钟","content":"【PPT P5 辩证】教师：「乡土未死，在转化。家庭/信任是财富，差序/礼治需与现代法治调和。既不全盘西化也不守旧。」 板书时机：黑板写「辩证：存续+转化」。差异化提示：B班听；A班写一句立场。易错点提醒：读《乡土中国》为「理解自家社会」——认同根脉也看清变迁，才是真收获。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 乡土现代命运 ──┐\n│ 四概念网:       │\n│ 本色→差序→礼治 │\n│ →血缘→松动      │\n│                │\n│ 【三维】         │\n│ 留存:家庭/信任  │\n│ 松动:差序/礼治  │\n│ 转化:礼→法      │\n│  血缘→契约      │\n│                │\n│ 立场:辩证       │\n│ 存续+转化       │\n└────────────────┘","exercises":"【基础作业】1. 写出研讨三维（留存/松动/转化）各一例。2. 用前5篇一个概念解释「春运返乡」现象。\n【提高作业】写180字「乡土未死，在转化」，要求：①三维各举一例；②表辩证立场；③联自身观察。\n【参考答案——教师用】基础1评价：三维例对=合格。基础2：春运返乡=乡土本色（安土重迁/不流动）的现代表达。提高作业评价：三维+辩证+联己=良好；整合深=优秀。","reflection":"✅ 亮点：四概念整合网让研讨有地基，B班也懂勾连；三维框架（留存/松动/转化）防极端，发言质量高。\n⚠️ 需改进：B班整合仍弱，部分只讲现象不点概念；下次给「概念+现象」句架。\n📌 下节课衔接：下节课学写学术札记，把研讨写成文字。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T10:00:00Z"},{"id":"l-cn-bs-u5-7","lessonId":"l-cn-bs-u5-7","title":"学写学术札记——把阅读思考落成文字","book":"必修上册","unitNumber":5,"unitTitle":"乡土中国","taskGroup":"整本书阅读与研讨","lessonType":"xiezuo","lessonTypeName":"写作指导","periodNumber":7,"duration":45,"grade":"高一","subject":"语文","tags":["整本书阅读","学术札记","写作","人教版必修上U5","第七课时"],"textbookAnalysis":"本课教写学术札记（读书笔记的一种）：针对书中一个概念/论点，写300字左右——结构：①引（概念+原文出处）②释（我的理解）③联（现实例/质疑）④评（价值或局限）。区别于文学感想，重「有理有据、概念清晰」。是整本书阅读的输出能力。","overview":"【学情分析】A班：能写有理据札记，但易写成论文；可深入「评」的批判。B班：札记当读后感，缺概念引注；结构乱。共同问题：把札记写成抒情文；不标概念出处；无质疑。","objectives":["语言能力：写1篇学术札记（300字），按「引/释/联/评」四步，针对一个概念，有理有据。","文化意识：体会学术写作「尊重原典、清晰概念、慎用判断」的规范。","思维品质：通过「评」环节，培养对概念的批判与评价思维。","学习能力：掌握学术札记四步写法，能独立产出。"],"keyPoints":"① 四步：引（概念+出处）/释（理解）/联（现实或疑）/评（价值局限）。\n② 区别于感想：重概念清晰、有据、不抒情。\n③ 关键：引要标出处，评要有判断。","difficulties":"① 结构落地。原因：学生写散，需四步框。\n② 引注出处。原因：易忘标篇名，需强。\n③ 评的批判。原因：易空夸，需给判断。","teachingMethods":"① 四步讲授法。\n② 升格示范法：感想vs札记。\n③ 支架法：四步卡。\n④ 互评法。","preparation":"【PPT课件】P1 四步（引/释/联/评）；P2 升格（感想体vs札记体）；P3 样例（差序格局札记）；P4 互评量表；P5 写作。\n【实物教具】四步卡。\n【音频】无。","process":[{"step":"Step 1 四步结构","time":"8分钟","content":"【PPT P1 四步】教师讲：①引（写清概念+出自哪篇）②释（我的理解）③联（现实例或我的疑）④评（价值或局限，给判断）。板书时机：黑板画四步。差异化提示：B班记四步；A班需说「评」难。易错点提醒：札记≠读后感——不抒情，重「概念清晰+有据」，引必标出处。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 升格示范","time":"12分钟","content":"【PPT P2 升格】教师展示感想：「差序格局让我想到人情，真复杂。」问：「缺啥？」 预设回答：「没出处、没释、没评！」 教师改札记：「引：《差序格局》篇提出…释：以己为中心波纹…联：春节红包按亲疏…评：解释了中国关系本位，但现代需补平等。」 板书时机：黑板标四步对应。差异化提示：B班看差；A班需说改法。易错点提醒：升格关键在「引标出处+评给判断」——这两处是札记与感想的分水岭。"},{"step":"Step 3 样例","time":"6分钟","content":"【PPT P3 样例】教师展示一篇完整「差序格局」札记（引/释/联/评俱全），学生读。板书时机：黑板贴样例要点。差异化提示：B班读样例；A班需说哪步最难。易错点提醒：样例是「模板」不是「抄本」——换概念换内容，结构不变。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 写初稿","time":"12分钟","content":"【PPT P5 写】教师：「选一个概念（礼治/血缘/乡土本色）写札记300字，四步齐全，引标篇名。」 学生写。板书时机：教师巡选。差异化提示：B班写200字+四步；A班写300字+评有判。易错点提醒：评要有「判断句」——如「该概念解释力强但有时代局限」，不空夸。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 互评","time":"7分钟","content":"【PPT P4 量表】教师：「交换评：引有出处？释清？联有例？评有判？」 预设回答：「他引没标篇名」「她评只夸没说局限。」 板书时机：黑板收。差异化提示：B班用「有/无」；A班四维评。易错点提醒：互评重点「引出处+评判断」——最易漏的两处。"},{"step":"Step 6 作业","time":"2分钟","content":"【PPT P6 环节说明】教师：「据互评改终稿，下节课研讨会宣读。」 板书时机：板书「读→写」。差异化提示：B班改出处；A班改评。易错点提醒：下节课研讨会，优秀札记宣读。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 学术札记 ──┐\n│ 四步:           │\n│ 引(概念+出处)   │\n│ 释(我的理解)    │\n│ 联(现实/疑)     │\n│ 评(价值/局限)   │\n│                │\n│ 非感想:         │\n│ 不抒情·重有据   │\n│                │\n│ 分水岭:         │\n│ 引标出处        │\n│ 评给判断        │\n└────────────────┘","exercises":"【基础作业】1. 据互评改札记终稿（300字），四步齐+引标篇名。2. 写一句「我评的概念价值/局限」。\n【提高作业】另写一篇「血缘与地缘」札记（四步+评判），要求评中含一处质疑。\n【参考答案——教师用】基础1评价：四步全+出处=合格；释清联实=良好。基础2评价：有判断=合格。提高作业评价：四步+质疑=优秀。","reflection":"✅ 亮点：四步法+升格（感想→札记）让B班也懂区别；「引出处/评判断」分水岭点醒易漏处。\n⚠️ 需改进：评环节B班仍空夸，部分只说「很有用」；下次给「判断句」模板。\n📌 下节课衔接：下节课研讨会，优秀札记宣读并辩。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T10:00:00Z"},{"id":"l-cn-bs-u5-8","lessonId":"l-cn-bs-u5-8","title":"单元活动——「乡土中国」研讨会与阅读总结","book":"必修上册","unitNumber":5,"unitTitle":"乡土中国","taskGroup":"整本书阅读与研讨","lessonType":"huodong","lessonTypeName":"单元活动","periodNumber":8,"duration":45,"grade":"高一","subject":"语文","tags":["整本书阅读","研讨会","总结","人教版必修上U5","第八课时"],"textbookAnalysis":"本课为第五单元收官：举办「乡土中国」研讨会——宣读优秀学术札记、围绕「乡土现代命运」小型辩论；展示概念卡全集；填单元反思单（读了什么/怎么读/留下什么），完成整本书阅读闭环，固化学术阅读方法。","overview":"【学情分析】A班：札记质量高可宣读，辩论有据；反思深。B班：部分羞于宣读宜代表；概念卡零散需整合；反思宜具体。共同问题：单元「读了什么」缺整体认知，方法未固化。","objectives":["语言能力：宣读学术札记或参与研讨发言，做到概念清晰、有据、有条理。","文化意识：在研讨会中形成对「乡土中国」的整体理解与当代关怀。","思维品质：填单元反思单，梳理「读物—方法—收获」，培养元认知。","学习能力：整合全书概念卡为个人「乡土中国」知识网。"],"keyPoints":"① 宣读：优秀札记（引/释/联/评）。\n② 辩论：乡土现代命运（留存/松动/转化）。\n③ 反思单：读了什么/怎么读/留下什么。","difficulties":"① 宣读条理。原因：易念稿无重点，需框架。\n② 辩论深度。原因：易口号，需概念支撑。\n③ 元认知。原因：Reflection空话，需具体。","teachingMethods":"① 宣读工作坊。\n② 小型辩论法。\n③ 概念卡墙法。\n④ 反思单法。","preparation":"【PPT课件】P1 研讨会流程；P2 宣读框架（引/释/联/评）；P3 辩论题（乡土命运）；P4 概念卡墙布置；P5 反思单。\n【实物教具】学生概念卡全集；A3墙；便签。\n【音频】无。","process":[{"step":"Step 1 概念卡墙","time":"5分钟","content":"【PPT P4 布置】教师：「把前五篇概念卡贴成『乡土中国知识网』：本色/差序/礼治/血缘，连线显示关系。」 学生贴。板书时机：黑板写「知识网：四概念」。差异化提示：B班贴本组；A班布展+导览。易错点提醒：卡要标篇名——学术诚信，概念有出处。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 札记宣读（上）","time":"15分钟","content":"【PPT P1 流程】【PPT P2 框架】教师：「选3篇札记宣读，用框架：我的概念（引）/理解（释）/现实（联）/判断（评）。」 学生宣读。板书时机：旁记亮点。差异化提示：B班小组代表；A班独宣+PPT。易错点提醒：宣读亮「评的判断」最出彩——别只复述书。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 小型辩论","time":"10分钟","content":"【PPT P3 辩题】教师：「辩：乡土特质今天该『守』还是『转』？守方举家庭/信任，转方举差序/礼治需调和法治。」 学生辩。板书时机：黑板收两方。差异化提示：B班跟一方；A班需概念支撑。易错点提醒：辩论用概念不是喊口号——每句贴「差序/礼治」才叫学术辩。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 反思单","time":"10分钟","content":"【PPT P5 模板】教师：「填反思单三行：①读了什么（书+核心概念）②怎么读（四步法）③留下什么（方法/观念）。」 预设回答：「①读了乡土中国，懂差序格局；②用预览批注卡图；③留下概念卡习惯。」 板书时机：巡选分享。差异化提示：B班填前两行；A班全填+疑问。易错点提醒：反思写具体「一个方法/概念」非「学到很多」。"},{"step":"Step 5 总结","time":"5分钟","content":"【PPT P5 环节说明】教师总结：「这单元我们啃下一本学术书——用四步法把14篇读成一张网。整本书阅读的能力，是一辈子的。」 板书时机：黑板写「读→网：整本能力」。差异化提示：B班听；A班写一句下书期待。易错点提醒：单元结束是方法起点——以后读任何书都用这四步。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 乡土中国·研讨会 ──┐\n│ 概念卡墙:四概念网  │\n│ 本色/差序/礼治/血缘│\n│                │\n│ 【宣读框架】     │\n│ 引/释/联/评     │\n│                │\n│ 【辩论】         │\n│ 守(家庭/信任)   │\n│ ↔转(差序/礼治   │\n│  需调和法治)    │\n│                │\n│ 【反思三问】     │\n│ ①读了__ ②怎么读__│\n│ ③留下__         │\n│                │\n│ 读→网:整本能力  │\n└────────────────┘","exercises":"【基础作业】1. 提交单元反思单（三行完整）+概念卡全集归档。2. 将最满意札记誊清。\n【提高作业】写150字「整本书阅读总结」，要求：①点明最关键方法；②举一篇/一概念说明；③说一个想读的下本书。\n【参考答案——教师用】反思单评价：三行具体=合格；有方法意识=良好；疑问有思=优秀。总结评价：点法+举例+下书=合格；有个性化=良好。","reflection":"✅ 亮点：概念卡墙让全书「可视化」成网，B班也懂勾连；宣读框架（引释联评）让发言有锋芒，评的判断成亮点。\n⚠️ 需改进：15分钟只轮部分人；下次分两批或限2分钟。\n📌 下单元衔接：第七单元「自然情怀」转文学阅读，方法从「抓概念」回到「赏形象」，需提示切换。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T10:00:00Z"},{"id":"l-cn-bx-u1-1","lessonId":"l-cn-bx-u1-1","title":"子路、曾皙、冉有、公西华侍坐 精读——孔门言志与「吾与点也」","book":"必修下册","unitNumber":1,"unitTitle":"中华传统文化经典","taskGroup":"思辨性阅读与表达","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":1,"duration":45,"grade":"高一","subject":"语文","tags":["传统文化","论语","侍坐","言志","人教版必修下U1","第一课时"],"textbookAnalysis":"《侍坐》是《论语·先进》篇，记孔子让四弟子言志：子路（勇治千乘）、冉有（富小康）、公西华（司仪）、曾皙（暮春浴沂风雩咏而归）。孔子独叹「吾与点也」——赞曾皙超越功利、与天地优游的生命境界。是理解孔子理想人格与儒家「礼乐」精神的入口。","overview":"【学情分析】A班：能跟四子志差异，可深入「吾与点也」的超越性；对礼乐有概念。B班：文言词句障（摄/比/方），四子志易混；「与点」读不懂。共同问题：把言志当填空，不懂孔子为何独许曾皙；礼乐背景缺。","objectives":["语言能力：朗读背诵，解释「摄、比、方、希、作」等词，说出四弟子各自的「志」。","文化意识：理解孔子「吾与点也」背后的礼乐理想与超越功利的洒落人格。","思维品质：通过分析四子言志的层次，培养对理想人格的辨析思维。","学习能力：掌握「抓言志→比层次→明夫子叹」的语录读法。"],"keyPoints":"① 四子志：子路(勇)/冉有(富)/公西华(礼)/曾皙(游)。\n② 夫子叹：吾与点也——许曾皙之洒落。\n③ 深意：超越功利、与物同春的礼乐境界。","difficulties":"① 四子志辨。原因：学生混，需逐人标。\n② 吾与点也。原因：难懂超越性，需解「暮春之游」象征。\n③ 文言词。原因：僻词多，需随文。","teachingMethods":"① 诵读法：范读→背。\n② 言志解码法：四子表。\n③ 比较法：三子务实vs曾皙超然。\n④ 语境释义法。","preparation":"【PPT课件】P1 孔子与《论语》+背景；P2 四子言志表；P3 吾与点也解码（暮春之游）；P4 关键词（摄/比/方/希）；P5 礼乐理想；P6 练习。\n【实物教具】无。\n【音频】吟诵1分20秒。","process":[{"step":"Step 1 导入——言志","time":"5分钟","content":"【PPT P1 背景】教师：「孔子让四弟子『言志』。子路先答，曾皙最后鼓瑟而答。四人的志大不同。」 预设回答：「他们在说想做什么官！」 板书时机：黑板写「四子言志」。差异化提示：B班说背景；A班需联孔门。易错点提醒：言志是《论语》常见教法——借学生自述察其气象，非单纯问答。"},{"step":"Step 2 四子志","time":"13分钟","content":"【PPT P2 表】教师：「子路：千乘之国『勇且知方』(治武备)；冉有：方六七十『足民』(富民)；公西华：『愿为小相』(司礼)；曾皙：暮春浴沂风雩咏归(优游)。」 板书时机：黑板列四子+志。差异化提示：B班说前三子；A班全说+析曾皙。易错点提醒：逐人抓「志在何」——子路勇、冉有富、公西华礼，皆务实；曾皙独超然。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 吾与点也","time":"12分钟","content":"【PPT P3 解码】教师：「孔子为何叹『吾与点也』？曾皙描绘的暮春之游，是礼乐化成、人自在天地的境界——超越事功，与物同春。夫子心许此洒落。」 板书时机：黑板写「吾与点也=许洒落境界」。差异化提示：B班说许曾皙；A班需解象征。易错点提醒：「与点」非否定三子——是更高一层的生命从容，懂此才懂孔子。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 关键词","time":"8分钟","content":"【PPT P4 词】教师：「摄(夹)/比(并)/方(道义)/希(稀,指瑟声稀)/作(起)。随文释义。」 板书时机：黑板右列词。差异化提示：B班记词；A班需造句。易错点提醒：方=道义准则（「且知方也」），非方形；希=稀疏，写瑟将止。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 礼乐理想","time":"4分钟","content":"【PPT P5 礼乐】教师：「曾皙之境正是孔子理想——礼乐之治下人人从容。言志背后是儒家对『人该如何活』的回答。」 板书时机：黑板写「礼乐理想」。差异化提示：B班听；A班需说关联。易错点提醒：读《论语》要见「人」——每章皆在塑造理想人格。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"3分钟","content":"【PPT P6 练习】教师：「《侍坐》读法？」 预设回答：「抓言志→比层次→明与点！」 板书时机：板书读法。差异化提示：B班背四子；A班写80字「我的志」。易错点提醒：下节课读《齐桓晋文之事》，看孟子如何说「仁政」。"}],"blackboard":"┌── 侍坐·论语 ──┐\n│ 四子言志:       │\n│ 子路:勇(治武)   │\n│ 冉有:富(足民)   │\n│ 公西华:礼(小相) │\n│ 曾皙:游(暮春)   │\n│                │\n│ 吾与点也:        │\n│ 许曾皙之洒落     │\n│ 礼乐化成·人自在 │\n│                │\n│ 关键词:          │\n│ 摄/比/方/希/作  │\n│                │\n│ 读法:           │\n│ 言志→层次→与点 │\n└────────────────┘","exercises":"【基础作业】1. 背诵全文。2. 写出四弟子各言何志。\n【提高作业】写160字「我理解吾与点也」，要求：①说曾皙之境；②说孔子为何许之；③联今日生活。\n【参考答案——教师用】基础2：子路治千乘、冉有富民、公西华司礼、曾皙暮春优游。提高作业评价：说境+许因+联今=良好；能析超越=优秀。","reflection":"✅ 亮点：四子
