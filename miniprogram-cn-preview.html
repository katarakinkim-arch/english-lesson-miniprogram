升华。\n③ 养生隐喻。原因：易当养身，需解为处世。","teachingMethods":"① 故事复述法。\n② 词义图解法：批郤导窾。\n③ 寓意解码法：技→道→养生。\n④ 联今法。","preparation":"【PPT课件】P1 庄子与养生主；P2 解牛过程（神遇/天理）；P3 关键处（批郤/导窾/肯綮）；P4 技→道→养生；P5 关键词；P6 联今；P7 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——神遇","time":"5分钟","content":"【PPT P1 庄子】教师：「庖丁解牛『手之所触，肩之所倚』，更妙的是『以神遇而不以目视』——不用眼睛，用心神契合牛的机理。」 预设回答：「熟练到成直觉了！」 板书时机：黑板写「以神遇不以目视」。差异化提示：B班说熟练；A班需说「神遇」。易错点提醒：神遇=超越感官的契合，是技艺最高境，非单纯手熟。"},{"step":"Step 2 解牛之理","time":"13分钟","content":"【PPT P2-3 理】教师：「他『依乎天理』（顺牛骨理），『批大郤导大窾』（进骨缝空处），『避肯綮』（绕筋骨结）。所以十九年刀若新。」 板书时机：黑板画「天理/郤/窾/肯綮」。差异化提示：B班说顺理；A班需解三词。易错点提醒：批郤=击骨缝，导窾=引空处，肯綮=筋骨结——皆「顺空避实」，是核心。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 技→道","time":"12分钟","content":"【PPT P4 升】教师：「由解牛之技，悟『道』：凡事顺其理、避其戾，则游刃有余。这是庄子由技入道。」 板书时机：黑板写「技→道：顺理避戾」。差异化提示：B班说顺理；A班需说「道」何指。易错点提醒：庄子的「道」在具体技艺里——不离事求道，技熟即近道。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 养生寄托","time":"8分钟","content":"【PPT P4 养生】教师：「文惠君曰『得养生焉』。养生主=在世间顺理而行、避冲突（肯綮），全其天年。非养身，是处世智慧。」 板书时机：黑板写「养生=顺理避戾处世」。差异化提示：B班听；A班需说隐喻。易错点提醒：养生是道家处世术——处复杂人间如解牛，避硬碰、顺空隙，全身远祸。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 联今","time":"4分钟","content":"【PPT P6 联今】教师：「今天处事也讲『游刃有余』——找准规律、避开硬结，从容不狼狈。」 板书时机：黑板写「今：游刃有余」。差异化提示：B班说1例；A班需联学习/人际。易错点提醒：读庄为照今——「顺理避戾」是终身受用的从容法。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"3分钟","content":"【PPT P7 练习】教师：「《庖丁》读法？」 预设回答：「抓寓言→解码寄托→明道体！」 板书时机：板书读法。差异化提示：B班背词；A班写80字「我的游刃一事」。易错点提醒：下节课读《烛之武退秦师》，从道家转到史传辞令。"}],"blackboard":"┌── 庖丁解牛·庄 ──┐\n│ 以神遇不以目视  │\n│                │\n│ 解牛之理:       │\n│ 依天理·批郤     │\n│ 导窾·避肯綮     │\n│                │\n│ 技→道:          │\n│ 顺理避戾       │\n│ 游刃有余        │\n│                │\n│ 养生=处世:      │\n│ 顺空隙·全身远祸│\n│                │\n│ 今:游刃有余     │\n└────────────────┘","exercises":"【基础作业】1. 解释「天理、肯綮、批郤、导窾」。2. 说「以神遇不以目视」的境界。\n【提高作业】写150字「我的游刃有余」，要求：①借解牛理说一处处事；②用顺理避戾；③联自身。\n【参考答案——教师用】基础1：天理=牛骨天然纹理；肯綮=筋骨结；批郤=击骨缝；导窾=引骨空。提高作业评价：理+处例+联己=良好；能析道体=优秀。","reflection":"✅ 亮点：批郤导窾词义图解让B班懂「顺空避实」；技→道→养生三阶让寓言不泊表面。\n⚠️ 需改进：养生B班易当养身，部分忽略处世隐喻；下次给「非养身是处世」红线。\n📌 下节课衔接：下节课《烛之武退秦师》，史传辞令的说服术。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-cn-bx-u1-4","lessonId":"l-cn-bx-u1-4","title":"烛之武退秦师 精读——危局说客与辞令艺术","book":"必修下册","unitNumber":1,"unitTitle":"中华传统文化经典","taskGroup":"思辨性阅读与表达","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":4,"duration":45,"grade":"高一","subject":"语文","tags":["传统文化","左传","烛之武退秦师","辞令","人教版必修下U1","第四课时"],"textbookAnalysis":"《烛之武退秦师》出自《左传·僖公三十年》。秦晋围郑，烛之武夜缒而出，说秦伯：①郑亡于秦无益（越国鄙远）；②存郑为秦「东道主」有利；③晋曾负秦（许君焦瑕）；④晋贪无止将阙秦。层层利害，离间秦晋，终退秦师。是春秋辞令（利害说理、迂回婉转）典范。","overview":"【学情分析】A班：能跟四层说辞逻辑，可深入「离间」策略与《左传》叙事；赏辞令。B班：文言词（缒/鄙/陪），四层易混；说辞逻辑不清。共同问题：当故事读，抓不住「利害」主线；辞令艺术读不出。","objectives":["语言能力：解释「缒、鄙、陪、阙」等词，复述烛之武说秦伯的四层理由。","文化意识：理解春秋辞令「动以利害、婉而切」的说服传统与行人（外交使）智慧。","思维品质：通过分析四层说辞的递进，培养利害权衡与策略思维。","学习能力：掌握「抓危局→理说辞→赏辞令」的史传读法。"],"keyPoints":"① 危局：秦晋围郑，郑将亡。\n② 四层说辞：亡郑无益/存郑利秦/晋负秦/晋将阙秦。\n③ 辞令：利害为纲、迂回离间。","difficulties":"① 四层逻辑。原因：学生罗列不分，需标递进。\n② 离间术。原因：易看表面，需点明「间秦晋」。\n③ 文言词。原因：僻词多，需随文。","teachingMethods":"① 危局导入法。\n② 说辞分层法：四层表。\n③ 辞令解码法：利害/离间。\n④ 语境释义法。","preparation":"【PPT课件】P1 左传与背景（秦晋围郑）；P2 四层说辞表；P3 辞令解码（利害/离间）；P4 关键词（缒/鄙/陪/阙）；P5 叙事特色；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——危局","time":"5分钟","content":"【PPT P1 背景】教师：「秦晋围郑，郑危矣。烛之武年老，夜缒城而出见秦伯。一人之口救一国。」 预设回答：「靠嘴退兵！」 板书时机：黑板写「秦晋围郑→烛武说秦」。差异化提示：B班说危局；A班需联春秋。易错点提醒：缒=用绳吊下城墙——见其险，说客孤身入虎穴。"},{"step":"Step 2 四层说辞","time":"13分钟","content":"【PPT P2 表】教师：「四层：①亡郑，秦得吗？越国鄙远，反利晋（无益）；②存郑，供秦『东道主』（有利）；③晋曾许君焦瑕而朝济夕设版（负秦）；④晋贪必阙秦（将害）。利害为纲。」 板书时机：黑板列四层。差异化提示：B班说前两；A班全说+析递进。易错点提醒：四层递进——从「无益」到「有利」到「负秦」到「将害」，步步逼秦背晋。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 辞令解码","time":"12分钟","content":"【PPT P3 辞令】教师：「妙在：不骂晋，只算账；先言利（存郑），再揭负（晋不信），终预警（晋阙秦）。婉而切，动以利害离间秦晋。」 板书时机：黑板写「辞令：利害·离间·婉切」。差异化提示：B班说利害；A班需说离间。易错点提醒：春秋辞令高端在「不直攻」——用对方利益说话，让对方自己转念，此谓「行人」之智。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 关键词","time":"8分钟","content":"【PPT P4 词】教师：「缒(吊下)/鄙(边邑,此处动)/陪(增)/阙(损)。」 板书时机：黑板右列词。差异化提示：B班记词；A班需造句。易错点提醒：鄙本名词边邑，此作动「以…为鄙」；阙通缺，损也。随文活解。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 叙事","time":"4分钟","content":"【PPT P5 叙事】教师：「《左传》叙事简而有法：危局→说辞→结果，对话载事，辞令即史。」 板书时机：黑板写「左传：以辞载史」。差异化提示：B班听；A班需说特色。易错点提醒：读《左传》对话即情节——说辞成败直接推动历史，辞令是史传灵魂。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"3分钟","content":"【PPT P6 练习】教师：「《烛之武》读法？」 预设回答：「抓危局→理说辞→赏辞令！」 板书时机：板书读法。差异化提示：B班背词；A班写80字「我说服一事」。易错点提醒：下节课读《鸿门宴》，看《史记》如何写人物冲突。"}],"blackboard":"┌── 烛之武退秦师 ──┐\n│ 秦晋围郑→说秦   │\n│                │\n│ 四层说辞:       │\n│ ①亡郑无益(鄙远)│\n│ ②存郑利秦(东道)│\n│ ③晋负秦(焦瑕)  │\n│ ④晋将阙秦       │\n│                │\n│ 辞令:           │\n│ 利害为纲·离间   │\n│ 婉而切          │\n│                │\n│ 左传:以辞载史   │\n└────────────────┘","exercises":"【基础作业】1. 写出烛之武说秦伯的四层理由。2. 解释：①缒 ②鄙 ③陪 ④阙。\n【提高作业】写150字「我的说服一事」，要求：①仿烛之武动以利害；②分两层说；③联生活。\n【参考答案——教师用】基础2：缒=绳吊下；鄙=边邑（作动）；陪=增加；阙=损害。提高作业评价：利害+两层+联己=良好；策略清=优秀。","reflection":"✅ 亮点：四层说辞表让递进清晰，B班也懂「利害为纲」；辞令解码（离间/婉切）点出春秋行人智慧。\n⚠️ 需改进：文言词B班仍卡（鄙/阙活用），需给活用注；下次加。\n📌 下节课衔接：下节课《鸿门宴》，史记写人物冲突。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-cn-bx-u1-5","lessonId":"l-cn-bx-u1-5","title":"鸿门宴 精读——史记笔法与人物的冲突","book":"必修下册","unitNumber":1,"unitTitle":"中华传统文化经典","taskGroup":"思辨性阅读与表达","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":5,"duration":45,"grade":"高一","subject":"语文","tags":["传统文化","史记","鸿门宴","人物","人教版必修下U1","第五课时"],"textbookAnalysis":"《鸿门宴》出自《史记·项羽本纪》。写楚汉相争关键一夜：刘邦谢罪、范增举玦、项庄舞剑、樊哙闯帐、刘邦遁走。司马迁以对话、动作、细节写活人物——项羽刚愎磊落、刘邦机变、范增焦灼、张良沉稳、樊哙忠勇。是史传写人范本。","overview":"【学情分析】A班：能跟人物对比，可深入司马迁「互见」与细节写人；赏史笔。B班：情节懂但人物扁平看；细节（举玦/舞剑）读不出。共同问题：当故事读，抓不住「以细节写人」；项羽性格归因浅。","objectives":["语言能力：梳理鸿门宴情节（谢罪→举玦→舞剑→闯帐→遁走），解释关键词，说出主要人物性格。","文化意识：体会《史记》「不虚美不隐恶」的实录精神与以人写史的叙事传统。","思维品质：通过分析细节动作写人，培养「于细微处见性格」的文本细读思维。","学习能力：掌握「理情节→析细节→品人物」的史传读法。"],"keyPoints":"① 情节链：谢罪→举玦→舞剑→闯帐→遁走。\n② 写人：细节动作（举玦/舞剑/闯帐）。\n③ 人物：项羽(磊落刚愎)/刘邦(机变)/樊哙(忠勇)。","difficulties":"① 细节写人。原因：学生看情节不看笔法，需点「举一羽见一鸱」。\n② 项羽性格。原因：易脸谱，需辨磊落与失策。\n③ 情节多。原因：人物杂，需理清。","teachingMethods":"① 情节图法：五节点。\n② 细节解码法：动作写人。\n③ 人物对比法。\n④ 诵读法（樊哙段）。","preparation":"【PPT课件】P1 史记与楚汉；P2 情节链（五节点）；P3 细节写人（举玦/舞剑/闯帐）；P4 人物对比（项羽/刘邦/樊哙）；P5 实录精神；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——一夜定天下","time":"5分钟","content":"【PPT P1 背景】教师：「鸿门宴是楚汉拐点：项羽若杀刘邦，历史或改写。司马迁写这一夜，惊心动魄。」 预设回答：「刘邦差点没命！」 板书时机：黑板写「鸿门宴：楚汉拐点」。差异化提示：B班说事件；A班需联史记。易错点提醒：史记写「关键一刻」——小场景载大历史，宴即战场。"},{"step":"Step 2 情节链","time":"12分钟","content":"【PPT P2 链】教师：「五节点：刘邦谢罪→范增举玦(示杀)→项庄舞剑(刺)→樊哙闯帐(护)→刘邦遁走。一张一弛。」 板书时机：黑板画情节链。差异化提示：B班说节点；A班需说张弛。易错点提醒：读史传先理「谁在何时做什么」——情节链是骨架，细节是血肉。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 细节写人","time":"13分钟","content":"【PPT P3 细节】教师：「范增『举所佩玉玦以示之者三』——玦=决，急不可耐；项庄舞剑『若属皆且为所虏』——杀机；樊哙『瞋目视项王，头发上指』——忠勇。动作即性格。」 板书时机：黑板列三细节+性格。差异化提示：B班说1细节；A班需析各喻性格。易错点提醒：史记妙在「不评判」——只写动作，性格自见，此谓「以事写人」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 人物对比","time":"10分钟","content":"【PPT P4 人物】教师：「项羽：磊落却刚愎（放刘邦）；刘邦：机变隐忍（遁走）；樊哙：忠勇粗中有细。三人对照，性格互显。」 板书时机：黑板列三人。差异化提示：B班说项羽；A班需三人比对。易错点提醒：项羽非「蠢」——是重义轻算的悲剧英雄，司马迁写其「不忍」恰是动人处。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 实录精神","time":"3分钟","content":"【PPT P5 实录】教师：「《史记》『不虚美不隐恶』——项羽虽败亦写其英气，刘邦虽成亦写其滑。客观。」 板书时机：黑板写「实录精神」。差异化提示：B班听；A班需说价值。易错点提醒：实录是史家良知——不因成败改笔，方成「无韵之离骚」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"2分钟","content":"【PPT P6 练习】教师：「《鸿门宴》读法？」 预设回答：「理情节→析细节→品人物！」 板书时机：板书读法。差异化提示：B班背情节；A班写80字「我眼中的项羽」。易错点提醒：下节课群文比诸子言说与史传叙事。"}],"blackboard":"┌── 鸿门宴·史记 ──┐\n│ 楚汉拐点·一夜   │\n│                │\n│ 情节链:         │\n│ 谢罪→举玦→舞剑 │\n│ →闯帐→遁走     │\n│                │\n│ 细节写人:       │\n│ 举玦(决·急)    │\n│ 舞剑(刺·机)    │\n│ 闯帐(忠·勇)    │\n│                │\n│ 人物:           │\n│ 羽磊愎/邦机变   │\n│ 哙忠勇          │\n│ 实录精神        │\n└────────────────┘","exercises":"【基础作业】1. 写出鸿门宴情节五节点。2. 说项羽、刘邦性格各一关键词。\n【提高作业】写150字「我眼中的项羽」，要求：①用一细节支撑；②辨磊落与失策；③不脸谱。\n【参考答案——教师用】基础1：谢罪、举玦、舞剑、闯帐、遁走。基础2：项羽磊落刚愎、刘邦机变隐忍。提高作业评价：细节+辩证+不脸谱=良好；有史识=优秀。","reflection":"✅ 亮点：情节链+细节写人（举玦/舞剑/闯帐）让B班懂「动作即性格」；项羽「非蠢是悲剧英雄」避免脸谱。\n⚠️ 需改进：樊哙段B班读不透（瞋目细节），需多读；下次加诵读。\n📌 下节课衔接：下节课群文比诸子言说与史传叙事之异。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-cn-bx-u1-6","lessonId":"l-cn-bx-u1-6","title":"群文阅读——诸子言说与史传叙事比较","book":"必修下册","unitNumber":1,"unitTitle":"中华传统文化经典","taskGroup":"思辨性阅读与表达","lessonType":"qunwen","lessonTypeName":"群文阅读","periodNumber":6,"duration":45,"grade":"高一","subject":"语文","tags":["传统文化","群文","诸子","史传","人教版必修下U1","第六课时"],"textbookAnalysis":"群文比较本单元两类文本：诸子（论语/孟子/庄子）重「说理—寄托」，以对话喻理、重义理与人格；史传（左传/史记）重「叙事—写人」，以事件载史、重细节与人物。通过双栏比较，提炼中华传统文化经典的两种表达范式，为单元写作蓄势。","overview":"【学情分析】A班：能比两类范式，可深入「说理vs叙事」的功能差异；迁移强。B班：单篇懂但比较框架缺，需双栏；易混。共同问题：比较易罗列缺归纳——发现「都经典」后不会提炼范式。","objectives":["语言能力：用双栏比较诸子与史传（目的/方法/笔法/效果），说出两种范式。","文化意识：体会中华传统经典「义理与叙事并重」的表达智慧。","思维品质：通过比较培养同中求异、提炼范式思维。","学习能力：掌握经典群文双栏比较法，能迁移他文。"],"keyPoints":"① 诸子：说理—寄托（对话喻理/重义理人格）。\n② 史传：叙事—写人（事件载史/重细节人物）。\n③ 共性：皆「文以载道」的经典。","difficulties":"① 范式区分。原因：学生混两类，需点目的方法异。\n② 双栏填。原因：维度不清，需框架。\n③ 共性提炼。原因：易停异，需归纳。","teachingMethods":"① 双栏比较法。\n② 范式命名法：说理体/叙事体。\n③ 归纳法。\n④ 迁移法。","preparation":"【PPT课件】P1 两类文本；P2 双栏（目的/方法/笔法/效果）；P3 范式（说理体/叙事体）；P4 共性（文以载道）；P5 迁移；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——两类","time":"5分钟","content":"【PPT P1】教师：「本单元两类：诸子（论语孟子庄子）说理寄托，史传（左传史记）叙事写人。读法一样吗？」 预设回答：「不一样——一个讲理一个讲故事！」 板书时机：黑板写「两类：说理/叙事」。差异化提示：B班说异；A班需预判。易错点提醒：别只说「都古文」——要比「怎么表达道理」。"},{"step":"Step 2 双栏","time":"13分钟","content":"【PPT P2 表】教师：「填双栏：目的（明理/载史）、方法（对话喻理/事件写人）、笔法（义理人格/细节动作）、效果（启思/如见）。」 学生填。板书时机：黑板画双栏。差异化提示：B班填目的+方法；A班全填。易错点提醒：同维度比——都在「目的/方法/笔法/效果」下，不能乱比。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 范式","time":"10分钟","content":"【PPT P3 范式】教师：「诸子=说理体（借事喻理、重义理与人格）；史传=叙事体（借人载史、重细节与冲突）。一重『理』一重『事』。」 板书时机：黑板写「说理体↔叙事体」。差异化提示：B班记两词；A班需说「谁主」。易错点提醒：范式区别在「表达重心」——说理以理摄事，叙事以事显理。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 共性","time":"8分钟","content":"【PPT P4 共性】教师：「异之后共性？」 预设回答：「都『文以载道』——诸子载义理，史传载史观与人性，都是经典育人之文。」 板书时机：黑板写「共性：文以载道」。差异化提示：B班说1点；A班需整合。易错点提醒：归纳是群文目的——异是手段，共性是收获。"},{"step":"Step 5 迁移","time":"5分钟","content":"【PPT P5 迁移】教师：「这比较法可用到单元写作——写议论性文章可学诸子说理，写人物可学史传细节。」 板书时机：板书「可迁移」。差异化提示：B班听；A班需说下用。易错点提醒：下节课写作，把说理与写人用到笔下。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 作业","time":"4分钟","content":"【PPT P6 练习】教师：「据双栏写一段比较，下节课用。」 板书时机：板书群文读法。差异化提示：B班背双栏；A班写比较段。易错点提醒：写作用原句支撑，不贴标签。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 诸子·史传 群文 ──┐\n│ 同:文以载道        │\n│ 异:重心不同        │\n│                │\n│ 【双栏】         │\n│ 目的:明理↔载史   │\n│ 方法:喻理↔写人   │\n│ 笔法:义理↔细节   │\n│ 效果:启思↔如见   │\n│                │\n│ 范式:           │\n│ 说理体(重理)     │\n│ 叙事体(重事)     │\n│                │\n│ 共性:文以载道    │\n└────────────────┘","exercises":"【基础作业】1. 完成双栏（目的/方法/笔法/效果）。2. 用一句话说两类范式差异。\n【提高作业】写180字比较短文，要求：①同维度；②各引一句；③提炼范式差异。\n【参考答案——教师用】基础1评价：双栏全+维度对=合格。提高作业评价：同维度+引句+范式明=良好；能析功能=优秀。","reflection":"✅ 亮点：双栏让比较有抓手，B班也填；范式命名（说理体/叙事体）抓内核；共性「文以载道」有高度。\n⚠️ 需改进：B班生常混两类，需更多对比例；下次加判定口诀。\n📌 下节课衔接：下节课写作，学写议论性文章。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-cn-bx-u1-7","lessonId":"l-cn-bx-u1-7","title":"写作指导——学写议论性文章（立论与据典）","book":"必修下册","unitNumber":1,"unitTitle":"中华传统文化经典","taskGroup":"思辨性阅读与表达","lessonType":"xiezuo","lessonTypeName":"写作指导","periodNumber":7,"duration":45,"grade":"高一","subject":"语文","tags":["传统文化","写作","议论","立论","人教版必修下U1","第七课时"],"textbookAnalysis":"本课为第一单元写作任务，学写议论性短文（300字左右）。方法：①立论（段首亮观点）；②据典（引本单元经典：孔子许志、孟子推恩、庄子顺理、左传辞令）；③分析（典如何证观点）；④结论。重点是「据典论证」——学生常「观点+例子」就停，缺分析衔接。","overview":"【学情分析】A班：能写有观点文，但分析句弱，论据与评价「两张皮」；可深入。B班：不知议论结构，常写记叙文；观点句不显。共同问题：把议论当「讲故事+喊口号」；论据不典型或与分析脱节。","objectives":["语言能力：写1篇议论短文（300字），做到观点显、据典（引单元经典）、分析连。","文化意识：在议论中合理引用中华经典，培养「据典立论」的文化表达习惯。","思维品质：通过「分析句」训练，培养「论据→观点」的逻辑推导能力。","学习能力：掌握议论短文四步法（立论/据典/分析/结论），能自评。"],"keyPoints":"① 四步：立论（首）→据典（引经典）→分析（关键）→结论。\n② 据典：引本单元（孔子/孟子/庄子/左传）。\n③ 分析句：说明典如何证观点，桥接。","difficulties":"① 分析句缺。原因：写完论据就停，需强制句式。\n② 观点显。原因：藏段中，需段首。\n③ 论据贴。原因：例与观点拧，需选贴切。","teachingMethods":"① 结构讲授法：四步图。\n② 升格示范法：残段vs完段。\n③ 据典支架法：经典库。\n④ 互评法。","preparation":"【PPT课件】P1 四步结构；P2 残段vs完段升格；P3 分析句式库；P4 经典库（单元四典）；P5 互评量表；P6 范例。\n【实物教具】便签。\n【音频】无。","process":[{"step":"Step 1 四步结构","time":"8分钟","content":"【PPT P1 四步】教师讲：①立论（段首亮观点）②据典（引本单元经典）③分析（典如何证观点，关键）④结论（回扣）。板书时机：黑板画四步。差异化提示：B班记四步；A班需说「哪步关键」。易错点提醒：立论句必须段首显——读者第一句知你要论什么。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 升格示范","time":"12分钟","content":"【PPT P2 升格】教师展示残段：「治国要推恩。孟子说老吾老以及人之老。可见推恩重要。」问缺啥？ 预设回答：「没说『推恩』怎么证治国！」 补分析：「『推恩』以爱亲及爱人，正是由私德扩为公治，恰证仁政可行。」 板书时机：黑板标「分析=桥接典与观点」。差异化提示：B班看差；A班需说写法。易错点提醒：分析句用「因为/可见/这说明」引出，解释典与观点的逻辑，不能省。"},{"step":"Step 3 据典库","time":"8分钟","content":"【PPT P4 典】教师：「本单元经典可据：孔子许曾皙（境界）、孟子推恩（仁政）、庄子顺理（道）、烛之武辞令（利害）。选贴切的。」 板书时机：黑板列典。差异化提示：B班记可用典；A班需为观点选最贴。易错点提醒：据典要「贴切」——论仁政用推恩，别硬塞不相关的。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 写初稿","time":"12分钟","content":"【PPT P3 句式】教师：「用四步写300字，观点可选『顺势而为』『推恩及人』等，引一典+分析句。」 学生写。板书时机：教师巡选。差异化提示：B班写200字+句式；A班写300字+引典。易错点提醒：分析句不能变第二论据——它是「解释连接」，非再举例。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 互评","time":"8分钟","content":"【PPT P5 量表】教师：「交换评：观点显否？典贴否？分析连否？」 预设回答：「他观点在段尾没亮」「她典好但没分析。」 板书时机：黑板收。差异化提示：B班用「有/无」；A班三维打分。易错点提醒：互评看「分析连否」——议论灵魂。"},{"step":"Step 6 作业","time":"2分钟","content":"【PPT P6 环节说明】教师：「据互评改终稿，下节课讲评。」 板书时机：板书「段→篇」。差异化提示：B班改分析；A班改深。易错点提醒：下节课讲评，提醒据量表自改。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 学写议论文 ──┐\n│ 四步:           │\n│ 立论(首显)      │\n│ 据典(引单元)    │\n│ 分析(关键!)     │\n│ 结论            │\n│                │\n│ 经典库:         │\n│ 孔许志/孟推恩   │\n│ 庄顺理/左辞令   │\n│                │\n│ 分析=桥接       │\n│ 典→观点         │\n│ 句式:因为/可见/ │\n│ 这说明          │\n└────────────────┘","exercises":"【基础作业】1. 据互评改议论终稿（300字），四步齐+据一典。2. 写一句「我的观点+用的典」。\n【提高作业】另写一段不同观点（如「顺势而为」），要求分析句能解释所引经典如何证观点。\n【参考答案——教师用】基础1评价：四步全+据典+分析连=合格；引典恰+分析深=良好。基础2评价：观点典对应=良好。提高作业评价：分析精准=优秀。","reflection":"✅ 亮点：残段升格让「分析句」价值明，B班也懂缺啥；经典库降低起步，单元内容直接用。\n⚠️ 需改进：部分A班生分析句写成第二论据；下次给「分析≠举例」红线。\n📌 下节课衔接：下节课讲评，精选典型公开点评，备单元研讨。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-cn-bx-u1-8","lessonId":"l-cn-bx-u1-8","title":"单元活动——中华传统文化经典研讨分享","book":"必修下册","unitNumber":1,"unitTitle":"中华传统文化经典","taskGroup":"思辨性阅读与表达","lessonType":"huodong","lessonTypeName":"单元活动","periodNumber":8,"duration":45,"grade":"高一","subject":"语文","tags":["传统文化","研讨","分享","人教版必修下U1","第八课时"],"textbookAnalysis":"本课为第一单元收官，举办中华传统文化经典研讨分享：宣读优秀议论短文、围绕「中华传统智慧对今天的意义」小型讨论；展示「经典名言卡」（论语/孟子/庄子/左传各摘）；填单元反思单，回顾「精读—群文—写作」路径，体会经典的现实生命力。","overview":"【学情分析】A班：短文质量高可宣读，讨论有见地；反思深。B班：部分羞于宣读宜代表；名言卡零散；反思宜具体。共同问题：单元「学了什么」缺整体认知。","objectives":["语言能力：宣读议论短文或发言，做到观点显、有据、有条理。","文化意识：在分享中形成中华传统经典「古为今用」的自觉。","思维品质：填单元反思单，梳理阅读—写作路径，培养元认知。","学习能力：整合五篇经典为单元成果。"],"keyPoints":"① 宣读：优秀议论短文（立论/据典/分析）。\n② 讨论：传统智慧今用。\n③ 反思单：路径——精读→群文→写作。","difficulties":"① 宣读条理。原因：易念稿无重点，需框架。\n② 参与面。原因：时间限，需分组。\n③ 元认知。原因：Reflection空话，需具体。","teachingMethods":"① 宣读工作坊。\n② 讨论法。\n③ 名言卡墙法。\n④ 反思单法。","preparation":"【PPT课件】P1 流程；P2 宣读框架；P3 讨论题（传统今用）；P4 名言卡墙；P5 反思单。\n【实物教具】学生议论短文+名言卡；A3墙；便签。\n【音频】无。","process":[{"step":"Step 1 名言卡墙","time":"5分钟","content":"【PPT P4 布置】教师：「把四经典名言卡贴墙：论语(吾与点)、孟子(推恩)、庄子(依天理)、左传(辞令)。标出处。」 学生贴。板书时机：黑板写「四典名言墙」。差异化提示：B班贴本组；A班布展+导览。易错点提醒：名言要标篇名——学术诚信，引述有出处。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 宣读（上）","time":"15分钟","content":"【PPT P1 流程】【PPT P2 框架】教师：「选3篇短文宣读，框架：观点(立)/典据(引)/分析(连)。」 学生宣读。板书时机：旁记亮点。差异化提示：B班小组代表；A班独宣+PPT。易错点提醒：宣读亮「分析句」最出彩——别只复述书。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 讨论","time":"10分钟","content":"【PPT P3 讨论】教师：「传统智慧今天还有用吗？如推恩（及人）、顺理（游刃）、辞令（沟通）。」 预设回答：「推恩教我们爱人，顺理教我们找规律，都活在现代！」 板书时机：黑板收。差异化提示：B班说1例；A班需联自身。易错点提醒：读经典为照今——古智今用才是活的传统。"},{"step":"Step 4 反思单","time":"10分钟","content":"【PPT P5 模板】教师：「填反思单三行：①学会（读经典/写议论）②提升 ③疑问。」 预设回答：「①学会抓言志与细节写人；②提升据典论证；③怎么读更顺。」 板书时机：巡选。差异化提示：B班填前两行；A班全填+疑问。易错点提醒：反思写具体「一个方法」非「学到很多」。"},{"step":"Step 5 总结","time":"5分钟","content":"【PPT P5 环节说明】教师总结：「这单元从《侍坐》到写议论——古人说理写人，今天仍是我们表达的根。经典不老，在会用。」 板书时机：黑板写「读→用：经典活」。差异化提示：B班听；A班写一句下单元期待。易错点提醒：单元结束是起点——据典立论的能力，写什么都用得上。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 经典研讨分享 ──┐\n│ 名言墙:四典      │\n│ 论语/孟子/庄子/左│\n│                │\n│ 【宣读框架】     │\n│ 立论/据典/分析   │\n│                │\n│ 【讨论】         │\n│ 传统今用:        │\n│ 推恩·顺理·辞令  │\n│                │\n│ 【反思三问】     │\n│ ①学会__②提升__ │\n│ ③疑问__         │\n│                │\n│ 读→用:经典活    │\n└────────────────┘","exercises":"【基础作业】1. 提交单元反思单（三行完整）+名言卡归档。2. 将最满意短文誊清。\n【提高作业】写150字「单元总结」，要求：①点明最重要方法；②举一篇/一段说明；③说一个想提升的方面。\n【参考答案——教师用】反思单评价：三行具体=合格；有方法意识=良好；疑问有思=优秀。总结评价：点法+举例=合格；有个性化=良好。","reflection":"✅ 亮点：名言卡墙让四典「可视化」，B班也懂勾连；宣读框架（立/典/析）让发言有锋芒，分析句成亮点。\n⚠️ 需改进：15分钟只轮部分人；下次分两批或限2分钟。\n📌 下单元衔接：第二单元「戏剧」，从说理写人转到文学形象，方法大不同需提示。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:00:00Z"},{"id":"l-cn-bx-u2-1","lessonId":"l-cn-bx-u2-1","title":"窦娥冤（节选）精读——悲剧冲突与「血溅白练」之誓","book":"必修下册","unitNumber":2,"unitTitle":"文学阅读与写作（戏剧）","taskGroup":"文学阅读与写作","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":1,"duration":45,"grade":"高一","subject":"语文","tags":["戏剧","关汉卿","窦娥冤","悲剧","人教版必修下U2","第一课时"],"textbookAnalysis":"《窦娥冤》是关汉卿元杂剧代表作（全名《感天动地窦娥冤》）。节选写窦娥被诬杀夫、屈打成招、临刑发三誓（血溅白练、六月飞雪、亢旱三年）以证清白。悲剧根源在黑暗吏治与封建压迫；三誓是浪漫主义反抗，彰显冤屈感天。是认识中国古典悲剧的范本。","overview":"【学情分析】A班：能跟悲剧冲突与三誓象征，可深入「浪漫主义反抗」；赏元杂剧。B班：情节懂但「三誓」象征读不出；杂剧体制（科/白/唱）陌生。共同问题：当公案故事读，抓不住悲剧根源（社会）；三誓当奇谈。","objectives":["语言能力：复述节选情节，解释「三誓」内容，说出窦娥悲剧的根源。","文化意识：理解《窦娥冤》对黑暗吏治的控诉与底层女性的反抗精神。","思维品质：通过分析冲突（窦娥vs吏治/命运），培养悲剧审美与因果思维。","学习能力：掌握「抓冲突→析三誓→明悲剧根源」的戏剧读法。"],"keyPoints":"① 冲突：窦娥(善)vs昏吏(恶)/命运(冤)。\n② 三誓：血溅白练/六月飞雪/亢旱三年（证清白·感天）。\n③ 根源：吏治黑暗+封建压迫（社会悲剧）。","difficulties":"① 三誓象征。原因：学生当奇谈，需解为「冤屈感天」。\n② 悲剧根源。原因：易归个人，需指社会。\n③ 杂剧体制。原因：科白唱陌生，需简介。","teachingMethods":"① 冲突图法：窦娥vs多方。\n② 象征解码法：三誓。\n③ 社会分析法：根源。\n④ 诵读法（发誓段）。","preparation":"【PPT课件】P1 关汉卿与元杂剧(科/白/唱)；P2 节选情节；P3 冲突图；P4 三誓解码；P5 悲剧根源；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——奇冤","time":"5分钟","content":"【PPT P1 杂剧】教师：「元杂剧有科(动作)白(对话)唱(曲词)。《窦娥冤》写弱女窦娥被诬杀夫，屈招赴死。奇在临刑三誓皆应。」 预设回答：「太冤了！老天都帮她！」 板书时机：黑板写「窦娥冤：弱女奇冤」。差异化提示：B班说情节；A班需联杂剧体。易错点提醒：杂剧体制先懂——唱词是人物心声，科白是动作对话，读剧看「曲白科」三线。"},{"step":"Step 2 冲突","time":"12分钟","content":"【PPT P3 冲突】教师：「冲突多重：窦娥vs昏庸官吏(桃杌)、vs诬陷者(张驴儿)、vs无常命运。善者被碾，悲剧张力在此。」 板书时机：黑板画冲突图。差异化提示：B班说1-2冲突；A班需全析。易错点提醒：悲剧不在「惨」而在「不该惨的被毁」——窦娥之善反衬世道之恶。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 三誓","time":"13分钟","content":"【PPT P4 三誓】教师：「临刑发三誓：血溅白练(显冤)、六月飞雪(证洁)、亢旱三年(惩官)。三誓皆验——浪漫主义笔法，让冤屈感天动地。」 板书时机：黑板列三誓+意。差异化提示：B班说三誓；A班需解象征。易错点提醒：三誓非迷信而是「艺术反抗」——以超自然应验直指公道在天，控诉人世无道。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 根源","time":"10分钟","content":"【PPT P5 根源】教师：「悲剧根源在社会：官吏贪暴（桃杌「人是贱虫」）、法制虚设、女性无地位。非窦娥命不好，是时代吃人。」 板书时机：黑板写「根源：吏治黑暗+封建压迫」。差异化提示：B班听；A班需说社会。易错点提醒：读悲剧要问「谁之过」——归个人是误读，归社会才见批判力度。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 诵读","time":"3分钟","content":"【PPT 发誓段】教师：「读『若没些儿圣灵与世人传，也不见得湛湛青天』——感受窦娥的愤与洁。」 板书时机：黑板标诵读点。差异化提示：B班跟读；A班需说语气。易错点提醒：唱词是窦娥魂魄之声——读时想「一个将死之人如何自证」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"2分钟","content":"【PPT P6 练习】教师：「《窦娥冤》读法？」 预设回答：「抓冲突→析三誓→明根源！」 板书时机：板书读法。差异化提示：B班背三誓；A班写80字「我眼中的窦娥」。易错点提醒：下节课读《雷雨》，看现代话剧如何写冲突。"}],"blackboard":"┌── 窦娥冤·关 ──┐\n│ 弱女奇冤        │\n│                │\n│ 冲突:           │\n│ 窦娥vs吏(桃杌)  │\n│ vs诬(张驴儿)    │\n│ vs命(无常)      │\n│                │\n│ 三誓(证清白):   │\n│ 血溅白练        │\n│ 六月飞雪        │\n│ 亢旱三年        │\n│ (浪漫反抗·感天) │\n│                │\n│ 根源:           │\n│ 吏治黑暗+封建压 │\n└────────────────┘","exercises":"【基础作业】1. 写出窦娥临刑「三誓」内容。2. 说窦娥悲剧的一条根源。\n【提高作业】写150字「我眼中的窦娥」，要求：①用一情节/誓支撑；②说其反抗精神；③不脸谱化。\n【参考答案——教师用】基础1：血溅白练、六月飞雪、亢旱三年。基础2：官吏贪暴法制虚设/女性无地位。提高作业评价：情节+反抗+不脸谱=良好；有批判=优秀。","reflection":"✅ 亮点：冲突图让悲剧张力可见，B班也懂；三誓解码（浪漫反抗·感天）把「奇谈」升为艺术控诉。\n⚠️ 需改进：杂剧体制B班仍生（科白唱），部分读串；下次给「读剧三线」小注。\n📌 下节课衔接：下节课《雷雨》，现代话剧的冲突写法。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:30:00Z"},{"id":"l-cn-bx-u2-2","lessonId":"l-cn-bx-u2-2","title":"雷雨（节选）精读——周鲁冲突与人性的暗涌","book":"必修下册","unitNumber":2,"unitTitle":"文学阅读与写作（戏剧）","taskGroup":"文学阅读与写作","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":2,"duration":45,"grade":"高一","subject":"语文","tags":["戏剧","曹禺","雷雨","冲突","人教版必修下U2","第二课时"],"textbookAnalysis":"《雷雨》是曹禺1934年话剧。节选聚焦周公馆客厅：三十年后鲁侍萍重遇周朴园，周萍与鲁四凤（实为兄妹）的情感暗线，最终悲剧爆发。曹禺以密闭空间、紧张对话写人性扭曲与命运轮回，是中国现代话剧里程碑。","overview":"【学情分析】A班：能跟周朴园复杂性格（怀旧又冷酷）与命运轮回，可深入「暗涌」；赏话剧结构。B班：人物关系乱（谁是谁），冲突读浅；节选脱离全剧难懂。共同问题：人物关系不清；把周朴园当单纯坏人；冲突只看到吵。","objectives":["语言能力：理清节选人物关系（周朴园/侍萍/周萍/四凤），解释关键台词，说出核心冲突。","文化意识：理解《雷雨》对封建家族压迫与人性异化的深刻揭示。","思维品质：通过分析人物关系与潜台词，培养戏剧细读与因果思维。","学习能力：掌握「理关系→抓潜台词→明冲突」的话剧读法。"],"keyPoints":"① 关系：周朴园(主)曾弃侍萍；侍萍(鲁妈)是其旧爱；周萍/四凤为其子女（兄妹）。\n② 冲突：阶级(主仆)+伦理(乱伦暗线)+人性(冷酷vs温情)。\n③ 潜台词：对话下的暗涌。","difficulties":"① 人物关系。原因：三十年跨度+改名，易乱，需关系图。\n② 周朴园复杂。原因：易脸谱，需辨怀旧与冷酷。\n③ 潜台词。原因：对话藏意，需细品。","teachingMethods":"① 关系图法。\n② 性格辩证法：周朴园。\n③ 潜台词品读法。\n④ 对比法（与窦娥）。","preparation":"【PPT课件】P1 曹禺与雷雨；P2 人物关系图；P3 周朴园性格（怀旧/冷酷）；P4 潜台词例；P5 冲突三层；P6 练习。\n【实物教具】无。\n【音频】话剧片段。","process":[{"step":"Step 1 导入——重逢","time":"5分钟","content":"【PPT P1 曹禺】教师：「《雷雨》写周公馆一天内旧事爆发。节选：三十年后侍萍（鲁妈）重回周府，与周朴园重逢——当年被弃的旧爱。」 预设回答：「旧情人变主仆重逢，虐！」 板书时机：黑板写「雷雨：一天·旧事爆」。差异化提示：B班说事件；A班需联全剧。易错点提醒：节选是「冰山一角」——懂全剧背景才懂对话的沉重，关系先理清。"},{"step":"Step 2 关系图","time":"13分钟","content":"【PPT P2 关系】教师：「周朴园(矿主)曾与侍萍生二子，弃之；侍萍嫁鲁贵，生四凤。周萍(周长子)与四凤(鲁贵女)相恋——实则兄妹！关系如网。」 板书时机：黑板画关系图。差异化提示：B班说主关系；A班需全连。易错点提醒：关系图是读《雷雨》钥匙——所有冲突都长在「谁是谁」上，乱则全乱。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 周朴园","time":"12分钟","content":"【PPT P3 性格】教师：「周朴园复杂：留旧家具、记侍萍生日（怀旧温情），却为保地位弃她、逼工（冷酷）。非单纯坏，是阶级裹挟的扭曲人。」 板书时机：黑板写「周：怀旧↔冷酷」。差异化提示：B班说冷酷；A班需辨两面。易错点提醒：脸谱化是误读——曹禺写人贵在「矛盾」，周朴园的可怕在「温情下的残忍」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 潜台词","time":"10分钟","content":"【PPT P4 潜】教师：「『你还活着？』『谁指使你来的？』——表面问，底下是恐惧与防备。对话藏着没说出的暗涌，这是话剧魅力。」 板书时机：黑板列潜台词例。差异化提示：B班说字面；A班需说底下意。易错点提醒：读话剧抓「言外之意」——人物常不说破，靠潜台词显心理，细品才懂。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 冲突三层","time":"3分钟","content":"【PPT P5 冲突】教师：「冲突三层：阶级(主仆)、伦理(乱伦暗线)、人性(温情vs冷酷)。密室般压迫感由此来。」 板书时机：黑板写三层。差异化提示：B班听；A班需说一层。易错点提醒：与《窦娥》比——窦娥冲突在外(吏治)，雷雨冲突在内(人性伦理)，一外一内。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"2分钟","content":"【PPT P6 练习】教师：「《雷雨》读法？」 预设回答：「理关系→抓潜台词→明冲突！」 板书时机：板书读法。差异化提示：B班背关系；A班写80字「我眼中的周朴园」。易错点提醒：下节课群文比窦娥与雷雨的悲剧。"}],"blackboard":"┌── 雷雨·曹禺 ──┐\n│ 一天·旧事爆     │\n│                │\n│ 关系网:         │\n│ 周(主)弃侍萍   │\n│ 侍萍→四凤(女)  │\n│ 周萍×四凤(兄妹)│\n│                │\n│ 周朴园:         │\n│ 怀旧↔冷酷      │\n│                │\n│ 潜台词:言外暗涌│\n│ 冲突:阶级/伦理/│\n│ 人性           │\n└────────────────┘","exercises":"【基础作业】1. 画出节选人物关系（周朴园/侍萍/周萍/四凤）。2. 说周朴园性格的一个矛盾点。\n【提高作业】写150字「我眼中的周朴园」，要求：①用一台词支撑；②辨怀旧与冷酷；③不脸谱。\n【参考答案——教师用】基础1评价：关系图对=合格。基础2：留旧物怀旧却弃人冷酷。提高作业评价：台词+辩证+不脸谱=良好；有深度=优秀。","reflection":"✅ 亮点：关系图破解「谁是谁」难题，B班也理清；周朴园「怀旧↔冷酷」辩证避免脸谱；潜台词品读有趣。\n⚠️ 需改进：节选脱离全剧B班仍雾，部分不知四凤身世；下次给全剧梗概卡。\n📌 下节课衔接：下节课群文比窦娥与雷雨的悲剧写法。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:30:00Z"},{"id":"l-cn-bx-u2-3","lessonId":"l-cn-bx-u2-3","title":"群文阅读——窦娥冤·雷雨 悲剧比较","book":"必修下册","unitNumber":2,"unitTitle":"文学阅读与写作（戏剧）","taskGroup":"文学阅读与写作","lessonType":"qunwen","lessonTypeName":"群文阅读","periodNumber":3,"duration":45,"grade":"高一","subject":"语文","tags":["戏剧","群文","悲剧","窦娥冤","雷雨","人教版必修下U2","第三课时"],"textbookAnalysis":"群文比较《窦娥冤》与《雷雨》——同是悲剧，但路径不同：窦娥是「外在压迫型」社会悲剧（善被恶碾，浪漫反抗感天）；雷雨是「内在纠缠型」命运/人性悲剧（关系网自毁，写实暗涌）。比较提炼中西/古今悲剧范式，深化悲剧审美。","overview":"【学情分析】A班：能比两悲剧范式，可深入「外压vs内缠」；赏差异。B班：单篇懂但比较框架缺；易混。共同问题：比较易罗列缺归纳——发现「都惨」后不会提炼范式。","objectives":["语言能力：用双栏比较两剧（冲突性质/反抗方式/结局意味/美学风格），说出悲剧范式差异。","文化意识：体会中国古典悲剧（浪漫感天）与现代话剧（写实暗涌）的不同美学。","思维品质：通过比较培养同中求异、提炼范式思维。","学习能力：掌握戏剧群文双栏比较法。"],"keyPoints":"① 窦娥：外压型社会悲剧（善vs恶），浪漫反抗（三誓感天）。\n② 雷雨：内缠型命运/人性悲剧（关系自毁），写实暗涌。\n③ 共性：皆以毁灭显不公/异化。","difficulties":"① 范式区分。原因：学生混外内，需点冲突性质。\n② 双栏填。原因：维度不清，需框架。\n③ 共性提炼。原因：易停异，需归纳。","teachingMethods":"① 双栏比较法。\n② 范式命名法：外压/内缠。\n③ 归纳法。\n④ 迁移法。","preparation":"【PPT课件】P1 两剧封面；P2 双栏（冲突/反抗/结局/风格）；P3 范式（外压/内缠）；P4 共性（毁灭显不公）；P5 迁移；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——同与异","time":"5分钟","content":"【PPT P1】教师：「两剧都惨、都经典，但窦娥冤死感天，雷雨一天自毁——悲剧怎么个不同？」 预设回答：「一个外力害的，一个自己人缠的！」 板书时机：黑板写「同：悲剧；异：路径」。差异化提示：B班说同异；A班需预判。易错点提醒：别只说「都悲惨」——要比「悲剧从哪来」。"},{"step":"Step 2 双栏","time":"13分钟","content":"【PPT P2 表】教师：「填双栏：冲突（外压恶吏/内缠关系）、反抗（三誓感天/无·暗涌）、结局（冤雪·浪漫/毁灭·写实）、风格（浪漫/写实）。」 学生填。板书时机：黑板画双栏。差异化提示：B班填冲突+结局；A班全填。易错点提醒：同维度比——都在「冲突/反抗/结局/风格」下，不能乱比。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 范式","time":"10分钟","content":"【PPT P3 范式】教师：「窦娥=外压型社会悲剧（善被结构碾，以浪漫反抗呐喊）；雷雨=内缠型命运悲剧（关系网自毁，写实显人性暗涌）。一外一内。」 板书时机：黑板写「外压↔内缠」。差异化提示：B班记两词；A班需说「谁主」。易错点提醒：范式区别在「悲剧根源位置」——在外结构or内关系，读剧先判。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 共性","time":"8分钟","content":"【PPT P4 共性】教师：「异之后共性？」 预设回答：「都以美好毁灭，显世道不公或人性异化——悲剧让人看见『不该如此』。」 板书时机：黑板写「共性：毁灭显不公/异化」。差异化提示：B班说1点；A班需整合。易错点提醒：归纳是群文目的——异是手段，共性是收获。"},{"step":"Step 5 迁移","time":"5分钟","content":"【PPT P5 迁移】教师：「下节《哈姆莱特》也是悲剧——可放这框架比（外压or内缠？）。」 板书时机：板书「可迁移」。差异化提示：B班听；A班需说下比啥。易错点提醒：下节课读哈姆莱特，西方悲剧的「延宕」另有一格。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 作业","time":"4分钟","content":"【PPT P6 练习】教师：「据双栏写一段比较，下节课用。」 板书时机：板书群文读法。差异化提示：B班背双栏；A班写比较段。易错点提醒：写作用原句支撑，不贴标签。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 窦娥·雷雨 群文 ──┐\n│ 同:悲剧          │\n│ 异:路径不同      │\n│                │\n│ 【双栏】         │\n│ 冲突:外压↔内缠  │\n│ 反抗:三誓↔暗涌  │\n│ 结局:冤雪↔毁灭  │\n│ 风格:浪漫↔写实  │\n│                │\n│ 范式:           │\n│ 外压(社会悲剧)   │\n│ 内缠(命运悲剧)   │\n│                │\n│ 共性:毁灭显不公 │\n└────────────────┘","exercises":"【基础作业】1. 完成双栏（冲突/反抗/结局/风格）。2. 用一句话说两剧范式差异。\n【提高作业】写180字比较短文，要求：①同维度；②各引一句；③提炼范式差异。\n【参考答案——教师用】基础1评价：双栏全+维度对=合格。提高作业评价：同维度+引句+范式明=良好；能析功能=优秀。","reflection":"✅ 亮点：双栏让比较有抓手，B班也填；范式命名（外压/内缠）抓内核；共性「毁灭显不公」有高度。\n⚠️ 需改进：B班生常混两范式，需更多对比例；下次加判定口诀。\n📌 下节课衔接：下节课《哈姆莱特》，西方悲剧的延宕。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:30:00Z"},{"id":"l-cn-bx-u2-4","lessonId":"l-cn-bx-u2-4","title":"哈姆莱特（节选）精读——人文主义与「延宕」之谜","book":"必修下册","unitNumber":2,"unitTitle":"文学阅读与写作（戏剧）","taskGroup":"文学阅读与写作","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":4,"duration":45,"grade":"高一","subject":"语文","tags":["戏剧","莎士比亚","哈姆莱特","人文主义","人教版必修下U2","第四课时"],"textbookAnalysis":"《哈姆莱特》是莎士比亚悲剧。节选（第三幕）写王子得知叔父杀父篡位，装疯试探，著名「生存还是毁灭」独白。哈姆莱特性格核心在「延宕」——思想大于行动，反映文艺复兴人文主义者面对丑恶时的清醒与无力。是认识西方悲剧的范本。","overview":"【学情分析】A班：能跟「生存还是毁灭」的哲学与延宕，可深入人文主义困境；赏独白。B班：情节懂但独白读不懂；延宕当「犹豫/胆小」。共同问题：把延宕当性格弱点，不懂其思想深度；人文主义背景缺。","objectives":["语言能力：复述节选情节，朗读并解释「生存还是毁灭」独白要义，说出哈姆莱特「延宕」的表现。","文化意识：理解哈姆莱特作为文艺复兴人文主义者的觉醒与困境。","思维品质：通过分析「延宕」，培养对行动与思想关系的辩证思维。","学习能力：掌握「抓独白→析延宕→明人文困境」的悲剧读法。"],"keyPoints":"① 独白：生存还是毁灭（行动vs忍耐的哲思）。\n② 延宕：思想大于行动，迟疑不决。\n③ 困境：人文主义者见丑恶却无力直击（清醒的痛）。","difficulties":"① 独白深。原因：哲思重，需拆解。\n② 延宕。原因：易当胆小，需解为思想重负。\n③ 人文背景。原因：缺文艺复兴，需补。","teachingMethods":"① 独白品读法。\n② 延宕解码法。\n③ 背景支架法：文艺复兴。\n④ 对比法（与窦娥/雷雨）。","preparation":"【PPT课件】P1 莎翁与文艺复兴；P2 情节（装疯/试探）；P3 生存还是毁灭解码；P4 延宕（思想>行动）；P5 人文困境；P6 练习。\n【实物教具】无。\n【音频】独白朗诵。","process":[{"step":"Step 1 导入——复仇与装疯","time":"5分钟","content":"【PPT P1 莎翁】教师：「哈姆莱特，丹麦王子，父王被叔父所杀、母改嫁凶手。他装疯试探，寻机复仇。节选是他最著名的独白。」 预设回答：「王子复仇记！但他在犹豫！」 板书时机：黑板写「哈姆莱特：装疯·复仇」。差异化提示：B班说情节；A班需联文艺复兴。易错点提醒：文艺复兴背景——人文主义抬举「人」与「思想」，哈姆莱特正是「思想者」典型。"},{"step":"Step 2 独白解码","time":"13分钟","content":"【PPT P3 独白】教师：「『生存还是毁灭』——是忍受命运的箭石，还是拔剑反抗？哈姆莱特在想：行动未必好，沉默也痛。这是对『活法』的哲思。」 板书时机：黑板写「生存vs毁灭：忍vs抗」。差异化提示：B班说大意；A班需解哲思。易错点提醒：独白是人物「内心声」——话剧用它显思想，读时把自己当他在想。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 延宕","time":"12分钟","content":"【PPT P4 延宕】教师：「哈姆莱特为何不立刻杀叔？因为他想得太多——要确证、要正义、要意义。思想重负拖住行动，这叫延宕。」 板书时机：黑板写「延宕=思想>行动」。差异化提示：B班说犹豫；A班需解深。易错点提醒：延宕非胆小——是「清醒者的重负」：看太清反而难下手，这是人文主义者的悲剧。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 人文困境","time":"10分钟","content":"【PPT P5 困境】教师：「他代表人文主义理想（理性/尊严），却面对篡弑丑恶。理想照进现实显出无力——延宕正是这困境的投影。」 板书时机：黑板写「人文困境：理想vs丑恶」。差异化提示：B班听；A班需说关联。易错点提醒：与窦娥（外力）雷雨（内缠）比——哈姆莱特的悲剧在「思想与行动的断裂」，又一格。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 对比","time":"3分钟","content":"【PPT P5 环节说明】教师：「三剧悲剧各异：窦娥外压、雷雨内缠、哈姆莱特思想断裂。悲剧多姿。」 板书时机：黑板写「三格悲剧」。差异化提示：B班听；A班需说三异。易错点提醒：读悲剧拓审美——不同文化给「毁灭」不同解释。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"2分钟","content":"【PPT P6 练习】教师：「《哈姆莱特》读法？」 预设回答：「抓独白→析延宕→明困境！」 板书时机：板书读法。差异化提示：B班背独白意；A班写80字「我眼中的延宕」。易错点提醒：下节课学戏剧知识：冲突与潜台词。"}],"blackboard":"┌── 哈姆莱特·莎 ──┐\n│ 装疯·复仇       │\n│                │\n│ 独白:           │\n│ 生存vs毁灭      │\n│ (忍↔抗)        │\n│                │\n│ 延宕:           │\n│ 思想>行动       │\n│ (清醒者重负)    │\n│                │\n│ 人文困境:       │\n│ 理想vs丑恶      │\n│                │\n│ 三格悲剧:       │\n│ 外压/内缠/断裂  │\n└────────────────┘","exercises":"【基础作业】1. 用自己的话说「生存还是毁灭」在想什么。2. 解释「延宕」并说哈姆莱特一例。\n【提高作业】写150字「我眼中的延宕」，要求：①说非胆小；②联人文困境；③联自身一次犹豫。\n【参考答案——教师用】基础1：在想该默默忍受命运之苦，还是奋起反抗（拔剑）。基础2：延宕=思想重负致行动迟疑，如装疯试探久不下手。提高作业评价：非胆小+困境+联己=良好；有深度=优秀。","reflection":"✅ 亮点：独白拆解让哲思可触，B班也懂「忍vs抗」；延宕解为「清醒者重负」避免当胆小，拓悲剧审美。\n⚠️ 需改进：人文主义背景B班仍薄，部分不懂为何思想重；下次加1分钟文艺复兴。\n📌 下节课衔接：下节课戏剧知识：冲突与潜台词。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:30:00Z"},{"id":"l-cn-bx-u2-5","lessonId":"l-cn-bx-u2-5","title":"戏剧知识——冲突、潜台词与戏剧性","book":"必修下册","unitNumber":2,"unitTitle":"文学阅读与写作（戏剧）","taskGroup":"文学阅读与写作","lessonType":"fangfa","lessonTypeName":"方法指导","periodNumber":5,"duration":45,"grade":"高一","subject":"语文","tags":["戏剧","冲突","潜台词","戏剧性","人教版必修下U2","第五课时"],"textbookAnalysis":"本课提炼戏剧阅读方法：①冲突是戏剧灵魂（人与自我/他人/社会/命运）；②潜台词（言外之意）显心理；③戏剧性（巧合、悬念、突转）抓观众。以三剧为例归纳，为写作与展演打基础。","overview":"【学情分析】A班：能概念化三要素，可深入「突转」；迁移强。B班：冲突懂但潜台词/戏剧性概念糊；需例句。共同问题：读剧只追情节，不懂「为什么这样写」；术语不会用。","objectives":["语言能力：说出戏剧三要素（冲突/潜台词/戏剧性），各举本单元例。","文化意识：体会戏剧「以冲突显主题、以潜台词显心理」的艺术智慧。","思维品质：通过归纳三要素，培养戏剧形式思维。","学习能力：掌握戏剧阅读三要素法，能迁移赏剧。"],"keyPoints":"① 冲突：自我/他人/社会/命运四类。\n② 潜台词：言外之意（如雷雨「你还活着？」）。\n③ 戏剧性：巧合/悬念/突转（如窦娥冤死、雷雨一天爆）。","difficulties":"① 冲突分类。原因：学生只知「吵」，需四类框架。\n② 潜台词。原因：易读字面，需示范。\n③ 戏剧性。原因：概念虚，需例。","teachingMethods":"① 要素讲授法。\n② 例解法（三剧）。\n③ 归纳法。\n④ 迁移法。","preparation":"【PPT课件】P1 三要素；P2 冲突四类（附例）；P3 潜台词（雷雨/哈姆例）；P4 戏剧性（巧合/悬念/突转）；P5 迁移；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 三要素","time":"5分钟","content":"【PPT P1】教师：「读戏剧抓三样：冲突（灵魂）、潜台词（心理）、戏剧性（吸引力）。三剧都用足了。」 板书时机：黑板写「冲突/潜词/戏剧性」。差异化提示：B班听；A班需说关系。易错点提醒：三要素是「读剧眼镜」——戴上才看见作者匠心，不只追情节。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 冲突四类","time":"12分钟","content":"【PPT P2 类】教师：「冲突四类：与自我（哈姆莱特延宕）、与他人（窦娥vs张驴儿）、与社会（窦娥vs吏）、与命运（雷雨轮回）。」 板书时机：黑板列四类+例。差异化提示：B班记四类；A班需各补例。易错点提醒：分类为定位——先判冲突「对谁」，才懂戏在争什么。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 潜台词","time":"12分钟","content":"【PPT P3 潜】教师：「雷雨『谁指使你来的？』底下是恐惧；哈姆莱特独白是自语非对话。人物常不直说，靠潜台词显心。」 板书时机：黑板列潜例。差异化提示：B班说字面；A班需说底下意。易错点提醒：读剧抓「没说出的」——潜台词比台词更真，细品。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 戏剧性","time":"10分钟","content":"【PPT P4 戏剧性】教师：「巧合（窦娥冤遇恶医）、悬念（哈姆莱特装疯成败）、突转（雷雨一天爆发）。这些让戏抓人。」 板书时机：黑板写「巧合/悬念/突转」。差异化提示：B班说1种；A班需三各例。易错点提醒：戏剧性非噱头——巧合突转都服务主题，读时想「它为何这样安排」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 迁移","time":"4分钟","content":"【PPT P5 迁移】教师：「赏任何戏都可用这三要素——电影电视剧也一样。」 板书时机：板书「可迁移」。差异化提示：B班听；A班需说一例。易错点提醒：下节课写作，把冲突与潜台词写进剧本/评论。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 作业","time":"2分钟","content":"【PPT P6 练习】教师：「据三要素写一段赏剧短文，下节课用。」 板书时机：板书读法。差异化提示：B班背要素；A班写短文。易错点提醒：写作用术语+例句，不空谈。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 戏剧三要素 ──┐\n│ 冲突/潜词/戏剧性│\n│                │\n│ 冲突四类:       │\n│ 自我(哈姆)      │\n│ 他人(窦娥/张)   │\n│ 社会(窦娥/吏)   │\n│ 命运(雷雨轮回)  │\n│                │\n│ 潜台词:言外暗涌│\n│                │\n│ 戏剧性:         │\n│ 巧合/悬念/突转 │\n└────────────────┘","exercises":"【基础作业】1. 写出戏剧三要素。2. 各举本单元一例（冲突/潜台词/戏剧性）。\n【提高作业】写150字赏剧短文，要求：①用一要素；②引本单元例；③说作者匠心。\n【参考答案——教师用】基础1：冲突、潜台词、戏剧性。基础2评价：三例对=合格。提高作业评价：要素+例+匠心=良好；分析深=优秀。","reflection":"✅ 亮点：三要素框架让读剧有术语，B班也懂分类；潜台词/戏剧性用三剧例落地，不空。\n⚠️ 需改进：戏剧性B班易当「热闹」，需点「服务主题」；下次给红线。\n📌 下节课衔接：下节课写作，学写剧本片段/戏剧评论。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:30:00Z"},{"id":"l-cn-bx-u2-6","lessonId":"l-cn-bx-u2-6","title":"写作指导——学写剧本片段与戏剧评论","book":"必修下册","unitNumber":2,"unitTitle":"文学阅读与写作（戏剧）","taskGroup":"文学阅读与写作","lessonType":"xiezuo","lessonTypeName":"写作指导","periodNumber":6,"duration":45,"grade":"高一","subject":"语文","tags":["戏剧","写作","剧本","戏剧评论","人教版必修下U2","第六课时"],"textbookAnalysis":"本课为第二单元写作任务，二选一：①写剧本片段（300字，有冲突/潜台词/舞台提示）；②写戏剧评论（赏一剧冲突或人物）。重点是「用戏剧笔法」——剧本重对话显冲突与潜台词，评论重三要素分析。学生常把剧本写成了小说叙述。","overview":"【学情分析】A班：能写有冲突剧本或像样评论，但潜台词弱；可深入。B班：剧本写成小说（全叙述无对话）；评论写成「好看/不好看」。共同问题：不懂剧本格式（舞台提示/对话）；评论无术语无分析。","objectives":["语言能力：写剧本片段或戏剧评论（300字），剧本用对话+舞台提示显冲突/潜词，评论用三要素分析。","文化意识：在写作中体会戏剧「以对话塑人、以冲突显题」的表达特性。","思维品质：通过格式约束，培养「用形式服务内容」的文体思维。","学习能力：掌握剧本/评论二选一的写法，能自评。"],"keyPoints":"① 剧本：对话为主+舞台提示，显冲突/潜词。\n② 评论：用三要素（冲突/潜词/戏剧性）分析。\n③ 避坑：剧本≠小说（少叙述多对话）。","difficulties":"① 剧本格式。原因：学生写小说体，需给格式模板。\n② 潜词入对话。原因：对话太直，需藏意。\n③ 评论术语。原因：易空评，需三要素。","teachingMethods":"① 格式模板法：剧本格式。\n② 升格示范法：小说体vs剧本体。\n③ 评论支架法：三要素。\n④ 互评法。","preparation":"【PPT课件】P1 二选一；P2 剧本格式（舞台提示/对话）；P3 升格（小说→剧本）；P4 评论支架（三要素）；P5 互评量表；P6 范例。\n【实物教具】便签。\n【音频】无。","process":[{"step":"Step 1 二选一","time":"5分钟","content":"【PPT P1】教师：「今天二选一：①写剧本片段（有冲突潜词）②写戏剧评论（赏一剧）。剧本重『写给人演』，评论重『析给人看』。」 板书时机：黑板写「剧本↔评论」。差异化提示：B班听；A班需选。易错点提醒：先定体——剧本是「可演的文本」（对话+提示），评论是「分析文」，别混。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 剧本格式","time":"12分钟","content":"【PPT P2 格式】教师：「剧本格式：人物名+冒号+对话；括号写舞台提示（动作/神态/环境）。如『周萍（迟疑）：你……不该来。』冲突与潜词都在对话里。」 板书时机：黑板列格式。差异化提示：B班记格式；A班需写一句。易错点提醒：剧本少叙述多对话——把「他想」变成「他说/他做」，用对话显心。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 升格","time":"12分钟","content":"【PPT P3 升格】教师展示小说体：「小明很生气，他觉得背叛了。对小红说别理我。」问：「剧本该怎么改？」 预设回答：「写对话+提示：小明（摔门）：别理我！（背身）」 教师改。板书时机：黑板标「小说→剧本」。差异化提示：B班看差；A班需说改法。易错点提醒：升格关键「叙述转对话」——剧本靠人物自己说话，作者退场。"},{"step":"Step 4 评论支架","time":"8分钟","content":"【PPT P4 评论】教师：「写评论用三要素：如评雷雨『冲突在周朴园怀旧与冷酷的撕扯，潜台词藏恐惧』。术语+例。」 板书时机：黑板列支架。差异化提示：B班选剧本；A班写评论+术语。易错点提醒：评论忌「好看/惨」——用冲突/潜词等术语+引台词才专业。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 写+互评","time":"8分钟","content":"【PPT P5 量表】教师：「写300字，互评：剧本(对话显冲突?潜词有?)或评论(术语?例?)。」 学生写+评。板书时机：教师巡。差异化提示：B班写200字+格式；A班写300字+潜词/术语。易错点提醒：互评看「文体对不对」——剧本看对话，评论看术语。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 作业","time":"2分钟","content":"【PPT P6 环节说明】教师：「据互评改终稿，下节课讲评+展演。」 板书时机：板书「写→演」。差异化提示：B班改格式；A班改深。易错点提醒：下节课讲评，备课本剧片段展演。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 学写戏剧 ──┐\n│ 二选一:         │\n│ 剧本↔评论       │\n│                │\n│ 剧本格式:       │\n│ 人名:对话       │\n│ (提示)动作神态 │\n│ 少叙述多对话    │\n│                │\n│ 评论支架:       │\n│ 冲突/潜词/戏剧性│\n│ +引台词         │\n│                │\n│ 避坑:           │\n│ 剧本≠小说       │\n└────────────────┘","exercises":"【基础作业】1. 据互评改终稿（300字）：剧本(对话+提示显冲突)或评论(三要素+引例)。2. 写一句「我用的文体+核心」。\n【提高作业】若写剧本，加一段「舞台说明」突出潜台词；若写评论，加一层「戏剧性」分析。\n【参考答案——教师用】基础1评价：剧本格式对+冲突显=合格；评论术语+例=合格；有潜词/深析=良好。基础2评价：说清=合格。提高作业评价：潜词巧/戏剧性深=优秀。","reflection":"✅ 亮点：格式模板+升格（小说→剧本）让B班懂「对话显心」；评论支架（三要素）避免空评。\n⚠️ 需改进：部分A班生剧本潜词仍直白，需给「藏意」例；下次加。\n📌 下节课衔接：下节课讲评+课本剧展演。","a 词有味？」 预设回答：「周萍那句停顿，藏了不敢说的爱。」 板书时机：黑板收。差异化提示：B班说1处；A班需术语。易错点提醒：观后谈用术语——说「冲突」「潜词」比「好看」专业。"},{"step":"Step 3 论坛","time":"8分钟","content":"【PPT P3 论坛】教师：「悲剧为何动人？」 预设回答：「美好被毁，让我们看见不该如此——窦娥感天、雷雨自毁、哈姆莱特延宕，都戳心。」 板书时机：黑板写「悲剧动人：毁灭显真」。差异化提示：B班说1点；A班需联三剧。易错点提醒：悲剧价值在「照见」——以毁灭显世道或人性之痛，引人省思。"},{"step":"Step 4 反思单","time":"9分钟","content":"【PPT P4 模板】教师：「填反思单三行：①学会（读戏剧）②提升 ③疑问。」 预设回答：「①学会抓冲突潜词；②提升写剧本；③怎么写更含蓄。」 板书时机：巡选。差异化提示：B班填前两行；A班全填+疑问。易错点提醒：反思写具体「一个方法」非「学到很多」。"},{"step":"Step 5 总结","time":"3分钟","content":"【PPT P5 路径】教师总结：「这单元从窦娥到哈姆莱特——戏剧把人放在冲突里，让我们看见自己。悲剧不悲，是清醒。」 板书时机：黑板写「读戏→见人」。差异化提示：B班听；A班写一句下单元期待。易错点提醒：单元结束是起点——用戏剧眼看人，生活也处处是戏。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 戏剧展演论坛 ──┐\n│ 【展演框架】     │\n│ 冲突显心·潜词有味│\n│                │\n│ 【论坛】         │\n│ 悲剧动人:       │\n│ 毁灭显真(不公/异)│\n│                │\n│ 【反思三问】     │\n│ ①学会__②提升__ │\n│ ③疑问__         │\n│                │\n│ 路径:           │\n│ 精读→群文→写作  │\n│                │\n│ 读戏→见人       │\n└────────────────┘","exercises":"【基础作业】1. 提交单元反思单（三行完整）。2. 将最满意剧本/评论归档。\n【提高作业】写150字「单元总结」，要求：①点明最重要方法；②举一剧说明；③说想提升的方面。\n【参考答案——教师用】反思单评价：三行具体=合格；有方法意识=良好；疑问有思=优秀。总结评价：点法+举例=合格；有个性化=良好。","reflection":"✅ 亮点：展演让剧本「立」起来，B班也参与（群演/幕后）；论坛「毁灭显真」点出悲剧价值，三剧贯通。\n⚠️ 需改进：15分钟只轮部分组；下次分两批或限时。\n📌 下单元衔接：第三单元「知识性读物」，从文学形象转到实用说明，方法大不同需提示。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T13:30:00Z"},{"id":"l-cn-bx-u3-1","lessonId":"l-cn-bx-u3-1","title":"青蒿素：人类征服疾病的一小步 精读——科学发现与科学表达","book":"必修下册","unitNumber":3,"unitTitle":"实用性阅读与交流（知识性读物）","taskGroup":"实用性阅读与交流","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":1,"duration":45,"grade":"高一","subject":"语文","tags":["知识性读物","屠呦呦","青蒿素","科学","人教版必修下U3","第一课时"],"textbookAnalysis":"《青蒿素》是屠呦呦获诺奖演讲节选，以第一人称回顾青蒿素发现历程：从中医药文献获灵感、提取青蒿素、临床验证、走向世界。文章兼具科学严谨与人文温度，是「科普+传记」范本，体现科学家精神（执着、协作、惠世）。","overview":"【学情分析】A班：能跟发现逻辑与科学精神，可深入「一小步」的谦逊与分量；赏科普笔法。B班：情节懂但「发现过程」读浅（只记结果）；科学术语畏难。共同问题：当故事读，抓不住「科学方法」（文献→提取→验证）与表达特点。","objectives":["语言能力：梳理青蒿素发现的主要阶段，说出文章按时间/逻辑展开的顺序。","文化意识：体会屠呦呦身上执着探索、团队协作、胸怀人类的科学家精神。","思维品质：通过分析发现过程，培养「问题—方法—验证」的科学思维。","学习能力：掌握知识性读物的「抓过程、品语言、悟精神」读法。"],"keyPoints":"① 过程：文献寻方→提取青蒿素→临床验证→惠及世界。\n② 方法：从中医药获灵感+现代实验验证（古今结合）。\n③ 精神：执着/协作/谦逊（「一小步」）。","difficulties":"① 过程梳理。原因：学生只记结果，需阶段图。\n② 科学语言。原因：术语畏难，需平译。\n③ 精神提炼。原因：易口号，需从行见神。","teachingMethods":"① 流程图法。\n② 语例品读法。\n③ 精神提炼法：从行见神。\n④ 对比法（与文学）。","preparation":"【PPT课件】P1 屠呦呦与诺奖；P2 发现历程流程图；P3 方法（文献+实验）；P4 语言特色（准确/平实）；P5 科学精神；P6 练习。\n【实物教具】无。\n【音频】诺奖演讲片段。","process":[{"step":"Step 1 导入——一小步","time":"5分钟","content":"【PPT P1 诺奖】教师：「屠呦呦2015获诺奖，演讲题《人类征服疾病的一小步》——青蒿素救数百万人。为何谦称『一小步』？」 预设回答：「谦逊！也是说科学永无止境！」 板书时机：黑板写「青蒿素：一小步·大贡献」。差异化提示：B班说得主；A班需解谦词。易错点提醒：知识性读物读「人」更读「法」——先想她怎么发现的，不只记她是谁。"},{"step":"Step 2 历程","time":"13分钟","content":"【PPT P2 流程】教师：「梳理四阶段：①从古籍找青蒿方 ②提取青蒿素 ③临床试己身 ④推向世界。这是科学发现的典型路径。」 学生填流程。板书时机：黑板画四阶段。差异化提示：B班说2-3阶段；A班需全连+说转折。易错点提醒：读科普抓「顺序」——发现是按问题推进的，理清阶段就读懂了方法。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 方法","time":"12分钟","content":"【PPT P3 方法】教师：「关键方法：从中医药文献获灵感（古），用低温提取保活性（今）——古今结合。还有团队协作、以身试药。」 板书时机：黑板写「古方+今技」。差异化提示：B班说一点；A班需析「为何低温」。易错点提醒：方法比结果重要——她妙在「用现代科学激活古方」，读时想「这步解决啥问题」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 语言","time":"8分钟","content":"【PPT P4 语言】教师：「语言特色？『疟疾病例死亡率显著降低』——准确、平实、有数据，不煽情。这是知识性读物的体。」 板书时机：黑板写「准确·平实·数据」。差异化提示：B班听；A班需举一例。易错点提醒：与文学比——科普不靠修辞煽情，靠事实数据服人，读时重「准」非「美」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 精神","time":"5分钟","content":"【PPT P5 精神】教师：「精神从行见：执着（数百次试）、协作（团队）、谦逊（一小步）、惠世（救人）。」 预设回答：「她把功劳给团队和中医！」 板书时机：黑板写「精神四词」。差异化提示：B班记词；A班需各举一处。易错点提醒：精神要「落地」——从文里某句某行推出，不空喊口号。"},{"step":"Step 6 小结+作业","time":"2分钟","content":"【PPT P6 练习】教师：「知识性读物读法？」 预设回答：「抓过程→品语言→悟精神！」 板书时机：板书读法。差异化提示：B班背阶段；A班写80字「我眼中的科学家精神」。易错点提醒：下节课读《一名物理学家的教育历程》，看另一种科学叙事。"}],"blackboard":"┌── 青蒿素·屠 ──┐\n│ 一小步·大贡献   │\n│                │\n│ 历程四阶段:     │\n│ ①古籍寻方      │\n│ ②提取青蒿素    │\n│ ③临床试身      │\n│ ④惠及世界      │\n│                │\n│ 方法:古方+今技 │\n│ 语言:准确平实  │\n│ 精神:执着协谦  │\n└────────────────┘","exercises":"【基础作业】1. 写出青蒿素发现的三个阶段（至少3）。2. 说文章语言一个特点并举一例。\n【提高作业】写150字「我眼中的科学家精神」，要求：①从文中举一处；②说其精神；③不空喊口号。\n【参考答案——教师用】基础1：文献寻方、提取、临床验证、推向世界（任3）。基础2：准确（如「显著降低」）、平实、有数据。提高作业评价：有文据+精神+不空=良好；有见地=优秀。","reflection":"✅ 亮点：历程流程图让「发现过程」可见，B班也理清；「古方+今技」点出方法之妙；语言对比（科普vs文学）纠「重美轻准」。\n⚠️ 需改进：B班对「低温提取」原理仍糊，部分不知青蒿素为何要低温；下次给1分钟化学注。\n📌 下节课衔接：下节课《一名物理学家的教育历程》，科学叙事的另一写法。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T14:00:00Z"},{"id":"l-cn-bx-u3-2","lessonId":"l-cn-bx-u3-2","title":"一名物理学家的教育历程 精读——科学志趣与自述笔法","book":"必修下册","unitNumber":3,"unitTitle":"实用性阅读与交流（知识性读物）","taskGroup":"实用性阅读与交流","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":2,"duration":45,"grade":"高一","subject":"语文","tags":["知识性读物","加来道雄","科普","自述","人教版必修下U3","第二课时"],"textbookAnalysis":"《一名物理学家的教育历程》是日裔美籍物理学家加来道雄的自述，回顾童年（看池塘鲤鱼想「更高维」）、少年（读爱因斯坦著作）、青年（建粒子加速器）三阶段如何走上物理路。以亲身经历讲科学志趣与方法，是自述体科普范文。","overview":"【学情分析】A班：能跟「好奇心驱动」与维度想象，可深入自述的「我」视角；赏科普叙事。B班：事件懂但「为何成为物理学家」逻辑弱；高维概念畏难。共同问题：当个人故事读，抓不住「教育历程=科学素养养成」的主线；自述笔法（第一人称+叙事说理）不察。","objectives":["语言能力：梳理作者三阶段成长（童年/少年/青年），说出推动他成为物理学家的核心动力。","文化意识：体会科学探索源于好奇心与持久热爱的人文底色。","思维品质：通过分析自述结构，培养「以经历证观点」的说理思维。","学习能力：掌握自述体知识读物的「抓阶段、明动力、辨笔法」读法。"],"keyPoints":"① 三阶段：童年(鲤鱼想象高维)→少年(读爱因斯坦)→青年(建加速器)。\n② 动力：好奇心+持久热爱+质疑。\n③ 笔法：第一人称自述，叙事中说理。","difficulties":"① 阶段逻辑。原因：易当流水账，需主线（科学素养养成）。\n② 高维概念。原因：抽象，需比喻。\n③ 自述笔法。原因：易当小说，需辨「我」说理。","teachingMethods":"① 时间轴法。\n② 动力溯源法。\n③ 概念降维法：高维比喻。\n④ 笔法辨读法。","preparation":"【PPT课件】P1 加来道雄与科普；P2 三阶段时间轴；P3 动力（好奇/热爱/质疑）；P4 高维比喻；P5 自述笔法；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——鲤鱼与高维","time":"5分钟","content":"【PPT P1】教师：「作者童年看池塘鲤鱼，想：鲤鱼眼中的世界是不是像我们被局限在三维？这个好奇，开启物理路。」 预设回答：「好妙！从鲤鱼想到高维！」 板书时机：黑板写「鲤鱼→高维：好奇」。差异化提示：B班说故事；A班需联科学。易错点提醒：科普自述常以「小事」引大问题——别笑童年奇想，那是科学种子的样子。"},{"step":"Step 2 时间轴","time":"12分钟","content":"【PPT P2 轴】教师：「三段：童年(池塘想高维)→少年(啃爱因斯坦著作)→青年(自建粒子加速器)。每段都在养成科学素养。」 板书时机：黑板画轴。差异化提示：B班说阶段名；A班需说每阶段「养了啥」。易错点提醒：读自述抓「阶段→素养」对应——作者写经历是为证「我如何成为科学家」，非流水账。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 动力","time":"12分钟","content":"【PPT P3 动力】教师：「核心动力？①好奇心(鲤鱼)②持久热爱(数十年)③质疑(不盲从)。这三点比天赋更关键。」 板书时机：黑板写「好奇·热爱·质疑」。差异化提示：B班记三词；A班需各举文中处。易错点提醒：动力从文里找——他说「着迷」「不懈」，读时把词对上动力，不空说「有兴趣」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 高维","time":"8分钟","content":"【PPT P4 比喻】教师：「高维难懂？想：蚂蚁在纸上只知二维，你从上方看它——我们之于高维，或如鲤鱼之于我们。比喻降维。」 板书时机：黑板写「比喻降维」。差异化提示：B班听比喻；A班需说作用。易错点提醒：科普用比喻讲抽象——读时把比喻还原成概念，别停「故事好玩」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 笔法","time":"5分钟","content":"【PPT P5 笔法】教师：「笔法：第一人称『我』自述，叙事中夹说理（如由鲤鱼引出维度观）。与《青蒿素》第三人称不同。」 板书时机：黑板写「我叙+说理」。差异化提示：B班听；A班需比青蒿素。易错点提醒：自述体「我」既是人物又是说者——读时辨「他在讲事还是讲理」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"3分钟","content":"【PPT P6 练习】教师：「自述科普读法？」 预设回答：「抓阶段→明动力→辨笔法！」 板书时机：板书读法。差异化提示：B班背阶段；A班写80字「我的好奇种子」。易错点提醒：下节课群文比两篇科学表达之异。"}],"blackboard":"┌── 物理学家历程 ──┐\n│ 鲤鱼→高维:好奇  │\n│                │\n│ 三阶段:         │\n│ 童年(想高维)    │\n│ 少年(读爱翁)    │\n│ 青年(建加速)    │\n│                │\n│ 动力:           │\n│ 好奇·热爱·质疑  │\n│ 笔法:我叙+说理  │\n└────────────────┘","exercises":"【基础作业】1. 写出作者成长三阶段。2. 说推动他成为物理学家的两个动力。\n【提高作业】写150字「我的好奇种子」，要求：①回忆一童年/少年好奇；②说它像文中哪种动力；③不空洞。\n【参考答案——教师用】基础1：童年观鲤想高维、少年读爱因斯坦、青年建加速器。基础2：好奇心、持久热爱、质疑（任2）。提高作业评价：有己例+对应动力=良好；真切=优秀。","reflection":"✅ 亮点：时间轴把「流水账」读出主线（素养养成）；高维用蚂蚁比喻降维，B班也懂；自述笔法对比青蒿素，辨体清晰。\n⚠️ 需改进：青年「建加速器」细节B班略过，部分不知其难；下次给1句背景。\n📌 下节课衔接：下节课群文比《青蒿素》与本文科学表达之异。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T14:00:00Z"},{"id":"l-cn-bx-u3-3","lessonId":"l-cn-bx-u3-3","title":"群文阅读——科学精神与科学表达比较","book":"必修下册","unitNumber":3,"unitTitle":"实用性阅读与交流（知识性读物）","taskGroup":"实用性阅读与交流","lessonType":"qunwen","lessonTypeName":"群文阅读","periodNumber":3,"duration":45,"grade":"高一","subject":"语文","tags":["知识性读物","群文","科学精神","科普","人教版必修下U3","第三课时"],"textbookAnalysis":"群文比较《青蒿素》与《一名物理学家的教育历程》——同属知识性读物、同彰科学精神，但表达异：《青蒿素》第三人称、按发现过程、语言准确平实；《历程》第一人称自述、按成长阶段、叙事中说理。比较提炼知识性读物的多样写法。","overview":"【学情分析】A班：能比两种人称与展开逻辑，可深入「为何这样写」；赏差异。B班：单篇懂但比较框架缺；易混「谁第几人称」。共同问题：比较易罗列缺归纳——发现「都科学」后不会提炼表达范式。","objectives":["语言能力：用双栏比较两文（人称/展开顺序/语言/科学精神），说出知识性读物的表达差异。","文化意识：体会科学精神的不同呈现方式（团队谦逊vs个人志趣）。","思维品质：通过比较培养同中求异、提炼范式思维。","学习能力：掌握知识性读物群文双栏比较法。"],"keyPoints":"① 青蒿素：第三人称+发现过程+准确平实+团队谦逊。\n② 历程：第一人称+成长阶段+叙事说理+个人志趣。\n③ 共性：皆以事实服人、显科学精神。","difficulties":"① 人称区分。原因：学生混，需点。\n② 双栏填。原因：维度不清，需框架。\n③ 共性提炼。原因：易停异，需归纳。","teachingMethods":"① 双栏比较法。\n② 范式命名法。\n③ 归纳法。\n④ 迁移法。","preparation":"【PPT课件】P1 两文封面；P2 双栏（人称/顺序/语言/精神）；P3 范式（客观纪实/主观自述）；P4 共性（事实服人）；P5 迁移（中国建筑）；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——同与异","time":"5分钟","content":"【PPT P1】教师：「两文都讲科学、都动人，但一用『她』一用『我』，一按过程一按成长——怎么个不同？」 预设回答：「一个客观记，一个主观讲！」 板书时机：黑板写「同：科学；异：表达」。差异化提示：B班说同异；A班需预判。易错点提醒：别只说「都科学」——要比「怎么写科学」。"},{"step":"Step 2 双栏","time":"13分钟","content":"【PPT P2 表】教师：「填双栏：人称(三/一)、顺序(发现过程/成长阶段)、语言(准确平实/叙事说理)、精神(团队谦逊/个人志趣)。」 学生填。板书时机：黑板画双栏。差异化提示：B班填人称+顺序；A班全填。易错点提醒：同维度比——都在「人称/顺序/语言/精神」下，不能乱比。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 范式","time":"10分钟","content":"【PPT P3 范式】教师：「青蒿素=客观纪实型（第三人称·过程·平实）；历程=主观自述型（第一人称·成长·说理）。一体一用。」 板书时机：黑板写「纪实↔自述」。差异化提示：B班记两词；A班需说「为何」。易错点提醒：范式区别在「谁在讲、按啥排」——读科普先判体，才懂作者用心。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 共性","time":"8分钟","content":"【PPT P4 共性】教师：「异之后共性？」 预设回答：「都靠事实数据说话、都显执着探索的科学精神——知识性读物以真服人。」 板书时机：黑板写「共性：事实服人·显精神」。差异化提示：B班说1点；A班需整合。易错点提醒：归纳是群文目的——异是手段，共性是收获。"},{"step":"Step 5 迁移","time":"5分钟","content":"【PPT P5 迁移】教师：「下节《中国建筑的特征》也是知识性读物——它是『说明型』（介绍特征），又一体。」 板书时机：板书「可迁移」。差异化提示：B班听；A班需说下比啥。易错点提醒：下节课读梁思成，看「客观说明事物特征」的写法。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 作业","time":"4分钟","content":"【PPT P6 练习】教师：「据双栏写一段比较，下节课用。」 板书时机：板书群文读法。差异化提示：B班背双栏；A班写比较段。易错点提醒：写作用原句支撑，不贴标签。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 科学表达群文 ──┐\n│ 同:科学·异:表达 │\n│                │\n│ 【双栏】         │\n│ 人称:三↔一      │\n│ 顺序:过程↔成长  │\n│ 语言:平实↔说理  │\n│ 精神:谦逊↔志趣  │\n│                │\n│ 范式:           │\n│ 纪实型↔自述型   │\n│ 共性:事实服人   │\n└────────────────┘","exercises":"【基础作业】1. 完成双栏（人称/顺序/语言/精神）。2. 用一句话说两文范式差异。\n【提高作业】写180字比较短文，要求：①同维度；②各引一句；③提炼范式差异。\n【参考答案——教师用】基础1评价：双栏全+维度对=合格。提高作业评价：同维度+引句+范式明=良好；能析功能=优秀。","reflection":"✅ 亮点：双栏让比较有抓手，B班也填；范式命名（纪实/自述）抓内核；共性「事实服人」有高度。\n⚠️ 需改进：B班生常混人称，需更多对比例；下次加判定口诀。\n📌 下节课衔接：下节课《中国建筑的特征》，客观说明型。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T14:00:00Z"},{"id":"l-cn-bx-u3-4","lessonId":"l-cn-bx-u3-4","title":"中国建筑的特征 精读——特征概括与说明艺术","book":"必修下册","unitNumber":3,"unitTitle":"实用性阅读与交流（知识性读物）","taskGroup":"实用性阅读与交流","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":4,"duration":45,"grade":"高一","subject":"语文","tags":["知识性读物","梁思成","中国建筑","说明文","人教版必修下U3","第四课时"],"textbookAnalysis":"《中国建筑的特征》是梁思成写给外行的科普说明文，用「文法」「词汇」比喻，系统概括中国建筑的九大特征（框架结构、庭院布局等），再由个别到一般提出「文法」规律。逻辑清晰、比喻通俗，是「由具体到抽象」的说明典范。","overview":"【学情分析】A班：能跟「文法比喻」与九特征逻辑，可深入「由个别到一般」；赏说明结构。B班：特征记不全；「文法/词汇」比喻不懂。共同问题：把九特征当列表背，抓不住「说明顺序」（具体→抽象）与比喻作用。","objectives":["语言能力：说出中国建筑的几个主要特征，解释「文法/词汇」比喻指什么。","文化意识：体会中国建筑蕴含的木构智慧与院落文化。","思维品质：通过分析「具体特征→文法规律」，培养由个别到一般的概括思维。","学习能力：掌握说明文「抓特征、理顺序、析比喻」读法。"],"keyPoints":"① 特征：框架木构/庭院布局/屋顶举折等九点。\n② 比喻：文法=结构规律，词汇=构件（如斗拱）。\n③ 顺序：具体特征→抽象文法（个→般）。","difficulties":"① 特征多。原因：九点易乱，需归类（结构/布局/装饰）。\n② 文法比喻。原因：抽象，需解。\n③ 说明顺序。原因：易平看，需点个→般。","teachingMethods":"① 特征归类法。\n② 比喻解码法。\n③ 顺序显影法：个→般。\n④ 图文法（配图）。","preparation":"【PPT课件】P1 梁思成与中国建筑；P2 九特征归类（结构/布局/装饰）；P3 文法比喻；P4 说明顺序（个→般）；P5 语言（准确+通俗比喻）；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——文法与词汇","time":"5分钟","content":"【PPT P1 梁】教师：「梁思成把中国建筑比作语言：有『文法』（结构规律）和『词汇』（斗拱、梁柱等构件）。一幢房子就是一句话。」 预设回答：「建筑像写文章！太妙了！」 板书时机：黑板写「建筑=语言：文法+词汇」。差异化提示：B班说比喻；A班需联全文。易错点提醒：科普说明常借比喻讲专业——读时把比喻还原成概念（文法=规律，词汇=构件）。"},{"step":"Step 2 特征归类","time":"13分钟","content":"【PPT P2 归类】教师：「九特征归三类：①结构（木构框架）②布局（院落对称）③装饰（屋顶举折、色彩）。不必全背，抓代表。」 学生记代表。板书时机：黑板列三类+例。差异化提示：B班记三类名；A班需各补一例。易错点提醒：多特征要「归类读」——别逐条背，分成结构/布局/装饰三筐，记筐记例。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 文法比喻","time":"12分钟","content":"【PPT P3 文法】教师：「『文法』指中国建筑共有的结构法则（如梁柱怎么搭、屋顶怎么起翘）；『词汇』是具体构件（斗拱、鸱吻）。各时代按文法『造句』，故有共性又有变化。」 板书时机：黑板写「文法=法则·词汇=构件」。差异化提示：B班说比喻；A班需说「为何用比喻」。易错点提醒：比喻为通俗——把难懂的「结构规律」变「文法」，读时想「它实际指啥」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 说明顺序","time":"8分钟","content":"【PPT P4 顺序】教师：「顺序：先列具体特征（个别建筑构件），再升到『文法』规律（一般法则）——由个别到一般，符合认知。」 板书时机：黑板写「个别→一般」。差异化提示：B班听；A班需说好处。易错点提醒：说明文顺序有讲究——个→般让读者从熟到深，读时跟作者「爬楼梯」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 语言","time":"4分钟","content":"【PPT P5 语言】教师：「语言：既准确（『基本上』『大多数』留余地）又通俗（比喻）。知识性读物双美。」 板书时机：黑板写「准+俗」。差异化提示：B班听；A班需举一准词。易错点提醒：科普语言「准确」是底线——「基本上」这类限定词显示科学严谨，别当废话。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"3分钟","content":"【PPT P6 练习】教师：「说明文读法？」 预设回答：「抓特征→理顺序→析比喻！」 板书时机：板书读法。差异化提示：B班背三类；A班写80字「我眼中的中国建筑」。易错点提醒：下节课读《说『木叶』》，看文艺性说明的另一格。"}],"blackboard":"┌── 中国建筑·梁 ──┐\n│ 建筑=语言       │\n│ 文法(法则)+词汇 │\n│                │\n│ 九特征三类:     │\n│ 结构(木构)      │\n│ 布局(院落)      │\n│ 装饰(屋顶色彩)  │\n│                │\n│ 顺序:个别→一般 │\n│ 语言:准+俗      │\n└────────────────┘","exercises":"【基础作业】1. 说出中国建筑的三个特征（可归类答）。2. 解释「文法」「词汇」比喻各指什么。\n【提高作业】写150字「我眼中的中国建筑」，要求：①用一特征；②说其文化意味；③用『文法/词汇』之一。\n【参考答案——教师用】基础1：木构框架、院落布局、屋顶举折（任3/归类）。基础2：文法=结构规律，词汇=构件（斗拱等）。提高作业评价：特征+文化+比喻=良好；有见地=优秀。","reflection":"✅ 亮点：比喻解码（文法=法则）让抽象可触，B班也懂；九特征「归类读」破背诵压力；个→般顺序显影有逻辑。\n⚠️ 需改进：B班对「举折/斗拱」仍陌生，配图不足；下次加构件图。\n📌 下节课衔接：下节课《说『木叶』》，文艺性说明（考据+诗意）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T14:00:00Z"},{"id":"l-cn-bx-u3-5","lessonId":"l-cn-bx-u3-5","title":"说\"木叶\" 精读——概念辨析与文艺性说明","book":"必修下册","unitNumber":3,"unitTitle":"实用性阅读与交流（知识性读物）","taskGroup":"实用性阅读与交流","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":5,"duration":45,"grade":"高一","subject":"语文","tags":["知识性读物","林庚","木叶","文艺说明","人教版必修下U3","第五课时"],"textbookAnalysis":"《说「木叶」》是林庚的文艺性说明文，考辨「木叶」与「树叶」在诗歌里的微妙差异：木叶含「落叶的疏朗、微黄干燥」之意，树叶绿意饱满。由诗句归纳、逐层辨析，融考据与诗美，是「文艺性知识读物」范本。","overview":"【学情分析】A班：能跟「木/树」意蕴差异与逐层辨析，可深入「暗示性」；赏诗论笔法。B班：例子懂但「为何木叶更美」说不清；文艺说明体陌生。共同问题：当词句赏析读，抓不住「由例到理」的辨析方法；忽略「暗示性」概念。","objectives":["语言能力：说出「木叶」与「树叶」在诗歌意味上的主要差异，解释「暗示性」含义。","文化意识：体会中国诗歌词语的意蕴之美与鉴赏传统。","思维品质：通过分析逐层辨析，培养由具体诗句归纳概念的思维。","学习能力：掌握文艺性说明文「由例到理、考据结合诗美」的读法。"],"keyPoints":"① 差异：木叶=疏朗微黄落叶感；树叶=绿意饱满枝头感。\n② 暗示性：词语引发联想（木→干燥/落叶）。\n③ 方法：由诗句归纳→逐层辨析→立概念。","difficulties":"① 意蕴差。原因：细微，需诗句对比。\n② 暗示性。原因：抽象，需解。\n③ 文艺说明体。原因：易当赏析，需辨「说文」性质。","teachingMethods":"① 诗句对照法。\n② 概念解码法：暗示性。\n③ 归纳显影法：例→理。\n④ 诵读法（诗句）。","preparation":"【PPT课件】P1 林庚与诗论；P2 木叶vs树叶诗句对照；P3 差异（疏朗/饱满）；P4 暗示性；P5 辨析路径（例→理）；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——一字之差","time":"5分钟","content":"【PPT P1】教师：「『木叶』与『树叶』，一字之差，诗人偏爱木叶。为何？杜甫『无边落木萧萧下』的『木』藏着秋意。」 预设回答：「木叶更萧瑟有诗意！」 板书时机：黑板写「木叶≠树叶·诗意差」。差异化提示：B班说偏爱；A班需联诗句。易错点提醒：文艺说明从「语言现象」入——别先背结论，先看诗人怎么用、为何用。"},{"step":"Step 2 诗句对照","time":"13分钟","content":"【PPT P2 对照】教师：「举句：『亭皋木叶下』(疏朗) vs 『茂密的树叶』(饱满)。木叶带『落叶、微黄、干燥』，树叶是『绿、润、枝头』。」 学生读比。板书时机：黑板列对照。差异化提示：B班说表面差；A班需说意味。易错点提醒：差在「联想」非「字典义」——木叶让人想秋落，树叶想春绿，读诗抓这层。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 暗示性","time":"12分钟","content":"【PPT P4 暗示】教师：「关键概念：词语的『暗示性』——『木』字让人联想到干燥、落叶、疏朗，不靠明说。诗歌美在言外。」 板书时机：黑板写「暗示性：联想」。差异化提示：B班记词；A班需举一例。易错点提醒：暗示性是诗心——读诗不只看字面，看字「引来什么」，木叶之妙全在暗示。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 辨析路径","time":"8分钟","content":"【PPT P5 路径】教师：「作者怎么写？先摆诗句现象→再比木/树→归纳『暗示性』概念。由例到理，考据结合诗美。」 板书时机：黑板写「例→理」。差异化提示：B班听；A班需说每步。易错点提醒：文艺说明也讲「方法」——它从例子爬到概念，读时跟作者归纳，别停在赏析。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 诵读","time":"4分钟","content":"【PPT P5 环节说明】教师：「读『袅袅兮秋风，洞庭波兮木叶下』——体会木叶的疏朗与秋意。」 板书时机：黑板标诵读点。差异化提示：B班跟读；A班需说味。易错点提醒：诗论要「回到诗」——空谈概念不如读一句真懂暗示，读时入境。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"3分钟","content":"【PPT P6 练习】教师：「文艺说明读法？」 预设回答：「由例→析差→立概念（暗示性）！」 板书时机：板书读法。差异化提示：B班背差异；A班写80字「我懂的木叶」。易错点提醒：下节课方法指导，学写知识性短文。"}],"blackboard":"┌── 说木叶·林 ──┐\n│ 木叶≠树叶      │\n│                │\n│ 对照:           │\n│ 木叶:疏朗微黄  │\n│ 落叶干燥感      │\n│ 树叶:绿润饱满  │\n│ 枝头春意        │\n│                │\n│ 暗示性:联想    │\n│ 路径:例→理     │\n└────────────────┘","exercises":"【基础作业】1. 说出「木叶」与「树叶」意味上的一个差异。2. 解释「暗示性」是什么意思。\n【提高作业】写150字「我懂的木叶」，要求：①引一句诗；②说其暗示；③联暗示性概念。\n【参考答案——教师用】基础1：木叶疏朗微黄落叶感，树叶绿润饱满。基础2：词语引发联想（木→干燥落叶）。提高作业评价：引诗+暗示+概念=良好；有诗心=优秀。","reflection":"✅ 亮点：诗句对照让「微妙差异」可见，B班也辨；暗示性概念解码（联想）是全文钥匙；例→理路径显影文艺说明之法。\n⚠️ 需改进：B班对「暗示性」仍抽象，部分只记字面；下次加更多生活例（如「家」的暗示）。\n📌 下节课衔接：下节课方法指导，学写知识性短文。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T14:00:00Z"},{"id":"l-cn-bx-u3-6","lessonId":"l-cn-bx-u3-6","title":"方法指导——学写知识性短文（科普/说明）","book":"必修下册","unitNumber":3,"unitTitle":"实用性阅读与交流（知识性读物）","taskGroup":"实用性阅读与交流","lessonType":"fangfa","lessonTypeName":"方法指导","periodNumber":6,"duration":45,"grade":"高一","subject":"语文","tags":["知识性读物","写作","说明文","人教版必修下U3","第六课时"],"textbookAnalysis":"本课为第三单元写作任务，写知识性短文（如介绍一种事物/现象/方法，300字）。要点：①抓特征（具体可感）；②按顺序（时间/逻辑/个→般）；③语言准确平实（可加比喻通俗）；④用事实数据。学生常写成抒情散文或空洞介绍。","overview":"【学情分析】A班：能写有条理短文，但比喻/数据弱；可深入。B班：写成「我喜欢XX」抒情，或只喊「很厉害」无特征。共同问题：无特征（不具体）、无顺序（乱）、语言不「知识性」（太文艺）。","objectives":["语言能力：写一篇知识性短文（300字），做到抓特征、有顺序、语言准确平实。","文化意识：在写作中体会「以真服人」的知识性传播态度。","思维品质：通过格式约束，培养条理与概括思维。","学习能力：掌握知识性短文「特征+顺序+准语」写法。"],"keyPoints":"① 抓特征：具体可感（如「木构框架」）。\n② 按顺序：时间/逻辑/个→般。\n③ 语言：准确平实+可比喻；用事实数据。","difficulties":"① 抓特征。原因：学生写空，需给「问特征」支架。\n② 定顺序。原因：乱，需选一种。\n③ 知识性语言。原因：易抒情，需红线。","teachingMethods":"① 支架提问法：这是什么/特征/怎么来的。\n② 顺序择定法。\n③ 升格示范法：抒情→知识。\n④ 互评法。","preparation":"【PPT课件】P1 三要点；P2 抓特征（提问支架）；P3 定顺序（三选一）；P4 语言红线（准/平/数据）；P5 升格（抒情→知识）；P6 互评量表。\n【实物教具】便签。\n【音频】无。","process":[{"step":"Step 1 三要点","time":"5分钟","content":"【PPT P1】教师：「写知识性短文三件：①抓特征（它啥样）②按顺序（怎么讲）③语言准平（别抒情）。三缺一就『不像知识文』。」 板书时机：黑板写「特征+顺序+准语」。差异化提示：B班听；A班需说关系。易错点提醒：知识文「以真服人」——读者要的是清楚的事实，不是你的感动，先想「他想知道啥」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 抓特征","time":"12分钟","content":"【PPT P2 支架】教师：「用提问抓特征：这是什么？由什么组成？有何特点/用处？例：介绍『斗拱』→木构件、托梁、分散重力、装饰。具体！」 板书时机：黑板列提问。差异化提示：B班填1-2问；A班全答+举例。易错点提醒：特征是「可感的点」——说「很大」不如说「跨度可达X米」，具体才像知识文。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 定顺序","time":"10分钟","content":"【PPT P3 顺序】教师：「选一种顺序：时间（发现历程）、逻辑（结构→功能）、个→般（特征→规律）。一篇一序，别混。」 板书时机：黑板写「三序选一」。差异化提示：B班听；A班需说本文用啥。易错点提醒：顺序定「读者如何跟随」——定好就不乱，写前先画小提纲。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 升格","time":"10分钟","content":"【PPT P5 升格】展示抒情稿：「青蒿素太伟大了，我好感动。」问：「改？」 预设回答：「写：青蒿素从青蒿提取，抗疟，已救数百万人——具体！」 教师改。板书时机：黑板标「抒情→知识」。差异化提示：B班看差；A班需说改法。易错点提醒：升格关键「感动转事实」——把情绪换成特征+数据，知识文才立。"},{"step":"Step 5 写+互评","time":"6分钟","content":"【PPT P6 量表】教师：「写300字，互评：有特征?有顺序?语言准平?」 学生写+评。板书时机：教师巡。差异化提示：B班写200字+特征；A班写300字+数据/比喻。易错点提醒：互评看「像不像知识文」——三条达标即合格。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 作业","time":"2分钟","content":"【PPT P6 环节说明】教师：「据互评改终稿，下节课讲评。」 板书时机：黑板「写→评」。差异化提示：B班改特征；A班改深。易错点提醒：下节课讲评，备科普分享。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 学写知识文 ──┐\n│ 三要点:         │\n│ 特征+顺序+准语  │\n│                │\n│ 抓特征提问:     │\n│ 是啥/组成/特点  │\n│ 具体可感        │\n│                │\n│ 定顺序:         │\n│ 时间/逻辑/个般  │\n│                │\n│ 红线:           │\n│ 准·平·数据      │\n│ 忌抒情          │\n└────────────────┘","exercises":"【基础作业】1. 据互评改终稿（300字）：抓特征+有顺序+语言准平。2. 写一句「我写的对象+核心特征」。\n【提高作业】在短文中加一处比喻（如梁思成式）或一组数据，让表达更通俗/有力。\n【参考答案——教师用】基础1评价：特征具体+顺序清+语准平=合格；有数据/比喻=良好。基础2评价：说清=合格。提高作业评价：比喻巧/数据实=优秀。","reflection":"✅ 亮点：提问支架（是啥/组成/特点）破「写空」；升格（抒情→知识）让B班懂红线；顺序三选一避免乱。\n⚠️ 需改进：部分A班生比喻仍生硬，需给「喻体贴近读者」例；下次加。\n📌 下节课衔接：下节课讲评+科普分享会。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T14:00:00Z"},{"id":"l-cn-bx-u3-7","lessonId":"l-cn-bx-u3-7","title":"写作实践与讲评——知识性短文修改与提升","book":"必修下册","unitNumber":3,"unitTitle":"实用性阅读与交流（知识性读物）","taskGroup":"实用性阅读与交流","lessonType":"xiezuo","lessonTypeName":"写作实践","periodNumber":7,"duration":45,"grade":"高一","subject":"语文","tags":["知识性读物","讲评","说明文","人教版必修下U3","第七课时"],"textbookAnalysis":"本课为知识性短文讲评，选取三典型：①写空（无特征）；②乱序（无提纲）；③太抒情（语言不知识性）。通过对比讲评提升，优秀短文可进入科普分享。","overview":"【学情分析】A班：初稿条理好但数据/比喻可深；反思强。B班：部分仍抒情或空，需典型纠偏。共同问题：修改只改字不改进文体；好知识文标准未内化。","objectives":["语言能力：据讲评改终稿，做到特征具体、顺序清晰、语言准确平实。","文化意识：在讲评中体会知识性文体的表达自觉。","思维品质：通过三典型诊断，培养评价与自我修订能力。","学习能力：内化「好知识文」标准。"],"keyPoints":"① 三典型：写空/乱序/太抒情。\n② 修改：补特征/定顺序/转事实。\n③ 好标准：特征具体+顺序清+语准平。","difficulties":"① 补特征。原因：空泛，需提问。\n② 定顺序。原因：乱，需提纲。\n③ 转事实。原因：抒情，需换数据。","teachingMethods":"① 典型讲评法。\n② 对比修改法。\n③ 同伴互改法。\n④ 教师现场改稿。","preparation":"【PPT课件】P1 三标准；P2 典型A(写空)+改；P3 典型B(乱序)+改；P4 典型C(抒情)+改；P5 现场改稿；P6 分享预告。\n【实物教具】学生短文（收选3篇）。\n【音频】无。","process":[{"step":"Step 1 回顾三标准","time":"3分钟","content":"【PPT P1 三标准】教师：「好知识文：特征具体、顺序清晰、语言准平。记牢。」 预设回答：「特征+顺序+准语！」 板书时机：黑板写三标准配问。差异化提示：B班背；A班解释。易错点提醒：三标准缺一不可——无特征=空，无顺序=乱，太抒情=不像知识文。"},{"step":"Step 2 讲评典型A——写空","time":"8分钟","content":"【PPT P2 典型A】展示空稿：「中国建筑很美很有特色。」教师：「改？」 预设回答：「写：木构框架、院落对称——具体！」 教师改。黑板时机：黑板左「A：补特征」。差异化提示：B班说改；A班需说每处。易错点提醒：补特征用提问——是啥/组成/特点，把空话变具体点。 板书时机：随讲解自然生成，不另设固定板书点。"},{"step":"Step 3 讲评典型B——乱序","time":"8分钟","content":"【PPT P3 典型B】展示乱序稿（先功能后定义）。教师：「定一种顺序，画提纲再写。」 板书时机：黑板中「B：定顺序」。差异化提示：B班说序；A班提改。易错点提醒：写前画小提纲——定时间/逻辑/个般，读者才跟得上。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 讲评典型C——抒情","time":"6分钟","content":"【PPT P4 典型C】展示「青蒿素让我泪目」。教师：「换事实：提取自青蒿、抗疟、救数百万人。」 板书时机：黑板右「C：转事实」。差异化提示：B班说空；A班析改。易错点提醒：抒情转事实——知识文靠特征+数据服人，情绪留给结尾一句足矣。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 现场改稿","time":"8分钟","content":"【PPT P5 改稿】教师选稿A当场补特征+定序。板书时机：黑板前后对比。差异化提示：B班看结果；A班说每处理由。易错点提醒：改是改更好，同一稿可多方向优化。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 终稿互签","time":"12分钟","content":"【PPT P6 环节说明】教师：「据讲评改终稿，同桌互签一句评语。」 学生改+签。板书时机：教师巡选优稿备分享。差异化提示：B班改1-2处；A班改3处+自评。易错点提醒：互签写具体，如「这句特征写得清」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 知识文讲评 ──┐\n│ 【三标准】       │\n│ 特征具体         │\n│ 顺序清晰         │\n│ 语言准平         │\n│                │\n│ A:补特征        │\n│ B:定顺序        │\n│ C:转事实        │\n│                │\n│ 改三方向:       │\n│ 具/序/实        │\n└────────────────┘","exercises":"【基础作业】1. 提交终稿（改后）+互签评语。2. 写50字自评：我改了什么、为什么。\n【提高作业】在终稿加一处数据或比喻，使表达更通俗/有力。\n【参考答案——教师用】终稿评价：特征具体+顺序清+语准平=合格；优者=良好。自评评价：说清改了=合格。","reflection":"✅ 亮点：三典型精准，补特征改法学生直呼「原来这样」；乱序用提纲解决；抒情转事实红线及时。\n⚠️ 需改进：B（写空）讲评时部分仍写空，需给「提问卡」随身；下次加。\n📌 下节课衔接：下节课科普分享会。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T14:00:00Z"},{"id":"l-cn-bx-u3-8","lessonId":"l-cn-bx-u3-8","title":"单元活动——科普分享会与知识性阅读反思","book":"必修下册","unitNumber":3,"unitTitle":"实用性阅读与交流（知识性读物）","taskGroup":"实用性阅读与交流","lessonType":"huodong","lessonTypeName":"单元活动","periodNumber":8,"duration":45,"grade":"高一","subject":"语文","tags":["知识性读物","分享会","人教版必修下U3","第八课时"],"textbookAnalysis":"本课为第三单元收官：科普分享会（优秀知识性短文宣讲）+阅读反思单（回顾「精读—群文—写作」路径与知识性读物读法）。含三环节：①短文宣讲；②互评（特征/顺序/语言）；③单元反思单。","overview":"【学情分析】A班：宣讲有条理可上台；反思深。B班：部分羞于讲宜书面；反思宜具体。共同问题：单元「学了什么」缺整体认知。","objectives":["语言能力：参与宣讲或互评，做到用知识文标准（特征/顺序/语言）评文。","文化意识：在分享中体会科学知识传播的价值。","思维品质：填单元反思单，梳理路径，培养元认知。","学习能力：整合四文为单元成果。"],"keyPoints":"① 宣讲：知识性短文口述。\n② 互评：特征/顺序/语言三标。\n③ 反思单：路径——精读→群文→写作。","difficulties":"① 宣讲条理。原因：易念稿无重点，需框架。\n② 互评深度。原因：易口号，需术语。\n③ 元认知。原因：反思空话，需具体。","teachingMethods":"① 宣讲工作坊。\n② 互评法。\n③ 反思单法。\n④ 教师总结法。","preparation":"【PPT课件】P1 流程；P2 宣讲框架（特征/顺序/语言）；P3 互评三标；P4 反思单；P5 路径图。\n【实物教具】学生短文；便签。\n【音频】无。","process":[{"step":"Step 1 宣讲","time":"15分钟","content":"【PPT P1 流程】【PPT P2 框架】教师：「小组宣讲知识短文，按特征→顺序→语言讲清。听众看『像不像知识文』。」 学生讲。板书时机：旁记亮点。差异化提示：B班书面/助讲；A班主讲+框架。易错点提醒：宣讲抓「具体」——一句话一个点，别堆形容词。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 互评","time":"10分钟","content":"【PPT P3 三标】教师：「刚才哪篇特征最具体？顺序最清？」 预设回答：「那篇用数据，一下就懂！」 板书时机：黑板收。差异化提示：B班说1处；A班需术语。易错点提醒：互评用术语——说「特征具体」「顺序清」比「清楚」专业。"},{"step":"Step 3 反思单","time":"12分钟","content":"【PPT P4 模板】教师：「填反思单三行：①学会（读知识文）②提升 ③疑问。」 预设回答：「①学会抓特征析暗示；②提升写短文；③比喻怎么用巧。」 板书时机：巡选。差异化提示：B班填前两行；A班全填+疑问。易错点提醒：反思写具体「一个方法」非「学到很多」。"},{"step":"Step 4 总结","time":"8分钟","content":"【PPT P5 路径】教师总结：「这单元从屠呦呦到林庚——知识性读物以真服人，特征·顺序·语言三件是读法。」 板书时机：黑板写「读知识文→以真服人」。差异化提示：B班听；A班写一句下单元期待。易错点提醒：单元结束是起点——用「知识眼」看世界，处处可写一文。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 科普分享反思 ──┐\n│ 【宣讲框架】     │\n│ 特征·顺序·语言  │\n│                │\n│ 【互评三标】     │\n│ 特征具体/序清/  │\n│ 语准平          │\n│                │\n│ 【反思三问】     │\n│ ①学会__②提升__ │\n│ ③疑问__         │\n│                │\n│ 路径:           │\n│ 精读→群文→写作  │\n│ 读知识文→以真   │\n└────────────────┘","exercises":"【基础作业】1. 提交单元反思单（三行完整）。2. 将最满意知识短文归档。\n【提高作业】写150字「单元总结」，要求：①点明最重要方法；②举一文说明；③说想提升的方面。\n【参考答案——教师用】反思单评价：三行具体=合格；有方法意识=良好；疑问有思=优秀。总结评价：点法+举例=合格；有个性化=良好。","reflection":"✅ 亮点：宣讲让短文「立」起来，B班也参与（助讲/书面）；互评三标（特征/顺序/语言）点出知识文价值，四文贯通。\n⚠️ 需改进：15分钟只轮部分组；下次分两批或限时。\n📌 下单元衔接：第四单元「跨媒介阅读与交流」，从读文转到用媒介，方法大不同需提示。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T14:00:00Z"},{"id":"l-cn-bx-u4-1","lessonId":"l-cn-bx-u4-1","title":"单元导入——走进信息时代的多媒介","book":"必修下册","unitNumber":4,"unitTitle":"跨媒介阅读与交流（信息时代的语文生活）","taskGroup":"跨媒介阅读与交流","lessonType":"daoru","lessonTypeName":"单元导入","periodNumber":1,"duration":45,"grade":"高一","subject":"语文","tags":["跨媒介","导入","媒介素养","人教版必修下U4","第一课时"],"textbookAnalysis":"第四单元是综合实践单元「信息时代的语文生活」，围绕「跨媒介阅读与交流」展开。本课时导入：认识我们身处多媒介环境（微信/短视频/电视/海报/公众号等），理解不同媒介的传播特点，为后续「善用」「辨识」「表达」奠基。","overview":"【学情分析】A班：能跟媒介差异与「语文生活」关联，可深入媒介对表达的重塑；举多例。B班：天天用媒介但「媒介」概念糊；不知本单元要学啥。共同问题：把媒介当工具，不懂其「表达逻辑」不同；缺媒介素养意识。","objectives":["语言能力：列举常见媒介并说出其传播特点（如即时/视觉/互动）。","文化意识：理解信息时代媒介如何重塑表达与交往，培养媒介素养意识。","思维品质：通过比较媒介特点，培养适配媒介的表达思维。","学习能力：建立「跨媒介阅读与交流」的单元认知框架。"],"keyPoints":"① 常见媒介：微信/短视频/电视/广播/海报/公众号。\n② 特点：即时/视觉化/互动/权威vs碎片。\n③ 本单元线：认识→善用→辨识→表达。","difficulties":"① 媒介分类。原因：学生混，需按「特点」分。\n② 素养意识。原因：只当工具，需点「表达逻辑」。\n③ 单元框架。原因：易散，需线。","teachingMethods":"① 媒介枚举法。\n② 特点对比法。\n③ 框架搭建法。\n④ 讨论法。","preparation":"【PPT课件】P1 信息时代；P2 常见媒介图谱；P3 特点对比（即时/视觉/互动/权威）；P4 单元四线；P5 媒介素养；P6 任务预告。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 导入——你的一天","time":"5分钟","content":"【PPT P1】教师：「今天你用了哪些媒介？微信、抖音、电视、海报……我们活在媒介里。但你会『用对』『读懂』它们吗？」 预设回答：「我刷了一天短视频！但没想过怎么用！」 板书时机：黑板写「信息时代·多媒介」。差异化提示：B班说媒介；A班需联生活。易错点提醒：媒介不是「玩具」——它是表达与获取信息的渠道，本单元学「跨媒介的语文能力」。"},{"step":"Step 2 媒介图谱","time":"12分钟","content":"【PPT P2 图谱】教师：「枚举媒介：社媒(微信/微博)、视频(抖音/B站)、传统(电视/广播/报纸)、平面(海报/公众号)。它们各管一块。」 学生补。板书时机：黑板画四类。差异化提示：B班说2-3类；A班需全+举。易错点提醒：分类为「看清」——先定媒介属哪类，才懂它的表达规则。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 特点对比","time":"12分钟","content":"【PPT P3 特点】教师：「特点：即时(微信)、视觉化(视频)、互动(评论)、权威(报纸)vs碎片(短视频)。同一信息放不同媒介，写法不同。」 板书时机：黑板列特点。差异化提示：B班记特点；A班需说「同一信息怎么改写法」。易错点提醒：媒介决定写法——给老人看用文字权威，给同龄用短视频，读时想「它为何这样呈现」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 单元四线","time":"8分钟","content":"【PPT P4 四线】教师：「本单元四步：认识媒介→善用媒介(传信息)→辨识信息(防坑)→跨媒介表达(写文案)。一条线走完。」 板书时机：黑板写「识→用→辨→写」。差异化提示：B班记四步；A班需说每步。易错点提醒：单元是实践链——前一步是后一步基础，别跳，跟线走。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 素养","time":"5分钟","content":"【PPT P5 素养】教师：「媒介素养=会读(辨真假)、会写(适配媒介)、会省思(不被带节奏)。这是当代语文能力。」 板书时机：黑板写「素养三会」。差异化提示：B班听；A班需说一例。易错点提醒： 1】教师：「同一新闻『某活动举办』，公众号写长图文、短视频拍15秒、电视播3分钟——写法天差地别。为何？」 预设回答：「因为媒介不一样啊！」 板书时机：黑板写「同信息·异构」。差异化提示：B班说现象；A班需联媒介。易错点提醒：媒介决定写法——别怪作者「偷工」，是平台规则使然，读时想「它服务谁」。"},{"step":"Step 2 三媒介比","time":"13分钟","content":"【PPT P2 对比】教师：「公众号：图文深、可收藏；短视频：画面快、易传播；电视：权威全、覆盖广。各有表达逻辑。」 学生填表。板书时机：黑板画三栏。差异化提示：B班说2栏；A班需全+举。易错点提醒：比写法看「长短/深浅/互动」——同一事在不同媒介伸缩不同，这是关键。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 逻辑差","time":"10分钟","content":"【PPT P3 逻辑】教师：「逻辑差：深度(公众号)vs速度(短视频)vs权威(电视)。选媒介=选表达策略。」 板书时机：黑板写「深/速/威」。差异化提示：B班记三词；A班需说选用。易错点提醒：读媒介先判「它求啥」——求快则碎，求深则长，读懂意图才不被带偏。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 调研","time":"12分钟","content":"【PPT P4 框架】教师：「小组调研：选一热点，比它在两媒介的呈现，填『现象—原因』。如『开学通知』在群(即时)vs公众号(正式)。」 学生调研。板书时机：教师巡。差异化提示：B班选易题；A班选热点+深挖。易错点提醒：调研重「归因」——不只记不同，要答「因为媒介X特点，所以写法Y」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 汇报","time":"3分钟","content":"【PPT P5 汇报】教师：「各组一句话：我们发现__在__媒介因__所以__。」 板书时机：黑板收。差异化提示：B班说现象；A班说归因。易错点提醒：汇报用「因—果」句，别只报「不一样」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 作业","time":"2分钟","content":"【PPT P6 练习】教师：「完善调研单，下节课用于『善用媒介』。」 板书时机：板书「调研→用」。差异化提示：B班补表；A班写归因。易错点提醒：下节课学「怎么选媒介传信息」，调研是弹药。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 认识多媒介 ──┐\n│ 同信息·异构    │\n│                │\n│ 三媒介写法:     │\n│ 公众号:图文深  │\n│ 短视频:画面快  │\n│ 电视:权威全    │\n│                │\n│ 逻辑差:         │\n│ 深/速/威        │\n│                │\n│ 调研:现象→原因 │\n└────────────────┘","exercises":"【基础作业】1. 写出同一信息在公众号与短视频呈现的一个差异。2. 完成小组调研单（现象+原因）。\n【提高作业】选一热点，写120字比较其在两媒介的呈现，要求：①具体；②用「因媒介X特点所以Y」句式；③不表面。\n【参考答案——教师用】基础1：公众号图文深可收藏，短视频画面快易传播。基础2评价：现象+原因=合格。提高作业评价：具体+句式+深析=良好；有见地=优秀。","reflection":"✅ 亮点：同信息异构（公众号/短视频/电视）让媒介逻辑可见，B班也懂；调研框架「现象→原因」逼归因，破走过场。\n⚠️ 需改进：B班调研常只记现象，归因弱；下次给「因果句式」模板强提示。\n📌 下节课衔接：下节课「善用媒介」——据特点选媒介传信息。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T14:20:00Z"},{"id":"l-cn-bx-u4-3","lessonId":"l-cn-bx-u4-3","title":"善用多媒介——信息传播的媒介策略","book":"必修下册","unitNumber":4,"unitTitle":"跨媒介阅读与交流（信息时代的语文生活）","taskGroup":"跨媒介阅读与交流","lessonType":"shanyong","lessonTypeName":"善用媒介","periodNumber":3,"duration":45,"grade":"高一","subject":"语文","tags":["跨媒介","媒介策略","传播","人教版必修下U4","第三课时"],"textbookAnalysis":"本课学「善用媒介」：根据目标受众与信息性质选择并组合媒介，让传播更有效。例：校内活动通知用「群+海报」，深度解读用公众号，吸引同龄用短视频。核心是「适配」——媒介为内容服务。","overview":"【学情分析】A班：能设计多媒介组合方案，可深入「为何这样配」；创意强。B班：知道用群但不想「为何」，方案单薄；易一刀切。共同问题：选媒介凭习惯不凭策略——不看受众与目的，方案无针对性。","objectives":["语言能力：为一个具体传播目标设计媒介组合方案，说明选每种媒介的理由。","文化意识：理解「媒介为内容服务」的传播伦理，避免滥用。","思维品质：通过分析受众与目的，培养适配决策思维。","学习能力：掌握「定目标→看受众→选媒介→组合」的传播策略。"],"keyPoints":"① 适配：媒介为内容/受众服务。\n② 决策链：目标→受众→媒介→组合。\n③ 例：活动=群+海报；深度=公众号；吸同龄=短视频。","difficulties":"① 适配意识。原因：凭习惯选，需点「为何」。\n② 决策链。原因：跳步，需顺序。\n③ 组合。原因：单薄，需多媒介协。","teachingMethods":"① 决策链法。\n② 案例模拟法。\n③ 方案设计法。\n④ 互评法。","preparation":"【PPT课件】P1 适配原则；P2 决策链（目标/受众/媒介/组合）；P3 案例（活动/深度/招新）；P4 方案模板；P5 互评；P6 练习。\n【实物教具】便签。\n【音频】无。","process":[{"step":"Step 1 适配原则","time":"5分钟","content":"【PPT P1】教师：「善用媒介第一原则：媒介为内容服务，不为炫技。选错媒介，好内容也传不动。」 预设回答：「对！发长文到群里没人看！」 板书时机：黑板写「媒介为内容服务」。差异化提示：B班听；A班需举一反例。易错点提醒：先想「给谁看、看什么」再选媒介——反了就白费，别追新潮。"},{"step":"Step 2 决策链","time":"13分钟","content":"【PPT P2 链】教师：「四步：①定目标(通知/说服/吸引)②看受众(同龄/家长/全校)③选媒介(群/公众号/短视频)④组合。顺序不能乱。」 学生跟练。板书时机：黑板画链。差异化提示：B班记四步；A班需各举例。易错点提醒：决策链是「逻辑梯」——跳步必乱，先目标后媒介，写方案按此列。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 案例","time":"12分钟","content":"【PPT P3 案例】教师：「例1 校内讲座：群(即时)+海报(视觉)。例2 读书解读：公众号(深)。例3 社团招新：短视频(吸同龄)+群。」 板书时机：黑板列三案。差异化提示：B班说1案；A班需说每案「为何」。易错点提醒：组合讲「互补」——即时+视觉覆盖不同场景，读方案想「漏了谁」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 方案设计","time":"10分钟","content":"【PPT P4 模板】教师：「给你的任务(如『推广读书节』)设计组合方案，写清每媒介用途。」 学生写。板书时机：教师巡。差异化提示：B班写2媒介；A班写3+说理由。易错点提醒：写清「每媒介干啥」——别只列名，要说它承担通知还是吸引。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 互评","time":"3分钟","content":"【PPT P5 互评】教师：「交换看：他的方案适配目标吗？漏了哪类受众？」 板书时机：黑板收。差异化提示：B班说适配；A班说漏谁。易错点提醒：互评看「决策链」——目标受众媒介是否对得上，挑断裂处。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 作业","time":"2分钟","content":"【PPT P6 练习】教师：「完善方案，下节课用于『辨识信息』前先有传播观。」 板书时机：黑板「用→辨」。差异化提示：B班补；A班深化。易错点提醒：下节课学「辨识媒介信息」，会读才会传。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 善用多媒介 ──┐\n│ 媒介为内容服务  │\n│                │\n│ 决策链:         │\n│ 目标→受众→媒介 │\n│ →组合           │\n│                │\n│ 案例:           │\n│ 讲座:群+海报    │\n│ 解读:公众号     │\n│ 招新:短视频+群  │\n│                │\n│ 组合讲互补      │\n└────────────────┘","exercises":"【基础作业】1. 写出决策链四步。2. 为一「校内讲座」设计媒介组合（至少2种）并各说用途。\n【提高作业】为「推广读书节」写120字方案，要求：①定目标受众；②选≥3媒介；③说每媒介用途与互补。\n【参考答案——教师用】基础1：目标→受众→媒介→组合。基础2：群(即时通知)+海报(视觉)各说用=合格。提高作业评价：目标清+媒介≥3+互补说=良好；有创意=优秀。","reflection":"✅ 亮点：适配原则（媒介为内容服务）立住，B班也懂反例；决策链四步让方案有逻辑；案例（讲座/解读/招新）落地。\n⚠️ 需改进：B班方案常只列媒介名不说用途，需给模板强约束；下次加。\n📌 下节课衔接：下节课「辨识媒介信息」，培养批判性接收。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T14:20:00Z"},{"id":"l-cn-bx-u4-4","lessonId":"l-cn-bx-u4-4","title":"辨识媒介信息——媒介素养与批判性接收","book":"必修下册","unitNumber":4,"unitTitle":"跨媒介阅读与交流（信息时代的语文生活）","taskGroup":"跨媒介阅读与交流","lessonType":"bianshi","lessonTypeName":"辨识信息","periodNumber":4,"duration":45,"grade":"高一","subject":"语文","tags":["跨媒介","媒介素养","批判性","谣言","人教版必修下U4","第四课时"],"textbookAnalysis":"本课学「辨识媒介信息」：在信息洪流中辨真假、识偏见、防操纵。方法：①核来源(权威否)②查交叉(多源印证)③辨情绪(是否被带节奏)④看目的(营销/煽动)。是媒介素养的核心防线。","overview":"【学情分析】A班：能深入分析信息操纵手法，可深入「算法推送」；批判强。B班：知道有假但无方法，易信标题；遇情绪文跟着怒。共同问题：辨识凭感觉不凭方法——不会核来源查交叉，被标题党带跑。","objectives":["语言能力：用四步法（核来源/查交叉/辨情绪/看目的）辨识一条媒介信息的可信度。","文化意识：理解信息操纵的危害，培养负责任的接收与转发态度。","思维品质：通过分析信息手法，培养批判性思维与证据意识。","学习能力：掌握「核来源—查交叉—辨情绪—看目的」辨识法。"],"keyPoints":"① 核来源：是否权威/可溯。\n② 查交叉：多源印证否。\n③ 辨情绪：是否被标题党带节奏。\n④ 看目的：营销/煽动/告知。","difficulties":"① 来源核。原因：不知权威源，需清单。\n② 交叉查。原因：懒于多搜，需习惯。\n③ 情绪辨。原因：易共情失察，需冷静。","teachingMethods":"① 四步法讲授。\n② 案例解剖法（真假例）。\n③ 实战演练法。\n④ 讨论法。","preparation":"【PPT课件】P1 为何辨；P2 四步法（源/交叉/情绪/目的）；P3 真假案例解剖；P4 常见手法（标题党/断章/煽动）；P5 实战；P6 练习。\n【实物教具】无。\n【音频】无。","process":[{"step":"Step 1 为何辨","time":"5分钟","content":"【PPT P1】教师：「每天海量信息，假消息、标题党满天飞。不会辨，轻则被骗，重则传谣害人。辨识是当代保命技能。」 预设回答：「我转过假新闻，后来打脸！」 板书时机：黑板写「辨识=媒介素养防线」。差异化提示：B班说经历；A班需联危害。易错点提醒：转发前停三秒——你的一次转发可能放大假信息，责任在己。"},{"step":"Step 2 四步法","time":"13分钟","content":"【PPT P2 四步】教师：「四步：①核来源(官网/权威媒?)②查交叉(别家报没)③辨情绪(标题是否吓人/引怒)④看目的(卖货?煽动?)。」 学生记。板书时机：黑板列四步。差异化提示：B班记四步名；A班需各举一问。易错点提醒：四步是「筛子」——任一步不过就存疑，别跳步，尤其情绪文最易蒙混。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 案例解剖","time":"12分钟","content":"【PPT P3 案例】教师展示假消息：「吃XX致癌（无来源+吓人标题）」。用四步拆：来源无、无交叉、情绪炸、目的吸睛。再展示真消息对比。」 板书时机：黑板左右对比。差异化提示：B班说2步；A班需全拆。易错点提醒：假消息爱「无来源+强情绪」——见这组合先疑，别急着信。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 常见手法","time":"8分钟","content":"【PPT P4 手法】教师：「常见坑：标题党(夸大)、断章取义(截半句)、煽动(引对立)、伪科学(假数据)。识破套路。」 板书时机：黑板列手法。差异化提示：B班记2手法；A班需各举一例。易错点提醒：手法是「套路库」——见套路名就警觉，读时给信息贴标签。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 实战","time":"5分钟","content":"【PPT P5 实战】教师发一条模糊信息，学生用四步判真假并说理由。」 板书时机：黑板收。差异化提示：B班判1步；A班全四步+结论。易错点提醒：实战先「存疑」再验证——不确定就不转，比猜错安全。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 作业","time":"2分钟","content":"【PPT P6 练习】教师：「找一条你近期见的信息，用四步写辨识单。」 板书时机：黑板「辨→写」。差异化提示：B班写2步；A班写全。易错点提醒：下节课学「跨媒介表达」，会读会传更要会写。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 辨识媒介信息 ──┐\n│ 素养防线        │\n│                │\n│ 四步法:         │\n│ 核来源(权威?)   │\n│ 查交叉(多源?)   │\n│ 辨情绪(带节奏?) │\n│ 看目的(卖/煽?)  │\n│                │\n│ 常见手法:       │\n│ 标题党/断章/煽动│\n│ /伪科学         │\n└────────────────┘","exercises":"【基础作业】1. 写出辨识四步。2. 找一条信息，用「核来源+查交叉」两步写辨识。\n【提高作业】写120字辨识单，要求：①选一条真实见过的消息；②用四步；③给结论(可信/存疑)及理由。\n【参考答案——教师用】基础1：核来源、查交叉、辨情绪、看目的。基础2评价：两步+理由=合格。提高作业评价：四步+结论+理由=良好；判断准=优秀。","reflection":"✅ 亮点：四步法（源/交叉/情绪/目的）给可操作武器，B班也懂；真假案例左右对比直观；手法套路库提升警觉。\n⚠️ 需改进：B班遇情绪文仍易共情失察，需多练「先疑后信」；下次加限时实战。\n📌 下节课衔接：下节课「跨媒介表达」——学写适配媒介的文案。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T14:20:00Z"},{"id":"l-cn-bx-u4-5","lessonId":"l-cn-bx-u4-5","title":"方法指导——学写跨媒介文案","book":"必修下册","unitNumber":4,"unitTitle":"跨媒介阅读与交流（信息时代的语文生活）","taskGroup":"跨媒介阅读与交流","lessonType":"fangfa","lessonTypeName":"方法指导","periodNumber":5,"duration":45,"grade":"高一","subject":"语文","tags":["跨媒介","写作","文案","人教版必修下U4","第五课时"],"textbookAnalysis":"本课学写跨媒介文案（如公众号推文/短视频脚本/活动海报文案），核心是「适配媒介」：短视频重画面与钩子开头，公众号重标题与结构，海报重视觉与slogan。学生常把所有媒介写成同一篇长作文。","overview":"【学情分析】A班：能写多媒介适配文案，但钩子/视觉弱；可深入。B班：所有媒介写成一    │\n└────────────────┘","exercises":"【基础作业】1. 写出三种媒介文案各自的一个要点。2. 为「读书节」写一句短视频钩子开头或一句海报slogan。\n【提高作业】选一种媒介写120字文案，要求：①标明媒介；②用其写法(钩子/标题/视觉)；③有受众感。\n【参考答案——教师用】基础1：短视频钩子、公众号标题、海报slogan。基础2评价：钩子或slogan合格。提高作业评价：标媒介+用对写法+受众感=良好；出彩=优秀。","reflection":"✅ 亮点：三媒介写法（钩子/标题/slogan）让「适配」可操作，B班也懂；升格（平→钩）示范有力；互评按媒介分项。\n⚠️ 需改进：B班钩子仍平，需给「反差/悬念」句式库；下次加。\n📌 下节课衔接：下节课写作实践与讲评。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T14:20:00Z"},{"id":"l-cn-bx-u4-6","lessonId":"l-cn-bx-u4-6","title":"写作指导——设计跨媒介宣传方案","book":"必修下册","unitNumber":4,"unitTitle":"跨媒介阅读与交流（信息时代的语文生活）","taskGroup":"跨媒介阅读与交流","lessonType":"xiezuo","lessonTypeName":"写作指导","periodNumber":6,"duration":45,"grade":"高一","subject":"语文","tags":["跨媒介","写作","方案","人教版必修下U4","第六课时"],"textbookAnalysis":"本课为第四单元写作任务，设计一份跨媒介宣传方案（如推广校园读书节/运动会），含：①目标受众②媒介组合③各媒介文案（短视频脚本+公众号导语+海报slogan）④传播节奏。学生常只写单一长文或空喊口号。","overview":"【学情分析】A班：能写完整多媒介方案，但节奏/文案弱；可深入。B班：只写一段长文或只列媒介名；无文案无受众。共同问题：方案「不像方案」（缺受众/缺文案/缺组合逻辑）；各媒介文案不区分。","objectives":["语言能力：写一份跨媒介宣传方案（含受众/组合/各媒介文案），做到媒介适配、文案到位。","文化意识：在写作中体会「整合传播」的协作思维。","思维品质：通过方案设计，培养系统规划与受众导向思维。","学习能力：掌握「受众→组合→文案→节奏」方案写法。"],"keyPoints":"① 受众：谁看。\n② 组合：用哪些媒介。\n③ 文案：每媒介写对应文案。\n④ 节奏：何时发。","difficulties":"① 方案结构。原因：散，需四块框架。\n② 文案适配。原因：混写，需分媒介。\n③ 节奏。原因：忽视，需时点。","teachingMethods":"① 方案模板法。\n② 分媒介写法。\n③ 升格示范法。\n④ 互评法。","preparation":"【PPT课件】P1 方案四块；P2 受众+组合；P3 分媒介文案（视频/公号/海报）；P4 节奏；P5 升格；P6 互评量表。\n【实物教具】便签。\n【音频】无。","process":[{"step":"Step 1 方案四块","time":"5分钟","content":"【PPT P1】教师：「完整方案四块：①受众(谁)②组合(用啥媒介)③文案(每媒介写啥)④节奏(何时发)。缺一块就不算方案。」 板书时机：黑板写「受众/组合/文案/节奏」。差异化提示：B班听；A班需说关系。易错点提醒：方案是「系统工程」——四块互相咬合，先想清再写，别漏。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 受众+组合","time":"12分钟","content":"【PPT P2】教师：「例：读书节受众=全校生+家长。组合=群(通知)+短视频(吸同龄)+公众号(深度)+海报(视觉)。」 学生定自己题。板书时机：黑板列。差异化提示：B班定受众；A班定组合+理由。易错点提醒：组合讲「互补覆盖」——想清每媒介服务哪类人，别重复。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 分媒介文案","time":"12分钟","content":"【PPT P3】教师：「每媒介写对应文案：短视频(钩子脚本)、公众号(标题+导语)、海报(slogan)。别把长文复制三份。」 学生写。板书时机：教师巡。差异化提示：B班写2媒介 加节奏。原因：忽视，需时点。","teachingMethods":"① 典型讲评法。\n② 对比修改法。\n③ 同伴互改法。\n④ 教师现场改稿。","preparation":"【PPT课件】P1 四标准；P2 典型A(缺块)+改；P3 典型B(混写)+改；P4 典型C(无节奏)+改；P5 现场改稿；P6 展示预告。\n【实物教具】学生方案（收选3篇）。\n【音频】无。","process":[{"step":"Step 1 回顾四标准","time":"3分钟","content":"【PPT P1 四标准】教师：「好方案：四块齐(受众/组合/文案/节奏)、文案分写适配、有节奏时点。记牢。」 预设回答：「四块齐+文案分写！」 板书时机：黑板写四标准配问。差异化提示：B班背；A班解释。易错点提醒：四块缺一不可——无受众=不知对谁，无文案=空喊。"},{"step":"Step 2 讲评典型A——缺块","time":"8分钟","content":"【PPT P2 典型A】展示只写「发群通知」稿。教师：「补：受众(全校+家长)、组合(群+视频+海报)、文案(各写)、节奏(预热→引爆)。」 板书时机：黑板左「A：补四块」。差异化提示：B班说补；A班需说每处。易错点提醒：补块用模板——四格填齐，方案才像方案。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 讲评典型B——混写","time":"8分钟","content":"【PPT P3 典型B】展示三媒介同篇长文。教师：「分写：视频钩子、公号标题、海报slogan，各按其法。」 板书时机：黑板中「B：分写文案」。差异化提示：B班说混；A班提改。易错点提醒：分写是关键——同一活动三种说法，别偷懒复制。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 讲评典型C——无节奏","time":"6分钟","content":"【PPT P4 典型C】展示无时点稿。教师：「加：预热(提前1周)、引爆(当日)、延续(回顾)。」 板书时机：黑板右「C：加节奏」。差异化提示：B班说空；A班析改。易错点提醒：节奏防一次性——有波次传播才持续。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 现场改稿","time":"8分钟","content":"【PPT P5 改稿】教师选稿A当场补四块+分写。板书时机：黑板前后对比。差异化提示：B班看结果；A班说每处理由。易错点提醒：改是改更好，同一稿可多方向优化。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 终稿互签","time":"12分钟","content":"【PPT P6 环节说明】教师：「据讲评改终稿，同桌互签一句评语。」 学生改+签。板书时机：教师巡选优稿备展示。差异化提示：B班改1-2处；A班改3处+自评。易错点提醒：互签写具体，如「这句slogan很响」。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 跨媒介讲评 ──┐\n│ 【四标准】       │\n│ 四块齐·文案分写 │\n│ ·有节奏         │\n│                │\n│ A:补四块        │\n│ B:分写文案      │\n│ C:加节奏        │\n│                │\n│ 改三方向:       │\n│ 补/分/加        │\n└────────────────┘","exercises":"【基础作业】1. 提交终稿（改后）+互签评语。2. 写50字自评：我改了什么、为什么。\n【提高作业】在终稿加一处创意文案（如更炸的短视频钩子或更有感染力的slogan）。\n【参考答案——教师用】终稿评价：四块齐+文案分写+节奏=合格；优者=良好。自评评价：说清改了=合格。","reflection":"✅ 亮点：三典型精准，补块改法学生直呼「原来这样」；分写文案破复制；节奏补时点及时。\n⚠️ 需改进：B（混写）讲评时部分仍复制，需给「分写卡」；下次加。\n📌 下节课衔接：下节课媒介产品展示会。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T14:20:00Z"},{"id":"l-cn-bx-u4-8","lessonId":"l-cn-bx-u4-8","title":"单元活动——跨媒介产品展示与反思","book":"必修下册","unitNumber":4,"unitTitle":"跨媒介阅读与交流（信息时代的语文生活）","taskGroup":"跨媒介阅读与交流","lessonType":"huodong","lessonTypeName":"单元活动","periodNumber":8,"duration":45,"grade":"高一","subject":"语文","tags":["跨媒介","展示","人教版必修下U4","第八课时"],"textbookAnalysis":"本课为第四单元收官：媒介产品展示会（小组展示跨媒介方案+模拟产物如短视频脚本/海报）+反思单（回顾「识→用→辨→写」路径与媒介素养）。含三环节：①方案展示；②互评（适配/创意）；③反思单。","overview":"【学情分析】A班：展示有表现力可主讲；反思深。B班：部分羞于讲宜幕后；反思宜具体。共同问题：单元「学了什么」缺整体认知。","objectives":["语言能力：参与展示或互评，做到用跨媒介标准（适配/创意）评方案。","文化意识：在展示中体会信息时代负责任的表达与接收。","思维品质：填单元反思单，梳理路径，培养元认知。","学习能力：整合单元为成果。"],"keyPoints":"① 展示：方案+模拟产物。\n② 互评：适配/创意。\n③ 反思单：路径——识→用→辨→写。","difficulties":"① 展示条理。原因：易散，需框架。\n② 互评深度。原因：易口号，需标准。\n③ 元认知。原因：反思空话，需具体。","teachingMethods":"① 展示工作坊。\n② 互评法。\n③ 反思单法。\n④ 教师总结法。","preparation":"【PPT课件】P1 流程；P2 展示框架（受众/组合/文案/节奏）；P3 互评标准；P4 反思单；P5 路径图。\n【实物教具】学生方案；便签。\n【音频】无。","process":[{"step":"Step 1 展示","time":"15分钟","content":"【PPT P1 流程】【PPT P2 框架】教师：「小组展示方案+模拟产物（如念短视频脚本、贴海报slogan）。听众看『四块齐否、适配否』。」 学生展。板书时机：旁记亮点。差异化提示：B班幕后/助讲；A班主讲+框架。易错点提醒：展示抓「四块」——讲清受众组合文案节奏，别只念文案。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 2 互评","time":"10分钟","content":"【PPT P3 标准】教师：「哪组适配最好？哪句slogan最响？」 预设回答：「那组短视频钩子绝了，前3秒就抓人！」 板书时机：黑板收。差异化提示：B班说1处；A班需标准。易错点提醒：互评用标准——说「适配」「创意」比「好」专业。"},{"step":"Step 3 反思单","time":"12分钟","content":"【PPT P4 模板】教师：「填反思单三行：①学会（跨媒介）②提升 ③疑问。」 预设回答：「①学会选媒介传信息；②提升写文案；③怎么辨得更准。」 板书时机：巡选。差异化提示：B班填前两行；A班全填+疑问。易错点提醒：反思写具体「一个方法」非「学到很多」。"},{"step":"Step 4 总结","time":"8分钟","content":"【PPT P5 路径】教师总结：「这单元从识媒介到写方案——信息时代，会读会传会写才是真语文力。」 板书时机：黑板写「识→用→辨→写→素养」。差异化提示：B班听；A班写一句下单元期待。易错点提醒：单元结束是起点——带着媒介素养刷手机，做个清醒的人。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"}],"blackboard":"┌── 媒介展示反思 ──┐\n│ 【展示框架】     │\n│ 受众/组合/文案/ │\n│ 节奏            │\n│                │\n│ 【互评】         │\n│ 适配/创意       │\n│                │\n│ 【反思三问】     │\n│ ①学会__②提升__ │\n│ ③疑问__         │\n│                │\n│ 路径:           │\n│ 识→用→辨→写    │\n│ →素养           │\n└────────────────┘","exercises":"【基础作业】1. 提交单元反思单（三行完整）。2. 将最满意方案归档。\n【提高作业】写150字「单元总结」，要求：①点明最重要方法；②举一例说明；③说想提升的方面。\n【参考答案——教师用】反思单评价：三行具体=合格；有方法意识=良好；疑问有思=优秀。总结评价：点法+举例=合格；有个性化=良好。","reflection":"✅ 亮点：展示让方案「立」起来，B班也参与（助讲/幕后）；互评标准（适配/创意）点出跨媒介价值，四步贯通。\n⚠️ 需改进：15分钟只轮部分组；下次分两批或限时。\n📌 下单元衔接：第五单元「实用性阅读与交流（演说与书信）」，从用媒介转到读经典演说。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T14:20:00Z"},{"id":"l-cn-bx-u5-1","lessonId":"l-cn-bx-u5-1","title":"在《人民报》创刊纪念会上的演说 精读——真理的力量与演说艺术","book":"必修下册","unitNumber":5,"unitTitle":"实用性阅读与交流（演说与书信）","taskGroup":"实用性阅读与交流","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":1,"duration":45,"grade":"高一","subject":"语文","tags":["演说","马克思","人民报","人教版必修下U5","第一课时"],"textbookAnalysis":"《在〈人民报〉创刊纪念会上的演说》是马克思1856年作。他以「革命」为线，用比喻（如「蒸汽、电力和自动走锭纺纱机」代表生产力）揭示资本主义矛盾，预言革命必然。演说短小犀利、逻辑严密、富有鼓动性，是经典政治演说。","overview":"【学情分析】A班：能跟比喻背后的唯物史观与演说逻辑，可深入「预言式论断」；赏鼓动性。B班：情节懂但比喻读不懂（不知指啥）；演说体陌生。共同问题：把演说当议论文读，抓不住「现场感」与鼓动性；比喻（生产力/矛盾）不解。","objectives":["语言能力：说出演说的核心观点（资本主义矛盾必然引发革命），解释文中关键比喻的含义。","文化意识：理解马克思对时代矛盾的洞察与革命信念。","思维品质：通过分析比喻与逻辑，培养透过形象把握本质的思维。","学习能力：掌握「抓观点、解比喻、品鼓动」的演说读法。"],"keyPoints":"① 观点：生产力发展暴露资本主义矛盾，革命必然。\n② 比喻：蒸汽/电力=生产力；衰颓现象=矛盾。\n③ 演说艺术：短小、逻辑密、鼓动性强。","difficulties":"① 比喻解。原因：喻体陌生(生产力)，需解码。\n② 观点抓。原因：散在比喻中，需提炼。\n③ 演说体。原因：易当议论文，需辨现场感。","teachingMethods":"① 比喻解码法。\n② 观点提炼法。\n③ 诵读体悟法（鼓动点）。\n④ 背景支架法。","preparation":"【PPT课件】P1 马克思与人民报；P2 核心观点；P3 比喻解码（生产力/矛盾）；P4 演说艺术（短/密/鼓）；P5 背景（19世纪）；P6 练习。\n【实物教具】无。\n【音频】演说朗诵。","process":[{"step":"Step 1 导入——一篇演说","time":"5分钟","content":"【PPT P1 马】教师：「1856年，马克思在报纸创刊会上讲了几分钟，却预言了时代。演说短，力量大。」 预设回答：「几分钟就能预言？厉害！」 板书时机：黑板写「人民报演说：短而力」。差异化提示：B班说事件；A班需联背景。易错点提醒：演说贵「现场感」——它是讲给人听的，读时想「听众当下什么反应」，别当静文。"},{"step":"Step 2 观点","time":"13分钟","content":"【PPT P2 观点】教师：「核心观点：工业生产力(蒸汽电力)发展，反而暴露并加剧资本主义矛盾——革命不可避免。这是唯物史观论断。」 板书时机：黑板写「生产力→矛盾→革命」。差异化提示：B班说结论；A班需说逻辑链。易错点提醒：政治演说「观点藏在比喻后」——先抓结论（革命必然），再回头解比喻，别陷修辞。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 3 比喻","time":"12分钟","content":"【PPT P3 比喻】教师：「『蒸汽、电力和自动走锭纺纱机』指工业革命生产力；『衰颓的征象』指资本主义旧矛盾。以具象说抽象。」 板书时机：黑板列喻体→本体。差异化提示：B班记喻指；A班需说作用。易错点提醒：读演说先「解喻」——把喻体翻成本体（生产力/矛盾），才懂他在说啥。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 4 艺术","time":"8分钟","content":"【PPT P4 艺术】教师：「艺术：①短小(几分钟)②逻辑密(由果溯因)③鼓动(预言式论断提振信心)。三者成就力量。」 板书时机：黑板写「短/密/鼓」。差异化提示：B班记三词；A班需各举一处。易错点提醒：演说与议论文不同——它要「燃」听众，鼓动性是目的，读时找燃点。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 5 诵读","time":"4分钟","content":"【PPT 鼓点】教师：「读『历史本身就是审判官』——感受斩钉截铁的预言力量。」 板书时机：黑板标诵读点。差异化提示：B班跟读；A班需说语气。易错点提醒：演说的魂在「声音」——读时带信念与力度，才近现场。 预设回答：「（学生按本环节要求作答或展示，师生共同点评。）」"},{"step":"Step 6 小结+作业","time":"3分钟","content":"【PPT P6 练习】教师：「演说读法？」 预设回答：「抓观点→解比喻→品鼓动！」 板书时机：板书读法。差异化提示：B班背观点；A班写80字「我眼中的演说力量」。易错点提醒：下节课读《在马克思墓前的讲话》，看悼词如何说理抒情。"}],"blackboard":"┌── 人民报演说·马 ──┐\n│ 短而力          │\n│                │\n│ 观点链:         │\n│ 生产力→矛盾→   │\n│ 革命必然        │\n│                │\n│ 比喻:           │\n│ 蒸汽电力=生产力 │\n│ 衰颓=矛盾       │\n│                │\n│ 艺术:短/密/鼓   │\n└────────────────┘","exercises":"【基础作业】1. 说出演说的一个核心观点。2. 解释文中「蒸汽、电力和自动走锭纺纱机」比喻指什么。\n【提高作业】写150字「我眼中的演说力量」，要求：①用一喻；②说其观点；③联鼓动性。\n【参考答案——教师用】基础1：生产力发展暴露资本主义矛盾，革命必然。基础2：指工业革命的先进生产力。提高作业评价：喻+观点+鼓动=良好；有见地=优秀。","reflection":"✅ 亮点：比喻解码（喻体→本体）让抽象可触，B班也懂；观点链（生产力→矛盾→革命）显逻辑；演说体「现场感」纠「当议论文读」。\n⚠️ 需改进：B班对唯物史观背景仍薄，部分不懂「矛盾」所指；下次加1分钟背景。\n📌 下节课衔接：下节课《在马克思墓前的讲话》，悼词体。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-14T14:40:00Z"},{"id":"l-cn-bx-u5-2","lessonId":"l-cn-bx-u5-2","title":"在马克思墓前的讲话 精读——悼词结构与情理交融","book":"必修下册","unitNumber":5,"unitTitle":"实用性阅读与交流（演说与书信）","taskGroup":"实用性阅读与交流","lessonType":"jingdu","lessonTypeName":"课文精读","periodNumber":2,"duration":45,"grade":"高一","subject":"语文","tags":["演说","恩格斯","悼词","人教版必修下U5","第二课时"],"textbookAnalysis":"《在马克思墓前的讲话》是恩格斯1883年在葬礼上的悼词。结构：述哀（逝世）→评价（两大发现：唯物史观、剩余价值；革命实践）→悼念（影响）。将严密说理与深沉抒情交融，是悼词兼演说范本。","overview":"【学情分析】A班：能跟「两大发现」与评价逻辑，可深入情理交融；赏结构。B班：事件懂但「两大发现」读浅；悼词结构糊。共同问题：当记叙文读，抓不住「评价+抒情」双层；不知悼词「述哀—评价—悼念」格式。","objectives":["语言能力：说出悼词的结构（述哀/评价/悼念）与马克思的「两大发现」。","文化意识：体会恩格斯对挚友的科学评价与深切哀思。","思维品质：通过分析结构与情理交融，培养条理与人文并重的思维。","学习能力：掌握「抓结构、明评价、品交融」的悼词读法。"],"keyPoints":"① 结构：述哀→评价→悼念。\n② 两大发现：唯物史观、剩余价值。\n③ 交融：严密说理+深沉抒情。","difficulties":"
