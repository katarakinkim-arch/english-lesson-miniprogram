erfect!\"пјү\n- \"B has 'are being' + past participle.\"пјҲж•ҷеёҲпјҡ\"Good observation! That's the form.\"пјү\n- BзҸӯеҸҜиғҪеҸӘзңӢеҲ°\"иў«еҠЁ\"вҖ”вҖ”ж•ҷеёҲиҝҪй—®пјҡ\"What tense? Present continuous. So it's present continuous PASSIVE.\"пјү\n\nгҖҗжқҝд№Ұж—¶жңәвҖ”вҖ”дёүиүІзІүз¬”жһ„е»әи§„еҲҷгҖ‘\n\nзәўиүІ=beеҠЁиҜҚ  и“қиүІ=being  з»ҝиүІ=иҝҮеҺ»еҲҶиҜҚ\n\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ    PRESENT CONTINUOUS PASSIVE               в”Ӯ\nв”Ӯ                                             в”Ӯ\nв”Ӯ    am/is/are + being + V3(иҝҮеҺ»еҲҶиҜҚ)          в”Ӯ\nв”Ӯ                                             в”Ӯ\nв”Ӯ    дё»еҠЁпјҡ[Doer] + am/is/are + V-ing          в”Ӯ\nв”Ӯ    иў«еҠЁпјҡ[Receiver] + am/is/are + being + V3 в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Three colors to remember: RED for the be-verb (it changes with the subject вҖ” am, is, or are), BLUE for 'being' (this is what makes it CONTINUOUS), GREEN for the past participle (this is what makes it PASSIVE). Never drop the BLUE 'being' вҖ” that's the #1 mistake!\""},{"step":"дәҢгҖҒRule Formation и§„еҲҷеҪ’зәі+дҪҝз”ЁеңәжҷҜ","time":7,"content":"гҖҗPPT 03 и§„еҲҷеҪ’зәіиЎЁгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"When do we use the passive voice? Three situations:\"\n\nв‘  дёҚзҹҘйҒ“и°ҒеңЁеҒҡпјҡ\n  \"The forest is being destroyed.\" (We don't know who is cutting the trees.)\n  \nв‘Ў ејәи°ғжүҝеҸ—иҖ…пјҡ\n  \"Antelopes are being protected.\" (We care about the antelopes, not who is protecting them.)\n  \nв‘ў жү§иЎҢиҖ…жҳҫиҖҢжҳ“и§ҒжҲ–дёҚжғіжҸҗеҸҠпјҡ\n  \"New laws are being made.\" (Obviously by the government вҖ” no need to say.)\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Now, important rule: NOT all verbs can be passive! Only TRANSITIVE verbs (еҸҠзү©еҠЁиҜҚ вҖ” verbs with an object). 'Kill' can be passive (something is being killed). But 'happen' CANNOT вҖ” you can't say 'something is being happened.' Why? Because 'happen' has no object.\"\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘\nв‘ еёёи§ҒдёҚеҸҠзү©еҠЁиҜҚпјҲдёҚиғҪиў«еҠЁпјүпјҡhappen, occur, exist, appear, disappear, rise, fall\nв‘Ў\"being\"дёҚеҸҜзңҒз•Ҙпјҡвң— \"are protected\" вҶ’ вң“ \"are being protected\"пјҲжӯӨеҲ»жӯЈеңЁиў«дҝқжҠӨпјү\nв‘ўbeеҠЁиҜҚйҡҸдё»иҜӯпјҡThe antelopes ARE being protected. / The antelope IS being protected.\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘еңЁи§„еҲҷиЎЁдёӢж–№иЎҘе……пјҡ\n  вң— happen вҶ’ is being happened (й”ҷиҜҜпјҒ)\n  вң“ destroy вҶ’ is being destroyed (жӯЈзЎ®)\n  вң“ protect вҶ’ is being protected (жӯЈзЎ®)"},{"step":"дёүгҖҒPractice дё»еҠЁиҪ¬иў«еҠЁ+еЎ«з©ә","time":12,"content":"гҖҗPPT 04 дё»еҠЁиҪ¬иў«еҠЁз»ғд№ пјҲ5йўҳпјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Convert these active sentences to passive. Remember: 3 steps вҖ” в‘  find the object (it becomes the new subject) в‘Ў add am/is/are + being в‘ў change the main verb to V3.\"\n\n1. Illegal hunters are killing Tibetan antelopes for their wool.\n2. The government is building new nature reserves.\n3. Scientists are tracking the antelope population.\n4. Volunteers are cleaning up the habitat.\n5. Poachers are selling shahtoosh shawls online.\n\nв–І еӯҰз”ҹзӢ¬з«Ӣе®ҢжҲҗ5еҲҶй’ҹгҖӮж•ҷеёҲе·Ўи§ҶгҖӮ\n\nгҖҗйў„и®ҫзӯ”жЎҲгҖ‘\n1. Tibetan antelopes ARE BEING KILLED for their wool (by illegal hunters).\n2. New nature reserves ARE BEING BUILT (by the government).\n3. The antelope population IS BEING TRACKED (by scientists).\n4. The habitat IS BEING CLEANED UP (by volunteers).\n5. Shahtoosh shawls ARE BEING SOLD online (by poachers).\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘в‘ з¬¬3йўҳ population жҳҜеҚ•ж•° вҶ’ IS being trackedпјҲеӯҰз”ҹе®№жҳ“еҶҷAREпјүпјӣв‘Ўз¬¬4йўҳ clean up вҶ’ cleaned upпјҲupжҳҜе°Ҹе“ҒиҜҚпјҢи·ҹиҝҮеҺ»еҲҶиҜҚдёҖиө·ж”ҫпјүпјӣв‘ўз¬¬5йўҳ sell вҶ’ soldпјҲдёҚи§„еҲҷеҸҳеҢ–пјүгҖӮ\n\nгҖҗPPT 05 еЎ«з©әз»ғд№ пјҲ5йўҳпјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Now fill in the blanks with the present continuous passive form.\"\n\n1. The antelopes ______ (protect) by rangers in the reserve.\n2. Their habitat ______ (destroy) by human activities.\n3. New laws ______ (make) to stop illegal hunting.\n4. The population ______ (monitor) by scientists.\n5. Shahtoosh shawls ______ (sell) in the black market.\n\nгҖҗйў„и®ҫзӯ”жЎҲгҖ‘\n1. are being protected\n2. is being destroyed\n3. are being made\n4. is being monitored\n5. are being sold\n\nгҖҗе·®ејӮеҢ–жҸҗзӨәгҖ‘AзҸӯеҸҜеўһеҠ еҸЈиҜӯз»ғд№ пјҡз”ЁзҺ°еңЁиҝӣиЎҢж—¶иў«еҠЁжҸҸиҝ°дёҖдёӘжӯЈеңЁиҝӣиЎҢзҡ„зҺҜдҝқиЎҢеҠЁгҖӮBзҸӯйҮҚзӮ№зЎ®дҝқbeingдёҚйҒ—жјҸгҖӮ"},{"step":"еӣӣгҖҒProduction зңӢеӣҫйҖ еҸҘ+зә й”ҷ","time":10,"content":"гҖҗPPT 06 зңӢеӣҫйҖ еҸҘпјҲ4еј еҠЁзү©дҝқжҠӨеӣҫзүҮпјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Look at these pictures. For each one, write ONE sentence using the present continuous passive voice.\"\n\n1. еӣҫзүҮпјҡе·ҘдҪңдәәе‘ҳеңЁж•‘еҠ©еҸ—дјӨзҡ„зҶҠзҢ« вҶ’ (rescue)\n2. еӣҫзүҮпјҡжҺЁеңҹжңәеңЁз ҙеқҸжЈ®жһ— вҶ’ (destroy)\n3. еӣҫзүҮпјҡз§‘еӯҰе®¶еңЁиҝҪиёӘйӣӘиұ№ вҶ’ (track)\n4. еӣҫзүҮпјҡеҝ—ж„ҝиҖ…еңЁз§ҚжӨҚзҸҠз‘ҡ вҶ’ (plant)\n\nгҖҗйў„и®ҫеӣһзӯ”зӨәдҫӢгҖ‘\n1. \"An injured panda is being rescued by workers.\"\n2. \"The forest is being destroyed by bulldozers.\"\n3. \"Snow leopards are being tracked by scientists.\"\n4. \"Coral is being planted by volunteers.\"\n\nгҖҗPPT 07 зә й”ҷз»ғд№ пјҲ3дёӘй”ҷиҜҜеҸҘеӯҗпјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Find and correct the mistakes in these sentences.\"\n\n1. вң— \"The antelopes is being protect in the reserve.\"\n2. вң— \"New laws are made to protect wildlife.\" (should be continuous)\n3. вң— \"The accident is being happened right now.\"\n\nгҖҗйў„и®ҫзӯ”жЎҲгҖ‘\n1. вҶ’ \"The antelopes ARE being PROTECTED in the reserve.\"пјҲisвҶ’are, protectвҶ’protectedпјү\n2. вҶ’ \"New laws are BEING made to protect wildlife.\"пјҲзјәе°‘beingпјҢдёҖиҲ¬зҺ°еңЁвҶ’зҺ°еңЁиҝӣиЎҢпјү\n3. вҶ’ \"The accident IS happening right now.\"пјҲhappenдёҚиғҪз”Ёиў«еҠЁпјҢж”№дёәдё»еҠЁпјү\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘з¬¬3йўҳжҳҜз»Ҹе…ёйҷ·йҳұвҖ”вҖ”еӯҰз”ҹзңӢеҲ°\"being\"е°ұд»ҘдёәдёҖе®ҡжҳҜиў«еҠЁпјҢдҪҶhappenжҳҜдёҚеҸҠзү©еҠЁиҜҚпјҢж°ёиҝңжІЎжңүиў«еҠЁеҪўејҸгҖӮ\n\n arts of these posters.\"\n\nгҖҗPPT 03 жө·жҠҘз»“жһ„еӣҫи§ЈвҖ”вҖ”дә”иҰҒзҙ йҮ‘еӯ—еЎ”гҖ‘\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\n- \"Headline: 'SAVE THE ANTELOPE!'\"пјҲж•ҷеёҲпјҡ\"Short, urgent, emotional.\"пјү\n- \"Image description: the antelope on the plateau\"пјҲж•ҷеёҲпјҡ\"Creates emotional connection.\"пјү\n- \"Problem: numbers and facts\"пјҲж•ҷеёҲпјҡ\"Data is power вҖ” 'One shawl = 5 dead antelopes.'\"пјү\n- \"Solution: what's being done\"пјҲж•ҷеёҲпјҡ\"Notice the passive voice вҖ” 'reserves are being established.' This is yesterday's grammar!\"пјү\n- \"Call to action: 'Don't buy!'\"пјҲж•ҷеёҲпјҡ\"Imperative sentences вҖ” direct commands.\"пјү\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘ж•ҷеёҲеңЁй»‘жқҝдёӯеӨ®з”»еҮәдә”иҰҒзҙ йҮ‘еӯ—еЎ”пјҡ\n  HeadlineпјҲжҠ“зңјзҗғпјү\n  ImageпјҲжғ…ж„ҹиҝһжҺҘпјү\n  ProblemпјҲж•°жҚ®еҶІеҮ»пјү\n  SolutionпјҲжӯЈеңЁиЎҢеҠЁвҖ”вҖ”з”Ёиў«еҠЁиҜӯжҖҒпјү\n  Call to ActionпјҲзҘҲдҪҝеҸҘиЎҢеҠЁе‘јеҗҒпјү\n\nгҖҗPPT 04 ж ҮйўҳеҶҷдҪңжҠҖе·§гҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"The headline is the most important part. If it doesn't grab attention, nobody reads the rest. Three effective patterns:\"\n\nв‘ ж•°еӯ—еҶІеҮ»еһӢпјҡ\"500 Left. Act Now.\" / \"1 Shawl = 5 Dead Antelopes.\"\nв‘Ўжғ…ж„ҹе‘је”ӨеһӢпјҡ\"Save Their Home.\" / \"Don't Let Them Disappear.\"\nв‘ўз–‘й—®еһӢпјҡ\"Will You Be the Last to See Them?\" / \"What If They're Gone?\"\n\nгҖҗеҜ№жҜ”зӨәдҫӢгҖ‘\nвң— \"The Tibetan Antelope Is Endangered\" пјҲеӨӘеӯҰжңҜпјҢеғҸи®әж–Үж Үйўҳпјү\nвң“ \"500 LEFT. ACT NOW.\" пјҲзҹӯгҖҒжҖҘгҖҒжңүж•°еӯ—пјү"},{"step":"дәҢгҖҒеҶҷдҪңд»»еҠЎеёғзҪ®+иҜқйўҳйҖүжӢ©","time":5,"content":"гҖҗPPT 06 еҶҷдҪңд»»еҠЎ+еҠЁзү©йҖүжӢ©гҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Now it's your turn. Choose ONE endangered animal and create a poster text (80-100 words). Choose from:\"\n\nв–І PPTеұ•зӨә5з§Қжҝ’еҚұеҠЁзү©пјҲй…ҚеӣҫзүҮ+з®ҖиҰҒж•°жҚ®пјүпјҡ\n1. йӣӘиұ№ Snow Leopard вҖ” \x3c4,000 left, habitat loss, hunted for fur\n2. з©ҝеұұз”І Pangolin вҖ” most trafficked mammal, scales used in traditional medicine\n3. жұҹиұҡ Yangtze Finless Porpoise вҖ” \x3c1,000 left, river pollution\n4. з»ҝеӯ”йӣҖ Green Peacock вҖ” \x3c20,000 left, habitat destruction\n5. и—ҸзҫҡзҫҠ Tibetan Antelope вҖ” recovering, but still threatened\n\nв–І PPTеҗҢж—¶еұ•зӨәж ёеҝғиҜҚжұҮеә“пјҡ\n  endangered, extinct, habitat, illegal, hunter, protect, reserve, recover, threat, urgent, shocking, heartbreaking, disappear, survive\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Take 1 minute to choose your animal. Write down 3 facts about it on your task sheet.\"\n\nгҖҗе·®ејӮеҢ–жҸҗзӨәгҖ‘AзҸӯеҸҜиҮӘйҖүеҠЁзү©е№¶зӢ¬з«Ӣе®ҢжҲҗпјӣBзҸӯе»әи®®йҖүPPTдёҠжңүж•°жҚ®жҸҗзӨәзҡ„еҠЁзү©пјҢж•ҷеёҲжҸҗдҫӣ3дёӘдәӢе®һжЎҶжһ¶гҖӮ"},{"step":"дёүгҖҒжЁЎжқҝиҫ…еҠ©+йҷҗж—¶еҶҷдҪң","time":15,"content":"гҖҗPPT 07 жө·жҠҘж–Үеӯ—жЁЎжқҝпјҲеЎ«з©әејҸжЎҶжһ¶пјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Here's a template. Use it if you need help. You have 12 minutes.\"\n\nв–І PPTеұ•зӨәжЁЎжқҝпјҡ\n\n[HEADLINE: 5-8 words, emotional or with numbers]\n  Example: __________ Left. Act Now.\n\n[IMAGE DESCRIPTION: 1-2 sentences describing what the reader sees]\n  Example: A [animal] is [action] in its [habitat].\n\n[THE PROBLEM: 2-3 sentences with numbers]\n  Example: Only [number] [animal]s remain. They are being [threatened by what]. Their habitat is being [destroyed how].\n\n[WHAT'S BEING DONE: 1-2 sentences, use passive voice]\n  Example: [Action] are being taken by [who]. [Reserves/Laws] are being [established/made].\n\n[CALL TO ACTION: 2-3 imperative sentences]\n  Example: Don't [action]! [Action] now! [Action] to [organization]!\n\nв–І и®Ўж—¶12еҲҶй’ҹгҖӮеӯҰз”ҹзӢ¬з«ӢеҶҷдҪңгҖӮ\n\nгҖҗж•ҷеёҲе·Ўи§ҶйҮҚзӮ№гҖ‘\nвҖў BзҸӯпјҡжЈҖжҹҘжҳҜеҗҰеҢ…еҗ«5иҰҒзҙ пјҢж ҮйўҳжҳҜеҗҰз®ҖзҹӯжңүеҠӣ\nвҖў AзҸӯпјҡжЈҖжҹҘжҳҜеҗҰдҪҝз”ЁдәҶзҺ°еңЁиҝӣиЎҢж—¶иў«еҠЁиҜӯжҖҒпјҢиЎҢеҠЁе‘јеҗҒжҳҜеҗҰе…·дҪ“\nвҖў е…ЁзҸӯпјҡжҸҗйҶ’еӯ—ж•°жҺ§еҲ¶пјҲ80-100иҜҚпјүпјҢжЈҖжҹҘзҘҲдҪҝеҸҘдҪҝз”Ё\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘е·Ўеңәеёёи§Ғй—®йўҳпјҡ\nв‘ ж ҮйўҳеҶҷжҲҗе®Ңж•ҙеҸҘеӯҗ вҶ’ ж”№дёәзҹӯиҜӯжҲ–зңҒз•Ҙдё»иҜӯ\nв‘Ўй—®йўҳжҸҸиҝ°жІЎжңүж•°еӯ— вҶ’ иЎҘе……е…·дҪ“ж•°еӯ—еўһејәиҜҙжңҚеҠӣ\nв‘ўиЎҢеҠЁе‘јеҗҒеӨӘз©әжіӣпјҲ\"Please protect animals.\"пјүвҶ’ е…·дҪ“еҢ–пјҲ\"Don't buy wildlife \nPPT 02пјҡJanзҡ„иҪ¬еҸҳеј§зәҝеӣҫпјҲеӣӣйҳ¶ж®өUеһӢеӣҫпјү\nPPT 03пјҡж ёеҝғиҜҚжұҮйў„ж•ҷеҚЎзүҮпјҲ10иҜҚпјҢй…Қжғ…еўғдҫӢеҸҘпјү\nPPT 04пјҡиҜҫж–Үз»“жһ„еӣҫпјҲPersonal Story вҶ’ Social Impactпјү\nPPT 05пјҡж—¶й—ҙзәҝ+жғ…ж„ҹзәҝеҸҢиҪҙиЎЁпјҲеӯҰз”ҹеЎ«еҶҷпјү\nPPT 06пјҡзІҫиҜ»й—®йўҳ4йҒ“пјҲеҗ«еҸӮиҖғзӯ”жЎҲпјү\nPPT 07пјҡдә’иҒ”зҪ‘еҲ©ејҠи®Ёи®әжЎҶжһ¶\nPPT 08пјҡи®Ёи®әиҜқйўҳ\"Has the internet made us stronger or more isolated?\"\nPPT 09пјҡдҪңдёҡеёғзҪ®йЎө\n\nгҖҗе®һзү©ж•ҷе…·гҖ‘\nвҖў иҜҫе Ӯд»»еҠЎеҚ•пјҲеҗ«иҪ¬еҸҳеј§зәҝеӣҫ+еҸҢиҪҙиЎЁ+зІҫиҜ»й—®йўҳпјү\nвҖў зәўи“қеҸҢиүІи®°еҸ·з¬”","process":[{"step":"дёҖгҖҒLead-in еҜје…ҘвҖ”вҖ”\"Your Internet Life in Numbers\"","time":5,"content":"гҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Good morning! Before we start, I want you to think about your internet life. Write down 3 numbers: в‘  How many hours per day do you spend online? в‘Ў How many apps do you use regularly? в‘ў How many online friends have you never met in person? Don't show anyone вҖ” just write.\"\n\nв–І еӯҰз”ҹеҶҷ30з§’гҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Now, turn to your partner. Share ONE number. Partner, your response: 'That's more/less than I expected.' Go!\"\n\nв–І еӯҰз”ҹеҲҶдә«1еҲҶй’ҹгҖӮж•ҷеёҲе·Ўи§ҶгҖӮ\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\n- \"I spend 6 hours online.\" (ж•ҷеёҲпјҡ\"That's a lot! What do you do?\"пјү\n- \"I have 200 online friends I've never met.\" (ж•ҷеёҲпјҡ\"200! Do you feel connected or lonely?\"пјү\n- BзҸӯеҸҜиғҪдёҚж„ҝж„ҸеҲҶдә«вҖ”вҖ”ж•ҷеёҲеҸҜд»ҘиҮӘе·ұе…ҲеҲҶдә«пјҡ\"I spend about 4 hours online every day. I have about 50 online friends.\"\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Today's text is about a woman named Jan. Her internet story is different from yours вҖ” because for her, the internet was not just entertainment. It saved her life. The title is 'Stronger Together: How We Have Changed by the Internet.' As you read, track Jan's transformation: What was she BEFORE the internet? What happened? What did she BECOME?\"\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘ж•ҷеёҲеңЁй»‘жқҝжӯЈдёӯеҶҷдёӢпјҡStronger Together + з”»дёҖдёӘUеһӢеј§зәҝз¬ҰеҸ·"},{"step":"дәҢгҖҒPre-Reading иҜҚжұҮйў„ж•ҷ+йў„жөӢ","time":5,"content":"гҖҗPPT 03 ж ёеҝғиҜҚжұҮеҚЎзүҮгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"10 key words. These will help you understand Jan's story.\"\n\n| иҜҚжұҮ | дёӯж–Ү | иҜҫж–ҮиҜӯеўғдҫӢеҸҘ |\n|------|------|-------------|\n| benefit | еҸ—зӣҠ | She benefited from online communities. |\n| access | жҺҘе…Ҙ/иҺ·еҸ– | She got access to online courses. |\n| stuck | еӣ°дҪҸзҡ„ | She was stuck at home with illness. |\n| isolated | еӯӨз«Ӣзҡ„ | She felt isolated from the world. |\n| community | зӨҫеҢә | She joined an online community. |\n| convenient | ж–№дҫҝзҡ„ | The internet made learning convenient. |\n| inspire | жҝҖеҠұ | Her story inspired many people. |\n| remove | ж¶ҲйҷӨ | The internet removed the distance. |\n| distance | и·қзҰ» | Technology reduced the distance between people. |\n| achievement | жҲҗе°ұ | Her greatest achievement was helping others. |\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘ж•ҷеёҲеңЁй»‘жқҝе·Ұж ҸеҶҷдёӢж ёеҝғиҜҚжұҮпјҢдҝқз•ҷе…ЁзЁӢгҖӮ\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘в‘ isolated /ЛҲaЙӘsЙҷleЙӘtЙӘd/ жіЁж„ҸйҮҚйҹіеңЁз¬¬дёҖйҹіиҠӮпјӣв‘Ўaccess /ЛҲГҰkses/ еҸҢsеҸ‘йҹі/s/дёҚжҳҜ/z/пјӣв‘ўconvenient /kЙҷnЛҲviЛҗniЙҷnt/ еӯҰз”ҹе®№жҳ“йҮҚйҹій”ҷж”ҫгҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Based on these words, predict: What happened to Jan? Why did the internet change her life?\"\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\n- \"Maybe she was sick and couldn't go out. The internet helped her connect.\" (ж•ҷеёҲпјҡ\"Good prediction!\"пјү\n- \"She was lonely and found friends online.\" (ж•ҷеёҲпјҡ\"Close! But it's more than friends.\"пјү"},{"step":"дёүгҖҒWhile-Reading иҪ¬еҸҳеј§зәҝеҲҶжһҗ","time":20,"content":"гҖҗPPT 02 Janзҡ„иҪ¬еҸҳеј§зәҝеӣҫпјҲеӣӣйҳ¶ж®өUеһӢеӣҫпјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Open your textbook to page 28. Read for 5 minutes. As you read, fill in the U-shape transformation chart on your task sheet.\"\n\nв–І PPTеұ•зӨәеј§зәҝжЎҶжһ¶пјҡ\n\n| йҳ¶ж®ө | Janзҡ„зҠ¶жҖҒ | е…ій”®дәӢд»¶ | жғ…ж„ҹ |\n|------|----------|---------|------|\n| 1. ISOLATED | She was stuck at home because ______ | She lost her job due to ______ | ______ |\n| 2. CONNECTED | She discovered ______ | She joined ______ | ______ |\n| 3. EMPOWERED | She started ______ | She created ______ | ______ |\n| 4. INSPIRING | She helped ______ | She inspired ______ | ______ |\n\nв–І еӯҰз”ҹйҳ…иҜ»5еҲҶй’ҹпјҢеЎ«еҶҷиЎЁж јгҖӮж•ҷеёҲе·Ўи§ҶгҖӮ\n\nгҖҗйў„и®ҫзӯ”жЎҲгҖ‘\n1. ISOLATED: illness / she was too sick to leave home; she lost her job due to a serious illness; lonely, anxious, hopeless\n2. CONNECTED: the internet / online communities; she joined an online learning group; curious, hopeful\n3. EMPOWERED: to help others; she created a website to help older people use the internet; confident, purposeful\n4. INSPIRING: other older people learn to use the internet; many people to overcome isolation; proud, fulfilled\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘ж•ҷеёҲеңЁй»‘жқҝдёӯеӨ®з”»еҮәUеһӢеј§зәҝпјҢж ҮжіЁеӣӣйҳ¶ж®өпјҢиҜ·еӯҰз”ҹдёҠжқҘеЎ«еҶҷе…ій”®иҜҚгҖӮ\n\nгҖҗPPT 06 зІҫиҜ»й—®йўҳ4йҒ“гҖ‘\n\nQ1: What problem did Jan face before she discovered the internet? (Para 1-2)\nQ2: How did the internet change her life? Give 2 specific examples. (Para 3)\nQ3: What did she do to help others? (Para 4)\nQ4: What does the title \"Stronger Together\" mean? (Para 5-6)\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\nA1: \"She was seriously ill, lost her job, and was stuck at home. She felt isolated and lonely.\" (ж•ҷеёҲпјҡ\"Physical + emotional isolation.\"пјү\nA2: \"She joined online communities and took online courses. She met people who understood her situation.\" (ж•ҷеёҲпјҡ\"Connection + learning вҖ” two benefits.\"пјү\nA3: \"She created a website to help older people learn to use the internet, so they wouldn't feel isolated like she did.\" (ж•ҷеёҲпјҡ\"She turned her pain into purpose.\"пјү\nA4: \"It means that when people connect through the internet, they become stronger than when they are alone. The internet removes distance and creates communities.\" (ж•ҷеёҲпјҡ\"The title IS the thesis.\"пјү\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘Q2еӯҰз”ҹе®№жҳ“еҸӘзӯ”дёҖдёӘж–№йқўпјҲеҸӘиҜҙ\"дёҠзҪ‘еӯҰд№ \"жҲ–еҸӘиҜҙ\"дәӨжңӢеҸӢ\"пјүпјҢйңҖеј•еҜјжүҫеҮәдёӨдёӘе…·дҪ“дҫӢеӯҗгҖӮ\n\nгҖҗе·®ејӮеҢ–жҸҗзӨәгҖ‘AзҸӯеҸҜиҝҪеҠ и®Ёи®әпјҡ\"Was the internet the ONLY reason Jan recovered? What other factors helped?\" BзҸӯзЎ®дҝқиғҪжүҫеҲ°еҺҹж–Үзӯ”жЎҲгҖӮ"},{"step":"еӣӣгҖҒPost-Reading и®Ёи®әвҖ”вҖ”Stronger or More Isolated?","time":7,"content":"гҖҗPPT 08 и®Ёи®әиҜқйўҳгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Jan's story is inspiring. But let's think critically. The title says 'Stronger Together.' But has the internet REALLY made us stronger? Or has it also made us MORE isolated? In groups of 4, discuss both sides.\"\n\nв–І PPTеұ•зӨәи®Ёи®әжЎҶжһ¶пјҡ\n\n| The internet makes us STRONGER | The internet makes us MORE ISOLATED |\n|---|---|\n| вҖў Connects people across distances | вҖў Replaces face-to-face interaction |\n| вҖў Provides access to knowledge | вҖў Creates information overload |\n| вҖў Builds communities | вҖў Enables cyberbullying |\n| вҖў Empowers individuals | вҖў Reduces privacy |\n\nв–І е°Ҹз»„и®Ёи®ә3еҲҶй’ҹгҖӮж•ҷеёҲе·Ўи§ҶгҖӮ\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\n- \"Stronger вҖ” like Jan, the internet gave her a second chance at life.\" (ж•ҷеёҲпјҡ\"Good вҖ” personal evidence.\"пјү\n- \"More isolated вҖ” people stare at phones instead of talking to family.\" (ж•ҷеёҲпјҡ\"Also true вҖ” physical presence replaced by screens.\"пјү\n- \"Both вҖ” it depends on HOW we use it.\" (ж•ҷеёҲпјҡ\"This is the most mature answer. The internet is a tool вҖ” its effect depends on the user.\"пјү\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Excellent discussion. Jan's story shows the POSITIVE side вҖ” the internet CAN save lives. But we must also be aware of the risks. The key is: use the internet as a TOOL to connect, not as a SUBSTITUTE for real life. This is the deeper message of the text.\""},{"step":"дә”гҖҒSummary + Homework жҖ»з»“+дҪңдёҡ","time":3,"content":"гҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Let's summarize. Today we read about Jan's transformation: Isolated вҶ’ Connected вҶ’ Empowered вҶ’ Inspiring. The internet removed distance, built community, and gave her purpose. But remember: the internet is a tool вҖ” it can connect OR isolate, depending on how we use it.\"\n\nв–І ж•ҷеёҲжҢҮеҗ‘жқҝд№ҰUеһӢеј§зәҝпјҢеёҰеӯҰз”ҹеӣһйЎҫеӣӣйҳ¶ж®өгҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Homework: Task 1 вҖ” vocabulary exercises. Task 2 вҖ” write a 50-word paragraph: 'Has the internet made YOUR life better or worse? Give one example.' Use at least 3 key words from today.\"\n\nв–І PPT 09 дҪңдёҡеёғзҪ®йЎөгҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Next class: grammar! We'll learn the present perfect passive вҖ” 'The internet HAS CHANGED our lives' becomes 'Our lives HAVE BEEN CHANGED by the internet.' Can you see the pattern? See you next time!\"\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘иҜҫзЁӢз»“жқҹй»‘жқҝзҠ¶жҖҒпјҡе·Ұж Ҹ=ж ёеҝғиҜҚжұҮиЎЁпјҢдёӯеӨ®=UеһӢиҪ¬еҸҳеј§зәҝпјҲеӣӣйҳ¶ж®өпјүпјҢеҸіж Ҹ=и®Ёи®әжЎҶжһ¶иЎЁгҖӮ"}],"blackboard":"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ              Stronger Together                                в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\nв”Ӯ  KEY WORDS   в”Ӯ  JAN'S TRANSFORMATION  в”Ӯ   DISCUSSION          в”Ӯ\nв”Ӯ              в”Ӯ                        в”Ӯ                       в”Ӯ\nв”Ӯ benefit еҸ—зӣҠ в”Ӯ  ISOLATED              в”Ӯ  Stronger?            в”Ӯ\nв”Ӯ access жҺҘе…Ҙ  в”Ӯ  (sick, lonely)        в”Ӯ  вҖў Connect            в”Ӯ\nв”Ӯ stuck еӣ°дҪҸ   в”Ӯ     вҶ“                  в”Ӯ  вҖў Learn              в”Ӯ\nв”Ӯ isolatedеӯӨз«Ӣ в”Ӯ  CONNECTED             в”Ӯ  вҖў Empower            в”Ӯ\nв”Ӯ communityзӨҫеҢәв”Ӯ  (found online groups) в”Ӯ                       в”Ӯ\nв”Ӯ convenientж–№дҫҝв”Ӯ    вҶ“                  в”Ӯ  More Isolated?       в”Ӯ\nв”Ӯ inspire жҝҖеҠұ в”Ӯ  EMPOWERED             в”Ӯ  вҖў Less face-to-face  в”Ӯ\nв”Ӯ remove ж¶ҲйҷӨ  в”Ӯ  (created a website)   в”Ӯ  вҖў Information overloadв”Ӯ\nв”Ӯ distance и ҳпјү\nPPT 07пјҡзңӢеӣҫйҖ еҸҘпјҲ3еј дә’иҒ”зҪ‘дё»йўҳеӣҫзүҮпјү\nPPT 08пјҡдҪңдёҡеёғзҪ®йЎө\n\nгҖҗе®һзү©ж•ҷе…·гҖ‘\nвҖў иҜӯжі•з»ғд№ еҚ•пјҲжҜҸдәә1д»Ҫпјү\nвҖў зәў/и“қ/з»ҝдёүиүІзІүз¬”пјҲзәў=have/hasпјҢи“қ=beenпјҢз»ҝ=V3пјү","process":[{"step":"дёҖгҖҒDiscovery дёүз§Қиў«еҠЁиҜӯжҖҒеҜ№жҜ”","time":10,"content":"гҖҗPPT 02 дёүз§Қиў«еҠЁиҜӯжҖҒеҜ№жҜ”иЎЁгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Last unit we learned the present continuous passive: 'Antelopes ARE BEING PROTECTED.' Today we learn a new one. Compare these three sentences about the SAME website:\"\n\n| ж—¶жҖҒ | дё»еҠЁ | иў«еҠЁ | еҗ«д№ү |\n|------|------|------|------|\n| дёҖиҲ¬иҝҮеҺ»ж—¶ | They updated the website yesterday. | The website WAS UPDATED yesterday. | иҝҮеҺ»зҡ„дәӢе®һпјҢдёҚз®ЎзҺ°еңЁ |\n| зҺ°еңЁе®ҢжҲҗж—¶ | They HAVE UPDATED the website. | The website HAS BEEN UPDATED. | е·Іжӣҙж–°пјҢзҺ°еңЁеҸҜз”ЁдәҶ |\n| зҺ°еңЁиҝӣиЎҢж—¶ | They ARE UPDATING the website. | The website IS BEING UPDATED. | жӯЈеңЁжӣҙж–°дёӯ |\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Focus on the MIDDLE row вҖ” present perfect passive. What's the form?\"\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\n- \"has + been + updated\"пјҲж•ҷеёҲпјҡ\"Exactly! have/has + been + V3.\"пјү\n- \"It's different from 'being' вҖ” it uses 'been.'\"пјҲж•ҷеёҲпјҡ\"Great observation! been vs. being вҖ” this is the key difference.\"пјү\n\nгҖҗжқҝд№Ұж—¶жңәвҖ”вҖ”дёүиүІзІүз¬”жһ„е»әеҜ№жҜ”иЎЁгҖ‘\n\nзәўиүІ=have/has  и“қиүІ=been/being  з»ҝиүІ=V3\n\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ        THREE PASSIVE FORMS COMPARISON            в”Ӯ\nв”Ӯ                                                  в”Ӯ\nв”Ӯ  дёҖиҲ¬иҝҮеҺ»пјҡwas/were + V3        (was done)       в”Ӯ\nв”Ӯ  зҺ°еңЁе®ҢжҲҗпјҡhave/has + been + V3 (has been done)  в”Ӯ\nв”Ӯ  зҺ°еңЁиҝӣиЎҢпјҡam/is/are + being + V3 (is being done)в”Ӯ\nв”Ӯ                                                  в”Ӯ\nв”Ӯ  вҡ  been (е®ҢжҲҗж—¶) вү  being (иҝӣиЎҢж—¶)               в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Three colors: RED for have/has (changes with subject), BLUE for been (this is what makes it PERFECT tense вҖ” not 'being'!), GREEN for V3. The key difference from last unit: BEEN replaces BEING.\""},{"step":"дәҢгҖҒRule Formation и§„еҲҷеҪ’зәі+иҫЁжһҗ","time":8,"content":"гҖҗPPT 03 и§„еҲҷеҪ’зәіиЎЁгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"When do we use the present perfect passive? Two situations:\"\n\nв‘  е·Іе®ҢжҲҗзҡ„еҠЁдҪңпјҢеҜ№зҺ°еңЁжңүеҪұе“Қпјҡ\n  \"The app HAS BEEN DOWNLOADED by millions.\" (It's popular NOW.)\n  \"Her blog HAS BEEN SHARED across 50 countries.\" (It's famous NOW.)\n\nв‘Ў з»ҹи®Ўж•°жҚ®/жҲҗе°ұпјҲд»ҺиҝҮеҺ»еҲ°зҺ°еңЁпјүпјҡ\n  \"Over 1,000 courses HAVE BEEN ADDED to the platform.\"\n  \"Millions of people HAVE BEEN HELPED by online communities.\"\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Now, the most important comparison: present perfect passive vs. past simple passive. Look:\"\n\n  Past simple passive: \"The website WAS updated yesterday.\" вҶ’ еҸӘи®ІжҳЁеӨ©зҡ„дәӢ\n  Present perfect passive: \"The website HAS BEEN updated.\" вҶ’ е·Іжӣҙж–°пјҢзҺ°еңЁеҸҜд»Ҙз”ЁдәҶ\n\n  гҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘еҢәеҲҶе…ій”®пјҡжңүжІЎжңү\"еҜ№зҺ°еңЁзҡ„еҪұе“Қ\"гҖӮжңүвҶ’зҺ°еңЁе®ҢжҲҗж—¶пјӣжІЎжңүвҶ’дёҖиҲ¬иҝҮеҺ»ж—¶гҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Quick check! Which one? 'The internet ___ (invent) in 1969.' Think: is it about a past fact, or about the impact on now?\"\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\n- \"was invented\" (ж•ҷеёҲпјҡ\"Correct! 1969 is a past time вҖ” past simple. We're stating a fact, not talking about present impact.\"пјү\n- AзҸӯеҸҜиғҪжңүеӯҰз”ҹиҜҙ\"has been invented\" вҶ’ ж•ҷеёҲи§ЈйҮҠпјҡinventжҳҜдёҖж¬ЎжҖ§еҺҶеҸІдәӢд»¶пјҢз”ЁдёҖиҲ¬иҝҮеҺ»ж—¶гҖӮ\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘еңЁеҜ№жҜ”иЎЁдёӢж–№иЎҘе……пјҡ\n  вң— \"The internet has been invented in 1969.\" (й”ҷиҜҜвҖ”вҖ”жңүе…·дҪ“иҝҮеҺ»ж—¶й—ҙз”ЁдёҖиҲ¬иҝҮеҺ»)\n  вң“ \"The internet was invented in 1969.\" (жӯЈзЎ®)\n  вң“ \"The internet has changed our lives.\" (жӯЈзЎ®вҖ”вҖ”ејәи°ғеҜ№зҺ°еңЁзҡ„еҪұе“Қ)"},{"step":"дёүгҖҒPractice иҪ¬жҚў+иҫЁжһҗеЎ«з©ә","time":12,"content":"гҖҗPPT 04 иҪ¬жҚўз»ғд№ пјҲ5йўҳпјҢдё»еҠЁиҪ¬иў«еҠЁпјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Convert these active sentences to present perfect passive.\"\n\n1. The internet has changed Jan's life.\n2. Online communities have helped millions of people.\n3. Someone has updated the website.\n4. The company has added new safety features.\n5. People have shared Jan's story across the world.\n\nв–І еӯҰз”ҹзӢ¬з«Ӣе®ҢжҲҗ4еҲҶй’ҹгҖӮ\n\nгҖҗйў„и®ҫзӯ”жЎҲгҖ‘\n1. Jan's life HAS BEEN CHANGED by the internet.\n2. Millions of people HAVE BEEN HELPED by online communities.\n3. The website HAS BEEN UPDATED.\n4. New safety features HAVE BEEN ADDED by the company.\n5. Jan's story HAS BEEN SHARED across the world.\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘в‘ з¬¬1йўҳ lifeжҳҜеҚ•ж•°вҶ’HAS been changedпјӣв‘Ўз¬¬2йўҳ millionsжҳҜеӨҚж•°вҶ’HAVE been helpedпјӣв‘ўbeenдёҚиҰҒеҶҷжҲҗbeingпјҒ\n\nгҖҗPPT 05 иҫЁжһҗеЎ«з©әпјҲ5йўҳпјҢйҖүжӯЈзЎ®ж—¶жҖҒпјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Choose the correct form: past simple passive, present perfect passive, or present continuous passive.\"\n\n1. The app ______ (download) by 5 million users so far. вҶ’ has been downloaded (so far=еҲ°зҺ°еңЁ)\n2. The website ______ (hack) last night. вҶ’ was hacked (last night=е…·дҪ“иҝҮеҺ»ж—¶й—ҙ)\n3. New features ______ (add) to the app right now. вҶ’ are being added (right now=жӯӨеҲ»)\n4. Jan's story ______ (share) by people in 50 countries. вҶ’ has been shared (by people in 50 countries=еҲ°зӣ®еүҚдёәжӯў)\n5. The old website ______ (take down) two years ago. вҶ’ was taken down (two years ago=е…·дҪ“иҝҮеҺ»ж—¶й—ҙ)\n\nгҖҗе·®ејӮеҢ–жҸҗзӨәгҖ‘AзҸӯеҸҜеўһеҠ иҮӘз”ұйҖ еҸҘпјӣBзҸӯйҮҚзӮ№иҫЁжһҗ\"жңүе…·дҪ“иҝҮеҺ»ж—¶й—ҙвҶ’дёҖиҲ¬иҝҮеҺ»\"vs.\"жІЎжңүе…·дҪ“ж—¶й—ҙ+еҪұе“ҚзҺ°еңЁвҶ’зҺ°еңЁе®ҢжҲҗ\"гҖӮ"},{"step":"еӣӣгҖҒProduction иҜҫж–ҮиҜӯеўғ+зңӢеӣҫйҖ еҸҘ","time":7,"content":"гҖҗPPT 06 иҜҫж–ҮиҜӯеўғеЎ«з©әпјҲ5йўҳпјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Complete these sentences from the text context using present perfect passive.\"\n\n1. Jan's life ______ (change) by the internet.\n2. Many older people ______ (help) by her website.\n3. Thousands of online courses ______ (create) for people stuck at home.\n4. The distance between people ______ (remove) by technology.\n5. Jan's story ______ (inspire) many to help others.\n\nгҖҗйў„и®ҫзӯ”жЎҲгҖ‘\n1. has been changed  2. have been helped  3. have been created  4. has been removed  5. has inspired (жіЁж„ҸпјҡinspireжӯӨеӨ„жҳҜдё»еҠЁпјҢдёҚжҳҜиў«еҠЁпјҒJan's story inspires people вҶ’ дё»еҠЁгҖӮжӯӨйўҳдёәйҷ·йҳұйўҳпјҒ)\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘з¬¬5йўҳжҳҜйҷ·йҳұпјҡдёҚжҳҜжүҖжңүеҸҘеӯҗйғҪиҰҒз”Ёиў«еҠЁпјҒ\"Jan's story\"жҳҜinspireзҡ„жү§иЎҢиҖ…пјҲдё»иҜӯпјүпјҢдёҚжҳҜжүҝеҸ—иҖ…гҖӮеӯҰз”ҹзңӢеҲ°\"present perfect\"е°ұд»ҘдёәдёҖе®ҡиҰҒиў«еҠЁпјҢдҪҶpresent perfect activeд№ҹжҳҜжӯЈзЎ®зҡ„гҖӮhas inspiredпјҲдё»еҠЁпјүвү  has been inspiredпјҲиў«еҠЁпјҢж„ҸжҖқжҳҜ\"иў«жҝҖеҠұ\"пјүгҖӮ\n\nгҖҗPPT 07 зңӢеӣҫйҖ еҸҘпјҲ3еј дә’иҒ”зҪ‘дё»йўҳеӣҫзүҮпјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Look at these pictures. Write one sentence for each using present perfect passive.\"\n\n1. еӣҫзүҮпјҡappдёӢиҪҪйҮҸзӘҒз ҙзҷҫдёҮ вҶ’ (download)\n2. еӣҫзүҮпјҡзҪ‘з«ҷжӯЈеңЁиҝӣиЎҢз»ҙжҠӨ вҶ’ (update вҖ” жіЁж„Ҹж—¶жҖҒпјҒ)\n3. еӣҫзүҮпјҡзҪ‘з»ңе®үе…Ёзі»з»ҹе·Іе®үиЈ… вҶ’ (install)\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\n1. \"The app has been downloaded over one million times.\"\n2. \"The website is being updated.\" (жіЁж„ҸпјҡжӯЈеңЁжӣҙж–°вҶ’зҺ°еңЁиҝӣиЎҢж—¶иў«еҠЁпјҢдёҚжҳҜзҺ°еңЁе®ҢжҲҗж—¶пјҒ)\n3. \"The security system has been installed.\"\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘е°Ҷз¬¬2йўҳзҡ„йҷ·йҳұеҶҷеңЁй»‘жқҝеҸідёӢи§’пјҡ\"жӯЈеңЁвҶ’beingпјӣе·Іе®ҢжҲҗвҶ’been\"гҖӮ"},{"step":"дә”гҖҒSummary + Homework жҖ»з»“+дҪңдёҡ","time":3,"content":"гҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Today we learned the present perfect passive: have/has + been + V3. Key points: в‘  been NOT being; в‘Ў use it when the action is completed AND affects the present; в‘ў if there's a specific past time (yesterday, in 1969), use past simple passive instead. Compare three forms: was done / has been done / is being d eminder. Notice the present perfect passive: 'has changed... has also created.'\" (ж•ҷеёҲпјҡ\"Yes! Grammar from last lesson!\"пјү\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘ж•ҷеёҲеңЁй»‘жқҝдёӯеӨ®з”»еҮәдә”йғЁеҲҶжөҒзЁӢеӣҫпјҡ\n  Title вҶ’ Hook вҶ’ Experience вҶ’ Advice вҶ’ Conclusion\n\nгҖҗPPT 04 иҜӯж°”еҜ№жҜ”вҖ”вҖ”жӯЈејҸvs.еҚҡе®ўvs.йҡҸж„ҸгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"A blog post has a SPECIAL tone вҖ” not too formal, not too casual. Compare:\"\n\n| еӨӘжӯЈејҸ(вң—) | еҚҡе®ўиҜӯж°”(вң“) | еӨӘйҡҸж„Ҹ(вң—) |\n|----------|-----------|----------|\n| It is recommended that users employ complex passwords. | Use strong passwords вҖ” mix letters, numbers, and symbols. | lol just use a hard password tbh |\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"The MIDDLE one is right for a blog. It uses imperative sentences ('Use strong passwords'), dashes for emphasis, and specific details. It sounds like a smart friend giving advice.\""},{"step":"дәҢгҖҒеҶҷдҪңд»»еҠЎеёғзҪ®+иҜқйўҳйҖүжӢ©","time":5,"content":"гҖҗPPT 06 еҶҷдҪңд»»еҠЎ+иҜқйўҳйҖүжӢ©гҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Your task: write a 120-word blog post about an online safety topic. Choose ONE:\"\n\nв–І PPTеұ•зӨәиҜқйўҳпјҡ\n1. Password Safety вҖ” еҜҶз Ғе®үе…ЁпјҲеҰӮдҪ•и®ҫзҪ®ејәеҜҶз Ғпјү\n2. Information Privacy вҖ” дҝЎжҒҜйҡҗз§ҒпјҲдҝқжҠӨдёӘдәәдҝЎжҒҜпјү\n3. Cyberbullying вҖ” зҪ‘з»ңж¬әеҮҢпјҲеҰӮдҪ•еә”еҜ№пјү\n4. Screen Time вҖ” еұҸе№•ж—¶й—ҙпјҲеҰӮдҪ•жҺ§еҲ¶дёҠзҪ‘ж—¶й—ҙпјү\n5. Fake News вҖ” иҷҡеҒҮдҝЎжҒҜпјҲеҰӮдҪ•иҫЁеҲ«еҒҮж–°й—»пјү\n\nв–І ж ёеҝғиҜҚжұҮеә“пјҡ\n  account, password, hack, protect, privacy, personal information, stranger, link, click, verify, report, secure, two-factor authentication, social media\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Take 1 minute. Choose your topic and jot down: в‘  one personal experience (real or realistic) в‘Ў two specific tips you want to share.\"\n\nгҖҗе·®ејӮеҢ–жҸҗзӨәгҖ‘AзҸӯеҸҜиҮӘйҖүиҜқйўҳпјӣBзҸӯе»әи®®йҖүиҜқйўҳ1жҲ–2пјҲжңҖе®№жҳ“еҶҷдёӘдәәз»ҸеҺҶпјүпјҢж•ҷеёҲжҸҗдҫӣз»ҸеҺҶжЎҶжһ¶гҖӮ"},{"step":"дёүгҖҒжЁЎжқҝиҫ…еҠ©+йҷҗж—¶еҶҷдҪң","time":15,"content":"гҖҗPPT 07 еҚҡе®ўеҶҷдҪңжЁЎжқҝгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Here's a template. 12 minutes. Go!\"\n\nв–І PPTеұ•зӨәжЁЎжқҝпјҡ\n\nTITLE: [Personal + curiosity вҖ” 8-12 words]\n  Example: I Learned the Hard Way About ______\n\nHOOK: [1-2 sentences вҖ” a dramatic moment or surprising fact]\n  Example: Last week, something happened that changed how I use the internet.\n\nPERSONAL EXPERIENCE: [2-3 sentences вҖ” specific details]\n  Example: I was ______ when ______. I felt ______. But then I ______.\n\nADVICE: [3-4 specific tips with imperatives]\n  Example: Here's what I've learned: First, ______. Second, ______. Third, ______. These steps can ______.\n\nCONCLUSION: [1-2 sentences вҖ” a reminder, use present perfect passive if possible]\n  Example: The internet has changed our lives, but we must ______.\n\nв–І и®Ўж—¶12еҲҶй’ҹгҖӮеӯҰз”ҹзӢ¬з«ӢеҶҷдҪңгҖӮ\n\nгҖҗж•ҷеёҲе·Ўи§ҶйҮҚзӮ№гҖ‘\nвҖў BзҸӯпјҡжЈҖжҹҘжҳҜеҗҰеҢ…еҗ«5йғЁеҲҶпјҢиҜӯж°”жҳҜеҗҰеӨӘжӯЈејҸ\nвҖў AзҸӯпјҡжЈҖжҹҘжҳҜеҗҰжңүе…·дҪ“е»әи®®пјҢжҳҜеҗҰдҪҝз”ЁдәҶзҺ°еңЁе®ҢжҲҗж—¶иў«еҠЁиҜӯжҖҒ\nвҖў е…ЁзҸӯпјҡжҸҗйҶ’еӯ—ж•°пјҲ100-140иҜҚпјүпјҢжЈҖжҹҘжҳҜеҗҰз”Ёз¬¬дёҖдәәз§°\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘\nв‘ иҜӯж°”еӨӘжӯЈејҸвҶ’ж”№дёәеҜ№иҜқејҸпјҲз”Ёyou/weпјҢзј©еҶҷеҰӮI've/don'tпјү\nв‘Ўе»әи®®еӨӘз©әжіӣвҶ’е…·дҪ“еҢ–пјҲ\"Use 12-character passwords with numbers\"иҖҢйқһ\"Be careful\"пјү\nв‘ўж ҮйўҳеӨӘеӯҰжңҜвҶ’дёӘдәәеҢ–пјҲ\"How to Protect Your Password\"вҶ’\"I Got Hacked. Don't Let It Happen to You.\"пјү"},{"step":"еӣӣгҖҒеҗҢдјҙдә’иҜ„+еҲҶдә«","time":7,"content":"гҖҗPPT 08 иҜ„еҲҶж ҮеҮҶгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Time's up. Exchange with your partner. Use the rubric.\"\n\n| з»ҙеәҰ | 4еҲҶ | 2еҲҶ | 0еҲҶ |\n|------|-----|-----|-----|\n| дә”йғЁеҲҶ | йҪҗе…Ё | зјә1-2 | зјә3+ |\n| иҜӯж°” | еҚҡе®ўејҸеҜ№иҜқ | еҒҸжӯЈејҸжҲ–еҒҸйҡҸж„Ҹ | и®әж–ҮејҸ |\n| е»әи®® | 4жқЎе…·дҪ“ | 2-3жқЎ | ж— /з©әжіӣ |\n| иў«еҠЁиҜӯжҖҒ | вүҘ1еӨ„жӯЈзЎ® | е°қиҜ•дҪҝз”Ё | жңӘдҪҝз”Ё |\n| еӯ—ж•° | 100-140 | 80-99/141-160 | \x3c80/>160 |\n\nв–І еӯҰз”ҹдә’иҜ„3еҲҶй’ҹгҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Let's hear from 2 students.\"\n\nв–І 2еҗҚеӯҰз”ҹжң—иҜ»гҖӮж•ҷеёҲзӮ№иҜ„гҖӮ\n\nгҖҗйў n  з¬¬дәҢеңҲпјҡEngland + Scotland + Wales = Great BritainпјҲеӨ§дёҚеҲ—йў пјү\n  жңҖеӨ–еңҲпјҡGreat Britain + Northern Ireland = United KingdomпјҲиҒ”еҗҲзҺӢеӣҪпјү\n  Britain = Great Britainзҡ„ж—ҘеёёиҜҙжі•\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"So: England is just ONE PART of the UK. Great Britain is England PLUS Scotland and Wales. The UK is Great Britain PLUS Northern Ireland. Got it? Now let's learn 10 key words.\"\n\nгҖҗPPT 04 ж ёеҝғиҜҚжұҮеҚЎзүҮгҖ‘\n\n| иҜҚжұҮ | дёӯж–Ү | и®°еҝҶжҠҖе·§ |\n|------|------|---------|\n| kingdom | зҺӢеӣҪ | king + domпјҲйўҶеҹҹпјү |\n| union | иҒ”еҗҲ | uniпјҲдёҖпјү+ on |\n| evidence | иҜҒжҚ® | e + vidпјҲзңӢпјү+ ence |\n| achievement | жҲҗе°ұ | achieve + ment |\n| location | дҪҚзҪ® | locпјҲең°ж–№пјү+ ation |\n| military | еҶӣдәӢзҡ„ | militпјҲеЈ«е…өпјү+ ary |\n| legal | жі•еҫӢзҡ„ | legпјҲжі•еҫӢпјү+ al |\n| tradition | дј з»ҹ | traditпјҲдј йҖ’пјү+ ion |\n| ancestor | зҘ–е…Ҳ | anпјҲеүҚпјү+ cestor |\n| belong to | еұһдәҺ | be + longпјҲй•ҝд№…еұһдәҺпјү |\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘ж•ҷеёҲеңЁй»‘жқҝе·Ұж ҸеҶҷдёӢж ёеҝғиҜҚжұҮпјҢдҝқз•ҷе…ЁзЁӢгҖӮ\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘в‘ evidence /ЛҲevЙӘdЙҷns/ дёҚжҳҜ\"e-vi-dence\"пјӣв‘Ўmilitary /ЛҲmЙӘlЙӘtЙҷri/ жіЁж„ҸйҮҚйҹіеңЁз¬¬дёҖйҹіиҠӮпјӣв‘ўancestor /ЛҲГҰnsestЙҷ/ дёҚжҳҜ\"an-ces-tor\"гҖӮ"},{"step":"дёүгҖҒWhile-Reading еҺҶеҸІж—¶й—ҙзәҝжһ„е»ә","time":20,"content":"гҖҗPPT 05 иӢұеӣҪеҺҶеҸІеӣӣйҳ¶ж®өж—¶й—ҙзәҝпјҲеӯҰз”ҹеЎ«еҶҷпјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Open your textbook to page 42. Read for 5 minutes. As you read, fill in the timeline on your task sheet.\"\n\nв–І еӯҰз”ҹйҳ…иҜ»5еҲҶй’ҹгҖӮж•ҷеёҲе·Ўи§ҶгҖӮ\n\n| ж—¶жңҹ | е…ҘдҫөиҖ…/дәӢд»¶ | еҪұе“Қ |\n|------|-----------|------|\n| 1st century | The ______ arrived | Built towns and roads; left behind ______ |\n| 5th century | The ______ arrived | Formed England; gave the name \"______\" |\n| 11th century | The ______ arrived | Built castles; changed the ______ system |\n| 18th-20th century | The Union was formed | England + Wales + Scotland + Ireland вҶ’ ______ |\n\nгҖҗйў„и®ҫзӯ”жЎҲгҖ‘\n1st century: Romans; towns and roads (infrastructure)\n5th century: Anglo-Saxons; \"England\" (Angle-land)\n11th century: Normans (William the Conqueror, 1066); legal system\n18th-20th century: the United Kingdom\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘ж•ҷеёҲеңЁй»‘жқҝдёӯеӨ®з”»еҮәж—¶й—ҙзәҝпјҢиҜ·еӯҰз”ҹдёҠжқҘеЎ«еҶҷгҖӮ\n\nгҖҗPPT 06 зІҫиҜ»й—®йўҳ4йҒ“гҖ‘\n\nQ1: What's the difference between \"Great Britain\" and \"the UK\"? (Para 1)\nQ2: What did the Romans leave behind? (Para 2)\nQ3: What did the Normans change? (Para 3)\nQ4: Why is it important to know the history of a place? (Para 5-6)\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\nA1: \"Great Britain = England + Scotland + Wales. The UK = Great Britain + Northern Ireland.\" (ж•ҷеёҲпјҡ\"The difference is Northern Ireland.\"пјү\nA2: \"They built towns and roads. You can still see evidence of them today.\" (ж•ҷеёҲпјҡ\"Physical evidence вҖ” roads and buildings that still exist.\"пјү\nA3: \"They built castles and changed the legal system. The Normans brought new words to the English language too.\" (ж•ҷеёҲпјҡ\"Law, architecture, and language вҖ” three lasting impacts.\"пјү\nA4: \"Because understanding history helps us understand the culture and traditions of a place. It helps us understand why things are the way they are.\" (ж•ҷеёҲпјҡ\"History explains the present. This is the text's main message.\"пјү\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘Q1еӯҰз”ҹе®№жҳ“жҠҠGreat Britainе’ҢUKж··дёәдёҖи°ҲгҖӮж ёеҝғеҢәеҲҶпјҡUKеӨҡеҢ…еҗ«Northern IrelandгҖӮ\n\nгҖҗе·®ејӮеҢ–жҸҗзӨәгҖ‘AзҸӯеҸҜиҝҪй—®пјҡ\"What if the Normans had never invaded? How would England be different?\" BзҸӯзЎ®дҝқиғҪжүҫеҲ°еҺҹж–Үзӯ”жЎҲгҖӮ"},{"step":"еӣӣгҖҒPost-Reading еҗҚз§°иҫЁжһҗ+ж–ҮеҢ–еҜ№жҜ”","time":7,"content":"гҖҗPPT 07 еҗҚз§°иҫЁжһҗеҝ«жөӢпјҲ3йўҳеҲӨж–ӯжӯЈиҜҜпјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Let's test your understanding. True or False?\"\n\n1. \"England\" and \"the UK\" are the same thing. (FALSE)\n2. Great Britain includes Northern Ireland. (FALSE вҖ” that's the UK)\n3. Wales is part of both Great Britain and the UK. (TRUE)\n\nв–І еӯҰз”ҹеҝ«йҖҹдҪңзӯ”гҖӮж•ҷеёҲеҚіж—¶еҸҚйҰҲгҖӮ\n\nгҖҗPPT 08 и®Ёи®әиҜқйўҳгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"The UK was formed through centuries of unions and conquests. China also has a long history of unification. Discuss: What's similar and different between the UK's formation and China's historical unity?\"\n\nв–І е°Ҹз»„и®Ёи®ә3еҲҶй’ҹгҖӮ\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\n- \"Both countries were formed by joining different regions together.\" (ж•ҷеёҲпјҡ\"Good commonality.\"пјү\n- \"China was unified much earlier вҖ” Qin Dynasty, 221 BC. The UK formed over centuries.\" (ж•ҷеёҲпјҡ\"Good historical comparison.\"пјү\n- \"China unified through one emperor; the UK through multiple unions and agreements.\" (ж•ҷеёҲпјҡ\"Different processes: conquest vs. union.\"пјү\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Great points. Both countries have complex histories of unification. Understanding how a country was formed helps us understand its culture, laws, and traditions. That's why history matters вҖ” it explains the present.\""},{"step":"дә”гҖҒSummary + Homework жҖ»з»“+дҪңдёҡ","time":3,"content":"гҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Let's summarize. Today we learned the difference between England, Great Britain, Britain, and the UK. We traced four historical stages: Romans (roads), Anglo-Saxons (England), Normans (law), and the Union (UK). The lesson: understanding history helps us understand the present.\"\n\nв–І ж•ҷеёҲжҢҮеҗ‘жқҝд№Ұж—¶й—ҙзәҝе’ҢеҗҚз§°е…ізі»еӣҫпјҢеёҰеӯҰз”ҹеӣһйЎҫгҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Homework: Task 1 вҖ” vocabulary exercises. Task 2 вҖ” draw a diagram showing the relationship between the four names (England, Great Britain, Britain, UK). Label each part clearly.\"\n\nв–І PPT 09 дҪңдёҡеёғзҪ®йЎөгҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Next class: grammar! We'll learn about past participles used as attributes вҖ” describing things with V3. 'The buildings built by the Romans' вҖ” 'built' is a past participle! See you next time!\"\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘иҜҫзЁӢз»“жқҹй»‘жқҝзҠ¶жҖҒпјҡе·Ұж Ҹ=ж ёеҝғиҜҚжұҮиЎЁпјҢдёӯеӨ®=еҺҶеҸІж—¶й—ҙзәҝ+еҗҚз§°е…ізі»еӣҫпјҢеҸіж Ҹ=и®Ёи®әиҰҒзӮ№гҖӮ" he falling leaves иҗҪеҸ¶дёӯпјүпјӣV3=иў«еҠЁ/е®ҢжҲҗпјҲthe fallen leaves е·ІиҗҪдёӢзҡ„еҸ¶пјү\nв‘ў\"have/get sth. done\"з»“жһ„пјҡhave + е®ҫиҜӯ + иҝҮеҺ»еҲҶиҜҚпјҢиЎЁзӨә\"и®©жҹҗдәәеҒҡжҹҗдәӢ\"пјҲдё»иҜӯдёҚдәІиҮӘеҒҡпјү","difficulties":"в‘ V-ingе’ҢV3зҡ„йҖүжӢ©вҖ”вҖ”еӯҰз”ҹдёҚзҹҘйҒ“дҪ•ж—¶з”Ёе“ӘдёӘгҖӮж ёеҝғи§„еҲҷпјҡзңӢеҗҚиҜҚдёҺеҲҶиҜҚзҡ„е…ізі»вҖ”вҖ”дё»еҠЁе…ізі»з”ЁV-ingпјҢиў«еҠЁе…ізі»з”ЁV3гҖӮеҰӮ\"the girl reading a book\"пјҲеҘіеӯ©дё»еҠЁиҜ»пјүvs. \"the book read by the girl\"пјҲд№Ұиў«еҠЁиҜ»пјү\nв‘Ў\"have sth. done\"зҡ„зҗҶи§ЈвҖ”вҖ”дёӯж–Ү\"жҲ‘еүӘдәҶеӨҙеҸ‘\"еҸҜд»ҘжҳҜиҮӘе·ұеүӘд№ҹеҸҜд»ҘжҳҜеҲ«дәәеүӘпјҢдҪҶиӢұж–Ү\"I cut my hair\"=иҮӘе·ұеүӘпјҢ\"I had my hair cut\"=еҲ«дәәеүӘгҖӮеӯҰз”ҹе®№жҳ“ж··\nв‘ўиҝҮеҺ»еҲҶиҜҚдҪңеҗҺзҪ®е®ҡиҜӯзҡ„дҪҚзҪ®вҖ”вҖ”еҚ•дёӘV3еүҚзҪ®пјҲa broken cupпјүпјҢV3зҹӯиҜӯеҗҺзҪ®пјҲa cup broken by himпјү","preparation":"гҖҗPPTиҜҫд»¶гҖ‘\nPPT 01пјҡе°ҒйқўвҖ”вҖ”Unit 4 Grammar: Past Participle as Attribute & Object Complement\nPPT 02пјҡV-ing vs. V3еҜ№жҜ”иЎЁпјҲиҜҫж–ҮеҺҹеҸҘпјү\nPPT 03пјҡи§„еҲҷеҪ’зәіиЎЁпјҲеүҚзҪ®е®ҡиҜӯ/еҗҺзҪ®е®ҡиҜӯ/have sth. doneпјү\nPPT 04пјҡV-ing vs. V3иҫЁжһҗз»ғд№ пјҲ6еҜ№пјү\nPPT 05пјҡhave sth. doneз»ғд№ пјҲ5йўҳпјү\nPPT 06пјҡиҜҫж–ҮиҜӯеўғеЎ«з©әпјҲ5йўҳпјү\nPPT 07пјҡзңӢеӣҫйҖ еҸҘпјҲ3еј еӣҫзүҮпјү\nPPT 08пјҡдҪңдёҡеёғзҪ®йЎө\n\nгҖҗе®һзү©ж•ҷе…·гҖ‘\nвҖў иҜӯжі•з»ғд№ еҚ•\nвҖў зәў/и“қеҸҢиүІзІүз¬”пјҲзәў=V3пјҢи“қ=V-ingпјү","process":[{"step":"дёҖгҖҒDiscovery V-ing vs. V3еҜ№жҜ”","time":8,"content":"гҖҗPPT 02 V-ing vs. V3еҜ№жҜ”иЎЁгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Last lesson we read about British history. Today let's look at the grammar. Compare these two columns:\"\n\n| V-ingпјҲзҺ°еңЁеҲҶиҜҚпјү | V3пјҲиҝҮеҺ»еҲҶиҜҚпјү |\n|---|---|\n| the falling leaves (жӯЈеңЁиҗҪзҡ„еҸ¶еӯҗ) | the fallen leaves (е·ІиҗҪдёӢзҡ„еҸ¶еӯҗ) |\n| the developing country (еҸ‘еұ•дёӯеӣҪе®¶) | the developed country (еҸ‘иҫҫеӣҪе®¶) |\n| the boy reading a book (дё»еҠЁиҜ»д№Ұзҡ„з”·еӯ©) | the book written by the boy (иў«еҶҷзҡ„д№Ұ) |\n| the exciting news (д»Өдәәе…ҙеҘӢзҡ„ж¶ҲжҒҜ) | the excited people (иў«жҝҖеҸ‘/е…ҙеҘӢзҡ„дәә) |\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"What's the pattern? Talk to your partner. When do we use V-ing and when do we use V3?\"\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\n- \"V-ing is active. V3 is passive.\" (ж•ҷеёҲпјҡ\"Good start!\"пјү\n- \"V-ing means it's happening now. V3 means it's finished.\" (ж•ҷеёҲпјҡ\"Also correct! V-ing=иҝӣиЎҢ, V3=е®ҢжҲҗ.\"пјү\n\nгҖҗжқҝд№Ұж—¶жңәвҖ”вҖ”еҸҢиүІзІүз¬”жһ„е»әи§„еҲҷгҖ‘\n\nзәўиүІ=V3пјҲиҝҮеҺ»еҲҶиҜҚпјү  и“қиүІ=V-ingпјҲзҺ°еңЁеҲҶиҜҚпјү\n\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ   V-ing vs. V3 дҪңе®ҡиҜӯ                         в”Ӯ\nв”Ӯ                                              в”Ӯ\nв”Ӯ   V-ing: дё»еҠЁ/иҝӣиЎҢ  the falling leaves        в”Ӯ\nв”Ӯ   V3:    иў«еҠЁ/е®ҢжҲҗ  the fallen leaves         в”Ӯ\nв”Ӯ                                              в”Ӯ\nв”Ӯ   еҲӨж–ӯж–№жі•пјҡеҗҚиҜҚдёҺеҲҶиҜҚзҡ„е…ізі»                   в”Ӯ\nв”Ӯ   дё»еҠЁвҶ’V-ing  иў«еҠЁвҶ’V3                         в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"The KEY question: Is the noun DOING the action or RECEIVING the action? If the noun does the action вҶ’ V-ing. If the noun receives the action вҶ’ V3. 'The boy reading' вҖ” the boy reads (active) вҶ’ V-ing. 'The book written' вҖ” the book is written (passive) вҶ’ V3.\""},{"step":"дәҢгҖҒRule Formation еүҚзҪ®/еҗҺзҪ®е®ҡиҜӯ+have sth. done","time":10,"content":"гҖҗPPT 03 и§„еҲҷеҪ’зәіиЎЁгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Now, position. Where does the past participle go? Two positions:\"\n\nв‘  еүҚзҪ®е®ҡиҜӯпјҲеҚ•дёӘV3ж”ҫеңЁеҗҚиҜҚеүҚпјүпјҡ\n  a broken window, the united kingdom, written language, fallen leaves\n  \nв‘Ў еҗҺзҪ®е®ҡиҜӯпјҲV3зҹӯиҜӯж”ҫеңЁеҗҚиҜҚеҗҺпјүпјҡ\n  the buildings built by the Romans\n  the language spoken in Wales\n  the castle constructed in 1066\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Rule: single V3 goes BEFORE the noun. V3 with a phrase (by..., in...) goes AFTER the noun.\"\n\nв‘ў \"have/get sth. done\"з»“жһ„пјҡ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Now, a very useful structure: have something done. Look:\"\n\n| еҸҘеӯҗ | и°ҒеҒҡзҡ„пјҹ |\n|------|---------|\n| I cut my hair. | жҲ‘иҮӘе·ұеүӘзҡ„ |\n| I had my hair cut. | еҲ«дәәеё®жҲ‘еүӘзҡ„ |\n| I fixed my computer. | жҲ‘иҮӘе·ұдҝ®зҡ„ |\n| I had my computer fixed. | еҲ«дәәеё®жҲ‘дҝ®зҡ„ |\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"In 'have sth. done,' YOU arrange it, but SOMEONE ELSE does it. In Chinese, 'жҲ‘еүӘдәҶеӨҙеҸ‘' can mean either. But in English, 'I cut my hair' = you did it yourself (maybe badly!). 'I had my hair cut' = a professional did it.\"\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘\nв‘ have sth. doneдёӯsth.жҳҜе®ҫиҜӯпјҢdoneжҳҜе®ҫиЎҘвҖ”вҖ”дёҚжҳҜ\"have done sth.\"пјҲе®ҢжҲҗж—¶пјүпјҒ\n  жҜ”иҫғпјҡI have done my homework.пјҲзҺ°еңЁе®ҢжҲҗж—¶пјҢжҲ‘иҮӘе·ұеҒҡдәҶпјү\n        I have my homework done.пјҲи®©жҹҗдәәеҒҡдәҶжҲ‘зҡ„дҪңдёҡпјү\nв‘ЎV-ing vs. V3еҜ№жғ…ж„ҹзұ»еҠЁиҜҚпјҡthe exciting gameпјҲд»Өдәәе…ҙеҘӢзҡ„пјҢдё»еҠЁпјүvs. the excited fansпјҲиў«жҝҖеҸ‘зҡ„пјҢиў«еҠЁпјү\nв‘ўirregular V3жӢјеҶҷпјҡbuildвҶ’built, writeвҶ’written, speakвҶ’spoken, breakвҶ’broken\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘еңЁи§„еҲҷиЎЁдёӢж–№иЎҘе……have sth. doneзҡ„дёүз§Қз”Ёжі•пјҡ\n  в‘  жңҚеҠЎпјҡhave my hair cut / have my car repaired\n  в‘Ў йҒӯйҒҮпјҲдёҚеҘҪзҡ„дәӢпјүпјҡhave my wallet stolen\n  в‘ў е®ҢжҲҗпјҡhave the work finished"},{"step":"дёүгҖҒPractice иҫЁжһҗ+еЎ«з©ә","time":12,"content":"гҖҗPPT 04 V-ing vs. V3иҫЁжһҗз»ғд№ пјҲ6еҜ№пјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Choose V-ing or V3 for each sentence.\"\n\n1. The ______ (fall) leaves covered the ground. вҶ’ fallen (е·Із»ҸиҗҪдёӢзҡ„)\n2. The ______ (develop) countries should help the ______ (develop) countries. вҶ’ developed / developing\n3. The book ______ (write) by this author is famous. вҶ’ written (д№Ұиў«еҶҷ)\n4. The boy ______ (stand) by the door is my brother. вҶ’ standing (з”·еӯ©дё»еҠЁз«ҷ)\n5. The language ______ (speak) in Wales is Welsh. вҶ’ spoken (иҜӯиЁҖиў«иҜҙ)\n6. The ______ (excite) children ran to the playground. вҶ’ excited (еӯ©еӯҗд»¬иў«жҝҖеҸ‘)\n\nгҖҗPPT 05 have sth. doneз»ғд№ пјҲ5йўҳпјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Rewrite using 'have sth. done'.\"\n\n1. A mechanic repaired my car. вҶ’ I had my car repaired.\n2. A tailor made her dress. вҶ’ She had her dress made.\n3. Someone stole his wallet. вҶ’ He had his wallet stolen.\n4. A dentist checked my teeth. вҶ’ I had my teeth checked.\n5. A builder renovated their house. вҶ’ They had their house renovated.\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘з¬¬3йўҳ\"had his wallet stolen\"жҳҜиў«еҠЁйҒӯйҒҮвҖ”вҖ”дёҚжҳҜд»–дё»еҠЁи®©дәәеҒ·й’ұеҢ…пјҒиҝҷжҳҜhave sth. doneзҡ„\"йҒӯйҒҮ\"з”Ёжі•гҖӮ\n\nгҖҗPPT 06 иҜҫж–ҮиҜӯеўғеЎ«з©әпјҲ5йўҳпјүгҖ‘\n\n1. The roads ______ (build) by the Romans are still visible today. вҶ’ built\n2. The ______ (unite) Kingdom was formed over centuries. вҶ’ United\n3. The legal system ______ (introduce) by the Normans still exists. вҶ’ introduced\n4. Visitors can have their photos ______ (take) at the castle. вҶ’ taken\n5. The ______ (write) records show evidence of Roman civilization. вҶ’ written\n\nгҖҗе·®ејӮеҢ–жҸҗзӨәгҖ‘AзҸӯеҸҜеўһеҠ иҮӘз”ұйҖ еҸҘпјӣBзҸӯйҮҚзӮ№жҺҢжҸЎV-ing/V3зҡ„дё»еҠЁ/иў«еҠЁеҲӨж–ӯгҖӮ"},{"step":"еӣӣгҖҒProduction зңӢеӣҫйҖ еҸҘ","time":7,"content":"гҖҗPPT 07 зңӢеӣҫйҖ еҸҘпјҲ3еј еӣҫзүҮпјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Write one sentence for each picture using past participles.\"\n\n1. еӣҫзүҮпјҡдёҖеә§еҸӨе Ў вҶ’ (build, 11th century)\n2. еӣҫзүҮпјҡзўҺзӘ—жҲ· вҶ’ (break, boy)\n3. еӣҫзүҮпјҡдәәзҗҶеҸ‘ вҶ’ (have, hair, cut)\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\n1. \"The castle built in the 11th century still stands today.\" (еҗҺзҪ®е®ҡиҜӯ)\n2. \"The window broken by the boy needs to be repaired.\" (еҗҺзҪ®е®ҡиҜӯ)\n3. \"She had her hair cut at the salon.\" (have sth. done)\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Good! Share with your partner. Check: Is the V3 in the right position? Is the meaning passive or completed?\"\n\nв–І еӯҰз”ҹдә’жҹҘ1еҲҶй’ҹгҖӮ2-3еҗҚеӯҰз”ҹеҲҶдә«гҖӮ\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘е°ҶеӯҰз”ҹдјҳз§ҖдҫӢеҸҘеҶҷеңЁй»‘жқҝеҸідёӢи§’гҖӮ"},{"step":"дә”гҖҒSummary + Homework жҖ»з»“+дҪңдёҡ","time":3,"content":"гҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Today we learned: в‘  Past participle as attribute вҖ” single V3 before the noun, V3 phrase after; в‘Ў V-ing = active/ongoing, V3 = passive/completed; в‘ў have sth. done = someone else does it for you. Three uses: service, misfortune, completion.\"\n\nв–І ж•ҷеёҲжҢҮеҗ‘жқҝд№Ұи§„еҲҷиЎЁпјҢеёҰеӯҰз”ҹеӣһйЎҫгҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Homework: Exercise 3 on page 44 вҖ” fill in V-ing or V3. Also, write 3 sentences using 'have sth. done' about services you use (haircut, car repair, etc.).\"\n\nв–І PPT 08 дҪңдёҡеёғзҪ®йЎөгҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Next class: writing! We'll describe a place with history вҖ” and I want to see past participles in your description: 'The temple built in...' 'The walls damaged by...' See you!\"\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘иҜҫзЁӢз»“жқҹй»‘жқҝзҠ¶жҖҒпјҡдёӯеӨ®=V-ing vs. V3еҜ№жҜ”иЎЁ+have sth. doneи§„еҲҷпјҢе·Ұж Ҹ=ж ёеҝғиҜҚжұҮпјҢеҸідёӢ=еӯҰз”ҹдҫӢеҸҘгҖӮ"}],"blackboard":"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ      PAST PARTICIPLE (V3) AS ATTRIBUTE & OBJ. COMPLEMENT  в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\nв”Ӯ                                                           в”Ӯ\nв”Ӯ  V-ing vs. V3 дҪңе®ҡиҜӯпјҡ                                     в”Ӯ\nв”Ӯ    V-ing = дё»еҠЁ/иҝӣиЎҢ   the falling leaves                  в”Ӯ\nв”Ӯ    V3    = иў«еҠЁ/е®ҢжҲҗ   the fallen leaves                   в”Ӯ\nв”Ӯ    еҲӨж–ӯпјҡеҗҚиҜҚDOвҶ’V-ing  еҗҚиҜҚRECEIVEвҶ’V3                      в”Ӯ\nв”Ӯ                                                           в”Ӯ\nв”Ӯ  дҪҚзҪ®пјҡ                                                    в”Ӯ\nв”Ӯ    еҚ•дёӘV3еүҚзҪ®пјҡa broken window, written language           в”Ӯ\nв”Ӯ    V3зҹӯиҜӯеҗҺзҪ®пјҡthe buildings built by Romans               в”Ӯ\nв ејҸжЎҶжһ¶пјү\nPPT 08пјҡиҜ„еҲҶж ҮеҮҶ\nPPT 09пјҡдҪңдёҡеёғзҪ®йЎө\n\nгҖҗе®һзү©ж•ҷе…·гҖ‘\nвҖў еҶҷдҪңд»»еҠЎеҚ•\nвҖў дёӯеӣҪеҺҶеҸІеҗҚиғңеӣҫзүҮеҚЎпјҲж•…е®«/й•ҝеҹҺ/ж•Ұз…Ң/е№ійҒҘеҸӨеҹҺ/иӢҸе·һеӣӯжһ—пјү\nвҖў и®Ўж—¶еҷЁ","process":[{"step":"дёҖгҖҒиҢғж–ҮеҲҶжһҗвҖ”вҖ”жӢҶи§Јең°зӮ№жҸҸиҝ°з»“жһ„","time":10,"content":"гҖҗPPT 02 иҢғж–Үеұ•зӨәвҖ”вҖ”ж•…е®«жҺЁиҚҗж–ҮгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Today we write about a place вҖ” a place with history that you want to recommend. Let's read a model first.\"\n\nв–І PPTеұ•зӨәиҢғж–Үпјҡ\n\nLOCATION: If you visit Beijing, you must see the Forbidden City вҖ” the palace built for 24 emperors of the Ming and Qing dynasties.\n\nSENSORY DETAILS: As you walk through the massive red gates, you see golden roofs glittering in the sunlight. You hear the echo of your footsteps on the ancient stone floors. You smell the old wood and incense from centuries of ceremonies. You touch the carved marble bridges that have survived 600 years.\n\nHISTORY: The Forbidden City, built between 1406 and 1420, was the political center of China for over 500 years. The walls, painted in imperial red, were designed to show the emperor's power.\n\nPERSONAL FEELING: When I stood in the vast courtyard, I felt small вҖ” but also proud. This was built by my ancestors, without modern technology.\n\nRECOMMENDATION: Whether you love history, architecture, or beauty, the Forbidden City will amaze you. Visit early in the morning to avoid crowds!\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"With your partner, find the 5 parts.\"\n\nгҖҗPPT 03 з»“жһ„еӣҫи§ЈвҖ”вҖ”дә”йғЁеҲҶжөҒзЁӢгҖ‘\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\n- \"Location: where it is and what it is.\" (ж•ҷеёҲпјҡ\"Right вҖ” name + position.\"пјү\n- \"Sensory details: see, hear, smell, touch.\" (ж•ҷеёҲпјҡ\"Four senses! This makes the description come alive.\"пјү\n- \"History: when it was built, what it was for.\" (ж•ҷеёҲпјҡ\"Notice the past participles: 'built between 1406 and 1420,' 'designed to show power.'\"пјү\n- \"Personal feeling: how it made the writer feel.\" (ж•ҷеёҲпјҡ\"This separates a recommendation from an encyclopedia entry.\"пјү\n- \"Recommendation: why others should visit + practical tip.\" (ж•ҷеёҲпјҡ\"The practical tip ('visit early') makes it useful.\"пјү\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘ж•ҷеёҲеңЁй»‘жқҝдёӯеӨ®з”»еҮәдә”йғЁеҲҶжөҒзЁӢеӣҫпјҡ\n  Location вҶ’ Senses вҶ’ History вҶ’ Feeling вҶ’ Recommendation\n\nгҖҗPPT 04 ж„ҹе®ҳжҸҸеҶҷиҜҚжұҮеә“гҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"The key to a great description is SENSORY details. Here's a vocabulary bank:\"\n\n| ж„ҹе®ҳ | иҜҚжұҮ |\n|------|------|\n| и§Ҷи§ү see | golden, ancient, magnificent, glowing, carved, colorful, towering |\n| еҗ¬и§ү hear | echo, silence, ringing, whispering, bustling |\n| е—…и§ү smell | incense, old wood, fresh flowers, dust |\n| и§Ұи§ү touch | smooth marble, rough stone, cold metal, warm sunlight |\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"DON'T say 'It's beautiful.' SAY 'Golden roofs glitter in the sunlight.' Show, don't tell!\""},{"step":"дәҢгҖҒеҶҷдҪңд»»еҠЎеёғзҪ®+ж„ҹе®ҳжҝҖжҙ»","time":5,"content":"гҖҗPPT 06 еҶҷдҪңд»»еҠЎ+ең°зӮ№йҖүжӢ©гҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Your task: write a 120-word description of a historical place in China that you recommend. Choose ONE:\"\n\n1. й•ҝеҹҺ The Great Wall вҖ” military defense, mountain views\n2. ж•Ұз…ҢиҺ«й«ҳзӘҹ Mogao Caves вҖ” ancient art, Buddhist culture\n3. е№ійҒҘеҸӨеҹҺ Pingyao Ancient City вҖ” Ming dynasty streets\n4. иӢҸе·һеӣӯжһ— Suzhou Gardens вҖ” classical Chinese landscape\n5. иҮӘйҖүе…¶д»–еҺҶеҸІеҗҚиғң\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Before you write, close your eyes. Imagine you're AT this place. Answer: What do you SEE? What do you HEAR? What do you SMELL? What can you TOUCH? Write 4 sensory details on your task sheet.\"\n\nв–І еӯҰз”ҹй—ӯзңјжғіиұЎ1еҲҶй’ҹпјҢеҶҷдёӢ4дёӘж„ҹе®ҳз»ҶиҠӮгҖӮ\n\nгҖҗе·®ејӮеҢ–жҸҗзӨәгҖ‘AзҸӯеҸҜиҮӘйҖүең°зӮ№пјӣBзҸӯе»әи®®йҖүй•ҝеҹҺжҲ–ж•…е®«пјҲжңҖе®№жҳ“жҸҸеҶҷж„ҹе®ҳпјүпјҢж•ҷеёҲжҸҗдҫӣж„ҹе®ҳжЎҶжһ¶гҖӮ"},{"step":"дёүгҖҒжЁЎжқҝиҫ…еҠ©+йҷҗж—¶еҶҷдҪң","time":15,"content":"гҖҗPPT 07 еҶҷдҪңжЁЎжқҝгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Here's a template. 12 minutes. Go!\"\n\n[LO e. Step 2, they upload the video. Step 3, a composer combines all videos into one. Step 4, the result is published online. Hundreds or thousands of people singing 'together' вҖ” but they never met!\"\n\nв–І PPTеұ•зӨәжөҒзЁӢеӣҫпјҡ\n  Record alone вҶ’ Upload video вҶ’ Combine videos вҶ’ Publish online\n\nгҖҗPPT 03 ж ёеҝғиҜҚжұҮеҚЎзүҮгҖ‘\n\n| иҜҚжұҮ | дёӯж–Ү | иҜҫж–ҮиҜӯеўғдҫӢеҸҘ |\n|------|------|-------------|\n| virtual | иҷҡжӢҹзҡ„ | a virtual choir connects people online |\n| choir | еҗҲе”ұеӣў | a choir is a group of singers |\n| composition | дҪңе“Ғ/дҪңжӣІ | his composition was beautiful |\n| performer | иЎЁжј”иҖ… | performers from 12 countries |\n| stage | иҲһеҸ° | no physical stage is needed |\n| award | еҘ–йЎ№ | he won many awards |\n| phenomenon | зҺ°иұЎ | it became a global phenomenon |\n| enable | дҪҝиғҪеӨҹ | technology enables connection |\n| ordinary | жҷ®йҖҡзҡ„ | ordinary people can join |\n| prove | иҜҒжҳҺ | it proves music connects us |\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘ж•ҷеёҲеңЁй»‘жқҝе·Ұж ҸеҶҷдёӢж ёеҝғиҜҚжұҮпјҢдҝқз•ҷе…ЁзЁӢгҖӮ\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘в‘ choir /kwaЙӘЙҷ/ жіЁж„ҸkдёҚеҸ‘йҹіпјӣв‘Ўphenomenon /fЙҷЛҲnЙ’mЙӘnЙҷn/ жіЁж„ҸйҮҚйҹіпјӣв‘ўvirtual /ЛҲvЙңЛҗtКғuЙҷl/ жіЁж„ҸchеҸ‘/tКғ/гҖӮ"},{"step":"дёүгҖҒWhile-Reading дәәзү©ж—¶й—ҙзәҝ+жҰӮеҝөзҗҶи§Ј","time":20,"content":"гҖҗPPT 04 Eric Whitacreж—¶й—ҙзәҝпјҲеӯҰз”ҹеЎ«еҶҷпјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Open your textbook to page 52. Read for 5 minutes. Fill in Eric's timeline on your task sheet.\"\n\nв–І еӯҰз”ҹйҳ…иҜ»5еҲҶй’ҹгҖӮ\n\n| ж—¶й—ҙ | дәӢд»¶ |\n|------|------|\n| 1988 | Eric studied ______ at university |\n| 1997 | He received a ______ degree in musical composition |\n| 2009 | He saw a ______ of a girl singing online |\n| 2010 | He created the first virtual choir (VC1) with ______ singers |\n| 2013 | VC3 had over ______ singers from ______ countries |\n\nгҖҗйў„и®ҫзӯ”жЎҲгҖ‘\n1988: music\n1997: master's\n2009: video\n2010: 185 / one hundred eighty-five\n2013: 2,000+ / over two thousand / 101 (countries)\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘ж•ҷеёҲеңЁй»‘жқҝдёӯеӨ®з”»еҮәж—¶й—ҙзәҝпјҢиҜ·еӯҰз”ҹдёҠжқҘеЎ«еҶҷгҖӮ\n\nгҖҗPPT 06 зІҫиҜ»й—®йўҳ4йҒ“гҖ‘\n\nQ1: What inspired Eric to create the virtual choir? (Para 2)\nQ2: How does a virtual choir work? Describe the process. (Para 3)\nQ3: What was special about VC1? (Para 3)\nQ4: What is the main message of the last paragraph? (Para 4)\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\nA1: \"He saw a video of a girl singing one of his compositions online. He was moved and wondered if he could combine many such videos.\" (ж•ҷеёҲпјҡ\"Inspiration from an unexpected source!\"пјү\nA2: \"Each singer records themselves singing, uploads the video, and Eric combines them into one performance using software.\" (ж•ҷеёҲпјҡ\"Technology enables art.\"пјү\nA3: \"VC1 had 185 singers from 12 countries. It was the first time people sang 'together' without being in the same place.\" (ж•ҷеёҲпјҡ\"A world first!\"пјү\nA4: \"The virtual choir helps connect ordinary people, removes distance, and makes the world a better place. Music is a universal language.\" (ж•ҷеёҲпјҡ\"From individual story to universal message.\"пјү\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘Q4еӯҰз”ҹе®№жҳ“еҸӘиҜҙ\"music connects people\"вҖ”вҖ”йңҖеј•еҜјжүҫеҮәдёүдёӘиҰҒзӮ№пјҡconnects ordinary people, removes distance, makes the world betterгҖӮ\n\nгҖҗе·®ејӮеҢ–жҸҗзӨәгҖ‘AзҸӯеҸҜиҝҪеҠ и®Ёи®әпјҡ\"Could a virtual choir ever replace a physical choir? Why or why not?\" BзҸӯзЎ®дҝқиғҪжүҫеҲ°еҺҹж–Үзӯ”жЎҲгҖӮ"},{"step":"еӣӣгҖҒPost-Reading и®Ёи®әвҖ”вҖ”Technology and Music","time":7,"content":"гҖҗPPT 07 и®Ёи®әиҜқйўҳгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Eric's virtual choir proves that technology and music can work together. But some people think technology is ruining music вҖ” autotune, lip-syncing, etc. Discuss: Can technology ENHANCE music, or does it HARM music?\"\n\nв–І е°Ҹз»„и®Ёи®ә3еҲҶй’ҹгҖӮ\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\n- \"Technology enhances music вҖ” like the virtual choir, it lets more people participate.\" (ж•ҷеёҲпјҡ\"Inclusive argument.\"пјү\n- \"Technology harms music вҖ” too much editing makes it fake.\" (ж•ҷеёҲпјҡ\"Authenticity argument.\"пјү\n- \"Both вҖ” it depends on how you use it. Eric used it to connect people, not to fake talent.\" (ж•ҷеёҲпјҡ\"Balanced view. The key is intention.\"пјү\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Great discussion. The text's message is clear: technology, used creatively, can ENHANCE music by connecting people who could never meet otherwise. The virtual choir doesn't replace physical choirs вҖ” it creates something NEW. And that's the power of innovation.\""},{"step":"дә”гҖҒSummary + Homework жҖ»з»“+дҪңдёҡ","time":3,"content":"гҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Let's summarize. Today we read about the Virtual Choir вҖ” Eric Whitacre's innovation that combines music and technology. Timeline: 1988 music student вҶ’ 2009 inspired by a video вҶ’ 2010 VC1 (185 singers) вҶ’ 2013 VC3 (2,000+ singers). The message: music + technology = connection across distance. Ordinary people, extraordinary results.\"\n\nв–І ж•ҷеёҲжҢҮеҗ‘жқҝд№Ұж—¶й—ҙзәҝпјҢеёҰеӯҰз”ҹеӣһйЎҫгҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Homework: Task 1 вҖ” vocabulary exercises. Task 2 вҖ” write 50 words: 'If you could join a virtual choir, what song would you sing and why?' Use at least 3 key words.\"\n\nв–І PPT 08 дҪңдёҡеёғзҪ®йЎөгҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Next class: our LAST grammar lesson! Past participles as adverbials вҖ” the most advanced grammar in Book 2. 'Inspired by the video, Eric created the choir.' See you next time!\"\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘иҜҫзЁӢз»“жқҹй»‘жқҝзҠ¶жҖҒпјҡе·Ұж Ҹ=ж ёеҝғиҜҚжұҮиЎЁпјҢдёӯеӨ®=Ericж—¶й—ҙзәҝ+иҷҡжӢҹеҗҲе”ұжөҒзЁӢеӣҫпјҢеҸіж Ҹ=и®Ёи®әиҰҒзӮ№гҖӮ"}],"blackboard":"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ                    The Virtual Choir                          в”Ӯ\nв”Ӯ                  пјҲең°зҗғ+йҹіз¬Ұз®Җз¬”з”»пјү                           в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв  main clause. Look:\"\n\nвң“ Inspired by the video, Eric created the choir.\n  вҶ’ Eric was inspired. вң“ (Eric = subject of both)\n\nвң— Inspired by the video, the choir was created.\n  вҶ’ The choir was inspired? No! Eric was inspired.\n  вҶ’ This is a DANGLING PARTICIPLE вҖ” a serious grammar error!\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘иҝҷжҳҜеӯҰз”ҹжңҖеёёзҠҜзҡ„й”ҷиҜҜпјҒеӯҰз”ҹеҶҷV3зҹӯиҜӯж—¶е®№жҳ“еҝҪз•ҘйҖ»иҫ‘дё»иҜӯгҖӮжЈҖжҹҘж–№жі•пјҡV3зҡ„еҠЁдҪңжү§иЎҢиҖ…еҝ…йЎ»=дё»еҸҘдё»иҜӯгҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Also, when do we use V3 and when V-ing? The rule: If the main subject RECEIVES the action вҶ’ V3 (passive). If the main subject DOES the action вҶ’ V-ing (active).\"\n\n| V3 (иў«еҠЁ) | V-ing (дё»еҠЁ) |\n|---|---|\n| Inspired by music, Eric created... | Inspiring others, Eric created... |\n| (Eric was inspired вҶ’ passive) | (Eric inspires others вҶ’ active) |\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘еңЁи§„еҲҷиЎЁдёӢж–№иЎҘе……пјҡ\n  V3: дё»иҜӯRECEIVE вҶ’ иў«еҠЁ вҶ’ V3\n  V-ing: дё»иҜӯDO вҶ’ дё»еҠЁ вҶ’ V-ing"},{"step":"дёүгҖҒPractice д»ҺеҸҘз®ҖеҢ–+еЎ«з©ә","time":12,"content":"гҖҗPPT 06 д»ҺеҸҘз®ҖеҢ–з»ғд№ пјҲ6йўҳпјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Simplify these adverbial clauses to V3 phrases. Step 1: remove subject + be. Step 2: keep V3. Step 3: check logical subject.\"\n\n1. Because he was moved by the music, Eric composed a new piece.\n   вҶ’ Moved by the music, Eric composed a new piece.\n\n2. When it was first performed, the piece surprised everyone.\n   вҶ’ First performed, the piece surprised everyone.\n\n3. Although she was nervous, the singer joined the virtual choir.\n   вҶ’ Though nervous, the singer joined the virtual choir.\n\n4. If they are given the right tools, anyone can make music.\n   вҶ’ Given the right tools, anyone can make music.\n\n5. Because they were connected by the internet, singers from 100 countries sang together.\n   вҶ’ Connected by the internet, singers from 100 countries sang together.\n\n6. When it is seen on a big screen, the virtual choir is breathtaking.\n   вҶ’ Seen on a big screen, the virtual choir is breathtaking.\n\nгҖҗPPT 07 еЎ«з©әз»ғд№ пјҲ5йўҳпјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Fill in V3 or V-ing.\"\n\n1. ______ (inspire) by the video, Eric created the virtual choir. вҶ’ Inspired (Eric was inspired вҶ’ passive вҶ’ V3)\n2. ______ (inspire) others, Eric traveled the world. вҶ’ Inspiring (Eric inspires вҶ’ active вҶ’ V-ing)\n3. ______ (move) by the music, the audience stood up. вҶ’ Moved (audience was moved вҶ’ V3)\n4. ______ (see) from the stage, the audience looked huge. вҶ’ Seen (audience is seen вҶ’ V3)\n5. ______ (perform) on stage, the singer felt nervous. вҶ’ Performing (singer performs вҶ’ active вҶ’ V-ing)\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘з¬¬4йўҳ\"Seen from the stage\"вҖ”вҖ”д»ҺиҲһеҸ°зңӢи§Ӯдј—пјҢи§Ӯдј—\"иў«зңӢ\"вҶ’V3гҖӮеӯҰз”ҹе®№жҳ“йҖү\"Seeing\"еӣ дёәд»–д»¬д»Ҙдёә\"и§Ӯдј—зңӢ\"пјҢдҪҶд»ҺиҲһеҸ°зҡ„и§’еәҰпјҢи§Ӯдј—жҳҜиў«зңӢзҡ„еҜ№иұЎгҖӮ\n\nгҖҗе·®ејӮеҢ–жҸҗзӨәгҖ‘AзҸӯеҸҜеўһеҠ иҮӘз”ұйҖ еҸҘпјӣBзҸӯйҮҚзӮ№жҺҢжҸЎд»ҺеҸҘз®ҖеҢ–дёүжӯҘжі•гҖӮ"},{"step":"еӣӣгҖҒProduction йҖ еҸҘ+дә’жҹҘ","time":7,"content":"гҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Now write 3 sentences of your own using V3 as adverbial. Choose from these verbs: inspired, moved, surprised, given, seen, heard.\"\n\nв–І еӯҰз”ҹзӢ¬з«ӢйҖ еҸҘ3еҲҶй’ҹгҖӮж•ҷеёҲе·Ўи§ҶгҖӮ\n\nгҖҗйў„и®ҫеӣһзӯ”зӨәдҫӢгҖ‘\n- \"Inspired by his teacher, he started learning piano.\"\n- \"Moved by the song, she cried.\"\n- \"Given a chance, anyone can succeed.\"\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Exchange with your partner. Check THREE things: в‘  Is it V3 (not V-ing)? в‘Ў Is the logical subject correct? в‘ў What's the relationship (reason/time/condition/concession)?\"\n\nв–І еӯҰз”ҹдә’жҹҘ2еҲҶй’ҹгҖӮ2-3еҗҚеӯҰз”ҹеҲҶдә«гҖӮ\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘е°ҶеӯҰз”ҹдјҳз§ҖдҫӢеҸҘеҶҷеңЁй»‘жқҝеҸідёӢи§’пјҢж ҮжіЁйҖ»иҫ‘е…ізі»гҖӮ"},{"step":"дә”гҖҒSummary + Homework жҖ»з»“+дҪңдёҡ","time":3,"content":"гҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Today we learned our FINAL grammar point in Book 2: past participle as adverbial. Four relationships: reason, time, condition, concession. The rule: remove subject + be, keep V3. CRI еҸҳдәәз”ҹжј”и®ІгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Today is our FINAL writing lesson of Book 2! We'll write a speech about how music changed your life. A speech is special вҖ” you're talking TO people, not just writing FOR people. Let's read a model.\"\n\nв–І PPTеұ•зӨәиҢғж–Үпјҡ\n\nHOOK: What would your life be without music? No songs in the morning. No melody in your heart. No rhythm in your steps. For me, music is not just sound вҖ” it's a lifeline.\n\nSTORY: I was 12 years old when everything changed. My family moved to a new city. I had no friends. I felt invisible. Then I found an old guitar in my room. Inspired by a YouTube video, I taught myself three chords. Within a week, I was playing my first song. A boy heard me playing and asked to learn. We became best friends. Music gave me a voice when I had none.\n\nLESSON: That experience taught me something: music doesn't just fill silence вҖ” it builds bridges. It connects people who can't speak the same language. It heals wounds that words can't reach.\n\nCALL TO ACTION: So I ask you: what will YOUR song be? Don't wait. Pick up that instrument. Open your mouth. Sing. Because the world needs your music вҖ” and so do you.\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"With your partner, find the 4 parts.\"\n\nгҖҗPPT 03 жј”и®Із»“жһ„еӣҫи§ЈвҖ”вҖ”еӣӣйғЁеҲҶжөҒзЁӢгҖ‘\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\n- \"Hook: 'What would your life be without music?' вҖ” a question that makes you think.\" (ж•ҷеёҲпјҡ\"Questions are powerful openers!\"пјү\n- \"Story: the guitar, the move, the friend вҖ” specific and personal.\" (ж•ҷеёҲпјҡ\"Details make it real.\"пјү\n- \"Lesson: 'music builds bridges' вҖ” a metaphor!\" (ж•ҷеёҲпјҡ\"Notice: the story leads to a LESSON.\"пјү\n- \"Call to action: 'Pick up that instrument. Sing.' вҖ” imperatives!\" (ж•ҷеёҲпјҡ\"Direct commands to the audience.\"пјү\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘ж•ҷеёҲеңЁй»‘жқҝдёӯеӨ®з”»еҮәеӣӣйғЁеҲҶжөҒзЁӢеӣҫпјҡ\n  Hook вҶ’ Story вҶ’ Lesson вҶ’ Call to Action\n\nгҖҗPPT 04 ејҖеңәзҷҪжҠҖе·§гҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"The hook is the most important part. Three effective patterns:\"\n\nв‘  и®ҫй—®еһӢпјҡ\"What would your life be without music?\" / \"Have you ever heard a song that changed your day?\"\nв‘Ў еңәжҷҜеһӢпјҡ\"I was 12 years old, alone in a new city, when I heard the song that saved me.\"\nв‘ў жғҠи®¶дәӢе®һеһӢпјҡ\"Music activates more parts of the brain than any other human activity.\"\n\nвң— \"Today I want to talk about music.\" пјҲеӨӘж— иҒҠвҖ”вҖ”жІЎжңүдәәдјҡжғіеҗ¬пјү\nвң“ \"What would silence sound like? Imagine a world without music.\" пјҲеј•дәәе…Ҙиғңпјү"},{"step":"дәҢгҖҒеҶҷдҪңд»»еҠЎ+дҝ®иҫһжүӢжі•","time":5,"content":"гҖҗPPT 05 дҝ®иҫһжүӢжі•еә“гҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"A speech needs rhetorical devices to be powerful. Three devices:\"\n\nв‘  йҮҚеӨҚпјҡ\"Music was my friend. Music was my teacher. Music was my voice.\"\nв‘Ў и®ҫй—®пјҡ\"What would your life be without music?\" / \"Can you imagine silence?\"\nв‘ў жҜ”е–»пјҡ\"Music is a bridge.\" / \"Music is medicine for the soul.\"\n\nгҖҗPPT 06 еҶҷдҪңд»»еҠЎгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Your task: write a 120-word speech about how music changed YOUR life. Think about: When did music matter most to you? What happened? What did you learn? Take 1 minute to jot down your story idea.\"\n\nв–І еӯҰз”ҹжҖқиҖғ1еҲҶй’ҹгҖӮж•ҷеёҲе·Ўи§ҶпјҢеё®еҠ©BзҸӯеӯҰз”ҹзЎ®е®ҡж•…дәӢгҖӮ\n\nгҖҗе·®ејӮеҢ–жҸҗзӨәгҖ‘AзҸӯеҸҜиҮӘйҖүж•…дәӢи§’еәҰпјӣBзҸӯж•ҷеёҲжҸҗдҫӣж•…дәӢжЎҶжһ¶пјҡ\"When I was ___, I felt ___. Then I heard/played ___. It made me feel ___. I learned that ___.\""},{"step":"дёүгҖҒжЁЎжқҝиҫ…еҠ©+йҷҗж—¶еҶҷдҪң","time":15,"content":"гҖҗPPT 07 жј”и®ІжЁЎжқҝгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"12 minutes. Use the template if you need it. Go!\"\n\n[HOOK: 2 sentences вҖ” question, scene, or surprising fact]\n  What would your life be without ______? / Have you ever ______?\n\n[STORY: 4-5 sentences вҖ” when, what happened, how music helped]\n  I was ______ when ______. I felt ______. Then ______. Inspired by ______, I ______. Music ______.\n\n[LESSON: 3-4 sentences вҖ” what you learned + metaphor]\n  Tha o both are еүҚзҪ®?\"\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\"йғҪжҳҜеүҚйқўпјҒ\"\nгҖҗж•ҷеёҲиҝҪй—®гҖ‘\"Then what's the difference?\"\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\"booming жҳҜдёҖдёӘиҜҚпјҢarriving д№ҹжҳҜдёҖдёӘиҜҚвҖҰвҖҰ\"\nгҖҗж•ҷеёҲзә жӯЈгҖ‘\"Good eye. Both are single words, so both go BEFORE. But if it's a PHRASE вҖ” 'the man standing there' вҖ” the phrase MUST go AFTER.\"\n\nв–І жқҝд№Ұи§„еҲҷпјҡ\nеҚ•дёӘеҲҶиҜҚ вҶ’ еүҚзҪ®пјҡa sleeping child\nthe man standing thereпјҲзҹӯиҜӯпјүвҶ’ еҗҺзҪ®\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Rule: еҚ•дёӘеҲҶиҜҚеүҚзҪ®пјӣеҲҶиҜҚ+е®ҫиҜӯ/зҠ¶иҜӯзҡ„зҹӯиҜӯпјҢеҝ…йЎ»еҗҺзҪ®гҖӮ\"\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘ејәи°ғ 'the sitting girl there' вқҢ й”ҷиҜҜпјҢеә”дёә 'the girl sitting there' вң“гҖӮдҪҚзҪ®и§„еҲҷжҳҜжң¬иҠӮжңҖй«ҳйў‘й”ҷиҜҜгҖӮ\n\nгҖҗз»ғд№ гҖ‘PPT 04 еҚіж—¶з»ғпјҡжҠҠ 'the boy (play) basketball' еҸҳжҲҗжӯЈзЎ®еҪўејҸ вҶ’ the boy playing basketballпјҲзҹӯиҜӯеҗҺзҪ®пјүгҖӮ"},{"step":"дёүгҖҒDiscover 2 вҖ”вҖ” иЎЁиҜӯ vs иҝӣиЎҢж—¶","time":10,"content":"гҖҗPPT 05гҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Now Sentence 3: The festival is amazing. Is 'is amazing' зҺ°еңЁиҝӣиЎҢж—¶?\"\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\"жҳҜиҝӣиЎҢж—¶пјҹ\"\nгҖҗж•ҷеёҲгҖ‘\"No! иҝӣиЎҢж—¶йңҖиҰҒеҠЁдҪңеҠЁиҜҚпјҡThe girl is singing. = еҘ№жӯЈеңЁе”ұпјҲеҠЁдҪңпјүгҖӮдҪҶ The festival is amazing. = иҠӮж—Ҙд»ӨдәәжғҠеҸ№пјҲжҖ§иҙЁпјүгҖӮamazing жҳҜеҪўе®№иҜҚпјҢдёҚжҳҜеҠЁдҪңгҖӮ\"\n\nв–І жқҝд№ҰеҜ№жҜ”пјҡ\nThe girl is singing.   вҶ’ иҝӣиЎҢж—¶пјҲеҠЁдҪңпјҢsing жҳҜеҠЁиҜҚпјү\nThe song is pleasing.  вҶ’ иЎЁиҜӯпјҲжҖ§иҙЁпјҢpleasing жҳҜеҪўе®№иҜҚпјү\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Test: иғҪеҠ  'right now' дё”жҳҜеҠЁдҪң вҶ’ иҝӣиЎҢж—¶пјӣжҸҸиҝ°'жҖҺд№Ҳж ·' вҶ’ иЎЁиҜӯгҖӮ\"\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘иҝҷжҳҜжң¬иҠӮз¬¬дәҢеӨ§еқ‘гҖӮBзҸӯз»ҷдёӯж–ҮеҲӨж–ӯжі•пјҡ\"иғҪдёҚиғҪзҝ»иҜ‘жҲҗ'жӯЈеңЁвҖҰ'пјҹиғҪ=иҝӣиЎҢж—¶пјӣдёҚиғҪ=иЎЁиҜӯгҖӮ\""},{"step":"еӣӣгҖҒDiscover 3 вҖ”вҖ” -ing / -ed жғ…ж„ҹеҪўе®№иҜҚ","time":8,"content":"гҖҗPPT 06гҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"We say 'The festival is amazing.' But can we say 'I am amazing' about myself?\"\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\"дёҚиғҪпјҢеә”иҜҘжҳҜ I am amazed (by the festival).\"\nгҖҗж•ҷеёҲгҖ‘\"Exactly! -ing д»Өд const BOOK_SHORT = { 'еҝ…дҝ®з¬¬дёҖеҶҢ':'еҝ…дҝ®дёҖ', 'еҝ…дҝ®з¬¬дәҢеҶҢ':'еҝ…дҝ®дәҢ', 'еҝ…дҝ®з¬¬дёүеҶҢ':'еҝ…дҝ®дёү' };

// ===== зҠ¶жҖҒз®ЎзҗҶ =====
let state = {
  tab: 'index',
  filterBook: '',
  detailId: null,
  privacy: false,
  keyword: '',
  history: [],
  favFmt: 'word',
  downloads: [],
  recents: [],
  favorites: [],
  profile: { nickName: 'еҫ®дҝЎз”ЁжҲ·', avatarUrl: '' }
};

// ===== е·Ҙе…·еҮҪж•° =====
function $(id) { return document.getElementById(id); }

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 1400);
}

function getLesson(id) { return LESSONS.find(function(l){ return l.id === id; }); }

function escAttr(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function setNav(title, showBack) {
  $('navTitle').textContent = title;
  $('backBtn').style.display = showBack ? 'block' : 'none';
}

// ===== еҜјиҲӘ =====
function switchTab(tab) {
  state.tab = tab;
  state.detailId = null;
  state.privacy = false;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('on', t.dataset.tab === tab); });
  setNav('иӢұиҜӯж•ҷжЎҲеә“', false);
  const bar = document.querySelector('.dlbar');
  if (bar) bar.remove();
  render();
}

function goBack() {
  if (state.detailId) state.detailId = null;
  else if (state.privacy) state.privacy = false;
  render();
}

function openDetail(id) {
  state.detailId = id;
  if (state.recents.indexOf(id) < 0) {
    state.recents.unshift(id);
    if (state.recents.length > 50) state.recents.pop();
  }
  render();
}

function toggleFav(id) {
  const i = state.favorites.indexOf(id);
  if (i >= 0) {
    state.favorites.splice(i, 1);
    toast('е·ІеҸ–ж¶Ҳж”¶и—Ҹ');
  } else {
    state.favorites.unshift(id);
    toast('вҳ… е·Іж”¶и—Ҹ');
  }
  render();
}

// ===== жёІжҹ“е…ҘеҸЈ =====
function render() {
  const tab = state.tab;
  if (state.detailId) { renderDetail(); return; }
  if (state.privacy) { renderPrivacy(); return; }
  if (tab === 'index') renderIndex();
  else if (tab === 'favorites') renderFavorites();
  else if (tab === 'profile') renderProfile();
}

// ===== ж•ҷжЎҲеә“йЎөйқўпјҲеҶҢ вҶ’ еҚ•е…ғ вҶ’ жқҝеқ—пјҢжҢүд№Ұжң¬йЎәеәҸпјү=====
function renderIndex() {
  setNav('иӢұиҜӯж•ҷжЎҲеә“', false);
  let list = LESSONS.slice();
  if (state.filterBook) list = list.filter(function(l){ return l.book === state.filterBook; });
  if (state.keyword.trim()) {
    const kw = state.keyword.trim().toLowerCase();
    list = list.filter(function(l) {
      const hay = (l.title + ' ' + l.unitTitle + ' ' + (l.tags || []).join(' ') + ' ' + (l.overview || '') + ' ' +
        (l.keyPoints || '') + ' ' + (l.difficulties || '') + ' ' + (l.preparation || '') + ' ' +
        (l.objectives || []).join(' ') + ' ' + (l.process || []).map(function(s){ return s.step + ' ' + s.content; }).join(' ') + ' ' +
        (l.exercises || '') + ' ' + (l.reflection || '') + ' ' + (l.blackboard || '')).toLowerCase();
      return hay.indexOf(kw) !== -1;
    });
  }

  list = list.slice().sort(function(a, b) {
    return ((BOOK_ORDER[a.book] || 0) - (BOOK_ORDER[b.book] || 0)) ||
      (a.unitNumber - b.unitNumber) ||
      ((a.periodNumber || 0) - (b.periodNumber || 0));
  });

  // жҢү еҶҢ+еҚ•е…ғ еҲҶз»„пјҲ"е…ЁйғЁ"ж—¶ unitNumber и·ЁеҶҢйҮҚеӨҚпјҢеҝ…йЎ»з”ЁеҶҢеҢәеҲҶпјү
  const map = {};
  list.forEach(function(l) {
    const key = l.book + '|' + l.unitNumber;
    if (!map[key]) map[key] = { key: key, book: l.book, bookShort: BOOK_SHORT[l.book] || l.book, unitNumber: l.unitNumber, unitTitle: l.unitTitle, lessons: [] };
    map[key].lessons.push(l);
  });
  const groups = Object.keys(map).map(function(k){ return map[k]; }).sort(function(a, b) {
    return ((BOOK_ORDER[a.book] || 0) - (BOOK_ORDER[b.book] || 0)) || (a.unitNumber - b.unitNumber);
  });

  const TYPE_ICON = { 'listening-speaking':'рҹҺ§', 'reading':'рҹ“–', 'grammar':'вңҸпёҸ', 'listening-talking':'рҹ’¬', 'writing':'вңҚпёҸ', 'project':'рҹҺҜ' };
  const TYPE_BG = { 'listening-speaking':'#6b46c1', 'reading':'#1a365d', 'grammar':'#1a6840', 'listening-talking':'#b7791f', 'writing':'#7b341e', 'project':'#2c5282' };

  const bookChips = '<div class="chip ' + (state.filterBook ? '' : 'on') + '" onclick="setBook(&quot;&quot;)">е…ЁйғЁ</div>' +
    BOOKS.map(function(b) {
      return '<div class="chip ' + (state.filterBook === b ? 'on' : '') + '" onclick="setBook(&quot;' + escAttr(b) + '&quot;)">' + escAttr(b) + '</div>';
    }).join('');

  const groupHtml = groups.map(function(g) {
    const cards = g.lessons.map(function(l) {
      const fav = state.favorites.indexOf(l.id) >= 0;
      const ico = TYPE_ICON[l.lessonType] || 'рҹ“„';
      const bg = TYPE_BG[l.lessonType] || '#555';
      const star = fav ? '<div style="color:#e6a23c;font-size:20px">вҳ…</div>' : '';
      return '<div class="card" onclick="openDetail(&quot;' + escAttr(l.id) + '&quot;)">' +
        '<div class="row1">' +
          '<div class="docico" style="background:linear-gradient(135deg,' + bg + ',' + bg + 'dd)">' + ico + '</div>' +
          '<div style="flex:1">' +
            '<div class="ttl">' + escAttr(l.title) + '</div>' +
            '<div class="sub">' + escAttr(l.lessonTypeName) + ' В· ' + l.duration + 'еҲҶй’ҹ</div>' +
          '</div>' +
          star +
          '<div class="card-arrow">вҖә</div>' +
        '</div>' +
      '</div>';
    }).join('');

    return '<div class="unit-group">' +
      '<div class="unit-head"><span class="unit-no">' + escAttr(g.bookShort) + ' В· Unit ' + g.unitNumber + '</span><span class="unit-name">' + escAttr(g.unitTitle) + '</span></div>' +
      cards +
    '</div>';
  }).join('');

  const histHtml = (!state.keyword.trim() && state.history.length)
    ? '<div class="chips">' + state.history.map(function(h){ return '<div class="chip" onclick="onPrevHistory(&quot;' + escAttr(h) + '&quot;)">' + escAttr(h) + '</div>'; }).join('') + '</div>'
    : '';
  const searchVal = escAttr(state.keyword);
  $('content').innerHTML =
    '<div class="search">рҹ”Қ <input class="sin" placeholder="жҗңзҙўж•ҷжЎҲ/еҚ•е…ғ/е…ій”®иҜҚ" value="' + searchVal + '" onchange="onPrevSearch(this.value)"> ' + (state.keyword ? '<span class="searchx" onclick="onPrevClear()">вң•</span>' : '') + '</div>' +
    histHtml +
    '<div class="chips">' + bookChips + '</div>' +
    (groupHtml || '<div class="empty"><div class="e">рҹ“ӯ</div><div class="t">жІЎжңүеҢ№й…Қзҡ„ж•ҷжЎҲ</div><div class="p">жҚўдёӘе…ій”®иҜҚжҲ–зӯӣйҖүжқЎд»¶иҜ•иҜ•</div></div>');
}

function setBook(b) { state.filterBook = b; renderIndex(); }
function onPrevSearch(kw) {
  state.keyword = kw;
  const t = kw.trim();
  if (t && state.history[0] !== t) {
    state.history = [t].concat(state.history.filter(function(x){ return x !== t; })).slice(0, 10);
  }
  renderIndex();
}
function onPrevHistory(h) { state.keyword = h; renderIndex(); }
function onPrevClear() { state.keyword = ''; renderIndex(); }
