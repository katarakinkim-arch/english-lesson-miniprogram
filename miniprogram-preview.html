// ===== иҜҰжғ…йЎө =====
function renderDetail() {
  const l = getLesson(state.detailId);
  if (!l) { state.detailId = null; render(); return; }
  setNav((l.lessonTypeName || 'ж•ҷжЎҲиҜҰжғ…'), true);

  const CN = ['дёҖ', 'дәҢ', 'дёү', 'еӣӣ', 'дә”', 'е…ӯ', 'дёғ', 'е…«', 'д№қ', 'еҚҒ', 'еҚҒдёҖ', 'еҚҒдәҢ'];
  const secs = [];
  let si = 0;
  const add = function(name, payload) { if (payload) { si++; secs.push(Object.assign({ no: CN[si - 1], name: name, key: name }, payload)); } };
  add('ж•ҷжқҗеҲҶжһҗ', l.textbookAnalysis && { body: l.textbookAnalysis });
  add('еӯҰжғ…еҲҶжһҗ', l.overview && { body: l.overview });
  add('ж•ҷеӯҰзӣ®ж Ү', l.objectives && l.objectives.length && { list: l.objectives });
  add('ж•ҷеӯҰйҮҚзӮ№', l.keyPoints && { body: l.keyPoints });
  add('ж•ҷеӯҰйҡҫзӮ№', l.difficulties && { body: l.difficulties });
  add('ж•ҷеӯҰж–№жі•', l.teachingMethods && { body: l.teachingMethods });
  add('иҜҫеүҚеҮҶеӨҮ', l.preparation && { body: l.preparation });
  add('ж•ҷеӯҰиҝҮзЁӢ', l.process && l.process.length && { steps: l.process.map(function(s, i){ return { n: i + 1, name: s.step || s.name || ('жӯҘйӘӨ' + (i + 1)), time: s.time || '', content: s.content || '' }; }) });
  add('жқҝд№Ұи®ҫи®Ў', l.blackboard && { body: l.blackboard });
  add('иҜҫеҗҺз»ғд№ ', l.exercises && { body: l.exercises });
  add('ж•ҷеӯҰеҸҚжҖқ', l.reflection && { body: l.reflection });

  let secHtml = '';
  secs.forEach(function(sec) {
    if (sec.list) {
      secHtml += '<div class="sec"><h3><span class="sno">' + sec.no + '</span>' + sec.name + '<span class="scopy" onclick="copySection(&quot;' + escAttr(sec.key) + '&quot;)">еӨҚеҲ¶</span></h3><ul>' + sec.list.map(function(x){ return '<li>' + escAttr(x) + '</li>'; }).join('') + '</ul></div>';
    } else if (sec.steps) {
      let stepsHtml = '';
      sec.steps.forEach(function(s) {
        stepsHtml += '<div class="step"><div class="sn"><span class="sno sm">' + s.n + '</span>' + escAttr(s.name) + '<span class="st">' + escAttr(s.time) + '</span></div><p>' + escAttr(s.content) + '</p></div>';
      });
      secHtml += '<div class="sec"><h3><span class="sno">' + sec.no + '</span>' + sec.name + '<span class="scopy" onclick="copySection(&quot;' + escAttr(sec.key) + '&quot;)">еӨҚеҲ¶</span></h3>' + stepsHtml + '</div>';
    } else {
      secHtml += '<div class="sec"><h3><span class="sno">' + sec.no + '</span>' + sec.name + '<span class="scopy" onclick="copySection(&quot;' + escAttr(sec.key) + '&quot;)">еӨҚеҲ¶</span></h3><p>' + escAttr(sec.body) + '</p></div>';
    }
  });

  const fav = state.favorites.indexOf(l.id) >= 0;
  const fid = escAttr(l.id);

  let html = '';
  html += '<div class="hero">';
  html += '  <div class="badges2"><span class="badge2">' + escAttr(l.book) + '</span><span class="badge2">' + escAttr(l.lessonTypeName) + '</span><span class="badge2">' + l.duration + 'еҲҶй’ҹ</span></div>';
  html += '  <h1>' + escAttr(l.title) + '</h1>';
  html += '  <div class="hsub">' + escAttr(l.unitTitle) + '</div>';
  html += '  <div class="hstat">жөҸи§Ҳ ' + (l.viewCount || 0) + ' В· дёӢиҪҪ ' + (l.downloadCount || 0) + '</div>';
  html += '</div>';
  html += secHtml;
  html += '<div class="hint" style="margin-top:8px">вҖ” д»ҘдёӢдёәе°ҸзЁӢеәҸдёӢиҪҪж ҸпјҢйў„и§ҲдёӯзӮ№еҮ»дјҡжҸҗзӨәж•Ҳжһң вҖ”</div><div style="height:70px"></div>';

  $('content').innerHTML = html;

  let bar = document.querySelector('.dlbar');
  if (bar) bar.remove();
  bar = document.createElement('div');
  bar.className = 'dlbar';
  bar.innerHTML =
    '<span class="fav" onclick="toggleFav(&quot;' + fid + '&quot;)">' + (fav ? 'вҳ…' : 'вҳҶ') + '</span>' +
    '<div class="fmts">' +
      '<span class="fmt ' + (state.favFmt === 'word' ? 'on' : '') + '" onclick="setFmt(&quot;word&quot;)">Word</span>' +
      '<span class="fmt ' + (state.favFmt === 'pdf' ? 'on' : '') + '" onclick="setFmt(&quot;pdf&quot;)">PDF</span>' +
      '<span class="fmt ' + (state.favFmt === 'ppt' ? 'on' : '') + '" onclick="setFmt(&quot;ppt&quot;)">PPT</span>' +
    '</div>' +
    '<div class="btn" onclick="doDownload(&quot;' + fid + '&quot;)">в¬Ү дёӢиҪҪ ' + state.favFmt.toUpperCase() + '</div>';
  $('content').appendChild(bar);
}

function setFmt(f) { state.favFmt = f; renderDetail(); }
function copySection(key) { toast('е·ІеӨҚеҲ¶жң¬иҠӮпјҲйў„и§ҲзүҲпјү'); }

function doDownload(id) {
  const l = getLesson(id);
  if (l && state.downloads.indexOf(id) < 0) state.downloads.unshift(id);
  toast('е·Із”ҹжҲҗ ' + state.favFmt.toUpperCase() + 'пјҲйў„и§Ҳпјҡе®һйҷ…дјҡеңЁеҫ®дҝЎдёӯжү“ејҖж–Үд»¶пјү');
  renderDetail();
}

// ===== жё…з©әж“ҚдҪң =====
function clearAll(kind) {
  if (kind === 'fav') { state.favorites = []; toast('е·Іжё…з©әж”¶и—Ҹ'); }
  else if (kind === 'dl') { state.downloads = []; toast('е·Іжё…з©әдёӢиҪҪ'); }
  else if (kind === 'rc') { state.recents = []; toast('е·Іжё…з©әжөҸи§Ҳ'); }
  else if (kind === 'all') { state.favorites = []; state.downloads = []; state.recents = []; toast('е·Іжё…з©әе…ЁйғЁ'); }
  render();
}

// ===== еҲқе§ӢеҢ–жј”зӨәж•°жҚ® & йҰ–ж¬ЎжёІжҹ“ =====
$('backBtn').addEventListener('click', goBack);
state.downloads = ['l-eng-b1-u1-reading', 'l-eng-b1-u1-grammar'];
state.recents = ['l-eng-b1-u1-reading', 'l-eng-b1-u2-writing', 'l-eng-b2-u1-reading'];
state.favorites = ['l-eng-b1-u1-grammar'];
render();
</script>
