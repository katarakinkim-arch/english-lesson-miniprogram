and glory to our country\"\nSpirit: 5 вҖ” \"didn't lose heart\" despite injuries to players\n\nгҖҗж•ҷеёҲиҝҪй—®гҖ‘\"What was Lang Ping's biggest challenge in 2015?\"\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\"Two important players were injured.\"\nгҖҗж•ҷеёҲиҝҪй—®гҖ‘\"Did she give up?\"\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\"No! She believed in her young players and they won.\"\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"That's the spirit of a legend вҖ” facing difficulties and still winning.\""},{"step":"дёүгҖҒSecond Reading вҖ” Michael Jordan","time":12,"content":"гҖҗPPT 05 д№”дё№иҜ„еҲҶиЎЁгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Now read about Jordan. Same rating sheet. 4 minutes.\"\nв–І еӯҰз”ҹйҳ…иҜ»+иҜ„еҲҶ4еҲҶй’ҹгҖӮ\nгҖҗж ёеҜ№зӯ”жЎҲгҖ‘\nAchievement: 5 вҖ” \"changed basketball with his graceful moves and jumps\"\nLeadership: 4 вҖ” \"made the NBA famous around the world\"\nSpirit: 5 вҖ” \"I can accept failure, but I can't accept not trying\"\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Jordan's famous quote: 'I can accept failure, but I can't accept not trying.' What does this mean?\"\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\"еӨұиҙҘеҸҜд»ҘжҺҘеҸ—пјҢдҪҶдёҚе°қиҜ•дёҚиЎҢгҖӮ\"\nгҖҗж•ҷеёҲиҝҪй—®гҖ‘\"Was Jordan always successful?\"\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\"No. He was cut from his high school team.\"\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Exactly. The greatest basketball player FAILED first. But he didn't stop trying. That's what makes him a legend.\""},{"step":"еӣӣгҖҒComparison еҜ№жҜ”и®Ёи®ә","time":8,"content":"гҖҗPPT 07 и®Ёи®әжЎҶжһ¶гҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Lang Ping and Jordan вҖ” two different sports, two different countries. What do they have in COMMON?\"\nв–І е°Ҹз»„и®Ёи®ә3еҲҶй’ҹгҖӮ\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\n- Both faced failures/challenges and overcame them.\n- Both inspired others.\n- Both had determination.\n- Both brought glory to their sport.\n\nгҖҗж•ҷеёҲж”¶е°ҫгҖ‘\"A legend isn't someone who never loses. A legend is someone who loses, learns, and comes back stronger. Lang Ping lost players to injury but won the World Cup. Jordan was cut from his team but became the greatest. That's what makes them living legends.\""},{"step":"дә”гҖҒSummary & Homework","time":3,"content":"гҖҗPPT 09 жЈҖжөӢгҖ‘гҖҗPPT 10 дҪңдёҡгҖ‘\nв–І еҝ«йҖҹжЈҖжөӢпјҡ\nв‘  Lang Ping led the Chinese women's volleyball team to _____ in Brazil. (Olympic gold)\nв‘Ў Jordan says: \"I can accept _____, but I can't accept _____.\" (failure / not trying)\nв‘ў Both legends share the quality of _____. (determination / never giving up)\n\nгҖҗдҪңдёҡгҖ‘еҶҷдёҖж®өиҜқпјҲ50иҜҚпјүпјҡдҪ еҝғдёӯзҡ„\"living legend\"жҳҜи°Ғпјҹдёәд»Җд№ҲпјҹиҮіе°‘дҪҝз”Ё3дёӘжң¬иҜҫиҜҚжұҮгҖӮ"}],"blackboard":"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  U3 Living Legends of Sports                  в”Ӯ\nв”Ӯ                                               в”Ӯ\nв”Ӯ  Lang Ping           |   Michael Jordan       в”Ӯ\nв”Ӯ  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ   |   в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ  в”Ӯ\nв”Ӯ  Player + Coach      |   \"Air Jordan\"         в”Ӯ\nв”Ӯ  Lost players        |   Cut from HS team     в”Ӯ\nв”Ӯ  вҶ’ Won World Cup     |   вҶ’ Became the greatestв”Ӯ\nв”Ӯ  \"didn't lose heart\" |   \"can't accept        в”Ӯ\nв”Ӯ                      |    not trying\"         в”Ӯ\nв”Ӯ                                               в”Ӯ\nв”Ӯ  Common: determination + overcome failure     в”Ӯ\nв”Ӯ  Key: legend, honour, glory, determination    в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ","exercises":"гҖҗеҹәзЎҖдҪңдёҡгҖ‘пјҲйў„и®Ў15еҲҶй’ҹпјү\n1. еҶҷ50иҜҚж®өиҗҪпјҡдҪ еҝғдёӯзҡ„\"living legend\"жҳҜи°Ғпјҹдёәд»Җд№ҲпјҹиҮіе°‘дҪҝз”Ёlegend, determination, honour/gloryдёүдёӘиҜҚгҖӮ\n2. иҜҚжұҮеҢ№й…Қпјҡ\n  в‘  legend  A. the quality of being determined to do something\n  в‘Ў determination B. a famous person, especially in a particular field\n  в‘ў honour C. respect and admiration\n  в‘Ј failure D. lack of success\n  зӯ”жЎҲпјҡв‘ B в‘ЎA в‘ўC ellness Book\"йЎөйқўзҡ„еҶҷдҪңиҰҒзҙ ","жҖқз»ҙе“ҒиҙЁпјҡеҸҚжҖқиҮӘе·ұзҡ„еҒҘеә·д№ жғҜпјҢжҸҗеҮәж”№иҝӣи®ЎеҲ’"],"keyPoints":"в‘ еҒҘеә·еҶҷдҪңз»“жһ„пјҡй—®йўҳвҶ’ж”№еҸҳвҶ’ж•ҲжһңвҶ’ж„ҹеҸ—\nв‘Ўж ёеҝғиҜҚжұҮпјҡfitness, wellness, balanced, stressed, work out, used to\nв‘ў\"used to + do\" vs \"now I...\"еҜ№жҜ”з»“жһ„","difficulties":"в‘ д»ҺеҲ—дёҫиЎҢдёәеҚҮзә§еҲ°иЎЁиҫҫж„ҹеҸ—вҖ”вҖ”еӯҰз”ҹйңҖиҰҒеӯҰдјҡиҜҙ\"I feel more energetic\"иҖҢдёҚеҸӘжҳҜ\"I exercise\"\nв‘Ўused toз»“жһ„зҡ„жӯЈзЎ®дҪҝз”Ё","preparation":"гҖҗPPTиҜҫд»¶гҖ‘е…ұ7йЎө\n01-е°ҒйқўпјҡA Page for a Wellness Book\n02-еҜје…ҘпјҡдҪ зҡ„еҒҘеә·д№ жғҜиҮӘиҜ„\n03-иҢғж–ҮеҲҶжһҗпјҲж ҮжіЁз»“жһ„пјү\n04-еҠҹиғҪеҸҘејҸеә“\n05-еҶҷдҪңжЁЎжқҝ\n06-дә’иҜ„checklist\n07-дҪңдёҡеёғзҪ®","process":[{"step":"дёҖгҖҒLead-in еҜје…Ҙ","time":5,"content":"гҖҗPPT 02 еҒҘеә·иҮӘиҜ„гҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Rate your health habits: 1-5 stars. Exercise? Diet? Sleep? Stress?\"\nв–І еӯҰз”ҹиҮӘиҜ„1еҲҶй’ҹгҖӮ\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Most of us are NOT 5 stars. That's normal. Today we write about our health journey вҖ” what we used to do and what we do now. Open page 26.\"\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Read the model text. 2 minutes. Find: What problem did the writer have? What changed? How does the writer feel now?\""},{"step":"дәҢгҖҒModel Analysis иҢғж–ҮеҲҶжһҗ","time":10,"content":"гҖҗPPT 03 иҢғж–ҮеҲҶжһҗгҖ‘\n\nв–І йўңиүІж ҮжіЁиҢғж–Үз»“жһ„пјҡ\nзәўиүІ = й—®йўҳпјҲI used to... I didn't...пјү\nи“қиүІ = ж”№еҸҳпјҲNow I... I started...пјү\nз»ҝиүІ = ж•Ҳжһң/ж„ҹеҸ—пјҲI feel... I'm more...пјү\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Notice the structure: Problem вҶ’ Change вҶ’ Result. The writer uses 'used to' for the past and 'now' for the present. This is the KEY pattern for a wellness page.\"\n\nв–І жқҝд№ҰеҸҘејҸпјҡ\nProblem: I used to... / I didn't use to...\nChange: Now I... / I started to... / I decided to...\nResult: I feel... / I'm more... / I'm happier/healthier...\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"The writer doesn't just say 'I exercise.' She says 'I feel more energetic and less stressed.' That's the FEELING, not just the action. This is what makes a good wellness page.\""},{"step":"дёүгҖҒWrite еҶҷдҪң","time":15,"content":"гҖҗPPT 05 еҶҷдҪңжЁЎжқҝгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Write a page for our class Wellness Book (100 words). Structure: Problem вҶ’ Change вҶ’ Result. Use 'used to' and 'now'. Include at least 2 feeling words. 12 minutes.\"\n\nв–І еҶҷдҪңжЎҶжһ¶пјҡ\nI used to _____. I didn't _____.\nNow I _____. I started _____.\nI feel _____. I'm more _____ than before.\n\nв–І еӯҰз”ҹеҶҷдҪң12еҲҶй’ҹгҖӮж•ҷеёҲе·Ўи§ҶгҖӮ\nгҖҗе·Ўи§Ҷе…іжіЁзӮ№гҖ‘\n- жҳҜеҗҰз”ЁдәҶused toз»“жһ„пјҹ\n- жҳҜеҗҰжңүж„ҹеҸ—иҜҚпјҹ\n- жҳҜеҗҰеҸӘжҳҜеҲ—дёҫиЎҢдёәжІЎжңүж„ҹеҸ—пјҹ\n\nгҖҗе·®ејӮеҢ–жҸҗзӨәгҖ‘\nAзҸӯпјҡ100иҜҚпјҢиҮіе°‘3дёӘж„ҹеҸ—иҜҚпјҢз»“жһ„е®Ңж•ҙгҖӮ\nBзҸӯпјҡ80иҜҚпјҢдҪҝз”ЁжЁЎжқҝеЎ«з©әпјҢиҮіе°‘1дёӘж„ҹеҸ—иҜҚгҖӮ"},{"step":"еӣӣгҖҒPeer Review дә’иҜ„","time":5,"content":"гҖҗPPT 06 checklistгҖ‘\nв–Ў еҢ…еҗ«used toз»“жһ„\nв–Ў еҢ…еҗ«nowзҡ„еҜ№жҜ”\nв–Ў иҮіе°‘2дёӘж„ҹеҸ—иҜҚ\nв–Ў жңүжҳҺзЎ®зҡ„й—®йўҳвҶ’ж”№еҸҳвҶ’з»“жһңз»“жһ„\nв–Ў иҜҚж•°80-120\n\nв–І дә’иҜ„3еҲҶй’ҹгҖӮйҖү1-2зҜҮеұ•зӨәгҖӮ\n\nгҖҗйў„и®ҫдјҳз§ҖдҪңе“ҒгҖ‘\n\"I used to stay up late and eat junk food. I didn't exercise at all. I always felt tired and stressed. Now I run for 30 minutes every morning and eat more vegetables. I started going to bed before 11. I feel much more energetic and less stressed. I'm happier and healthier than before!\""},{"step":"дә”гҖҒSummary & Homework","time":5,"content":"гҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"A good wellness page is not just a list of what you do. It's about the CHANGE and how you FEEL. Remember: Problem вҶ’ Change вҶ’ Result + Feelings.\"\n\nгҖҗдҪңдёҡгҖ‘дҝ®ж”№wellness pageпјҢеҠ е…ҘдёҖдёӘ\"еҒҘеә·е°ҸиҙҙеЈ«\"пјҲhealth tipпјүз»ҷеҗҢеӯҰгҖӮ"}],"blackboard":"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  A Page for a Wellness Book               в”Ӯ\nв”Ӯ                                           в”Ӯ\nв”Ӯ  Structure:                               в”Ӯ\nв”Ӯ  Problem:  I used to... I didn пјү+ е…ізҒҜ\n03-ж—¶й—ҙзәҝжЁЎжқҝпјҲдёүиүІж ҮжіЁпјү\n04-йңҮеүҚејӮеёёпјҲеҠЁзү©иЎҢдёә+ж°ҙдҪҚеҸҳеҢ–пјү\n05-йңҮдёӯжғЁзғҲпјҲж•°жҚ®+ж„ҹе®ҳжҸҸеҶҷпјү\n06-йңҮеҗҺж•‘жҸҙпјҲеҶӣйҳҹ+е№ёеӯҳиҖ…пјү\n07-еҹҺеёӮйҮҚе»әпјҲж–°е”җеұұз…§зүҮпјү\n08-дҝ®иҫһжүӢжі•еҲҶжһҗпјҲж Үйўҳ+е…ій”®еҸҘпјү\n09-иҜҫе ӮжЈҖжөӢ\n10-дҪңдёҡеёғзҪ®\n\nгҖҗе®һзү©ж•ҷе…·гҖ‘\n- йңҮеүҚ/йңҮеҗҺеҜ№жҜ”з…§зүҮ\n- ж–°е”җеұұе»әи®ҫз…§зүҮ","process":[{"step":"дёҖгҖҒLead-in еҜје…ҘвҖ”вҖ”15з§’йқҷй»ҳ","time":5,"content":"гҖҗPPT 02 й»‘еұҸ+йҹіж•ҲгҖ‘\n\nв–І е…ізҒҜгҖӮж’ӯж”ҫ15з§’ең°йңҮең°йёЈеЈ°ж•ҲгҖӮж•ҷе®Өе®Ңе…Ёе®үйқҷгҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘пјҲејҖзҒҜпјү\"You heard it. The ground shook. What would you do in that moment?\"\nв–І еӯҰз”ҹжҖқиҖғ10з§’гҖӮ\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\"Run!\" / \"Hide under a table.\" / \"Call my family.\"\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"In 1976, at 3:42 AM, the city of Tangshan had NO time to react. In 23 seconds, the city was destroyed. Today we read about that night. Open page 34.\""},{"step":"дәҢгҖҒFirst Reading вҖ” Timeline ж—¶й—ҙзәҝ","time":10,"content":"гҖҗPPT 03 ж—¶й—ҙзәҝжЁЎжқҝгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Read the text. Fill in the timeline. Use THREE colors: yellow=before, red=during, green=after. 4 minutes.\"\n\nв–І ж—¶й—ҙзәҝжЁЎжқҝпјҡ\nрҹҹЎ Before: animals behaved strangely, well water rose and fell\nрҹ”ҙ During: 3:42 AM, 23 seconds, city in ruins, 400,000 killed/injured\nрҹҹ  After: army arrived, rescue began, survivors helped each other\nрҹҹў Rebuild: new Tangshan rose from the ruins\n\nв–І еӯҰз”ҹйҳ…иҜ»+еЎ«ж—¶й—ҙзәҝ4еҲҶй’ҹгҖӮж•ҷеёҲе·Ўи§ҶгҖӮ\nгҖҗж ёеҜ№зӯ”жЎҲгҖ‘йҖҗж®өж ёеҜ№гҖӮ\nгҖҗж•ҷеёҲиҝҪй—®гҖ‘\"Before the earthquake, what did animals do?\"\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\"Chickens/pigs didn't eat. Mice ran out. Fish jumped out of bowls.\"\nгҖҗж•ҷеёҲиҝҪй—®гҖ‘\"Why didn't people recognize these warnings?\"\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\"They were asleep.\" / \"They didn't know what it meant.\""},{"step":"дёүгҖҒClose Reading вҖ” Language as Experience иҜӯиЁҖеҲҶжһҗ","time":15,"content":"гҖҗPPT 08 дҝ®иҫһеҲҶжһҗгҖ‘\n\nвҳ… ж ҮйўҳеҲҶжһҗпјҲ3еҲҶй’ҹпјү\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"The title: 'The Night the Earth Didn't Sleep.' Why didn't the earth sleep?\"\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\"Because the earthquake happened.\" / \"еӣ дёәең°зҗғйҶ’дәҶгҖӮ\"\nгҖҗж•ҷеёҲиҝҪй—®гҖ‘\"But why not just say 'The Tangshan Earthquake'? Why use 'didn't sleep'?\"\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘пјҲжІүй»ҳжҖқиҖғпјү\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"This is PERSONIFICATION вҖ” making the earth feel like a living thing. The earth 'didn't sleep' = the earth was restless, active, dangerous. It makes the reader FEEL the horror, not just know the facts.\"\n\nвҳ… ж„ҹе®ҳжҸҸеҶҷеҲҶжһҗпјҲ7еҲҶй’ҹпјү\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Find sentences that describe what people SAW, HEARD, and FELT.\"\nв–І еӯҰз”ҹжүҫж„ҹе®ҳжҸҸеҶҷеҸҘпјҡ\nSaw: \"bright lights in the sky\" / \"a large city lay in ruins\"\nHeard: \"a loud sound could be heard\" / \"cries of people\"\nFelt: \"the ground shook\" / \"everything was destroyed\"\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"The writer doesn't just tell you 'the earthquake was bad.' He makes you SEE it, HEAR it, FEEL it. That's literary journalism вҖ” facts + literature.\"\n\nвҳ… е…ій”®еҸҘеҲҶжһҗпјҲ5еҲҶй’ҹпјү\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Last sentence: 'With strong support from the government and the tireless efforts of the city's people, a new Tangshan was built upon the earthquake ruins.' What does this tell us?\"\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\"The city was rebuilt.\" / \"People didn't give up.\"\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Tireless efforts вҖ” they never stopped working. Strong support вҖ” they weren't alone. This is the message: destruction is not the end.\""},{"step":"еӣӣгҖҒReflection еҸҚжҖқи®Ёи®ә","time":5,"content":"гҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Tangshan was destroyed in 23 seconds. It was rebuilt in 10 years. What makes a city rise from ruins вҖ” money? Technology? Or something else?\"\nв–І е°Ҹз»„и®Ёи®ә2еҲҶй’ҹгҖӮ\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\"People's spirit.\" / \"Government help.\" / \"Hope.\"\nгҖҗж•ҷеёҲж”¶е°ҫгҖ‘\"Tangshan teaches us: disasters destroy buildings, but they cannot destroy the human spirit.\""},{"step":"дә”гҖҒSummary & Homework","time":5,"content":"гҖҗPPT 09 жЈҖжөӢгҖ‘гҖҗPPT 10 дҪңдёҡгҖ‘\nв–І еҝ«йҖҹжЈҖжөӢпјҡ\nв‘  The earthquake happened at _____ AM. (3:42)\nв‘Ў The title uses _____ to describe the earth. (personification)\nв‘ў _____ people were killed or injured. (400,000)\n\nгҖҗдҪңдёҡгҖ‘еҶҷдёҖеҸҘиҜқпјҡWhat did you learn about human resilience from this text?пјҲ50иҜҚд»ҘдёҠпјү"}],"blackboard":"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  U4 The Night the Earth Didn't Sleep          в”Ӯ\nв”Ӯ                                               в”Ӯ\nв”Ӯ  Timeline:                                    в”Ӯ\nв”Ӯ  рҹҹЎ Warning signs (animals, water)            в”Ӯ\nв”Ӯ      вҶ“                                        в”Ӯ\nв”Ӯ  рҹ”ҙ 3:42am, 23 seconds, city in ruins         в”Ӯ\nв”Ӯ      вҶ“                                        в”Ӯ\nв”Ӯ  рҹҹ  Death + Destruction + Rescue begins       в”Ӯ\nв”Ӯ      вҶ“                                        в”Ӯ\nв”Ӯ  рҹҹў New Tangshan built on ruins               в”Ӯ\nв”Ӯ                                               в”Ӯ\nв”Ӯ  Personification: \"the earth didn't sleep\"    в”Ӯ\nв”Ӯ  = restless, active, dangerous                в”Ӯ\nв”Ӯ                                               в”Ӯ\nв”Ӯ  Key: disaster, ruin, trap, rescue, shelter   в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ","exercises":"гҖҗеҹәзЎҖдҪңдёҡгҖ‘пјҲйў„и®Ў15еҲҶй’ҹпјү\n1. еҶҷ50иҜҚд»ҘдёҠпјҡWhat did you learn about human resilience from this text?\n2. иҜҚжұҮеҢ№й…Қпјҡ\n  в‘  disaster  A. to save someone from danger\n  в‘Ў rescue   B. a sudden event causing great damage\n  в‘ў ruin     C. to cause great damage to something\n  в‘Ј destroy  D. the remains of something destroyed\n  зӯ”жЎҲпјҡв‘ B в‘ЎA в‘ўD в‘ЈC\n3. еӣһзӯ”й—®йўҳпјҡ\nв‘  What time did the earthquake happen? (3:42 AM)\nв‘Ў How long did the earthquake last? (23 seconds)\nв‘ў What is the meaning of the title \"The Night the Earth Didn't Sleep\"? (жӢҹдәәжүӢжі•пјҢжҡ—зӨәеӨ§ең°еңЁең°йңҮдёӯ\"йҶ’жқҘ\"дәҶ)\n\nгҖҗжҸҗй«ҳдҪңдёҡгҖ‘пјҲйҖүеҒҡпјҢйў„и®Ў10еҲҶй’ҹпјү\n4. жүҫеҮәиҜҫж–Үдёӯзҡ„3дёӘж„ҹе®ҳжҸҸеҶҷеҸҘпјҲи§Ҷи§ү/еҗ¬и§ү/и§Ұи§үеҗ„1дёӘпјүпјҢж ҮжіЁзұ»еһӢгҖӮ\n5. жҖқиҖғйўҳпјҡеҰӮжһңд»ҠеӨ©еҸ‘з”ҹең°йңҮпјҢдёҺ1976е№ҙзӣёжҜ”пјҢд»Җд№ҲдјҡдёҚеҗҢпјҹпјҲйў„иӯҰжҠҖжңҜгҖҒж•‘жҸҙи®ҫеӨҮгҖҒдҝЎжҒҜдј ж’ӯйҖҹеәҰзӯүпјү","reflection":"вң… дә®зӮ№пјҡ\n1. е…ізҒҜж”ҫең°йёЈеЈ°йӮЈ15з§’жҳҜе…Ёе№ҙжңҖжңүеҠӣйҮҸзҡ„15з§’вҖ”вҖ”ж•ҷе®Өе®Ңе…Ёе®үйқҷпјҢеӯҰз”ҹзӣҜзқҖеұҸе№•\n2. жңүеӯҰз”ҹиҜҙ\"иҖҒеёҲжҲ‘йёЎзҡ®з–ҷзҳ©иө·жқҘдәҶ\"вҖ”вҖ”еҘҪзҡ„еҜје…ҘдёҚйқ fancyзҡ„PPTпјҢйқ ж°ӣеӣҙ\n3. жӢҹдәәжүӢжі•еҲҶжһҗи®©BзҸӯеӯҰз”ҹд№ҹиғҪж„ҹеҸ—еҲ°\"иҝҷеҸҘиҜқеҶҷеҫ—еҘҪ\"\n\nвҡ пёҸ йңҖж”№иҝӣпјҡ\n1. дҝ®иҫһжүӢжі•еҲҶжһҗеҜ№BзҸӯеӨӘжҠҪиұЎвҖ”вҖ”дёӢж¬Ўз»ҷе…·дҪ“йҖүйЎ№и®©д»–д»¬йҖү\n2. ж—¶й—ҙзәҝжўізҗҶеңЁBзҸӯз”ЁдәҶ15еҲҶй’ҹпјҲи®ЎеҲ’10еҲҶпјүвҖ”вҖ”дёӢж¬Ўз»ҷBзҸӯж ҮжіЁж®өиҗҪеҸ·\n3. жңүеӯҰз”ҹиҜҫеҗҺй—®\"2008е№ҙжұ¶е·қең°йңҮд№ҹжҳҜиҝҷж ·еҗ—пјҹ\"вҖ”вҖ”иҜҙжҳҺж–Үжң¬жҝҖеҸ‘дәҶзңҹе®һзҡ„жғ…ж„ҹиҝһжҺҘ","aiModel":"AIиҫ…еҠ©+дәәе·Ҙе®Ўж ё","viewCount":124,"downloadCount":102,"createdAt":"2026-07-08T10:00:00Z"},{"id":"l-eng-b1-u4-grammar","lessonId":"l-eng-b1-u4-grammar","title":"Discovering Useful Structures: Restrictive Relative Clauses (that/which/who/whom)","grade":"й«ҳдёӯ","subject":"иӢұиҜӯ","textbook":"дәәж•ҷзүҲпјҲ2019зүҲпјү","book":"еҝ…дҝ®з¬¬дёҖеҶҢ","unitNumber":4,"unitTitle":"Natural Disasters","lessonType":"grammar","lessonTypeName":"иҜӯжі•иҜҫ","lessonNumber":2,"duration":40,"tags":["иҜӯжі•","еҗ«жқҝд№Ұ","ж— и„‘еҸҜз”Ё"],"overview":"жң¬еҚ•е…ғиҜӯжі•зӮ№пјҡйҷҗеҲ¶жҖ§е®ҡиҜӯд»ҺеҸҘпјҲRestrictive Relative ClausesпјүпјҢе…ізі»д»ЈиҜҚ that/which/who/whomгҖӮеӯҰз”ҹеңЁеҲқдёӯе·ІеҲқжӯҘжҺҘи§Ұе®ҡиҜӯд»ҺеҸҘпјҢдҪҶзјәд№Ҹзі»з»ҹжўізҗҶгҖӮ\n\nгҖҗеӯҰжғ…еҲҶжһҗгҖ‘еӯҰз”ҹжңҖеӨ§зҡ„еӣ°жғ‘жҳҜ\"д»Җд№Ҳж—¶еҖҷз”ЁthatпјҢд»Җд№Ҳж—¶еҖҷз”Ёwhich\"гҖӮеҲқдёӯиҖҒеёҲеҸҜиғҪж•ҷиҝҮеҸЈиҜҖдҪҶеӯҰз”ҹи®°дёҚжё…гҖӮжң¬иҜҫйңҖиҰҒз”Ёз®ҖжҙҒзҡ„и§„еҲҷ+еӨ§йҮҸз»ғд№ жқҘе·©еӣәгҖӮAзҸӯеҸҜд»ҘеӨ„зҗҶthat/whichдә’жҚўзҡ„дҫӢеӨ–жғ…еҶөпјӣBзҸӯеҸӘйңҖиҰҒжҺҢжҸЎеҹәжң¬и§„еҲҷгҖӮ","objectives":["иҜӯиЁҖиғҪеҠӣпјҡжҺҢжҸЎйҷҗеҲ¶жҖ§е®ҡиҜӯд»ҺеҸҘзҡ„з»“жһ„пјҲе…ҲиЎҢиҜҚ+е…ізі»д»ЈиҜҚ+д»ҺеҸҘпјү","иҜӯиЁҖиғҪеҠӣпјҡжӯЈзЎ®йҖүжӢ©е…ізі»д»ЈиҜҚ that/which/who/whom","еӯҰд№ иғҪеҠӣпјҡйҖҡиҝҮиҜҫж–ҮеҺҹеҸҘеҸ‘зҺ°е№¶еҪ’зәіи§„еҲҷ","жҖқз»ҙе“ҒиҙЁпјҡзҗҶи§Је®ҡиҜӯд»ҺеҸҘдҪҝиЎЁиҫҫжӣҙзІҫзЎ®зҡ„еҠҹиғҪ"],"keyPoints":"в‘ е…ҲиЎҢиҜҚжҳҜдәәвҶ’who/thatпјҲдё»ж јпјү/whomпјҲе®ҫж јпјү\nв‘Ўе…ҲиЎҢиҜҚжҳҜзү©вҶ’which/that\nв‘ўthatж—ўеҸҜжҢҮдәәд№ҹеҸҜжҢҮзү©пјҲйҖҡз”Ёпјү\nв‘ЈthatдёҚиғҪз”ЁдәҺйҖ—еҸ·еҗҺпјҲйқһйҷҗеҲ¶жҖ§пјүпјҢwhichеҸҜд»Ҙ","difficulties":"в‘ that vs whichзҡ„йҖүжӢ©вҖ”вҖ”и§„еҲҷпјҡйҖ—еҸ·еҗҺеҸӘиғҪз”ЁwhichдёҚиғҪз”ЁthatпјӣдҪҶйҷҗеҲ¶жҖ§д»ҺеҸҘдёӯдёӨиҖ…еқҮеҸҜпјҲзҫҺеӣҪиӢұиҜӯеҖҫеҗ‘thatпјү\nв‘ЎwhoпјҲдё»ж јпјүvs whomпјҲе®ҫж јпјүвҖ”вҖ”еӯҰз”ҹе®№жҳ“е…ЁйғЁз”Ёwho","preparation":"гҖҗPPTиҜҫд»¶гҖ‘е…ұ8йЎө\n01-е°ҒйқўпјҡRestrictive Relative Clauses\n02-иҜҫж–ҮеҺҹеҸҘеӣһйЎҫ\n03-е…ізі»д»ЈиҜҚйҖүжӢ©иЎЁ\n04-еҹәжң¬и§„еҲҷ+еҸЈиҜҖ\n05-жҺ§еҲ¶з»ғд№ пјҡйҖүжӢ©е…ізі»д»ЈиҜҚ\n06-еҗҲе№¶еҸҘеӯҗз»ғд№ \n07-дә§еҮәз»ғд№ пјҡз”Ёе®ҡиҜӯд»ҺеҸҘжҸҸиҝ°еӣҫзүҮ\n08-жҖ»з»“+дҪңдёҡ","process":[{"step":"дёҖгҖҒDiscovery еҸ‘зҺ°","time":6,"content":"гҖҗPPT 02 иҜҫж–ҮеҺҹеҸҘгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"From last class, we have this sentence:\"\nв–І PPT: \"The earthquake that hit Tangshan in 1976 destroyed the whole city.\"\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"'that hit Tangshan in 1976' вҖ” this is a RELATIVE CLAUSE. It tells us WHICH earthquake. The word 'that' is a relative pronoun. Let's find more.\"\nв–І еӯҰз”ҹд»ҺиҜҫж–Үдёӯжүҫе®ҡиҜӯд»ҺеҸҘпјҢ2еҲҶй’ҹгҖӮ\nгҖҗйў„и®ҫзӯ”жЎҲгҖ‘\n- \"people who were trapped under the ruins\"\n- \"the buildings which/that were destroyed\""},{"step":"дәҢгҖҒRules и§„еҲҷи®Іи§Ј","time":12,"content":"гҖҗPPT 03 йҖүжӢ©иЎЁгҖ‘гҖҗPPT 04 еҸЈиҜҖгҖ‘\n\nв–І жқҝд№Ұе…ізі»д»ЈиҜҚйҖүжӢ©иЎЁпјҡ\n| е…ҲиЎҢиҜҚ | дё»ж ј | е®ҫж ј |\n| дәә | who/that | whom/who/that |\n| зү© | which/that | which/that |\n\nв–І еҸЈиҜҖпјҡ\"дәәз”ЁwhoпјҢзү©з”ЁwhichпјҢйҖҡз”ЁthatпјҢйҖ—еҗҺwhich\"\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Four rules: в‘  Person вҶ’ who. в‘Ў Thing вҶ’ which. в‘ў Both вҶ’ that. в‘Ј After comma вҶ’ only which (not that).\"\n\nгҖҗдёҫдҫӢгҖ‘\nThe man who/that saved the boy is a hero. (дәәвҶ’who/that)\nThe building which/that collapsed was old. (зү©вҶ’which/that)\nTangshan, which was rebuilt, is now beautiful. (йҖ—еҸ·еҗҺвҶ’еҸӘиғҪwhich)\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘\nв‘ йҖ—еҸ·еҗҺдёҚиғҪз”ЁthatпјҒ\"Tangshan, that was rebuilt\" вң— вҶ’ \"Tangshan, which was rebuilt\" вң“\nв‘Ўwhomз”ЁдәҺе®ҫж јдҪҚзҪ®пјҡ\"The man whom I saw\" дҪҶеҸЈиҜӯдёӯеёёз”Ёwhoд»Јжӣҝwhom"},{"step":"дёүгҖҒControlled Practice жҺ§еҲ¶з»ғд№ ","time":10,"content":"гҖҗPPT 05 йҖүжӢ©йўҳгҖ‘\n\nв‘  The earthquake _____ hit Tangshan was terrible. (that/which вҶ’ зү©пјҢйҷҗеҲ¶жҖ§пјҢдёӨдёӘеқҮеҸҜ)\nв‘Ў The people _____ were rescued felt lucky. (who/that вҶ’ дәә)\nв‘ў The soldier _____ I met was very brave. (whom/who/that вҶ’ дәәпјҢе®ҫж ј)\nв‘Ј Tangshan, _____ was rebuilt, is now beautiful. (which вҶ’ йҖ—еҸ·еҗҺеҸӘиғҪwhich)\nв‘Ө The building _____ roof fell was old. (whose вҶ’ зү№ж®Ҡжғ…еҶөпјҢжҸҗеүҚй“әеһ«)\n\nв–І йҖҗйўҳж ёеҜ№пјҢи®©еӯҰз”ҹиҜҙеҮәе…ҲиЎҢиҜҚжҳҜд»Җд№ҲпјҲдәә/зү©пјүгҖӮ\n\nвҳ… еҗҲе№¶еҸҘеӯҗз»ғд№ пјҲ5еҲҶй’ҹпјү\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Combine two sentences using a relative clause.\"\nв‘  The man is a hero. He saved 10 people. вҶ’ The man who saved 10 people is a hero.\nв‘Ў The city was destroyed. It had 1 million people. вҶ’ The city which/that had 1 million people was destroyed.\nв‘ў The earthquake was terrible. It happened in 1976. вҶ’ The earthquake that/which happened in 1976 was terrible."},{"step":"еӣӣгҖҒProductive Practice дә§еҮәз»ғд№ ","time":7,"content":"гҖҗPPT 07 еӣҫзүҮжҸҸиҝ°гҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Look at the pictures. Describe each using a relative clause. Example: 'The building which/that collapsed was old.'\"\n\nв–І PPTеұ•зӨә3еј еӣҫпјҡ\nеӣҫ1: дёҖдёӘж¶ҲйҳІе‘ҳ вҶ’ The firefighter who saved the child is brave.\nеӣҫ2: дёҖж ӢеҖ’еЎҢзҡ„жҲҝеӯҗ вҶ’ The house which/that was destroyed in the earthquake was old.\nеӣҫ3: дёҖжқЎж–ӯиЈӮзҡ„жЎҘ вҶ’ The bridge that/which broke connected two cities.\n\nв–І еӯҰз”ҹеҶҷ3еҸҘиҜқгҖӮ2-3дәәеҲҶдә«гҖӮ"},{"step":"дә”гҖҒSummary & Homework","time":5,"content":"гҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Remember the rhyme: дәәз”ЁwhoпјҢзү©з”ЁwhichпјҢйҖҡз”ЁthatпјҢйҖ—еҗҺwhich. Practice makes perfect!\"\n\nгҖҗдҪңдёҡгҖ‘е®ҢжҲҗ10йҒ“е®ҡиҜӯд»ҺеҸҘеЎ«з©әйўҳгҖӮ"}],"blackboard":"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  Restrictive Relative Clauses              в”Ӯ\nв”Ӯ                                           в”Ӯ\nв”Ӯ  з»“жһ„пјҡе…ҲиЎҢиҜҚ + е…ізі»д»ЈиҜҚ + д»ҺеҸҘ            в”Ӯ\nв”Ӯ                                           в”Ӯ\nв”Ӯ  еҸЈиҜҖпјҡдәәз”ЁwhoпјҢзү©з”ЁwhichпјҢйҖҡз”ЁthatпјҢйҖ—еҗҺwhich в”Ӯ\nв”Ӯ                                           в”Ӯ\nв”Ӯ  дәә вҶ’ who/that (дё»ж ј) / whom (е®ҫж ј)       в”Ӯ\nв”Ӯ  зү© вҶ’ which/that                          в”Ӯ\nв”Ӯ  йҖ—еҸ·еҗҺ вҶ’ еҸӘиғҪз”Ёwhich                     в”Ӯ\nв”Ӯ                                           в”Ӯ\nв”Ӯ  The man WHO saved people is a hero.      в”Ӯ\nв”Ӯ  The city WHICH was rebuilt is beautiful. в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ","exercises":"гҖҗеҹәзЎҖдҪңдёҡгҖ‘пјҲйў„и®Ў10еҲҶй’ҹпјү\n1. еЎ«з©әпјҲwho/which/that/whomпјүпјҡ\nв‘  The man _____ saved the child is a hero. (who/that)\nв‘Ў The earthquake _____ destroyed the city was terrible. (that/which)\nв‘ў The woman _____ I met lost her home. (whom/who/that)\nв‘Ј The building _____ was rebuilt is now a school. (which/that)\nв‘Ө Tangshan, _____ is in Hebei, was hit by an earthquake. (which)\nв‘Ҙ The people _____ were trapped waited for rescue. (who/that)\nв‘Ұ The bridge _____ they built is very strong. (that/which)\nв‘§ The rescue team _____ arrived first saved many lives. (who/that)\nв‘Ё The day _____ the earthquake happened was July 28. (that/which)\nв‘© The city, _____ has a population of 7 million, is now modern. (which)\n\n2. еҗҲе№¶еҸҘеӯҗпјҡ\nв‘  The man is a firefighter. He saved 10 people. вҶ’ The man who/that saved 10 people is a firefighter.\nв‘Ў The city was rebuilt. It was destroyed in 1976. вҶ’ The city which/that was destroyed in 1976 was rebuilt.\n\nгҖҗжҸҗй«ҳдҪңдёҡгҖ‘пјҲйҖүеҒҡпјҢйў„и®Ў5еҲҶй’ҹпјү\n3. з”Ёе®ҡиҜӯд»ҺеҸҘйҖ 3дёӘеҸҘеӯҗжҸҸиҝ°дҪ иә«иҫ№зҡ„дәӢзү©пјҲиҮіе°‘1дёӘз”ЁwhoпјҢ1дёӘз”ЁwhichпјүгҖӮ\n4. дёәд»Җд№Ҳ\"Tangshan, that was rebuilt\"жҳҜй”ҷзҡ„пјҹпјҲйҖ—еҸ·еҗҺзҡ„йқһйҷҗеҲ¶жҖ§е®ҡиҜӯд»ҺеҸҘеҸӘиғҪз”ЁwhichпјҢдёҚиғҪз”Ёthatпјү","reflection":"вң… дә®зӮ№пјҡ\n1. еҸЈиҜҖ\"дәәз”Ёwhoзү©з”ЁwhichйҖҡз”ЁthatйҖ—еҗҺwhich\"з®ҖзҹӯеҘҪи®°пјҢеӯҰз”ҹдёӢиҜҫж—¶иҝҳеңЁиғҢ\n2. д»ҺиҜҫж–ҮеҺҹеҸҘеҜје…ҘпјҢиҜӯжі•еӣһеҪ’ж–Үжң¬\n3. еӣҫзүҮжҸҸиҝ°жҙ»еҠЁи®©иҜӯжі•жңүдәҶи§Ҷи§үж”Ҝж’‘\n\nвҡ пёҸ йңҖж”№иҝӣпјҡ\n1. whom vs whoзҡ„еҢәеҲ«BзҸӯд»Қжңүж··ж·ҶвҖ”вҖ”дёӢж¬ЎеҠ дёҖдёӘ\"дё»иҜӯvsе®ҫиҜӯдҪҚзҪ®\"еҲӨж–ӯжі•\n2. whoseзҡ„й“әеһ«еҸҜиғҪеӨӘж—©вҖ”вҖ”Unit 5дјҡиҜҰз»Ҷи®ІwhoseпјҢжң¬иҜҫз•ҘиҝҮеҚіеҸҜ","aiModel":"AIиҫ…еҠ©+дәәе·Ҙе®Ўж ё","viewCount":146,"downloadCount":94,"createdAt":"2026-07-08T10:00:00Z"},{"id":"l-eng-b1-u4-writing","lessonId":"l-eng-b1-u4-writing","title":"Reading for Writing: A Summary of a News Report","grade":"й«ҳдёӯ","subject":"иӢұиҜӯ","textbook":"дәәж•ҷзүҲпјҲ2019зүҲпјү","book":"еҝ…дҝ®з¬¬дёҖеҶҢ","unitNumber":4,"unitTitle":"Natural Disasters","lessonType":"writing","lessonTypeName":"еҶҷдҪңиҜҫ","lessonNumber":3,"duration":40,"tags":["еҶҷдҪң","ж— и„‘еҸҜз”Ё"],"overview":"жң¬иҜҫиҰҒжұӮеӯҰз”ҹйҳ…иҜ»дёҖзҜҮиҮӘз„¶зҒҫе®ізҡ„ж–°й—»жҠҘйҒ“пјҢеҶҷдёҖзҜҮ80иҜҚзҡ„ж‘ҳиҰҒпјҲsummaryпјүгҖӮж‘ҳиҰҒеҶҷдҪңжҳҜй«ҳдёӯж ёеҝғжҠҖиғҪвҖ”вҖ”жҸҗеҸ–е…ій”®дҝЎжҒҜгҖҒз”ЁиҮӘе·ұзҡ„иҜқжҰӮжӢ¬гҖҒдёҚеҠ е…ҘдёӘдәәи§ӮзӮ№гҖӮ\n\nгҖҗеӯҰжғ…еҲҶжһҗгҖ‘еӯҰз”ҹд»ҺжңӘеҶҷиҝҮжӯЈејҸзҡ„summaryгҖӮеёёи§Ғй—®йўҳпјҡв‘ жҠҠsummaryеҶҷжҲҗзҝ»иҜ‘вҖ”вҖ”йҖҗеҸҘзҝ»иҜ‘еҺҹж–Үпјӣв‘ЎеҠ е…ҘдёӘдәәи§ӮзӮ№вҖ”вҖ”\"I think the earthquake was terrible\"пјӣв‘ўжҠ“дёҚдҪҸйҮҚзӮ№вҖ”вҖ”еҶҷдәҶз»ҶиҠӮеҝҳдәҶеӨ§ж„ҸгҖӮжң¬иҜҫйҖҡиҝҮ\"5W1H\"жЎҶжһ¶е’Ң\"3еҸҘиҜқжЁЎжқҝ\"и§ЈеҶіиҝҷдәӣй—®йўҳгҖӮ","objectives":["иҜӯиЁҖиғҪеҠӣпјҡжҺҢжҸЎж‘ҳиҰҒеҶҷдҪңзҡ„5W1HжЎҶжһ¶пјҲWho/What/When/Where/Why/Howпјү","иҜӯиЁҖиғҪеҠӣпјҡиғҪз”Ё3еҸҘиҜқжҰӮжӢ¬дёҖзҜҮж–°й—»жҠҘйҒ“зҡ„еӨ§ж„Ҹ","еӯҰд№ иғҪеҠӣпјҡеҢәеҲҶ\"дәӢе®һж‘ҳиҰҒ\"е’Ң\"дёӘдәәи§ӮзӮ№\"","жҖқз»ҙе“ҒиҙЁпјҡжҸҗеҸ–е…ій”®дҝЎжҒҜгҖҒеҝҪз•Ҙж¬ЎиҰҒз»ҶиҠӮзҡ„еҲӨж–ӯеҠӣ"],"keyPoints":"в‘ ж‘ҳиҰҒ = 5W1H + ж ёеҝғдәӢд»¶ + з»“жһң\nв‘Ў3еҸҘиҜқжЁЎжқҝпјҡеҸ‘з”ҹдәҶд»Җд№ҲвҶ’йҖ жҲҗдәҶд»Җд№ҲеҪұе“ҚвҶ’зӣ®еүҚд»Җд№Ҳжғ…еҶө\nв‘ўз”ЁиҮӘе·ұзҡ„иҜқеҶҷпјҢдёҚжҠ„еҺҹж–ҮеҺҹеҸҘ","difficulties":"в‘ еҢәеҲҶе…ій”®дҝЎжҒҜе’Ңж¬ЎиҰҒз»ҶиҠӮвҖ”вҖ”еӯҰз”ҹе®№жҳ“еҶҷ\"ж•‘жҸҙйҳҹеёҰдәҶ3жқЎзӢ—\"иҝҷз§Қз»ҶиҠӮ\nв‘ЎйҒҝе…Қдё»и§ӮиҜ„д»·вҖ”вҖ”дёҚиғҪеҶҷ\"I think\" \"It was terrible\"","preparation":"гҖҗPPTиҜҫд»¶гҖ‘е…ұ7йЎө\n01-е°ҒйқўпјҡA Summary of a News Report\n02-еҜје…Ҙпјҡж‘ҳиҰҒvsзҝ»иҜ‘vsиҜ„и®әзҡ„еҢәеҲ«\n03-5W1HжЎҶжһ¶\n04-иҢғж–ҮеҲҶжһҗпјҲж ҮжіЁ5W1Hпјү\n05-3еҸҘиҜқжЁЎжқҝ\n06-еҶҷдҪңд»»еҠЎ\n07-дә’иҜ„checklist+дҪңдёҡ","process":[{"step":"дёҖгҖҒLead-in еҜје…Ҙ","time":5,"content":"гҖҗPPT 02 дёүз§Қж–Үжң¬еҜ№жҜ”гҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"A summary is NOT a translation. It's NOT a comment. It's a SHORT version of the main facts. Look:\"\nв–І PPTеҜ№жҜ”пјҡ\nTranslation: йҖҗеҸҘзҝ»иҜ‘еҺҹж–Ү\nComment: \"I think the earthquake was terrible. We should help.\"\nSummary: \"On July 28, 1976, a 7.8-magnitude earthquake hit Tangshan, destroying the city and killing over 240,000 people. Rescue teams arrived immediately, and the city was rebuilt within ten years.\"\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"See the difference? A summary gives you FACTS, not opinions. And it's SHORT.\""},{"step":"дәҢгҖҒ5W1H Framework жЎҶжһ¶жҗӯе»ә","time":10,"content":"гҖҗPPT 03 5W1HгҖ‘гҖҗPPT 04 иҢғж–ҮеҲҶжһҗгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"To write a summary, ask 6 questions: Who? What? When? Where? Why? How?\"\n\nв–І жқҝд№Ұ5W1Hпјҡ\nWho: Who was involved?\nWhat: What happened?\nWhen: When did it happen?\nWhere: Where did it happen?\nWhy: Why did it happen?\nHow: How did people respond?\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Read the news report on page 38. Find the 5W1H. 3 minutes.\"\nв–І еӯҰз”ҹйҳ…иҜ»+жүҫ5W1HгҖӮ\nгҖҗж ёеҜ№зӯ”жЎҲгҖ‘\nWho: people in the affected area\nWhat: a tsunami hit the coast\nWhen: on March 11, 2011\nWhere: Japan, northeastern coast\nWhy: a 9.0-magnitude earthquake under the sea\nHow: government sent rescue teams, international aid arrived\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Now, put these 6 answers into 3 sentences:\"\nв‘  What happened + When + Where\nв‘Ў Why + How bad\nв‘ў How people responded"},{"step":"дёүгҖҒWrite еҶҷдҪң","time":15,"content":"гҖҗPPT 05 3еҸҘиҜқжЁЎжқҝгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Write an 80-word summary using the 3-sentence template. Use YOUR OWN words. Don't copy the original sentences. 12 minutes.\"\n\nв–І жЁЎжқҝпјҡ\nSentence 1: On [date], a [disaster type] hit [place], [result].\nSentence 2: It was caused by [cause], and it [impact].\nSentence 3: [Who] responded by [action], and [current situation].\n\nв–І еӯҰз”ҹеҶҷдҪң12еҲҶй’ҹгҖӮж•ҷеёҲе·Ўи§ҶгҖӮ\nгҖҗе·Ўи§Ҷе…іжіЁзӮ№гҖ‘\n- жҳҜеҗҰз”ЁдәҶ5W1Hпјҹ\n- жҳҜеҗҰжҠ„дәҶеҺҹж–ҮеҺҹеҸҘпјҹпјҲжҸҗйҶ’\"з”ЁиҮӘе·ұзҡ„иҜқ\"пјү\n- жҳҜеҗҰжңүдёӘдәәи§ӮзӮ№пјҹпјҲеҲ йҷӨ\"I think\"зӯүпјү\n- иҜҚж•°жҳҜеҗҰеңЁ70-90д№Ӣй—ҙпјҹ\n\nгҖҗе·®ејӮеҢ–жҸҗзӨәгҖ‘\nAзҸӯпјҡ80иҜҚпјҢе®Ңе…Ёз”ЁиҮӘе·ұзҡ„иҜқпјҢдёҚеҠ и§ӮзӮ№гҖӮ\nBзҸӯпјҡ60иҜҚпјҢеҸҜдҪҝз”ЁжЁЎжқҝеЎ«з©әпјҢе…Ғи®ёйғЁеҲҶеҖҹз”ЁеҺҹж–ҮзҹӯиҜӯгҖӮ"},{"step":"еӣӣгҖҒPeer Review дә’иҜ„","time":5,"content":"гҖҗPPT 07 checklistгҖ‘\nв–Ў еҢ…еҗ«5W1Hе…ій”®дҝЎжҒҜ\nв–Ў жІЎжңүдёӘдәәи§ӮзӮ№пјҲж— I thinkпјү\nв–Ў з”ЁиҮӘе·ұзҡ„иҜқеҶҷпјҲйқһйҖҗеҸҘзҝ»иҜ‘пјү\nв–Ў 3еҸҘиҜқз»“жһ„\nв–Ў иҜҚж•°70-90\n\nв–І дә’иҜ„3еҲҶй’ҹгҖӮйҖү1-2зҜҮеұ•зӨәгҖӮ\n\nгҖҗйў„и®ҫдјҳз§ҖдҪңе“ҒгҖ‘\n\"On March 11, 2011, a powerful tsunami struck the northeastern coast of Japan, causing widespread destruction. The tsunami was triggered by a 9.0-magnitude undersea earthquake, which led to over 15,000 deaths and a nuclear crisis. The Japanese government immediately sent rescue teams, and international aid poured in from around the world.\""},{"step":"дә”гҖҒSummary & Homework","time":5,"content":"гҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"A good summary answers 5W1H in 3 sentences, using your own words, with no personal opinions. Remember: you are a REPORTER, not a COMMENTATOR.\"\n\nгҖҗдҪңдёҡгҖ‘дҝ®ж”№ж‘ҳиҰҒпјҢзЎ®дҝқиҜҚж•°еңЁ80иҜҚе·ҰеҸіпјҢж— дёӘдәәи§ӮзӮ№гҖӮ"}],"blackboard":"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  A Summary of a News Report               в”Ӯ\nв”Ӯ                                           в”Ӯ\nв”Ӯ  5W1H: Who What When Where Why How        в”Ӯ\nв”Ӯ                                           в”Ӯ\nв”Ӯ  3-Sentence Template:                     в”Ӯ\nв”Ӯ  в‘  What + When + Where + Result           в”Ӯ\nв”Ӯ  в‘Ў Why + Impact                           в”Ӯ\nв”Ӯ  в‘ў How people responded                   в”Ӯ\nв”Ӯ                                           в”Ӯ\nв”Ӯ  Rules:                                   в”Ӯ\nв”Ӯ  вң“ Your own words                         в”Ӯ\nв”Ӯ  вң— No personal opinions (no \"I think\")    в”Ӯ\nв”Ӯ  вң“ Facts only                             в”Ӯ\nв”Ӯ  вң— No minor details                       в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ","exercises":"гҖҗеҹәзЎҖдҪңдёҡгҖ‘пјҲйў„и®Ў15еҲҶй’ҹпјү\n1. дҝ®ж”№ж‘ҳиҰҒпјҲ80иҜҚпјүпјҢзЎ®дҝқпјҡ5W1Hе®Ңж•ҙгҖҒж— дёӘдәәи§ӮзӮ№гҖҒз”ЁиҮӘе·ұзҡ„иҜқгҖҒ3еҸҘиҜқз»“жһ„гҖӮ\n2. еҲӨж–ӯд»ҘдёӢеҸҘеӯҗжҳҜеҗҰйҖӮеҗҲеҮәзҺ°еңЁж‘ҳиҰҒдёӯпјҲYes/Noпјүпјҡ\nв‘  \"On July 28, 1976, an earthquake hit Tangshan.\" (Yes - дәӢе®һ)\nв‘Ў \"I think the earthquake was the worst in history.\" (No - дёӘдәәи§ӮзӮ№)\nв‘ў \"The government sent rescue teams immediately.\" (Yes - дәӢе®һ)\nв‘Ј \"The rescue dogs were very cute.\" (No - ж¬ЎиҰҒз»ҶиҠӮ)\nв‘Ө \"Over 240,000 people died.\" (Yes - е…ій”®ж•°жҚ®)\n\n3. з”Ё5W1HеҲҶжһҗд»ҘдёӢж–°й—»пјҡ\n\"On September 1, 2023, a typhoon struck southern China, causing heavy rains and flooding. Over 2 million people were evacuated. The government provided food and shelter.\"\nWho: people in southern China\nWhat: a typhoon struck\nWhen: September 1, 2023\nWhere: southern China\nWhy: typhoon caused heavy rain\nHow: 2 million evacuated, government provided aid\n\nгҖҗжҸҗй«ҳдҪңдёҡгҖ‘пјҲйҖүеҒҡпјҢйў„и®Ў10еҲҶй’ҹпјү\n4. жүҫдёҖзҜҮиӢұж–Үж–°й—»жҠҘйҒ“пјҲBBC/CNNзӯүпјүпјҢеҶҷдёҖзҜҮ80иҜҚж‘ҳиҰҒгҖӮ\n5. жҖқиҖғпјҡдёәд»Җд№Ҳж–°й—»жҠҘйҒ“иҰҒеҶҷ\"еҖ’йҮ‘еӯ—еЎ”\"з»“жһ„пјҲжңҖйҮҚиҰҒзҡ„дҝЎжҒҜеңЁжңҖеүҚйқўпјүпјҹпјҲж–№дҫҝиҜ»иҖ…еҝ«йҖҹиҺ·еҸ–е…ій”®дҝЎжҒҜпјҢд№ҹж–№дҫҝзј–иҫ‘жҲӘж–ӯпјү","reflection":"вң… дә®зӮ№пјҡ\n1. \"зҝ»иҜ‘vsиҜ„и®әvsж‘ҳиҰҒ\"еҜ№жҜ”и®©еӯҰз”ҹз«ӢеҲ»жҳҺзҷҪдәҶsummaryзҡ„зӢ¬зү№жҖ§\n2. 5W1HжЎҶжһ¶+3еҸҘиҜқжЁЎжқҝи®©еҶҷдҪңжңүдәҶжё…жҷ°зҡ„з»“жһ„\n3. дә’иҜ„ж—¶жңүеӯҰз”ҹеҸ‘зҺ°еҗҢдјҙеҶҷдәҶ\"I think\"пјҢдё»еҠЁжҢҮеҮәвҖ”вҖ”иҜҙжҳҺи§„еҲҷе·ІеҶ…еҢ–\n\nвҡ пёҸ йңҖж”№иҝӣпјҡ\n1. йғЁеҲҶеӯҰз”ҹд»Қз„¶жҠ„еҺҹж–ҮеҸҘеӯҗвҖ”вҖ”дёӢж¬ЎеҠ дёҖдёӘ\"ж”№еҶҷз»ғд№ \"зҺҜиҠӮ\n2. BзҸӯ80иҜҚеҒҸеӨҡвҖ”вҖ”йҷҚеҲ°60иҜҚ\n3. \"з”ЁиҮӘе·ұзҡ„иҜқ\"еҜ№BзҸӯеӨӘйҡҫвҖ”вҖ”еҸҜд»Ҙе…Ғи®ёеҖҹз”Ё50%еҺҹж–ҮзҹӯиҜӯ","aiModel":"AIиҫ…еҠ©+дәәе·Ҙе®Ўж ё","viewCount":379,"downloadCount":25,"createdAt":"2026-07-08T10:00:00Z"},{"id":"l-eng-b1-u5-reading","lessonId":"l-eng-b1-u5-reading","title":"Reading and Thinking: The Chinese Writing System вҖ” Connecting the Past and the Present","grade":"й«ҳдёӯ","subject":"иӢұиҜӯ","textbook":"дәәж•ҷзүҲпјҲ2019зүҲпјү","book":"еҝ…дҝ®з¬¬дёҖеҶҢ","unitNumber":5,"unitTitle":"Languages Around the World","lessonType":"reading","lessonTypeName":"йҳ…иҜ»иҜҫ","lessonNumber":1,"duration":40,"tags":["йҳ…иҜ»","ж–ҮеҢ–","и®Ёи®ә","ж— и„‘еҸҜз”Ё"],"overview":"дәәж•ҷзүҲеҝ…дҝ®дёҖ Unit 5 иҜҫж–Ү The Chinese Writing SystemпјҢд»Ҙж—¶й—ҙзәҝжўізҗҶжұүеӯ—д»Һз”ІйӘЁж–ҮеҲ°еҪ“д»Јзҡ„еҸ‘еұ•пјҢи®әиҜҒ\"жұүеӯ—жҳҜиҝһжҺҘдёӯеҚҺж–ҮжҳҺиҝҮеҺ»дёҺзҺ°еңЁзҡ„зәҪеёҰ\"гҖӮиҜӯиЁҖйҡҫеәҰдёӯзӯүпјҢж–ҮеҢ–еҶ…ж¶өжһҒж·ұгҖӮ\n\nгҖҗеӯҰжғ…еҲҶжһҗгҖ‘дёӯеӣҪеӯҰз”ҹеҜ№з”ІйӘЁж–ҮжңүеӨ©з„¶дәІиҝ‘ж„ҹпјҲеҺҶеҸІиҜҫеӯҰиҝҮпјүпјҢдҪҶи®©д»–д»¬з”ЁиӢұж–ҮжҸҸиҝ°жұүеӯ—зҡ„еҸ‘еұ•жҳҜе…Ёж–°жҢ‘жҲҳгҖӮеӯҰз”ҹе®№жҳ“еҒңз•ҷеңЁ\"жүҫдҝЎжҒҜ\"еұӮйқўпјҢеҝҪз•Ҙ\"connecting\"зҡ„ж·ұеұӮеҗ«д№үгҖӮAзҸӯеҸҜд»Ҙи®Ёи®әж–ҮеҢ–иҮӘдҝЎпјӣBзҸӯйңҖиҰҒе…ҲзҗҶжё…ж—¶й—ҙзәҝеҶҚи®Ёи®әж„Ҹд№үгҖӮ","objectives":["иҜӯиЁҖиғҪеҠӣпјҡжҺҢжҸЎ system, factor, base, dynasty, variety, means, regard, character зӯүж ёеҝғиҜҚжұҮ","ж–ҮеҢ–ж„ҸиҜҶпјҡзҗҶи§Јжұүеӯ—еңЁдё–з•Ңж–Үеӯ—дҪ“зі»дёӯзҡ„зӢ¬зү№жҖ§пјӣеўһејәж–ҮеҢ–иҮӘдҝЎ","жҖқз»ҙе“ҒиҙЁпјҡеҲҶжһҗ\"connecting\"зҡ„еҗ«д№үвҖ”вҖ”жұүеӯ—еҰӮдҪ•иҝһжҺҘж—¶й—ҙпјҲеҸӨвҶ”д»ҠпјүгҖҒз©әй—ҙпјҲдёҚеҗҢең°еҢәпјүгҖҒдәәпјҲдёҚеҗҢж–№иЁҖзҫӨдҪ“пјү","еӯҰд№ иғҪеҠӣпјҡз”Ёж—¶й—ҙзәҝ+еҠҹиғҪеӣҫеҸҢйҮҚз»“жһ„жўізҗҶиҜҙжҳҺж–Ү"],"keyPoints":"в‘ жұүеӯ—еҸ‘еұ•зҡ„еӣӣдёӘе…ій”®йҳ¶ж®өпјҡз”ІйӘЁж–ҮвҶ’з»ҹдёҖпјҲз§ҰпјүвҶ’д№Ұжі•иүәжңҜвҶ’иө°еҗ‘дё–з•Ң\nв‘Ўжұүеӯ—зҡ„еӨҡйҮҚ\"иҝһжҺҘ\"еҠҹиғҪпјҡиҝһжҺҘиҝҮеҺ»дёҺзҺ°еңЁгҖҒиҝһжҺҘдёҚеҗҢең°еҢәгҖҒиҝһжҺҘдёҚеҗҢж–№иЁҖзҫӨдҪ“\nв‘ўж ёеҝғиҜҚжұҮпјҡsystem, dynasty, means, regard, character","difficulties":"в‘ з”ЁиӢұж–Үи§ЈйҮҠдёӯж–Үзү№жңүзҡ„жҰӮеҝөвҖ”вҖ”еҰӮ\"з»ҹдёҖ\"еҜ№дәҺж–№иЁҖдёҚеҗҢзҡ„дёӯеӣҪзҡ„ж„Ҹд№ү\nв‘ЎзҗҶи§Ј\"connecting\"зҡ„еӨҡйҮҚеҗ«д№үвҖ”вҖ”дёҚеҸӘжҳҜж—¶й—ҙдёҠзҡ„иҝһжҺҘпјҢиҝҳжңүж–ҮеҢ–е’Ңз©әй—ҙдёҠзҡ„иҝһжҺҘ","preparation":"гҖҗPPTиҜҫд»¶гҖ‘е…ұ10йЎө\n01-е°ҒйқўпјҡThe Chinese Writing System\n02-еҜје…ҘпјҡдёүдёӘз”ІйӘЁж–ҮзҢңеӯ—пјҲж—Ҙ/жңҲ/еұұпјү\n03-ж—¶й—ҙзәҝжЁЎжқҝпјҲеӣӣйҳ¶ж®өпјү\n04-з”ІйӘЁж–ҮвҶ’з»ҹдёҖ\n05-д№Ұжі•иүәжңҜ\n06-иө°еҗ‘дё–з•Ң\n07-\"Connecting\"еҠҹиғҪеӣҫ\n08-и®Ёи®әпјҡж–ҮеҢ–иҮӘдҝЎ\n09-иҜҫе ӮжЈҖжөӢ\n10-дҪңдёҡеёғзҪ®","process":[{"step":"дёҖгҖҒLead-in еҜје…ҘвҖ”вҖ”з”ІйӘЁж–ҮзҢңеӯ—","time":5,"content":"гҖҗPPT 02 з”ІйӘЁж–ҮзҢңеӯ—гҖ‘\n\nв–І PPTеұ•зӨәдёүдёӘз”ІйӘЁж–Үпјҡж—ҘгҖҒжңҲгҖҒеұұ\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"What do these pictures mean?\"\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\"Sun! Moon! Mountain!\"\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Right! These are Chinese characters from 3,000 years ago. You can STILL read them. But can English speakers read Old English from 1,000 years ago? Probably not. Why can WE read our ancient writing but they can't? That's what today's text is about. Open page 42.\""},{"step":"дәҢгҖҒFirst Reading вҖ” Timeline ж—¶й—ҙзәҝ","time":12,"content":"гҖҗPPT 03 ж—¶й—ҙзәҝжЁЎжқҝгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Read the text. Fill in the timeline of Chinese writing system. 4 minutes.\"\n\nв–І ж—¶й—ҙзәҝпјҡ\n1. Shang Dynasty: oracle bone script (з”ІйӘЁж–Ү)\n2. Qin Dynasty: unified by Emperor Qinshihuang (з»ҹдёҖж–Үеӯ—)\n3. Later dynasties: became an art form (calligraphy д№Ұжі•)\n4. Today: important means of cultural connection, going global\n\nв–І еӯҰз”ҹйҳ…иҜ»+еЎ«ж—¶й—ҙзәҝ4еҲҶй’ҹгҖӮ\nгҖҗж ёеҜ№зӯ”жЎҲгҖ‘йҖҗж®өж ёеҜ№гҖӮ\nгҖҗж•ҷеёҲиҝҪй—®гҖ‘\"Why did Emperor Qinshihuang unify the writing system?\"\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\"Because different regions had different characters.\" / \"дёәдәҶз»ҹдёҖеӣҪе®¶гҖӮ\"\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Yes. Before Qin, different regions used different characters. People couldn't understand each other's writing. Unifying the writing system united the COUNTRY.\""},{"step":"дёүгҖҒClose Reading вҖ” \"Connecting\" Function","time":12,"content":"гҖҗPPT 07 еҠҹиғҪеӣҫгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"The title says 'connecting the past and the present.' But 'connecting' has MORE meanings. Let's find them all.\"\n\nв–І дёүз»„еҗ„иҙҹиҙЈдёҖз§Қ\"иҝһжҺҘ\"пјҡ\nGroup 1: Connecting TIME (past вҶ” present)\nвҶ’ \"The Chinese writing system connects China's past with the present.\"\nGroup 2: Connecting SPACE (region вҶ” region)\nвҶ’ \"People from different regions can communicate through the same writing system, even though they speak different dialects.\"\nGroup 3: Connecting CHINA вҶ” WORLD\nвҶ’ \"Today, more and more international students are learning Chinese. The writing system is a bridge between China and the world.\"\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"So 'connecting' means: time (past-present), space (regions), and people (China-world). The Chinese writing system is not just a tool for writing вҖ” it's a BRIDGE.\""},{"step":"еӣӣгҖҒDiscussion вҖ” Why Chinese Matters","time":8,"content":"гҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Today, millions of people around the world are learning Chinese. Is it just for business? Or is there something deeper?\"\nв–І е°Ҹз»„и®Ёи®ә3еҲҶй’ҹгҖӮ\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\"For business.\" / \"For culture.\" / \"Because China is powerful.\"\nгҖҗж•ҷеёҲж”¶е°ҫгҖ‘\"An English learner in our class once said: 'English is a tool, but Chinese is home.' The writing system is part of who we are. When you learn English, you gain a tool. When foreigners learn Chinese, they gain a window into 5,000 years of civilization.\""},{"step":"дә”гҖҒSummary & Homework","time":3,"content":"гҖҗPPT 09 жЈҖжөӢгҖ‘гҖҗPPT 10 дҪңдёҡгҖ‘\nв–І еҝ«йҖҹжЈҖжөӢпјҡ\nв‘  The Chinese writing system started with _____ bones. (oracle)\nв‘Ў Emperor _____ unified the writing system. (Qinshihuang)\nв‘ў The writing system connects past, present, and the _____. (world)\n\nгҖҗдҪңдёҡгҖ‘з”ЁжҖқз»ҙеҜјеӣҫз”»еҮәжұүеӯ—еҸ‘еұ•зҡ„еӣӣдёӘйҳ¶ж®өеҸҠ\"connecting\"зҡ„дёүйҮҚеҗ«д№үгҖӮ"}],"blackboard":"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  U5 The Chinese Writing System                в”Ӯ\nв”Ӯ                                               в”Ӯ\nв”Ӯ  Timeline:                                    в”Ӯ\nв”Ӯ  Oracle Bones вҶ’ Unified (Qin) вҶ’ Art вҶ’ World  в”Ӯ\nв”Ӯ                                               в”Ӯ\nв”Ӯ  CONNECTING:                                  в”Ӯ\nв”Ӯ  рҹ•җ Past вҶ” Present                            в”Ӯ\nв”Ӯ  рҹ—ә Region вҶ” Region (through writing)          в”Ӯ\nв”Ӯ  рҹҢҚ China вҶ” World                             в”Ӯ\nв”Ӯ  рҹ“ҡ Language вҶ” Culture                        в”Ӯ\nв”Ӯ                                               в”Ӯ\nв”Ӯ  Key: system, dynasty, means, regard, characterв”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ","exercises":"гҖҗеҹәзЎҖдҪңдёҡгҖ‘пјҲйў„и®Ў15еҲҶй’ҹпјү\n1. з”»жҖқз»ҙеҜјеӣҫпјҡжұүеӯ—еҸ‘еұ•еӣӣйҳ¶ж®ө + \"connecting\"дёүйҮҚеҗ«д№үгҖӮ\n2. иҜҚжұҮеҢ№й…Қпјҡ\n  в‘  system  A. a group of connected things working together\n  в‘Ў dynasty B. a family that rules a country for generations\n  в‘ў means   C. a method or way of doing something\n   в‘Ј character D. a letter or symbol _ I spoke is a teacher. (whom)\nв‘§ The year in _____ the earthquake happened was 1976. (which = when)"},{"step":"еӣӣгҖҒProductive Practice дә§еҮәз»ғд№ ","time":7,"content":"гҖҗPPT 07 йҖ еҸҘгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Combine these sentences using where/when/why or prep+which/whom.\"\n\nв‘  This is the museum. I saw oracle bones there. вҶ’ This is the museum WHERE I saw oracle bones.\nв‘Ў 1976 was the year. The Tangshan earthquake happened then. вҶ’ 1976 was the year WHEN the Tangshan earthquake happened.\nв‘ў That is the reason. He quit his job for it. вҶ’ That is the reason WHY he quit his job.\nв‘Ј The teacher is kind. I spoke to her. вҶ’ The teacher to WHOM I spoke is kind.\n\nв–І еӯҰз”ҹз»ғд№ 4еҲҶй’ҹгҖӮ2-3дәәеҲҶдә«гҖӮ"},{"step":"дә”гҖҒSummary & Homework","time":5,"content":"гҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Key takeaway: е…ҲиЎҢиҜҚдҪңзҠ¶иҜӯвҶ’where/when/whyпјӣдҪңдё»е®ҫиҜӯвҶ’which/that/who. When in doubt, put theе…ҲиЎҢиҜҚ back into the clause and see if it needs a preposition.\"\n\nгҖҗдҪңдёҡгҖ‘е®ҢжҲҗ10йҒ“еЎ«з©әйўҳпјҲеҗ«where/when/whyе’Ңprep+which/whomпјүгҖӮ"}],"blackboard":"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  Relative Clauses: where/when/why         в”Ӯ\nв”Ӯ                                           в”Ӯ\nв”Ӯ  е…ҲиЎҢиҜҚдҪңзҠ¶иҜӯ вҶ’ е…ізі»еүҜиҜҚ                  в”Ӯ\nв”Ӯ  where = in/on/at + which (ең°зӮ№)          в”Ӯ\nв”Ӯ  when  = in/on/at + which (ж—¶й—ҙ)          в”Ӯ\nв”Ӯ  why   = for + which (еҺҹеӣ )               в”Ӯ\nв”Ӯ                                           в”Ӯ\nв”Ӯ  е…ҲиЎҢиҜҚдҪңдё»е®ҫиҜӯ вҶ’ е…ізі»д»ЈиҜҚ                в”Ӯ\nв”Ӯ  which/that (зү©) / who/whom (дәә)          в”Ӯ\nв”Ӯ                                           в”Ӯ\nв”Ӯ  еҲӨж–ӯжі•пјҡж”ҫеӣһд»ҺеҸҘзңӢйңҖдёҚйңҖиҰҒд»ӢиҜҚ            в”Ӯ\nв”Ӯ  йңҖиҰҒд»ӢиҜҚ вҶ’ where/when/why                в”Ӯ\nв”Ӯ  дёҚйңҖиҰҒ вҶ’ which/that/who                  в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв” ҶҢ","unitNumber":5,"unitTitle":"Languages Around the World","lessonType":"writing","lessonTypeName":"еҶҷдҪңиҜҫ","lessonNumber":3,"duration":40,"tags":["еҶҷдҪң","ж— и„‘еҸҜз”Ё"],"overview":"жң¬иҜҫиҰҒжұӮеӯҰз”ҹеҶҷдёҖзҜҮеҚҡе®ўпјҲblog postпјүпјҢеҲҶдә«еӯҰиӢұиҜӯзҡ„з»ҸеҺҶе’Ңж–№жі•гҖӮиҜҫжң¬жҸҗдҫӣиҢғж–ҮпјҢжҳҜдёҖзҜҮе…ідәҺиӢұиҜӯеӯҰд№ еӣ°йҡҫзҡ„еҚҡе®ўгҖӮ\n\nгҖҗеӯҰжғ…еҲҶжһҗгҖ‘еӯҰз”ҹеҜ№\"еӯҰиӢұиҜӯ\"жңүеӨ§йҮҸзңҹе®һдҪ“йӘҢе’Ңж„ҹеҸ—пјҢиҝҷжҳҜжңҖжңүиҜқеҸҜиҜҙзҡ„еҶҷдҪңиҜқйўҳгҖӮдҪҶй—®йўҳеңЁдәҺпјҡв‘ еҶ…е®№жөҒж°ҙиҙҰпјҲ\"I listen to English songs. I watch English movies.\"пјүпјӣв‘ЎдёҚдјҡеҶҷ\"й—®йўҳвҶ’ж–№жі•вҶ’ж•Ҳжһң\"зҡ„з»“жһ„пјӣв‘ўзјәд№ҸеҚҡе®ўзҡ„дә’еҠЁж„ҹпјҲжІЎжңүеҗ‘иҜ»иҖ…жҸҗй—®пјүгҖӮжң¬иҜҫйҖҡиҝҮиҢғж–ҮеҲҶжһҗе’ҢеҚҡе®ўз»“жһ„жЁЎжқҝи§ЈеҶіиҝҷдәӣй—®йўҳгҖӮ","objectives":["иҜӯиЁҖиғҪеҠӣпјҡжҺҢжҸЎеҚҡе®ўеҶҷдҪңзҡ„з»“жһ„пјҲејҖеӨҙеј•е…ҘвҶ’й—®йўҳвҶ’ж–№жі•вҶ’ж•ҲжһңвҶ’дә’еҠЁз»“е°ҫпјү","иҜӯиЁҖиғҪеҠӣпјҡдҪҝз”Ё used to / now / I found that... зӯүеҸҘејҸжҸҸиҝ°еӯҰд№ з»ҸеҺҶ","еӯҰд№ иғҪеҠӣпјҡйҖҡиҝҮиҢғж–ҮеҲҶжһҗжҺҢжҸЎеҚҡе®ўзҡ„иҜӯиЁҖйЈҺж јпјҲйқһжӯЈејҸгҖҒдә’еҠЁгҖҒдёӘдәәеҢ–пјү","жҖқз»ҙе“ҒиҙЁпјҡеҸҚжҖқиҮӘе·ұзҡ„иӢұиҜӯеӯҰд№ ж–№жі•пјҢжҸҗзӮјеҸҜеҲҶдә«зҡ„з»ҸйӘҢ"],"keyPoints":"в‘ еҚҡе®ўз»“жһ„пјҡеј•е…ҘвҶ’й—®йўҳвҶ’ж–№жі•вҶ’ж•ҲжһңвҶ’дә’еҠЁз»“е°ҫ\nв‘ЎеҚҡе®ўйЈҺж јпјҡйқһжӯЈејҸгҖҒдёӘдәәеҢ–гҖҒеҗ‘иҜ»иҖ…жҸҗй—®\nв‘ўеҠҹиғҪеҸҘејҸпјҡI used to..., Then I tried..., I found that..., What about you?","difficulties":"в‘ д»Һ\"еҲ—дёҫж–№жі•\"еҚҮзә§еҲ°\"й—®йўҳвҶ’ж–№жі•вҶ’ж•Ҳжһң\"зҡ„еҸҷдәӢз»“жһ„\nв‘ЎеҚҡе®ўзҡ„дә’еҠЁж„ҹвҖ”вҖ”еӯҰз”ҹдёҚд№ жғҜеңЁж–Үжң«еҗ‘иҜ»иҖ…жҸҗй—®","preparation":"гҖҗPPTиҜҫд»¶гҖ‘е…ұ7йЎө\n01-е°ҒйқўпјҡA Blog About English Study\n02-еҜје…ҘпјҡдҪ зҡ„иӢұиҜӯеӯҰд№ ж•…дәӢ\n03-иҢғж–ҮеҲҶжһҗпјҲж ҮжіЁз»“жһ„пјү\n04-еҚҡе®ўз»“жһ„жЁЎжқҝ\n05-еҶҷдҪңд»»еҠЎ\n06-дә’иҜ„checklist\n07-дҪңдёҡеёғзҪ®","process":[{"step":"дёҖгҖҒLead-in еҜје…Ҙ","time":5,"content":"гҖҗPPT 02 дҪ зҡ„иӢұиҜӯеӯҰд№ ж•…дәӢгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Think about your English learning journey. What was your BIGGEST problem? What did you do about it? Talk to your partner. 1 minute.\"\nв–І еӯҰз”ҹи®Ёи®ә1еҲҶй’ҹгҖӮ\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\"Vocabulary is too hard.\" / \"I can't speak.\" / \"Grammar is confusing.\"\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"These are real problems. Today we write a BLOG about our English study experience. A blog is different from an essay вҖ” it's personal, informal, and interactive. Open page 48.\"\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Read the model blog. 2 minutes. Find: What problem? What method? What result? What question to readers?\""},{"step":"дәҢгҖҒModel Analysis иҢғж–ҮеҲҶжһҗ","time":10,"content":"гҖҗPPT 03 иҢғж–ҮеҲҶжһҗгҖ‘\n\nв–І йўңиүІж ҮжіЁпјҡ\nи“қиүІ = еј•е…ҘпјҲHi everyone! Today I want to share...пјү\nзәўиүІ = й—®йўҳпјҲI used to struggle with...пјү\nз»ҝиүІ = ж–№жі•пјҲThen I tried... I started to...пјү\nж©ҷиүІ = ж•ҲжһңпјҲI found that... It really helped!пјү\nзҙ«иүІ = дә’еҠЁз»“е°ҫпјҲWhat about you? How do you study English?пјү\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Notice the structure: Hook вҶ’ Problem вҶ’ Method вҶ’ Result вҶ’ Question. And notice the TONE вҖ” it's informal! 'Hi everyone!' 'It really helped!' Not formal academic writing.\"\n\nв–І жқҝд№ҰеҸҘејҸпјҡ\nHook: Hi everyone! / Have you ever...?\nProblem: I used to struggle with... / My biggest problem was...\nMethod: Then I tried... / I started to...\nResult: I found that... / It really helped!\nQuestion: What about you? / How do you...? / Share your tips!"},{"step":"дёүгҖҒWrite еҶҷдҪң","time":15,"content":"гҖҗPPT 05 еҶҷдҪңд»»еҠЎгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Write a blog post about YOUR English study experience (100 words). Use the structure: Hook вҶ’ Problem вҶ’ Method вҶ’ Result вҶ’ Question. Be informal and personal. 12 minutes.\"\n\nв–І жЁЎжқҝпјҡ\nHi everyone!\nI want to share my experience with _____.\nI used to struggle with _____.\nThen I tried _____.\nI found that _____!\nWhat about you? How do you _____?\n\nв–І еӯҰз”ҹеҶҷдҪң12еҲҶй’ҹгҖӮж•ҷеёҲе·Ўи§ҶгҖӮ\nгҖҗе·Ўи§Ҷе…іжіЁзӮ№гҖ‘\n- жҳҜеҗҰжңүдә’еҠЁз»“е°ҫпјҲй—®иҜ»иҖ…й—®йўҳпјүпјҹ\n- жҳҜеҗҰз”ЁдәҶ\"й—®йўҳвҶ’ж–№жі•вҶ’ж•Ҳжһң\"з»“жһ„пјҹ\n- иҜӯж°”жҳҜеҗҰйқһжӯЈејҸгҖҒдёӘдәәеҢ–пјҹ\n\nгҖҗе·®ејӮеҢ–жҸҗзӨәгҖ‘\nAзҸӯпјҡ100иҜҚпјҢе®Ңж•ҙ5ж®өз»“жһ„пјҢиҮіе°‘1дёӘдә’еҠЁй—®йўҳгҖӮ\nBзҸӯпјҡ80иҜҚпјҢдҪҝз”ЁжЁЎжқҝпјҢиҮіе°‘жңү\"й—®йўҳ\"е’Ң\"ж–№жі•\"дёӨж®өгҖӮ"},{"step":"еӣӣгҖҒPeer Review дә’иҜ„","time":5,"content":"гҖҗPPT 06 checklistгҖ‘\nв–Ў жңүеј•е…ҘеҸҘпјҲHookпјү\nв–Ў жңүй—®йўҳвҶ’ж–№жі•вҶ’ж•Ҳжһңз»“жһ„\nв–Ў иҜӯж°”йқһжӯЈејҸгҖҒдёӘдәәеҢ–\nв–Ў жңүдә’еҠЁз»“е°ҫпјҲеҗ‘иҜ»иҖ…жҸҗй—®пјү\nв–Ў иҜҚж•°80-120\n\nв–І дә’иҜ„3еҲҶй’ҹгҖӮйҖү1-2зҜҮеұ•зӨәгҖӮ\n\nгҖҗйў„и®ҫдјҳз§ҖдҪңе“ҒгҖ‘\n\"Hi everyone!\nI want to share my experience with vocabulary. I used to struggle with memorizing new words вҖ” I would forget them the next day! Then I tried using flashcard apps and making sentences with each word. I found that using words in real sentences really helped me remember them!\nWhat about you? How do you memorize new words? Share your tips!\""},{"step":"дә”гҖҒSummary & Homework","time":5,"content":"гҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"A blog is a conversation with your readers. It's personal, informal, and interactive. Remember: Hook вҶ’ Problem вҶ’ Method вҶ’ Result вҶ’ Question. And always end with a question to keep the conversation going!\"\n\nгҖҗдҪңдёҡгҖ‘дҝ®ж”№еҚҡе®ўпјҢеўһеҠ дёҖдёӘе…·дҪ“зҡ„еӯҰд№ е°ҸиҙҙеЈ«пјҲstudy tipпјүз»ҷиҜ»иҖ…гҖӮ"}],"blackboard":"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  A Blog About English Study               в”Ӯ\nв”Ӯ                                           в”Ӯ\nв”Ӯ  Structure:                               в”Ӯ\nв”Ӯ  1. Hook: Hi everyone! / Have you ever..? в”Ӯ\nв”Ӯ  2. Problem: I used to struggle with...   в”Ӯ\nв”Ӯ  3. Method: Then I tried...               в”Ӯ\nв”Ӯ  4. Result: I found that... / It helped!  в”Ӯ\nв”Ӯ  5. Question: What about you?             в”Ӯ\nв”Ӯ                                           в”Ӯ\nв”Ӯ  Tone: informal, personal, interactive    в”Ӯ\nв”Ӯ  вң“ Contractions (I'm, don't)              в”Ӯ\nв”Ӯ  вң“ Exclamation marks (!)                  в”Ӯ\nв”Ӯ  вң— Academic lan sting! That's exactly what happened. Today's text tells this story.\"пјү\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Today we're going to read about how this problem was solved. The title is 'From Problems to Solutions.' As you read, I want you to track: What was the problem? What was the solution? And what was the result?\""},{"step":"дәҢгҖҒPre-Reading иҜҚжұҮйў„ж•ҷ+йў„жөӢ","time":5,"content":"гҖҗPPT 04 ж ёеҝғиҜҚжұҮеҚЎзүҮгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Before we read, let's learn 8 key words. You'll need these to understand the text.\"\n\nв–І ж•ҷеёҲйҖҗиҜҚеёҰиҜ»пјҢжҜҸдёӘиҜҚпјҡиҜ»йҹівҶ’дёӯж–ҮвҶ’иҜҫж–ҮиҜӯеўғдҫӢеҸҘ\n\n| иҜҚжұҮ | дёӯж–Ү | иҜҫж–ҮдҫӢеҸҘпјҲз®ҖеҢ–зүҲпјү |\n|------|------|-------------------|\n| heritage | йҒ—дә§ | cultural heritage must be protected |\n| preserve | дҝқжҠӨ | preserve the ancient temples |\n| give way to | и®©жӯҘдәҺ | heritage must give way to it? |\n| turn to | жұӮеҠ©дәҺ | Egypt turned to the UN for help |\n| committee | е§”е‘ҳдјҡ | a committee was established |\n| proposal | жҸҗжЎҲ | the proposal was approved |\n| investigate | и°ғжҹҘ | experts investigated the problem |\n| conduct | е®һж–Ҫ | they conducted a study |\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘ж•ҷеёҲеңЁй»‘жқҝе·Ұж ҸеҶҷдёӢ8дёӘж ёеҝғиҜҚпјҢеҸіж ҸеҶҷдёӯж–ҮгҖӮдҝқз•ҷе…ЁзЁӢгҖӮ\n\nгҖҗе·®ејӮеҢ–жҸҗзӨәгҖ‘AзҸӯеҸҜи®©еӯҰз”ҹе…Ҳе°қиҜ•ж №жҚ®иҜҚж №зҢңд№үпјҲheritage вҶ’ inherit, preserve вҶ’ serveпјүпјӣBзҸӯзӣҙжҺҘз»ҷдёӯж–ҮпјҢйҮҚзӮ№з»ғиҜ»йҹігҖӮ\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘preserve /prЙӘЛҲzЙңЛҗv/ еӯҰз”ҹе®№жҳ“йҮҚйҹій”ҷж”ҫеңЁз¬¬дёҖйҹіиҠӮпјӣheritage /ЛҲherЙӘtЙӘdК’/ еӯҰз”ҹе®№жҳ“иҜ»жҲҗ \"heritage\"пјҲhдёҚеҸ‘йҹіпјҢдҪҶжӯӨеӨ„hеҸ‘йҹіпјүгҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Now look at the title again: 'From Problems to Solutions.' Based on these words, can you predict what the text will talk about? Quick вҖ” one sentence.\"\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\n- \"How they solved the temple problem.\"пјҲж•ҷеёҲпјҡ\"Good prediction.\"пјү\n- \"Maybe about UNESCO helping Egypt.\"пјҲж•ҷеёҲпјҡ\"You already know about UNESCO? Excellent.\"пјү"},{"step":"дёүгҖҒWhile-Reading йҖҹиҜ»жҠ“жЎҶжһ¶+зІҫиҜ»жҠ“з»ҶиҠӮ","time":20,"content":"гҖҗPPT 05 иҜҫж–Үз»“жһ„еӣҫпјҡProblem вҶ’ Solution вҶ’ Result вҶ’ InspirationгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Now open your textbook to page 4. We'll read in two rounds. Round 1: fast reading, 3 minutes. I want you to find the 4 parts of the structure on the screen. Write the paragraph numbers next to each box on your task sheet.\"\n\nв–І еӯҰз”ҹйҖҹиҜ»3еҲҶй’ҹгҖӮж•ҷеёҲе·Ўи§ҶпјҢзЎ®дҝқBзҸӯеӯҰз”ҹжүҫеҲ°ж®өиҗҪиҢғеӣҙгҖӮ\n\nгҖҗйҖҹиҜ»ж ёеҜ№вҖ”вҖ”йў„и®ҫеӣһзӯ”гҖ‘\n- Problem: Paragraphs 1-2пјҲеӨ§еққе»әи®ҫдёҺзҘһеәҷж·№жІЎзҡ„зҹӣзӣҫпјү\n- Solution: Paragraphs 3-4пјҲUNESCOд»Ӣе…ҘпјҢе…ЁзҗғеҗҲдҪңжҗ¬иҝҒпјү\n- Result: Paragraph 5пјҲжҲҗеҠҹе®ҢжҲҗпјҢжҲҗдёәиҢғдҫӢпјү\n- Inspiration: Paragraph 6пјҲз»ҸжөҺеҸ‘еұ•дёҺж–ҮеҢ–йҒ—дә§еҸҜд»Ҙе…ұеӯҳпјү\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Good. Now Round 2: close reading. Read paragraphs 1-4 again carefully. On your task sheet, fill in the timeline.\"\n\nгҖҗPPT 06 ж—¶й—ҙзәҝеЎ«з©әйўҳгҖ‘\n\nв–І еӯҰз”ҹзІҫиҜ»5еҲҶй’ҹпјҢе®ҢжҲҗж—¶й—ҙзәҝгҖӮ\n\n| ж—¶й—ҙ | дәӢд»¶ |\n|------|------|\n| 1959 | The Egyptian government decided to build the Aswan Dam |\n| 1960 | ______ turned to the UN for help |\n| 1961 | The temple-moving project ______ |\n| 1980 | The project was ______ |\n\nгҖҗйў„и®ҫзӯ”жЎҲгҖ‘\n- 1960: Egypt / The Egyptian government\n- 1961: began / started\n- 1980: completed / finished\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘ж•ҷеёҲеңЁй»‘жқҝдёӯеӨ®з”»еҮәж—¶й—ҙзәҝпјҢиҜ·1еҗҚеӯҰз”ҹдёҠжқҘеЎ«еҶҷзӯ”жЎҲгҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Now let's check your understanding with 4 questions.\"\n\nгҖҗPPT 07 зІҫиҜ»й—®йўҳ4йҒ“гҖ‘\n\nQ1: Why was the Aswan Dam project a \"big challenge\"? (Para 1-2)\nQ2: How did the international community help? (Para 3)\nQ3: What did the committee do? (Para 4)\nQ4: What is the main message of the last paragraph? (Para 6)\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\nA1: \"Because building the dam would flood cultural heritage sites / temples, but not building it meant no electricity and floods.\"пјҲж•ҷеёҲпјҡ\"So it's a conflict between development and preservation.\"пјү\nA2: \"UNESCO established a committee, raised money, and sent experts from many countries.\"пјҲж•ҷеёҲпјҡ\"International cooperation вҖ” key word.\"пјү\nA3: \"They investigated the problem, conducted tests, and made a proposal to move the temples.\"пјҲж•ҷеёҲпјҡ\"Investigate вҶ’ conduct вҶ’ propose. Three steps.\"пјү\nA4: \"Economic development and cultural heritage protection can coexist / keep balance.\"пјҲж•ҷеёҲпјҡ\"Yes! This is the 'inspiration' вҖ” the lesson we learn.\"пјү\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘Q1еӯҰз”ҹе®№жҳ“еҸӘзӯ”дёҖдёӘж–№йқўпјҲеҸӘиҜҙеӨ§еққеҘҪеӨ„жҲ–еҸӘиҜҙзҘһеәҷй—®йўҳпјүпјҢйңҖиҰҒеј•еҜјд»–д»¬зңӢеҲ°\"зҹӣзӣҫ\"жүҚжҳҜchallengeзҡ„ж ёеҝғгҖӮ\n\nгҖҗе·®ејӮеҢ–жҸҗзӨәгҖ‘AзҸӯеҸҜиҝҪеҠ и®Ёи®әпјҡ\"Was the solution worth the cost? The project took 20 years and $40 million.\" BзҸӯзЎ®дҝқиғҪжүҫеҲ°еҺҹж–ҮеҸҘеӯҗеҚіеҸҜгҖӮ"},{"step":"еӣӣгҖҒPost-Reading иҝҒз§»и®Ёи®әвҖ”вҖ”дёӯеӣҪжЎҲдҫӢ","time":7,"content":"гҖҗPPT 08 дёӯеӣҪжЎҲдҫӢвҖ”вҖ”дёүеіЎе·ҘзЁӢж–Үзү©дҝқжҠӨз®Җд»ӢгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"This story happened in Egypt. But has anything similar happened in China? Yes! The Three Gorges Dam (дёүеіЎеӨ§еққ). When China built the Three Gorges Dam, many cultural heritage sites were also in danger. Let me show you two examples.\"\n\nв–І PPTеұ•зӨәпјҡ\n1. еј йЈһеәҷпјҲдә‘йҳіпјүвҖ”вҖ”ж•ҙдҪ“жҗ¬иҝҒпјҢеҺҹеқҖиў«ж·№жІЎ\n2. зҷҪй№ӨжўҒж°ҙж–ҮйўҳеҲ»пјҲж¶ӘйҷөпјүвҖ”вҖ”е»әж°ҙдёӢеҚҡзү©йҰҶеҺҹең°дҝқжҠӨ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"China's solution was similar to Egypt's: move what can be moved, preserve what can't. Now, discuss in groups of 4: 'Should economic development always come first, even if it means losing cultural heritage?' I want to hear arguments on BOTH sides.\"\n\nгҖҗPPT 09 и®Ёи®әиҜқйўҳгҖ‘\n\nв–І е°Ҹз»„и®Ёи®ә3еҲҶй’ҹгҖӮж•ҷеёҲе·Ўи§ҶпјҢеј•еҜјBзҸӯеӯҰз”ҹз”Ёз®ҖеҚ•еҸҘиЎЁиҫҫпјҡ\"I think... because...\"\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\n- \"Development is more important. People need electricity and jobs.\"пјҲж•ҷеёҲпјҡ\"Practical argument. Good.\"пјү\n- \"Heritage is irreplaceable. Once it's gone, it's gone forever.\"пјҲж•ҷеёҲпјҡ\"Cultural argument. Also good.\"пјү\n- \"We can do both вҖ” like Abu Simbel and Zhang Fei Temple.\"пјҲж•ҷеёҲпјҡ\"This is the text's conclusion: balance!\"пјү\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Excellent discussion. The text's message is clear: economic development and cultural heritage protection are not enemies. With cooperation and creativity, we can keep the balance. This is the 'inspiration' from the Aswan Dam story.\""},{"step":"дә”гҖҒSummary + Homework жҖ»з»“+дҪңдёҡ","time":3,"content":"гҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Let's summarize. Today we read about the Aswan Dam вҖ” a problem (temple vs. dam), a solution (international cooperation to move temples), a result (success), and an inspiration (development and heritage can coexist). Remember the 4-part structure: Problem вҶ’ Solution вҶ’ Result вҶ’ Inspiration. This structure appears in many problem-solving texts.\"\n\nв–І ж•ҷеёҲжҢҮеҗ‘жқҝд№Ұж—¶й—ҙзәҝпјҢеёҰеӯҰз”ҹеҝ«йҖҹеӣһйЎҫгҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"For homework, you have two tasks. Task 1: complete the vocabulary exercises on your task sheet. Task 2: write a short paragraph (50 words) about a Chinese cultural heritage site that was protected during a construction project. Use at least 3 key words from today.\"\n\nв–І PPT 10 дҪңдёҡеёғзҪ®йЎөгҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Class dismissed. See you next time for grammar вҖ” we'll learn about relative clauses with prepositions, using sentences from this very text!\"\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘иҜҫзЁӢз»“жқҹж—¶й»‘жқҝзҠ¶жҖҒпјҡе·Ұж Ҹ=ж ёеҝғиҜҚжұҮиЎЁпјҢдёӯеӨ®=ж—¶й—ҙзәҝпјҲ1959вҶ’1960вҶ’1961вҶ’1980пјүпјҢеҸіж Ҹ=4-partз»“жһ„еӣҫгҖӮе…ЁзЁӢдҝқз•ҷпјҢдёҚж“ҰйҷӨгҖӮ"}],"blackboard":"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ                          BLACKBOARD                          в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв” . The experts whom they worked with came from 50 countries. | 3b. The experts with whom they worked came from 50 countries. |\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\n- \"In B, the preposition (about/to/with) moved to the front, before which/whom.\"пјҲж•ҷеёҲпјҡ\"Excellent observation!\"пјү\n- \"B uses 'whom' instead of 'who'.\"пјҲж•ҷеёҲпјҡ\"Good catch! After a preposition, we use 'whom' for people, not 'who'.\"пјү\n- BзҸӯеҸҜиғҪеҸӘзңӢеҲ°\"д»ӢиҜҚдҪҚзҪ®еҸҳдәҶ\"вҖ”вҖ”ж•ҷеёҲиҝҪй—®пјҡ\"Which preposition? About, to, with. Where did they come from?\" еј•еҜјеӯҰз”ҹеҸ‘зҺ°д»ӢиҜҚжқҘиҮӘеҠЁиҜҚжҗӯй…ҚгҖӮ\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘ж•ҷеёҲеңЁй»‘жқҝдёӯеӨ®еҶҷдёӢеҜ№жҜ”зӨәдҫӢпјҡ\n  Informal: ...which they talked ABOUT\n  Formal:   ...ABOUT WHICH they talked\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Why do we need this formal version? In academic writing, news reports, and formal speeches, we move the preposition to the front. It sounds more professional. Today we'll learn how to do this.\""},{"step":"дәҢгҖҒRule Formation и§„еҲҷеҪ’зәі","time":10,"content":"гҖҗPPT 03 и§„еҲҷеҪ’зәіиЎЁгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Let's summarize the rule. Look at the table on the screen.\"\n\nв–І PPTеұ•зӨәи§„еҲҷиЎЁпјҡ\n\nгҖҗжқҝд№Ұж—¶жңәвҖ”вҖ”е®Ңж•ҙжқҝд№Ұжһ„е»әгҖ‘\n\nв–І ж•ҷеёҲз”ЁдёүиүІзІүз¬”еңЁй»‘жқҝдёҠжһ„е»әи§„еҲҷпјҡ\n\nзәўиүІ=д»ӢиҜҚ  и“қиүІ=е…ізі»д»ЈиҜҚ  й»„иүІ=е…ҲиЎҢиҜҚ\n\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ         PREP. + WHICH / WHOM                 в”Ӯ\nв”Ӯ                                              в”Ӯ\nв”Ӯ  е…ҲиЎҢиҜҚ(зү©) + prep. + WHICH + д»ҺеҸҘ            в”Ӯ\nв”Ӯ  е…ҲиЎҢиҜҚ(дәә) + prep. + WHOM + д»ҺеҸҘ             в”Ӯ\nв”Ӯ                                              в”Ӯ\nв”Ӯ  вң— prep. + that пјҲй”ҷиҜҜпјҒдёҚиғҪиҝҷж ·з”Ёпјү          в”Ӯ\nв”Ӯ  вң“ prep. + which / prep. + whom              в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Three key rules. Rule 1: If the antecedent (е…ҲиЎҢиҜҚ) is a THING, use prep. + WHICH. If it's a PERSON, use prep. + WHOM. Rule 2: You CANNOT use 'that' after a preposition. 'About that' is WRONG. 'About which' is RIGHT. Rule 3: The preposition comes from the verb phrase in the relative clause.\"\n\nгҖҗPPT 04 еҠЁиҜҚ+д»ӢиҜҚжҗӯй…ҚеӨҚд№ гҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"The hardest part is finding the RIGHT preposition. The preposition comes from the verb. Let's review common verb + prep. combinations:\"\n\n| еҠЁиҜҚзҹӯиҜӯ | д»ӢиҜҚ | дҫӢеҸҘ |\n|----------|------|------|\n| talk about | about | the topic about which they talked |\n| depend on | on | the dam on which they depended |\n| deal with | with | the problem with which they dealt |\n| look at | at | the temple at which they looked |\n| turn to | to | the UN to which Egypt turned |\n| work with | with | the experts with whom they worked |\n| live in | in | the temple in which they lived |\n| belong to | to | the country to which it belonged |\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘в‘ еӯҰз”ҹе®№жҳ“з”Ё that д»Јжӣҝ which/whomпјҡй”ҷ \"the dam on that they depended\" вҶ’ еҜ№ \"on which\"\nв‘ЎеӯҰз”ҹе®№жҳ“еҝҳи®°д»ӢиҜҚжқҘжәҗпјҡдёҚжҳҜйҡҸдҫҝйҖүд»ӢиҜҚпјҢиҖҢжҳҜд»ҺеҠЁиҜҚжҗӯй…ҚжқҘ\nв‘ўwhom еӯҰз”ҹе®№жҳ“еҶҷжҲҗ whoпјҡеңЁд»ӢиҜҚеҗҺеҝ…йЎ»з”Ёе®ҫж ј whom\n\nгҖҗе·®ејӮеҢ–жҸҗзӨәгҖ‘AзҸӯеҸҜи®©еӯҰз”ҹиҮӘе·ұйҖ еҸҘпјӣBзҸӯйҮҚзӮ№з»ғ\"жүҫеҠЁиҜҚвҶ’е®ҡд»ӢиҜҚвҶ’жҸҗеүҚ\"дёүжӯҘжі•гҖӮ"},{"step":"дёүгҖҒPractice еҸҘејҸиҪ¬жҚў+еЎ«з©ә","time":12,"content":"гҖҗPPT 05 еҸҘејҸиҪ¬жҚўз»ғд№ пјҲ6йўҳпјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Now practice. Convert these informal sentences to formal ones by moving the preposition. Work on your task sheet. You have 5 minutes.\"\n\n1. The temple which they searched for was over 3,000 years old.\n2. The committee which they set up included experts from many countries.\n3. The river which the dam was built on is the Nile.\n4. The people whom Egypt worked with came from 50 countries.\n5. The plan which they agreed on saved the temples.\n6. The money which they paid for the project came from many countries.\n\nв–І еӯҰз”ҹзӢ¬з«Ӣе®ҢжҲҗ5еҲҶй’ҹгҖӮж•ҷеёҲе·Ўи§ҶпјҢйҮҚзӮ№жҢҮеҜјBзҸӯгҖӮ\n\nгҖҗйў„и®ҫзӯ”жЎҲвҖ”вҖ”ж•ҷеёҲж ёеҜ№гҖ‘\n1. The temple FOR WHICH they searched was over 3,000 years old. (search for)\n2. The committee UP WHICH they set included experts... вҶ’ жіЁж„Ҹпјҡset up дёӯ up жҳҜеүҜиҜҚдёҚжҳҜд»ӢиҜҚпјҒжӯӨйўҳжҳҜйҷ·йҳұйўҳпјҒжӯЈзЎ®зӯ”жЎҲпјҡThe committee WHICH they set up...пјҲupдёҚиғҪжҸҗеүҚпјҢеӣ дёәset upдёӯзҡ„upжҳҜе°Ҹе“ҒиҜҚ/еүҜиҜҚпјү\n   гҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘иҝҷжҳҜз»Ҹе…ёйҷ·йҳұпјҡlook atдёӯзҡ„atжҳҜд»ӢиҜҚеҸҜжҸҗеүҚпјҢдҪҶset upдёӯзҡ„upжҳҜеүҜиҜҚдёҚеҸҜжҸҗеүҚпјҒеҢәеҲҶж–№жі•пјҡupеҸҜж”ҫеҗҚиҜҚеҗҺпјҲset the committee upпјүпјҢatдёҚиғҪж”ҫеҗҚиҜҚеҗҺпјҲдёҚиғҪиҜҙlooked the temple atпјүгҖӮж•ҷеёҲйңҖйҮҚзӮ№и®Іи§ЈжӯӨйўҳгҖӮ\n3. The river ON WHICH the dam was built is the Nile. (build on)\n4. The people WITH WHOM Egypt worked came from 50 countries. (work with)\n5. The plan ON WHICH they agreed saved the temples. (agree on)\n6. The money WHICH they paid for the project... вҶ’ жіЁж„Ҹпјҡpay forдёӯforжҳҜд»ӢиҜҚпјҢдҪҶиҝҷйҮҢforзҡ„е®ҫиҜӯжҳҜthe projectдёҚжҳҜmoneyгҖӮжӯӨйўҳд№ҹжҳҜйҷ·йҳұпјҒжӯЈзЎ®пјҡThe money for which they paid came... (pay for the money вҶ’ paid for the money вҶ’ for which)\n\nгҖҗPPT 06 еЎ«з©әз»ғд№ пјҲ5йўҳпјҢиҜҫж–ҮиҜӯеўғпјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Now fill in the blanks with prep. + which or prep. + whom.\"\n\n1. The Aswan Dam, ______ ______ the Egyptian government depended, would flood the temples.\n2. The temples ______ ______ they were talking were over 3,000 years old.\n3. UNESCO, ______ ______ Egypt turned for help, established a committee.\n4. The experts ______ ______ the committee worked came from many countries.\n5. The method ______ ______ they moved the temple was innovative.\n\nгҖҗйў„и®ҫзӯ”жЎҲгҖ‘\n1. on which (depend on)\n2. about which (talk about)\n3. to which (turn to)\n4. with whom (work with)\n5. by which (move by вҖ” жӯӨйўҳиҫғйҡҫпјҢж•ҷеёҲйңҖи§ЈйҮҠbyиЎЁзӨә\"йҖҡиҝҮ...ж–№ејҸ\")\n\nгҖҗе·®ејӮеҢ–жҸҗзӨәгҖ‘AзҸӯе®ҢжҲҗеҗҺеҸҜи®©еӯҰз”ҹз”ЁжҜҸдёӘз»“жһ„еҶҚйҖ дёҖдёӘж–°еҸҘпјӣBзҸӯзЎ®дҝқиғҪжүҫеҲ°жӯЈзЎ®зҡ„еҠЁиҜҚжҗӯй…ҚеҚіеҸҜгҖӮ"},{"step":"еӣӣгҖҒProduction иҮӘз”ұдә§еҮәвҖ”вҖ”жҸҸиҝ°еӣҫзүҮ","time":7,"content":"гҖҗPPT 07 еӣҫзүҮжҸҸиҝ°д»»еҠЎвҖ”вҖ”ж•…е®«/й•ҝеҹҺ/ж•Ұз…ҢиҺ«й«ҳзӘҹеӣҫзүҮгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Now let's use what we learned. Look at these pictures of Chinese cultural heritage sites. For each picture, write ONE sentence using prep. + which or prep. + whom. Use the patterns we learned.\"\n\nв–І PPTеұ•зӨә3еј еӣҫзүҮ + жҸҗзӨәиҜҚпјҡ\n1. ж•…е®«пјҡbuild (in which) / visit (to which)\n2. й•ҝеҹҺпјҡprotect (with which) / fight (on which)\n3. иҺ«й«ҳзӘҹпјҡdiscover (in which) / study (about which)\n\nгҖҗйў„и®ҫеӣһзӯ”зӨәдҫӢгҖ‘\n1. \"The Forbidden City, in which 24 emperors lived, is now a museum.\"\n2. \"The Great Wall, on which soldiers once fought, is a symbol of China.\"\n3. \"The Mogao Caves, in which ancient paintings were discovered, are famous worldwide.\"\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Good! Now share your sentence with your partner. Check each other: Is the preposition correct? Is it which or whom? Is 'that' used after a preposition? (It shouldn't be!)\"\n\nв–І еӯҰз”ҹдә’жҹҘ1еҲҶй’ҹгҖӮж•ҷеёҲйӮҖиҜ·2-3еҗҚеӯҰз”ҹеҲҶдә«пјҢеҚіж—¶еҸҚйҰҲгҖӮ\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘е°Ҷ1-2дёӘеӯҰз”ҹдјҳз§ҖдҫӢеҸҘеҶҷеңЁй»‘жқҝеҸідёӢи§’пјҢдҪңдёәиҜҫе ӮжҲҗжһңеұ•зӨәгҖӮ"},{"step":"дә”гҖҒSummary + Homework жҖ»з»“+дҪңдёҡ","time":3,"content":"гҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Let's summarize. Today we learned prep. + which/whom вҖ” a formal way to write relative clauses. Three rules: в‘  which for things, whom for people; в‘Ў NO 'that' after preposition; в‘ў the preposition comes from the verb phrase. Remember: find the verb вҶ’ find the preposition вҶ’ move it to the front.\"\n\nв–І ж•ҷеёҲжҢҮеҗ‘жқҝд№Ұи§„еҲҷиЎЁпјҢеёҰеӯҰз”ҹйҪҗиҜ»дёүи§„еҲҷгҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Homework: Exercise 3 on page 6 in your textbook вҖ” fill in the blanks with prep. + which or prep. + whom. Also, find 3 sentences with relative clauses in the reading text (From Problems to Solutions) and rewrite them using prep. + which/whom if possible.\"\n\nв–І PPT 08 дҪңдёҡеёғзҪ®йЎөгҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Next lesson: writing! We'll write a news report about cultural heritage protection вҖ” and I want to see today's grammar structure in your writing!\"\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘иҜҫзЁӢз»“жқҹж—¶й»‘жқҝзҠ¶жҖҒпјҡдёӯеӨ®=и§„еҲҷиЎЁ+дёүиүІж ҮжіЁпјҢе·Ұж Ҹ=еҠЁиҜҚжҗӯй…ҚиЎЁпјҢеҸідёӢи§’=еӯҰз”ҹдҫӢеҸҘгҖӮ"}],"blackboard":"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ              PREP. + WHICH / WHOM (Relative Clauses)       в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\nв”Ӯ                                                           в”Ӯ\nв”Ӯ  RULE:                                                    в”Ӯ\nв”Ӯ  зү© вҶ’ prep. + WHICH    дәә вҶ’ prep. + WHOM                  в”Ӯ\nв”Ӯ  вң— prep. + that  (й”ҷиҜҜ!)                                  в”Ӯ\nв”Ӯ                                                           в”Ӯ\nв”Ӯ  дёүжӯҘжі•пјҡ                                                  в”Ӯ\nв”Ӯ  в‘ жүҫеҠЁиҜҚ вҶ’ в‘Ўе®ҡд»ӢиҜҚ вҶ’ в‘ўжҸҗеүҚ                                 в”Ӯ\nв”Ӯ                                                           в”Ӯ\nв”Ӯ  VERB + PREP. еҸӮиҖғиЎЁпјҡ                                     в”Ӯ\nв”Ӯ  talk about вҶ’ about which    depend on вҶ’ on which         в”Ӯ\nв”Ӯ  deal with вҶ’ with which      turn to вҶ’ to which           в”Ӯ\nв”Ӯ  work with вҶ’ with whom       agree on вҶ’ on which          в”Ӯ\nв”Ӯ                                                           в”Ӯ\nв”Ӯ  вҡ  set up дёӯзҡ„ up жҳҜеүҜиҜҚпјҢдёҚеҸҜжҸҗеүҚпјҒ                        в”Ӯ\nв”Ӯ                                                           в”Ӯ\nв”Ӯ  еӯҰз”ҹдҫӢеҸҘеҢәпјҡ                                               в ” wraps up with significance.\"пјү\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘ж•ҷеёҲеңЁй»‘жқҝдёӯеӨ®з”»еҮәдә”еұӮйҮ‘еӯ—еЎ”еӣҫпјҡ\n  HeadlineпјҲе°–йЎ¶пјү\n  LeadпјҲ5Wпјү\n  BodyпјҲдәӢе®һз»ҶиҠӮпјү\n  QuoteпјҲеј•иҜӯпјү\n  ConclusionпјҲж„Ҹд№үеұ•жңӣпјү\n\nгҖҗPPT 04 5WиҰҒзҙ и§ЈжһҗгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Let's find the 5 Ws in the lead sentence.\"\n\n| 5W | иҢғж–ҮеҶ…е®№ |\n|----|---------|\n| Who | Researchers at the Mogao Caves |\n| What | completed a 10-year digital preservation project |\n| When | (implied: recently) |\n| Where | Dunhuang |\n| Why | to protect ancient paintings for future generations |\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘When еңЁиҝҷзҜҮиҢғж–ҮдёӯжҳҜйҡҗеҗ«зҡ„пјҲ\"have completed\"жҡ—зӨәжңҖиҝ‘пјүпјҢеӯҰз”ҹеҸҜиғҪжүҫдёҚеҲ°гҖӮж•ҷеёҲи§ЈйҮҠпјҡзҺ°еңЁе®ҢжҲҗж—¶жң¬иә«е°ұжҡ—зӨә\"жңҖиҝ‘е®ҢжҲҗ\"гҖӮеӯҰз”ҹеҶҷдҪңж—¶е»әи®®жҳҺзЎ®еҶҷж—¶й—ҙгҖӮ\n\nгҖҗPPT 05 еј•иҜӯеҶҷдҪңи§„иҢғгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"The quote is important. Notice the format: quotation marks, then speaker's name and title. Let me show you the standard format.\"\n\nв–І PPTеұ•зӨәеј•иҜӯж јејҸпјҡ\n  ж јејҸпјҡ\"Quote content,\" said [Name], [title].\n  дҫӢпјҡ\"This is a breakthrough,\" said Dr. Wang, the lead researcher.\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Three rules for quotes: в‘  Quote someone relevant вҖ” an expert, official, or witness. в‘Ў Use the exact format with quotation marks and 'said.' в‘ў The quote should add insight, not just repeat facts.\""},{"step":"дәҢгҖҒеҶҷдҪңд»»еҠЎеёғзҪ®+иҜқйўҳйҖүжӢ©","time":5,"content":"гҖҗPPT 06 еҶҷдҪңд»»еҠЎ+жҸҗзӨәиҜҚеҚЎгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Now it's your turn. Your task: write a 120-word news report about a Chinese cultural heritage protection project. Choose ONE topic from the screen.\"\n\nв–І PPTеұ•зӨәиҜқйўҳйҖүйЎ№пјҲй…ҚеӣҫзүҮпјүпјҡ\n1. дёүеіЎеј йЈһеәҷжҗ¬иҝҒпјҲThe Zhang Fei Temple Relocationпјү\n2. иүҜжёҡеҸӨеҹҺйҒ—еқҖз”ійҒ—жҲҗеҠҹпјҲLiangzhu Ancient City вҖ” UNESCO World Heritageпјү\n3. ж•…е®«ж–Үзү©дҝ®еӨҚпјҲThe Palace Museum Restoration Projectпјү\n4. й•ҝеҹҺж•°еӯ—еҢ–дҝқжҠӨпјҲThe Great Wall Digital Protectionпјү\n5. иҮӘйҖүе…¶д»–дёӯеӣҪж–ҮеҢ–йҒ—дә§дҝқжҠӨжЎҲдҫӢ\n\nв–І PPTеҗҢж—¶еұ•зӨәж ёеҝғиҜҚжұҮеә“пјҲдҫӣеҶҷдҪңдҪҝз”Ёпјүпјҡ\n  heritage, preserve, protect, restoration, project, ancient, cultural, identity, committee, expert, government, fund, complete, innovative, traditional, generation, future\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Before you write, think about your 5 Ws. Who did what, when, where, and why? Take 1 minute to decide your topic and jot down the 5 Ws on your task sheet.\"\n\nв–І еӯҰз”ҹжҖқиҖғ1еҲҶй’ҹгҖӮж•ҷеёҲе·Ўи§ҶпјҢеё®еҠ©BзҸӯеӯҰз”ҹзЎ®е®ҡиҜқйўҳе’Ң5WгҖӮ\n\nгҖҗйў„и®ҫеӣһзӯ”вҖ”вҖ”5WзӨәдҫӢпјҲеј йЈһеәҷжҗ¬иҝҒпјүгҖ‘\n- Who: The Chinese government / cultural heritage experts\n- What: relocated the Zhang Fei Temple to save it from flooding\n- When: in 2002-2003\n- Where: Yunyang, Chongqing (Three Gorges area)\n- Why: because the Three Gorges Dam would flood the original site\n\nгҖҗе·®ејӮеҢ–жҸҗзӨәгҖ‘AзҸӯеҸҜиҮӘйҖүиҜқйўҳе№¶зӢ¬з«Ӣе®ҢжҲҗ5WпјӣBзҸӯе»әи®®йҖүжӢ©PPTдёҠжңүжҸҗзӨәзҡ„иҜқйўҳпјҢж•ҷеёҲжҸҗдҫӣ5WжЎҶжһ¶гҖӮ"},{"step":"дёүгҖҒеҶҷдҪңжЁЎжқҝ+йҷҗж—¶еҶҷдҪң","time":18,"content":"гҖҗPPT 07 еҶҷдҪңжЁЎжқҝпјҲеЎ«з©әејҸжЎҶжһ¶пјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Here's a template to guide your writing. You don't have to follow it exactly, but if you're not sure how to start, use it.\"\n\nв–І PPTеұ•зӨәжЁЎжқҝпјҡ\n\nHEADLINE: [Topic keyword] + [Action verb] + [Object]\n  Example: Ancient Temple Moved to Safety\n\nLEAD: [Who] in/at [Where] have/has [What] (in [When]), [Why].\n  Example: Cultural heritage experts in Yunyang have relocated the Zhang Fei Temple, saving it from the rising waters of the Three Gorges Dam.\n\nBODY: [Detail 1 with number/date]. [Detail 2 with method/process]. [Detail 3 with funding/support].\n  Example: The 1,700-year-old temple was moved stone by stone to a new location 32 kilometers away. The project took over a year and cost 40 million yuan. It was funded by the national government.\n\nQUOTE: \"[Insight],\" said [Name], [title].\n  Example: \"This is a model for heritage protection,\" said Professor Chen, a cultural heritage expert.\n\nCONCLUSION: [Result/Significance for the future].\n  Example: The relocated temple now attracts thousands of visitors, proving that development and heritage can coexist.\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"You have 15 minutes to write. Use the template if you need it. Try to use at least one 'prep.+which/whom' structure from yesterday's grammar lesson for extra points. Timer starts... now!\"\n\nв–І и®Ўж—¶15еҲҶй’ҹгҖӮеӯҰз”ҹзӢ¬з«ӢеҶҷдҪңгҖӮ\n\nгҖҗж•ҷеёҲе·Ўи§ҶйҮҚзӮ№гҖ‘\nвҖў BзҸӯпјҡжЈҖжҹҘжҳҜеҗҰеҢ…еҗ«5WпјҢж ҮйўҳжҳҜеҗҰдёәеҗҚиҜҚзҹӯиҜӯиҖҢйқһе®Ңж•ҙеҸҘ\nвҖў AзҸӯпјҡжЈҖжҹҘеј•иҜӯж јејҸжҳҜеҗҰи§„иҢғпјҢжҳҜеҗҰжңүprep.+which/whomз»“жһ„\nвҖў е…ЁзҸӯпјҡжҸҗйҶ’еӯ—ж•°жҺ§еҲ¶пјҲ100-140иҜҚпјүпјҢжЈҖжҹҘж—¶жҖҒпјҲж–°й—»з”ЁиҝҮеҺ»ж—¶жҲ–зҺ°еңЁе®ҢжҲҗж—¶пјү\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘е·Ўеңәж—¶еёёи§Ғй—®йўҳпјҡ\nв‘ ж ҮйўҳеҶҷжҲҗе®Ңж•ҙеҸҘеӯҗпјҲ\"The temple was moved to a new place.\"пјүвҶ’ ж”№дёәеҗҚиҜҚзҹӯиҜӯпјҲ\"Ancient Temple Moved to Safety\"пјү\nв‘ЎеҜјиҜӯйҒ—жјҸWhereжҲ–When вҶ’ 5Wеҝ…йЎ»йҪҗе…Ё\nв‘ўеј•иҜӯж ҮзӮ№й”ҷиҜҜпјҲдёӯж–Үеӯ—з¬Ұзҡ„еј•еҸ·\"\"пјүвҶ’ иӢұж–Үз”Ё\"\"пјҢйҖ—еҸ·еңЁеҶ…\nв‘Јеӯ—ж•°и¶…йҷҗпјҲеҶҷеҲ°200иҜҚпјүвҶ’ жҸҗйҶ’еҲ еҮҸиғҢжҷҜдҝЎжҒҜ"},{"step":"еӣӣгҖҒеҗҢдјҙдә’иҜ„+еҲҶдә«","time":5,"content":"гҖҗPPT 08 иҜ„еҲҶж ҮеҮҶпјҲRubric 5з»ҙеәҰпјүгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Time's up. Exchange your paper with your partner. Use the rubric on the screen to give feedback. You have 3 minutes.\"\n\nв–І PPTеұ•зӨәиҜ„еҲҶж ҮеҮҶпјҡ\n\n| з»ҙеәҰ | 4еҲҶпјҲдјҳз§Җпјү | 2еҲҶпјҲеҸҠж јпјү | 0еҲҶпјҲжңӘиҫҫж Үпјү |\n|------|------------|------------|-------------|\n| з»“жһ„ | дә”йғЁеҲҶйҪҗе…Ё | зјә1-2йғЁеҲҶ | зјә3йғЁеҲҶд»ҘдёҠ |\n| 5WеҜјиҜӯ | 5Wе…Ёжңү | жңү3-4дёӘW | е°‘дәҺ3дёӘW |\n| еј•иҜӯ | ж јејҸи§„иҢғ+еҶ…е®№жңүд»·еҖј | жңүеј•иҜӯдҪҶж јејҸжңүе°ҸиҜҜ | ж— еј•иҜӯ |\n| иҜӯиЁҖ | иҜӯжі•жӯЈзЎ®+з”ЁиҜҚдё°еҜҢ | жңүе°‘йҮҸиҜӯжі•й”ҷиҜҜ | иҜӯжі•й”ҷиҜҜеӨҡеҪұе“ҚзҗҶи§Ј |\n| еӯ—ж•° | 100-140иҜҚ | 80-99жҲ–141-160иҜҚ | \x3c80жҲ–>160иҜҚ |\n\nв–І еӯҰз”ҹдә’иҜ„3еҲҶй’ҹгҖӮж•ҷеёҲе·Ўи§ҶпјҢж”¶йӣҶ1-2зҜҮдјҳз§ҖдҪңе“ҒеҮҶеӨҮеҲҶдә«гҖӮ\n\nгҖҗж•ҷеёҲеҸ° "гҖҗPPT 02 и—ҸзҫҡзҫҠеӣҫзүҮзҫӨгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Good morning! Look at this picture. Do you know this animal?\"\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\n- \"и—ҸзҫҡзҫҠпјҒ\"пјҲж•ҷеёҲпјҡ\"Yes! In English: Tibetan antelope.\"пјү\n- \"It's the Olympic mascot!\"пјҲж•ҷеёҲпјҡ\"Correct! иҝҺиҝҺ from the 2008 Olympics. Good memory!\"пјү\n- BзҸӯеҸҜиғҪжІүй»ҳвҖ”вҖ”ж•ҷеёҲеј•еҜјпјҡ\"Where does it live? High mountains? What color is it?\"\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"This animal lives at 5,000 meters above sea level вҖ” higher than any other large mammal in China. Twenty years ago, it was disappearing. Why? Because of THIS.\"\n\nв–І PPT 08 еұ•зӨәжІҷеӣҫд»Җиҙёжҳ“з®Җд»Ӣ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"This is a shahtoosh shawl. It's made from Tibetan antelope wool. One shawl costs $5,000 in the international black market. But to make ONE shawl, you need to kill 3 to 5 antelopes. In the 1990s, hunters killed so many that the population dropped from over ONE MILLION to fewer than 50,000. But today, they're coming back. How? Today's text tells the story. It's called 'A Day in the Clouds' вҖ” because these animals live so high up, they're literally in the clouds.\"\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘ж•ҷеёҲеңЁй»‘жқҝжӯЈдёӯеҶҷдёӢпјҡA Day in the Clouds + и—ҸзҫҡзҫҠз®Җз¬”з”»"},{"step":"дәҢгҖҒPre-Reading иҜҚжұҮйў„ж•ҷ+йў„жөӢ","time":5,"content":"гҖҗPPT 04 ж ёеҝғиҜҚжұҮеҚЎзүҮгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Let's learn 10 key words before we read.\"\n\n| иҜҚжұҮ | дёӯж–Ү | и®°еҝҶжҠҖе·§ |\n|------|------|---------|\n| antelope | и—ҸзҫҡзҫҠ | anteпјҲеүҚпјү+ lopeпјҲеҘ”и·‘пјү |\n| plateau | й«ҳеҺҹ | flat + high |\n| habitat | ж –жҒҜең° | habitпјҲеұ…дҪҸпјү+ at |\n| species | зү©з§Қ | speciпјҲз§Қзұ»пјү+ es |\n| endangered | жҝ’еҚұзҡ„ | en + danger + ed |\n| extinct | зҒӯз»қзҡ„ | exпјҲеҮәеҺ»пјү+ tinct |\n| reserve | дҝқжҠӨеҢә | re + serveпјҲдҝқз•ҷпјү |\n| recover | жҒўеӨҚ | re + coverпјҲйҮҚж–°иҰҶзӣ–пјү |\n| illegal | йқһжі•зҡ„ | ilпјҲдёҚпјү+ legalпјҲеҗҲжі•пјү |\n| hunter | зҢҺдәә | hunt + er |\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘ж•ҷеёҲеңЁй»‘жқҝе·Ұж ҸеҶҷдёӢж ёеҝғиҜҚжұҮпјҢдҝқз•ҷе…ЁзЁӢгҖӮ\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘в‘ endangered /ЙӘnЛҲdeЙӘndК’Йҷrd/ еӯҰз”ҹе®№жҳ“иҜ»жҲҗ \"in-dangered\"пјӣв‘Ўextinct /ЙӘkЛҲstЙӘЕӢkt/ еӯҰз”ҹе®№жҳ“иҜ»жҲҗ \"ex-tinct\"пјӣв‘ўspecies /ЛҲspiЛҗКғiЛҗz/ жіЁж„ҸжҳҜй•ҝе…ғйҹі/iЛҗ/дё”иҜҚе°ҫеҸ‘/ЙӘz/гҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Now look at the title: 'A Day in the Clouds.' What do you think the author will describe? Quick prediction вҖ” one sentence.\"\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\n- \"A day watching antelopes.\"пјҲж•ҷеёҲпјҡ\"Good, but what will the author discover?\"пјү\n- \"How people protect antelopes.\"пјҲж•ҷеёҲпјҡ\"Good prediction вҖ” protection is a key theme.\"пјү"},{"step":"дёүгҖҒWhile-Reading еҸҢзәҝйҳ…иҜ»вҖ”вҖ”еҸҷдәӢзәҝ+ж•°жҚ®зәҝ","time":20,"content":"гҖҗPPT 05 еҸҢзәҝз»“жһ„еӣҫгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"This text has TWO storylines running at the same time. Line 1: what the author SEES and FEELS вҖ” the narrative. Line 2: FACTS and NUMBERS about Tibetan antelopes вҖ” the data. As you read, I want you to fill in BOTH lines on your task sheet. Read for 5 minutes.\"\n\nв–І еӯҰз”ҹйҖҹиҜ»5еҲҶй’ҹпјҢж•ҷеёҲе·Ўи§ҶгҖӮ\n\nгҖҗPPT 06 ж•°йҮҸеҸҳеҢ–ж—¶й—ҙзәҝвҖ”вҖ”еӯҰз”ҹеЎ«еҶҷгҖ‘\n\n| еҸҷдәӢзәҝпјҲдҪңиҖ…зңӢеҲ°/ж„ҹеҸ—еҲ°зҡ„пјү | ж•°жҚ®зәҝпјҲдәӢе®һе’Ңж•°еӯ—пјү |\n|---|---|\n| 1. Author observes antelopes on the plateau | Antelopes live at ______ meters |\n| 2. Author remembers the hunting crisis | Population dropped from ______ to ______ |\n| 3. Author learns about protection efforts | ______ Nature Reserve was established |\n| 4. Author sees the herd recovering | Population recovered to over ______ |\n| 5. Author reflects on human-nature relationship | In 2016, antelopes were ______ from endangered list |\n\nгҖҗйў„и®ҫзӯ”жЎҲгҖ‘\n1. 5,000 / five thousand\n2. one million / 50,000 (fifty thousand)\n3. Changtang\n4. 150,000 (one hundred fifty thousand)\n5. removed\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘ж•ҷеёҲеңЁй»‘жқҝдёӯеӨ®з”»еҮәеҸҢзәҝиЎЁж јпјҢиҜ·еӯҰз”ҹдёҠжқҘеЎ«еҶҷгҖӮ\n\nгҖҗPPT 07 зІҫиҜ»й—®йўҳ4йҒ“гҖ‘\n\nQ1: Why did the author go to the Changtang Nature Reserve? (Para 1-2)\nQ2: What happened to Tibetan antelopes in the 1980s-90s? (Para 3)\nQ3: What did the government do to protect them? (Para 4)\nQ4: What is the main message of the last paragraph? (Para 5-6)\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\nA1: \"To observe Tibetan antelopes in their natural habitat.\"пјҲж•ҷеёҲпјҡ\"The author is a journalist/researcher.\"пјү\nA2: \"Hunters killed them for their wool to make shahtoosh shawls. The population dropped dramatically.\"пјҲж•ҷеёҲпјҡ\"From one million to 50,000. A 95% decline.\"пјү\nA3: \"The government established the Changtang Nature Reserve and stationed rangers to stop illegal hunting.\"пјҲж•ҷеёҲпјҡ\"Key actions: reserve + rangers + law enforcement.\"пјү\nA4: \"Only when we learn to exist in harmony with nature can we stop being a threat to wildlife.\"пјҲж•ҷеёҲпјҡ\"This is the thesis statement вҖ” the main message. Notice the 'Only when... can we...' structure.\"пјү\n\nгҖҗжҳ“й”ҷзӮ№жҸҗйҶ’гҖ‘Q4зҡ„еҖ’иЈ…еҸҘ\"Only when we learn... can we stop...\"вҖ”вҖ”еӯҰз”ҹеҸҜиғҪдёҚи®ӨиҜҶиҝҷжҳҜйғЁеҲҶеҖ’иЈ…гҖӮж•ҷеёҲи§ЈйҮҠпјҡOnly+зҠ¶иҜӯд»ҺеҸҘж”ҫеҸҘйҰ–пјҢдё»еҸҘеҠ©еҠЁиҜҚcanжҸҗеүҚеҲ°дё»иҜӯweд№ӢеүҚгҖӮ\n\nгҖҗе·®ејӮеҢ–жҸҗзӨәгҖ‘AзҸӯеҸҜиҝҪеҠ и®Ёи®әпјҡ\"Why was the shahtoosh trade so hard to stop?\" BзҸӯзЎ®дҝқиғҪжүҫеҲ°еҺҹж–Үзӯ”жЎҲеҚіеҸҜгҖӮ"},{"step":"еӣӣгҖҒPost-Reading иҝҒз§»и®Ёи®әвҖ”вҖ”\"What Can We Do?\"","time":7,"content":"гҖҗPPT 09 и®Ёи®әиҜқйўҳгҖ‘\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"The Tibetan antelope story is a SUCCESS story вҖ” the population recovered. But many other species are still endangered. In groups of 4, discuss: 'What can WE do вҖ” as students вҖ” to protect wildlife?' Think of at least 3 actions.\"\n\nв–І е°Ҹз»„и®Ёи®ә3еҲҶй’ҹгҖӮж•ҷеёҲе·Ўи§ҶгҖӮ\n\nгҖҗйў„и®ҫеӣһзӯ”гҖ‘\n- \"Don't buy products made from endangered animals.\"пјҲж•ҷеёҲпјҡ\"Consumer power! Good.\"пјү\n- \"Learn about endangered species and tell others.\"пјҲж•ҷеёҲпјҡ\"Education and awareness.\"пјү\n- \"Support conservation organizations вҖ” donate or volunteer.\"пјҲж•ҷеёҲпјҡ\"Action-oriented.\"пјү\n- \"Protect the environment вҖ” reduce pollution and habitat destruction.\"пјҲж•ҷеёҲпјҡ\"Habitat protection is key.\"пјү\n- BзҸӯеҸҜиғҪиҜҙдёӯж–ҮвҖ”вҖ”ж•ҷеёҲеј•еҜјз”ЁиӢұиҜӯпјҡ\"How to say 'дёҚд№°' in English? Don't buy.\"\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Excellent ideas. The text tells us that protection works вҖ” the antelope population recovered because people took action. But remember the author's final message: 'Only when we learn to exist in harmony with nature can we stop being a threat to wildlife.' The key is HARMONY вҖ” not domination, not exploitation. Harmony.\""},{"step":"дә”гҖҒSummary + Homework жҖ»з»“+дҪңдёҡ","time":3,"content":"гҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Let's summarize. Today we read 'A Day in the Clouds' вҖ” a story about Tibetan antelopes. Two storylines: narrative (the author's observations) and data (population changes). The antelope crisis: from one million to 50,000. The recovery: back to 150,000, removed from endangered list in 2016. The lesson: we must live in harmony with nature.\"\n\nв–І ж•ҷеёҲжҢҮеҗ‘жқҝд№ҰеҸҢзәҝиЎЁж јпјҢеёҰеӯҰз”ҹеӣһйЎҫгҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Homework: Task 1 вҖ” complete the vocabulary exercises. Task 2 вҖ” write a short paragraph (50 words) about another endangered animal in China. Use at least 3 key words from today.\"\n\nв–І PPT 10 дҪңдёҡеёғзҪ®йЎөгҖӮ\n\nгҖҗж•ҷеёҲеҸ°иҜҚгҖ‘\"Next class: grammar! We'll learn the present continuous passive voice вҖ” and you'll see it throughout this text. 'The antelopes ARE BEING PROTECTED.' 'Their habitat IS BEING DESTROYED.' Can you spot these patterns? See you next time!\"\n\nгҖҗжқҝд№Ұж—¶жңәгҖ‘иҜҫзЁӢз»“жқҹй»‘жқҝзҠ¶жҖҒпјҡе·Ұж Ҹ=ж ёеҝғиҜҚжұҮиЎЁпјҢдёӯеӨ®=еҸҢзәҝз»“жһ„иЎЁж ј+ж•°йҮҸж—¶й—ҙзәҝпјҢеҸіж Ҹ=е…ій”®еҸҘ\"Only when... can we...\"гҖӮ"}],"blackboard":"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ                    A Day in the Clouds                        в”Ӯ\nв”Ӯ
