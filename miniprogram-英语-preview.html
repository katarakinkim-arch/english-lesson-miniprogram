 see/hear + O + V-ed (看到/听到…被做)    │\n│                                            │\n│  Kings built castles. (they did it)        │\n│  Kings have built castles. (completed now) │\n│  Kings had castles built. (arranged it!)   │\n│                                            │\n│ Text examples:                             │\n│  \"They had castles built around the coast.\"│\n│  \"People saw the country linked to...\"     │\n│  \"They got the kingdom united.\"            │\n└────────────────────────────────────────────┘","exercises":"【基础作业】1. 从课文中找出3个过去分词作宾补的句子并标注结构。2. 改写：The queen ordered workers to paint the palace. → The queen had...【提高作业】用 have/get sth done 写 3 句关于你（或你认识的人）的生活（如理发/修手机/拍照）。【参考答案——教师用】基础2示例：The queen had the palace painted.","reflection":"✅ 亮点：have done vs have sth done 三句对比让学生直观感受区别。⚠️ 需改进：see sth done 的用法仍需强化，语法课将系统操练。📌 下节课衔接：进入语法课，系统操练过去分词作宾语补足语。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Reading and Thinking · History and Traditions (P3)"},{"id":"l-eng-b2-u4-g","lessonId":"l-eng-b2-u4-g","book":"必修第二册","unitNumber":4,"unitTitle":"History and Traditions","lessonType":"grammar","lessonTypeName":"语法","lessonNumber":4,"periodNumber":4,"duration":40,"grade":"高一","subject":"英语","tags":["语法","过去分词","宾补","英国历史","人教版必修二U4","第四节课"],"textbookAnalysis":"本课为必修第二册 Unit 4 第四课时（Discovering Useful Structures），系统教学过去分词作宾语补足语（have/get sth done; see/hear/find/feel sth done; make oneself understood 等）。基于 Reading 语篇中提取的例句，引导学生归纳出\"何时用过去分词作宾补\"的规则——宾语是动作的承受者且强调结果状态。通过历史与日常生活主题的语境化练习巩固语法，为后续地点描写写作做语言准备。","overview":"【学情分析】A班：能理解 have sth done 的概念，但 see/hear sth done 与 see/hear sb doing 易混淆。B班：过去分词本身不熟+宾补概念模糊=双重困难。共同问题：写作中几乎不主动使用过去分词作宾补——习惯用从句代替（\"I had someone repair my phone\" 而非 \"I had my phone repaired\"）。","objectives":["语言能力：准确使用过去分词作宾语补足语，在历史与日常话题中产出 5 个以上正确句子。","文化意识：通过 have sth done 理解英语中\"委托/使役\"的文化表达习惯。","思维品质：通过\"发现例句→归纳规则→对比辨析→应用输出\"的归纳法培养语法学习策略。","学习能力：建立\"宾补自查表\"——写作后自行检查宾语与补足语的逻辑关系是否正确。"],"keyPoints":"① 过去分词作宾补的核心结构：V + O + V-ed（宾语是动作的承受者）② 常用动词：have / get / see / hear / find / feel / make ③ 与现在分词作宾补的区别：V-ed（被动/完成）vs V-ing（主动/进行）④ 不规则过去分词复习（build→built, make→made, write→written, speak→spoken）","difficulties":"① have sth done vs have sb do（让某人做）— 学生混淆宾语是人还是物。原因：中文都用\"让/使\"。② see sth done（看到被做）vs see sb doing（看到正在做）vs see sb do（看到全过程）——三种宾补语义不同。③ make oneself understood（使自己被理解）— 固定搭配。","teachingMethods":"① 归纳法（Guided Discovery）：例句→规则→练习。② 场景造句：给生活场景图片用宾补描述。③ 改错竞赛。","preparation":"【PPT课件】P1 过去分词作宾补公式分解；P2 课文例句摘录；P3 V-ed vs V-ing 做宾补对比表；P4 生活场景图片（理发/修车/拍照/装修）；P5 情境造句卡；P6 改错题；P7 总结。【实物教具】场景图片卡一套；改错卡每人一套。","process":[{"step":"例句发现","time":"7","content":"【PPT P2 例句】展示课文中3个句子+新给3个：①The king had a wall built. ②I saw the flag raised. ③She found her bag stolen. ④He got his hair cut. ⑤We heard our names called. ⑥She made herself understood. 学生圈 O + V-ed。教师：What is the relationship between the object and the past participle? 预设回答：The object receives the action. The wall was built. The flag was raised. 板书时机：左栏板书6句，圈 O + V-ed。差异化提示：B班只圈 V-ed；A班分析\"宾语是动作的发出者还是承受者\"。易错点提醒：宾语补足语的关键逻辑——宾语是 V-ed 这个动作的承受者。如果不是，不能用过去分词！"},{"step":"规则归纳","time":"10","content":"【PPT P3 对比表】教师对比两种宾补：①V-ing（宾语发出动作，主动）：I saw him running.（他在跑）②V-ed（宾语承受动作，被动）：I saw him caught by the police.（他被抓）。教师：How to decide V-ing or V-ed? 预设回答：If the object does the action → V-ing. If the object receives the action → V-ed. 板书时机：双栏对比板书。差异化提示：B班填已给表格（动词/结构/宾语是施事还是受事）；A班自己画表+各造2句。易错点提醒：判断公式——在宾语后加\"被\"字。如果通顺→用 V-ed。\"I saw him（被）running\"不通→用 running。\"I had my car（被）wash\"通→用 washed。"},{"step":"生活场景操练","time":"8","content":"【PPT P5 图片卡】展示4张图（理发/修手机/拍照/装修房间），学生用 have/get sth done 描述。教师：What is happening in this picture? Use \"have/get sth done\"! 预设回答：He is having his hair cut. / She got her phone repaired. / They had their photo taken. / We are having our room painted. 板书时机：巡视指导。差异化提示：B班给动词提示（cut/repair/take/paint）；A班不给提示自由造句+说时态。易错点提醒：have sth done 可以有时态变化——is having（正在）/ had（已经）/ will have（将要）/ has had（已完成）。"},{"step":"make oneself done 固定搭配","time":"6","content":"【PPT P6 固定搭配卡】教师介绍特殊搭配：make oneself understood（使别人理解自己）/ heard（使别人听见自己）/ known（使自己出名）。教师：If you go to France and don't speak French, how can you make yourself understood? 预设回答：I can use gestures. I can use a translation app. 板书时机：板书三个固定搭配。差异化提示：B班背搭配+造句；A班翻译成中文并体会\"让自己被...\"的含义。易错点提醒：make oneself understood ≠ 自己理解自己。是自己\"被（别人）\"理解。"},{"step":"改错巩固","time":"6","content":"【PPT P7 改错】展示 4 个典型错误：①I had my room cleaning.（应用 cleaned）②She saw the boy caught the ball.（the boy caught 应用 catching — 男孩主动接球）③He got his report writing.（应用 written）④We heard the song sang.（应用 sung）。学生纠错并解释。预设回答纠错。板书时机：板书错误→改正+规则。差异化提示：B班判对错；A班解释为什么错。易错点提醒：不规则过去分词最常见错误——sing→sang→sung（过去分词是 sung 不是 sang）。"},{"step":"小结","time":"3","content":"【PPT P8 总结】回顾 have/get + O + V-ed + see/hear + O + V-ed + 与 V-ing 的区别 + 固定搭配。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班说出3条规则。易错点提醒：自查——宾语是动作的承受者吗？如果是→V-ed；如果不是→用 V-ing 或 do。"}],"blackboard":"┌─ U4 Grammar: Past Participle as OC ────────┐\n│  V + Object + V-ed (宾语承受动作)          │\n│                                             │\n│  have/get + O + V-ed (使…被做)             │\n│    I had my hair cut. (别人给我剪的)        │\n│  see/hear + O + V-ed (看到/听到…被做)      │\n│    I saw the flag raised. (旗已被升起)      │\n│  make + oneself + V-ed                      │\n│    make oneself understood (使自己被理解)   │\n│                                             │\n│  V-ed (被动/完成) vs V-ing (主动/进行)      │\n│  saw him caught (他被抓) vs saw him running │\n│                                             │\n│  ❌ had my room cleaning → ✓ cleaned        │\n│  ❌ heard the song sang → ✓ sung            │\n└─────────────────────────────────────────────┘","exercises":"【基础作业】1. 用 have/get sth done 造 5 句。2. 改错：I had my bike repairing. / She saw the bird flew away. / We heard the window breaking.【提高作业】写 60 词短文描述你理想中的一天（从早到晚，至少用 3 个 have/get sth done）。【参考答案——教师用】基础1示例：I had my phone screen replaced yesterday. / She gets her nails done every two weeks.","reflection":"✅ 亮点：生活场景图片让 have sth done 立即能用在生活中。⚠️ 需改进：V-ed vs V-ing 选择仍需要更多辨析练习。📌 下节课衔接：听与谈聚焦英国传统与节日，口头运用宾补结构描述传统活动。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Discovering Useful Structures · History and Traditions (P4)"},{"id":"l-eng-b2-u4-lt","lessonId":"l-eng-b2-u4-lt","book":"必修第二册","unitNumber":4,"unitTitle":"History and Traditions","lessonType":"listening-talking","lessonTypeName":"听与谈","lessonNumber":5,"periodNumber":5,"duration":40,"grade":"高一","subject":"英语","tags":["听与谈","英国传统","节日","历史","人教版必修二U4","第五节课"],"textbookAnalysis":"本课为必修第二册 Unit 4 第五课时（Listening and Talking），语境为\"讨论英国传统与节日\"。听力材料为一段关于英国传统节日与习俗的对话，口语输出任务为介绍一个中国传统节日并比较中英文化异同。功能语言为表达惊讶与兴趣（Really? / That's interesting! / I didn't know that! / Tell me more!）及比较句型（Similarly,... / In contrast,... / While...,...）。结合语法课的过去分词作宾补，在口语中自然运用如\"I've seen this festival celebrated\"等结构。","overview":"【学情分析】A班：能说出中国主要节日英文名，但描述习俗的英文词汇有限。B班：对中国节日习俗的英文表达几乎空白。共同问题：介绍节日时只列活动不解释文化意义。","objectives":["语言能力：听懂关于英国传统节日的对话，提取节日名称/日期/习俗/意义；能用英文介绍一个中国传统节日并比较中英异同。","文化意识：通过中英节日比较体会文化多样性，增强本土文化自信。","思维品质：在比较中练习\"找出相似→指出差异→解释原因\"的三步比较思维。","学习能力：通过比较对话训练双向文化视角——既看别人也反思自己。"],"keyPoints":"① 节日词汇：celebration / custom / tradition / originate from / symbolise / mark ② 表达惊讶/兴趣：Really? / That's fascinating! / I didn't know that! / Tell me more about... ③ 比较句型：Similarly,... / In contrast,... / While...,... / Both... share...","difficulties":"① originate from（起源于）— 学生易少写 from。② celebrate /selɪbreɪt/ 发音 — 重音在第一音节，不是 /səlebreɪt/。③ 比较时只列相同不说不同、或反之——需训练\"相同+不同+原因\"的完整比较。","teachingMethods":"① 听前预测→听中配对→听后产出。② Think-Pair-Share：先自己想中英节日比较→同桌讨论→全班分享。③ 文化大使角色扮演：向外国朋友介绍中国节日。","preparation":"【PPT课件】P1 英国节日图片（Bonfire Night / St Patrick's Day / Burns Night / Pancake Day）；P2 表达兴趣句型板；P3 听力任务题；P4 听力任务卡；P5 比较句型板；P6 角色卡。【实物教具】节日信息卡 printed；角色卡（中国学生/英国朋友）。","process":[{"step":"导入激活","time":"5","content":"【PPT P1 英国节日图片】教师：Look at these festivals. Have you heard of any of them? What Chinese festivals do you know? 预设回答：Spring Festival, Mid-Autumn Festival, Dragon Boat Festival! 板书时机：左栏板书 celebration / custom / tradition / originate from。差异化提示：B班中文说再翻英文；A班用英文说出至少一个节日的习俗。易错点提醒：Dragon Boat Festival — 不要说成 \"Dragon Festival\" 或 \"Boat Festival\"，三个词一个不能少。"},{"step":"听力抓信息","time":"10","content":"【PPT P3 听力任务】听对话，抓\"什么节日/什么时候/什么习俗/什么意义\"。教师：Listen for: festival name / date / what people do / what it celebrates. 预设回答：Bonfire Night is on November 5. People have bonfires and fireworks. It marks the failure of the Gunpowder Plot. 板书时机：配对填表（节日|日期|习俗|意义）。差异化提示：B班给配对连线题；A班听写关键词+写完整信息句。易错点提醒：mark（标志/纪念）作动词——\"the festival marks...\" 不常见但很地道。"},{"step":"听中录回应","time":"8","content":"【PPT P4 任务卡】【音频】重听，注意对话中的回应句：\"Really?\" \"That's fascinating!\" \"I didn't know that!\" 教师：How does the listener show interest? 预设回答：By asking follow-up questions — \"Tell me more!\" / \"Why do they do that?\" 板书时机：板书回应句型。差异化提示：B班听出回应句勾选；A班记录并分析\"哪种回应最能让对方继续讲\"。易错点提醒：表达兴趣不只是说 \"Oh\" 或 \"Interesting\"——最能鼓励对方的是追问 \"Tell me more about...\"。"},{"step":"句型操练+比较","time":"7","content":"【PPT P5 比较句型】教师带领操练中英节日比较：Spring Festival vs Christmas — Similarly, both are family reunions. In contrast, Spring Festival lasts 15 days while Christmas is mainly one day. 教师：Compare a British and Chinese festival with your partner. 预设回答：Mid-Autumn Festival and Thanksgiving — Similarly, both celebrate harvest. In contrast, Mid-Autumn Festival is about the moon. 板书时机：板书比较句型。差异化提示：B班用填空式比较框架；A班自主比较+说原因。易错点提醒：While 表对比时放在句首或句中——\"While Christmas is in winter, Spring Festival is also in winter.\"（相似比较用 while 不太合适，应用 Similarly）。"},{"step":"角色扮演","time":"8","content":"【PPT P6 角色卡】两人一组：Chinese Student 和 British Friend。英国朋友问\"What's your favourite Chinese festival?\"，中国学生介绍+比较。教师巡视。预设回答：My favourite is the Dragon Boat Festival. It originates from a poet named Qu Yuan. Similarly to your Remembrance Day, we honour a historical figure. 板书时机：留句型供参考。差异化提示：B班照卡读；A班脱稿加即兴互动。易错点提醒：介绍中国节日时，如果习俗没有英文对应词，用简单英文描述即可——\"zongzi = sticky rice wrapped in bamboo leaves\"。"},{"step":"小结","time":"2","content":"【PPT P7 总结】回顾节日词汇+表达兴趣句型+比较句型。教师：Remember: When comparing, say what's similar AND what's different. 预设回答跟读。板书时机：圈重点句型。差异化提示：B班齐读；A班每人说一个中英节日异同。易错点提醒：比较的本意不是判断好坏——不要说\"ours is better\"，说\"they are different because...\"。"}],"blackboard":"┌─ U4 Listening & Talking ────────────────┐\n│ Festivals:                                │\n│  celebration / custom / tradition         │\n│  originate from / symbolise / mark        │\n│                                           │\n│ Showing interest:                         │\n│  Really? / That's fascinating!            │\n│  I didn't know that! / Tell me more!      │\n│                                           │\n│ Comparing:                                │\n│  Similarly, both... share...              │\n│  In contrast, ... while ...               │\n│  Unlike..., ...                            │\n└───────────────────────────────────────────┘","exercises":"【基础作业】1. 听录音跟读 2 遍，圈出所有节日词汇。2. 用比较句型写 3 句比较一个中国节日和一个英国节日。【提高作业】写 60 词对话：向一位外国朋友介绍端午节（或你最喜欢的节日），含至少 1 次兴趣回应和 1 个比较。【参考答案——教师用】基础2示例：Similarly, both the Spring Festival and Christmas are times for family reunion. / In contrast, the Dragon Boat Festival involves racing, while Thanksgiving is more about eating.","reflection":"✅ 亮点：文化大使角色扮演让学生有真实交流目的，开口率很高。⚠️ 需改进：originate from 的 from 遗漏率高，写作课需强化。📌 下节课衔接：进入写作 I，将从比较转向用感官细节描述一个喜欢的地方。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Listening and Talking · History and Traditions (P5)"},{"id":"l-eng-b2-u4-w1","lessonId":"l-eng-b2-u4-w1","book":"必修第二册","unitNumber":4,"unitTitle":"History and Traditions","lessonType":"writing","lessonTypeName":"写作","lessonNumber":6,"periodNumber":6,"duration":40,"grade":"高一","subject":"英语","tags":["写作","感官描写","地点描写","英国","人教版必修二U4","第六节课"],"textbookAnalysis":"本课为必修第二册 Unit 4 第六课时（Reading for Writing I），写作体裁为用感官细节描述一个你喜欢的地方（Describe a Place That You Like）。结构为：引人入胜的开头→视觉描写→听觉/嗅觉/触觉描写→历史/文化背景→个人感受与结尾。语言重点为感官动词（see, hear, smell, feel, taste）与形容词（magnificent, peaceful, ancient, breathtaking, charming）。结合本单元 Reading 的历史叙事与语法课的过去分词作宾补，实现\"读-语法-写\"闭环。","overview":"【学情分析】A班：能写简单的地点描述，但只用视觉缺少其他感官。B班：句型储备少，描述地点时只会说 beautiful, big, old 三个词。共同问题：地点描写变成\"导游词\"——只列事实（建于XX年/有XX米高）而没有个人感受和感官体验。","objectives":["语言能力：掌握感官描写的\"五感+感受\"框架，在历史地点话题中产出 80-100 词感官丰富、有个人情感的地点描写文。","文化意识：通过用英文描写中国/世界历史文化地点，向世界讲述本土故事。","思维品质：通过\"选感官细节→组织描写顺序→融入个人感受\"训练从感知到文字表达的转化思维。","学习能力：建立\"五感 checklist\"——写作前问自己：读者能\"看到、听到、闻到、感觉到\"这个地方吗？"],"keyPoints":"① 地点描写结构：Opening Hook → Visual description → Other senses (sound/smell/touch) → History/Culture → Personal feelings ② 感官表达：I can see... / The air smells of... / I can hear... echoing... / The stone feels... ③ 过去分词作宾补在地点描写中的应用：I've seen the temple restored. / You can have your photo taken here.","difficulties":"① 嗅觉/触觉描写的英文表达——学生词汇储备几乎为零（musty / crisp / damp / rough / smooth）。② 感官描写的顺序——不能东一句西一句，要有空间顺序（由远及近/由下到上/由外到内）。③ 个人感受不能只写\"I like it\"——要具体说明为什么。","teachingMethods":"① 范本解构法：读优秀地点描写→提取五感词→仿写。② 五感头脑风暴：选一个地点，用五感思维导图积累词汇。③ 过程写作：outline→draft→peer review。","preparation":"【PPT课件】P1 优秀地点描写范例（如描述爱丁堡城堡的段落）；P2 五感+感受结构图；P3 五感词汇库；P4 五感头脑风暴工作单；P5 写作任务；P6 写作提纲；P7 总结。【实物教具】五感思维导图 work sheet 每人一份；五感词汇卡每组一套。","process":[{"step":"范本解构","time":"8","content":"【PPT P1 地点描写范例】教师展示一段描述爱丁堡城堡的范文，学生标注五感：视觉（ancient stone walls, misty skyline）/ 听觉（bagpipes echoing, wind howling）/ 嗅觉（damp stone, fresh Scottish air）/ 触觉（rough walls, cold wind）/ 感受（It feels like stepping back 500 years.）。教师：How many senses can you find? 预设回答：Sight, sound, smell, touch — and the writer's feelings. 板书时机：五感五列板书。差异化提示：B班给标注好的范文只圈感官词；A班自己标注+评语哪个感官最有效。易错点提醒：感官描写的秘诀——用具体而不是笼统的形容词。不说 \"good smell\"，说 \"the sweet smell of freshly baked bread\"。\"Good\" kills writing."},{"step":"五感词汇库","time":"8","content":"【PPT P3 词汇库】教师分类提供五感词汇：Sight（magnificent/ancient/crumbling/towering/gleaming）Sound（echo/roar/whisper/chime/bustling）Smell（musty/fragrant/crisp/smoky/damp）Touch（rough/smooth/chilly/worn/polished）Feeling（awe-struck/peaceful/nostalgic/humbled/inspired）。教师领读+示例句。预设回答跟读+标记自己最想用的词。板书时机：五列词汇板书。差异化提示：B班每类选3个词背；A班每类选1个词造一段。易错点提醒：musty（霉味的）≠ dusty（有灰尘的）— 老建筑常有 musty smell，不是 dirty 而是\"古老的味道\"。"},{"step":"结构讲透","time":"5","content":"【PPT P2 结构图】教师讲五段结构：①Opening Hook — 让读者想去这个地方（\"If you want to feel history alive, visit...\"）②Visual — 你看到的第一印象 ③Other senses — 至少再写一种感觉（声音/气味/触感）④History/Culture — 1-2句背景（可用过去分词作宾补：\"I've seen this place restored to its former glory.\"）⑤Personal feeling — 这个地方对你的意义。预设回答跟做结构笔记。板书时机：五段结构板书。差异化提示：B班给每段填空模板；A班给关键词自己写。易错点提醒：⑤个人感受是最重要的——没有感受的地点描写只是维基百科，不是好文章。"},{"step":"五感头脑风暴+提纲","time":"7","content":"【PPT P4 工作单】学生各自选一个喜欢的地方（当地/中国/世界均可），画五感思维导图：看到什么/听到什么/闻到什么/摸到什么/感觉如何。教师巡视建议：Try to include at least THREE senses. 预设回答：For the Great Wall: sight (snaking along mountains), touch (rough ancient bricks), sound (wind whistling), feeling (awe at human achievement). 板书时机：巡视指导。差异化提示：B班给每感1个提示词；A班独立完成所有五感。易错点提醒：选你真正去过的地方——虚拟的地点写不出真实感官细节，读者一眼就能看出。"},{"step":"起草+同伴初评","time":"10","content":"【PPT P5 写作任务】学生写 80-100 词地点描写初稿。要求：五段结构、至少包含3种感官、至少1个过去分词作宾补、有个人感受。教师巡视。写完同桌互换check：感官≥3？结构完整？有个人感受？有过去分词作宾补？预设回答：（学生写作+互评中）板书时机：留结构+词汇供参考。差异化提示：B班用模板框架填写；A班自由写+追求文学性。易错点提醒：感官描写不要堆砌——选最有特色的2-3个感官深度描写，比五种全写但每种只有2个词好得多。"},{"step":"同伴初评","time":"2","content":"【PPT P6 写作提纲】同桌互换，用五感 checklist 互查。教师：Can you \"see\" this place when you read it? Which sense is missing? 预设回答：I can see it clearly but I want to hear something too — maybe add a sound. 板书时机：留checklist。差异化提示：B班用 checklist 逐项打勾；A班写\"最打动我的句子\"和\"再加一种感官的建议\"。易错点提醒：互评时闭上眼睛听对方读——如果能\"看到\"那个地方，说明描写成功了。"}],"blackboard":"┌─ U4 Writing: Describe a Place ────────────────┐\n│  ① Hook (make reader want to go)               │\n│  ② Visual (what you SEE — be specific!)        │\n│  ③ Other Senses (sound/smell/touch — ≥1 more) │\n│  ④ History/Culture (1-2 sentences)             │\n│  ⑤ Personal Feeling (what it means to YOU)     │\n│                                                 │\n│  Five Senses Word Bank:                         │\n│  👁️ magnificent / ancient / towering / gleaming │\n│  👂 echo / roar / whisper / chime / bustling    │\n│  👃 musty / fragrant / crisp / smoky / damp     │\n│  ✋ rough / smooth / chilly / worn / polished    │\n│  ❤️ awe-struck / peaceful / nostalgic / humbled │\n└─────────────────────────────────────────────────┘","exercises":"【基础作业】按课堂初稿完成 80-100 词地点描写。要求：五段结构、≥3 种感官、≥1 个过去分词作宾补、有真实个人感受。【提高作业】用手机拍一张你描写的地点的照片，将照片+英文描写文案做成一张明信片（手绘或数字均可）。【参考答案——教师用】示例（故宫节选）：\"If you want to feel the weight of 600 years under your feet, visit the Forbidden City. I can see the golden roofs gleaming in the afternoon sun. The air smells of ancient wood and incense. I run my hand over the weathered stone — it feels cold, as if the past is still holding on...\"","reflection":"✅ 亮点：五感词汇库解决了\"只会说beautiful\"的瓶颈。⚠️ 需改进：部分学生只写视觉，需在下节课互评中强制检查\"是否有第二种感官\"。📌 下节课衔接：进入写作 II，互评修改+地点描写展示分享。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Writing · History and Traditions (P6)"},{"id":"l-eng-b2-u4-w2","lessonId":"l-eng-b2-u4-w2","book":"必修第二册","unitNumber":4,"unitTitle":"History and Traditions","lessonType":"writing","lessonTypeName":"写作","lessonNumber":7,"periodNumber":7,"duration":40,"grade":"高一","subject":"英语","tags":["写作","互评","修改","感官描写","英国历史","人教版必修二U4","第七节课"],"textbookAnalysis":"本课为必修第二册 Unit 4 第七课时（Writing II），在 Writing I 地点描写初稿的基础上完成\"互评→修改→展示→终稿\"闭环。重点训练学生用同学反馈改进感官描写的丰富度和感染力。互评量表聚焦三维度：感官丰富（≥3种感官且具体）、结构完整（五段+有Hook+有个人感受）、语言质量（过去分词作宾补/感官词汇多样/语法准确）。","overview":"【学情分析】A班：能辨别感官描写好坏，但给反馈时只说\"写得美\"而缺乏\"哪个感官最打动人\"的具体分析。B班：改自己的描写时不知如何\"再加一种感官\"。共同问题：互评时只读不改——不会在别人的稿子上标\"这里可以加一种声音/气味\"。","objectives":["语言能力：能根据互评量表给同伴的地点描写提具体、可操作的修改建议，重点检查感官丰富度和语言多样性。","文化意识：通过阅读同伴的地点描写了解世界各地不同的历史文化地点。","思维品质：在互评中培养\"识别感官空白→提出补充方案\"的批判性反馈能力。","学习能力：建立\"写→评→改→展\"四步写作流程，内化为个人写作习惯。"],"keyPoints":"① 互评三维量表：感官（≥3种且描写具体 / 有没有一种感官特别打动人）+ 结构（五段完整 / Hook有力 / 个人感受真实）+ 语言（宾补≥1 / 感官词汇多样 / 语法准确）② 修改策略：先加感官再修语言","difficulties":"① 学生互评时不好意思说\"感官不够\"——需示范\"I want to HEAR this place too\"的表达方式。② 修改时不知如何加气味/声音——需重新激活五感词汇库。③ 展示时读得太快——地点描写需要让听众\"想象\"出来，语速要慢。","teachingMethods":"① 量表互评：用统一标准减少主观性。② 感官补充工作坊：专门加一种新感官。③ 闭眼听读展示。","preparation":"【PPT课件】P1 互评三维量表；P2 常见问题（只有视觉/无Hook/无个人感受/无宾补）；P3 修改指南；P4 展示技巧（慢读+想象）；P5 最佳地点描写范例；P6 自评表；P7 总结。【实物教具】互评量表 printed 每人一份；红笔。","process":[{"step":"量表培训","time":"5","content":"【PPT P1 互评量表】教师逐维讲解：①感官（≥3种？描写具体还是笼统？最打动你的是哪种感官？）②结构（五段全？Hook抓人？个人感受真实？）③语言（宾补≥1？感官词汇多样？语法准确？）。教师用上节课自己写的地点评分示范。预设回答跟学。板书时机：量表三维板书。差异化提示：B班按量表逐项打勾；A班还需评\"如果这是旅游宣传文案，你会想去吗？\" 易错点提醒：互评时最有用的问题是——\"闭上眼，你能'到'那个地方吗？如果缺了什么感觉，那就是作者需要加的。\""},{"step":"互评+感官补充","time":"12","content":"【PPT P2 常见问题】先展示上节课常见问题：①只有视觉 ②Hook是\"I want to introduce...\" ③个人感受是\"I like it very much\"（太空泛）④无过去分词作宾补。同桌互换初稿，用红笔标注感官空白处+写\"这里加点声音/气味\"。教师：Find one place where your partner can add a new sense. 预设回答：I marked \"smell\" — the writer describes a temple but doesn't tell us what it smells like. 板书时机：留量表供参考。差异化提示：B班用 checklist 勾+写\"加声音/气味/触感\"提示；A班还写一句\"如果是我，我会加什么具体的感官细节\"。易错点提醒：提修改建议时最好给出具体例子——\"Maybe add: The air is thick with the scent of incense and old wood.\" 而不是只说\"加点气味\"。"},{"step":"修改","time":"10","content":"【PPT P3 修改指南】学生根据互评反馈修改。顺序：①先加缺的感官（至少补1种）②再调结构（Hook改得更吸引人/个人感受更具体）③最后查语言（插入宾补/替换笼统形容词为具体描写）。教师：Don't just fix grammar — ADD a sense! 预设回答：（学生修改中，此处无口头回答）板书时机：留修改顺序。差异化提示：B班对照量表逐条改；A班改完还润色语句流畅度。易错点提醒：加感官不等于加一个词——加一句完整的感官描写。\"The air smells musty\" 比只加 \"smelly\" 好。"},{"step":"展示+闭眼听读","time":"8","content":"【PPT P4 展示技巧】3-4 位自愿者上台读自己的地点描写。独特规则：全班闭眼听——读完后，听众说出自己\"看到/听到/闻到/感觉到\"了什么。教师：Listen with your eyes closed. What do you see in your mind? 预设回答：I saw ancient stone walls. I felt the cold wind. I heard birds. 板书时机：记录听众反馈的感官词。差异化提示：B班可看稿读但放慢；A班脱稿+用语气传达感受。易错点提醒：描写文的朗读速度是议论文的 3/4——读者需要时间在脑中构建画面。"},{"step":"结课+自评","time":"5","content":"【PPT P7 总结+自评】全班投票：最想去的地方/感官最丰富的描写/最动人的个人感受。学生自评：①我加了哪种新感官？②下次写地点描写我会先做什么？教师：What makes a place description come alive? 预设回答：Sensory details. Not just \"beautiful\" — but what you actually see, hear, smell, and feel. 板书时机：写最佳描写的 Hook 作为范例。差异化提示：B班中文自评；A班英文自评。易错点提醒：最好的地点描写让读者感觉自己去过那里——哪怕只读了100个词。"}],"blackboard":"┌─ U4 Writing II: Sensory Review ─────────────┐\n│ Review Checklist:                             │\n│  ✅ ≥3 senses (not just sight!)               │\n│  ✅ Specific, not general (not \"good smell\")  │\n│  ✅ 5-part structure (Hook→Visual→Senses→    │\n│     History→Feeling)                          │\n│  ✅ ≥1 past participle as OC                  │\n│  ✅ Personal feeling is REAL                   │\n│                                                │\n│  Fix Order: 1. Add sense  2. Fix structure    │\n│             3. Polish language                 │\n└────────────────────────────────────────────────┘","exercises":"【基础作业】根据课堂反馈修改终稿，配图提交。写 20 词英文反思：我的描写中最打动人的感官细节是…【提高作业】用同样的\"五感+感受\"框架描写另一处你去过的历史地点（80词）。【参考答案——教师用】反思示例：The most powerful sensory detail in my description is the cold, rough stone under my fingers — I think it makes the reader feel like they are touching history.","reflection":"✅ 亮点：闭眼听读展示让学生直观感受\"好描写就是能让读者'看见'\"。⚠️ 需改进：嗅觉词汇仍需大量积累，建议建班级感官词库墙。📌 下节课衔接：进入 Project，将本单元所学整合为\"世界历史文化探索\"展。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Writing · History and Traditions (P7)"},{"id":"l-eng-b2-u4-p","lessonId":"l-eng-b2-u4-p","book":"必修第二册","unitNumber":4,"unitTitle":"History and Traditions","lessonType":"project","lessonTypeName":"项目复习","lessonNumber":8,"periodNumber":8,"duration":40,"grade":"高一","subject":"英语","tags":["项目","复习","历史与传统","展览","人教版必修二U4","第八节课"],"textbookAnalysis":"本课为必修第二册 Unit 4 第八课时（Project），为单元终极产出课。学生以 4 人小组为单位，整合本单元5种课型所学——听与说的历史词汇+阅读的 UK 形成史+语法的过去分词作宾补+听与谈的节日比较+写作的感官地点描写——完成一份\"世界历史文化探索\"展板。综合考查语言能力（词汇/语法/写作）、思维品质（信息组织）和学习能力（合作分工）。","overview":"【学情分析】A班：能独立完成分工作品，但需要明确评分标准和模块间的逻辑联系。B班：group work 中容易\"搭便车\"，需明确定人定责+模块 checklist。共同问题：展板信息罗列而没有\"探索\"的叙事感——4个模块应该串成一个\"旅程\"。","objectives":["语言能力：综合运用本单元词汇、过去分词作宾补、比较句型、感官描写，以英文完成一份\"世界历史文化探索\"展板。","文化意识：通过展览形式展示各国历史文化的多样性，培养跨文化理解与尊重。","思维品质：在4人小组中合理分工、有效协作，培养项目管理思维。","学习能力：回顾本单元5课学习内容，建立\"一个单元学什么、怎么用\"的整体框架感。"],"keyPoints":"① 展板四模块：Country Spotlight（选一个国家+UK 形成史类似的历史概述）→ Landmark Feature（一个地标的感官描写）→ Tradition Highlight（一个节日/传统+与中国的比较）→ Travel Tip（用宾补写实用建议）② 单元知识整合：历史词汇/过去分词作宾补/比较句型/五感描写 ③ 小组分工：Historian / Landmark Writer / Tradition Expert / Travel Advisor","difficulties":"① 四个模块的衔接——不是四个独立的块，而是\"一个国家/一个地标/一个传统/一条建议\"的探索旅程。② Country Spotlight 模块模仿 UK 形成史写法——学生容易只列事实没有叙事。③ 展板语言密度——要在有限空间平衡文字与视觉。","teachingMethods":"① PBL项目式学习：以探索展为驱动问题。② 小组协作：角色分工+module checklist。③ 展览+最佳展板评选。","preparation":"【PPT课件】P1 单元回顾五课内容（思维导图）；P2 展板四模块结构；P3 角色分工卡；P4 范例参考；P5 评价量规；P6 自评表；P7 总结。【实物教具】A3白纸每组一张；彩笔/马克笔；角色分工卡 printed。","process":[{"step":"单元回顾","time":"5","content":"【PPT P1 思维导图】教师带学生回顾本单元5课学了什么：听与说（历史词汇+地标分享）→阅读（UK形成史+时间轴）→语法（have/get sth done+see sth done）→听与谈（节日比较+兴趣表达）→写作（五感地点描写）。教师：Today we become cultural explorers! 预设回答跟读回顾。板书时机：左栏画五课链接图。差异化提示：B班看PPT读关键词；A班自己说出每课核心内容+一个例句。易错点提醒：展板每模块至少用一次过去分词作宾语补足语。"},{"step":"任务布置+分工","time":"6","content":"【PPT P2 展板结构】【PPT P3 角色卡】教师展示四模块：①Country Spotlight（选一个国家模仿 UK 形成史写法概述历史）②Landmark Feature（一个地标的五感描写）③Tradition Highlight（一个节日/传统+与中国比较）④Travel Tip（用 have sth done 等宾补写实用旅行建议）。角色：Historian 写历史概述 / Landmark Writer 写感官描写 / Tradition Expert 写节日比较 / Travel Advisor 写旅行建议。教师：Choose your country and role! 预设回答：We choose Italy. I'm the Landmark Writer — I'll describe the Colosseum! 板书时机：留模块结构和角色。差异化提示：B班给语言模板+国家建议（意大利/法国/日本/埃及）；A班自由选国家。易错点提醒：4个模块要用同一种颜色/风格的排版——Designer 负责统一视觉，不要让展板看起来像4个人各做各的。"},{"step":"制作展板","time":"16","content":"【PPT P4 范例参考】【实物 A3纸】小组制作。教师巡视提醒：①全英文！②每模块至少3句完整句 ③至少2个过去分词作宾补 ④至少1个比较句型 ⑤至少2种感官描写。预设回答：（小组制作中）板书时机：无。差异化提示：B班给每模块句型开头；A班独立完成+追求语言质量。易错点提醒：四模块要有\"探索\"的旅行感——可以设计为一张\"虚拟机票\"+\"四个旅行日志\"。让读者感觉跟着你一起去探索了那个国家。"},{"step":"展示评价","time":"10","content":"【PPT P5 量规】每组 2 分钟展示。全班投票：最想去的目的地/最佳感官描写/最佳历史叙事/最佳展板设计。教师：Take us on a journey to your country! 预设回答展示。板书时机：记录投票。差异化提示：B班可看展板讲；A班脱稿+模仿导游语气。易错点提醒：展示时不要念展板——讲展板背后的故事。\"We chose Italy because I was fascinated by how a country with so much ancient history stays so alive today.\""},{"step":"单元自评","time":"3","content":"【PPT P6 自评表】学生勾选四维薄弱项：历史词汇不熟？过去分词作宾补不会用？比较句型忘了？五感描写写不出？写1条补强计划。教师：Which skill from this unit do you want to improve? 预设回答：I need to practice past participle as object complement. I will review the grammar table and write 5 sentences about my daily life. 板书时机：留自评四维。差异化提示：B班中文写；A班英文写。易错点提醒：补强计划要有产出——不是\"复习语法\"，而是\"用 have sth done 写5句关于周末安排\"。"}],"blackboard":"┌─ U4 Project: Cultural Explorer ────────┐\n│ 🗺️ Exploration Board:                    │\n│  ① Country Spotlight (history overview) │\n│  ② Landmark Feature (5-sense desc.)     │\n│  ③ Tradition Highlight (compare+contrast│\n│     with China)                          │\n│  ④ Travel Tip (use have sth done, etc.) │\n│                                          │\n│ 👥 Roles: Historian / Landmark Writer /  │\n│    Tradition Expert / Travel Advisor     │\n│                                          │\n│ ⭐ Must: ≥2 past participles as OC       │\n│    ≥1 comparison / ≥2 senses            │\n└──────────────────────────────────────────┘","exercises":"【基础作业】完成小组展板（未完成的继续做），拍照提交。写 30 词英文反思：如果我真的去这个国家旅行，我最想看什么？我的展板会让别人想去吗？【提高作业】选展板中没有提到的那个国家的另一面（如美食/音乐/运动），写 50 词英文简报。【参考答案——教师用】反思示例：If I really went to Italy, I would first visit the Colosseum because our Landmark Feature made it sound so powerful. I think our board would make people curious because the sensory details about the ancient stone and the sounds of the piazza feel real.","reflection":"✅ 亮点：四模块\"旅程\"框架让展板有了叙事感而非信息堆砌。⚠️ 需改进：部分小组比较句型使用不足（只写相同不写不同），下次可强制要求至少2个比较。📌 下节课衔接：进入 Unit 5 Music，从历史文化探索转向音乐的情感世界。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Project · History and Traditions (P8)"},{"id":"l-eng-b2-u5-ls","lessonId":"l-eng-b2-u5-ls","book":"必修第二册","unitNumber":5,"unitTitle":"Music","lessonType":"listening-speaking","lessonTypeName":"听与说","lessonNumber":1,"periodNumber":1,"duration":40,"grade":"高一","subject":"英语","tags":["听与说","音乐","音乐类型","人教版必修二U5","第一节课"],"textbookAnalysis":"本课为必修第二册 Unit 5 Music 第一课时（Listening and Speaking），属单元导入+输入环节。语篇为一段关于音乐偏好的对话与不同音乐类型的介绍音频，功能语境是\"谈论音乐偏好与感受\"。语言重点为音乐类型词汇（classical, pop, rock, jazz, folk, hip-hop, electronic, orchestra）及表达偏好句型（I prefer... / I'm a fan of... / ... moves me. / ... gives me energy.）。为 Reading 语篇\"THE VIRTUAL CHOIR\"中音乐与科技结合的叙事做词汇与话题预热。","overview":"【学情分析】A班：对音乐话题有浓厚兴趣，知道 pop/rock/classical 等常见类型但 electronic/orchestra 等较生疏。B班：部分音乐类型英文名不会读（如 genre /ʒɒnrə/）。共同问题：描述音乐感受时只会说 good 和 nice，缺乏 moves/energizes/calms 等情感动词。","objectives":["语言能力：听懂关于音乐偏好的对话，提取关键信息（类型/感受/原因），准确使用 8-10 个音乐相关词汇。","文化意识：了解不同音乐类型的文化背景，形成对多元音乐文化的欣赏态度。","思维品质：通过\"听前预测—听中分类—听后反思\"训练音乐主题听力策略。","学习能力：能用 I prefer... because... / ... moves me. / ... gives me energy. 描述自己的音乐偏好与感受。"],"keyPoints":"① 音乐类型核心词汇：classical / pop / rock / jazz / folk / hip-hop / electronic / orchestra / genre ② 表达偏好与感受句型：I prefer... / I'm a fan of... / ... moves me. / ... calms me down. / ... gives me energy. ③ 听力微技能：听前看歌名预测音乐类型、听中抓感受词。","difficulties":"① genre /ʒɒnrə/ 发音 — 法语外来词，g 读 /ʒ/ 不读 /dʒ/，结尾 e 不发音。② orchestra /ɔːkɪstrə/ 拼写 — 学生易写成 orchastra。③ move（使感动）的用法 — 学生只知\"移动\"义。\"The music moved me.\" = 音乐打动了我。","teachingMethods":"① 任务型（TBL）：以制作\"班级音乐推荐歌单\"为终任务。② 听前预测+听中分类：音乐类型+感受配对。③ 对子互问操练偏好表达。","preparation":"【PPT课件】P1 单元封面（Music）；P2 音乐类型图标九宫格（古典/流行/摇滚/爵士/民谣/嘻哈/电子/管弦乐/合唱）；P3-4 听力任务题；P5 偏好表达句型板；P6 歌单任务卡。【实物教具】音乐类型信息卡 printed 每组一套；音响/音频播放设备。【音频】听力两段音频+每种音乐类型的30秒片段。","process":[{"step":"导入激活","time":"5","content":"【PPT P2 九宫格+音乐片段】教师播放 8 种音乐类型各 15 秒片段。教师：Can you guess the genre? Which one do you like? 预设回答：That's rock! I love it. / That's classical — it's so calm. 板书时机：右侧板书 genre / classical / pop / rock / jazz / folk / hip-hop / electronic / orchestra。差异化提示：B班指图说音乐类型；A班用 This sounds like... / I think this is... 表达。易错点提醒：genre /ʒɒnrə/ — 这是从法语借来的词，读法和拼写不同步。"},{"step":"词汇输入","time":"8","content":"【PPT P3 词卡】教师领读 music genre 词汇+感受动词。感受动词：move（使感动）/ energize（使充满能量）/ calm down（使平静）/ cheer up（使振奋）/ bring back memories（唤起回忆）。教师：How does pop music make you feel? 预设回答：It gives me energy! / It cheers me up when I'm sad. 板书时机：左栏板书词+短注释。差异化提示：B班配情绪表情符号记忆；A班用每个感受词造一句。易错点提醒：energize /enədʒaɪz/ — 重音在第一音节，来自 energy（能量）。"},{"step":"听前预测","time":"5","content":"【PPT P4 题支】教师：We will listen to people talking about their music preferences. Predict: What genres will they mention? How will they describe the feeling? 预设回答：Pop and rock — they'll say it's energetic. Classical — they'll say it's calming. 板书时机：预测词写在黑板中部。差异化提示：B班给中文提示词；A班用英文说预测+自己的类似经验。易错点提醒：听力中感受词的近义替换——\"energetic\" 可能被说成 \"gives me energy\" / \"lively\" / \"makes me want to dance\"。"},{"step":"听中分类","time":"10","content":"【PPT P5 分类表】【音频 段一】播放听力，学生按\"类型—感受—原因\"填表。教师：What genre does Speaker 1 prefer? How does it make them feel? Why? 预设回答：Classical music — it calms them down when they're stressed. It helps them focus when studying. 板书时机：核对答案时填表于黑板中部。差异化提示：B班给配对连线（speaker→genre→feeling）；A班一遍填全+写自己的共鸣。易错点提醒：calm down 中 down 不能省——\"calms me\" 语法上可以但不如 \"calms me down\" 地道。"},{"step":"句型操练","time":"7","content":"【PPT P5 句型板】教师：How to talk about music preferences? I prefer... because... / I'm a big fan of... / ... really moves me. / When I listen to..., I feel... / ... is the perfect music for... 教师示范后用同桌互问。预设回答：I prefer pop music because it gives me energy when I exercise. I'm a big fan of Jay Chou — his lyrics really move me. 板书时机：句型板书于中央。差异化提示：B班套用模板替换音乐类型+感受；A班追加\"什么时候听/为什么\"的场景描述。易错点提醒：prefer 后接名词或 doing — \"I prefer to listen\" 和 \"I prefer listening\" 都可以，但 \"I prefer listen\" 不可以。"},{"step":"歌单任务","time":"5","content":"【PPT P6 任务卡】学生两人一组，互相采访后为对方推荐一首歌。用：You might like... because... / If you enjoy..., try... / This song always... 教师：Recommend a song to your partner based on their music taste. 预设回答：You said you like calming music — you might like \"River Flows in You\" because the piano melody is so peaceful. 板书时机：留句型供参考。差异化提示：B班用填空式推荐卡；A班自由推荐+说为什么适合对方。易错点提醒：推荐时用 might —— \"You might like...\" 比 \"You should listen to...\" 更礼貌，给对方选择空间。"}],"blackboard":"┌─ U5 Listening & Speaking ───────────┐\n│ Music Genres:                         │\n│  classical / pop / rock / jazz        │\n│  folk / hip-hop / electronic          │\n│  orchestra / choir / genre /ʒɒnrə/   │\n│                                       │\n│ Feelings:                             │\n│  ... moves me. (感动)                 │\n│  ... gives me energy. (充满能量)      │\n│  ... calms me down. (平静下来)        │\n│  ... cheers me up. (振奋)             │\n│                                       │\n│ Preferences:                          │\n│  I prefer... because...               │\n│  I'm a fan of...                     │\n│  You might like... because...         │\n└───────────────────────────────────────┘","exercises":"【基础作业】1. 听录音跟读听力文本 2 遍，圈出所有音乐类型与感受词。2. 用 prefer / move / give energy 各写 1 句关于自己音乐偏好的句子。【提高作业】用英文写 50 词介绍你最喜欢的一首歌或一位歌手——包含音乐类型/什么感受/为什么喜欢。【参考答案——教师用】基础2示例：I prefer folk music because it tells real stories. / The song \"Hello\" by Adele really moves me — her voice is so powerful. / Hip-hop gives me energy when I run.","reflection":"✅ 亮点：音乐片段让课堂气氛活跃，感受动词（move/energize/calm）学生印象深刻。⚠️ 需改进：genre 发音仍需反复纠正，下节阅读中出现 choir 可以类比。📌 下节课衔接：进入阅读 THE VIRTUAL CHOIR，从音乐偏好延伸到音乐+科技的创新形式。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Listening & Speaking · Music (P1)"},{"id":"l-eng-b2-u5-r1","lessonId":"l-eng-b2-u5-r1","book":"必修第二册","unitNumber":5,"unitTitle":"Music","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":2,"periodNumber":2,"duration":40,"grade":"高一","subject":"英语","tags":["阅读","音乐","虚拟合唱团","Eric Whitacre","人教版必修二U5","第二节课"],"textbookAnalysis":"本课为必修第二册 Unit 5 第二课时（Reading I），语篇 THE VIRTUAL CHOIR 是一篇人物+现象说明文，讲述美国作曲家 Eric Whitacre 如何从一个音乐少年、经历挫折后受到粉丝视频启发，创建虚拟合唱团——让全球数千人在线录制演唱同一首歌并合成震撼作品。结构为\"个人经历→灵感时刻→虚拟合唱团诞生→全球影响\"。语言重点为叙事时间顺序词（originally / then / over the next few years / since then）与音乐+科技动词（compose, conduct, perform, upload, combine, inspire）。","overview":"【学情分析】A班：对\"虚拟合唱团\"概念好奇，但视频合成技术原理的理解可能需要解释。B班：Eric Whitacre 是谁完全陌生，需照片+视频脚手架。共同问题：本文把\"个人故事\"和\"科技解释\"两种文体揉在一起——学生容易在两种文体间迷失。","objectives":["语言能力：读懂人物+现象说明文，提取 Eric Whitacre 的人生转折点/虚拟合唱团的运作方式/全球影响；掌握 8-10 个核心动词。","文化意识：理解音乐与科技结合可以跨越国界连接人类——\"虚拟合唱团\"是全球化的美好例证。","思维品质：通过\"个人梦想→挫折→科技灵感→全球影响\"因果链分析培养叙事与非叙事混合阅读策略。","学习能力：能用\"梦想→挫折→转折→创造→影响\"框架复述 Eric Whitacre 的故事。"],"keyPoints":"① 叙事弧线：Love for music → Setback → Fan video inspiration → Virtual Choir created → Global phenomenon ② 时间标志词：originally / then / in 2009 / over the next few years / since then / altogether ③ 核心短语：fall in love with / be inspired by / come up with / combine... into / prove to be","difficulties":"① virtual /vɜːtʃuəl/ 发音 — 重音在第一音节，virtue 词根。② choir /kwaɪə/ 拼写与发音完全不对应 — 学生易读成 /tʃɔɪə/ 或写成 quire。③ come up with（想出）— 学生易漏介词 with。","teachingMethods":"① 故事弧线阅读法：找转折点→画因果链。② 视频辅助：放一段 Virtual Choir 实际视频让学生感受。③ Jigsaw 拼图：分段读后拼合全故事。","preparation":"【PPT课件】P1 Eric Whitacre 照片+Virtual Choir 截图；P2 Virtual Choir 运作方式示意图；P3 故事弧线图；P4 时间轴；P5 因果链图；P6 词汇对比表；P7 总结回顾。【实物教具】故事弧线空白 work sheet 每人一份；分段阅读卡。","process":[{"step":"导入设问+视频","time":"6","content":"【PPT P1 照片+截图】教师播放 30 秒 Virtual Choir 视频。教师：These people have never met. They recorded themselves singing alone at home. Together, they created THIS. How is this possible? 预设回答：They used the Internet! Someone combined all the videos! 板书时机：板书 virtual / choir / combine。差异化提示：B班中文描述看到的画面再翻英文；A班用英文说这个现象的特别之处。易错点提醒：choir /kwaɪə/ — ch 读 /k/，oir 读 /waɪə/。完全不符合拼读规则，必须特别记忆。"},{"step":"快速阅读抓主线","time":"8","content":"【PPT P3 时间轴】教师：Read fast (3 min). Find: ① Who created the Virtual Choir? ② What inspired him? ③ How many people have joined so far? 预设回答：① Eric Whitacre. ② A video of a girl singing his song. ③ Millions of people from over 80 countries. 板书时机：填时间轴三个关键事件。差异化提示：B班给三选一选项；A班写完整句+数字。易错点提醒：come up with（想出）的主意——Eric came up with the idea after watching the fan video。"},{"step":"精读段落1-2 个人故事","time":"10","content":"【PPT P4 分段卡】教师精讲：fall in love with / be inspired by / come up with。教师：Why didn't Eric become a professional singer? What did the fan video show him? 预设回答：He fell in love with Mozart but had setbacks. The fan video showed him that people loved his music and wanted to be part of it. 板书时机：左侧栏画\"梦想→挫折→灵感\"链。差异化提示：B班读后填关键词；A班用自己话描述 Eric 的情感变化。易错点提醒：fall in love with + sth = 爱上了某事物（不一定是人）——\"He fell in love with Mozart's music\" = 他爱上了莫扎特的音乐。"},{"step":"精读段落3-4 虚拟合唱团","time":"10","content":"【PPT P5 运作方式图】教师：How does a virtual choir work? What makes it special? 学生用图表解释：①Eric composes & conducts → ②Video parts put online → ③People worldwide record themselves → ④Videos uploaded → ⑤Combined into one performance。教师：What does \"virtual\" mean here? 预设回答：It means \"not physically together\" — the choir exists on the Internet, not in one room. 板书时机：右侧画五步骤流程图。差异化提示：B班连线匹配（步骤—描述）；A班写完整步骤说明句。易错点提醒：virtual ≠ virtuous（有道德的）—— virtual 本意是\"虚拟的/实质上的\"。"},{"step":"归纳意义","time":"4","content":"【PPT P6 全球影响】教师：What does the Virtual Choir prove? Why does the title just say \"THE VIRTUAL CHOIR\"? 预设回答：It proves that music can connect people across the world. The title is simple but powerful — it's THE virtual choir, a unique and revolutionary idea. 板书时机：写 global connection / music + technology。差异化提示：B班跟读关键词；A班用自己的话总结音乐+科技的意义。易错点提醒：prove to be（被证明是）—— \"The Virtual Choir has proved to be a worldwide success.\" = 虚拟合唱团已被证明是一个全球性的成功。"},{"step":"小结","time":"2","content":"【PPT P7 总结回顾】教师带学生回顾\"爱音乐→受挫→被视频启发→创建虚拟合唱团→全球影响\"故事弧线+核心词汇。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述。易错点提醒：altogether（总共）= in total，不要和 all together（全部在一起）混淆——虽然意思相近但用法有细微区别。"}],"blackboard":"┌─ U5 Reading I: THE VIRTUAL CHOIR ────────────┐\n│ Eric Whitacre's Journey:                       │\n│  Love music → Setback → Fan video → Idea!     │\n│  → Virtual Choir → 80+ countries, millions     │\n│                                                 │\n│ come up with / fall in love with                │\n│ be inspired by / combine... into                │\n│ prove to be / altogether                        │\n│                                                 │\n│ Virtual Choir = music + Internet + people       │\n│  \"Virtual\" = not physically together            │\n│  \"Choir\" = /kwaɪə/ (NOT /tʃɔɪə/!)              │\n└─────────────────────────────────────────────────┘","exercises":"【基础作业】1. 朗读课文第2-4段 2 遍，圈出所有时间标志词。2. 用故事弧线的4个阶段各写1句描述 Eric 的经历。【提高作业】用 80 词写一段：If you could create a virtual project (not necessarily music), what would it be and why?（用 come up with / be inspired by / combine）【参考答案——教师用】基础2示例：Eric fell in love with classical music as a teenager. / He faced setbacks and couldn't become a professional singer. / A fan's video inspired him to create the Virtual Choir. / Since then, his idea has connected millions of people worldwide.","reflection":"✅ 亮点：视频导入让学生直观理解\"虚拟合唱团\"，故事弧线清晰。⚠️ 需改进：choir 发音和拼写仍需强化——几乎全班第一次都读错。📌 下节课衔接：进入精读语言+过去分词作状语在语篇中的功能分析。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Reading and Thinking · Music (P2)"},{"id":"l-eng-b2-u5-r2","lessonId":"l-eng-b2-u5-r2","book":"必修第二册","unitNumber":5,"unitTitle":"Music","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":3,"periodNumber":3,"duration":40,"grade":"高一","subject":"英语","tags":["阅读","精读","过去分词","虚拟合唱团","人教版必修二U5","第三节课"],"textbookAnalysis":"本课为必修第二册 Unit 5 第三课时（Reading II），聚焦语篇 THE VIRTUAL CHOIR 的精读与语言分析。重点分析文中过去分词作状语的用法——如 \"Moved by Mozart's music, he began composing.\" \"Inspired by a fan video, Eric came up with the idea.\" \"Known as the father of the Virtual Choir, Eric has changed music.\" ——在人物报道中的功能：简洁地表达原因/时间/伴随状态，增强句式多样性。同时深化语篇中高频动词的用法辨析（compose / conduct / perform / upload / combine / inspire / prove）。","overview":"【学情分析】A班：已掌握过去分词作定语和宾补，但作状语（相当于省略的状语从句）是全新概念。B班：过去分词本身不熟，分不清现在分词与过去分词作状语的区别。共同问题：写作中习惯用完整状语从句（Because he was moved...），不会简化为过去分词作状语（Moved...）。","objectives":["语言能力：能在课文语境中识别并分析至少 4 个过去分词作状语的句子，理解其\"表示原因/时间/伴随\"的状语功能。","文化意识：通过过去分词作状语体会英语书面语的简洁优雅——这是中高级英文写作的标志。","思维品质：分析过去分词作状语在人物报道中的修辞功能——使叙事更流畅、更精炼。","学习能力：建立\"从读到写\"的语料库——积累课文中的过去分词作状语句型用于后续演讲稿写作。"],"keyPoints":"① 过去分词作状语结构：V-ed..., S+V...（相当于省略了 Because/When/If + be动词 的状语从句）② 语篇中分词作状语句的识别与功能分析 ③ 核心动词辨析：compose / conduct / perform / upload / combine / inspire / prove / enable","difficulties":"① 过去分词作状语 vs 现在分词作状语 — Moved by...（被动，被感动） vs Moving to...（主动，搬到）。原因：学生不会判断主语与分词的主被动关系。② 分词作状语时逻辑主语必须与主句主语一致——否则是 dangling participle（悬垂分词），严重语法错误。③ upload（上传）vs download（下载）— 方向相反。","teachingMethods":"① 标注发现法：圈出文中所有过去分词作状语的句子并还原为状语从句。② 对比辨析：现在分词 vs 过去分词作状语。③ 语料卡记录：分类摘录优质句子。","preparation":"【PPT课件】P1-2 课文中圈出的过去分词作状语示例；P3 分词作状语结构分解公式；P4 现在分词 vs 过去分词作状语对比表；P5 语料卡模板；P6 词汇辨析表；P7 总结回顾。【实物教具】课文复印件 printed 每人一份；高亮笔。","process":[{"step":"课文回顾","time":"5","content":"【PPT P1 故事弧线】教师：Last class we met Eric Whitacre. Can you recall: What inspired him? What did he create? Why is it special? 预设回答：A fan's video inspired him. He created the Virtual Choir. It connects people worldwide through music. 板书时机：左栏写故事弧线关键词。差异化提示：B班看关键词复述；A班完整复述+加入感受。易错点提醒：inspire /ɪnspaɪə/ — 注意 /aɪə/ 双元音+弱读音节，不要读成 /ɪnspɪr/。"},{"step":"过去分词作状语发现","time":"8","content":"【PPT P2 课文句子】发课文复印件。教师：Circle sentences that start with a past participle (V-ed) followed by a comma. 学生标记后核对：①Moved by Mozart, he began composing. ②Inspired by a fan video, Eric created the Virtual Choir. ③Known as the father of VC, Eric has changed music. 教师：What do these sentences have in common? 预设回答：They all start with V-ed. They explain WHY or HOW something happened. 板书时机：逐句板书，标注 V-ed + 逗号 + 主句。差异化提示：B班给划线句直接圈 V-ed；A班自己找+还原为状语从句。易错点提醒：这些 V-ed 短语不是修饰主语——而是整个句子的状语，表示原因/时间/伴随。"},{"step":"分词作状语讲透","time":"10","content":"【PPT P3 结构公式】教师板书：V-ed..., S + V...。还原：①Moved by Mozart, he began... = Because he was moved by Mozart, he began... ②Inspired by a video, Eric created... = After he was inspired by a video, Eric created... ③Known as..., Eric has changed... = Eric is known as..., and he has changed... 教师：Why use V-ed instead of a full clause? 预设回答：It's shorter and more elegant. It sounds more professional. 板书时机：三句对比，红笔标还原。差异化提示：B班连线（V-ed 句 → 原状语从句）；A班自己还原+解释哪种更好。易错点提醒：分词作状语的逻辑主语必须 = 主句主语！\"Moved by Mozart, music became his passion.\" 是错的 — 应该是 Moved by Mozart, HE made music his passion。"},{"step":"现在分词 vs 过去分词对比","time":"7","content":"【PPT P4 对比表】教师对比：①Moved by the music, he cried.（被动→过去分词，他被音乐感动）②Hearing the music, he cried.（主动→现在分词，他听到音乐）。教师：How to choose V-ed or V-ing? 预设回答：If the subject DOES the action → V-ing. If the subject RECEIVES the action → V-ed. 板书时机：双栏对比板书。差异化提示：B班判对错选择；A班独立造一对对比句。易错点提醒：判断法——在分词前加上主语看是否合适。He was moved by the music ✓（过去分词）He was hearing the music（不自然）→ Hearing the music（现在分词）✓。"},{"step":"语料库搭建","time":"7","content":"【PPT P5 语料库模板】学生分类填语料卡：①过去分词作状语句摘录（至少3句）②音乐+科技动词（compose/conduct/perform/upload/combine/inspire/prove/enable）③时间/过渡词。板书时机：巡视指导。差异化提示：B班填词+翻译；A班造句+标注\"可用于演讲稿\"。预设回答：按音乐语料库模板分类填写词条。易错点提醒：compose（作曲）≠ consist（组成）— compose 音乐语境 = write music。concert（音乐会）≠ consort（配偶）也不相关。"},{"step":"小结","time":"3","content":"【PPT P7 总结回顾】回顾 V-ed 作状语（省略状语从句→更精炼）+ 与 V-ing 的区别 + 语料库。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述。易错点提醒：下节课语法课系统讲练过去分词作状语的各种类型。"}],"blackboard":"┌─ U5 Reading II: Language Focus ─────────────┐\n│ Past Participle as Adverbial (状语):          │\n│  V-ed..., S + V...  =  状语从句简化           │\n│                                               │\n│  Moved by Mozart, he began composing.         │\n│  = Because he was moved by Mozart, ...         │\n│                                               │\n│  Inspired by a video, Eric created the VC.    │\n│  = After he was inspired by a video, ...       │\n│                                               │\n│  RULE: 分词逻辑主语 = 主句主语                 │\n│  V-ed (被动) vs V-ing (主动)                  │\n│  Moved by music, he... (他 被 感动)            │\n│  Hearing music, he...  (他 主动 听到)          │\n└───────────────────────────────────────────────┘","exercises":"【基础作业】1. 从课文中找出3个过去分词作状语的句子并还原为状语从句。2. 选择 V-ed 或 V-ing：①___ (Inspire/Inspired) by her teacher, she started singing. ②___ (See/Seen) the concert, she felt excited.【提高作业】用过去分词作状语写3句关于你自己与音乐的故事（如 \"Moved by a song, I learned to play the guitar.\"）。【参考答案——教师用】基础2：①Inspired ②Seeing.","reflection":"✅ 亮点：还原法（分词句→从句）让学生直观理解状语的省略规则。⚠️ 需改进：dangling participle 的错误仍需反复强调，语法课要作为重中之重。📌 下节课衔接：进入语法课，系统操练过去分词作状语的各种类型（原因/时间/条件/伴随）。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Reading and Thinking · Music (P3)"},{"id":"l-eng-b2-u5-g","lessonId":"l-eng-b2-u5-g","book":"必修第二册","unitNumber":5,"unitTitle":"Music","lessonType":"grammar","lessonTypeName":"语法","lessonNumber":4,"periodNumber":4,"duration":40,"grade":"高一","subject":"英语","tags":["语法","过去分词","状语","音乐","人教版必修二U5","第四节课"],"textbookAnalysis":"本课为必修第二册 Unit 5 第四课时（Discovering Useful Structures），系统教学过去分词作状语（V-ed 作原因/时间/条件/伴随状语）。基于 Reading 语篇中提取的例句，引导学生归纳\"何时用过去分词作状语\"的规则——当状语从句的主语与主句主语一致且为被动关系时，可省略连词+主语+be。通过音乐主题的语境化练习巩固语法，为后续演讲稿写作做语言准备。这是高中阶段最重要的语法进阶之一——分词作状语是高考书面表达的加分项。","overview":"【学情分析】A班：能理解从句简化为分词的基本逻辑，但条件状语（If done...）和应用到自己的写作中仍有困难。B班：分词概念模糊，需从\"找主语→判断主被动→选择 V-ed/V-ing\"三步法开始。共同问题：最严重错误是分词逻辑主语与主句主语不一致（dangling participle）。这是高考改错和写作的高频扣分点。","objectives":["语言能力：准确使用过去分词作原因/时间/条件/伴随状语，在音乐话题中产出 5 个以上正确句子。","文化意识：通过过去分词作状语体会英语书面语的精炼美——这是中英语言思维差异的重要体现。","思维品质：通过\"发现例句→归纳规则→三步判断→应用输出\"的归纳法培养语法学习策略。","学习能力：建立\"分词自查表\"——写作后自行检查分词逻辑主语是否与主句主语一致。"],"keyPoints":"① 过去分词作状语四大类型：原因（Because done...）/ 时间（When done...）/ 条件（If done...）/ 伴随（...，done...）② 三步判断法：找主句主语→判断与分词的主被动关系→选择 V-ed（被动）或 V-ing（主动）③ 黄金法则：分词逻辑主语必须 = 主句主语！④ 不规则过去分词复习（write→written, sing→sung, know→known, give→given）","difficulties":"① dangling participle — \"Walking down the street, the flowers were beautiful.\"（花在走路？）主语不一致是中式英语最典型错误。② 分词作状语的位置——句首最常见，句末也可以（表示伴随）。③ 分词否定形式—— Not knowing what to say（现在分词否定）/ Not moved by the music（过去分词否定），否定词 not/never 放在分词前。","teachingMethods":"① 归纳法（Guided Discovery）：例句→规则→三步法→练习。② 情境造句：给音乐场景图片用分词描述。③ 改错竞赛：Dangling participle 专项纠正。","preparation":"【PPT课件】P1 过去分词作状语四大类型表；P2 课文例句摘录；P3 三步判断流程图；P4 现在分词 vs 过去分词对比；P5 情境造句任务卡；P6 改错题（dangling participle专项）；P7 总结。【实物教具】改错卡每人一套；三步判断卡每人一张。","process":[{"step":"例句发现+分类","time":"7","content":"【PPT P2 例句分类】展示 6 句，学生按原因/时间/条件/伴随分类：①Moved by the song, he cried.（原因）②Seen from the stage, the audience looked like a sea.（时间）③Given the chance, I would sing every day.（条件）④The singer stood on stage, surrounded by fans.（伴随）⑤Inspired by Eric, she joined a choir.（原因）⑥If invited, I will perform.（条件）。教师：What links all these sentences? 预设回答：They all use V-ed. You can add \"Because/When/If\" to make them full clauses. 板书时机：四象限分类板书。差异化提示：B班只分类不分析；A班分类+还原为状语从句。易错点提醒：条件状语（If done）中 if 有时保留有时省略——两者都可以，\"If invited\" = \"Invited\"。"},{"step":"规则归纳+三步法","time":"10","content":"【PPT P3 三步法】教师教三步判断：Step 1: 找主句主语。Step 2: 主语是分词动作的发出者（V-ing）还是承受者（V-ed）？Step 3: 选择分词形式。用4个例句演示：①(Inspire) by music, he wrote a song. → 主句主语 he = 被启发 → Inspired ✓ ②(Hear) the music, she danced. → 主句主语 she = 主动听 → Hearing ✓。教师：Why can't we say \"Walking down the street, the flowers were beautiful\"? 预设回答：Because the flowers are not walking! 板书时机：三步法流程图板书。差异化提示：B班跟三步法逐个判断；A班独立判断+解释原因。易错点提醒：三步法黄金法则 = 分词逻辑主语必须等于主句主语。"},{"step":"四大类型操练","time":"8","content":"【PPT P5 图片卡】展示 4 张音乐相关图（歌手感动流泪/观众鼓掌/被邀请上台/吉他手被粉丝围绕），学生用不同状语类型描述。教师：Use a different type for each picture! 预设回答：①Moved by the audience's response, the singer cried.（原因）②When asked to sing, she felt nervous.（时间）③If given a guitar, I would learn to play.（条件）④The guitarist sat there, surrounded by cheering fans.（伴随）板书时机：巡视指导。差异化提示：B班给分词提示（moved/asked/given/surrounded）；A班自由选择分词+说明什么状语类型。易错点提醒：伴随状语中过去分词常放在句末且前面有逗号——\"He walked off stage, followed by applause.\""},{"step":"改错竞赛（Dangling Participle）","time":"8","content":"【PPT P6 改错专项】展示 5 个 dangling participle 典型错误：①Walking into the concert hall, the music was loud.（谁在走？）②Moved by the song, tears ran down her face.（谁的眼泪？）③Seen from the top, the city was tiny.（虽语法通但最好说 Seeing from the top 如果是\"你\"在看的话）④Inspired by Eric, the Virtual Choir was created.（谁被 inspire？）⑤Given more time, the song would be better.（虽可接受但最好明确主语）。学生纠错。预设回答纠错。板书时机：板书错误→改正+规则。差异化提示：B班判对错；A班解释为什么错+改正。易错点提醒：Dangling participle 高考必考——改错题中看到分词开头+逗号，立刻检查主句主语是否一致。"},{"step":"小结","time":"7","content":"【PPT P7 总结】回顾四大类型+三步法+黄金法则+常见错误。教师带全班大声读三步法。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读三步法；A班说出每步+给例句。易错点提醒：自查三问——①主句主语是谁？②主语是分词动作的发出者还是承受者？③如果是承受者→V-ed ✓ 如果是发出者→V-ing ✓ 如果不符→改主语！"}],"blackboard":"┌─ U5 Grammar: V-ed as Adverbial ──────────────┐\n│  V-ed 作状语 (原因/时间/条件/伴随)              │\n│                                                 │\n│  Cause:  Moved by..., he...                     │\n│  Time:   Seen from..., it...                     │\n│  Condition: Given..., I...                       │\n│  Manner: He stood, surrounded by...              │\n│                                                 │\n│  3-Step Check:                                  │\n│  ① Find main subject                            │\n│  ② Does subject DO or RECEIVE the action?       │\n│  ③ DO → V-ing  /  RECEIVE → V-ed               │\n│                                                 │\n│  ⚠️ Golden Rule: 分词逻辑主语 = 主句主语        │\n│  ❌ Walking in, the music was loud.             │\n│  ✓ Walking in, I heard loud music.              │\n│  ❌ Moved by the song, tears ran down her face. │\n│  ✓ Moved by the song, she burst into tears.     │\n└─────────────────────────────────────────────────┘","exercises":"【基础作业】1. 用过去分词作状语造 5 句（覆盖原因/时间/条件/伴随四种类型）。2. 改错：Inspired by the concert, the guitar was bought. / Hearing the news, tears came to my eyes.【提高作业】写 60 词短文关于音乐如何影响你的情绪，至少用 3 个过去分词作状语。【参考答案——教师用】基础1示例：Moved by the melody, I started to cry. / When played softly, the piano sounds magical. / If given the choice, I would listen to jazz all day. / He sat in the corner, lost in the music.","reflection":"✅ 亮点：三步法让复杂的语法判断变为流程化操作，B班掌握率明显提升。⚠️ 需改进：dangling participle 仍是最顽固错误，后面听与谈和写作课都要持续纠错。📌 下节课衔接：听与谈聚焦音乐与情绪，口头运用分词作状语描述音乐感受。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Discovering Useful Structures · Music (P4)"},{"id":"l-eng-b2-u5-lt","lessonId":"l-eng-b2-u5-lt","book":"必修第二册","unitNumber":5,"unitTitle":"Music","lessonType":"listening-talking","lessonTypeName":"听与谈","lessonNumber":5,"periodNumber":5,"duration":40,"grade":"高一","subject":"英语","tags":["听与谈","音乐与情绪","音乐推荐","人教版必修二U5","第五节课"],"textbookAnalysis":"本课为必修第二册 Unit 5 第五课时（Listening and Talking），语境为\"讨论音乐如何影响情绪与推荐歌曲\"。听力材料为一段关于不同音乐对情绪影响的对话，口语输出任务为向朋友推荐一首能改变情绪的歌曲并解释原因。功能语言为描述音乐效果的句型（This song makes me feel... / Whenever I hear..., I... / It takes me back to... / The lyrics speak to me because...）。结合语法课的过去分词作状语，在口语中自然运用如\"Moved by this song, I decided to learn piano.\"等结构。","overview":"【学情分析】A班：能表达简单音乐偏好，但对\"音乐与情绪\"的深层描述能力不足。B班：开口意愿低，但\"推荐一首歌\"是贴近生活的轻松任务。共同问题：描述音乐时只说\"I like it\"，不说音乐具体给你什么感受/让你想起什么。","objectives":["语言能力：听懂关于音乐与情绪的对话，提取音乐类型/情绪效果/个人关联；能用至少 4 种句型推荐歌曲并描述其情绪影响。","文化意识：理解音乐是人类共通的情感语言——一首歌可以跨越语言和文化触动人心。","思维品质：在讨论中练习\"描述感受→解释原因→建立个人关联\"的完整表达链。","学习能力：通过推荐对话训练\"为听众量身推荐\"的沟通策略——推荐的歌不是自己最喜欢的，而是对方可能需要的。"],"keyPoints":"① 音乐与情绪句型：This song makes me feel... / Whenever I hear..., I... / It takes me back to... / The lyrics speak to me because... ② 推荐句型：You should listen to... / I recommend... / If you like..., try... / This song is perfect for when you... ③ 听力重点：抓音乐—情绪—原因的配对。","difficulties":"① take sb back to（把某人带回到…记忆）— 学生按字面理解为\"带回去\"。提醒：固定短语 = remind sb of the past。② lyrics /lɪrɪks/ 永远用复数 — 学生易说 \"a lyric\"（指单独一句歌词可以，但泛指歌词用 lyrics）。③ speak to sb（打动/引起共鸣）— 不是\"对某人说话\"。","teachingMethods":"① 听前预测→听中配对→听后产出。② \"情绪歌单\"活动：给不同情绪（开心/伤心/需要动力/需要平静）各选一首歌。③ 歌曲推荐圆桌。","preparation":"【PPT课件】P1 情绪表情图标（😊😢💪😌）；P2 音乐与情绪句型板；P3 听力任务题；P4 听力任务卡；P5 推荐句型板；P6 \"情绪歌单\"活动卡；P7 总结。【实物教具】情绪歌单空白卡 printed 每人一份；歌曲推荐卡。","process":[{"step":"导入激活","time":"5","content":"【PPT P1 表情图标】教师：Look at these emotions: happy, sad, need energy, need calm. What song would you play for each? 预设回答：Happy → \"Happy\" by Pharrell! / Sad → \"Someone Like You\" by Adele. / Energy → \"We Will Rock You.\" / Calm → classical piano. 板书时机：左栏四情绪分栏，贴学生推荐的歌。差异化提示：B班中文说歌名再找英文名；A班英文说+一句话理由。易错点提醒：推荐歌名时——英文歌名每个实词首字母大写，\"Someone Like You\" 不是 \"someone like you\"。"},{"step":"听力抓情绪","time":"10","content":"【PPT P3 听力任务】听对话，抓\"什么歌/给什么情绪听/为什么这个情绪\"。教师：Listen for: What song do they talk about? How does it make them feel? What memory does it bring back? 预设回答：The song \"Fix You\" by Coldplay makes the speaker feel hopeful. It takes them back to a difficult time when music helped them through. 板书时机：配对填表（歌曲|情绪|原因/记忆）。差异化提示：B班给配对连线题；A班听写关键词+写完整感受句。易错点提醒：take sb back to + 时间/地点/经历——\"It takes me back to my high school days.\" = 它让我回想起高中时光。"},{"step":"听中记录","time":"8","content":"【PPT P4 任务卡】【音频】重听，注意推荐者如何\"推荐+感受+原因\"三步走。教师：How does the speaker structure their recommendation? 预设回答：①Name the song → ②Describe the feeling → ③Give a personal reason or memory. 板书时机：板书推荐三步法。差异化提示：B班勾选听到的推荐句型；A班记录完整推荐链。易错点提醒：推荐时最打动人的不是\"这首歌很好听\"——而是\"这首歌在你生命中的故事\"。真实经历 > 任何形容词。"},{"step":"句型操练","time":"7","content":"【PPT P5 句型板】教师带领操练音乐推荐三步链：A: I recommend \"...\" because it always cheers me up. / B: What does it make you feel? / A: Whenever I hear it, I feel like everything will be okay. It takes me back to my first concert. 预设回答跟读+仿造。板书时机：板书推荐三步法+句型。差异化提示：B班用填空脚本；A班自主对话+真实推荐。易错点提醒：过去分词作状语融入口语——\"Inspired by this song, I started learning guitar.\" 让口语也高级。"},{"step":"情绪歌单活动","time":"8","content":"【PPT P6 活动卡】学生各自制作\"情绪歌单\"：为 4 种情绪各选 1 首英文歌（或翻译中文歌名），写一句话为什么。然后同桌分享+互相推荐。教师巡视。预设回答：For \"need energy\": \"Eye of the Tiger\" — It makes me feel unstoppable. / For \"sad\": \"Let Her Go\" — The lyrics speak to me about loss. 板书时机：留句型供参考。差异化提示：B班用填空卡；A班自由写+用至少 1 个分词作状语。易错点提醒：英文歌名加引号——\"Let Her Go\" 或者斜体 Let Her Go。不加引号会被当成普通句子。"},{"step":"小结","time":"2","content":"【PPT P7 总结】回顾音乐与情绪句型+推荐三步法+过去分词融入口语。教师：Remember: the best music recommendation is personal. 预设回答跟读。板书时机：圈重点句型。差异化提示：B班齐读；A班每人说一句自己歌单中最特别的推荐。易错点提醒：推荐歌曲时偶尔用被动语态分句——\"This song was written for...\" / \"It was inspired by...\" 展示音乐知识深度。"}],"blackboard":"┌─ U5 Listening & Talking ──────────────────┐\n│ Music & Emotions:                           │\n│  This song makes me feel...                 │\n│  Whenever I hear..., I...                   │\n│  It takes me back to...                     │\n│  The lyrics speak to me because...          │\n│                                             │\n│ Recommendation 3 Steps:                     │\n│  ① Name the song                            │\n│  ② Describe the feeling                     │\n│  ③ Share a personal reason / memory         │\n│                                             │\n│  Emotions: 😊 happy  😢 sad                 │\n│            💪 energized  😌 calm             │\n└─────────────────────────────────────────────┘","exercises":"【基础作业】1. 听录音跟读 2 遍，圈出所有描述音乐感受的句型。2. 用推荐三步法写 1 段完整的歌曲推荐（50词）。【提高作业】制作你的\"情绪歌单\"（4首歌+4句英文推荐理由），下节课分享。【参考答案——教师用】基础2示例：I recommend \"Viva la Vida\" by Coldplay. Whenever I hear it, I feel like I can conquer anything. Inspired by the powerful strings and lyrics about rising after a fall, I always play it before exams.","reflection":"✅ 亮点：情绪歌单活动让每个学生都有话可说，因为选的是自己喜欢的歌。⚠️ 需改进：take sb back to 的用法仍需强化——部分学生写成 take sb back from。📌 下节课衔接：进入写作 I，将音乐推荐升级为正式的演讲稿。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Listening and Talking · Music (P5)"},{"id":"l-eng-b2-u5-w1","lessonId":"l-eng-b2-u5-w1","book":"必修第二册","unitNumber":5,"unitTitle":"Music","lessonType":"writing","lessonTypeName":"写作","lessonNumber":6,"periodNumber":6,"duration":40,"grade":"高一","subject":"英语","tags":["写作","演讲稿","音乐","人教版必修二U5","第六节课"],"textbookAnalysis":"本课为必修第二册 Unit 5 第六课时（Reading for Writing I），写作体裁为写一篇关于音乐如何改变你生活的演讲稿（Write a Speech About How Music Has Changed Your Life）。演讲结构为：吸引注意的开场→你的音乐故事（具体经历）→音乐改变你的方式→结尾的呼吁/感悟。语言重点为演讲特有的修辞手法（rhetorical questions, repetition, personal anecdotes）与过去分词作状语（Moved by..., Inspired by...）在演讲稿中的运用——使演讲既有感染力又语言精炼。结合本单元 Reading 的人物叙事与语法课的分词作状语，实现\"读-语法-写\"闭环。","overview":"【学情分析】A班：有写作能力但演讲稿体裁不熟——演讲稿要能\"读出来有感染力\"，与书面作文不同。B班：句型储备少、公开演讲经验少，需大量范例+模板。共同问题：演讲稿写成\"议论文\"——缺少 rhetorical questions、故事叙述和个人情感。","objectives":["语言能力：掌握演讲稿的\"Hook→Story→Change→Closing\"四段结构，在音乐话题中产出 100-120 词有感染力的英文演讲稿。","文化意识：理解公开演讲在西方文化中的重要性——学习用英文表达个人故事和观点。","思维品质：通过\"选择故事→提炼感悟→设计修辞→构建演讲\"训练从个人经历到公共表达的转化思维。","学习能力：建立\"演讲稿≠作文\"的体裁意识——学会使用 rhetorical questions、repetition、storytelling。"],"keyPoints":"① 演讲稿四段结构：Engaging Opening → Your Music Story → How Music Changed You → Powerful Closing ② 演讲修辞手法：Rhetorical questions（\"Have you ever felt...?\"）、Repetition（\"Music gives me... Music gives me...\"）、Personal anecdote（\"I remember the first time I...\"）③ 过去分词作状语在演讲中的运用——增加语言精炼度与感染力。","difficulties":"① Rhetorical question（反问/设问）——学生不习惯在正式写作中问问题。② \"演讲感\"语气——需要反复朗读来检查是否\"读出来自然\"。③ 演讲结尾的力量——学生常以\"That's all. Thank you.\"草草收尾。","teachingMethods":"① 范本解构法：读/听优秀演讲稿→提取结构+修辞→仿写。② 朗读测试：写完必须朗读——耳朵是最好的编辑器。③ 过程写作：outline→draft→read aloud→revise。","preparation":"【PPT课件】P1 优秀音乐演讲稿范例；P2 演讲稿四段结构图；P3 演讲修辞手法表；P4 演讲稿句型库；P5 头脑风暴工作单；P6 写作任务；P7 总结。【实物教具】演讲稿结构模板 printed 每人一份；演讲修辞手法卡每组一套。","process":[{"step":"范本解构","time":"8","content":"【PPT P1 演讲稿范例】教师朗读一篇关于音乐的英文演讲稿（约100词），学生标注：①Hook（用什么开头？问了一个什么 rhetorical question？）②Story（讲了什么个人经历？）③Change（音乐如何改变了他？）④Closing（结尾用了什么让听众记住？）。教师：What makes this a speech and not an essay? 预设回答：The speaker asks questions to the audience. There's a personal story. The ending is powerful — it's not just \"thank you.\" 板书时机：四段结构板书。差异化提示：B班给标注好的演讲稿只匹配段名；A班自己标注+圈出修辞手法。易错点提醒：演讲稿的 Hook 比议论文更重要——听众的前 10 秒决定他们是否继续听。用问句/惊人事实/小故事开头。"},{"step":"四段结构+修辞讲透","time":"10","content":"【PPT P2 结构图+PPT P3 修辞表】教师逐段讲解：①Opening Hook — rhetorical question (\"Have you ever heard a song that changed everything?\") + 主题句。②Story — 你的具体音乐经历（\"I remember the first time I heard...\"）——越细节越有感染力。③Change — 音乐如何改变了你（\"Music taught me that...\" / \"Since then, I have...\"）——用至少 1 个过去分词作状语（\"Moved by the lyrics, I...\"）。④Closing — 有力的结尾句+呼吁/感悟（\"Music isn't just sound. It's...\"）——不要用\"That's all\"。教师用 Eric Whitacre 的故事做范例示范。预设回答跟做笔记。板书时机：逐段板书模板句+修辞手法。差异化提示：B班给每段填空模板；A班给关键词自己写+选一种修辞手法必须用到。易错点提醒：修辞手法不要滥用——100词演讲稿用 1-2 种修辞足够。最有效的通常是 1 个 rhetorical question + 1 个 personal anecdote。"},{"step":"句型库","time":"5","content":"【PPT P4 句型库】教师领读演讲高频句型：Opening: Have you ever...? / Let me tell you about... / I'll never forget the moment when... / Story: I remember the first time I... / It was a cold winter evening when... / Change: Music has taught me that... / Looking back, I realize... / Closing: So I ask you... / Remember that... / Music is more than... — it's... 教师强调用过去分词作状语增加语言质量。预设回答跟读。板书时机：句型分类板书（开头/故事/改变/结尾）。差异化提示：B班齐读+每类背1句；A班选最喜欢的2句并说为什么适合演讲稿。易错点提醒：Looking back 是现在分词作状语（\"当我回顾时\"）——这是你主动回顾，所以用 V-ing 不是 V-ed。"},{"step":"头脑风暴+提纲","time":"7","content":"【PPT P5 工作单】学生各自想一件音乐改变自己的经历：①学会了一种乐器？②一首歌帮你度过难关？③音乐会改变了你的一天？④一个歌手激励了你？用工作单记录：Hook 写什么？讲什么故事？音乐怎么改变你的？结尾用什么句子？教师巡视。预设回答：I learned to play guitar because of a song. / A song helped me when I failed an exam. / My first concert changed how I see live music. 板书时机：巡视指导。差异化提示：B班给选题目录（3选1）+每段填空；A班自己想+每个故事都要真实。易错点提醒：选最真实的故事——你不需要惊天动地的经历。对你来说是真实的，对听众来说就是动人的。"},{"step":"起草+朗读","time":"8","content":"【PPT P6 写作任务】学生写 100-120 词演讲稿初稿。要求：四段完整、至少 1 个 rhetorical question、至少 1 个过去分词作状语、结尾有力。写完必须自己默读一遍——检查\"读出来顺不顺\"。教师：Read your speech quietly. Does it sound natural? 预设回答：（学生写作+默读中）板书时机：留结构+句型供参考。差异化提示：B班用模板框架填写；A班自由写+追求修辞效果。易错点提醒：演讲稿写完后至少朗读一次——如果某句话读起来别扭，改到它读起来自然为止。演讲稿是\"写来读的\"，不是\"写来看的\"。"},{"step":"同伴初评","time":"2","content":"【PPT P6 写作任务】同桌互换演讲稿，check：有 rhetorical question？故事具体吗？有过去分词作状语吗？结尾有力吗（不是\"That's all\"）？读一遍给对方听，听后说\"最打动你的一句\"。教师：Listen to your partner's speech. What line stayed with you? 预设回答：\"Music is not just sound — it's the voice of my soul.\" That line really moved me. 板书时机：留 checklist。差异化提示：B班用 checklist 逐项打勾；A班听后给\"最打动人的句子+一个改进建议\"。易错点提醒：演讲的力量在于\"让听众感受到你的感受\"——如果你的演讲让别人无感，问自己\"我是否真的在乎这个故事？\""}],"blackboard":"┌─ U5 Writing: Speech ──────────────────────┐\n│  ① ENGAGING OPENING                         │\n│     Rhetorical question / surprising fact    │\n│     \"Have you ever...?\"                     │\n│  ② YOUR MUSIC STORY (specific + real!)      │\n│     \"I remember the first time I...\"        │\n│  ③ HOW MUSIC CHANGED YOU                    │\n│     Use V-ed as adverbial:                   │\n│     \"Moved by the lyrics, I...\"             │\n│  ④ POWERFUL CLOSING                         │\n│     NOT \"That's all\"!                       │\n│     \"Music is more than... — it's...\"       │\n│                                              │\n│  Speech ≠ Essay: Ask questions / Tell story │\n│  Read aloud to test!                         │\n└──────────────────────────────────────────────┘","exercises":"【基础作业】按课堂初稿完成 100-120 词演讲稿。要求：四段完整、≥1 rhetorical question、≥1 过去分词作状语、结尾有力。【提高作业】对着镜子（或手机录像）练习演讲，直到能脱稿讲出 80% 的内容。录 1 分钟视频或音频。【参考答案——教师用】示例（节选）：\"Have you ever heard a song that made you feel like you weren't alone? I have. It was a rainy Tuesday evening when I first heard 'Fix You' by Coldplay. I had just failed my math exam. Moved by the lyrics 'Lights will guide you home,' I felt something shift inside me. Music taught me that failure is not the end — it's a new beginning. So I ask you: what song has changed YOUR life?\"","reflection":"✅ 亮点：演讲稿四段结构+修辞手法让学生的写作首次有了\"说出来的力量\"。⚠️ 需改进：部分演讲结尾仍是\"That's all\"，下节课用范例对比强化。📌 下节课衔接：进入写作 II，互评修改+演讲展示。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Writing · Music (P6)"},{"id":"l-eng-b2-u5-w2","lessonId":"l-eng-b2-u5-w2","book":"必修第二册","unitNumber":5,"unitTitle":"Music","lessonType":"writing","lessonTypeName":"写作","lessonNumber":7,"periodNumber":7,"duration":40,"grade":"高一","subject":"英语","tags":["写作","互评","修改","演讲","音乐","人教版必修二U5","第七节课"],"textbookAnalysis":"本课为必修第二册 Unit 5 第七课时（Writing II），在 Writing I 演讲稿初稿的基础上完成\"互评→修改→演讲展示→终稿\"闭环。重点训练学生用同学反馈改进演讲稿的感染力和可演讲性——特别关注朗读流畅度、修辞效果和结尾力量。互评量表聚焦三维度：内容（四段完整/故事真实感人）、语言（分词作状语≥1/rhetorical question/演讲稿句型）、演讲效果（朗读是否流畅/节奏是否合适/结尾是否有力量）。本课也是本册教材最后一节写作课，具有收官意义。","overview":"【学情分析】A班：能辨别演讲稿好坏，但对\"演讲效果\"（朗读流畅度/节奏）的反馈能力不足。B班：上台演讲紧张，需提供安全的展示环境。共同问题：修改时只改语法不顾朗读——演讲稿改完后必须\"读一遍\"才知好坏。","objectives":["语言能力：能根据互评量表给同伴的演讲稿提具体、可操作的修改建议，重点检查演讲效果（朗读流畅度/修辞效果/结尾力量）。","文化意识：通过聆听同伴的音乐故事，体验音乐在不同人生命中的多样角色。","思维品质：在互评中培养\"识别演讲弱点→提出强化方案\"的批判性反馈能力。","学习能力：建立\"写→读→评→改→讲\"五步演讲稿制作流程，内化为个人演讲习惯。"],"keyPoints":"① 互评三维量表：内容（四段完整/故事具体真实/结尾有力）+ 语言（分词作状语≥1/rhetorical question/演讲稿句型）+ 演讲效果（读出来自然吗？/节奏有快慢变化吗？/最打动人的一句是什么？）② 演讲展示技巧：眼神交流/节奏变化/强调关键词","difficulties":"① 学生上台紧张——需创造\"不评分\"的安全环境，重点在\"分享\"而非\"表演\"。② 演讲稿修改时学生只改纸面不改口语——需强制\"改完大声读一遍\"。③ 演讲语速过快——紧张导致 2 分钟的稿 40 秒读完。","teachingMethods":"① 量表互评：用统一标准减少主观性。② \"朗读测试\"：改完必须读给同桌听。③ 微型演讲展示+最佳演讲评选。","preparation":"【PPT课件】P1 互评三维量表；P2 常见问题（结尾弱/修辞缺/读不顺/分词不会用）；P3 修改指南+演讲技巧；P4 最佳演讲范例；P5 自评表；P6 必修第二册整体回顾；P7 总结。【实物教具】互评量表 printed 每人一份；红笔。","process":[{"step":"量表培训","time":"5","content":"【PPT P1 互评量表】教师逐维讲解：①内容（四段全？故事真实具体？结尾不是\"That's all\"？）②语言（分词作状语≥1？rhetorical question？演讲稿句型？）③演讲效果（读出来自然吗？有快慢变化吗？最打动你的一句是什么？）。教师用上节课自己写的演讲稿示范打分+大声朗读展示\"朗读如何暴露问题\"。预设回答跟学。板书时机：量表三维板书。差异化提示：B班按量表逐项打勾；A班还需评\"如果这是 TED 演讲，你会鼓掌吗？\" 易错点提醒：朗读测试是最重要的——一篇演讲稿如果读起来卡壳、用词别扭、句子太长喘不过气，需要改的不是朗读技巧而是文案本身。"},{"step":"互评+朗读测试","time":"12","content":"【PPT P2 常见问题】先展示上节课常见问题：①结尾是\"That's all. Thank you.\" ②无 rhetorical question ③无分词作状语 ④故事太笼统（\"Music is important to me\"没有具体经历）。然后同桌互换稿子：第一步——默读打分。第二步——大声读给对方听。第三步——听的人说\"最打动人的一句\"和\"最卡顿的一句\"。教师巡视。预设回答：The line \"Music is the voice of my soul\" is powerful, but the sentence \"Furthermore, additionally, music has significantly impacted my emotional well-being\" sounds like an essay, not a speech. 板书时机：留量表供参考。差异化提示：B班按 checklist 勾+标出最卡顿的句子；A班还写\"如果是我，我会怎么改写这句\"。易错点提醒：演讲句子不能太长——一口气能读完的句子最多 15-18 个词。超过就断句或用逗号让读者喘气。"},{"step":"修改","time":"8","content":"【PPT P3 修改指南】学生根据互评+朗读反馈修改。顺序：①先改\"读出来不顺\"的句子（缩短/断句/换更口语的词）②再调结尾（去掉\"That's all\"，加一句有力量的总结）③最后查修辞（补 rhetorical question / 分词作状语）。教师：Read your revised speech aloud to yourself. Does it flow better now? 预设回答：（学生修改中，此处无口头回答）板书时机：留修改顺序。差异化提示：B班对照量表逐条改；A班改完再读一遍+微调节奏标记（在稿子上画 / 表示停顿）。易错点提醒：修改演讲稿的最高原则——\"删除一切读出来别扭的词\"。即使那个词写得很高级，如果读出来不行，换掉。"},{"step":"微型演讲展示","time":"10","content":"【PPT P4 演讲技巧】4-5 位自愿者上台发表 1 分钟演讲。3 条技巧：①眼神交流——看观众 3 秒再回稿子 ②节奏——关键句放慢，过渡句正常 ③力量在最后——结尾句一字一顿。全班闭眼听或睁眼看。投票：最打动人的故事/最佳修辞/最佳演讲者。预设回答展示。板书时机：记录投票结果+最佳结尾句。差异化提示：B班可看稿演讲但放慢；A班尽量脱稿+用肢体语言。易错点提醒：紧张时语速会变快——在稿子上写\"SLOW DOWN\"提醒自己。1分钟演讲 = 约 120-150 词。"},{"step":"结课+收官","time":"5","content":"【PPT P6 必修第二册整体回顾】教师回顾整册书 5 个单元的主题链：U1 文化遗产（我们保护什么）→ U2 野生动物（我们与自然）→ U3 互联网（我们如何连接）→ U4 历史与传统（我们从哪里来）→ U5 音乐（什么触动我们的灵魂）。学生自评整册书的学习收获。教师：What will you take away from Book 2? 预设回答：I learned to use relative clauses, passive voice, past participles, and sensory details. But more importantly, I learned to express myself in English about real-world topics. 板书时机：写五单元主题链。差异化提示：B班中文自评；A班英文自评。易错点提醒：恭喜大家完成必修第二册！这本书的5个主题从外（文化遗产/自然）到内（音乐/情感），从过去（历史）到未来（互联网）——这就是英语学习的意义：用另一种语言看完整的世界。"}],"blackboard":"┌─ U5 Writing II: Speech Showcase ─────────────┐\n│ Speech Checklist:                              │\n│  ✅ 4 parts (Hook/Story/Change/Closing)        │\n│  ✅ ≥1 rhetorical question                     │\n│  ✅ ≥1 V-ed as adverbial                       │\n│  ✅ Reads aloud naturally                      │\n│  ✅ Closing is powerful (not \"That's all\")     │\n│                                                │\n│ Book 2 Journey:                                │\n│  U1 Heritage → U2 Wildlife → U3 Internet      │\n│  → U4 History → U5 Music 🎵                    │\n│                                                │\n│ Speech Tips:                                   │\n│  Eye contact / Slow down on key lines          │\n│  End with power — one word at a time           │\n└────────────────────────────────────────────────┘","exercises":"【基础作业】根据课堂反馈修改演讲稿终稿，提交文字稿+录制 1 分钟演讲音频/视频。【提高作业】写 30 词英文反思：必修第二册 5 个单元中，哪个单元对你影响最大？为什么？【参考答案——教师用】反思示例：Unit 3 The Internet influenced me the most because it made me think about how technology can be a force for good — Jan's story of using the Internet to overcome loneliness inspired me to start a study group online.","reflection":"✅ 亮点：朗读测试让学生亲身体验\"演讲稿是写来读的\"——很多句子一读就发现问题。⚠️ 需改进：少数学生还是写了\"That's all\"，说明之前的强调仍不够——也许在评分标准中直接扣分会更有效。📌 下节课衔接：进入 Project，将本单元所学整合为\"音乐与人生\"展览，为必修第二册画上句号。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Writing · Music (P7)"},{"id":"l-eng-b2-u5-p","lessonId":"l-eng-b2-u5-p","book":"必修第二册","unitNumber":5,"unitTitle":"Music","lessonType":"project","lessonTypeName":"项目复习","lessonNumber":8,"periodNumber":8,"duration":40,"grade":"高一","subject":"英语","tags":["项目","复习","音乐","展览","人教版必修二U5","第八节课"],"textbookAnalysis":"本课为必修第二册 Unit 5 第八课时（Project），也是必修第二册的最终项目课。学生以 4 人小组为单位，整合本单元5种课型所学——听与说的音乐词汇+阅读的虚拟合唱团+语法的分词作状语+听与谈的音乐与情绪+写作的演讲稿——完成一份\"音乐与人生\"展览展板。综合考查语言能力（词汇/语法/写作/演讲）、思维品质（主题策划）和学习能力（合作分工）。作为 Book 2 收官之课，具有整合5个单元、展示整册学习成果的重要意义。","overview":"【学情分析】A班：能独立完成分工作品，但这个项目可以挑战\"展板+微型演讲\"的双产出。B班：group work 中需要更明确的模板和范例支持。共同问题：把音乐展板做成\"歌单海报\"——缺少\"音乐与人生\"的主题深度。","objectives":["语言能力：综合运用本单元词汇、分词作状语、音乐与情绪表达、演讲稿写作，以英文完成一份\"音乐与人生\"主题展览展板。","文化意识：通过展览形式展示音乐在不同文化、不同人生阶段中的角色。","思维品质：在4人小组中合理分工、有效协作，在\"选主题→策划→制作→展示\"中培养项目全流程管理思维。","学习能力：回顾本单元及整册书的学习内容，建立\"从课本知识到真实项目\"的迁移能力。"],"keyPoints":"① 展板四模块：Music & Identity（一首定义你的歌）→ Music & Emotion（音乐与情绪的科学/个人体验）→ Music & Connection（音乐如何连接人——引入 Virtual Choir 理念）→ Music & Future（音乐将如何继续影响你/世界）② 单元知识整合：音乐词汇/分词作状语/音乐推荐/演讲稿修辞 ③ 每组还需准备一段 1 分钟的\"展板导览演讲\"。","difficulties":"① 四模块的\"人生叙事感\"——从 identity→emotion→connection→future 要有一条成长线。② Music & Connection 模块最容易平淡——需要联系 Virtual Choir 的理念。③ 导览演讲的时间控制——1分钟很紧，只说亮点。","teachingMethods":"① PBL项目式学习：以音乐展为驱动问题。② 小组协作：角色分工+module checklist。③ 展览+导览演讲+最佳展板评选。","preparation":"【PPT课件】P1 单元回顾五课内容+整册书回顾（五单元思维导图）；P2 展板四模块结构；P3 角色分工卡；P4 范例参考；P5 评价量规；P6 自评表；P7 总结+Book 2 收官。【实物教具】A3白纸每组一张；彩笔/马克笔；角色分工卡 printed；Book 2 全册学习证书（可选，增加仪式感）。","process":[{"step":"Book 2 全册回顾","time":"6","content":"【PPT P1 全册思维导图】教师带学生回顾 Book 2 五个单元：U1 文化遗产保护（定语从句）→ U2 野生动物保护（进行时被动）→ U3 互联网改变生活（完成时被动）→ U4 历史与传统（过去分词作宾补）→ U5 音乐与人生（过去分词作状语）。教师：Today is our final project of Book 2 — let's make it unforgettable! 预设回答跟读回顾五单元主题。板书时机：左栏画五单元主题+语法链。差异化提示：B班看PPT读关键词；A班说出每单元最喜欢的课文+一句原因。易错点提醒：五个单元学了三类被动语态+两种分词用法——这些语法不是独立的知识点，而是一个\"英语如何表达动作与状态\"的完整系统。"},{"step":"任务布置+分工","time":"6","content":"【PPT P2 展板结构】【PPT P3 角色卡】教师展示四模块：①Music & Identity — What song defines YOU? ②Music & Emotion — How does music affect your feelings? (science+personal) ③Music & Connection — How does music bring people together? (connect to Virtual Choir!) ④Music & Future — How will music continue to shape your life/world? 角色：Identity Writer / Emotion Researcher / Connection Designer / Future Visionary。教师：Choose what story your board will tell! 预设回答：We want to show how music changes from childhood to adulthood — the songs that define us at different ages. 板书时机：留模块结构和角色。差异化提示：B班给语言模板+主题建议；A班自由策划+要求有\"一条故事线\"串联四模块。易错点提醒：最好的展板不堆信息——它讲一个故事。四模块之间要有一条线串联（如\"从童年儿歌到青年摇滚——我的人生配乐\"）。"},{"step":"制作展板","time":"15","content":"【PPT P4 范例参考】【实物 A3纸】小组制作。教师巡视提醒：①全英文！②每模块至少3句完整句 ③至少2个过去分词作状语 ④至少1个 rhetorical question ⑤最后3分钟准备导览演讲。预设回答：（小组制作中）板书时机：无。差异化提示：B班给每模块句型开头+范例参考；A班独立完成+追求设计美感。易错点提醒：展板不是\"贴在墙上的PPT\"——留白、对齐、字体层次这些设计元素跟文字同样重要。标题是读者最先看到的，必须最大最突出。"},{"step":"导览演讲+评价","time":"10","content":"【PPT P5 量规】每组 1 分钟导览演讲——假装全班是展览参观者，你是策展人。全班投票：最佳主题策划/最佳设计/最佳导览演讲/最打动人的展板。教师：You are the curator — take us through your exhibition! 预设回答展示。板书时机：记录投票结果。差异化提示：B班可看展板导览；A班尽量脱稿+用手指展板引导观众视线。易错点提醒：导览演讲 ≠ 读展板上的字——说展板上没有的故事。\"We chose this theme because...\" \"The most surprising thing we learned was...\""},{"step":"Book 2 收官+自评","time":"3","content":"【PPT P7 总结+收官】教师宣布最佳展板。学生完成 Book 2 最终自评：①必修第二册我最大的进步是？②我还需要加强的是？③暑假/下学期我的英语学习目标是？教师：Congratulations on completing Book 2! You've come a long way. 预设回答：My biggest progress is that I can now use passive voice in different tenses. / I want to improve my speaking fluency over the summer. 板书时机：写 Best Board 的主题名+导览金句。差异化提示：B班中文写；A班英文写。易错点提醒：学完一册书的标志不是你做了多少题——而是你能不能用这册书学到的语言，讲一个你自己的故事。今天的展板就是你的答案。"}],"blackboard":"┌─ U5 Project: Music & Life Exhibition ──┐\n│ 🎵 Music Journey:                        │\n│  ① Music & Identity (your song)         │\n│  ② Music & Emotion (science+personal)   │\n│  ③ Music & Connection (Virtual Choir!)  │\n│  ④ Music & Future (your vision)         │\n│                                          │\n│ 👥 Roles: Identity Writer / Emotion      │\n│    Researcher / Connection Designer /    │\n│    Future Visionary                      │\n│                                          │\n│ ⭐ Must: ≥2 V-ed as adverbial            │\n│    ≥1 rhetorical question               │\n│    1-min curator tour speech            │\n│                                          │\n│ 🏆 Book 2 Complete! 🏆                   │\n│  U1 Heritage → U2 Wildlife → U3 Net     │\n│  → U4 History → U5 Music                │\n└──────────────────────────────────────────┘","exercises":"【基础作业】完成小组展板，拍照片提交。写 40 词英文 Book 2 学习反思：最大收获+暑假英语计划。【提高作业】暑假挑战：用英文写 3 篇日记，每篇用本册书一个单元的语法点（定语从句/被动语态/分词）。【参考答案——教师用】反思示例：My biggest takeaway from Book 2 is the past participle as adverbial — \"Moved by the music, I started singing.\" Now I can write more elegantly. Over the summer, I plan to read one English article every day and collect 5 good sentences. My goal for next semester: speak English in class every day, even if just one sentence.","reflection":"✅ 亮点：作为 Book 2 收官课，\"五单元主题链+语法系统化\"回顾让学生看到完整的学习图景，展板产出质量高。⚠️ 需改进：1分钟导览时间太紧，下次可给 2 分钟。📌 学期衔接：暑期建议——每天 10 分钟英语听力/1 篇英语阅读，保持语感。期待必修第三册再见！","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Project · Music (P8)"},{"id":"l-eng-b3-u1-ls","lessonId":"l-eng-b3-u1-ls","book":"必修第三册","unitNumber":1,"unitTitle":"Festivals and Celebrations","lessonType":"listening-speaking","lessonTypeName":"听与说","lessonNumber":1,"periodNumber":1,"duration":40,"grade":"高一","subject":"英语","tags":["听与说","节日","庆祝","人教版必修三U1","第一节课"],"textbookAnalysis":"本课为必修第三册 Unit 1 Festivals and Celebrations 第一课时（Listening and Speaking），属单元导入+输入环节。听力材料为一段介绍世界各地节日（春节/感恩节/排灯节/亡灵节）的对话与独白，功能语境是\"描述节日及其庆祝方式\"。语言重点为节日词汇（festival, celebrate, harvest, origin, gratitude, gather, costume, parade）及描述节日句型（It is celebrated to... / People usually... / The festival features...）。为本单元 Reading 的\"节日精神内核\"议论文做词汇与话题预热。","overview":"【学情分析】A班：对春节/中秋等中国节日英文表达较熟，但 harvest/gratitude/origin 等抽象词较生。B班：对外国节日（排灯节/亡灵节）几乎无背景，听力抓细节弱。共同问题：描述节日停留在\"好吃好玩\"表层，缺乏\"节日的意义/精神\"表达。","objectives":["语言能力：听懂关于世界各地节日的听力材料，提取关键信息（名称/时间/活动/意义），准确使用 6-8 个节日核心词汇。","文化意识：了解中外节日的多样性，体会节日背后的感恩/纪念/团聚等共通精神。","思维品质：通过\"听前预测—听中验证—听后比较\"形成系统听力策略。","学习能力：能用 It is celebrated to... / People usually... 就节日做简短描述与对比。"],"keyPoints":"① 节日核心词汇：festival / celebrate / harvest / origin / gratitude / gather / costume / parade ② 描述句型：It is celebrated to... / People usually... / The festival features... ③ 听力微技能：听前读题支预测关键词、听中抓活动与时间。","difficulties":"① harvest（丰收）与 festival（节日）的拼写与发音区分。原因：词形相近。易错点提醒：harvest /hɑːvɪst/，festival /festɪvəl/。② gratitude（感恩）抽象名词，学生易与 great 混淆。③ 排灯节(Diwali)/亡灵节(Day of the Dead)背景陌生，听力时影响理解。","teachingMethods":"① 任务型（TBL）：以介绍一个节日为终任务。② 听前预测+听中填卡：信息卡脚手架。③ 对子互问操练描述句型。","preparation":"【PPT课件】P1 单元封面（Festivals and Celebrations）；P2 世界节日图片九宫格（春节/中秋/清明/感恩节/圣诞节/万圣节/排灯节/亡灵节/狂欢节）；P3-4 听力任务题；P5 描述句型板；P6 说话任务卡。【实物教具】节日信息卡 printed 每组一套；世界地图一张。【音频】听力两段音频（教材配套）。","process":[{"step":"导入激活","time":"5","content":"【PPT P2 九宫格】教师：Look at these nine festival pictures. Which ones are Chinese festivals? Can you name them in English? 预设回答：Spring Festival, Mid-Autumn Festival, Tomb-Sweeping Day! 板书时机：右侧板书 festival / celebrate / harvest。差异化提示：B班指图说中文再跟读英文；A班用 I can see... 造句。易错点提醒：harvest /hɑːvɪst/ 的 a 发 /ɑː/ 不发 /æ/。"},{"step":"词汇输入","time":"8","content":"【PPT P3 词卡】教师领读 festival / celebrate / harvest / origin / gratitude / gather / costume / parade。教师：Why do people celebrate the Spring Festival? 预设回答：To gather with family and welcome the new year. 板书时机：左栏板书词+短注释。差异化提示：B班配图记忆+词性标注；A班用词造句。易错点提醒：gratitude /ɡrætɪtjuːd/ — 与 great 完全无关，词根 grat 表\"感激\"。"},{"step":"听前预测","time":"5","content":"【PPT P4 题支】教师：We will listen to an introduction about Diwali and Day of the Dead. Predict: What will be mentioned? (time / activities / food / meaning) 预设回答：Time and activities! 板书时机：预测词写在黑板中部。差异化提示：B班给中文提示词；A班用英文说预测理由。易错点提醒：听力常见陷阱 — 信息会先给错误再修正。\"in October\" 可能被后面\"actually in November\"推翻。"},{"step":"听中填卡","time":"10","content":"【PPT P5 表格】【音频 段一】播放听力，学生填信息卡（节日/时间/活动/意义）。教师：When is Diwali? What do people do? 预设回答：In autumn. People light lamps and celebrate light over darkness. 板书时机：核对答案时填表于黑板中部。差异化提示：B班听两遍只填名称+时间；A班一遍填全。易错点提醒：darkness /dɑːknəs/ — 与 darkness 拼写一致但注意 -ness 后缀。"},{"step":"句型操练","time":"7","content":"【PPT P5 句型板】教师：How to describe a festival? It is celebrated to... / People usually... / The festival features... 教师示范后用春节信息造句。预设回答：The Spring Festival is celebrated to welcome the new year. People usually gather and have a big dinner. 板书时机：句型板书于中央。差异化提示：B班套用模板；A班替换节日名+活动细节。易错点提醒：celebrate 后直接接节日名 — celebrate the Spring Festival，不加 to 或 for。"},{"step":"说话任务","time":"5","content":"【PPT P6 任务卡】学生两人一组，从信息卡中选一个节日互介。教师：Introduce a festival to your partner. Use the sentence patterns. 预设回答：I want to introduce the Day of the Dead. It is celebrated to remember ancestors. People usually dress in costumes and parade. 板书时机：无。差异化提示：B班用填空式对话卡；A班自由描述并追问理由。易错点提醒：parade /pəreɪd/ 重音在第二音节，不是第一音节。"}],"blackboard":"┌─ U1 Listening & Speaking ──────┐\n│ festival / celebrate / harvest    │\n│ origin / gratitude / gather       │\n│ costume / parade / darkness       │\n│                                   │\n│ It is celebrated to...            │\n│ People usually...                 │\n│ The festival features...          │\n│                                   │\n│ Festival Info Card:               │\n│  Diwali | autumn | lamps | light  │\n│  Day of Dead | Nov | costume|para │\n└───────────────────────────────────┘","exercises":"【基础作业】1. 听录音跟读听力文本 2 遍，圈出所有节日词汇。2. 用 It is celebrated to... 写 3 句节日描述。【提高作业】用英文写一段 50 词介绍：介绍一个你了解的节日（中外均可），包含名称/时间/至少 2 点活动/1 点意义。【参考答案——教师用】基础2示例：The Spring Festival is celebrated to welcome the new year. / The Mid-Autumn Festival is celebrated to gather with family. / Thanksgiving is celebrated to express gratitude for the harvest.","reflection":"✅ 亮点：九宫格激活+信息卡脚手架有效降听力焦虑，B班填卡完成率高。⚠️ 需改进：gratitude 发音仍有困难，下节需强化。📌 下节课衔接：进入阅读 WHY DO WE CELEBRATE FESTIVALS?，从节日现象延伸到精神本质。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Listening & Speaking · Festivals and Celebrations (P1)"},{"id":"l-eng-b3-u1-r1","lessonId":"l-eng-b3-u1-r1","book":"必修第三册","unitNumber":1,"unitTitle":"Festivals and Celebrations","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":2,"periodNumber":2,"duration":40,"grade":"高一","subject":"英语","tags":["阅读","节日","议论文","节日精神","人教版必修三U1","第二节课"],"textbookAnalysis":"本课为必修第三册 Unit 1 第二课时（Reading I），语篇 WHY DO WE CELEBRATE FESTIVALS? 是一篇\"现象—本质\"型议论文，探讨世界各地节日背后的共同精神——丰收感恩、纪念先人、家庭团聚、迎接新年，并指出节日日趋商业化但核心精神未变。结构为现象引入→分类举例→本质归纳→商业化转折→精神升华。语言重点为议论文衔接词（however, after all, no matter how）与节日主题词汇（harvest, gratitude, origin, commercial, figure, gather）。承接第一课时词汇，本课语篇中出现 -ing 形式作定语与状语。","overview":"【学情分析】A班：能快速把握段落主旨，但对\"现象→本质\"的归纳思维训练不足。B班：对排灯节/亡灵节等外国节日背景知识少，需图片+视频脚手架。共同问题：议论文的\"分类举例→本质归纳\"结构感知不清晰，易忽略 however/no matter how 等转折标志词。","objectives":["语言能力：读懂\"现象—本质\"型议论文，提取节日的四类精神内核及文中例证；掌握 8-10 个论述类核心词汇。","文化意识：理解中外节日虽形式各异却共享感恩/纪念/团聚/希望的精神，增强文化自信与包容。","思维品质：通过\"分类举例→本质归纳\"分析培养议论文结构思维与抽象概括能力。","学习能力：能用四类精神内核表格+主旨句复述文章主线。"],"keyPoints":"① 议论文结构：phenomena → categories (harvest/ancestors/reunion/new year) → unity → commercial turn → spirit ② 衔接词：however / after all / no matter how / no matter who ③ 核心短语：range from... to... / have... in common / after all","difficulties":"① commercial / commercialised 的情感色彩——学生易误判为纯贬义，实际课文客观指出趋势。原因：母语\"商业化\"常含贬义。② no matter how/who/what 让步状语从句与 however/whoever/whatever 的转换。③ 从\"读节日现象\"到\"写一句本质定义\"的抽象概括。","teachingMethods":"① 分类阅读：按四类精神内核分组读段。② 主旨句定位法：每段首尾句抓核心。③ 问题链追问：训练批判性思维。","preparation":"【PPT课件】P1 各国节日拼图；P2 四类精神内核框架图；P3-4 文本结构时间线；P5 议论文结构图；P6 词汇对比表；P7 总结回顾。【实物教具】四类精神内核空白工作单 printed 每人一份；段落拼图卡。","process":[{"step":"导入设问","time":"5","content":"【PPT P1 节日拼图】教师：We celebrated many festivals. But have you ever thought — why do we celebrate? What is the deepest reason? 预设回答：To have fun? / To remember family? / To give thanks? 板书时机：板书 Why? + 四个问号。差异化提示：B班中文猜；A班英文猜并给理由。易错点提醒：deepest reason 不是\"最深的原因\"而是\"最根本的理由\"——deepest 表程度。"},{"step":"快速阅读抓主干","time":"8","content":"【PPT P3 结构线】教师：Read fast (3 min). Find: ① How many categories of festivals? ② What is the common spirit? ③ Does the author mention any change? 预设回答：① Four categories. ② Gratitude, love, hope. ③ Yes, festivals are more commercial now. 板书时机：填四类精神内核框架。差异化提示：B班给四选一选项；A班写完整句。易错点提醒：origin /ɒrɪdʒɪn/ — o 发 /ɒ/ 不发 /əʊ/。"},{"step":"精读段落1-3 分类举例","time":"10","content":"【PPT P4 四类表】教师精讲：range from... to... = 范围从…到…；have... in common = 有共同点。教师：What are the four categories? Give an example for each. 预设回答：Harvest — Thanksgiving. Ancestors — Day of the Dead. Reunion — Spring Festival. New year — New Year's Day. 板书时机：左侧栏补充\"range from / have in common / gratitude\"。差异化提示：B班读后填关键词；A班读后用自己话解释。易错点提醒：common 作名词\"共同点\"，作形容词\"普通的\"——语境区分。"},{"step":"精读段落4-5 本质与转折","time":"10","content":"【PPT P5 结构图】教师：What is the common spirit? And what change does the author mention? 预设回答：The spirit is about gratitude, love and hope. But festivals are becoming commercial. 板书时机：右侧画\"unity→commercial turn→spirit\"箭头图。差异化提示：B班连线匹配；A班写完整句。易错点提醒：commercial 在文中是客观描述不是批评——作者认为核心精神未变。"},{"step":"归纳意义","time":"4","content":"【PPT P6 议论文结构】教师：What can we learn? (Festivals reflect who we are. / The spirit matters more than the form.) 预设回答：Festivals are about who we are. The commercial part doesn't change the spirit. 板书时机：圈出结构关键词。差异化提示：B班跟读关键词；A班用自己的话总结。易错点提醒：reflect /rɪflekt/ — re- 前缀\"回\"，flect 词根\"弯曲\"=反射。"},{"step":"小结","time":"3","content":"【PPT P7 总结回顾】教师带学生回顾\"现象→分类→本质→转折→精神\"结构+核心词汇。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述。易错点提醒：commercial /kəmɜːʃəl/ — 不是 /kəmɔːʃəl/。"}],"blackboard":"┌─ U1 Reading I: WHY DO WE CELEBRATE? ────┐\n│ PHENOMENA → CATEGORIES → UNITY → TURN   │\n│                                          │\n│ 4 spirits: Harvest / Ancestors /         │\n│            Reunion / New Year            │\n│ Common: gratitude, love, hope            │\n│                                          │\n│ range from... to... / have in common     │\n│ after all / no matter how                │\n│ commercial → but spirit unchanged        │\n└──────────────────────────────────────────┘","exercises":"【基础作业】1. 朗读课文第2-3段 2 遍，圈出所有转折词（however/after all/no matter）。2. 用四类精神内核各写1句节日例证。【提高作业】用 80 词左右写一段：你认为节日的商业化是否削弱了其精神？为什么？（用 commercial / spirit / after all）【参考答案——教师用】基础2示例：Harvest festivals like Thanksgiving celebrate the gathering of crops. / Ancestor festivals like the Day of the Dead remember those who passed away. / Reunion festivals like the Spring Festival bring families together. / New year festivals welcome a fresh beginning.","reflection":"✅ 亮点：四类精神内核框架有效组织信息，B班完成率高。⚠️ 需改进：commercial 的情感色彩学生仍感困惑，精读课需澄清。📌 下节课衔接：进入精读语言+-ing 形式在语篇中的功能分析。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Reading and Thinking · Festivals and Celebrations (P2)"},{"id":"l-eng-b3-u1-r2","lessonId":"l-eng-b3-u1-r2","book":"必修第三册","unitNumber":1,"unitTitle":"Festivals and Celebrations","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":3,"periodNumber":3,"duration":40,"grade":"高一","subject":"英语","tags":["阅读","精读","-ing形式","节日","人教版必修三U1","第三节课"],"textbookAnalysis":"本课为必修第三册 Unit 1 第三课时（Reading II），聚焦语篇 WHY DO WE CELEBRATE FESTIVALS? 的精读与语言分析。重点分析文中 -ing 形式作定语（a crying baby, the singing children）和作状语（Walking in the park, I saw... / Celebrating together, families...）在议论文中的功能——使语言更简洁生动、表达伴随或原因。同时深化语篇中高频学术词汇的用法辨析（origin / figure / range / gather / commercial）。","overview":"【学情分析】A班：能识别 -ing 形式，但辨析其作定语还是状语仍有困难。B班：-ing 概念感模糊，需大量语境例句支撑。共同问题：阅读中见到 -ing 结构会跳过不分析其功能——学生把 -ing 当\"现在进行时一部分\"而非\"独立语法工具\"。","objectives":["语言能力：能在课文语境中识别并分析至少 5 个 -ing 形式作定语或状语的用法，准确辨析功能。","文化意识：通过 -ing 形式体会英语如何用简洁结构表达伴随与原因——不同于中文的习惯。","思维品质：分析 -ing 形式在议论文中的\"信息压缩\"功能，培养语法服务于意义的意识。","学习能力：建立\"从读到写\"的语料库——积累课文中的优质 -ing 句型用于后续写作。"],"keyPoints":"① 语篇中 -ing 作定语（前置 a crying baby / 后置 the children singing）与作状语（Walking..., I saw / Celebrating..., we...） ② 议论文高频动词：origin / figure / range / gather / commercial ③ -ing 形式在议论文中的修辞功能：简洁生动→增强感染力","difficulties":"① -ing 作定语 vs 作状语的辨析。原因：形同功不同，需看句法位置。② figure（人物/数字/认为）多义词在文中的含义。③ origin（起源）与 original（原始的）的词性转换 — 学生易混淆拼写。","teachingMethods":"① 标注法：圈出文中所有 -ing 结构并分析功能。② 替换练习：改写从句为 -ing 状语。③ 语料卡记录：分类摘录优质句子。","preparation":"【PPT课件】P1-2 课文中圈出的 -ing 示例；P3 定语vs状语对比表；P4 语料卡模板；P5 词汇辨析表；P6 句型改写练习；P7 总结回顾。【实物教具】课文复印件 printed 每人一份；高亮笔。","process":[{"step":"课文回顾","time":"5","content":"【PPT P1
