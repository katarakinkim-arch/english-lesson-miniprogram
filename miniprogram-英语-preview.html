<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>英语教案小程序 · 预览</title>
<style>
  :root{ --brand:#1a365d; --brand2:#2a4a7d; --bg:#f3f5f9; --txt:#1f2430; --sub:#6b7280; --line:#e6e9f0; --chip:#eef2f8; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; background:#dfe3ea; color:var(--txt); }
  .phone{ max-width:390px; margin:24px auto; background:var(--bg); border-radius:38px; overflow:hidden; box-shadow:0 20px 60px rgba(20,30,60,.25); position:relative; min-height:844px; display:flex; flex-direction:column; }
  .statusbar{ height:44px; background:var(--brand); display:flex; align-items:center; justify-content:space-between; padding:0 22px; color:#fff; font-size:14px; font-weight:600; }
  .statusbar .icons{ letter-spacing:2px; }
  .navbar{ height:46px; background:var(--brand); color:#fff; display:flex; align-items:center; justify-content:center; position:relative; font-size:17px; font-weight:600; }
  .navbar .back{ position:absolute; left:14px; font-size:22px; line-height:1; cursor:pointer; pointer-events:auto; }
  .content{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px; }
  .content::-webkit-scrollbar{ width:0; }
  .tabbar{ height:60px; background:#fff; border-top:1px solid var(--line); display:flex; flex-shrink:0; position:relative; z-index:20; }
  .tab{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#9aa1ad; font-size:11px; gap:3px; cursor:pointer; -webkit-user-select:none; user-select:none; }
  .tab .ico{ font-size:21px; }
  .tab.on{ color:var(--brand); }
  .search{ background:#fff; border-radius:14px; padding:11px 14px; display:flex; align-items:center; gap:8px; color:var(--sub); font-size:14px; box-shadow:0 2px 10px rgba(20,40,80,.05); }
  .search .sin{ flex:1; border:none; background:transparent; outline:none; font-size:14px; color:var(--txt); min-width:0; }
  .search .searchx{ color:#aab; font-size:16px; cursor:pointer; padding:0 2px; }
  .chips{ display:flex; gap:8px; margin:12px 0; flex-wrap:wrap; }
  .chip{ background:var(--chip); color:var(--sub); font-size:13px; padding:7px 14px; border-radius:20px; cursor:pointer; white-space:nowrap; }
  .chip.on{ background:var(--brand); color:#fff; }
  .card{ background:#fff; border-radius:16px; padding:16px; margin-bottom:10px; box-shadow:0 2px 10px rgba(20,40,80,.05); cursor:pointer; transition:transform .15s; display:flex; align-items:center; }
  .card:active{ transform:scale(.98); }
  .card .row1{ display:flex; gap:12px; align-items:center; width:100%; }
  .card .docico{ width:44px; height:44px; border-radius:12px; background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .card .ttl{ font-size:14.5px; font-weight:600; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card .sub{ font-size:12px; color:#8a90a0; margin-top:4px; line-height:1.3; }
  .card-arrow{ font-size:24px; color:#d0d4dc; flex-shrink:0; }
  .empty{ text-align:center; color:var(--sub); padding:60px 20px; }
  .empty .e{ font-size:54px; }
  .empty .t{ margin-top:12px; font-size:15px; }
  .empty .p{ margin-top:6px; font-size:12px; color:#b3b8c4; }
  .unit-group{ margin-top:12px; }
  .unit-head{ display:flex; align-items:baseline; gap:8px; padding:12px 2px 8px; position:sticky; top:0; background:var(--bg); z-index:5; }
  .unit-no{ font-size:12px; font-weight:700; color:#fff; background:var(--brand); padding:3px 9px; border-radius:6px; flex-shrink:0; }
  .unit-name{ font-size:15px; font-weight:600; color:var(--txt); }
  .hero{ margin:-14px -14px 14px; padding:26px 18px 20px; background:linear-gradient(160deg,var(--brand),var(--brand2)); color:#fff; border-radius:0 0 22px 22px; }
  .hero .badges2{ display:flex; gap:8px; margin-bottom:14px; }
  .hero .badge2{ font-size:12px; padding:4px 11px; border-radius:9px; background:rgba(255,255,255,.18); }
  .hero h1{ font-size:20px; margin:0 0 8px; line-height:1.35; }
  .hero .hsub{ font-size:13px; opacity:.85; }
  .hero .hstat{ font-size:12px; opacity:.8; margin-top:12px; }
  .sec{ background:#fff; border-radius:16px; padding:16px; margin-bottom:12px; box-shadow:0 2px 10px rgba(20,40,80,.05); }
  .sec h3{ margin:0 0 12px; font-size:15px; display:flex; align-items:center; gap:8px; color:var(--brand); }
  .sec .scopy{ margin-left:auto; font-size:11px; color:var(--brand); background:var(--chip); border-radius:8px; padding:3px 9px; cursor:pointer; flex-shrink:0; }
  .sno{ flex-shrink:0; width:24px; height:24px; line-height:24px; text-align:center; background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; border-radius:50%; font-size:13px; font-weight:700; }
  .sno.sm{ width:20px; height:20px; line-height:20px; font-size:12px; }
  .sec p{ margin:0; font-size:13px; line-height:1.7; color:#3a4150; white-space:pre-wrap; word-break:break-word; }
  .sec ul{ margin:0; padding-left:18px; }
  .sec li{ font-size:13px; line-height:1.7; color:#3a4150; margin-bottom:4px; }
  .step{ background:#f7f9fc; border-left:4px solid var(--brand2); border-radius:12px; padding:10px 12px; margin-bottom:12px; }
  .step .sn{ font-size:13px; font-weight:600; color:var(--brand); display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
  .step .st{ font-size:11px; color:#fff; background:var(--brand2); border-radius:7px; padding:1px 8px; margin-left:4px; }
  .step p{ margin:6px 0 0; font-size:12.5px; line-height:1.6; color:#444; white-space:pre-wrap; word-break:break-word; }
  .sc-text{ font-size:12.5px; line-height:1.7; color:#374151; margin:5px 0; white-space:pre-wrap; word-break:break-word; }
  .sc-block{ margin:7px 0; border-radius:10px; padding:8px 10px; font-size:12.5px; line-height:1.65; }
  .sc-tag{ display:inline-block; font-weight:700; font-size:11.5px; margin-bottom:3px; }
  .sc-bd{ white-space:pre-wrap; word-break:break-word; }
  .sc-ppt{ background:#eff6ff; border-left:3px solid #2563eb; }
  .sc-ppt .sc-tag{ color:#1e40af; }
  .sc-audio{ background:#ecfeff; border-left:3px solid #0891b2; }
  .sc-audio .sc-tag{ color:#0e7490; }
  .sc-teacher{ background:#fef2f2; border-left:3px solid #dc2626; }
  .sc-teacher .sc-tag{ color:#991b1b; }
  .sc-ans{ background:#f0fdf4; border-left:3px solid #16a34a; }
  .sc-ans .sc-tag{ color:#166534; }
  .sc-board{ background:#fefce8; border-left:3px solid #ca8a04; }
  .sc-board .sc-tag{ color:#854d0e; }
  .sc-diff{ background:#f5f3ff; border-left:3px solid #7c3aed; }
  .sc-diff .sc-tag{ color:#5b21b6; }
  .sc-warn{ background:#fff7ed; border-left:3px solid #ea580c; }
  .sc-warn .sc-tag{ color:#9a3412; }
  .ex-block{ margin:10px 0; border-radius:12px; overflow:hidden; border:1px solid #eef2f7; }
  .ex-h{ font-size:13px; font-weight:700; padding:8px 12px; color:#fff; }
  .ex-bd{ padding:10px 12px; font-size:13px; line-height:1.8; white-space:pre-wrap; word-break:break-word; color:#334155; }
  .ex-basic .ex-h{ background:#3b82f6; }
  .ex-basic .ex-bd{ background:#eff6ff; }
  .ex-adv .ex-h{ background:#8b5cf6; }
  .ex-adv .ex-bd{ background:#f5f3ff; }
  .ex-key .ex-h{ background:#22c55e; }
  .ex-key .ex-bd{ background:#f0fdf4; }

  .dlbar{ position:sticky; bottom:0; background:#fff; border-top:1px solid var(--line); padding:10px 12px; display:flex; align-items:center; gap:8px; z-index:5; }
  .dlbar .fmts{ display:flex; gap:5px; }
  .dlbar .fmt{ font-size:12px; padding:7px 9px; border-radius:10px; background:var(--chip); color:var(--sub); cursor:pointer; }
  .dlbar .fmt.on{ background:var(--brand); color:#fff; }
  .dlbar .btn{ flex:1; background:var(--brand); color:#fff; text-align:center; padding:13px 0; border-radius:13px; font-size:15px; font-weight:600; cursor:pointer; }
  .dlbar .fav{ font-size:24px; color:var(--brand); cursor:pointer; padding:0 6px; }
  .phead{ background:linear-gradient(160deg,var(--brand),var(--brand2)); border-radius:18px; padding:24px 18px; color:#fff; display:flex; align-items:center; gap:16px; margin-bottom:14px; }
  .pavatar{ width:62px; height:62px; border-radius:50%; background:rgba(255,255,255,.25); display:flex; align-items:center; justify-content:center; font-size:30px; overflow:hidden; border:2px solid rgba(255,255,255,.5); flex-shrink:0; }
  .pavatar img{ width:100%; height:100%; object-fit:cover; }
  .pname{ font-size:18px; font-weight:600; }
  .psub{ font-size:12px; opacity:.8; margin-top:4px; }
  .stats3{ display:flex; gap:10px; margin-bottom:14px; }
  .stat{ flex:1; background:#fff; border-radius:14px; padding:14px; text-align:center; box-shadow:0 2px 10px rgba(20,40,80,.05); }
  .stat .num{ font-size:22px; font-weight:700; color:var(--brand); }
  .stat .lbl{ font-size:12px; color:var(--sub); margin-top:4px; }
  .block{ background:#fff; border-radius:16px; padding:16px; margin-bottom:12px; box-shadow:0 2px 10px rgba(20,40,80,.05); }
  .block h3{ margin:0 0 12px; font-size:15px; display:flex; justify-content:space-between; align-items:center; }
  .block .clear{ font-size:12px; color:#c0392b; cursor:pointer; }
  .favitem{ display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line); cursor:pointer; }
  .favitem:last-child{ border-bottom:none; }
  .favitem .fi{ width:34px; height:34px; border-radius:9px; background:var(--chip); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .favitem .ft{ font-size:13px; }
  .glabel{ font-size:12px; color:#888; padding:16px 4px 8px; display:flex; justify-content:space-between; }
  .glabel .clr{ color:#c0392b; cursor:pointer; }
  .toast{ position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,.78); color:#fff; padding:12px 22px; border-radius:12px; font-size:14px; z-index:999; opacity:0; transition:opacity .25s; pointer-events:none; }
  .toast.show{ opacity:1; }
  .hint{ text-align:center; font-size:11px; color:#aab; padding:10px 0 4px; }
  .block p.rp{ margin:8px 0 0; font-size:13px; line-height:1.7; color:#3a4150; }
  .tip{ font-size:11px; color:#aab; text-align:center; margin-top:14px; line-height:1.6; }
</style>

<script>
// ===== 数据（JSON安全嵌入）=====
const LESSONS = [{"id":"l-eng-b1-u1-ls","lessonId":"l-eng-b1-u1-ls","title":"Listening and Speaking: Senior High Life & School Clubs","book":"必修第一册","unitNumber":1,"unitTitle":"Teenage Life","lessonType":"listening-speaking","lessonTypeName":"听与说","lessonNumber":1,"periodNumber":1,"duration":40,"grade":"高一","subject":"英语","tags":["听与说","校园生活","社团","人教版必修一U1","第一节课"],"textbookAnalysis":"本课为必修第一册 Unit 1 Teenage Life 第一课时（Listening and Speaking），属单元「导入+输入」环节。语篇为一段新生校园对话与一段社团招新广播，功能语境是「初入高中、认识校园、选择社团」。语言重点为校园设施与社团名称词汇（registration, campus, club, debate, volunteer...）及表达喜好意愿的句型（I'd like to... / I'm interested in...）。承接初中已学的 like doing / there be，为后续 Reading 的「高中生活」主题做词汇与话题预热。","overview":"【学情分析】A班：初中基础较好，能听懂慢速对话、主动表达意愿；但社团类词汇（volunteer, literature, herb）较生。B班：听力抓取关键信息能力弱、开口意愿低，需用图片与题支降低焦虑。共同问题：缺乏「自然表达加入社团意愿」的句型储备；易把 club 与 class 混淆。","objectives":["语言能力：听懂新生校园对话与社团广播的主旨与关键细节（社团名、活动时间），准确说出 6-8 个校园/社团词汇。","文化意识：了解中外高中社团文化异同，体会社团活动对青少年成长的积极意义。","思维品质：在听力中通过「听前读题支预测—听中验证」形成基本听力策略。","学习能力：能用 I'd prefer... / I'm keen on... 就社团选择做简短配对访谈，并记录同伴偏好。"],"keyPoints":"① 核心词汇：registration, campus, club, debate, volunteer, literature, herb, prefer\n② 功能句型：I'd like to join... / I'm interested in... / Which club do you recommend?\n③ 听力策略：听前读题支预测，听中抓关键词（社团名+时间）。","difficulties":"① 易混词：club（社团）vs class（班级）；volunteer 动名同形。原因：中文无对应区分，需用例句固化。\n② 长句听写困难：广播语速快、信息密。原因：B班听觉工作记忆有限，需分层任务（先抓社团名再补细节）。\n③ 口语冷场：怕说错。原因：缺乏句式支架，需提供句型菜单降低焦虑。","teachingMethods":"① 任务型教学（TBL）：以「为新生办社团博览会」为终任务驱动。\n② 听前预测+听中验证：用题支作脚手架。\n③ 小组合作（Pair work + Group survey）：降低个体开口压力。\n④ 图片/实物支架：社团图标卡辅助词汇输入。","preparation":"【PPT课件】P1 单元封面；P2 校园地图（library/canteen/gym）；P3-6 八大社团图标+名称；P7 听力题支；P8 句型菜单；P9 小组任务单。\n【实物教具】社团图标卡 8 张（背面写名称，用于配对游戏）。\n【音频】教材 Listening 音频（校园对话+社团广播）两段。","process":[{"step":"Step 1 导入 Lead-in","time":"4分钟","content":"【PPT P2 校园地图】教师：「You are a freshman today. Where can you borrow books?」 预设回答：「Library!」 板书时机：地图旁板书 library / canteen / gym。差异化提示：B班先指图说中文再跟读；A班直接英文应答。易错点提醒：gym 读作 /dʒɪm/，注意 g 浊化。"},{"step":"Step 2 听前预测 Pre-listening","time":"5分钟","content":"【PPT P7 题支】教师：「A new student is choosing a club. Guess: which club will he join?」 让学生圈可能答案。预设回答：「Maybe the Science Club.」 板书时机：黑板左侧列预测词。差异化提示：基础弱的学生只圈社团名；A班需说预测理由（because he likes...）。易错点提醒：join 与 attend 区别 — join club/attend class，板书对比标搭配。"},{"step":"Step 3 听力1 对话 While-listening","time":"10分钟","content":"【PPT P8 听力题】【音频1】第一遍抓「去了哪个社团」（skimming）；第二遍填题支细节（社团+时间）。教师：「Listen for the club name and the day.」 板书时机：答案填于黑板社团矩阵。预设回答：「He joined the Radio Club on Friday.」 易错点提醒：Friday 易误听为 「free day」，强调 /fraɪ/。差异化提示：B班用表格只填社团名；A班填社团+时间+原因。"},{"step":"Step 4 听力2 广播 While-listening","time":"9分钟","content":"【PPT P9 听力题】【音频2 社团广播】任务：记录 3 个社团的名称与招新对象。教师：「Take notes: name + who can join.」 差异化提示：B班只填社团名；A班补填招新要求。预设回答：「Debate Club — for students who like arguing!」 板书时机：黑板中央列社团矩阵（名称|对象|时间）。易错点提醒：volunteer 名词「志愿者」、动词「自愿做」，板书对比两种用法。"},{"step":"Step 5 口语输出 Pair work","time":"8分钟","content":"【PPT P8 句型菜单】两人一组：A 扮新生、B 扮社长，用菜单句型完成「入社咨询」。教师示范：「—Which club do you recommend? —I'd recommend the Literature Club, it's...」 预设回答：「I'm keen on photography, so I'll join the Photo Club.」 板书时机：补充新词至社团矩阵。差异化提示：B班照读菜单；A班脱稿并追加理由。易错点提醒：recommend 后接名词或 doing，不接 to do。"},{"step":"Step 6 小结+作业 Summary","time":"4分钟","content":"【PPT P10 总结】带学生回顾黑板社团矩阵，总结「表达意愿三句型」。教师：「Can you name the three patterns?」 预设回答：「I would like to / I am interested in / I recommend!」 板书时机：彩色笔圈出三句型。差异化提示：B班看黑板回答；A班闭眼回忆。易错点提醒：下节课 Reading 会用到这些社团词，提醒复习。"}],"blackboard":"┌─ U1 Listening & Speaking ─┐\n│ Campus: lib / canteen / gym │\n│ Clubs (name | who)          │\n│  Radio — Fri / anyone       │\n│  Debate — lovers of argue   │\n│  Volunteer — helpers        │\n│ 表达意愿:                  │\n│  I'd like to join...        │\n│  I'm interested in...       │\n│  Which club recommend?      │\n└─────────────────────────────┘","exercises":"【基础作业】1. 听录音跟读听力文本 2 遍，圈出所有社团名称。2. 用 I'd like to... 写 3 句「我想加入的社团」。\n【提高作业】采访一位同学，记录他/她最想加入的社团及原因，下节课用 1 分钟英文汇报。\n【参考答案——教师用】基础2示例：I'd like to join the Photo Club. / I'm interested in the Volunteer Club. / I'd prefer the Literature Club. 提高作业评价：能说社团名+1个原因即满分；用 because / it helps me... 加分。","reflection":"✅ 亮点：社团图标卡+校园地图让词汇可触可感，B班开口率明显高于平时；听前预测有效降焦虑。\n⚠️ 需改进：听力2信息过密，部分B班生只抓到1个社团；下次应把广播拆成「先听名称、再听对象」两遍。\n📌 下节课衔接：Reading 课文主角 Adam 也面临「高中新生活」，可回扣本课社团词自然过渡。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T16:00:00Z"},{"id":"l-eng-b1-u1-r1","lessonId":"l-eng-b1-u1-r1","title":"Reading and Thinking: My First Day at Senior High (Ⅰ) — 整体理解","book":"必修第一册","unitNumber":1,"unitTitle":"Teenage Life","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":2,"periodNumber":2,"duration":45,"grade":"高一","subject":"英语","tags":["阅读","读与思","记叙文","情感变化","人教版必修一U1","第二节课"],"textbookAnalysis":"本课为 Unit 1 第二课时（Reading and Thinking Ⅰ），语篇是新生 Adam 的博客式记叙文，记录高中第一天从紧张到开心的变化。文本类型为第一人称叙事，含时间顺序与心理描写，是训练「略读抓主旨、扫读抓细节」的 ideal 素材。语言承载「senior, challenge, confident, explore」等单元核心词，并为写作课的人物描写埋下范式。","overview":"【学情分析】A班：能略读抓主旨，但易忽略作者情感线索。B班：长句（含定语从句）读不懂，易卡在逐词翻译。共同问题：把「找主旨」等同于「翻译每段第一句」；对 implied feeling（隐含情感）不敏感。","objectives":["语言能力：用略读获取博客主旨（Adam's first day），用扫读提取时间线与情感变化的关键信息。","文化意识：对比中外高中「第一天」的异同，理解「挑战即成长」的积极态度。","思维品质：梳理 Adam 情感变化弧线（nervous→happy），推断变化原因，培养逻辑梳理能力。","学习能力：借助「情感时间轴」图表自主梳理叙事结构，并复述课文要点。"],"keyPoints":"① 阅读技能：skimming 抓主旨 / scanning 抓细节（情感+事件）。\n② 核心词汇：senior, challenge, confident, explore, look forward to。\n③ 文本结构：时间顺序 + 情感变化双线。","difficulties":"① 长难句：「The teachers are very enthusiastic women called Ms Li...」 含过去分词作后置定语。原因：B班未建立「分词修饰名词」意识，需拆解。\n② 隐含情感推断：学生常只找 explicit（明确）词。原因：缺乏「从行为推情感」的训练，需示范。\n③ 主旨概括过宽/过窄。原因：未区分 main idea 与 detail，需给句式支架。","teachingMethods":"① PWP 阅读模式（Pre/While/Post）。\n② 图表支架：情感时间轴（Timeline）可视化结构。\n③ 合作学习：两人互述情感变化，降低复述焦虑。\n④ 追问式提问：用 Why do you think so? 逼出推断依据。","preparation":"【PPT课件】P1 课文标题+作者视角（blog）；P2 略读任务（选主旨）；P3 情感时间轴空表；P4 长难句拆解；P5 讨论题。\n【实物教具】情感时间轴工作单（每人一份，用于 While-reading 填写）。\n【音频】课文朗读音频（供跟读）。","process":[{"step":"Step 1 导入 Lead-in","time":"4分钟","content":"【PPT P1】教师：「Your first day of senior high — how did you feel?」 请 2 生用中文/英文说一个词。预设回答：「Nervous! / Excited!」 板书时机：黑板左侧写 nervous / excited / curious。差异化提示：B班说中文词，A班说英文形容词。易错点提醒：senior 指「高年级/高中」，不是「老的」。"},{"step":"Step 2 读前预测 Pre-reading","time":"4分钟","content":"【PPT P2 标题】教师：「A blog titled 'My First Day at Senior High'. What will it talk about?」 预设回答：「His feelings / what he did.」 板书时机：黑板中部写预测框架（feelings / activities）。差异化提示：A班用英语预测；B班用「√/×」选是否包含某内容。易错点提醒：blog 是叙事而非说明，提醒看文体。"},{"step":"Step 3 略读抓主旨 Skimming","time":"8分钟","content":"【PPT P5 主旨选择】教师：「Read fast (2 min). What is the main idea?」 给三选项。预设回答：「A — Adam's first-day experience and feelings.」 板书时机：确认主旨写黑板中央。差异化提示：B班先看每段首句再选；A班限时2分钟盲选后验证。易错点提醒：区分 main idea（整体）与 detail（某段）。"},{"step":"Step 4 扫读情感线 Scanning","time":"14分钟","content":"【PPT P6 时间轴】【工作单 时间轴】教师：「Find: when did he feel nervous? when happy? why?」 学生填轴。预设回答：「Nervous at start (new school); happy after making friends & good teachers.」 板书时机：黑板画 ↘↗ 情感弧线并标注原因。差异化提示：B班只需标两个情绪词；A班补「原因句」。易错点提醒：enthusiastic 形容老师「热情的」，别误读为「精力」。"},{"step":"Step 5 长难句拆解 Language focus","time":"9分钟","content":"【PPT P4】拆解 「The teachers are very enthusiastic women called Ms Li...」 教师：「called = who are called，修饰 women。」 预设回答：「Ms Li is an enthusiastic teacher.」 板书时机：黑板右下方写 「n. + called/ named + 名字」。差异化提示：B班仿写1句；A班用该结构描述自己老师。易错点提醒：called 过去分词表「被叫做」。"},{"step":"Step 6 复述+作业 Post-reading","time":"6分钟","content":"【PPT P9 情感弧线】两人一组用时间轴复述 Adam 的一天。教师巡视纠音。教师：「Use past tense! He felt nervous, then...」 预设回答：「He felt nervous, but later he became confident.」 板书时机：留下情感弧线供复述参考。差异化提示：B班给关键词连句；A班脱稿复述。易错点提醒：复述用过去时，提醒动词变化。"}],"blackboard":"┌─ My First Day @ Senior High ─┐\n│ Main: exp + feelings of D1  │\n│ Emotion arc:                │\n│  start: nervous (new)       │\n│   ↓ make friends            │\n│   ↓ good teachers           │\n│  end: happy / confident     │\n│ Key words:                 │\n│  senior / challenge         │\n│  confident / explore        │\n│  n. + called + name         │\n└──────────────────────────────┘","exercises":"【基础作业】1. 完成课本 Comprehension 第1题（判断Adam情感）。2. 抄写并背诵 senior/challenge/confident/explore 各2遍+1个例句。\n【提高作业】用「时间轴」写自己初中最后一天或高中第一天的 5 句话英文日记（用至少2个本课词汇）。\n【参考答案——教师用】基础1：T/F 判读依课文；提高作业评价：5句连贯、含情感变化、用对2词即满分；用 looked forward to 加分。","reflection":"✅ 亮点：情感时间轴把抽象「心理变化」变可视，B班也能说出变化原因；长难句拆解后 A班仿写质量高。\n⚠️ 需改进：Skimming 限时2分钟对B班偏紧，部分未读完；下次改为「先读首段+末段」再选主旨。\n📌 下节课衔接：下一节深入语言点（confident/explore 等），本课时间轴可作写作人物描写的雏形。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T16:00:00Z"},{"id":"l-eng-b1-u1-r2","lessonId":"l-eng-b1-u1-r2","title":"Reading and Thinking: My First Day at Senior High (Ⅱ) — 语言深度","book":"必修第一册","unitNumber":1,"unitTitle":"Teenage Life","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":3,"periodNumber":3,"duration":45,"grade":"高一","subject":"英语","tags":["阅读","语言点","词汇","人教版必修一U1","第三节课"],"textbookAnalysis":"本课为 Unit 1 第三课时（Reading and Thinking Ⅱ — Language Focus），在整体理解基础上聚焦语言内化。选取课文高频词与结构：senior, challenge, confident, enthusiastic, explore, look forward to, 及「n. + called/named」后置定语。目标是从「读懂」走向「能用」，为写作课输出人物描写储备语言。","overview":"【学情分析】A班：词汇接受快，但易「认识不会用」。B班：单词拼写与搭配易错（如 look forward to 后接 doing）。共同问题：把词汇当孤立中文对应；不知在写作中迁移。","objectives":["语言能力：在语境中准确理解并运用 senior/challenge/confident/enthusiastic/explore 及 look forward to doing。","文化意识：体会「挑战」在成长叙事中的正面价值（challenge as opportunity）。","思维品质：归纳「called/named」作后置定语的规律，并迁移到新语境。","学习能力：建立个人「易混词+搭配」清单，养成整理习惯。"],"keyPoints":"① 搭配：look forward to doing（to 是介词）；be confident about。\n② 构词：en- 前缀（enlarge/enrich）+ -ous（enthusiastic）。\n③ 结构：n. + called/named + 名字（后置定语）。","difficulties":"① look forward to 后接 doing 而非 to do。原因：受 to do 惯性干扰，需反复造句固化。\n② confident（ adj）vs confidence（n）词性混淆。原因：未建「词性—句位」对应，需给例句对比。\n③ called/named 分词属性不清。原因：中文「叫做」无分词概念，需译「who is called」助理解。","teachingMethods":"① 语境教学法：所有词回课文原句再迁移。\n② 归纳法：让学生自己发现 called/named 规律。\n③ 搭配操练：句型转换+翻译小步子。\n④ 清单法：建易混点个人清单。","preparation":"【PPT课件】P1 词汇云（本课6词）；P2 课文原句回顾；P3 look forward to 搭配阶梯；P4 called/named 归纳表；P5 翻译练习。\n【实物教具】「易混词清单」空表（每人一张）。","process":[{"step":"Step 1 复习回顾 Warm-up","time":"5分钟","content":"【PPT P2】快速闪回课文原句，让学生说出加粗词含义。预设回答：「senior = 高中；challenge = 挑战。」 板书时机：黑板左侧列6词。差异化提示：B班说中文；A班英文释义。易错点提醒：challenge 可作名/动，此处为名。"},{"step":"Step 2 搭配聚焦 look forward to","time":"12分钟","content":"【PPT P3 阶梯】教师：「I look forward to ___ (see) you.」 引导学生填 seeing。预设回答：「seeing — to 是介词！」 板书时机：黑板写 「look forward to + doing」 红笔标 to。差异化提示：B班先做「选词填空」；A班做「中译英」。易错点提醒：类似介词性 to 还有 be used to / prefer...to。"},{"step":"Step 3 归纳 called/named","time":"10分钟","content":"【PPT P4】给出3句（课文+新例句），让学生发现规律。预设回答：「都表示『被叫做』，修饰前面名词。」 教师归纳：「n. + called/named + 名字 = 后置定语。」 板书时机：黑板中写公式+2例。差异化提示：B班仿写1句；A班用该结构描写母校。易错点提醒：called 过去分词，表被动。"},{"step":"Step 4 构词小站 Word building","time":"8分钟","content":"【PPT P1 词汇云】拆 enthusiastic = en- + thusiast + -ic；confident = con- + fid + -ent。教师：「en- 使…；-ous 形容词。」 预设回答：「enrich = 使丰富。」 板书时机：黑板右写构词公式。差异化提示：A班拓展 enrich/enlarge；B班只记 enthusiastic。易错点提醒：enthusiastic 双写 s？不，thu-si-ast。"},{"step":"Step 5 产出+清单 Build & List","time":"10分钟","content":"【PPT P7 产出任务】用本课词写 3 句「介绍自己高中期待」。随后填「易混词清单」（confident/confidence, look forward to doing）。教师巡视。教师：「Write 3 sentences about your expectations.」 预设回答：「I am looking forward to making new friends.」 板书时机：留关键词供参考。差异化提示：B班照黑板词造句；A班独立写并用至少2个新词。易错点提醒：look forward to + doing，to 是介词不是不定式。"}],"blackboard":"┌─ Language Focus U1 ─┐\n│ 6 words:               │\n│  senior / challenge     │\n│  confident / explore    │\n│  enthusiastic / forward │\n│ look forward to + doing │\n│  (to = prep!)           │\n│ n. + called/named +名   │\n│ en- + thusiast + -ic    │\n│ 易混: confid(ent/ence)  │\n└─────────────────────────┘","exercises":"【基础作业】1. 用 look forward to doing 写 2 句；2. 用 called/named 结构写 1 句描述同学。\n【提高作业】用本课至少4个词写一段 60 词「我的高中期待」，下节课互评。\n【参考答案——教师用】基础1示例：I look forward to meeting my new teachers. 基础2：The boy called Tom is my deskmate. 提高评价：4词+连贯+无搭配错即满分。","reflection":"✅ 亮点：「to 是介词」用红笔+阶梯练习固化，当场造句正确率明显提升；called/named 让学生自己归纳，记忆深。\n⚠️ 需改进：构词部分B班跟不上 en- 规律，下节课前需补初中构词基础。\n📌 下节课衔接：语法课将系统讲短语，本课词汇可直接用作例句素材。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T16:00:00Z"},{"id":"l-eng-b1-u1-g","lessonId":"l-eng-b1-u1-g","title":"Discovering Useful Structures: Noun Phrases & Phrase Types","book":"必修第一册","unitNumber":1,"unitTitle":"Teenage Life","lessonType":"grammar","lessonTypeName":"语法","lessonNumber":4,"periodNumber":4,"duration":45,"grade":"高一","subject":"英语","tags":["语法","短语","名词短语","人教版必修一U1","第四节课"],"textbookAnalysis":"本课为 Unit 1 第四课时（Discovering Useful Structures），系统梳理短语类型：名词短语（NP）、形容词短语（AdjP）、副词短语（AdvP）。教材以课文句子为起点，引导学生发现「中心词+修饰语」的短语构造，为后续写作的句式丰富打基础。重点在名词短语（head noun + modifiers），形容词/副词短语作延伸。","overview":"【学情分析】A班：初中接触过「名词短语」但无术语；能模仿造句。B班：分不清短语与句子，易把「名词短语」当「句子成分」。共同问题：知道例子但不会自主判别类型；写作仍只用单词。","objectives":["语言能力：识别名词/形容词/副词短语，说出其中心词与修饰语；能在句中找出三类短语。","文化意识：（无显性文化点，渗透语言结构之美）。","思维品质：从具体例句中归纳「中心词+修饰语」的短语构造规律，发展形式观察力。","学习能力：在写作中有意识用短语替换单词，使表达更丰富准确。"],"keyPoints":"① 名词短语 = 限定词+修饰语+中心名词（a smart senior student）。\n② 形容词短语 = 形容词+补足成分（good at English）。\n③ 副词短语 = 副词+修饰语（quite confidently）。","difficulties":"① 判定中心词：长修饰语中找 head noun 易错。原因：中文修饰语前置、英文后置，语序反差，需多练。\n② 形容词vs副词短语混淆。原因：只看词性不看功能，需强调「修饰谁」。\n③ 写作迁移弱。原因：缺乏「单词→短语」替换练习，需给脚手架。","teachingMethods":"① 归纳法：从课文例句自己发现规律。\n② 对比法：单词 vs 短语的表达力对比。\n③ 句型转换操练：word → phrase 替换。\n④ 同伴互判：交换句子标短语类型。","preparation":"【PPT课件】P1 课文原句（含三类短语标注）；P2 短语结构公式；P3 判别口诀；P4 转换练习；P5 写作任务。\n【实物教具】「短语类型」判别卡（NP/AdjP/AdvP 三色）。","process":[{"step":"Step 1 发现 Discover","time":"10分钟","content":"【PPT P1】呈现课文三句，让学生圈出「成块的词」。预设回答：「a new student / very kind / quite well。」 教师：「这些『块』叫短语。」 板书时机：黑板左写三类示例。差异化提示：B班只圈；A班标类型。易错点提醒：短语不含主谓，不是句子。"},{"step":"Step 2 归纳 Generalize","time":"12分钟","content":"【PPT P2 公式】教师引导：「名词短语的中心是名词，前面有限定词/形容词。」 学生补全形容词/副词公式。预设回答：「AdjP 中心是形容词，AdvP 中心是副词。」 板书时机：黑板中写三公式。差异化提示：A班自写例句验证；B班抄公式+1例。易错点提醒：very kind 中 very 修饰 kind（副修饰形）。"},{"step":"Step 3 判别 Practice","time":"10分钟","content":"【PPT P4】给 6 个短语判类型，用三色卡举牌。教师：「Find the head word first!」 预设回答：「the confident boy → NP（boy是头）。」 板书时机：错例现场改。差异化提示：B班先说中心词；A班直接报类型。易错点提醒：a book on the desk 中心是 book 不是 desk。"},{"step":"Step 4 转换 Upgrade","time":"8分钟","content":"【PPT P5】把 「He is a student.」 升级为 「He is a confident senior student.」 教师示范单词→短语。预设回答：「加形容词和限定词。」 板书时机：黑板右写升级链。差异化提示：B班做1次升级；A班做2次并说明修饰语。易错点提醒：修饰语顺序 限定词→形→名。"},{"step":"Step 5 产出+作业 Produce","time":"5分钟","content":"【PPT P6 产出任务】用至少2类短语写3句描述同学。教师：「Describe 3 classmates using what we learned.」 预设回答：「Li Hua plays the guitar very well. / Zhang Wei is the boy whose hair is curly.」 板书时机：留公式供写时参考。差异化提示：B班给填空式句型；A班自由造句。易错点提醒：写后自判中心词——圈出名词短语和定语从句连接点。"}],"blackboard":"┌─ Phrases U1 ─┐\n│ NP: (det) adj N  │\n│  a confident boy  │\n│ AdjP: adj + compl │\n│  good at English  │\n│ AdvP: adv + mod   │\n│  quite confidently │\n│ 口诀:找中心词!   │\n└────────────────────┘","exercises":"【基础作业】1. 课本 Exercise 找出 5 个名词短语并标中心词。2. 把 「She is happy.」 升级为含形容词短语的句子。\n【提高作业】用三类短语各写 2 句描述「我的社团」，下节课互评类型。\n【参考答案——教师用】基础2示例：She is happy with her new club. 提高评价：三类各2句、中心词正确即满分；修饰语顺序错扣半分。","reflection":"✅ 亮点：「找中心词」口诀让B班也能判类型；单词→短语升级链直观体现表达力差异。\n⚠️ 需改进：AdjP/AdvP 对B班仍混，需下节课前用「修饰谁」再强化一次。\n📌 下节课衔接：听与谈将用到 be going to 短语，可回扣「短语」概念。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T16:00:00Z"},{"id":"l-eng-b1-u1-lt","lessonId":"l-eng-b1-u1-lt","title":"Listening and Talking: Plan a Camp","book":"必修第一册","unitNumber":1,"unitTitle":"Teenage Life","lessonType":"listening-talking","lessonTypeName":"听与谈","lessonNumber":5,"periodNumber":5,"duration":40,"grade":"高一","subject":"英语","tags":["听与谈","计划","建议","be going to","人教版必修一U1","第五节课"],"textbookAnalysis":"本课为 Unit 1 第五课时（Listening and Talking），话题「计划一次露营」。输入为一段规划对话，输出目标为用 be going to / will 谈未来计划、用 Why don't we... / How about... 提建议。承接语法课的短语概念，并把「计划+建议」功能落到真实交际，是单元内「做中学」的口语高峰。","overview":"【学情分析】A班：能用 will 说计划，但提建议句式单一。B班：be going to 与 will 混用，开口怕错。共同问题：提建议只会 Shall we...；不会回应建议（Good idea / I'd rather...）。","objectives":["语言能力：听懂规划对话中的打算与建议；用 be going to 说计划，用 Why don't we... / How about... 提建议并恰当回应。","文化意识：了解露营等户外活动的协作文化，体会「提议—协商」的沟通礼貌。","思维品质：在对话中听出「建议—接受/拒绝」的逻辑链，培养交际推理。","学习能力：小组合作完成一份露营计划，并做 1 分钟英文汇报。"],"keyPoints":"① 计划：be going to + v.（表打算）/ will（临场决定）。\n② 建议：Why don't we...? / How about...? / Let's...\n③ 回应：Good idea! / I'd rather... / That sounds great.","difficulties":"① be going to 与 will 混用。原因：未区分「事先打算」vs「当场决定」，需给情境对比。\n② 建议句式选择。原因：只记 Shall we，需扩展并练礼貌梯度。\n③ 拒绝建议不会委婉。原因：缺 I'd rather / Maybe next time 等，需给话轮。","teachingMethods":"① 任务型：以「设计班级露营」为终任务。\n② 听读结合：先听计划框架再产出。\n③ 角色扮演：组长/组员分工练建议—回应。\n④ 话轮支架：给建议—回应语块菜单。","preparation":"【PPT课件】P1 露营图；P2 听力题支；P3 be going to vs will 对比；P4 建议—回应菜单；P5 计划单。\n【实物教具】计划单（时间/地点/活动/分工 四栏）。\n【音频】规划对话音频。","process":[{"step":"Step 1 导入 Lead-in","time":"4分钟","content":"【PPT P1 露营图】教师：「If we camp, what do we need?」 预设回答：「Tent! Food!」 板书时机：黑板左列 camp 词汇。差异化提示：B班说中文词；A班英文。易错点提醒：tent 尾音 /t/ 轻。"},{"step":"Step 2 听力抓计划 While-listening","time":"12分钟","content":"【PPT P3 听力任务】【音频】听两遍：第一遍抓「他们打算去哪、做什么」；第二遍填计划单。教师：「Catch: be going to = 打算。」 预设回答：「They are going to camp by the lake.」 板书时机：黑板中写 be going to + v. 公式。差异化提示：B班只填地点；A班填地点+活动。易错点提醒：going 读 /ɡoʊɪŋ/ 注意双元音。"},{"step":"Step 3 听力抓建议 Catch suggestions","time":"8分钟","content":"【PPT P4 听力任务】【音频 重听】教师：「What suggestions did they make?」 预设回答：「Why don't we bring a map?」 板书时机：黑板写建议三句型。差异化提示：A班听后默写1句；B班听后圈出。易错点提醒：How about 后接 doing/名词，不接动词原形。"},{"step":"Step 4 角色扮演 Role-play","time":"10分钟","content":"【PPT P4 菜单】四人一组：用建议—回应菜单设计班级露营。教师巡视纠音。预设回答：「—How about Friday? —Good idea!」 板书时机：留菜单参考。差异化提示：B班照菜单读；A班脱稿+追加理由。易错点提醒：回应要先接情绪词（Great!）再表态。"},{"step":"Step 5 汇报+作业 Report","time":"6分钟","content":"【PPT P6 汇报框架】一组上台 1 分钟英文汇报计划。教师：「One minute per group. Be loud and clear.」 预设回答：「We are going to visit the museum and then eat lunch.」 板书时机：留 be going to 公式。差异化提示：B班看稿读；A班脱稿。易错点提醒：汇报用 are going to / will，注意主语复数一致。"}],"blackboard":"┌─ Plan a Camp ─┐\n│ plan: be going to + v │\n│  (打算, 事前)        │\n│ will (当场决定)       │\n│ suggest:             │\n│  Why don't we...?    │\n│  How about...?       │\n│ respond:             │\n│  Good idea! / Rather │\n└───────────────────────┘","exercises":"【基础作业】1. 听录音跟读对话 2 遍。2. 用 be going to 写 3 句「周末计划」。\n【提高作业】四人小组完成一份英文露营计划单（四栏齐全），下节课展示。\n【参考答案——教师用】基础2示例：I am going to visit my grandma. / We are going to play basketball. / She is going to read a book. 提高评价：四栏齐全、用对 be going to 即满分。","reflection":"✅ 亮点：建议—回应菜单让B班敢开口；计划单把抽象「计划」变具体任务，产出质量高。\n⚠️ 需改进：be going to vs will 仍有混，需下节课前补一段「事先vs当场」微视频。\n📌 下节课衔接：读写课将写人物简介，本课的「计划表达」可作人物目标描写素材。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T16:00:00Z"},{"id":"l-eng-b1-u1-w1","lessonId":"l-eng-b1-u1-w1","title":"Reading for Writing: A Student Profile (Ⅰ) — 读析与语料库","book":"必修第一册","unitNumber":1,"unitTitle":"Teenage Life","lessonType":"writing","lessonTypeName":"写作","lessonNumber":6,"periodNumber":6,"duration":45,"grade":"高一","subject":"英语","tags":["写作","读与写","人物简介","人教版必修一U1","第六节课"],"textbookAnalysis":"本课为 Unit 1 第六课时（Reading for Writing Ⅰ），属「以读促写」的输入阶段。范文为一篇学生自我介绍（profile），结构：基本信息→性格→爱好→能力→愿望。目标是拆解范文结构、提炼人物描写语块（personality adjectives, hobbies, can do），为下节课独立写作建「语料库」。","overview":"【学情分析】A班：能仿写但结构松散，缺过渡。B班：词汇贫乏，只会 I like...。共同问题：写人物=罗列句子，无段落逻辑；不知用本单元词汇（confident/explore）。","objectives":["语言能力：分析范文结构（4段式）与人物描写语块，积累性格/爱好/能力三类表达。","文化意识：理解「自我介绍」在中外校园社交中的功能差异。","思维品质：归纳 profile 的「总—分—愿」结构，培养篇章逻辑意识。","学习能力：建立个人「人物描写语块库」，为下节课写作直接调用。"],"keyPoints":"① 结构：Basic info → Personality → Hobbies → Abilities & Wishes。\n② 语块：I'm outgoing / I'm good at... / I want to explore...。\n③ 衔接：and / also / besides 连接句。","difficulties":"① 结构意识弱：学生易写成「流水账」。原因：未先画结构图，需强制提纲。\n② 语块贫乏：只会 like。原因：缺范文输入，需本课建库。\n③ 单元词不会迁移：原因：前两节词汇未激活，需明示「可用词」。","teachingMethods":"① 范文分析法：拆解结构+语块。\n② 语块银行：分类积累可直接调用的表达。\n③ 支架写作：下节课用本课提纲+语库。\n④ 同伴互评：结构互查。","preparation":"【PPT课件】P1 范文全文；P2 结构图（4段）；P3 语块银行（性格/爱好/能力三栏）；P4 可用单元词回顾；P5 下节课任务。\n【实物教具】语块银行空表（每人一张）。","process":[{"step":"Step 1 读范文 Read","time":"10分钟","content":"【PPT P1】教师：「Read the profile. What sections does it have?」 预设回答：「Name, personality, hobbies, abilities.」 板书时机：黑板左写4段名。差异化提示：B班标段落大意；A班限时1分钟速读。易错点提醒：profile 读 /proʊfaɪl/ 不是「照片」。"},{"step":"Step 2 拆结构 Structure","time":"10分钟","content":"【PPT P2】师生共画结构图：基本信息→性格→爱好→能力愿望。教师：「Notice: each section = 1 paragraph.」 预设回答：「So 4 paragraphs!」 板书时机：黑板中画结构树。差异化提示：A班补「每节写什么」；B班只记4段名。易错点提醒：wishes 放末段作收尾，不混中段。"},{"step":"Step 3 建语库 Bank","time":"12分钟","content":"【PPT P3】从范文抽语块分类：性格（outgoing, confident）、爱好（be keen on, be good at）、能力（can do, help with）。学生填空表。预设回答：「I'm confident and I'm good at drawing.」 板书时机：黑板右写三栏例。差异化提示：B班抄范文句；A班自加1个单元词（explore）。易错点提醒：be good at + doing。"},{"step":"Step 4 激活单元词 Activate","time":"8分钟","content":"【PPT P4】回扣 U1 词：confident/explore/forward to。教师：「You can use them in your profile!」 预设回答：「I look forward to exploring the club.」 板书时机：标「可用词」星号。差异化提示：A班造1句含2单元词；B班认读即可。易错点提醒：look forward to + doing。"},{"step":"Step 5 小结+作业 Wrap","time":"5分钟","content":"【PPT P6 总结】总结结构+语库。教师：「Remember: 4 paragraphs, 3+ chunks.」 预设回答：「We know the structure now: interests, strengths, weakness, goal.」 板书时机：留结构树。差异化提示：B班再读一遍语库；A班自己说一遍结构。易错点提醒：下节课直接套用，别现编——课上写过的句子就是最好的素材。"}],"blackboard":"┌─ Student Profile ─┐\n│ 1 Basic info       │\n│ 2 Personality      │\n│   outgoing/confident│\n│ 3 Hobbies          │\n│   keen on / good at│\n│ 4 Abilities&Wishes │\n│   can / look fwd to│\n│ 衔接: and/also/besid│\n└─────────────────────┘","exercises":"【基础作业】1. 抄写语块银行三栏各3条。2. 用 be good at doing 写 2 句。\n【提高作业】按4段结构列自己 profile 的提纲（每节2-3个要点），下节课写作用。\n【参考答案——教师用】基础2示例：I am good at swimming. / She is good at playing the piano. 提高评价：4段齐全、要点具体即满分；用单元词加分。","reflection":"✅ 亮点：语块银行把「写不出」变「选得出」，B班也有话写；结构树强制提纲，杜绝流水账。\n⚠️ 需改进：部分A班提纲过简，下节课需要求「每节≥2句」。\n📌 下节课衔接：直接用本课结构+语库写自己 profile，并同伴互评。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T16:00:00Z"},{"id":"l-eng-b1-u1-w2","lessonId":"l-eng-b1-u1-w2","title":"Reading for Writing: A Student Profile (Ⅱ) — 起草与互评","book":"必修第一册","unitNumber":1,"unitTitle":"Teenage Life","lessonType":"writing","lessonTypeName":"写作","lessonNumber":7,"periodNumber":7,"duration":45,"grade":"高一","subject":"英语","tags":["写作","读与写","起草","互评","人教版必修一U1","第七节课"],"textbookAnalysis":"本课为 Unit 1 第七课时（Reading for Writing Ⅱ），写作产出阶段。学生基于上节课的结构图与语块银行，独立写一篇 80-100 词的学生自我介绍（profile），随后同伴互评（结构/语块/语法三维度），教师回收共性错误集中讲评。是单元「以读促写」的闭环。","overview":"【学情分析】A班：能写满但语法小错多（三单、介词）。B班：写不满80词，依赖语库照抄。共同问题：互评只会看字数，不会评结构；结尾愿望句易漏。","objectives":["语言能力：按4段结构写出 80-100 词连贯 profile，正确运用本单元词汇与 be good at doing 等搭配。","文化意识：（渗透）清晰自我介绍是校园社交起点。","思维品质：用互评量表从结构/语块/语法三维审读同伴作文，培养元认知。","学习能力：依互评反馈修改自己的 profile，形成「写—评—改」闭环。"],"keyPoints":"① 结构保真：4段不缺、每段≥2句。\n② 语块调用：至少用3个语库表达+1个单元词。\n③ 语法红线：三单、be good at doing、标点。","difficulties":"① 写不满/超字数。原因：提纲不细，需下课前限80-100词明示。\n② 三单漏用。原因：中文无单三，需互评重点查。\n③ 互评流于形式。原因：无量表，需给三维勾选表。","teachingMethods":"① 过程写作法：起草→互评→修改。\n② 量表互评：结构/语块/语法三维勾选。\n③ 教师集中讲评：回收共性错。\n④ 同伴支架：强弱配对互评。","preparation":"【PPT课件】P1 写作任务+字数要求；P2 互评量表（三维）；P3 共性错预警；P4 优秀句展示。\n【实物教具】互评量表（每人一份，评同伴用）；作文本。","process":[{"step":"Step 1 起草 Draft","time":"15分钟","content":"【PPT P5 计时写作】 教师：「Use last lesson's structure + bank. 80-100 words, 4 paragraphs.」 学生静写。预设回答：（习作）「I'm Li Hua, a confident senior student...」 板书时机：黑板左写字数红线 80-100。差异化提示：B班可参考语库照填；A班脱稿+用2单元词。易错点提醒：三单（he goes / she likes）；be good at doing。"},{"step":"Step 2 互评 Peer review","time":"10分钟","content":"【PPT P6 互评量表】 【量表 P2】同桌互换，按三维勾选：结构4段？语块≥3？语法（三单/介词）。教师：「Don't just count words!」 预设回答：「He missed the wishes paragraph.」 板书时机：黑板中写共性错。差异化提示：B班只查结构+字数；A班查三单+搭配。易错点提醒：互评用铅笔，留修改空间。"},{"step":"Step 3 修改 Revise","time":"10分钟","content":"【PPT P7 修改指南】 学生据反馈改自己的稿。教师巡视。预设回答：「I add: I look forward to exploring clubs.」 板书时机：留量表参考。差异化提示：A班补单元词；B班补缺失段落。易错点提醒：改后重读一遍查三单。"},{"step":"Step 4 讲评+展示 Feedback","time":"8分钟","content":"【PPT P8 讲评】 【P3 共性错】教师集中讲：三单漏、at doing 错。展示1-2优秀句。预设回答：「Oh! I wrote 'he like' — wrong.」 板书时机：黑板右写红线句。差异化提示：全体订正自己同类错。易错点提醒：讲评后本人稿再自查一遍。"},{"step":"Step 5 结课 Wrap","time":"2分钟","content":"【PPT P9 结课】总结「写—评—改」闭环。教师：「Great writers revise. Next time you will write even better.」 预设回答：「I will check my tenses next time!」 板书时机：留红线句。差异化提示：B班朗读红线句；A班自己找出自己稿子的红线亮点。易错点提醒：终稿用规范书写——卷面分在考试中真实存在。"}],"blackboard":"┌─ Writing: Profile ─┐\n│ 80-100 words      │\n│ 4 paras:          │\n│  info/persona/hobby│\n│  /ability&wish    │\n│ 红线:             │\n│  三单! at doing!  │\n│ 互评3维:结/块/法  │\n└────────────────────┘","exercises":"【基础作业】将终稿 profile 抄正（80-100词，4段）交作业本。\n【提高作业】把 profile 扩成「给笔友的一封英文邮件」（加问候与落款），下节课可选读。\n【参考答案——教师用】评价量规：结构4段(40%)+语块≥3且正确(30%)+语法少错(30%)；单元词使用加分。典型错：he like→likes；good at play→playing。","reflection":"✅ 亮点：三维互评量表让「评」有抓手，B班也能指出结构缺失；过程写作闭环明显提升成稿质量。\n⚠️ 需改进：起草15分钟对B班偏紧，下节课可给「句型填空式」草稿纸。\n📌 下节课衔接：项目课将把 profile 用于制作班级手册，本稿可直接复用。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T16:00:00Z"},{"id":"l-eng-b1-u1-p","lessonId":"l-eng-b1-u1-p","title":"Project & Unit Review: Make a Teenage Life Brochure","book":"必修第一册","unitNumber":1,"unitTitle":"Teenage Life","lessonType":"project","lessonTypeName":"项目复习","lessonNumber":8,"periodNumber":8,"duration":45,"grade":"高一","subject":"英语","tags":["项目","复习","视频","单元整合","人教版必修一U1","第八节课"],"textbookAnalysis":"本课为 Unit 1 第八课时（Project + Video Time + Review），单元整合与产出。项目任务：小组制作「Teenage Life 班级手册」（含成员 profile、社团推荐、露营计划）。视频时间拓展文化视野，最后用自评表回顾单元目标（词汇/阅读/语法/写作）。是单元「输入—内化—输出」的总收口。","overview":"【学情分析】A班：项目推进快，但易忽略语言准确。B班：跟不上小组节奏，易「搭便车」。共同问题：复习只背单词，不会用单元自评表定位薄弱项。","objectives":["语言能力：在项目中综合运用本单元词汇、短语、be going to、profile 写作；完成一份小组手册。","文化意识：通过 Video Time 了解其他国家青少年的校园生活，拓宽国际视野。","思维品质：用单元自评表诊断自己的薄弱板块，制定补强计划。","学习能力：小组协作完成真实任务，体验「做中学」的成就感。"],"keyPoints":"① 项目产出：手册含 profile + 社团 + 计划三模块。\n② 视频拓展：提取中外校园生活异同。\n③ 自评：词汇/阅读/语法/写作四维勾选薄弱项。","difficulties":"① 小组分工不均：B班搭便车。原因：未明确角色，需设记录员/汇报员。\n② 项目语言不准：重结果轻语言。原因：需设「语言质检」环节。\n③ 复习无方向：原因：缺自评表，需给四维勾选。","teachingMethods":"① 项目式学习（PBL）：手册为终产品。\n② 角色分工：组长/记录/质检/汇报四角色。\n③ 视频探究：看后提取异同。\n④ 自评驱动：用量表定位薄弱。","preparation":"【PPT课件】P1 项目任务+手册模板；P2 角色分工表；P3 Video 思考问题；P4 单元自评表；P5 展示评价量规。\n【实物教具】A3 手册纸（每组一张）；自评表（每人一张）。\n【视频】Video Time 片段（外国校园生活）。","process":[{"step":"Step 1 项目启动 Launch","time":"5分钟","content":"【PPT P1】教师：「Make a class brochure: profile + club + plan.」 分四角色。预设回答：「I'll be the recorder!」 板书时机：黑板左写三模块+四角色。差异化提示：B班先认角色；A班领任务。易错点提醒：手册用英语标题。"},{"step":"Step 2 视频拓展 Video","time":"8分钟","content":"【PPT P2 视频链接】【视频】教师：「What's different from our school life?」 预设回答：「They have more clubs after school.」 板书时机：黑板中写异同。差异化提示：B班说1个异同；A班写2句英文。易错点提醒：video 信息快，提醒抓关键词。"},{"step":"Step 3 小组制作 Make","time":"18分钟","content":"【PPT P3 手册结构】【A3纸】各组完成手册：profile（用写作课稿）+社团推荐（听与说词）+露营计划（听与谈句）。质检员查语言。教师巡视。预设产出：「Our club: Photo Club — we are going to...」 教师：「Which part are you working on?」 预设回答：「The club recommendation!」 板书时机：留模块清单。差异化提示：B班填模板空；A班自由发挥+用单元词。易错点提醒：质检查三单/at doing。"},{"step":"Step 4 展示评价 Show","time":"9分钟","content":"【PPT P4 展示量规】【P5 量规】2-3组上台展示。全班用量规评（内容/语言/合作）。预设回答：「Their profile used confident and explore — great!」 板书时机：留亮点句。差异化提示：每组汇报员脱稿1分钟。易错点提醒：展示用 are going to 复数。"},{"step":"Step 5 单元自评 Review","time":"5分钟","content":"【PPT P4 自评表】学生勾选四维薄弱项并写1条补强计划。教师：「Be honest — this is for yourself.」 预设回答：「I need more speaking practice. I will talk in English for 5 minutes every day.」 板书时机：留自评维度。差异化提示：B班中文写计划、A班英文写。易错点提醒：自评要诚实，计划要具体（如「每天背5个单元词」而不是「多背单词」）。"}],"blackboard":"┌─ U1 Project & Review ─┐\n│ Brochure:             │\n│  profile / club / plan │\n│ Roles: lead/record/QA/ │\n│  report               │\n│ Video: 中外校园异同   │\n│ Self-check 4维:       │\n│  词/读/法/写          │\n└────────────────────────┘","exercises":"【基础作业】完成单元自评表，针对最弱一项写具体补强计划（如每天背5个单元词）。\n【提高作业】把小组手册拍照，用3句英文发班级群（或写给笔友）介绍本组手册。\n【参考答案——教师用】自评量规：四维各勾「已掌握/一般/薄弱」；补强计划须具体可测（非「好好学习」）。项目评价：内容完整(40%)+语言准确(40%)+合作(20%)。","reflection":"✅ 亮点：四角色分工基本消灭搭便车；手册把全单元语言「串成用」，学生成就感强。\n⚠️ 需改进：制作18分钟偏紧，部分组未完工；下次可课前发模板预填。\n📌 单元收口：自评表数据可用于下单元分层；薄弱项集中讲评一次。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T16:00:00Z"},{"id":"l-eng-b1-u2-ls","lessonId":"l-eng-b1-u2-ls","title":"Listening and Speaking: Getting Ready to Travel — 行前准备与旅行计划","book":"必修第一册","unitNumber":2,"unitTitle":"Travelling Around","lessonType":"listening-speaking","lessonTypeName":"听与说","lessonNumber":1,"periodNumber":1,"duration":40,"grade":"高一","subject":"英语","tags":["听与说","Unit 2","Travelling Around","人教版必修一 U2","第1节课"],"textbookAnalysis":"本课为必修第一册 Unit 2 Travelling Around 第一课时（Listening and Speaking），位于单元导入。主题为出行前的准备（订票、办签证、租车、打包）。听力为两段对话：首段为行前清单核对，次段为讨论出行计划。本课为后续读秘鲁、写旅行计划奠定话题与词汇基础。","overview":"【学情分析】A班：初中已掌握 travel/trip/hotel 等基础词，能听懂慢速对话；但 apply for a visa、book a hotel room、rent a car 等短语搭配不熟，输出易逐词翻译。B班：能识别单句信息，但连续对话中多任务并列（订票+打包+租车）易遗漏。共同问题：口语表达多停留在 I go to...，缺 I am planning to / I would like to 的得体句式。","objectives":["语言能力：听懂行前准备对话的主旨与关键细节（出行方式、必备物品），用 be going to / I would like to 表达旅行计划。","文化意识：了解出境旅行的常规准备流程（护照、签证、订房），培养规划意识与守时守约态度。","思维品质：按交通—住宿—物品分类梳理准备清单，培养条理化规划能力。","学习能力：借助出行准备清单图表自主记录听力要点并复述。"],"keyPoints":"① 核心短语：apply for a visa / book a hotel room / rent a car / pack some clothes / get a passport / buy a guidebook。② 句式：I am planning to... / I would like to... / Have you booked... yet? ③ 听力策略：先看清单预测，再听验证。","difficulties":"① book 作动词预订与名词书混淆。原因：一词多义，需语境固化。② pack 与 package 形近意近易混。提醒：pack 打包(动词)/package 包裹(名词)。③ I am leaving next Monday 现在进行时表将来，学生易误用 will。","teachingMethods":"① 任务型（TBL）：以帮同伴列出行清单为终任务。② 听前预测+听中填表：用清单作脚手架。③ 小组合作：两两核对清单查漏补缺。","preparation":"【PPT课件】P1 单元封面（Travelling Around）；P2 出行准备图片九宫格（护照/签证/机票/酒店/行李箱/地图/相机/指南/租车）；P3-4 听力任务题；P5 句型板；P6 说话任务卡。【实物教具】空白出行准备清单表 printed 每组一份；护照/机票道具卡片。【音频】听力两段音频（教材配套）。","process":[{"step":"导入激活","time":"5","content":"【PPT P2 九宫格】教师：Look at these nine pictures. Which three do you need for a trip abroad? 预设回答：Passport, ticket, money! 板书时机：右侧板书 passport / visa / ticket。差异化提示：B班指图说中文再跟读；A班用 I need... 造句。易错点提醒：visa 读作 /viːzə/，注意 s 浊化。"},{"step":"词汇输入","time":"8","content":"【PPT P3 短语卡】教师领读并造例：book a hotel room = 预订酒店房间。教师：What must you do before you fly? 预设回答：Book a ticket / get a passport. 板书时机：板书六短语于左栏。差异化提示：B班短语配图记忆；A班用短语造完整句。易错点提醒：book(预订) 不等于 book(书)，标词性 v./n.。"},{"step":"听前预测","time":"5","content":"【PPT P4 清单表】教师：Before listening, guess what the speaker will pack. 预设回答：Clothes, camera, passport. 板书时机：清单表留空待填。差异化提示：B班只勾已给选项；A班自行补充。易错点提醒：预测不必全对，重在激活。"},{"step":"听中填表","time":"10","content":"【PPT P5 表格】【音频 段一】播放听力，学生填清单。教师：What did he book? 预设回答：A hotel room and a flight. 板书时机：核对答案时板书关键词。差异化提示：B班听两遍；A班一遍后复述。易错点提醒：flight /flaɪt/ 与 fright 区分。"},{"step":"听后核对+句型","time":"7","content":"【PPT P5 句型板】教师：How to talk about plans? — I am planning to... / I would like to... 预设回答跟读。板书时机：句型板书于中央。差异化提示：B班套用模板；A班替换动词扩展。易错点提醒：planning 双写 n。"},{"step":"说话任务","time":"5","content":"【PPT P6 任务卡】学生两人一组，用清单+句型互问出行计划。教师：Tell your partner your plan and what you have prepared. 预设回答：I am planning to visit Xi an. I have booked a hotel. 板书时机：无。差异化提示：B班用填空式对话；A班自由问答。易错点提醒：用现在进行时表将来计划。"}],"blackboard":"┌─ U2 Listening & Speaking ─┐\n│ Prepare: passport / visa / ticket │\n│ book a room · rent a car · pack   │\n│ I am planning to… / I would like to…   │\n│ → 清单(交通/住宿/物品)             │\n└────────────────────────────────────┘","exercises":"【基础作业】1. 听录音跟读听力文本 2 遍，圈出所有出行准备短语。2. 用 I am planning to… 写 3 句旅行计划。【提高作业】为一次三日游列中英文出行准备清单（交通/住宿/物品三类各≥3 项）。【参考答案——教师用】基础2示例：I am planning to visit Chengdu next month. / I am planning to rent a car there. / I am planning to book a hotel near the city center.","reflection":"✅ 亮点：九宫格激活+清单脚手架有效降听力焦虑，B班填表完成率高。⚠️ 需改进：短语 book 多义学生仍混，下节需强化语境。📌 下节课衔接：进入阅读 Peru，将准备延伸到了解目的地。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u2-r1","lessonId":"l-eng-b1-u2-r1","title":"Reading and Thinking: Travel Peru (Ⅰ) — 整体理解","book":"必修第一册","unitNumber":2,"unitTitle":"Travelling Around","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":2,"periodNumber":2,"duration":45,"grade":"高一","subject":"英语","tags":["阅读","Unit 2","Travelling Around","人教版必修一 U2","第2节课"],"textbookAnalysis":"本课为第二课时，语篇为 Travel Peru 旅游手册（brochure），介绍秘鲁地理（Amazon Rainforest、Machu Picchu、Cusco、Lake Titicaca）与四条旅行路线。本节聚焦整体理解：识别语篇类型与文本特征，提取四条路线关键信息。","overview":"【学情分析】A班：能读懂描述性文字，但旅游手册的图文混排、标题-短段结构不熟，易逐句翻译。B班：长难句（定语从句修饰景点）理解吃力，需图表辅助。共同问题：对秘鲁地理陌生，Amazon/Andes 等专名发音与定位困难。","objectives":["语言能力：用略读识别语篇类型（travel brochure）及四条路线主题，用扫读提取时长、交通、亮点细节。","文化意识：了解秘鲁多元地貌与印加文明，尊重世界文化遗产。","思维品质：用表格对比四条路线（时长/交通/亮点），培养分类比较能力。","学习能力：借助路线对比表自主梳理信息并复述。"],"keyPoints":"① 语篇特征：brochure——标题+短段+图片+号召语。② 四路线：Amazon Rainforest Tour / Machu Picchu Tour / Cusco Tour / Lake Titicaca Tour。③ 词汇：destination, brochure, package tour, unique, ancient。","difficulties":"① ancient /eɪnʃənt/ 中 t 不发音，易误读。原因：字母组合规律不熟。② unique 以辅音音素 /j/ 开头，用 a unique 而非 an unique。③ 长难句 which runs along... 定语从句修饰景点，学生易断句错误。","teachingMethods":"① 图式激活：先看秘鲁地图预测。② 略读+扫读分层任务。③ 表格对比：四路线并列梳理。","preparation":"【PPT课件】P1 秘鲁地图（Amazon/Andes/Machu Picchu/Cusco/Lake Titicaca 标注）；P2 brochure 文本特征标注；P3 四路线卡片；P4 对比表；P5 复述脚手架。【实物教具】秘鲁地图挂图；四路线词条卡。【音频】无。","process":[{"step":"图式激活","time":"5","content":"【PPT P1 地图】教师：Where is Peru? What do you know about it? 预设回答：South America. Machu Picchu. 板书时机：板书 Peru / South America。差异化提示：B班指图说中文；A班用英语描述位置。易错点提醒：Peru /pəruː/ 重音在尾。"},{"step":"语篇类型识别","time":"7","content":"【PPT P2 文本特征】教师：What kind of text is this? How do you know? 预设回答：A travel brochure. It has titles and pictures. 板书时机：板书 brochure。差异化提示：B班看图片判断；A班找标题-短段结构。易错点提醒：brochure /brəʊʃʊr/ 发音。"},{"step":"略读路线","time":"8","content":"【PPT P3 路线卡】教师：Skim and find the four tours. 预设回答列出四路线名。板书时机：左栏列四路线。差异化提示：B班只找路线名；A班记时长。易错点提醒：Machu Picchu /mætʃuː piːtʃuː/。"},{"step":"扫读填表","time":"12","content":"【PPT P4 对比表】学生填四路线时长/交通/亮点。教师：How long is the Amazon tour? 预设回答：Four days. 板书时机：核对答案填表。差异化提示：B班给填空表；A班自填。易错点提醒：travel by boat / on foot 介词。"},{"step":"复述","time":"8","content":"【PPT P5 脚手架】学生用表复述一条路线。教师：Describe one tour using the table. 预设回答：The Cusco Tour lasts four days. You can visit museums. 板书时机：无。差异化提示：B班照表读；A班脱稿。易错点提醒：lasts 第三人称单数加 s。"},{"step":"小结","time":"5","content":"【PPT P7 总结回顾】教师带学生回顾 brochure 特征+四路线。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述。易错点提醒：ancient /eɪnʃənt/ t 不发音。"}],"blackboard":"┌─ U2 Reading Ⅰ: Travel Peru ─┐\n│ Type: travel brochure           │\n│ ① Amazon ② Machu Picchu        │\n│ ③ Cusco  ④ Lake Titicaca       │\n│ (duration / transport / highlight)│\n└──────────────────────────────────┘","exercises":"【基础作业】1. 完成四路线对比表（时长/交通/亮点）。2. 用 5 句话复述一条路线。【提高作业】比较两条路线，写一段 60 词推荐语。【参考答案——教师用】基础2示例：The Machu Picchu Tour lasts four days. You travel on foot. The highlight is the ancient Inca city.","reflection":"✅ 亮点：地图+表格让陌生地理可视化，A班对比能力提升明显。⚠️ 需改进：专名发音练习不足，部分学生仍读错 Machu Picchu。📌 下节课衔接：进入语言深度，细读长难句与特色表达。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u2-r2","lessonId":"l-eng-b1-u2-r2","title":"Reading and Thinking: Travel Peru (Ⅱ) — 语言深度","book":"必修第一册","unitNumber":2,"unitTitle":"Travelling Around","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":3,"periodNumber":3,"duration":45,"grade":"高一","subject":"英语","tags":["阅读","Unit 2","Travelling Around","人教版必修一 U2","第3节课"],"textbookAnalysis":"第三课时，沿用 Peru 语篇，聚焦语言深度：赏析描述性词汇与号召语，破解定语从句长难句，为写作积累语料。","overview":"【学情分析】A班：能懂大意但忽视语言地道性，描述景点仍用 very beautiful。B班：定语从句识别困难，which/that 指代不清。共同问题：号召语（Enjoy the beautiful countryside…）的语用功能不熟。","objectives":["语言能力：识别并运用描述景点的地道表达（breathtaking, amazing, unique, ancient）与号召语句式。","文化意识：体会旅游手册吸引读者的语用目的与表达策略。","思维品质：辨析客观描述与主观评价用语差异。","学习能力：建立景点描述语料库供写作调用。"],"keyPoints":"① 描述词：breathtaking / amazing / unique / ancient / spectacular。② 号召语：Enjoy… / Explore… / Discover…。③ 长难句拆解：主句+which/that 定语从句。","difficulties":"① breathtaking 由 breath+taking 复合，学生望文生义误读。原因：构词法不熟。② which 与 that 在非限制性定语从句中的取舍。③ 形容词修饰名词语序（a unique ancient city）。","teachingMethods":"① 语篇研读：圈画特色表达。② 句法拆解：长难句主干+从句分层。③ 语料库搭建：分类积累。","preparation":"【PPT课件】P1 语篇（高亮描述词）；P2 号召语集锦；P3 长难句拆解动画；P4 语料库模板；P5 仿写练习。【实物教具】语料卡 printed。【音频】无。","process":[{"step":"圈画特色词","time":"8","content":"【PPT P1 高亮】教师：Find words that describe places. 预设回答：breathtaking, amazing, ancient. 板书时机：板书描述词。差异化提示：B班找已高亮词；A班自找。易错点提醒：breathtaking /breθteɪkɪŋ/。"},{"step":"号召语赏析","time":"7","content":"【PPT P2 号召语】教师：How does the writer attract you? — Enjoy… / Explore… 预设回答跟读。板书时机：板书动词。差异化提示：B班套用模板；A班改写。易错点提醒：号召语用祈使句，无主语。"},{"step":"长难句拆解","time":"12","content":"【PPT P3 拆解】教师取一句带 which 从句，先找主干再分从句：What does which refer to? 预设回答：The lake. 板书时机：画从句括号。差异化提示：B班只找指代；A班翻译全句。易错点提醒：which 指物，非限制定语从句只用 which。"},{"step":"语料库搭建","time":"10","content":"【PPT P4 模板】学生分类填语料卡：描述词/号召语/句式。预设回答：按旅行目的地模板分类填写词条。板书时机：巡视指导。差异化提示：B班填词；A班造句。易错点提醒：a unique（不是 an unique）。"},{"step":"仿写","time":"8","content":"【PPT P5 练习】学生用语料库仿写一句景点介绍。教师：Describe a place you know. 预设回答：Discover the ancient city, which is breathtaking. 板书时机：展示佳句。差异化提示：B班填空式；A班自由写。易错点提醒：定语从句逗号+which。"}],"blackboard":"┌─ U2 Reading Ⅱ: 语言深度 ─┐\n│ 描述: breathtaking/amazing/unique │\n│ 号召: Enjoy… / Explore… / Discover… │\n│ 长难句: 主干 + (which…)            │\n└────────────────────────────────────┘","exercises":"【基础作业】1. 整理语料库（描述词≥5、号召语≥3）。2. 拆解并翻译文中一句 which 从句长难句。【提高作业】用语料库写一段 50 词景点介绍（含 1 句定语从句）。【参考答案——教师用】基础2示例：The Amazon Rainforest, which covers a large area, is a breathtaking destination.（主干: The Amazon Rainforest is a destination；从句: which covers a large area 修饰主语。）","reflection":"✅ 亮点：语料库让语言可迁移，A班仿写质量提升。⚠️ 需改进：which/that 取舍讲解偏快，B班仍混。📌 下节课衔接：进入语法——现在进行时表将来，为说计划奠基。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u2-g","lessonId":"l-eng-b1-u2-g","title":"Discovering Useful Structures: 现在进行时表将来","book":"必修第一册","unitNumber":2,"unitTitle":"Travelling Around","lessonType":"grammar","lessonTypeName":"语法","lessonNumber":4,"periodNumber":4,"duration":45,"grade":"高一","subject":"英语","tags":["语法","Unit 2","Travelling Around","人教版必修一 U2","第4节课"],"textbookAnalysis":"第四课时，语法点：现在进行时（be doing）表示按计划即将发生的将来动作，常用于出行安排（I am leaving tomorrow / We are flying to Peru）。","overview":"【学情分析】A班：知道 be doing 表进行，但用于将来时易与 will 混。B班：be 动词随主语变化（am/is/are）仍出错。共同问题：缺时间状语时不敢用进行时表将来。","objectives":["语言能力：识别并用现在进行时表达已安排的将来计划，区分其与 will 的语用差异。","文化意识：体会计划性表达的得体性——已定 vs 预测。","思维品质：对比 be doing（已安排）与 will（临决定/预测），培养语境判断力。","学习能力：用时间轴图表归纳将来表达的多种形式。"],"keyPoints":"① 结构：主语 + am/is/are + doing。② 用法：已安排的将来计划，常配时间状语。③ 与 will 区别：be doing=已定，will=临决/预测。","difficulties":"① be 动词随主语：I am / He is / They are，学生漏改。原因：母语无形变化。② come/go/leave/arrive 等位移动词最常用进行时表将来。③ will 与 be doing 混用——前者无计划性。","teachingMethods":"① 归纳法：从例句发现规则。② 对比法：be doing vs will。③ 情境操练：用出行计划语境。","preparation":"【PPT课件】P1 例句（文中+生活）；P2 归纳表格；P3 be doing vs will 对比；P4 时间轴；P5 操练题。【实物教具】无。【音频】无。","process":[{"step":"观察例句","time":"7","content":"【PPT P1 例句】教师：Read: I am leaving for Peru next week. What time does it express? 预设回答：Future. 板书时机：板书例句。差异化提示：B班判断时态；A班说理由。易错点提醒：leaving 表将来，非进行。"},{"step":"归纳结构","time":"8","content":"【PPT P2 表格】师生归纳 主语+am/is/are+doing。教师：What form after I? after He? 预设回答：am / is. 板书时机：填表。差异化提示：B班填 be 动词；A班补例句。易错点提醒：He is coming（不是 He am）。"},{"step":"对比 will","time":"10","content":"【PPT P3 对比】教师：I am flying tomorrow（已订票）vs I will fly tomorrow（打算/临决）. 预设回答辨析。板书时机：对比双栏。差异化提示：B班选填；A班解释差异。易错点提醒：be doing 强调已安排。"},{"step":"时间轴归纳","time":"8","content":"【PPT P4 时间轴】归纳将来表达：be doing / will / be going to。预设回答：be doing已安排/will临时决定/be going to意图板书时机：画轴。差异化提示：B班填词；A班举例。易错点提醒：be going to 表打算+迹象。"},{"step":"操练","time":"12","content":"【PPT P5 题】学生用 be doing 改写出行计划句。教师：Rewrite: I will fly to Xi an tomorrow. → ? 预设回答：I am flying to Xi an tomorrow. 板书时机：展示。差异化提示：B班选择式；A班改写。易错点提醒：fly→flying 不双写。"}],"blackboard":"┌─ U2 Grammar: be doing → future ┐\n│ S + am/is/are + V-ing          │\n│ = 已安排的计划(配时间状语)       │\n│ be doing(已定) vs will(临决/预测)│\n│ come/go/leave/arrive 高频       │\n└──────────────────────────────────┘","exercises":"【基础作业】1. 用 be doing 改写 5 句将来计划。2. 辨析 be doing 与 will 各 3 例。【提高作业】写一段 50 词周末计划，至少 3 处 be doing。【参考答案——教师用】基础1示例：She is arriving at 8 tomorrow. / We are visiting the museum on Sunday. / He is leaving next Monday.","reflection":"✅ 亮点：时间轴+对比让语用差异清晰，A班改写准确率高。⚠️ 需改进：be 动词随主语 B 班仍漏改，需专项。📌 下节课衔接：进入听与谈——用 be doing 进行旅行预订角色扮演。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u2-lt","lessonId":"l-eng-b1-u2-lt","title":"Listening and Talking: Book a Trip — 预订与咨询","book":"必修第一册","unitNumber":2,"unitTitle":"Travelling Around","lessonType":"listening-talking","lessonTypeName":"听与谈","lessonNumber":5,"periodNumber":5,"duration":40,"grade":"高一","subject":"英语","tags":["听与谈","Unit 2","Travelling Around","人教版必修一 U2","第5节课"],"textbookAnalysis":"第五课时，听说结合。听力为预订旅行（订票/订房/问交通）对话；口语为角色扮演客服与旅客，运用 be doing 与咨询句式。","overview":"【学情分析】A班：能说单句但角色扮演衔接生硬，缺礼貌用语。B班：听数字（价格、时间）易错，需预教。共同问题：How much / What time 句式熟练，但 I would like to book… 开场不熟。","objectives":["语言能力：听懂预订对话中的价格、时间、房型等细节；用 I would like to book… / How much is…? 完成预订角色扮演。","文化意识：体验英语国家电话预订的礼貌表达与确认习惯。","思维品质：在信息不对称的交际中主动澄清与确认。","学习能力：用预订信息卡记录关键信息并核对。"],"keyPoints":"① 句式：I would like to book… / How much is it? / What time does it leave? ② 听数字：价格、时间。③ 礼貌语：Could you…? / I would appreciate…","difficulties":"① -teen 与 -ty 数字（thirteen/thirty）听力混淆。原因：发音差异小。② I would like to 后接动词原形，学生加 to+ing。③ 预订确认时重复信息易遗漏。","teachingMethods":"① 情境模拟：电话预订角色扮演。② 听前预教数字。③ 信息卡记录。","preparation":"【PPT课件】P1 预订场景图；P2 数字辨析；P3 听力任务；P4 角色卡；P5 句型板。【实物教具】预订信息卡 printed；电话道具。【音频】听力音频。","process":[{"step":"数字预教","time":"7","content":"【PPT P2 数字】教师辨析 thirteen/thirty, fourteen/forty。预设回答跟读。板书时机：板书对比。差异化提示：B班听辨；A班速读。易错点提醒：-teen 重音在后，-ty 重音在前。"},{"step":"听前预测","time":"5","content":"【PPT P3 任务】教师：What info will you hear? 预设回答：Price, time, room. 板书时机：信息卡留空。差异化提示：B班勾选项；A班自列。易错点提醒：留意货币单位。"},{"step":"听中记录","time":"10","content":"【PPT P4 听力任务卡】【音频】播放，学生填信息卡。教师：How much is the room? 预设回答：120 dollars. 板书时机：核对填卡。差异化提示：B班听两遍；A班一遍。易错点提醒：a hundred and twenty 连读。"},{"step":"句型输入","time":"6","content":"【PPT P5 句型】教师：I would like to book a room. How much is it? 预设回答跟读。板书时机：板书句型。差异化提示：B班套用；A班扩展。易错点提醒：I would like to + 原形。"},{"step":"角色扮演","time":"12","content":"【PPT P4 角色卡】学生分客服/旅客，用信息卡+句型完成预订。教师巡视。预设回答：I would like to book a double room for two nights. 板书时机：无。差异化提示：B班用脚本；A班自由。易错点提醒：确认信息时复述。"}],"blackboard":"┌─ U2 Listening & Talking ┐\n│ I would like to book…        │\n│ How much is it? / What time? │\n│ -teen vs -ty 数字辨析     │\n│ → 预订信息卡(房型/价格/时间)│\n└────────────────────────────┘","exercises":"【基础作业】1. 听录音补全预订信息卡。2. 用 I would like to… 写 3 句预订请求。【提高作业】编写一段 8 轮电话预订对话。【参考答案——教师用】基础2示例：I would like to book a single room for three nights. / I would like to reserve a table for two. / I would like to book a flight to Shanghai.","reflection":"✅ 亮点：角色卡+信息卡让交际真实，B班参与度高。⚠️ 需改进：-teen/-ty 听辨仍弱，需持续。📌 下节课衔接：进入写作——读模型后写旅行计划。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u2-w1","lessonId":"l-eng-b1-u2-w1","title":"Reading for Writing: A Travel Plan (Ⅰ) — 读析与语料","book":"必修第一册","unitNumber":2,"unitTitle":"Travelling Around","lessonType":"writing","lessonTypeName":"写作","lessonNumber":6,"periodNumber":6,"duration":45,"grade":"高一","subject":"英语","tags":["写作","Unit 2","Travelling Around","人教版必修一 U2","第6节课"],"textbookAnalysis":"第六课时，写作第一课时。先读模型旅行计划（含目的地、交通、行程、期待），分析结构与语言，积累语料，为下节起草奠基。","overview":"【学情分析】A班：能写单句但段落结构松散，缺衔接词。B班：时态混乱（计划用 will/do 而非 be doing）。共同问题：旅行计划易写成流水账，缺期待与理由。","objectives":["语言能力：识别旅行计划范文的结构（目的地-交通-行程-期待）与衔接手段，积累相关语料。","文化意识：在计划中表达对目的地的合理期待与文化尊重。","思维品质：按时间顺序与逻辑层级组织计划。","学习能力：用计划提纲模板自主搭建写作骨架。"],"keyPoints":"① 结构：destination → transport → itinerary → expectation。② 衔接词：first, then, after that, finally。③ 时态：用 be doing 表已定行程。","difficulties":"① 时态选择：计划用 be doing/be going to，学生混 will。② itinerary 生词，拼写难。③ 期待句式 I am looking forward to + 名词/doing，学生加原形。","teachingMethods":"① 范文研读：圈结构+语言。② 提纲搭建。③ 语料积累。","preparation":"【PPT课件】P1 范文（分段）；P2 结构图；P3 衔接词；P4 语料库；P5 提纲模板。【实物教具】提纲卡 printed。【音频】无。","process":[{"step":"读范文","time":"8","content":"【PPT P1 范文】教师：Read the model. What is it about? 预设回答：A travel plan to Xi an. 板书时机：板书主题。差异化提示：B班抓大意；A班找结构。易错点提醒：plan 作名词读 /plæn/。"},{"step":"析结构","time":"10","content":"【PPT P2 结构图】师生分四段：destination/transport/itinerary/expectation。教师：Which part tells how to get there? 预设回答：Transport. 板书时机：填结构图。差异化提示：B班匹配；A班归纳。易错点提醒：itinerary /aɪtɪnərəri/。"},{"step":"找衔接词","time":"7","content":"【PPT P3 衔接词】教师圈 first/then/after that/finally。预设回答跟读。板书时机：板书衔接词。差异化提示：B班认读；A班替换。易错点提醒：after that 后接句子。"},{"step":"积语料","time":"8","content":"【PPT P4 语料库】学生填目的地/交通/活动/期待语料卡。预设回答：按旅行分类卡填写词条。板书时机：巡视。差异化提示：B班填词；A班造句。易错点提醒：look forward to + doing。"},{"step":"搭提纲","time":"12","content":"【PPT P5 模板】学生用提纲卡搭自己计划的骨架。教师：Outline your own travel plan. 预设回答展示。板书时机：展示提纲。差异化提示：B班填空；A班自列。易错点提醒：行程用 be doing。"}],"blackboard":"┌─ U2 Writing Ⅰ: 旅行计划 ┐\n│ 结构: destination→transport   │\n│        →itinerary→expectation │\n│ 衔接: first/then/after that/finally │\n│ 时态: be doing(已定行程)       │\n└──────────────────────────────┘","exercises":"【基础作业】1. 完成旅行计划提纲（四部分各≥2 点）。2. 整理衔接词与期待表达各 5 个。【提高作业】用提纲写一段 80 词旅行计划初稿。【参考答案——教师用】基础1示例：Destination: Xi an；Transport: taking a high-speed train；Itinerary: visiting the Terracotta Warriors, cycling on the City Wall；Expectation: looking forward to the local food.","reflection":"✅ 亮点：结构图+提纲让写作有骨架，B班提纲完成率高。⚠️ 需改进：look forward to + doing 仍有人加原形。📌 下节课衔接：下节起草成文+互评。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u2-w2","lessonId":"l-eng-b1-u2-w2","title":"Reading for Writing: A Travel Plan (Ⅱ) — 起草与互评","book":"必修第一册","unitNumber":2,"unitTitle":"Travelling Around","lessonType":"writing","lessonTypeName":"写作","lessonNumber":7,"periodNumber":7,"duration":45,"grade":"高一","subject":"英语","tags":["写作","Unit 2","Travelling Around","人教版必修一 U2","第7节课"],"textbookAnalysis":"第七课时，写作第二课时。基于上节提纲起草成文，运用衔接词与 be doing，经同伴互评修改定稿。","overview":"【学情分析】A班：能成段但衔接生硬、时态偶尔滑回。B班：句子碎片化，缺主语。共同问题：互评不知评什么，需量规引导。","objectives":["语言能力：依据提纲写 80 词旅行计划，正确使用 be doing 与衔接词，段落连贯。","文化意识：在计划中体现对目的地的尊重与合理期待。","思维品质：依据量规评价同伴作品并提出改进建议。","学习能力：通过互评-修改循环提升自我修改能力。"],"keyPoints":"① 成段：四结构+衔接词。② 时态：be doing 表已定。③ 互评量规：结构/语言/衔接/时态。","difficulties":"① 时态滑回 will/do。② 衔接词滥用（每句都加 first）。③ 互评流于表面，需量规引导深入。","teachingMethods":"① 过程写作：起草-互评-修改。② 量规引导互评。③ 教师面批聚焦。","preparation":"【PPT课件】P1 范文回顾；P2 量规表；P3 互评流程；P4 佳句展示；P5 常见问题。【实物教具】互评量规卡 printed。【音频】无。","process":[{"step":"回顾要求","time":"5","content":"【PPT P1 范文】教师回顾结构+时态要求。预设回答跟读。板书时机：板书要点。差异化提示：B班跟读；A班复述。易错点提醒：be doing 表已定。"},{"step":"起草","time":"15","content":"【PPT P6 写作提纲】学生依提纲起草 80 词。教师巡视面批。预设回答：（学生静写中，此处无口头回答）板书时机：无。差异化提示：B班给句型框；A班自由。易错点提醒：衔接词适度。"},{"step":"互评","time":"12","content":"【PPT P2 量规】学生依量规评同伴：结构/语言/衔接/时态各打分。教师：Give one suggestion. 预设回答：Add a transition. 板书时机：展示量规。差异化提示：B班勾选；A班写建议。易错点提醒：评具体不评笼统。"},{"step":"修改","time":"8","content":"【PPT P9 修改清单】学生据互评修改。教师聚焦时态错误。预设回答：（学生自修中，教师口头提示共性错误）板书时机：无。差异化提示：B班改错；A班润色。易错点提醒：滑回 will 须改 be doing。"},{"step":"展示","time":"5","content":"【PPT P4 佳句】展示佳句与修改对比。预设回答赏析。板书时机：圈亮点。差异化提示：B班跟读；A班点评。易错点提醒：look forward to + doing。"}],"blackboard":"┌─ U2 Writing Ⅱ: 起草+互评 ┐\n│ 量规: 结构/语言/衔接/时态   │\n│ 时态: be doing(已定)        │\n│ 流程: 起草→互评→修改→定稿   │\n└──────────────────────────────┘","exercises":"【基础作业】1. 定稿旅行计划（≥80 词，四结构齐全）。2. 用红笔标出 be doing 与衔接词。【提高作业】为计划配一段 30 词期待结尾，含 look forward to。【参考答案——教师用】基础1示范段：I am travelling to Xi an next month. First, I am taking a high-speed train. Then, I am visiting the Terracotta Warriors. After that, I am cycling on the City Wall. Finally, I am looking forward to the local food.","reflection":"✅ 亮点：量规让互评有抓手，A班修改后时态准确率提升。⚠️ 需改进：B班句子碎片化，下单元需强化主谓完整。📌 下节课衔接：进入项目——综合单元产出旅行手册/路线。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u2-p","lessonId":"l-eng-b1-u2-p","title":"Project & Unit Review: Design a Tourist Route — 设计旅行路线","book":"必修第一册","unitNumber":2,"unitTitle":"Travelling Around","lessonType":"project","lessonTypeName":"项目复习","lessonNumber":8,"periodNumber":8,"duration":45,"grade":"高一","subject":"英语","tags":["项目复习","Unit 2","Travelling Around","人教版必修一 U2","第8节课"],"textbookAnalysis":"第八课时，单元综合产出。小组为家乡或心仪城市设计一条 2–3 日旅行路线，综合运用词汇、be doing、brochure 文体与写作语料，制作图文路线卡并展示。","overview":"【学情分析】A班：综合运用能力可，但小组分工与展示语言需规范。B班：表达碎片，需模板与分工支持。共同问题：brochure 文体特征（标题+短段+号召语）在产出中体现不足。","objectives":["语言能力：综合运用单元词汇与 be doing，以 brochure 文体介绍一条旅行路线。","文化意识：在路线设计中呈现家乡/目的地的文化特色与价值。","思维品质：统筹交通-住宿-活动-预算，做可行规划。","学习能力：通过小组协作完成从策划到展示的完整项目。"],"keyPoints":"① ct":"英语","tags":["听与说","Unit 3","Sports and Fitness","人教版必修一 U3","第1节课"],"textbookAnalysis":"本课为必修第一册 Unit 3 Sports and Fitness 第一课时（Listening and Speaking），单元导入。主题为运动项目与邀请同伴观赛/参赛。听力为两段对话：邀请观看比赛、谈论健身计划。本课为后续读 Living Legends、写体育传奇奠定话题与词汇基础。","overview":"【学情分析】A班：初中已掌握 football/basketball/swim 等常见运动词，但 boxing/badminton/marathon/track and field/gymnastics 等拼写与搭配不熟。B班：能听单句但连续对话中时间地点信息易混。共同问题：邀请表达停留在 Can you...?，缺 Would you like to...? 的得体句式与婉拒礼貌语。","objectives":["语言能力：听懂运动赛事对话的主旨与关键细节（项目、时间、地点），用 Would you like to...? 得体邀请并接受/婉拒。","文化意识：了解常见运动项目与观赛礼仪，培养积极参与体育的态度。","思维品质：按项目—时间—地点分类梳理赛事信息，培养条理记录能力。","学习能力：借助赛事信息卡自主记录听力要点并复述邀请对话。"],"keyPoints":"① 运动词：boxing / badminton / marathon / track and field / gym / gymnastics / skiing。② 邀请句：Would you like to...? / That sounds great! / I would love to, but... ③ 听力策略：先读信息卡预测，再听验证。","difficulties":"① marathon /mærəθən/ 中 th 发 /θ/，易读成 /s/。原因：舌位不清。② track and field（田径）为固定搭配，学生望文生义。③ 婉拒时 but 后接理由，学生直说 No 易显生硬。","teachingMethods":"① 任务型（TBL）：以邀请同伴观赛为终任务。② 听前预测+听中填卡。③ 角色扮演操练邀请。","preparation":"【PPT课件】P1 单元封面；P2 运动项目九宫格；P3-4 听力任务；P5 邀请句型板；P6 说话任务卡。【实物教具】赛事信息卡 printed；运动项目词条卡。【音频】听力两段（教材配套）。","process":[{"step":"导入激活","time":"5","content":"【PPT P2 九宫格】教师：Which sports can you see? Have you ever watched a match? 预设回答：Basketball, badminton! 板书时机：板书运动词。差异化提示：B班指图说中文再跟读；A班用 I like... 造句。易错点提醒：marathon /mærəθən/ 的 th。"},{"step":"词汇输入","time":"8","content":"【PPT P3 词卡】教师领读 boxing/badminton/marathon/track and field/gymnastics。教师：Which needs a court? 预设回答：Badminton! 板书时机：左栏板书词。差异化提示：B班配图记忆；A班造句。易错点提醒：track and field 不可拆分理解。"},{"step":"听前预测","time":"5","content":"【PPT P4 信息卡】教师：What info will you hear? 预设回答：Sport, time, place. 板书时机：信息卡留空。差异化提示：B班勾选项；A班自列。易错点提醒：留意 AM/PM。"},{"step":"听中填卡","time":"10","content":"【PPT P5 表格】【音频 段一】播放，学生填信息卡。教师：What sport and when? 预设回答：Badminton, Saturday morning. 板书时机：核对填卡。差异化提示：B班听两遍；A班一遍后复述。易错点提醒：Saturday 拼写。"},{"step":"句型输入","time":"7","content":"【PPT P5 句型板】教师：Would you like to watch a match with me? — That sounds gr champion, injury, fall apart, lose heart。","difficulties":"① determination /dɪtɜːmɪneɪʃn/ 多音节词拼读难。原因：构词 deter+min+ation。② fall apart（分崩离析）短语义，学生直译。③ lose heart（灰心）≠ lose one heart，易混。","teachingMethods":"① 图式激活：预测何为传奇。② 略读+扫读分层。③ 人物信息表对比。","preparation":"【PPT课件】P1 两位传奇图片+成就；P2 语篇；P3 人物信息表；P4 品质词卡；P5 复述脚手架。【实物教具】人物信息表 printed。【音频】无。","process":[{"step":"图式激活","time":"5","content":"【PPT P1 图片】教师：What makes a living legend? 预设回答：Great skill, strong mind. 板书时机：板书 legend。差异化提示：B班说中文；A班用英语。易错点提醒：legend /ledʒənd/。"},{"step":"略读主旨","time":"8","content":"【PPT P2 语篇】教师：Who are the two legends? 预设回答：Lang Ping and Michael Jordan. 板书时机：板书人名。差异化提示：B班找人名；A班记身份。易错点提醒：Jordan /dʒɔːdn/。"},{"step":"扫读填表","time":"12","content":"【PPT P3 信息表】学生填身份/成就/挑战/品质。教师：What challenge did Lang Ping face? 预设回答：Players injured, team falling apart. 板书时机：核对填表。差异化提示：B班给填空表；A班自填。易错点提醒：fall apart 不直译。"},{"step":"品质提炼","time":"8","content":"【PPT P4 品质卡】教师：What qualities do they share? 预设回答：Determination, mental strength. 板书时机：板书品质词。差异化提示：B班找已给词；A班归纳。易错点提醒：determination 拼写。"},{"step":"复述","time":"7","content":"【PPT P5 脚手架】学生用表复述一位传奇。教师：Describe one legend. 预设回答：Lang Ping led the team to medals. She did not lose heart. 板书时机：无。差异化提示：B班照表读；A班脱稿。易错点提醒：led 是 lead 过去式。"},{"step":"小结","time":"5","content":"【PPT P7 总结回顾】回顾传奇=技艺+精神+榜样。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述。易错点提醒：set an example for 树立榜样。"}],"blackboard":"┌─ U3 Reading Ⅰ: Living Legends ┐\n│ Lang Ping: player/coach/person  │\n│ Jordan: Air Jordan, mental str. │\n│ 品质: determination/teamwork/    │\n│       share success              │\n└──────────────────────────────────┘","exercises":"【基础作业】1. 完成两位传奇信息表（身份/成就/挑战/品质）。2. 用 5 句话复述一位传奇。【提高作业】写一段 60 词短文：你心中的体育传奇及其品质。【参考答案——教师用】基础2示例：Lang Ping was a great player and coach. She led China to medals. When the team fell apart, she did not lose heart. Her players won as a team. She shows determination.","reflection":"✅ 亮点：人物表让对比清晰，A班品质归纳到位。⚠️ 需改进：抽象词 determination 拼写仍弱。📌 下节课衔接：进入语言深度，赏析 make sb.+adj、-ing 主语等结构。","aiMode thlete you admire. 预设回答：Practising every day made her strong. 板书时机：展示佳句。差异化提示：B班填空；A班自由。易错点提醒：-ing 主语+单数谓语。"}],"blackboard":"┌─ U3 Reading Ⅱ: 语言深度 ┐\n│ make sb.+adj (made him unique) │\n│ make sb. do (made him practise) │\n│ -ing 主语 → 谓语单数           │\n│ give up / share…with / secret to│\n└────────────────────────────────┘","exercises":"【基础作业】1. 整理语料库（结构≥3、短语≥4）。2. 用 -ing 作主语造 3 句。【提高作业】用语料库写一段 50 词人物评价（含 make sb.+adj 与 -ing 主语各 1 处）。【参考答案——教师用】基础2示例：Losing the match taught him to work harder. / Practising every day made her confident. / Sharing success with others made him a legend.","reflection":"✅ 亮点：结构对比让 make 句型清晰，A班仿写质量提升。⚠️ 需改进：-ing 主语谓语单数 B 班仍漏。📌 下节课衔接：进入语法——附加疑问句，为日常交际奠基。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u3-g","lessonId":"l-eng-b1-u3-g","title":"Discovering Useful Structures: 附加疑问句（反意疑问句）","book":"必修第一册","unitNumber":3,"unitTitle":"Sports and Fitness","lessonType":"grammar","lessonTypeName":"语法","lessonNumber":4,"periodNumber":4,"duration":45,"grade":"高一","subject":"英语","tags":["语法","Unit 3","Sports and Fitness","人教版必修一 U3","第4节课"],"textbookAnalysis":"第四课时，语法点：附加疑问句（tag question）。结构为 前肯后否/前否后肯，用 be/助/情态动词+主语代词，用于确认信息或寻求认同。","overview":"【学情分析】A班：知道句末加 is not it? 但助动词选择与主句不一致。B班：前肯后否规则不清，否定词（never/hardly）时易错。共同问题：Let us go 这类祈使句附加部分混乱。","objectives":["语言能力：识别并正确构造附加疑问句，遵循前肯后否/前否后肯与助动词一致规则。","文化意识：体会附加疑问句的语用功能（确认/求同）与升降调含义。","思维品质：辨析特殊情形（否定词、祈使句）的附加部分。","学习能力：用规则表归纳附加疑问句的构成。"],"keyPoints":"① 结构：前肯后否 / 前否后肯。② 助动词与主句一致（is/are/do/does/did/will/can）。③ 特殊：含 never/hardly/no 等否定词时后部分用肯定；Let us..., shall we?。","difficulties":"① 否定词（never/hardly）使主句表否定，后部分须用肯定。原因：学生忽视隐含否定。② 主句动词决定助动词（实义动词用 do/does/did），学生误用 be。③ Let us go, shall we? 与祈使句 Open the door, will you? 易混。","teachingMethods":"① 归纳法：从例句发现规则。② 对比法：肯否对称。③ 情境操练：日常确认对话。","preparation":"【PPT课件】P1 例句；P2 规则表；P3 否定词特殊；P4 祈使句特殊；P5 操练题。【实物教具】规则卡 printed。【音频】无。","process":[{"step":"观察例句","time":"7","content":"【PPT P1 例句】教师：You like sports, do not you? — 前肯后否。预设回答跟读。板书时机：板书例句。差异化提示：B班判断肯否；A班说规则。易错点提醒：do not 缩写 do not→dont。"},{"step":"归纳规则","time":"10","content":"【PPT P2 规则表】师生归纳：前肯后否/前否后肯，助动词与主句一致。教师：He is a champion, is not he? 预设回答补全。板书时机：填表。差异化提示：B班填助动词；A班补例句。易错点提醒：实义动词用 do/does/did。"},{"step":"否定词特殊","time":"10","content":"【PPT P3 否定词】教师：He never gives up, does he? — never 表否定，后用肯定。预设回答辨析。板书时机：板书特例。差异化提示：B班选填；A班解释。易错点提醒：never/hardly/seldom 后用肯定。"},{"step":"祈使句特殊","time":"8","content":"【PPT P4 祈使句】教师：Let us go, shall we? / Open the door, will you? 预设回答跟读。板书时机：板书特例。差异化提示：B班认读；A班仿写。易错点提醒：Let us 用 shall we，其他祈使句用 will you。"},{"step":"操练","time":"10","content":"【PPT P5 题】学生补全附加疑问句。教师：She can swim, ___? 预设回答：can not she? 板书时机：展示。差异化提示：B班选择式；A班自填。易错点提醒：can not 缩写 cant。"}],"blackboard":"┌─ U3 Grammar: 附加疑问句 ┐\n│ 前肯后否 / 前否后肯       │\n│ 助动词与主句一致(be/do/will) │\n│ never/hardly→后部分用肯定 │\n│ Let us…, shall we?        │\n│ 祈使句, will you?         │\n└────────────────────────────┘","exercises":"【基础作业】1. 补全 10 句附加疑问句。2. 归纳否定词与祈使句两类特例各 2 例。【提高作业】编写一段 6 轮对话，含至少 4 处附加疑问句并标升降调。【参考答案——教师用】基础1示例：He is a legend, is not he? / They won the match, did not they? / She never gives up, does she? / Let us watch the game, shall we?","reflection":"✅ 亮点：规则表+特例对比清晰，A班操练准确率高。⚠️ 需改进：否定词特例 B 班仍漏，需专项。📌 下节课衔接：进入听与谈——用附加疑问句进行运动精神讨论。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u3-lt","lessonId":"l-eng-b1-u3-lt","title":"Listening and Talking: Sportsmanship & Fitness — 运动精神与健康选择","book":"必修第一册","unitNumber":3,"unitTitle":"Sports and Fitness","lessonType":"listening-talking","lessonTypeName":"听与谈","lessonNumber":5,"periodNumber":5,"duration":40,"grade":"高一","subject":"英语","tags":["听与谈","Unit 3","Sports and Fitness","人教版必修一 U3","第5节课"],"textbookAnalysis":"第五课时，听说结合。听力为谈论运动精神与健康生活习惯；口语为用附加疑问句确认观点并讨论健身选择。","overview":"【学情分析】A班：能表达观点但附加疑问句不会用。B班：听细节（频度副词 always/never）易错。共同问题：讨论健康习惯缺句式支架。","objectives":["语言能力：听懂运动精神与健康习惯对话细节；用附加疑问句确认观点并讨论健身选择。","文化意识：理解公平竞争与坚持锻炼的价值。","思维品质：在讨论中权衡利弊、提出建议。","学习能力：用观点记录表梳理正反理由。"],"keyPoints":"① 句式：附加疑问句用于确认（You exercise every day, do not you?）。② 频度词：always/usually/often/sometimes/never。③ 健康表达：keep fit / work out / balanced diet。","difficulties":"① 附加疑问句在口语中的升降调（升=求答，降=求同）。② work out（锻炼）短语义，学生直译。③ balanced diet 搭配，学生漏 balanced。","teachingMethods":"① 情境讨论。② 听前预教频度词。③ 观点表记录。","preparation":"【PPT课件】P1 健康习惯图；P2 频度词；P3 听力任务；P4 讨论卡；P5 句型板。【实物教具】观点记录表 printed。【音频】听力音频。","process":[{"step":"频度词预教","time":"6","content":"【PPT P2 频度词】教师领读 always→never。预设回答跟读。板书时机：板书频度词。差异化提示：B班认读；A班造句。易错点提醒：usually /juːʒuəli/ 发音。"},{"step":"听前预测","time":"5","content":"【PPT P3 任务】教师：What habits will you hear? 预设回答：Exercise, diet. 板书时机：表留空。差异化提示：B班勾选；A班自列。易错点提醒：留意频度。"},{"step":"听中记录","time":"10","content":"【PPT P4 听力任务卡】【音频】播放，学生填习惯+频度。教师：How often does he work out? 预设回答：Every day. 板书时机：核对填表。差异化提示：B班听两遍；A班一遍。易错点提醒：work out=锻炼。"},{"step":"句型输入","time":"6","content":"【PPT P5 句型】教师：You keep fit, do not you? — 用于确认。预设回答跟读。板书时机：板书句型。差异化提示：B班套用；A班扩展。易错点提醒：升调=求答。"},{"step":"讨论","time":"13","content":"【PPT P4 讨论卡】学生用附加疑问句+频度词讨论健身计划。教师：Discuss your fitness plan. 预设回答：You run every morning, do not you? Yes, I keep fit. 板书时机：无。差异化提示：B班用脚本；A班自由。易错点提醒：balanced diet 搭配。"}],"blackboard":"┌─ U3 Listening & Talking ┐\n│ 频度: always→never       │\n│ keep fit / work out      │\n│ balanced diet            │\n│ 附加疑问句(升=求答/降=求同)│\n└────────────────────────────┘","exercises":"【基础作业】1. 听录音补全习惯与频度表。2. 用附加疑问句写 3 句确认健康习惯的问句。【提高作业】写一段 60 词健身计划，含 2 处附加疑问句。【参考答案——教师用】基础2示例：You work out every day, do not you? / She keeps a balanced diet, does not she? / They never give up, do they?","reflection":"✅ 亮点：频度词+讨论卡让交际真实，B班参与度高。⚠️ 需改进：附加疑问句升降调练习不足。📌 下节课衔接：进入写作——写一位体育传奇。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u3-w1","lessonId":"l-eng-b1-u3-w1","title":"Reading for Writing: A Sports Legend (Ⅰ) — 读析与语料","book":"必修第一册","unitNumber":3,"unitTitle":"Sports and Fitness","lessonType":"writing","lessonTypeName":"写作","lessonNumber":6,"periodNumber":6,"duration":45,"grade":"高一","subject":"英语","tags":["写作","Unit 3","Sports and Fitness","人教版必修一 U3","第6节课"],"textbookAnalysis":"第六课时，写作第一课时。读模型短文（介绍一位体育传奇），分析结构（引入—事迹—品质—启示）与语言，积累语料。","overview":"【学情分析】A班：能写单句但段落结构松散，缺品质与启示。B班：时态混乱（事迹用过去，学生混现在）。共同问题：传奇描写易成流水账，缺评价。","objectives":["语言能力：识别传奇短文结构（引入—事迹—品质—启示）与衔接手段，积累人物描写语料。","文化意识：在描写中体现对体育精神的敬意。","思维品质：按时间与逻辑层级组织人物事迹。","学习能力：用提纲模板搭建写作骨架。"],"keyPoints":"① 结构：introduction → achievements → qualities → inspiration。② 时态：事迹用过去时，品质评价用现在时。③ 语料：determination/mental strength/set an example/make sb.+adj。","difficulties":"① 时态切换：事迹过去 vs 品质现在。② inspiration（启示）抽象词拼写。③ -ing 主语与 make sb.+adj 运用不熟。","teachingMethods":"① 范文研读圈结构。② 提纲搭建。③ 语料积累。","preparation":"【PPT课件】P1 范文分段；P2 结构图；P3 时态标注；P4 语料库；P5 提纲模板。【实物教具】提纲卡 printed。【音频】无。","process":[{"step":"读范文","time":"8","content":"【PPT P1 范文】教师：Who is it about? 预设回答：A sports legend. 板书时机：板书主题。差异化提示：B班抓大意；A班找结构。易错点提醒：legend /ledʒənd/。"},{"step":"析结构","time":"10","content":"【PPT P2 结构图】师生分四段。教师：Which part tells achievements? 预设回答：Achievements. 板书时机：填结构图。差异化提示：B班匹配；A班归纳。易错点提醒：inspiration /ɪnspəreɪʃn/。"},{"step":"时态标注","time":"8","content":"【PPT P3 时态】教师圈过去时事迹与现在时品质。预设回答辨析。板书时机：板书时态。差异化提示：B班标时态；A班解释。易错点提醒：led→lead 过去式。"},{"step":"积语料","time":"7","content":"【PPT P4 语料库】学生填品质/事迹/启示语料卡。预设回答：按体育传奇分类卡填写词条。板书时机：巡视。差异化提示：B班填词；A班造句。易错点提醒：make sb.+adj。"},{"step":"搭提纲","time":"12","content":"【PPT P5 模板】学生用提纲卡搭自己传奇的骨架。教师：Outline your legend. 预设回答展示。板书时机：展示提纲。差异化提示：B班填空；A班自列。易错点提醒：事迹用过去时。"}],"blackboard":"┌─ U3 Writing Ⅰ: 体育传奇 ┐\n│ 结构: intro→achievements   │\n│        →qualities→inspiration│\n│ 时态: 事迹过去 / 品质现在  │\n│ 语料: determination/make sb.│\n└────────────────────────────┘","exercises":"【基础作业】1. 完成传奇提纲（四部分各≥2 点）。2. 整理品质词与事迹动词各 5 个。【提高作业】用提纲写一段 80 词传奇初稿。【参考答案——教师用】基础1示例：Introduction: Yao Ming；Achievements: played in the NBA, led the team；Qualities: determination, teamwork；Inspiration: he set an example for young players.","reflection":"✅ 亮点：结构图+提纲让写作有骨架，B班提纲完成率高。⚠️ 需改进：时态切换仍混。📌 下节课衔接：下节起草成
