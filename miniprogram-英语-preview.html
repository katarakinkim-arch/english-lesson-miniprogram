结构图】教师：Last class we learned the four spirits of festivals. Can you recall them? 预设回答：Harvest, ancestors, reunion, new year. The common spirit is gratitude, love and hope. 板书时机：左栏写四类精神内核。差异化提示：B班看框架图读关键词；A班完整复述。易错点提醒：recall ≠ remember — recall 更强调\"主动调取记忆\"。"},{"step":"-ing 形式发现","time":"8","content":"【PPT P2 课文句子】发课文复印件。教师：Circle all -ing forms in the text. Decide: is it an attribute (定语) or an adverbial (状语)? 学生标记后全班核对。教师：Why does the author use -ing here? 预设回答：To make the sentence shorter and more vivid. 板书时机：逐句板书圈出的 -ing 结构。差异化提示：B班给划线句直接圈 -ing；A班自己找+标注功能。易错点提醒：\"a crying baby\" 中 crying 作定语修饰 baby，不是进行时。"},{"step":"定语vs状语辨析","time":"10","content":"【PPT P3 对比表】教师对比：定语——修饰名词（前置 a sleeping child / 后置 the people celebrating）；状语——修饰动词或全句（Walking home, I felt happy = When I walked home...）。教师例句辨析。预设回答辨析。板书时机：两列对比板书。差异化提示：B班根据提示选择填空；A班独立造句。易错点提醒：-ing 状语的逻辑主语必须与主句主语一致——\"Walking home, the rain started\" 是错的（rain 不能 walk）。"},{"step":"语料库搭建","time":"10","content":"【PPT P4 模板】教师：Now build your corpus. Extract -ing examples and key verbs into three categories. 学生分类填语料卡：①-ing 作定语优质句摘录 ②-ing 作状语优质句摘录 ③议论文动词（origin/figure/range/gather/commercial）。板书时机：巡视指导。差异化提示：B班填词；A班造句。预设回答：按节日语料库模板分类填写词条。易错点提醒：figure 在文中表\"人物\"（a great figure），不是\"数字\"也不是\"认为\"。"},{"step":"句型改写","time":"5","content":"【PPT P6 练习】教师给从句，学生改写为 -ing 状语。例：When they celebrate together, families feel close. → Celebrating together, families feel close. 预设回答造句。板书时机：板书改写公式。差异化提示：B班给改写框架；A班独立改。易错点提醒：改写后检查逻辑主语一致性——主句主语必须能发出 -ing 动作。"},{"step":"小结","time":"2","content":"【PPT P7 总结回顾】教师：Let's review. What does -ing do as attribute and adverbial? 回顾 -ing 作定语/状语功能+语料库。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述。易错点提醒：下节课语法课深入讲 -ing 的两种功能及改写规则。"}],"blackboard":"┌─ U1 Reading II: Language Focus ──────┐\n│ -ing as Attribute (定语):             │\n│  前置: a crying baby, sleeping child  │\n│  后置: the people celebrating         │\n│ -ing as Adverbial (状语):             │\n│  Walking home, I felt happy.          │\n│  Celebrating together, we feel close. │\n│                                       │\n│ Verbs: origin / figure / range        │\n│        gather / commercial            │\n│                                       │\n│ Rule: -ing 主语 = 主句主语!           │\n└───────────────────────────────────────┘","exercises":"【基础作业】1. 从课文中找出5个 -ing 结构并标注定语/状语。2. 将以下从句改写为 -ing 状语：When she walked in the park, she saw beautiful flowers.【提高作业】用 -ing 作定语和状语各写2句关于节日的句子。【参考答案——教师用】基础2示例：Walking in the park, she saw beautiful flowers.","reflection":"✅ 亮点：标注发现法让学生主动探索语法，参与度高。⚠️ 需改进：-ing 状语逻辑主语一致性仍有混淆，语法课需强化。📌 下节课衔接：进入语法课，系统讲 -ing 作定语和状语的规则。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Reading and Thinking · Festivals and Celebrations (P3)"},{"id":"l-eng-b3-u1-g","lessonId":"l-eng-b3-u1-g","book":"必修第三册","unitNumber":1,"unitTitle":"Festivals and Celebrations","lessonType":"grammar","lessonTypeName":"语法","lessonNumber":4,"periodNumber":4,"duration":40,"grade":"高一","subject":"英语","tags":["语法","-ing形式","定语","状语","人教版必修三U1","第四节课"],"textbookAnalysis":"本课为必修第三册 Unit 1 第四课时（Discovering Useful Structures），系统教学 -ing 形式作定语和状语的用法。基于 Reading 语篇中提取的例句，引导学生归纳出规则：作定语（前置修饰名词表性质/状态，后置相当于定语从句）和作状语（表时间/原因/条件/伴随/让步，逻辑主语与主句主语一致）。通过节日主题的语境化练习巩固。","overview":"【学情分析】A班：知道 -ing 表进行时，但作定语和状语是语法新知。B班：-ing 概念仍模糊，需大量语境化例句反复操练。共同问题：写作中要么不用 -ing，要么乱用导致逻辑主语不一致。","objectives":["语言能力：准确识别并产出 -ing 形式作定语和状语的句子，在节日话题中产出 5 个以上正确句子。","文化意识：通过 -ing 形式更简洁生动地描述节日场景。","思维品质：通过\"发现例句→归纳规则→应用规则\"的归纳法培养语法学习策略。","学习能力：建立\"语法自查表\"——写作后自行检查 -ing 状语的逻辑主语是否一致。"],"keyPoints":"① -ing 作定语：前置（a crying baby 表性质）/ 后置（the boy crying there 相当于定语从句）② -ing 作状语：表时间/原因/条件/伴随/让步 ③ 逻辑主语一致性：-ing 状语的逻辑主语 = 主句主语","difficulties":"① -ing 状语逻辑主语一致性问题。原因：学生写作中常忽略，如\"Walking home, the rain started\"（错误）。② -ing 作定语前置 vs 后置的选择。③ -ing 状语与谓语动词的时间关系——同时还是先于。","teachingMethods":"① 归纳法（Guided Discovery）：例句→规则→练习 ② 改写对比：从句 vs -ing 状语 ③ 改错练习：纠正典型错误","preparation":"【PPT课件】P1 定语vs状语对比表；P2 课文例句摘录；P3 规则归纳页；P4 逻辑主语一致性；P5 改写任务卡；P6 改错题；P7 总结。【实物教具】句型卡一套；改写工作单。","process":[{"step":"例句发现","time":"7","content":"【PPT P2 例句】展示课文中5个 -ing 结构，学生圈 -ing 并判断定语/状语。教师：What does this -ing modify? A noun or a verb? 预设回答：It modifies a noun — it's an attribute. / It modifies the whole sentence — it's an adverbial. 板书时机：左栏板书例句，标注功能。差异化提示：B班只圈词不分析功能；A班分析 -ing 修饰什么。易错点提醒：-ing 作定语修饰名词，作状语修饰动词或全句——看修饰对象定功能。"},{"step":"规则归纳","time":"12","content":"【PPT P3 对比表】教师引导学生归纳：定语——前置 a sleeping child（表性质状态）/ 后置 the child sleeping there（≈ who is sleeping there）；状语——Walking home, I felt happy（时间）/ Being tired, he rested（原因）。教师：When -ing is an adverbial, what must we check? 预设回答：The subject must be the same as the main clause! 板书时机：板书完整对比表。差异化提示：B班填已给框架表；A班自己画表填。易错点提醒：-ing 后置定语相当于缩减的定语从句——the boy crying there = the boy who is crying there。"},{"step":"逻辑主语讲练","time":"8","content":"【PPT P4 结构】教师：The -ing adverbial's logical subject = main clause subject. 例句正误对比：✓ Walking home, I saw a rainbow. ✗ Walking home, the rain started. (rain can't walk!) 预设回答辨析：第二句错，rain 不是 walk 的主语。板书时机：板书正误对比公式。差异化提示：B班选词填空（判断对错）；A班改写句子。易错点提醒：检查 -ing 状语时永远问一句\"谁在做 -ing 的动作？是否=主句主语？\""},{"step":"改写操练","time":"8","content":"【PPT P5 改写卡】教师给从句，学生改写为 -ing 状语。例：When she celebrated the festival, she wore a costume. → Celebrating the festival, she wore a costume. 教师抽学生板演。预设回答造句。板书时机：板书改写公式。差异化提示：B班给句型框；A班自由改写并追加节日主题细节。易错点提醒：改写后必须检查逻辑主语——主句主语要能发出 -ing 动作。"},{"step":"改错巩固","time":"3","content":"【PPT P6 改错】教师：Find the mistakes in these three sentences. 展示 3 个典型错误：①Walking home, the bus came.（逻辑主语不一致）②A crying baby is in the room is cute.（重复谓语）③The people celebrate in the square is happy.（缺 -ing）。学生纠错并解释。预设回答纠错。板书时机：板书错误→改正公式。差异化提示：B班辨别对错选；A班解释为什么错。易错点提醒：最常犯——逻辑主语不一致，写作后必须自查。"},{"step":"小结","time":"2","content":"【PPT P7 总结】教师：Let's review the -ing rules. 回顾 -ing 定语/状语比较表+逻辑主语要诀+改错公式。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述规则。易错点提醒：写作后自查——每个 -ing 状语的主语是否=主句主语？"}],"blackboard":"┌─ U1 Grammar: -ing as Attribute & Adverbial ─┐\n│ Attribute (定语):                              │\n│  前置: a crying baby (性质)                    │\n│  后置: the boy crying there (≈ who is crying)  │\n│ Adverbial (状语):                              │\n│  时间: Walking home, I saw a rainbow.          │\n│  原因: Being tired, he rested.                 │\n│  伴随: She sang, dancing happily.              │\n│                                                │\n│ ⚠️ Rule: -ing 主语 = 主句主语!                 │\n│ ✗ Walking home, the rain started.              │\n└────────────────────────────────────────────────┘","exercises":"【基础作业】1. 用 -ing 作定语和状语各造 2 句关于节日的句子。2. 将以下从句改写为 -ing 状语：When they gathered for dinner, the family felt happy.【提高作业】写 60 词短文描述一个节日场景，要求至少用 3 个 -ing 结构（含1个定语、1个状语）。【参考答案——教师用】基础1示例：The dancing children brought joy to the festival. (定语) / Celebrating the harvest, farmers expressed gratitude. (状语) 基础2示例：Gathering for dinner, the family felt happy.","reflection":"✅ 亮点：改写对比让语法操练不再枯燥，课堂活跃度高。⚠️ 需改进：逻辑主语一致性仍是难点，听与谈课可融入练习。📌 下节课衔接：听与谈聚焦节日庆祝策划，用语篇巩固 -ing 形式。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Discovering Useful Structures · Festivals and Celebrations (P4)"},{"id":"l-eng-b3-u1-lt","lessonId":"l-eng-b3-u1-lt","book":"必修第三册","unitNumber":1,"unitTitle":"Festivals and Celebrations","lessonType":"listening-talking","lessonTypeName":"听与谈","lessonNumber":5,"periodNumber":5,"duration":40,"grade":"高一","subject":"英语","tags":["听与谈","节日庆祝","策划","人教版必修三U1","第五节课"],"textbookAnalysis":"本课为必修第三册 Unit 1 第五课时（Listening and Talking），语境为\"策划一个节日庆祝活动\"。听力材料为一段关于学校文化节策划的对话，口语输出任务为就一个节日庆祝活动做策划与分工。功能语言为提议与分工（How about...? / Why don't we...? / I'll be responsible for... / Let's divide the tasks）。结合语法课所学的 -ing 形式，在口语中自然运用 -ing 描述伴随活动。","overview":"【学情分析】A班：能提出简单提议，但缺乏\"提议+分工\"的完整表达链。B班：开口意愿低、分工句型储备少。共同问题：只说提议不分工，缺少 I'll be responsible for... 使表达不完整。","objectives":["语言能力：听懂关于节日庆祝策划的对话，提取活动内容与分工；能用至少 4 种句型提议并分工。","文化意识：体会\"集体策划节日庆祝\"的协作精神与参与意识。","思维品质：在讨论中练习\"提议→分工→回应\"的完整对话链。","学习能力：通过策划对话训练批判性倾听——听懂后回应而非只等自己说。"],"keyPoints":"① 提议句型：How about doing...? / Why don't we...? / I suggest we... / We could... ② 分工句型：I'll be responsible for... / Let me handle... / You're in charge of... ③ 听力重点：抓住活动+负责人的配对信息","difficulties":"① Why don't we... 是提议不是疑问 — 学生易用 Why not we...（错误）。原因：母语直译干扰。② responsible for（负责）的介词 for 易漏。③ 回应时 only say \"ok\" no follow-up — 需培养 I'll... 跟进的意识。","teachingMethods":"① 听前预测→听中配对→听后产出 ② 角色扮演：三人一组（策划者+执行者+协调者）③ 节日庆祝策划圆桌讨论","preparation":"【PPT课件】P1 待策划节日场景（学校文化节/班级中秋 party）；P2 提议句型板；P3 听力任务题；P4 听力任务卡；P5 分工句型板；P6 角色卡。【实物教具】节日策划建议卡 printed；角色卡。","process":[{"step":"导入激活","time":"5","content":"【PPT P1 节日场景】教师：Our class will hold a Mid-Autumn Festival party. What should we prepare? 预设回答：Mooncakes! / Lanterns! / Poems about the moon! 板书时机：左栏板书动词 prepare / organize / arrange / decorate。差异化提示：B班中文说再翻英文；A班直接英文。易错点提醒：prepare（准备）≠ prepare for（为…做准备），前者接物后者接事件。"},{"step":"听力抓提议","time":"10","content":"【PPT P3 听力任务】听对话，抓\"谁提了什么提议+谁负责什么\"。教师：Listen for: What is the suggestion? Who is responsible? 预设回答：They suggest making lanterns. Li Ming is responsible for buying materials. 板书时机：配对填表（活动|负责人）。差异化提示：B班给配对连线题；A班听写关键词。易错点提醒：listen for（有目的地听）≠ listen to（泛听）——引导学生带问题听。"},{"step":"听中记录","time":"8","content":"【PPT P4 听力任务卡】【音频】重听，学生填完整提议+分工链。教师：How did they divide the tasks? 预设回答：Wang Fang will handle decorations. Zhang Lei is in charge of music. 板书时机：核对填表。差异化提示：B班听两遍；A班一遍+复述分工。易错点提醒：be in charge of（负责）与 be responsible for（对…负责）可互换，但介词不同。"},{"step":"句型操练","time":"7","content":"【PPT P5 句型板】教师带领操练提议+分工链：A: How about making lanterns? / B: That's a great idea! I'll be responsible for buying paper. / A: Good. You're in charge of design. 预设回答跟读+仿造。板书时机：板书提议→分工链条。差异化提示：B班用填空脚本；A班自主对话。易错点提醒：be responsible for 后接 doing — \"responsible for buying\" 不是 \"responsible for buy\"。"},{"step":"角色扮演","time":"8","content":"【PPT P6 角色卡】三人一组：Planner A（策划者）、Doer B（执行者）、Coordinator C（协调者）。就班级中秋 party 策划讨论。教师巡视。预设回答：A: How about a poem contest? / B: I'll handle the prizes! / C: I'll coordinate the schedule. 板书时机：留提议句型和分工链供参考。差异化提示：B班照卡读；A班脱稿加即兴内容。易错点提醒：角色扮演中注意用 -ing 描述伴随活动 — \"Celebrating together, we will sing and dance.\""},{"step":"小结","time":"2","content":"【PPT P7 总结】回顾提议句型+分工策略。教师：Remember: after suggesting, assign a task. 预设回答跟读。板书时机：圈重点句型。差异化提示：B班齐读；A班每人说一句收获。易错点提醒：给同伴分工后记得确认\"can you handle that?\"——对话是双向的。"}],"blackboard":"┌─ U1 Listening & Talking ─────────┐\n│ Suggestions:                       │\n│  How about + doing...?             │\n│  Why don't we + do...?             │\n│  I suggest we + do...              │\n│  We could + do...                  │\n│                                    │\n│ Division of labor:                 │\n│  I'll be responsible for + doing   │\n│  Let me handle + n./doing          │\n│  You're in charge of + n./doing    │\n│                                    │\n│ Chain: Suggest → Assign → Confirm  │\n└────────────────────────────────────┘","exercises":"【基础作业】1. 听录音跟读 2 遍，圈出所有提议句型。2. 用至少 2 种提议句型各写 1 句节日庆祝提议+分工。【提高作业】写 60 词对话：三人讨论如何策划班级春节联欢（至少 4 轮，含提议与分工）。【参考答案——教师用】基础2示例：How about making dumplings together? I'll be responsible for buying ingredients. / Why don't we have a talent show? You're in charge of the stage.","reflection":"✅ 亮点：角色扮演三角色设置让学生理解真实策划中的协作分工。⚠️ 需改进：be responsible for 介词 for 仍漏，写作课可设置强制格式。📌 下节课衔接：进入写作，将节日经历写成记叙文。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Listening and Talking · Festivals and Celebrations (P5)"},{"id":"l-eng-b3-u1-w1","lessonId":"l-eng-b3-u1-w1","book":"必修第三册","unitNumber":1,"unitTitle":"Festivals and Celebrations","lessonType":"writing","lessonTypeName":"写作","lessonNumber":6,"periodNumber":6,"duration":40,"grade":"高一","subject":"英语","tags":["写作","记叙文","节日经历","人教版必修三U1","第六节课"],"textbookAnalysis":"本课为必修第三册 Unit 1 第六课时（Reading for Writing I），写作体裁为记叙文——写一次难忘的节日经历。结构为：背景设定（when/where/who）→ 活动经过（what happened, in order）→ 感受升华（feelings + meaning）。语言重点为记叙文时间连接词（first, then, after that, finally）与情感描写词（excited, joyful, grateful, moved）。结合本单元 Reading 的节日精神与语法课的 -ing 形式，实现读-语法-写的闭环。","overview":"【学情分析】A班：有基本叙事能力，但缺乏\"经过→感受\"的升华意识——常写成流水账。B班：句型储备少、时态混乱，需大量脚手架（模板+语料卡）。共同问题：记叙文不知如何收尾——缺少\"这次经历让我明白…\"的感悟句。","objectives":["语言能力：掌握\"背景—经过—感受\"三段式记叙文结构，在节日经历话题中产出 80-100 词结构完整的短文。","文化意识：通过书写节日经历体会节日的精神内核与个人情感联结。","思维品质：通过\"先叙事再感悟\"训练事件—情感—意义的递进逻辑思维。","学习能力：建立\"写作前先搭结构框架\"的习惯——用 outline 而非直接开写。"],"keyPoints":"① 记叙文三段结构：Background (when/where/who) → Process (what, in order) → Feelings (meaning) ② 时间连接词：First / Then / After that / Finally ③ 核心句型：I will never forget... / It made me realize... / The most unforgettable part was...","difficulties":"① 记叙文时态——主体用过去时，感受升华可用现在时。原因：学生易全文现在时。② after that 与 afterwards 的区别。③ 感受升华句不知道怎么写——需给模板。","teachingMethods":"① 范文解构法：读范文→画结构图→仿写 ② 语料卡搭建：从本单元5课积累词汇/句型。③ 过程写作：outline→draft→peer review→revise","preparation":"【PPT课件】P1 范文（关于一次春节经历的记叙文）；P2 三段结构图；P3 时间连接词表；P4 语料库模板；P5 写作提纲；P6 写作任务；P7 总结。【实物教具】三段结构空白工作单 printed 每人一份；语料卡模板。","process":[{"step":"范文解构","time":"8","content":"【PPT P1 范文】教师展示范文，学生标注三段（背景/经过/感受）。教师：Which paragraph tells us what happened? Which tells feelings? 预设回答：Paragraph 2 — the process. Paragraph 3 — the feelings. 板书时机：画三段结构框。差异化提示：B班给标注好的范文只匹配段号；A班自己画结构+标注连接词。易错点提醒：最后一段必须有\"It made me realize...\"才算完整升华。"},{"step":"三段结构讲透","time":"8","content":"【PPT P2 结构图】教师逐段讲解：P1 2句设定背景（when/where/who）→ P2 3-4句叙述经过（first/then/after that/finally）→ P3 2句写感受与意义（feelings + meaning）。教师示范写一段。预设回答跟读结构要点。板书时机：逐段板书模板句。差异化提示：B班给每段填空模板；A班给关键词自己写。易错点提醒：P3 的感受要具体 — 不要只说\"I was happy\"，要说\"I felt grateful because my family was together.\""},{"step":"连接词+句型","time":"5","content":"【PPT P3 词表】教师领读时间连接词：First / Then / After that / Finally / At last。教师示例句：First, we made dumplings. Then, we had a big dinner. After that, we watched the gala. Finally, we set off fireworks. 预设回答跟读。板书时机：板书连接词于侧栏。差异化提示：B班选词填空；A班用全级连接词写一段。易错点提醒：after that 后接逗号 — \"After that, we...\" 不是 \"After that we...\""},{"step":"积语料","time":"5","content":"【PPT P4 语料库】教师：Build your word bank from this unit. Extract festival verbs, feeling words, and -ing patterns. 学生从本单元5课中提取：①节日动词（celebrate/gather/parade/decorate）②情感描写词（excited/joyful/grateful/moved）③-ing 结构模板（Celebrating together, we...）。板书时机：巡视。差异化提示：B班填词；A班造句。预设回答：按节日语料库分类卡填写词条。易错点提醒：同一意思用不同词替换避免重复——第一段说 happy，第三段说 joyful / grateful。"},{"step":"提纲+起草","time":"10","content":"【PPT P5 写作提纲】选一次难忘的节日经历，写 80 词记叙文 outline（三段各写关键词）。教师巡视指导 outline。教师：Don't write sentences yet — just key words for each paragraph. 预设回答：P1: last Spring Festival / home / family / P2: make dumplings / dinner / fireworks / P3: grateful / family matters. 板书时机：留结构框供参考。差异化提示：B班用填空 outline；A班独立列提纲。易错点提醒：outline 不是草稿——用短语不是完整句。这是写前最重要的一步。"},{"step":"互评提纲","time":"4","content":"【PPT P6 写作任务】同桌互换提纲，检查：三段都有吗？经过段有时间连接词吗？感受段有升华句吗？教师：Your partner's outline: does it have all 3 parts? 预设回答：Yes, but the feeling part is too short. 板书时机：留 checklist。差异化提示：B班用 checklist 表逐项打勾；A班口头给改进建议。易错点提醒：互评不是挑刺——给一个赞美+一个建议。\"Good outline! Maybe add a feeling sentence in paragraph 3.\""}],"blackboard":"┌─ U1 Writing: Festival Experience ──────┐\n│ P1 Background: Last..., at..., with... │\n│ P2 Process: First,... Then,... After   │\n│    that,... Finally,...                │\n│ P3 Feelings: I felt... It made me      │\n│    realize...                          │\n│                                         │\n│ Linkers: First / Then / After that     │\n│         Finally / At last              │\n│                                         │\n│ Word Bank: celebrate / gather / parade │\n│  excited / joyful / grateful / moved   │\n└─────────────────────────────────────────┘","exercises":"【基础作业】按课堂 outline 写完 80 词节日经历记叙文初稿。要求：三段结构完整、至少 2 个时间连接词、至少 1 个 -ing 结构。【提高作业】就同一节日写一则 30 词以内的社交媒体分享语（英文），要求有感染力有画面感。【参考答案——教师用】基础示例（节选）：I will never forget last Spring Festival. First, my family gathered to make dumplings. Then, we had a big dinner together. After that, we watched the Spring Festival gala. Finally, we set off fireworks at midnight. Celebrating together, I felt so grateful. It made me realize that family is the most important thing.","reflection":"✅ 亮点：三段结构框架让学生从\"不知道写什么\"变为\"知道每段写什么\"。⚠️ 需改进：时态混用仍需纠正，下节课用改错题强化。📌 下节课衔接：进入写作 II，互评修改+誊抄终稿。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Writing · Festivals and Celebrations (P6)"},{"id":"l-eng-b3-u1-w2","lessonId":"l-eng-b3-u1-w2","book":"必修第三册","unitNumber":1,"unitTitle":"Festivals and Celebrations","lessonType":"writing","lessonTypeName":"写作","lessonNumber":7,"periodNumber":7,"duration":40,"grade":"高一","subject":"英语","tags":["写作","互评","修改","节日","人教版必修三U1","第七节课"],"textbookAnalysis":"本课为必修第三册 Unit 1 第七课时（Writing II），在 Writing I 提纲+初稿的基础上完成\"互评→修改→展示→终稿\"闭环。重点训练学生用同学反馈改进写作的能力——这是新课标强调的学习能力。互评量表聚焦三维度：结构完整（3段）、语言质量（连接词/-ing 结构/词汇）、语法准确（时态/三单/标点）。","overview":"【学情分析】A班：能辨别别人文章的好坏，但给反馈时只说\"写得不错\"缺乏具体点。B班：改自己的稿时不知从何下手。共同问题：互评流于表面，不会用检查量表逐项给分。","objectives":["语言能力：能根据互评量表给同伴的节日记叙文初稿提具体、可操作的修改建议。","文化意识：通过阅读同伴的节日经历了解不同家庭的文化传统。","思维品质：在互评中培养\"识别问题→提出方案\"的批判性反馈能力。","学习能力：建立\"写→评→改→展\"四步写作流程，内化为个人写作习惯。"],"keyPoints":"① 互评三维量表：结构（3段完整）+ 语言（连接词≥2 / -ing结构≥1 / 词汇多样性）+ 语法（时态/三单/标点） ② 改稿有侧重：先改结构再改语法 ③ 展示礼仪：大声/清晰/目视听众","difficulties":"① 学生互评时不好意思提缺点 — 需引导\"给建议就是帮助对方进步\"。② 时态混用重复出错——主体过去时，感受现在时。③ 修改时学生只改拼写不改结构 — 需强制\"先查三段是否完整\"。","teachingMethods":"① 量表互评：用统一标准减少主观性 ② 对子互评→修改→展示 ③ 最佳记叙文评选","preparation":"【PPT课件】P1 互评三维量表；P2 共性错误（时态混用/连接词缺/升华弱）；P3 修改指南；P4 展示礼仪；P5 最佳记叙文范例；P6 写作提纲回顾；P7 总结。【实物教具】互评量表 printed 每人一份；红笔。","process":[{"step":"量表培训","time":"5","content":"【PPT P1 互评量表】教师逐维讲解：①结构（3段都给√/缺→标出）②语言（圈连接词≥2？-ing结构≥1？词汇重复？）③语法（时态？三单？标点？）。教师用上节课自己写的范文示范打分。预设回答跟学。板书时机：量表三维板书于黑板。差异化提示：B班按量表逐项打勾即可；A班还需写一句\"最需要改进的地方\"。易错点提醒：互评不是打分比高低——是帮对方变得更好。"},{"step":"起草+互评","time":"12","content":"【PPT P2 共性错误】先展示上节课共性错：①时态混用②升华段缺\"I felt...\"③连接词缺。然后同桌互换初稿，用红笔按量表标注。教师巡视。教师：Give one praise and one suggestion. 预设回答：Your structure is good, but the tense is mixed. 板书时机：留量表供参考。差异化提示：B班按checklist勾；A班在稿上写具体修改建议。易错点提醒：提建议时用\"I suggest...\"而非\"You should...\"——更礼貌。"},{"step":"修改","time":"10","content":"【PPT P3 修改指南】学生根据互评反馈修改初稿。顺序：①先补结构（缺哪段补哪段）②再加语言（插入连接词/-ing结构）③最后查语法（时态统一）。教师：Don't just fix spelling — check structure first! 预设回答：I fixed the tense and added an -ing sentence in paragraph 2. 板书时机：留修改顺序。差异化提示：B班对照量表逐条改；A班改完还润色词汇替换。易错点提醒：修改不是重写——保留原文好的部分，只在薄弱处补强。"},{"step":"展示评选","time":"8","content":"【PPT P4 展示礼仪】2-3 组自愿上台读记叙文。全班投票：最感人的经历/结构最完整的/最有画面感的。教师：Read loudly and look at the audience. 预设回答展示。板书时机：留展示评分维度。差异化提示：B班可看稿读；A班尽量脱稿。易错点提醒：上台读稿不要太快——你写了100词不等于听众能消化100词。"},{"step":"结课","time":"5","content":"【PPT P7 总结】回顾写作闭环：outline→draft→peer review→revise→final。教师：Next time you write, remember this process. 预设回答：I will make an outline first. 板书时机：画闭环流程图。差异化提示：B班齐读流程；A班说自己的收获。易错点提醒：最好的写作习惯是\"先结构后语言\"——不要跳跃步骤。"}],"blackboard":"┌─ U1 Writing II: Peer Review ────────┐\n│ WRITING PROCESS:                      │\n│  Outline → Draft → Peer → Revise →   │\n│  → Final → SHARE                     │\n│                                       │\n│ Review Checklist:                     │\n│  ✅ 3 paragraphs?                     │\n│  ✅ ≥2 linkers?                       │\n│  ✅ ≥1 -ing structure?                │\n│  ✅ Feeling sentence?                 │\n│  ✅ Grammar (tense / 3rd p / ;)       │\n└───────────────────────────────────────┘","exercises":"【基础作业】根据课堂反馈修改终稿，誊抄提交。自评：在稿末写 1 句\"这次写作最大的进步是…\" 【提高作业】调查另一个你不熟悉的节日，用\"背景—经过—感受\"框架写 80 词节日经历记叙文（可基于资料想象）。【参考答案——教师用】参考 Writing I 的 exercises 答案。终稿评估标准：结构3段完整（2分）+连接词≥2（2分）+-ing结构≥1（2分）+升华有力（2分）+语法准确（2分）= 10分。","reflection":"✅ 亮点：量表培训解决了\"不知道评什么\"的问题，B班互评质量明显提升。⚠️ 需改进：修改环节时间偏紧，下次可给15分钟。📌 下节课衔接：进入 Project，将本单元5课所学整合为节日文化展览。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Writing · Festivals and Celebrations (P7)"},{"id":"l-eng-b3-u1-p","lessonId":"l-eng-b3-u1-p","book":"必修第三册","unitNumber":1,"unitTitle":"Festivals and Celebrations","lessonType":"project","lessonTypeName":"项目复习","lessonNumber":8,"periodNumber":8,"duration":40,"grade":"高一","subject":"英语","tags":["项目","复习","节日","展览","人教版必修三U1","第八节课"],"textbookAnalysis":"本课为必修第三册 Unit 1 第八课时（Project），为单元终极产出课。学生以 4 人小组为单位，整合本单元5种课型所学——听与说的节日词汇+阅读的\"现象—本质\"结构+语法的 -ing 形式+听与谈的策划句型+写作的记叙文——完成一份\"节日文化展览\"海报/展板。综合考查语言能力（词汇/语法/写作）、思维品质（信息组织）和学习能力（合作分工）。","overview":"【学情分析】A班：能独立完成分工作品，但需要明确任务清单。B班：group work 中有同学\"搭便车\"不干活，需明确定人定责。共同问题：小组合作时语言切换回中文——需设立\"英文监督员\"角色。","objectives":["语言能力：综合运用本单元词汇、-ing 形式、策划句型，以英文完成一份节日文化展览海报（标题/介绍/精神内核/活动/感悟）。","文化意识：通过展览形式向同伴传播节日文化的多样性与共通精神。","思维品质：在4人小组中合理分工、有效协作，培养项目管理思维。","学习能力：回顾本单元5课学习内容，建立\"一个单元学什么、怎么用\"的整体框架感。"],"keyPoints":"① 海报四模块：Festival Introduction（简介+时间）→ Spirit（精神内核）→ Activities（庆祝活动）→ Reflection（感悟） ② 单元知识整合：词汇/-ing 形式/策划句型/记叙文结构 ③ 小组分工：Writer / Designer / Editor / Presenter各司其职","difficulties":"① 小组分工时 Editor 常没事做 — 需明确所有角色都有事。提醒：editor不是\"挑错\"而是\"润色语言\"。② 海报语言过简（仅单词无句）— 要求每板块至少2句完整英文句。③ 展示时间控制 — 1.5分钟/组，超时扣分。","teachingMethods":"① PBL项目式学习：以展览为驱动问题 ② 小组协作：角色分工+checklist ③ 画廊漫步：全班互评","preparation":"【PPT课件】P1 单元回顾五课内容（思维导图）；P2 海报四模块结构；P3 角色分工卡；P4 范例参考；P5 评价量规；P6 自评表；P7 总结。【实物教具】A3白纸每组一张；彩笔/马克笔；角色分工卡 printed。","process":[{"step":"单元回顾","time":"5","content":"【PPT P1 思维导图】教师带学生回顾本单元5课学了什么：听与说（节日词汇+描述）→阅读（现象本质+-ing）→语法（-ing定语状语）→听与谈（策划分工）→写作（节日记叙文）。教师：Today we put it all together! 预设回答跟读回顾。板书时机：左栏画五课链接图。差异化提示：B班看PPT读关键词；A班自己说出来。易错点提醒：每个版块至少用一次 -ing 结构——这是单元核心语法。"},{"step":"任务布置+分工","time":"6","content":"【PPT P2 海报结构】【PPT P3 角色卡】教师展示海报四模块：①Introduction（选一个节日+简介+时间）②Spirit（精神内核是什么）③Activities（怎么庆祝）④Reflection（你的感悟）。角色分工：Writer写文案 / Designer设计排版 / Editor检查语言+语法 / Presenter准备展示。教师：Choose your festival and role. 预设回答：We choose the Spring Festival. I am the writer. 板书时机：留模块结构和角色。差异化提示：B班给语言模板（填空式）；A班自由写。易错点提醒：Designer 也是团队一员——和 Writer 商量文案长度才能排出好看版。"},{"step":"制作海报","time":"16","content":"【PPT P4 范例参考】【实物 A3纸】小组制作。教师要巡视提醒：①用英文！②每模块至少2句完整句 ③至少1个 -ing 结构 ④最后5分钟 Editor 检查语言。预设回答：（小组讨论制作中，教师巡视指导）板书时机：无。差异化提示：B班给句子开头提示（The festival is... / It is about...）；A班独立完成。易错点提醒：不要把所有内容挤在一起——留白是设计的一部分。标题要大、内容要分块。"},{"step":"展示评价","time":"10","content":"【PPT P5 量规】每组 1.5 分钟展示。全班投票：最佳内容/最佳设计/最佳展示。教师：You have 90 seconds. Go fast but clear! 预设回答展示。板书时机：记投票结果。差异化提示：B班可看海报读；A班脱稿补充。易错点提醒：1.5分钟很短——只讲最精彩的部分，不要逐字念。"},{"step":"单元自评","time":"3","content":"【PPT P6 自评表】学生勾选四维薄弱项：词汇记不住？-ing 形式不会用？策划句型忘了？写作结构不熟？写1条补强计划。教师：Be honest. This is for yourself, not for a grade. 预设回答：I need to practice -ing adverbials. I will review the grammar table tonight. 板书时机：留自评四维。差异化提示：B班中文写、A班英文写。易错点提醒：计划要具体到\"做什么\"+\"什么时候\"——不是\"我会复习\"，而是\"今晚复习 -ing 规则并造5句\"。"}],"blackboard":"┌─ U1 Project: Festival Exhibition ────┐\n│ 🎉 Poster 4 Modules:                   │\n│  ① Introduction (festival + time)      │\n│  ② Spirit (what is the core?)          │\n│  ③ Activities (how to celebrate?)      │\n│  ④ Reflection (your feeling)           │\n│                                        │\n│ 👥 Roles: Writer / Designer / Editor   │\n│          / Presenter                   │\n│                                        │\n│ ⭐ Must: English / ≥2 sentences per    │\n│         module / ≥1 -ing structure     │\n└────────────────────────────────────────┘","exercises":"【基础作业】完成小组海报（未完成的继续做），拍照片提交。写 30 词英文反思：我在小组中的贡献是…我从这个项目中学到了…【提高作业】选一个新闻中正在庆祝的外国节日，用英文写 50 词简报介绍时间+活动+精神。【参考答案——教师用】反思示例：My role was the writer. I wrote the introduction and the activities. I learned how to use -ing forms to describe festival scenes. What I can improve next time: check grammar before the deadline.","reflection":"✅ 亮点：海报四模块整合了全单元，学生产出有成就感。⚠️ 需改进：16分钟制作时间紧，下次可给20分钟。📌 下节课衔接：进入 Unit 2 Morals and Virtues，从节日文化转向道德抉择。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Project · Festivals and Celebrations (P8)"},{"id":"l-eng-b3-u2-ls","lessonId":"l-eng-b3-u2-ls","book":"必修第三册","unitNumber":2,"unitTitle":"Morals and Virtues","lessonType":"listening-speaking","lessonTypeName":"听与说","lessonNumber":1,"periodNumber":1,"duration":40,"grade":"高一","subject":"英语","tags":["听与说","道德","抉择","人教版必修三U2","第一节课"],"textbookAnalysis":"本课为必修第三册 Unit 2 Morals and Virtues 第一课时（Listening and Speaking），属单元导入+输入环节。听力材料为一段关于道德困境（moral dilemma）的对话与独白，功能语境是\"讨论生活中的道德选择\"。语言重点为道德词汇（moral, virtue, dilemma, choice, principle, sacrifice, responsible, honest）及表达抉择句型（If I were..., I would... / I think it is right to... / The dilemma is...）。为本单元 Reading 的\"林巧稚人生抉择\"传记做词汇与话题预热。","overview":"【学情分析】A班：对 moral/dilemma 等抽象词较生，但能理解简单道德情境。B班：对用英语讨论道德话题开口意愿低，听力抓细节弱。共同问题：讨论道德抉择时只说\"对/错\"二元判断，缺乏\"权衡利弊\"的多角度思维。","objectives":["语言能力：听懂关于道德困境的听力材料，提取关键信息（情境/冲突/选择/结果），准确使用 6-8 个道德核心词汇。","文化意识：了解中外道德观念的共通性，体会\"利他奉献\"的普世价值。","思维品质：通过\"听前预测—听中验证—听后权衡\"形成系统听力策略与辩证思维。","学习能力：能用 If I were..., I would... / I think it is right to... 就道德困境做简短发言。"],"keyPoints":"① 道德核心词汇：moral / virtue / dilemma / choice / principle / sacrifice / responsible / honest ② 抉择句型：If I were..., I would... / I think it is right to... / The dilemma is... ③ 听力微技能：听前读题支预测冲突点、听中抓选择与理由。","difficulties":"① dilemma（困境）拼写与发音。原因：词形特殊。易错点提醒：dilemma /dɪlemə/，双 m。② sacrifice（牺牲）抽象动词，学生易与 sacred 混淆。③ 道德困境无标准答案，听力时需听出多方观点。","teachingMethods":"① 任务型（TBL）：以讨论一个道德困境为终任务。② 听前预测+听中填卡：信息卡脚手架。③ 对子互问操练抉择句型。","preparation":"【PPT课件】P1 单元封面（Morals and Virtues）；P2 道德情境图片九宫格（让座/拾金不昧/见义勇为/诚实考试/帮助陌生人/遵守承诺/孝敬父母/保护弱者/公平竞争）；P3-4 听力任务题；P5 抉择句型板；P6 说话任务卡。【实物教具】道德困境信息卡 printed 每组一套。【音频】听力两段音频（教材配套）。","process":[{"step":"导入激活","time":"5","content":"【PPT P2 九宫格】教师：Look at these nine pictures. They all show moral choices. Which one have you experienced? 预设回答：Giving a seat to an old person! / Returning lost money! 板书时机：右侧板书 moral / virtue / dilemma。差异化提示：B班指图说中文再跟读英文；A班用 I once... 造句。易错点提醒：moral /mɒrəl/ — m 发 /m/ 不发 /n/，与 normal 区分。"},{"step":"词汇输入","time":"8","content":"【PPT P3 词卡】教师领读 moral / virtue / dilemma / choice / principle / sacrifice / responsible / honest。教师：What does \"sacrifice\" mean? 预设回答：To give up something for others. 板书时机：左栏板书词+短注释。差异化提示：B班配图记忆+词性标注；A班用词造句。易错点提醒：sacrifice /sækrɪfaɪs/ — sac 不是 sack，注意重音在第一音节。"},{"step":"听前预测","time":"5","content":"【PPT P4 题支】教师：We will listen to a story about a moral dilemma. Predict: What is the conflict? (self vs others / money vs honesty / career vs family) 预设回答：Self vs others! 板书时机：预测词写在黑板中部。差异化提示：B班给中文提示词；A班用英文说预测理由。易错点提醒：听力常见陷阱 — 角色会先说一个选择再说\"but actually\"推翻。"},{"step":"听中填卡","time":"10","content":"【PPT P5 表格】【音频 段一】播放听力，学生填信息卡（情境/冲突/选择/理由）。教师：What is the dilemma? What did the person choose? 预设回答：A student found a wallet. The dilemma is keep or return. He returned it. 板书时机：核对答案时填表于黑板中部。差异化提示：B班听两遍只填情境+选择；A班一遍填全。易错点提醒：principle /prɪnsɪpəl/ — 与 principal（校长）同音，需语境区分。"},{"step":"句型操练","time":"7","content":"【PPT P5 句型板】教师：How to express a moral choice? If I were..., I would... / I think it is right to... / The dilemma is... 教师示范后用一个情境造句。预设回答：If I were the student, I would return the wallet because honesty is a virtue. 板书时机：句型板书于中央。差异化提示：B班套用模板；A班替换情境+理由。易错点提醒：If I were 是虚拟语气，用 were 不用 was。"},{"step":"说话任务","time":"5","content":"【PPT P6 任务卡】学生两人一组，从信息卡中选一个道德困境互讨。教师：Discuss a moral dilemma with your partner. Use the sentence patterns. 预设回答：The dilemma is whether to tell the truth. If I were her, I would be honest. 板书时机：无。差异化提示：B班用填空式对话卡；A班自由讨论并追问理由。易错点提醒：whether（是否）与 weather（天气）同音，写作注意区分。"}],"blackboard":"┌─ U2 Listening & Speaking ──────┐\n│ moral / virtue / dilemma         │\n│ choice / principle / sacrifice   │\n│ responsible / honest             │\n│                                  │\n│ If I were..., I would...         │\n│ I think it is right to...        │\n│ The dilemma is...                │\n│                                  │\n│ Dilemma Card:                    │\n│  wallet | keep/return | honesty  │\n└──────────────────────────────────┘","exercises":"【基础作业】1. 听录音跟读听力文本 2 遍，圈出所有道德词汇。2. 用 If I were..., I would... 写 3 句道德抉择。【提高作业】用英文写一段 50 词：描述一个你遇到或听说的道德困境，包含情境/冲突/你的选择/理由。【参考答案——教师用】基础2示例：If I were the student, I would return the wallet. / If I were the doctor, I would save the patient first. / If I were the witness, I would tell the truth.","reflection":"✅ 亮点：九宫格激活+信息卡脚手架有效降听力焦虑，B班填卡完成率高。⚠️ 需改进：sacrifice 发音仍有困难，下节需强化。📌 下节课衔接：进入阅读 MOTHER OF TEN THOUSAND BABIES，从道德困境延伸到林巧稚的人生抉择。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Listening & Speaking · Morals and Virtues (P1)"},{"id":"l-eng-b3-u2-r1","lessonId":"l-eng-b3-u2-r1","book":"必修第三册","unitNumber":2,"unitTitle":"Morals and Virtues","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":2,"periodNumber":2,"duration":40,"grade":"高一","subject":"英语","tags":["阅读","道德","传记","林巧稚","人教版必修三U2","第二节课"],"textbookAnalysis":"本课为必修第三册 Unit 2 第二课时（Reading I），语篇 MOTHER OF TEN THOUSAND BABIES 是一篇人物传记，讲述\"万婴之母\"林巧稚医生的人生抉择——放弃婚姻与留学机会，将一生奉献给妇产科事业，接生近五万婴儿。结构为背景引入→人生关键抉择（留学/婚姻/抗战/新中国）→奉献精神升华。语言重点为传记衔接词（however, instead, after all）与道德主题词汇（sacrifice, principle, responsible, devote, deliver, reject）。承接第一课时词汇，本课语篇中出现 -ing 形式作宾语补足语。","overview":"【学情分析】A班：能快速把握段落主旨，但对\"个人牺牲vs社会奉献\"的辩证思维训练不足。B班：对林巧稚历史背景了解少，需时间线+图片脚手架。共同问题：传记的\"抉择链\"结构感知不清晰，易忽略 however/instead 等转折标志词。","objectives":["语言能力：读懂人物传记，提取林巧稚人生关键抉择的时间线/动机/结果；掌握 8-10 个论述类核心词汇。","文化意识：理解林巧稚\"医者仁心\"的奉献精神，形成\"个人价值与社会责任\"的辩证观念。","思维品质：通过\"抉择链\"分析培养传记结构思维与价值判断能力。","学习能力：能用时间轴+抉择表复述林巧稚的人生主线。"],"keyPoints":"① 传记结构：background → choices (study/marriage/war/new China) → devotion → legacy ② 时间线词汇：in 1901 / as a young girl / instead / after all ③ 核心短语：devote... to... / give up / carry sb through / tend to","difficulties":"① sacrifice（牺牲）在文中的具体含义——林巧稚牺牲了婚姻而非生命。原因：学生易泛化理解。② devote... to...（致力于）的 to 是介词后接 doing。③ reject（拒绝）与 refuse 的区别——reject 更强调\"主动排斥\"。","teachingMethods":"① 时间轴阅读：构建林巧稚人生抉择进程。② 抉择链追问：每个抉择问\"为什么/放弃了什么/结果如何\"。③ 价值讨论：个人vs社会。","preparation":"【PPT课件】P1 林巧稚照片与协和医院；P2 时代背景时间线（1901-1983）；P3-4 抉择链表；P5 传记结构图；P6 词汇对比表；P7 总结回顾。【实物教具】时间轴空白工作单 printed 每人一份；段落拼图卡。","process":[{"step":"导入设问","time":"5","content":"【PPT P1 林巧稚照片】教师：This is Dr. Lin Qiaozhi. She delivered over 50,000 babies but never married. Why? What choices did she make? 预设回答：Because she devoted her life to medicine? 板书时机：板书 choices? + 三个问号。差异化提示：B班中文猜；A班英文猜并给理由。易错点提醒：deliver /dɪlɪvə/ 在文中表\"接生\"，不是\"递送\"。"},{"step":"快速阅读抓主干","time":"8","content":"【PPT P3 时间轴】教师：Read fast (3 min). Find: ① What were her major life choices? ② What did she give up? ③ What was her legacy? 预设回答：① She chose medicine over marriage. ② She gave up studying abroad and a family. ③ She saved many mothers and babies. 板书时机：填时间轴的三个关键抉择。差异化提示：B班给三选一选项；A班写完整句。易错点提醒：physician /fɪzɪʃən/ — ph 发 /f/，不是 /p/。"},{"step":"精读段落1-3 背景与早期抉择","time":"10","content":"【PPT P4 抉择表】教师精讲：devote... to... = 致力于；give up = 放弃；carry sb through = 支撑某人度过。教师：Why did she choose medicine? 预设回答：Because her mother died and she wanted to help women. 板书时机：左侧栏补充\"devote to / give up / carry through\"。差异化提示：B班读后填关键词；A班读后用自己话解释。易错点提醒：devote to 中 to 是介词，后接 doing — \"devoted to serving\" 不是 \"devoted to serve\"。"},{"step":"精读段落4-5 奉献与精神","time":"10","content":"【PPT P5 行动链】教师：What did she do during the war? And after new China? 学生填表匹配（war period / new China / retirement → actions）。教师：How did she show her devotion? 预设回答：She opened a clinic during the war. She worked until she died. 板书时机：右侧画行动链箭头图。差异化提示：B班连线匹配；A班写完整句。易错点提醒：tend to（照料）中的 to 是介词，后接 doing 或名词。"},{"step":"归纳意义","time":"4","content":"【PPT P6 传记结构】教师：What can we learn from Dr. Lin? (sacrifice for others / devotion to duty / principle over personal gain) 预设回答：She sacrificed personal happiness for the greater good. We should be responsible. 板书时机：圈出结构关键词。差异化提示：B班跟读关键词；A班用自己的话总结。易错点提醒：greater good（更大的善）不是\"更大的好\"而是\"集体利益\"。"},{"step":"小结","time":"3","content":"【PPT P7 总结回顾】教师带学生回顾\"背景→抉择→奉献→精神\"结构+核心词汇。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述。易错点提醒：devotion /dɪvəʊʃən/ — 与 devotion（忠诚）同词，注意语境。"}],"blackboard":"┌─ U2 Reading I: MOTHER OF TEN THOUSAND ─┐\n│ BACKGROUND → CHOICES → DEVOTION → LEGACY │\n│                                          │\n│ Choices: medicine/marriage/war/retire    │\n│ Sacrifice: family, abroad, personal life │\n│ Legacy: 50,000 babies, medical ethics    │\n│                                          │\n│ devote to / give up / carry through      │\n│ tend to / reject / principle             │\n└──────────────────────────────────────────┘","exercises":"【基础作业】1. 朗读课文第2-3段 2 遍，圈出所有转折词（however/instead/after all）。2. 用时间轴上的3个关键抉择各写1句事件描述。【提高作业】用 80 词左右写一段：你认为林巧稚最艰难的抉择是什么？为什么？（用 sacrifice / devote to / principle）【参考答案——教师用】基础2示例：As a young girl, she chose to study medicine. / Instead of marrying, she devoted her life to women's health. / During the war, she opened a clinic to tend to the poor.","reflection":"✅ 亮点：时间轴+抉择链表有效组织信息，B班完成率高。⚠️ 需改进：devote to 后接 doing 学生仍感吃力。📌 下节课衔接：进入精读语言+-ing 形式作宾语补足语在语篇中的功能分析。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Reading and Thinking · Morals and Virtues (P2)"},{"id":"l-eng-b3-u2-r2","lessonId":"l-eng-b3-u2-r2","book":"必修第三册","unitNumber":2,"unitTitle":"Morals and Virtues","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":3,"periodNumber":3,"duration":40,"grade":"高一","subject":"英语","tags":["阅读","精读","-ing宾补","道德","人教版必修三U2","第三节课"],"textbookAnalysis":"本课为必修第三册 Unit 2 第三课时（Reading II），聚焦语篇 MOTHER OF TEN THOUSAND BABIES 的精读与语言分析。重点分析文中 -ing 形式作宾语补足语（saw her mother suffering / kept her working / found people waiting）在传记中的功能——补充宾语的状态，使描写更生动。同时深化语篇中高频学术词汇的用法辨析（devote / reject / tend / deliver / sacrifice）。","overview":"【学情分析】A班：能识别 -ing 形式，但辨析其作宾语补足语还是其他功能仍有困难。B班：-ing 宾补概念感模糊，需大量语境例句支撑。共同问题：阅读中见到 -ing 结构会跳过不分析其功能——学生把 -ing 当\"进行时一部分\"而非\"独立语法工具\"。","objectives":["语言能力：能在课文语境中识别并分析至少 5 个 -ing 形式作宾语补足语的用法，准确辨析功能。","文化意识：通过 -ing 宾补体会英语如何用简洁结构描写人物状态——不同于中文的习惯。","思维品质：分析 -ing 宾补在传记中的\"状态补充\"功能，培养语法服务于意义的意识。","学习能力：建立\"从读到写\"的语料库——积累课文中的优质 -ing 宾补句型用于后续写作。"],"keyPoints":"① 语篇中 -ing 作宾语补足语（see sb doing / keep sb doing / find sb doing / leave sb doing）② 传记高频动词：devote / reject / tend / deliver / sacrifice ③ -ing 宾补在传记中的修辞功能：补充状态→增强画面感","difficulties":"① -ing 宾补 vs 进行时的辨析。原因：形同功不同，需看句法位置。② reject（拒绝）与 refuse 的语感差异。③ tend（照料）与 tend to（倾向于）的区分 — 学生易混淆。","teachingMethods":"① 标注法：圈出文中所有 -ing 宾补结构并分析功能。② 替换练习：改写简单句为 -ing 宾补。③ 语料卡记录：分类摘录优质句子。","preparation":"【PPT课件】P1-2 课文中圈出的 -ing 宾补示例；P3 宾补结构对比表；P4 语料卡模板；P5 词汇辨析表；P6 句型改写练习；P7 总结回顾。【实物教具】课文复印件 printed 每人一份；高亮笔。","process":[{"step":"课文回顾","time":"5","content":"【PPT P1 结构图】教师：Last class we learned Dr. Lin's life choices. Can you recall the key events? 预设回答：She chose medicine. She gave up marriage. She delivered 50,000 babies. 板书时机：左栏写 1901/study/war/new China 时间线。差异化提示：B班看时间轴读关键词；A班完整复述。易错点提醒：recall ≠ remember — recall 更强调\"主动调取记忆\"。"},{"step":"-ing 宾补发现","time":"8","content":"【PPT P2 课文句子】发课文复印件。教师：Circle all -ing forms after verbs like see/keep/find/leave. Decide what they describe. 学生标记后全班核对。教师：What does this -ing describe? 预设回答：It describes what the object is doing — it's an object complement. 板书时机：逐句板书圈出的 -ing 宾补结构。差异化提示：B班给划线句直接圈 -ing；A班自己找+标注功能。易错点提醒：\"saw her mother suffering\" 中 suffering 补充说明 mother 的状态，是宾补不是进行时。"},{"step":"宾补结构辨析","time":"10","content":"【PPT P3 对比表】教师对比：宾补——补充宾语状态（see sb doing / keep sb doing / find sb doing / leave sb doing）；进行时——谓语动词（She is working）。教师例句辨析。预设回答辨析。板书时机：两列对比板书。差异化提示：B班根据提示选择填空；A班独立造句。易错点提醒：see sb do（看见全过程）vs see sb doing（看见正在进行）——含义不同。"},{"step":"语料库搭建","time":"10","content":"【PPT P4 模板】教师：Build your corpus. Categorize -ing complement sentences and key verbs. 学生分类填语料卡：①-ing 宾补优质句摘录 ②传记动词（devote/reject/tend/deliver/sacrifice）③转折衔接词。板书时机：巡视指导。差异化提示：B班填词；A班造句。预设回答：按道德主题语料库模板分类填写词条。易错点提醒：deliver 在文中表\"接生\"，与 deliver a speech（演讲）同词多义。"},{"step":"句型改写","time":"5","content":"【PPT P6 练习】教师：Combine these sentences using -ing complement. 例：She was working. I saw her. → I saw her working. 预设回答造句。板书时机：板书改写公式。差异化提示：B班给改写框架；A班独立改。易错点提醒：合并后宾语+suffering/working 构成\"宾语+宾补\"结构，不要加 that。"},{"step":"小结","time":"2","content":"【PPT P7 总结回顾】教师：Let's review -ing as object complement. 回顾 -ing 宾补功能+语料库。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述。易错点提醒：下节课语法课深入讲 -ing 宾补的动词搭配规则。"}],"blackboard":"┌─ U2 Reading II: Language Focus ──────┐\n│ -ing as Object Complement (宾补):      │\n│  see sb doing (看见...正在做)           │\n│  keep sb doing (让...一直做)            │\n│  find sb doing (发现...正在做)          │\n│  leave sb doing (让...持续做)           │\n│                                        │\n│ Verbs: devote / reject / tend          │\n│        deliver / sacrifice             │\n│                                        │\n│ see sb do (全过程) vs see sb doing     │\n│        (正在进行)                       │\n└────────────────────────────────────────┘","exercises":"【基础作业】1. 从课文中找出5个 -ing 宾补结构并标注动词+宾语。2. 将以下两句合并为 -ing 宾补：She was crying. I found her.【提高作业】用 -ing 宾补写3句描述一个医生工作的场景（用 see/find/keep）。【参考答案——教师用】基础2示例：I found her crying.","reflection":"✅ 亮点：标注发现法让学生主动探索语法，参与度高。⚠️ 需改进：see sb do vs see sb doing 区分仍有混淆，语法课需强化。📌 下节课衔接：进入语法课，系统讲 -ing 作宾语补足语的规则。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Reading and Thinking · Morals and Virtues (P3)"},{"id":"l-eng-b3-u2-g","lessonId":"l-eng-b3-u2-g","book":"必修第三册","unitNumber":2,"unitTitle":"Morals and Virtues","lessonType":"grammar","lessonTypeName":"语法","lessonNumber":4,"periodNumber":4,"duration":40,"grade":"高一","subject":"英语","tags":["语法","-ing形式","宾语补足语","道德","人教版必修三U2","第四节课"],"textbookAnalysis":"本课为必修第三册 Unit 2 第四课时（Discovering Useful Structures），系统教学 -ing 形式作宾语补足语的用法。基于 Reading 语篇中提取的例句，引导学生归纳出规则：常跟 -ing 宾补的动词（see/watch/hear/notice/observe 感官动词；keep/leave/find/send 使役状态动词）。-ing 宾补强调动作正在进行。通过道德主题的语境化练习巩固。","overview":"【学情分析】A班：知道 -ing 表进行时，但作宾补是语法新知。B班：-ing 宾补概念仍模糊，需大量语境化例句反复操练。共同问题：写作中要么不用 -ing 宾补，要么与 see sb do 混淆。","objectives":["语言能力：准确识别并产出 -ing 形式作宾语补足语的句子，在道德主题话题中产出 5 个以上正确句子。","文化意识：通过 -ing 宾补更生动地描写人物的行为状态。","思维品质：通过\"发现例句→归纳规则→应用规则\"的归纳法培养语法学习策略。","学习能力：建立\"语法自查表\"——写作后自行检查 -ing 宾补的动词搭配是否正确。"],"keyPoints":"① 感官动词+宾补：see/watch/hear/notice/observe sb doing ② 使役状态动词+宾补：keep/leave/find/send sb doing ③ -ing 宾补（正在进行）vs do 宾补（全过程）的区别","difficulties":"① see sb doing vs see sb do 的区别。原因：形近意不同。② keep sb doing（让…一直做）中 keep 的使役用法。③ -ing 宾补与 -ing 状语的辨析——位置和功能不同。","teachingMethods":"① 归纳法（Guided Discovery）：例句→规则→练习 ② 改写对比：see sb do vs see sb doing ③ 改错练习：纠正典型错误","preparation":"【PPT课件】P1 感官vs使役动词对比表；P2 课文例句摘录；P3 规则归纳页；P4 do vs doing 对比；P5 改写任务卡；P6 改错题；P7 总结。【实物教具】句型卡一套；改写工作单。","process":[{"step":"例句发现","time":"7","content":"【PPT P2 例句】展示课文中5个 -ing 宾补结构，学生圈动词+宾语+-ing。教师：What verb comes before -ing? What does -ing describe? 预设回答：The verb is see/keep/find. The -ing describes the object's action. 板书时机：左栏板书例句，标注动词+宾语+-ing。差异化提示：B班只圈词不分析功能；A班分析 -ing 补充什么。易错点提醒：-ing 宾补紧跟在宾语之后，补充说明宾语正在做什么。"},{"step":"规则归纳","time":"12","content":"【PPT P3 对比表】教师引导学生归纳两类动词：①感官动词 see/watch/hear/notice/observe sb doing ②使役状态动词 keep/leave/find/send sb doing。教师：When do we use -ing after these verbs? 预设回答：When the action is happening — in progress! 板书时机：板书完整两类动词对比表。差异化提示：B班填已给框架表；A班自己画表填。易错点提醒：keep sb doing 表\"让某人一直做\"，强调持续——\"keep me waiting\"（让我一直等）。"},{"step":"do vs doing 讲练","time":"8","content":"【PPT P4 结构】教师：see sb do = 看见全过程（已结束）；see sb doing = 看见正在进行（未结束）。例句：I saw her cross the street. (全过程) / I saw her crossing the street. (正在进行) 预设回答辨析：第一句强调看完整个过马路，第二句强调路过时看到。板书时机：板书 do vs doing 对比公式。差异化提示：B班选词填空（do/doing）；A班改写句子。易错点提醒：hear sb do（听见全过程）vs hear sb doing（听见正在发生）——同理。"},{"step":"改写操练","time":"8","content":"【PPT P5 改写卡】教师：Combine the sentences using -ing complement. 例：The doctor was working. I watched her. → I watched the doctor working. 教师抽学生板演。预设回答造句。板书时机：板书改写公式。差异化提示：B班给句型框；A班自由改写并追加道德主题细节。易错点提醒：改写后检查——宾语+-ing 构成宾补，不要加 that 或 who。"},{"step":"改错巩固","time":"3","content":"【PPT P6 改错】教师：Find the mistakes. 展示 3 个典型错误：①I saw him to run.（应去掉 to）②She kept me wait.（应 waiting）③I found that he was reading a book → I found him reading a book.（简化）。学生纠错并解释。预设回答纠错。板书时机：板书错误→改正公式。差异化提示：B班辨别对错选；A班解释为什么错。易错点提醒：最常犯——感官动词后加 to do（错），应为 do 或 doing。"},{"step":"小结","time":"2","content":"【PPT P7 总结】教师：Let's review. 回顾 -ing 宾补两类动词+do vs doing+改错要诀。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述规则。易错点提醒：写作后自查——感官/使役动词后宾补是否用了 -ing？"}],"blackboard":"┌─ U2 Grammar: -ing as Object Complement ───┐\n│ 感官动词:                                   │\n│  see/watch/hear/notice/observe sb doing     │\n│ 使役状态动词:                               │\n│  keep/leave/find/send sb doing              │\n│                                             │\n│ see sb do (全过程) vs see sb doing (进行)   │\n│ hear sb do vs hear sb doing                 │\n│                                             │\n│ ⚠️ No \"to\" after sense verbs!               │\n│ ✗ I saw him to run. → ✓ I saw him running.  │\n└─────────────────────────────────────────────┘","exercises":"【基础作业】1. 用 see/find/keep + sb doing 各造 2 句关于医生工作的句子。2. 将以下两句合并为 -ing 宾补：The nurse was caring for patients. I watched her.【提高作业】写 60 词短文描述一次医院见闻，要求至少用 3 个 -ing 宾补结构。【参考答案——教师用】基础1示例：I saw the doctor operating on a patient. / I found the nurse caring for a baby. / The long shift kept her working all night. 基础2示例：I watched the nurse caring for patients.","reflection":"✅ 亮点：改写对比让语法操练不再枯燥，课堂活跃度高。⚠️ 需改进：do vs doing 区分仍是难点，听与谈课可融入练习。📌 下节课衔接：听与谈聚焦道德情境讨论，用语篇巩固 -ing 宾补。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Discovering Useful Structures · Morals and Virtues (P4)"},{"id":"l-eng-b3-u2-lt","lessonId":"l-eng-b3-u2-lt","book":"必修第三册","unitNumber":2,"unitTitle":"Morals and Virtues","lessonType":"listening-talking","lessonTypeName":"听与谈","lessonNumber":5,"periodNumber":5,"duration":40,"grade":"高一","subject":"英语","tags":["听与谈","道德情境","讨论","人教版必修三U2","第五节课"],"textbookAnalysis":"本课为必修第三册 Unit 2 第五课时（Listening and Talking），语境为\"讨论道德伦理情境\"。听力材料为一段关于诚信/责任/利他等伦理场景的讨论对话，口语输出任务为就一个道德情境做辩论与表态。功能语言为表达观点与权衡（I believe... / On one hand... / On the other hand... / It depends on...）。结合语法课所学的 -ing 宾补，在口语中自然运用描述他人行为状态。","overview":"【学情分析】A班：能表达简单观点，但缺乏\"正反权衡\"的辩证表达链。B班：开口意愿低、辩证句型储备少。共同问题：只说观点不权衡，缺少 On the other hand... 使表达片面。","objectives":["语言能力：听懂关于道德情境讨论的对话，提取观点与理由；能用至少 4 种句型表达观点并权衡。","文化意识：体会\"道德选择需要权衡利弊\"的理性思辨精神。","思维品质：在讨论中练习\"表态→正方→反方→结论\"的完整对话链。","学习能力：通过辩论对话训练批判性倾听——听懂后回应而非只等自己说。"],"keyPoints":"① 观点句型：I believe... / In my opinion... / I think it is right to... ② 权衡句型：On one hand... / On the other hand... / It depends on... / However... ③ 听力重点：抓住观点+理由的配对信息","difficulties":"① On one hand... On the other hand... 是权衡不是对立 — 学生易理解为完全对立。原因：母语干扰。② depend on（取决于）的介词 on 易漏。③ 回应时 only say \"I agree\" no weighing — 需培养 However 跟进的意识。","teachingMethods":"① 听前预测→听中配对→听后产出 ② 角色扮演：三人一组（支持者+反对者+中立方）③ 道德情境辩论圆桌","preparation":"【PPT课件】P1 待讨论道德情境（诚信考试/见义勇为/帮助陌生人）；P2 观点句型板；P3 听力任务题；P4 听力任务卡；P5 权衡句型板；P6 角色卡。【实物教具】道德情境建议卡 printed；角色卡。","process":[{"step":"导入激活","time":"5","content":"【PPT P1 道德情境】教师：Your friend is cheating in an exam. You saw him cheating. What should you do? 预设回答：Tell the teacher! / Pretend not to see. 板书时机：左栏板书动词 tell / report / ignore / confront。差异化提示：B班中文说再翻英文；A班直接英文。易错点提醒：cheat（作弊）≠ cheat on（对…不忠），语境区分。"},{"step":"听力抓观点","time":"10","content":"【PPT P3 听力任务】听对话，抓\"谁持什么观点+什么理由\"。教师：Listen for: What is the opinion? What is the reason? 预设回答：She believes honesty matters because trust is the foundation. 板书时机：配对填表（观点|理由）。差异化提示：B班给配对连线题；A班听写关键词。易错点提醒：listen for（有目的地听）≠ listen to（泛听）——引导学生带问题听。"},{"step":"听中记录","time":"8","content":"【PPT P4 听力任务卡】【音频】重听，学生填完整观点+权衡链。教师：How did they weigh both sides? 预设回答：On one hand, honesty matters. On the other hand, friendship matters too. 板书时机：核对填表。差异化提示：B班听两遍；A班一遍+复述权衡。易错点提醒：On the other hand 中的 the 不可省——固定搭配。"},{"step":"句型操练","time":"7","content":"【PPT P5 句型板】教师带领操练观点+权衡链：A: I believe we should tell the truth. / B: On one hand, honesty matters. On the other hand, friendship is important too. / A: It depends on the situation. 预设回答跟读+仿造。板书时机：板书观点→权衡链条。差异化提示：B班用填空脚本；A班自主对话。易错点提醒：depend on 后接 doing 或名词 — \"depends on the situation\" 不是 \"depends the situation\"。"},{"step":"角色扮演","time":"8","content":"【PPT P6 角色卡】三人一组：Supporter A（支持者）、Opponent B（反对者）、Mediator C（中立方）。就\"是否应该举报朋友作弊\"辩论。教师巡视。预设回答：A: I believe we should report it. / B: On the other hand, he is my friend. / C: It depends on whether it's the first time. 板书时机：留观点句型和权衡链供参考。差异化提示：B班照卡读；A班脱稿加即兴内容。易错点提醒：角色扮演中注意用 -ing 宾补描述行为 — \"I saw him copying answers.\""},{"step":"小结","time":"2","content":"【PPT P7 总结】教师：Remember to weigh both sides. 回顾观点句型+权衡策略。预设回答跟读。板书时机：圈重点句型。差异化提示：B班齐读；A班每人说一句收获。易错点提醒：给观点后记得加\"on the other hand\"——辩证才完整。"}],"blackboard":"┌─ U2 Listening & Talking ─────────┐\n│ Opinions:                          │\n│  I believe...                      │\n│  In my opinion...                  │\n│  I think it is right to...         │\n│                                    │\n│ Weighing:                          │\n│  On one hand...                    │\n│  On the other hand...              │\n│  It depends on...                  │\n│  However...                        │\n│                                    │\n│ Chain: Opinion → Pro → Con → Concl │\n└────────────────────────────────────┘","exercises":"【基础作业】1. 听录音跟读 2 遍，圈出所有观点句型。2. 用至少 2 种观点句型各写 1 句道德表态+权衡。【提高作业】写 60 词对话：三人讨论\"是否应该帮助摔倒的陌生人\"（至少 4 轮，含观点与权衡）。【参考答案——教师用】基础2示例：I believe we should help. On one hand, kindness matters. On the other hand, we must protect ourselves. / In my opinion, it depends on the situation.","reflection":"✅ 亮点：角色扮演三角色设置让学生理解真实辩论中的多元声音。⚠️ 需改进：On the other hand 使用率仍需提高，写作课可设置强制格式。📌 下节课衔接：进入写作，将道德困境写成记叙文。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Listening and Talking · Morals and Virtues (P5)"},{"id":"l-eng-b3-u2-w1","lessonId":"l-eng-b3-u2-w1","book":"必修第三册","unitNumber":2,"unitTitle":"Morals and Virtues","lessonType":"writing","lessonTypeName":"写作","lessonNumber":6,"periodNumber":6,"duration":40,"grade":"高一","subject":"英语","tags":["写作","记叙文","道德困境","人教版必修三U2","第六节课"],"textbookAnalysis":"本课为必修第三册 Unit 2 第六课时（Reading for Writing I），写作体裁为记叙文——写一次道德困境经历。结构为：背景设定（when/where/who）→ 困境冲突（what was the dilemma）→ 抉择经过（what did you do, in order）→ 感悟升华（what you learned）。语言重点为记叙文时间连接词（first, then, after that, finally）与道德描写词（honest, responsible, sacrifice, principle）。结合本单元 Reading 的抉择精神与语法课的 -ing 宾补，实现读-语法-写的闭环。","overview":"【学情分析】A班：有基本叙事能力，但缺乏\"冲突→抉择→感悟\"的升华意识——常写成流水账。B班：句型储备少、时态混乱，需大量脚手架。共同问题：记叙文不知如何收尾——缺少\"这次经历让我明白…\"的感悟句。","objectives":["语言能力：掌握\"背景—困境—抉择—感悟\"四段式记叙文结构，在道德困境话题中产出 80-100 词结构完整的短文。","文化意识：通过书写道德抉择体会\"诚信/责任/利他\"的道德价值。","思维品质：通过\"先叙事再感悟\"训练事件—冲突—抉择—意义的递进逻辑思维。","学习能力：建立\"写作前先搭结构框架\"的习惯——用 outline 而非直接开写。"],"keyPoints":"① 记叙文四段结构：Background (when/where/who) → Dilemma (what was the conflict) → Choice (what did you do) → Reflection (what you learned) ② 时间连接词：First / Then / After that / Finally ③ 核心句型：I was faced with... / I decided to... / It taught me that...","difficulties":"① 记叙文时态——主体用过去时，感悟升华可用现在时。原因：学生易全文现在时。② dilemma 描写要具体——不能只说\"很难\"。③ 感悟升华句不知道怎么写——需给模板。","teachingMethods":"① 范文解构法：读范文→画结构图→仿写 ② 语料卡搭建：从本单元5课积累词汇/句型。③ 过程写作：outline→draft→peer review→revise","preparation":"【PPT课件】P1 范文（关于一次诚信考验的记叙文）；P2 四段结构图；P3 时间连接词表；P4 语料库模板；P5 写作提纲；P6 写作任务；P7 总结。【实物教具】四段结构空白工作单 printed 每人一份；语料卡模板。","process":[{"step":"范文解构","time":"8","content":"【PPT P1 范文】教师展示范文，学生标注四段（背景/困境/抉择/感悟）。教师：Which paragraph describes the dilemma? Which tells the lesson? 预设回答：Paragraph 2 — the dilemma. Paragraph 4 — the lesson. 板书时机：画四段结构框。差异化提示：B班给标注好的范文只匹配段号；A班自己画结构+标注连接词。易错点提醒：最后一段必须有\"It taught me that...\"才算完整升华。"},{"step":"四段结构讲透","time":"8","content":"【PPT P2 结构图】教师逐段讲解：P1 2句设定背景（when/where/who）→ P2 2句描述困境（what was the conflict）→ P3 3-4句叙述抉择经过（first/then/finally）→ P4 2句写感悟（what you learned）。教师示范写一段。预设回答跟读结构要点。板书时机：逐段板书模板句。差异化提示：B班给每段填空模板；A班给关键词自己写。易错点提醒：P2 的困境要具体 — 不要只说\"it was hard\"，要说\"I was torn between honesty and friendship.\""},{"step":"连接词+句型","time":"5","content":"【PPT P3 词表】教师领读时间连接词：First / Then / After that / Finally / At last。教师示例句：First, I found the wallet. Then, I hesitated. After that, I decided to return it. Finally, the owner thanked me. 预设回答跟读。板书时机：板书连接词于侧栏。差异化提示：B班选词填空；A班用全级连接词写一段。易错点提醒：after that 后接逗号 — \"After that, I...\" 不是 \"After that I...\""},{"step":"积语料","time":"5","content":"【PPT P4 语料库】教师：Build your word bank. Extract moral verbs, dilemma words, and -ing patterns. 学生从本单元5课中提取：①道德动词（sacrifice/devote/reject/tend）②困境描写词（torn/conflicted/hesitate）③-ing 宾补模板（I saw him... / I found her...）。板书时机：巡视。差异化提示：B班填词；A班造句。预设回答：按道德主题语料库分类卡填写词条。易错点提醒：同一意思用不同词替换避免重复——第一段说 hard，第三段说 difficult / challenging。"},{"step":"提纲+起草","time":"10","content":"【PPT P5 写作提纲】选一次道德困境经历，写 80 词记叙文 outline（四段各写关键词）。教师巡视指导 outline。教师：Don't write sentences yet — just key words. 预设回答：P1: last exam / classroom / me / P2: found wallet / keep or return / P3: hesitated / returned / thanked / P4: honesty matters. 板书时机：留结构框供参考。差异化提示：B班用填空 outline；A班独立列提纲。易错点提醒：outline 不是草稿——用短语不是完整句。这是写前最重要的一步。"},{"step":"互评提纲","time":"4","content":"【PPT P6 写作任务】同桌互换提纲，检查：四段都有吗？困境段具体吗？感悟段有升华句吗？教师：Your partner's outline: does it have all 4 parts? 预设回答：Yes, but the reflection is too short. 板书时机：留 checklist。差异化提示：B班用 checklist 表逐项打勾；A班口头给改进建议。易错点提醒：互评不是挑刺——给一个赞美+一个建议。\"Good outline! Maybe add a lesson sentence in paragraph 4.\""}],"blackboard":"┌─ U2 Writing: Moral Dilemma Story ────┐\n│ P1 Background: Last..., at..., with...│\n│ P2 Dilemma: I was torn between...     │\n│ P3 Choice: First,... Then,... Finally │\n│ P4 Reflection: It taught me that...   │\n│                                       │\n│ Linkers: First / Then / After that    │\n│         Finally / At last             │\n│                                       │\n│ Word Bank: sacrifice / devote / reject│\n│  torn / conflicted / hesitate / honest│\n└───────────────────────────────────────┘","exercises":"【基础作业】按课堂 outline 写完 80 词道德困境记叙文初稿。要求：四段结构完整、至少 2 个时间连接词、至少 1 个 -ing 宾补。【提高作业】就同一困境写一则 30 词以内的反思语（英文），要求有哲理性有感染力。【参考答案——教师用】基础示例（节选）：Last week, I was faced with a dilemma. I found a wallet in the classroom. I was torn between keeping it and returning it. First, I hesitated. Then, I thought about the owner. After that, I decided to return it. Finally, the owner thanked me warmly. It taught me that honesty is always the right choice.","reflection":"✅ 亮点：四段结构框架让学生从\"不知道写什么\"变为\"知道每段写什么\"。⚠️ 需改进：时态混用仍需纠正，下节课用改错题强化。📌 下节课衔接：进入写作 II，互评修改+誊抄终稿。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Writing · Morals and Virtues (P6)"},{"id":"l-eng-b3-u2-w2","lessonId":"l-eng-b3-u2-w2","book":"必修第三册","unitNumber":2,"unitTitle":"Morals and Virtues","lessonType":"writing","lessonTypeName":"写作","lessonNumber":7,"periodNumber":7,"duration":40,"grade":"高一","subject":"英语","tags":["写作","互评","修改","道德","人教版必修三U2","第七节课"],"textbookAnalysis":"本课为必修第三册 Unit 2 第七课时（Writing II），在 Writing I 提纲+初稿的基础上完成\"互评→修改→展示→终稿\"闭环。重点训练学生用同学反馈改进写作的能力。互评量表聚焦三维度：结构完整（4段）、语言质量（连接词/-ing 宾补/词汇）、语法准确（时态/三单/标点）。","overview":"【学情分析】A班：能辨别别人文章的好坏，但给反馈时只说\"写得不错\"缺乏具体点。B班：改自己的稿时不知从何下手。共同问题：互评流于表面，不会用检查量表逐项给分。","objectives":["语言能力：能根据互评量表给同伴的道德记叙文初稿提具体、可操作的修改建议。","文化意识：通过阅读同伴的道德经历了解不同价值取向。","思维品质：在互评中培养\"识别问题→提出方案\"的批判性反馈能力。","学习能力：建立\"写→评→改→展\"四步写作流程，内化为个人写作习惯。"],"keyPoints":"① 互评三维量表：结构（4段完整）+ 语言（连接词≥2 / -ing宾补≥1 / 词汇多样性）+ 语法（时态/三单/标点） ② 改稿有侧重：先改结构再改语法 ③ 展示礼仪：大声/清晰/目视听众","difficulties":"① 学生互评时不好意思提缺点 — 需引导\"给建议就是帮助对方进步\"。② 时态混用重复出错——主体过去时，感悟现在时。③ 修改时学生只改拼写不改结构 — 需强制\"先查四段是否完整\"。","teachingMethods":"① 量表互评：用统一标准减少主观性 ② 对子互评→修改→展示 ③ 最佳记叙文评选","preparation":"【PPT课件】P1 互评三维量表；P2 共性错误（时态混用/连接词缺/升华弱）；P3 修改指南；P4 展示礼仪；P5 最佳记叙文范例；P6 写作提纲回顾；P7 总结。【实物教具】互评量表 printed 每人一份；红笔。","process":[{"step":"量表培训","time":"5","content":"【PPT P1 互评量表】教师逐维讲解：①结构（4段都给√/缺→标出）②语言（圈连接词≥2？-ing宾补≥1？词汇重复？）③语法（时态？三单？标点？）。教师用上节课自己写的范文示范打分。预设回答跟学。板书时机：量表三维板书于黑板。差异化提示：B班按量表逐项打勾即可；A班还需写一句\"最需要改进的地方\"。易错点提醒：互评不是打分比高低——是帮对方变得更好。"},{"step":"起草+互评","time":"12","content":"【PPT P2 共性错误】教师：First, look at common mistakes. 先展示上节课共性错：①时态混用②感悟段缺\"It taught me\"③连接词缺。然后同桌互换初稿，用红笔按量表标注。教师巡视。教师：Give one praise and one suggestion. 预设回答：Your structure is good, but the tense is mixed. 板书时机：留量表供参考。差异化提示：B班按checklist勾；A班在稿上写具体修改建议。易错点提醒：提建议时用\"I suggest...\"而非\"You should...\"——更礼貌。"},{"step":"修改","time":"10","content":"【PPT P3 修改指南】学生根据互评反馈修改初稿。顺序：①先补结构（缺哪段补哪段）②再加语言（插入连接词/-ing宾补）③最后查语法（时态统一）。教师：Don't just fix spelling — check structure first! 预设回答：I fixed the tense and added an -ing complement in paragraph 3. 板书时机：留修改顺序。差异化提示：B班对照量表逐条改；A班改完还润色词汇替换。易错点提醒：修改不是重写——保留原文好的部分，只在薄弱处补强。"},{"step":"展示评选","time":"8","content":"【PPT P4 展示礼仪】教师：Read loudly and look at the audience. 2-3 组自愿上台读记叙文。全班投票：最感人的抉择/结构最完整的/最有哲理性的。预设回答展示。板书时机：留展示评分维度。差异化提示：B班可看稿读；A班尽量脱稿。易错点提醒：上台读稿不要太快——你写了100词不等于听众能消化100词。"},{"step":"结课","time":"5","content":"【PPT P7 总结】教师：Next time you write, remember this process. 回顾写作闭环：outline→draft→peer review→revise→final。预设回答：I will make an outline first. 板书时机：画闭环流程图。差异化提示：B班齐读流程；A班说自己的收获。易错点提醒：最好的写作习惯是\"先结构后语言\"——不要跳跃步骤。"}],"blackboard":"┌─ U2 Writing II: Peer Review ────────┐\n│ WRITING PROCESS:                      │\n│  Outline → Draft → Peer → Revise →   │\n│  → Final → SHARE                     │\n│                                       │\n│ Review Checklist:                     │\n│  ✅ 4 paragraphs?                     │\n│  ✅ ≥2 linkers?                       │\n│  ✅ ≥1 -ing complement?               │\n│  ✅ Reflection sentence?              │\n│  ✅ Grammar (tense / 3rd p / ;)       │\n└───────────────────────────────────────┘","exercises":"【基础作业】根据课堂反馈修改终稿，誊抄提交。自评：在稿末写 1 句\"这次写作最大的进步是…\" 【提高作业】调查另一个道德困境案例（可基于新闻），用\"背景—困境—抉择—感悟\"框架写 80 词记叙文。【参考答案——教师用】参考 Writing I 的 exercises 答案。终稿评估标准：结构4段完整（2分）+连接词≥2（2分）+-ing宾补≥1（2分）+升华有力（2分）+语法准确（2分）= 10分。","reflection":"✅ 亮点：量表培训解决了\"不知道评什么\"的问题，B班互评质量明显提升。⚠️ 需改进：修改环节时间偏紧，下次可给15分钟。📌 下节课衔接：进入 Project，将本单元5课所学整合为道德楷模展览。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Writing · Morals and Virtues (P7)"},{"id":"l-eng-b3-u2-p","lessonId":"l-eng-b3-u2-p","book":"必修第三册","unitNumber":2,"unitTitle":"Morals and Virtues","lessonType":"project","lessonTypeName":"项目复习","lessonNumber":8,"periodNumber":8,"duration":40,"grade":"高一","subject":"英语","tags":["项目","复习","道德","展览","人教版必修三U2","第八节课"],"textbookAnalysis":"本课为必修第三册 Unit 2 第八课时（Project），为单元终极产出课。学生以 4 人小组为单位，整合本单元5种课型所学——听与说的道德词汇+阅读的\"抉择链\"结构+语法的 -ing 宾补+听与谈的辩论句型+写作的记叙文——完成一份\"道德楷模展览\"海报/展板。综合考查语言能力（词汇/语法/写作）、思维品质（信息组织）和学习能力（合作分工）。","overview":"【学情分析】A班：能独立完成分工作品，但需要明确任务清单。B班：group work 中有同学\"搭便车\"不干活，需明确定人定责。共同问题：小组合作时语言切换回中文——需设立\"英文监督员\"角色。","objectives":["语言能力：综合运用本单元词汇、-ing 宾补、辩论句型，以英文完成一份道德楷模展览海报（标题/简介/抉择/精神/感悟）。","文化意识：通过展览形式向同伴传播道德楷模的奉献精神。","思维品质：在4人小组中合理分工、有效协作，培养项目管理思维。","学习能力：回顾本单元5课学习内容，建立\"一个单元学什么、怎么用\"的整体框架感。"],"keyPoints":"① 海报四模块：Figure Introduction（楷模简介）→ Dilemma（关键抉择）→ Spirit（精神品质）→ Reflection（你的感悟） ② 单元知识整合：词汇/-ing 宾补/辩论句型/记叙文结构 ③ 小组分工：Writer / Designer / Editor / Presenter各司其职","difficulties":"① 小组分工时 Editor 常没事做 — 需明确所有角色都有事。提醒：editor不是\"挑错\"而是\"润色语言\"。② 海报语言过简（仅单词无句）— 要求每板块至少2句完整英文句。③ 展示时间控制 — 1.5分钟/组，超时扣分。","teachingMethods":"① PBL项目式学习：以展览为驱动问题 ② 小组协作：角色分工+checklist ③ 画廊漫步：全班互评","preparation":"【PPT课件】P1 单元回顾五课内容（思维导图）；P2 海报四模块结构；P3 角色分工卡；P4 范例参考；P5 评价量规；P6 自评表；P7 总结。【实物教具】A3白纸每组一张；彩笔/马克笔；角色分工卡 printed。","process":[{"step":"单元回顾","time":"5","content":"【PPT P1 思维导图】教师：Let's review. What did we learn this unit? 教师带学生回顾本单元5课：听与说（道德词汇+抉择）→阅读（林巧稚抉择链+-ing宾补）→语法（-ing宾补）→听与谈（辩论权衡）→写作（道德记叙文）。预设回答跟读回顾。板书时机：左栏画五课链接图。差异化提示：B班看PPT读关键词；A班自己说出来。易错点提醒：每个版块至少用一次 -ing 宾补——这是单元核心语法。"},{"step":"任务布置+分工","time":"6","content":"【PPT P2 海报结构】【PPT P3 角色卡】教师：Choose a moral figure and a role. 教师展示海报四模块：①Introduction（选一位道德楷模+简介）②Dilemma（关键抉择是什么）③Spirit（精神品质）④Reflection（你的感悟）。角色分工：Writer写文案 / Designer设计排版 / Editor检查语言+语法 / Presenter准备展示。预设回答：We choose Dr. Lin. I am the writer. 板书时机：留模块结构和角色。差异化提示：B班给语言模板（填空式）；A班自由写。易错点提醒：Designer 也是团队一员——和 Writer 商量文案长度才能排出好看版。"},{"step":"制作海报","time":"16","content":"【PPT P4 范例参考】【实物 A3纸】教师：Use English! At least 2 sentences per module, 1 -ing complement. 小组制作。教师要巡视提醒：①用英文！②每模块至少2句完整句 ③至少1个 -ing 宾补 ④最后5分钟 Editor 检查语言。预设回答：（小组讨论制作中，教师巡视指导）板书时机：无。差异化提示：B班给句子开头提示（The figure is... / She chose...）；A班独立完成。易错点提醒：不要把所有内容挤在一起——留白是设计的一部分。标题要大、内容要分块。"},{"step":"展示评价","time":"10","content":"【PPT P5 量规】教师：You have 90 seconds. Go fast but clear! 每组 1.5 分钟展示。全班投票：最佳内容/最佳设计/最佳展示。预设回答展示。板书时机：记投票结果。差异化提示：B班可看海报读；A班脱稿补充。易错点提醒：1.5分钟很短——只讲最精彩的部分，不要逐字念。"},{"step":"单元自评","time":"3","content":"【PPT P6 自评表】教师：Be honest. This is for yourself. 学生勾选四维薄弱项：词汇记不住？-ing 宾补不会用？辩论句型忘了？写作结构不熟？写1条补强计划。预设回答：I need to practice -ing complements. I will review the grammar table tonight. 板书时机：留自评四维。差异化提示：B班中文写、A班英文写。易错点提醒：计划要具体到\"做什么\"+\"什么时候\"——不是\"我会复习\"，而是\"今晚复习 -ing 宾补并造5句\"。"}],"blackboard":"┌─ U2 Project: Moral Figure Exhibition ─┐\n│ 🌟 Poster 4 Modules:                   │\n│  ① Introduction (figure + brief)       │\n│  ② Dilemma (key choice?)                │\n│  ③ Spirit (what virtue?)                │\n│  ④ Reflection (your lesson)             │\n│                                        │\n│ 👥 Roles: Writer / Designer / Editor   │\n│          / Presenter                   │\n│                                        │\n│ ⭐ Must: English / ≥2 sentences per    │\n│         module / ≥1 -ing complement    │\n└────────────────────────────────────────┘","exercises":"【基础作业】完成小组海报（未完成的继续做），拍照片提交。写 30 词英文反思：我在小组中的贡献是…我从这个项目中学到了…【提高作业】选一位新闻中的道德楷模，用英文写 50 词简报介绍抉择+精神。【参考答案——教师用】反思示例：My role was the writer. I wrote the introduction and the dilemma. I learned how to use -ing complements to describe actions. What I can improve next time: check grammar before the deadline.","reflection":"✅ 亮点：海报四模块整合了全单元，学生产出有成就感。⚠️ 需改进：16分钟制作时间紧，下次可给20分钟。📌 下节课衔接：进入 Unit 3 Diverse Cultures，从道德抉择转向文化多样性。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Project · Morals and Virtues (P8)"},{"id":"l-eng-b3-u3-ls","lessonId":"l-eng-b3-u3-ls","book":"必修第三册","unitNumber":3,"unitTitle":"Diverse Cultures","lessonType":"listening-speaking","lessonTypeName":"听与说","lessonNumber":1,"periodNumber":1,"duration":40,"grade":"高一","subject":"英语","tags":["听与说","多元文化","世界城市","人教版必修三U3","第一节课"],"textbookAnalysis":"本课为必修第三册 Unit 3 Diverse Cultures 第一课时（Listening and Speaking），属单元导入+输入环节。听力材料为一段介绍世界多元文化城市（旧金山/伦敦/纽约/多伦多）的对话与独白，功能语境是\"描述城市的文化多样性\"。语言重点为多元文化词汇（diverse, culture, immigrant, melting pot, community, ethnic, variety, unique）及描述城市句型（It is known for... / The city features... / People from... gather here）。为本单元 Reading 的\"旧金山旅行日记\"做词汇与话题预热。","overview":"【学情分析】A班：对旧金山/纽约等城市名称较熟，但 diverse/immigrant/melting pot 等抽象词较生。B班：对移民史背景了解少，听力抓细节弱。共同问题：描述城市停留在\"big, modern\"表层，缺乏\"文化多样性\"表达。","objectives":["语言能力：听懂关于多元文化城市的听力材料，提取关键信息（城市/族群/特色/意义），准确使用 6-8 个多元文化核心词汇。","文化意识：了解世界城市的文化多样性，体会\"多元共生\"的包容精神。","思维品质：通过\"听前预测—听中验证—听后比较\"形成系统听力策略。","学习能力：能用 It is known for... / The city features... 就城市文化多样性做简短描述与对比。"],"keyPoints":"① 多元文化核心词汇：diverse / culture / immigrant / melting pot / community / ethnic / variety / unique ② 描述句型：It is known for... / The city features... / People from... gather here ③ 听力微技能：听前读题支预测关键词、听中抓族群与特色。","difficulties":"① diverse（多样的）与 diversity（多样性）的词性转换。原因：形近意近。易错点提醒：diverse 是形容词，diversity 是名词。② melting pot（大熔炉）比喻义，学生易按字面理解。③ immigrant（移民）与 emigrant（移出者）的方向区分。","teachingMethods":"① 任务型（TBL）：以介绍一个多元文化城市为终任务。② 听前预测+听中填卡：信息卡脚手架。③ 对子互问操练描述句型。","preparation":"【PPT课件】P1 单元封面（Diverse Cultures）；P2 世界城市图片九宫格（旧金山/伦敦/纽约/多伦多/悉尼/迪拜/新加坡/上海/巴黎）；P3-4 听力任务题；P5 描述句型板；P6 说话任务卡。【实物教具】城市信息卡 printed 每组一套；世界地图一张。【音频】听力两段音频（教材配套）。","process":[{"step":"导入激活","time":"5","content":"【PPT P2 九宫格】教师：Look at these nine world cities. Which ones are famous for diverse cultures? Can you name them? 预设回答：San Francisco, New York, London! 板书时机：右侧板书 diverse / culture / immigrant。差异化提示：B班指图说中文再跟读英文；A班用 I can see... 造句。易错点提醒：diverse /daɪvɜːs/ — di 发 /daɪ/ 不发 /dɪ/。"},{"step":"词汇输入","time":"8","content":"【PPT P3 词卡】教师领读 diverse / culture / immigrant / melting pot / community / ethnic / variety / unique。教师：Why is New York called a melting pot? 预设回答：Because people from all over the world live there. 板书时机：左栏板书词+短注释。差异化提示：B班配图记忆+词性标注；A班用词造句。易错点提醒：immigrant /ɪmɪɡrənt/ — im- 前缀\"进入\"，与 emigrant（移出）方向相反。"},{"step":"听前预测","time":"5","content":"【PPT P4 题支】教师：We will listen to an introduction about San Francisco. Predict: What will be mentioned? (location / ethnic groups / food / history) 预设回答：Location and ethnic groups! 板书时机：预测词写在黑板中部。差异化提示：B班给中文提示词；A班用英文说预测理由。易错点提醒：听力常见陷阱 — 数字信息会先给错误再修正。\"over 100 languages\" 可能被修正。"},{"step":"听中填卡","time":"10","content":"【PPT P5 表格】【音频 段一】播放听力，学生填信息卡（城市/位置/族群/特色/意义）。教师：Where is San Francisco? What ethnic groups live there? 预设回答：On the west coast of the US. Chinese, Mexican, and many others. 板书时机：核对答案时填表于黑板中部。差异化提示：B班听两遍只填城市+族群；A班一遍填全。易错点提醒：ethnic /eθnɪk/ — th 发 /θ/ 不发 /t/。"},{"step":"句型操练","time":"7","content":"【PPT P5 句型板】教师：How to describe a diverse city? It is known for... / The city features... / People from... gather here 教师示范后用旧金山信息造句。预设回答：San Francisco is known for its Chinatown. The city features diverse cultures. 板书时机：句型板书于中央。差异化提示：B班套用模板；A班替换城市名+特色细节。易错点提醒：be known for（因…出名）后接名词，be known as（作为…出名）后接身份。"},{"step":"说话任务","time":"5","content":"【PPT P6 任务卡】学生两人一组，从信息卡中选一个城市互介。教师：Introduce a diverse city to your partner. Use the sentence patterns. 预设回答：I want to introduce New York. It is known for its melting pot culture. People from all over the world gather here. 板书时机：无。差异化提示：B班用填空式对话卡；A班自由描述并追问理由。易错点提醒：gather /ɡæðə/ — th 发 /ð/，不是 /θ/。"}],"blackboard":"┌─ U3 Listening & Speaking ──────┐\n│ diverse / culture / immigrant    │\n│ melting pot / community / ethnic │\n│ variety / unique                 │\n│                                  │\n│ It is known for...               │\n│ The city features...             │\n│ People from... gather here       │\n│                                  │\n│ City Info Card:                  │\n│  SF | west coast | Chinatown     │\n│  NY | east coast | melting pot   │\n└──────────────────────────────────┘","exercises":"【基础作业】1. 听录音跟读听力文本 2 遍，圈出所有多元文化词汇。2. 用 It is known for... 写 3 句城市描述。【提高作业】用英文写一段 50 词介绍：介绍一个你了解的多元文化城市，包含位置/族群/至少 2 点特色。【参考答案——教师用】基础2示例：San Francisco is known for its Chinatown. / New York is known for its melting pot culture. / London is known for its ethnic variety.","reflection":"✅ 亮点：九宫格激活+信息卡脚手架有效降听力焦虑，B班填卡完成率高。⚠️ 需改进：ethnic 发音仍有困难，下节需强化。📌 下节课衔接：进入阅读 A TRAVEL JOURNAL，从城市认知延伸到旧金山文化探索。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Listening & Speaking · Diverse Cultures (P1)"},{"id":"l-eng-b3-u3-r1","lessonId":"l-eng-b3-u3-r1","book":"必修第三册","unitNumber":3,"unitTitle":"Diverse Cultures","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":2,"periodNumber":2,"duration":40,"grade":"高一","subject":"英语","tags":["阅读","多元文化","旅行日记","旧金山","人教版必修三U3","第二节课"],"textbookAnalysis":"本课为必修第三册 Unit 3 第二课时（Reading I），语篇 A TRAVEL JOURNAL 是一篇旅行日记，讲述作者在旧金山的多元文化探索——唐人街、淘金热历史、移民社区、坎佩切区墨西哥文化。结构为抵达城市→唐人街探索→历史回顾（淘金热/移民）→多元社区体验→感悟升华。语言重点为日记衔接词（first, then, after, before long）与多元文化词汇（diverse, immigrant, ethnic, community, historical, district）。承接第一课时词汇，本课语篇中出现省略结构。","overview":"【学情分析】A班：能快速把握段落主旨，但对\"旅行日记\"的叙事结构训练不足。B班：对淘金热/移民史背景知识少，需地图+时间线脚手架。共同问题：日记的\"按时间/地点推进\"结构感知不清晰，易忽略 first/then 等顺序标志词。","objectives":["语言能力：读懂旅行日记，提取旧金山多元文化的地点/族群/历史/特色；掌握 8-10 个论述类核心词汇。","文化意识：理解旧金山作为\"移民之城\"的多元文化根源，形成\"多元共生\"的包容观念。","思维品质：通过\"地点链+时间链\"分析培养日记结构思维与跨文化比较能力。","学习能力：能用地点链+文化特色表复述文章主线。"],"keyPoints":"① 日记结构：arrival → Chinatown → history (gold rush/immigration) → diverse districts → reflection ② 顺序词：first / then / after / before long / finally ③ 核心短语：head to / used to / bring... to... / a mix of","difficulties":"① gold rush（淘金热）历史背景——学生缺乏背景知识。原因：美国历史不熟。② used to do（过去常常）与 be used to doing（习惯于）的区分。③ district（区）与 community（社区）的语境区别。","teachingMethods":"① 地图阅读：在旧金山地图上标注地点链。② 时间线填图法：构建历史进程。③ 跨文化比较：旧金山vs上海。","preparation":"【PPT课件】P1 旧金山地图与地标；P2 地点链路线图；P3-4 时间线/文化特色表；P5 日记结构图；P6 词汇对比表；P7 总结回顾。【实物教具】旧金山地图空白工作单 printed 每人一份；段落拼图卡。","process":[{"step":"导入设问","time":"5","content":"【PPT P1 旧金山地图】教师：This is San Francisco. It has a famous Chinatown and a gold rush history. What do you think makes it diverse? 预设回答：Many immigrants? / Different cultures? 板书时机：板书 diverse? + 三个问号。差异化提示：B班中文猜；A班英文猜并给理由。易错点提醒：Francisco /frænsɪskəʊ/ — ci 发 /sɪ/ 不发 /sɪs/。"},{"step":"快速阅读抓主干","time":"8","content":"【PPT P3 地点链】教师：Read fast (3 min). Find: ① What places did the author visit? ② What cultures are mentioned? ③ What is the author's final feeling? 预设回答：① Chinatown, Mission District. ② Chinese, Mexican. ③ The city is a mix of cultures. 板书时机：填地点链的三个关键点。差异化提示：B班给三选一选项；A班写完整句。易错点提醒：mission /mɪʃən/ — s 发 /ʃ/ 不发 /s/。"},{"step":"精读段落1-2 抵达与唐人街","time":"10","content":"【PPT P4 地点分析表】教师精讲：head to = 前往；a mix of = 混合。教师：What did the author do in Chinatown? 预设回答：Ate at a Cantonese restaurant. Visited shops. 板书时机：左侧栏补充\"head to / a mix of / used to\"。差异化提示：B班读后填关键词；A班读后用自己话解释。易错点提醒：used to do（过去常常）≠ be used to doing（习惯于）——考试高频陷阱。"},{"step":"精读段落3-4 历史与社区","time":"10","content":"【PPT P5 文化表】教师：What is the gold rush? How did it shape the city? 学生填表匹配（gold rush / immigrants / Mission District → contributions）。教师：How did immigrants shape San Francisco? 预设回答：They brought their food, language and traditions. 板书时机：右侧画\"gold rush→immigrants→diversity\"箭头图。差异化提示：B班连线匹配；A班写完整句。易错点提醒：shape（塑造）在文中是动词\"影响/形成\"，不是名词\"形状\"。"},{"step":"归纳意义","time":"4","content":"【PPT P6 日记结构】教师：What can we learn? (Diversity makes a city vibrant. / Cultures enrich each other.) 预设回答：Diversity makes the city special. Different cultures enrich each other. 板书时机：圈出结构关键词。差异化提示：B班跟读关键词；A班用自己的话总结。易错点提醒：vibrant /vaɪbrənt/ — vi 发 /vaɪ/ 不发 /vɪ/。"},{"step":"小结","time":"3","content":"【PPT P7 总结回顾】教师带学生回顾\"抵达→唐人街→历史→社区→感悟\"结构+核心词汇。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述。易错点提醒：immigrant /ɪmɪɡrənt/ 与 emigrant 方向相反——im- 进入，em- 移出。"}],"blackboard":"┌─ U3 Reading I: A TRAVEL JOURNAL ────┐\n│ ARRIVAL → CHINATOWN → HISTORY →       │\n│ DISTRICTS → REFLECTION                │\n│                                       │\n│ Places: Chinatown / Mission District  │\n│ Cultures: Chinese / Mexican           │\n│ History: gold rush → immigrants       │\n│                                       │\n│ head to / a mix of / used to          │\n│ bring... to... / shape / vibrant      │\n└───────────────────────────────────────┘","exercises":"【基础作业】1. 朗读课文第2-3段 2 遍，圈出所有顺序词（first/then/after/before long）。2. 用地点链上的3个关键地点各写1句文化特色描述。【提高作业】用 80 词左右写一段：你认为多元文化对一个城市有什么影响？为什么？（用 diverse / immigrant / enrich）【参考答案——教师用】基础2示例：In Chinatown, the author tasted Cantonese food. / In the Mission District, the author saw Mexican murals. / In the historical museum, the author learned about the gold rush.","reflection":"✅ 亮点：地点链+文化特色表有效组织信息，B班完成率高。⚠️ 需改进：used to do vs be used to doing 仍是难点，精读课需澄清。📌 下节课衔接：进入精读语言+省略结构在语篇中的功能分析。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Reading and Thinking · Diverse Cultures (P2)"},{"id":"l-eng-b3-u3-r2","lessonId":"l-eng-b3-u3-r2","book":"必修第三册","unitNumber":3,"unitTitle":"Diverse Cultures","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":3,"periodNumber":3,"duration":40,"grade":"高一","subject":"英语","tags":["阅读","精读","省略","多元文化","人教版必修三U3","第三节课"],"textbookAnalysis":"本课为必修第三册 Unit 3 第三课时（Reading II），聚焦语篇 A TRAVEL JOURNAL 的精读与语言分析。重点分析文中省略结构（Some went to the park, others to the museum. / When in Rome, do as the Romans do.）在旅行日记中的功能——使语言更简洁、避免重复。同时深化语篇中高频学术词汇的用法辨析（diverse / immigrant / ethnic / district / historical）。","overview":"【学情分析】A班：能识别省略，但辨析省略了什么仍有困难。B班：省略概念感模糊，需大量语境例句支撑。共同问题：阅读中见到省略会补全理解但不知其语法功能——学生把省略当\"口语随意\"而非\"修辞工具\"。","objectives":["语言能力：能在课文语境中识别并分析至少 5 个省略结构的用法，准确辨析省略了什么。","文化意识：通过省略体会英语如何用简洁结构避免重复——不同于中文的习惯。","思维品质：分析省略在日记中的\"信息压缩\"功能，培养语法服务于意义的意识。","学习能力：建立\"从读到写\"的语料库——积累课文中的优质省略句型用于后续写作。"],"keyPoints":"① 语篇中省略的类型：主语省略 / 谓语省略 / 主谓省略 / 介词省略 ② 议论文高频动词：diverse / immigrant / ethnic / district / historical ③ 省略在日记中的修辞功能：简洁流畅→增强节奏感","difficulties":"① 省略了什么的辨析——需还原完整句才能判断。原因：省略隐含。② Some..., others... 结构中的省略。③ historical（历史的）与 historic（有历史意义的）的区分 — 学生易混淆。","teachingMethods":"① 标注法：圈出文中所有省略结构并还原完整句。② 替换练习：改写完整句为省略句。③ 语料卡记录：分类摘录优质句子。","preparation":"【PPT课件】P1-2 课文中圈出的省略示例；P3 省略类型对比表；P4 语料卡模板；P5 词汇辨析表；P6 句型改写练习；P7 总结回顾。【实物教具】课文复印件 printed 每人一份；高亮笔。","process":[{"step":"课文回顾","time":"5","content":"【PPT P1 结构图】教师：Last class we followed the author's travel route. Can you recall the key places? 预设回答：Chinatown, Mission District, the historical museum. The city is a mix of cultures. 板书时机：左栏写地点链。差异化提示：B班看路线图读关键词；A班完整复述。易错点提醒：recall ≠ remember — recall 更强调\"主动调取记忆\"。"},{"step":"省略结构发现","time":"8","content":"【PPT P2 课文句子】发课文复印件。教师：Circle sentences where words seem \"missing\". What is omitted? 学生标记后全班核对。教师：Why does the author omit words here? 预设回答：To make it shorter and avoid repetition. 板书时机：逐句板书圈出的省略结构。差异化提示：B班给划线句直接圈省略处；A班自己找+还原完整句。易错点提醒：\"Some went to the park, others to the museum\" 中 others 后省略了 went。"},{"step":"省略类型辨析","time":"10","content":"【PPT P3 对比表】教师对比四类省略：①主语省略 (When in Rome...) ②谓语省略 (Some..., others...) ③主谓省略 (Though tired, he continued) ④介词省略 (The same age as you)。教师例句辨析。预设回答辨析。板书时机：四列对比板书。差异化提示：B班根据提示选择填空；A班独立还原。易错点提醒：省略的前提是不引起歧义——不能省略关键信息。"},{"step":"语料库搭建","time":"10","content":"【PPT P4 模板】教师：Build your corpus. Categorize ellipsis sentences and key words. 学生分类填语料卡：①省略结构优质句摘录 ②多元文化动词（diverse/immigrant/ethnic/district/historical）③顺序衔接词。板书时机：巡视指导。差异化提示：B班填词；A班造句。预设回答：按多元文化语料库模板分类填写词条。易错点提醒：historical（历史的，泛指）≠ historic（有历史意义的，特指）—— a historical novel vs a historic moment。"},{"step":"句型改写","time":"5","content":"【PPT P6 练习】教师：Rewrite these full sentences using ellipsis. 例：Some people went to the park, and other people went to the museum. → Some went to the park, others to the museum. 预设回答造句。板书时机：板书改写公式。差异化提示：B班给改写框架；A班独立改。易错点提醒：改写后检查——省略的部分是否能从上下文补全，不能引起歧义。"},{"step":"小结","time":"2","content":"【PPT P7 总结回顾】教师：Let's review ellipsis types. 回顾省略四类型+语料库。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述。易错点提醒：下节课语法课深入讲省略的规则与应用。"}],"blackboard":"┌─ U3 Reading II: Language Focus ──────┐\n│ Ellipsis (省略):                      │\n│  主语省略: When in Rome, do as...     │\n│  谓语省略: Some..., others...         │\n│  主谓省略: Though tired, he continued │\n│  介词省略: the same age as you        │\n│                                       │\n│ Verbs: diverse / immigrant / ethnic   │\n│        district / historical          │\n│                                       │\n│ Rule: omit only what can be restored  │\n└───────────────────────────────────────┘","exercises":"【基础作业】1. 从课文中找出5个省略结构并还原完整句。2. 将以下完整句改写为省略句：Some people like Chinese food, and other people like Mexican food.【提高作业】用省略结构写3句描述一个多元文化城市的句子。【参考答案——教师用】基础2示例：Some like Chinese food, others Mexican.","reflection":"✅ 亮点：标注发现法让学生主动探索语法，参与度高。⚠️ 需改进：省略类型的辨析仍有混淆，语法课需强化。📌 下节课衔接：进入语法课，系统讲省略的规则。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Reading and Thinking · Diverse Cultures (P3)"},{"id":"l-eng-b3-u3-g","lessonId":"l-eng-b3-u3-g","book":"必修第三册","unitNumber":3,"unitTitle":"Diverse Cultures","lessonType":"grammar","lessonTypeName":"语法","lessonNumber":4,"periodNumber":4,"duration":40,"grade":"高一","subject":"英语","tags":["语法","省略","ellipsis","多元文化","人教版必修三U3","第四节课"],"textbookAnalysis":"本课为必修第三册 Unit 3 第四课时（Discovering Useful Structures），系统教学省略（ellipsis）的用法。基于 Reading 语篇中提取的例句，引导学生归纳出规则：省略主语/谓语/主谓/介词等冗余成分，前提是不引起歧义。常见于日记、对话、谚语、并列结构中。通过多元文化主题的语境化练习巩固。","overview":"【学情分析】A班：知道口语会省略，但书面语省略的规则是新知。B班：省略概念仍模糊，需大量语境化例句反复操练。共同问题：写作中要么不省略（啰嗦），要么乱省略（引起歧义）。","objectives":["语言能力：准确识别并产出省略结构的句子，在多元文化话题中产出 5 个以上正确省略句。","文化意识：通过省略更简洁流畅地描述城市文化。","思维品质：通过\"发现例句→归纳规则→应用规则\"的归纳法培养语法学习策略。","学习能力：建立\"语法自查表\"——写作后自行检查省略是否引起歧义。"],"keyPoints":"① 省略类型：主语省略 / 谓语省略 / 主谓省略 / 介词省略 ② 并列结构中的省略（Some..., others...）③ 状语从句中的省略（When/While/Though + -ing/形容词）","difficulties":"① 省略的前提——不引起歧义。原因：学生易省略关键信息。② 状语从句省略（When in Rome...）中主语+be 的省略规则。③ 并列结构省略的位置——省略后半句的谓语。","teachingMethods":"① 归纳法（Guided Discovery）：例句→规则→练习 ② 还原对比：省略句 vs 完整句 ③ 改错练习：纠正典型错误","preparation":"【PPT课件】P1 省略类型对比表；P2 课文例句摘录；P3 规则归纳页；P4 状语从句省略；P5 改写任务卡；P6 改错题；P7 总结。【实物教具】句型卡一套；改写工作单。","process":[{"step":"例句发现","time":"7","content":"【PPT P2 例句】展示课文中5个省略结构，学生圈省略处并还原。教师：What is omitted here? Can you restore it? 预设回答：The subject \"people\" is omitted. / The verb \"went\" is omitted. 板书时机：左栏板书例句，标注省略处。差异化提示：B班只圈省略处不还原；A班还原完整句。易错点提醒：省略的成分必须能从上下文补全——不能凭空省略。"},{"step":"规则归纳","time":"12","content":"【PPT P3 对比表】教师引导学生归纳四类省略：①主语省略 (When in Rome, do as...) ②谓语省略 (Some..., others...) ③主谓省略 (Though tired, he continued) ④介词省略 (the same age as you)。教师：When can we omit words safely? 预设回答：When the meaning is clear from context! 板书时机：板书完整四列对比表。差异化提示：B班填已给框架表；A班自己画表填。易错点提醒：状语从句省略规则——当主从句主语一致时，可省略从句主语+be：Though (he was) tired, he continued. "},{"step":"状语从句省略讲练","time":"8","content":"【PPT P4 结构】教师：When the subject of the adverbial clause = main clause subject, omit subject + be. 例：When (you are) in Rome, do as the Romans do. / While (she was) walking, she saw a parade. 预设回答辨析：主语一致才能省略。板书时机：板书省略公式。差异化提示：B班选词填空（判断能否省略）；A班改写句子。易错点提醒：主从句主语不一致时不能省略——\"When in Rome, the food is great\" 是错的（food 不能 in Rome 做动作）。"},{"step":"改写操练","time":"8","content":"【PPT P5 改写卡】教师：Rewrite these full sentences using ellipsis. 例：Some people visited Chinatown, and other people visited the Mission District. → Some visited Chinatown, others the Mission District. 教师抽学生板演。预设回答造句。板书时机：板书改写公式。差异化提示：B班给句型框；A班自由改写并追加多元文化主题细节。易错点提醒：改写后检查——省略的部分能否从上下文补全？"},{"step":"改错巩固","time":"3","content":"【PPT P6 改错】教师：Find the mistakes. 展示 3 个典型错误：①When in Rome, the buildings are beautiful.（主语不一致）②Some like Chinese food, others like Mexican food, too.（未省略谓语，啰嗦）③Though tired, the trip was fun.（主语不一致）。学生纠错并解释。预设回答纠错。板书时机：板书错误→改正公式。差异化提示：B班辨别对错选；A班解释为什么错。易错点提醒：最常犯——状语从句省略时主从句主语不一致。"},{"step":"小结","time":"2","content":"【PPT P7 总结】教师：Let's review ellipsis rules. 回顾省略四类型+状语从句规则+改错要诀。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述规则。易错点提醒：写作后自查——每个省略结构是否引起歧义？主从句主语是否一致？"}],"blackboard":"┌─ U3 Grammar: Ellipsis (省略) ───────┐\n│ Types:                                │\n│  ① Subject: When in Rome, do as...    │\n│  ② Predicate: Some..., others...      │\n│  ③ S+V: Though tired, he continued    │\n│  ④ Prep: the same age as you          │\n│                                       │\n│ Adverbial clause ellipsis:            │\n│  When/While/Though + (S+be) + ...     │\n│  Rule: main S = clause S              │\n│                                       │\n│ ⚠️ Don't omit if it causes ambiguity! │\n│ ✗ When in Rome, the food is great.    │\n└───────────────────────────────────────┘","exercises":"【基础作业】1. 用省略结构各造 2 句关于多元文化城市的句子（含状语从句省略和并列省略）。2. 将以下完整句改写为省略句：When you are in San Francisco, you should visit Chinatown.【提高作业】写 60 词短文描述一个多元文化城市，要求至少用 3 个省略结构。【参考答案——教师用】基础1示例：Some love Chinese food, others Mexican. (并列省略) / When in San Francisco, visit Chinatown. (状语省略) 基础2示例：When in San Francisco, visit Chinatown.","reflection":"✅ 亮点：还原对比让语法操练不再枯燥，课堂活跃度高。⚠️ 需改进：状语从句省略主语一致性仍是难点，听与谈课可融入练习。📌 下节课衔接：听与谈聚焦文化比较讨论，用语篇巩固省略。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Discovering Useful Structures · Diverse Cultures (P4)"},{"id":"l-eng-b3-u3-lt","lessonId":"l-eng-b3-u3-lt","book":"必修第三册","unitNumber":3,"unitTitle":"Diverse Cultures","lessonType":"listening-talking","lessonTypeName":"听与谈","lessonNumber":5,"periodNumber":5,"duration":40,"grade":"高一","subject":"英语","tags":["听与谈","文化比较","讨论","人教版必修三U3","第五节课"],"textbookAnalysis":"本课为必修第三册 Unit 3 第五课时（Listening and Talking），语境为\"比较不同城市的文化特色\"。听力材料为一段关于上海与旧金山文化比较的对话，口语输出任务为就两个城市做文化比较与讨论。功能语言为比较与对比（Both... and... / However, ... / Unlike..., ... / While..., ...）。结合语法课所学的省略结构，在口语中自然运用省略使表达简洁。","overview":"【学情分析】A班：能做简单比较，但缺乏\"对比+转折\"的完整表达链。B班：开口意愿低、比较句型储备少。共同问题：只说相同点不说差异，缺少 However/Unlike 使比较不完整。","objectives":["语言能力：听懂关于城市文化比较的对话，提取相同点与差异；能用至少 4 种句型做比较与对比。","文化意识：体会\"不同文化各有特色\"的包容比较精神。","思维品质：在讨论中练习\"相同→差异→评价\"的完整比较链。","学习能力：通过比较对话训练批判性倾听——听懂后回应而非只等自己说。"],"keyPoints":"① 比较句型：Both... and... / Similarly, ... / However, ... / Unlike..., ... / While..., ... ② 听力重点：抓住相同点与差异的配对信息 ③ 省略在口语比较中的运用","difficulties":"① Unlike（不像）后接名词/代词 — 学生易接句子。原因：词性不清。② While（然而）表对比不是时间 — 学生易混。③ 回应时 only say \"yes\" no comparison — 需培养 However 跟进的意识。","teachingMethods":"① 听前预测→听中配对→听后产出 ② 角色扮演：三人一组（支持者+对比者+评价者）③ 文化比较圆桌讨论","preparation":"【PPT课件】P1 待比较城市（上海vs旧金山/北京vs伦敦）；P2 比较句型板；P3 听力任务题；P4 听力任务卡；P5 对比句型板；P6 角色卡。【实物教具】城市比较卡 printed；角色卡。","process":[{"step":"导入激活","time":"5","content":"【PPT P1 城市对比】教师：Compare Shanghai and San Francisco. What do they have in common? What is different? 预设回答：Both are diverse. But Shanghai is older. 板书时机：左栏板书动词 compare / contrast / differ / share。差异化提示：B班中文说再翻英文；A班直接英文。易错点提醒：compare（比较）强调找相同，contrast（对比）强调找不同。"},{"step":"听力抓比较","time":"10","content":"【PPT P3 听力任务】听对话，抓\"相同点+差异点\"。教师：Listen for: What is similar? What is different? 预设回答：Both are port cities. However, SF has more ethnic groups. 板书时机：配对填表（相同|差异）。差异化提示：B班给配对连线题；A班听写关键词。易错点提醒：listen for（有目的地听）≠ listen to（泛听）——引导学生带问题听。"},{"step":"听中记录","time":"8","content":"【PPT P4 听力任务卡】【音频】重听，学生填完整比较链。教师：How did they contrast the two cities? 预设回答：Unlike SF, Shanghai has a longer history. While SF is known for immigrants, Shanghai is known for trade. 板书时机：核对填表。差异化提示：B班听两遍；A班一遍+复述比较。易错点提醒：Unlike 后接名词 — \"Unlike SF\" 不是 \"Unlike SF is\"。"},{"step":"句型操练","time":"7","content":"【PPT P5 句型板】教师带领操练比较链：A: Both cities are diverse. / B: However, their histories differ. / A: Unlike SF, Shanghai is older. / B: While SF is a melting pot, Shanghai is a trade hub. 预设回答跟读+仿造。板书时机：板书相同→差异链条。差异化提示：B班用填空脚本；A班自主对话。易错点提醒：While 表对比时放句首 — \"While A is..., B is...\" 不是 \"While A is..., is B...\"。"},{"step":"角色扮演","time":"8","content":"【PPT P6 角色卡】三人一组：Supporter A（找相同）、Contraster B（找差异）、Judge C（做评价）。就北京vs伦敦文化比较讨论。教师巡视。预设回答：A: Both are capitals. / B: However, unlike Beijing, London has a monarchy. / C: While both are historic, their cultures differ. 板书时机：留比较句型供参考。差异化提示：B班照卡读；A班脱稿加即兴内容。易错点提醒：角色扮演中注意用省略使表达简洁 — \"Some love Chinese food, others Mexican.\""},{"step":"小结","time":"2","content":"【PPT P7 总结】教师：Remember to compare both similarities and differences. 回顾比较句型+对比策略。预设回答跟读。板书时机：圈重点句型。差异化提示：B班齐读；A班每人说一句收获。易错点提醒：给比较后记得加\"however\"或\"unlike\"——对比才完整。"}],"blackboard":"┌─ U3 Listening & Talking ─────────┐\n│ Similarities:                      │\n│  Both... and...                    │\n│  Similarly, ...                     │\n│ Differences:                       │\n│  However, ...                       │\n│  Unlike..., ...                     │\n│  While..., ...                      │\n│                                    │\n│ Chain: Similar → Different → Judge │\n└────────────────────────────────────┘","exercises":"【基础作业】1. 听录音跟读 2 遍，圈出所有比较句型。2. 用至少 2 种比较句型各写 1 句城市文化比较。【提高作业】写 60 词对话：三人比较两个城市的文化（至少 4 轮，含相同与差异）。【参考答案——教师用】基础2示例：Both Shanghai and SF are diverse. However, unlike SF, Shanghai has a longer history. / While SF is known for immigrants, Shanghai is known for trade.","reflection":"✅ 亮点：角色扮演三角色设置让学生理解真实比较中的多元视角。⚠️ 需改进：Unlike 后接名词仍易错，写作课可设置强制格式。📌 下节课衔接：进入写作，将多元城市介绍写成说明文。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Listening and Talking · Diverse Cultures (P5)"},{"id":"l-eng-b3-u3-w1","lessonId":"l-eng-b3-u3-w1","book":"必修第三册","unitNumber":3,"unitTitle":"Diverse Cultures","lessonType":"writing","lessonTypeName":"写作","lessonNumber":6,"periodNumber":6,"duration":40,"grade":"高一","subject":"英语","tags":["写作","说明文","城市介绍","人教版必修三U3","第六节课"],"textbookAnalysis":"本课为必修第三册 Unit 3 第六课时（Reading for Writing I），写作体裁为说明文——介绍一个多元文化城市。结构为：城市概况（location/population）→ 文化特色（ethnic groups/landmarks/food）→ 历史背景（immigration/history）→ 意义感悟（why it matters）。语言重点为说明文衔接词（first, moreover, in addition, finally）与描述句型（It is located in... / The city is known for... / People from... gather here）。结合本单元 Reading 的旅行日记与语法课的省略结构，实现读-语法-写的闭环。","overview":"【学情分析】A班：有基本说明能力，但缺乏\"概况→特色→历史→意义\"的框架意识——常写成流水账。B班：句型储备少、语法错误多，需大量脚手架。共同问题：说明文不知如何收尾——缺少\"这座城市让我感受到…\"的意义句。","objectives":["语言能力：掌握\"概况—特色—历史—意义\"四段式说明文结构，在多元城市话题中产出 80-100 词结构完整的短文。","文化意识：通过书写城市介绍体会多元文化的包容价值。","思维品质：通过\"先介绍再感悟\"训练事实—特色—意义的递进逻辑思维。","学习能力：建立\"写作前先搭结构框架\"的习惯——用 outline 而非直接开写。"],"keyPoints":"① 说明文四段结构：Overview (location/population) → Features (ethnic/landmarks/food) → History (immigration) → Significance (meaning) ② 衔接词：First / Moreover / In addition / Finally ③ 核心句型：It is located in... / The city is known for... / People from... gather here","difficulties":"① 说明文与记叙文的区别 — 说明文重客观事实。原因：学生易混体裁。② Moreover 与 In addition 的用法——都是\"此外\"。③ 意义感悟句不知道怎么写——需给模板。","teachingMethods":"① 范文解构法：读范文→画结构图→仿写 ② 语料卡搭建：从本单元5课积累词汇/句型。③ 过程写作：outline→draft→peer review→revise","preparation":"【PPT课件】P1 范文（关于旧金山的说明文）；P2 四段结构图；P3 衔接词表；P4 语料库模板；P5 写作提纲；P6 写作任务；P7 总结。【实物教具】四段结构空白工作单 printed 每人一份；语料卡模板。","process":[{"step":"范文解构","time":"8","content":"【PPT P1 范文】教师展示范文，学生标注四段（概况/特色/历史/意义）。教师：Which paragraph gives facts? Which gives meaning? 预设回答：Paragraphs 1-3 — facts. Paragraph 4 — meaning. 板书时机：画四段结构框。差异化提示：B班给标注好的范文只匹配段号；A班自己画结构+标注衔接词。易错点提醒：最后一段必须有\"This city shows that...\"才算完整意义。"},{"step":"四段结构讲透","time":"8","content":"【PPT P2 结构图】教师逐段讲解：P1 2句概况（location/population）→ P2 3句特色（ethnic groups/landmarks/food）→ P3 2句历史（immigration/history）→ P4 2句意义（why it matters）。教师示范写一段。预设回答跟读结构要点。板书时机：逐段板书模板句。差异化提示：B班给每段填空模板；A班给关
