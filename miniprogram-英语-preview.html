机：板书灾害词。差异化提示：B班指图说中文；A班用英语。易错点提醒：drought /draʊt/。"},{"step":"词汇输入","time":"8","content":"【PPT P3 词卡】教师领读并辨析 damage vs destroy。教师：Which means totally ruined? 预设回答：Destroy! 板书时机：板书动词。差异化提示：B班配图记忆；A班造句。易错点提醒：tsunami /tsuːnɑːmi/。"},{"step":"听前预测","time":"5","content":"【PPT P4 信息卡】教师：What 5W will you hear? 预设回答：When, where, what. 板书时机：信息卡留空。差异化提示：B班勾选；A班自列。易错点提醒：留意数字。"},{"step":"听中填卡","time":"10","content":"【PPT P5 表格】【音频】播放新闻，学生填 5W。教师：When and where did it happen? 预设回答：July, in the south. 板书时机：核对填卡。差异化提示：B班听两遍；A班一遍。易错点提醒：affect /əfekt/ 重音。"},{"step":"句型输入","time":"7","content":"【PPT P5 句型板】教师：A flood hit the city. It affected 1,000 people. 预设回答跟读。板书时机：板书句型。差异化提示：B班套用；A班扩展。易错点提醒：hit 过去式仍 hit。"},{"step":"播报任务","time":"5","content":"【PPT P6 任务卡】学生用信息卡播报一则灾害新闻。教师：Report the disaster. 预设回答：An earthquake hit the town. It damaged many houses. 板书时机：无。差异化提示：B班读卡；A班脱稿。易错点提醒：用 5W 完整。"}],"blackboard":"┌─ U4 Listening & Speaking ┐\n│ Disasters: earthquake/flood/  │\n│  drought/landslide/tsunami    │\n│  tornado/hurricane            │\n│ affect/damage/destroy/rescue  │\n│ → 新闻 5W(when/where/what/who)│\n└────────────────────────────────┘","exercises":"【基础作业】1. 听录音跟读 2 遍，圈出所有灾害词与动词。2. 用 5W 写一则 5 句灾害新闻。【提高作业】为本地一种多发灾害写一段 60 词防灾提示。【参考答案——教师用】基础2示例：A flood hit the south in July. It affected 500 people. The water damaged many houses. Rescue teams helped the survivors. People moved to shelters.","reflection":"✅ 亮点：九宫格+5W 卡让新闻结构清晰，B班填卡完成率高。⚠️ 需改进：damage/destroy 区分仍混。📌 下节课衔接：进入阅读唐山大地震，从新闻延伸到深度叙事。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u4-r1","lessonId":"l-eng-b1-u4-r1","title":"Reading and Thinking: The Night the Earth Didn't Sleep (Ⅰ) — 整体理解","book":"必修第一册","unitNumber":4,"unitTitle":"Natural Disasters","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":2,"periodNumber":2,"duration":45,"grade":"高一","subject":"英语","tags":["阅读","Unit 4","Natural Disasters","人教版必修一 U4","第2节课"],"textbookAnalysis":"第二课时，语篇 The Night the Earth Didn't Sleep 叙述 1976 年 7 月 28 日唐山大地震。文本按震前异常—震时毁灭—震后救援与重建展开。本节聚焦整体理解与事件时间线。","overview":"【学情分析】A班：能读叙事但时间线易混，忽视震前征兆。B班：长难句（定语从句修饰物）吃力。共同问题：对震前异常现象（井水升降、动物反常）理解浅，in ruins/in shock 等短语不熟。","objectives":["语言能力：用略读获取文本主旨与段落大意，用扫读提取震前/震时/震后关键信息。","文化意识：认识地震破坏力与团结互助精神，致敬救援者。","思维品质：用时间线梳理事件发展（征兆—爆发—救援—重建），培养时序梳理能力。","学习能力：借助时间线图表自主梳理并复述。"],"keyPoints":"① 结构：before（征兆）— during（爆发）— after（救援/重建）。② 短语：in ruins / in shock / as if / rescue / shelter。③ 词汇：crack, smelly, shake, destroy, survive。","difficulties":"① as if 后接虚拟语气（as if the world were ending），学生用 was。② in ruins（成废墟）短语义，学生漏 s。③ 震前征兆的 -ing 后置定语（gas coming out of it）识别困难。","teachingMethods":"① 图式激活：地震前预测。② 略读+扫读分层。③ 时间线梳理。","preparation":"【PPT课件】P1 唐山地图+时间轴；P2 语篇；P3 段落大意卡；P4 时间线表；P5 复述脚手架。【实物教具】时间线表 printed。【音频】无。","process":[{"step":"图式激活","time":"5","content":"【PPT P1 地图】教师：What happens before an earthquake? 预设回答：Animals act strange. 板书时机：板书征兆。差异化提示：B班说中文；A班用英语。易错点提醒：earthquake /ɜːθkweɪk/。"},{"step":"略读段落","time":"8","content":"【PPT P2 语篇】教师：Match each paragraph to before/during/after. 预设回答匹配。板书时机：板书三阶段。差异化提示：B班匹配；A班归纳。易错点提醒：paragraph /pærəgrɑːf/。"},{"step":"扫读时间线","time":"12","content":"【PPT P4 时间线】学生填震前征兆/震时现象/震后救援。教师：What happened at 3:42? 预设回答：Everything began to shake. 板书时机：核对填表。差异化提示：B班给填空表；A班自填。易错点提醒：in ruins 加 s。"},{"step":"短语提炼","time":"8","content":"【PPT P3 词卡】教师圈 in ruins/in shock/as if。预设回答跟读。板书时机：板书短语。差异化提示：B班认读；A班造句。易错点提醒：as if + were（虚拟）。"},{"step":"复述","time":"7","content":"【PPT P5 脚手架】学生用时间线复述。教师：Retell the event. 预设回答：Before the quake, strange things happened. At 3:42, everything shook. 板书时机：无。差异化提示：B班照表读；A班脱稿。易错点提醒：shake→shook 过去式。"},{"step":"小结","time":"5","content":"【PPT P7 总结回顾】回顾三阶段+团结互助。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述。易错点提醒：rescue /reskjuː/。"}],"blackboard":"┌─ U4 Reading Ⅰ: 唐山大地震 ┐\n│ before: 征兆(井水/动物)   │\n│ during: 3:42 爆发, in ruins │\n│ after: 救援/重建/希望       │\n│ in ruins / in shock / as if │\n└──────────────────────────────┘","exercises":"【基础作业】1. 完成时间线表（征兆/爆发/救援各≥3 点）。2. 用 5 句话复述事件。【提高作业】写一段 60 词震后救援描述。【参考答案——教师用】基础2示例：Strange things happened before the quake. At 3:42 a.m., everything began to shake. The city was in ruins. Soon rescue teams arrived. People helped each other and rebuilt the city.","reflection":"✅ 亮点：时间线让叙事清晰，A班复述流畅。⚠️ 需改进：as if 虚拟语气讲解偏快。📌 下节课衔接：进入语言深度，赏析 -ing 后置定语与长难句。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u4-r2","lessonId":"l-eng-b1-u4-r2","title":"Reading and Thinking: The Night the Earth Didn't Sleep (Ⅱ) — 语言深度","book":"必修第一册","unitNumber":4,"unitTitle":"Natural Disasters","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":3,"periodNumber":3,"duration":45,"grade":"高一","subject":"英语","tags":["阅读","Unit 4","Natural Disasters","人教版必修一 U4","第3节课"],"textbookAnalysis":"第三课时，沿用唐山地震语篇，聚焦语言深度：赏析 -ing 后置定语、as if 虚拟语气、主+系+表+to do 结构与定语从句，为写作积累语料。","overview":"【学情分析】A班：能懂大意但 -ing 后置定语不熟。B班：as if 虚拟语气与定语从句识别困难。共同问题：描述灾害仍用 very big，缺 in ruins/devastating 等地道表达。","objectives":["语言能力：识别并运用 -ing 后置定语、as if 虚拟语气与灾害描述地道表达。","文化意识：体会叙事文本的感染力与情感表达。","思维品质：辨析 -ing 作定语与作状语的功能差异。","学习能力：建立灾害描写语料库供写作调用。"],"keyPoints":"① -ing 后置定语：gas coming out of it / mice looking for places。② as if + 虚拟（were）。③ 结构：主+系+表+to do（It seemed as if the world were coming to an end）。④ 词汇：devastating, ruins, shelter, trap, bury。","difficulties":"① -ing 后置定语与进行时混淆。原因：形式相同功能不同。② as if 后用 were（虚拟），学生用 was。③ trap（困住）过去式 trapped 双写 p，学生漏。","teachingMethods":"① 语篇研读圈画。② 结构对比：-ing 定语 vs 进行时。③ 语料库搭建。","preparation":"【PPT课件】P1 语篇高亮；P2 -ing 结构对比；P3 as if 虚拟；P4 语料库模板；P5 仿写。【实物教具】语料卡 printed。【音频】无。","process":[{"step":"圈画-ing","time":"8","content":"【PPT P1 高亮】教师：Find -ing phrases after nouns. 预设回答：gas coming out of it. 板书时机：板书结构。差异化提示：B班找已高亮；A班自找。易错点提醒：-ing 作定语表主动进行。"},{"step":"结构对比","time":"10","content":"【PPT P2 对比】教师：gas coming out（定语）vs It was coming（进行时）. 预设回答辨析。板书时机：双栏对比。差异化提示：B班选填；A班解释。易错点提醒：定语紧接名词后。"},{"step":"as if虚拟","time":"10","content":"【PPT P3 虚拟】教师：It seemed as if the world were ending. — as if 后用 were. 预设回答跟读。板书时机：板书结构。差异化提示：B班套用；A班仿写。易错点提醒：虚拟用 were 不用 was。"},{"step":"语料库","time":"8","content":"【PPT P4 模板】学生填灾害词/短语/句式语料卡。预设回答：按灾害报道模板分类填写词条。板书时机：巡视。差异化提示：B班填词；A班造句。易错点提醒：trap→trapped 双写。"},{"step":"仿写","time":"9","content":"【PPT P5 练习】学生用语库仿写一句灾害描写。教师：Describe a disaster scene. 预设回答：The city lay in ruins, with people looking for shelter. 板书时机：展示佳句。差异化提示：B班填空；A班自由。易错点提醒：-ing 后置定语。"}],"blackboard":"┌─ U4 Reading Ⅱ: 语言深度 ┐\n│ -ing 后置定语: gas coming…  │\n│ as if + 虚拟(were)          │\n│ 主+系+表+to do              │\n│ in ruins / trap→trapped     │\n└──────────────────────────────┘","exercises":"【基础作业】1. 整理语料库（灾害词≥5、短语≥4）。2. 用 -ing 后置定语造 3 句。【提高作业】用语料库写一段 50 词灾害场景（含 as if 虚拟 1 处）。【参考答案——教师用】基础2示例：The river rising fast flooded the village. / People running out of buildings screamed. / The dog barking loudly warned the family.","reflection":"✅ 亮点：结构对比让 -ing 功能清晰，A班仿写提升。⚠️ 需改进：as if 虚拟 B 班仍用 was。📌 下节课衔接：进入语法——限制性定语从句，为精确描述奠基。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u4-g","lessonId":"l-eng-b1-u4-g","title":"Discovering Useful Structures: 限制性定语从句（that/which/who/whom/whose）","book":"必修第一册","unitNumber":4,"unitTitle":"Natural Disasters","lessonType":"grammar","lessonTypeName":"语法","lessonNumber":4,"periodNumber":4,"duration":45,"grade":"高一","subject":"英语","tags":["语法","Unit 4","Natural Disasters","人教版必修一 U4","第4节课"],"textbookAnalysis":"第四课时，语法点：限制性定语从句，用 that/which 修饰物，who/whom 修饰人，whose 表所属。本节聚焦关系代词选择与先行词一致性。","overview":"【学情分析】A班：知道 that/which 但选择混乱，whose 属新学。B班：定语从句中缺成分判断不清。共同问题：逗号后（非限制性）误用 that。","objectives":["语言能力：识别并正确使用 that/which/who/whom/whose 引导的限制性定语从句。","文化意识：体会定语从句使表达精确简洁的价值。","思维品质：按先行词（人/物）与从句成分（主/宾）选择关系代词。","学习能力：用关系代词选择表归纳规则。"],"keyPoints":"① that/which 修饰物，who/whom 修饰人，whose 表所属。② 从句缺主语用 who/that（人）或 that/which（物）；缺宾语可省略。③ whose + 名词 表所属。","difficulties":"① that 与 which 选择：限制性从句两者皆可，非限制性只用 which。② whom 作宾格用于人，学生误用 who。③ whose 既可指人也可指物，学生以为只指人。","teachingMethods":"① 归纳法：从例句发现规则。② 选择表：先行词×成分。③ 情境操练：描述灾后场景。","preparation":"【PPT课件】P1 例句；P2 关系代词选择表；P3 that vs which；P4 whose 用法；P5 操练题。【实物教具】选择表卡 printed。【音频】无。","process":[{"step":"观察例句","time":"7","content":"【PPT P1 例句】教师：The cracks that appeared in the walls... — that 修饰 cracks. 预设回答找先行词。板书时机：板书例句。差异化提示：B班找先行词；A班说成分。易错点提醒：that 修饰物。"},{"step":"归纳选择表","time":"10","content":"【PPT P2 表】师生归纳：人→who/whom/whose；物→that/which。教师：Which for a person? 预设回答：who/whom. 板书时机：填表。差异化提示：B班填代词；A班补例句。易错点提醒：who 主格，whom 宾格。"},{"step":"that vs which","time":"8","content":"【PPT P3 对比】教师：限制性从句 that/which 皆可；非限制性（逗号后）只用 which. 预设回答辨析。板书时机：板书规则。差异化提示：B班选填；A班解释。易错点提醒：逗号后不用 that。"},{"step":"whose用法","time":"8","content":"【PPT P4 whose】教师：The boy whose leg was injured... — whose 表所属. 预设回答跟读。板书时机：板书结构。差异化提示：B班套用；A班仿写。易错点提醒：whose + 名词。"},{"step":"操练","time":"12","content":"【PPT P5 题】学生用关系代词填空并合并句子。教师：The man ___ helped us... 预设回答：who. 板书时机：展示。差异化提示：B班选择式；A班合并句。易错点提醒：缺宾语可省略。"}],"blackboard":"┌─ U4 Grammar: 限制性定语从句 ┐\n│ 人: who(主)/whom(宾)/whose  │\n│ 物: that/which              │\n│ 限制性 that/which 皆可      │\n│ 非限制性(逗号)只用 which    │\n│ whose + 名词(人/物皆可)     │\n└──────────────────────────────┘","exercises":"【基础作业】1. 用关系代词填空 10 题。2. 合并 5 对句子为定语从句。【提高作业】写一段 50 词灾后场景，含 3 处定语从句（that/who/whose 各 1）。【参考答案——教师用】基础1示例：The quake that hit the city was terrible. / The man who rescued the boy was brave. / The house whose roof fell was old.","reflection":"✅ 亮点：选择表让关系代词清晰，A班合并句准确。⚠️ 需改进：that/which 选择与 whom 仍混。📌 下节课衔接：进入听与谈——用定语从句讨论防灾准备。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u4-lt","lessonId":"l-eng-b1-u4-lt","title":"Listening and Talking: Disaster Preparedness — 防灾准备与应对","book":"必修第一册","unitNumber":4,"unitTitle":"Natural Disasters","lessonType":"listening-talking","lessonTypeName":"听与谈","lessonNumber":5,"periodNumber":5,"duration":40,"grade":"高一","subject":"英语","tags":["听与谈","Unit 4","Natural Disasters","人教版必修一 U4","第5节课"],"textbookAnalysis":"第五课时，听说结合。听力为防灾准备对话；口语为用定语从句与指令性语言介绍应急包与避险措施。","overview":"【学情分析】A班：能说单句但指令语不熟。B班：听物品清单易遗漏。共同问题：应急物品英文名（first-aid kit, flashlight, whistle）不熟。","objectives":["语言能力：听懂防灾准备对话中的物品与措施；用定语从句与指令语介绍应急包。","文化意识：树立防灾意识与自救互助能力。","思维品质：按物品—措施—步骤分类组织防灾说明。","学习能力：用应急清单记录并复述。"],"keyPoints":"① 物品：first-aid kit / flashlight / whistle / blanket / water / radio。② 指令语：Keep... / Do not... / Make sure...。③ 定语从句：a kit that contains...。","difficulties":"① first-aid 连字符与读音。② whistle /wɪsl/ 中 t 不发音。③ 指令语与定语从句混用易乱。","teachingMethods":"① 情境模拟：介绍应急包。② 听前预教物品词。③ 清单记录。","preparation":"【PPT课件】P1 应急包图；P2 物品词；P3 听力任务；P4 指令句型；P5 介绍卡。【实物教具】应急清单 printed；物品图卡。【音频】听力音频。","process":[{"step":"物品预教","time":"6","content":"【PPT P2 物品】教师领读 first-aid kit/flashlight/whistle。预设回答跟读。板书时机：板书物品词。差异化提示：B班配图；A班造句。易错点提醒：whistle /wɪsl/。"},{"step":"听前预测","time":"5","content":"【PPT P3 任务】教师：What items will you hear? 预设回答：Water, flashlight. 板书时机：清单留空。差异化提示：B班勾选；A班自列。易错点提醒：留意数量。"},{"step":"听中记录","time":"10","content":"【PPT P4 听力任务卡】【音频】播放，学生填应急清单。教师：What should you keep? 预设回答：A first-aid kit. 板书时机：核对填表。差异化提示：B班听两遍；A班一遍。易错点提醒：first-aid 连字符。"},{"step":"指令句型","time":"6","content":"【PPT P4 句型】教师：Keep a kit ready. Do not panic. Make sure you have water. 预设回答跟读。板书时机：板书指令语。差异化提示：B班套用；A班扩展。易错点提醒：祈使句无主语。"},{"step":"介绍任务","time":"13","content":"【PPT P5 卡】学生用定语从句+指令语介绍应急包。教师：Introduce your emergency kit. 预设回答：This is a kit that contains bandages. Keep it ready. 板书时机：无。差异化提示：B班用脚本；A班自由。易错点提醒：定语从句修饰物品。"}],"blackboard":"┌─ U4 Listening & Talking ┐\n│ Items: first-aid kit/     │\n│  flashlight/whistle/water │\n│ 指令: Keep…/Do not…/      │\n│       Make sure…          │\n│ a kit that contains…      │\n└────────────────────────────┘","exercises":"【基础作业】1. 听录音补全应急清单。2. 用定语从句写 3 句介绍应急物品。【提高作业】写一段 60 词防灾指南（含指令语与定语从句各 2 处）。【参考答案——教师用】基础2示例：This is a flashlight that works without power. / Keep a whistle that can be heard far away. / Prepare water that is safe to drink.","reflection":"✅ 亮点：清单+指令语让防灾说明真实，B班参与度高。⚠️ 需改进：whistle 发音仍弱。📌 下节课衔接：进入写作——写灾害事件摘要。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u4-w1","lessonId":"l-eng-b1-u4-w1","title":"Reading for Writing: A Disaster Summary (Ⅰ) — 读析与语料","book":"必修第一册","unitNumber":4,"unitTitle":"Natural Disasters","lessonType":"writing","lessonTypeName":"写作","lessonNumber":6,"periodNumber":6,"duration":45,"grade":"高一","subject":"英语","tags":["写作","Unit 4","Natural Disasters","人教版必修一 U4","第6节课"],"textbookAnalysis":"第六课时，写作第一课时。读模型灾害摘要（含事件—影响—救援），分析结构与语言，积累语料。","overview":"【学情分析】A班：能写单句但摘要结构松散，缺影响与救援。B班：时态混乱（叙事用过去，学生混现在）。共同问题：摘要易成流水账，缺数据与感受。","objectives":["语言能力：识别灾害摘要结构（事件—影响—救援—启示）与衔接手段，积累语料。","文化意识：在摘要中体现对受灾者的关切与互助精神。","思维品质：按事件逻辑与时序组织摘要。","学习能力：用提纲模板搭建写作骨架。"],"keyPoints":"① 结构：event → impact → rescue → reflection。② 时态：叙事用过去时。③ 语料：hit/affect/damage/rescue/in ruins/survive。","difficulties":"① 时态：叙事须用过去时。② impact（影响）抽象词。③ 数据表达（affected 1,000 people）格式。","teachingMethods":"① 范文研读圈结构。② 提纲搭建。③ 语料积累。","preparation":"【PPT课件】P1 范文分段；P2 结构图；P3 时态标注；P4 语料库；P5 提纲模板。【实物教具】提纲卡 printed。【音频】无。","process":[{"step":"读范文","time":"8","content":"【PPT P1 范文】教师：What disaster is it about? 预设回答：A flood. 板书时机：板书主题。差异化提示：B班抓大意；A班找结构。易错点提醒：summary /sʌməri/。"},{"step":"析结构","time":"10","content":"【PPT P2 结构图】师生分四段。教师：Which part tells the impact? 预设回答：Impact. 板书时机：填结构图。差异化提示：B班匹配；A班归纳。易错点提醒：impact /ɪmpækt/。"},{"step":"时态标注","time":"8","content":"【PPT P3 时态】教师圈过去时动词。预设回答辨析。板书时机：板书时态。差异化提示：B班标时态；A班解释。易错点提醒：hit→hit 过去式不变。"},{"step":"积语料","time":"7","content":"【PPT P4 语料库】学生填事件/影响/救援语料卡。预设回答：按灾害报道分类卡填写词条。板书时机：巡视。差异化提示：B班填词；A班造句。易错点提醒：affect+数字。"},{"step":"搭提纲","time":"12","content":"【PPT P5 模板】学生用提纲卡搭摘要骨架。教师：Outline your summary. 预设回答展示。板书时机：展示提纲。差异化提示：B班填空；A班自列。易错点提醒：叙事用过去时。"}],"blackboard":"┌─ U4 Writing Ⅰ: 灾害摘要 ┐\n│ 结构: event→impact        │\n│        →rescue→reflection │\n│ 时态: 叙事过去时          │\n│ 语料: hit/affect/damage/  │\n│       rescue/in ruins     │\n└────────────────────────────┘","exercises":"【基础作业】1. 完成摘要提纲（四部分各≥2 点）。2. 整理事件动词与影响短语各 5 个。【提高作业】用提纲写一段 80 词灾害摘要初稿。【参考答案——教师用】基础1示例：Event: a flood hit the south；Impact: affected 1,000 people, damaged houses；Rescue: teams saved survivors；Reflection: we should prepare better.","reflection":"✅ 亮点：结构图+提纲让写作有骨架，B班提纲完成率高。⚠️ 需改进：时态仍混。📌 下节课衔接：下节起草成文+互评。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u4-w2","lessonId":"l-eng-b1-u4-w2","title":"Reading for Writing: A Disaster Summary (Ⅱ) — 起草与互评","book":"必修第一册","unitNumber":4,"unitTitle":"Natural Disasters","lessonType":"writing","lessonTypeName":"写作","lessonNumber":7,"periodNumber":7,"duration":45,"grade":"高一","subject":"英语","tags":["写作","Unit 4","Natural Disasters","人教版必修一 U4","第7节课"],"textbookAnalysis":"第七课时，写作第二课时。基于提纲起草成文，运用过去时与定语从句，经同伴互评修改定稿。","overview":"【学情分析】A班：能成段但时态偶尔滑回现在。B班：句子碎片化。共同问题：互评不知评什么，需量规引导。","objectives":["语言能力：依据提纲写 80 词灾害摘要，正确使用过去时与定语从句，段落连贯。","文化意识：在摘要中体现对受灾者的关切。","思维品质：依据量规评价同伴作品并提出建议。","学习能力：通过互评-修改循环提升自我修改能力。"],"keyPoints":"① 成段：四结构+衔接词。② 时态：叙事过去时。③ 互评量规：结构/时态/语言/衔接。","difficulties":"① 时态滑回现在。② 定语从句关系代词选错。③ 互评流于表面。","teachingMethods":"① 过程写作：起草-互评-修改。② 量规引导互评。③ 教师面批聚焦时态。","preparation":"【PPT课件】P1 范文回顾；P2 量规表；P3 互评流程；P4 佳句展示；P5 常见问题。【实物教具】互评量规卡 printed。【音频】无。","process":[{"step":"回顾要求","time":"5","content":"【PPT P1 范文】教师回顾结构+时态。预设回答跟读。板书时机：板书要点。差异化提示：B班跟读；A班复述。易错点提醒：叙事用过去时。"},{"step":"起草","time":"15","content":"【PPT P6 写作提纲】学生依提纲起草 80 词。教师巡视面批。预设回答：（学生静写中，此处无口头回答）板书时机：无。差异化提示：B班给句型框；A班自由。易错点提醒：时态一致。"},{"step":"互评","time":"12","content":"【PPT P2 量规】学生依量规评同伴。教师：Give one suggestion. 预设回答：Check the tense. 板书时机：展示量规。差异化提示：B班勾选；A班写建议。易错点提醒：评时态。"},{"step":"修改","time":"8","content":"【PPT P9 修改清单】学生据互评修改。教师聚焦时态。预设回答：（学生自修中，教师口头提示共性错误）板书时机：无。差异化提示：B班改错；A班润色。易错点提醒：滑回现在须改过去。"},{"step":"展示","time":"5","content":"【PPT P4 佳句】展示佳句与修改对比。预设回答赏析。板书时机：圈亮点。差异化提示：B班跟读；A班点评。易错点提醒：定语从句关系代词。"}],"blackboard":"┌─ U4 Writing Ⅱ: 起草+互评 ┐\n│ 量规: 结构/时态/语言/衔接   │\n│ 时态: 叙事过去时           │\n│ 流程: 起草→互评→修改→定稿   │\n└──────────────────────────────┘","exercises":"【基础作业】1. 定稿灾害摘要（≥80 词，四结构齐 单元核心定语从句/灾害词回顾。"}],"blackboard":"┌─ U4 Project & Review ┐\n│ 任务: 防灾生存指南海报 │\n│ 文体: 标题+清单+指令+号召│\n│ 语言: 定语从句+指令语  │\n│ 产出: 海报 + 口头推介   │\n└──────────────────────────┘","exercises":"【基础作业】1. 完善海报（含四要素）。2. 写一段 60 词防灾指南（含 2 处定语从句与 2 处指令语）。【提高作业】为海报设计家庭疏散路线并说明。【参考答案——教师用】基础2示范：When an earthquake comes, keep calm. Prepare a kit that contains water and a flashlight. Do not use the lift. Help the people who are trapped. Stay safe together!","reflection":"✅ 亮点：海报产出综合性强，A班文体特征明显。⚠️ 需改进：B班分工不均。📌 下节课衔接：进入 Unit 5 Languages Around the World，话题转向语言与文化。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u5-ls","lessonId":"l-eng-b1-u5-ls","title":"Listening and Speaking: Languages of the World — 世界语言与学习理由","book":"必修第一册","unitNumber":5,"unitTitle":"Languages Around the World","lessonType":"listening-speaking","lessonTypeName":"听与说","lessonNumber":1,"periodNumber":1,"duration":40,"grade":"高一","subject":"英语","tags":["听与说","Unit 5","Languages Around the World","人教版必修一 U5","第1节课"],"textbookAnalysis":"本课为必修第一册 Unit 5 Languages Around the World 第一课时（Listening and Speaking），单元导入。主题为世界语言多样性与学习外语的理由。听力为不同人谈论所学语言与原因。本课为后续读汉字书写体系、写语言学习博客奠定话题与词汇基础。","overview":"【学情分析】A班：初中已掌握 language/English，但 accent/dialect/official/native/fluent 等词不熟。B班：听语言名（Arabic, Russian, Portuguese）易错。共同问题：表达学习理由停留在 I like it，缺 broaden horizons/connect with others 等表达。","objectives":["语言能力：听懂语言学习对话的主旨与理由细节，用 I learn... because... / It helps me... 表达学习动机。","文化意识：了解世界语言多样性，尊重不同语言与文化。","思维品质：按语言—理由—收获分类梳理信息，培养多角度思考。","学习能力：借助语言信息卡自主记录听力要点并复述。"],"keyPoints":"① 词汇：accent / dialect / official / native / fluent / vocabulary。② 语言名：Arabic / Russian / Portuguese / Spanish / French。③ 句式：I learn... because... / It helps me connect with...。","difficulties":"① fluent /fluːənt/ 与 fluid 易混。② Portuguese /pɔːtʃʊɡiːz/ 音节多。③ broaden horizons（开阔视野）短语义，学生直译。","teachingMethods":"① 任务型：以介绍学习一种语言的理由为终任务。② 听前预教词与语言名。③ 信息卡记录。","preparation":"【PPT课件】P1 单元封面+世界地图；P2 语言名卡；P3-4 听力任务；P5 句型板；P6 说话任务卡。【实物教具】语言信息卡 printed；语言名词条。【音频】听力音频。","process":[{"step":"导入激活","time":"5","content":"【PPT P1 地图】教师：How many languages are there in the world? Why learn a foreign one? 预设回答：To talk to people. 板书时机：板书 languages。差异化提示：B班说中文；A班用英语。易错点提醒：foreign /fɒrən/。"},{"step":"词汇输入","time":"8","content":"【PPT P2 词卡】教师领读 accent/dialect/official/native/fluent。教师：What is your native language? 预设回答：Chinese. 板书时机：板书词。差异化提示：B班配图；A班造句。易错点提醒：fluent /fluːənt/。"},{"step":"听前预测","time":"5","content":"【PPT P3 信息卡】教师：What info will you hear? 预设回答：Language, reason. 板书时机：信息卡留空。差异化提示：B班勾选；A班自列。易错点提醒：留意语言名。"},{"step":"听中填卡","time":"10","content":"【PPT P5 表格】【音频】播放，学生填语言+理由。教师：Why does she learn Spanish? 预设回答：To travel. 板书时机：核对填卡。差异化提示：B班听两遍；A班一遍。易错点提醒：Portuguese 拼读。"},{"step":"句型输入","time":"7","content":"【PPT P5 句型板】教师：I learn French because it helps me connect with people. 预设回答跟读。板书时机：板书句型。差异化提示：B班套用；A班扩展。易错点提醒：broaden horizons 短语。"},{"step":"说话任务","time":"5","content":"【PPT P6 任务卡】学生介绍学习某语言的理由。教师：Share your reason. 预设回答：I learn English because it broadens my horizons. 板书时机：无。差异化提示：B班用脚本；A班自由。易错点提醒：reasons 用复数。"}],"blackboard":"┌─ U5 Listening & Speaking ┐\n│ Words: accent/dialect/     │\n│  official/native/fluent    │\n│ Languages: Arabic/Russian/ │\n│  Portuguese/Spanish        │\n│ I learn… because…          │\n└──────────────────────────────┘","exercises":"【基础作业】1. 听录音跟读 2 遍，圈出所有语言名与理由词。2. 用 I learn... because... 写 3 句学习理由。【提高作业】写一段 60 词短文：我最想学的一门外语及理由。【参考答案——教师用】基础2示例：I learn Spanish because it helps me travel. / I learn French because it broadens my horizons. / I learn Japanese because I love its culture.","reflection":"✅ 亮点：地图+信息卡激活充分，B班填卡完成率高。⚠️ 需改进：语言名发音仍弱。📌 下节课衔接：进入阅读汉字书写体系，从语言延伸到文字。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u5-r1","lessonId":"l-eng-b1-u5-r1","title":"Reading and Thinking: The Chinese Writing System (Ⅰ) — 整体理解","book":"必修第一册","unitNumber":5,"unitTitle":"Languages Around the World","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":2,"periodNumber":2,"duration":45,"grade":"高一","subject":"英语","tags":["阅读","Unit 5","Languages Around the World","人教版必修一 U5","第2节课"],"textbookAnalysis":"第二课时，语篇 The Chinese Writing System: Connecting the Past and the Present 介绍汉字书写体系的历史（甲骨文—金文—隶书—楷书）及其如何连接古今、团结民族、传承文化。本节聚焦整体理解与时间线。","overview":"【学情分析】A班：能读但时间线易混，忽视书写体系的文化意义。B班：长难句（定语从句）吃力。共同问题：date back to / symbol / carve / represent 等词不熟，对汉字英文表述陌生。","objectives":["语言能力：用略读获取文本主旨，用扫读提取汉字发展各阶段关键信息。","文化意识：理解汉字书写体系的文化价值与民族凝聚力。","思维品质：用时间线梳理汉字演变，培养时序与文化梳理能力。","学习能力：借助时间线图表自主梳理并复述。"],"keyPoints":"① 时间线：Shang Dynasty (oracle bones) → later forms → today。② 词汇：date back to / symbol / carve / represent / classic / appreciate。③ 意义：connect past and present / unite the nation / spread culture。","difficulties":"① date back to 后接时间，学生加 from。② carve（雕刻）过去式 carved，学生漏 e。③ represent /reprɪzent/ 多音节发音。","teachingMethods":"① 图式激活：汉字演变预测。② 略读+扫读分层。③ 时间线梳理。","preparation":"【PPT课件】P1 汉字演变图（甲骨文→楷书）；P2 语篇；P3 段落大意卡；P4 时间线表；P5 复述脚手架。【实物教具】时间线表 printed。【音频】无。","process":[{"step":"图式激活","time":"5","content":"【PPT P1 演变图】教师：How old is the Chinese writing system? 预设回答：Thousands of years. 板书时机：板书 oracle bones。差异化提示：B班说中文；A班用英语。易错点提醒：oracle /ɒrəkl/。"},{"step":"略读段落","time":"8","content":"【PPT P2 语篇】教师：Match paragraphs to time periods. 预设回答匹配。板书时机：板书阶段。差异化提示：B班匹配；A班归纳。易错点提醒：dynasty /dɪnəsti/。"},{"step":"扫读时间线","time":"12","content":"【PPT P4 时间线】学生填各阶段书写形式与意义。教师：What did people carve on bones? 预设回答：Symbols. 板书时机：核对填表。差异化提示：B班给填空表；A班自填。易错点提醒：carve→carved。"},{"step":"意义提炼","time":"8","content":"【PPT P3 词卡】教师圈 connect/unite/spread。预设回答跟读。板书时机：板书意义词。差异化提示：B班认读；A班造句。易错点提醒：date back to + 时间。"},{"step":"复述","time":"7","content":"【PPT P5 脚手架】学生用时间线复述。教师：Retell the history. 预设回答：The system dates back to the Shang Dynasty. People carved symbols on bones. 板书时机：无。差异化提示：B班照表读；A班脱稿。易错点提醒：dates back to 单三。"},{"step":"小结","time":"5","content":"【PPT P7 总结回顾】回顾演变+文化意义。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述。易错点提醒：represent /reprɪzent/。"}],"blackboard":"┌─ U5 Reading Ⅰ: 汉字书写体系 ┐\n│ Shang: oracle bones (carve)  │\n│ → later forms → today        │\n│ date back to / represent     │\n│ 连接古今 / 团结民族 / 传文化 │\n└────────────────────────────────┘","exercises":"【基础作业】1. 完成时间线表（阶段/形式/意义各≥3 点）。2. 用 5 句话复述汉字历史。【提高作业】写一段 60 词短文：汉字的文化意义。【参考答案——教师用】基础2示例：The Chinese writing system dates back to the Shang Dynasty. People carved symbols on animal bones. Over time, the forms changed. Today, it connects the past and the present. It unites the nation.","reflection":"✅ 亮点：演变图+时间线让历史清晰，A班复述流畅。⚠️ 需改进：date back to 用法仍混。📌 下节课衔接：进入语言深度，赏析定语从句与地道表达。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u5-r2","lessonId":"l-eng-b1-u5-r2","title":"Reading and Thinking: The Chinese Writing System (Ⅱ) — 语言深度","book":"必修第一册","unitNumber":5,"unitTitle":"Languages Around the World","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":3,"periodNumber":3,"duration":45,"grade":"高一","subject":"英语","tags":["阅读","Unit 5","Languages Around the World","人教版必修一 U5","第3节课"],"textbookAnalysis":"第三课时，沿用汉字书写体系语篇，聚焦语言深度：赏析 date back to、-ing 作主语/宾语、定语从句与地道表达，为写作积累语料。","overview":"【学情分析】A班：能懂大意但 -ing 主语与定语从句运用少。B班：which/that 识别困难。共同问题：描述文化仍用 very important，缺 significant/appreciate 等词。","objectives":["语言能力：识别并运用 date back to、-ing 主语与定语从句等表达。","文化意识：体会汉字书写体系的文化自豪感。","思维品质：辨析 -ing 作主语与作宾语的功能差异。","学习能力：建立文化描写语料库供写作调用。"],"keyPoints":"① -ing 主语：By doing so, it has connected... / Learning it helps...。② 定语从句：a system which/that...。③ 词汇：significant / appreciate / classic / represent / pass down。","difficulties":"① -ing 主语谓语用单数。② which 与 that 选择（非限制性只用 which）。③ appreciate /əpriːʃieɪt/ 拼读。","teachingMethods":"① 语篇研读圈画。② 结构对比：-ing 主语 vs 宾语。③ 语料库搭建。","preparation":"【PPT课件】P1 语篇高亮；P2 -ing 结构；P3 定语从句；P4 语料库模板；P5 仿写。【实物教具】语料卡 printed。【音频】无。","process":[{"step":"圈画-ing","time":"8","content":"【PPT P1 高亮】教师：Find -ing as subject. 预设回答：Learning it helps... 板书时机：板书结构。差异化提示：B班找已高亮；A班自找。易错点提醒：-ing 主语谓语单数。"},{"step":"结构对比","time":"10","content":"【PPT P2 对比】教师：-ing 作主语 vs 作宾语（enjoy learning）. 预设回答辨析。板书时机：双栏对比。差异化提示：B班选填；A班解释。易错点提醒：主语位 vs 宾语位。"},{"step":"定语从句","time":"10","content":"【PPT P3 从句】教师：a system which connects... — which 修饰 system. 预设回答跟读。板书时机：板书结构。差异化提示：B班套用；A班仿写。易错点提醒：非限制性用 which。"},{"step":"语料库","time":"8","content":"【PPT P4 模板】学生填文化词/短语/句式语料卡。预设回答：按语言文化模板分类填写词条。板书时机：巡视。差异化提示：B班填词；A班造句。易错点提醒：appreciate /əpriːʃieɪt/。"},{"step":"仿写","time":"9","content":"【PPT P5 练习】学生用语库仿写一句文化描写。教师：Describe a cultural symbol. 预设回答：The writing system, which dates back thousands of years, represents our culture. 板书时机：展示佳句。差异化提示：B班填空；A班自由。易错点提醒：定语从句逗号+which。"}],"blackboard":"┌─ U5 Reading Ⅱ: 语言深度 ┐\n│ -ing 主语 → 谓语单数      │\n│ -ing 宾语(enjoy learning)  │\n│ 定语从句: which/that 修饰物 │\n│ date back to / appreciate  │\n└──────────────────────────────┘","exercises":"【基础作业】1. 整理语料库（文化词≥5、短语≥4）。2. 用 -ing 作主语造 3 句。【提高作业】用语料库写一段 50 词文化描写（含定语从句 1 处）。【参考答案——教师用】基础2示例：Learning Chinese connects us to our history. / Writing the characters helps us think. / Appreciating our culture makes us proud.","reflection":"✅ 亮点：结构对比让 -ing 功能清晰，A班仿写提升。⚠️ 需改进：appreciate 拼写仍弱。📌 下节课衔接：进入语法——定语从句关系副词，为精确表达奠基。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u5-g","lessonId":"l-eng-b1-u5-g","title":"Discovering Useful Structures: 定语从句（关系副词 where/when/why + 介词+which/whom）","book":"必修第一册","unitNumber":5,"unitTitle":"Languages Around the World","lessonType":"grammar","lessonTypeName":"语法","lessonNumber":4,"periodNumber":4,"duration":45,"grade":"高一","subject":"英语","tags":["语法","Unit 5","Languages Around the World","人教版必修一 U5","第4节课"],"textbookAnalysis":"第四课时，语法点：定语从句关系副词 where（地点）、when（时间）、why（原因），以及 介词+which/whom 结构。承接 U4 关系代词，扩展至关系副词与介词结构。","overview":"【学情分析】A班：会用 that/which 但 where/when 作关系副词与作连词混淆。B班：介词+which 结构陌生。共同问题：where/when/why 与 which+介词的转换不熟。","objectives":["语言能力：识别并正确使用 where/when/why 引导的定语从句，及 介词+which/whom 结构。","文化意识：体会关系副词使表达精确简洁的价值。","思维品质：按先行词（时间/地点/原因）选择关系副词，并能与介词+which 转换。","学习能力：用关系副词选择表归纳规则。"],"keyPoints":"① where 修饰地点先行词（= at/in/on + which）。② when 修饰时间先行词（= at/in/on + which）。③ why 修饰 reason（= for which）。④ 介词+which/whom 用于正式表达。","difficulties":"① where 与 which 选择：先行词是地点且从句缺状语用 where，缺主/宾用 which。② when 与 which 同理。③ 介词选择（in which / on which / for which）依赖搭配。","teachingMethods":"① 归纳法：从例句发现规则。② 转换练习：where↔介词+which。③ 情境操练：描述语言与文化。","preparation":"【PPT课件】P1 例句；P2 关系副词选择表；P3 where↔介词+which；P4 when/why；P5 操练题。【实物教具】选择表卡 printed。【音频】无。","process":[{"step":"观察例句","time":"7","content":"【PPT P1 例句】教师：This is the place where people carved symbols. — where 修饰 place. 预设回答找先行词。板书时机：板书例句。差异化提示：B班找先行词；A班说成分。易错点提醒：where 作状语。"},{"step":"归纳选择表","time":"10","content":"【PPT P2 表】师生归纳：地点→where，时间→when，原因→why。教师：Which for time? 预设回答：when. 板书时机：填表。差异化提示：B班填副词；A班补例句。易错点提醒：缺状语才用关系副词。"},{"step":"转换练习","time":"10","content":"【PPT P3 转换】教师：the place where = the place in which. 预设回答转换。板书时机：板书等式。差异化提示：B班选填；A班改写。易错点提醒：介词依赖搭配。"},{"step":"when/why","time":"8","content":"【PPT P4 when/why】教师：the time when / the reason why(=for which). 预设回答跟读。板书时机：板书结构。差异化提示：B班套用；A班仿写。易错点提醒：why = for which。"},{"step":"操练","time":"10","content":"【PPT P5 题】学生用关系副词填空并转换。教师：This is the city ___ Chinese began. 预设回答：where. 板书时机：展示。差异化提示：B班选择式；A班转换。易错点提醒：缺主宾用 which。"}],"blackboard":"┌─ U5 Grammar: 关系副词 ┐\n│ 地点→where(=介词+which) │\n│ 时间→when(=介词+which)  │\n│ 原因→why(=for which)    │\n│ 介词+which/whom(正式)   │\n│ 缺状语→副词;缺主宾→代词│\n└──────────────────────────┘","exercises":"【基础作业】1. 用关系副词填空 10 题。2. 将 5 句 where/when/why 改写为 介词+which。【提高作业】写一段 50 词文化介绍，含 where/when/why 各 1 处。【参考答案——教师用】基础1示例：This is the place where people first wrote. / I remember the day when I learned my first character. / That is the reason why I love Chinese.","reflection":"✅ 亮点：选择表+转换让规则清晰，A班操练准确。⚠️ 需改进：介词搭配 B 班仍混。📌 下节课衔接：进入听与谈——用关系副句讨论语言学习。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u5-lt","lessonId":"l-eng-b1-u5-lt","title":"Listening and Talking: Explore Foreign Languages — 探索外语与学习经验","book":"必修第一册","unitNumber":5,"unitTitle":"Languages Around the World","lessonType":"listening-talking","lessonTypeName":"听与谈","lessonNumber":5,"periodNumber":5,"duration":40,"grade":"高一","subject":"英语","tags":["听与谈","Unit 5","Languages Around the World","人教版必修一 U5","第5节课"],"textbookAnalysis":"第五课时，听说结合。听力为不同人分享外语学习经验与困难；口语为用关系副词与建议句式谈论学习策略。","overview":"【学情分析】A班：能说单句但建议句式不熟。B班：听困难描述易遗漏。共同问题：学习策略表达（practice, immerse, review）不熟。","objectives":["语言能力：听懂外语学习经验与困难；用关系副词与建议句式谈论学习策略。","文化意识：体会多语言学习的价值与坚持精神。","思维品质：在讨论中提出可行学习建议。","学习能力：用策略卡记录并复述。"],"keyPoints":"① 策略词：practice / immerse / review / memorize / communicate。② 建议句：You should... / It helps to... / The best way is...。③ 关系副词：the way in which / the time when。","difficulties":"① immerse /ɪmɜːs/ 拼读。② memorize /meməraɪz/ 与 memory 关系。③ the way in which 正式结构。","teachingMethods":"① 情境讨论。② 听前预教策略词。③ 策略卡记录。","preparation":"【PPT课件】P1 学习场景图；P2 策略词；P3 听力任务；P4 建议句型；P5 讨论卡。【实物教具】策略卡 printed。【音频】听力音频。","process":[{"step":"策略词预教","time":"6","content":"【PPT P2 策略词】教师领读 practice/immerse/review/memorize。预设回答跟读。板书时机：板书策略词。差异化提示：B班配图；A班造句。易错点提醒：immerse /ɪmɜːs/。"},{"step":"听前预测","time":"5","content":"【PPT P3 任务】教师：What difficulties will you hear? 预设回答：Pronunciation, vocabulary. 板书时机：卡留空。差异化提示：B班勾选；A班自列。易错点提醒：留意策略。"},{"step":"听中记录","time":"10","content":"【PPT P4 听力任务卡】【音频】播放，学生填困难+策略。教师：How does she memorize words? 预设回答：By reviewing often. 板书时机：核对填卡。差异化提示：B班听两遍；A班一遍。易错点提醒：memorize /meməraɪz/。"},{"step":"建议句型","time":"6","content":"【PPT P4 句型】教师：You should practice daily. It helps to immerse yourself. 预设回答跟读。板书时机：板书句型。差异化提示：B班套用；A班扩展。易错点提醒：It helps to + 原形。"},{"step":"讨论","time":"13","content":"【PPT P5 卡】学生用关系副词+建议句讨论策略。教师：Discuss your learning ways. 预设回答：The way in which I learn is practice. You should review daily. 板书时机：无。差异化提示：B班用脚本；A班自由。易错点提醒：the way in which 正式。"}],"blackboard":"┌─ U5 Listening & Talking ┐\n│ 策略: practice/immerse/   │\n│  review/memorize          │\n│ 建议: You should…/        │\n│  It helps to…/The best way│\n│ the way in which…         │\n└────────────────────────────┘","exercises":"【基础作业】1. 听录音补全困难与策略卡。2. 用建议句式写 3 条学习建议。【提高作业】写一段 60 词语言学习经验，含 2 处关系副词。【参考答案——教师用】基础2示例：You should practice every day. / It helps to immerse yourself in the language. / The best way to memorize words is to review often.","reflection":"✅ 亮点：策略卡+建议句让讨论真实，B班参与度高。⚠️ 需改进：immerse 发音仍弱。📌 下节课衔接：进入写作——写语言学习博客。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u5-w1","lessonId":"l-eng-b1-u5-w1","title":"Reading for Writing: A Language-Learning Blog (Ⅰ) — 读析与语料","book":"必修第一册","unitNumber":5,"unitTitle":"Languages Around the World","lessonType":"writing","lessonTypeName":"写作","lessonNumber":6,"periodNumber":6,"duration":45,"grade":"高一","subject":"英语","tags":["写作","Unit 5","Languages Around the World","人教版必修一 U5","第6节课"],"textbookAnalysis":"第六课时，写作第一课时。读模型博客（分享语言学习经历：起因—方法—收获—建议），分析结构与语言，积累语料。","overview":"【学情分析】A班：能写单句但博客结构松散，缺收获与建议。B班：时态混乱（经历用过去，学生混现在）。共同问题：博客语气不亲切，缺 I think / In my view。","objectives":["语言能力：识别博客结构（起因—方法—收获—建议）与衔接手段，积累语料。","文化意识：在分享中体现开放与坚持的学习态度。","思维品质：按逻辑组织学习经历。","学习能力：用提纲模板搭建写作骨架。"],"keyPoints":"① 结构：why I learn → how I learn → what I gained → my advice。② 时态：经历过去，建议现在。③ 语料：immerse/review/connect with/broaden horizons。","difficulties":"① 时态切换：经历过去 vs 建议现在。② gained（收获）抽象。③ 博客语气与正式文差异。","teachingMethods":"① 范文研读圈结构。② 提纲搭建。③ 语料积累。","preparation":"【PPT课件】P1 范文分段；P2 结构图；P3 时态标注；P4 语料库；P5 提纲模板。【实物教具】提纲卡 printed。【音频】无。","process":[{"step":"读范文","time":"8","content":"【PPT P1 范文】教师：What language does the blogger learn? 预设回答：English. 板书时机：板书主题。差异化提示：B班抓大意；A班找结构。易错点提醒：blog /blɒɡ/。"},{"step":"析结构","time":"10","content":"【PPT P2 结构图】师生分四段。教师：Which part gives advice? 预设回答：Advice. 板书时机：填结构图。差异化提示：B班匹配；A班归纳。易错点提醒：advice 不可数。"},{"step":"时态标注","time":"8","content":"【PPT P3 时态】教师圈经历过去与建议现在。预设回答辨析。板书时机：板书时态。差异化提示：B班标时态；A班解释。易错点提醒：gained 过去式。"},{"step":"积语料","time":"7","content":"【PPT P4 语料库】学生填起因/方法/收获语 答：Check the tense. 板书时机：展示量规。差异化提示：B班勾选；A班写建议。易错点提醒：评时态。"},{"step":"修改","time":"8","content":"【PPT P9 修改清单】学生据互评修改。教师聚焦时态。预设回答：（学生自修中，教师口头提示共性错误）板书时机：无。差异化提示：B班改错；A班润色。易错点提醒：滑回现在须改过去。"},{"step":"展示","time":"5","content":"【PPT P4 佳句】展示佳句与修改对比。预设回答赏析。板书时机：圈亮点。差异化提示：B班跟读；A班点评。易错点提醒：关系副词。"}],"blackboard":"┌─ U5 Writing Ⅱ: 起草+互评 ┐\n│ 量规: 结构/时态/语言/衔接   │\n│ 时态: 经历过去/建议现在     │\n│ 流程: 起草→互评→修改→定稿   │\n└──────────────────────────────┘","exercises":"【基础作业】1. 定稿博客（≥80 词，四结构齐全）。2. 用红笔标出过去时与关系副词。【提高作业】为博客配一段 30 词结尾建议。【参考答案——教师用】基础1示范段：I started learning English to connect with people. I practiced every day and immersed myself in the language. The time when I made my first foreign friend was exciting. My advice is to never give up.","reflection":"✅ 亮点：量规让互评有抓手，A班时态准确率提升。⚠️ 需改进：B班句子碎片化。📌 下节课衔接：进入项目——综合单元产出外语节/语言文化海报。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b1-u5-p","lessonId":"l-eng-b1-u5-p","title":"Project & Unit Review: Foreign Language Festival — 外语节与语言文化海报","book":"必修第一册","unitNumber":5,"unitTitle":"Languages Around the World","lessonType":"project","lessonTypeName":"项目复习","lessonNumber":8,"periodNumber":8,"duration":45,"grade":"高一","subject":"英语","tags":["项目复习","Unit 5","Languages Around the World","人教版必修一 U5","第8节课"],"textbookAnalysis":"第八课时，单元综合产出。小组为一种外语或汉字文化制作介绍海报，综合运用词汇、关系副词、博客语料，并策划迷你外语节展示。","overview":"【学情分析】A班：综合运用能力可，但展示语言需规范。B班：表达碎片，需模板与分工支持。共同问题：海报文体特征（标题+简介+亮点+号召）体现不足。","objectives":["语言能力：综合运用单元词汇与关系副词，以海报文体介绍一门语言或文字文化。","文化意识：在介绍中体现对语言多样性的尊重与自豪。","思维品质：统筹简介—亮点—建议，做有吸引力的表达。","学习能力：通过小组协作完成从策划到展示的完整项目。"],"keyPoints":"① 文体：海报（标题+简介+亮点+号召）。② 语言：关系副词+建议句+时态切换。③ 产出：海报+口头推介。","difficulties":"① 文体退化成流水账。② 小组分工不均。③ 口头推介缺互动。","teachingMethods":"① 项目式学习（PBL）。② 小组分工+量规。③ 展示互评。","preparation":"【PPT课件】P1 项目说明+样例；P2 海报模板；P3 评价量规；P4 展示流程；P5 单元知识图。【实物教具】A4 海报纸 printed 每组；彩笔。【音频】无。","process":[{"step":"任务发布","time":"6","content":"【PPT P1 说明】教师发布任务：制作语言/文字文化海报。预设回答讨论。板书时机：板书要求。差异化提示：B班用模板；A班自创。易错点提醒：海报四要素。"},{"step":"小组策划","time":"12","content":"【PPT P2 模板】小组分工：简介/亮点/建议/文案。教师巡视。预设回答讨论。板书时机：无。差异化提示：B班填模板；A班设计。易错点提醒：用关系副词。"},{"step":"制作海报","time":"12","content":"【PPT P7 范例参考】【实物 海报】小组图文制作。教师指导文体与语言。预设回答：（小组讨论制作中，教师巡视指导）板书时机：无。差异化提示：B班配图；A班写文案。易错点提醒：号召语收尾。"},{"step":"展示","time":"10","content":"【PPT P4 流程】各组用关系副词+建议句推介。教师：Present your language. 预设回答展示。板书时机：无。差异化提示：B班读卡；A班脱稿。易错点提醒：用 Discover…/Learn… 号召。"},{"step":"评价+回顾","time":"5","content":"【PPT P3 量规+P5 知识图】互评+单元回顾。预设回答跟读。板书时机：圈重点。差异化提示：B班勾选；A班自评。易错点提醒：单元核心关系副词/语言词回顾。"}],"blackboard":"┌─ U5 Project & Review ┐\n│ 任务: 语言/文字文化海报 │\n│ 文体: 标题+简介+亮点+号召│\n│ 语言: 关系副词+建议句   │\n│ 产出: 海报 + 口头推介   │\n└──────────────────────────┘","exercises":"【基础作业】1. 完善海报（含四要素）。2. 写一段 60 词语言推介（含 2 处关系副词）。【提高作业】为海报设计迷你外语节活动方案。【参考答案——教师用】基础2示范：Chinese is a language that dates back thousands of years. The place where it began is full of history. Learning it connects you with a rich culture. Discover the beauty of Chinese characters with us!","reflection":"✅ 亮点：海报产出综合性强，A班文体特征明显。⚠️ 需改进：B班分工不均。📌 下节课衔接：必修一全部完成，进入必修二 Cultural Heritage，话题转向文化遗产保护。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"createdAt":"2026-07-13T18:00:00Z"},{"id":"l-eng-b2-u1-ls","lessonId":"l-eng-b2-u1-ls","book":"必修第二册","unitNumber":1,"unitTitle":"Cultural Heritage","lessonType":"listening-speaking","lessonTypeName":"听与说","lessonNumber":1,"periodNumber":1,"duration":40,"grade":"高一","subject":"英语","tags":["听与说","文化遗产","世界遗产","人教版必修二U1","第一节课"],"textbookAnalysis":"本课为必修第二册 Unit 1 Cultural Heritage 第一课时（Listening and Speaking），属单元导入+输入环节。语篇为一段关于世界遗产地的对话与一段介绍泰山文化遗产的听力材料，功能语境是\"识别与描述文化遗产\"。语言重点为遗产保护词汇（heritage, preserve, relic, temple, ancient, UNESCO）及提出建议句型（I suggest that... / It is a good idea to...）。承接必修一U4定语从句基础，为Reading的\"问题-解决方案\"议论文做词汇与话题预热。","overview":"【学情分析】A班：初中已接触简单文化遗产名词（Great Wall, pyramid），能听懂慢速介绍；但 preserve/relic 等词较生。B班：对中国文化遗产名称的英文表达不熟，听力抓细节弱。共同问题：习惯用简单形容词描述文化遗产（big, old），缺乏\"价值意义\"表达。","objectives":["语言能力：听懂关于泰山文化遗产的听力材料，提取关键信息（名称/地点/价值），准确使用 6-8 个遗产保护词汇。","文化意识：了解中国及世界文化遗产的多样性，增强文化遗产保护意识。","思维品质：通过\"听前预测—听中验证—听后推理\"形成系统听力策略。","学习能力：能用 I suggest that... / It is worth protecting because... 就文化遗产保护做简短发言。"],"keyPoints":"① 文化遗产核心词汇：heritage / preserve / relic / temple / ancient / UNESCO ② 提建议句型：I suggest (that)... / It is a good idea to... / We should... ③ 听力微技能：听前读题支预测关键词、听中抓数字与地点名。","difficulties":"① preserve（保护/保存）与 protect（保护/防护）的用法区别。原因：中文均译\"保护\"，需语境区分。易错点提醒：preserve 强调保持原有状态，protect 强调防止伤害。② 听力中数字+地名叠加 — 学生易混淆年份与海拔。③ temple /templ/ 发音 — 学生易读成 /tempəl/。","teachingMethods":"① 任务型（TBL）：以推荐一处世界遗产为终任务。② 听前预测+听中填卡：信息卡脚手架。③ 对子互问操练建议句型。","preparation":"【PPT课件】P1 单元封面（Cultural Heritage）；P2 世界遗产图片九宫格（长城/故宫/兵马俑/泰山/金字塔/吴哥窟/自由女神像/大堡礁/马丘比丘）；P3-4 听力任务题；P5 建议句型板；P6 说话任务卡。【实物教具】世界遗产信息卡 printed 每组一套；世界地图一张。【音频】听力两段音频（教材配套）。","process":[{"step":"导入激活","time":"5","content":"【PPT P2 九宫格】教师：Look at these nine pictures. Which ones are in China? Can you name them? 预设回答：The Great Wall, the Forbidden City, Mount Tai! 板书时机：右侧板书 heritage / ancient / UNESCO。差异化提示：B班指图说中文再跟读英文；A班用 I can see... 造句。易错点提醒：ancient /eɪnʃənt/ 的 c 不发音。"},{"step":"词汇输入","time":"8","content":"【PPT P3 词卡】教师领读 heritage / preserve / relic / temple / UNESCO。教师：Why is the Great Wall a heritage site? 预设回答：Because it is very old and important to history. 板书时机：左栏板书词+短注释。差异化提示：B班配图记忆+词性标注；A班用词造句。易错点提醒：UNESCO 全称 United Nations Educational, Scientific and Cultural Organization，注意拼写。"},{"step":"听前预测","time":"5","content":"【PPT P4 题支】教师：We will listen to an introduction about Mount Tai. Predict: What will be mentioned? (age / location / historical value / visiting tips) 预设回答：Age and location! 板书时机：预测词写在黑板中部。差异化提示：B班给中文提示词；A班用英文说预测理由。易错点提醒：听力常见陷阱 — 数字信息会先给错误再修正。\"over 3,000 years\" ≠ \"exactly 3,000 years\"。"},{"step":"听中填卡","time":"10","content":"【PPT P5 表格】【音频 段一】播放听力，学生填信息卡（名称/地点/年代/价值/特色）。教师：How old is Mount Tai? What makes it special? 预设回答：Over 3,000 years old. It is a symbol of Chinese culture. 板书时机：核对答案时填表于黑板中部。差异化提示：B班听两遍只填名称+年代；A班一遍填全。易错点提醒：symbol /sɪmbəl/ — 与 simple /sɪmpəl/ 区分。"},{"step":"句型操练","time":"7","content":"【PPT P5 句型板】教师：How to suggest a heritage site? I suggest (that)... / It is a good idea to... / I recommend... 教师示范后用泰山信息造句。预设回答：I suggest visiting Mount Tai because it represents Chinese culture. 板书时机：句型板书于中央。差异化提示：B班套用模板；A班替换地点名+理由。易错点提醒：suggest 后接 doing 或 that 从句（动词原形），不接 to do。"},{"step":"说话任务","time":"5","content":"【PPT P6 任务卡】学生两人一组，从信息卡中选一处遗产互荐。教师：Recommend a heritage site to your partner. Use suggest / recommend. 预设回答：I recommend the Terracotta Warriors. It is a wonder of the ancient world. 板书时机：无。差异化提示：B班用填空式对话卡；A班自由问答追加理由。易错点提醒：wonder 作名词\"奇迹\"，不混淆 wonder 动词\"想知道\"。"}],"blackboard":"┌─ U1 Listening & Speaking ──────┐\n│ Heritage: ancient / UNESCO       │\n│ preserve / relic / temple / symbol│\n│                                  │\n│ I suggest (that)...              │\n│ It is a good idea to...          │\n│ I recommend + doing...           │\n│                                  │\n│ Mount Tai Symbol Card:           │\n│  Age: >3000y | Value: symbol of  │\n│  Chinese civilization            │\n└──────────────────────────────────┘","exercises":"【基础作业】1. 听录音跟读听力文本 2 遍，圈出所有遗产保护词汇。2. 用 I suggest that... 写 3 句遗产保护建议。【提高作业】用英文写一段 50 词推荐语：推荐一处你了解的世界遗产（中英文均可），包含名称/地点/至少 2 点价值。【参考答案——教师用】基础2示例：I suggest that we protect the Great Wall. / I suggest that visitors not take away bricks. / I suggest that the government limit tourist numbers.","reflection":"✅ 亮点：九宫格激活+信息卡脚手架有效降听力焦虑，B班填卡完成率高。⚠️ 需改进：UNESCO 发音仍有困难，下节需强化。📌 下节课衔接：进入阅读 FROM PROBLEMS TO SOLUTIONS，从遗产认知延伸到保护方式。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Listening & Speaking · Cultural Heritage (P1)"},{"id":"l-eng-b2-u1-r1","lessonId":"l-eng-b2-u1-r1","book":"必修第二册","unitNumber":1,"unitTitle":"Cultural Heritage","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":2,"periodNumber":2,"duration":40,"grade":"高一","subject":"英语","tags":["阅读","文化遗产","埃及神庙","阿斯旺大坝","人教版必修二U1","第二节课"],"textbookAnalysis":"本课为必修第二册 Unit 1 第二课时（Reading I），语篇 FROM PROBLEMS TO SOLUTIONS 是一篇问题—解决型议论文，讲述埃及阿斯旺大坝建设与阿布辛贝神庙搬迁的案例，展示了\"发展vs保护\"的全球协作解决方案。结构为问题引入→各方行动→解决成果→意义升华。语言重点为议论文衔接词（however, finally, over the next 20 years）与文化遗产保护术语（damage, rescue, contribution, committee）。承接必修一U4定语从句，本课语篇中大量出现限制性定语从句。","overview":"【学情分析】A班：能快速把握段落主旨，但对\"发展vs保护\"的辩证思维训练不足。B班：对 UNESCO/国际协作话题背景知识少，需地图+时间线脚手架。共同问题：议论文的\"问题→措施→意义\"三段论结构感知不清晰，易忽略 however 等转折标志词。","objectives":["语言能力：读懂\"问题—解决\"型议论文，提取阿斯旺大坝项目的时间线/各方行动/成果；掌握 8-10 个论述类核心词汇。","文化意识：理解文化遗产保护的国际协作意义，形成\"发展不能以牺牲文化为代价\"的观念。","思维品质：通过\"问题—措施—意义\"三段论分析培养议论文结构思维。","学习能力：能用时间轴+Who-What-Why表格复述文章主体事件。"],"keyPoints":"① 议论文结构：problem → challenges → solutions → significance ② 时间线词汇：in 1959 / in 1960 / over the next 20 years / finally ③ 核心短语：give way to / lead to / turn to / take down / bring together","difficulties":"① give way to（让位于）学生易按字面理解。原因：多义词块。提醒：本文指\"新旧更替\"。② take down（拆卸）与 take apart（拆开）的区别。③ contribute（贡献/捐献）与 contribution（贡献/捐款）的词性转换。","teachingMethods":"① Jigsaw阅读：分组读不同段落后拼图整合。② 时间轴填图法：构建项目进程。③ 问题链追问：训练批判性思维。","preparation":"【PPT课件】P1 阿斯旺大坝与阿布辛贝神庙图片；P2 地图（Nile/Aswan/Abu Simbel）；P3-4 时间轴/Who-What-Why表；P5 议论文结构图；P6 词汇对比表；P7 总结回顾。【实物教具】时间轴空白工作单 printed 每人一份；段落拼图卡。","process":[{"step":"导入设问","time":"5","content":"【PPT P1 神庙图片】教师：This is Abu Simbel temple, 3,000 years old. But in the 1960s, it faced a problem — what do you think happened? 预设回答：A dam was built? / Water would destroy it. 板书时机：板书 problem? / solution? 双问号。差异化提示：B班中文猜；A班英文猜。易错点提醒：temple /templ/，注意结尾不读完整 /pel/。"},{"step":"快速阅读抓主干","time":"8","content":"【PPT P3 时间轴】教师：Read fast (3 min). Find: ① What is the problem? ② Who helped? ③ What happened in the end? 预设回答：① Aswan Dam would damage temples. ② UN + 50 countries. ③ Temples were moved and saved. 板书时机：填时间轴的三个关键点。差异化提示：B班给三选一选项；A班写完整句。易错点提醒：proposal /prəpəʊzəl/ — pro- 前缀，pose 词根\"放置\"。"},{"step":"精读段落1-2 问题与冲突","time":"10","content":"【PPT P4 问题分析表】教师精讲：give way to = 让位于；led to protests = 引发抗议。教师：Why did people protest? 预设回答：Because the dam could damage temples and cultural relics. 板书时机：左侧栏补充\"give way to / lead to / turn to\"。差异化提示：B班读后填关键词；A班读后用自己话解释。易错点提醒：relics 复数 — 单数 relic，类似 physics (s并非复数)。"},{"step":"精读段落3-4 行动与成果","time":"10","content":"【PPT P5 行动链】教师：Who did what? 学生填表匹配（government / committee / UN / engineers → actions）。教师：How was the problem solved? 预设回答：Temples were taken down piece by piece, moved, and put back together. 板书时机：右侧画行动链箭头图。差异化提示：B班连线匹配；A班写完整句。易错点提醒：put back together — back 不是方位而是\"恢复原状\"。"},{"step":"归纳意义","time":"4","content":"【PPT P6 议论文结构】教师：What can we learn from this story? (balance between development and protection / global cooperation) 预设回答：We should balance progress and heritage protection. Countries can work together. 板书时机：圈出结构关键词。差异化提示：B班跟读关键词；A班用自己的话总结。易错点提醒：balance /bæləns/ — ba 不是 /beɪ/。"},{"step":"小结","time":"3","content":"【PPT P7 总结回顾】教师带学生回顾\"问题→行动→方案\"结构+核心词汇。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述。易错点提醒：global cooperation 不是 global corporation（公司）。"}],"blackboard":"┌─ U1 Reading I: PROBLEMS TO SOLUTIONS ──────┐\n│ PROBLEM → ACTIONS → SOLUTION → SIGNIFICANCE │\n│                                              │\n│ give way to / lead to / turn to / take down  │\n│ rescue / contribution / balance              │\n│                                              │\n│ 1959 UN→1960 work→1961 first temple→20 yrs  │\n│ 50 countries = $80M → 22 temples saved       │\n└──────────────────────────────────────────────┘","exercises":"【基础作业】1. 朗读课文第2-3段 2 遍，圈出所有转折词（however/but/although）。2. 用时间轴上的3个关键年份各写1句事件描述。【提高作业】用 80 词左右写一段：你认为在城市建设中如何平衡\"发展\"与\"保护文物\"？（用 give way to / balance / protect）【参考答案——教师用】基础2示例：In 1959, Egypt turned to the UN for help. / In 1960, the work to save temples began. / Over 20 years, 22 temples were rescued.","reflection":"✅ 亮点：时间轴+Who-What-Why表有效组织信息，B班完成率高。⚠️ 需改进：议论文结构术语（proposal/committee）学生仍感吃力。📌 下节课衔接：进入精读语言+定语从句在语篇中的功能分析。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Reading and Thinking · Cultural Heritage (P2)"},{"id":"l-eng-b2-u1-r2","lessonId":"l-eng-b2-u1-r2","book":"必修第二册","unitNumber":1,"unitTitle":"Cultural Heritage","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":3,"periodNumber":3,"duration":40,"grade":"高一","subject":"英语","tags":["阅读","精读","定语从句","文化遗产","人教版必修二U1","第三节课"],"textbookAnalysis":"本课为必修第二册 Unit 1 第三课时（Reading II），聚焦语篇 FROM PROBLEMS TO SOLUTIONS 的精读与语言分析。重点分析文中限制性定语从句（The dam that was built / temples that were an important part...）在议论文中的功能——提供限定性信息、增强论述说服力。同时深化语篇中高频学术词汇的用法辨析（establish / investigate / conduct / propose）。","overview":"【学情分析】A班：必修一U4已接触限制性定语从句，能识别 that/which/who，但辨 when to use which 仍有困难。B班：定语从句概念感模糊，需大量语境例句支撑。共同问题：阅读中见到定语从句会跳过不分析其功能——学生把定语从句当\"长难句\"而非\"信息工具\"。","objectives":["语言能力：能在课文语境中识别并分析至少 5 个限制性定语从句的功能，准确辨析关系代词。","文化意识：通过定语从句体会英语如何用子句修饰限定——不同于中文前置定语的习惯。","思维品质：分析定语从句在议论文中的\"信息限定\"功能，培养语法服务于意义的意识。","学习能力：建立\"从读到写\"的语料库——积累课文中的优质定语从句句型用于后续写作。"],"keyPoints":"① 语篇中定语从句的识别与关系代词选择 ② 议论文高频动词：establish / investigate / conduct / propose ③ 定语从句在议论文中的修辞功能：提供证据→增强说服力","difficulties":"① a number of（许多）vs the number of（…的数量）。原因：形近意远，考试高频陷阱。② 关系代词 that vs which 的选用。提醒：限制性中 that 更通用，但介词后只能用 which。③ proposal 与 propose 的词性转换 — 学生易混淆拼写。","teachingMethods":"① 标注法：圈出文中所有定语从句并分析先行词+关系代词。② 替换练习：改写简单句为定语从句。③ 语料卡记录：分类摘录优质句子。","preparation":"【PPT课件】P1-2 课文中圈出的定语从句示例；P3 关系代词对比表；P4 语料卡模板；P5 词汇辨析表；P6 句型改写练习；P7 总结回顾。【实物教具】课文复印件 printed 每人一份；高亮笔。","process":[{"step":"课文回顾","time":"5","content":"【PPT P1 结构图】教师：Last class we learned the \"problem-solution\" structure. Can you recall the key events? 预设回答：Egypt built a dam. Temples were in danger. UN and 50 countries helped. 板书时机：左栏写 1959/1960/1961/20years 时间线。差异化提示：B班看时间轴读关键词；A班完整复述。易错点提醒：recall ≠ remember — recall 更强调\"调取记忆\"。"},{"step":"定语从句发现","time":"8","content":"【PPT P2 课文句子】发课文复印件。教师：Circle all clauses starting with that / which / who / whose. 学生标记后全班核对。教师：Why does the author use these clauses? 预设回答：To give more information about the nouns. 板书时机：逐句板书圈出的定语从句。差异化提示：B班给划线句直接圈关系词；A班自己找+写先行词。易错点提醒：\"temples that were an important part\" — that 指 temples（物），不是 part。"},{"step":"关系代词辨析","time":"10","content":"【PPT P3 对比表】教师对比：that指人物均可，which 仅指物，who 指人，whose 表所有。教师例句：The temple that/which was moved... / The engineers who rescued... / The country whose donation helped... 预设回答辨析。板书时机：四列对比板书。差异化提示：B班根据提示选择填空；A班独立造句。易错点提醒：介词后用 which 不用 that — \"a place in which they were safe\" 不是 in that。"},{"step":"语料库搭建","time":"10","content":"【PPT P4 模板】学生分类填语料卡：①定语从句优质句摘录 ②议论文动词（establish/investigate/conduct/propose）③转折衔接词。板书时机：巡视指导。差异化提示：B班填词；A班造句。预设回答：按文化遗产语料库模板分类填写词条。易错点提醒：establish（建立）≠ publish（出版）—— 论文用语 distinguish。"},{"step":"句型改写","time":"5","content":"【PPT P6 练习】教师给两个简单句，学生合并为定语从句。例：The temples were 3,000 years old. They faced a new dam. → The temples that were 3,000 years old faced a new dam. 预设回答造句。板书时机：板书改写公式。差异化提示：B班给改写框架；A班独立改。易错点提醒：合并后句子仍为一个完整的 SVO 结构，不要重复主语。"},{"step":"小结","time":"2","content":"【PPT P7 总结回顾】回顾定语从句功能（限定信息→增强说服力）+语料库。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述。易错点提醒：下节课语法课深入讲关系代词的选用规则。"}],"blackboard":"┌─ U1 Reading II: Language Focus ──────┐\n│ that → 人/物   which → 物 only       │\n│ who → 人       whose → ...的         │\n│ 介词 + which (not that!)             │\n│                                      │\n│ Verbs: establish / investigate       │\n│        conduct / propose / rescue    │\n│                                      │\n│ Clauses in text (excerpts):          │\n│  temples that were an important part │\n│  scientists who had studied...       │\n│  a place in which they were safe     │\n└──────────────────────────────────────┘","exercises":"【基础作业】1. 从课文中找出5个定语从句并标注先行词+关系代词。2. 将以下两句合并为定语从句：The government turned to the UN. The UN had experts in heritage protection. 【提高作业】用定语从句写3句介绍一处你了解的文化遗产（用 that / which / where）。【参考答案——教师用】基础2示例：The government turned to the UN which/that had experts in heritage protection.","reflection":"✅ 亮点：标注发现法让学生主动探索语法，参与度高。⚠️ 需改进：whose 用法仍有混淆，语法课需强化。📌 下节课衔接：进入语法课，系统对比所有关系代词。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Reading and Thinking · Cultural Heritage (P3)"},{"id":"l-eng-b2-u1-g","lessonId":"l-eng-b2-u1-g","book":"必修第二册","unitNumber":1,"unitTitle":"Cultural Heritage","lessonType":"grammar","lessonTypeName":"语法","lessonNumber":4,"periodNumber":4,"duration":40,"grade":"高一","subject":"英语","tags":["语法","定语从句","关系代词","文化遗产","人教版必修二U1","第四节课"],"textbookAnalysis":"本课为必修第二册 Unit 1 第四课时（Discovering Useful Structures），系统教学限制性定语从句中关系代词（that/which/who/whom/whose）的用法与选择规则。基于 Reading 语篇中提取的例句，引导学生归纳出规则，并通过文化遗产主题的语境化练习巩固。衔接必修一U4已学的 that/which/who 基础，本课新增 whose 和介词+which 结构。","overview":"【学情分析】A班：知道 that/which/who 的区别，但介词+which 和 whose 是全新内容。B班：定语从句概念仍模糊，需大量语境化例句反复操练。共同问题：写作中要么不用定语从句，要么乱用 that 覆盖所有情况。","objectives":["语言能力：准确选择限制性定语从句的关系代词（that/which/who/whom/whose），在文化遗产话题中产出 5 个以上正确句子。","文化意识：通过定语从句更精准地描述文化遗产的属性和特征。","思维品质：通过\"发现例句→归纳规则→应用规则\"的归纳法培养语法学习策略。","学习能力：建立\"语法自查表\"——写作后自行检查定语从句关系代词是否正确。"],"keyPoints":"① 关系代词对比：that（人+物通用）/ which（仅物）/ who（人主语）/ whom（人宾语）/ whose（所属） ② 介词+which 结构 ③ 限制性定语从句中关系代词的省略条件（作宾语时可省）","difficulties":"① whose 中文无直接对应\"…的\"，学生写作中极少主动使用。原因：母语负迁移。② 介词+which 中介词选择（in which=where 但更正式）。③ that 在 all/everything 等不定代词后必须用 that 不用 which。","teachingMethods":"① 归纳法（Guided Discovery）：例句→规则→练习 ② Bingo 游戏：随机抽卡造句 ③ 改错练习：纠正典型错误","preparation":"【PPT课件】P1 关系代词对比表（五列）；P2 课文例句摘录；P3 规则归纳页；P4 介词+which 结构；P5 Bingo 任务卡；P6 改错题；P7 总结。【实物教具】关系代词 Bingo 卡每人一张；句型卡一套。","process":[{"step":"例句发现","time":"7","content":"【PPT P2 例句】展示课文中5个定语从句，学生圈关系代词和先行词。教师：What do these words connect? What do they refer to? 预设回答：They connect two sentences and refer to the noun before. 板书时机：左栏板书例句，标注先行词→关系代词。差异化提示：B班只圈词不分析功能；A班分析关系代词在从句中做什么成分。易错点提醒：关系代词在从句中一定充当成分（主语/宾语/定语），不是摆设。"},{"step":"规则归纳","time":"12","content":"【PPT P3 对比表】教师引导学生归纳五格对比表：that/which/who/whom/whose + 指人还是物？+ 在从句中做什么成分？教师：When do we use \"whose\"? 预设回答：When we want to say something belongs to someone/something. 板书时机：板书完整五列对比表。差异化提示：B班填已给框架表；A班自己画表填。易错点提醒：whose 后面跟的名词通常不带冠词——whose name, not whose the name。"},{"step":"介词+which 讲练","time":"8","content":"【PPT P4 结构】教师：in which = where, for which, to which... 例句：This is the temple in which the ceremony was held. = This is the temple where the ceremony was held. 预设回答辨析：in which 更正式，where 更口语。板书时机：板书 in which / for which / to which 公式。差异化提示：B班选词填空（in/for/to which）；A班改写句子。易错点提醒：介词+which 中的介词来自搭配短语 — \"the group to which he belongs\" (belong to)。"},{"step":"Bingo 造句","time":"8","content":"【PPT P5 Bingo卡】每人一卡，格内为先行词（heritage site / temple / expert / committee / country）。教师抽关系代词，学生用该栏造正确句。教师：Draw \"whose\" — make a sentence! 预设回答：This is the heritage site whose symbol is the Great Wall. 板书时机：巡视指导。差异化提示：B班给句型框；A班自由造句并追加文化遗产主题细节。易错点提醒：每句造完后检查——先行词+关系代词+从句+主句是否完整。"},{"step":"改错巩固","time":"3","content":"【PPT P6 改错】展示 3 个典型错误：①The temple which I visited it.（多余it）②The country whom helped Egypt.（应该用 that/which）③The temple which roof is golden.（应该用 whose）。学生纠错并解释。预设回答纠错。板书时机：板书错误→改正公式。差异化提示：B班辨别对错选；A班解释为什么错。易错点提醒：最常犯——从句中重复主语或宾语（it/them 多余）。"},{"step":"小结","time":"2","content":"【PPT P7 总结】回顾五关系代词比较表+介词+which+改错要诀。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述规则。易错点提醒：写作后自查——每句定语从句是否多插入了 it/them？"}],"blackboard":"┌─ U1 Grammar: Restrictive Relative Clauses ────┐\n│        指人      指物      在从句中成分      │\n│ that    ✓         ✓       S/O              │\n│ which   ✗         ✓       S/O              │\n│ who     ✓         ✗       S                │\n│ whom    ✓         ✗       O                │\n│ whose   ✓         ✓       attribute(...的)  │\n│                                             │\n│ 介词+which: in which / for which / to which│\n│ 省略条件: 作宾语时可省                      │\n│ ❌ The temple which I visited it. (No \"it\"!) │\n└─────────────────────────────────────────────┘","exercises":"【基础作业】1. 用 that/which/who/whose 各造 2 句关于文化遗产的句子。2. 从课文中找出3个介词+which结构并翻译。【提高作业】写 60 词短文介绍一处中国文化遗产，要求至少用 3 个定语从句（含1个 whose）。【参考答案——教师用】基础1示例：The Great Wall is a heritage site that attracts millions of visitors. / The guide who showed us the temple was very knowledgeable. / The temple whose history spans 3,000 years is in Egypt.","reflection":"✅ 亮点：Bingo 游戏让语法操练不再枯燥，课堂活跃度高。⚠️ 需改进：介词+which 中如何选介词仍是难点，听与谈课可融入练习。📌 下节课衔接：听与谈聚焦文化遗产保护建议，用语篇巩固定语从句。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Discovering Useful Structures · Cultural Heritage (P4)"},{"id":"l-eng-b2-u1-lt","lessonId":"l-eng-b2-u1-lt","book":"必修第二册","unitNumber":1,"unitTitle":"Cultural Heritage","lessonType":"listening-talking","lessonTypeName":"听与谈","lessonNumber":5,"periodNumber":5,"duration":40,"grade":"高一","subject":"英语","tags":["听与谈","文化遗产保护","建议","人教版必修二U1","第五节课"],"textbookAnalysis":"本课为必修第二册 Unit 1 第五课时（Listening and Talking），语境为\"讨论如何保护文化遗产\"。听力材料为一段关于当地古迹保护措施的对话，口语输出任务为就一处待保护的遗产地给出建议。功能语言为提出和回应建议（How about...? / Why don't we...? / That's a good idea because...）。结合语法课所学的定语从句，在口语中自然运用关系代词做信息补充。","overview":"【学情分析】A班：能提出简单建议，但缺乏\"建议+理由\"的完整表达链。B班：开口意愿低、建议句型储备少。共同问题：只说建议不说原因，缺少 because 从句使表达不完整。","objectives":["语言能力：听懂关于文化遗产保护建议的对话，提取建议内容与理由；能用至少 4 种句型提出保护建议并给出理由。","文化意识：体会\"每个人都可以为文化遗产保护出力\"的参与意识。","思维品质：在讨论中练习\"提出建议→给出理由→回应同伴建议\"的完整对话链。","学习能力：通过建议对话训练批判性倾听——听懂后回应而非只等自己说。"],"keyPoints":"① 建议句型：How about doing...? / Why don't we...? / I suggest we... / We should... ② 回应句型：That's a good idea because... / I agree, but... / I'm not sure, because... ③ 听力重点：抓住建议+理由的配对信息","difficulties":"① Why don't we... 是建议不是疑问 — 学生易用 Why not we...（错误）。原因：母语直译干扰。② protect / preserve 在口语中混用 — 听力中需听出语境区别。③ 回应时 only say \"yes\" or \"no\" no reason — 需培养 because 跟进的意识。","teachingMethods":"① 听前预测→听中配对→听后产出 ② 角色扮演：三人一组（提议者+支持者+质疑者）③ 文化遗产保护圆桌讨论","preparation":"【PPT课件】P1 待保护遗产图片（平遥古城/丽江/周庄）；P2 建议句型板；P3 听力任务题；P4 听力任务卡；P5 回应句型板；P6 角色卡。【实物教具】遗产保护建议卡 printed；角色卡。","process":[{"step":"导入激活","time":"5","content":"【PPT P1 遗产图片】教师：Look at these heritage sites. One of them is in danger because too many tourists visit. What can we do to protect it? 预设回答：Limit the number of tourists. / Make rules. 板书时机：左栏板书动词 protect / preserve / limit / restore。差异化提示：B班中文说再翻英文；A班直接英文。易错点提醒：limit（限制）≠ limited（有限的），词性区别。"},{"step":"听力抓建议","time":"10","content":"【PPT P3 听力任务】听对话，抓\"谁提了什么建议+什么理由\"。教师：Listen for: What is the suggestion? What is the reason? 预设回答：They suggest making a website because it can spread awareness. 板书时机：配对填表（建议|理由）。差异化提示：B班给配对连线题；A班听写关键词。易错点提醒：listen for（有目的地听）≠ listen to（泛听）——引导学生带问题听。"},{"step":"听中记录","time":"8","content":"【PPT P4 听力任务卡】【音频】重听，学生填完整建议+回应链。教师：How did the other person respond? 预设回答：That's a good idea, but it will cost a lot. 板书时机：核对填表。差异化提示：B班听两遍；A班一遍+复述回应。易错点提醒：回应中出现的 but 不是否定而是补充条件 — \"good idea, but...\" 是肯定+担忧。"},{"step":"句型操练","time":"7","content":"【PPT P5 句型板】教师带领操练建议+回应链：A: How about building a website? / B: That's a good idea because it reaches many people. / A: I agree, but we need money. 预设回答跟读+仿造。板书时机：板书建议→回应链条。差异化提示：B班用填空脚本；A班自主对话。易错点提醒：How about 后接 doing — \"How about build\" 是错的。"},{"step":"角色扮演","time":"8","content":"【PPT P6 角色卡】三人一组：Citizen A（提议者）、Official B（支持者）、Expert C（质疑者）。就平遥古城游客过多问题讨论。教师巡视。预设回答：A: We should limit daily visitors. / B: That's a good idea because it reduces damage. / C: But what about local businesses? 板书时机：留建议句型和回应链供参考。差异化提示：B班照卡读；A班脱稿加即兴内容。易错点提醒：角色扮演中注意用定语从句补充信息 — \"tourists who don't follow rules should be fined.\""},{"step":"小结","time":"2","content":"【PPT P7 总结】回顾提建议句型+回应策略。教师：Remember: give a reason after your idea. 预设回答跟读。板书时机：圈重点句型。差异化提示：B班齐读；A班每人说一句收获。易错点提醒：给别人建议后记得问\"what do you think?\"——对话是双向的。"}],"blackboard":"┌─ U1 Listening & Talking ─────────┐\n│ Suggestions:                      │\n│  How about + doing...?            │\n│  Why don't we + do...?           │\n│  I suggest we + do...             │\n│  We should / could + do...        │\n│                                   │\n│ Responses:                        │\n│  That's a good idea because...    │\n│  I agree, but...                  │\n│  I'm not sure, because...        │\n│                                   │\n│ Chain: Suggest → Reason → Respond │\n└───────────────────────────────────┘","exercises":"【基础作业】1. 听录音跟读 2 遍，圈出所有建议句型。2. 用至少 2 种建议句型各写 1 句保护遗产的建议+理由。【提高作业】写 60 词对话：两人讨论如何保护一处当地古迹（至少 4 轮，含建议与回应）。【参考答案——教师用】基础2示例：How about limiting the number of tourists to the ancient town? / I suggest that we put up signs to remind visitors not to touch the relics.","reflection":"✅ 亮点：角色扮演三角色设置让学生理解真实讨论中的多元声音。⚠️ 需改进：because 跟进率仍需提高，写作课可设置\"建议+理由\"强制格式。📌 下节课衔接：进入写作，将建议链写成正式的遗产保护倡议书。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Listening and Talking · Cultural Heritage (P5)"},{"id":"l-eng-b2-u1-w1","lessonId":"l-eng-b2-u1-w1","book":"必修第二册","unitNumber":1,"unitTitle":"Cultural Heritage","lessonType":"writing","lessonTypeName":"写作","lessonNumber":6,"periodNumber":6,"duration":40,"grade":"高一","subject":"英语","tags":["写作","议论文","文化遗产","倡议书","人教版必修二U1","第六节课"],"textbookAnalysis":"本课为必修第二册 Unit 1 第六课时（Reading for Writing I），写作体裁为就文化遗产保护写一篇简短倡议书/报告。结构为：问题陈述→保护价值→建议措施→呼吁行动。语言重点为议论文衔接词（firstly, moreover, therefore, in conclusion）与建议动词（suggest, recommend, propose, urge）。结合本单元 Reading 的\"问题-方案\"结构与语法课的定语从句，实现读-语法-写的闭环。","overview":"【学情分析】A班：有基本写作能力，但缺乏议论文结构的框架意识——常写成\"想到什么写什么\"。B班：句型储备少、语法错误多，需大量脚手架（模板+语料卡）。共同问题：倡议书不知道写给谁——缺少\"读者意识\"导致语体不正式。","objectives":["语言能力：掌握\"问题—价值—建议—呼吁\"四段式倡议书结构，在文化遗产保护话题中产出 80-100 词结构完整的短文。","文化意识：理解倡议书在推动社会参与遗产保护中的作用。","思维品质：通过\"先分析问题再提建议\"训练因果逻辑思维。","学习能力：建立\"写作前先搭结构框架\"的习惯——用 outline 而非直接开写。"],"keyPoints":"① 倡议书四段结构：Problem → Value → Suggestions → Call to action ② 衔接词：Firstly / Moreover / Therefore / In conclusion ③ 核心句型：It is important to... / I strongly suggest that... / If we..., we can...","difficulties":"① 倡议书与议论文的区别 — 倡议书收尾必须有呼吁（Let's.../It's time to...）。原因：学生习惯写\"我认为\"而非\"我们一起\"。② therefore 的正确标点 — therefore 前加分号或句号，不是逗号。③ persuade 与 convince 在写作中的选用。","teachingMethods":"① 范文解构法：读范文→画结构图→仿写 ② 语料卡搭建：从本单元5课积累词汇/句型。③ 过程写作：outline→draft→peer review→revise","preparation":"【PPT课件】P1 范文（关于某古城的保护倡议书）；P2 四段结构图；P3 衔接词表；P4 语料库模板；P5 写作提纲；P6 写作任务；P7 总结。【实物教具】四段结构空白工作单 printed 每人一份；语料卡模板。","process":[{"step":"范文解构","time":"8","content":"【PPT P1 范文】教师展示范文，学生标注四段（问题/价值/建议/呼吁）。教师：Which paragraph tells us what to do? 预设回答：Paragraph 3 — it gives suggestions. 板书时机：画四段结构框。差异化提示：B班给标注好的范文只匹配段号；A班自己画结构+标注衔接词。易错点提醒：最后一段必须有\"Let's... / It's time to...\"才算完整。"},{"step":"四段结构讲透","time":"8","content":"【PPT P2 结构图】教师逐段讲解：P1 1-2句陈述问题（what is the heritage? what is the problem?）→ P2 2句说明价值（why should we care?）→ P3 3-4句提建议（what can we do?）→ P4 1-2句呼吁（call to action）。教师示范写一段。预设回答跟读结构要点。板书时机：逐段板书模板句。差异化提示：B班给每段填空模板；A班给关键词自己写。易错点提醒：P2 的价值要具体 — 不要只说\"it's important\"，要说\"it shows our history / attracts tourists / educates young people\"。"},{"step":"衔接词+句型","time":"5","content":"【PPT P3 词表】教师领读衔接词：Firstly / Moreover / Furthermore / Therefore / In conclusion。教师示例句：Firstly, the ancient town is losing its original look. Moreover, too many shops are replacing old houses. Therefore, we must take action. 预设回答跟读。板书时机：板书衔接词于侧栏。差异化提示：B班选词填空；A班用全级衔接词写一段。易错点提醒：therefore 前用分号或句号 — \"The problem is serious; therefore, we must act.\" 不是 \"The problem is serious, therefore we must act.\""},{"step":"积语料","time":"5","content":"【PPT P4 语料库】学生从本单元5课中提取：①遗产保护动词（preserve/rescue/limit/restore）②建议句型（I suggest that...）③定语从句模板（The site that needs protection is...）。板书时机：巡视。差异化提示：B班填词；A班造句。预设回答：按文化遗产语料库分类卡填写词条。易错点提醒：同一意思用不同词替换避免重复——第一段说 important，第二段说 significant / valuable。"},{"step":"提纲+起草","time":"10","content":"【PPT P5 写作提纲】选一处本地文化遗产（如当地古桥/庙宇/老街），写 80 词倡议书 outline（四段各写关键词）。教师巡视指导 outline。教师：Don't write sentences yet — just key words for each paragraph. 预设回答：P1: old bridge / cars damage / P2: 200 years / local symbol / P3: limit cars / put signs / P4: Let's protect... 板书时机：留结构框供参考。差异化提示：B班用填空 outline；A班独立列提纲。易错点提醒：outline 不是草稿——用短语不是完整句。这是写前最重要的一步。"},{"step":"互评提纲","time":"4","content":"【PPT P6 写作任务】同桌互换提纲，检查：四段都有吗？价值段有具体内容吗？呼吁段有 Let's 吗？教师：Your partner's outline: does it have all 4 parts? 预设回答：Yes, but the value part is too short. 板书时机：留 checklist。差异化提示：B班用 checklist 表逐项打勾；A班口头给改进建议。易错点提醒：互评不是挑刺——给一个赞美+一个建议。\"Good outline! Maybe add a reason in paragraph 2.\""}],"blackboard":"┌─ U1 Writing: Proposal for Heritage ────────┐\n│ P1 Problem: The... is in danger because... │\n│ P2 Value: It is valuable because...        │\n│ P3 Suggestions: Firstly,... Moreover,...   │\n│ P4 Call: Let's... / It's time to...        │\n│                                             │\n│ Linkers: Firstly / Moreover / Therefore    │\n│          Furthermore / In conclusion        │\n│                                             │\n│ Word Bank: preserve / rescue / limit        │\n│           restore / suggest / protect       │\n└─────────────────────────────────────────────┘","exercises":"【基础作业】按课堂 outline 写完 80 词倡议书初稿。要求：四段结构完整、至少 2 个衔接词、至少 1 个定语从句。【提高作业】就同一遗产地写一则 30 词以内的社交媒体宣传语（英文），要求有号召力有感染力。【参考答案——教师用】基础示例（节选）：The old stone bridge in our town is facing a serious problem. Too many heavy trucks cross it every day, and the stones are cracking. This bridge is valuable because it has stood here for over 200 years. It tells the story of our town. Therefore, I strongly suggest that we limit vehicles and put up warning signs. Let's protect our bridge before it is too late!","reflection":"✅ 亮点：四段结构框架让学生从\"不知道写什么\"变为\"知道每段写什么\"。⚠️ 需改进：therefore 标点仍需纠正，下节课用改错题强化。📌 下节课衔接：进入写作 II，互评修改+誊抄终稿。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Writing · Cultural Heritage (P6)"},{"id":"l-eng-b2-u1-w2","lessonId":"l-eng-b2-u1-w2","book":"必修第二册","unitNumber":1,"unitTitle":"Cultural Heritage","lessonType":"writing","lessonTypeName":"写作","lessonNumber":7,"periodNumber":7,"duration":40,"grade":"高一","subject":"英语","tags":["写作","互评","修改","文化遗产","人教版必修二U1","第七节课"],"textbookAnalysis":"本课为必修第二册 Unit 1 第七课时（Writing II），在 Writing I 提纲+初稿的基础上完成\"互评→修改→展示→终稿\"闭环。重点训练学生用同学反馈改进写作的能力——这是新课标强调的学习能力。互评量表聚焦三维度：结构完整（4段）、语言质量（衔接词/定语从句/词汇）、语法准确（三单/时态/标点）。","overview":"【学情分析】A班：能辨别别人文章的好坏，但给反馈时只说\"写得不错\"缺乏具体点。B班：改自己的稿时不知从何下手。共同问题：互评流于表面，不会用检查量表逐项给分。","objectives":["语言能力：能根据互评量表给同伴的倡议书初稿提具体、可操作的修改建议。","文化意识：通过阅读同伴的倡议书了解不同文化遗产地的保护需求。","思维品质：在互评中培养\"识别问题→提出方案\"的批判性反馈能力。","学习能力：建立\"写→评→改→展\"四步写作流程，内化为个人写作习惯。"],"keyPoints":"① 互评三维量表：结构（4段完整）+ 语言（衔接词≥2 / 定语从句≥1 / 词汇多样性）+ 语法（三单/时态/标点） ② 改稿有侧重：先改结构再改语法 ③ 展示礼仪：大声/清晰/目视听众","difficulties":"① 学生互评时不好意思提缺点 — 需引导\"给建议就是帮助对方进步\"。② therefore 标点重复出错。③ 修改时学生只改拼写不改结构 — 需强制\"先查四段是否完整\"。","teachingMethods":"① 量表互评：用统一标准减少主观性 ② 对子互评→修改→展示 ③ 最佳倡议书评选","preparation":"【PPT课件】P1 互评三维量表；P2 共性错误（therefore标点/衔接词缺/呼吁弱）；P3 修改指南；P4 展示礼仪；P5 最佳倡议书范例；P6 写作提纲回顾；P7 总结。【实物教具】互评量表 printed 每人一份；红笔。","process":[{"step":"量表培训","time":"5","content":"【PPT P1 互评量表】教师逐维讲解：①结构（4段都给√/缺→标出）②语言（圈衔接词≥2？定语从句≥1？词汇重复？）③语法（三单？时态？therefore标点？）。教师用上节课自己写的范文示范打分。预设回答跟学。板书时机：量表三维板书于黑板。差异化提示：B班按量表逐项打勾即可；A班还需写一句\"最需要改进的地方\"。易错点提醒：互评不是打分比高低——是帮对方变得更好。"},{"step":"起草+互评","time":"12","content":"【PPT P2 共性错误】先展示上节课共性错：①therefore前用逗号②呼吁段缺Let's③价值段太笼统。然后同桌互换初稿，用红笔按量表标注。教师巡视。教师：Give one praise and one suggestion. 预设回答：Your structure is good, but the call to action is missing. 板书时机：留量表供参考。差异化提示：B班按checklist勾；A班在稿上写具体修改建议。易错点提醒：提建议时用\"I suggest...\"而非\"You should...\"——更礼貌。"},{"step":"修改","time":"10","content":"【PPT P3 修改指南】学生根据互评反馈修改初稿。顺序：①先补结构（缺哪段补哪段）②再加语言（插入衔接词/定语从句）③最后查语法。教师：Don't just fix spelling — check structure first! 预设回答：（学生修改中，此处无口头回答）板书时机：留修改顺序。差异化提示：B班对照量表逐条改；A班改完还润色词汇替换。易错点提醒：修改不是重写——保留原文好的部分，只在薄弱处补强。"},{"step":"展示评选","time":"8","content":"【PPT P4 展示礼仪】2-3 组自愿上台读倡议书。全班投票：最打动人的倡议/结构最完整的/最想行动起来的。教师：Read loudly and look at the audience. 预设回答展示。板书时机：留展示评分维度。差异化提示：B班可看稿读；A班尽量脱稿。易错点提醒：上台读稿不要太快——你写了100词不等于听众能消化100词。"},{"step":"结课","time":"5","content":"【PPT P7 总结】回顾写作闭环：outline→draft→peer review→revise→final。教师：Next time you write, remember this process. 预设回答：I will make an outline first. 板书时机：画闭环流程图。差异化提示：B班齐读流程；A班说自己的收获。易错点提醒：最好的写作习惯是\"先结构后语言\"——不要跳跃步骤。"}],"blackboard":"┌─ U1 Writing II: Peer Review ────────┐\n│ WRITING PROCESS:                     │\n│  Outline → Draft → Peer → Revise →  │\n│  → Final → SHARE                    │\n│                                      │\n│ Review Checklist:                    │\n│  ✅ 4 paragraphs?                    │\n│  ✅ ≥2 linkers?                      │\n│  ✅ ≥1 relative clause?              │\n│  ✅ Call to action?                  │\n│  ✅ Grammar (3rd p / tense / ;)      │\n└──────────────────────────────────────┘","exercises":"【基础作业】根据课堂反馈修改终稿，誊抄提交。自评：在稿末写 1 句\"这次写作最大的进步是…\" 【提高作业】调查另一处你不太熟悉的文化遗产，用\"问题—价值—建议\"框架写 80 词保护倡议书。【参考答案——教师用】参考 Writing I 的 exercises 答案。终稿评估标准：结构4段完整（2分）+衔接词≥2（2分）+定语从句≥1（2分）+呼吁有力（2分）+语法准确（2分）= 10分。","reflection":"✅ 亮点：量表培训解决了\"不知道评什么\"的问题，B班互评质量明显提升。⚠️ 需改进：修改环节时间偏紧，下次可给15分钟。📌 下节课衔接：进入 Project，将本单元5课所学整合为文化遗产保护展览。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Writing · Cultural Heritage (P7)"},{"id":"l-eng-b2-u1-p","lessonId":"l-eng-b2-u1-p","book":"必修第二册","unitNumber":1,"unitTitle":"Cultural Heritage","lessonType":"project","lessonTypeName":"项目复习","lessonNumber":8,"periodNumber":8,"duration":40,"grade":"高一","subject":"英语","tags":["项目","复习","文化遗产","展览","人教版必修二U1","第八节课"],"textbookAnalysis":"本课为必修第二册 Unit 1 第八课时（Project），为单元终极产出课。学生以 4 人小组为单位，整合本单元5种课型所学——听与说的遗产词汇+阅读的\"问题—方案\"结构+语法的定语从句+听与谈的建议句型+写作的倡议书——完成一份\"文化遗产保护展览\"海报/展板。综合考查语言能力（词汇/语法/写作）、思维品质（信息组织）和学习能力（合作分工）。","overview":"【学情分析】A班：能独立完成分工作品，但需要明确任务清单。B班：group work 中有同学\"搭便车\"不干活，需明确定人定责。共同问题：小组合作时语言切换回中文——需设立\"英文监督员\"角色。","objectives":["语言能力：综合运用本单元词汇、定语从句、建议句型，以英文完成一份文化遗产保护展览海报（标题/介绍/问题/方案/呼吁）。","文化意识：通过展览形式向同伴传播文化遗产保护意识。","思维品质：在4人小组中合理分工、有效协作，培养项目管理思维。","学习能力：回顾本单元5课学习内容，建立\"一个单元学什么、怎么用\"的整体框架感。"],"keyPoints":"① 海报四模块：Heritage Introduction（简介+价值）→ Threats（问题）→ Protection Measures（措施）→ Call to Action（呼吁） ② 单元知识整合：词汇/定语从句/建议句型/倡议书结构 ③ 小组分工：Writer / Designer / Editor / Presenter各司其职","difficulties":"① 小组分工时 Editor 常没事做 — 需明确所有角色都有事。提醒：editor不是\"挑错\"而是\"润色语言\"。② 海报语言过简（仅单词无句）— 要求每板块至少2句完整英文句。③ 展示时间控制 — 1.5分钟/组，超时扣分。","teachingMethods":"① PBL项目式学习：以展览为驱动问题 ② 小组协作：角色分工+checklist ③ 画廊漫步：全班互评","preparation":"【PPT课件】P1 单元回顾五课内容（思维导图）；P2 海报四模块结构；P3 角色分工卡；P4 范例参考；P5 评价量规；P6 自评表；P7 总结。【实物教具】A3白纸每组一张；彩笔/马克笔；角色分工卡 printed。","process":[{"step":"单元回顾","time":"5","content":"【PPT P1 思维导图】教师带学生回顾本单元5课学了什么：听与说（遗产词汇+建议）→阅读（问题方案+定语从句）→语法（that/which/who/whose）→听与谈（建议+回应）→写作（倡议书四段）。教师：Today we put it all together! 预设回答跟读回顾。板书时机：左栏画五课链接图。差异化提示：B班看PPT读关键词；A班自己说出来。易错点提醒：每个版块至少用一次定语从句——这是单元核心语法。"},{"step":"任务布置+分工","time":"6","content":"【PPT P2 海报结构】【PPT P3 角色卡】教师展示海报四模块：①Introduction（选一处遗产+简介+价值）②Threats（问题是什么）③Protection（措施建议）④Call to Action（呼吁）。角色分工：Writer写文案 / Designer设计排版 / Editor检查语言+语法 / Presenter准备展示。教师：Choose your heritage site and role. 预设回答：We choose the Great Wall. I am the writer. 板书时机：留模块结构和角色。差异化提示：B班给语言模板（填空式）；A班自由写。易错点提醒：Designer 也是团队一员——和 Writer 商量文案长度才能排出好看版。"},{"step":"制作海报","time":"16","content":"【PPT P4 范例参考】【实物 A3纸】小组制作。教师要巡视提醒：①用英文！②每模块至少2句完整句 ③至少1个定语从句 ④最后5分钟 Editor 检查语言。预设回答：（小组讨论制作中，教师巡视指导）板书时机：无。差异化提示：B班给句子开头提示（The heritage is... / It is threatened by...）；A班独立完成。易错点提醒：不要把所有内容挤在一起——留白是设计的一部分。标题要大、内容要分块。"},{"step":"展示评价","time":"10","content":"【PPT P5 量规】每组 1.5 分钟展示。全班投票：最佳内容/最佳设计/最佳展示。教师：You have 90 seconds. Go fast but clear! 预设回答展示。板书时机：记投票结果。差异化提示：B班可看海报读；A班脱稿补充。易错点提醒：1.5分钟很短——只讲最精彩的部分，不要逐字念。"},{"step":"单元自评","time":"3","content":"【PPT P6 自评表】学生勾选四维薄弱项：词汇记不住？定语从句不会用？建议句型忘了？写作结构不熟？写1条补强计划。教师：Be honest. This is for yourself, not for a grade. 预设回答：I need to practice relative clauses. I will review the grammar table tonight. 板书时机：留自评四维。差异化提示：B班中文写、A班英文写。易错点提醒：计划要具体到\"做什么\"+\"什么时候\"——不是\"我会复习\"，而是\"今晚复习关系代词表并造5句\"。"}],"blackboard":"┌─ U1 Project: Heritage Exhibition ────┐\n│ 🏛️ Poster 4 Modules:                  │\n│  ① Introduction (heritage + value)    │\n│  ② Threats (what is the problem?)     │\n│  ③ Protection (what can we do?)       │\n│  ④ Call to Action (let's...)          │\n│                                       │\n│ 👥 Roles: Writer / Designer / Editor  │\n│            / Presenter                │\n│                                       │\n│ ⭐ Must: English / ≥2 sentences per   │\n│          module / ≥1 relative clause  │\n└───────────────────────────────────────┘","exercises":"【基础作业】完成小组海报（未完成的继续做），拍照片提交。写 30 词英文反思：我在小组中的贡献是…我从这个项目中学到了…【提高作业】选一个新闻中正在面临威胁的文化遗产（不限中国），用英文写 50 词简报介绍问题+你的保护建议。【参考答案——教师用】反思示例：My role was the writer. I wrote the introduction and the protection measures. I learned how to use relative clauses to describe heritage sites. What I can improve next time: check grammar before the deadline.","reflection":"✅ 亮点：海报四模块整合了全单元，学生产出有成就感。⚠️ 需改进：16分钟制作时间紧，下次可给20分钟。📌 下节课衔接：进入 Unit 2 Wildlife Protection，从人类遗产转向自然遗产保护。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Project · Cultural Heritage (P8)"},{"id":"l-eng-b2-u2-ls","lessonId":"l-eng-b2-u2-ls","book":"必修第二册","unitNumber":2,"unitTitle":"Wildlife Protection","lessonType":"listening-speaking","lessonTypeName":"听与说","lessonNumber":1,"periodNumber":1,"duration":40,"grade":"高一","subject":"英语","tags":["听与说","野生动物保护","濒危动物","人教版必修二U2","第一节课"],"textbookAnalysis":"本课为必修第二册 Unit 2 Wildlife Protection 第一课时（Listening and Speaking），属单元导入+输入环节。语篇为一段关于濒危动物保护的对话与一则野生动物保护组织志愿者的介绍音频，功能语境是\"谈论濒危动物现状与保护措施\"。语言重点为野生动物保护词汇（endangered, species, habitat, extinct, poaching, reserve）及表达关切与建议句型（We must... / It is worrying that... / I'm concerned about...）。为Reading语篇\"A DAY IN THE CLOUDS\"中藏羚羊保护话题做词汇与话题预热。","overview":"【学情分析】A班：对濒危动物话题有兴趣，知道panda/tiger等常见动物英文名，但extinct/habitat/poaching等保护术语生疏。B班：部分濒危动物英文名不熟，听力抓具体数据弱。共同问题：讨论动物保护时只会说\"we should protect animals\"而缺乏具体措施表达。","objectives":["语言能力：听懂关于濒危动物保护的听力材料，提取关键信息（物种名/数量/威胁/措施），准确使用 8-10 个野生动物保护词汇。","文化意识：了解全球濒危野生动物现状，形成\"保护野生动物就是保护人类自己\"的生态意识。","思维品质：通过\"听前预测—听中核实—听后推理\"训练听力策略，培养信息筛选能力。","学习能力：能用 We must... / It is worrying that... / I'm concerned about... 就濒危动物保护做简短发言。"],"keyPoints":"① 野生动物保护核心词汇：endangered / species / habitat / extinct / poaching / reserve / illegal / conservation ② 表达关切句型：We must... / It is worrying that... / I'm concerned about... ③ 听力微技能：听前读图表预测数据、听中抓数字与原因。","difficulties":"① endangered（濒危的）与 dangerous（危险的）学生易混淆。原因：词形相近。易错点提醒：endangered = 被危及的（需要被保护），dangerous = 危险的（会伤害人）。② species /spiːʃiːz/ 单复数同形 — 学生易误加 -s 变 specieses。③ poaching /pəʊtʃɪŋ/ 与 poach /pəʊtʃ/ 的发音——ch 读 /tʃ/ 不是 /k/。","teachingMethods":"① 任务型（TBL）：以推荐一种濒危动物并说明保护措施为终任务。② 听前预测+听中填表格：数据卡脚手架。③ 对子互问操练关切表达句型。","preparation":"【PPT课件】P1 单元封面（Wildlife Protection）；P2 濒危动物图片九宫格（藏羚羊/大熊猫/华南虎/雪豹/金丝猴/北极熊/非洲象/蓝鲸/朱鹮）；P3-4 听力任务题+数据表；P5 表达关切句型板；P6 说话任务卡。【实物教具】濒危动物信息卡 printed 每组一套；世界地图一张标出濒危动物分布。【音频】听力两段音频（教材配套）。","process":[{"step":"导入激活","time":"5","content":"【PPT P2 九宫格】教师：Look at these nine animals. Which ones are endangered? Can you name them in English? 预设回答：Panda, tiger, elephant! The Tibetan antelope! 板书时机：右侧板书 endangered / species / extinct。差异化提示：B班指图说中文再跟读英文；A班用 I think... is endangered because... 造句。易错点提醒：endangered /ɪndeɪndʒəd/ — danger 是 /deɪndʒə/，endanger 加前缀 en- + 后缀 -ed。"},{"step":"词汇输入","time":"8","content":"【PPT P3 词卡】教师领读 endangered / species / habitat / extinct / poaching / reserve / illegal / conservation。教师：What does \"habitat\" mean? Why do animals become extinct? 预设回答：Habitat is where animals live. Because people hunt them or cut down forests. 板书时机：左栏板书词+短注释，标注重音。差异化提示：B班配图记忆+中英对照；A班用词造句并解释词根（如 con- \"共同\"+ serve \"保护\"= conservation）。易错点提醒：habitat /hæbɪtæt/ — 重音在第一音节，不是 /həbɪtæt/。"},{"step":"听前预测","time":"5","content":"【PPT P4 题支】教师：We will listen to a talk about endangered animals. Predict: What animals will be mentioned? What threats do they face? 预设回答：Tigers, pandas? Humans hunt them. Their homes are destroyed. 板书时机：预测词写在黑板中部。差异化提示：B班给中文提示词；A班用英文说预测+理由。易错点提醒：听力常见陷阱 — 先提一个错误数字再纠正。\"the population dropped from 100,000 to 50,000\" 注意两个数字。"},{"step":"听中填数据","time":"10","content":"【PPT P5 数据表】【音频 段一】播放听力，学生填数据卡（物种名/现存数量/主要威胁/保护措施）。教师：How many Tibetan antelopes are left? What threatens them? 预设回答：About 300,000. Poaching and habitat loss. 板书时机：核对答案时填表于黑板中部。差异化提示：B班听两遍只填物种名+数量；A班一遍填全+写至少一个保护措施。易错点提醒：数字中 thousand / hundred 不加 s — \"three hundred thousand\" not \"three hundreds thousands\"。"},{"step":"句型操练","time":"7","content":"【PPT P5 句型板】教师：How to express concern about wildlife? We must... / It is worrying that... / I'm concerned about... 教师示范后用藏羚羊信息造句。预设回答：I'm concerned about the Tibetan antelope because poaching is still happening. 板书时机：句型板书于中央。差异化提示：B班套用模板替换关键词；A班替换动物名+追加2个理由。易错点提醒：concerned about + 名词/代词 — I'm concerning about 是错误，用形容词 concerned。"},{"step":"说话任务","time":"5","content":"【PPT P6 任务卡】学生两人一组，从信息卡中选一种濒危动物互相介绍+表达关切。教师：Choose one endangered animal. Tell your partner about it and express your concern. 预设回答：The snow leopard is endangered. Only about 4,000 are left. I'm concerned because their habitat is disappearing. 板书时机：留句型供参考。差异化提示：B班用填空式对话卡；A班自由问答并追加 We must... 建议。易错点提醒：species 单复数同形 — \"one species, many species\" 绝对不说 specieses。"}],"blackboard":"┌─ U2 Listening & Speaking ──────────┐\n│ Wildlife: endangered / species       │\n│ habitat / extinct / poaching / IUCN │\n│ reserve / illegal / conservation    │\n│                                      │\n│ Expressing concern:                  │\n│  We must + do...                    │\n│  It is worrying that...             │\n│  I'm concerned about + n.          │\n│                                      │\n│ Data Card: Tibetan Antelope         │\n│  Population: ~300,000               │\n│  Threats: poaching / habitat loss   │\n└──────────────────────────────────────┘","exercises":"【基础作业】1. 听录音跟读听力文本 2 遍，圈出所有野生动物保护词汇。2. 用 I'm concerned about... 写 3 句关于不同濒危动物的关切表达。【提高作业】用英文写一段 50 词介绍一种你关心的濒危动物，包含名称/现存数量/威胁/你的关切感受。【参考答案——教师用】基础2示例：I'm concerned about the African elephant because poaching for ivory is still serious. / I'm concerned about the blue whale because ocean pollution threatens its habitat.","reflection":"✅ 亮点：九宫格激活+数据卡脚手架有效降听力焦虑，B班填卡完成率高。⚠️ 需改进：species 单复数同形仍需强化，下节需在阅读语境中反复出现。📌 下节课衔接：进入阅读 A DAY IN THE CLOUDS，从藏羚羊听力延伸到作者在羌塘保护区的亲身经历。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Listening & Speaking · Wildlife Protection (P1)"},{"id":"l-eng-b2-u2-r1","lessonId":"l-eng-b2-u2-r1","book":"必修第二册","unitNumber":2,"unitTitle":"Wildlife Protection","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":2,"periodNumber":2,"duration":40,"grade":"高一","subject":"英语","tags":["阅读","野生动物保护","藏羚羊","羌塘保护区","人教版必修二U2","第二节课"],"textbookAnalysis":"本课为必修第二册 Unit 2 第二课时（Reading I），语篇 A DAY IN THE CLOUDS 是一篇旅行日志/记叙文，作者记述在西藏羌塘自然保护区观察藏羚羊的经历，穿插保护成效（种群恢复）与现存挑战（盗猎、栖息地缩减）的对比。结构为\"到达→观察→反思→行动呼吁\"。语言重点为记叙文时间顺序词（in the evening / after a while / at dawn）与野生动物保护描述词汇（graceful, observe, recover, threaten, reserve）。","overview":"【学情分析】A班：能快速把握记叙文叙事线索，但对\"保护成效vs挑战\"的辩证思维不足。B班：对西藏/羌塘地理背景陌生，需地图+图片脚手架。共同问题：记叙文中插入议论（保护区工作的意义）时，学生难以区分\"叙述\"与\"议论\"段落。","objectives":["语言能力：读懂旅行日志类记叙文，提取作者在羌塘保护区的见闻/藏羚羊保护成效/现存挑战；掌握 8-10 个描述类核心词汇。","文化意识：了解中国在藏羚羊保护上取得的成就，增强民族自豪感与野生动物保护意识。","思维品质：通过\"叙述—反思\"双层结构分析培养记叙文深层阅读策略。","学习能力：能用\"所见—所感—所思\"框架复述文章主体内容。"],"keyPoints":"① 记叙文结构：Arrival → Observation → Reflection → Call to action ② 时间顺序词：at dawn / in the evening / after a while / later ③ 核心短语：make out / watch over / day and night / be struck by / remind sb of","difficulties":"① make out（辨认出）学生易按字面理解为\"做出来\"。原因：多义词块。提醒：本文指 in the distance 能隐约看清。② watch over（守护/照看）≠ look at（看）— 前者有\"负责保护\"的含义。③ be struck by（被…打动）≠ be hit by（被打）— struck 是 strike 的过去分词。","teachingMethods":"① KWL阅读法：已知→想知→学到的。② 对比表格：藏羚羊过去 vs 现在。③ 问题链追问：训练批判性思维。","preparation":"【PPT课件】P1 羌塘草原与藏羚羊图片；P2 地图（西藏/羌塘保护区位置）；P3 KWL表；P4 过去vs现在对比表；P5 叙述—反思结构图；P6 词汇对比表；P7 总结回顾。【实物教具】KWL工作单 printed 每人一份；藏羚羊信息卡。","process":[{"step":"导入设问","time":"5","content":"【PPT P1 藏羚羊图片】教师：This is the Tibetan antelope, also called \"chiru.\" It lives on the Changtang grassland — 4,000-5,000 meters above sea level. What do you want to know about it? 预设回答：How many are there? Why are they endangered? Can we visit them? 板书时机：板书 K / W / L 三栏表头。差异化提示：B班中文提问教师帮翻译；A班英文提问。易错点提醒：antelope /æntɪləʊp/ — 注意重音在第一音节，结尾不读 /eɪt/。"},{"step":"快速阅读抓主线","time":"8","content":"【PPT P3 KWL表】教师：Read fast (3 min). Find: ① Where is the author? ② What animal does he see? ③ What is the good news? 预设回答：① Changtang National Nature Reserve. ② Tibetan antelopes. ③ Their population has recovered. 板书时机：填 KWL 表 L 栏关键点。差异化提示：B班给三选一选项；A班写完整句+段落号。易错点提醒：reserve /rɪzɜːv/ — re- 前缀\"再\"+ serve \"保持\"= 保护区（保持原生态的地方）。"},{"step":"精读段落1-2 到达与观察","time":"10","content":"【PPT P4 对比表】教师精讲：make out = 辨认出（at a distance）；be struck by = 被…打动。教师：What did the author see at dawn? How did he feel? 预设回答：He saw a herd of Tibetan antelopes moving across the grassland. He was struck by their beauty and grace. 板书时机：左侧栏补充\"make out / be struck by / graceful\"。差异化提示：B班读后填关键词；A班用自己话描述画面。易错点提醒：a herd of + 动物（一群）— herd 指食草动物群，flock 指鸟群，pack 指狼群。"},{"step":"精读段落3-4 反思与挑战","time":"10","content":"【PPT P5 行动链】教师：What did Zhaxi and other volunteers do? Why was their work important? 学生找细节。教师：Is conservation successful? What challenges remain? 预设回答：Yes, the population recovered from 1990s to today. But poaching and habitat loss still threaten them. 板书时机：右侧画\"过去→现在→挑战\"对比图。差异化提示：B班连线匹配（措施—效果）；A班写\"cause and effect\"句。易错点提醒：threaten /θretn/ — 不读 /θriːtn/，ea 读 /e/ 不是 /iː/。"},{"step":"归纳意义","time":"4","content":"【PPT P6 叙述反思结构】教师：What does \"A Day in the Clouds\" really mean? (literal: high altitude; symbolic: a dream-like, inspiring experience) 预设回答：It means the high altitude (4,000m+). Also, it feels like a dream to see these beautiful animals saved. 板书时机：圈出标题的 literal vs symbolic 含义。差异化提示：B班跟读关键词；A班用自己的话解释双层含义。易错点提醒：clouds 不是\"云朵\"表面意思，还暗示高原缺氧如在云中，以及看到藏羚羊如梦境般美好。"},{"step":"小结","time":"3","content":"【PPT P7 总结回顾】教师带学生回顾\"到达→观察→反思→呼吁\"结构+核心词汇+藏羚羊保护成效。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述。易错点提醒：conservation（保护自然资源）≠ reservation（预订）—— 两个词截然不同。"}],"blackboard":"┌─ U2 Reading I: A DAY IN THE CLOUDS ──────┐\n│ Arrival → Observation → Reflection → Call  │\n│                                             │\n│ make out / watch over / be struck by        │\n│ graceful / recover / threaten / observe     │\n│                                             │\n│ Tibetan Antelope: Past vs Now               │\n│  1990s: population ↓ (poaching)            │\n│  Today: ~300,000 (conservation success)     │\n│  Challenges: habitat loss, illegal hunting  │\n│                                             │\n│ Title: \"Clouds\" = high altitude + dreamlike │\n└─────────────────────────────────────────────┘","exercises":"【基础作业】1. 朗读课文第2-4段 2 遍，圈出所有时间顺序词。2. 用对比表写 3 句话描述藏羚羊保护前后的变化。【提高作业】用 80 词左右写一段：What can we learn from the success of Tibetan antelope conservation?（用 make out / be struck by / recover）【参考答案——教师用】基础2示例：In the 1990s, the population dropped sharply because of poaching. / Today, thanks to conservation efforts, their numbers have recovered. / However, habitat loss still threatens their survival.","reflection":"✅ 亮点：KWL表+对比表有效组织信息，B班完成率高。⚠️ 需改进：make out 和 be struck by 的用法仍需强化，精读课将深入。📌 下节课衔接：进入精读语言+现在进行时的被动语态在语篇中的功能分析。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Reading and Thinking · Wildlife Protection (P2)"},{"id":"l-eng-b2-u2-r2","lessonId":"l-eng-b2-u2-r2","book":"必修第二册","unitNumber":2,"unitTitle":"Wildlife Protection","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":3,"periodNumber":3,"duration":40,"grade":"高一","subject":"英语","tags":["阅读","精读","被动语态","野生动物保护","人教版必修二U2","第三节课"],"textbookAnalysis":"本课为必修第二册 Unit 2 第三课时（Reading II），聚焦语篇 A DAY IN THE CLOUDS 的精读与语言分析。重点分析文中现在进行时的被动语态（is/are being + past participle）——如 \"Their habitats are being destroyed\" \"Measures are being taken\"——在记叙文中的功能：强调动作正在被施加于受事者、突出紧迫性。同时深化语篇中高频动词的用法辨析（observe / recover / reserve / remind）。","overview":"【学情分析】A班：初中已接触一般现在时/一般过去时的被动语态，但进行时被动（is being done）是全新语法点。B班：被动语态概念模糊，经常混淆 be + done 中的 be 动词形式。共同问题：写作中几乎不使用被动语态，主语永远是人。","objectives":["语言能力：能在课文语境中识别并分析至少 4 个现在进行时的被动语态句子，理解其\"正在被…\"的紧迫语义。","文化意识：通过被动语态体会英语如何突出受事者（动物/环境）而非施事者，形成\"以保护对象为中心\"的表达习惯。","思维品质：分析现在进行时被动语态在保护类文本中的修辞功能——强调问题的紧迫性。","学习能力：建立\"从读到写\"的语料库——积累课文中的被动语态句型用于后续海报写作。"],"keyPoints":"① 现在进行时被动语态结构：am/is/are + being + past participle ② 语篇中被动句的识别与功能分析 ③ 核心动词辨析：observe / recover / reserve / remind / remove / intend","difficulties":"① being 在被动语态中的角色 — 学生容易漏掉 being 写成 is destroyed（一般现在时被动，语义变为\"总是被破坏\"）。② reserve 作名词\"保护区\"与作动词\"预订/保留\"的区别。③ recover（恢复）是及物还是不及物 — \"The population recovered\"（不及物，不用被动）vs \"The species was recovered by conservationists\"（及物，但很少这样说）。","teachingMethods":"
