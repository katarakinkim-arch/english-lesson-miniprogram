① 标注发现法：圈出文中所有被动语态并分析结构。② 句型转换：主动→被动，体会语义变化。③ 语料卡记录：分类摘录优质被动句。","preparation":"【PPT课件】P1-2 课文中圈出的被动语态示例；P3 被动语态结构分解公式；P4 主动→被动转换对比；P5 语料卡模板；P6 词汇辨析表；P7 总结回顾。【实物教具】课文复印件 printed 每人一份；高亮笔两支（黄=被动/绿=时间词）。","process":[{"step":"课文回顾","time":"5","content":"【PPT P1 结构图】教师：Last class we read \"A Day in the Clouds.\" Can you recall: Where did the author go? What did he see? What conservation message did he leave? 预设回答：He went to Changtang Reserve. He saw Tibetan antelopes. Conservation is working but challenges remain. 板书时机：左栏写 KWL 三栏关键词。差异化提示：B班看关键词复述；A班完整说出5个以上要点。易错点提醒：Changtang /tʃæŋtæŋ/ — 注意 /æ/ 嘴张大，不要读成 /e/。"},{"step":"被动语态发现","time":"8","content":"【PPT P2 课文句子】发课文复印件。教师：Circle all sentences with \"is/are being + past participle.\" 学生标记后全班核对。教师：Why does the author use passive voice? 预设回答：To focus on what is happening to the animals, not who is doing it. 板书时机：逐句板书圈出的被动语态。差异化提示：B班给划线句直接圈 being + done；A班自己找+分析主语是谁。易错点提醒：被动语态中 being 不能省！\"Their habitat is destroyed\"（已破坏完了）≠ \"Their habitat is being destroyed\"（正在被破坏中）。"},{"step":"被动语态讲透","time":"10","content":"【PPT P3 结构公式】教师板书公式：am/is/are + being + V-ed。对比：①People destroy habitats.（主动，强调人）→ ②Habitats are destroyed.（一般现在时被动，常态）→ ③Habitats are being destroyed.（现在进行时被动，正在发生，紧急）。教师：Which sentence sounds more urgent? 预设回答：Sentence ③ — it sounds like it is happening RIGHT NOW. 板书时机：三句对比板书，用红笔圈 being。差异化提示：B班填空（is/are ___ + V-ed）；A班独立造句。易错点提醒：being 后面必须用过去分词，不是现在分词 — \"is being destroying\" 是严重语法错误。"},{"step":"语料库搭建","time":"10","content":"【PPT P5 语料库模板】学生分类填语料卡：①被动语态优质句摘录（至少3句）②野生动物保护动词（observe/recover/reserve/remind/remove/intend）③时间/空间描述词。板书时机：巡视指导。差异化提示：B班填词+翻译；A班造句并在句末注明该句在写作中的用途。预设回答：按野生动物保护语料库模板分类填写词条。易错点提醒：remind sb of sth（使某人想起某事）— 不是 remind sb sth！of 不能省。\"reminds me the importance\" ❌ → \"reminds me of the importance\" ✓。"},{"step":"句型转换","time":"5","content":"【PPT P6 练习】教师给主动句，学生改为被动。例：Poachers are killing antelopes. → Antelopes are being killed by poachers. / Volunteers are watching over the animals. → Animals are being watched over by volunteers. 预设回答造句。板书时机：板书转换公式。差异化提示：B班给转换框架；A班独立改并说语义变化。易错点提醒：转换后看主语—谓语是否一致：单数用 is being done，复数用 are being done。"},{"step":"小结","time":"2","content":"【PPT P7 总结回顾】回顾被动语态功能（突出受事+强调紧迫）+语料库。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述。易错点提醒：下节语法课系统讲练现在进行时的被动语态，预习课文中的被动句。"}],"blackboard":"┌─ U2 Reading II: Language Focus ───────────┐\n│ Present Continuous Passive:                │\n│  am/is/are + BEING + past participle (V-ed)│\n│                                            │\n│ Active → Passive (urgency ↑):              │\n│  People destroy habitats. (fact)           │\n│  Habitats are destroyed. (state)           │\n│  Habitats are BEING destroyed. (URGENT!)   │\n│                                            │\n│ Text examples:                             │\n│  \"Their habitats are being destroyed.\"     │\n│  \"Measures are being taken to protect...\"  │\n│  \"The antelopes are being watched over...\" │\n└────────────────────────────────────────────┘","exercises":"【基础作业】1. 从课文中找出4个现在进行时被动语态句子并标注 being + V-ed。2. 将以下句子改为被动：Poachers are hunting the antelopes illegally. 【提高作业】用现在进行时的被动语态写3句关于其他濒危动物处境的句子（如老虎/大象/鲸鱼）。【参考答案——教师用】基础2示例：The antelopes are being hunted illegally by poachers.","reflection":"✅ 亮点：主动→被动三句对比让学生直观感受\"紧迫感\"，参与度高。⚠️ 需改进：being 遗漏仍是常见问题，语法课需大量操练。📌 下节课衔接：进入语法课，系统操练现在进行时的被动语态在各种语境下的运用。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Reading and Thinking · Wildlife Protection (P3)"},{"id":"l-eng-b2-u2-g","lessonId":"l-eng-b2-u2-g","book":"必修第二册","unitNumber":2,"unitTitle":"Wildlife Protection","lessonType":"grammar","lessonTypeName":"语法","lessonNumber":4,"periodNumber":4,"duration":40,"grade":"高一","subject":"英语","tags":["语法","被动语态","现在进行时","野生动物保护","人教版必修二U2","第四节课"],"textbookAnalysis":"本课为必修第二册 Unit 2 第四课时（Discovering Useful Structures），系统教学现在进行时的被动语态（am/is/are being + past participle）。基于 Reading 语篇中提取的例句，引导学生归纳出\"何时使用进行时被动\"的规则——强调动作正在发生、突出受事者的紧迫处境。通过野生动物保护主题的语境化练习（栖息地被破坏、保护措施正在实施）巩固语法，为后续海报写作做语言准备。","overview":"【学情分析】A班：掌握一般现在时被动，但进行时被动（is being done）易与进行时主动（is doing）混淆。B班：被动语态结构整体不熟，需从 be + done 基础复习再引入 being。共同问题：写作中要么从来不用被动，要么一用就漏 being。","objectives":["语言能力：准确构建现在进行时的被动语态句子，在野生动物保护话题中产出 5 个以上正确句子。","文化意识：通过被动语态聚焦\"正在受威胁的动物与栖息地\"，强化生态保护意识。","思维品质：通过\"发现例句→归纳规则→对比辨析→应用输出\"的归纳法培养语法学习策略。","学习能力：建立\"被动语态自查表\"——写作后自行检查 being 是否遗漏、过去分词形式是否正确。"],"keyPoints":"① 现在进行时被动语态：am/is/are + being + V-ed（过去分词）② 使用场景：强调动作\"正在被进行\"且受事者比施事者更重要 ③ 与一般现在时被动的区别：一般现在时=常态/事实，进行时=此刻/紧迫 ④ 不规则过去分词复习（take→taken, make→made, put→put, set→set）","difficulties":"① being 的发音与拼写 — 学生写 is been done（错用 been）或 is being destroy（忘加 -ed）。原因：being/been 混淆。② 某些动词无进行时被动（如 belong / cost / have）— 学生强行套用。③ 不规则过去分词记错 — take→taken 不是 took，make→made 不是 maked。","teachingMethods":"① 归纳法（Guided Discovery）：例句→规则→练习 ② 情境造句：给保护区管理图片用被动描述 ③ 改错+竞赛：找出被动语态典型错误。","preparation":"【PPT课件】P1 现在进行时被动公式分解；P2 课文例句摘录；P3 与一般现在时被动对比表；P4 主动→被动转换流程图；P5 情境造句任务卡；P6 改错题；P7 总结。【实物教具】改错卡每人一套；情境图片卡一套。","process":[{"step":"例句发现","time":"7","content":"【PPT P2 例句】展示课文中3个被动句+新给3个：①The reserve is being expanded. ②More volunteers are being trained. ③Illegal traps are being removed. 学生圈\"is/are + being + V-ed\"。教师：What is the pattern? What does \"being\" mean? 预设回答：is/are + being + past participle. \"Being\" means something is happening right now. 板书时机：左栏板书3句，红笔标 being + V-ed。差异化提示：B班只圈 being；A班分析主语是单数还是复数。易错点提醒：being 在这里是助动词，不是名词\"存在/生物\"——不要混淆。"},{"step":"规则归纳","time":"10","content":"【PPT P3 对比表】教师对比三种时态被动：①Habitats are destroyed.（一般现在时=常态事实）②Habitats were destroyed.（一般过去时=已发生）③Habitats are being destroyed.（现在进行时=正在被破坏，更紧急）。教师：When do we use the present continuous passive? 预设回答：When we want to say something is happening right now and we care about the thing/person affected. 板书时机：三列对比板书，being 用红色。差异化提示：B班填已给表格（时态/结构/含义）；A班自己画表+每个句型造1句。易错点提醒：一般现在时被动≠现在进行时被动！is destroyed = 已被破坏（无了），is being destroyed = 正在被破坏（还剩点）。"},{"step":"主动→被动转换","time":"8","content":"【PPT P4 转换流程】教师示范转换五步：①找宾语→②宾语变主语→③确定be形式（is/am/are）→④加being→⑤动词变过去分词。例：They are training volunteers. → Volunteers are being trained. 预设回答跟做。板书时机：板书五步流程图。差异化提示：B班跟做每一步；A班独立完成后再设计一个自己的例句。易错点提醒：主动句如果没有宾语，不能变被动！\"The antelopes are running\"（不及物）→ 无法变被动。"},{"step":"情境造句","time":"8","content":"【PPT P5 图片卡】展示4张图（巡逻员设陷阱保护、志愿者记录数据、游客拍照、栖息地修复），学生用被动描述。教师：What is happening in this picture? Use passive voice! 预设回答：Illegal traps are being removed by rangers. / Data is being collected. / The habitat is being restored. 板书时机：巡视指导。差异化提示：B班给动词提示（remove/collect/restore）；A班不给提示自由造句。易错点提醒：restore → restored（加 -d，不是 -ed），注意不规则拼写。"},{"step":"改错竞赛","time":"5","content":"【PPT P6 改错】展示 4 个典型错误：①The animals is being protect.（protect 缺 -ed）②Habitats are been destroyed.（been 应为 being）③Measures are being took.（took 应为 taken）④The reserve is being belonged to the state.（belong 无被动）。学生组间竞赛纠错。预设回答纠错。板书时机：板书错误→改正+规则。差异化提示：B班判对错；A班解释为什么错+给出规则。易错点提醒：无被动动词（belong/cost/happen/appear/last）不能被用于被动语态，不管什么时态。"},{"step":"小结","time":"2","content":"【PPT P7 总结】回顾公式 am/is/are + being + V-ed + 使用场景 + 常见错误。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班说出今天学到的3条规则。易错点提醒：写作后自查——每句被动是否漏了 being？过去分词拼对了吗？"}],"blackboard":"┌─ U2 Grammar: Present Continuous Passive ──┐\n│  am/is/are + BEING + past participle (V-ed)│\n│                                             │\n│  Tense Comparison:                          │\n│   Simple Present:  is/are + V-ed (常态)     │\n│   Simple Past:     was/were + V-ed (已发生) │\n│   Present Cont.:   is/are + BEING + V-ed    │\n│                    (正在被… → 紧迫!!)       │\n│                                             │\n│  Active→Passive 5 Steps:                    │\n│   宾→主 + be (is/are) + being + V-ed        │\n│                                             │\n│  ❌ is been done  → ✓ is being done         │\n│  ❌ is being took → ✓ is being taken        │\n└─────────────────────────────────────────────┘","exercises":"【基础作业】1. 用现在进行时被动语态造 5 句关于动物保护的句子。2. 改错：The reserve is being expand / Measures are been taken / The animals are being protect.【提高作业】写 60 词短文描述当地一个正在进行的环保项目（用至少 3 个现在进行时被动语态）。【参考答案——教师用】基础1示例：The wetland is being restored. / More trees are being planted. / Volunteers are being trained to protect the birds.","reflection":"✅ 亮点：三时态对比表+改错竞赛让语法操练有趣有效。⚠️ 需改进：being/been 混淆仍需反复纠正，听与谈课可以融入被动语态口头练习。📌 下节课衔接：听与谈聚焦野生动物保护的讨论，口头运用被动语态描述保护措施。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Discovering Useful Structures · Wildlife Protection (P4)"},{"id":"l-eng-b2-u2-lt","lessonId":"l-eng-b2-u2-lt","book":"必修第二册","unitNumber":2,"unitTitle":"Wildlife Protection","lessonType":"listening-talking","lessonTypeName":"听与谈","lessonNumber":5,"periodNumber":5,"duration":40,"grade":"高一","subject":"英语","tags":["听与谈","野生动物保护","讨论","人教版必修二U2","第五节课"],"textbookAnalysis":"本课为必修第二册 Unit 2 第五课时（Listening and Talking），语境为\"讨论如何帮助保护濒危野生动物\"。听力材料为一段关于野生动物保护组织活动的对话，口语输出任务为就某种濒危动物的保护措施进行讨论。功能语言为表达意图与计划（I intend to... / I plan to... / I'm going to...）及回应建议（That sounds great! / That's a wonderful idea! / I'd love to, but...）。结合语法课的被动语态，在口语中自然运用 is/are being done 描述保护行动。","overview":"【学情分析】A班：能提出保护建议，但缺乏\"计划+目的\"的完整表达链。B班：开口意愿低、intend/plan 等动词不熟。共同问题：只说想做什么但不说为什么——缺少 so that / in order to 目的表达。","objectives":["语言能力：听懂关于野生动物保护计划的对话，提取活动内容与目的；能用至少 4 种句型表达保护意图并说明目的。","文化意识：体会\"个人行动也能为野生动物保护做出贡献\"的参与意识。","思维品质：在讨论中练习\"表达计划→说明目的→邀请/回应同伴\"的完整对话链。","学习能力：通过意图表达对话训练批判性倾听——听懂同伴的计划后给出有针对性的回应。"],"keyPoints":"① 表达意图句型：I intend to... / I plan to... / I'm going to... / I'm thinking of + doing ② 目的表达：so that... / in order to... / to help... ③ 回应句型：That sounds great! / What a brilliant idea! / I'd love to join you.","difficulties":"① intend to do（打算做）学生易写成 intend doing（少见用法，to do 更自然）。原因：plan to do 的干扰。② so that + 从句（有主语+谓语）≠ in order to + 动词原形——学生混用。③ 回应时只说 \"OK\" 不给具体回应——需培养说\"为什么好\"或\"有什么顾虑\"的意识。","teachingMethods":"① 听前预测→听中配对→听后产出。② 角色扮演：志愿者招募面试。③ 野生动物保护计划圆桌讨论。","preparation":"【PPT课件】P1 野生动物保护组织活动图片（志愿巡逻/筹款/宣传教育）；P2 意图表达句型板；P3 听力任务题；P4 听力任务卡；P5 回应句型板；P6 角色卡。【实物教具】保护计划信息卡 printed；角色卡（申请人/面试官）。","process":[{"step":"导入激活","time":"5","content":"【PPT P1 活动图片】教师：Look at these pictures. What are these people doing for wildlife? If you had a free weekend, what would you do to help animals? 预设回答：Pick up trash. / Tell people about endangered animals. / Volunteer at a reserve. 板书时机：左栏板书 intend to / plan to / volunteer / donate。差异化提示：B班中文说再翻英文；A班直接英文+说原因。易错点提醒：volunteer /vɒləntɪə/ 重音在最后一个音节，-teer 读 /tɪə/ 不是 /tɪr/。"},{"step":"听力抓计划","time":"10","content":"【PPT P3 听力任务】听对话，抓\"谁计划做什么+什么目的\"。教师：Listen for: What does each speaker intend to do? Why? 预设回答：Speaker A intends to volunteer at a bird reserve. Speaker B plans to donate money. 板书时机：配对填表（人物|计划|目的）。差异化提示：B班给配对连线题；A班听写关键词+写目的句。易错点提醒：intend to do — to 不能少，不是 \"intend doing\" 虽然语法上可接受但在高中阶段推荐用 to do。"},{"step":"听中记录","time":"8","content":"【PPT P4 听力任务卡】【音频】重听，学生填完整意图+目的+回应链。教师：How did the other person respond? Were they interested? 预设回答：Yes! She said \"That's a wonderful idea! I'd love to join.\" 板书时机：核对填表。差异化提示：B班给回应选项（A/B/C选）；A班写完整回应句。易错点提醒：I'd love to = I would love to — 后面省略了上文提到的动词，是英语中最自然的接受邀请方式。"},{"step":"句型操练","time":"7","content":"【PPT P5 句型板】教师带领操练意图+目的链：A: I intend to volunteer at the reserve this Saturday. / B: Why? / A: Because I want to help protect the birds. So that more chicks can survive. / B: That sounds great! Can I join you? 预设回答跟读+仿造。板书时机：板书意图→目的→回应链条。差异化提示：B班用填空脚本；A班自主对话+替换活动名。易错点提醒：so that 后面跟完整句子（有主语+谓语），而 in order to 后面跟动词原形——\"so that to help\" 是错的。"},{"step":"角色扮演","time":"8","content":"【PPT P6 角色卡】两人一组：Interviewer（面试官）和 Volunteer（申请者）。面试官问\"你有什么计划？为什么想加入？\"，申请者回答。教师巡视。预设回答：I intend to help count the antelopes. I plan to use my photography skills to document wildlife. 板书时机：留句型供参考。差异化提示：B班照卡读；A班脱稿加即兴问题。易错点提醒：角色扮演中用被动语态描述活动——\"The data is being collected by volunteers every weekend.\" 增加语言质量。"},{"step":"小结","time":"2","content":"【PPT P7 总结】回顾表达意图句型+目的连接词+回应策略。教师：Remember: Say what you plan AND why. 预设回答跟读。板书时机：圈重点句型。差异化提示：B班齐读；A班每人说一句自己的保护计划。易错点提醒：I'm thinking of + doing（考虑做某事）不是 I'm thinking to do。"}],"blackboard":"┌─ U2 Listening & Talking ───────────┐\n│ Intentions:                          │\n│  I intend to + do...                │\n│  I plan to + do...                  │\n│  I'm thinking of + doing...         │\n│  I'm going to + do...               │\n│                                      │\n│ Purpose:                             │\n│  so that + clause                   │\n│  in order to + do...                │\n│  to help + do...                    │\n│                                      │\n│ Responses:                           │\n│  That sounds great! / Wonderful!    │\n│  I'd love to join you!              │\n└──────────────────────────────────────┘","exercises":"【基础作业】1. 听录音跟读 2 遍，圈出所有表达意图的句型。2. 用 I intend to... / I plan to... 各写 1 句自己的野生动物保护计划+目的。【提高作业】写 60 词对话：两人讨论周末一起去参加野生动物保护志愿活动（至少 4 轮，含意图+目的+回应）。【参考答案——教师用】基础2示例：I intend to volunteer at the local wildlife rescue center so that I can help injured birds. / I plan to donate 100 yuan every month in order to support panda conservation.","reflection":"✅ 亮点：意图+目的+回应三段链让学生表达更完整，不再只说半句话。⚠️ 需改进：so that / in order to 的区分仍需单独练习。📌 下节课衔接：进入写作 I，将讨论中的保护计划写成正式的海报。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Listening and Talking · Wildlife Protection (P5)"},{"id":"l-eng-b2-u2-w1","lessonId":"l-eng-b2-u2-w1","book":"必修第二册","unitNumber":2,"unitTitle":"Wildlife Protection","lessonType":"writing","lessonTypeName":"写作","lessonNumber":6,"periodNumber":6,"duration":40,"grade":"高一","subject":"英语","tags":["写作","海报","野生动物保护","人教版必修二U2","第六节课"],"textbookAnalysis":"本课为必修第二册 Unit 2 第六课时（Reading for Writing I），写作体裁为制作有效的野生动物保护海报（Make an Effective Poster）。海报结构为：醒目标题→震撼图片/数据→问题陈述→行动号召→联系方式。语言重点为海报特有的简短有力句型（Help us save...! / Don't let... disappear! / Act now!）及数据引述。结合本单元 Reading 的记叙文细节与语法课的被动语态，实现\"读-语法-写\"闭环。","overview":"【学情分析】A班：有写作能力但不知道海报文案和普通作文的区别——海报需要极简有力的语言。B班：句型储备少、不知从何写起，需大量范例+模板。共同问题：海报标题不够\"抓人\"——写成长句而非口号式标题。","objectives":["语言能力：掌握海报文案的\"标题→问题→数据→呼吁\"四要素结构，产出 60-80 词结构完整、有感染力的野生动物保护海报。","文化意识：理解海报在公众传播中的力量，能用英文制作有影响力的保护倡议。","思维品质：通过\"先选动物→再找数据→提炼标题→组织文案\"训练从信息到传播的设计思维。","学习能力：建立\"海报文案≠作文\"的意识——学会极简有力、口号式的英文表达。"],"keyPoints":"① 海报四要素：Catchy Title → Shocking Fact/Data → Why It Matters → Call to Action ② 海报句型：Help us save...! / Don't let... disappear! / ... are being killed every day. / Act now before it's too late! ③ 被动语态在海报中的应用：强调受威胁的动物。","difficulties":"① 海报标题的\"口号化\"——学生习惯写完整句\"This is a poster about protecting tigers\"而非\"Save the Tigers!\"。② 数据引述格式——数字+单位+来源。③ 被动语态在海报中的语气控制——不要太学术，要保持情感冲击力。","teachingMethods":"① 范本解构法：分析优秀海报→提取要素→仿写。② 头脑风暴：各组选一种动物列关键信息。③ 过程写作：outline→draft→peer review（下节课）。","preparation":"【PPT课件】P1 优秀野生动物保护海报范例（WWF等）；P2 海报四要素结构图；P3 海报句型库；P4 头脑风暴工作单；P5 写作任务；P6 写作提纲；P7 总结。【实物教具】A4纸每人一张；彩笔；海报范例打印版。","process":[{"step":"范本解构","time":"8","content":"【PPT P1 海报范例】教师展示 2-3 张经典野生动物保护海报（英文），学生标注四要素：标题/数据/原因/呼吁。教师：Which poster makes you want to act? Why? 预设回答：The one with the tiger — the title \"Save the Tigers!\" is powerful. The data \"Only 3,900 left\" is shocking. 板书时机：四要素板书于黑板。差异化提示：B班给标注好的范例只匹配要素名称；A班自己标注+评语\"为什么有效\"。易错点提醒：海报标题的核心技巧——用动词开头（Save/Stop/Protect/Help），比名词标题有力 10 倍。"},{"step":"四要素讲透","time":"8","content":"【PPT P2 结构图】教师逐要素讲解：①Title: 简短口号（3-5词），动词开头。②Data: 震撼数字 —— \"Only ___ left.\" \"___ are killed every ___.\" ③Why: 1-2句说明为什么重要（生态价值/人类责任）。④Call: 行动号召 —— \"Act now!\" \"Join us!\" \"Donate at...\" 教师用藏羚羊示范各要素。预设回答跟做。板书时机：逐要素板书模板句。差异化提示：B班给每要素填空模板；A班给关键词自己写。易错点提醒：③Why 不要写成议论文——1-2句足够。海报读者注意力只有 3 秒，长句直接被忽略。"},{"step":"海报句型库","time":"5","content":"【PPT P3 句型库】教师领读海报高频句型：Help us save...! / Don't let... disappear! / ... are being killed every day. / If we don't act now, ... / Every ... counts! / Join the fight! 教师强调被动语态在海报中的情感效果：\"are being killed\"比\"people kill\"更能让读者同情动物。预设回答跟读+感受。板书时机：句型分类板书（标题句/数据句/呼吁句）。差异化提示：B班齐读+背3句；A班选最打动自己的1句说为什么。易错点提醒：感叹号在海报中可以用，但要节制——1个标题用就够，全文不超过3个感叹号。"},{"step":"头脑风暴","time":"5","content":"【PPT P4 工作单】学生各自选一种濒危动物思考：①What is a catchy title? ②What is the most shocking fact? ③Why should people care? ④What should people do? 教师巡视指导。预设回答：Title: \"Save the Snow Leopards!\" / Fact: \"Only 4,000 remain in the wild.\" / Why: \"They are the guardians of the mountains.\" / Call: \"Adopt a snow leopard today!\" 板书时机：巡视指导。差异化提示：B班用填空式工作单；A班独立填。易错点提醒：数字一定要准确——不要编数据。\"about 4,000\" 可以用，但不要随便说\"only 100\"。"},{"step":"起草海报","time":"10","content":"【PPT P5 写作任务】学生用 A4纸起草海报。要求：四要素齐全、至少 1 个被动语态、至少 1 个数据。教师巡视提醒：标题要大！数据要显眼！教师：Your title should be the BIGGEST thing on the page. 预设回答：（学生制作海报草稿中）板书时机：留四要素模板供参考。差异化提示：B班用模板写文字；A班还考虑字体大小/颜色对比等设计。易错点提醒：海报文字不在多而在精——全文字数控制在 60-80 词，不要写小作文。"},{"step":"同伴初评","time":"4","content":"【PPT P6 写作提纲】同桌互换海报草稿，check：有四要素吗？标题够吸引吗？数字准确吗？有被动语态吗？教师：Give your partner one compliment and one suggestion. 预设回答：Your title is catchy! Maybe add a data point. 板书时机：留 checklist。差异化提示：B班用 checklist 表逐项打勾；A班口头给改进建议。易错点提醒：互评不是比谁画得好看——重点评文案内容和信息传达力。"}],"blackboard":"┌─ U2 Writing: Effective Poster ──────────────┐\n│  ① CATCHY TITLE (3-5 words, verb first!)     │\n│     Save the...! / Protect...! / Stop...!     │\n│  ② SHOCKING DATA                              │\n│     Only ___ left. / ___ killed every ___.    │\n│  ③ WHY IT MATTERS (1-2 short sentences)       │\n│  ④ CALL TO ACTION                              │\n│     Act now! / Join us! / Donate at...!        │\n│                                                │\n│  Voice: Use passive for emotional impact!      │\n│  \"are being killed\" > \"people kill\"            │\n└────────────────────────────────────────────────┘","exercises":"【基础作业】按课堂草稿完成 60-80 词野生动物保护海报文字稿。要求：四要素完整、至少 1 个被动语态、至少 1 个数据。【提高作业】将文字稿设计成 A4 海报（可手绘+彩笔或用 Canva），下节课展示。【参考答案——教师用】示例（藏羚羊海报）：Title: \"SAVE THE TIBETAN ANTELOPE!\" / Data: \"Once reduced to 50,000 — now recovering, but still threatened.\" / Why: \"These graceful creatures are symbols of the Tibetan Plateau. Their survival depends on us.\" / Call: \"Join Changtang conservation! Donate at www.wildlifechina.org.\"","reflection":"✅ 亮点：四要素结构让海报制作有章可循，不再\"不知从何写起\"。⚠️ 需改进：数据引述的准确性仍需强调，部分学生编造数据。📌 下节课衔接：进入写作 II，完善海报设计+展示评选。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Writing · Wildlife Protection (P6)"},{"id":"l-eng-b2-u2-w2","lessonId":"l-eng-b2-u2-w2","book":"必修第二册","unitNumber":2,"unitTitle":"Wildlife Protection","lessonType":"writing","lessonTypeName":"写作","lessonNumber":7,"periodNumber":7,"duration":40,"grade":"高一","subject":"英语","tags":["写作","互评","修改","海报","野生动物保护","人教版必修二U2","第七节课"],"textbookAnalysis":"本课为必修第二册 Unit 2 第七课时（Writing II），在 Writing I 海报草稿的基础上完成\"互评→修改→展示→终稿\"闭环。重点训练学生用同学反馈改进海报文案的能力。互评量表聚焦三维度：内容完整（四要素齐全）、语言质量（被动语态/海报句型/数据准确）、视觉冲击力（标题够大/数据显眼/图文搭配）。","overview":"【学情分析】A班：能辨别海报好坏，但给反馈时只说\"画得好看\"缺乏对文案的具体建议。B班：改自己的海报时不知从何下手。共同问题：互评流于表面（只看图不读文字），不会用检查量表逐项给分。","objectives":["语言能力：能根据互评量表给同伴的海报文案提具体、可操作的修改建议，重点检查被动语态和海报句型的使用。","文化意识：通过阅读同伴的海报了解不同濒危动物的保护需求，扩展保护视野。","思维品质：在互评中培养\"识别传播效果→提出优化方案\"的批判性反馈能力。","学习能力：建立\"写→评→改→展\"四步海报制作流程，内化为个人创作习惯。"],"keyPoints":"① 互评三维量表：内容（四要素齐全 / 数据准确）+ 语言（被动语态≥1 / 海报句型≥2 / 词汇恰当）+ 视觉（标题突出 / 数据显眼 / 排版清晰）② 海报展示技巧：30 秒内讲清\"什么动物/什么问题/读者该做什么\"","difficulties":"① 学生互评海报时只关注图画不关注语言——需强制\"先读文字再评设计\"。② 海报数据错误的纠正——学生常写\"Only 10 left\"无依据。③ 展示节奏控制——海报展示不等于读海报，而是用口语解释海报为什么有效。","teachingMethods":"① 量表互评：用统一标准减少主观性。② 画廊漫步：海报贴墙上全班巡评。③ 最佳海报评选+颁奖。","preparation":"【PPT课件】P1 互评三维量表；P2 常见问题（标题弱/缺数据/无被动/数据不准）；P3 修改指南；P4 展示技巧（30秒公式）；P5 最佳海报范例；P6 自评表；P7 总结。【实物教具】互评量表 printed 每人一份；红笔/便利贴；投票贴纸。","process":[{"step":"量表培训","time":"5","content":"【PPT P1 互评量表】教师逐维讲解：①内容（四要素全？数据有来源？）②语言（被动语态≥1？海报句型≥2？拼写正确？）③视觉效果（标题最大？数据突出？不拥挤？）。教师用上节课自己的海报示范打分。预设回答跟学。板书时机：量表三维板书于黑板。差异化提示：B班按量表逐项打勾；A班还需写一句\"如果这是我的海报，我会改哪里\"。易错点提醒：互评不是比谁画得好——是帮对方把文案改得更有传播力。"},{"step":"互评","time":"12","content":"【PPT P2 常见问题】先展示上节课常见问题：①标题太弱（\"This is a poster about pandas\" 而非 \"Save Pandas!\"）②无被动语态 ③数据无来源。然后同桌互换海报，用红笔按量表标注。教师巡视。教师：Give one compliment and one suggestion about the LANGUAGE. 预设回答：Your title is strong, but you didn't use passive voice. Try \"are being hunted.\" 板书时机：留量表供参考。差异化提示：B班按 checklist 勾；A班在稿上写具体修改建议。易错点提醒：提建议时先夸后改——\"I love your title! Maybe add a shocking number in the data section?\""},{"step":"修改","time":"10","content":"【PPT P3 修改指南】学生根据互评反馈修改海报。顺序：①先补内容（缺哪要素补哪）②再调语言（插入被动语态/海报句型）③最后调视觉（标题加粗/数据放大）。教师：Fix content first, then language, then design. 预设回答：（学生修改中，此处无口头回答）板书时机：留修改顺序。差异化提示：B班对照量表逐条改；A班改完还润色句型多样性。易错点提醒：修改不是重做——保留好的部分，只改薄弱处。最好的海报改 2-3 处就能提升很多。"},{"step":"画廊漫步+投票","time":"8","content":"【PPT P4 展示技巧】海报贴墙上，全班用便利贴给每张海报打分（内容/语言/设计 各1星）。教师：Write one thing you learned from another poster. 预设回答：I learned that \"only 3,900 left\" is a very powerful way to present data. 板书时机：留投票维度。差异化提示：B班用贴纸投票；A班还写一句学习笔记。易错点提醒：从别人的海报中学习——记下你觉得有效的句型和设计，下次用在自己的作品中。"},{"step":"结课+自评","time":"5","content":"【PPT P7 总结+自评】宣布最佳海报前三名。学生自评：①我的海报最大的优点是？②如果再做一张，我会怎么改进？教师：What did you learn about making an effective poster? 预设回答：Titles must be short and powerful. Data makes it real. Passive voice makes people feel for the animals. 板书时机：写最优海报的标题作为范例。差异化提示：B班中文自评；A班英文自评。易错点提醒：海报的终极测试——给一个没听过这个话题的人看 3 秒，他能记住什么？你的标题就是那个答案。"}],"blackboard":"┌─ U2 Writing II: Poster Gallery ──────┐\n│ Review Checklist:                      │\n│  ✅ Content: Title / Data / Why / Call │\n│  ✅ Language: ≥1 passive / ≥2 poster   │\n│     phrases / accurate data            │\n│  ✅ Visual: Title BIG / Data VISIBLE    │\n│                                        │\n│ Poster Pitch (30 sec):                 │\n│  \"This poster is about...              │\n│   They are being threatened by...      │\n│   You can help by...\"                  │\n└────────────────────────────────────────┘","exercises":"【基础作业】根据课堂反馈修改海报终稿，拍照提交。写 20 词英文反思：我的海报最打动人的是哪部分？【提高作业】选另一濒危动物再设计一张海报文字稿（60-80词），比较两种动物的保护需求有何不同。【参考答案——教师用】反思示例：The most powerful part of my poster is the data \"Only 4,000 snow leopards remain.\" I learned that numbers make people care more than general statements.","reflection":"✅ 亮点：画廊漫步让互评可视化，便利贴打分参与率高。⚠️ 需改进：部分海报数据仍不准确，下次写作前可要求标注数据来源。📌 下节课衔接：进入 Project，将本单元所学整合为\"濒危动物保护宣传展\"。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Writing · Wildlife Protection (P7)"},{"id":"l-eng-b2-u2-p","lessonId":"l-eng-b2-u2-p","book":"必修第二册","unitNumber":2,"unitTitle":"Wildlife Protection","lessonType":"project","lessonTypeName":"项目复习","lessonNumber":8,"periodNumber":8,"duration":40,"grade":"高一","subject":"英语","tags":["项目","复习","野生动物保护","展览","人教版必修二U2","第八节课"],"textbookAnalysis":"本课为必修第二册 Unit 2 第八课时（Project），为单元终极产出课。学生以 4 人小组为单位，整合本单元5种课型所学——听与说的保护词汇+阅读的叙述与数据+语法的被动语态+听与谈的意图表达+写作的海报——完成一份\"濒危动物保护宣传展\"展板/多媒体展示。综合考查语言能力（词汇/语法/写作）、思维品质（信息组织）和学习能力（合作分工）。","overview":"【学情分析】A班：能独立完成分工作品，但需要明确评分标准。B班：group work 中易\"搭便车\"，需明确定人定责+互评贡献度。共同问题：小组合作时语言切换回中文——需设立\"英文监督员\"角色。","objectives":["语言能力：综合运用本单元词汇、被动语态、意图表达句型、海报句型，以英文完成一份濒危动物保护宣传展板（动物介绍/威胁/保护措施/呼吁/海报）。","文化意识：通过展览形式向同伴传播野生动物保护理念，理解生物多样性保护的重要性。","思维品质：在4人小组中合理分工、有效协作，培养项目管理思维。","学习能力：回顾本单元5课学习内容，建立\"一个单元学什么、怎么用\"的整体框架感。"],"keyPoints":"① 展板五模块：Animal Profile（简介）→ Threats（威胁+数据）→ Conservation（正在实施的保护措施）→ How to Help（读者可以做什么）→ Mini Poster（海报） ② 单元知识整合：保护词汇/被动语态/意图表达/海报句型 ③ 小组分工：Researcher / Writer / Designer / Presenter各司其职","difficulties":"① 展板的 Conservation 模块需用现在进行时被动语态描述正在实施的措施——学生容易忘用被动。② 五模块之间的逻辑衔接——不是五个独立的块，而是一条说服链。③ 展示时间控制——2分钟/组，超时扣分。","teachingMethods":"① PBL项目式学习：以宣传展为驱动问题。② 小组协作：角色分工+模块checklist。③ 展览+最佳展板评选。","preparation":"【PPT课件】P1 单元回顾五课内容（思维导图）；P2 展板五模块结构；P3 角色分工卡；P4 范例参考；P5 评价量规；P6 自评表；P7 总结。【实物教具】A3白纸每组一张；彩笔/马克笔；角色分工卡 printed；积分卡。","process":[{"step":"单元回顾","time":"5","content":"【PPT P1 思维导图】教师带学生回顾本单元5课学了什么：听与说（濒危动物词汇+关切表达）→阅读（A DAY IN THE CLOUDS叙事+数据）→语法（is/are being done）→听与谈（意图+目的+计划）→写作（海报四要素）。教师：Today we bring it all together — make an exhibition! 预设回答跟读回顾。板书时机：左栏画五课链接图。差异化提示：B班看PPT读关键词；A班自己说出每课学到的核心内容。易错点提醒：展板每模块至少用一次现在进行时被动语态——这是单元核心语法。"},{"step":"任务布置+分工","time":"6","content":"【PPT P2 展板结构】【PPT P3 角色卡】教师展示展板五模块：①Animal Profile（选一濒危动物+简介+照片）②Threats（威胁+震撼数据）③Conservation（正在实施的保护措施——用被动语态！）④How to Help（读者能做的3件事）⑤Mini Poster（完整的号召海报）。角色分工：Researcher查信息 / Writer写文案 / Designer设计排版 / Presenter准备展示。教师：Choose your animal and role! 预设回答：We choose the snow leopard. I'll be the researcher. 板书时机：留模块结构和角色。差异化提示：B班给语言模板；A班自由创作。易错点提醒：Researcher 的数据必须真实——百度/WWF 官网查，不要编。"},{"step":"制作展板","time":"16","content":"【PPT P4 范例参考】【实物 A3纸】小组制作。教师要巡视提醒：①全英文！②每模块至少2句完整句 ③至少2个被动语态 ④数据要标注来源 ⑤最后3分钟 Presenter 准备展示。预设回答：（小组讨论制作中，教师巡视指导）板书时机：无。差异化提示：B班给每模块句型开头提示；A班独立完成+追求语言多样性。易错点提醒：五模块要有逻辑流——不是五个独立块，而是\"这是什么动物→为什么危险→正在做什么→你该做什么→记住我们的话\"。"},{"step":"展示评价","time":"10","content":"【PPT P5 量规】每组 2 分钟展示。全班投票：最佳内容/最佳设计/最佳展示/最想行动起来的。教师：You have 2 minutes. Make us care about your animal! 预设回答展示。板书时机：记投票结果。差异化提示：B班可看展板讲；A班脱稿补充。易错点提醒：2分钟分配——30秒介绍动物+30秒说威胁+30秒说保护+30秒呼吁。不要在某一部分拖太久。"},{"step":"单元自评","time":"3","content":"【PPT P6 自评表】学生勾选四维薄弱项：保护词汇记不住？被动语态不会用？意图表达忘了？海报结构不熟？写1条补强计划。教师：Be honest. What will you review this weekend? 预设回答：I need to practice the present continuous passive. I will review the grammar table and do 5 exercises. 板书时机：留自评四维。差异化提示：B班中文写；A班英文写。易错点提醒：补强计划要具体——\"复习被动语态\"太笼统，应该写\"用 is/are being done 造5句关于老虎的句子\"。"}],"blackboard":"┌─ U2 Project: Wildlife Exhibition ────┐\n│ 🦌 Exhibition 5 Modules:               │\n│  ① Animal Profile (who is it?)        │\n│  ② Threats (what's happening?)        │\n│  ③ Conservation (what's being done?)  │\n│  ④ How to Help (what can YOU do?)     │\n│  ⑤ Mini Poster (call to action!)      │\n│                                        │\n│ 👥 Roles: Researcher / Writer /        │\n│            Designer / Presenter        │\n│                                        │\n│ ⭐ Must: English / ≥2 passive / data   │\n│          with source / 5 modules       │\n└────────────────────────────────────────┘","exercises":"【基础作业】完成小组展板（未完成的继续做），拍照片提交。写 30 词英文反思：我的角色是…从项目中我学到了…【提高作业】搜索了解 IUCN Red List（世界自然保护联盟红色名录），找一种\"极危\"（Critically Endangered）动物写 50 词英文简介。【参考答案——教师用】反思示例：I was the writer. I wrote the threats and conservation modules. I learned how to use present continuous passive to describe ongoing protection efforts. Next time I will double-check data sources before writing.","reflection":"✅ 亮点：五模块展板整合全单元，学生产出有成就感。⚠️ 需改进：16分钟制作时间偏紧，下次可给20分钟+提前布置数据查找作业。📌 下节课衔接：进入 Unit 3 The Internet，从自然保护转向数字世界的连接与改变。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Project · Wildlife Protection (P8)"},{"id":"l-eng-b2-u3-ls","lessonId":"l-eng-b2-u3-ls","book":"必修第二册","unitNumber":3,"unitTitle":"The Internet","lessonType":"listening-speaking","lessonTypeName":"听与说","lessonNumber":1,"periodNumber":1,"duration":40,"grade":"高一","subject":"英语","tags":["听与说","互联网","上网习惯","人教版必修二U3","第一节课"],"textbookAnalysis":"本课为必修第二册 Unit 3 The Internet 第一课时（Listening and Speaking），属单元导入+输入环节。语篇为一段关于青少年上网习惯的调查对话与一则介绍互联网用途的听力材料，功能语境是\"询问并描述上网活动\"。语言重点为互联网相关词汇（browse, stream, download, update, blog, account, network）及询问上网习惯句型（How much time do you spend online? / What do you usually do on the Internet?）。为 Reading 语篇\"STRONGER TOGETHER\"中互联网改变人生的叙事做词汇与话题预热。","overview":"【学情分析】A班：对互联网话题熟悉，日常上网词汇（WiFi, app, online）会，但 browse/stream/update 等动词不熟。B班：部分英文网络术语发音不准（如 browser /braʊzə/ 读成 /bruːzə/）。共同问题：讨论上网时只会说 play games 和 watch videos，缺乏描述多样网络活动的词汇。","objectives":["语言能力：听懂关于上网习惯的调查对话，提取关键信息（时长/活动/偏好），准确使用 8-10 个互联网相关词汇。","文化意识：了解不同国家青少年上网习惯的异同，形成对互联网使用的批判性认知。","思维品质：通过\"听前预测—听中分类—听后比较\"形成系统听力策略。","学习能力：能用 How much time do you spend...? / What do you usually do...? 询问并描述自己的上网习惯。"],"keyPoints":"① 互联网核心词汇：browse / stream / download / update / blog / account / network / search engine ② 询问上网习惯句型：How much time do you spend online? / What do you use the Internet for? / I usually... / I also... ③ 听力微技能：听前预测活动类型、听中分类（娱乐/学习/社交）。","difficulties":"① browse（浏览）与 browser（浏览器）词性混淆。原因：形近。易错点提醒：browse 是动词，browser 是名词（浏览器软件）。② download /daʊnləʊd/ 发音重音在第一音节——学生易读成 /daʊnˈləʊd/。③ spend time doing（花时间做某事）— 学生易写成 spend time to do。","teachingMethods":"① 任务型（TBL）：以做\"班级上网习惯调查\"为终任务。② 听前预测+听中填表：分类表脚手架。③ 对子互问操练上网习惯句型。","preparation":"【PPT课件】P1 单元封面（The Internet）；P2 网络活动图标九宫格（搜索/视频/音乐/社交/购物/游戏/学习/新闻/博客）；P3-4 听力任务题；P5 上网习惯句型板；P6 调查任务卡。【实物教具】上网习惯调查表 printed 每人一份；网络活动词汇卡每组一套。【音频】听力两段音频（教材配套）。","process":[{"step":"导入激活","time":"5","content":"【PPT P2 九宫格】教师：Look at these nine icons. How many of these do you do online? Which ones? 预设回答：I watch videos, play games, and chat with friends. / I also search for information. 板书时机：右侧板书 browse / stream / download / chat / search。差异化提示：B班指图说中文再跟读英文；A班用 I use the Internet to... 造句。易错点提醒：Internet 首字母永远大写，前面用 the — \"the Internet\" 不是 \"internet\"。"},{"step":"词汇输入","time":"8","content":"【PPT P3 词卡】教师领读 browse / stream / download / update / blog / account / network / search engine。教师：What does \"stream\" mean when we talk about the Internet? 预设回答：It means watching or listening online without downloading. 板书时机：左栏板书词+短注释，标注动词/名词。差异化提示：B班配图标记忆+中英对照；A班用词造句。易错点提醒：stream 作动词（在线播放/流媒体）与名词（溪流）完全不同——本文只讲动词义。"},{"step":"听前预测","time":"5","content":"【PPT P4 题支】教师：We will listen to a survey about teenagers' online habits. Predict: What activities will be mentioned? (entertainment / study / social / shopping) 预设回答：Entertainment — like watching videos and playing games. And social — chatting with friends. 板书时机：预测分类写在黑板中部（四象限）。差异化提示：B班给中文提示词；A班用英文说预测+给例子。易错点提醒：听力中活动频率词（often/sometimes/never）— 是听力的关键区分信息。"},{"step":"听中分类","time":"10","content":"【PPT P5 分类表】【音频 段一】播放听力，学生按\"娱乐/学习/社交/购物\"四象限分类填表。教师：What is the most popular online activity? How much time do they spend? 预设回答：Watching videos is the most popular. They spend about 3 hours a day. 板书时机：核对答案时填分类表于黑板中部。差异化提示：B班给活动列表只分类；A班一遍填全+写频率词。易错点提醒：hour 前面用 an — \"an hour\" 不是 \"a hour\"，因为 h 不发音。"},{"step":"句型操练","time":"7","content":"【PPT P5 句型板】教师：How to ask about online habits? How much time do you spend online? / What do you usually do on the Internet? / How often do you...? 教师示范后同桌互问。预设回答：I spend about two hours online every day. I usually stream music and browse social media. 板书时机：句型板书于中央。差异化提示：B班套用模板替换时间+活动；A班追加 Why 追问。易错点提醒：spend time doing — \"I spend time to surf\" 是错的，应为 \"I spend time surfing\"。"},{"step":"调查任务","time":"5","content":"【PPT P6 调查表】学生采访 3 位同学的上网习惯，记录并准备简短汇报。教师：Ask three classmates about their online habits. Be ready to report one interesting finding. 预设回答：Most of my classmates stream music every day. Only one person uses the Internet for study! 板书时机：留句型供参考。差异化提示：B班用填空式调查表；A班自由采访+追问。易错点提醒：做调查报告时说 \"Most of my classmates...\" 不具体的数字用 most/some/a few/none，比编造精确数字更地道。"}],"blackboard":"┌─ U3 Listening & Speaking ──────────┐\n│ Internet Activities:                 │\n│  browse / stream / download / update │\n│  blog / account / network / search   │\n│  engine / social media               │\n│                                      │\n│ Asking about habits:                 │\n│  How much time do you spend online?  │\n│  What do you usually do on the Net?  │\n│  How often do you...?                │\n│                                      │\n│ Survey Results (top 3):              │\n│  1. Stream videos/music  2. Chat    │\n│  3. Browse social media              │\n└──────────────────────────────────────┘","exercises":"【基础作业】1. 听录音跟读听力文本 2 遍，圈出所有网络活动词汇。2. 用 How much time...? / What do you usually...? 写 3 个关于上网习惯的问答。【提高作业】用英文写 50 词关于自己的上网习惯自述，包含时长/主要活动/最喜欢的一个网站或App。【参考答案——教师用】基础2示例：Q: How much time do you spend online each day? A: I spend about two hours online, mostly in the evening. Q: What do you usually do on the Internet? A: I usually stream music and browse the news.","reflection":"✅ 亮点：调查任务让句型操练有真实交流目的，学生参与度高。⚠️ 需改进：spend time doing 句式仍有部分学生写 to do，下节需在阅读语境中强化。📌 下节课衔接：进入阅读 STRONGER TOGETHER，从上网习惯延伸到互联网如何改变人生。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Listening & Speaking · The Internet (P1)"},{"id":"l-eng-b2-u3-r1","lessonId":"l-eng-b2-u3-r1","book":"必修第二册","unitNumber":3,"unitTitle":"The Internet","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":2,"periodNumber":2,"duration":40,"grade":"高一","subject":"英语","tags":["阅读","互联网","在线社区","人物故事","人教版必修二U3","第二节课"],"textbookAnalysis":"本课为必修第二册 Unit 3 第二课时（Reading I），语篇 STRONGER TOGETHER: HOW WE HAVE BEEN CHANGED BY THE INTERNET 是一篇人物报道/叙事文，讲述英国伯明翰 61 岁女性 Jan Tchamani 因病失业后通过互联网学习新技能、创办在线社区帮助他人、最终改变自己与许多人生活的故事。结构为\"困境→互联网启蒙→建立社区→影响扩散\"。语言重点为叙事时间顺序词（at first / then / later / so far）与互联网赋能动词（access, inspire, remove, connect, benefit）。","overview":"【学情分析】A班：能快速把握人物叙事线索，但对\"互联网的社会影响力\"缺乏深入思考。B班：人物报道的背景（英国/疾病/孤独感）可能引起共鸣但词汇量不够。共同问题：叙述类文本中\"改变\"的多种表达（change/transform/improve）不会区分。","objectives":["语言能力：读懂人物报道类叙事文，提取 Jan Tchamani 的人生转折点/互联网如何改变她/在线社区的影响；掌握 8-10 个核心动词。","文化意识：理解互联网在消除孤独、赋能弱势群体方面的积极社会作用。","思维品质：通过\"困境→转折→行动→影响\"故事弧线分析培养叙事结构思维。","学习能力：能用\"Before→Turning Point→After→Impact\"框架复述人物故事。"],"keyPoints":"① 叙事弧线：Loneliness→Discover Internet→Learn Skills→Create Community→Help Others ② 时间标志词：at first / then / later / after a while / so far / now ③ 核心短语：be out of work / access the Internet / apply for / benefit from / bridge the gap","difficulties":"① access（使用/访问）作动词与名词用法。原因：学生只知名词义\"通道\"。提醒：本文中 access the Internet = 上网。② apply for（申请）与 apply to（适用于）区别。③ benefit from（从…获益）— 学生易写成 benefit by。","teachingMethods":"① 故事弧线阅读法：找转折点→画情绪曲线。② Jigsaw拼图：分段阅读后拼合全故事。③ 问题链追问：训练共情与批判思维。","preparation":"【PPT课件】P1 Jan Tchamani 照片与报道截图；P2 故事弧线图（情绪曲线）；P3 时间轴填表；P4 分段任务卡；P5 词汇对比表；P6 互联网影响力讨论；P7 总结回顾。【实物教具】分段阅读卡 printed 每组一套；故事弧线空白工作单。","process":[{"step":"导入设问","time":"5","content":"【PPT P1 人物照片】教师：This is Jan Tchamani. She is 61 years old and lives in Birmingham, UK. A few years ago, she felt very lonely. Today, thousands of people know her. What do you think happened? 预设回答：She met people online? / She started a YouTube channel? / She used the Internet to connect with others. 板书时机：板书 lonely → ??? → thousands of people，问号处留给学生填。差异化提示：B班中文猜；A班英文猜+说理由。易错点提醒：lonely（孤独的，心理感受）≠ alone（独自的，物理状态）—— 一个人可以 alone 但不 lonely。"},{"step":"快速阅读抓主线","time":"8","content":"【PPT P3 时间轴】教师：Read fast (3 min). Find: ① Why was Jan lonely? ② What did she discover? ③ What did she create? ④ What is the result? 预设回答：① She was out of work and had an illness. ② She discovered the Internet. ③ She created an online community. ④ Many people's lives have been improved. 板书时机：填时间轴四个关键点。差异化提示：B班给四选一选项；A班写完整句+段落号。易错点提醒：out of work = unemployed（失业），不是\"在外面工作\"。"},{"step":"精读段落1-2 困境与转折","time":"10","content":"【PPT P4 分段卡】教师精讲：be out of work / access the Internet / apply for。教师：How did Jan feel before discovering the Internet? What was her turning point? 预设回答：She felt lonely and bored. The turning point was when she applied for an online course. 板书时机：左侧栏画情绪曲线（从低→上升）。差异化提示：B班读后填关键词；A班用自己话描述 Jan 的心理变化。易错点提醒：apply for + 你想要的东西（job/course/visa），apply to + 机构/人/情况（company/university/situation）。"},{"step":"精读段落3-5 社区与影响","time":"10","content":"【PPT P5 行动链】教师：What did Jan do after learning IT skills? Who did she help? How did her community grow? 学生填表（行动→受益者→效果）。教师：Why is the title \"Stronger Together\"? 预设回答：She started an online community for older people. It helped them feel less lonely. Together, they are stronger. 板书时机：右侧画行动→影响扩散图。差异化提示：B班连线匹配（行动—效果）；A班写\"cause and effect\"句。易错点提醒：together（一起）≠ altogether（总共）——标题\"Stronger Together\"意为\"在一起更强大\"。"},{"step":"归纳主题","time":"4","content":"【PPT P6 互联网影响力】教师：What does this story teach us about the Internet? (It's not just for fun — it can change lives, connect people, bridge gaps.) 预设回答：The Internet can help people who are lonely or disabled. It can make the world a better place if used well. 板书时机：圈出\"bridge the gap\"并释义。差异化提示：B班跟读关键词；A班用自己的话总结网络的双面性。易错点提醒：bridge the gap = 弥合差距（比喻），此处指弥合数字鸿沟和人与人之间的隔阂。"},{"step":"小结","time":"3","content":"【PPT P7 总结回顾】教师带学生回顾\"孤独→上网→学技能→建社区→帮更多人\"故事弧线+核心词汇。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述。易错点提醒：so far（迄今为止）常与现在完成时连用，标志词。"}],"blackboard":"┌─ U3 Reading I: STRONGER TOGETHER ──────┐\n│ Jan's Story Arc:                         │\n│  Lonely → Discover Internet → Learn IT   │\n│  → Create Community → Help Thousands    │\n│                                           │\n│ out of work / access / apply for         │\n│ inspire / connect / benefit from         │\n│ bridge the gap / so far                   │\n│                                           │\n│ Title: \"Stronger Together\"                │\n│  = Internet connects → community builds  │\n│    → together we overcome loneliness     │\n└───────────────────────────────────────────┘","exercises":"【基础作业】1. 朗读课文第2-5段 2 遍，圈出所有时间标志词。2. 用故事弧线的4个阶段各写1句描述 Jan 的经历。【提高作业】用 80 词左右写一段：How has the Internet changed YOUR life?（用 access / benefit from / connect）【参考答案——教师用】基础2示例：Jan felt lonely and bored after losing her job. / Then she discovered the Internet and learned IT skills. / Later, she started an online community for older people. / So far, thousands of people have benefited from her work.","reflection":"✅ 亮点：故事弧线+情绪曲线让叙事结构可视化，B班理解率明显提升。⚠️ 需改进：apply for/apply to 区分仍需强化，精读课将深入。📌 下节课衔接：进入精读语言+现在完成时的被动语态在语篇中的功能分析。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Reading and Thinking · The Internet (P2)"},{"id":"l-eng-b2-u3-r2","lessonId":"l-eng-b2-u3-r2","book":"必修第二册","unitNumber":3,"unitTitle":"The Internet","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":3,"periodNumber":3,"duration":40,"grade":"高一","subject":"英语","tags":["阅读","精读","被动语态","互联网","人教版必修二U3","第三节课"],"textbookAnalysis":"本课为必修第二册 Unit 3 第三课时（Reading II），聚焦语篇 STRONGER TOGETHER 的精读与语言分析。重点分析文中现在完成时的被动语态（have/has been + past participle）——如 \"People's lives have been improved\" \"An online community has been created\"——在人物报道中的功能：强调结果状态的改变已经发生且持续至今。同时深化语篇中高频动词的用法辨析（access / inspire / remove / connect / bridge）。","overview":"【学情分析】A班：已学一般现在时/过去时/进行时被动，现在完成时被动（has been done）是全新时态组合。B班：被动语态+完成时双重挑战，需从 has been 开始拆解。共同问题：看到 has been done 时无法同时处理\"完成\"和\"被动\"两层信息。","objectives":["语言能力：能在课文语境中识别并分析至少 4 个现在完成时的被动语态句子，理解其\"已经被…且结果持续至今\"的语义。","文化意识：通过被动语态体会英语如何聚焦\"改变的结果\"而非\"谁造成的改变\"。","思维品质：分析现在完成时被动语态在人物报道中的修辞功能——强调个人/群体已被互联网赋权的结果状态。","学习能力：建立\"从读到写\"的语料库——积累课文中的完成时被动句型用于后续博客写作。"],"keyPoints":"① 现在完成时被动语态结构：have/has + been + past participle ② 语篇中被动句的识别与功能分析 ③ 核心动词辨析：access / inspire / remove / connect / bridge / benefit / apply","difficulties":"① has been done 与 is being done 的区别——学生混淆完成时被动（已发生+结果持续）与进行时被动（正在被做）。② been 的拼写——学生写成 ben / bean。③ 不规则过去分词记错——take→taken, write→written, give→given。","teachingMethods":"① 标注发现法：圈出文中所有现在完成时被动语态并分析时态结构。② 对比辨析：vs 一般过去时被动 vs 现在进行时被动。③ 语料卡记录：分类摘录优质被动句。","preparation":"【PPT课件】P1-2 课文中圈出的被动语态示例；P3 现在完成时被动结构分解公式；P4 三时态被动对比表；P5 语料卡模板；P6 词汇辨析表；P7 总结回顾。【实物教具】课文复印件 printed 每人一份；高亮笔两支（黄=被动/蓝=时间词）。","process":[{"step":"课文回顾","time":"5","content":"【PPT P1 故事弧线】教师：Last class we read Jan's story. Can you recall: What was her problem? What did the Internet help her do? What is the result? 预设回答：She was lonely and out of work. The Internet helped her learn IT skills. She created an online community that has helped thousands. 板书时机：左栏写故事弧线关键词。差异化提示：B班看关键词复述；A班完整说出5个以上要点。易错点提醒：thousands of（成千上万的）— thousand 不加 s，但 thousands of 加 s。"},{"step":"被动语态发现","time":"8","content":"【PPT P2 课文句子】发课文复印件。教师：Circle all sentences with \"has/have been + past participle.\" 学生标记后全班核对。教师：Why does the author use this structure? 预设回答：To show that a change has happened and the result is still important now. 板书时机：逐句板书圈出的被动语态。差异化提示：B班给划线句直接圈 has/have been + V-ed；A班自己找+分析\"结果是什么，持续到现在了吗\"。易错点提醒：has been + V-ed 中 been 不能少！\"People's lives have improved\"（主动）= 生活自己变好了；\"People's lives have been improved\"（被动）= 生活被（互联网）改善了。"},{"step":"被动语态讲透","time":"10","content":"【PPT P3 结构公式】教师板书：have/has + been + V-ed。对比三个时态被动：①The community was created in 2015.（一般过去时，时间点明确）②The community is being created now.（现在进行时，正在创建中）③The community has been created.（现在完成时，已创建且现在存在）。教师：Which sentence tells us the community still exists? 预设回答：Sentence ③ — \"has been created\" means it was created and is still here. 板书时机：三句对比板书，用红笔标注时间差异。差异化提示：B班填空（has/have ___ + V-ed）；A班独立造句+解释时态选择。易错点提醒：has been done 和 was done 的最大区别——前者强调结果持续到现在（所以常与 so far / already / yet 连用），后者只陈述过去事实。"},{"step":"语料库搭建","time":"10","content":"【PPT P5 语料库模板】学生分类填语料卡：①完成时被动句摘录（至少3句）②互联网赋能动词（access/inspire/remove/connect/bridge/benefit/apply）③时间/改变表达（so far / now that / as a result）。板书时机：巡视指导。差异化提示：B班填词+翻译；A班造句并写一句\"我可以在博客中这样用\"。预设回答：按互联网语料库模板分类填写词条。易错点提醒：benefit 作动词时用法——benefit from（获益于）和 benefit sb（使某人受益）方向相反。\"The Internet benefits her.\" = 互联网使她受益。"},{"step":"句型转换","time":"5","content":"【PPT P6 练习】教师给句子，学生改时态：The Internet has changed her life.（主动）→ Her life has been changed by the Internet.（被动）。Jan has helped many people. → Many people have been helped by Jan. 预设回答造句。板书时机：板书转换公式。差异化提示：B班跟做每一步；A班独立完成+说明语义区别。易错点提醒：by + 施事者在被动句中可省略——当施事者不重要或不想强调时。\"Her life has been changed.\" 比 \"Her life has been changed by the Internet.\" 更聚焦于改变本身。"},{"step":"小结","time":"2","content":"【PPT P7 总结回顾】回顾 have/has been done 结构+与 was/were done 的区别+语料库。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述。易错点提醒：下节课语法课系统讲练现在完成时的被动语态。"}],"blackboard":"┌─ U3 Reading II: Language Focus ───────────┐\n│ Present Perfect Passive:                    │\n│  have/has + BEEN + past participle          │\n│                                             │\n│ Passive Voice Comparison:                   │\n│  was created (past, done)                   │\n│  is being created (present, in progress)    │\n│  has been created (past→now, result lasts!) │\n│                                             │\n│ Text examples:                              │\n│  \"People's lives have been improved.\"       │\n│  \"An online community has been created.\"    │\n│  \"Many people have been helped by Jan.\"     │\n└─────────────────────────────────────────────┘","exercises":"【基础作业】1. 从课文中找出4个现在完成时被动语态句子并标注 has/have + been + V-ed。2. 将以下句子改为被动：The Internet has connected millions of people. 【提高作业】用现在完成时的被动语态写3句关于互联网改变你周围生活的句子。【参考答案——教师用】基础2示例：Millions of people have been connected by the Internet.","reflection":"✅ 亮点：三时态对比让学生直观感受\"has been done\"的独特功能。⚠️ 需改进：been 遗漏/拼错仍是常见问题，语法课需大量操练。📌 下节课衔接：进入语法课，系统操练现在完成时的被动语态。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Reading and Thinking · The Internet (P3)"},{"id":"l-eng-b2-u3-g","lessonId":"l-eng-b2-u3-g","book":"必修第二册","unitNumber":3,"unitTitle":"The Internet","lessonType":"grammar","lessonTypeName":"语法","lessonNumber":4,"periodNumber":4,"duration":40,"grade":"高一","subject":"英语","tags":["语法","被动语态","现在完成时","互联网","人教版必修二U3","第四节课"],"textbookAnalysis":"本课为必修第二册 Unit 3 第四课时（Discovering Useful Structures），系统教学现在完成时的被动语态（have/has been + past participle）。基于 Reading 语篇中提取的例句，引导学生归纳出\"何时使用完成时被动\"的规则——强调动作已完成、结果持续到现在且受事者比施事者更重要。通过互联网主题的语境化练习（在线社区被创建/信息被分享/生活被改变）巩固语法，为后续博客写作做语言准备。","overview":"【学情分析】A班：掌握一般时被动，但完成时被动（has been done）易与进行时被动（is being done）混淆——都是\"be + V-ed\"但有不同助动词。B班：被动语态整体不熟+完成时不熟=双重困难。共同问题：看到 has been 后面的 done 忘了加 -ed 变过去分词。","objectives":["语言能力：准确构建现在完成时的被动语态句子，在互联网话题中产出 5 个以上正确句子。","文化意识：通过被动语态聚焦\"互联网已带来的改变\"，形成用英语描述科技影响的能力。","思维品质：通过\"发现例句→归纳规则→对比辨析→应用输出\"的归纳法培养语法学习策略。","学习能力：建立\"被动语态自查表\"——写作后自行检查 been 是否遗漏、过去分词形式是否正确。"],"keyPoints":"① 现在完成时被动语态：have/has + been + V-ed（过去分词）② 使用场景：强调动作已完成且结果持续 → 常与 already / just / so far / yet / ever / never 连用 ③ 与一般过去时被动的区别：was done=过去某时间点完成，has been done=过去完成+影响到现在 ④ 不规则过去分词复习（write→written, give→given, take→taken, build→built）","difficulties":"① has been done vs was done — 学生难以判断\"影响是否持续到现在\"。原因：中文没有对应的时体区别。② been 拼写与发音 /biːn/ — 学生写成 ben 或 bean。③ already 在完成时被动句中的位置 — \"has already been done\" 不是 \"has been already done\"。","teachingMethods":"① 归纳法（Guided Discovery）：例句→规则→练习。② 情境造句：给网络场景图片用被动描述。③ 改错竞赛：找出典型错误。","preparation":"【PPT课件】P1 现在完成时被动公式分解；P2 课文例句摘录；P3 与一般过去时被动对比表；P4 时间轴图（过去→现在→将来）；P5 情境造句任务卡；P6 改错题；P7 总结。【实物教具】改错卡每人一套；情境图片卡一套。","process":[{"step":"例句发现","time":"7","content":"【PPT P2 例句】展示课文中3个被动句+新给3个：①Online courses have been accessed by millions. ②New skills have been learned. ③A strong network has been built. 学生圈\"has/have + been + V-ed\"。教师：What signal words tell us it's \"present perfect\"? 预设回答：so far / already / ever / never. \"Has/have been\" shows the action connects past to now. 板书时机：左栏板书3句，红笔标 been + V-ed + 时间信号词。差异化提示：B班只圈 been；A班分析\"这个动作是什么时候发生的，现在结果是什么\"。易错点提醒：been 是 be 的过去分词——be→was/were→been。不要和 being（be 的现在分词）混淆。"},{"step":"规则归纳","time":"10","content":"【PPT P3 对比表】教师对比两种被动：①The website was built in 2020.（一般过去时，时间点明确，网站现在可能已不存在）②The website has been built.（现在完成时，已建成且现在可以使用）。教师：When do we use present perfect passive? 预设回答：When the action was done before now, but the result is still important now. We care about the present result. 板书时机：两列对比板书。差异化提示：B班填已给表格；A班自己画表+每个造1句。易错点提醒：has been done 不能与具体过去时间连用——\"has been built in 2020\" 是错的，应为 \"was built in 2020\"。"},{"step":"时间轴讲解","time":"8","content":"【PPT P4 时间轴】教师用时间轴讲解：过去某点（动作发生）→ 箭头持续 → 现在（结果仍存在）。对比：was done（动作在过去完成，可能无现在联系）vs has been done（动作在过去完成，结果延伸到现在）。教师：Which one would you use for \"The Internet has changed our lives\"? 预设回答：has been done — because the change is still with us. 板书时机：画时间轴对比。差异化提示：B班看时间轴指认时态；A班解释选择原因。易错点提醒：判断技巧——如果前面加上\"so far / up to now\"，只能用现在完成时被动。"},{"step":"情境造句","time":"8","content":"【PPT P5 图片卡】展示4张图（App被下载/网课被完成/群聊被创建/文章被分享），学生用完成时被动描述。教师：Look at this picture. What has been done? 预设回答：The app has been downloaded by millions. / The online class has been completed. / A group chat has been created. 板书时机：巡视指导。差异化提示：B班给动词提示（download/complete/create/share）；A班不给提示自由造句。易错点提醒：不规则过去分词要准确——download→downloaded（规则），write→written（不规则）。"},{"step":"改错竞赛","time":"5","content":"【PPT P6 改错】展示 4 个典型错误：①The website has been create.（create 缺 -d → created）②Many lives have been change.（change 缺 -d → changed）③Information has been wrote online.（wrote 应为 written）④The community has been already helped many people.（already 位置错 → has already been）。学生组间竞赛纠错。预设回答纠错。板书时机：板书错误→改正+规则。差异化提示：B班判对错；A班解释为什么错。易错点提醒：already 在完成时被动中的位置——放在 has/have 之后，been 之前。\"has already been done\" ✓。"},{"step":"小结","time":"2","content":"【PPT P7 总结】回顾公式 have/has been + V-ed + 使用场景 + 常见错误。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班说出3条规则。易错点提醒：自查三问——①has/have 用对了吗（单数has复数have）？②been 写了吗？③动词过去分词拼对了吗？"}],"blackboard":"┌─ U3 Grammar: Present Perfect Passive ────┐\n│  have/has + BEEN + past participle         │\n│                                            │\n│  Signal words: so far / already / just     │\n│                yet / ever / never          │\n│                                            │\n│  was done → past only (2020)              │\n│  has been done → past → present (now!)    │\n│                                            │\n│  🕐 - - - [was done] - - - -              │\n│  🕐 - - - [has been done] → → → NOW       │\n│                                            │\n│  ❌ has been in 2020 → ✓ was done in 2020 │\n│  ❌ has been wrote  → ✓ has been written  │\n└────────────────────────────────────────────┘","exercises":"【基础作业】1. 用现在完成时被动语态造 5 句关于互联网影响的句子。2. 改错：The network has been build. / Information has been share. / The app has been already downloaded.【提高作业】写 60 词短文描述互联网如何改变了你们班（用至少 3 个现在完成时被动语态）。【参考答案——教师用】基础1示例：A class website has been created. / Many useful resources have been shared online. / Students have been connected through group chats.","reflection":"✅ 亮点：时间轴让\"完成\"概念可视化，B班理解度明显提升。⚠️ 需改进：already 位置仍需反复纠正，听与谈课可融入被动语态口头练习。📌 下节课衔接：听与谈聚焦网络安全与网络礼仪讨论，口头运用被动语态描述网络现象。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Discovering Useful Structures · The Internet (P4)"},{"id":"l-eng-b2-u3-lt","lessonId":"l-eng-b2-u3-lt","book":"必修第二册","unitNumber":3,"unitTitle":"The Internet","lessonType":"listening-talking","lessonTypeName":"听与谈","lessonNumber":5,"periodNumber":5,"duration":40,"grade":"高一","subject":"英语","tags":["听与谈","网络安全","网络礼仪","互联网","人教版必修二U3","第五节课"],"textbookAnalysis":"本课为必修第二册 Unit 3 第五课时（Listening and Talking），语境为\"讨论网络安全与网络礼仪\"。听力材料为一段关于网络安全建议的对话，口语输出任务为就如何安全、文明地使用互联网给出建议。功能语言为给出建议（You should... / It's a good idea to... / Make sure you... / Be careful about...）及表达赞同（I agree. / That makes sense. / I hadn't thought of that.）。结合语法课的被动语态，在口语中自然运用完成时被动描述已实施的网络措施。","overview":"【学情分析】A班：有基本的上网安全意识，但英文表达\"网络风险\"的词汇不足。B班：开口意愿低，但网络安全话题贴近生活可激发兴趣。共同问题：给建议时只说\"You should be careful\"过于笼统——缺乏具体措施。","objectives":["语言能力：听懂关于网络安全与礼仪的对话，提取具体建议与理由；能用至少 4 种句型给出网络安全建议并说明原因。","文化意识：了解网络礼仪（netiquette）的概念，形成文明上网的公民意识。","思维品质：在讨论中练习\"给出建议→解释理由→回应同伴建议\"的完整对话链。","学习能力：通过建议对话训练批判性倾听——听懂同伴的关切后给有针对性的建议。"],"keyPoints":"① 给建议句型：You should... / It's a good idea to... / Make sure you... / Be careful about... ② 赞同/补充句型：I agree. / That makes sense. / I hadn't thought of that. / Also... ③ 网络风险词汇：privacy / password / scam / cyberbully / personal information","difficulties":"① Make sure you + 动词原形（确保你…）— 学生易写成 Make sure to do（非正式口语可接受但在正式语境用 you + do 更自然）。② cyberbully（网络欺凌）— 发音 /saɪbəbʊli/，cyber- 前缀读 /saɪbə/。③ privacy /prɪvəsi/ 英式 /prɪvəsi/ vs 美式 /praɪvəsi/ — 教材用英式。","teachingMethods":"① 听前预测→听中配对→听后产出。② 角色扮演：给一位\"网络新手\"提建议。③ 网络安全圆桌讨论。","preparation":"【PPT课件】P1 网络安全图标（密码锁/隐私盾牌/网络欺凌）；P2 给建议句型板；P3 听力任务题；P4 听力任务卡；P5 回应句型板；P6 角色卡。【实物教具】网络安全建议卡 printed；角色卡（新手/顾问）。","process":[{"step":"导入激活","time":"5","content":"【PPT P1 安全图标】教师：Look at these icons. What online problems do they represent? Have you ever had any of these problems? 预设回答：Password stolen. / Someone posted mean comments. / I received a strange message from a stranger. 板书时机：左栏板书 privacy / password / scam / cyberbully。差异化提示：B班中文描述再翻英文；A班用英文简述自己的经历。易错点提醒：privacy 重音在第一音节 /prɪvəsi/ — 不要读成 /praɪvəsi/（美式发音在考试中判错）。"},{"step":"听力抓建议","time":"10","content":"【PPT P3 听力任务】听对话，抓\"谁给了什么建议+为什么\"。教师：Listen for: What advice is given? What is the reason? 预设回答：The speaker advises to use strong passwords because weak passwords are easily hacked. 板书时机：配对填表（建议|理由）。差异化提示：B班给配对连线题；A班听写关键词。易错点提醒：hack（黑客攻击）— 既作动词也作名词，\"my account was hacked\"（被动！）。"},{"step":"听中记录","time":"8","content":"【PPT P4 听力任务卡】【音频】重听，学生填完整建议+理由+赞同/质疑回应。教师：How did the other person react to the advice? 预设回答：He said \"I agree. That makes sense.\" / \"I hadn't thought of that before.\" 板书时机：核对填表。差异化提示：B班给回应选项（A/B/C选）；A班写完整回应句。易错点提醒：I hadn't thought of that = 我没想到那个。用过去完成时，表示\"在你说之前我没想过\"——非常地道的英式回应。"},{"step":"句型操练","time":"7","content":"【PPT P5 句型板】教师带领操练建议+回应链：A: You should use a different password for each account. / B: I agree. That makes sense because if one is hacked, the others are still safe. / A: Also, make sure you don't share your password with anyone. 预设回答跟读+仿造。板书时机：板书建议→回应链条。差异化提示：B班用填空脚本；A班自主对话。易错点提醒：Make sure you + 动词原形 — \"Make sure you to use\" 是错的，去掉 to。"},{"step":"角色扮演","time":"8","content":"【PPT P6 角色卡】两人一组：Newbie（网络新手）和 Advisor（顾问）。新手提出问题（\"I'm worried about...\"），顾问给建议。教师巡视。预设回答：A: I'm worried about my privacy online. / B: You should set your profile to private. Make sure you only accept friend requests from people you know. 板书时机：留句型供参考。差异化提示：B班照卡读；A班脱稿加即兴内容。易错点提醒：给多条建议时用 First / Also / Finally 串起来——\"First, use a strong password. Also, don't click strange links. Finally, be careful about what you share.\""},{"step":"小结","time":"2","content":"【PPT P7 总结】回顾给建议句型+赞同回应+网络风险词汇。教师：Remember: one specific tip is better than \"be careful.\" 预设回答跟读。板书时机：圈重点句型。差异化提示：B班齐读；A班每人说一条最重要的安全建议。易错点提醒：网络礼仪不只是\"小心\"——还包括尊重他人、不传播假消息、不网络欺凌。"}],"blackboard":"┌─ U3 Listening & Talking ──────────────────┐\n│ Giving Advice:                              │\n│  You should / shouldn't + do...             │\n│  It's a good idea to + do...               │\n│  Make sure you + do...                     │\n│  Be careful about + n./doing...            │\n│                                             │\n│ Agreeing / Adding:                          │\n│  I agree. / That makes sense.              │\n│  I hadn't thought of that. / Also...        │\n│                                             │\n│ Online Risks:                               │\n│  privacy / password / scam / cyberbully     │\n│  personal information / stranger            │\n└─────────────────────────────────────────────┘","exercises":"【基础作业】1. 听录音跟读 2 遍，圈出所有建议句型。2. 用至少 2 种建议句型各写 1 句网络安全建议+理由。【提高作业】写 60 词对话：两人讨论如何安全使用社交媒体（至少 4 轮，含建议+回应+补充）。【参考答案——教师用】基础2示例：You should use a strong password with letters, numbers, and symbols. / It's a good idea to check your privacy settings every month.","reflection":"✅ 亮点：角色扮演\"新手vs顾问\"让学生有真实的建议目的感。⚠️ 需改进：Make sure you + do 的否定形式 Make sure you don't... 仍需强化。📌 下节课衔接：进入写作 I，将讨论中的建议写成博客文章。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Listening and Talking · The Internet (P5)"},{"id":"l-eng-b2-u3-w1","lessonId":"l-eng-b2-u3-w1","book":"必修第二册","unitNumber":3,"unitTitle":"The Internet","lessonType":"writing","lessonTypeName":"写作","lessonNumber":6,"periodNumber":6,"duration":40,"grade":"高一","subject":"英语","tags":["写作","博客","互联网","人教版必修二U3","第六节课"],"textbookAnalysis":"本课为必修第二册 Unit 3 第六课时（Reading for Writing I），写作体裁为关于网络经历的博客文章（Write a Blog Post）。博客结构为：吸引人的标题→开头Hook→主体（你的经历+感受+学到的）→结尾（思考/邀请评论）。语言重点为博客特有的口语化但正式的语气（I'd like to share... / Here's what happened... / Have you ever...?）及互联网词汇。结合本单元 Reading 的人物叙事与语法课的被动语态，实现\"读-语法-写\"闭环。","overview":"【学情分析】A班：有写作能力但博客体裁不熟——博客介于日记和文章之间，语气要亲切但不随意。B班：句型储备少、不知如何开头，需大量范例+模板。共同问题：写博客像写作文——缺少\"作者声音\"和读者互动感。","objectives":["语言能力：掌握博客文章的\"Hook→Body→Reflection→Closing\"四段结构，在互联网话题中产出 80-100 词语气自然、有互动感的博客文章。","文化意识：理解博客作为数字时代个人表达与社区交流的工具价值。","思维品质：通过\"选择经历→提炼感悟→邀请回应\"训练从个人经历到普遍意义的思维提炼。","学习能力：建立\"博客≠作文\"的体裁意识——学会使用 Hook、提问读者、非正式但礼貌的语气。"],"keyPoints":"① 博客四段结构：Catchy Title → Hook（吸引注意）→ Body（经历+感受）→ Reflection + Call for Comments ② 博客句型：I'd like to share... / Here's what I learned... / Have you ever experienced...? / What about you? ③ 语气：亲切、个人、有互动感但不随意。","difficulties":"① 博客标题的技巧——和海报标题不同，博客标题可以长一点但要有好奇心。② Hook 的写法——开头第一句决定读者是否继续。③ 博客结尾的\"Call for Comments\"——学生不习惯在文章结尾向读者提问。","teachingMethods":"① 范本解构法：读优秀博客→提取结构→仿写。② 头脑风暴：选一件互联网相关的个人经历。③ 过程写作：outline→draft→peer review。","preparation":"【PPT课件】P1 优秀学生博客范例；P2 博客四段结构图；P3 博客句型库；P4 头脑风暴工作单；P5 写作任务；P6 写作提纲；P7 总结。【实物教具】博客结构模板 printed 每人一份；头脑风暴工作单。","process":[{"step":"范本解构","time":"8","content":"【PPT P1 博客范例】教师展示一篇英文博客范文，学生标注四段：Hook（有趣的开头问题）→ Body（发生了什么+感受）→ Reflection（学到了什么）→ Closing（邀请评论）。教师：What makes this feel like a blog and not a school essay? 预设回答：The writer asks questions to the reader. The tone is friendly. It has \"What do you think?\" at the end. 板书时机：四段结构板书。差异化提示：B班给标注好的范文只匹配段名；A班自己标注+圈出互动句。易错点提醒：博客的灵魂是\"像在和读者聊天\"——用 you 称呼读者、问问题、分享真实感受。"},{"step":"四段结构讲透","time":"8","content":"【PPT P2 结构图】教师逐段讲解：①Title: 有趣+清晰（\"How the Internet Changed My World\" vs \"My Internet Experience\"）②Hook: 1-2句抓注意力——可用问题/惊人事实/小故事开头。③Body: 具体经历+你的感受+使用了哪些网络工具。④Closing: 反思+邀请评论——\"Have you had a similar experience?\" \"I'd love to hear your thoughts!\" 教师用 Jan Tchamani 的故事做示范。预设回答跟做。板书时机：逐段板书模板句。差异化提示：B班给每段填空模板；A班给关键词自己写。易错点提醒：Hook 不能用\"This is a blog about...\"——那是最无聊的开头。试试\"Have you ever felt like the Internet saved your life?\""},{"step":"博客句型库","time":"5","content":"【PPT P3 句型库】教师领读博客高频句型：I'd like to share a story about... / Here's what happened... / At first... but then... / Looking back, I realize... / What I learned is... / What about you? / Have you ever...? / I'd love to hear your thoughts! 教师强调\"用提问建立与读者的连接\"。预设回答跟读。板书时机：句型分类板书（开头句/叙述句/反思句/互动句）。差异化提示：B班齐读+背3句；A班选最喜欢的一句说为什么有效。易错点提醒：Looking back, I realize... 中 looking 是分词作状语，主语是 I。不要写成 \"Look back, I realize...\"（缺 ing）。"},{"step":"头脑风暴","time":"5","content":"【PPT P4 工作单】学生各自想一件互联网相关的个人经历：第一次上网/在网上交到朋友/在线学习新技能/遇到网络安全问题。用工作单记录：①What happened? ②How did you feel? ③What did you learn? 教师巡视。预设回答：I learned to code from YouTube tutorials. / I made a friend from another city through an online game. 板书时机：巡视指导。差异化提示：B班给选题目录（3选1）；A班自己想。易错点提醒：选你最有感触的经历——真诚比\"厉害\"更重要。读者能感受到你是否真的在乎这个故事。"},{"step":"起草博客","time":"10","content":"【PPT P5 写作任务】学生写 80-100 词博客初稿。要求：四段完整、至少 1 个现在完成时被动语态、至少 2 个博客句型、结尾有互动提问。教师巡视提醒：Don't write like an essay! Talk to your reader! 预设回答：（学生写作中）板书时机：留四段模板供参考。差异化提示：B班用模板框架填写；A班自由写+追求语气自然。易错点提醒：博客最怕\"假大空\"——具体细节比泛泛而谈好100倍。不说\"The Internet is useful\"，说你\"学会了什么具体技能/认识了谁\"。"},{"step":"同伴初评","time":"4","content":"【PPT P6 写作提纲】同桌互换博客初稿，check：有四段吗？Hook 抓人吗？有完成时被动吗？结尾有互动提问吗？语气像在聊天吗？教师：Does this blog feel like a real person is talking to you? 预设回答：Yes, but the ending could be more interactive. 板书时机：留 checklist。差异化提示：B班用 checklist 逐项打勾；A班口头给改进建议。易错点提醒：互评时关注\"有没有打动我\"——如果一篇博客让你读完没感觉，告诉对方哪里可以加真情实感。"}],"blackboard":"┌─ U3 Writing: Blog Post ─────────────────┐\n│  ① CATCHY TITLE                           │\n│  ② HOOK (question / surprising fact)       │\n│  ③ BODY (what happened + feelings)         │\n│  ④ CLOSING (reflection + ask readers!)     │\n│                                            │\n│  Blog Voice Tips:                          │\n│   Talk TO reader (you / your)             │\n│   Ask questions                            │\n│   Be real & personal                       │\n│   Use: I'd like to share... / Have you...  │\n│        Looking back... / What about you?   │\n└────────────────────────────────────────────┘","exercises":"【基础作业】按课堂初稿完成 80-100 词博客。要求：四段完整、至少 1 个完成时被动、至少 2 个博客句型、结尾有互动提问。【提高作业】将博客发布到班级英语学习群（或打印出来贴在教室），并回复至少 1 位同学的博客评论（英文）。【参考答案——教师用】示例（节选）：Title: \"How YouTube Taught Me to Cook\" / Hook: \"Have you ever learned something life-changing from a video?\" / Body: \"Last year, I couldn't even boil an egg. Then I discovered cooking channels on YouTube...\" / Closing: \"What skill has the Internet helped YOU learn? Share in the comments!\"","reflection":"✅ 亮点：博客四段结构让学生从\"写作文\"变为\"写博客\"，语气明显更自然。⚠️ 需改进：Hook 仍有学生写\"This is a blog about...\"，下节课用范文对比强化。📌 下节课衔接：进入写作 II，互评修改+博客展示分享。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Writing · The Internet (P6)"},{"id":"l-eng-b2-u3-w2","lessonId":"l-eng-b2-u3-w2","book":"必修第二册","unitNumber":3,"unitTitle":"The Internet","lessonType":"writing","lessonTypeName":"写作","lessonNumber":7,"periodNumber":7,"duration":40,"grade":"高一","subject":"英语","tags":["写作","互评","修改","博客","互联网","人教版必修二U3","第七节课"],"textbookAnalysis":"本课为必修第二册 Unit 3 第七课时（Writing II），在 Writing I 博客初稿的基础上完成\"互评→修改→展示→终稿\"闭环。重点训练学生用同学反馈改进博客文案的能力——特别关注语气是否自然、是否有读者互动。互评量表聚焦三维度：结构完整（四段）、语言质量（被动语态/博客句型/语气亲切）、读者吸引力（Hook抓人/内容真诚/结尾有互动）。","overview":"【学情分析】A班：能辨别博客好坏，但给反馈时只说\"写得不错\"缺乏具体点（如\"Hook 够不够吸引\"）。B班：改自己博客时不知从何下手。共同问题：互评时不好意思说真话——博客最需要真实反馈。","objectives":["语言能力：能根据互评量表给同伴的博客初稿提具体、可操作的修改建议，重点检查语气是否自然、是否有读者互动。","文化意识：通过阅读同伴的博客了解互联网对不同同学的不同影响。","思维品质：在互评中培养\"识别读者体验→提出优化方案\"的批判性反馈能力。","学习能力：建立\"写→评→改→展\"四步博客写作流程，内化为个人写作习惯。"],"keyPoints":"① 互评三维量表：结构（四段完整 / 标题吸引）+ 语言（被动≥1 / 博客句型≥2 / 语气亲切）+ 读者体验（Hook抓人？内容真诚？结尾有互动？）② 博客展示技巧：用\"读+讲\"的方式，先读一段最好的句子，再说写作心得。","difficulties":"① 学生互评时不好意思说语气不自然——需示范如何给建设性反馈。② 博客结尾的互动提问太敷衍——\"What about you?\" 太泛，应更具体。③ 展示时照本宣科没有抑扬顿挫——博客应该读出\"聊天感\"。","teachingMethods":"① 量表互评：用统一标准减少主观性。② 对子互评→修改→展示。③ 最佳博客评选+博客墙展示。","preparation":"【PPT课件】P1 互评三维量表；P2 常见问题（Hook弱/语气像作文/无互动/被动语态缺）；P3 修改指南；P4 展示技巧（30秒读+讲）；P5 最佳博客范例；P6 自评表；P7 总结。【实物教具】互评量表 printed 每人一份；红笔。","process":[{"step":"量表培训","time":"5","content":"【PPT P1 互评量表】教师逐维讲解：①结构（四段全？标题吸引人？）②语言（完成时被动≥1？博客句型≥2？语气亲切？）③读者体验（Hook抓人？内容真诚可信？结尾让读者想回应？）。教师用上节课自己写的博客示范打分。预设回答跟学。板书时机：量表三维板书。差异化提示：B班按量表逐项打勾；A班还需写一句最想对作者说的话。易错点提醒：博客互评最重要的标准是——\"你想继续读下去吗？\"如果不想，告诉作者为什么。"},{"step":"互评","time":"12","content":"【PPT P2 常见问题】先展示上节课常见问题：①Hook是\"This is a blog about...\" ②语气像作文（Therefore / In conclusion）③结尾无互动提问 ④无完成时被动。然后同桌互换初稿，用红笔按量表标注。教师巡视。教师：What is the BEST sentence in this blog? What is one thing to improve? 预设回答：The story about learning to code is great, but the title is boring. 板书时机：留量表供参考。差异化提示：B班按 checklist 勾；A班在稿上写具体修改建议。易错点提醒：给反馈时先说你最喜欢的部分——作者需要知道什么应该保留。"},{"step":"修改","time":"10","content":"【PPT P3 修改指南】学生根据互评反馈修改博客。顺序：①先调语气（把\"Therefore\"改成\"So\"、加 you 称呼读者）②再加语言（插入被动语态/博客句型）③最后检查 Hook 和互动结尾。教师：Does your blog sound like YOU talking? 预设回答：（学生修改中，此处无口头回答）板书时机：留修改顺序。差异化提示：B班对照量表逐条改；A班改完还润色句子多样性。易错点提醒：修改时大声读出自己的博客——耳朵能听出眼睛看不出的不自然。"},{"step":"博客展示","time":"8","content":"【PPT P4 展示技巧】3-4 位自愿者上台：①先说\"我最满意的是…\"②再读最精彩的 2-3 句 ③最后说\"我是怎么想到这个主题的\"。全班投票：最想关注的博客/最真诚的故事/最好的 Hook。预设回答展示。板书时机：记投票结果。差异化提示：B班可看稿读；A班讲写作心得。易错点提醒：展示时语速放慢——你写了80词，但听众需要时间消化。读关键句时停顿+眼神交流。"},{"step":"结课+自评","time":"5","content":"【PPT P7 总结+自评】宣布最佳博客前三名。学生自评：①我的博客最打动人的地方是？②下次写博客我会注意什么？教师：What makes a good blog post? 预设回答：A good hook, a real story, a friendly tone, and asking the reader something. 板书时机：写最佳博客标题作为范例。差异化提示：B班中文自评；A班英文自评。易错点提醒：博客写作的终极秘诀——写的时候想象你最好的朋友正在读。你会怎么对TA说话，就怎么写。"}],"blackboard":"┌─ U3 Writing II: Blog Review ─────────┐\n│ Blog Checklist:                        │\n│  ✅ 4 parts (Title/Hook/Body/Close)    │\n│  ✅ ≥1 present perfect passive         │\n│  ✅ ≥2 blog-style phrases              │\n│  ✅ Friendly, personal tone            │\n│  ✅ Engages reader (you/questions)     │\n│  ✅ Ends with call for comments        │\n│                                        │\n│ Blog ≠ Essay:                          │\n│  ✗ Therefore / In conclusion           │\n│  ✓ So... / Here's what I think...      │\n└────────────────────────────────────────┘","exercises":"【基础作业】根据课堂反馈修改博客终稿，发布到班级英语学习平台。写 20 词英文评论回复给一位同学的博客。【提高作业】写第二篇博客（50-80词）：主题为\"How to Stay Safe Online\"，用建议句型给读者提3条具体安全建议。【参考答案——教师用】参考 Writing I 的 exercises 答案。终稿评估标准：结构四段（2分）+完成时被动≥1（2分）+博客句型≥2（2分）+语气亲切有互动（2分）+语法准确（2分）= 10分。","reflection":"✅ 亮点：量表培训让学生知道\"好博客长什么样\"，互评质量显著提升。⚠️ 需改进：部分博客结尾互动提问太泛（\"What about you?\"），下次可要求加更具体的邀请。📌 下节课衔接：进入 Project，将本单元所学整合为\"互联网改变生活\"数字展。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Writing · The Internet (P7)"},{"id":"l-eng-b2-u3-p","lessonId":"l-eng-b2-u3-p","book":"必修第二册","unitNumber":3,"unitTitle":"The Internet","lessonType":"project","lessonTypeName":"项目复习","lessonNumber":8,"periodNumber":8,"duration":40,"grade":"高一","subject":"英语","tags":["项目","复习","互联网","数字展","人教版必修二U3","第八节课"],"textbookAnalysis":"本课为必修第二册 Unit 3 第八课时（Project），为单元终极产出课。学生以 4 人小组为单位，整合本单元5种课型所学——听与说的网络词汇+阅读的人物叙事+语法的完成时被动+听与谈的安全建议+写作的博客——完成一份\"互联网改变生活\"数字展览展板。综合考查语言能力（词汇/语法/写作）、思维品质（信息组织）和学习能力（合作分工）。","overview":"【学情分析】A班：能独立完成分工作品，但需要明确评分标准。B班：group work 中易\"搭便车\"，需明确定人定责。共同问题：展板变成\"贴图片+几个单词\"——需强制每模块有完整英文句。","objectives":["语言能力：综合运用本单元词汇、完成时被动语态、建议句型、博客句型，以英文完成一份\"互联网改变生活\"数字展览展板。","文化意识：通过展览形式展示互联网在生活各个方面（教育/社交/工作/健康）的积极影响。","思维品质：在4人小组中合理分工、有效协作，培养项目管理思维。","学习能力：回顾本单元5课学习内容，建立\"一个单元学什么、怎么用\"的整体框架感。"],"keyPoints":"① 展板四模块：How the Internet Has Changed... Education / Social Life / Work / Health（至少选2个）② 每个模块：Before→Change→Impact（用完成时被动）③ 单元知识整合：网络词汇/完成时被动/建议句型/博客风格 ④ 小组分工：Researcher / Writer / Designer / Presenter","difficulties":"① \"改变\"的英文表达多样性——学生全篇用 change 一词。提醒：可用 transform / improve / reshape / revolutionize。② 展板中的完成时被动——每个模块至少一个。③ 展板不是\"好的方面\"列表——也要提挑战（privacy / addiction / misinformation）。","teachingMethods":"① PBL项目式学习：以数字展为驱动问题。② 小组协作：角色分工+module checklist。③ 展览+最佳展板评选。","preparation":"【PPT课件】P1 单元回顾五课内容（思维导图）；P2 展板四模块结构；P3 角色分工卡；P4 范例参考；P5 评价量规；P6 自评表；P7 总结。【实物教具】A3白纸每组一张；彩笔/马克笔；角色分工卡 printed。","process":[{"step":"单元回顾","time":"5","content":"【PPT P1 思维导图】教师带学生回顾本单元5课学了什么：听与说（网络活动词汇+上网习惯）→阅读（Jan的故事+互联网赋能）→语法（has been done）→听与谈（安全建议+网络礼仪）→写作（博客文章）。教师：Today we show how the Internet changes lives! 预设回答跟读回顾。板书时机：左栏画五课链接图。差异化提示：B班看PPT读关键词；A班自己说出每课核心内容。易错点提醒：每个模块至少用一次现在完成时被动语态——\"has been changed / have been connected / has been improved\"。"},{"step":"任务布置+分工","time":"6","content":"【PPT P2 展板结构】【PPT P3 角色卡】教师展示展板四模块：①Education（在线学习如何改变教育）②Social Life（社交网络如何连接人）③Work（互联网如何改变工作方式）④Health（健康类App如何帮助人）。每组选2-3个模块深挖。角色：Researcher找数据+案例 / Writer写文案 / Designer设计排版 / Presenter准备展示。教师：Pick your modules and role! 预设回答：We choose Education and Social Life. I'm the researcher. 板书时机：留模块结构和角色。差异化提示：B班给语言模板+数据参考；A班自己找数据和案例。易错点提醒：每个模块都要用\"Before→Change→Impact\"逻辑——不是列优点，是讲故事。"},{"step":"制作展板","time":"16","content":"【PPT P4 范例参考】【实物 A3纸】小组制作。教师巡视提醒：①全英文！②每模块至少3句完整句 ③至少2个完成时被动 ④要提挑战（不是只说好话）⑤最后3分钟 Presenter 准备。预设回答：（小组讨论制作中，教师巡视指导）板书时机：无。差异化提示：B班给句型开头提示（Before the Internet,... / Now,... / As a result,...）；A班独立完成。易错点提醒：挑战部分不是\"否定互联网\"——是提出需要解决的问题，让展板更有深度。例：\"However, online privacy has not been fully protected.\""},{"step":"展示评价","time":"10","content":"【PPT P5 量规】每组 2 分钟展示。全班投票：最佳内容/最佳设计/最佳展示/最有启发性的展板。教师：Make us see the Internet differently! 预设回答展示。板书时机：记投票结果。差异化提示：B班可看展板讲；A班脱稿补充。易错点提醒：2分钟展示结构——30秒概述+30秒模块1+30秒模块2+30秒结论。每个模块一个关键数据+一个被动句。"},{"step":"单元自评","time":"3","content":"【PPT P6 自评表】学生勾选四维薄弱项：网络词汇不熟？完成时被动不会用？建议句型忘了？博客结构不熟？写1条补强计划。教师：Which part of this unit do you need more practice on? 预设回答：I need to practice the present perfect passive with irregular verbs. I will make a list of 10 irregular past participles and write sentences. 板书时机：留自评四维。差异化提示：B班中文写；A班英文写。易错点提醒：补强计划要有时间节点——\"这周末前完成\"，而不是\"有空再做\"。"}],"blackboard":"┌─ U3 Project: Internet Changes Lives ──┐\n│ 🌐 Exhibition Modules:                  │\n│  ① Education (online learning)         │\n│  ② Social Life (connection)            │\n│  ③ Work (remote work / skills)         │\n│  ④ Health (apps / information)         │\n│                                         │\n│  Each Module:                           │\n│  Before → Internet Change → Impact     │\n│  + Challenge (privacy / addiction)     │\n│                                         │\n│ 👥 Roles: Researcher / Writer /         │\n│            Designer / Presenter         │\n│                                         │\n│ ⭐ Must: ≥2 present perfect passive     │\n│          per board                      │\n└─────────────────────────────────────────┘","exercises":"【基础作业】完成小组展板（未完成的继续做），拍照片提交。写 30 词英文反思：我的角色是…从这个项目我学到了互联网的…【提高作业】选一个不在此次展板中的互联网话题（如AI/电商/在线医疗），写 50 词英文简报。【参考答案——教师用】反思示例：I was the writer for the Education module. I learned that the Internet has transformed how we learn — online courses have been accessed by millions who couldn't go to school before. What surprised me most is that the digital divide still exists as a major challenge.","reflection":"✅ 亮点：Before→Change→Impact 框架让展板有逻辑深度。⚠️ 需改进：部分小组\"挑战\"部分太空泛，下次可要求举具体例子。📌 下节课衔接：进入 Unit 4 History and Traditions，从数字世界转向历史文化探索。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Project · The Internet (P8)"},{"id":"l-eng-b2-u4-ls","lessonId":"l-eng-b2-u4-ls","book":"必修第二册","unitNumber":4,"unitTitle":"History and Traditions","lessonType":"listening-speaking","lessonTypeName":"听与说","lessonNumber":1,"periodNumber":1,"duration":40,"grade":"高一","subject":"英语","tags":["听与说","历史与传统","英国","地标","人教版必修二U4","第一节课"],"textbookAnalysis":"本课为必修第二册 Unit 4 History and Traditions 第一课时（Listening and Speaking），属单元导入+输入环节。语篇为一段关于英国历史地标的对话与介绍，功能语境是\"分享你对一个历史地标的了解\"。语言重点为历史与传统词汇（ancient, tradition, landmark, historic, belong to, fascinating）及分享知识句型（Did you know that...? / I've read that... / As far as I know...）。为 Reading 语篇\"WHAT'S IN A NAME?\"中英国四国历史做词汇与话题预热。","overview":"【学情分析】A班：对英国有一定背景知识（London, Big Ben, Queen），但对苏格兰/威尔士/北爱尔兰了解少。B班：英国历史背景几乎为零，需地图+图片大量脚手架。共同问题：描述历史地标时只会说 old 和 beautiful，缺乏 historical/significant/fascinating 等高阶形容词。","objectives":["语言能力：听懂关于英国历史地标的介绍，提取关键信息（名称/地点/历史意义），准确使用 8-10 个历史与传统相关词汇。","文化意识：了解英国主要历史地标及其文化意义，形成对世界多元历史文化的尊重。","思维品质：通过\"听前预测—听中核实—听后比较\"训练听力策略。","学习能力：能用 Did you know that...? / As far as I know... 分享历史地标知识。"],"keyPoints":"① 历史与传统核心词汇：ancient / tradition / landmark / historic / belong to / fascinating / cultural / ancestor ② 分享知识句型：Did you know (that)...? / I've read that... / As far as I know... ③ 听力微技能：听前看图片预测信息、听中抓地名+年代。","difficulties":"① historic（有历史意义的）vs historical（与历史相关的）——学生混淆。易错点提醒：historic 强调\"有重大历史意义的\"，historical 仅表示\"与历史有关的\"。② ancient /eɪnʃənt/ — c 不发音。③ landmark 拆开不是 land+mark 的字面意思而是\"地标\"。","teachingMethods":"① 任务型（TBL）：以介绍一处历史地标为终任务。② 听前预测+听中填表：信息卡脚手架。③ 对子互问操练分享句型。","preparation":"【PPT课件】P1 单元封面（History and Traditions）；P2 英国历史地标九宫格（巨石阵/伦敦塔/爱丁堡城堡/温莎城堡/巴斯罗马浴场/卡迪夫城堡/巨人堤道/威斯敏斯特教堂/牛津大学）；P3-4 听力任务题；P5 分享知识句型板；P6 说话任务卡。【实物教具】英国地图一张；历史地标信息卡 printed 每组一套。【音频】听力两段音频（教材配套）。","process":[{"step":"导入激活","time":"5","content":"【PPT P2 九宫格】教师：Look at these nine places. Which ones do you recognize? Which country of the UK is each in? 预设回答：Stonehenge is in England! Edinburgh Castle is in Scotland! 板书时机：右侧板书 ancient / landmark / historic。差异化提示：B班指图说国家名再跟读地标名；A班用 the one in... 说出地点（\"The one in England is...\"）。易错点提醒：the UK（联合王国）包含 4 个 countries: England / Scotland / Wales / Northern Ireland。"},{"step":"词汇输入","time":"8","content":"【PPT P3 词卡】教师领读 ancient / tradition / landmark / historic / belong to / fascinating / cultural / ancestor。教师：What is the difference between \"historic\" and \"historical\"? 预设回答：Historic means very important in history. Historical just means related to history. 板书时机：左栏板书词+短注释。差异化提示：B班配图记忆+中英对照；A班用词造句并区分 historic vs historical。易错点提醒：fascinating /fæsɪneɪtɪŋ/ — 重音在第一音节，不是 /fæsɪneɪʃn/ (fascination)。"},{"step":"听前预测","time":"5","content":"【PPT P4 题支】教师：We will listen to an introduction about a UK landmark. Predict: What landmark? Where is it? How old is it? 预设回答：Maybe Stonehenge, in England, about 5,000 years old. 板书时机：预测信息写在黑板中部。差异化提示：B班给中文提示词；A班用英文说预测+理由。易错点提醒：听力常见陷阱——同一个 landmark 会先给猜测的年份再给确认的年份。\"People thought it was 3,000 years old, but research shows it's actually over 4,500.\""},{"step":"听中填卡","time":"10","content":"【PPT P5 信息卡】【音频 段一】播放听力，学生填信息卡（名称/地点/年代/为什么重要/有趣事实）。教师：Why is this place important in British history? 预设回答：It is a symbol of ancient British culture. It belongs to all of Britain. 板书时机：核对答案时填表于黑板中部。差异化提示：B班听两遍只填名称+地点+年代；A班一遍填全+写有趣事实。易错点提醒：belong to（属于）没有被动语态！\"It is belonged to...\" 是错的，必须是 \"It belongs to...\"。"},{"step":"句型操练","time":"7","content":"【PPT P5 句型板】教师：How to share knowledge about history? Did you know (that)...? / I've read that... / As far as I know... / It is said that... 教师示范后学生用听力信息造句。预设回答：Did you know that Stonehenge is over 4,500 years old? As far as I know, it was built as a temple. 板书时机：句型板书于中央。差异化提示：B班套用模板替换地标名；A班替换地标+追加2个有趣事实。易错点提醒：As far as I know（据我所知）— 不是 \"As far as I know about\" 或 \"As my knowledge\"。"},{"step":"说话任务","time":"5","content":"【PPT P6 任务卡】学生两人一组，从信息卡中选一处地标互相介绍。教师：Tell your partner about a landmark. Use at least one \"Did you know...?\" 预设回答：Did you know that Edinburgh Castle sits on an ancient volcano? It has been a royal residence for centuries! 板书时机：留句型供参考。差异化提示：B班用填空式对话卡；A班自由问答+用定语从句补充信息。易错点提醒：介绍地标时用一般现在时（除非说建造年代用过去时）——\"The castle is on a hill\" 不是 \"was on a hill\"。"}],"blackboard":"┌─ U4 Listening & Speaking ─────────────┐\n│ History & Traditions:                   │\n│  ancient / tradition / landmark         │\n│  historic / belong to / fascinating     │\n│  cultural / ancestor                    │\n│                                         │\n│ Sharing knowledge:                      │\n│  Did you know (that)...?               │\n│  I've read that...                     │\n│  As far as I know...                   │\n│  It is said that...                    │\n│                                         │\n│ British Landmark Card: Stonehenge       │\n│  Location: England | Age: >4,500 yrs   │\n│  Significance: ancient temple/calendar │\n└─────────────────────────────────────────┘","exercises":"【基础作业】1. 听录音跟读听力文本 2 遍，圈出所有历史词汇。2. 用 Did you know...? / As far as I know... 各写 1 句关于一个历史地标的介绍。【提高作业】用英文写 50 词介绍一处你了解的中国历史地标（如故宫/长城/兵马俑），用至少 2 个分享知识句型。【参考答案——教师用】基础2示例：Did you know that the Great Wall is over 2,000 years old? / As far as I know, the Forbidden City has 9,999 rooms.","reflection":"✅ 亮点：九宫格+地图激活了学生的地理+历史双重背景知识。⚠️ 需改进：historic vs historical 区分仍困难，下节阅读中会反复出现以强化。📌 下节课衔接：进入阅读 WHAT'S IN A NAME?，从地标延伸到英国四个国家的历史形成。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Listening & Speaking · History and Traditions (P1)"},{"id":"l-eng-b2-u4-r1","lessonId":"l-eng-b2-u4-r1","book":"必修第二册","unitNumber":4,"unitTitle":"History and Traditions","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":2,"periodNumber":2,"duration":40,"grade":"高一","subject":"英语","tags":["阅读","英国历史","四个国家","人教版必修二U4","第二节课"],"textbookAnalysis":"本课为必修第二册 Unit 4 第二课时（Reading I），语篇 WHAT'S IN A NAME? 是一篇历史文化说明文，解释\"United Kingdom\"这个名称背后的历史：四个国家（England/Scotland/Wales/Northern Ireland）如何在不同历史时期联合形成今天的 UK。结构为\"名称困惑→逐国形成史→共同点与差异→现代意义\"。语言重点为历史时间表达（in the 16th century / over the next few hundred years / finally）与联合/归属动词（join, be linked to, be added to, break away from）。","overview":"【学情分析】A班：有基本世界史知识但\"UK vs GB vs England\"这些概念的英文表述会混淆。B班：对英国历史完全陌生，需时间轴+地图大量脚手架。共同问题：英语中朝代/世纪的表达（the 16th century = 1500s）不习惯，容易算错。","objectives":["语言能力：读懂历史文化说明文，提取 UK 四国形成的时间线与关键事件；掌握 8-10 个历史描述核心词汇。","文化意识：理解 UK 的多元历史构成，体会\"差异中的统一\"这一文化主题。","思维品质：通过时间轴+因果关系分析培养历史叙事阅读策略。","学习能力：能用时间轴+四国关系图复述 UK 的形成过程。"],"keyPoints":"① 说明文结构：Name confusion → History of each country → Similarities & differences → Modern meaning ② 历史时间表达：in the 16th century / over the next few hundred years / finally / in the 20th century ③ 核心短语：be linked to / be added to / break away from / result in / belong to","difficulties":"① 世纪表达——the 16th century = 1501-1600，学生易以为 16th century = 1600s。原因：中文\"十六世纪\"对应 1500s，但英文同样规则。提醒：nth century = (n-1)00s。② be added to（被加入）vs join（主动加入）——语篇中用被动突出\"被并入\"的历史事实。③ break away from（脱离）— 不及物动词短语，后面直接接宾语。","teachingMethods":"① KWL 阅读法：已知→想知→学到的。② 时间轴+地图双脚手架：历史+地理同步构建。③ Jigsaw拼图：分组读不同国家后拼合全貌。","preparation":"【PPT课件】P1 UK 地图四色标注四国；P2 \"UK vs GB vs England\" 概念辨析图；P3 时间轴（从 10 世纪到 20 世纪）；P4 分段任务卡；P5 四国关系图；P6 词汇对比表；P7 总结回顾。【实物教具】UK 地图空白 work sheet 每人一份；时间轴空白工作单。","process":[{"step":"导入设问","time":"5","content":"【PPT P2 概念辨析】教师：What's the difference between the UK, Great Britain, and England? Many people (even British people!) get confused. Let's find out! 预设回答：England is a country. The UK includes four countries? 板书时机：板书 UK / Great Britain / England 三圈 Venn 图。差异化提示：B班中文猜；A班英文猜+理由。易错点提醒：UK = United Kingdom of Great Britain and Northern Ireland（四个国家）。Great Britain = England + Scotland + Wales（三个，不含 Northern Ireland）。England ≠ UK！"},{"step":"快速阅读抓主线","time":"8","content":"【PPT P3 时间轴】教师：Read fast (3 min). Find: ① When did Wales join England? ② When did Scotland join? ③ When did Ireland join? ④ When did Southern Ireland break away? 预设回答：① 16th century ② 18th century (1707) ③ 1801 ④ 20th century (1922). 板书时机：填时间轴四个关键点。差异化提示：B班给年份找对应事件（连线）；A班写完整句。易错点提醒：16th century = 1500s，但 Wales 是在 1500s 被正式并入（具体 1536/1543 年 Acts of Union）。"},{"step":"精读段落1-2 名称困惑+Wales","time":"10","content":"【PPT P4 分段卡】教师精讲：be linked to / be added to。教师：Why does the title say \"What's in a name?\" What confusion is the author talking about? 预设回答：People confuse the UK, Great Britain, and England. The names have different meanings. 板书时机：左侧栏补 be linked to / be added to。差异化提示：B班读后填关键词；A班用自己话解释名称困惑。易错点提醒：莎士比亚戏剧《罗密欧与朱丽叶》中有 \"What's in a name?\" ——本文借用此句暗示名称背后有丰富历史。"},{"step":"精读段落3-5 Scotland+Ireland","time":"10","content":"【PPT P5 四国关系图】教师：How was Scotland added? What happened to Ireland? 学生填表（国家/加入时间/方式）。教师：Why did Southern Ireland break away? 预设回答：Scotland was linked to England in 1603 (same king) and joined in 1707. Ireland was added in 1801, but the south broke away in 1922. 板书时机：右侧画四国关系演变箭头图。差异化提示：B班连线匹配（国家—时间—事件）；A班写完整原因+结果句。易错点提醒：break away from（脱离）= become independent from。Southern Ireland 脱离后成为 Republic of Ireland（独立国家），Northern Ireland 留在 UK。"},{"step":"归纳意义","time":"4","content":"【PPT P6 现代意义】教师：Why is it important to understand this history? What do the four countries share? What makes them different? 预设回答：They share a flag (Union Jack), currency, and military. But they have different flags, languages (Welsh, Gaelic), and sports teams. 板书时机：写 Shared vs Different 两栏。差异化提示：B班跟读关键词；A班用自己的话总结。易错点提醒：Welsh（威尔士的/威尔士语）— 不要和 wealth（财富）混淆，发音完全不同 /welʃ/ vs /welθ/。"},{"step":"小结","time":"3","content":"【PPT P7 总结回顾】教师带学生回顾 UK 形成史时间轴+核心词汇+四国关系。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述时间轴。易错点提醒：UK 国旗 Union Jack 由三面旗帜叠加：England (St George's Cross) + Scotland (St Andrew's Cross) + Ireland (St Patrick's Cross)。Wales 的龙旗不在上面。"}],"blackboard":"┌─ U4 Reading I: WHAT'S IN A NAME? ──────────┐\n│ UK Formation Timeline:                       │\n│  16th c → Wales linked to England            │\n│  18th c (1707) → Scotland joined → GB        │\n│  1801 → Ireland added → UK                   │\n│  1922 → Southern Ireland broke away          │\n│  → Today: UK = Eng+Sco+Wal+NI               │\n│                                               │\n│ be linked to / be added to / break away from │\n│ result in / belong to                         │\n│                                               │\n│ UK ≠ Great Britain ≠ England!                │\n└───────────────────────────────────────────────┘","exercises":"【基础作业】1. 朗读课文第2-4段 2 遍，圈出所有时间表达。2. 用时间轴上的4个关键年份各写1句 UK 历史事件。【提高作业】用 80 词写一段：Choose one of the four countries and introduce its unique tradition or symbol.（用 be linked to / belong to / however）【参考答案——教师用】基础2示例：In the 16th century, Wales was linked to England. / In 1707, Scotland was joined with England and Wales to form Great Britain.","reflection":"✅ 亮点：时间轴+地图双脚手架让抽象历史变具体，B班参与率高。⚠️ 需改进：世纪表达（16th century = 1500s）仍有学生算错，精读课将强化。📌 下节课衔接：进入精读语言+过去分词作宾语补足语在语篇中的功能分析。","aiModel":"claude-opus","viewCount":0,"downloadCount":0,"title":"Reading and Thinking · History and Traditions (P2)"},{"id":"l-eng-b2-u4-r2","lessonId":"l-eng-b2-u4-r2","book":"必修第二册","unitNumber":4,"unitTitle":"History and Traditions","lessonType":"reading","lessonTypeName":"阅读","lessonNumber":3,"periodNumber":3,"duration":40,"grade":"高一","subject":"英语","tags":["阅读","精读","过去分词","英国历史","人教版必修二U4","第三节课"],"textbookAnalysis":"本课为必修第二册 Unit 4 第三课时（Reading II），聚焦语篇 WHAT'S IN A NAME? 的精读与语言分析。重点分析文中过去分词作宾语补足语的用法——如 \"They had castles built\" \"People saw the country linked to England\"——在历史说明文中的功能：描述\"使某事被做\"或\"看到/听到某事被做\"的结果状态。同时深化语篇中高频动词的用法辨析（join / link / add / break / result / belong）。","overview":"【学情分析】A班：已掌握过去分词作定语和表语，但作宾语补足语（have/get sth done）是全新用法。B班：过去分词概念模糊，需大量例句感知\"done\"作补足语的功能。共同问题：翻译成中文时\"have sth done\"容易和 have done（完成时）混淆。","objectives":["语言能力：能在课文语境中识别并分析至少 4 个过去分词作宾语补足语的句子，理解\"have/get sth done\"的\"使某事被做\"语义。","文化意识：通过过去分词补足语体会英语如何表达\"动作的结果状态\"——不同于中文的\"把字句\"。","思维品质：分析过去分词作宾语补足语在历史文本中的功能——描述历史事件的完成状态。","学习能力：建立\"从读到写\"的语料库——积累课文中的过去分词补足语句型用于后续地点描写写作。"],"keyPoints":"① 过去分词作宾语补足语结构：have/get + O + V-ed（使某事被做）；see/hear + O + V-ed（看到/听到某事被做）② 语篇中补足语句的识别与功能分析 ③ 核心动词辨析：join / link / add / break / result / belong / defend","difficulties":"① have sth done（使某事被做）vs have done（完成时）——学生看到 have + V-ed 第一反应是完成时。原因：表层结构相同，深层结构不同。② see sth done（看到某事被做）vs see sb do（看到全过程）vs see sb doing（看到正在做）——三个结构语义不同。③ result in（导致）vs result from（由…导致）——方向相反。","teachingMethods":"① 标注发现法：圈出文中所有过去分词作宾补的句子并分析结构。② 对比辨析：have done vs have sth done。③ 语料卡记录：分类摘录优质句子。","preparation":"【PPT课件】P1-2 课文中圈出的过去分词作宾补示例；P3 结构分解公式；P4 have done vs have sth done 对比；P5 语料卡模板；P6 词汇辨析表；P7 总结回顾。【实物教具】课文复印件 printed 每人一份；高亮笔。","process":[{"step":"课文回顾","time":"5","content":"【PPT P1 时间轴回顾】教师：Last class we learned how the UK was formed. Can you recall the four key events on the timeline? 预设回答：Wales linked, Scotland joined, Ireland added, Southern Ireland broke away. 板书时机：左栏写时间轴关键词。差异化提示：B班看时间轴读关键词；A班完整复述四事件。易错点提醒：added 是 add 的过去分词——\"Ireland was added\"（被动）表示爱尔兰是被并入的，不是自愿加入的。"},{"step":"过去分词作宾补发现","time":"8","content":"【PPT P2 课文句子】发课文复印件。教师：Circle sentences where a past participle (V-ed) follows an object. 学生标记后全班核对：①They had castles built. ②They saw the country linked. ③They got the kingdom united. 教师：What does \"had castles built\" mean? 预设回答：They caused castles to be built by someone. 板书时机：逐句板书，标注 O + V-ed。差异化提示：B班给划线句直接圈 O+V-ed；A班自己找+解释语义。易错点提醒：had castles built ≠ 自己建城堡。是\"使/让城堡被建造\"——通常是让别人建的。"},{"step":"have sth done 讲透","time":"10","content":"【PPT P3 结构公式】教师板书：have/get + O + V-ed。对比：①Kings built castles.（主动，国王自己建）②Kings have built castles.（现在完成时，国王已建完）③Kings had castles built.（过去分词作宾补，国王让人建）。教师：Which sentence means the kings didn't do the building themselves? 预设回答：Sentence ③ — \"had castles built\" means they ordered or arranged for it to be done. 板书时机：三句对比板书。差异化提示：B班填空（had + O + ___）；A班独立造句。易错点提醒：have sth done 的 have 可以有时态变化 —— had（过去）/ will have（将来）/ have had（完成）sth done。"},{"step":"语料库搭建","time":"10","content":"【PPT P5 语料库模板】学生分类填语料卡：①过去分词作宾补句摘录（至少3句）②历史动词（join/link/add/break/result/belong/defend）③世纪/年代表达。板书时机：巡视指导。差异化提示：B班填词+翻译；A班造句+标注\"此句可用于地点描写\"。预设回答：按历史与传统语料库模板分类填写词条。易错点提醒：result in（导致= lead to）≠ result from（由…导致 = be caused by）。\"The war resulted in many deaths\" vs \"Many deaths resulted from the war\"。"},{"step":"句型转换","time":"5","content":"【PPT P6 练习】教师给句子，学生改写：The king ordered people to build a wall. → The king had a wall built. / I saw that the flag was raised. → I saw the flag raised. 预设回答造句。板书时机：板书转换公式。差异化提示：B班跟做每一步；A班独立完成+给转换后的句子造句境。易错点提醒：see/hear + O + V-ed 强调\"动作的结果\"——\"I saw the flag raised\"（看到旗已升起）≠ \"I saw the flag being raised\"（看到旗正在被升起）。"},{"step":"小结","time":"2","content":"【PPT P7 总结回顾】回顾 have/get sth done + see/hear sth done + 语料库。预设回答跟读。板书时机：圈重点。差异化提示：B班跟读；A班自述。易错点提醒：下节课语法课系统讲练过去分词作宾语补足语。"}],"blackboard":"┌─ U4 Reading II: Language Focus ───────────┐\n│ Past Participle as Object Complement:      │\n│  have/get + O + V-ed  (使…被做)           │\n│
